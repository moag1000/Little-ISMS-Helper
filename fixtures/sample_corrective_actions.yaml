# Sample Corrective Actions — Audit-Findings-Closure-Demo (ISO 27001 Clause 10.2)

corrective_actions:
  - title: 'Awareness-Schulung 2024 nachholen — 12 saeumige Mitarbeiter'
    description: 'Internal Audit 2024-Q1 findet, dass 12 Mitarbeiter ihre Pflicht-Awareness-Schulung 2024 noch nicht absolviert haben (Soll: bis 31.03.2024). Findings-Severity: minor.'
    root_cause_analysis: 'HR-Onboarding-Prozess fuer 8 neue Mitarbeiter (Q1/2024) enthielt keinen automatischen Schulungs-Trigger. 4 Bestandsmitarbeiter haben Erinnerungs-Mails ignoriert. Root Cause: Onboarding-Checkliste-Luecke + fehlender Eskalations-Trigger nach 14 Tagen.'
    status: 'completed'
    planned_completion_date: '2024-04-30'
    actual_completion_date: '2024-04-25'
    effectiveness_review_date: '2024-07-25'
    effectiveness_notes: '3-Monats-Wirksamkeitspruefung: alle 12 nachgeschulten Mitarbeiter haben Phishing-Test Q2 bestanden. Onboarding-Checkliste um Schulungs-Trigger erweitert.'

  - title: 'Backup-Restore-Test fuer kritische Datenbank halbjaehrlich'
    description: 'BCM-Audit 2024-H1 stellt fest, dass Backup-Restore-Test fuer Datenbank XYZ in 14 Monaten nicht durchgefuehrt wurde (Soll: alle 6 Monate gemaess BCM-01).'
    root_cause_analysis: 'Backup-Restore-Tests waren nicht in Wartungs-Kalender als wiederkehrender Termin eingetragen. Verantwortlichkeit zwischen DBA und Backup-Operator unklar.'
    status: 'completed'
    planned_completion_date: '2024-05-15'
    actual_completion_date: '2024-05-10'
    effectiveness_notes: 'Restore-Test erfolgreich (RTO 2h erreicht, RPO 15 Min erreicht). Wiederkehrender Termin im DBA-Kalender + Verantwortlichkeit in BCM-Plan klargestellt.'

  - title: 'Lieferanten-Risikobewertung fuer 4 nicht-bewertete Sub-CSPs'
    description: 'Compliance-Audit 2024-Q2 findet, dass 4 Sub-Cloud-Provider (alle Tier-2-Suppliers) keine aktuelle Risikobewertung haben (Soll: ISO A.5.20).'
    root_cause_analysis: 'Supplier-Inventory-Update-Prozess war nicht mit Procurement-Tool synchronisiert. Neue SaaS-Beschaffungen ueber Fach-Abteilungen (Schatten-IT) wurden nicht ans CISO-Team gemeldet.'
    status: 'in_progress'
    planned_completion_date: '2024-08-31'
    effectiveness_review_date: '2024-11-30'

  - title: 'Vorfalls-Lessons-Learned-Prozess foermlich etablieren'
    description: 'Audit-Finding 2024-Q1: nach Major-Incident 2023-12 (Phishing-Welle) wurde kein Lessons-Learned-Workshop dokumentiert; keine systematische Bewertung der IR-Wirksamkeit.'
    root_cause_analysis: 'IR-Prozess hatte keinen verpflichtenden Lessons-Learned-Schritt. Ad-hoc-Improvements ohne formale Dokumentation.'
    status: 'completed'
    planned_completion_date: '2024-05-31'
    actual_completion_date: '2024-05-28'
    effectiveness_review_date: '2024-08-28'
    effectiveness_notes: 'IR-Playbook um Lessons-Learned-Schritt 7 erweitert. Erster Workshop nach Incident 2024-Q2 erfolgreich durchgefuehrt, 4 Improvements identifiziert.'

  - title: 'MFA fuer privilegierte Konten enforced'
    description: 'Pen-Test 2024-Q1 findet, dass 7 privilegierte Konten (Domain-Admins) noch ohne MFA arbeiteten. Critical-Severity-Finding.'
    root_cause_analysis: 'Conditional-Access-Policy war auf "Report-Only" und nicht auf "Enforce" konfiguriert. Pilot-Phase zu lange (3 Monate statt 4 Wochen).'
    status: 'completed'
    planned_completion_date: '2024-03-15'
    actual_completion_date: '2024-03-08'
    effectiveness_notes: '100% MFA-Compliance fuer privileged accounts; FIDO2-Token an alle Admins ausgegeben.'

  - title: 'Datenschutz-DPIA fuer KI-System CRM-Bot nachholen'
    description: 'GDPR-Audit Q1/2024 stellt fest, dass das Customer-Service-Bot-System (NLU + Antwort-Generation) live ging ohne DPIA. Verstoss gegen DSGVO Art.35.'
    root_cause_analysis: 'AI-System-Klassifikation als "Hochrisiko" (Personalisierte Antworten an Betroffene) wurde im Procurement uebersehen. DSB nicht im Approval-Loop.'
    status: 'completed'
    planned_completion_date: '2024-04-30'
    actual_completion_date: '2024-04-22'
    effectiveness_review_date: '2024-07-22'
    effectiveness_notes: 'DPIA durchgefuehrt, 2 Mitigationen umgesetzt (Bias-Test + Opt-out-Button). DSB nun in Procurement-Approval-Workflow integriert. EU-AI-Act FRIA als Folge-Massnahme geplant.'

  - title: 'Threat-Intel-Quellen erweitern auf 5 Quellen'
    description: 'Internal Audit 2024-H1: nur 2 Threat-Intel-Quellen aktiv genutzt (BSI CERT-Bund + Microsoft TI). NIS2 Art.21.2.f Wirksamkeitsanforderung fordert breitere Basis.'
    root_cause_analysis: 'Threat-Intel-Lifecycle nicht als kontinuierlicher Prozess etabliert; Quellen-Auswahl ad-hoc statt risiko-basiert.'
    status: 'in_progress'
    planned_completion_date: '2024-09-30'
