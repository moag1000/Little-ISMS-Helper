dpias:
  - title: 'DSFA: Videoueberwachung Betriebsgelaende'
    referenceNumber: 'DPIA-2024-001'
    version: '1.2'
    processingDescription: 'Videoueberwachung der oeffentlich zugaenglichen Zugangsbereiche, des Mitarbeiterparkplatzes und des Warenlagers mit 18 Kameras. Aufzeichnung erfolgt anlassbezogen bei Bewegungserkennung zwischen 18:00 und 06:00 Uhr sowie 24/7 im Warenlager. Live-Bild ausschliesslich im Alarmfall auf Sicherheitsdienst-Monitor.'
    processingPurposes: 'Praeventiver Schutz vor Einbruch, Vandalismus und Diebstahl. Aufklaerung von Straftaten gegen das Eigentum des Unternehmens. Arbeitssicherheit im Warenlager (Unfallrekonstruktion).'
    dataCategories:
      - 'image'
      - 'video'
      - 'behavior'
      - 'location'
    dataSubjectCategories:
      - 'employees'
      - 'visitors'
      - 'suppliers'
      - 'uninvolved_third_parties'
    estimatedDataSubjects: 500
    dataRetentionPeriod: '72 Stunden automatische Loeschung, im Vorfallsfall bis zur Abschluss der Ermittlungen.'
    dataFlowDescription: 'Erfassung durch IP-Kameras -> verschluesselte Uebertragung ueber internes VLAN -> revisionssicherer NVR im gesicherten Rechenzentrum -> Auswertung nur im 4-Augen-Prinzip durch autorisierte Sicherheitsmitarbeiter. Keine Uebermittlung an Dritte ausser auf behoerdliche Anordnung.'
    necessityAssessment: 'In den letzten 3 Jahren drei dokumentierte Einbrueche mit Schaden von insgesamt 145.000 EUR. Alternative Massnahmen (Zaun, Alarmanlage) wurden bereits umgesetzt, sind aber nicht ausreichend. Videoueberwachung ist geeignet, erforderlich und angemessen.'
    proportionalityAssessment: 'Kameras sind so ausgerichtet, dass oeffentliche Verkehrsflaechen nicht erfasst werden. Keine Ueberwachung von Pausenbereichen, Sanitaerraeumen oder Aufenthaltsraeumen. Aufzeichnung nur zeitlich begrenzt (Nachtzeiten/Lager). Betriebsrat wurde eingebunden und hat zugestimmt.'
    legalBasis: 'legitimate_interests'
    legislativeCompliance: 'Art. 6 Abs. 1 lit. f DSGVO, DSK-Orientierungshilfe Videoueberwachung durch nicht-oeffentliche Stellen (Stand: 2020), BetrVG Paragraph 87 Abs. 1 Nr. 6 (Mitbestimmung).'
    identifiedRisks:
      - title: 'Unbefugte Einsichtnahme in Aufzeichnungen'
        description: 'Mitarbeiter koennten auf Aufzeichnungen zugreifen, die sie zur Verhaltenskontrolle nutzen.'
        likelihood: 'unlikely'
        impact: 'moderate'
        severity: 'medium'
      - title: 'Chilling-Effect auf Mitarbeiter'
        description: 'Gefuehl staendiger Ueberwachung kann Arbeitsatmosphaere beeintraechtigen.'
        likelihood: 'possible'
        impact: 'minor'
        severity: 'low'
      - title: 'Speicherung ueber gesetzliche Frist hinaus'
        description: 'Manuelles Export von Videosequenzen ohne Loeschprotokollierung.'
        likelihood: 'unlikely'
        impact: 'moderate'
        severity: 'medium'
    riskLevel: 'medium'
    likelihood: 'possible'
    impact: 'moderate'
    dataSubjectRisks: 'Eingriff in das Recht auf informationelle Selbstbestimmung. Potenzielle Nutzung der Aufzeichnungen zur Leistungs- und Verhaltenskontrolle von Beschaeftigten.'
    technicalMeasures: 'Verschluesselte Kamera-Uebertragung (TLS 1.3). Passwortgeschuetzter NVR mit MFA. Protokollierung aller Zugriffe (revisionssicher). Automatisches Loeschen nach 72h (mathematische Sicherstellung). Getrenntes VLAN fuer Kamera-Netzwerk. Live-Zugriff nur ueber Sicherheitsdienst-Workstation.'
    organizationalMeasures: 'Betriebsvereinbarung mit Betriebsrat. Verpflichtungserklaerungen der Sicherheitsmitarbeiter. 4-Augen-Prinzip bei Sichtung. Jaehrliche Schulung. Revision alle 2 Jahre. Klar definierter Zweckbindungskatalog. Hinweisschilder an allen Ueberwachten Eingaengen (Art. 13 DSGVO).'
    complianceMeasures: 'Jaehrliches internes Audit. VVT-Eintrag aktuell. Betroffenenrechte-Prozess dokumentiert. Loeschkonzept aktiv.'
    residualRiskAssessment: 'Nach Umsetzung der Massnahmen verbleibt ein geringes Restrisiko hinsichtlich Einsichtsrechten Betroffener, das durch transparente Kommunikation und einfache Anfragewege (Kontakt Datenschutzbeauftragter) weiter minimiert wird.'
    residualRiskLevel: 'low'
    dpoConsultationDate: '2024-03-05'
    dpoAdvice: 'DSFA-Empfehlung: Umsetzung aller identifizierten Massnahmen. Besondere Beachtung der Mitarbeitermitbestimmung. Jaehrliche Wirksamkeitspruefung. Prozess zur Loeschung im Vorfallsfall dokumentieren.'
    dataSubjectsConsulted: true
    dataSubjectConsultationDetails: 'Beteiligung ueber Betriebsrat als Vertretung der Mitarbeiter. Informationsveranstaltung fuer alle Beschaeftigten am 15.03.2024.'
    stakeholdersConsulted:
      - 'Betriebsrat'
      - 'Facility Management'
      - 'IT-Security'
      - 'Rechtsabteilung'
    requiresSupervisoryConsultation: false
    status: 'approved'
    approvalDate: '2024-03-20'
    approvalComments: 'DSFA vollstaendig. Residualrisiko akzeptabel. Freigabe fuer Weiterbetrieb der Videoueberwachung unter den dokumentierten Bedingungen.'
    reviewRequired: false
    lastReviewDate: '2024-09-20'
    nextReviewDate: '2025-09-20'
    reviewFrequencyMonths: 12

  - title: 'DSFA: KI-gestuetztes Bewerber-Screening (Resume Parser)'
    referenceNumber: 'DPIA-2024-002'
    version: '1.0'
    processingDescription: 'Einfuehrung eines KI-basierten Resume-Parsers zur automatisierten Vorsortierung von Bewerbungsunterlagen. Das System extrahiert strukturierte Daten (Qualifikationen, Erfahrung, Skills), berechnet einen Matching-Score gegen die Stellenausschreibung und sortiert Bewerbungen in 3 Kategorien (A/B/C). Die finale Entscheidung ueber Einladungen trifft ausschliesslich ein Mensch.'
    processingPurposes: 'Effizienzsteigerung im Recruiting-Prozess bei hohen Bewerberzahlen (>200 Bewerbungen pro ausgeschriebener Stelle). Einheitliche und nachvollziehbare erste Bewertung anhand fachlicher Kriterien.'
    dataCategories:
      - 'identification'
      - 'contact'
      - 'qualification'
      - 'career_history'
      - 'behavioral_assessment'
    dataSubjectCategories:
      - 'applicants'
    estimatedDataSubjects: 3500
    dataRetentionPeriod: 'Scoring-Ergebnisse werden gemeinsam mit Bewerbungsunterlagen nach 6 Monaten geloescht. Trainingsdaten nicht weiterverwendet.'
    dataFlowDescription: 'Upload Bewerbungsunterlagen ueber Karriereportal -> Speicherung im ATS (Personio) -> API-Call an KI-Service (EU-Region, AVV abgeschlossen) -> Ergebnis (Score + extrahierte Daten) zurueck ins ATS -> manuelle Sichtung durch Recruiter -> Einladung/Absage.'
    necessityAssessment: 'Bei durchschnittlich 230 Bewerbungen pro Stelle (2023) ist eine manuelle Vorsortierung nicht leistbar, ohne Qualitaetsverluste oder Diskriminierungsrisiken durch Muedigkeit/Voreingenommenheit. KI-Unterstuetzung schafft einheitliche erste Bewertung.'
    proportionalityAssessment: 'KI trifft keine autonome Entscheidung (kein Art. 22 DSGVO). Bewerber werden transparent informiert, koennen menschliche Pruefung verlangen (Art. 22 Abs. 3 analog). Regelmaessige Bias-Audits werden durchgefuehrt. Anbieter zertifiziert nach EU AI Act Anforderungen.'
    legalBasis: 'legitimate_interests'
    legislativeCompliance: 'Art. 6 Abs. 1 lit. f DSGVO (berechtigtes Interesse), Art. 22 DSGVO (kein automatisiertes Einzelentscheidungsverfahren - menschliche Pruefung vor Einladung), EU AI Act (Hochrisiko-KI nach Annex III), AGG Paragraph 7 (Diskriminierungsverbot), Paragraph 26 BDSG.'
    identifiedRisks:
      - title: 'Algorithmische Diskriminierung'
        description: 'Bias in Trainingsdaten koennte zu Benachteiligung bestimmter Gruppen (Geschlecht, Alter, Herkunft) fuehren.'
        likelihood: 'possible'
        impact: 'severe'
        severity: 'high'
      - title: 'Unklare Entscheidungsgrundlage fuer Bewerber'
        description: 'Intransparenz des Matching-Algorithmus beeintraechtigt Transparenzprinzip.'
        likelihood: 'likely'
        impact: 'moderate'
        severity: 'high'
      - title: 'Missbrauch des Scorings als alleinige Entscheidungsgrundlage'
        description: 'Recruiter koennten Scoring unreflektiert uebernehmen ("Automation Bias").'
        likelihood: 'possible'
        impact: 'major'
        severity: 'high'
    riskLevel: 'high'
    likelihood: 'possible'
    impact: 'major'
    dataSubjectRisks: 'Diskriminierungsrisiko bei Auswahlentscheidungen. Erschwerter Zugang zum Arbeitsmarkt. Verletzung des Grundsatzes der Transparenz und Fairness.'
    technicalMeasures: 'Deployment nur in EU-Region. Ende-zu-Ende-Verschluesselung der API-Calls. Pseudonymisierung der Daten vor Weitergabe an KI-Service. Regelmaessiges Model-Monitoring auf Drift und Bias. Audit-Logging aller KI-Entscheidungen.'
    organizationalMeasures: 'Verpflichtende Recruiter-Schulung zu Automation-Bias und KI-Grenzen. Quartaerliche Fairness-Audits durch externe Stelle. Transparenzinformationen fuer Bewerber bereits im Karriereportal. Widerspruchsmoeglichkeit und Recht auf rein menschliche Pruefung. Dokumentierte Review-Prozesse.'
    complianceMeasures: 'Bias-Testing nach Einfuehrung und quartaerlich. Betriebsvereinbarung zur KI-Nutzung. Einbindung der Gleichstellungsbeauftragten. Halbjaerliche DSFA-Review. Ethik-Gremium fuer Eskalationen.'
    residualRiskAssessment: 'Trotz umfangreicher Massnahmen verbleibt ein mittleres Restrisiko bezueglich algorithmischer Fairness. Dies wird durch externe Audits, Transparenz und menschliche Letztentscheidung kompensiert. Weiterfuehrende Massnahmen bei Abweichungen im naechsten Review.'
    residualRiskLevel: 'medium'
    dpoConsultationDate: '2024-06-10'
    dpoAdvice: 'Einfuehrung nach Umsetzung aller empfohlenen Massnahmen befuerwortet. Kritisch: Externe Bias-Audits und engmaschiges Monitoring unerlaesslich. Bei erstmaligem Einsatz: Pilotphase mit enger Begleitung, insbesondere Abgleich der KI-Empfehlungen mit finalen menschlichen Entscheidungen.'
    dataSubjectsConsulted: false
    stakeholdersConsulted:
      - 'HR'
      - 'Gleichstellungsbeauftragte'
      - 'Betriebsrat'
      - 'Rechtsabteilung'
      - 'CISO'
      - 'AI Governance Board'
    requiresSupervisoryConsultation: false
    status: 'in_review'
    conductor: null
    approvalDate: null
    reviewRequired: true
    lastReviewDate: '2024-07-15'
    nextReviewDate: '2025-01-15'
    reviewFrequencyMonths: 6
    reviewReason: 'Hochrisiko-KI unter EU AI Act erfordert engmaschigere Review-Zyklen als Standard.'

  - title: 'DSFA: Mitarbeiter-Monitoring mit Microsoft Productivity Score'
    referenceNumber: 'DPIA-2024-003'
    version: '1.0'
    processingDescription: 'Geplante Aktivierung des Microsoft Productivity Score / Workplace Analytics im M365-Tenant zur Auswertung von Produktivitaetsmetriken (Meeting-Zeit, Fokuszeit, E-Mail-Verhalten, Kollaboration) auf aggregierter und individueller Ebene.'
    processingPurposes: 'Analyse von Zusammenarbeitsmustern, Identifikation von Schulungsbedarfen, Optimierung der Arbeitsorganisation, Erkennung von Engpaessen.'
    dataCategories:
      - 'communication_metadata'
      - 'usage_patterns'
      - 'collaboration_data'
      - 'application_usage'
      - 'behavior'
    dataSubjectCategories:
      - 'employees'
    estimatedDataSubjects: 180
    dataRetentionPeriod: 'Rohdaten: 180 Tage. Aggregierte Reports: 2 Jahre.'
    dataFlowDescription: 'Erfassung durch M365-Tenant -> Auswertung in Microsoft Graph/Viva Insights -> aggregierte Dashboards fuer Fuehrungskraefte -> keine Weitergabe an Dritte.'
    necessityAssessment: 'Die Notwendigkeit wurde kritisch hinterfragt: Alternative Methoden (Mitarbeiterbefragungen, Workshops) wurden geprueft. Die Verhaeltnismaessigkeit einer kontinuierlichen Messung auf individueller Ebene konnte nicht ueberzeugend dargelegt werden.'
    proportionalityAssessment: 'Die Verhaeltnismaessigkeit ist auf individueller Ebene nicht gegeben. Auf rein aggregierter Ebene (>=10 Personen pro Gruppe, keine Drilldowns) waere ein Einsatz vertretbar. Leistungs- und Verhaltenskontrolle ist gemaess BetrVG mitbestimmungspflichtig.'
    legalBasis: 'legitimate_interests'
    legislativeCompliance: 'Art. 6 Abs. 1 lit. f DSGVO, Paragraph 26 BDSG, BetrVG Paragraph 87 Abs. 1 Nr. 6 (Mitbestimmung), Paragraph 87 Abs. 1 Nr. 1 (Ordnung im Betrieb).'
    identifiedRisks:
      - title: 'Verdeckte Leistungs- und Verhaltenskontrolle'
        description: 'Fuehrungskraefte koennten individuelle Daten zur Leistungsbewertung missbrauchen.'
        likelihood: 'likely'
        impact: 'severe'
        severity: 'critical'
      - title: 'Chilling-Effect und Vertrauensverlust'
        description: 'Mitarbeiter passen Verhalten an Messgroessen an (Gaming the Metrics).'
        likelihood: 'certain'
        impact: 'major'
        severity: 'high'
      - title: 'Verstoss gegen Mitbestimmungsrechte'
        description: 'Einfuehrung ohne Betriebsvereinbarung rechtswidrig.'
        likelihood: 'certain'
        impact: 'major'
        severity: 'critical'
    riskLevel: 'critical'
    likelihood: 'certain'
    impact: 'severe'
    dataSubjectRisks: 'Permanente Verhaltens- und Leistungskontrolle. Verletzung des Persoenlichkeitsrechts. Gefaehrdung des Arbeitsverhaeltnisses durch ungerechtfertigte Schluesse. Chilling-Effect und Selbstzensur in der Kommunikation.'
    technicalMeasures: 'Falls Einfuehrung: Obligatorische Aggregation auf min. 10 Personen. Deaktivierung aller individuellen Drilldowns. Pseudonymisierung der Rohdaten.'
    organizationalMeasures: 'Abschluss einer Betriebsvereinbarung ist Voraussetzung. Schulung der Fuehrungskraefte. Transparente Information aller Beschaeftigten. Verbot der Nutzung zur Leistungsbewertung in Arbeitsanweisung. Verpflichtungserklaerungen.'
    complianceMeasures: 'Falls Einfuehrung: Jaehrliches Audit auf Einhaltung der Aggregations-Grenzen. Externer Review durch Datenschutzbeauftragten. Beschwerdestelle fuer Beschaeftigte.'
    residualRiskAssessment: 'Trotz Massnahmen bleibt das Restrisiko fuer die Rechte und Freiheiten der Beschaeftigten hoch. Empfehlung des DPO: Verzicht auf individuelle Ebene. Nur aggregierter Einsatz moeglich. Alternative: anonyme Mitarbeiterbefragungen zur Zusammenarbeit.'
    residualRiskLevel: 'high'
    dpoConsultationDate: '2024-09-02'
    dpoAdvice: 'KRITISCH: In aktueller Planung nicht zustimmungsfaehig. Einfuehrung auf individueller Ebene rechtlich nicht haltbar. Umsetzung ohne Betriebsvereinbarung verboten. Vorschlag: Nur aggregierter Einsatz ab Gruppengroessen von mindestens 10 Personen oder Verzicht.'
    dataSubjectsConsulted: true
    dataSubjectConsultationDetails: 'Betriebsrat ausfuehrlich eingebunden. Mitarbeiterbefragung zeigte 78% Ablehnung einer Individualauswertung.'
    stakeholdersConsulted:
      - 'Betriebsrat'
      - 'IT'
      - 'Rechtsabteilung'
      - 'HR'
      - 'Geschaeftsfuehrung'
    requiresSupervisoryConsultation: true
    supervisoryConsultationDate: null
    status: 'requires_revision'
    reviewRequired: true
    rejectionReason: 'Nicht zustimmungsfaehig in aktueller Form. Ueberarbeitung mit Reduzierung auf aggregierte Auswertung und vorherigem Abschluss einer Betriebsvereinbarung erforderlich.'
    reviewFrequencyMonths: 6

  - title: 'DSFA: Customer-Analytics-Plattform mit Cross-Channel-Profiling'
    referenceNumber: 'DPIA-2024-004'
    version: '1.1'
    processingDescription: 'Einfuehrung einer Customer Data Platform (CDP) zur Zusammenfuehrung von Kundendaten aus CRM, E-Shop, Newsletter-Tool und App. Erstellung von umfassenden Kundenprofilen zur Personalisierung von Angeboten, Next-Best-Action-Empfehlungen und Churn-Prediction.'
    processingPurposes: 'Personalisierte Kundenansprache, Erhoehung der Kundenzufriedenheit, Cross-Selling-Potenzial, Churn-Reduktion, Marketing-ROI-Steigerung.'
    dataCategories:
      - 'identification'
      - 'contact'
      - 'transaction_data'
      - 'communication_history'
      - 'behavior'
      - 'online_identifiers'
      - 'preferences'
      - 'location_inferred'
    dataSubjectCategories:
      - 'customers'
      - 'prospects'
    estimatedDataSubjects: 42000
    dataRetentionPeriod: 'Aktive Kunden: Dauer der Geschaeftsbeziehung + 3 Jahre. Inaktive Prospects: 24 Monate nach letzter Interaktion. Verhaltensdaten: max. 36 Monate.'
    dataFlowDescription: 'Quellsysteme (CRM, E-Shop, Newsletter, App) -> ETL-Pipeline mit Pseudonymisierung -> Customer Data Platform (Segment.com, EU-Region) -> Aktivierung in Marketing-Channels -> Event-Streaming zu Google Analytics 4 und Meta Conversions API (nur bei Consent).'
    necessityAssessment: 'Personalisierung erhoeht nachweislich Conversion-Rate (+32%) und Customer-Lifetime-Value (+18%). Fragmentierte Datenbasis in Silos fuehrt zu inkonsistenten Kundenerlebnissen und ineffizienten Marketingausgaben.'
    proportionalityAssessment: 'Umfang der Profilbildung ist erheblich. Interessenabwaegung: Kundenerwartung an personalisiertes Erlebnis vorhanden, aber Grenzen beachten. Kein automatisiertes Einzelentscheidungsverfahren. Opt-In fuer Tracking. Einfache Widerspruchsmoeglichkeit (Art. 21 DSGVO) zentral im Kundenkonto.'
    legalBasis: 'legitimate_interests'
    legislativeCompliance: 'Art. 6 Abs. 1 lit. f DSGVO (Analytics/CRM), Art. 6 Abs. 1 lit. a DSGVO (Tracking/Marketing-Cookies), Paragraph 25 TTDSG, DSK Orientierungshilfe fuer Anbieter von Telemedien (2021).'
    identifiedRisks:
      - title: 'Umfassende Profilbildung ueber Kanalgrenzen hinweg'
        description: 'Detaillierte Kundenprofile koennen zu gefuehltem Kontrollverlust fuehren.'
        likelihood: 'likely'
        impact: 'moderate'
        severity: 'medium'
      - title: 'Fehlerhaftes Identity-Matching'
        description: 'Falsche Zusammenfuehrung von Accounts kann zu Offenlegung gegenueber Dritten fuehren (Haushaltsmitgliedern).'
        likelihood: 'possible'
        impact: 'major'
        severity: 'high'
      - title: 'Weitergabe an Marketing-Plattformen (Meta, Google)'
        description: 'Uebermittlung von Events kann ohne Consent datenschutzrechtlich problematisch sein.'
        likelihood: 'possible'
        impact: 'major'
        severity: 'medium'
    riskLevel: 'high'
    likelihood: 'likely'
    impact: 'moderate'
    dataSubjectRisks: 'Gefuehl der staendigen Beobachtung, intransparenter Datenfluesse und Kontrollverlust. Risiko falscher Zuordnung von Praeferenzen. Offenlegung gegenueber Dritten bei Fehlmatching.'
    technicalMeasures: 'Pseudonymisierung beim ETL (Hash-basierte Kunden-IDs). EU-Hosting des CDP. Kein Transfer von PII an Third-Party-Tags ohne Consent. Consent-Mode v2 fuer Google Analytics. Server-Side Tagging statt Client-Side. Data-Masking fuer nicht-autorisierte User. Regelmaessige Identity-Matching-Audits.'
    organizationalMeasures: 'Transparente Kundeninformation zu Profilbildung. Zentrales Praeferenzzentrum im Kundenkonto. Onboarding-Trainings fuer Marketing-Team zu Datenethik. Quartaerliche Review der aktiven Segmente. Incident-Prozess fuer Falschzuordnungen. Dokumentierte Interessensabwaegung (TIA) fuer alle Use-Cases.'
    complianceMeasures: 'Halbjaerliche DSFA-Review. Jaehrliches Data-Ethics-Audit. Erweiterter VVT-Eintrag. Abstimmung mit Datenschutzbeauftragtem vor Einfuehrung neuer Use-Cases.'
    residualRiskAssessment: 'Nach Umsetzung der Massnahmen: mittleres Restrisiko. Akzeptabel unter der Bedingung transparenter Kundenkommunikation und einfach umsetzbarer Betroffenenrechte. Jaehrliche Pruefung der Angemessenheit.'
    residualRiskLevel: 'medium'
    dpoConsultationDate: '2024-10-18'
    dpoAdvice: 'Grundsaetzlich vertretbar unter den vorgesehenen Massnahmen. Besonderes Augenmerk auf: Transparente Datenschutzerklaerung, funktionierendes Praeferenzzentrum, Vermeidung von Dark Patterns, strikte Trennung zwischen eigenbetrieblicher Analyse (berechtigtes Interesse) und Werbetracking (Consent).'
    dataSubjectsConsulted: false
    stakeholdersConsulted:
      - 'Marketing'
      - 'IT'
      - 'CISO'
      - 'Rechtsabteilung'
      - 'Kundenservice'
    requiresSupervisoryConsultation: false
    status: 'approved'
    approvalDate: '2024-11-22'
    approvalComments: 'Freigabe unter der Bedingung, dass Praeferenzzentrum und Consent-Mode v2 vor Go-Live implementiert und getestet sind.'
    reviewRequired: false
    lastReviewDate: '2024-11-22'
    nextReviewDate: '2025-05-22'
    reviewFrequencyMonths: 6
