risk_appetites:
  - category: 'Financial'
    maxAcceptableRisk: 8
    description: |
      Finanzielle Risiken (Betrug, Zahlungsausfälle, Fehlbuchungen, Sanktionen).
      Moderate Risikobereitschaft: einzelne Risiken bis zu einem erwarteten Schaden
      von 250.000 EUR p.a. sind ohne Einzelfreigabe akzeptabel, sofern Kontrollen
      (SoD, Vier-Augen-Prinzip, Reconciliation) dokumentiert greifen.
      Geringe Toleranz gegenüber regulatorischen Bußgeldern oder Covenant-Brüchen
      mit Kreditgebern. Freigegeben durch CFO und Aufsichtsrat 03/2025.
    isActive: true
    approvedAt: '2025-03-25 14:00:00'
    reviewBufferMultiplier: 1.5

  - category: 'Operational'
    maxAcceptableRisk: 10
    description: |
      Operationelle IT- und Prozessrisiken (Systemausfälle, Prozessfehler,
      Lieferantenausfälle, Personalengpässe). Höhere Toleranz als bei Financial,
      da Geschäftsmodell inhärent auf digitalen Prozessen basiert und Restrisiken
      nie ausgeschlossen werden können. Akzeptanzgrenze: Single-Event-Impact
      < 500.000 EUR oder < 2 Werktage operativer Ausfall pro Quartal.
      Freigegeben durch COO/Geschäftsführung 03/2025.
    isActive: true
    approvedAt: '2025-03-25 14:15:00'
    reviewBufferMultiplier: 1.5

  - category: 'Reputational'
    maxAcceptableRisk: 6
    description: |
      Reputationsrisiken aus Medienberichterstattung, Social-Media-Vorfällen,
      Datenschutzverletzungen mit Außenwirkung oder öffentlichen Sicherheits-Incidents.
      Sehr niedrige Risikobereitschaft wegen direkter Auswirkung auf Kundenbindung,
      Neugeschäft und Bewertung durch Investoren. Jedes Risiko >= 7 erfordert
      Executive-Freigabe und Krisenkommunikations-Playbook. Keine wissentliche
      Akzeptanz reputationsschädigender Compliance-Verstöße. Freigegeben durch
      Geschäftsführung und Head of Communications 03/2025.
    isActive: true
    approvedAt: '2025-03-25 14:30:00'
    reviewBufferMultiplier: 1.25

  - category: 'Compliance'
    maxAcceptableRisk: 4
    description: |
      Compliance-Risiken (DSGVO, ISO 27001, NIS2, branchenspezifische Regulierung,
      Arbeits- und Steuerrecht). Sehr niedrige Toleranz ("zero tolerance" für
      vorsätzliche Verstöße). Alle Risiken mit Score >= 5 sind zwingend zu behandeln
      (treat/transfer), nicht akzeptierbar. Ausnahmen nur bei temporär unausweichlichen
      Gaps mit dokumentiertem Kompensationsplan und CISO/DSB-Freigabe.
      Freigegeben durch Geschäftsführung auf Empfehlung DSB und CISO 03/2025.
    isActive: true
    approvedAt: '2025-03-25 14:45:00'
    reviewBufferMultiplier: 1.25
