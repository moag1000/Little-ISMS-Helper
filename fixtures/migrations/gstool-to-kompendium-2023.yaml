# GSTOOL Alt-Bausteine → IT-Grundschutz-Kompendium 2023 — Migration Table
#
# Curated best-effort mapping. Sources:
# - BSI IT-Grundschutz-Kataloge 15. EL (April 2016) — Schicht B 1-5
# - BSI IT-Grundschutz-Kompendium Edition 2023 (Bausteine ISMS/ORP/CON/OPS/DER/APP/SYS/IND/NET/INF)
# - Each modernised Baustein in the 2018 Kompendium ships its own migration table inside the Baustein-PDF.
#
# WARNING: this is a migration-helper, NOT an authoritative replacement.
# Some legacy Bausteine were split into multiple new modules; some were
# fully removed. Always have a Compliance Manager review the import
# before committing to production.
#
# Status legend:
#   direct       — single-target migration, content largely preserved
#   split        — single legacy Baustein → multiple new (default chosen, alternatives noted)
#   merged       — the new ID covers more than just the legacy content
#   removed      — legacy Baustein has no direct successor
#   bcm          — moved to BSI 200-4 BCM standard, no Kompendium ID
#
# Format:
# B X.Y:
#   to: <Kompendium-2023-ID> | null
#   title_old: "..."
#   title_new: "..."
#   status: direct | split | merged | removed | bcm
#   note: "optional reviewer hint"

