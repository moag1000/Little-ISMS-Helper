schema_version: '1.0'
baseline:
  id: 'software-developer'
  name: 'Software-Entwicklungs-Unternehmen'
  industry: 'software_developer'
  description: |
    Pre-Konfiguration für Software-Entwicklungs-Häuser — Custom-Software,
    Open-Source-Maintainer, Embedded-/Industrial-Software-Lieferanten.
    Schwerpunkt SDLC-Härtung, Lieferketten-Sicherheit, AI-Coding-Tools.
    Anker: ISO 27001, ISO 27034 (Application Security), CRA 2024/2847 ab
    2027, NIS2 Annex II Sektor "Digital Service Providers". Bei
    SaaS-Auslieferung zusätzlich saas-cra-2027 anwenden.

  source: 'Peddi (2026) MRIS v1.5 + Senior-Consultant-Erfahrung Software-Eng-Praxis'
  license: 'CC BY 4.0 (MRIS-Konzepte)'

  mhc_targets:
    MHC-01:
      target: defined
      reason: 'PQC-Strategie für Crypto-Bibliotheken in Produkten — Store-now-decrypt-later betrifft jede ausgelieferte Lib.'
    MHC-02:
      target: managed
      reason: 'SBOM CRA-Pflicht ab 2027 (Annex I Teil II). Auto-Generation in CI Pflicht, Provenance signed.'
    MHC-03:
      target: managed
      reason: 'Phishing-resistente MFA für Build-/Release-Accounts. Supply-Chain-Compromise Top-Risk (XZ, npm-attacks).'
    MHC-04:
      target: defined
      reason: 'Workload-Identity in CI/CD — keine Static-Credentials für Deploy-Pipelines. OIDC-Federation Standard.'
    MHC-05:
      target: defined
      reason: 'Behavioural Detection im Source-Repo + Build-Stack — anomalous PRs / Build-Skripte als IOC.'
    MHC-06:
      target: managed
      reason: 'Dev-Endpoint-Härtung + Build-Server-Hardening Pflicht. Reproduzierbare Builds wo möglich.'
    MHC-07:
      target: initial
      reason: 'Multi-Tenancy meist N/A für reine Software-Auslieferung. Falls SaaS-Anteil → saas-cra-2027 ergänzend.'
    MHC-08:
      target: defined
      reason: 'Source-Code + Artifact-Repos immutable + offsite. Backup von Build-Maschinen (Reproduzierbarkeit).'
    MHC-09:
      target: managed
      reason: 'CRA Art. 13 Vulnerability-Handling-Process — KEV-Latency < 7 Tage für eigene Komponenten + Coordinated Disclosure.'
    MHC-10:
      target: defined
      reason: 'CCM für SDLC-Gates — Pre-Merge-SAST/DAST/Secrets-Scan + Policy-as-Code in CI.'
    MHC-11:
      target: defined
      reason: 'IR-Process für Customer-Reported-Vulnerabilities. PSIRT-Team oder externer Anbieter.'
    MHC-12:
      target: defined
      reason: 'Threat-Led Pen-Testing in Releases ≥ Major. SAST + DAST + SCA in CI als Continuous-Layer.'
    MHC-13:
      target: managed
      reason: 'AI-Agent-Governance KRITISCH — Copilot/Claude/Cursor schreiben Code der ausgeliefert wird. Output-Provenance + Security-Review-Gates Pflicht.'
