schema_version: '1.0'
baseline:
  id: 'pharma-biotech'
  name: 'Pharma / Biotech'
  industry: 'pharma'
  description: |
    Pre-Konfiguration für pharmazeutische Hersteller, Biotechnologie-
    Unternehmen, Auftragslohn-Hersteller (CMO/CDMO). Anker: GxP (GMP/GLP/
    GCP), EU-GMP Annex 11 (Computerised Systems), Eudralex Vol. 4, MDR/
    IVDR (für Medizinprodukte), DSGVO Art. 9 (Studien-/Patientendaten),
    NIS2 (für KRITIS-Hersteller). Validierung + Audit-Trail Kerndogma.

  source: 'Peddi (2026) MRIS v1.5 + Senior-Consultant-Erfahrung Pharma-IT-Praxis'
  license: 'CC BY 4.0 (MRIS-Konzepte)'

  mhc_targets:
    MHC-01:
      target: defined
      reason: 'PQC für Studien-Daten (Aufbewahrung 25+ Jahre) + GxP-elektronische Signaturen.'
    MHC-02:
      target: managed
      reason: 'SBOM für validierte Software-Stacks (LIMS/MES/ERP). GxP-Lieferanten-Qualifikation.'
    MHC-03:
      target: managed
      reason: 'Phishing-resistente MFA Pflicht — GxP-Audit-Trail erfordert eindeutige Identität.'
    MHC-04:
      target: defined
      reason: 'Workload-Identity zwischen LIMS / MES / SAP. Service-Account-Inventar GxP-Pflicht.'
    MHC-05:
      target: defined
      reason: 'Behavioural Detection — Forschungs-IP top APT-Ziel, IP-Theft Risk hoch.'
    MHC-06:
      target: managed
      reason: 'Endpoint + OT-Härtung in Produktion. PLC-Zugang nur via Jump-Host.'
    MHC-07:
      target: defined
      reason: 'Multi-Site-Trennung (Forschung / Entwicklung / Produktion / QA) zwingend.'
    MHC-08:
      target: managed
      reason: 'Immutable Backups + DR — Studien-Daten sind regulatorisch unveränderlich (ALCOA+).'
    MHC-09:
      target: defined
      reason: 'KEV-Patch-Latency in OT meist eingeschränkt — kompensierende Maßnahmen + Re-Validierung.'
    MHC-10:
      target: managed
      reason: 'CCM zwingend — GxP-Audit-Trail muss continuous + integer sein (FDA 21 CFR Part 11 / EU GMP Annex 11).'
    MHC-11:
      target: defined
      reason: 'IR + Eskalation. Bei Studien-Daten-Verlust: BfArM-/EMA-Meldepflicht.'
    MHC-12:
      target: defined
      reason: 'Pen-Test bei kritischen Validated-Systems jährlich + Re-Test nach Major-Change.'
    MHC-13:
      target: defined
      reason: 'AI-Agent-Governance bei AI-gestützter Wirkstoff-Entwicklung + Klinik-Datenanalyse — MDR-IVDR-Sondersituation.'
