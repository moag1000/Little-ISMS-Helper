  # -------------------------------------------------------------------------
  # Blocker 3: AI-Risiko-Entscheidungsmatrix
  # -------------------------------------------------------------------------
  ai_risk_decision_matrix:
    title_de: 'AI-Risiko-Entscheidungsmatrix — 12 typische Tools mit empfohlener Klasse'
    title_en: 'AI Risk Decision Matrix — 12 Typical Tools with Recommended Class'
    intent_de: |
      Junior-ISB will Copilot, Cursor, ChatGPT-Enterprise einsortieren. Diese Matrix
      gibt eine Vorab-Empfehlung mit AI-Act-Anhang-Referenz. Achtung: Klasse haengt am
      Use-Case, nicht am Tool — bei Abweichung dokumentieren.
    intent_en: |
      Junior ISO wants to classify Copilot, Cursor, ChatGPT Enterprise. This matrix
      gives a pre-classification with AI Act annex reference. Caution: the class
      depends on the use case, not the tool — document deviations.
    legend:
      prohibited: 'Verboten — Einsatz nicht zulaessig (AI Act Art. 5)'
      high_risk: 'Hochrisiko — Konformitaetsbewertung Pflicht (AI Act Anhang III)'
      limited_risk: 'Begrenzt — Transparenz-Pflicht (AI Act Art. 52)'
      minimal_risk: 'Minimal — keine spezifischen Pflichten, gute Praxis empfohlen'

    tools:
      - name: 'GitHub Copilot'
        recommended_class: 'limited_risk'
        rationale_de: 'Code-Vorschlaege, kein Personenbezug, kein Entscheidungs-Output. Transparenz-Pflicht: Entwickler muss wissen, dass Code von KI stammt.'
        rationale_en: 'Code suggestions, no personal data, no decision output. Transparency duty: developers must know code originates from AI.'
        ai_act_ref: 'Art. 52 (Transparenz); ggf. Art. 50 fuer Output-Kennzeichnung'
        notes_de: 'Wenn Copilot fuer sicherheitskritische Embedded-Software → einzelfallabhaengig hochstufen.'
        notes_en: 'If Copilot used for safety-critical embedded software → upgrade case-by-case.'

      - name: 'Cursor IDE'
        recommended_class: 'limited_risk'
        rationale_de: 'Wie Copilot, Code-Assistent. Zusaetzlich: Repo-weite Refactoring-Faehigkeit erhoeht Bedrohungsmodell-Anforderungen.'
        rationale_en: 'Like Copilot, code assistant. Additional: repo-wide refactoring capability raises threat-modeling needs.'
        ai_act_ref: 'Art. 52'
        notes_de: 'Capability-Scope MUSS Repos und Datenscope eingrenzen.'
        notes_en: 'Capability scope MUST constrain repos and data scope.'

      - name: 'Claude Code (lokal)'
        recommended_class: 'limited_risk'
        rationale_de: 'Lokale Ausfuehrung, kein PII-Training, MCP-Whitelist moeglich. Dennoch Transparenz-Pflicht und Capability-Scope erforderlich.'
        rationale_en: 'Local execution, no PII training, MCP whitelist possible. Still requires transparency and capability scope.'
        ai_act_ref: 'Art. 52'
        notes_de: 'Bei MCP-Server mit externen Tools (Slack/Gmail/Calendar) Datenscope explizit dokumentieren.'
        notes_en: 'For MCP servers with external tools (Slack/Gmail/Calendar) document data scope explicitly.'

      - name: 'ChatGPT Enterprise'
        recommended_class: 'limited_risk'
        rationale_de: 'Allgemein-Assistent, kein Training auf Eingaben. Solange NICHT fuer Personalentscheidungen, Bewerber-Screening, Kreditpruefung oder Medizin eingesetzt.'
        rationale_en: 'General assistant, no training on inputs. As long as NOT used for HR decisions, applicant screening, credit checks or medical use.'
        ai_act_ref: 'Art. 52; bei abweichendem Use-Case Anhang III'
        notes_de: 'Sobald HR/Recruiting-Use-Case → high_risk hochstufen.'
        notes_en: 'Once HR/recruiting use case → upgrade to high_risk.'

      - name: 'AI-Recruiter-Tool (z.B. HireVue, Eightfold)'
        recommended_class: 'high_risk'
        rationale_de: 'Beschaeftigungs-Entscheidungen — Anhang III Punkt 4. Konformitaetsbewertung, Transparenz an Bewerber, Bias-Pruefung Pflicht.'
        rationale_en: 'Employment decisions — Annex III point 4. Conformity assessment, applicant transparency, bias testing mandatory.'
        ai_act_ref: 'Anhang III Punkt 4 (Beschaeftigung, Personalmanagement, Selbststaendige)'
        notes_de: 'Auch wenn nur "Vor-Filterung": gilt als Hochrisiko. DPIA + Bedrohungsmodell + Bias-Report erforderlich.'
        notes_en: 'Even if only "pre-filtering": counts as high-risk. DPIA + threat model + bias report required.'

      - name: 'Robo-Advisor (Finance) / Bonitaets-Scoring'
        recommended_class: 'high_risk'
        rationale_de: 'Bonitaet/Versicherungs-Scoring — Anhang III Punkt 5b. Konformitaetsbewertung Pflicht, Erklaerbarkeit gefordert.'
        rationale_en: 'Creditworthiness/insurance scoring — Annex III point 5b. Conformity assessment mandatory, explainability required.'
        ai_act_ref: 'Anhang III Punkt 5b (Kreditwuerdigkeit/Bonitaet); Art. 86 (Erklaerungs-Recht)'
        notes_de: 'Bei DORA-Geltung zusaetzlich Art. 6 Operational-Resilience-Pflichten.'
        notes_en: 'If DORA applies, additionally Art. 6 operational resilience duties.'

      - name: 'Predictive Policing / Migrations-Risk-Tools'
        recommended_class: 'prohibited'
        rationale_de: 'Social Scoring durch oeffentliche Stellen / Migrations-Risikobewertung sind in Teilen verboten (Art. 5). Praediktive Strafverfolgung allein auf Profiling-Basis: verboten.'
        rationale_en: 'Public-authority social scoring / migration risk assessments are partially prohibited (Art. 5). Predictive policing solely based on profiling: prohibited.'
        ai_act_ref: 'Art. 5 Abs. 1 lit. c, d (verbotene Praktiken)'
        notes_de: 'Falls aehnliche Tools beschafft werden: zwingend Rechtsabteilung + DPO einbeziehen, kein produktiver Einsatz.'
        notes_en: 'If similar tools are procured: mandatory legal + DPO involvement, no productive use.'

      - name: 'Medical-Imaging-AI (z.B. Radiologie)'
        recommended_class: 'high_risk'
        rationale_de: 'Medizinprodukt + AI Act Anhang III Punkt 5h (medizinische Notdienste-Triage) bzw. MDR-Klasse IIa+. Doppelte Konformitaet (MDR + AI Act).'
        rationale_en: 'Medical device + AI Act Annex III point 5h (medical emergency triage) resp. MDR class IIa+. Dual conformity (MDR + AI Act).'
        ai_act_ref: 'Anhang III Punkt 5h; Art. 6 i.V.m. MDR'
        notes_de: 'Notified Body fuer MDR + AI-Act-Konformitaetsbewertung kombinierbar (MDCG 2024-7).'
        notes_en: 'Notified body can combine MDR + AI Act conformity (MDCG 2024-7).'

      - name: 'Fraud Detection (Banking, kontoseitig)'
        recommended_class: 'high_risk'
        rationale_de: 'Beeinflusst Zahlungsverkehr und Kontosperren — Anhang III Punkt 5b (Lebensbasis-Dienstleistungen). DORA-relevant.'
        rationale_en: 'Affects payments and account freezes — Annex III point 5b (essential services). DORA-relevant.'
        ai_act_ref: 'Anhang III Punkt 5b; DORA Art. 6'
        notes_de: 'Erklaerbarkeit fuer Kunden-Beschwerde-Faelle nach BaFin-MaRisk vorhalten.'
        notes_en: 'Provide explainability for customer complaints under BaFin MaRisk.'

      - name: 'Marketing-Personalisierung / Recommender (B2C)'
        recommended_class: 'limited_risk'
        rationale_de: 'Profiling-naehe, aber kein Hochrisiko-Use-Case nach Anhang III. Transparenz-Pflicht (Art. 52). DSGVO Art. 22 separat zu beachten.'
        rationale_en: 'Profiling-adjacent, but no high-risk use case under Annex III. Transparency duty (Art. 52). GDPR Art. 22 separately applicable.'
        ai_act_ref: 'Art. 52; ggf. DSA Art. 38 (DSA-Anforderung an Recommender bei VLOPs)'
        notes_de: 'Bei Empfehlungen, die rechtliche Wirkung entfalten (z.B. Versicherungspraemie): hochstufen.'
        notes_en: 'For recommendations with legal effect (e.g. insurance premium): upgrade.'

      - name: 'Smart-Home / Spam-Filter / Spielautomat'
        recommended_class: 'minimal_risk'
        rationale_de: 'Keine Hochrisiko-Auswirkung, keine Personenentscheidungen. Beste Praxis: trotzdem Capability-Scope und Logging.'
        rationale_en: 'No high-risk impact, no personal decisions. Best practice: still capability scope and logging.'
        ai_act_ref: 'Keine spezifischen Pflichten; Art. 95 (freiwillige Codes of Conduct)'
        notes_de: 'In ISMS dennoch im AI-Inventar fuehren — bei Reklassifikation durch Hersteller schnell reagieren koennen.'
        notes_en: 'Still keep in AI inventory — be ready for vendor reclassification.'

      - name: 'KRITIS-Steuerung (Energie, Wasser, Verkehr)'
        recommended_class: 'high_risk'
        rationale_de: 'Kritische Infrastruktur — Anhang III Punkt 2. Konformitaetsbewertung + NIS2 + KRITIS-Pflichten kumulativ.'
        rationale_en: 'Critical infrastructure — Annex III point 2. Conformity assessment + NIS2 + national critical-infrastructure duties cumulative.'
        ai_act_ref: 'Anhang III Punkt 2; NIS2 Art. 21'
        notes_de: 'Funktionale Sicherheit (IEC 61508/61511) zusaetzlich beruecksichtigen.'
        notes_en: 'Additionally consider functional safety (IEC 61508/61511).'

    decision_flow:
      step_1_de: 'Faellt der Use-Case unter Art. 5 (verbotene Praktiken)? → JA = prohibited, Stop.'
      step_1_en: 'Does the use case fall under Art. 5 (prohibited practices)? → YES = prohibited, stop.'
      step_2_de: 'Ist der Use-Case in Anhang III gelistet (Beschaeftigung, Bildung, Kreditwuerdigkeit, KRITIS, Strafverfolgung, Medizin, Migration)? → JA = high_risk.'
      step_2_en: 'Is the use case listed in Annex III (employment, education, creditworthiness, critical infrastructure, law enforcement, medical, migration)? → YES = high_risk.'
      step_3_de: 'Interagiert das System direkt mit Menschen oder erzeugt Deepfakes/synthetischen Content? → JA = limited_risk (Transparenz-Pflicht).'
      step_3_en: 'Does the system interact directly with humans or generate deepfakes/synthetic content? → YES = limited_risk (transparency duty).'
      step_4_de: 'Sonst → minimal_risk. Trotzdem AI-Inventar + Capability-Scope fuehren.'
      step_4_en: 'Otherwise → minimal_risk. Still maintain AI inventory + capability scope.'

