    primaryEmail: 'krisenstab-it@example.de'
    emergencyContacts:
      - name: 'HiSolutions IR-Retainer'
        type: 'extern'
        phone: '+49 30 533 289-0'
        available: '24/7'
      - name: 'BSI-CERT'
        type: 'behoerde'
        phone: '+49 228 99 9582-222'
      - name: 'LKA Bayern Cybercrime'
        type: 'behoerde'
        phone: '+49 89 1212-0'
    meetingLocation: 'War-Room HQ München, EG Raum 0.42 (verschlüsselungssicher, kein WiFi)'
    backupMeetingLocation: 'DR-Rechenzentrum Berlin, Konferenzraum 2 / Alternativ: virtuell via Signal'
    virtualMeetingUrl: 'https://signal.org/group/krisenstab-it (Signal-Gruppe, Out-of-Band)'
    alertProcedures: |
      Alarmierung über 3 Kanäle parallel:
      1. Automatische SMS über evalink an alle Krisenstab-Mitglieder
      2. Anruf durch Service Desk an Team-Lead, dann Kaskade
      3. Signal-Nachricht "ALARM" in Krisengruppe
      Bestätigungspflicht binnen 15 min (Reply "ACK"). Bei Nicht-Bestätigung: Stellvertreter kontaktieren.
    decisionAuthority: |
      - Technische Sofortmaßnahmen (Isolation, Shutdown): Team-Lead eigenständig
      - Budget bis 25.000 EUR: Team-Lead + CIO
      - Budget > 25.000 EUR: Eskalation GF
      - Externe Kommunikation: nur via CISO + Kommunikationsleitung
      - Behördenmeldungen: CISO koordiniert, Legal freigibt
    communicationProtocols: |
      - Out-of-Band-Kommunikation bei V.a. AD-Kompromittierung (Signal, private Mobilnr.)
      - Lagebericht alle 30 min während akuter Phase, danach alle 2h
      - Tägliches Debrief 09:00 Uhr, Statusbericht an GF 17:00 Uhr
      - Dokumentation in isolierter Confluence-Instanz
    availableResources:
      - name: 'Forensik-Laptops (5 Stück)'
        location: 'Sicherer Schrank Raum 0.42'
      - name: 'Schreibblocker-Set'
        location: 'War-Room'
      - name: 'Signal-Dienstgeräte (7 Stück)'
        location: 'Bei Krisenstab-Mitgliedern'
      - name: 'IR-Retainer HiSolutions'
        type: 'Vertrag 24/7'
      - name: 'Cyber-Versicherung AIG'
        type: 'Vertrag inkl. BAT-Team'
    trainingSchedule: 'Quartalsweise Tabletop-Übung, halbjährliche technische Simulation, jährliche Red-Team-Übung mit externem Partner. Nächste Übung: 2026-02-12.'
    lastActivatedAt: '2024-03-11 14:22:00'
    lastTrainingAt: '2025-10-18 09:00:00'
    nextTrainingAt: '2026-02-12 09:00:00'
    documentation:
      - title: 'Runbook RB-001 IT-Service-Failover'
        version: '1.8'
      - title: 'Runbook RB-002 DB-Restore'
        version: '2.1'
      - title: 'BCP-001 IT-Service-Ausfall'
        version: '2.3'
      - title: 'BCP-005 Cyber-Crisis'
        version: '2.0'
