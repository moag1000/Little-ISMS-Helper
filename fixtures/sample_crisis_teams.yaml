    virtualMeetingUrl: 'https://teams.microsoft.com/l/meetup-join/bct-crisis'
    alertProcedures: |
      Aktivierung durch CEO oder CISO (bei Cyber-Krise) oder Facility-Manager (bei Gebäude-Notfall).
      Eskalation aus technischem Krisenstab bei Budget > 25k, Reputationsrisiko oder Behörden-Involvement.
      Reaktionszeit: innerhalb 1h nach Alarmierung arbeitsfähig.
    decisionAuthority: |
      - Strategische Entscheidungen, Budget-Freigaben > 25.000 EUR: CEO
      - Lösegeldzahlung bei Ransomware: CEO + CFO + Legal (Default: NEIN)
      - Standort-Schließung: CEO + HR + Betriebsrat
      - Kunden-Kommunikation bei Datenabfluss: CEO + DPO + Legal freigeben
      - Versicherungsmeldungen: CFO
      - Strafanzeige: Legal + CEO
    communicationProtocols: |
      - Tägliche Lagebesprechung 08:00 während Krise
      - Aufsichtsrat-Briefing binnen 24h nach Aktivierung
      - Investor-Kommunikation nur via CEO + CFO (Kapitalmarktrelevanz)
      - Minutes jeder Sitzung rechtssicher dokumentieren (Legal-Assistenz)
    availableResources:
