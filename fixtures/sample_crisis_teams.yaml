      - name: 'Cyber-Insurance AIG (inkl. BAT)'
        type: 'Policy'
      - name: 'Retainer Großkanzlei (Crisis)'
        type: 'Vertrag'
      - name: 'Notfall-Liquidität (500k EUR vorab genehmigt)'
        type: 'Budget'
