# Sample Change Requests — Change-Mgmt-Demo (ISO 27001 A.8.32, NIS2 Art.21.2.e)

change_requests:
  - change_number: 'CR-2024-001'
    title: 'Migration File-Server auf Azure Files'
    change_type: 'standard'
    description: 'Bestehender on-premise File-Server (3 TB) wird auf Azure Files (Azure Premium SKU) migriert.'
    justification: 'Hardware-Refresh-Zyklus erreicht; Cloud-Migration spart 18k EUR Capex + bessere DR-Faehigkeit.'
    requested_by: 'IT-Leitung'
    requested_date: '2024-02-01'
    priority: 'medium'
    status: 'implemented'
    isms_impact: 'Cloud-Provider-Vertrag mit AVV nach DSGVO Art.28; Daten-Klassifikation auf Azure-Tenant geprueft.'
    risk_assessment: 'Risiken: Cloud-Provider-Outage (akzeptiert via 99.9% SLA), Internet-Downtime (akzeptiert via Site-to-Site-VPN-Redundanz). Kein Risk-Acceptance-Decision-Form erforderlich.'
    implementation_plan: '1. Storage Account anlegen, 2. Daten-Migration via AzCopy ueber 4 Naechte, 3. Cutover-Wochenende mit Permission-Rebuild, 4. on-premise Server fuer 90 Tage als Read-Only-Backup behalten.'
    rollback_plan: 'On-premise Server bleibt 90 Tage online; bei Problemen Rueckcutover < 4h via DNS-Switch.'
    testing_requirements: 'Test-User-Group (5 Personen) Pre-Cutover-Test + Permission-Audit auf Azure-Tenant.'
    planned_implementation_date: '2024-03-09'
    actual_implementation_date: '2024-03-09'
    approved_by: 'CIO'
    approved_date: '2024-02-15'
    implemented_by: 'Cloud-Team'
    verified_by: 'Internal Audit'
    verified_date: '2024-03-25'

  - change_number: 'CR-2024-002'
    title: 'Active Directory Domain-Controller Hardware-Refresh'
    change_type: 'normal'
    description: 'DC-01 + DC-02 werden auf neue Hardware (Dell PowerEdge R760) migriert.'
    justification: 'Bestehende Hardware EOL Q3/2024; Garantie-Ablauf.'
    requested_by: 'IT-Operations'
    requested_date: '2024-03-15'
    priority: 'medium'
    status: 'approved'
    isms_impact: 'AD-Verfuegbarkeit kritisch fuer alle Auth-Services; Wartungsfenster So-Nacht.'
    implementation_plan: '1. Neue Hardware aufbauen, 2. AD demote alt, AD promote neu (bei laufendem zweiten DC), 3. FSMO-Roles transferieren, 4. SYSVOL-Replikation pruefen.'
    rollback_plan: 'Alte DCs verbleiben in ad-domain als RODC fuer 30 Tage.'
    planned_implementation_date: '2024-05-19'
    approved_by: 'IT-Leitung'
    approved_date: '2024-04-10'

  - change_number: 'CR-2024-003'
    title: 'Notfall-Patch CVE-2024-3094 (XZ Utils)'
    change_type: 'emergency'
    description: 'Notfall-Patch fuer XZ Utils Backdoor; alle Linux-Server.'
    justification: 'Backdoor in upstream XZ Utils; OpenSSH-Authentifizierung gefaehrdet. CISA Emergency Directive.'
    requested_by: 'Security-Team'
    requested_date: '2024-03-29'
    priority: 'critical'
    status: 'implemented'
    isms_impact: 'Out-of-Band-Patch; CAB-Genehmigung post-implementation.'
    risk_assessment: 'Restrisiko durch Patch-Failure niedriger als Restrisiko durch Backdoor.'
    implementation_plan: 'Ansible-Playbook auf alle Linux-Server, Reboot-Validierung via Health-Check.'
    rollback_plan: 'Snapshot-basiert (VMs); physische Server haben Versions-Lock-Reset-Pfad.'
    planned_implementation_date: '2024-03-30'
    actual_implementation_date: '2024-03-30'
    approved_by: 'CISO'
    approved_date: '2024-03-30'
    implemented_by: 'Linux-Team'
    implementation_notes: 'Alle 47 Linux-Server innerhalb 6h gepatcht; 2 erforderten manuellen Reboot.'
    verified_by: 'Security-Team'
    verified_date: '2024-04-02'

  - change_number: 'CR-2024-004'
    title: 'MFA-Pflicht fuer alle externen Zugaenge'
    change_type: 'standard'
    description: 'Conditional Access Policy: MFA via FIDO2 oder Authenticator-App fuer alle externen Logins.'
    justification: 'NIS2 Art.21.2.j Anforderung + DORA Art.9 Protection. Phishing-resistante MFA als Stand der Technik.'
    requested_by: 'CISO'
    requested_date: '2024-03-01'
    priority: 'high'
    status: 'in_review'
    isms_impact: 'Awareness-Schulung fuer alle Mitarbeiter; FIDO2-Token-Beschaffung; Helpdesk-Vorbereitung.'
    risk_assessment: 'User-Friction-Risiko durch Pilot-Phase + Schulungs-Plan akzeptabel.'
    implementation_plan: '1. Pilot 30 User (2 Wochen), 2. Schulung Plenum, 3. Conditional-Access-Policy enforcement, 4. Helpdesk-Eskalation.'
    rollback_plan: 'Conditional-Access-Policy-Disable in 5 Min via Tenant-Admin.'
    planned_implementation_date: '2024-06-01'

  - change_number: 'CR-2024-005'
    title: 'SaaS-Abloesung Slack durch Microsoft Teams'
    change_type: 'normal'
    description: 'Slack-Tenant wird ausgemustert; alle Channels migrieren zu Teams.'
    justification: 'Lizenz-Konsolidierung mit M365; geringere TPP-Risk-Surface fuer DORA.'
    requested_by: 'IT-Leitung'
    requested_date: '2024-04-01'
    priority: 'low'
    status: 'draft'
    isms_impact: 'Datenexport aus Slack vor Ausmusterung (DSGVO); Aufbewahrungsfristen pruefen.'
    implementation_plan: '1. Channel-Mapping, 2. User-Schulung, 3. Parallelbetrieb 6 Wochen, 4. Slack-Tenant-Loeschung mit Datenexport-Archiv.'
    planned_implementation_date: '2024-09-01'

  - change_number: 'CR-2024-006'
    title: 'TLS 1.0/1.1 deaktivieren auf allen externen Endpoints'
    change_type: 'standard'
    description: 'TLS 1.0 + 1.1 auf allen Reverse-Proxies, Load-Balancern, externen Services deaktivieren. Mindestens TLS 1.2.'
    justification: 'PCI-DSS Req 4.1 + Stand der Technik (BSI TR-02102-2).'
    requested_by: 'Security-Team'
    requested_date: '2024-04-15'
    priority: 'medium'
    status: 'approved'
    isms_impact: 'Legacy-Clients verlieren Zugriff; Identifikation via Logs vorab durchgefuehrt.'
    risk_assessment: 'Identifizierte 4 Legacy-Clients (Hersteller kontaktiert, Updates verfuegbar).'
    implementation_plan: '1. Logs-Analyse abschliessen, 2. Customer-Notification, 3. Konfig-Aenderung Wartungsfenster, 4. Monitoring nach Cutover.'
    rollback_plan: 'Konfig-Rueckrollen via Ansible in 10 Min.'
    planned_implementation_date: '2024-05-25'
    approved_by: 'CIO'
    approved_date: '2024-04-30'
