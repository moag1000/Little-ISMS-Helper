objectives:
  - title: 'Mean-Time-to-Respond (MTTR) bei Major-Incidents unter 24 Stunden'
    description: |
      Sicherheitsvorfälle der Klassen Hoch und Kritisch werden innerhalb von 24 Stunden
      ab Kenntnisnahme in den Status "contained" (eingedämmt) überführt.
      Begründung: Einhaltung der Meldefristen DSGVO Art. 33 (72h) und NIS2 (24h Early Warning)
      sowie vertraglicher SLAs gegenüber Key-Accounts.
    category: 'incident_response'
    measurableIndicators: |
      - MTTR gemessen vom Ticket-Opening bis Status "contained" im ITSM
      - Quelle: Incident-Management-System, automatisierte Auswertung monatlich
      - Zielwert (SMART): <= 24 Stunden im rollierenden Durchschnitt der letzten 90 Tage
      - Frequenz: monatliche Auswertung, Quartalsreport an CISO + Aufsichtsrat
    targetValue: '24.00'
    currentValue: '31.50'
    unit: 'Stunden'
    responsiblePerson: 'Dr. Markus Hoffmann (CISO)'
    targetDate: '2025-12-31'
    status: 'in_progress'
    progressNotes: |
      Q1/2025: 31,5h Durchschnitt (8 Major-Incidents).
      Verbesserungsmaßnahmen: SOAR-Playbooks (in Umsetzung), 24/7-Rufbereitschaft
      für P1 (ab 01.05.2025), verbesserte Erkennung via SIEM-Use-Case-Rollout.

  - title: 'Patch-Deployment kritischer Schwachstellen innerhalb 30 Tagen (CVSS >= 7,0)'
    description: |
      Alle Sicherheitsupdates für Schwachstellen mit CVSS-Score >= 7,0 (High/Critical)
      werden auf produktiven Systemen innerhalb von 30 Kalendertagen nach Vendor-Release
      ausgerollt. Für CVSS >= 9,0 (Critical) gilt verschärfte Frist von 7 Tagen.
      Grundlage: ISO 27001 A.8.8 (Management of technical vulnerabilities), BSI IT-GS SYS.1.1.
    category: 'risk_management'
    measurableIndicators: |
      - Quelle: Vulnerability-Management-System (Qualys), Patch-Monitoring SCCM/Intune
      - Messgröße: % Hosts/Assets gepatcht innerhalb SLA gemessen an fälligen Patches
      - Ziel: 95% Compliance-Quote (30-Tage-SLA), 100% für Critical (7-Tage-SLA)
      - Frequenz: Monatliches Reporting, Quartals-Review ISB
    targetValue: '95.00'
    currentValue: '82.00'
    unit: '%'
    responsiblePerson: 'Thomas Becker (Leiter IT)'
    targetDate: '2025-09-30'
    status: 'in_progress'
    progressNotes: |
      Q1/2025: 82% Compliance-Quote. Hauptgrund für Unterschreitung: Legacy-ERP
      (SAP ECC) mit Change-Freeze-Fenstern und zwei Legacy-Linux-Server vor Ablösung.
      Gegenmaßnahmen: Dedizierte Patch-Windows, MSP-SLA-Eskalation läuft.

  - title: 'Informationssicherheits-Schulungsquote >= 95% aller Mitarbeitenden'
    description: |
      Mindestens 95% aller aktiven Mitarbeitenden (inkl. Temporärkräfte und Werkstudenten)
      absolvieren die jährliche Awareness-Pflichtschulung inklusive Abschlusstest.
      Grundlage: ISO 27001 Clause 7.2 + A.6.3 (Awareness-Verpflichtung).
    category: 'awareness'
    measurableIndicators: |
      - Quelle: Learning-Management-System (Personio/LMS), Schulungsnachweise
      - Messgröße: (Mitarbeitende mit bestandenem Test / aktive Mitarbeitende) * 100
      - Ziel: >= 95% Quote, Compliance-Cut-off jeweils 31.12.
      - Frequenz: Quartalsreport HR + ISB, Eskalation Nicht-Teilnehmer nach 60 Tagen
    targetValue: '95.00'
    currentValue: '88.00'
    unit: '%'
    responsiblePerson: 'Petra Neumann (Leiterin HR)'
    targetDate: '2025-12-31'
    status: 'in_progress'
    progressNotes: |
      Stand 15.04.2025: 88% (215 von 245 FTE). Kampagne "Phishing-Awareness 2025"
      im Mai mit Gamification-Elementen. Eskalationsschreiben an Führungskräfte
      der offenen Teilnehmer am 01.06.2025.

  - title: 'Null Major-Findings im externen ISO 27001 Zertifizierungsaudit'
    description: |
      Im ersten Zertifizierungsaudit (Stage-1 + Stage-2) im Q3/Q4 2025 dürfen keine
      Major-Nonconformities (Hauptabweichungen) auftreten, die eine Zertifikatserteilung
      gefährden. Minor-Findings werden akzeptiert, sofern CAP fristgerecht erstellt wird.
    category: 'compliance'
    measurableIndicators: |
      - Quelle: Audit-Bericht TÜV SÜD
      - Messgröße: Anzahl Major-Nonconformities (Ziel = 0)
      - Flankierend: Internes Vor-Audit (Pre-Assessment) im Juni 2025 mit gleichem Maßstab
      - Frequenz: einmalig im Zertifizierungszyklus, danach Überwachungsaudits
    targetValue: '0.00'
    currentValue: '0.00'
    unit: 'Major-Findings'
    responsiblePerson: 'Sabine Wagner (ISB)'
    targetDate: '2025-11-30'
    status: 'in_progress'
    progressNotes: |
      Pre-Assessment 10.06.2025. Alle offenen Gaps aus Gap-Analyse 2024 sind in
      Umsetzung (23 von 27 Maßnahmen abgeschlossen, 4 in Umsetzung).
      Risiko: Zwei Maßnahmen mit Abhängigkeit zu IT-Budget-Freigabe offen.

  - title: 'Recovery-Time-Objective (RTO) Kernsysteme <= 8 Stunden'
    description: |
      Wiederherstellungszeit der geschäftskritischen IT-Systeme (ERP, CRM, Mail, AD,
      Kundenportal) nach einem Totalausfall beträgt maximal 8 Stunden.
      Grundlage: ISO 22301 Clause 8.2 (BIA) und ISO 27001 A.5.30 (ICT readiness).
    category: 'availability'
    measurableIndicators: |
      - Quelle: BCM-Exercise-Berichte, DR-Tests, reale Incidents (falls eingetreten)
      - Messgröße: Gemessene Recovery-Zeit je Kernsystem im jährlichen DR-Test
      - Ziel: RTO <= 8h für alle 5 Tier-1-Systeme
      - Frequenz: Jährlich (mindestens 1x DR-Vollübung) + tabletop quartalsweise
    targetValue: '8.00'
    currentValue: '11.00'
    unit: 'Stunden'
    responsiblePerson: 'Thomas Becker (Leiter IT)'
    targetDate: '2025-10-31'
    status: 'delayed'
    progressNotes: |
      DR-Test 02/2025: Durchschnittliche Recovery-Zeit 11h (CRM und ERP > 8h).
      Ursache: Manuelle Schritte bei Datenbank-Failover. Automatisierung via
      Runbook + Infrastructure-as-Code geplant für Q3/2025. Abhängig von Budget.

  - title: 'Compliance-Score Annex-A-Kontrollen > 80%'
    description: |
      Der aggregierte Implementation-Status der 93 ISO 27001:2022 Annex-A-Kontrollen
      im Statement of Applicability erreicht einen Reifegrad von > 80%
      (Skala: 0% = nicht implementiert, 100% = vollständig + dokumentiert + wirksam).
    category: 'compliance'
    measurableIndicators: |
      - Quelle: SoA im Little-ISMS-Helper, Compliance-Dashboard
      - Messgröße: Durchschnittlicher Reifegrad über alle anwendbaren Kontrollen
      - Ziel: > 80%, davon keine anwendbare Kontrolle < 50%
      - Frequenz: Monatliche Messung, Quartalsreport CISO
    targetValue: '80.00'
    currentValue: '74.00'
    unit: '%'
    responsiblePerson: 'Sabine Wagner (ISB)'
    targetDate: '2025-08-31'
    status: 'in_progress'
    progressNotes: |
      Stand April 2025: 74% (64 von 87 anwendbaren Kontrollen >= 80% Reifegrad).
      Schwächste Domänen: A.8 Technical Controls (Patch-Mgmt, Vulnerability-Mgmt).
      Implementierungssprint 05-07/2025 fokussiert auf technische Kontrollen.
