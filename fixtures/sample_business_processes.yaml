business_processes:
  - name: 'Kundenauftragsabwicklung'
    description: 'Prozess von Auftragseingang bis zur Auslieferung an den Kunden'
    processOwner: 'Vertriebsleitung'
    criticality: 'critical'
    rto: 4
    rpo: 1
    mtpd: 8
    reputationalImpact: 8
    regulatoryImpact: 6
    operationalImpact: 9
    dependenciesUpstream: 'CRM-System, ERP-System, Warenwirtschaft'
    recoveryStrategy: 'Manuelle Bearbeitung mit Backup-System, Auslagerung an Partnerunternehmen'

  - name: 'E-Mail-Kommunikation'
    description: 'Interne und externe E-Mail-Kommunikation'
    processOwner: 'IT-Leitung'
    criticality: 'high'
    rto: 8
    rpo: 4
    mtpd: 24
    reputationalImpact: 7
    regulatoryImpact: 4
    operationalImpact: 8
    dependenciesUpstream: 'E-Mail-Server, Internet-Anbindung, Active Directory'
    recoveryStrategy: 'Failover auf Backup-Mail-Server, Nutzung von Webmail'

  - name: 'Gehaltsabrechnung'
    description: 'Monatliche Gehaltsabrechnung für alle Mitarbeiter'
    processOwner: 'Personalleitung'
    criticality: 'high'
    rto: 48
    rpo: 24
    mtpd: 120
    reputationalImpact: 8
    regulatoryImpact: 9
    operationalImpact: 6
    dependenciesUpstream: 'Personalverwaltungssystem, Zeiterfassung, Bankverbindung'
    recoveryStrategy: 'Manuelle Abrechnung, Auslagerung an externen Dienstleister'

  - name: 'Online-Shop Betrieb'
    description: 'Betrieb des Online-Shops für Endkunden'
    processOwner: 'E-Commerce Manager'
    criticality: 'critical'
    rto: 2
    rpo: 1
    mtpd: 4
    reputationalImpact: 9
    regulatoryImpact: 5
    operationalImpact: 10
    dependenciesUpstream: 'Webserver, Datenbank, Zahlungsdienstleister, Warenwirtschaft'
    recoveryStrategy: 'Automatischer Failover auf Cloud-Infrastruktur'

  - name: 'Buchhaltung und Rechnungswesen'
    description: 'Finanzielle Buchungen, Rechnungsstellung und Reporting'
    processOwner: 'Finanzleitung'
    criticality: 'high'
    rto: 24
    rpo: 8
    mtpd: 72
    reputationalImpact: 6
    regulatoryImpact: 9
    operationalImpact: 7
    dependenciesUpstream: 'ERP-System, Buchhaltungssoftware, Bankverbindung'
    recoveryStrategy: 'Wiederherstellung aus Backup, manuelle Buchungen'

  - name: 'IT-Support und Helpdesk'
    description: 'Technischer Support für Mitarbeiter bei IT-Problemen'
    processOwner: 'IT-Leitung'
    criticality: 'medium'
    rto: 8
    rpo: 24
    mtpd: 48
    reputationalImpact: 5
    operationalImpact: 7
    regulatoryImpact: 3
    dependenciesUpstream: 'Ticketsystem, Fernwartungs-Tools, Wissensdatenbank'
    recoveryStrategy: 'Manuelle Ticketerfassung, Priorisierung kritischer Anfragen'

  - name: 'Produktentwicklung'
    description: 'Entwicklung neuer Produkte und Features'
    processOwner: 'Entwicklungsleitung'
    criticality: 'medium'
    rto: 48
    rpo: 8
    mtpd: 168
    reputationalImpact: 5
    regulatoryImpact: 2
    operationalImpact: 5
    dependenciesUpstream: 'Entwicklungsumgebung, Versionskontrolle, Testumgebung'
    recoveryStrategy: 'Arbeit von alternativen Standorten, Cloud-Entwicklungsumgebung'

  - name: 'Backup und Disaster Recovery'
    description: 'Regelmäßige Datensicherung und Notfallwiederherstellung'
    processOwner: 'IT-Leitung'
    criticality: 'critical'
    rto: 4
    rpo: 2
    mtpd: 12
    reputationalImpact: 7
    regulatoryImpact: 8
    operationalImpact: 10
    dependenciesUpstream: 'Backup-Server, Backup-Software, Offsite-Storage'
    recoveryStrategy: 'Sekundäres Backup-System, Cloud-Backup als Fallback'

  - name: 'Kundenservice und Support'
    description: 'Bearbeitung von Kundenanfragen und Beschwerden'
    processOwner: 'Kundenservice-Leitung'
    criticality: 'high'
    rto: 4
    rpo: 2
    mtpd: 16
    reputationalImpact: 9
    regulatoryImpact: 5
    operationalImpact: 8
    dependenciesUpstream: 'CRM-System, Telefonie, E-Mail-System'
    recoveryStrategy: 'Umleitung an externes Call-Center, Mobiltelefone als Backup'

  - name: 'Datenschutz-Management'
    description: 'Überwachung und Sicherstellung der DSGVO-Compliance'
    processOwner: 'Datenschutzbeauftragter'
    criticality: 'high'
    rto: 24
    rpo: 8
    mtpd: 72
    reputationalImpact: 8
    regulatoryImpact: 10
    operationalImpact: 6
    dependenciesUpstream: 'Datenschutz-Management-Tool, Dokumentenmanagementsystem'
    recoveryStrategy: 'Manuelle Bearbeitung, Priorisierung gesetzlicher Fristen'
