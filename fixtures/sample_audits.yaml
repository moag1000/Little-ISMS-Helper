audits:
  - auditNumber: 'IA-2025-001'
    title: 'Jahres-Management-System-Audit ISO 27001:2022'
    scope: 'Vollständiges ISMS nach ISO 27001:2022 Klauseln 4-10, inklusive aller 93 Controls aus Annex A (Stichprobenbasis).'
    scopeType: 'full_isms'
    objectives: 'Feststellung der Konformität zu ISO 27001:2022, Bewertung der ISMS-Wirksamkeit, Vorbereitung auf externes Rezertifizierungsaudit in Q4/2025.'
    plannedDate: '2025-02-17'
    actualDate: '2025-02-19'
    leadAuditor: 'Dr. Katrin Weber (Interne Revision)'
    auditTeam: 'Dr. Katrin Weber (Lead), Stefan Hofmann (IT-Revision), Markus Lehmann (QM-Auditor)'
    auditedDepartments: 'Geschäftsführung, IT, HR, Einkauf, Vertrieb, Entwicklung'
    status: 'completed'
    findings: '2 Major-Nonconformities (fehlende Freigabe-Dokumentation in 3 Change-Requests; unvollständiges Access-Review in Q4/2024). 5 Minor-Nonconformities. 8 Observations, u.a. zu Lieferanten-Audits.'
    nonConformities: 'NC-01 (major): Change-Management-Freigabeprozess nicht durchgängig dokumentiert. NC-02 (major): Access-Review Q4 fehlt für 3 kritische Systeme. 5 Minor-NCs bei Dokumentationslücken im SoA.'
    observations: 'Awareness-Durchdringung außerhalb der IT verbesserungswürdig. Lieferanten-Audits nur formal, nicht inhaltlich. KPI-Reporting an GF könnte vereinheitlicht werden.'
    recommendations: 'Korrekturmaßnahmen bis 30.04.2025. Empfehlung: Change-Management-Tool einführen. Verstärkter Fokus auf supplier-assurance in 2025.'
    conclusion: 'ISMS ist grundsätzlich wirksam und konform. Mit Umsetzung der Korrekturmaßnahmen ist Rezertifizierung Q4/2025 realistisch.'
    reportDate: '2025-03-05'

  - auditNumber: 'IA-2025-002'
    title: 'Technisches Audit: Server-Härtung und Patch-Management'
    scope: 'Alle produktiven Linux- und Windows-Server im Rechenzentrum Frankfurt (ca. 45 Systeme), Fokus auf ISO 27001 A.8.8, A.8.9, A.8.28.'
    scopeType: 'asset_type'
    objectives: 'Überprüfung der technischen Härtung gegen CIS-Benchmarks; Patch-Stand und Schwachstellen-Management verifizieren.'
    plannedDate: '2025-03-10'
    actualDate: '2025-03-12'
    leadAuditor: 'Stefan Hofmann (Lead IT-Auditor)'
    auditTeam: 'Stefan Hofmann, externer Pentester Andreas Koch (CSR GmbH)'
    auditedDepartments: 'IT-Infrastruktur, IT-Security'
    status: 'completed'
    findings: '12 Server nicht gem. CIS Benchmark gehärtet (v.a. Legacy-Windows-Systeme). Patch-Verzug > 30 Tage bei 7 Servern. 3 EOL-Systeme ohne Ausnahme-Dokumentation.'
    nonConformities: 'NC-01: Patch-SLA (14d High, 30d Medium) bei 7 Systemen verletzt. NC-02: 3 EOL-Systeme ohne Risikoakzeptanz durch GF.'
    observations: 'Härtungsbaseline nicht versioniert. Keine automatische Drift-Detection. Manuelle Patch-Prozesse fehleranfällig.'
    recommendations: 'Einführung Configuration-Management (Ansible/Puppet). Automatisches Vulnerability-Scanning (Nessus/OpenVAS) in CI/CD integrieren.'
    conclusion: 'Technisches Grundniveau vorhanden, aber Automatisierung und Dokumentation dringend erforderlich.'
    reportDate: '2025-03-28'

  - auditNumber: 'IA-2025-003'
    title: 'Prozess-Audit HR: Onboarding/Offboarding'
    scope: 'HR-Prozesse für Mitarbeiter-Lifecycle (ISO 27001 A.6.1–A.6.6), Zeitraum 2024 und Q1/2025. Stichprobe 15 Onboardings, 8 Offboardings.'
    scopeType: 'department'
    objectives: 'Sicherstellung, dass Identitäten und Zugriffsrechte zeitnah und vollständig provisioniert bzw. entzogen werden.'
    plannedDate: '2025-04-07'
    actualDate: '2025-04-08'
    leadAuditor: 'Markus Lehmann (QM-Auditor)'
    auditTeam: 'Markus Lehmann, Lena Schulz (HR-Business-Partner, beobachtend)'
    auditedDepartments: 'Personalabteilung, IT-Service-Desk'
    status: 'completed'
    findings: 'Offboarding in 3 von 8 Fällen nicht am letzten Arbeitstag abgeschlossen (Accounts 2–11 Tage länger aktiv). Onboarding-Checkliste in 2 Fällen unvollständig. Vertraulichkeitsverpflichtungen in 1 Fall fehlend.'
    nonConformities: 'NC-01: Offboarding-SLA (same-day deactivation) nicht eingehalten. NC-02: Fehlende Vertraulichkeitsverpflichtung eines Werkstudenten.'
    observations: 'HR-IT-Schnittstelle manuell per E-Mail, fehleranfällig. Keine automatische Terminvorwarnung für befristete Verträge.'
    recommendations: 'Automatisierte HR-to-IDM-Schnittstelle. Jährliches Zertifizieren der Verpflichtungen über Self-Service.'
    conclusion: 'Prozess grundsätzlich wirksam, aber manuelle Schnittstellen sind das Haupt-Risiko.'
    reportDate: '2025-04-22'

