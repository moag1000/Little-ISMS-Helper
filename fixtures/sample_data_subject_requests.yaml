data_subject_requests:
  - requestType: 'access'
    status: 'completed'
    dataSubjectName: 'Petra Schmidt'
    dataSubjectEmail: 'petra.schmidt@example.com'
    dataSubjectIdentifier: 'K-2019-01187'
    description: 'Frau Schmidt bittet gemaess Art. 15 DSGVO um Auskunft ueber alle zu ihrer Person gespeicherten Daten sowie Informationen zu Verarbeitungszwecken, Empfaengern und Speicherdauer. Zusaetzlich Bitte um eine Kopie der gespeicherten Daten.'
    receivedAt: '2024-06-05 09:12:00'
    deadlineAt: '2024-07-05 09:12:00'
    completedAt: '2024-06-28 14:30:00'
    identityVerified: true
    identityVerificationMethod: 'id_document'
    identityVerifiedAt: '2024-06-06 10:00:00'
    responseDescription: 'Vollstaendige Auskunft per verschluesseltem PDF ueber Serviceportal zugestellt. Bereitgestellt wurden: Stammdaten, Auftragshistorie (24 Bestellungen), Kommunikationsverlauf mit Kundenservice (14 Tickets), Newsletter-Trackingdaten der letzten 12 Monate sowie eine Datenkopie im CSV-Format. Informationen zu Verarbeitungszwecken, Empfaengerkategorien und Speicherfristen wurden als begleitende PDF-Dokumentation beigefuegt.'
    notes: 'Kundin hat positiv auf die Auskunft reagiert. Keine Folgeanfrage zur Richtigstellung oder Loeschung. Zeitaufwand: 4.5 Stunden Bearbeitung verteilt auf 3 Fachbereiche.'

  - requestType: 'erasure'
    status: 'completed'
    dataSubjectName: 'Michael Weber'
    dataSubjectEmail: 'michael.weber@example.de'
    dataSubjectIdentifier: 'NEWSLETTER-ABO-2021-4472'
    description: 'Herr Weber verlangt gemaess Art. 17 DSGVO die vollstaendige Loeschung seiner Daten beim Newsletter und etwaige weitere verknuepfte Verarbeitungen. Er hat zuvor bereits den Newsletter abbestellt und moechte auch aus Suppression-Listen und Backups dauerhaft entfernt werden.'
    receivedAt: '2024-08-11 18:45:00'
    deadlineAt: '2024-09-10 18:45:00'
    completedAt: '2024-08-29 11:20:00'
    identityVerified: true
    identityVerificationMethod: 'email_verification'
    identityVerifiedAt: '2024-08-12 08:30:00'
    responseDescription: 'Loeschung aller personenbezogenen Daten in Newsletter-Tool (CleverReach), CRM (keine Vertragsbeziehung, daher vollstaendige Loeschung moeglich), Webserver-Logs und Tracking-Datenbank durchgefuehrt. Einwilligungsnachweis wurde gemaess Art. 7 Abs. 1 DSGVO separat archiviert (Nachweispflicht). Suppression-Listen-Eintrag zur Verhinderung erneuter Ansprache erfolgt mit pseudonymisiertem Hash. Backup-Loeschung erfolgt im Rahmen der regulaeren Backup-Rotation nach 90 Tagen.'
    notes: 'Standardfall Art. 17. Keine Komplikationen. Loeschprotokoll abgelegt.'

  - requestType: 'portability'
    status: 'in_progress'
    dataSubjectName: 'Sandra Fischer'
    dataSubjectEmail: 'sandra.fischer@example.com'
    dataSubjectIdentifier: 'K-2022-03918'
    description: 'Frau Fischer ersucht gemaess Art. 20 DSGVO um Uebertragung ihrer Daten in einem strukturierten, gaengigen und maschinenlesbaren Format. Sie moechte die Daten aus unserem E-Shop zu einem Wettbewerber migrieren. Konkret gewuenscht: Profildaten, Bestellhistorie, Wunschliste, eingetragene Adressen und Zahlungspraeferenzen (ohne Bankdaten).'
    receivedAt: '2024-11-20 10:30:00'
    deadlineAt: '2024-12-20 10:30:00'
    identityVerified: true
    identityVerificationMethod: 'account_login'
    identityVerifiedAt: '2024-11-20 10:35:00'
    notes: 'Bearbeitung laeuft. Export-Skript wird erstellt: JSON fuer Profildaten, CSV fuer Bestellhistorie. Herausforderung: Keine Standard-Export-Funktion im Legacy-Shopsystem. Voraussichtliche Fertigstellung: 15.12.2024.'

  - requestType: 'objection'
    status: 'completed'
    dataSubjectName: 'Dr. Robert Hoffmann'
    dataSubjectEmail: 'r.hoffmann@example.net'
    dataSubjectIdentifier: 'LEAD-2024-1198'
    description: 'Herr Dr. Hoffmann widerspricht gemaess Art. 21 DSGVO jeder weiteren Verarbeitung seiner Daten zu Direktwerbezwecken, einschliesslich Profilbildung und Scoring. Die Daten duerfen weiterhin zur Vertragsanbahnung (laufendes Angebot) verarbeitet werden.'
    receivedAt: '2024-10-02 15:05:00'
    deadlineAt: '2024-11-01 15:05:00'
    completedAt: '2024-10-07 09:45:00'
    identityVerified: true
    identityVerificationMethod: 'email_verification'
    identityVerifiedAt: '2024-10-03 08:00:00'
    responseDescription: 'Widerspruch gegen Direktwerbung gemaess Art. 21 Abs. 2 DSGVO umgesetzt. Data-Flag "no_marketing" im CRM gesetzt. Aus allen Marketing-Segmenten und Lookalike-Audiences entfernt. Newsletter-Abmeldung. Verarbeitung zur Vertragsanbahnung laeuft gemaess Wunsch weiter. Bestaetigungsschreiben per E-Mail versendet.'
    notes: 'Schnell und vollstaendig bearbeitet. Widerspruchsrecht gegen Direktwerbung ist absolut (Art. 21 Abs. 3 DSGVO). Keine Interessenabwaegung noetig.'

  - requestType: 'rectification'
    status: 'completed'
    dataSubjectName: 'Julia Bauer'
    dataSubjectEmail: 'julia.bauer@example.com'
    dataSubjectIdentifier: 'K-2020-00234'
    description: 'Frau Bauer bittet gemaess Art. 16 DSGVO um Berichtigung ihrer Adresse und ihres Geburtsdatums. Adresse: neue Anschrift nach Umzug. Geburtsdatum: war fehlerhaft als 12.05.1985 statt korrekt 21.05.1985 erfasst.'
    receivedAt: '2024-09-28 12:15:00'
    deadlineAt: '2024-10-28 12:15:00'
    completedAt: '2024-10-01 10:00:00'
    identityVerified: true
    identityVerificationMethod: 'account_login'
    identityVerifiedAt: '2024-09-28 12:20:00'
    responseDescription: 'Beide Berichtigungen im CRM und nachgelagerten Systemen (ERP, Rechnungswesen, Versand-Dienstleister) durchgefuehrt. Audit-Log der Aenderungen erstellt. Empfaenger der alten Daten (Auftragsverarbeiter fuer Versand) wurden ueber die Berichtigung informiert (Art. 19 DSGVO). Bestaetigung an die Kundin per E-Mail.'
    notes: 'Einfacher Standardfall. Bearbeitungszeit 3 Tage. Art. 19 DSGVO (Mitteilung an Empfaenger) beachtet.'

  - requestType: 'access'
    status: 'extended'
    dataSubjectName: 'Andreas Lehmann'
    dataSubjectEmail: 'andreas.lehmann@example.org'
    dataSubjectIdentifier: 'EMP-2015-0087'
    description: 'Ehemaliger Mitarbeiter (ausgeschieden 2023) verlangt umfassende Auskunft gemaess Art. 15 DSGVO ueber alle noch gespeicherten Daten inklusive Zeiterfassung, Gehaltsabrechnungen, Mitarbeiterbeurteilungen, Korrespondenz sowie Zugriff auf dienstliche E-Mail-Archive der letzten 3 Jahre der Beschaeftigung. Zusaetzlich Anfrage zu Zweck der weiteren Aufbewahrung.'
    receivedAt: '2024-10-14 16:20:00'
    deadlineAt: '2024-11-13 16:20:00'
    identityVerified: true
    identityVerificationMethod: 'id_document'
    identityVerifiedAt: '2024-10-17 09:30:00'
    extensionReason: 'Verlaengerung gemaess Art. 12 Abs. 3 DSGVO um weitere 2 Monate aufgrund der Komplexitaet der Anfrage: Daten in 7 verschiedenen Systemen (HR, Lohn, Zeiterfassung, DMS, Mail-Archiv, Zutrittskontrolle, Projektdokumentation), erhebliche Datenmenge (ca. 14.000 E-Mails, 230 Dokumente), Pruefung von Drittinteressen (E-Mail-Korrespondenz mit Kollegen und Kunden) erforderlich. Betroffener ueber Verlaengerung innerhalb der ersten 30 Tage informiert.'
    extendedDeadlineAt: '2025-01-13 16:20:00'
    notes: 'Hochkomplexer Fall. HR-Legal involviert wegen Abgrenzung Drittinteressen vs. Betroffenenrechte in E-Mail-Korrespondenz. Export-Tool fuer M365-Mailbox wird genutzt. Zeitplan: Vollstaendige Auskunft bis 20.12.2024. Backlog priorisiert.'
