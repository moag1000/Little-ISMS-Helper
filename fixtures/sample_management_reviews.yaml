management_reviews:
  - title: 'Management Review Q4/2024 - Jahresabschluss ISMS'
    reviewDate: '2024-12-11'
    status: 'completed'
    summary: 'Jahresabschluss-Review mit Fokus auf Wirksamkeit des ISMS im Kalenderjahr 2024. Gesamteinschätzung: ISMS ist wirksam, Reifegrad nach eigener Einschätzung zwischen Level 3 (definiert) und Level 4 (messbar).'
    contextChanges: 'Neuer Cloud-Service-Provider (Microsoft 365) in Q3/2024 produktiv. Erweiterung Produktionsstandort Leipzig ab 01/2025 bringt neuen Scope-Anteil. Regulatorisch: NIS2-Umsetzungsgesetz in Deutschland verzögert, DORA tritt 17.01.2025 in Kraft (nicht anwendbar mangels Finanzsektor).'
    changesRelevantToISMS: 'M365-Migration mit Auswirkungen auf A.5.23 (Cloud-Services), A.8.24 (Kryptographie), A.5.14 (Informationsübertragung). Policies entsprechend aktualisiert.'
    feedbackFromInterestedParties: 'Kunden: 2 Security-Audits bestanden ohne Major-Findings, 4 Kunden fordern jetzt SOC2-Type2-Report (bisher nur ISO 27001). Mitarbeiter: Awareness-Umfrage 3,9/5 (Vorjahr 3,6/5). Aufsichtsrat: Budget-Bestätigung fürs Folgejahr.'
    auditResults: 'Internes Audit Q2/2024: 3 Major-NCs, 7 Minor-NCs, alle geschlossen. Externes Überwachungsaudit (Auditor: DQS, Juni 2024) ohne Major-Findings, 2 Minor-NCs geschlossen, Fortbestand der Zertifizierung bestätigt.'
    performanceEvaluation: 'KPIs: Patch-SLA Erfüllung 87 Prozent (Ziel 95); Awareness-Kursabschluss 96 Prozent (Ziel 95); MTTR Sicherheitsvorfälle 4,1h (Ziel unter 4h); Anzahl Major-Incidents 2 (Vorjahr 4).'
    nonconformitiesReview: '10 im Jahr eröffnete Nonconformities, davon 9 geschlossen. NC-2024-08 (Patch-Prozess) läuft in 2025 weiter.'
    incidentsReview: '37 Incidents im Jahresverlauf (Vorjahr 42). 2 Major-Incidents: Phishing-Kompromittierung (Jan), DB-Hardwareausfall (Feb) - beide gelöst, Lessons-Learned integriert.'
    risksReview: 'Risikoregister aktualisiert: 3 neue Risiken (Cloud-Provider-Lock-in, Ransomware-Welle, Fachkräftemangel IT-Security). 2 Risiken akzeptiert durch GF (EOL-Systeme).'
    objectivesReview: 'ISMS-Ziele 2024: 5 von 6 erreicht. Verfehlt: Lieferanten-Audits nur bei 2 von 5 kritischen Lieferanten durchgeführt (Kapazitätsproblem).'
    previousReviewActions: 'Aus Review Q3/2024: Einführung MFA für Remote-Zugriff (umgesetzt 11/2024); Formalisiertes Supplier-Assurance-Programm (teilumgesetzt, Fortführung 2025).'
    decisions: 'Budget-Freigabe 2025 in Höhe von 420 TEUR (plus 12 Prozent). Einführung eines SIEM beschlossen. Rezertifizierungs-Audit Oktober 2025 gebucht.'
    actionItems: 'A-2024-Q4-01: SIEM-Ausschreibung (Owner CISO, Termin 28.02.2025). A-2024-Q4-02: Supplier-Assurance-Katalog finalisieren (CPO, 31.03.2025). A-2024-Q4-03: SoA-Review für Produktionsstandort Leipzig (CISO, 15.01.2025).'
    opportunitiesForImprovement: 'Stärkere Automatisierung im Patch-Management. Einheitliches SIEM statt Tool-Flickenteppich. Lieferanten-Management verstärken. Awareness-Kampagnen zielgruppenspezifischer ausrollen.'
    improvementOpportunities: 'Automatisierung Patch-Management; Einheitliches SIEM; Ausbau Supplier-Assurance-Programm; zielgruppenspezifische Awareness.'
    resourceNeeds: 'Zusätzlicher SOC-Analyst (1 FTE ab Q2/2025). SIEM-Lizenz. Externes Pentest-Budget erhöht auf 35 TEUR.'
    resourcesNeeded: 'SOC-Analyst 1 FTE, SIEM-Lizenz, Pentest-Budget 35 TEUR.'
    correctiveActionsStatus: '8 von 9 offene CAPAs geschlossen. CAPA-2024-07 (Change-Management-Tool) verschoben auf Q2/2025 wegen Tool-Auswahl.'

  - title: 'Management Review Q1/2025 - Quartalsreview'
    reviewDate: '2025-03-27'
    status: 'completed'
    summary: 'Quartalsreview mit Fokus auf Fortschritt der 2024-Q4-Aktionspunkte, aktuelle Audit-Ergebnisse und regulatorische Entwicklungen (NIS2).'
    contextChanges: 'NIS2-Umsetzungsgesetz in Bundestags-Ausschuss; Betroffenheit des Unternehmens wahrscheinlich (wesentliche Einrichtung). BaFin-Konsultation zu DORA-RTS abgeschlossen. Standort Leipzig produktiv seit 01.01.2025, Integration ins ISMS-Scope läuft.'
    changesRelevantToISMS: 'Aufnahme Leipzig in ISMS-Scope beschlossen (Kick-off 14.02.2025). Zwei neue SaaS-Tools (HR-System, Ticketsystem) risikobewertet und ins Asset-Register aufgenommen.'
    feedbackFromInterestedParties: 'Betriebsrat: Anhörung zu HR-System-Wechsel, Zustimmung mit Auflagen (kein US-Hosting). Kunde X (Automotive) fordert TISAX AL 3 bis 09/2025. BaFin nicht zuständig.'
    auditResults: 'Internes Audit IA-2025-001 (Management-System) Februar 2025: 2 Major-NCs, 5 Minor-NCs, 8 Observations. Technisches Audit IA-2025-002 (März 2025) mit 2 NCs zu Patch-SLA und EOL-Systemen.'
    performanceEvaluation: 'Patch-SLA Q1: 89 Prozent (Ziel 95). MTTR: 3,7h (im Zielkorridor). 0 Major-Incidents im Quartal. Phishing-Simulation: Click-Rate 14,5 Prozent (Benchmark 22 Prozent).'
    nonconformitiesReview: '4 neue NCs aus internem Audit eröffnet, alle in Bearbeitung. NC-2024-08 weiter offen, Abschluss-Termin 30.06.2025.'
    incidentsReview: '7 Incidents im Q1/2025 (Vorjahresquartal 11). Keine meldepflichtigen DSGVO-Vorfälle. Alle abgeschlossen, Lessons-Learned dokumentiert.'
    risksReview: 'Neues Risiko: NIS2-Non-Compliance (Owner: CISO). Risiko Fachkräftemangel: Verschärfung wegen 2 ungeplanter Abgänge im IT-Security-Team.'
    objectivesReview: '2025-Ziele bestätigt. Fortschritt: SIEM-Ausschreibung abgeschlossen (Vergabe April), TISAX-Vorbereitung läuft.'
    previousReviewActions: 'A-2024-Q4-01 (SIEM-Ausschreibung): abgeschlossen 14.03.2025. A-2024-Q4-02 (Supplier-Katalog): in Umsetzung, 60 Prozent fertig. A-2024-Q4-03 (Leipzig-SoA): abgeschlossen.'
    decisions: 'SIEM-Vergabe an Anbieter Y (Vertrag wird in April gezeichnet). TISAX-Vorbereitung mit externer Beratung beauftragt (Budget 45 TEUR). Start NIS2-Readiness-Projekt.'
    actionItems: 'A-2025-Q1-01: SIEM-Rollout (CISO, Go-live 30.09.2025). A-2025-Q1-02: TISAX-Gap-Analyse abschließen (ISMS-Manager, 30.06.2025). A-2025-Q1-03: NIS2-Betroffenheitsanalyse (CISO + Legal, 31.05.2025).'
    opportunitiesForImprovement: 'Mit SIEM-Einführung Chance zur Konsolidierung der Monitoring-Landschaft. TISAX-Projekt ermöglicht Data-Reuse für Automotive-Anforderungen.'
    improvementOpportunities: 'Monitoring-Konsolidierung; TISAX-Data-Reuse.'
    resourceNeeds: 'Temporärer Consultant für TISAX (3 Monate). Verlängerung Werkvertrag SIEM-Integrator bis Jahresende.'
    resourcesNeeded: 'TISAX-Consultant 3 Monate; SIEM-Integrator-Verlängerung.'
    correctiveActionsStatus: '2 neue CAPAs aus Audit IA-2025-001 eröffnet. 3 CAPAs aus 2024 weiterhin offen.'

  - title: 'Management Review Q2/2025 - Quartalsreview'
    reviewDate: '2025-06-26'
    status: 'completed'
    summary: 'Zweites Quartalsreview 2025. Schwerpunkt: Halbzeitbilanz ISMS-Ziele, Vorbereitung Rezertifizierung, Stand NIS2-Umsetzung.'
    contextChanges: 'NIS2-Umsetzungsgesetz weiterhin in parlamentarischer Beratung, voraussichtliches Inkrafttreten Q4/2025 / Q1/2026. Betriebsrat und GF haben Einstieg in TISAX AL 3 bestätigt.'
    changesRelevantToISMS: 'SIEM-Pilot seit 15.05.2025 aktiv (Phase 1: 15 kritische Systeme). TISAX-Gap-Analyse abgeschlossen, 47 Gaps identifiziert.'
    feedbackFromInterestedParties: 'DQS (Zertifizierer): Vorbereitungsgespräch für Rezertifizierung in 10/2025 durchgeführt, Empfehlungen aufgenommen. Kunde X hat TISAX-Stichtag um 3 Monate auf 12/2025 verschoben.'
    auditResults: 'Internes Audit IA-2025-003 (Onboarding/Offboarding): 2 NCs, Korrekturmaßnahmen eingeleitet. IA-2025-004 (VVT) läuft.'
    performanceEvaluation: 'Patch-SLA Q2: 93 Prozent (Ziel 95, Trend positiv). MTTR: 3,4h. 1 Major-Incident (Unbefugter Zugriff File-Server, ehemaliger Mitarbeiter).'
    nonconformitiesReview: '3 neue NCs aus Q2-Audits eröffnet. Altlasten NC-2024-08 geschlossen. Gesamtbestand: 7 offen.'
    incidentsReview: '9 Incidents Q2/2025, davon 1 Major (Unbefugter Zugriff). DSGVO-Bewertung: kein meldepflichtiger Vorfall (nur Projektdokumente, keine personenbezogenen Daten betroffen).'
    risksReview: 'TISAX-Gap-Risiko neu aufgenommen (Vertragsstrafen-Risiko Kunde X). Mitarbeiter-Fluktuations-Risiko im IT-Team deeskaliert (2 Neueinstellungen).'
    objectivesReview: '2025-Ziele Halbzeitstand: 4 von 7 im Plan, 2 im Verzug (NIS2-Readiness, Supplier-Audits), 1 übertroffen (MTTR).'
    previousReviewActions: 'A-2025-Q1-01 (SIEM): on track. A-2025-Q1-02 (TISAX-Gap): abgeschlossen. A-2025-Q1-03 (NIS2-Betroffenheit): abgeschlossen, Bewertung "wesentlich".'
    decisions: 'Freigabe TISAX-Projektbudget 85 TEUR zusätzlich. Beschluss: Bug-Bounty-Programm prüfen (Entscheidung Q3). Rezertifizierungs-Termin fixiert: 20.-22.10.2025.'
    actionItems: 'A-2025-Q2-01: TISAX-Readiness (ISMS-Manager, Go-live 15.11.2025). A-2025-Q2-02: Pre-Assessment Rezertifizierung (CISO, 15.09.2025). A-2025-Q2-03: Supplier-Audit bei 3 weiteren kritischen Lieferanten (CPO, 30.09.2025).'
    opportunitiesForImprovement: 'SIEM liefert bereits Mehrwert (Detection neuer Angriffsmuster im Pilotbetrieb). TISAX-Controls können für NIS2-Readiness wiederverwendet werden (Data-Reuse-Ansatz).'
    improvementOpportunities: 'SIEM-Use-Cases ausbauen; Data-Reuse TISAX -> NIS2.'
    resourceNeeds: 'TISAX-Beratung verlängert um 4 Monate. Temporärer Werkvertrag Pentest-Nachbereitung.'
    resourcesNeeded: 'Verlängerung TISAX-Beratung; Pentest-Nachbereitung Werkvertrag.'
    correctiveActionsStatus: '5 CAPAs in Bearbeitung, 7 geschlossen in Q2. Kein CAPA überfällig.'

  - title: 'Management Review Q3/2025 - Pre-Rezertifizierung'
    reviewDate: '2025-09-25'
    status: 'in_progress'
    summary: 'Sonder-Review zur finalen Abstimmung vor externem Rezertifizierungsaudit in 10/2025. Prüfung: Sind alle Findings aus Pre-Assessment abgearbeitet, ISMS-Dokumentation aktuell, Management-Commitment dokumentiert.'
    contextChanges: 'NIS2-Umsetzung in Deutschland politisch weiter in Bewegung, Inkrafttreten für Q1/2026 wahrscheinlich. TISAX-Audit bestanden (AL 3), 12.09.2025.'
    changesRelevantToISMS: 'SIEM-Vollbetrieb seit 30.09.2025 (alle kritischen Systeme). ISMS-Scope erweitert um Produktionsstandort Leipzig, Dokumentation im SoA aktualisiert.'
    feedbackFromInterestedParties: 'Kunde X (Automotive): TISAX-Zertifikat akzeptiert, Rahmenvertrag verlängert. DQS-Pre-Assessment: keine Major-Findings, 4 Observations.'
    auditResults: 'Pre-Assessment DQS (14.-15.09.2025): keine Major-/Minor-NCs, 4 Observations (alle adressiert). Internes Audit IA-2025-006 (Supplier) läuft.'
    performanceEvaluation: 'Patch-SLA Q3 (YTD): 94 Prozent. MTTR: 3,2h. 0 Major-Incidents im Quartal. Awareness-Abschluss 2025: 91 Prozent (Stichtag 30.11.2025).'
    nonconformitiesReview: '2 NCs offen, beide im Zieltermin. Alle 4 Pre-Assessment-Observations beantwortet.'
    incidentsReview: '5 Incidents Q3/2025, alle Low/Medium. Keine meldepflichtigen Vorfälle.'
    risksReview: 'NIS2-Compliance-Risiko weiter erhöht (Umsetzung komplex). TISAX-Risiko geschlossen (Zertifikat erreicht).'
    objectivesReview: '2025-Ziele: TISAX erreicht. SIEM live. Rezertifizierung steht bevor. Verzug nur bei Supplier-Audits (3 von 5 statt 5 von 5).'
    previousReviewActions: 'A-2025-Q2-01 (TISAX): abgeschlossen. A-2025-Q2-02 (Pre-Assessment): abgeschlossen. A-2025-Q2-03 (Supplier-Audits): 3 von 3 geplant im Jahr erreicht, Nachziel 5 nicht erreichbar.'
    decisions: 'Freigabe Rezertifizierungsaudit-Start. NIS2-Programm mit Vollbudget 280 TEUR für 2026 geplant. Supplier-Audit-Programm 2026 mit höherer Zielzahl (7 Lieferanten).'
    actionItems: 'A-2025-Q3-01: Final-Check SoA und Dokumentation für Rezert (ISMS-Manager, 10.10.2025). A-2025-Q3-02: Management-Präsentation Rezert-Audit (CISO, 18.10.2025). A-2025-Q3-03: Planung NIS2-Programm 2026 (CISO, 15.12.2025).'
    opportunitiesForImprovement: 'NIS2-Vorbereitung als Chance zur Konsolidierung der Compliance-Landschaft (ISO 27001 + TISAX + NIS2 + BCM unter einer Governance).'
    improvementOpportunities: 'Konsolidierung Compliance-Landschaft; NIS2 als Katalysator.'
    resourceNeeds: 'NIS2-Projektleitung (0,5 FTE ab 01/2026). Temporäre externe Unterstützung für Rezertifizierungs-Nachbereitung.'
    resourcesNeeded: 'NIS2-PL 0,5 FTE; Rezert-Nachbereitung extern.'
    correctiveActionsStatus: '3 CAPAs offen, davon 2 im Termin. 1 CAPA (Supplier-Audit-Anzahl) formal umgewidmet in 2026-Programm.'
