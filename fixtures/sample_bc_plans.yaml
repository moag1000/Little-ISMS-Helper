business_continuity_plans:
  - name: 'BCP-001 IT-Service-Ausfall (Primärsystem)'
    businessProcess: 'ref:business_process:IT-Support und Helpdesk'
    description: 'Notfallplan bei Totalausfall kritischer IT-Dienste (ERP, CRM, E-Mail) im Rechenzentrum Frankfurt. Aktivierung bei Nichtverfügbarkeit > 2 Stunden.'
    planOwner: 'Leiter IT-Operations'
    bcTeam: 'IT-Operations, Netzwerk-Team, Application-Owner, Service Desk, CISO'
    status: 'active'
    activationCriteria: |
      Plan wird aktiviert bei:
      - Totalausfall eines oder mehrerer kritischer IT-Dienste (ERP, CRM, E-Mail) > 2 Stunden
      - Ausfall der Primär-Datenbank ohne erfolgreiches Failover
      - Ausfall des Rechenzentrums Frankfurt (Strom, Kühlung, Netzwerk)
      - Bestätigung durch IT-Operations-Leiter oder Vertretung
    rolesAndResponsibilities: |
      - Incident Commander: Leiter IT-Operations (Entscheidungen, Eskalation an GF)
      - Recovery Lead: Senior-Administrator (technische Wiederherstellung)
      - Communications Lead: IT-Service-Manager (Stakeholder-Info)
      - Technical Lead: Application-Owner je Dienst (ERP/CRM/Mail)
    responseTeam:
      incident_commander: 'Thomas Becker (Leiter IT-Operations)'
      communications_lead: 'Sandra Müller (IT-Service-Manager)'
      recovery_lead: 'Markus Fischer (Senior Admin)'
      technical_lead: 'Anna Weber (Application Owner)'
    recoveryProcedures: |
      1. Lageerfassung, Aktivierung IT-Krisenstab (T+15 min)
      2. Failover auf DR-Site Berlin gemäß Runbook RB-001 (T+60 min)
      3. Validierung Datenbank-Replikat (PostgreSQL Streaming Replication, Lag < 5 min)
      4. DNS-Umstellung auf DR-Loadbalancer
      5. Funktionstests ERP/CRM/Mail durch Application-Owner
      6. Kommunikation an Endnutzer über Status-Page
      7. Nach Wiederherstellung Primärsite: Rück-Failover in Wartungsfenster
    communicationPlan: 'Status-Updates alle 30 Min via Status-Page, E-Mail-Verteiler "all-staff" und Krisenhotline. Externe Kommunikation nur über Leitung Kommunikation/GF.'
    internalCommunication: 'Microsoft Teams "Krisenraum-IT", SMS-Notfallverteiler, Aushang in Standorten bei E-Mail-Ausfall.'
    externalCommunication: 'Kunden via Status-Page status.example.de; Key-Accounts persönliche Anrufe durch Vertrieb; Lieferanten nach Bedarf durch Einkauf.'
    stakeholderContacts:
      - name: 'Geschäftsführung'
        role: 'Entscheider'
        phone: '+49 69 555-0100'
      - name: 'CISO'
        role: 'Security Officer'
        phone: '+49 69 555-0110'
      - name: 'DPO'
        role: 'Datenschutzbeauftragter'
        phone: '+49 69 555-0120'
    alternativeSite: 'DR-Rechenzentrum Berlin (Hot-Standby, Streaming Replication)'
    alternativeSiteAddress: 'Rechenzentrum Berlin, Musterstraße 42, 10115 Berlin'
    alternativeSiteCapacity: 'Voller Produktivbetrieb für 100% der kritischen Systeme, Kapazität 30 Tage Dauerbetrieb.'
    backupProcedures: 'Tägliches inkrementelles Backup (22:00 Uhr), wöchentliches Full-Backup (So, 02:00 Uhr), Offsite-Replikation Berlin, 30 Tage Retention, zusätzlich unveränderlicher Cold-Storage 1 Jahr.'
    restoreProcedures: 'Restore gemäß Runbook RB-002: DB-Restore via pg_basebackup + WAL-Replay, Application-Restore via Ansible-Playbooks. Test-Restore 1x/Quartal.'
    requiredResources:
      personnel: 12
      equipment:
        - 'Notfall-Laptops (10 Stück)'
        - 'Satelliten-Telefon'
        - 'USV-gestützte Arbeitsplätze'
      supplies:
        - 'Runbook-Ausdrucke'
        - 'Kontaktlisten offline'
    version: '2.3'
    lastTested: '2025-09-15'
    nextTestDate: '2026-03-15'
    lastReviewDate: '2025-10-01'
    nextReviewDate: '2026-10-01'
    reviewNotes: 'Review 10/2025 durch CISO: RTO/RPO-Ziele bestätigt, DNS-Failover-Schritt präzisiert, Kontaktliste aktualisiert.'
    bsiPhase: 'umsetzung'

  - name: 'BCP-002 Gebäude-Nichtverfügbarkeit HQ München'
    businessProcess: 'ref:business_process:Kundenauftragsabwicklung'
    description: 'Notfallplan bei Nichtverfügbarkeit des Hauptstandorts München (Feuer, Überschwemmung, behördliche Sperrung, Bombendrohung).'
    planOwner: 'Facility Manager'
    bcTeam: 'Facility Management, HR, IT, Kommunikation, Arbeitsschutz, Empfang'
    status: 'active'
    activationCriteria: |
      Aktivierung bei:
      - Nichtbetretbarkeit des HQ-Gebäudes > 24 Stunden
      - Evakuierung durch Feuerwehr/Polizei/Gesundheitsamt
      - Strukturelle Gebäudeschäden
      - Ausfall der Gebäudeinfrastruktur (Strom > 8h, Heizung, Aufzüge kritisch)
    rolesAndResponsibilities: |
      - Facility Manager: Gebäude-Schadensbewertung, Behördenkontakt
      - HR-Leitung: Mitarbeiter-Kommunikation, Home-Office-Anordnung
      - IT-Leitung: VPN-Kapazität, Notfall-Arbeitsplätze
      - Kommunikationsleitung: Externe Kommunikation, Presse
    responseTeam:
      incident_commander: 'Jürgen Hoffmann (Facility Manager)'
      communications_lead: 'Petra Schmidt (Leiterin Kommunikation)'
      recovery_lead: 'Klaus Wagner (HR-Leitung)'
      technical_lead: 'Thomas Becker (IT-Operations)'
    recoveryProcedures: |
      1. Lageerfassung, Sicherheit der Mitarbeiter (T+0)
      2. Evakuierung gemäß Evakuierungsplan, Sammelpunkte Parkplatz Nord
      3. Aktivierung Home-Office für nicht-kritische Funktionen (T+4h)
      4. Umleitung Telefonanlage auf Mobilnummern Ansprechpartner
      5. Bezug Ausweichbüro Starnberg für operative Kernfunktionen (T+24h)
      6. Post/Paket-Umleitung beim Logistikpartner
      7. Koordination mit Versicherung und Gutachter
    communicationPlan: 'Sofort-SMS-Benachrichtigung aller Mitarbeiter. Daily Stand-up via Teams. Externe Kommunikation abgestimmt mit GF und PR.'
    internalCommunication: 'SMS-Notfallsystem (evalink), WhatsApp-Info-Gruppe "HQ-Status", E-Mail an private Adressen, Krisen-Hotline.'
    externalCommunication: 'Kunden-Newsletter, Pressemitteilung bei Bedarf (abgestimmt GF), Lieferanten via Einkauf.'
    stakeholderContacts:
      - name: 'Geschäftsführung'
        role: 'Entscheider'
      - name: 'Versicherung (Allianz)'
        role: 'Schadenmeldung'
        phone: '+49 89 3800-0'
      - name: 'Betriebsrat'
        role: 'Mitarbeitervertretung'
    alternativeSite: 'Ausweichbüro Coworking-Space "WorkOffice Starnberg" (Rahmenvertrag)'
    alternativeSiteAddress: 'Hauptstraße 12, 82319 Starnberg'
    alternativeSiteCapacity: '40 Arbeitsplätze für Kernfunktionen (Buchhaltung, Kundenservice, Management) verfügbar binnen 24h. Home-Office für 80% der restlichen Belegschaft.'
    backupProcedures: 'Dokumente zentral im DMS (nicht lokal), Cloud-Telefonanlage, Remote-Desktop-Zugriff für alle Mitarbeiter.'
    restoreProcedures: 'Wiederbezug nach Gebäudefreigabe in 3 Phasen: kritische Funktionen → alle Präsenz-Rollen → Normalbetrieb.'
    requiredResources:
      personnel: 40
      equipment:
        - 'Mobile Laptops (vorhanden)'
        - 'Mobile Telefonanlage (Cloud)'
        - 'Mietmöblierung Notfall'
      supplies:
        - 'Erste-Hilfe-Ausrüstung'
        - 'Notfall-Bargeld'
    version: '1.4'
    lastTested: '2025-05-20'
    nextTestDate: '2026-05-20'
    lastReviewDate: '2025-08-15'
    nextReviewDate: '2026-08-15'
    reviewNotes: 'Tabletop-Übung 05/2025 erfolgreich, Verbesserung Sammelpunkt-Markierung umgesetzt.'
    bsiPhase: 'umsetzung'

  - name: 'BCP-003 Lieferkette-Unterbrechung'
    businessProcess: 'ref:business_process:Online-Shop Betrieb'
    description: 'Notfallplan bei Ausfall kritischer Lieferanten (Cloud-Provider, SaaS-Anbieter, Hardware-Lieferant, Zahlungsdienstleister).'
    planOwner: 'Leiter Einkauf & Supplier-Management'
    bcTeam: 'Einkauf, Legal, IT, CISO, Finance'
    status: 'active'
    activationCriteria: |
      Aktivierung bei:
      - Ausfall Tier-1-Lieferant (Criticality = critical) > 4 Stunden
      - Insolvenzmeldung kritischer Lieferant
      - Sanktionierung/Ausschluss eines Providers (Cloud, SaaS)
      - Lieferengpass Hardware > 14 Tage
    rolesAndResponsibilities: |
      - Einkauf: Alternativ-Lieferanten aktivieren, Verhandlung Sofort-Konditionen
      - Legal: Vertragsprüfung Exit-Klauseln, Haftung
      - IT: Technische Migration, Daten-Export
      - CISO: Security-Re-Assessment des Alternativanbieters
      - Finance: Budget-Freigabe für Notfallbeschaffung
    responseTeam:
      incident_commander: 'Maria Hofmann (Leiterin Einkauf)'
      communications_lead: 'Stefan Braun (Supplier-Manager)'
      recovery_lead: 'Thomas Becker (IT-Operations)'
      technical_lead: 'Claudia Richter (CISO)'
    recoveryProcedures: |
      1. Identifikation ausgefallener Lieferant und Service-Impact
      2. Aktivierung Alternativlieferant gemäß Supplier-Matrix (Exit-Strategie)
      3. Daten-Export aus SaaS/Cloud gemäß DORA-Exit-Plan
      4. DSGVO-AVV-Prüfung des Alternativanbieters (Fast-Track-Freigabe DPO)
      5. Migration & Funktionsprüfung durch IT
      6. Vertragsabschluss (Interim/Final) durch Legal
      7. Stakeholder-Kommunikation
    communicationPlan: 'Daily Sync Einkauf/IT/Legal, Wochen-Report an GF, Info an betroffene Fachbereiche.'
    internalCommunication: 'Teams-Kanal "Supplier-Incident", E-Mail-Updates an betroffene Fachbereiche.'
    externalCommunication: 'Kunden nur bei spürbaren Service-Einbußen informieren (Leitung Kommunikation).'
    stakeholderContacts:
      - name: 'Geschäftsführung'
        role: 'Budget-Freigabe'
      - name: 'DPO'
        role: 'AVV-Freigabe Alternativlieferant'
      - name: 'Legal Counsel (extern)'
        role: 'Vertragsprüfung'
    alternativeSite: 'Keine physische Alternative, alternative Lieferanten aus Supplier-Matrix (siehe Sekundär-Provider je Service).'
    backupProcedures: 'Monatlicher Daten-Export aus kritischen SaaS-Diensten (Salesforce, Microsoft 365) in internen Storage; Hardware-Mindestbestand 10% Reserve.'
    restoreProcedures: 'Re-Migration nach Lieferantenrückkehr nur nach Kosten-Nutzen-Analyse. Default: Verbleib beim Alternativlieferanten, bis Vertrag ausläuft.'
    requiredResources:
      personnel: 6
      equipment:
        - 'Vertragsvorlagen Notfallbeschaffung'
      supplies:
        - 'Budget-Rahmen Notfallbeschaffung (vorab genehmigt 250.000 EUR)'
    version: '1.2'
    lastTested: '2025-07-10'
    nextTestDate: '2026-07-10'
    lastReviewDate: '2025-09-20'
    nextReviewDate: '2026-09-20'
    reviewNotes: 'Alternativ-Liste erweitert um Azure als Sekundär-Provider zu AWS.'
    bsiPhase: 'konzeption'

  - name: 'BCP-004 Pandemie / Massenerkrankung'
    businessProcess: 'ref:business_process:Gehaltsabrechnung'
    description: 'Notfallplan bei pandemischer Lage oder Ausfall > 30% der Belegschaft (Grippe, COVID-Varianten, Noro-Virus).'
    planOwner: 'HR-Leitung'
    bcTeam: 'HR, Arbeitsschutz, IT, Leitung Kommunikation, Betriebsarzt, Betriebsrat'
    status: 'active'
    activationCriteria: |
      Aktivierung bei:
      - Offizielle Pandemie-Erklärung RKI/WHO mit Relevanz für Standorte
      - Krankmeldungen > 30% einer Kernfunktion
      - Behördliche Quarantäne-Anordnung
      - Erhöhter Krankenstand > 20% für > 5 Werktage
    rolesAndResponsibilities: |
      - HR: Krankenstands-Monitoring, Schichtplanung, Kommunikation
      - Arbeitsschutz: Hygienemaßnahmen, PSA-Beschaffung
      - Betriebsarzt: Medizinische Bewertung, Teststrategie
      - IT: Home-Office-Skalierung, VPN-Kapazität
    responseTeam:
      incident_commander: 'Klaus Wagner (HR-Leitung)'
      communications_lead: 'Petra Schmidt (Kommunikation)'
      recovery_lead: 'Dr. Sabine Müller (Betriebsärztin)'
      technical_lead: 'Thomas Becker (IT-Operations)'
    recoveryProcedures: |
      1. Aktivierung Pandemie-Stufe (1=Beobachten, 2=Vorbereiten, 3=Aktiv)
      2. Hygieneplan verschärfen (Abstand, Maske, Lüftung, Testangebot)
      3. Ausweitung Home-Office auf 100% für HO-fähige Rollen
      4. Schichtbetrieb/Teambildung (Rotation, keine Überkreuzung)
      5. Priorisierung kritischer Funktionen (MBCO), Aussetzen nicht-kritischer Tätigkeiten
      6. Cross-Training Backup-Personen aktivieren
      7. Externe Dienstleister: Kontaktprotokoll, ggf. Lieferung statt Vor-Ort-Service
    communicationPlan: 'Wöchentliche Mitarbeiter-Info, tägliche Lagebilder an Krisenstab, transparente Kommunikation über Infektionszahlen.'
    internalCommunication: 'Intranet-Pandemie-Seite, E-Mail, Aushänge, Betriebsrats-Info.'
    externalCommunication: 'Kunden/Lieferanten bei Service-Einschränkungen informieren; Behörden-Meldungen gemäß IfSG.'
    stakeholderContacts:
      - name: 'Geschäftsführung'
        role: 'Entscheider'
      - name: 'Gesundheitsamt München'
        role: 'Behörde'
      - name: 'Betriebsrat'
        role: 'Mitbestimmung'
    alternativeSite: 'Home-Office für alle HO-fähigen Rollen. Für Präsenzrollen: räumliche Entzerrung auf allen Standorten.'
    backupProcedures: 'Cross-Training-Matrix für Key-Rollen vorhanden, mind. 2 Backup-Personen je Kernfunktion.'
    restoreProcedures: 'Stufenweise Rückkehr Büro gemäß Stufenplan HR, Deeskalation Hygienemaßnahmen.'
    requiredResources:
      personnel: 4
      equipment:
        - 'FFP2-Masken (Lagerbestand 10.000 Stück)'
        - 'Schnelltests (Lagerbestand 2.000)'
        - 'Desinfektionsmittel'
      supplies:
        - 'Hygieneplan Plakate'
        - 'Info-Flyer mehrsprachig'
    version: '3.1'
    lastTested: '2024-11-15'
    nextTestDate: '2025-11-15'
    lastReviewDate: '2025-01-20'
    nextReviewDate: '2026-01-20'
    reviewNotes: 'Post-COVID-Review: Home-Office-Infrastruktur dauerhaft vorhanden, RKI-Meldepfade aktualisiert.'
    bsiPhase: 'aufrechterhaltung'

  - name: 'BCP-005 Cyber-Crisis / Ransomware-Angriff'
    businessProcess: 'ref:business_process:Backup und Disaster Recovery'
    description: 'Notfallplan bei schwerwiegendem Cyber-Angriff mit Verschlüsselung/Datenexfiltration. Kombination ISO 27001 A.5.29 + ISO 22301.'
    planOwner: 'CISO'
    bcTeam: 'CISO, CIO, IT-Security, Incident Response Team, Legal, DPO, Leitung Kommunikation, GF'
    status: 'active'
    activationCriteria: |
      Aktivierung bei:
      - Bestätigte Ransomware-Infektion (Dateiverschlüsselung erkannt)
      - Lösegeldforderung eingegangen
      - Massive Datenexfiltration (> 10.000 Datensätze) erkannt
      - Kompromittierung Domain Controller / Active Directory
      - CERT-Warnung mit direktem Bezug auf unsere Umgebung
    rolesAndResponsibilities: |
      - CISO: Incident Command, Kommunikation mit Behörden (BSI, LKA)
      - CIO: Infrastruktur-Entscheidungen, IT-Ressourcen
      - IR-Team: Forensik, Containment, Eradication
      - Legal: Meldepflichten DSGVO/NIS2/DORA, Polizei-Anzeige
      - DPO: DSGVO Art. 33/34 Meldung, Kommunikation Betroffene
      - Kommunikation: Externe Statements, Presse
    responseTeam:
      incident_commander: 'Claudia Richter (CISO)'
      communications_lead: 'Petra Schmidt (Kommunikation)'
      recovery_lead: 'Markus Fischer (IR-Lead)'
      technical_lead: 'Andreas Koch (CIO)'
    recoveryProcedures: |
      1. Sofort-Isolation betroffener Systeme (Netz-Trennung, nicht Shutdown)
      2. Forensik-Snapshot (Memory-Dump, Disk-Image) für Beweissicherung
      3. Aktivierung externes IR-Retainer (HiSolutions 24/7)
      4. Parallel: BSI-Meldung (NIS2), Polizei-Anzeige LKA, DSGVO-Meldung 72h
      5. Identifikation Patient-Zero, IoC-Scan gesamte Umgebung
      6. Eradication: System-Neuaufbau aus sauberen Backups (keine Wiederherstellung aus potenziell kompromittierten Backups)
      7. Credential-Reset aller Accounts, AD-Rebuild falls kompromittiert
      8. Stufenweise Wiederinbetriebnahme mit enhanced Monitoring
      9. Post-Incident-Review, Lessons-Learned, Aktualisierung Controls
    communicationPlan: 'Out-of-Band-Kommunikation (Signal, private Mobilnummern), keine interne E-Mail bei AD-Kompromittierung. War-Room physisch.'
    internalCommunication: 'Signal-Gruppe "Krisenstab-Cyber", persönliche Briefings, bewusst reduzierter Kreis (Need-to-know).'
    externalCommunication: 'BSI (NIS2), LKA, DSGVO-Aufsichtsbehörde (72h), Kunden (bei Datenabfluss), Presse (GF-abgestimmt).'
    stakeholderContacts:
      - name: 'Geschäftsführung'
        role: 'Entscheider Lösegeld/Kommunikation'
      - name: 'BSI-CERT'
        role: 'Meldebehörde NIS2'
        phone: '+49 228 99 9582-222'
      - name: 'LKA Cybercrime'
        role: 'Strafverfolgung'
      - name: 'HiSolutions IR-Retainer'
        role: 'Externe Forensik'
        phone: '+49 30 533 289-0'
      - name: 'Cyber-Versicherung (AIG)'
        role: 'Deckung/Kostenabdeckung'
    alternativeSite: 'Isolierte Recovery-Umgebung (Air-gapped) im DR-Rechenzentrum Berlin für Clean-Rebuild.'
    alternativeSiteAddress: 'Rechenzentrum Berlin, Musterstraße 42, 10115 Berlin'
    alternativeSiteCapacity: 'Clean-Room-Kapazität für Rebuild kritischer Systeme (AD, ERP, Mail) binnen 72h.'
    backupProcedures: 'Immutable Backups (Cold Storage, S3 Object Lock), mind. 3-2-1-Regel, wöchentlicher Offline-Backup-Test, Air-gapped Gold-Images für AD/Core-Services.'
    restoreProcedures: 'Restore aus Immutable-Backups (Zeitpunkt vor Infektion, verifiziert über IoC-Scan), keine Restore aus Online-Backups bei AD-Kompromittierung.'
    requiredResources:
      personnel: 15
      equipment:
        - 'Forensik-Laptops (isoliert)'
        - 'Schreibblocker'
        - 'Signal-Mobilgeräte (Krisenstab)'
        - 'Drucker offline (für Runbooks)'
      supplies:
        - 'Runbook-Ausdrucke (Offline)'
        - 'Lizenzen forensischer Tools'
        - 'Retainer-Vertrag IR-Partner'
    version: '2.0'
    lastTested: '2025-10-18'
    nextTestDate: '2026-04-18'
    lastReviewDate: '2025-11-05'
    nextReviewDate: '2026-05-05'
    reviewNotes: 'Vollständige Simulation 10/2025 mit externem IR-Partner. RTO kritische Systeme 72h bestätigt. Verbesserung: Signal-Notfallbaum regelmäßig testen.'
    bsiPhase: 'umsetzung'
