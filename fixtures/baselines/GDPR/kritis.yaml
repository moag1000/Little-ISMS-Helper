baseline:
  id: gdpr-kritis
  name: 'GDPR - KRITIS / NIS2-essential'
  name_en: 'GDPR - KRITIS / NIS2-essential'
  industry: kritis
  description: |
    Baseline für Betreiber Kritischer Infrastrukturen (Energie, Wasser, Gesundheit,
    Transport, Telekom) im Geltungsbereich der BSI-KRITIS-Verordnung und NIS2.
    Hohe Reife-Erwartung wegen staatlicher APT-Bedrohung, BSI-Meldepflicht (§8b BSIG)
    und 24/7-Verfügbarkeitsdruck. Fokus: Detection, Incident-Response, Lieferketten
    und OT-Integration.
  description_en: |
    Baseline for critical infrastructure operators (energy, water, health, transport,
    telecom) under BSI-KRITIS regulation and NIS2. High maturity expectations due to
    nation-state APT threat, BSI reporting (§8b BSIG) and 24/7 availability pressure.
    Focus: detection, incident response, supply chain, OT integration.
  targets:
    "Art.13":
      maturity_target: "4"
      reason: "Informationspflichten bei KRITIS: Versorgungsdaten und Kunden-PII (Strom-/Wasser-Verbrauch) sind sensibel und DSGVO-relevant."
      reason_en: "Information duties in KRITIS: supply data and customer PII (energy/water consumption) are sensitive and GDPR-relevant."
    "Art.15":
      maturity_target: "4"
      reason: "Auskunftsrecht bei KRITIS: Versorgungsdaten und Kunden-PII (Strom-/Wasser-Verbrauch) sind sensibel und DSGVO-relevant."
      reason_en: "Right of access in KRITIS: supply data and customer PII (energy/water consumption) are sensitive and GDPR-relevant."
    "Art.17":
      maturity_target: "4"
      reason: "Löschrecht bei KRITIS: Versorgungsdaten und Kunden-PII (Strom-/Wasser-Verbrauch) sind sensibel und DSGVO-relevant."
      reason_en: "Right to erasure in KRITIS: supply data and customer PII (energy/water consumption) are sensitive and GDPR-relevant."
    "Art.20":
      maturity_target: "4"
      reason: "Datenportabilität bei KRITIS: Versorgungsdaten und Kunden-PII (Strom-/Wasser-Verbrauch) sind sensibel und DSGVO-relevant."
      reason_en: "Data portability in KRITIS: supply data and customer PII (energy/water consumption) are sensitive and GDPR-relevant."
    "Art.25":
      maturity_target: "4"
      reason: "Privacy by Design bei KRITIS: Customizing-Code in HMI/SCADA muss revisionssicher entwickelt sein, NIS2-21.2.e fordert das ausdrücklich."
      reason_en: "Privacy by design in KRITIS: customisation code in HMI/SCADA must be developed in audit-proof form; NIS2-21.2.e demands it."
    "Art.28":
      maturity_target: "5"
      reason: "Auftragsverarbeitung bei KRITIS: §8a-BSIG verlangt Sicherheitsnachweise bis zum Sub-Lieferanten, Solarwinds-Klasse-Risiken sind real."
      reason_en: "Processor agreements in KRITIS: §8a BSIG demands security evidence down to sub-suppliers; Solarwinds-class risks are real."
    "Art.30":
      maturity_target: "4"
      reason: "Verarbeitungs-Verzeichnis bei KRITIS: BSI-/NIS2-Konformitätsnachweise sind kontinuierlich zu führen, externes Audit alle 2 Jahre."
      reason_en: "Records of processing in KRITIS: BSI/NIS2 conformity evidence must be maintained continuously; external audit every 2 years."
    "Art.32":
      maturity_target: "4"
      reason: "TOMs / Sicherheit bei KRITIS: SCADA-Kommunikation muss IEC-62351-konform abgesichert sein, Quanten-Resistenz absehbar."
      reason_en: "Security of processing in KRITIS: SCADA communication must comply with IEC 62351; quantum resistance is on the horizon."
    "Art.33":
      maturity_target: "5"
      reason: "Breach-Notification an Aufsicht bei KRITIS: §8b-BSIG-Meldepflicht binnen 24h an BSI/CERT-Bund, Krisenstab muss 24/7 erreichbar sein."
      reason_en: "Breach notification in KRITIS: §8b BSIG mandates notification within 24h to BSI/CERT-Bund; crisis team must be reachable 24/7."
    "Art.34":
      maturity_target: "5"
      reason: "Breach-Notification an Betroffene bei KRITIS: §8b-BSIG-Meldepflicht binnen 24h an BSI/CERT-Bund, Krisenstab muss 24/7 erreichbar sein."
      reason_en: "Notification to data subjects in KRITIS: §8b BSIG mandates notification within 24h to BSI/CERT-Bund; crisis team must be reachable 24/7."
    "Art.35":
      maturity_target: "5"
      reason: "DSFA / DPIA bei KRITIS: §8a-BSIG-Audit prüft Top-Level-Steuerung — formelle Verabschiedung und jährlicher Review sind Audit-Standard."
      reason_en: "DPIA in KRITIS: §8a BSIG audits review top-level governance — formal adoption and annual review are audit standard."
    "Art.37":
      maturity_target: "5"
      reason: "DSB / DPO bei KRITIS: §8a-BSIG-Audit prüft Top-Level-Steuerung — formelle Verabschiedung und jährlicher Review sind Audit-Standard."
      reason_en: "Data protection officer in KRITIS: §8a BSIG audits review top-level governance — formal adoption and annual review are audit standard."
    "Art.44":
      maturity_target: "4"
      reason: "Drittlandstransfers bei KRITIS: BSI-/NIS2-Konformitätsnachweise sind kontinuierlich zu führen, externes Audit alle 2 Jahre."
      reason_en: "International transfers in KRITIS: BSI/NIS2 conformity evidence must be maintained continuously; external audit every 2 years."
    "Art.5":
      maturity_target: "4"
      reason: "Verarbeitungs-Grundsätze bei KRITIS: Versorgungsdaten und Kunden-PII (Strom-/Wasser-Verbrauch) sind sensibel und DSGVO-relevant."
      reason_en: "Processing principles in KRITIS: supply data and customer PII (energy/water consumption) are sensitive and GDPR-relevant."
    "Art.6":
      maturity_target: "4"
      reason: "Rechtmäßigkeit bei KRITIS: Versorgungsdaten und Kunden-PII (Strom-/Wasser-Verbrauch) sind sensibel und DSGVO-relevant."
      reason_en: "Lawfulness in KRITIS: supply data and customer PII (energy/water consumption) are sensitive and GDPR-relevant."
    "Art.7":
      maturity_target: "4"
      reason: "Einwilligung bei KRITIS: Versorgungsdaten und Kunden-PII (Strom-/Wasser-Verbrauch) sind sensibel und DSGVO-relevant."
      reason_en: "Consent in KRITIS: supply data and customer PII (energy/water consumption) are sensitive and GDPR-relevant."
