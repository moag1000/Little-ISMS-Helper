baseline:
  id: gdpr-saas
  name: 'GDPR - Cloud-SaaS / Software-Anbieter'
  name_en: 'GDPR - Cloud SaaS / Software Vendor'
  industry: saas
  description: |
    Baseline für Cloud-SaaS-Anbieter mit Multi-Tenant-Architektur. Customer-Audits
    (SOC 2, ISO 27001, BSI-C5) treiben die Reife. Fokus: IAM, Crypto, Secure-SDLC,
    Mandantenabgrenzung, Vulnerability-Management. BCM moderat, da Hyperscaler-IaaS
    viel abdeckt.
  description_en: |
    Baseline for cloud SaaS vendors with multi-tenant architecture. Customer audits
    (SOC 2, ISO 27001, BSI-C5) drive maturity. Focus: IAM, crypto, secure SDLC, tenant
    separation, vulnerability management. BCM moderate as hyperscaler IaaS covers much.
  targets:
    "Art.13":
      maturity_target: "4"
      reason: "Informationspflichten für Cloud-SaaS: Customer-Daten sind in Multi-Tenant-DB mit RLS abgesichert, DSGVO-Konformität ist Vertrieblicher Hebel."
      reason_en: "Information duties for cloud SaaS: customer data is protected in multi-tenant DB with RLS; GDPR conformity is a sales lever."
    "Art.15":
      maturity_target: "4"
      reason: "Auskunftsrecht für Cloud-SaaS: Customer-Daten sind in Multi-Tenant-DB mit RLS abgesichert, DSGVO-Konformität ist Vertrieblicher Hebel."
      reason_en: "Right of access for cloud SaaS: customer data is protected in multi-tenant DB with RLS; GDPR conformity is a sales lever."
    "Art.17":
      maturity_target: "4"
      reason: "Löschrecht für Cloud-SaaS: Customer-Daten sind in Multi-Tenant-DB mit RLS abgesichert, DSGVO-Konformität ist Vertrieblicher Hebel."
      reason_en: "Right to erasure for cloud SaaS: customer data is protected in multi-tenant DB with RLS; GDPR conformity is a sales lever."
    "Art.20":
      maturity_target: "4"
      reason: "Datenportabilität für Cloud-SaaS: Customer-Daten sind in Multi-Tenant-DB mit RLS abgesichert, DSGVO-Konformität ist Vertrieblicher Hebel."
      reason_en: "Data portability for cloud SaaS: customer data is protected in multi-tenant DB with RLS; GDPR conformity is a sales lever."
    "Art.25":
      maturity_target: "5"
      reason: "Privacy by Design für Cloud-SaaS: Secure-SDLC mit SAST/SCA/DAST in CI/CD ist Reife-Treiber, OWASP-ASVS-Konformität wird von Kunden gefordert."
      reason_en: "Privacy by design for cloud SaaS: secure SDLC with SAST/SCA/DAST in CI/CD drives maturity; OWASP ASVS conformity is customer-demanded."
    "Art.28":
      maturity_target: "4"
      reason: "Auftragsverarbeitung für Cloud-SaaS: Sub-Processor-Listen (DPA-Pflicht) und Hyperscaler-Audit-Reports sind im Vendor-Mgmt zu führen."
      reason_en: "Processor agreements for cloud SaaS: sub-processor lists (DPA mandate) and hyperscaler audit reports must be tracked in vendor mgmt."
    "Art.30":
      maturity_target: "4"
      reason: "Verarbeitungs-Verzeichnis für Cloud-SaaS: parallele Frameworks (SOC 2, ISO 27001, BSI-C5, DSGVO) effizient via Mappings und Data-Reuse handhaben."
      reason_en: "Records of processing for cloud SaaS: parallel frameworks (SOC 2, ISO 27001, BSI-C5, GDPR) handled efficiently via mappings and data reuse."
    "Art.32":
      maturity_target: "5"
      reason: "TOMs / Sicherheit für Cloud-SaaS: TLS 1.3, Encryption-at-Rest mit KMS, BYOK für Enterprise-Kunden ist Marktstandard, NIS2-21.2.h-konform."
      reason_en: "Security of processing for cloud SaaS: TLS 1.3, encryption-at-rest with KMS, BYOK for enterprise customers is market standard, NIS2-21.2.h aligned."
    "Art.33":
      maturity_target: "4"
      reason: "Breach-Notification an Aufsicht für Cloud-SaaS: Customer-SLAs und DSGVO Art. 33 (72h) zwingen zu strukturiertem Incident-Response mit Statuspage-Kommunikation."
      reason_en: "Breach notification for cloud SaaS: customer SLAs and GDPR Art. 33 (72h) force structured incident response with statuspage comms."
    "Art.34":
      maturity_target: "4"
      reason: "Breach-Notification an Betroffene für Cloud-SaaS: Customer-SLAs und DSGVO Art. 33 (72h) zwingen zu strukturiertem Incident-Response mit Statuspage-Kommunikation."
      reason_en: "Notification to data subjects for cloud SaaS: customer SLAs and GDPR Art. 33 (72h) force structured incident response with statuspage comms."
    "Art.35":
      maturity_target: "4"
      reason: "DSFA / DPIA für Cloud-SaaS: Customer-Audits (SOC 2, ISO 27001) verlangen formelle Policies, Trust-Center-Veröffentlichung Standard."
      reason_en: "DPIA for cloud SaaS: customer audits (SOC 2, ISO 27001) demand formal policies; trust-centre publication is standard."
    "Art.37":
      maturity_target: "4"
      reason: "DSB / DPO für Cloud-SaaS: Customer-Audits (SOC 2, ISO 27001) verlangen formelle Policies, Trust-Center-Veröffentlichung Standard."
      reason_en: "Data protection officer for cloud SaaS: customer audits (SOC 2, ISO 27001) demand formal policies; trust-centre publication is standard."
    "Art.44":
      maturity_target: "4"
      reason: "Drittlandstransfers für Cloud-SaaS: parallele Frameworks (SOC 2, ISO 27001, BSI-C5, DSGVO) effizient via Mappings und Data-Reuse handhaben."
      reason_en: "International transfers for cloud SaaS: parallel frameworks (SOC 2, ISO 27001, BSI-C5, GDPR) handled efficiently via mappings and data reuse."
