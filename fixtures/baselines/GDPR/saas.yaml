      maturity_target: "4"
      reason: "Verarbeitungs-Grundsätze für Cloud-SaaS: Customer-Daten sind in Multi-Tenant-DB mit RLS abgesichert, DSGVO-Konformität ist Vertrieblicher Hebel."
