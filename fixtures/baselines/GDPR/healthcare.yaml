      reason: "Rechtmäßigkeit in Healthcare: Gesundheitsdaten Art. 9 DSGVO + Patientenakten — strengster Schutz, Sonderkategorie."
      reason_en: "Lawfulness in healthcare: GDPR Art. 9 health data plus patient records — highest protection class."
    "Art.7":
