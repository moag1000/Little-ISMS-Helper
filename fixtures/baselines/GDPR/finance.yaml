    "Art.44":
      maturity_target: "5"
      reason: "Drittlandstransfers in Finanzbranche: BaFin-Audits, DORA-Reporting, MaRisk-Berichte sind kontinuierlich, parallele Frameworks erfordern hohe Reife."
