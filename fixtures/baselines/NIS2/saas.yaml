baseline:
  id: nis2-saas
  name: 'NIS2 - Cloud-SaaS / Software-Anbieter'
  name_en: 'NIS2 - Cloud SaaS / Software Vendor'
  industry: saas
  description: |
    Baseline für Cloud-SaaS-Anbieter mit Multi-Tenant-Architektur. Customer-Audits
    (SOC 2, ISO 27001, BSI-C5) treiben die Reife. Fokus: IAM, Crypto, Secure-SDLC,
    Mandantenabgrenzung, Vulnerability-Management. BCM moderat, da Hyperscaler-IaaS
    viel abdeckt.
  description_en: |
    Baseline for cloud SaaS vendors with multi-tenant architecture. Customer audits
    (SOC 2, ISO 27001, BSI-C5) drive maturity. Focus: IAM, crypto, secure SDLC, tenant
    separation, vulnerability management. BCM moderate as hyperscaler IaaS covers much.
  targets:
    "21.2.a":
      maturity_target: "4"
      reason: "Risiko-Policies für Cloud-SaaS: Customer-Audits (SOC 2, ISO 27001) verlangen formelle Policies, Trust-Center-Veröffentlichung Standard."
      reason_en: "Risk policies for cloud SaaS: customer audits (SOC 2, ISO 27001) demand formal policies; trust-centre publication is standard."
    "21.2.b":
      maturity_target: "4"
      reason: "Incident-Handling für Cloud-SaaS: Customer-SLAs und DSGVO Art. 33 (72h) zwingen zu strukturiertem Incident-Response mit Statuspage-Kommunikation."
      reason_en: "Incident handling for cloud SaaS: customer SLAs and GDPR Art. 33 (72h) force structured incident response with statuspage comms."
    "21.2.c":
      maturity_target: "3"
      reason: "Business-Continuity für Cloud-SaaS: Hyperscaler-IaaS deckt Infrastruktur-Resilienz weitgehend ab; Multi-Region-Aktiv/Passiv ist Mindestbild."
      reason_en: "Business continuity for cloud SaaS: hyperscaler IaaS covers most infra resilience; multi-region active/passive is the minimum."
    "21.2.d":
      maturity_target: "4"
      reason: "Lieferketten-Sicherheit für Cloud-SaaS: Sub-Processor-Listen (DPA-Pflicht) und Hyperscaler-Audit-Reports sind im Vendor-Mgmt zu führen."
      reason_en: "Supply-chain security for cloud SaaS: sub-processor lists (DPA mandate) and hyperscaler audit reports must be tracked in vendor mgmt."
    "21.2.e":
      maturity_target: "5"
      reason: "Sichere Entwicklung für Cloud-SaaS: Secure-SDLC mit SAST/SCA/DAST in CI/CD ist Reife-Treiber, OWASP-ASVS-Konformität wird von Kunden gefordert."
      reason_en: "Secure development for cloud SaaS: secure SDLC with SAST/SCA/DAST in CI/CD drives maturity; OWASP ASVS conformity is customer-demanded."
    "21.2.f":
      maturity_target: "4"
      reason: "Wirksamkeitsmessung für Cloud-SaaS: parallele Frameworks (SOC 2, ISO 27001, BSI-C5, DSGVO) effizient via Mappings und Data-Reuse handhaben."
      reason_en: "Effectiveness measurement for cloud SaaS: parallel frameworks (SOC 2, ISO 27001, BSI-C5, GDPR) handled efficiently via mappings and data reuse."
    "21.2.g":
      maturity_target: "3"
      reason: "Cyber-Hygiene und Training für Cloud-SaaS: verteiltes Team mit hoher Fluktuation braucht regelmäßiges Onboarding-Security-Training."
      reason_en: "Cyber hygiene/training for cloud SaaS: distributed team with high turnover needs regular onboarding security training."
    "21.2.h":
      maturity_target: "5"
      reason: "Kryptografie-Policy für Cloud-SaaS: TLS 1.3, Encryption-at-Rest mit KMS, BYOK für Enterprise-Kunden ist Marktstandard, NIS2-21.2.h-konform."
      reason_en: "Cryptography policy for cloud SaaS: TLS 1.3, encryption-at-rest with KMS, BYOK for enterprise customers is market standard, NIS2-21.2.h aligned."
    "21.2.i":
      maturity_target: "5"
      reason: "HR-Security und Access-Control für Cloud-SaaS: SaaS-Multi-Tenant erzwingt strikte IAM mit MFA, SSO und SCIM-Provisioning — Customer-Pflichtanforderung."
      reason_en: "HR security and access control for cloud SaaS: multi-tenant SaaS forces strict IAM with MFA, SSO and SCIM provisioning — customer mandate."
    "21.2.j":
      maturity_target: "5"
      reason: "MFA und sichere Kommunikation für Cloud-SaaS: SaaS-Multi-Tenant erzwingt strikte IAM mit MFA, SSO und SCIM-Provisioning — Customer-Pflichtanforderung."
      reason_en: "MFA and secure comms for cloud SaaS: multi-tenant SaaS forces strict IAM with MFA, SSO and SCIM provisioning — customer mandate."
