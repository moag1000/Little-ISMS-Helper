baseline:
  id: nis2-kritis
  name: 'NIS2 - KRITIS / NIS2-essential'
  name_en: 'NIS2 - KRITIS / NIS2-essential'
  industry: kritis
  description: |
    Baseline für Betreiber Kritischer Infrastrukturen (Energie, Wasser, Gesundheit,
    Transport, Telekom) im Geltungsbereich der BSI-KRITIS-Verordnung und NIS2.
    Hohe Reife-Erwartung wegen staatlicher APT-Bedrohung, BSI-Meldepflicht (§8b BSIG)
    und 24/7-Verfügbarkeitsdruck. Fokus: Detection, Incident-Response, Lieferketten
    und OT-Integration.
  description_en: |
    Baseline for critical infrastructure operators (energy, water, health, transport,
    telecom) under BSI-KRITIS regulation and NIS2. High maturity expectations due to
    nation-state APT threat, BSI reporting (§8b BSIG) and 24/7 availability pressure.
    Focus: detection, incident response, supply chain, OT integration.
  targets:
    "21.2.a":
      maturity_target: "5"
      reason: "Risiko-Policies bei KRITIS: §8a-BSIG-Audit prüft Top-Level-Steuerung — formelle Verabschiedung und jährlicher Review sind Audit-Standard."
      reason_en: "Risk policies in KRITIS: §8a BSIG audits review top-level governance — formal adoption and annual review are audit standard."
    "21.2.b":
      maturity_target: "5"
      reason: "Incident-Handling bei KRITIS: §8b-BSIG-Meldepflicht binnen 24h an BSI/CERT-Bund, Krisenstab muss 24/7 erreichbar sein."
      reason_en: "Incident handling in KRITIS: §8b BSIG mandates notification within 24h to BSI/CERT-Bund; crisis team must be reachable 24/7."
    "21.2.c":
      maturity_target: "5"
      reason: "Business-Continuity bei KRITIS: Versorgungssicherheit ist Schutzziel-Spitze — RTO < 4h für versorgungsrelevante Services Standard."
      reason_en: "Business continuity in KRITIS: supply security is the top protection objective — RTO < 4h for supply-critical services standard."
    "21.2.d":
      maturity_target: "5"
      reason: "Lieferketten-Sicherheit bei KRITIS: §8a-BSIG verlangt Sicherheitsnachweise bis zum Sub-Lieferanten, Solarwinds-Klasse-Risiken sind real."
      reason_en: "Supply-chain security in KRITIS: §8a BSIG demands security evidence down to sub-suppliers; Solarwinds-class risks are real."
    "21.2.e":
      maturity_target: "4"
      reason: "Sichere Entwicklung bei KRITIS: Customizing-Code in HMI/SCADA muss revisionssicher entwickelt sein, NIS2-21.2.e fordert das ausdrücklich."
      reason_en: "Secure development in KRITIS: customisation code in HMI/SCADA must be developed in audit-proof form; NIS2-21.2.e demands it."
    "21.2.f":
      maturity_target: "4"
      reason: "Wirksamkeitsmessung bei KRITIS: BSI-/NIS2-Konformitätsnachweise sind kontinuierlich zu führen, externes Audit alle 2 Jahre."
      reason_en: "Effectiveness measurement in KRITIS: BSI/NIS2 conformity evidence must be maintained continuously; external audit every 2 years."
    "21.2.g":
      maturity_target: "4"
      reason: "Cyber-Hygiene und Training bei KRITIS: Operator-Schulung mit Phishing-Simulationen ist NIS2-21.2.g — KRITIS-Branchen sind Spear-Phishing-Top-Ziel."
      reason_en: "Cyber hygiene/training in KRITIS: operator training with phishing simulations is NIS2-21.2.g — KRITIS sectors are top spear-phishing targets."
    "21.2.h":
      maturity_target: "4"
      reason: "Kryptografie-Policy bei KRITIS: SCADA-Kommunikation muss IEC-62351-konform abgesichert sein, Quanten-Resistenz absehbar."
      reason_en: "Cryptography policy in KRITIS: SCADA communication must comply with IEC 62351; quantum resistance is on the horizon."
    "21.2.i":
      maturity_target: "5"
      reason: "HR-Security und Access-Control bei KRITIS: privilegierte OT-Zugänge sind häufigster APT-Initialvektor — strikte Härtung mit MFA und PAM Pflicht."
      reason_en: "HR security and access control in KRITIS: privileged OT access is the most common APT initial vector — strict hardening with MFA and PAM is mandatory."
    "21.2.j":
      maturity_target: "5"
      reason: "MFA und sichere Kommunikation bei KRITIS: privilegierte OT-Zugänge sind häufigster APT-Initialvektor — strikte Härtung mit MFA und PAM Pflicht."
      reason_en: "MFA and secure comms in KRITIS: privileged OT access is the most common APT initial vector — strict hardening with MFA and PAM is mandatory."
