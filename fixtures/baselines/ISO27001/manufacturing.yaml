baseline:
  id: iso27001-manufacturing
  name: 'ISO27001 - Fertigung / Automotive (TISAX)'
  name_en: 'ISO27001 - Manufacturing / Automotive (TISAX)'
  industry: manufacturing
  description: |
    Baseline für Fertigungsunternehmen, insb. Automotive-Zulieferer im TISAX-Scope.
    Kern-Themen: Prototypen-Schutz, OT/Office-Trennung, Lieferantensicherheit. TISAX-
    Self-Assessment Level 2/3 ist Industrie-Standard. OEM-Audits sind unmittelbar
    Geschäfts-relevant.
  description_en: |
    Baseline for manufacturing, esp. automotive suppliers in TISAX scope. Core themes:
    prototype protection, OT/office segregation, supplier security. TISAX self-assessment
    level 2/3 is industry standard. OEM audits are directly business-relevant.
  targets:
    "A.5.1":
      maturity_target: "3"
      reason: "Informationssicherheits-Policies in Fertigung: TISAX-Anforderung an verabschiedete Policies — OEM-Auditoren prüfen Existenz und Aktualität strikt."
      reason_en: "Information security policies in manufacturing: TISAX requires adopted policies — OEM auditors verify existence and currency strictly."
    "A.5.15":
      maturity_target: "4"
      reason: "Access Control in Fertigung: OT-Office-Trennung mit dedizierten Zugängen ist TISAX-Anforderung, OEM-Audits prüfen Engineer-Stations."
      reason_en: "Access control in manufacturing: OT/office separation with dedicated access is a TISAX requirement; OEM audits review engineering stations."
