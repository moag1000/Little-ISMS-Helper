baseline:
  id: bsi-grundschutz-kritis
  name: 'BSI IT-Grundschutz - KRITIS / NIS2-essential'
  name_en: 'BSI IT-Grundschutz - KRITIS / NIS2-essential'
  industry: kritis
  description: |
    Baseline für Betreiber Kritischer Infrastrukturen (Energie, Wasser, Gesundheit,
    Transport, Telekom) nach BSI 200-2 Standard-Absicherung mit Kern-Absicherung
    auf NET/OPS/DER-Bausteinen. Adressiert §8a BSIG-Auditpflicht, KRITIS-Verordnung
    und NIS2-Anforderungen. Hohe Reifegrad-Erwartung durch staatliche APT-Bedrohung
    und 24/7-Meldepflicht an BSI (§8b BSIG).
  description_en: |
    Baseline for Critical Infrastructure operators (energy, water, health, transport,
    telecom) following BSI 200-2 Standard Protection with Core Protection on
    NET/OPS/DER building blocks. Addresses §8a BSIG audit obligation, KRITIS
    regulation and NIS2 directive. High maturity expectations due to nation-state
    APT threat and 24/7 BSI notification duty (§8b BSIG).
  targets:
    "ISMS.1.A1":
      maturity_target: "5"
      reason: "KRITIS-Auditpflicht §8a BSIG: Leitungsverantwortung für ISMS muss formell und nachweisbar durch Geschäftsführung übernommen sein."
      reason_en: "KRITIS audit duty §8a BSIG: Top-management responsibility for the ISMS must be formally assumed and demonstrable."
    "ISMS.1.A2":
      maturity_target: "5"
      reason: "Sicherheitsleitlinie ist §8a-Pflichtnachweis — BSI prüft formale Verabschiedung und Aktualität alle 2 Jahre."
      reason_en: "Security policy is a §8a mandatory artefact — BSI reviews formal adoption and currency every 2 years."
    "ISMS.1.A3":
      maturity_target: "4"
      reason: "Eigene IS-Organisation mit hauptamtlichem ISB ist KRITIS-Standard, oft mit Stellvertreter wegen 24/7-Bereitschaft."
      reason_en: "Dedicated IS organisation with full-time ISO is KRITIS standard, often with deputy for 24/7 coverage."
    "ISMS.1.A4":
      maturity_target: "4"
      reason: "Ressourcenbereitstellung dokumentiert in §8a-Nachweis — Budget-Knappheit ist Audit-Findings-Klassiker bei KRITIS."
      reason_en: "Resource provision documented in §8a evidence — budget shortage is a classic audit finding in KRITIS."
    "ISMS.1.A5":
      maturity_target: "4"
      reason: "Einbindung aller Beschäftigten in IS-Prozess ist §8a-Pflicht und Voraussetzung für KRITIS-Zertifikat."
      reason_en: "Engagement of all staff in the IS process is mandatory under §8a and prerequisite for KRITIS certification."
    "ORP.1.A1":
      maturity_target: "4"
      reason: "Aufgaben/Verantwortungen schriftlich für KRITIS-Prozesse — Stellenbeschreibungen mit IS-Anteil sind Standard."
      reason_en: "Roles and responsibilities documented for KRITIS processes — job descriptions with IS responsibilities are standard."
    "ORP.2.A1":
      maturity_target: "4"
      reason: "Personal-Sicherheit (Background-Check, Verschwiegenheit) ist KRITIS-typisch wegen Zugang zu staatskritischen Anlagen."
      reason_en: "Personnel security (background checks, NDAs) is typical for KRITIS due to access to nationally critical facilities."
    "ORP.3.A1":
      maturity_target: "4"
      reason: "Sensibilisierungs-/Schulungsprogramm dokumentiert Pflicht — Phishing/Social-Engineering primärer KRITIS-Vektor."
      reason_en: "Awareness/training programme documented as mandatory — phishing/social engineering is the primary KRITIS vector."
    "ORP.3.A2":
      maturity_target: "4"
      reason: "Rollenbasierte Schulung für Krisenstab, Admins, Operatoren — KRITIS-Übungspflicht alle 2 Jahre nach BBK-Empfehlung."
      reason_en: "Role-based training for crisis team, admins, operators — KRITIS exercise duty every 2 years per BBK recommendation."
    "ORP.3.A3":
      maturity_target: "4"
      reason: "Erfolgsmessung (Phishing-Click-Rate, Quiz-Scores) ist KRITIS-Audit-Erwartung gegen wiederholte APT-Versuche."
      reason_en: "Effectiveness measurement (phishing click rate, quiz scores) is a KRITIS audit expectation against repeated APT attempts."
    "CON.1.A1":
      maturity_target: "4"
      reason: "Krypto-Konzept Pflicht für KRITIS — BSI TR-02102 wird im §8a-Audit als Mindeststandard geprüft."
      reason_en: "Crypto concept mandatory for KRITIS — BSI TR-02102 is reviewed as minimum standard in the §8a audit."
    "CON.2.A1":
      maturity_target: "4"
      reason: "Datenschutz-Konzept (DSGVO) flankiert KRITIS-Schutzbedarf bei Kunden-/Mitarbeiterdaten."
      reason_en: "Data protection concept (GDPR) flanks KRITIS protection needs for customer/employee data."
    "CON.3.A1":
      maturity_target: "5"
      reason: "Datensicherungskonzept ist KRITIS-Verfügbarkeits-Kern — BSI verlangt geprüfte Restore-Tests gegen Ransomware-APT."
      reason_en: "Backup concept is core to KRITIS availability — BSI requires verified restore tests against ransomware APTs."
    "CON.3.A2":
      maturity_target: "5"
      reason: "Festlegung Verfahrensweise Datensicherung — KRITIS-Betreiber brauchen offline/air-gapped Kopien und georedundante Lagerung gemäß BSIG §8a."
      reason_en: "Backup procedure definition — KRITIS operators require offline/air-gapped copies and geo-redundant storage per BSIG §8a."
    "CON.4.A1":
      maturity_target: "4"
      reason: "Auswahl/Beschaffung mit IS-Anforderungen ist §8a-Audit-Standard — Lieferantenrisiken (NIS2 Art. 21 (2) d)."
      reason_en: "Procurement with IS requirements is §8a audit standard — supplier risks (NIS2 Art. 21 (2) d)."
    "CON.4.A2":
      maturity_target: "4"
      reason: "Vertragsgestaltung mit IS-Klauseln und Audit-Recht ist NIS2-Pflicht für KRITIS-Zulieferer."
      reason_en: "Contract design with IS clauses and audit rights is NIS2 mandatory for KRITIS suppliers."
    "CON.4.A5":
      maturity_target: "4"
      reason: "Abnahmeprüfung neuer Komponenten bei KRITIS Pflicht — vor Produktiv-Übergabe Penetrationstest typisch."
      reason_en: "Acceptance testing of new components is mandatory in KRITIS — penetration test before go-live is typical."
    "CON.5.A1":
      maturity_target: "4"
      reason: "Löschkonzept für ausgemusterte Anlagen-IT — BSI verlangt zertifiziertes Vernichtungsverfahren bei KRITIS."
      reason_en: "Deletion concept for decommissioned plant IT — BSI requires certified destruction procedures in KRITIS."
    "CON.5.A2":
      maturity_target: "4"
      reason: "Verfahren zur sicheren Datenträger-Vernichtung dokumentiert; Zeugen-/Vier-Augen-Prinzip Standard."
      reason_en: "Procedures for secure media destruction documented; witness/four-eyes principle is standard."
    "CON.5.A7":
      maturity_target: "4"
      reason: "Eindeutige Regelungen für Cloud-/Outsourcing-Daten mit Rückgabe-/Löschnachweis — KRITIS-Kontrollerfordernis."
      reason_en: "Clear rules for cloud/outsourcing data with return/deletion evidence — KRITIS control requirement."
    "CON.11.A1":
      maturity_target: "4"
      reason: "Cloud-Nutzungsstrategie für KRITIS — Souveränitäts-/Lokalitätsanforderungen (BSI C5, EU-Datenraum)."
      reason_en: "Cloud usage strategy for KRITIS — sovereignty/locality requirements (BSI C5, EU data space)."
    "CON.11.A2":
      maturity_target: "4"
      reason: "Cloud-Sicherheitskonzept mit C5-Testaten — BSI verlangt für KRITIS-Workloads in Cloud zwingend C5-Typ-2."
      reason_en: "Cloud security concept with C5 attestations — BSI requires C5 Type 2 for KRITIS workloads in cloud."
    "OPS.1.1.2.A1":
      maturity_target: "5"
      reason: "Privilegierte IT-Administration ist KRITIS-Hochrisiko — PAM/Jump-Server, Vier-Augen, Session-Recording Standard."
      reason_en: "Privileged administration is KRITIS high risk — PAM/jump servers, four-eyes, session recording are standard."
    "OPS.1.1.3.A1":
      maturity_target: "5"
      reason: "Patch-Management ist KRITIS-Audit-Klassiker — BSI verlangt definierte SLAs (kritische CVE < 72h)."
      reason_en: "Patch management is a KRITIS audit classic — BSI requires defined SLAs (critical CVE < 72h)."
    "OPS.1.1.3.A2":
      maturity_target: "5"
      reason: "Schwachstellen-Management mit CVE-Feeds (CERT-Bund, BSI-WID) und priorisierter Behebung — §8a-Standard."
      reason_en: "Vulnerability management with CVE feeds (CERT-Bund, BSI WID) and prioritised remediation — §8a standard."
    "OPS.1.1.5.A1":
      maturity_target: "4"
      reason: "Protokollierung relevanter Ereignisse — KRITIS verlangt zentrale, manipulationssichere Logs (SIEM)."
      reason_en: "Logging of relevant events — KRITIS requires central, tamper-proof logs (SIEM)."
    "OPS.1.1.5.A2":
      maturity_target: "4"
      reason: "Auswertung der Protokolldaten in 24/7-SOC ist KRITIS-Standard für rechtzeitige APT-Erkennung."
      reason_en: "Log evaluation in 24/7 SOC is KRITIS standard for timely APT detection."
    "OPS.1.2.2.A1":
      maturity_target: "4"
      reason: "Geregelte Archivierung relevanter KRITIS-Daten (Anlagen-Logs, Steuerbefehle) für Forensik."
      reason_en: "Regulated archiving of KRITIS-relevant data (plant logs, control commands) for forensics."
    "OPS.1.2.3.A1":
      maturity_target: "4"
      reason: "Informationen zum Datenträgertausch — bei OT/SCADA-Updates oft physischer Transfer (USB-Sneakernet)."
      reason_en: "Information on media exchange — OT/SCADA updates often involve physical transfer (USB sneakernet)."
    "OPS.1.2.3.A2":
      maturity_target: "4"
      reason: "Sicherer Versand/Transport von Datenträgern — KRITIS verlangt versiegelte/getrackte Wege."
      reason_en: "Secure shipment/transport of media — KRITIS requires sealed/tracked routes."
    "OPS.1.2.3.A3":
      maturity_target: "4"
      reason: "Verschlüsselung mobiler Datenträger Pflicht (BSI TR-02102 / FIPS 140-2)."
      reason_en: "Encryption of mobile media is mandatory (BSI TR-02102 / FIPS 140-2)."
    "OPS.2.2.A1":
      maturity_target: "4"
      reason: "Cloud-Anbieter-Strategie für KRITIS mit C5/ISO-27017 Mindestnachweisen."
      reason_en: "Cloud provider strategy for KRITIS with C5/ISO 27017 minimum evidence."
    "OPS.2.2.A2":
      maturity_target: "4"
      reason: "Sicherheitskonzept für Cloud-Nutzung mit Exit-Strategie — NIS2 Art. 21 (2) d Lieferketten-Resilienz."
      reason_en: "Security concept for cloud usage with exit strategy — NIS2 Art. 21 (2) d supply chain resilience."
    "OPS.2.2.A3":
      maturity_target: "4"
      reason: "Service-Definition und SLAs vertraglich festgelegt — KRITIS verlangt Audit-Recht und Pönalen."
      reason_en: "Service definition and SLAs contractually agreed — KRITIS requires audit rights and penalties."
    "OPS.2.3.A1":
      maturity_target: "4"
      reason: "Outsourcing-Strategie mit IS-Anforderungen — NIS2 verschärft Anforderungen an Sub-Lieferanten."
