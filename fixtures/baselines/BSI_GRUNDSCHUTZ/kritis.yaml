    "OPS.2.3.A2":
      maturity_target: "4"
      reason: "Risikoanalyse Outsourcing — KRITIS-Lieferanten müssen vergleichbares Niveau erfüllen."
      reason_en: "Outsourcing risk analysis — KRITIS suppliers must meet comparable level."
    "OPS.2.3.A6":
      maturity_target: "4"
      reason: "Vertragsgestaltung mit IS-Klauseln, Berichtspflichten und Audit-Recht — §8a-Audit-Standard."
      reason_en: "Contract design with IS clauses, reporting duties and audit rights — §8a audit standard."
    "DER.1.A1":
      maturity_target: "5"
      reason: "Detektion ist KRITIS-Kern: SIEM, IDS/IPS, NDR, EDR — BSI Standard-Absicherung verlangt mehrschichtige Detektion."
      reason_en: "Detection is core to KRITIS: SIEM, IDS/IPS, NDR, EDR — BSI Standard Protection requires layered detection."
    "DER.2.1.A1":
      maturity_target: "5"
      reason: "Behandlung von Sicherheitsvorfällen mit 24/7-Bereitschaft — §8b BSIG-Meldung an BSI binnen 24h."
      reason_en: "Incident handling with 24/7 readiness — §8b BSIG notification to BSI within 24h."
    "DER.2.1.A2":
      maturity_target: "5"
      reason: "Etablierung Vorfallsbehandlung mit IRT, Playbooks, Eskalationsmatrix — KRITIS-Übungspflicht."
      reason_en: "Establishment of incident handling with IRT, playbooks, escalation matrix — KRITIS exercise duty."
    "DER.2.2.A1":
      maturity_target: "5"
      reason: "Vorsorge für Sicherheitsvorfälle (Forensik-Toolkit, Out-of-Band-Comms) — KRITIS-Krisenfall-Standard."
      reason_en: "Preparedness for incidents (forensic toolkit, out-of-band comms) — KRITIS crisis standard."
    "APP.1.A1":
      maturity_target: "4"
      reason: "Office-Produkte gehärtet — Makro-Restriktionen Pflicht gegen Phishing in KRITIS-Verwaltung."
      reason_en: "Office products hardened — macro restrictions mandatory against phishing in KRITIS administration."
    "APP.2.1.A1":
      maturity_target: "4"
      reason: "Active Directory ist KRITIS-Hochwertziel — Tier-Modell (BSI APP.2.1) und Privileged Access verpflichtend."
      reason_en: "Active Directory is a KRITIS high-value target — tier model (BSI APP.2.1) and Privileged Access mandatory."
    "APP.3.2.A1":
      maturity_target: "4"
