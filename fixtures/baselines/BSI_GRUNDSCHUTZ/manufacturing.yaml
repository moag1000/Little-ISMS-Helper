baseline:
  id: bsi-grundschutz-manufacturing
  name: 'BSI IT-Grundschutz - Fertigung / Industrie (TISAX/OT)'
  name_en: 'BSI IT-Grundschutz - Manufacturing / Industry (TISAX/OT)'
  industry: manufacturing
  description: |
    Baseline für produzierendes Gewerbe (Automotive, Maschinenbau, Chemie) nach
    BSI 200-2 Basis-Absicherung mit Standard-Absicherung auf NET/SYS/IND-Bausteinen.
    Adressiert TISAX VDA-ISA AL2/AL3, IEC 62443 für OT-Sicherheit, KRITIS-Industrie
    bei Schwellwert-Überschreitung sowie Produktions-Continuity. Schwerpunkt:
    OT/IT-Trennung, Anlagen-Verfügbarkeit und Lieferketten-Resilienz.
  description_en: |
    Baseline for manufacturing (automotive, machinery, chemicals) following BSI
    200-2 Basic Protection with Standard Protection on NET/SYS/IND building blocks.
    Addresses TISAX VDA-ISA AL2/AL3, IEC 62443 for OT security, KRITIS-Industry
    above thresholds and production continuity. Focus: OT/IT separation, plant
    availability and supply chain resilience.
  targets:
    "ISMS.1.A1":
      maturity_target: "3"
      reason: "Leitungsverantwortung — TISAX VDA-ISA 1.1 + Werks-/Produktionsleitung in IS-Steuerung einbinden."
      reason_en: "Top-management responsibility — TISAX VDA-ISA 1.1 + plant/production management embedded in IS governance."
    "ISMS.1.A2":
      maturity_target: "3"
      reason: "IS-Leitlinie — TISAX-Audit-Standard, Pflichtartefakt für AL2/AL3."
      reason_en: "IS policy — TISAX audit standard, mandatory artefact for AL2/AL3."
    "ISMS.1.A3":
      maturity_target: "3"
      reason: "IS-Organisation mit dediziertem ISB — bei Konzernen oft Werks-ISB plus zentraler CISO."
      reason_en: "IS organisation with dedicated ISO — at corporates often plant ISO plus central CISO."
    "ISMS.1.A4":
      maturity_target: "3"
      reason: "Ressourcen — Produktion vs. IT-Budget-Konkurrenz, IS-Investitionen müssen Anlagen-Verfügbarkeit unterstützen."
      reason_en: "Resources — production vs. IT budget competition, IS investments must support plant availability."
    "ISMS.1.A5":
      maturity_target: "3"
      reason: "Mitarbeiter-Einbindung in IS-Prozess inkl. Schichtarbeiter und Werker (USB-Disziplin, Phishing)."
      reason_en: "Staff engagement in IS process including shift workers and operators (USB discipline, phishing)."
    "ORP.1.A1":
      maturity_target: "3"
      reason: "Aufgaben/Verantwortungen — TISAX 1.2 RACI-Matrix, OT-Verantwortung klar trennen von IT."
      reason_en: "Roles and responsibilities — TISAX 1.2 RACI matrix, separate OT responsibility from IT."
    "ORP.2.A1":
      maturity_target: "3"
      reason: "Personal-Sicherheit — TISAX VDA-ISA 2.x, NDA für Konstruktionsdaten/Prototypen."
      reason_en: "Personnel security — TISAX VDA-ISA 2.x, NDAs for construction data/prototypes."
    "ORP.3.A1":
      maturity_target: "3"
      reason: "Sensibilisierungsprogramm — TISAX 2.1 mit Werker-spezifischen Schulungen (USB, Engineering-VPN)."
      reason_en: "Awareness programme — TISAX 2.1 with operator-specific training (USB, engineering VPN)."
    "ORP.3.A2":
      maturity_target: "3"
      reason: "Rollenbasierte Schulung für OT-Engineers, Konstrukteure und Sales (Spear-Phishing-Risiko)."
      reason_en: "Role-based training for OT engineers, designers and sales (spear phishing risk)."
    "ORP.3.A3":
      maturity_target: "3"
      reason: "Erfolgsmessung mit Phishing-Simulation und Teilnahmequote pro Werk."
      reason_en: "Effectiveness measurement with phishing simulation and per-plant participation rate."
    "CON.1.A1":
      maturity_target: "3"
      reason: "Krypto-Konzept — TISAX 6.4 Stand der Technik, BSI TR-02102. Konstruktionsdaten verschlüsselt."
      reason_en: "Crypto concept — TISAX 6.4 state of the art, BSI TR-02102. Construction data encrypted."
    "CON.2.A1":
      maturity_target: "3"
      reason: "Datenschutz-Konzept — Mitarbeiterdaten und Lieferanten-Daten DSGVO-relevant."
      reason_en: "Data protection concept — employee and supplier data are GDPR relevant."
    "CON.3.A1":
      maturity_target: "4"
      reason: "Datensicherungskonzept — Produktions-Stillstand bei Datenverlust extrem teuer; Air-Gapped-Backups gegen Ransomware."
      reason_en: "Backup concept — production downtime on data loss extremely expensive; air-gapped backups against ransomware."
    "CON.3.A2":
      maturity_target: "3"
      reason: "Festlegung Verfahrensweise Datensicherung — TISAX VDA-ISA 5.2.6 verlangt dokumentierte Backup-Verfahren auch für Engineering-Daten und MES-Konfigurationen."
      reason_en: "Backup procedure definition — TISAX VDA-ISA 5.2.6 requires documented backup procedures for engineering data and MES configurations."
    "CON.4.A1":
      maturity_target: "3"
      reason: "Auswahl/Beschaffung — TISAX 7.x Lieferanten-Audits, IS-Anforderungen in RFQ."
      reason_en: "Procurement — TISAX 7.x supplier audits, IS requirements in RFQ."
    "CON.4.A2":
      maturity_target: "3"
      reason: "Vertragsgestaltung mit Lieferanten — TISAX-Label-Anforderung an Tier-1/Tier-2 verbindlich."
      reason_en: "Supplier contracts — TISAX label requirement for Tier 1/Tier 2 binding."
    "CON.4.A5":
      maturity_target: "3"
      reason: "Abnahmeprüfung neuer Anlagen mit IT-Sicherheits-Komponente (FAT/SAT mit IS-Tests)."
      reason_en: "Acceptance testing of new plant with IT security component (FAT/SAT with IS tests)."
    "CON.5.A1":
      maturity_target: "3"
      reason: "Löschkonzept — Konstruktions-Altdaten mit Aufbewahrungsfrist nach BetrSichV/BHO."
      reason_en: "Deletion concept — legacy construction data with retention per BetrSichV/BHO."
    "CON.5.A2":
      maturity_target: "3"
      reason: "Sichere Datenträger-Vernichtung — alte SPS-Festplatten mit Konstruktions-IP."
      reason_en: "Secure media destruction — old PLC drives with construction IP."
    "CON.5.A7":
      maturity_target: "3"
      reason: "Cloud-/Outsourcing-Daten Rückgabe bei Engineering-PLM-Cloud-Diensten."
      reason_en: "Cloud/outsourcing data return for engineering PLM cloud services."
    "CON.11.A1":
      maturity_target: "3"
      reason: "Cloud-Strategie — Manufacturing-Execution-Systeme zunehmend Cloud, Souveränität wichtig."
      reason_en: "Cloud strategy — manufacturing execution systems increasingly cloud, sovereignty important."
    "CON.11.A2":
      maturity_target: "3"
      reason: "Cloud-Sicherheitskonzept — TISAX 7.4 Cloud-Anforderungen, C5 für Engineering-Daten."
      reason_en: "Cloud security concept — TISAX 7.4 cloud requirements, C5 for engineering data."
    "OPS.1.1.2.A1":
      maturity_target: "4"
      reason: "Privilegierte Administration — OT-Admins mit Jump-Hosts, IT/OT-Domain-Trennung."
      reason_en: "Privileged administration — OT admins with jump hosts, IT/OT domain separation."
    "OPS.1.1.3.A1":
      maturity_target: "3"
      reason: "Patch-Management — IT-Seite zeitnah; OT-Seite mit Wartungsfenster (oft quartalsweise) gem. IEC 62443."
      reason_en: "Patch management — IT side timely; OT side in maintenance windows (often quarterly) per IEC 62443."
    "OPS.1.1.3.A2":
      maturity_target: "3"
      reason: "Schwachstellen-Management — IT-Bereich mit Scans; OT mit passiver Erkennung (keine aktiven Scans auf SPS)."
      reason_en: "Vulnerability management — IT with scans; OT with passive detection (no active scans on PLCs)."
    "OPS.1.1.5.A1":
      maturity_target: "3"
      reason: "Protokollierung — OT/IT-Logs in zentralem SIEM mit Sanitization-Layer."
      reason_en: "Logging — OT/IT logs in central SIEM with sanitisation layer."
    "OPS.1.1.5.A2":
      maturity_target: "3"
      reason: "Auswertung Logs mit Use-Cases für OT-Anomalien (unerwartete SPS-Schreibzugriffe)."
      reason_en: "Log evaluation with use cases for OT anomalies (unexpected PLC writes)."
    "OPS.1.2.2.A1":
      maturity_target: "3"
      reason: "Archivierung Produktions-/Qualitätsdaten gem. ProdHaftG / ISO 9001."
      reason_en: "Archiving of production/quality data per ProdHaftG / ISO 9001."
    "OPS.1.2.3.A1":
      maturity_target: "3"
      reason: "Datenträgertausch in OT relevant — USB-Updates für Engineering-Workstations und SPS-Programme."
      reason_en: "Media exchange relevant in OT — USB updates for engineering workstations and PLC programs."
    "OPS.1.2.3.A2":
      maturity_target: "3"
      reason: "Sicherer Versand — geprüfte USB-Sticks (BadUSB-Schutz) mit Schleusen-PCs für OT."
      reason_en: "Secure shipment — vetted USB sticks (BadUSB protection) with airlock PCs for OT."
    "OPS.1.2.3.A3":
      maturity_target: "3"
      reason: "Verschlüsselung mobiler Datenträger Pflicht — Konstruktions-IP nicht in falsche Hände."
      reason_en: "Encryption of mobile media mandatory — construction IP must not fall into wrong hands."
    "OPS.2.2.A1":
      maturity_target: "3"
      reason: "Cloud-Anbieter-Strategie — PLM/CAD-Cloud-Dienste (Siemens Teamcenter, PTC) typisch."
      reason_en: "Cloud provider strategy — PLM/CAD cloud services (Siemens Teamcenter, PTC) typical."
    "OPS.2.2.A2":
      maturity_target: "3"
      reason: "Sicherheitskonzept Cloud — Engineering-Daten mit Lokalitäts-/Souveränitäts-Anforderungen."
      reason_en: "Cloud security concept — engineering data with locality/sovereignty requirements."
    "OPS.2.2.A3":
      maturity_target: "3"
      reason: "Service-Definition — SLAs müssen Produktions-Verfügbarkeit unterstützen."
