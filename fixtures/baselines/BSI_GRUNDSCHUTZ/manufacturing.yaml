      reason_en: "Detection — IT with SIEM/EDR; OT with passive NDR (Claroty, Nozomi, Dragos)."
    "DER.2.1.A1":
      maturity_target: "3"
      reason: "Vorfallsbehandlung mit OT-Notbetrieb-Plan — Produktions-Stillstand muss kalkulierbar sein."
