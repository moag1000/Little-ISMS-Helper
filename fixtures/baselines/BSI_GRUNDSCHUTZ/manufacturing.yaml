    "OPS.2.3.A1":
      maturity_target: "3"
      reason: "Outsourcing-Strategie — Wartungsdienstleister an SPS/Robotern strategisch."
      reason_en: "Outsourcing strategy — service providers maintaining PLCs/robots are strategic."
    "OPS.2.3.A2":
      maturity_target: "3"
