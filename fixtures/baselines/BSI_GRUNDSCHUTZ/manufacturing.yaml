    "DER.2.2.A1":
      maturity_target: "3"
      reason: "Vorsorge — OT-Recovery-Images, Konfigurations-Snapshots in safe location."
      reason_en: "Preparedness — OT recovery images, configuration snapshots in safe location."
    "APP.1.A1":
      maturity_target: "3"
      reason: "Office-Härtung — Makros restriktiv, Konstruktionsdaten oft in Excel/CAD-Begleitdoks."
