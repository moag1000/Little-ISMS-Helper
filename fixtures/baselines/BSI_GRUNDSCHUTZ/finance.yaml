baseline:
  id: bsi-grundschutz-finance
  name: 'BSI IT-Grundschutz - Finanzdienstleister (Banken/Versicherungen)'
  name_en: 'BSI IT-Grundschutz - Financial Services (Banks/Insurers)'
  industry: finance
  description: |
    Baseline für regulierte Finanzdienstleister (Banken, Versicherer, FinTechs)
    nach BSI 200-2 Standard-Absicherung mit Kern-Absicherung auf
    Identitäts-/Krypto-/Detektions-Bausteinen. Adressiert MaRisk AT 7.2, BAIT/VAIT,
    DORA Art. 9/17 und EBA-Guidelines on ICT Risk Management. Hohes Reifegrad-
    Niveau wegen BaFin-Sonderprüfungen und finanzieller Hebelwirkung von
    IT-Risiken.
  description_en: |
    Baseline for regulated financial services (banks, insurers, FinTechs) following
    BSI 200-2 Standard Protection with Core Protection on identity/crypto/detection
    building blocks. Addresses MaRisk AT 7.2, BAIT/VAIT, DORA Art. 9/17 and EBA
    Guidelines on ICT Risk Management. High maturity required due to BaFin special
    audits and the financial leverage of IT risks.
  targets:
    "ISMS.1.A1":
      maturity_target: "5"
      reason: "Leitungsverantwortung ist MaRisk AT 4.3 / BAIT-Kapitel 2 Pflicht — Vorstand muss IS-Strategie persönlich verantworten."
      reason_en: "Top-management responsibility is mandatory under MaRisk AT 4.3 / BAIT chapter 2 — the board must personally own IS strategy."
    "ISMS.1.A2":
      maturity_target: "5"
      reason: "IS-Leitlinie ist BAIT 3.1 / DORA Art. 6 Pflicht — formal verabschiedet, jährlich reviewt, BaFin-prüfungsfest."
      reason_en: "IS policy is mandatory under BAIT 3.1 / DORA Art. 6 — formally adopted, annually reviewed, BaFin audit-proof."
    "ISMS.1.A3":
      maturity_target: "4"
      reason: "IS-Organisation mit hauptamtlichem ISB — BAIT 3.2 verlangt ausreichend Ressourcen und unabhängige Position."
      reason_en: "IS organisation with full-time CISO — BAIT 3.2 requires sufficient resources and independent position."
    "ISMS.1.A4":
      maturity_target: "4"
      reason: "Ressourcen für IS-Prozess sind in DORA Art. 5 / Art. 6 explizit gefordert; BaFin-Prüfung adressiert Underfunding."
      reason_en: "Resources for the IS process are explicitly required by DORA Art. 5 / Art. 6; BaFin audits address underfunding."
    "ISMS.1.A5":
      maturity_target: "4"
      reason: "Mitarbeiter-Einbindung in IS-Prozess — MaRisk AT 7.1 verlangt nachvollziehbare Awareness-Programme."
      reason_en: "Staff engagement in the IS process — MaRisk AT 7.1 requires traceable awareness programmes."
    "ORP.1.A1":
      maturity_target: "4"
      reason: "Aufgaben/Verantwortungen schriftlich — MaRisk AT 4.3.1, Funktionstrennung (SoD) audit-relevant."
      reason_en: "Roles and responsibilities documented — MaRisk AT 4.3.1, segregation of duties is audit-relevant."
    "ORP.2.A1":
      maturity_target: "4"
      reason: "Personal-Sicherheit (Background-Check, KWG §25a) — Bank-Mitarbeiter mit Zugang zu Handelssystemen erweiterte Prüfung."
      reason_en: "Personnel security (background checks, KWG §25a) — bank staff with access to trading systems require extended vetting."
    "ORP.3.A1":
      maturity_target: "4"
      reason: "Sensibilisierungsprogramm Pflicht — BAIT 3.3, Phishing-Awareness gegen CEO-Fraud kritisch."
      reason_en: "Awareness programme mandatory — BAIT 3.3, phishing awareness against CEO fraud is critical."
    "ORP.3.A2":
      maturity_target: "4"
      reason: "Rollenbasierte Schulung — Händler, Treasury, Admins haben spezifische IS-Themen (Insider-Trading, Marktabuse)."
      reason_en: "Role-based training — traders, treasury, admins have specific IS topics (insider trading, market abuse)."
    "ORP.3.A3":
      maturity_target: "4"
      reason: "Erfolgsmessung Awareness — BaFin verlangt KPIs und Maßnahmen bei wiederkehrenden Phishing-Klicks."
      reason_en: "Awareness effectiveness measurement — BaFin requires KPIs and corrective action on repeated phishing clicks."
    "CON.1.A1":
      maturity_target: "5"
      reason: "Krypto-Konzept Kern-Absicherung — BSI TR-02102 + PCI-DSS für Kartendaten + EBA-PSD2-Anforderungen an Strong Authentication."
      reason_en: "Crypto concept Core Protection — BSI TR-02102 + PCI-DSS for card data + EBA PSD2 strong authentication requirements."
    "CON.2.A1":
      maturity_target: "4"
      reason: "Datenschutz-Konzept — Kunden-Finanzdaten sind DSGVO-besondere Risikokategorie; Bankgeheimnis (§ 39 KWG)."
      reason_en: "Data protection concept — customer financial data is a GDPR high-risk category; banking secrecy (§ 39 KWG)."
    "CON.3.A1":
      maturity_target: "4"
      reason: "Datensicherungskonzept — DORA Art. 12 verlangt Backup-Strategie mit RTO/RPO und regelmäßigen Restore-Tests."
      reason_en: "Backup concept — DORA Art. 12 requires backup strategy with RTO/RPO and regular restore tests."
    "CON.3.A2":
      maturity_target: "4"
      reason: "Festlegung Verfahrensweise Datensicherung — BAIT 7.4 / DORA Art. 12 (3) verlangt dokumentierte Backup-Frequenzen, Aufbewahrung und Offsite-Lagerung."
      reason_en: "Backup procedure definition — BAIT 7.4 / DORA Art. 12 (3) requires documented backup frequency, retention and off-site storage."
    "CON.4.A1":
      maturity_target: "4"
      reason: "Auswahl/Beschaffung mit IS-Klauseln — DORA Art. 28-30 Drittanbieter-Risiko-Management Pflicht."
      reason_en: "Procurement with IS clauses — DORA Art. 28-30 third-party risk management mandatory."
    "CON.4.A2":
      maturity_target: "4"
      reason: "Vertragsgestaltung mit Audit-Recht — DORA Art. 30 verlangt vertragliche Mindestinhalte für ICT-Provider."
      reason_en: "Contract design with audit rights — DORA Art. 30 requires contractual minimum content for ICT providers."
    "CON.4.A5":
      maturity_target: "4"
      reason: "Abnahmeprüfung neuer Komponenten — vor Produktiv-Einsatz (Trading-/Core-Banking) ist Pen-Test BaFin-Erwartung."
      reason_en: "Acceptance testing of new components — pen test before go-live (trading/core banking) is BaFin expectation."
    "CON.5.A1":
      maturity_target: "4"
      reason: "Löschkonzept — BaFin-Aufbewahrungspflichten 6/10 Jahre + DSGVO-Löschpflicht parallel managen."
      reason_en: "Deletion concept — BaFin retention obligations of 6/10 years plus GDPR deletion obligations managed in parallel."
    "CON.5.A2":
      maturity_target: "4"
      reason: "Sichere Datenträger-Vernichtung mit Zertifikat — Kunden-Daten/Verträge dürfen nicht rekonstruierbar sein."
      reason_en: "Secure media destruction with certificate — customer data/contracts must not be reconstructible."
    "CON.5.A7":
      maturity_target: "4"
      reason: "Cloud-/Outsourcing-Daten Rückgabe — DORA Exit-Strategie Art. 28 (8) Pflicht."
      reason_en: "Cloud/outsourcing data return — DORA exit strategy Art. 28 (8) mandatory."
    "CON.11.A1":
      maturity_target: "4"
      reason: "Cloud-Strategie — BaFin Cloud-Rundschreiben + DORA Drittanbieter-Register Pflicht."
      reason_en: "Cloud strategy — BaFin cloud circular + DORA third-party register mandatory."
    "CON.11.A2":
      maturity_target: "4"
      reason: "Cloud-Sicherheitskonzept — BaFin verlangt C5-Typ-2 oder ISO-27017 + Lokalitäts-/Souveränitäts-Klauseln."
      reason_en: "Cloud security concept — BaFin requires C5 Type 2 or ISO 27017 plus locality/sovereignty clauses."
    "OPS.1.1.2.A1":
      maturity_target: "5"
      reason: "Privilegierte Administration ist BAIT 6 Pflicht — PAM, MFA, Vier-Augen-Prinzip, Session-Recording."
      reason_en: "Privileged administration is mandatory under BAIT 6 — PAM, MFA, four-eyes principle, session recording."
    "OPS.1.1.3.A1":
      maturity_target: "4"
      reason: "Patch-Management — DORA Art. 9 verlangt zeitnahe Schwachstellenbeseitigung; SLAs nach Kritikalität."
      reason_en: "Patch management — DORA Art. 9 requires timely vulnerability remediation; SLAs by criticality."
    "OPS.1.1.3.A2":
      maturity_target: "4"
      reason: "Schwachstellen-Management — BAIT 6 verlangt regelmäßige Scans + Bewertung + Tracking bis Behebung."
      reason_en: "Vulnerability management — BAIT 6 requires regular scans, assessment, and tracking to resolution."
    "OPS.1.1.5.A1":
      maturity_target: "4"
      reason: "Protokollierung — MaRisk AT 7.2 + DORA Art. 17 zentrale Logging-Pflicht inkl. Adminzugriffe."
      reason_en: "Logging — MaRisk AT 7.2 + DORA Art. 17 central logging duty including admin access."
    "OPS.1.1.5.A2":
      maturity_target: "4"
      reason: "Auswertung Logs — Fraud-Detection und Marktmissbrauchs-Monitoring (MAR) verlangen aktive Auswertung."
      reason_en: "Log evaluation — fraud detection and market abuse monitoring (MAR) require active analysis."
    "OPS.1.2.2.A1":
      maturity_target: "4"
      reason: "Archivierung — HGB §257 / AO §147 Aufbewahrungspflichten 6/10 Jahre für Buchungs-/Handelsdaten."
      reason_en: "Archiving — HGB §257 / AO §147 retention 6/10 years for accounting/trading data."
    "OPS.1.2.3.A1":
      maturity_target: "3"
