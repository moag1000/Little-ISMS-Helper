baseline:
  id: dora-saas
  name: 'DORA - Cloud-SaaS / Software-Anbieter'
  name_en: 'DORA - Cloud SaaS / Software Vendor'
  industry: saas
  description: |
    Baseline für Cloud-SaaS-Anbieter mit Multi-Tenant-Architektur. Customer-Audits
    (SOC 2, ISO 27001, BSI-C5) treiben die Reife. Fokus: IAM, Crypto, Secure-SDLC,
    Mandantenabgrenzung, Vulnerability-Management. BCM moderat, da Hyperscaler-IaaS
    viel abdeckt.
  description_en: |
    Baseline for cloud SaaS vendors with multi-tenant architecture. Customer audits
    (SOC 2, ISO 27001, BSI-C5) drive maturity. Focus: IAM, crypto, secure SDLC, tenant
    separation, vulnerability management. BCM moderate as hyperscaler IaaS covers much.
  targets:
    "Art.5":
      maturity_target: "4"
      reason: "ICT-Risk-Mgmt-Framework für Cloud-SaaS: Customer-Audits (SOC 2, ISO 27001) verlangen formelle Policies, Trust-Center-Veröffentlichung Standard."
      reason_en: "ICT risk mgmt framework for cloud SaaS: customer audits (SOC 2, ISO 27001) demand formal policies; trust-centre publication is standard."
    "Art.6":
      maturity_target: "4"
      reason: "ICT-Risk-Strategie für Cloud-SaaS: Customer-Audits (SOC 2, ISO 27001) verlangen formelle Policies, Trust-Center-Veröffentlichung Standard."
      reason_en: "ICT risk strategy for cloud SaaS: customer audits (SOC 2, ISO 27001) demand formal policies; trust-centre publication is standard."
    "Art.7":
      maturity_target: "4"
      reason: "ICT-Systeme und Tools für Cloud-SaaS: Cloud-Asset-Inventar via CSPM-Tools ist Standard, Shadow-IT-Risiko durch SaaS-Wildwuchs."
      reason_en: "ICT systems and tools for cloud SaaS: cloud asset inventory via CSPM tools is standard; shadow IT risk via SaaS sprawl."
    "Art.8":
      maturity_target: "4"
      reason: "Asset-Identifikation für Cloud-SaaS: Cloud-Asset-Inventar via CSPM-Tools ist Standard, Shadow-IT-Risiko durch SaaS-Wildwuchs."
      reason_en: "Identification for cloud SaaS: cloud asset inventory via CSPM tools is standard; shadow IT risk via SaaS sprawl."
    "Art.9":
      maturity_target: "5"
      reason: "Schutz und Prävention für Cloud-SaaS: SaaS-Multi-Tenant erzwingt strikte IAM mit MFA, SSO und SCIM-Provisioning — Customer-Pflichtanforderung."
      reason_en: "Protection and prevention for cloud SaaS: multi-tenant SaaS forces strict IAM with MFA, SSO and SCIM provisioning — customer mandate."
    "Art.10":
      maturity_target: "4"
      reason: "Detection für Cloud-SaaS: Cloud-native SIEM mit Anomalie-Detection auf Tenant-Ebene ist Standard, BSI-C5-OPS-10 verlangt Logging."
      reason_en: "Detection for cloud SaaS: cloud-native SIEM with tenant-level anomaly detection is standard; BSI-C5 OPS-10 mandates logging."
    "Art.11":
      maturity_target: "4"
      reason: "Response and Recovery für Cloud-SaaS: Customer-SLAs und DSGVO Art. 33 (72h) zwingen zu strukturiertem Incident-Response mit Statuspage-Kommunikation."
      reason_en: "Response and recovery for cloud SaaS: customer SLAs and GDPR Art. 33 (72h) force structured incident response with statuspage comms."
    "Art.12":
      maturity_target: "3"
      reason: "Backup und Restore für Cloud-SaaS: Hyperscaler-IaaS deckt Infrastruktur-Resilienz weitgehend ab; Multi-Region-Aktiv/Passiv ist Mindestbild."
      reason_en: "Backup and restoration for cloud SaaS: hyperscaler IaaS covers most infra resilience; multi-region active/passive is the minimum."
    "Art.13":
      maturity_target: "4"
      reason: "Learning und Evolving für Cloud-SaaS: parallele Frameworks (SOC 2, ISO 27001, BSI-C5, DSGVO) effizient via Mappings und Data-Reuse handhaben."
      reason_en: "Learning and evolving for cloud SaaS: parallel frameworks (SOC 2, ISO 27001, BSI-C5, GDPR) handled efficiently via mappings and data reuse."
    "Art.14":
      maturity_target: "4"
      reason: "Krisen-Kommunikation für Cloud-SaaS: Customer-SLAs und DSGVO Art. 33 (72h) zwingen zu strukturiertem Incident-Response mit Statuspage-Kommunikation."
      reason_en: "Communication for cloud SaaS: customer SLAs and GDPR Art. 33 (72h) force structured incident response with statuspage comms."
    "Art.15":
      maturity_target: "4"
      reason: "Simplified Framework für Cloud-SaaS: parallele Frameworks (SOC 2, ISO 27001, BSI-C5, DSGVO) effizient via Mappings und Data-Reuse handhaben."
      reason_en: "Simplified framework for cloud SaaS: parallel frameworks (SOC 2, ISO 27001, BSI-C5, GDPR) handled efficiently via mappings and data reuse."
    "Art.17":
      maturity_target: "4"
      reason: "ICT-Incident-Mgmt für Cloud-SaaS: Customer-SLAs und DSGVO Art. 33 (72h) zwingen zu strukturiertem Incident-Response mit Statuspage-Kommunikation."
      reason_en: "ICT incident mgmt for cloud SaaS: customer SLAs and GDPR Art. 33 (72h) force structured incident response with statuspage comms."
    "Art.24":
      maturity_target: "5"
      reason: "Resilience-Testing für Cloud-SaaS: kontinuierliches Patch-Management mit Container-Scanning und automatischem CVE-Triaging ist Marktstandard."
      reason_en: "Operational resilience testing for cloud SaaS: continuous patch mgmt with container scanning and automated CVE triage is market standard."
    "Art.28":
      maturity_target: "4"
      reason: "Third-Party-Risk für Cloud-SaaS: Sub-Processor-Listen (DPA-Pflicht) und Hyperscaler-Audit-Reports sind im Vendor-Mgmt zu führen."
      reason_en: "Third-party risk mgmt for cloud SaaS: sub-processor lists (DPA mandate) and hyperscaler audit reports must be tracked in vendor mgmt."
    "Art.30":
      maturity_target: "4"
      reason: "Vertragsklauseln für Cloud-SaaS: Sub-Processor-Listen (DPA-Pflicht) und Hyperscaler-Audit-Reports sind im Vendor-Mgmt zu führen."
      reason_en: "Contractual provisions for cloud SaaS: sub-processor lists (DPA mandate) and hyperscaler audit reports must be tracked in vendor mgmt."
