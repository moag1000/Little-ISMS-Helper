incidents:
  - incidentNumber: 'INC-2024-001'
    title: 'Phishing-E-Mail führt zu Kompromittierung von Zugangsdaten'
    affectedAssets:
      - 'ref:asset:Email-Server MAIL-01'
      - 'ref:asset:Mitarbeiter-Laptops (50 Stück)'
      - 'ref:asset:Active Directory Server AD-01'
    description: 'Ein Mitarbeiter hat auf eine Phishing-E-Mail reagiert und seine Active Directory-Zugangsdaten auf einer gefälschten Login-Seite eingegeben.'
    category: 'phishing'
    severity: 'high'
    status: 'resolved'
    detectedAt: '2024-01-15 09:30:00'
    reportedBy: 'IT-Service-Desk'
    resolvedAt: '2024-01-15 14:30:00'
    affectedSystems: 'Active Directory, E-Mail-System'
    rootCause: 'Unzureichende Awareness-Schulung, fehlende E-Mail-Filter'
    correctiveActions: 'Passwort-Reset, MFA aktiviert, Awareness-Schulung durchgeführt'
    preventiveActions: 'Implementierung erweiterter E-Mail-Filter, regelmäßige Phishing-Simulationen'
    dataBreachOccurred: true
    notificationRequired: false
    lessonsLearned: 'Multi-Faktor-Authentifizierung ist essentiell, regelmäßige Schulungen notwendig'

  - incidentNumber: 'INC-2024-002'
    title: 'Ausfall des Hauptdatenbankservers durch Hardwaredefekt'
    affectedAssets:
      - 'ref:asset:Datenbankserver DB-PROD-01'
    description: 'Der primäre Datenbankserver ist aufgrund eines Festplattendefekts ausgefallen.'
    category: 'system_failure'
    severity: 'critical'
    status: 'resolved'
    detectedAt: '2024-02-03 14:15:00'
    reportedBy: 'Monitoring-System'
    resolvedAt: '2024-02-03 18:45:00'
    affectedSystems: 'DB-PROD-01, Webanwendungen, CRM-System'
    rootCause: 'Hardware-Alter, fehlende redundante Komponenten'
    correctiveActions: 'Failover auf Backup-Datenbank, Austausch defekter Hardware'
    preventiveActions: 'Implementierung RAID-System, Hardware-Refresh-Zyklus etabliert'
    dataBreachOccurred: false
    notificationRequired: false
    lessonsLearned: 'Redundanz bei kritischen Komponenten ist essentiell'

  - incidentNumber: 'INC-2024-003'
    title: 'Versehentliche Löschung von Kundendaten'
    affectedAssets:
      - 'ref:asset:Kundendatenbank'
      - 'ref:asset:CRM-System'
    description: 'Ein Mitarbeiter hat versehentlich einen falschen SQL-Befehl ausgeführt und Kundendaten gelöscht.'
    category: 'data_loss'
    severity: 'high'
    status: 'resolved'
    detectedAt: '2024-01-22 11:00:00'
    reportedBy: 'Datenbank-Administrator'
    resolvedAt: '2024-01-22 15:30:00'
    affectedSystems: 'Kundendatenbank'
    rootCause: 'Fehlende Berechtigungstrennung, keine Vier-Augen-Prinzip bei kritischen Operationen'
    correctiveActions: 'Wiederherstellung aus Backup, Einschränkung von Datenbankberechtigungen'
    preventiveActions: 'Implementierung Vier-Augen-Prinzip, Read-Only Zugriff für Standard-User'
    dataBreachOccurred: false
    notificationRequired: false
    lessonsLearned: 'Least-Privilege-Prinzip konsequent umsetzen'

  - incidentNumber: 'INC-2024-004'
    title: 'DDoS-Angriff auf Webserver'
    affectedAssets:
      - 'ref:asset:Webserver WEB-PROD-01'
      - 'ref:asset:Firewall FW-MAIN-01'
    description: 'Ein DDoS-Angriff hat die Webserver überlastet und zu temporärer Nichtverfügbarkeit geführt.'
    category: 'malware'
    severity: 'medium'
    status: 'resolved'
    detectedAt: '2024-02-10 08:45:00'
    reportedBy: 'Network Operations Center'
    resolvedAt: '2024-02-10 12:30:00'
    affectedSystems: 'Webserver WEB-PROD-01, Online-Shop'
    rootCause: 'Fehlende DDoS-Schutzmaßnahmen'
    correctiveActions: 'Aktivierung von Cloudflare DDoS-Schutz, Rate-Limiting implementiert'
    preventiveActions: 'Permanent aktivierter DDoS-Schutz, Monitoring verbessert'
    dataBreachOccurred: false
    notificationRequired: false
    lessonsLearned: 'Externe DDoS-Schutzservices sind für öffentliche Services essentiell'

  - incidentNumber: 'INC-2024-005'
    title: 'Malware-Infektion auf Mitarbeiter-Laptop'
    affectedAssets:
      - 'ref:asset:Mitarbeiter-Laptops (50 Stück)'
    description: 'Ein Mitarbeiter-Laptop wurde mit Malware infiziert durch Download aus unsicherer Quelle.'
    category: 'malware'
    severity: 'medium'
    status: 'resolved'
    detectedAt: '2024-01-28 13:20:00'
    reportedBy: 'EDR-Alert'
    resolvedAt: '2024-01-28 16:00:00'
    affectedSystems: 'Mitarbeiter-Laptop LAP-42'
    rootCause: 'Veraltete Antivirus-Software, fehlende Application-Whitelisting'
    correctiveActions: 'Laptop neu aufgesetzt, Antivirus aktualisiert'
    preventiveActions: 'Automatische Antivirus-Updates, Application-Whitelisting eingeführt'
    dataBreachOccurred: false
    notificationRequired: false
    lessonsLearned: 'Endpoint-Protection muss aktuell und zentral verwaltet werden'

  - incidentNumber: 'INC-2024-006'
    title: 'Unbefugter Zugriff auf Netzwerk-Share'
    affectedAssets:
      - 'ref:asset:Active Directory Server AD-01'
    description: 'Ein ehemaliger Mitarbeiter hatte noch Zugriff auf Netzwerk-Shares nach Austritt.'
    category: 'unauthorized_access'
    severity: 'high'
    status: 'resolved'
    detectedAt: '2024-02-15 10:00:00'
    reportedBy: 'Access-Review'
    resolvedAt: '2024-02-15 12:00:00'
    affectedSystems: 'File-Server, Active Directory'
    rootCause: 'Fehlende automatisierte Offboarding-Prozesse'
    correctiveActions: 'Sofortiges Deaktivieren aller Accounts, Änderung von Share-Passwörtern'
    preventiveActions: 'Automatisierter Offboarding-Workflow implementiert, regelmäßige Access-Reviews'
    dataBreachOccurred: true
    notificationRequired: false
    lessonsLearned: 'Automatisierte Identity-Lifecycle-Prozesse sind kritisch'

  - incidentNumber: 'INC-2024-007'
    title: 'Datenverlust durch fehlerhafte Migration'
    affectedAssets:
      - 'ref:asset:CRM-System'
      - 'ref:asset:Personalakten-System'
    description: 'Bei einer Datenmigration auf neuen Server sind durch Skript-Fehler Daten verloren gegangen.'
    category: 'data_loss'
    severity: 'medium'
    status: 'resolved'
    detectedAt: '2024-01-12 16:00:00'
    reportedBy: 'Migrations-Team'
    resolvedAt: '2024-01-13 10:00:00'
    affectedSystems: 'Archiv-Datenbank'
    rootCause: 'Unzureichende Testing der Migrations-Skripte, fehlendes Rollback-Plan'
    correctiveActions: 'Wiederherstellung aus Archiv-Backup'
    preventiveActions: 'Migrations-Checkliste erstellt, Vier-Augen-Prinzip bei Migrationen'
    dataBreachOccurred: false
    notificationRequired: false
    lessonsLearned: 'Umfassende Tests und Rollback-Pläne sind bei Migrationen essentiell'
