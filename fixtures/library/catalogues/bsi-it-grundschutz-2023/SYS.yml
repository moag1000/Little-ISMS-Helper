  - id: SYS.4.5
    title: 'Wechseldatentraeger'
    description: 'Anforderungen an die geregelte und sichere Nutzung von Wechseldatentraegern.'
    anforderungen:
      basis:
        - id: SYS.4.5.A1
          title: 'Regelung zur Nutzung von Wechseldatentraegern'
          requirement_text: 'Fuer den Einsatz von Wechseldatentraegern (USB-Sticks, externe Festplatten, CD/DVD) MUSS eine Richtlinie festgelegt werden, die zulaessige Geraete, Ein-/Ausgangs-Prozesse und Schutzanforderungen regelt.'
        - id: SYS.4.5.A2
          title: 'Sichere Verwendung von Wechseldatentraegern'
          requirement_text: 'Auf Wechseldatentraegern gespeicherte vertrauliche Daten MUESSEN verschluesselt sein. Nur freigegebene Datentraeger DUERFEN an Firmen-Clients angeschlossen werden.'
        - id: SYS.4.5.A3
          title: 'Sicheres Loeschen und Vernichten von Wechseldatentraegern'
          requirement_text: 'Vor der Wiederverwendung oder Entsorgung MUESSEN Wechseldatentraeger sicher geloescht oder physisch zerstoert werden. Siehe BSI Kompendium 2023 Baustein SYS.4.5 Anforderung A3.'
