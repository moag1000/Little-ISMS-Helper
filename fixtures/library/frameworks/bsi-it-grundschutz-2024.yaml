# https://www.bsi.bund.de/IT-Grundschutz-Kompendium
#
# HINWEIS: Dieses File enthaelt 15 representative Bausteine als ausgearbeitete
# Beispiele (Sprint 10A). Vollstaendige 111-Baustein-Erfassung ist eine
# separate operative Aufgabe. TODO-Marker zeigen fehlende Schicht-Abschnitte.
