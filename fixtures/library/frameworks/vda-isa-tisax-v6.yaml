# TISAX VDA ISA v6.0 - number-enumerated catalogue (ENX-licence compliant)
#
# Ships the canonical VDA-ISA 6.0 control-NUMBER enumeration (80 controls) plus
# the category structure. Control NUMBERS are non-copyrightable facts and ARE
# shipped; the ENX-licensed Volltext (Kontrollfrage / Ziel / Massnahme / Doku)
# is NEVER shipped and arrives solely via the user's BYO workbook upload,
# matched onto these rows by controlId.
#
# A fresh tenant therefore gets the full applicable catalogue as Reifegrad-0
# gaps; the BYO-Import wizard (requires a valid ENX licence) supplies the text
# and Reifegrad. Single canonical catalogue -- no parallel pre-seeded set.
#
# Legal reference: ENX_VDA_ISA_LICENSING_ANALYSIS.md (numbers-shippable premise)
metadata:
  code: TISAX
  name: TISAX (VDA-ISA 6.0)
  version: "6.0"
  description: Information security assessment standard for the automotive industry (VDA-ISA 6.0). Control numbers shipped; full text via licensed BYO workbook upload.
  releaseDate: "2024-03-01"
  body: Verband der Automobilindustrie (VDA) / ENX Association
  language: de
  externalReference: https://enx.com/en-US/TISAX/
  requiresUpload: true
  legalNote: >
    VDA-ISA workbook is ENX Association-licensed. Original content
    not redistributed. Use BYO-Import wizard for your licensed copy.

# Maturity levels per ISO/IEC 33020 (generic -- not ENX-specific content)
maturityLevels:
  0: { code: incomplete,   name: Incomplete   }
  1: { code: performed,    name: Performed    }
  2: { code: managed,      name: Managed      }
  3: { code: established,  name: Established  }
  4: { code: predictable,  name: Predictable  }
  5: { code: optimising,   name: Optimising   }

# Category structure (publicly documented TISAX scope areas)
categories:
  - code: information_security
    name: Information Security
  - code: prototype_protection
    name: Prototype Protection
  - code: data_protection
    name: Data Protection

# Canonical VDA-ISA 6.0 control-number enumeration (ENX-licence compliant).
# NUMBERS ONLY -- a control number is a non-copyrightable fact; the ENX-
# licensed Volltext (Kontrollfrage / Ziel / Massnahme) is NEVER shipped here
# and arrives solely via the user's BYO workbook upload, matched by controlId.
# Verified against the official ISA6_DE_6.0.2 workbook: 80 controls
# (Information Security 46 + Prototype Protection 22 + Data Protection 12).
# These rows are the shared catalogue baseline: a fresh tenant sees the full
# applicable catalogue as Reifegrad-0 gaps; the upload fills text + Reifegrad.
