schema_version: '1.1'
library:
  type: mapping
  id: 'bsi-c5-2020_to_bsi-c5-2026_v1.0'
  source_framework: 'BSI-C5'
  target_framework: 'BSI-C5-2026'
  version: 1
  effective_from: '2026-05-06'
  effective_until: null

  provenance:
    primary_source: 'BSI C5:2020 Kriterienkatalog (offiziell veröffentlicht) sowie öffentliche Konsultation zum BSI C5:2026 Nachfolge-Catalogue (2025/2026).'
    primary_source_url: 'https://www.bsi.bund.de/SharedDocs/Downloads/DE/BSI/CloudComputing/Kriterienkatalog/C5_2020.html'
    secondary_sources:
      - 'BSI C5:2020 Anlage A — Vergleichstabelle ISO 27001 ↔ BSI C5'
      - 'Öffentliche Konsultations- und Workshop-Materialien zur C5:2026-Revision (BSI/Branchenverbände 2025)'
      - 'EUCS-Draft (ENISA EU Cloud Services Scheme) als Referenz für Container/Supply-Chain-Erweiterungen'
      - 'Existing fixture: bsi-c5-2020_to_iso27001-2022_v1.0.yaml (Strukturvorlage)'
    publisher: 'Little ISMS Helper Maintainers'

  methodology:
    type: 'expert_inference_pre_publication'
    description: |
      Forward-Mapping vom etablierten BSI C5:2020-Catalogue zu Kontrollen/Themenbereichen
      des kommenden BSI C5:2026-Catalogue. Erstellt auf Basis der öffentlichen
      Konsultation zur C5:2026-Revision sowie Vergleich mit C5:2020. Schwerpunkt:
      Kontrollen, die sich strukturell aus 2020 in 2026 fortschreiben (HR, IDM,
      KRY, KOS/COS, RB, OPS-Grundlagen, BCM, BEI, SIM).

      WICHTIG: BSI C5:2026 ist zum Zeitpunkt der Mapping-Erstellung noch nicht final
      veröffentlicht (verbindlich erst ab 01.01.2027). Konkrete Ziel-IDs werden hier
      mit symbolischen Schlüsseln im Format 'C5-2026-<Bereich>-<Nr>' geführt; nach
      Final-Veröffentlichung sind die IDs gegen den offiziellen Catalogue zu
      validieren und ggf. durch produktive IDs zu ersetzen. Mappings mit höherer
      Unsicherheit sind explizit mit confidence='low' und gap_warning markiert.

  lifecycle:
    state: 'draft'
    state_history:
      - { state: 'draft', date: '2026-05-06', actor: 'maintainer' }

mappings:
  - source: 'OPS-01'
    target: 'C5-2026-OPS-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2020 OPS-01 „Sicherstellung des Konfigurations- und Änderungsmanagements"
      bleibt in C5:2026 als Kern-Operations-Kontrolle erhalten. Konfigurations-
      management gilt unverändert als Grundpfeiler sicherer Cloud-Operations und
      ist in der C5:2026-Konsultation explizit als Bestandsbereich aufgeführt.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    audit_evidence_hint: 'CMDB-Auszug, dokumentierter Change-Workflow mit Freigabe-Stufen, Stichprobe genehmigter Changes der letzten 90 Tage.'

  - source: 'OPS-10'
    target: 'C5-2026-OPS-10'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2020 OPS-10 „Protokollierung und Monitoring — Verantwortlichkeiten" wird
      in C5:2026 fortgeführt; SIEM/SOC-Pflichten werden entsprechend NIS2-Art. 21
      und EUCS verschärft, der Pflichteninhalt bleibt aber strukturell identisch.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    cross_refs: ['C5-2026-OPS-11']
    audit_evidence_hint: 'SIEM-Use-Case-Katalog, 24/7-SOC-Coverage-Nachweis, Log-Retention-Konfiguration, MTTR-Statistik.'

  - source: 'OPS-15'
    target: 'C5-2026-OPS-15'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2020 OPS-15 „Schutz vor Schadprogrammen — Konzept" bleibt in C5:2026
      strukturell erhalten. Anti-Malware/EDR auf Cloud-Plattform-Ebene ist
      unverzichtbar und in der Konsultation als Bestandsbereich aufgeführt.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    audit_evidence_hint: 'AV/EDR-Coverage-Report, Update-Frequenz-Nachweise, dokumentiertes Schutz-Konzept.'

  - source: 'OPS-18'
    target: 'C5-2026-OPS-18'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      C5:2020 OPS-18 „Umgang mit Schwachstellen, Störungen und Fehlern" wird in
      C5:2026 voraussichtlich erweitert um SBOM-/Supply-Chain-Vulnerability-
      Tracking und schärfere Patch-SLAs gemäß CRA und NIS2. Der C5:2020-Inhalt
      bleibt Teilmenge der erweiterten 2026-Anforderung.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    gap_warning: |
      C5:2020 OPS-18 deckt die voraussichtlichen 2026-Anforderungen an SBOM-
      basiertes Vulnerability-Tracking und Container-Image-Scanning NICHT vollständig
      ab. Für 2026 zusätzliche Maßnahmen empfohlen: SBOM-Inventar je Service,
      Container-Registry-Scanning, Upstream-CVE-Feed-Auswertung.
    cross_refs: ['C5-2026-SCS-01']
    audit_evidence_hint: 'Vulnerability-Scan-Reports, Patch-Compliance-Dashboard, CVE-Tracking, ergänzend SBOM-Auszüge je Service.'

  - source: 'RB-01'
    target: 'C5-2026-RB-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2020 RB-01 „Planung des Regelbetriebs" bleibt als Operations-Grundlage
      in C5:2026 erhalten. Capacity-Management und Service-Continuity-Planung
      sind unverändert Pflicht.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    audit_evidence_hint: 'Capacity-Reports, Forecasts, dokumentierte Service-Continuity-Planung.'

  - source: 'RB-04'
    target: 'C5-2026-RB-04'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2020 RB-04 „Identifikation von Schwachstellen, Bedrohungen und
      funktionalen Mängeln" wird in C5:2026 fortgeführt; Threat-Intelligence-
      Pflichten werden voraussichtlich an NIS2-Art. 21 ausgerichtet, die
      Pflicht-Substanz bleibt identisch.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    audit_evidence_hint: 'Threat-Intel-Quellen-Liste (BSI-CERT, CERT-Bund, kommerziell), ausgewertete Bedrohungsmeldungen 12 Monate, Eskalations-Logs.'

  - source: 'IDM-01'
    target: 'C5-2026-IDM-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2020 IDM-01 „Richtlinie zur Identitäts- und Berechtigungsverwaltung"
      bleibt strukturell erhalten. Identity-Lifecycle-Pflichten werden in
      C5:2026 voraussichtlich um Just-in-Time-Access-Erwartungen ergänzt,
      die Grundpflicht ist unverändert.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    audit_evidence_hint: 'IDM-Richtlinie, Berechtigungskonzept, Stichprobe Joiner/Mover/Leaver letzte 90 Tage.'

  - source: 'IDM-02'
    target: 'C5-2026-IDM-02'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2020 IDM-02 „Benutzerregistrierung" bleibt als formaler Identity-
      Lifecycle-Bestandteil in C5:2026 erhalten.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    audit_evidence_hint: 'Provisioning-Workflow-Dokumentation, Stichprobe Onboarding-Tickets.'

  - source: 'IDM-09'
    target: 'C5-2026-IDM-09'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      C5:2020 IDM-09 „Authentifizierungsmechanismen" mit MFA-Pflicht für
      privilegierte Zugriffe wird in C5:2026 voraussichtlich erweitert um
      phishing-resistente MFA (FIDO2/WebAuthn-Klasse) und Vorbereitung auf
      Post-Quantum-Authentisierungsverfahren. C5:2020-Inhalt bleibt Teilmenge.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    gap_warning: |
      C5:2020-konforme TOTP/SMS-MFA-Implementierungen erfüllen die
      voraussichtlichen 2026-Anforderungen an phishing-resistente MFA NICHT.
      Migration auf FIDO2/WebAuthn empfohlen, mindestens für privilegierte Konten.
    cross_refs: ['C5-2026-PQC-01']
    audit_evidence_hint: 'MFA-Coverage-Report Admin-Accounts (100 %), Auth-Methoden-Inventar, Roadmap zur phishing-resistenten MFA.'

  - source: 'KRY-01'
    target: 'C5-2026-KRY-01'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      C5:2020 KRY-01 „Richtlinie zur Verwendung von Verschlüsselungsverfahren
      und Schlüsselverwaltung" wird in C5:2026 voraussichtlich erweitert um
      Krypto-Agilität, PQC-Übergangspläne und BSI-TR-02102-Updates für
      hybride/post-quanten-resistente Verfahren. Der 2020-Inhalt bleibt
      Teilmenge des erweiterten 2026-Themas.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    gap_warning: |
      Eine reine Bestands-Krypto-Richtlinie nach C5:2020 erfüllt 2026 nicht
      die voraussichtlichen Erwartungen an Krypto-Agilität und PQC-Transition.
      Ergänzungen empfohlen: PQC-Inventar, Transition-Roadmap, hybride Verfahren
      (klassisch + PQC) für Langzeit-vertrauliche Daten.
    cross_refs: ['C5-2026-PQC-01']
    audit_evidence_hint: 'Krypto-Richtlinie, Algorithmen-Allowlist (BSI TR-02102 aktuelle Version), Key-Management-Verfahren, PQC-Transition-Plan.'

  - source: 'KOS-01'
    target: 'C5-2026-KOS-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2020 KOS-01 „Technische Schutzmaßnahmen" für Kommunikationssicherheit
      bleibt strukturell erhalten. Network-Segmentation, Firewalling und
      verschlüsselte Transport-Layer sind in C5:2026 unverändert Pflicht.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    audit_evidence_hint: 'Netzplan, Segmentierungsnachweise, TLS-Konfigurations-Audits, Firewall-Regelwerk-Reviews.'

  - source: 'AM-01'
    target: 'C5-2026-AM-01'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      C5:2020 AM-01 „Asset-Inventar" bleibt erhalten, wird in C5:2026
      voraussichtlich um Container/Workload-Inventar (kurzlebige Assets) und
      SBOM-Verknüpfung erweitert. Der 2020-Inhalt ist Teilmenge der
      voraussichtlichen 2026-Anforderung.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    gap_warning: |
      Klassische statische CMDBs decken keine kurzlebigen Container/Workloads
      ab. Für 2026 zusätzlich Kubernetes-/Container-Inventar mit SBOM-Bezug
      empfohlen.
    cross_refs: ['C5-2026-CON-01', 'C5-2026-SCS-01']
    audit_evidence_hint: 'CMDB-Auszug + Container-Workload-Inventar, SBOM je produktivem Service, Provisioning-Stichtagsabgleich.'

  - source: 'BEI-01'
    target: 'C5-2026-BEI-01'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      C5:2020 BEI-01 „Richtlinien für Beziehungen zu Dritten" wird in C5:2026
      voraussichtlich verschärft entsprechend NIS2 Supply-Chain-Pflichten und
      EU-CRA. Vertragspflichten gegenüber Sub-Dienstleistern bleiben strukturell
      identisch, Sub-Provider-Risikobewertung wird detaillierter.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    gap_warning: |
      C5:2020-typische AVV-Klauseln decken voraussichtlich nicht die in 2026
      erwartete Supply-Chain-Transparenz (SBOM-Übergabe, CVE-Notification-SLA,
      kritischer-Sub-Provider-Disclosure) ab.
    cross_refs: ['C5-2026-SCS-01']
    audit_evidence_hint: 'Lieferantenverträge, AVV nach DSGVO Art. 28, Sub-Provider-Liste mit Risikobewertung, Supply-Chain-SLA-Klauseln.'

  - source: 'BEI-04'
    target: 'C5-2026-BEI-04'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      C5:2020 BEI-04 „Anforderungen an Lieferanten" wird in C5:2026
      voraussichtlich erweitert um SBOM-Lieferpflicht, Schwachstellen-
      Notifizierungs-SLAs und EU-CRA-konforme Reporting-Verpflichtungen für
      Sub-Dienstleister.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    gap_warning: |
      Supply-Chain-Erwartungen werden 2026 messbar strenger. Reine Audit-
      Rechte-Klauseln nach C5:2020 reichen voraussichtlich nicht; ergänzende
      SBOM-/CVE-Notification-Klauseln aufnehmen.
    cross_refs: ['C5-2026-SCS-01']
    audit_evidence_hint: 'Lieferanten-Audit-Berichte, Sub-Provider-Risikobewertungen, SBOM-Übergabe-Nachweise, CVE-Notification-Logs.'

  - source: 'SIM-01'
    target: 'C5-2026-SIM-01'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      C5:2020 SIM-01 „Richtlinien für die Behandlung von Sicherheitsvorfällen"
      bleibt erhalten, wird in C5:2026 voraussichtlich an NIS2-Art. 23
      Reporting-SLAs (24h Frühwarnung, 72h Incident-Notification, 30 Tage
      Final-Report) angepasst.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    gap_warning: |
      C5:2020 fordert keine NIS2-konformen 24h/72h-SLAs. IR-Plan und
      Eskalationskette für 2026 entsprechend anpassen.
    audit_evidence_hint: 'IR-Plan mit NIS2-konformen Eskalations-SLAs, IR-Übungs-Reports, Incident-Tickets-Stichprobe.'

  - source: 'BCM-01'
    target: 'C5-2026-BCM-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2020 BCM-01 „Top-Management-Verantwortung und BC-Strategie" bleibt
      strukturell erhalten. BC-Strategie, BIA und Top-Management-Commitment
      sind in C5:2026 weiterhin Kernpflicht.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    audit_evidence_hint: 'BC-Strategie-Dokument, BIA-Ergebnisse, Management-Freigabe-Protokoll.'

  - source: 'HR-03'
    target: 'C5-2026-HR-03'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2020 HR-03 „Schulung und Sensibilisierung" bleibt strukturell erhalten.
      Awareness-Pflicht für alle Beschäftigten und rollenspezifische Vertiefung
      für privilegierte Nutzer sind in C5:2026 unverändert.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    audit_evidence_hint: 'Schulungs-Quote (≥95 %), Phishing-Drill-Ergebnisse, rollenspezifische Curricula, Onboarding-Nachweise.'

  - source: 'PSC-01'
    target: 'C5-2026-PSC-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2020 PSC-01 (Personnel/Pre-Employment-Screening) bleibt in C5:2026
      strukturell erhalten. Hintergrundüberprüfung von Personal mit Zugriff
      auf Cloud-Management-Ebenen ist unverändert Pflicht.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    audit_evidence_hint: 'Screening-Verfahrensbeschreibung, Stichprobe Pre-Employment-Checks, NDA-Nachweise.'

  - source: 'BFM-01'
    target: 'C5-2026-BFM-01'
    relationship: 'equivalent'
    confidence: 'medium'
    rationale: |
      C5:2020 BFM-01 (Beauftragten- und Berichtswesen) bleibt in C5:2026 als
      Governance-Bestandteil voraussichtlich erhalten — die Rollen ISB/CISO
      und das Berichtswesen ans Top-Management sind weiterhin Pflicht.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    audit_evidence_hint: 'ISB/CISO-Bestellung, Berichts-Zyklus-Plan, Management-Reports der letzten 12 Monate.'

  - source: 'BEI-04'
    target: 'C5-2026-SCS-01'
    relationship: 'partial_overlap'
    confidence: 'low'
    rationale: |
      C5:2026 wird voraussichtlich einen dedizierten Supply-Chain-Security-
      Bereich (SCS) etablieren, der über die klassischen Lieferanten-Klauseln
      von C5:2020 BEI-04 hinausgeht (SBOM-Lieferpflicht, CVE-Notification,
      Container-Registry-Provenance, signierte Artefakte). C5:2020 deckt nur
      Teilaspekte ab.
      Verbindlich ab 01.01.2027 — ID und Detail-Anforderungen gegen Final-
      Catalogue zu validieren.
    gap_warning: |
      Die voraussichtliche 2026-SCS-Anforderung ist NICHT durch C5:2020
      BEI-04 alleine abgedeckt. Zusätzliche Maßnahmen erforderlich: SBOM-
      Generierung und -Aufbewahrung, signierte Container-Images (z. B.
      Sigstore/cosign), Provenance-Attestation, Vulnerability-Notification-SLA.
    audit_evidence_hint: 'SBOMs je Service, Image-Signatur-Verifikation in CI/CD, Provenance-Attestations (SLSA-Level), CVE-Notification-Workflow.'

  - source: 'OPS-01'
    target: 'C5-2026-CON-01'
    relationship: 'partial_overlap'
    confidence: 'low'
    rationale: |
      C5:2026 wird voraussichtlich dedizierte Container/Kubernetes-Sicherheits-
      Kontrollen einführen (Image-Hardening, Pod-Security-Standards, Runtime-
      Security, Admission-Control). C5:2020 OPS-01 deckt diese spezifischen
      Container-Kontrollen NICHT ab — es regelt nur generisches Konfigurations-
      management.
      Verbindlich ab 01.01.2027 — ID und Detail-Anforderungen gegen Final-
      Catalogue zu validieren.
    gap_warning: |
      Container/Kubernetes-spezifische Kontrollen (Pod Security Standards,
      Admission Controllers, Runtime-Detection) sind in C5:2020 NICHT
      vorhanden. Für 2026 vollständig neu zu implementieren — u. a. CIS
      Kubernetes Benchmark, OPA/Gatekeeper, Falco/Tetragon.
    audit_evidence_hint: 'CIS-Kubernetes-Benchmark-Report, Pod-Security-Standard-Konfiguration, Admission-Controller-Policies, Runtime-Detection-Alerts.'
