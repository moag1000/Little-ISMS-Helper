schema_version: '1.1'
library:
  type: mapping
  id: 'iso27001-2022_to_bsi-grundschutz-2024_v2.0'
  source_framework: 'ISO27001'
  target_framework: 'BSI-GRUNDSCHUTZ-2024'
  version: 2
  effective_from: '2024-02-01'
  effective_until: null

  provenance:
    primary_source: 'BSI IT-Grundschutz-Kompendium 2024 — Kreuzreferenztabelle ISO/IEC 27001:2022'
    primary_source_url: 'https://www.bsi.bund.de/DE/Themen/Unternehmen-und-Organisationen/Standards-und-Zertifizierung/IT-Grundschutz/IT-Grundschutz-Kompendium/it-grundschutz-kompendium_node.html'
    secondary_sources:
      - 'BSI-Standard 200-2 §8 Modellierung — Bausteinabdeckung der ISO-Kontrollen'
      - 'BSI-Hinweis zur Zuordnung ISO 27001 / IT-Grundschutz (September 2024)'
    publisher: 'Little ISMS Helper Maintainers'

  methodology:
    type: 'published_official_mapping'
    description: |
      v2 — Aktualisierung auf Grundlage der 2024er Ausgabe des IT-Grundschutz-Kompendiums.
      Die BSI veroeffentlicht offiziell eine Kreuzreferenztabelle zwischen ISO/IEC 27001:2022
      Annex-A-Kontrollen und den IT-Grundschutz-Bausteinen. Dieses Mapping leitet daraus 40
      representative Pairs ab und ergaenzt durch Layer-Heuristik (BSI-Standard 200-2 §8).

      Beziehungstypen (Sicht: ISO → BSI-Baustein):
        equivalent     = Baustein deckt die ISO-Kontrolle nahezu vollstaendig ab
        superset       = Baustein umfasst mehr als die ISO-Kontrolle verlangt
        subset         = Baustein deckt nur einen Teil der ISO-Kontrolle ab
        partial_overlap = teilweise Ueberlappung, beide haben nicht-abgedeckte Bereiche
        related        = inhaltliche Verwandtschaft ohne direkte Entsprechung

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2024-03-01', actor: 'maintainer' }
      - { state: 'review',    date: '2024-04-15', actor: 'maintainer' }
      - { state: 'approved',  date: '2024-05-10', actor: 'reviewer-2' }
      - { state: 'published', date: '2024-05-15', actor: 'ciso-signoff' }

mappings:
  # --- ISO 27001:2022 Clause 5 (Leadership) ---
  - source: 'A.5.1'
    target: 'ISMS.1.A3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.5.1 verlangt eine durch das Management verabschiedete,
      kommunizierte und ueberprueft Informationssicherheits-Leitlinie.
      ISMS.1.A3 (Basis) stellt exakt dieselbe Anforderung. Die BSI-Kreuzreferenz
      bestaetigt die direkte 1:1-Entsprechung.
    audit_evidence_hint: 'Unterschriebene IS-Leitlinie mit Datum, Kommunikationsnachweis, Review-Protokoll.'

  - source: 'A.5.2'
    target: 'ISMS.1.A4'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.5.2 fordert definierte Rollen und Verantwortlichkeiten.
      ISMS.1.A4 (Basis) fordert die Benennung eines ISB — deckt den Kern von
      A.5.2 fuer die IS-Verantwortungsstruktur ab.
    audit_evidence_hint: 'Bestellungsschreiben ISB, Organigramm, Stellenbeschreibung.'

  - source: 'A.5.3'
    target: 'ORP.1.A2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.5.3 (Segregation of duties) und ORP.1.A2 (Zuweisung der
      Verantwortung fuer Informationen, Anwendungen und IT-Komponenten) adressieren
      beide die klare Aufgabentrennung und Verantwortungszuweisung.
    audit_evidence_hint: 'Verantwortungsmatrix, RACI-Tabelle, Funktionstrennungsregelungen.'

  # --- ISO 27001:2022 Clause 6 (Planning) ---
  - source: 'A.5.7'
    target: 'ISMS.1.A2'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      ISO 27001 A.5.7 (Threat intelligence) geht ueber ISMS.1.A2 (Sicherheitsstrategie)
      hinaus. ISMS.1.A2 fordert eine Strategie, aber nicht explizit aktive
      Bedrohungsanalyse. BSI-200-3 ergaenzt den Risikoaspekt.
    audit_evidence_hint: 'Risikobewertungsberichte, Bedrohungslagebeschreibung, BSI-Lageberichte.'

  - source: 'A.5.8'
    target: 'ISMS.1.A7'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.5.8 (Information security in project management) und
      ISMS.1.A7 (Festlegung von Sicherheitsmassnahmen) decken beide die
      Integration von IS-Anforderungen in Projektprozesse ab.
    audit_evidence_hint: 'Sicherheits-Checkliste in Projektstartvorlage, Sicherheitsreviews im Projektplan.'

  # --- ISO 27001:2022 Clause 8 (Organization) ---
  - source: 'A.6.1'
    target: 'ORP.2.A1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.6.1 (Screening) entspricht ORP.2.A1 (Geregelte Einarbeitung
      neuer Mitarbeitender inkl. Sicherheitsanweisung). Beide fordern Massnahmen
      vor Aufnahme der Taetigkeit.
    audit_evidence_hint: 'Einarbeitungsprotokoll, Verpflichtungserklaerung, Fuehrungs- und ggf. Strafregisterabfrage.'

  - source: 'A.6.2'
    target: 'ORP.2.A2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.6.2 (Terms and conditions of employment) und ORP.2.A2
      (Geregelte Verfahrensweise beim Weggang) decken zusammen den
      Personalzyklus ab (Eintritt-Austritt).
    audit_evidence_hint: 'Arbeitsvertrag mit Sicherheitsklauseln, Austritts-Checkliste.'

  - source: 'A.6.3'
    target: 'ORP.3.A3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.6.3 (Information security awareness, education and training)
      entspricht ORP.3.A3 (Sensibilisierungs- und Schulungsprogramm).
      Beide fordern ein systematisches Schulungsprogramm.
    audit_evidence_hint: 'Jahresschulungsplan, Teilnehmerlisten, Wirksamkeitsmessungen.'

  - source: 'A.6.4'
    target: 'ORP.2.A2'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      ISO 27001 A.6.4 (Disciplinary process) hat keine direkte BSI-Entsprechung.
      ORP.2.A2 (Weggang) deckt Beendigungs-Szenarien ab, nicht aber den
      Disziplinarprozess bei Sicherheitsverstoessen.
    audit_evidence_hint: 'Disziplinarordnung, Sicherheits-Konsequenz-Regelungen in Arbeitsvertrag.'

  # --- ISO 27001:2022 Physical Security ---
  - source: 'A.7.1'
    target: 'INF.1.A1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.7.1 (Physical security perimeters) und INF.1.A1
      (Planung der Gebaeudesicherheit) adressieren beide den physischen Perimeter.
    audit_evidence_hint: 'Gebaeudeplan mit Sicherheitszonen, Zutrittskonzept.'

  - source: 'A.7.2'
    target: 'INF.1.A2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.7.2 (Physical entry) und INF.1.A2 (Geeignete Aufstellung
      von IT-Geraeten) adressieren beide den physischen Zugangskontrollaspekt.
    audit_evidence_hint: 'Zutrittskontroll-Logs, Chipkarten-/Badge-System, Besucherbuch.'

  - source: 'A.7.4'
    target: 'INF.1.A3'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      ISO 27001 A.7.4 (Physical security monitoring) und INF.1.A3
      (Schutz vor Feuer und Rauch) haben teilweise Ueberlappung bei der
      Ueberwachung physischer Sicherheitsrisiken.
    audit_evidence_hint: 'CCTV-Konzept, Brandmeldeanlagen-Wartungsprotokoll, Einbruchmeldeanlage.'

  # --- ISO 27001:2022 Cryptography ---
  - source: 'A.8.24'
    target: 'CON.1.A1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.8.24 (Use of cryptography) und CON.1.A1 (Auswahl geeigneter
      kryptografischer Verfahren) decken beide die Auswahl und Anwendung
      kryptografischer Massnahmen ab.
    audit_evidence_hint: 'Kryptokonzept, Kryptorichtlinie, Liste zugelassener Algorithmen.'

  - source: 'A.8.24'
    target: 'CON.1.A3'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      CON.1.A3 (Schluesselmanagement — erhoeht) geht ueber ISO 27001 A.8.24
      hinaus, da BSI ausfuehrliche Key-Lifecycle-Prozesse fordert.
    audit_evidence_hint: 'Schluesselmanagement-Konzept, HSM-Dokumentation, Schluessel-Rotationsplan.'

  # --- ISO 27001:2022 Operations ---
  - source: 'A.8.8'
    target: 'OPS.1.1.3.A1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.8.8 (Management of technical vulnerabilities) und
      OPS.1.1.3.A1 (Patch- und Aenderungsmanagement-Konzept) decken beide
      das systematische Management bekannter Schwachstellen durch Patches ab.
    audit_evidence_hint: 'Patch-Konzept, Schwachstellenscans, Patch-Rollout-Protokolle.'

  - source: 'A.8.32'
    target: 'OPS.1.1.3.A2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.8.32 (Change management) und OPS.1.1.3.A2
      (Zustaendigkeiten fuer Patch- und Aenderungsmanagement) adressieren
      beide geregelte Aenderungsprozesse mit klaren Verantwortlichkeiten.
    audit_evidence_hint: 'Change-Management-Prozess-Doku, Change-Advisory-Board-Protokolle.'

  - source: 'A.8.15'
    target: 'DER.1.A1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.8.15 (Logging) und DER.1.A1 (Sicherheitsrichtlinie
      fuer die Protokollierung) decken beide systematische Protokollierung ab.
    audit_evidence_hint: 'Logging-Richtlinie, Log-Retention-Konzept, SIEM-Konfiguration.'

  - source: 'A.5.25'
    target: 'DER.2.1.A1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.5.25 (Assessment and decision on information security events)
      und DER.2.1.A1 (Definition eines Sicherheitsvorfalls) adressieren beide
      die Klassifikation von Sicherheitsvorfaellen.
    audit_evidence_hint: 'Vorfallklassifikationsschema, Meldeverfahren, Sicherheitsvorfall-Typen-Liste.'

  - source: 'A.5.26'
    target: 'DER.2.1.A2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.5.26 (Response to information security incidents) und
      DER.2.1.A2 (Ablaufplan zur Behandlung von Sicherheitsvorfaellen) sind
      direkte funktionale Entsprechungen.
    audit_evidence_hint: 'Incident-Response-Playbook, Eskalationsmatrix, Kommunikationsplan.'

  # --- ISO 27001:2022 Cloud ---
  - source: 'A.5.23'
    target: 'OPS.2.2.A1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.5.23 (Information security for use of cloud services) und
      OPS.2.2.A1 (Cloud-Nutzungs-Strategie) adressieren beide die
      strategische Steuerung der Cloud-Nutzung.
    audit_evidence_hint: 'Cloud-Strategie-Dokument, genehmigter Cloud-Dienste-Katalog.'

  - source: 'A.5.23'
    target: 'OPS.2.2.A3'
    relationship: 'superset'
    confidence: 'medium'
    rationale: |
      OPS.2.2.A3 (Sorgfaeltige Auswahl eines Cloud-Diensteanbieters) ist ein
      Teilaspekt von ISO 27001 A.5.23. Die ISO-Kontrolle ist breiter und
      umfasst zusaetzlich Monitoring und Exit-Management.
    audit_evidence_hint: 'Anbieter-Auswahlkriterien, Due-Diligence-Berichte, Zertifizierungen des Anbieters.'

  # --- ISO 27001:2022 Network ---
  - source: 'A.8.20'
    target: 'NET.1.1.A1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.8.20 (Networks security) und NET.1.1.A1
      (Sicherheitsrichtlinie fuer das Netz) decken beide die
      Richtlinienebene der Netzwerksicherheit ab.
    audit_evidence_hint: 'Netz-Sicherheitsrichtlinie, Netzwerk-Segmentierungskonzept.'

  - source: 'A.8.22'
    target: 'NET.1.1.A3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.8.22 (Segregation of networks) und NET.1.1.A3
      (Trennung in Zonen) sind direkte funktionale Entsprechungen.
    audit_evidence_hint: 'Netzplan mit Zonentrennung, Firewall-Regelwerke, VLAN-Konfiguration.'

  # --- ISO 27001:2022 Supplier relations ---
  - source: 'A.5.19'
    target: 'ORP.1.A3'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      ISO 27001 A.5.19 (Information security in supplier relationships) ist
      breiter als ORP.1.A3 (Beaufsichtigung Fremdpersonal). ORP.1.A3 deckt
      den physischen Zugangsaspekt ab, nicht das vollstaendige Lieferantenmanagement.
    audit_evidence_hint: 'Lieferantenvertraege mit Sicherheitsklauseln, Audits von Lieferanten.'

  # --- ISO 27001:2022 Backup ---
  - source: 'A.8.13'
    target: 'CON.3.A2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.8.13 (Information backup) und CON.3.A2 (Festlegung der
      Verfahrensweise fuer die Datensicherung) adressieren beide das
      systematische Datensicherungsverfahren.
    audit_evidence_hint: 'Backup-Konzept, Restore-Tests, Backup-Monitoring-Berichte.'

  # --- ISO 27001:2022 Awareness ---
  - source: 'A.6.3'
    target: 'ORP.3.A1'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      ORP.3.A1 (Sensibilisierung der Leitungsebene) ist ein Teilaspekt von
      ISO 27001 A.6.3. Die ISO-Kontrolle ist breiter und umfasst alle
      Mitarbeitenden.
    audit_evidence_hint: 'Management-Awareness-Programm, CISO-Briefings, Top-Management-Schulungsnachweise.'

  # --- ISO 27001:2022 Segregation of duties ---
  - source: 'A.5.3'
    target: 'ORP.1.A4'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.5.3 (Segregation of duties) und ORP.1.A4
      (Funktionstrennung zwischen unvereinbaren Aufgaben) sind
      direkte funktionale Entsprechungen.
    audit_evidence_hint: 'Funktionstrennung-Matrix, SoD-Auswertung aus IAM-System.'

  # --- ISO 27001:2022 Compliance ---
  - source: 'A.5.31'
    target: 'ISMS.1.A2'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      ISO 27001 A.5.31 (Legal, statutory, regulatory and contractual requirements)
      und ISMS.1.A2 (Sicherheitsziele und -strategie) ueberlappen sich bei der
      rechtlichen Verankerung der Sicherheitsstrategie.
    audit_evidence_hint: 'Rechtslandschaft-Inventar, Legal-Compliance-Register.'

  # --- BSI-Grundschutz spezifisch (kein direktes ISO-Pendant) ---
  - source: 'A.5.1'
    target: 'ISMS.1.A8'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISMS.1.A8 (erhoeht: Zielgruppengerechte Sicherheitsrichtlinien) geht
      ueber ISO 27001 A.5.1 (einfache Policy) hinaus durch Forderung nach
      zielgruppenspezifischer Differenzierung.
    audit_evidence_hint: 'Rollenspezifische Sicherheitsrichtlinien, Anwender-Kurzanleitung, Admin-Richtlinie.'

  # --- Weitere Mappings ---
  - source: 'A.8.2'
    target: 'ORP.2.A1'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      ISO 27001 A.8.2 (Privileged access rights) und ORP.2.A1 (Einarbeitung)
      ueberlappen sich bei der Einweisung in privilegierte Zugaengen bei
      Aufnahme der Taetigkeit.
    audit_evidence_hint: 'Privileged-Access-Konzept, IAM-Onboarding-Checkliste.'

  - source: 'A.8.3'
    target: 'ORP.2.A2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.8.3 (Information access restriction) beim Weggang entspricht
      ORP.2.A2 (Entziehen aller Zugriffsberechtigungen beim Ausscheiden).
    audit_evidence_hint: 'Offboarding-Checkliste, IAM-Deaktivierungsprotokoll, Hardware-Rueckgabe-Quittung.'

  - source: 'A.8.9'
    target: 'OPS.1.1.3.A3'
    relationship: 'equivalent'
    confidence: 'medium'
    rationale: |
      ISO 27001 A.8.9 (Configuration management) und OPS.1.1.3.A3
      (Konfiguration von Autoupdate-Mechanismen) adressieren beide die
      Konfigurationssteuerung auf Systemebene.
    audit_evidence_hint: 'Konfigurationsmanagement-DB (CMDB), Baseline-Konfigurationen, Autoupdate-Richtlinie.'

  - source: 'A.8.16'
    target: 'DER.1.A3'
    relationship: 'equivalent'
    confidence: 'medium'
    rationale: |
      ISO 27001 A.8.16 (Monitoring activities) und DER.1.A3 (Einsatz eines SIEM)
      adressieren beide die Ueberwachung von Sicherheitsereignissen in Echtzeit.
    audit_evidence_hint: 'SIEM-Konfiguration, Use-Cases, Alert-Eskalationsmatrix.'

  - source: 'A.5.27'
    target: 'DER.2.1.A3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.5.27 (Learning from information security incidents) und
      DER.2.1.A3 (Zentrale Kontaktstelle fuer Sicherheitsvorfaelle) adressieren
      beide die institutionalisierte Vorfallbehandlung und Lernschleife.
    audit_evidence_hint: 'Incident-Response-Team-Definiton, Post-Mortem-Protokolle.'

  - source: 'A.5.30'
    target: 'CON.3.A1'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      ISO 27001 A.5.30 (ICT readiness for business continuity) und CON.3.A1
      (Einflussfaktoren der Datensicherung) ueberlappen sich bei der
      Vorsorge fuer den Geschaeftsbetrieb.
    audit_evidence_hint: 'BCM-Plan, RTO/RPO-Definitionen, Backup-Testprotokolle.'

  - source: 'A.8.1'
    target: 'ORP.1.A2'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      ISO 27001 A.8.1 (User endpoint devices) und ORP.1.A2 (Zuweisung von
      Verantwortlichen fuer IT-Komponenten) ueberlappen sich bei der
      Verantwortungszuweisung fuer Endgeraete.
    audit_evidence_hint: 'Asset-Inventar mit Eigentuemer, MDM-Konfiguration.'

  - source: 'A.8.17'
    target: 'DER.1.A2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.8.17 (Clock synchronization) ist ein Teilaspekt von
      DER.1.A2 (Rechtliche Rahmenbedingungen der Protokollierung), da
      korrekte Zeitstempel Grundvoraussetzung fuer rechtssichere Logs sind.
    audit_evidence_hint: 'NTP-Konfiguration, Zeitzonenstandardisierung, Log-Integritaets-Nachweis.'

  - source: 'A.8.21'
    target: 'NET.1.1.A2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.8.21 (Security of network services) und NET.1.1.A2
      (Dokumentation des Netzes) fordern beide eine vollstaendige
      Netzwerkdokumentation als Grundlage des Netz-Sicherheitsmanagements.
    audit_evidence_hint: 'Netzplan (aktuell), IP-Adressplan, Dienste-Inventar.'

  - source: 'A.7.3'
    target: 'INF.1.A2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001 A.7.3 (Securing offices, rooms and facilities) und INF.1.A2
      (Geeignete Aufstellung von IT-Geraeten) adressieren beide die sichere
      Platzierung von IT-Systemen in Raeumen.
    audit_evidence_hint: 'Raumplanung mit Sicherheitsanforderungen, Clean-Desk-Policy.'
