schema_version: '1.1'
library:
  type: mapping
  id: 'iso27001-2022_to_dora_v1.0'
  source_framework: 'ISO27001'
  target_framework: 'DORA'
  version: 1
  effective_from: '2025-01-17'
  effective_until: null

  provenance:
    primary_source: 'EBA RTS-Entwurf zu DORA + Final Report ICT Risk Management Framework'
    primary_source_url: 'https://www.eba.europa.eu/regulation-and-policy/single-rulebook/digital-operational-resilience-act-dora'
    secondary_sources:
      - 'Verordnung (EU) 2022/2554 (DORA), Kapitel II Art. 5–15'
      - 'BaFin Auslegungs- und Anwendungshinweise DORA 2024'
      - 'Forward-Variante zu dora_to_iso27001-2022_v1.0 (gleiche Pair-Liste, getauschte Source/Target)'
    publisher: 'Little ISMS Helper Maintainers'

  methodology:
    type: 'text_comparison_with_expert_review'
    description: |
      Forward-Mapping: Ausgehend von jeder ISO 27001:2022 Annex-A-Kontrolle
      wurde bestimmt, welche DORA-Artikel adressiert werden:
      1. Volltext-Lesung der ISO-Annex-A-Kontrolle als Anker
      2. Identifikation der DORA-Artikel, die durch die ISO-Kontrolle teilweise
         erfüllt werden (bzw. die ISO-Kontrolle als Baustein referenzieren)
      3. Relationship typischerweise "subset" (ISO ⊆ DORA-Artikel),
         weil DORA in der Regel präskriptiver/expliziter ist als ISO 27001
      4. Confidence aus Expertenbewertung; wo DORA explizit ISO-konformes
         Vorgehen akzeptiert: "equivalent"
      5. Rationale aus ISO-Sicht (welche DORA-Anforderungs-Lücken bleiben?)
      6. 4-Augen-Review durch zweiten Compliance-Manager mit BaFin-Background
      Hinweis: Reziprok zu dora_to_iso27001-2022_v1.0 — gleiche 15 Pairs,
      invertierte Relationships, identische Provenance/Confidence.

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2024-10-01', actor: 'maintainer' }
      - { state: 'review',    date: '2024-11-15', actor: 'maintainer' }
      - { state: 'approved',  date: '2024-12-10', actor: 'reviewer-2' }
      - { state: 'published', date: '2025-01-15', actor: 'ciso-signoff' }

mappings:
  - source: 'A.5.1'
    target: 'Art.5'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.5.1 "Policies for information security" liefert die
      Policy-Komponente. DORA Art. 5 "Governance und Organisation" verlangt
      explizit Leitungsorgan-Verantwortung, dokumentierte ICT-Strategie und
      jährliche Überprüfung — A.5.1 ist Teilmenge des breiteren Art. 5.
    gap_warning: 'A.5.1 allein erfüllt DORA Art. 5 NICHT — Board-Approval-Prozess und ICT-Strategie sind zusätzlich nötig.'
    audit_evidence_hint: 'A.5.1: InfoSec-Policy. DORA Art. 5: Board-Beschluss zur ICT-Strategie, Policy-Hierarchie, jährliche Review-Protokolle.'

  - source: 'A.5.1'
    target: 'Art.6'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.5.1 ist die Policy-Spitze des ISMS. DORA Art. 6
      "ICT-Risk-Management-Framework" verlangt vollständiges Framework mit
      Strategie, Policies, Prozeduren, Protokollen und Tools. A.5.1 ist
      damit Teilmenge — DORA fordert zusätzlich Risk-Tolerance, Recovery-
      Objectives und kontinuierliche Verbesserung.
    cross_refs: ['A.5.2', 'A.5.3']
    gap_warning: 'DORA Art. 6 erwartet ein Framework mit klaren Risk-Tolerance-Niveaus — nicht durch A.5.1 allein abgedeckt.'

  - source: 'A.5.9'
    target: 'Art.7'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.5.9 "Inventory of information and other associated
      assets" deckt den Inventar-Anteil ab. DORA Art. 7 "ICT-Systeme,
      -Protokolle und -Tools" verlangt zusätzlich Architektur-Diagramme und
      Risikobewertung pro System — A.5.9 ist Teilmenge.
    cross_refs: ['A.5.10', 'A.8.9']
    audit_evidence_hint: 'A.5.9: Asset-Inventar mit Kritikalitätseinstufung. DORA Art. 7: Architektur-Dokumentation, Risk-Assessment-Reports pro ICT-System.'

  - source: 'A.8.8'
    target: 'Art.8'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.8.8 "Management of technical vulnerabilities" deckt
      Schwachstellen-Management ab. DORA Art. 8 verlangt explizit kontinuier-
      liche Identifikation aller ICT-Risiken inkl. veralteter Systeme und
      Geschäftsfunktions-Mapping — A.8.8 ist Teilmenge.
    gap_warning: 'A.8.8 deckt nur technische Vulns ab — DORA Art. 8 fordert breiteres Risk-ID inkl. Legacy.'

  - source: 'A.8.7'
    target: 'Art.9'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISO 27001:2022 A.8.7 "Protection against malware" deckt nur den
      Malware-Anteil ab. DORA Art. 9 "Schutz und Prävention" listet
      zusätzlich Netzwerksegmentierung, Datenklassifizierung, Identity-
      Management und Krypto — A.8.7 ist Teilmenge.
    cross_refs: ['A.8.20', 'A.8.24', 'A.5.10', 'A.8.5']
    audit_evidence_hint: 'A.8.7: AV/EDR-Reports. DORA Art. 9: Netzwerk-Segmentierungs-Diagramme, Krypto-Inventar, IAM-Policies.'

  - source: 'A.8.16'
    target: 'Art.10'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.8.16 "Monitoring activities" ist die ISO-Verankerung
      für Monitoring. DORA Art. 10 "Detection" verlangt zusätzlich
      Performance-Anomalien und automatische Alarmierungs-Schwellen mit
      Detail-Anforderungen — A.8.16 ist Teilmenge.
    cross_refs: ['A.8.15']
    audit_evidence_hint: 'A.8.16: SIEM-Konfiguration. DORA Art. 10: Schwellenwert-Dokumentation, Alarm-Review-Logs, Performance-Anomalie-Erkennung.'

  - source: 'A.5.30'
    target: 'Art.11'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.5.30 "ICT Readiness for Business Continuity" ist
      Kern-Verankerung. DORA Art. 11 "Response and Recovery" fordert
      zusätzlich dedizierte ICT-BC-Policy, Krisenkommunikation, RTO/RPO
      und Behörden-Meldung — A.5.30 ist Teilmenge.
    cross_refs: ['A.5.29', 'A.8.13']
    gap_warning: 'A.5.30 allein erfüllt DORA Art. 11 NICHT — Backup-Strategie (A.8.13) und Crisis-Comms zusätzlich nötig.'
    audit_evidence_hint: 'A.5.30: ICT-BCP. DORA Art. 11: Recovery-Pläne mit RTO/RPO, Test-Reports, Behörden-Meldepfade.'

  - source: 'A.8.13'
    target: 'Art.12'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.8.13 "Information backup" ist die ISO-Grundlage.
      DORA Art. 12 "Backup-Policies und Recovery-Methoden" verlangt
      zusätzlich spezifische Backup-Frequenzen, Recovery-Tests und
      sekundäre Verarbeitungsstandorte — A.8.13 ist Teilmenge.
    cross_refs: ['A.5.30']
    audit_evidence_hint: 'A.8.13: Backup-Policy. DORA Art. 12: Restore-Test-Reports der letzten 12 Monate, Standortkonzept Primär/Sekundär.'

  - source: 'A.5.27'
    target: 'Art.13'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISO 27001:2022 A.5.27 "Learning from information security incidents"
      liefert die ISO-Verankerung für Lessons-Learned. DORA Art. 13
      "Lernen und Weiterentwickeln" fordert zusätzlich Quantifizierung und
      Reporting an Leitungsorgan — A.5.27 ist Teilmenge.
    cross_refs: ['A.5.24', 'A.5.25']
    audit_evidence_hint: 'A.5.27: Lessons-Learned-Register. DORA Art. 13: Post-Incident-Review-Templates, Board-Reports zu Trends.'

  - source: 'A.6.3'
    target: 'Art.14'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.6.3 "Information security awareness, education and
      training" deckt allgemeine Schulung ab. DORA Art. 14 "Kommunikation"
      fordert zusätzlich Krisenkommunikations-Pläne und Awareness-Programme
      explizit für Leitungsorgane — A.6.3 ist Teilmenge.
    gap_warning: 'A.6.3 allein deckt DORA Art. 14 NICHT — Krisenkommunikations-Plan separat.'
    audit_evidence_hint: 'A.6.3: Schulungs-Quoten. DORA Art. 14: Krisenkommunikations-Plan, Tabletop-Übungen mit Geschäftsleitung, Board-Trainings.'

  - source: 'A.5.36'
    target: 'Art.15'
    relationship: 'equivalent'
    confidence: 'medium'
    rationale: |
      ISO 27001:2022 A.5.36 "Compliance with policies, rules and standards
      for information security" entspricht aus ISO-Sicht der DORA Art. 15
      Compliance-Bewertung weitgehend. Detail-Tiefe der DORA-Vorgabe
      (Simplified Regime) ist mit ISO grundsätzlich erreichbar — die
      Entsprechung ist auf Anforderungs-Niveau ausreichend.
    cross_refs: ['A.5.35']

  - source: 'A.5.19'
    target: 'Art.28'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.5.19 "Information security in supplier relationships"
      liefert die ISO-Basis für Lieferantenmanagement. DORA Art. 28
      "ICT-Drittanbieter-Risiken — allgemeine Grundsätze" verlangt
      zusätzlich Strategie, Register-of-Information (RoI) und Konzentrations-
      Risikoanalyse — A.5.19 ist Teilmenge.
    cross_refs: ['A.5.20', 'A.5.21']
    gap_warning: 'A.5.19 deckt DORA Art. 28 NICHT vollständig — DORA-Register (RoI) und Konzentrations-Risiko-Analyse zusätzlich nötig.'
    audit_evidence_hint: 'A.5.19: Lieferanten-Strategie. DORA Art. 28: RoI gemäß ITS, Konzentrations-Risiko-Bericht.'

  - source: 'A.5.20'
    target: 'Art.30'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.5.20 "Addressing information security in supplier
      agreements" liefert die ISO-Klausel-Anker für Lieferantenverträge.
      DORA Art. 30 "Vertragliche Vereinbarungen" listet zusätzlich
      Pflichtklauseln (SLAs, Audit-Rechte, Subcontracting, Exit-Strategien) —
      A.5.20 ist Teilmenge.
    cross_refs: ['A.5.22']
    audit_evidence_hint: 'A.5.20: Vertragsmuster mit InfoSec-Klauseln. DORA Art. 30: DORA-Pflichtklauseln, Vertragsregister, Exit-Pläne kritischer Anbieter.'

  - source: 'A.8.29'
    target: 'Art.24'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISO 27001:2022 A.8.29 "Security testing in development and acceptance"
      ist Baustein für Sicherheitstests. DORA Art. 24 "Digital Operational
      Resilience Testing" verlangt jährliche Tests aller kritischen ICT-
      Systeme inkl. Penetration-Tests, Vulnerability-Assessments und
      DORA-spezifische TLPT (Art. 26/27) — A.8.29 ist Teilmenge.
    cross_refs: ['A.8.8', 'A.8.25']
    gap_warning: 'TLPT nach DORA Art. 26/27 ist NICHT durch A.8.29 abgedeckt — separate TLPT-Programmatik nötig.'
    audit_evidence_hint: 'A.8.29: Test-Programm. DORA Art. 24: Pentest-Reports, TLPT-Reports (falls anwendbar), Vulnerability-Scans.'

  - source: 'A.5.24'
    target: 'Art.17'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.5.24 "Information security incident management
      planning and preparation" entspricht weitgehend dem DORA-Vorfall-
      Prozess. DORA Art. 17 "ICT-Vorfall-Management-Prozess" fordert
      zusätzlich Klassifizierungskriterien (Art. 18) und Meldefristen
      (24h/72h/1m, Art. 19) — A.5.24 ist Teilmenge.
    cross_refs: ['A.5.25', 'A.5.26']
    gap_warning: 'A.5.24 deckt DORA-Klassifikation und 24h/72h/1m-Meldefristen NICHT ab — separate DORA-Meldeprozesse nötig.'
    audit_evidence_hint: 'A.5.24: IR-Prozess. DORA Art. 17: Klassifizierungs-Matrix, Meldefrist-Logs, BaFin/EBA-Meldungen der letzten 12 Monate.'
