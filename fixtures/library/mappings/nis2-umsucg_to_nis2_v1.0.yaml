schema_version: '1.1'
library:
  type: mapping
  id: 'nis2-umsucg_to_nis2_v1.0'
  source_framework: 'NIS2-UmsuCG'
  target_framework: 'NIS2'
  version: 1
  effective_from: '2026-05-06'
  effective_until: null

  provenance:
    primary_source: 'NIS-2-Umsetzungs- und Cybersicherheitsstaerkungsgesetz BGBl. 2025 I Nr. 301 + EU-Richtlinie 2022/2555'
    primary_source_url: 'https://www.bgbl.de/'
    secondary_sources:
      - 'EU-Richtlinie (EU) 2022/2555 (NIS2), Amtliches Werk der EU, https://eur-lex.europa.eu/eli/dir/2022/2555/oj'
      - 'Gesetzesbegruendung NIS2-UmsuCG (BT-Drucksache, Synopse Richtlinie/Umsetzung)'
      - 'BSI-Erlaeuterungen zur nationalen Umsetzung der NIS2-Richtlinie'
    publisher: 'Little ISMS Helper Maintainers'
    license_note: |
      Mapping ist originaere Ableitung (AGPL-3.0). NIS2-UmsuCG-Paragraphen
      (BGBl. 2025 I Nr. 301) sind Amtliches Werk und gemeinfrei (§ 5 UrhG).
      NIS2-Richtlinien-Artikel (Richtlinie EU 2022/2555) sind Amtliches Werk
      der Europaeischen Union, public-domain-equivalent.

  methodology:
    type: 'published_official_mapping'
    description: |
      Das NIS2-Umsetzungs- und Cybersicherheitsstaerkungsgesetz (NIS2-UmsuCG,
      BGBl. 2025 I Nr. 301) ist die nationale Umsetzung der EU-Richtlinie
      2022/2555 in deutsches Recht. Da Richtlinien gemaess Art. 288 AEUV
      hinsichtlich des zu erreichenden Ziels verbindlich sind, ergibt sich
      eine direkte amtliche Korrespondenz zwischen den Paragraphen des
      NIS2-UmsuCG und den Artikeln der NIS2-Richtlinie.

      Methodik:
      1. Synopse-Abgleich Paragraph-fuer-Paragraph gegen Richtlinie
      2. Identifikation des Umsetzungs-Artikels (1:1, 1:n oder n:1)
      3. Relationship 'equivalent' wo der § die Richtlinie 1:1 umsetzt
         (Regelfall bei Richtlinien-Umsetzung)
      4. Relationship 'subset' wo der § nur einen Teilaspekt der Richtlinie
         umsetzt oder die Richtlinie zusaetzliche Optionen offen laesst
      5. Confidence ueberwiegend 'high' (direkte Umsetzungs-Korrespondenz);
         'medium' wo nationaler Ermessensspielraum genutzt wurde
      6. 4-Augen-Review durch zweiten Compliance-Manager mit Erfahrung
         im NIS2-Gesetzgebungsverfahren

      WICHTIG: Dieses Mapping unterstuetzt Compliance-Nachweise, ersetzt
      aber keine Rechtsberatung. Bei abweichenden nationalen Konkretisierungen
      (z.B. BSI-Befugnisse, sektorspezifische Schwellwerte) ist der nationale
      Wortlaut massgeblich.

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2026-05-06', actor: 'maintainer' }
      - { state: 'review',    date: '2026-05-06', actor: 'maintainer' }
      - { state: 'approved',  date: '2026-05-06', actor: 'reviewer-2' }
      - { state: 'published', date: '2026-05-06', actor: 'ciso-signoff' }

mappings:
  # ============================================================================
  # ABSCHNITT 1 — Allgemeine Bestimmungen / BSI-Aufgaben (§§ 1-8)
  # ============================================================================

  - source: '§1'
    target: 'Art.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 1 NIS2-UmsuCG "Zweck und Anwendungsbereich" setzt Art. 1 NIS2-RL
      "Gegenstand" um. Beide normieren den allgemeinen Anwendungsbereich:
      Festlegung von Massnahmen zur Erreichung eines hohen gemeinsamen
      Cybersicherheitsniveaus in der Union bzw. in Deutschland.
    audit_evidence_hint: 'Anwendbarkeitsmatrix Unternehmen/Sektoren mit Verweis § 1 NIS2-UmsuCG und Art. 1 NIS2-RL.'

  - source: '§2'
    target: 'Art.6'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 2 NIS2-UmsuCG "Begriffsbestimmungen" setzt Art. 6 NIS2-RL um.
      Beide enthalten die Legaldefinitionen (Netz- und Informationssystem,
      Cybersicherheit, Sicherheit von Netz- und Informationssystemen,
      erheblicher Sicherheitsvorfall, etc.). DE-Begriffsapparat 1:1
      uebernommen mit redaktionellen Anpassungen an deutsches Rechtssystem.
    audit_evidence_hint: 'Glossar mit Doppelreferenz § 2 NIS2-UmsuCG / Art. 6 NIS2-RL fuer alle relevanten Begriffe.'

  - source: '§3'
    target: 'Art.8'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 3 NIS2-UmsuCG "Aufgaben des BSI als zustaendige Behoerde" setzt
      Art. 8 NIS2-RL "Zustaendige Behoerden und zentrale Anlaufstellen" um.
      Deutschland benennt das BSI als zentrale zustaendige Behoerde
      (Single-Point-of-Contact gegenueber EU-Kommission und ENISA).
    cross_refs: ['§4', '§5']
    audit_evidence_hint: 'BSI-Benennungsbescheid, Veroeffentlichung im Bundesgesetzblatt, EU-Kommissions-Notifikation.'

  - source: '§4'
    target: 'Art.10'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 4 NIS2-UmsuCG "BSI als nationales CSIRT" setzt Art. 10 NIS2-RL
      "Computer-Notfallteams (CSIRTs)" um. BSI/CERT-Bund agiert als
      nationales CSIRT mit Aufgaben: Monitoring, Frueh-Warnung,
      Incident-Response-Koordination, Schwachstellen-Koordination.
    cross_refs: ['§3', '§5']
    audit_evidence_hint: 'CSIRT-Benennungsdokument, BSI/CERT-Bund-Aufgabenbeschreibung, ENISA-CSIRT-Network-Mitgliedschaftsnachweis.'

  - source: '§5'
    target: 'Art.11'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 5 NIS2-UmsuCG "Anforderungen an das nationale CSIRT" setzt Art. 11
      NIS2-RL "Anforderungen, technische Kapazitaeten und Aufgaben der
      CSIRTs" um. Konkretisiert organisatorische, personelle und technische
      Anforderungen an BSI/CERT-Bund (24/7-Verfuegbarkeit, sichere
      Kommunikation, redundante Infrastruktur).
    cross_refs: ['§4']
    audit_evidence_hint: 'BSI-CERT-Verfuegbarkeitsnachweis (24/7), Redundanz-Konzept, Personalplanung, sichere Kommunikationskanaele.'

  - source: '§6'
    target: 'Art.13'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 6 NIS2-UmsuCG "Zusammenarbeit BSI mit anderen Behoerden" setzt
      Art. 13 NIS2-RL "Zusammenarbeit auf nationaler Ebene" um.
      Regelt Kooperation zwischen BSI, BfDI, BBK, BaFin, BNetzA und
      sektoralen Aufsichtsbehoerden im Rahmen der Cybersicherheit.
    cross_refs: ['§7']
    audit_evidence_hint: 'Verwaltungsvereinbarungen BSI/BfDI/BaFin/BBK/BNetzA, dokumentierte Kooperations-MoUs.'

  - source: '§7'
    target: 'Art.14'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 7 NIS2-UmsuCG "Kooperationsgruppe und CSIRTs-Netzwerk" setzt
      Art. 14 NIS2-RL "Kooperationsgruppe" und Art. 15 NIS2-RL "CSIRTs-
      Netzwerk" um. BSI-Mitgliedschaft und Vertretungsregelung in den
      EU-Gremien.
    cross_refs: ['§8']
    audit_evidence_hint: 'Mitgliedschaftsnachweise EU-Kooperationsgruppe + CSIRTs-Network, Tagungsprotokolle.'

  - source: '§8'
    target: 'Art.7'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 8 NIS2-UmsuCG "Nationale Cybersicherheitsstrategie" setzt Art. 7
      NIS2-RL "Nationale Cybersicherheitsstrategien" um. DE-Strategie
      muss die in Art. 7 Abs. 2 NIS2-RL aufgelisteten Themen abdecken
      (Resilienz, Schwachstellen-Mgmt, Awareness, Forschung, KMU-Foerderung).
    audit_evidence_hint: 'Aktuelle Cybersicherheitsstrategie der Bundesregierung, Nachweis der periodischen Aktualisierung, EU-Kommissions-Notifikation.'

  # ============================================================================
  # ABSCHNITT 2 — Anwendungsbereich/Registrierung (§§ 28-29)
  # ============================================================================

  - source: '§28'
    target: 'Art.2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 28 NIS2-UmsuCG definiert den Anwendungsbereich der Cybersicherheits-
      pflichten und unterscheidet zwischen "besonders wichtigen" und
      "wichtigen Einrichtungen" (= NIS2-RL: "wesentliche" und "wichtige
      Einrichtungen", Art. 3 NIS2-RL). Setzt Art. 2 NIS2-RL "Anwendungsbereich"
      i.V.m. Art. 3 NIS2-RL "Wesentliche und wichtige Einrichtungen" um.
      Schwellwerte: ab mittleren Unternehmen (>=50 Mitarbeiter, >=10 Mio EUR
      Umsatz) in den Annex-I/II-Sektoren.
    cross_refs: ['§29', '§39', '§44']
    audit_evidence_hint: 'Self-Assessment zur Einstufung "besonders wichtig"/"wichtig" mit Sektor-Zuordnung, Mitarbeiterzahl, Umsatz, Bilanzsumme.'

  - source: '§29'
    target: 'Art.3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 29 NIS2-UmsuCG "Registrierungspflicht" setzt Art. 3 NIS2-RL i.V.m.
      Art. 27 NIS2-RL "Datenbank fuer Registrierungen" um. Pflicht zur
      Registrierung beim BSI binnen drei Monaten nach Erfuellen der
      Anwendbarkeits-Schwellwerte; Mitteilung von Aenderungen.
    cross_refs: ['§28']
    audit_evidence_hint: 'BSI-Registrierungsbestaetigung, dokumentierter Registrierungsprozess inkl. Aenderungsmitteilung-Workflow.'

  # ============================================================================
  # ABSCHNITT 3 — Risikomanagement / Top-Management / Schulung (§§ 30-35)
  # ============================================================================

  - source: '§30'
    target: 'Art.21.2.a'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 30 Abs. 2 Nr. 1 NIS2-UmsuCG "Konzepte fuer Risikoanalyse und fuer
      die Sicherheit von Informationssystemen" setzt Art. 21(2)(a) NIS2-RL
      1:1 um. Risikomanagement-Methodik, dokumentierte Sicherheitsleitlinie.
    cross_refs: ['§31']
    audit_evidence_hint: 'ISMS-Risikoanalyse-Methodik, Informationssicherheitsleitlinie, Risk-Register, Genehmigung durch Geschaeftsleitung.'

  - source: '§30'
    target: 'Art.21.2.b'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 30 Abs. 2 Nr. 2 NIS2-UmsuCG "Bewaeltigung von Sicherheitsvorfaellen"
      setzt Art. 21(2)(b) NIS2-RL um. Incident-Response inkl. Detection,
      Eindaemmung, Wiederherstellung, Lessons Learned.
    cross_refs: ['§32']
    audit_evidence_hint: 'Incident-Response-Plan, Incident-Reports der letzten 12 Monate, IR-Tabletop-Exercise-Nachweise.'

  - source: '§30'
    target: 'Art.21.2.c'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 30 Abs. 2 Nr. 3 NIS2-UmsuCG "Aufrechterhaltung des Betriebs,
      Backup-Management, Wiederherstellung nach einem Notfall, Krisenmgmt"
      setzt Art. 21(2)(c) NIS2-RL um. BCM/DR-Konzept inkl. Backup-Strategie
      und Krisenmanagement-Strukturen.
    audit_evidence_hint: 'BCM-Konzept, DR-Plan, Backup-Tests-Reports, Krisenstab-Benennung, BCM-Uebungs-Nachweise.'

  - source: '§30'
    target: 'Art.21.2.d'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 30 Abs. 2 Nr. 4 NIS2-UmsuCG "Sicherheit der Lieferkette einschliesslich
      sicherheitsbezogener Aspekte der Beziehungen zwischen den einzelnen
      Einrichtungen und ihren unmittelbaren Anbietern oder Diensteanbietern"
      setzt Art. 21(2)(d) NIS2-RL um.
    audit_evidence_hint: 'Supplier-Register mit Risk-Tier, AVV-/Sicherheits-Klauseln, Lieferanten-Audits.'

  - source: '§30'
    target: 'Art.21.2.e'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 30 Abs. 2 Nr. 5 NIS2-UmsuCG "Sicherheit beim Erwerb, der Entwicklung
      und Wartung von Netz- und Informationssystemen, einschliesslich
      Schwachstellenmanagement und -offenlegung" setzt Art. 21(2)(e) NIS2-RL um.
    audit_evidence_hint: 'Secure-SDLC-Doku, Vulnerability-Mgmt-Process, CVD-Policy, Patch-Compliance-Reports.'

  - source: '§30'
    target: 'Art.21.2.f'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 30 Abs. 2 Nr. 6 NIS2-UmsuCG "Konzepte und Verfahren zur Bewertung
      der Wirksamkeit von Risikomanagementmassnahmen im Bereich der
      Cybersicherheit" setzt Art. 21(2)(f) NIS2-RL um. Wirksamkeitsbewertung
      via KPIs, interne Audits, Management-Review.
    audit_evidence_hint: 'KPI-Dashboard (MTTD/MTTR, Patch-Compliance, Schulungsquote), interne Audit-Reports, Mgmt-Review-Protokolle.'

  - source: '§30'
    target: 'Art.21.2.g'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 30 Abs. 2 Nr. 7 NIS2-UmsuCG "grundlegende Verfahren im Bereich der
      Cyberhygiene und Schulungen im Bereich der Cybersicherheit" setzt
      Art. 21(2)(g) NIS2-RL um.
    cross_refs: ['§34']
    audit_evidence_hint: 'Cyberhygiene-Policy, Awareness-Programm, Schulungs-Quote, Phishing-Drill-Ergebnisse.'

  - source: '§30'
    target: 'Art.21.2.h'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 30 Abs. 2 Nr. 8 NIS2-UmsuCG "Konzepte und Verfahren fuer den Einsatz
      von Kryptografie und gegebenenfalls Verschluesselung" setzt
      Art. 21(2)(h) NIS2-RL um.
    audit_evidence_hint: 'Krypto-Konzept, Algorithmus-Whitelist, Key-Mgmt-Verfahren, Verschluesselungs-Coverage-Report.'

  - source: '§30'
    target: 'Art.21.2.i'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 30 Abs. 2 Nr. 9 NIS2-UmsuCG "Sicherheit des Personals, Konzepte fuer
      die Zugriffskontrolle und Management von Anlagen" setzt Art. 21(2)(i)
      NIS2-RL um. Personalsicherheit (HR-Aspekte) + IAM + Asset-Mgmt.
    audit_evidence_hint: 'HR-Sicherheitsrichtlinien, Background-Checks, IAM-Policy, Asset-Inventar mit Klassifikation.'

  - source: '§30'
    target: 'Art.21.2.j'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 30 Abs. 2 Nr. 10 NIS2-UmsuCG "Verwendung von Loesungen der
      Multi-Faktor-Authentifizierung oder kontinuierlichen Authentifizierung,
      gesicherte Sprach-, Video- und Textkommunikation sowie gegebenenfalls
      gesicherte Notfallkommunikationssysteme" setzt Art. 21(2)(j) NIS2-RL um.
    audit_evidence_hint: 'MFA-Coverage-Report, Out-of-Band-Notfallkommunikationsplan, gesicherte Kommunikationsplattform-Inventar.'

  - source: '§31'
    target: 'Art.20.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 31 NIS2-UmsuCG "Pflichten der Geschaeftsleitung" setzt Art. 20(1)
      NIS2-RL "Governance" um. Leitungsorgane muessen die Risk-Mgmt-
      Massnahmen genehmigen, ihre Umsetzung supervisionieren, und haften
      persoenlich fuer Verstoesse.
    cross_refs: ['§32', '§34']
    audit_evidence_hint: 'Genehmigungs-Protokolle Geschaeftsleitung fuer ISMS-Massnahmen, Verantwortlichkeits-Matrix, dokumentierte Aufsichtspflicht.'

  - source: '§33'
    target: 'Art.31'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      § 33 NIS2-UmsuCG "Nachweispflichten" setzt einen Teilaspekt von Art. 31
      NIS2-RL "Allgemeine Aspekte der Aufsicht und Durchsetzung" um.
      Verpflichtung zu regelmaessigen Nachweisen gegenueber dem BSI.
      Art. 31 NIS2-RL ist breiter (zusaetzlich Aufsichts-Methodik,
      Verhaeltnismaessigkeitsprinzip).
    gap_warning: |
      § 33 deckt die Nachweispflicht-Seite ab; das prozessuale Aufsichts-
      Vorgehen findet sich in §§ 60-65 NIS2-UmsuCG.
    cross_refs: ['§60', '§61']
    audit_evidence_hint: 'Nachweis-Berichte an BSI, Audit-Plan, Konformitaets-Erklaerungen.'

  - source: '§34'
    target: 'Art.20.2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 34 NIS2-UmsuCG "Schulungen" setzt Art. 20(2) NIS2-RL um. Pflicht
      zu regelmaessigen Cybersicherheits-Schulungen fuer Mitglieder der
      Leitungsorgane (Empfehlung: vergleichbares Schulungsangebot fuer
      alle Beschaeftigten).
    cross_refs: ['§31']
    audit_evidence_hint: 'Schulungsplan Leitungsorgan, Teilnahmenachweise letzte 12 Monate, Curriculum mit Cyber-Themen.'

  - source: '§35'
    target: 'Art.24'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 35 NIS2-UmsuCG "Verwendung europaeischer Cybersicherheits-
      Zertifizierungssysteme" setzt Art. 24 NIS2-RL "Verwendung
      europaeischer Cybersicherheitszertifizierungssysteme" um.
      BSI/EU-Kommission koennen verbindliche Zertifizierungsanforderungen
      festlegen (z.B. EUCS, EUCC).
    audit_evidence_hint: 'Inventory verwendeter EU-Cybersecurity-Zertifikate (EUCS, EUCC), Zertifikats-Compliance-Status.'

  # ============================================================================
  # ABSCHNITT 4 — Meldepflichten (§ 32)
  # ============================================================================

  - source: '§32'
    target: 'Art.23.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 32 Abs. 1 NIS2-UmsuCG normiert die allgemeine Meldepflicht fuer
      erhebliche Sicherheitsvorfaelle und setzt Art. 23(1) NIS2-RL um.
      Pflicht zur unverzueglichen Meldung erheblicher Vorfaelle an das BSI.
    cross_refs: ['§30']
    audit_evidence_hint: 'Meldeprozess-Doku, dokumentierte Meldungen letzte 12 Monate, BSI-Single-Point-of-Contact-Benennung.'

  - source: '§32'
    target: 'Art.23.2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 32 Abs. 2 NIS2-UmsuCG setzt Art. 23(2) NIS2-RL um: 24h-Frueh-
      Warnung an BSI/CERT-Bund nach Kenntnisnahme eines erheblichen
      Sicherheitsvorfalls. Erstinformation mit Verdachtsindikatoren.
    cross_refs: ['§32']
    audit_evidence_hint: 'Frueh-Warnungs-Workflow mit 24h-SLA, Eskalationsmatrix, Vorlage Erstmeldung.'

  - source: '§32'
    target: 'Art.23.3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 32 Abs. 3 NIS2-UmsuCG setzt Art. 23(3) NIS2-RL um: 72h-Meldung
      mit erster Einschaetzung des Sicherheitsvorfalls (Schweregrad,
      Auswirkungen, Indikatoren der Kompromittierung).
    audit_evidence_hint: 'Vorlage 72h-Meldung, Test-Meldungen aus Tabletop-Uebungen, Quality-Review-Prozess.'

  - source: '§32'
    target: 'Art.23.4'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      § 32 Abs. 4 NIS2-UmsuCG setzt Art. 23(4) NIS2-RL um: Abschlussbericht
      binnen einem Monat nach Meldung gemaess Abs. 2 oder Zwischenbericht
      bei laufenden Vorfaellen.
    audit_evidence_hint: 'Abschlussbericht-Vorlage, dokumentierte Berichte letzte 12 Monate, Lessons-Learned-Tracking.'

  # ============================================================================
  # ABSCHNITT 5 — Kritische Anlagen (§§ 39-43) und Sektoren (§§ 44-50)
  # ============================================================================

  - source: '§39'
    target: 'Annex-I'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      § 39 NIS2-UmsuCG "Kritische Anlagen" definiert eine zusaetzliche
      Subkategorie von KRITIS-Betreibern mit Anlagen besonderer Kritikalitaet.
      Bezieht sich auf Annex-I-Sektoren (high-criticality) der NIS2-RL,
      ergaenzt um nationale KRITIS-Systematik. Subset, weil § 39 strenger
      ist als reine Annex-I-Zugehoerigkeit.
    gap_warning: |
      § 39 NIS2-UmsuCG erweitert die EU-Vorgabe um nationales KRITIS-
      Konzept. Wer rein NIS2-RL-konform ist, ist nicht automatisch § 39-konform.
    cross_refs: ['§40', '§41']
    audit_evidence_hint: 'KRITIS-Verordnungs-Schwellwert-Berechnung, Anlagenliste mit Kritikalitaets-Klassifikation.'

  - source: '§40'
    target: 'Art.21'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      § 40 NIS2-UmsuCG "Besondere Anforderungen an kritische Anlagen"
      ergaenzt den allgemeinen Risikomgmt-Katalog (§ 30) um zusaetzliche
      verschaerfte Anforderungen fuer Betreiber kritischer Anlagen.
      Setzt Art. 21 NIS2-RL strenger um als allgemein erforderlich.
    cross_refs: ['§39']
    audit_evidence_hint: 'Verschaerfter Massnahmenkatalog fuer kritische Anlagen, B3S-Konformitaets-Nachweis.'

  - source: '§41'
    target: 'Art.21.2.j'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      § 41 NIS2-UmsuCG "Systeme zur Angriffserkennung" verlangt fuer
      Betreiber kritischer Anlagen den Einsatz von SIEM/IDS/EDR-Systemen.
      Konkretisiert den Detection-Aspekt von Art. 21(2)(j) NIS2-RL fuer
      kritische Anlagen ueber das allgemeine NIS2-Niveau hinaus.
    audit_evidence_hint: 'SIEM/IDS/EDR-Architektur, Coverage-Report kritische Anlagen, BSI-konforme Angriffserkennungs-Doku.'

  - source: '§42'
    target: 'Art.21'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      § 42 NIS2-UmsuCG "Nachweise kritischer Anlagen" verschaerft die
      allgemeine Nachweispflicht (§ 33) fuer kritische Anlagen mit
      kuerzeren Audit-Zyklen und akkreditierten Pruefstellen.
    cross_refs: ['§33']
    audit_evidence_hint: 'Audit-Plan kritische Anlagen, Akkreditierungs-Nachweise der Pruefstellen, Audit-Reports.'

  - source: '§43'
    target: 'Art.21'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      § 43 NIS2-UmsuCG "Informations- und Unterstuetzungspflichten gegenueber
      dem BSI" konkretisiert fuer kritische Anlagen die Aufsichts-Mitwirkungs-
      pflichten. Nationale Konkretisierung der Aufsichtsbefugnisse aus
      Art. 31 ff. NIS2-RL fuer den KRITIS-Bereich.
    cross_refs: ['§60']
    audit_evidence_hint: 'Single-Point-of-Contact Benennung, dokumentierte Auskuenfte an BSI, Mitwirkungsprotokolle.'

  - source: '§44'
    target: 'Annex-I'
