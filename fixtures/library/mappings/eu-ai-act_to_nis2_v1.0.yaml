      meldung" teilt qualitativ aehnliche Inhalte (Schweregrad,
      Auswirkung, Massnahmen). Akteure und Bezugspunkte unterscheiden
      sich (Produkt-Vorfall vs. Betreiber-Vorfall).
    gap_warning: |
      Doppelmeldung-Logik: NIS2 Art. 23(2) gilt fuer Betreiber unabhaengig
      vom AI-Act-Status. Wer Provider UND Betreiber ist (z.B. Bank mit
      Eigen-KI), muss beide Meldungen separat unterhalten. AI-Act-
      Endbericht (Art. 73 weiter) und NIS2-Abschlussbericht (Art. 23.3,
      1 Monat) haben ueberlappende, aber nicht identische Anforderungen.

