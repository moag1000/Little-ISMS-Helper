    confidence: 'medium'
    rationale: |
      C5:2026 SIM-06 „Evaluation and Learning Process" misst und
      verbessert Incident-Mgmt-Wirksamkeit (KPI, Lessons Learned).
    audit_evidence_hint: 'PIR-Reports, MTTD/MTTR-Dashboard, Recurrence-Rate-Tracking.'

  - source: '21.2.f'
    target: 'SP-02'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      C5:2026 SP-02 „Review and Approval of Policies and Procedures" ist
      Wirksamkeits-Prüfungs-Massnahme auf Policy-Ebene.
    audit_evidence_hint: 'Policy-Review-Protokolle, Genehmigungs-Workflow, Versions-Historie.'

  # ===== Art. 21(2)(g) — Cyber-Hygiene + Schulung =====
  - source: '21.2.g'
    target: 'HR-03'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      NIS2 21(2)(g) „Cybersicherheits-Schulungen + grundlegende
