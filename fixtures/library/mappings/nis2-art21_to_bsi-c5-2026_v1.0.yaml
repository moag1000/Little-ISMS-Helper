    audit_evidence_hint: 'Schulungsplan, Schulungsquoten ≥95%, rollenspezifische Curricula, Phishing-Drill-Ergebnisse.'

  - source: '21.2.g'
    target: 'OPS-04'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      C5:2026 OPS-04 „Protection Against Malware - Policies and
      Procedures" ist Kern-Cyberhygiene-Massnahme aus 21(2)(g).
    cross_refs: ['OPS-05']
    audit_evidence_hint: 'Malware-Schutz-Konzept, AV/EDR-Coverage-Report, Quarantäne-Statistiken.'

  - source: '21.2.g'
    target: 'OPS-18'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      C5:2026 OPS-18 „Managing Vulnerabilities - Policies and
      Procedures" ist Patching-Cyberhygiene aus 21(2)(g).
    cross_refs: ['OPS-25', 'OPS-26', 'OPS-27']
    audit_evidence_hint: 'Vulnerability-Scan-Reports, Patch-Compliance-Dashboard, CVE-Tracking.'

  - source: '21.2.g'
    target: 'OPS-26'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
