schema_version: '1.1'
library:
  type: mapping
  id: 'bsi-c5-2020_to_eucs_v1.0'
  source_framework: 'BSI-C5'
  target_framework: 'ENISA-EUCS'
  version: 1
  effective_from: '2026-05-06'
  effective_until: null

  provenance:
    primary_source: 'ENISA EUCS European Cybersecurity Certification Scheme for Cloud Services (Substantial Level), public consultation drafts 2020-2024'
    primary_source_url: 'https://www.enisa.europa.eu/topics/cloud-and-big-data/eucs-candidate-cybersecurity-certification-scheme-for-cloud-services'
    secondary_sources:
      - 'BSI C5:2020 Kriterienkatalog (Anlage A: Vergleichstabelle ISO 27001 ↔ BSI C5)'
      - 'fixtures/library/mappings/bsi-c5-2020_to_iso27001-2022_v1.0.yaml (Bereichs-Logik und Pflichteninhalte)'
      - 'Inverse-Ableitung aus eucs_to_bsi-c5-2020_v1.0 (gleiche Pair-Logik, getauschte Source/Target; Relationship-Inversion equivalent↔equivalent, subset↔superset, partial_overlap↔partial_overlap)'
    publisher: 'Little ISMS Helper Maintainers'
    license_note: 'Mapping is original derivative work (AGPL-3.0). EUCS target IDs and area names © ENISA used under public consultation terms; BSI C5:2020 IDs © BSI used under reference-and-citation principles.'

  methodology:
    type: 'text_comparison_with_expert_review'
    description: |
      Reverse-Mapping ausgehend vom BSI-C5:2020-Kriterium auf das
      ENISA-EUCS-Pendant (Substantial-Assurance-Level). Reziprok zu
      eucs_to_bsi-c5-2020_v1.0 — gleiche Pair-Logik, invertierte
      Relationships:
      - equivalent ↔ equivalent
      - superset (EUCS breiter) ↔ subset (C5:2020 ist Teilmenge)
      - subset (EUCS schmaler) ↔ superset (C5:2020 breiter)
      - partial_overlap ↔ partial_overlap

      Provenance/Confidence aus Forward übernommen; Rationale aus
      C5:2020-Cloud-Anbieter-Sicht neu verfasst. Da der finale EUCS-
      Catalogue zum Stichtag 2026-05 noch nicht offiziell als ENISA-
      Implementing-Regulation veröffentlicht wurde, basieren konkrete
      Sub-IDs (z.B. OIS-01, IAM-02, CKM-01) auf den öffentlichen
      Konsultationsdokumenten 2020-2024. Wo die Sub-ID gegen den Final-
      Veröffentlichungsstand noch zu validieren ist, wird im rationale
      ausdrücklich vermerkt und confidence='medium' bzw. 'low' gewählt.

      Coverage: alle bekannten BSI-C5:2020-Bereiche aus den Little-ISMS-
      Helper-Fixtures (AM, BCM, BEI, BFM, COS, DEV, HR, IDM, KOS, KRY,
      MA, OPS, PI, PSC, RB, SIM) sind mindestens einmal gegen die 20
      EUCS-Bereiche (A1-A20) gemappt.

      Strukturelle Hinweise:
      - C5:2020 SIM-01 = ISMS-Steuerung (NICHT Security Incident
        Management — diese Bedeutungs-Verschiebung gilt erst in C5:2026)
      - C5:2020 COM-04 (Beauftragten-/Berichtswesen-Funktion) hat in
        EUCS kein 1:1-Pendant; Anteile in EUCS A1 OIS-04 (SoD) und A16
        (Compliance Reviews)
      - C5:2020 hatte keinen dedizierten Behördenanfrage-Bereich (wird
        durch EUCS A18 / C5:2026 INQ erstmals adressiert)

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2026-05-06', actor: 'maintainer' }
      - { state: 'published', date: '2026-05-06', actor: 'ciso-signoff' }

mappings:
  # ===== AM — Asset Management =====
  - source: 'AM-01'
    target: 'AM-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      BSI C5:2020 AM-01 „Asset-Inventar" entspricht direkt EUCS A4
      „Asset Management" mit Sub-Kriterium AM-01 (Asset Inventory).
      Pflichteninhalt deckungsgleich: vollständiges Inventar aller
      Cloud-Service-relevanten Assets mit Owner, Klassifikation und
      Stichtagsabgleich CMDB ↔ Cloud-Provisioning. ID-Übereinstimmung
      historisch bedingt — beide Frameworks orientieren sich an ISO
      27001 A.5.9.
    audit_evidence_hint: 'Asset-Inventar mit Owner-Feld, Klassifikation, Stichtagsabgleich CMDB ↔ Cloud-Provisioning.'

  # ===== BCM — Business Continuity Management =====
  - source: 'BCM-01'
    target: 'BC-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      BSI C5:2020 BCM-01 „Top-Management-Verantwortung und Business
      Continuity Strategie" entspricht direkt EUCS A15 „Business
      Continuity" mit Sub-Kriterium BC-01. Pflichteninhalt
      deckungsgleich: Top-Management-Commitment, BIA, BC-Strategie für
      Cloud-Anbieter, ISO-22301-konforme Steuerung.
    audit_evidence_hint: 'BC-Strategie, Top-Management-Freigabe, BIA, BC-Plans, Übungs-Reports der letzten 12 Monate.'

  # ===== BEI — Beziehungen zu Dritten =====
  - source: 'SSO-01'
    target: 'PM-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      BSI C5:2020 SSO-01 „Richtlinien und Anweisungen für Beziehungen zu
      Dritten" entspricht direkt EUCS A13 „Procurement and Suppliers"
      mit Sub-Kriterium PM-01. Pflichteninhalt deckungsgleich:
      vertragliche InfoSec-Pflichten gegenüber Sub-Dienstleistern,
      AVV-Klauseln nach Art. 28 DSGVO. Konkrete EUCS-Sub-ID gegen Final-
      Veröffentlichung zu validieren.
    cross_refs: ['SSO-04']
    audit_evidence_hint: 'Lieferantenverträge mit InfoSec-Klauseln, AVV nach Art. 28 DSGVO, Sub-Provider-Liste mit Risikobewertung.'

  - source: 'SSO-04'
    target: 'PM-02'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      BSI C5:2020 SSO-04 „Anforderungen an Lieferanten" entspricht
      direkt EUCS A13 PM-02 (Lieferanten-Risikobewertung).
      Pflichteninhalt deckungsgleich: Sub-Provider-Audit-Rechte,
      Risikobewertung eingebundener Drittparteien, formale Steuerung
      der Sub-Provider-Beziehungen.
    audit_evidence_hint: 'Sub-Provider-Risikobewertungen, Audit-Rechte-Klauseln, Sub-Provider-Verzeichnis.'

  # ===== BFM — Beauftragten-/Berichtswesen-Funktion =====
  - source: 'COM-04'
    target: 'OIS-04'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      BSI C5:2020 COM-04 „Beauftragten-/Berichtswesen-Funktion" hat in
      EUCS keine 1:1-Entsprechung. Schnittmenge mit EUCS A1 OIS-04
      „Segregation of Duties" (Funktionstrennung war in COM-04
      teilweise enthalten). Andere BFM-Anteile (Compliance-Reviews,
      Beauftragten-Rollen) liegen in EUCS A16 — kein einzelnes Pendant.
    gap_warning: |
      Wer C5:2020 COM-04 erfüllt, hat in EUCS Anteile in OIS-04 (SoD)
      und A16 (Compliance Reviews). Empfehlung: separate Beauftragten-
      Rollen-Dokumentation pflegen, da EUCS keine konsolidierte
      Beauftragten-Funktion fordert.
    cross_refs: ['A16-1']
    audit_evidence_hint: 'SoD-Matrix, Beauftragten-Bestellungen (DSB, ISB, BC-Beauftragter), Berichtswesen-Templates.'

  # ===== KOS — Kommunikationssicherheit =====
  - source: 'COS-01'
    target: 'CS-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      BSI C5:2020 COS-01 „Technische Schutzmaßnahmen" entspricht direkt
      EUCS A9 „Communication Security" mit Sub-Kriterium CS-01.
      Pflichteninhalt deckungsgleich: Netzwerk-Segmentierung, Firewall-
      Regeln, kryptografische Transportsicherung. Konkrete EUCS-Sub-ID
      gegen Final-Veröffentlichung zu validieren.
    audit_evidence_hint: 'Netzwerk-Segmentierungs-Konzept, Firewall-Rule-Review, Topologie-Dokument, TLS-Konfiguration.'

  # ===== KRY — Kryptographie =====
  - source: 'CRY-01'
    target: 'CKM-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      BSI C5:2020 CRY-01 „Richtlinie zur Verwendung von
      Verschlüsselungsverfahren und Schlüsselverwaltung" entspricht
      direkt EUCS A8 „Cryptography and Key Management" mit Sub-
      Kriterium CKM-01. Pflichteninhalt deckungsgleich; beide
      referenzieren BSI TR-02102 als Algorithmen-Baseline.
    audit_evidence_hint: 'Krypto-Richtlinie, Algorithmen-Allowlist (BSI TR-02102 konform), Key-Management-Verfahren (HSM oder gleichwertig).'

  # ===== HR / PSC — Personal =====
  - source: 'HR-03'
    target: 'AT-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      BSI C5:2020 HR-03 „Schulung und Sensibilisierung" entspricht
      direkt EUCS A20 „Awareness and Training" mit Sub-Kriterium AT-01.
      Pflichteninhalt deckungsgleich: regelmäßige Awareness-Schulungen
      für alle Beschäftigten inkl. rollenspezifischer Vertiefung für
      privilegierte Nutzer (z.B. Plattform-Admins).
    cross_refs: ['HR-01']
    audit_evidence_hint: 'Schulungs-Quote (≥95%), Phishing-Drill-Ergebnisse, rollenspezifische Curricula für Privileged Users.'

  - source: 'HR-01'
    target: 'AT-02'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      BSI C5:2020 HR-01 „Personalsicherheit" hat Schnittmenge mit EUCS
      A20 AT-02 (HR-Lifecycle-Awareness). HR-01 fokussiert auf
      Hintergrundüberprüfungen und vertragliche Pflichten; AT-02 auf
      Awareness-Vertiefung im Onboarding/Offboarding. Konkrete EUCS-
      Sub-ID gegen Final-Veröffentlichung zu validieren.
    gap_warning: |
      Wer C5:2020 HR-01 erfüllt, hat die EUCS-Pflichten zu Awareness-
      Verzahnung mit HR-Lifecycle nur teilweise abgedeckt — Empfehlung:
      Onboarding-/Offboarding-Checklisten mit dediziertem Awareness-
      Modul ergänzen.
    audit_evidence_hint: 'Hintergrundüberprüfungen, Führungszeugnis (privilegierte Rollen), Onboarding-/Offboarding-Checklisten.'

  # ===== IDM — Identitäts- und Berechtigungsverwaltung =====
  - source: 'IDM-01'
    target: 'IAM-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      BSI C5:2020 IDM-01 „Richtlinie zur Identitäts- und
      Berechtigungsverwaltung" entspricht direkt EUCS A7 „Identity,
      Authentication and Access Control" mit Sub-Kriterium IAM-01.
      Pflichteninhalt deckungsgleich.
    cross_refs: ['IDM-02']
    audit_evidence_hint: 'Identity-Management-Richtlinie, Berechtigungskonzept, Rollen-Modell.'

  - source: 'IDM-02'
    target: 'IAM-02'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      BSI C5:2020 IDM-02 „Benutzerregistrierung" entspricht direkt EUCS
      A7 IAM-02 (Provisioning). Joiner/Mover/Leaver-Workflows sind in
      beiden Frameworks Standardnachweis.
    audit_evidence_hint: 'Provisioning-Workflow, Joiner/Mover/Leaver-Tickets letzte 90 Tage.'

  - source: 'IDM-09'
    target: 'IAM-08'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      BSI C5:2020 IDM-09 „Authentifizierungsmechanismen" entspricht
      direkt EUCS A7 IAM-08 (Authentication Mechanisms).
      Pflichteninhalt deckungsgleich: MFA für administrative Zugriffe,
      kryptografisch starke Verfahren gemäß BSI TR-03116.
    audit_evidence_hint: 'MFA-Coverage 100% Admin-Accounts, Auth-Methoden-Inventar, Logs fehlgeschlagener Logins.'

  # ===== OPS — Betrieb =====
  - source: 'OPS-01'
    target: 'A2-1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      BSI C5:2020 OPS-01 „Leitlinie zur Informationssicherheit"
      entspricht direkt EUCS A2 „Information Security Policies".
      Pflichteninhalt deckungsgleich: vom Top-Management des Cloud-
      Anbieters freigegebene und veröffentlichte Sicherheitsleitlinie.
      Konkrete EUCS-Sub-ID gegen Final-Veröffentlichung zu validieren.
    audit_evidence_hint: 'Verabschiedete InfoSec-Leitlinie mit Management-Freigabe-Datum, jährliche Review-Protokolle.'

  - source: 'OPS-10'
    target: 'OS-02'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      BSI C5:2020 OPS-10 „Protokollierung und Monitoring —
      Verantwortlichkeiten" entspricht direkt EUCS A6 „Operational
      Security" mit Sub-Kriterium OS-02 (Logging und Monitoring).
      Pflichteninhalt deckungsgleich: SIEM-Use-Cases, 24/7-SOC-Coverage,
      Log-Retention.
    audit_evidence_hint: 'SIEM-Use-Case-Katalog, Alert-MTTR-Statistik, 24/7-Coverage-Nachweis (SOC), Log-Retention-Konfiguration.'

  - source: 'OPS-15'
    target: 'OS-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      BSI C5:2020 OPS-15 „Schutz vor Schadprogrammen — Konzept"
      entspricht direkt EUCS A6 OS-01 (Malware-Schutz). Pflichteninhalt
      deckungsgleich: dokumentiertes Schutz-Konzept gegen Malware auf
      Cloud-Plattform-Ebene mit AV/EDR-Coverage und Update-Pflichten.
    audit_evidence_hint: 'AV/EDR-Coverage-Report, Update-Frequenz-Nachweise, Quarantäne-Statistiken, dokumentiertes Schutz-Konzept.'

  - source: 'OPS-18'
    target: 'OS-03'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      BSI C5:2020 OPS-18 „Umgang mit Schwachstellen, Störungen und
      Fehlern" entspricht direkt EUCS A6 OS-03 (Schwachstellen-
      Management). Pflichteninhalt deckungsgleich: Schwachstellen-
      Identifikation, Bewertung und Patch-Management mit definierten
      SLAs für Critical-Patches.
    audit_evidence_hint: 'Vulnerability-Scan-Reports, Patch-Compliance-Dashboard mit SLA-Erfüllung, CVE-Tracking der letzten 90 Tage.'

  # ===== PI — Portabilität & Interoperabilität =====
  - source: 'PI-01'
    target: 'PI-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      BSI C5:2020 PI-01 „Sicherheit der Eingabe- und
      Ausgabeschnittstellen" entspricht direkt EUCS A10 „Portability
      and Interoperability" mit Sub-Kriterium PI-01. Pflichteninhalt
      deckungsgleich: API-Sicherheit, Datenexport-Funktionalität,
      sichere Daten-Übergabe und -Löschung. ID-Übereinstimmung
      historisch bedingt.
    audit_evidence_hint: 'API-Dokumentation, Datenexport-Funktionalität, Input-Validation, Daten-Lösch-Konzept.'

  # ===== RB — Regelbetrieb =====
  - source: 'OPS-06'
    target: 'A11-1'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      BSI C5:2020 OPS-06 (Regelbetrieb-Steuerung inkl. Change Management)
      hat Schnittmenge mit EUCS A11 „Change and Configuration
      Management". OPS-06 ist breiter und deckt zusätzliche
      Regelbetrieb-Aspekte (Backup, Konfiguration) ab; A11 fokussiert
      enger auf Change/Config. Konkrete EUCS-Sub-ID gegen Final-
      Veröffentlichung zu validieren.
    gap_warning: |
      Wer C5:2020 OPS-06 nur über EUCS A11 nachweist, hat ggf. Backup-
      und Recovery-Pflichten nicht abgedeckt — diese liegen in EUCS A6
      (Operational Security) oder A15 (Business Continuity) verteilt.
    cross_refs: ['BC-01']
    audit_evidence_hint: 'Change-Management-Richtlinie, CAB-Protokolle, Konfigurations-Baseline, Backup-Konzept.'

  - source: 'OIS-05'
    target: 'RM-02'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      BSI C5:2020 OIS-05 „Identifikation von Schwachstellen, Bedrohungen
      und funktionalen Mängeln" hat Schnittmenge mit EUCS A3 RM-02
      (Risikobewertung mit Threat-Komponente). OIS-05 fokussiert auf
      operatives Threat-Intelligence und Schwachstellen-Identifikation;
      RM-02 ist breiter und deckt strategisches Risk-Assessment ab.
      Konkrete EUCS-Sub-ID gegen Final-Veröffentlichung zu validieren.
    gap_warning: |
      Wer C5:2020 OIS-05 nur über EUCS A3 RM-02 nachweist, fehlt der
      operative Threat-Intel-Bezug (CERT-Bund, BSI-CERT). Empfehlung:
      OIS-05-Pflichten auch gegen EUCS A6 OS-03 (Vuln-Mgmt) abbilden.
    cross_refs: ['OS-03']
    audit_evidence_hint: 'Threat-Intel-Quellen-Liste, ausgewertete Bedrohungsmeldungen letzte 12 Monate, dokumentierte Eskalation an Cloud-Operations.'

  # ===== OIS — Organisation der Informationssicherheit (ISMS) =====
  - source: 'OIS-01'
    target: 'OIS-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      BSI C5:2020 OIS-01 „Informationssicherheits-Managementsystem (ISMS)"
      entspricht direkt EUCS A1 „Organization of Information Security"
      mit Sub-Kriterium OIS-01 (ISMS-Etablierung). Pflichteninhalt
      deckungsgleich: dokumentiertes ISMS mit Top-Management-Commitment
      und definierten Rollen. EUCS-Sub-ID gegen Final-Veroeffentlichung
      zu validieren.
    cross_refs: ['RM-01']
    audit_evidence_hint: 'ISMS-Scope-Dokument, ISMS-Handbuch, Management-Review-Protokolle, ISO-27001-Zertifikat oder gleichwertig.'

  # ===== SIM — Security Incident Management (Policy) =====
  - source: 'SIM-01'
    target: 'IM-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      BSI C5:2020 SIM-01 „Richtlinie fuer den Umgang mit Sicherheits-
      vorfaellen" entspricht direkt EUCS A14 „Incident Management"
      mit Sub-Kriterium IM-01 (Incident-Mgmt-Policy). Beide verlangen
      eine dokumentierte IR-Policy mit Klassifikation, Rollen und
      Eskalationswegen. WICHTIG: SIM-Bereich heisst sowohl in C5:2020
      als auch in C5:2026 „Security Incident Management" — die
      vermeintliche Umbenennung ist ein Missverstaendnis.
    cross_refs: ['IM-02']
    audit_evidence_hint: 'IR-Policy mit Incident-Klassifikation, Eskalations-Matrix, externe Kommunikations-Templates.'

  # ===== DEV — Entwicklung =====
  - source: 'DEV-01'
    target: 'DEV-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      BSI C5:2020 DEV-01 „Policies for the Development/Procurement of
      System Components" entspricht direkt EUCS A12 „Development of
      Information Systems" mit Sub-Kriterium DEV-01. Pflichteninhalt
      deckungsgleich: Secure-SDLC-Richtlinie, sichere Entwicklungs-
      praktiken, Code-Review-Pflichten. ID-Übereinstimmung historisch
      bedingt.
    cross_refs: ['DEV-02']
    audit_evidence_hint: 'Secure-SDLC-Richtlinie, Procurement-Policy, Code-Review-Protokolle.'

  - source: 'DEV-02'
    target: 'DEV-02'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      BSI C5:2020 DEV-02 „Outsourcing of the Development" entspricht
      direkt EUCS A12 DEV-02 (Outsourcing der Entwicklung).
      Pflichteninhalt deckungsgleich.
    audit_evidence_hint: 'Verträge mit Outsourcing-Entwicklern, Code-Review-Protokolle, Sub-Provider-Sicherheits-Klauseln.'

