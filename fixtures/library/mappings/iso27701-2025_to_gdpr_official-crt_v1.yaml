schema_version: '1.1'
library:
  type: mapping
  id: 'iso27701-2025_to_gdpr_official-crt_v1'
  source_framework: 'ISO27701_2025'
  target_framework: 'GDPR'
  version: 1
  effective_from: '2025-08-01'
  effective_until: null

  provenance:
    primary_source: 'ISO/IEC 27701:2025 Annex D — Mapping to the General Data Protection Regulation (GDPR)'
    primary_source_url: 'https://www.iso.org/standard/85819.html'
    provenance_source: 'official_iso27701_gdpr_annex'
    secondary_sources:
      - 'ISMS.online ISO 27701:2025 Annex D GDPR Mapping (https://www.isms.online/iso-27701/annex-d-2025-gdpr-mapping/)'
      - 'BfDI-Hinweispapier zu PIMS-Zertifizierung 2024-Q4'
    publisher: 'Little ISMS Helper Maintainers'
    integrity_note: >
      GDPR article numbers and ISO 27701:2025 control identifiers are factual
      identifiers reproduced from the normative Annex D of ISO/IEC 27701:2025.
      Article numbers and control IDs are not copyrightable. No requirement prose
      from the ISO standard is reproduced here. Source: ISO/IEC 27701:2025 edition,
      published by ISO/IEC JTC 1/SC 27 (DOI: https://www.iso.org/standard/85819.html).
      Control ID scheme in this file uses the app-internal format matching
      LoadIso27701v2025RequirementsCommand: 27701:2025-A.7.x.x (controller Annex A)
      and 27701:2025-B.8.x.x (processor Annex B), which correspond to the official
      Annex A / Annex B control numbering A.1.x.x / A.2.x.x respectively.

  methodology:
    type: 'published_official_mapping'
    description: >
      Authoritative Annex D from ISO/IEC 27701:2025. The standard normative annex
      provides a correspondence table between PIMS controls and GDPR articles.
      Only pairs whose source control exists in the ISO27701_2025 DB framework
      (via LoadIso27701v2025RequirementsCommand) are included; shared-security
      controls A.3.x are excluded as they lack standalone DB requirements in this
      framework version (they are covered via ISO27001 Annex A).
      Confidence 'high' = directly from Annex D table row;
      'medium' = derived from multi-article rows covering a GDPR article subset.

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2026-06-12', actor: 'maintainer' }
      - { state: 'published', date: '2026-06-12', actor: 'maintainer' }

# ---------------------------------------------------------------------------
# ISO 27701:2025 Annex D → GDPR mapping
# Provenance: official_iso27701_gdpr_annex
#
# Official Annex D ID  App DB ID                   GDPR articles (from Annex D)
# ─────────────────────────────────────────────────────────────────────────────
# Controller Annex A controls (A.1.x.x official → 27701:2025-A.7.x.x app)
# A.1.2.2              27701:2025-A.7.2.1          Art. 5(1)(b)
# A.1.2.3              27701:2025-A.7.2.2          Art. 5(1)(a), 6, 8, 9, 10, 17, 18, 22
# A.1.2.4              27701:2025-A.7.2.3          Art. 7, 8, 9(2)(a)
# A.1.2.5              27701:2025-A.7.2.4          Art. 7, 8, 9(2)(a)  [privacy notices]
# A.1.3.5              27701:2025-A.7.2.5          Art. 7(3), 13, 14, 18
# A.1.2.6 / Cl.6.1.2  27701:2025-6.1.2            Art. 35
# A.1.2.9              27701:2025-A.7.3.4          Art. 5(2), 24, 30
# A.1.3.3-4            27701:2025-A.7.3.5          Art. 11-15, 18, 21
# A.1.3.6              27701:2025-A.7.4.6          Art. 13, 14, 21
# A.1.3.7              27701:2025-A.7.3.6          Art. 5(1)(d), 13, 14, 16, 17
# A.1.3.9              27701:2025-A.7.4.4          Art. 15(3-4), 20
# A.1.3.10             27701:2025-A.7.3.8          Art. 12(3-6), 15
# A.1.3.11             27701:2025-A.7.4.3          Art. 13, 14, 22
# A.1.4.2-3            27701:2025-A.7.3.1          Art. 5(1)(b-c), 25(2)
# A.1.4.6              27701:2025-A.7.4.2          Art. 5(1)(c-e), 11
# A.1.5.2 / Cl.8.4     27701:2025-8.4              Art. 44-49
# Processor Annex B controls (A.2.x.x official → 27701:2025-B.8.x.x app)
# A.2.2.2              27701:2025-B.8.2.1          Art. 28, 35
# A.2.2.3              27701:2025-B.8.2.2          Art. 5(1)(a-b), 28(3)(a), 29, 32
# A.2.2.7              27701:2025-B.8.5.3          Art. 30(2-5)
# A.2.3.2              27701:2025-B.8.4.1          Art. 15(3), 17(2), 28(3)(e)
# A.2.4.3              27701:2025-B.8.2.3          Art. 28(3)(g)
# A.2.5.7              27701:2025-B.8.3.1          Art. 28(2)
# A.2.5.8              27701:2025-B.8.3.2          Art. 28(2-4)
# A.2.5.9              27701:2025-B.8.3.3          Art. 28(2)
# Management clauses (numbered as in ISO 27701:2025 Clause 4-10)
# Cl. 4.1              27701:2025-5.2.1            Art. 24, 25, 28, 32
# Cl. 4.2              27701:2025-5.2.2            Art. 31, 35
# Cl. 5.3              27701:2025-5.3              Art. 27, 37-39
# Cl. 6.1.2            (covered above under 27701:2025-6.1.2)
# ---------------------------------------------------------------------------

mappings:

  # ── PII Controller Annex A Controls ─────────────────────────────────────

  - source: '27701:2025-A.7.2.1'
    target: 'GDPR-5.1.b'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: >
      Annex D row A.1.2.2 "Identify and document purpose" → Art. 5(1)(b)
      purpose limitation. The PIMS purpose register documents specific,
      explicit and legitimate processing purposes and is the direct Art. 5(1)(b)
      compliance instrument.
    audit_evidence_hint: 'PIMS purpose register (A.7.2.1), RoPA-Zweckeintrag.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-A.7.2.2'
    target: 'GDPR-6'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: >
      Annex D row A.1.2.3 "Identify lawful basis" → Art. 6 lawfulness of
      processing. The PIMS lawful basis register is the Art. 6 compliance
      artefact — each processing activity requires a documented lawful basis.
    audit_evidence_hint: 'Rechtsgrundlagen-Register (A.7.2.2), RoPA-Rechtsgrundlageneintrag.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-A.7.2.3'
    target: 'GDPR-7'
    relationship: 'subset'
    confidence: 'high'
    rationale: >
      Annex D row A.1.2.4 "Determine when and how consent is obtained" →
      Art. 7 conditions for consent. The PIMS consent procedure covers when
      consent is required and how it must be validly obtained.
    audit_evidence_hint: 'Consent-Management-Verfahren (A.7.2.3), Einwilligungsnachweise.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-A.7.2.4'
    target: 'GDPR-13'
    relationship: 'subset'
    confidence: 'high'
    rationale: >
      Annex D row A.1.2.4-5 "Provide privacy notices" → Art. 13 information
      obligation at collection. Privacy notices are the primary instrument for
      Art. 13 compliance; PIMS notice templates map to Art. 13 content requirements.
    cross_refs: ['GDPR-14']
    audit_evidence_hint: 'Versionierte Datenschutzhinweise (A.7.2.4), Art.-13/14-Vollständigkeitsprüfung.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-A.7.2.5'
    target: 'GDPR-7'
    relationship: 'subset'
    confidence: 'high'
    rationale: >
      Annex D row A.1.3.5 "Provide mechanism to modify or withdraw consent" →
      Art. 7(3) right to withdraw consent at any time. The PIMS consent
      withdrawal mechanism is the operational Art. 7(3) implementation.
    cross_refs: ['GDPR-13', 'GDPR-14', 'GDPR-18']
    audit_evidence_hint: 'Widerrufskanal (A.7.2.5), Widerrufsprotokoll.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-6.1.2'
    target: 'GDPR-35'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: >
      Annex D row A.1.2.6 / Cl. 6.1.2 "PII protection impact assessment" →
      Art. 35 data protection impact assessment (DPIA). The PPIA process in
      ISO 27701:2025 is the GDPR-compliant DPIA instrument for high-risk processing.
    audit_evidence_hint: 'PPIA-Register (6.1.2), vollständige DPIA pro Hochrisiko-Verarbeitung.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-A.7.3.4'
    target: 'GDPR-30'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: >
      Annex D row A.1.2.9 "Records related to processing PII" → Art. 30
      records of processing activities (RoPA). The PIMS processing records
      are the direct Art. 30 compliance instrument for controllers.
    cross_refs: ['GDPR-5.2', 'GDPR-24']
    audit_evidence_hint: 'PIMS-Verarbeitungsverzeichnis (A.7.3.4), RoPA mit Art.-30-Pflichtfeldern.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-A.7.3.5'
    target: 'GDPR-15'
    relationship: 'subset'
    confidence: 'high'
    rationale: >
      Annex D row A.1.3.3-4 "Provide PII principals with access to their PII" →
      Art. 15 right of access. The PIMS access-request process operationalises
      the Art. 15 access right for data subjects.
    cross_refs: ['GDPR-13', 'GDPR-14', 'GDPR-18', 'GDPR-21']
    audit_evidence_hint: 'Zugangsantragsverfahren (A.7.3.5), Betroffenenrechte-Log.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-A.7.4.6'
    target: 'GDPR-21'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: >
      Annex D row A.1.3.6 "Object to processing" → Art. 21 right to object.
      The PIMS objection mechanism covers objection to direct marketing and
      profiling, implementing Art. 21 operationally.
    cross_refs: ['GDPR-13', 'GDPR-14']
    audit_evidence_hint: 'Widerspruchsverfahren (A.7.4.6), Widerspruchsprotokoll.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-A.7.3.6'
    target: 'GDPR-17'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: >
      Annex D row A.1.3.7 "Correction and erasure" → Art. 17 right to erasure
      ("right to be forgotten"). The PIMS erasure process covers deletion from
      primary systems, backups and downstream processors.
    cross_refs: ['GDPR-5.1.d', 'GDPR-16']
    audit_evidence_hint: 'Löschkonzept (A.7.3.6), Löschprotokolle, Backup-Lösch-Strategie.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-A.7.4.4'
    target: 'GDPR-20'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: >
      Annex D row A.1.3.9 "Data portability" → Art. 20 right to data portability.
      The PIMS data export mechanism provides PII in a structured, machine-readable
      format as required by Art. 20.
    cross_refs: ['GDPR-15']
    audit_evidence_hint: 'Datenportabilitäts-Export (A.7.4.4), strukturiertes Exportformat.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-A.7.3.8'
    target: 'GDPR-15'
    relationship: 'subset'
    confidence: 'high'
    rationale: >
      Annex D row A.1.3.10 "Provide information to PII principals on request" →
      Art. 15 right of access (information provision element). The PIMS information
      response process operationalises the Art. 15 response including the one-month
      deadline under Art. 12.
    cross_refs: ['GDPR-12']
    audit_evidence_hint: 'Anfrage-Tracking (A.7.3.8), Fristenprotokoll Art.-12-SLA.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-A.7.4.3'
    target: 'GDPR-22'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: >
      Annex D row A.1.3.11 "Automated decision making and AI systems" →
      Art. 22 automated individual decision-making including profiling. The PIMS
      automated-decision governance control covers safeguards, human oversight and
      individual rights in automated processing.
    cross_refs: ['GDPR-13', 'GDPR-14']
    audit_evidence_hint: 'Automated-Decision-Register (A.7.4.3), Human-Review-Prozess.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-A.7.3.1'
    target: 'GDPR-25'
    relationship: 'subset'
    confidence: 'high'
    rationale: >
      Annex D row A.1.4.2-3 "Limit collection / limit processing" →
      Art. 25 data protection by design and by default. Data minimisation at
      collection is the core operational measure for Art. 25(2) privacy by default.
    cross_refs: ['GDPR-5.1.b', 'GDPR-5.1.c']
    audit_evidence_hint: 'Datenminimierungsnachweis (A.7.3.1), PbD-Checkliste.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-A.7.4.2'
    target: 'GDPR-5.1.c'
    relationship: 'subset'
    confidence: 'high'
    rationale: >
      Annex D row A.1.4.6 "De-identification and deletion at end of processing" →
      Art. 5(1)(c-e) data minimisation and storage limitation. De-identification
      and deletion at end of processing operationalises the storage-limitation
      and data-minimisation principles.
    cross_refs: ['GDPR-5.1.e']
    audit_evidence_hint: 'Lösch-/Pseudonymisierungsplan (A.7.4.2), Aufbewahrungsfristen-Register.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-8.4'
    target: 'GDPR-44'
    relationship: 'subset'
    confidence: 'high'
    rationale: >
      Annex D row A.1.5.2 / Cl. 8.4 "Third country and international transfers" →
      Art. 44 general principle for transfers to third countries. The PIMS transfer
      assessment identifies and documents the legal basis for every cross-border PII
      transfer in accordance with Art. 44-49.
    cross_refs: ['GDPR-46']
    audit_evidence_hint: 'Transfer-Register (8.4), SCCs, BCR, Angemessenheitsbeschlüsse, TIA.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  # ── PII Processor Annex B Controls ──────────────────────────────────────

  - source: '27701:2025-B.8.2.1'
    target: 'GDPR-28'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: >
      Annex D row A.2.2.2 "Customer agreements and responsibilities" →
      Art. 28 processor obligation. The PIMS processor agreement requirement
      maps directly to the Art. 28 Data Processing Agreement (DPA/AVV) obligation.
    cross_refs: ['GDPR-35']
    audit_evidence_hint: 'AVV-Register (B.8.2.1), Art.-28-konforme AVV-Vorlage.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-B.8.2.2'
    target: 'GDPR-28'
    relationship: 'subset'
    confidence: 'high'
    rationale: >
      Annex D row A.2.2.3 "Process only on instructions" → Art. 28(3)(a)
      processor processes only on documented controller instructions. This is
      the core processor obligation under the GDPR.
    cross_refs: ['GDPR-5.1.a', 'GDPR-5.1.b']
    audit_evidence_hint: 'Weisungsdokumentation (B.8.2.2), Nachweis Weisungsgemäßheit.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-B.8.2.3'
    target: 'GDPR-28'
    relationship: 'subset'
    confidence: 'high'
    rationale: >
      Annex D row A.2.4.3 "Return, transfer or disposal of PII" →
      Art. 28(3)(g) processor obligation on deletion/return at end of services.
    audit_evidence_hint: 'Rückgabe-/Löschprotokoll (B.8.2.3), Nachweis Art. 28(3)(g).'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-B.8.4.1'
    target: 'GDPR-28'
    relationship: 'subset'
    confidence: 'high'
    rationale: >
      Annex D row A.2.3.2 "Provide assistance to customer" → Art. 28(3)(e)
      processor obligation to assist controller in fulfilling data subject rights.
    cross_refs: ['GDPR-15', 'GDPR-17']
    audit_evidence_hint: 'Betroffenenrechte-Unterstützungsverfahren (B.8.4.1).'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-B.8.5.3'
    target: 'GDPR-30'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: >
      Annex D row A.2.2.7 "Records related to processing PII (Processor)" →
      Art. 30(2)-(5) processor records of processing activities. Processors must
      maintain their own Art. 30 RoPA.
    audit_evidence_hint: 'Processor-RoPA (B.8.5.3), Art.-30-Abs.-2-Pflichtfelder.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-B.8.3.1'
    target: 'GDPR-28'
    relationship: 'subset'
    confidence: 'high'
    rationale: >
      Annex D row A.2.5.7 "Disclosure of subcontractors" → Art. 28(2)
      processor shall not engage sub-processor without prior authorisation.
    audit_evidence_hint: 'Sub-Processor-Liste (B.8.3.1), Vorab-Genehmigung.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-B.8.3.2'
    target: 'GDPR-28'
    relationship: 'subset'
    confidence: 'high'
    rationale: >
      Annex D row A.2.5.8 "Engagement of subcontractor" → Art. 28(2-4)
      same data protection obligations must be imposed on sub-processors.
    audit_evidence_hint: 'Sub-AVV-Vorlage (B.8.3.2), Nachweis gleicher Pflichten.'
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-B.8.3.3'
    target: 'GDPR-28'
    relationship: 'subset'
    confidence: 'high'
    rationale: >
      Annex D row A.2.5.9 "Change of subcontractor" → Art. 28(2) obligation
      to inform controller of intended changes concerning sub-processors.
    audit_evidence_hint: 'Änderungsbenachrichtigung Sub-Processor (B.8.3.3).'
    provenanceSource: 'official_iso27701_gdpr_annex'

  # ── Management System Clauses ────────────────────────────────────────────

  - source: '27701:2025-5.2.1'
    target: 'GDPR-24'
    relationship: 'subset'
    confidence: 'high'
    rationale: >
      Annex D row Cl. 4.1 "Understanding the organisation and its context" →
      Art. 24 responsibility of the controller (accountability principle).
      Understanding context is the foundation of the PIMS accountability structure.
    cross_refs: ['GDPR-25', 'GDPR-28', 'GDPR-32']
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-5.2.2'
    target: 'GDPR-35'
    relationship: 'subset'
    confidence: 'medium'
    rationale: >
      Annex D row Cl. 4.2 "Needs and expectations of interested parties" →
      Art. 35 DPIA. Understanding stakeholder needs and the interests of data
      subjects feeds DPIA scoping, particularly identifying which processing
      activities may result in high risk.
    cross_refs: ['GDPR-31']
    provenanceSource: 'official_iso27701_gdpr_annex'

  - source: '27701:2025-5.3'
    target: 'GDPR-37'
    relationship: 'subset'
    confidence: 'medium'
    rationale: >
      Annex D row Cl. 5.3 "Roles and responsibilities" → Art. 37-39 data
      protection officer (DPO). The PIMS roles clause requires designation
      of a PII protection officer, equivalent to the GDPR DPO obligation.
    cross_refs: ['GDPR-38', 'GDPR-39']
    provenanceSource: 'official_iso27701_gdpr_annex'
