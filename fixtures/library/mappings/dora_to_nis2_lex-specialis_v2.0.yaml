  # ============================================================================
  # CHAPTER III — ICT Incident Management & Reporting (Art. 17-23)
  # ============================================================================

  # ----- Art. 17 — ICT incident management process -----
  - source: 'Art.17'
    target: 'Art.21.2.b'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 17 verlangt einen dokumentierten Incident-Mgmt-Prozess mit
      Detection, Response, Recovery, Lessons-Learned, Rollen und Verantwortlichkeiten.
      NIS2 Art. 21(2)(b) "Bewaeltigung von Sicherheitsvorfaellen" wird vollstaendig
      adressiert. DORA ist konkreter (Pflicht-Inhalte des Prozesses, Klassifizierungs-
      Pflicht). Finanzdienstleister im DORA-Scope erfuellen NIS2 Art. 21(2)(b)
      durch DORA Art. 17.
    cross_refs: ['Art.10', 'Art.11', 'Art.18']
    audit_evidence_hint: 'Incident-Response-Plan, Rollen-Matrix (CSIRT/IR-Team), Eskalations-Verfahren, IR-Uebungen.'

  # ----- Art. 18 — Classification of ICT incidents -----
  - source: 'Art.18'
    target: 'Art.23.1'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 18 plus RTS 2024/1772 spezifizieren quantitative Klassifizierungs-
      Kriterien fuer "major ICT-related incidents" (Anzahl betroffener Clients,
      Datenverlust, Reputationsschaden, geografischer Scope, Dauer). Diese
      Klassifizierung ist Voraussetzung fuer die DORA-Meldepflicht (Art. 19),
      die ihrerseits NIS2-Art. 23-Meldungen aequivalent abdeckt. Finanzdienst-
      leister im DORA-Scope erfuellen die Klassifizierungs-/Meldegrund-
      Pflicht von NIS2 Art. 23(1) durch DORA Art. 18.
    cross_refs: ['Art.19']
    audit_evidence_hint: 'Klassifizierungs-Matrix nach RTS 2024/1772, dokumentierte Schwellwerte, klassifizierte Incidents letzte 12 Monate.'

  # ----- Art. 19 — Reporting of major ICT-related incidents -----
  - source: 'Art.19'
    target: 'Art.23.2'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 19(4) (a) verlangt die Initial-Meldung "ohne unnoetige Verzoegerung,
      und in jedem Fall innerhalb von 4 Stunden ab dem Zeitpunkt der Klassifizierung
      als major incident" (gemaess ITS 2024/1773). NIS2 Art. 23(2) verlangt die
      Fruehwarnung an CSIRT/zustaendige Behoerde innerhalb 24 Stunden nach
      Kenntnisnahme. DORA-Frist ist deutlich strenger. Finanzdienstleister im
      DORA-Scope erfuellen NIS2 Art. 23(2) durch DORA Art. 19; doppelte
      Reporting-Pflicht zu CSIRT bleibt jedoch nach Art. 4(2) NIS2 bestehen.
    gap_warning: |
      KRITISCH: DORA-Meldungen gehen an BaFin/Bundesbank (zustaendige Behoerde
      nach DORA), NIS2-Meldungen an BSI/CSIRT. Fuer DORA-pflichtige Finanz-
      unternehmen, die auch NIS2-pflichtig sind, ist Doppelmeldung Pflicht
      (Art. 4(2) NIS2). Single-Reporting reicht NICHT.
    cross_refs: ['Art.20', 'Art.21']
    audit_evidence_hint: 'Incident-Meldeprotokolle mit Zeitstempeln, parallele BaFin- und BSI-Meldungen, Eskalationsplan inkl. Behoerden-Kontakte.'

  - source: 'Art.19'
    target: 'Art.23.3'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 19(4)(b) verlangt die Intermediate-Meldung "innerhalb von
      72 Stunden nach Einreichung der initialen Meldung" mit Status-Updates
      und ersten Befunden. NIS2 Art. 23(3) verlangt analog 72h-Meldung mit
      erster Einschaetzung. DORA-Frist und NIS2-Frist sind identisch (72h),
      DORA-Inhalte sind detaillierter (RTS-Mindestfelder).
      Finanzdienstleister im DORA-Scope erfuellen NIS2 Art. 23(3) durch DORA Art. 19;
      Doppelmeldung Pflicht bleibt.
    cross_refs: ['Art.20']
    audit_evidence_hint: 'Intermediate-Reports nach RTS-Format, parallele BaFin- und BSI-Meldungen.'

  - source: 'Art.19'
    target: 'Art.23.4'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 19(4)(c) verlangt den Final-Report spaetestens 1 Monat nach
      Einreichung der initialen Meldung (oder Intermediate, falls Vorfall
      anhaltend). NIS2 Art. 23(4) verlangt analog Abschlussbericht binnen
      1 Monat oder Zwischenbericht bei laufender Behandlung. DORA-Inhalte
      sind detaillierter (RTS-Mindestfelder, Root-Cause-Analyse Pflicht).
      Finanzdienstleister im DORA-Scope erfuellen NIS2 Art. 23(4) durch DORA Art. 19.
    cross_refs: ['Art.13']
    audit_evidence_hint: 'Final-Reports nach RTS-Format mit Root-Cause-Analyse, parallele BaFin- und BSI-Final-Reports.'

  - source: 'Art.19'
    target: 'Art.23.1'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 19(1) etabliert die grundsaetzliche Meldepflicht "ohne
      unnoetige Verzoegerung" — Aequivalent zu NIS2 Art. 23(1) "unverzueglich".
      Finanzdienstleister im DORA-Scope erfuellen die grundsaetzliche
      Meldepflicht von NIS2 Art. 23(1) durch DORA Art. 19.
    audit_evidence_hint: 'Meldeprozess-Dokumentation, Eskalations-SLA, parallele Meldewege Doku.'

  # ----- Art. 20 — Standardisation of incident reporting -----
  - source: 'Art.20'
    target: 'Art.23.3'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      DORA Art. 20 verlangt standardisierte Templates und Prozesse fuer
      Incident-Reporting (RTS/ITS). NIS2 Art. 23(3) erwartet ebenfalls
      standardisierte Inhalte. DORA-Standardisierung ist konkreter (XBRL,
      ESA-Format). Aequivalenz fuer Format-Pflicht.
    cross_refs: ['Art.19']
    audit_evidence_hint: 'Reporting-Templates nach RTS/ITS, XBRL-Compliance-Nachweise.'

  # ----- Art. 23 — Operational/Security Payment-Related Incidents -----
  - source: 'Art.23'
    target: 'Art.21.2.b'
    relationship: 'superset'
    confidence: 'medium'
    rationale: |
      DORA Art. 23 erweitert das Incident-Mgmt fuer Kreditinstitute, E-Geld-Institute
      und Zahlungsinstitute auf zahlungsbezogene operationelle und Sicherheits-
      vorfaelle. Damit umfassende Abdeckung von NIS2 Art. 21(2)(b) fuer
      Zahlungsverkehrs-Incidents. Aequivalenz fuer Payment-Sektor-Spezifika.
    cross_refs: ['Art.17']
    audit_evidence_hint: 'Payment-Incident-Klassifizierung, sektorale Meldepflichten gemaess Art. 23.'

  # ============================================================================
  # CHAPTER IV — Digital Operational Resilience Testing (Art. 24-27)
  # ============================================================================

  # ----- Art. 24 — General requirements for testing -----
  - source: 'Art.24'
    target: 'Art.21.2.f'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 24 verlangt ein umfassendes Digital-Operational-Resilience-Testing-
      Programm (DORT), das mindestens jaehrliche Tests aller kritischen ICT-Systeme
      vorschreibt (Vulnerability Assessments, Open-Source-Analyses, Penetration
      Tests, Network-Security-Assessments). NIS2 Art. 21(2)(f) "Wirksamkeits-
      bewertung" ist hierin enthalten und uebererfuellt. Finanzdienstleister im
      DORA-Scope erfuellen NIS2 Art. 21(2)(f) durch DORA Art. 24.
    cross_refs: ['Art.25', 'Art.26']
    audit_evidence_hint: 'DORT-Test-Plan, jaehrliche Test-Berichte, Vulnerability-Assessment-Reports, Pen-Test-Reports.'

  # ----- Art. 25 — Testing of ICT tools and systems -----
  - source: 'Art.25'
    target: 'Art.21.2.f'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 25 spezifiziert die Tests aus Art. 24: Vulnerability Scans,
      Penetration Tests, Source-Code-Reviews, Performance-Tests, End-to-End-Tests.
      NIS2 Art. 21(2)(f) Wirksamkeits-Bewertung wird durch detaillierte
      Test-Pflicht abgedeckt. Finanzdienstleister im DORA-Scope erfuellen
      den Test-Anteil von NIS2 Art. 21(2)(f) durch DORA Art. 25.
    cross_refs: ['Art.24']
    audit_evidence_hint: 'Test-Inventar, Test-Reports nach RTS, Remediation-Tracking.'

  # ----- Art. 26 — Threat-Led Penetration Testing (TLPT) -----
  - source: 'Art.26'
    target: 'Art.21.2.f'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 26 verpflichtet groesste Finanzunternehmen zu Threat-Led-Penetration-
      Testing (TLPT) alle 3 Jahre nach TIBER-EU-Methodik. Dies geht weit ueber
      NIS2 Art. 21(2)(f) hinaus — NIS2 hat KEINE TLPT-Pflicht. DORA Art. 26
      uebererfuellt NIS2 21(2)(f) deutlich.
    gap_warning: |
      DORA Art. 26 ist EXKLUSIV — geht weit ueber NIS2 hinaus (TIBER-EU-Methodik,
      Red-Team-Exercise auf Live-Systemen). KEIN NIS2-Pendant; DORA-spezifische
      Anforderung fuer DORA-Scope-Unternehmen.
    cross_refs: ['Art.27']
    audit_evidence_hint: 'TLPT-Test-Plan nach TIBER-EU, Red-Team-Reports, Threat-Intel-Provider-Vertraege, Tester-Qualifikations-Nachweise.'

  - source: 'Art.27'
    target: 'Art.21.2.f'
    relationship: 'superset'
    confidence: 'medium'
    rationale: |
      DORA Art. 27 spezifiziert Anforderungen an TLPT-Tester (Unabhaengigkeit,
      Qualifikation, Experten-Zertifizierung). Geht ueber NIS2 hinaus. Aequivalent
      fuer den Test-Qualitaets-Anteil von NIS2 Art. 21(2)(f).
    cross_refs: ['Art.26']
    audit_evidence_hint: 'Tester-Qualifikations-Nachweise, Unabhaengigkeitserklaerungen.'

  # ============================================================================
  # CHAPTER V — Third-Party Risk Management (Art. 28-44)
