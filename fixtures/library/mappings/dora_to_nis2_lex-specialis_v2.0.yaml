      DORA Art. 30 verpflichtet zu Vertragsklauseln inkl. SLA und Wartungs-
      anforderungen. Unterstuetzt damit NIS2 Art. 21(2)(e) bei extern erbrachten
      Wartungsleistungen (z.B. Cloud-Provider-Wartung). System-Eigenwartung
      bleibt ueber DORA Art. 9 abgedeckt.
