schema_version: '1.1'
library:
  type: mapping
  id: 'dora_to_nis2_lex-specialis_v2.0'
  source_framework: 'DORA'
  target_framework: 'NIS2'
  version: 2
  effective_from: '2026-05-06'
  effective_until: null

  provenance:
    primary_source: 'EU Commission Guidelines on the application of Article 4(1) and 4(2) NIS2 Directive (Communication 2023/C 328/02, CELEX:52023XC0918(01))'
    primary_source_url: 'https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52023XC0918(01)'
    secondary_sources:
      - 'ENISA Technical Implementation Guidance on Cybersecurity Risk-Management Measures v1.0 (June 2025)'
      - 'EBA Single Rule Book Q&A 2024_7060: Lex Specialis NIS2 Directive'
      - 'EBA/EIOPA/ESMA Joint Committee — DORA RTS/ITS suite (JC 2023 86 ICT Risk Management Framework et al.)'
      - 'Verordnung (EU) 2022/2554 (DORA), Amtliches Werk der EU'
      - 'Richtlinie (EU) 2022/2555 (NIS2), Amtliches Werk der EU'
    publisher: 'Little ISMS Helper Maintainers'
    license_note: |
      Mapping is original derivative work (AGPL-3.0). DORA article references © Europäische Union,
      public-domain-equivalent (Amtliches Werk). NIS2 article references © Europäische Union,
      public-domain-equivalent (Amtliches Werk). Equivalence assessment derived from EU Commission
      Communication 2023/C 328/02 (lex specialis declaration) and ENISA TIG v1.0 (June 2025).

  methodology:
    type: 'published_official_mapping'
    description: |
      Diese Mappings dokumentieren die DORA-Aequivalenz zu NIS2-Pflichten gemaess Artikel 4(1)
      NIS2-Richtlinie. Finanz-Unternehmen im DORA-Scope koennen die jeweilige NIS2-Pflicht ueber
      die korrespondierende DORA-Bestimmung erfuellen. Die Reporting-Pflicht zu sektoral
      zustaendigen CSIRTs bleibt nach Art. 4(2) NIS2 bestehen (z.B. Doppelmeldung an Bundesbank/
      BaFin nach DORA Art. 19 + zusaetzlich an BSI/BSI-CERT nach NIS2 Art. 23).

      Rechtsstatus: DORA (Verordnung EU 2022/2554) ist seit 17.01.2025 unmittelbar anwendbar
      und ausdruecklich lex specialis zu NIS2 (Richtlinie EU 2022/2555) gemaess NIS2 Art. 4(1).
      Wo DORA-Anforderungen "at least equivalent in effect" zu NIS2 sind (Commission Communication
      2023/C 328/02), gelten die entsprechenden NIS2-Bestimmungen NICHT mehr fuer das
      Finanz-Unternehmen — DORA ueberlagert. Das Mapping macht diese Substitution explizit
      fuer Audit-Zwecke.

      NIS2-Sub-IDs im Mapping (analog zu bsi-c5-2026_to_nis2-art21_v1.0):
      - 'Art.20.1' = Mgmt-Body Genehmigung + Supervision aller Risk-Mgmt-Massnahmen
      - 'Art.20.2' = Cybersicherheits-Schulung der Leitungsorgane
      - 'Art.21.2.a' = Risikoanalyse-Konzepte + Sicherheitsrichtlinien
      - 'Art.21.2.b' = Bewaeltigung von Sicherheitsvorfaellen
      - 'Art.21.2.c' = Aufrechterhaltung des Betriebs / Backup / Krisenmgmt
      - 'Art.21.2.d' = Sicherheit der Lieferkette (Beziehungen zu Anbietern/Dienstleistern)
      - 'Art.21.2.e' = Sicherheit bei Erwerb, Entwicklung und Wartung von IT-Systemen
      - 'Art.21.2.f' = Konzepte und Verfahren zur Bewertung der Wirksamkeit
      - 'Art.21.2.g' = Cyberhygiene-Massnahmen + Schulung in Cybersicherheit
      - 'Art.21.2.h' = Konzepte und Verfahren fuer Kryptografie und Verschluesselung
      - 'Art.21.2.i' = Personalsicherheit, Zugriffskonzepte, Asset-Mgmt
      - 'Art.21.2.j' = MFA / kontinuierliche Authentifizierung + gesicherte Sprach/Video/Text-Kommunikation
      - 'Art.23.1' = unverzuegliche Meldung
      - 'Art.23.2' = 24h-Fruehwarnung an CSIRT/zustaendige Behoerde
      - 'Art.23.3' = 72h-Meldung mit erster Einschaetzung
      - 'Art.23.4' = Abschlussbericht binnen 1 Monat (oder Zwischenbericht)

      DORA-Source-IDs (granular pro Article gemaess Verordnung 2022/2554):
      - Chapter II: Art.5 (Governance), Art.6 (ICT-Risk-Framework), Art.7 (Tools), Art.8
        (Identification), Art.9 (Protection), Art.10 (Detection), Art.11 (Response/Recovery),
        Art.12 (Backup), Art.13 (Learning), Art.14 (Communication), Art.15 (Harmonisation),
        Art.16 (Simplified Framework)
      - Chapter III: Art.17 (Incident-Process), Art.18 (Classification), Art.19 (Reporting
        4h/72h/1M), Art.20 (Standardisation), Art.21 (Centralisation), Art.22 (Feedback),
        Art.23 (Payment-related Incidents)
      - Chapter IV: Art.24 (Testing General), Art.25 (Tools-Testing), Art.26 (TLPT),
        Art.27 (Tester-Qualifikation)
      - Chapter V: Art.28 (TPP-General), Art.29 (Concentration), Art.30 (Contractual),
        Art.31-44 (Critical-TPP-Oversight)
      - Chapter VI: Art.45 (Information Sharing)

      Methodik je DORA-Article:
      1. Volltext-Abgleich DORA-Norm gegen NIS2 Art. 20-21-23
      2. EU-Commission-Communication 2023/C 328/02 als Aequivalenz-Anker pruefen
      3. ENISA TIG v1.0 (June 2025) als technische Konkretisierung
      4. Relationship: 'superset' (DORA strenger), 'equivalent' (selten, fast deckungsgleich),
         'subset' (NIS2 breiter, z.B. Art.21.2.g all-employee-Schulung)
      5. Confidence: high bei expliziter EU-Commission-Aequivalenz, medium bei ENISA-Ableitung,
         low bei interpretativen Aequivalenzen
      6. gap_warning bei Themen, die NIS2 verlangt, aber DORA nicht oder nur teilweise abdeckt
      7. 4-Augen-Review durch zweiten Compliance-Manager mit Finanzsektor-Erfahrung

      Confidence-Verteilung (Soll):
      - high (~70%): Direkte EU-Commission/ENISA-Aequivalenz, Volltext-Overlap
      - medium (~25%): Ableitung aus RTS/ITS, Bedingte Aequivalenz mit ergaenzenden Massnahmen
      - low (~5%): Interpretative Aequivalenz, gap_warning Pflicht

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2026-05-06', actor: 'maintainer' }
      - { state: 'review',    date: '2026-05-06', actor: 'maintainer' }
      - { state: 'approved',  date: '2026-05-06', actor: 'reviewer-2' }
      - { state: 'published', date: '2026-05-06', actor: 'ciso-signoff' }

mappings:
  # ============================================================================
  # CHAPTER II — ICT Risk Management (Art. 5-16)
  # ============================================================================

  # ----- Art. 5 — Governance and organisation -----
  - source: 'Art.5'
    target: 'Art.20.1'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 5(1)-(2) verpflichtet das Leitungsorgan ("management body") zur
      letztverantwortlichen Steuerung des ICT-Risk-Management-Frameworks: Genehmigung
      der ICT-Strategie, jaehrliche Review, dokumentierte Verantwortlichkeiten.
      NIS2 Art. 20(1) verlangt analog, dass die Leitungsorgane die Risk-Mgmt-Massnahmen
      genehmigen und ihre Umsetzung supervisionieren. DORA Art. 5 ist deutlich
      detaillierter (jaehrliche Review-Frequenz, dokumentierte Risk-Tolerance,
      Independence-Anforderungen an Kontrollfunktionen) — vollstaendige Substitution
      gemaess NIS2 Art. 4(1) i.V.m. Commission Communication 2023/C 328/02.
      Finanzdienstleister im DORA-Scope erfuellen NIS2 Art. 20(1) durch DORA Art. 5;
      doppelte Reporting-Pflicht zu CSIRT bleibt jedoch nach Art. 4(2) NIS2
      (sektorale Harmonisierung) bestehen.
    cross_refs: ['Art.6']
    audit_evidence_hint: 'Board-Genehmigungs-Protokoll der ICT-Strategie, jaehrliche Review-Berichte des ICT-Risk-Frameworks, Mgmt-Verantwortlichkeits-Matrix.'

  - source: 'Art.5.4'
    target: 'Art.20.2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DORA Art. 5(4) verpflichtet die Mitglieder des Leitungsorgans, ihr ICT-Wissen
      kontinuierlich zu aktualisieren ("regular specific training"). NIS2 Art. 20(2)
      verlangt analog Cybersicherheits-Schulungen fuer Leitungsorgane.
      Inhaltlich nahezu deckungsgleich; DORA setzt zusaetzlich auf Themen wie
      ICT-Third-Party-Risk und Digital Operational Resilience. EU-Commission
      Communication 2023/C 328/02 bestaetigt Aequivalenz fuer Finanzdienstleister.
      Finanzdienstleister im DORA-Scope erfuellen NIS2 Art. 20(2) durch DORA Art. 5(4).
    audit_evidence_hint: 'Schulungsplan Leitungsorgan mit ICT/Cyber-Themen, Teilnahmenachweise letzte 12 Monate, Curriculum mit DORA-spezifischen Inhalten (TPP-Risk, DORT).'

  # ----- Art. 6 — ICT Risk Management Framework -----
  - source: 'Art.6'
    target: 'Art.21.2.a'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 6 verlangt ein umfassendes, dokumentiertes ICT-Risk-Management-Framework
      mit Strategien, Politiken, Verfahren, Protokollen und Tools — jaehrlich review-pflichtig
      und nach jedem schweren Incident. NIS2 Art. 21(2)(a) verlangt allgemein "Konzepte fuer
      Risikoanalyse und Sicherheit der Informationssysteme". DORA Art. 6 ist deutlich
      konkreter (RTS JC 2023 86 spezifiziert Mindestinhalte). Finanzdienstleister im
      DORA-Scope erfuellen NIS2 Art. 21(2)(a) durch DORA Art. 6; doppelte Reporting-Pflicht
      zu CSIRT bleibt jedoch nach Art. 4(2) NIS2 bestehen.
    cross_refs: ['Art.5', 'Art.16']
    audit_evidence_hint: 'ICT-Risk-Management-Framework-Dokument mit Board-Approval, jaehrlicher Review-Bericht, RTS-JC-2023-86-Compliance-Nachweis.'

  - source: 'Art.6.5'
    target: 'Art.21.2.f'
    relationship: 'superset'
    confidence: 'medium'
    rationale: |
      DORA Art. 6(5) verlangt mindestens jaehrliche Review des ICT-Risk-Frameworks
      sowie nach jedem schweren ICT-Incident. NIS2 Art. 21(2)(f) verlangt "Konzepte
      und Verfahren zur Bewertung der Wirksamkeit von Risikomgmt-Massnahmen". DORA
      ist hier prozessorientiert (Review-Frequenz vorgeschrieben), NIS2 erwartet
      zusaetzlich Wirksamkeits-KPIs (MTTD/MTTR, Patch-Compliance). Aequivalenz
      gemaess Commission Communication 2023/C 328/02 nur, wenn DORA-Review
      explizit Wirksamkeits-Kriterien dokumentiert.
    gap_warning: |
      DORA Art. 6(5) deckt Review-Frequenz ab, aber NIS2 21(2)(f) erwartet
      Wirksamkeits-KPIs. Bestandsanwender sollten KPI-Dashboard ergaenzen, um
      lueckenlose NIS2-Aequivalenz nachzuweisen.
    audit_evidence_hint: 'Jaehrliche Review-Berichte, Wirksamkeits-KPIs (MTTD/MTTR, Patch-Compliance, Schulungsquote), Lessons-Learned-Tracking.'

  # ----- Art. 7 — ICT systems, protocols and tools -----
  - source: 'Art.7'
    target: 'Art.21.2.e'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 7 verlangt zuverlaessige, ausreichend dimensionierte ICT-Systeme,
      Protokolle und Tools, die Volumen, Komplexitaet und Geschwindigkeit der
      Geschaeftstaetigkeit unterstuetzen, Datenintegritaet sichern und Latenz minimieren.
      NIS2 Art. 21(2)(e) verlangt "Sicherheit beim Erwerb, der Entwicklung und Wartung
      von Netz- und Informationssystemen". DORA Art. 7 ist Voraussetzung dafuer und
      explizit qualitativer (Reliability + Capacity + Resiliency).
      Finanzdienstleister im DORA-Scope erfuellen den System-Reliability-Anteil von
      NIS2 Art. 21(2)(e) durch DORA Art. 7; SDLC-Anteil ergaenzend ueber DORA Art. 8-9.
    cross_refs: ['Art.8', 'Art.9']
    audit_evidence_hint: 'Capacity-Planning-Reports, ICT-System-Inventar, Reliability-/Latency-KPIs, Architektur-Reviews.'

  # ----- Art. 8 — Identification -----
  - source: 'Art.8'
    target: 'Art.21.2.i'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 8 verpflichtet zu vollstaendiger Identifikation und Klassifizierung
      aller ICT-Assets, ICT-supported-Business-Funktionen und ihrer Abhaengigkeiten,
      mindestens jaehrlich. NIS2 Art. 21(2)(i) erwartet u.a. Asset-Mgmt als Teil
      eines breiteren Spektrums (Personalsicherheit, Zugriffskonzepte). DORA-Asset-
      Inventar ist deutlich detaillierter (Funktionsklassifikation "critical or
      important" mit Auswirkung auf Vertrags-, Test- und Reporting-Pflichten).
      Finanzdienstleister im DORA-Scope erfuellen den Asset-Mgmt-Anteil von
      NIS2 Art. 21(2)(i) durch DORA Art. 8.
    gap_warning: |
      DORA Art. 8 deckt Asset-Mgmt; HR-Aspekte (Background-Checks, NDA, Onboarding/
      Offboarding) und Zugriffskonzepte sind in Art. 8 nicht primaer geregelt —
      hierfuer DORA Art. 9 + ergaenzende HR-Policies (z.B. MaRisk AT 7.1) als
      separate Evidenz fuehren.
    cross_refs: ['Art.9']
    audit_evidence_hint: 'Asset-Inventar mit DORA-Klassifizierung "critical or important", Dependency-Map, jaehrlicher Re-Assessment-Bericht.'

  - source: 'Art.8'
    target: 'Art.21.2.a'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 8(2) verlangt kontinuierliche Identifikation aller ICT-Risks (intern +
      extern) — ist damit operativer Eingang fuer das Risk-Management gemaess Art. 6.
      NIS2 Art. 21(2)(a) verlangt Konzepte fuer Risikoanalyse. DORA-Identifikation
      ist Voraussetzung fuer Risikoanalyse und detaillierter (Cyber-Threats inkl.
      ICT-Risks fuer kritische Funktionen). Finanzdienstleister im DORA-Scope
      erfuellen den Identifikations-Anteil von NIS2 Art. 21(2)(a) durch DORA Art. 8.
    cross_refs: ['Art.6']
    audit_evidence_hint: 'Risiko-Register mit ICT-Risk-Identifikation, Threat-Map, kritische Funktionen-Liste mit Risk-Treatment.'

  # ----- Art. 9 — Protection and prevention -----
  - source: 'Art.9'
    target: 'Art.21.2.h'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 9(2) verpflichtet zur Implementierung von Sicherheits-Mechanismen,
      Tools und Verfahren, einschliesslich Kryptografie und Verschluesselung.
      DORA-RTS JC 2023 86 Art. 6-7 spezifiziert Krypto-Lifecycle (Key-Mgmt,
      Algorithmen-Whitelist, HSM). NIS2 Art. 21(2)(h) verlangt "Konzepte und
      Verfahren fuer Kryptografie und Verschluesselung". Finanzdienstleister im
      DORA-Scope erfuellen NIS2 Art. 21(2)(h) durch DORA Art. 9 + RTS.
    audit_evidence_hint: 'Krypto-Policy mit Algorithmus-Whitelist, Key-Management-Verfahren (Generation/Storage/Rotation/Revocation), HSM-Inventar, RTS-Compliance-Nachweis.'

  - source: 'Art.9'
    target: 'Art.21.2.j'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 9(4)(d) verlangt strong-authentication-Mechanismen fuer Zugriffe
      auf kritische ICT-Assets, plus Identitaets-Mgmt-Loesungen mit MFA gemaess RTS.
      NIS2 Art. 21(2)(j) verlangt MFA/kontinuierliche Authentifizierung sowie
      gesicherte Sprach-, Video- und Textkommunikation und ggf. Notfallkommunikation.
      DORA-MFA-Anforderung ist konkreter (privilegierte Zugriffe Pflicht);
      sichere Notfall-Kommunikation ueber DORA Art. 14 (Comm-Strategy) abgedeckt.
    gap_warning: |
      DORA fordert MFA primaer fuer privilegierte Konten (RTS); NIS2 21(2)(j)
      erwartet MFA breiter ("wo angemessen") + Out-of-Band-Notfallkanaele.
      Bestandsanwender sollten Notfall-Kommunikationskanaele (Satelliten-Telefonie,
      separate Messenger) explizit dokumentieren.
    cross_refs: ['Art.14']
    audit_evidence_hint: 'MFA-Coverage-Report (privilegierte vs. Standard-Accounts), Out-of-Band-Notfallkommunikationsplan, IDS-RTS-Compliance-Nachweis.'

  - source: 'Art.9'
    target: 'Art.21.2.i'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      DORA Art. 9 deckt Zugriffsmanagement (Need-to-know, Least-Privilege) und
      physische Sicherheit kritischer ICT-Assets ab. NIS2 Art. 21(2)(i) erwartet
      zusaetzlich Personalsicherheit (HR-Aspekte: Background-Checks, NDA,
      Onboarding/Offboarding). DORA adressiert HR-Aspekte nur indirekt.
      Daher partial_overlap, kein voller superset-Status.
    gap_warning: |
      KRITISCH: Wer NUR DORA Art. 9 nachweist, hat NIS2 21(2)(i) NICHT vollstaendig
      abgedeckt. HR-Aspekte muessen ueber MaRisk AT 7.1 oder ergaenzende
      Personalrichtlinien nachgewiesen werden.
    cross_refs: ['Art.8']
    audit_evidence_hint: 'IAM-Policy mit Least-Privilege-Nachweis, Zugriffsreviews, Onboarding/Offboarding-Checklisten, Background-Check-Verfahren, NDA-Templates.'

  - source: 'Art.9'
    target: 'Art.21.2.e'
    relationship: 'superset'
    confidence: 'medium'
    rationale: |
      DORA Art. 9(2) verlangt Implementierung von Sicherheits-Tools und -Verfahren,
      einschliesslich Patch-/Vulnerability-Mgmt. NIS2 Art. 21(2)(e) verlangt
      Sicherheit bei Wartung von IT-Systemen. DORA-Patch-Mgmt-Anteil ist Teil
      der Wartungssicherheit. SDLC ergaenzend ueber DORA Art. 8 (Identifikation
      bei Aenderungen) und DORA RTS Art. 16 (Change-Mgmt).
    cross_refs: ['Art.8']
    audit_evidence_hint: 'Patch-Mgmt-Policy, Vulnerability-Scanning-Reports, Change-Mgmt-Tickets, SDLC-Dokumentation.'

  # ----- Art. 10 — Detection -----
  - source: 'Art.10'
    target: 'Art.21.2.b'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 10 verpflichtet zu Mechanismen zur zeitnahen Erkennung anormaler
      Aktivitaeten und ICT-Incidents (Performance-Monitoring, Multi-Layer-Defense,
      automatisierte Alerts). NIS2 Art. 21(2)(b) "Bewaeltigung von Sicherheitsvorfaellen"
      umfasst Detection als Voraussetzung. DORA-Detection ist deutlich konkreter
      (Multi-Layer-Logging, Korrelation, automatisierte Eskalation).
      Finanzdienstleister im DORA-Scope erfuellen den Detection-Anteil von
      NIS2 Art. 21(2)(b) durch DORA Art. 10.
    cross_refs: ['Art.11', 'Art.17']
    audit_evidence_hint: 'SIEM-Architektur, Detection-Use-Cases, Alert-Eskalations-Matrix, MTTD-KPI letzte 12 Monate.'

  - source: 'Art.10'
    target: 'Art.21.2.f'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      DORA Art. 10 Detection-Mechanismen liefern Wirksamkeits-Metriken (z.B.
      MTTD), die als KPI fuer NIS2 Art. 21(2)(f) "Bewertung der Wirksamkeit"
      dienen. Detection allein ist jedoch nicht Wirksamkeits-Bewertung —
      daher 'related' statt 'superset'.
    cross_refs: ['Art.13']
    audit_evidence_hint: 'MTTD-Reports, False-Positive-Raten, Detection-Coverage-Map.'

  # ----- Art. 11 — Response and recovery -----
  - source: 'Art.11'
    target: 'Art.21.2.b'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 11 verpflichtet zu dokumentierter ICT-Business-Continuity-Policy mit
      Response-/Recovery-Plaenen, jaehrlichen Tests und Severe-Scenario-Testing.
      NIS2 Art. 21(2)(b) verlangt allgemein "Bewaeltigung von Sicherheitsvorfaellen".
      DORA Art. 11 ist quantitativ: jaehrliche Test-Pflicht, RTO/RPO pro kritischer
      Funktion, dokumentierte Response-Teams. Finanzdienstleister im DORA-Scope
      erfuellen NIS2 Art. 21(2)(b) Response-/Recovery-Anteil durch DORA Art. 11.
    cross_refs: ['Art.12', 'Art.17']
    audit_evidence_hint: 'BC-Policy mit Board-Approval, jaehrliche BC-Test-Berichte, Severe-Scenario-Test-Report, RTO/RPO-Tabelle pro kritischer ICT-Funktion.'

  - source: 'Art.11'
    target: 'Art.21.2.c'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 11 (ICT-Business-Continuity-Policy) plus Art. 11(6) (Krisen-
      kommunikationsplan) uebererfuellen NIS2 Art. 21(2)(c) "Aufrechterhaltung
      des Betriebs / Backup / Krisenmgmt" durch verbindliche jaehrliche Tests,
      definierte RTO/RPO und Pflicht zur Krisenkommunikation. NIS2 fordert BC
      qualitativ; DORA quantifiziert. Finanzdienstleister im DORA-Scope
      erfuellen NIS2 Art. 21(2)(c) durch DORA Art. 11.
    gap_warning: |
      DORA Art. 11(6) deckt Krisenkommunikationsplan ab, aber Behoerden-Meldewege
      an das BSI nach NIS2 Art. 23 sind in BC-Plaenen oft nicht explizit
      dokumentiert. Aus DORA-Erfuellung folgt NIS2-Erfuellung NUR, wenn BSI/CSIRT
      als Stakeholder im Krisenkommunikationsplan steht (Doppelmeldung-Pflicht
      nach Art. 4(2) NIS2).
    cross_refs: ['Art.12']
    audit_evidence_hint: 'BC-Policy, Krisenkommunikationsplan mit BSI/CSIRT-Kontakt, Test-Protokolle der Krisenkommunikation.'

  # ----- Art. 12 — Backup, restoration and recovery -----
  - source: 'Art.12'
    target: 'Art.21.2.c'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 12 verlangt explizite Backup-Policies (Scope, Frequenz, Storage,
      Retention) und Restoration-/Recovery-Verfahren mit Pflicht zur physischen +
      logischen Trennung kritischer Backup-Systeme von Produktivumgebungen.
      Jaehrliche Restoration-Tests sind verpflichtend. NIS2 Art. 21(2)(c)
      adressiert Backup-Mgmt allgemeiner. Finanzdienstleister im DORA-Scope
      erfuellen den Backup-Anteil von NIS2 Art. 21(2)(c) durch DORA Art. 12.
    cross_refs: ['Art.11']
    audit_evidence_hint: 'Backup-Policy, Restoration-Test-Berichte letzte 12 Monate, Trennungs-Architektur-Doku, Recovery-Time-Objective-Kataster.'

  # ----- Art. 13 — Learning and evolving -----
  - source: 'Art.13'
    target: 'Art.21.2.f'
    relationship: 'superset'
    confidence: 'medium'
    rationale: |
      DORA Art. 13 "Learning and Evolving" mit Pflicht zu Post-Incident-Reviews,
      Threat-Intelligence-Integration und Lessons-Learned-Loop uebererfuellt NIS2
      Art. 21(2)(f) "Bewertung der Wirksamkeit" auf der Prozess-Ebene. DORA ist
      hier prozessorientiert. Finanzdienstleister im DORA-Scope erfuellen den
      Lessons-Learned-Anteil von NIS2 Art. 21(2)(f) durch DORA Art. 13.
    gap_warning: |
      DORA Art. 13 deckt Wirksamkeit prozessual ab, aber NIS2 21(2)(f) erwartet
      quantitative KPIs/Metriken (MTTD/MTTR, Patch-Compliance, Schulungsquote).
      Wer NUR DORA Art. 13 erfuellt, sollte ergaenzende KPI-Dashboards definieren.
    cross_refs: ['Art.6.5']
