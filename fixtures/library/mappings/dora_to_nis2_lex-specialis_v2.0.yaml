  # ----- Art. 28 — General principles -----
  - source: 'Art.28'
    target: 'Art.21.2.d'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 28 etabliert das umfassendste ICT-TPP-Risk-Management-Regime
      weltweit: Pflicht zu Strategie, Politik, Verfahren, Pre-Contractual-Assessment,
      Register of Information (RoI). NIS2 Art. 21(2)(d) "Sicherheit der Lieferkette"
      ist vollstaendig abgedeckt und deutlich uebererfuellt. Finanzdienstleister
      im DORA-Scope erfuellen NIS2 Art. 21(2)(d) durch DORA Art. 28-30.
    cross_refs: ['Art.29', 'Art.30']
    audit_evidence_hint: 'TPP-Strategie + Policy mit Board-Approval, Pre-Contractual-Assessment-Reports, Register of Information.'

  # ----- Art. 29 — Concentration risk -----
  - source: 'Art.29'
    target: 'Art.21.2.d'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 29 verpflichtet Finanzunternehmen zur kontinuierlichen Bewertung
      von Konzentrationsrisiken bei ICT-TPPs (insbesondere kritische Funktionen).
      NIS2 Art. 21(2)(d) erwaehnt Lieferketten-Sicherheit allgemein. DORA-
      Konzentrationsrisiko-Bewertung ist konkreter und detailreicher.
    cross_refs: ['Art.28']
    audit_evidence_hint: 'Konzentrationsrisiko-Assessment, TPP-Diversifikations-Strategie, Substitutionsanalysen.'

  # ----- Art. 30 — Contractual provisions -----
  - source: 'Art.30'
    target: 'Art.21.2.d'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 30 plus RTS 2024/1773 schreibt verpflichtende Vertragsklauseln
      fuer ALLE ICT-TPP-Vertraege vor (Beschreibung, SLA, Audit-Rechte,
      Sub-Contracting-Regeln, Exit-Strategie, Service-Level, Datenschutz,
      Reporting). NIS2 Art. 21(2)(d) erwartet Vertrags-Anteil bei
      Lieferanten-Sicherheit qualitativ. DORA Art. 30 ist deutlich
      konkreter. Finanzdienstleister im DORA-Scope erfuellen den
      Vertrags-Anteil von NIS2 Art. 21(2)(d) durch DORA Art. 30.
    cross_refs: ['Art.28']
    audit_evidence_hint: 'TPP-Vertragstexte mit Art. 30-Klauseln, Exit-Strategien fuer kritische TPPs, Audit-Rights-Nachweise.'

  # ----- Art. 31-44 — Critical TPP Oversight Framework -----
  - source: 'Art.32'
    target: 'Art.21.2.d'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 31-44 etabliert ein eigenes EU-Aufsichts-Framework fuer kritische
      ICT-TPPs ("Critical TPP Oversight Framework") mit Lead-Overseer (ESA),
      Inspektions-Rechten und Empfehlungs-Befugnissen. NIS2 hat KEIN Pendant.
      DORA uebererfuellt NIS2 21(2)(d) deutlich; geht weit ueber Lieferketten-
      Sicherheit hinaus.
    gap_warning: |
      DORA Art. 31-44 ist EXKLUSIV — KEIN NIS2-Pendant. Diese Pflichten
      gelten nur, wenn der TPP von ESA als kritisch designiert wurde (CTPP-Liste).
      Aus NIS2-Perspektive nicht erforderlich, fuer DORA-Compliance unverzichtbar.
    cross_refs: ['Art.28', 'Art.30']
    audit_evidence_hint: 'CTPP-Bewertungen, Lead-Overseer-Korrespondenz, Empfehlungs-Tracking.'

