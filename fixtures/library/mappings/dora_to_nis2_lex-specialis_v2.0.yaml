  # ----- Art. 14 — Communication -----
  - source: 'Art.14'
    target: 'Art.21.2.j'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      DORA Art. 14 verlangt eine Krisen-Kommunikationsstrategie fuer ICT-Incidents
      gegenueber Kunden, Gegenparteien und der Oeffentlichkeit. NIS2 Art. 21(2)(j)
      adressiert u.a. gesicherte Sprach-/Video-/Textkommunikation und Notfall-
      kommunikation. DORA Art. 14 deckt den Krisen-Kommunikations-Anteil ab,
      adressiert aber nicht primaer technische Kanal-Sicherheit (gesicherte
      Sprach-/Video-Kommunikation) — daher subset.
    cross_refs: ['Art.9']
    audit_evidence_hint: 'Krisen-Kommunikationsstrategie, Pressekommunikations-Templates, Test-Protokolle.'

  # ----- Art. 16 — Simplified ICT Risk Management Framework -----
  - source: 'Art.16'
