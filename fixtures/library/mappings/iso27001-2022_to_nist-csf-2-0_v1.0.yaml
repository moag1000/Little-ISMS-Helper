schema_version: '1.1'
library:
  type: mapping
  id: 'iso27001-2022_to_nist-csf-2-0_v1.0'
  source_framework: 'ISO27001'
  target_framework: 'NIST-CSF-2.0'
  version: 1
  effective_from: '2026-05-06'
  effective_until: null

  provenance:
    primary_source: 'NIST Cybersecurity Framework 2.0 (CSF 2.0), NIST CSWP.29, final version 2024-02-26 + ISO/IEC 27001:2022 Annex A'
    primary_source_url: 'https://www.nist.gov/cyberframework'
    secondary_sources:
      - 'NIST OLIR (Online Informative References)'
      - 'NIST SP 800-53 Rev. 5 ↔ CSF 2.0 official mappings'
      - 'fixtures/library/catalogues/nist-csf-2-0/csf2_subcategories.json'
      - 'ISO/IEC 27001:2022 Annex A (93 controls)'
      - 'ISO/IEC 27002:2022 Implementation Guidance'
    publisher: 'Little ISMS Helper Maintainers'
    license_note: 'Mapping is original derivative work (AGPL-3.0). NIST CSF 2.0 IDs and titles are public domain (NIST works in U.S.). ISO 27001:2022 references for cross-reference use.'

  methodology:
    type: 'published_official_mapping'
    description: |
      Jeder ISO 27001:2022 Annex-A-Control wurde gegen die 106 CSF 2.0
      Subcategories aus dem NIST-Inventory geprueft. NIST publiziert ueber
      OLIR (Online Informative References) eine offizielle Cross-Reference
      CSF 2.0 ↔ NIST SP 800-53 Rev. 5, und SP 800-53 ↔ ISO 27001:2022 ist
      ebenfalls als OLIR verfuegbar. Unser Mapping ISO ↔ CSF ist somit
      transitive durch unsere semantic-review (kein offizieller NIST-Stamp,
      aber inhaltlich an OLIR angelehnt).

      Schritte:
      1. Volltext-Lesung ISO 27002:2022 Implementation Guidance pro Annex-A-Control
      2. Abgleich mit CSF 2.0 Subcategory-Definitions aus csf2_subcategories.json
      3. Confidence-Festlegung:
         - high   = ISO-Control bildet CSF-Subcategory-Outcome 1:1 ab
         - medium = teilweise Abdeckung; CSF-Outcome ist breiter oder enger
         - low    = CSF-GV-Subcategory ohne klares ISO-Pendant (Governance-
                    Outcomes wie GV.OV-* oder GV.OC-* sind weiter als ISO 5.x)
      4. Gap-Warning fuer Subset-Mappings dokumentieren
      5. Cross_refs setzen wenn mehrere ISO-Controls denselben CSF-Outcome
         beschreiben (Buendel-Empfehlung)
      6. 4-Augen-Review durch zweiten Compliance-Manager

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2026-04-22', actor: 'maintainer' }
      - { state: 'review',    date: '2026-04-29', actor: 'maintainer' }
      - { state: 'approved',  date: '2026-05-04', actor: 'reviewer-2' }
      - { state: 'published', date: '2026-05-06', actor: 'compliance-signoff' }

mappings:
  # ============================================================
  # === A.5 Organisational Controls (37) ↔ CSF GV / ID / RS / RC
  # ============================================================

  # --- A.5.1 Policies for information security ---
  - source: 'A.5.1'
    target: 'GV.PO-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.1 "Policies for information security" entspricht direkt CSF
      GV.PO-01 "Policy for managing cybersecurity risks is established based
      on organizational context, cybersecurity strategy, and priorities and
      is communicated and enforced" — Top-Level-Policy plus thematische
      Policies, freigegeben durch Geschaeftsleitung.
    audit_evidence_hint: 'Genehmigte ISMS-Policy mit Versionshistorie, Verteilungsnachweise, Acknowledgement-Records.'

  - source: 'A.5.1'
    target: 'GV.PO-02'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.1 verlangt periodisches Review der Policies; CSF GV.PO-02
      "Policy for managing cybersecurity risks is reviewed, updated,
      communicated, and enforced to reflect changes" deckt diesen
      Lifecycle-Aspekt ab.
    audit_evidence_hint: 'Policy-Review-Protokolle mit Datum, Reviewer, Aenderungen.'

  # --- A.5.2 Information security roles and responsibilities ---
  - source: 'A.5.2'
    target: 'GV.RR-02'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.2 "Information security roles and responsibilities" entspricht
      direkt CSF GV.RR-02 "Roles, responsibilities, and authorities related
      to cybersecurity risk management are established, communicated,
      understood, and enforced".
    audit_evidence_hint: 'RACI-Matrix, Stellenbeschreibungen mit Sicherheitsverantwortung, Organigramm.'

  # --- A.5.3 Segregation of duties ---
  - source: 'A.5.3'
    target: 'PR.AA-05'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISO A.5.3 "Segregation of duties" ist Teilaspekt von CSF PR.AA-05
      "Access permissions, entitlements, and authorizations [...] incorporate
      the principles of least privilege and separation of duties".
    cross_refs: ['A.8.2', 'A.8.3']
    audit_evidence_hint: 'SoD-Matrix, Berechtigungs-Reviews.'

  # --- A.5.4 Management responsibilities ---
  - source: 'A.5.4'
    target: 'GV.RR-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.4 "Management responsibilities" entspricht CSF GV.RR-01
      "Organizational leadership is responsible and accountable for
      cybersecurity risk and fosters a culture that is risk-aware, ethical,
      and continually improving".
    audit_evidence_hint: 'Management-Review-Protokolle, Tone-from-the-top-Kommunikation.'

  # --- A.5.5 Contact with authorities ---
  - source: 'A.5.5'
    target: 'RS.CO-03'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISO A.5.5 "Contact with authorities" deckt den Behoerden-
      Kommunikationspfad ab; CSF RS.CO-03 "Information is shared with
      designated internal and external stakeholders" ist breiter
      (alle Stakeholder, nicht nur Behoerden).
    audit_evidence_hint: 'Kontaktliste Behoerden (BSI, LDB, BfDI), dokumentierte Meldepfade.'

  # --- A.5.6 Contact with special interest groups ---
  - source: 'A.5.6'
    target: 'ID.RA-02'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISO A.5.6 "Contact with special interest groups" (CERT, ISACs) deckt
      Threat-Intel-Empfang ueber Sharing-Foren ab; entspricht Teil von CSF
      ID.RA-02 "Cyber threat intelligence is received from information
      sharing forums and sources".
    cross_refs: ['A.5.7']

  # --- A.5.7 Threat intelligence ---
  - source: 'A.5.7'
    target: 'ID.RA-02'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.7 "Threat intelligence" (Sammeln, Analysieren, Verteilen
      von Bedrohungsinformationen) entspricht direkt CSF ID.RA-02
      "Cyber threat intelligence is received from information sharing
      forums and sources".
    audit_evidence_hint: 'Threat-Intel-Quellen-Liste, Auswertungs-Reports, Verteilungsprotokolle.'

  - source: 'A.5.7'
    target: 'DE.AE-07'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      ISO A.5.7 ist auch relevant fuer CSF DE.AE-07 "Cyber threat
      intelligence and other contextual information are integrated into
      the analysis" — TI-Integration in Detection-Analyse.

  # --- A.5.8 Information security in project management ---
  - source: 'A.5.8'
    target: 'ID.RA-07'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISO A.5.8 "Information security in project management" verlangt
      Risk-Bewertung in Projekten; entspricht Teilaspekt von CSF ID.RA-07
      "Changes and exceptions are managed, assessed for risk impact,
      recorded, and tracked".
    cross_refs: ['A.8.32']

  # --- A.5.9 Inventory of information and other associated assets ---
  - source: 'A.5.9'
    target: 'ID.AM-01'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO A.5.9 "Inventory of information and other associated assets"
      umfasst Hardware-Inventar — entspricht CSF ID.AM-01 "Inventories
      of hardware managed by the organization are maintained".
    cross_refs: ['A.5.10']

  - source: 'A.5.9'
    target: 'ID.AM-02'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO A.5.9 umfasst Software/Service-Inventar — entspricht CSF
      ID.AM-02 "Inventories of software, services, and systems managed
      by the organization are maintained".

  - source: 'A.5.9'
    target: 'ID.AM-05'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO A.5.9 verlangt Asset-Klassifikation und Owner-Zuordnung —
      entspricht CSF ID.AM-05 "Assets are prioritized based on
      classification, criticality, resources, and impact on the mission".
    cross_refs: ['A.5.12', 'A.5.13']

  - source: 'A.5.9'
    target: 'ID.AM-07'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISO A.5.9 deckt Daten-Inventar implizit ab; CSF ID.AM-07
      "Inventories of data and corresponding metadata for designated
      data types are maintained" ist datenspezifischer.
    gap_warning: 'Daten-Inventar separat dokumentieren (z.B. Records of Processing nach DSGVO Art. 30).'

  - source: 'A.5.9'
    target: 'ID.AM-08'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      ISO A.5.9 inkl. Lifecycle-Management (Erwerb bis Entsorgung)
      adressiert CSF ID.AM-08 "Systems, hardware, software, services,
      and data are managed throughout their life cycles".
    cross_refs: ['A.7.14', 'A.8.10']

  # --- A.5.10 Acceptable use of information and other associated assets ---
  - source: 'A.5.10'
    target: 'PR.AA-05'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISO A.5.10 "Acceptable use" definiert Nutzungsregeln — Teilaspekt
      von CSF PR.AA-05 "Access permissions, entitlements, and
      authorizations are defined in a policy".

  # --- A.5.11 Return of assets ---
  - source: 'A.5.11'
    target: 'ID.AM-08'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISO A.5.11 "Return of assets" deckt Asset-End-of-Lifecycle-
      Aspekte ab — Teilaspekt von CSF ID.AM-08 "Systems, hardware,
      software, services, and data are managed throughout their life cycles".

  # --- A.5.12 Classification of information ---
  - source: 'A.5.12'
    target: 'ID.AM-05'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.12 "Classification of information" entspricht direkt CSF
      ID.AM-05 "Assets are prioritized based on classification,
      criticality, resources, and impact on the mission".
    audit_evidence_hint: 'Klassifikations-Schema, Klassifikations-Inventar mit C/I/A-Werten.'

  # --- A.5.13 Labelling of information ---
  - source: 'A.5.13'
    target: 'ID.AM-05'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISO A.5.13 "Labelling of information" konkretisiert die
      Klassifikation aus A.5.12 durch Markierung; bleibt unter
      CSF ID.AM-05.

  # --- A.5.14 Information transfer ---
  - source: 'A.5.14'
    target: 'PR.DS-02'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISO A.5.14 "Information transfer" deckt Transfer-Schutz ab —
      Teilaspekt von CSF PR.DS-02 "The confidentiality, integrity,
      and availability of data-in-transit are protected".
    cross_refs: ['A.8.24']

  # --- A.5.15 Access control ---
  - source: 'A.5.15'
    target: 'PR.AA-05'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.15 "Access control" entspricht direkt CSF PR.AA-05
      "Access permissions, entitlements, and authorizations are defined
      in a policy, managed, enforced, and reviewed, and incorporate the
      principles of least privilege and separation of duties".
    audit_evidence_hint: 'Access-Control-Policy, Berechtigungs-Reviews, RBAC-Matrix.'

  # --- A.5.16 Identity management ---
  - source: 'A.5.16'
    target: 'PR.AA-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.16 "Identity management" entspricht CSF PR.AA-01
      "Identities and credentials for authorized users, services, and
      hardware are managed by the organization".
    audit_evidence_hint: 'IAM-Policy, Identity-Lifecycle-Prozesse, Joiner/Mover/Leaver.'

  # --- A.5.17 Authentication information ---
  - source: 'A.5.17'
    target: 'PR.AA-04'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.17 "Authentication information" entspricht CSF PR.AA-04
      "Identity assertions are protected, conveyed, and verified" —
      Schutz von Credentials und Authentication-Tokens.
    cross_refs: ['A.8.5']

  # --- A.5.18 Access rights ---
  - source: 'A.5.18'
    target: 'PR.AA-05'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO A.5.18 "Access rights" (Provisioning/Deprovisioning, Reviews)
      ist operative Umsetzung von CSF PR.AA-05 "Access permissions [...]
      managed, enforced, and reviewed".
    audit_evidence_hint: 'Access-Reviews, Joiner/Mover/Leaver-Logs.'

  # --- A.5.19 Information security in supplier relationships ---
  - source: 'A.5.19'
    target: 'GV.SC-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.19 "Information security in supplier relationships" deckt
      Top-Level-Supplier-Security-Strategie ab — entspricht CSF GV.SC-01
      "A cybersecurity supply chain risk management program, strategy,
      objectives, policies, and processes are established".
    cross_refs: ['A.5.20', 'A.5.21', 'A.5.22']

  # --- A.5.20 Addressing information security in supplier agreements ---
  - source: 'A.5.20'
    target: 'GV.SC-05'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.20 "Addressing information security in supplier agreements"
      entspricht direkt CSF GV.SC-05 "Requirements to address cybersecurity
      risks in supply chains are established, prioritized, and integrated
      into contracts and other types of agreements".
    audit_evidence_hint: 'Supplier-Vertraege mit Security-Klauseln, AVV nach DSGVO Art. 28.'

  # --- A.5.21 Managing information security in the ICT supply chain ---
  - source: 'A.5.21'
    target: 'GV.SC-07'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.21 "Managing information security in the ICT supply chain"
      entspricht CSF GV.SC-07 "The risks posed by a supplier, their
      products and services, and other third parties are understood,
      recorded, prioritized, assessed, responded to, and monitored".
    cross_refs: ['GV.SC-04']

  - source: 'A.5.21'
    target: 'GV.SC-04'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO A.5.21 verlangt Supplier-Kritikalitaets-Bewertung — entspricht
      CSF GV.SC-04 "Suppliers are known and prioritized by criticality".
    audit_evidence_hint: 'Supplier-Register mit Risk-Tier (Critical/High/Medium/Low).'

  # --- A.5.22 Monitoring, review and change management of supplier services ---
  - source: 'A.5.22'
    target: 'GV.SC-09'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.22 "Monitoring, review and change management of supplier
      services" entspricht CSF GV.SC-09 "Supply chain security practices
      are integrated into cybersecurity and enterprise risk management
      programs, and their performance is monitored throughout".
    audit_evidence_hint: 'Supplier-Audit-Reports, SLA-Reviews, Change-Notifications.'

  - source: 'A.5.22'
    target: 'DE.CM-06'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      ISO A.5.22 inkl. operativem Monitoring entspricht CSF DE.CM-06
      "External service provider activities and services are monitored
      to find potentially adverse events".

  # --- A.5.23 Information security for use of cloud services ---
  - source: 'A.5.23'
    target: 'GV.SC-05'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISO A.5.23 "Information security for use of cloud services" ist
      Cloud-spezifische Auspraegung der Supplier-Anforderungen aus CSF
      GV.SC-05 (vertragliche Cloud-Security-Klauseln).
    cross_refs: ['A.5.20', 'GV.SC-07']

  # --- A.5.24 Information security incident management planning and preparation ---
  - source: 'A.5.24'
    target: 'ID.IM-04'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.24 "Information security incident management planning and
      preparation" entspricht CSF ID.IM-04 "Incident response plans and
      other cybersecurity plans that affect operations are established,
      communicated, maintained, and improved".
    audit_evidence_hint: 'IR-Plan mit Rollen, Eskalationspfaden, Kontaktliste.'

  - source: 'A.5.24'
    target: 'RS.MA-01'
    relationship: 'related'
    confidence: 'high'
    rationale: |
      ISO A.5.24 inkl. IR-Plan-Execution entspricht CSF RS.MA-01
      "The incident response plan is executed in coordination with
      relevant third parties once an incident is declared".

  # --- A.5.25 Assessment and decision on information security events ---
  - source: 'A.5.25'
    target: 'DE.AE-08'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.25 "Assessment and decision on information security events"
      entspricht CSF DE.AE-08 "Incidents are declared when adverse events
      meet the defined incident criteria".
    cross_refs: ['RS.MA-02']

  - source: 'A.5.25'
    target: 'RS.MA-02'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.25 deckt Triage und Validierung — entspricht CSF RS.MA-02
      "Incident reports are triaged and validated".

  - source: 'A.5.25'
    target: 'RS.MA-03'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      ISO A.5.25 inkl. Kategorisierungs-/Priorisierungs-Entscheidung
      entspricht CSF RS.MA-03 "Incidents are categorized and prioritized".

  # --- A.5.26 Response to information security incidents ---
  - source: 'A.5.26'
    target: 'RS.MA-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.26 "Response to information security incidents" entspricht
      CSF RS.MA-01 "The incident response plan is executed in coordination
      with relevant third parties once an incident is declared".
    audit_evidence_hint: 'IR-Tickets mit Response-Aktionen, Eskalations-Logs.'

  - source: 'A.5.26'
    target: 'RS.MI-01'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO A.5.26 inkl. Containment-Aktionen entspricht CSF RS.MI-01
      "Incidents are contained".

  - source: 'A.5.26'
    target: 'RS.MI-02'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO A.5.26 inkl. Eradication entspricht CSF RS.MI-02 "Incidents
      are eradicated".

  - source: 'A.5.26'
    target: 'RS.CO-02'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      ISO A.5.26 inkl. Stakeholder-Notification entspricht CSF RS.CO-02
      "Internal and external stakeholders are notified of incidents".

  # --- A.5.27 Learning from information security incidents ---
  - source: 'A.5.27'
    target: 'ID.IM-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.27 "Learning from information security incidents" entspricht
      CSF ID.IM-01 "Improvements are identified from evaluations" —
      Lessons-Learned-Prozess nach Incidents.
    cross_refs: ['ID.IM-03']

  - source: 'A.5.27'
    target: 'RS.AN-03'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      ISO A.5.27 inkl. Root-Cause-Analyse entspricht CSF RS.AN-03
      "Analysis is performed to establish what has taken place during
      an incident and the root cause of the incident".

  # --- A.5.28 Collection of evidence ---
  - source: 'A.5.28'
    target: 'RS.AN-06'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.28 "Collection of evidence" entspricht direkt CSF RS.AN-06
      "Actions performed during an investigation are recorded, and the
      records' integrity and provenance are preserved" — forensische
      Beweissicherung mit Chain-of-Custody.
    cross_refs: ['RS.AN-07']

  - source: 'A.5.28'
    target: 'RS.AN-07'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.28 deckt auch CSF RS.AN-07 "Incident data and metadata are
      collected, and their integrity and provenance are preserved" ab.

  # --- A.5.29 Information security during disruption ---
  - source: 'A.5.29'
    target: 'PR.IR-03'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.29 "Information security during disruption" entspricht
      CSF PR.IR-03 "Mechanisms are implemented to achieve resilience
      requirements in normal and adverse situations".
    cross_refs: ['A.5.30']

  # --- A.5.30 ICT readiness for business continuity ---
  - source: 'A.5.30'
    target: 'RC.RP-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.30 "ICT readiness for business continuity" entspricht CSF
      RC.RP-01 "The recovery portion of the incident response plan is
      executed once initiated from the incident response process".
    audit_evidence_hint: 'IT-DR-Plaene, RTO/RPO-Definitionen, Recovery-Tests.'

  - source: 'A.5.30'
    target: 'ID.IM-04'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      ISO A.5.30 inkl. BC-/DR-Plan-Erstellung entspricht CSF ID.IM-04
      "Incident response plans and other cybersecurity plans that affect
      operations are established, communicated, maintained, and improved".

  # --- A.5.31 Legal, statutory, regulatory and contractual requirements ---
  - source: 'A.5.31'
    target: 'GV.OC-03'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.31 "Legal, statutory, regulatory and contractual
      requirements" entspricht direkt CSF GV.OC-03 "Legal, regulatory,
      and contractual requirements regarding cybersecurity - including
      privacy and civil liberties obligations - are understood and managed".
    audit_evidence_hint: 'Legal-Register mit Anforderungen, Verantwortlichen, Review-Datum.'

  # --- A.5.32 Intellectual property rights ---
  - source: 'A.5.32'
    target: 'GV.OC-03'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISO A.5.32 "Intellectual property rights" deckt IP-rechtliche
      Compliance ab — Teilaspekt der Legal-Anforderungen aus CSF GV.OC-03.

  # --- A.5.33 Protection of records ---
  - source: 'A.5.33'
    target: 'PR.DS-11'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      ISO A.5.33 "Protection of records" deckt Records-Lifecycle-Schutz
      inkl. Backup-/Archivierungs-Aspekten ab; teilweise abgedeckt durch
      CSF PR.DS-11 "Backups of data are created, protected, maintained,
      and tested".
    gap_warning: 'Records-Retention/Loeschpflichten sind in CSF nicht eigenstaendig adressiert — Records-Management-Policy separat dokumentieren.'

  # --- A.5.34 Privacy and protection of PII ---
  - source: 'A.5.34'
    target: 'GV.OC-03'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISO A.5.34 "Privacy and protection of PII" ist Privacy-Spezialfall
      der Legal-Anforderungen aus CSF GV.OC-03 (privacy and civil
      liberties obligations).
    gap_warning: 'CSF 2.0 hat keine eigenstaendigen Privacy-Outcomes — fuer DSGVO-Compliance ergaenzend NIST Privacy Framework heranziehen.'

  # --- A.5.35 Independent review of information security ---
  - source: 'A.5.35'
    target: 'GV.OV-03'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO A.5.35 "Independent review of information security" entspricht
      CSF GV.OV-03 "Organizational cybersecurity risk management
      performance is evaluated and reviewed for adjustments needed" —
      unabhaengige Reviews und interne Audits.
    audit_evidence_hint: 'Interne Audit-Reports, externe Assessment-Reports.'

  # --- A.5.36 Compliance with policies, rules and standards ---
  - source: 'A.5.36'
    target: 'GV.OV-01'
    relationship: 'equivalent'
