schema_version: '1.1'
library:
  type: mapping
  id: 'bsi-c5-2020_to_bsi-it-grundschutz_v1.0'
  source_framework: 'BSI-C5'
  target_framework: 'BSI-Grundschutz'
  version: 1
  effective_from: '2024-02-01'
  effective_until: null

  provenance:
    primary_source: 'BSI Crosswalk-Tabelle C5:2020 ↔ IT-Grundschutz-Kompendium 2024'
    primary_source_url: 'https://www.bsi.bund.de/DE/Themen/Unternehmen-und-Organisationen/Standards-und-Zertifizierung/Cloud-Computing/Anforderungskatalog-C5/anforderungskatalog-c5_node.html'
    secondary_sources:
      - 'BSI C5:2020 — Kriterienkatalog Cloud Computing (Stand 2020-01)'
      - 'BSI IT-Grundschutz-Kompendium 2024 — Bausteine OPS, ORP, NET, CON, DER, INF, APP'
      - 'BSI-Standard 200-2 (IT-Grundschutz-Methodik) — Modellierungs-Hinweise für Cloud-Dienste'
      - 'Erfahrungen aus parallelen C5-Testaten und IT-Grundschutz-Zertifizierungen deutscher Cloud-Anbieter'
    publisher: 'Little ISMS Helper Maintainers'

  methodology:
    type: 'published_official_mapping'
    description: |
      Forward-Mapping vom Cloud-spezifischen C5-Kriterienkatalog auf die
      breiteren IT-Grundschutz-Bausteine. C5-Kriterien sind feingranular und
      Cloud-fokussiert, IT-Grundschutz-Bausteine bündeln typischerweise
      mehrere C5-Kriterien — daher dominiert die Relationship "subset".
      Vorgehen:
      1. C5-Kriterium gemäß BSI-Kriterienkatalog 2020 als Ankerpunkt
      2. Identifikation der primären Grundschutz-Bausteine, die das
         Kriterium adressieren (Schwerpunkt: OPS, ORP, NET, CON, DER, INF, APP)
      3. Relationship-Bestimmung: meist "subset" (C5 ⊆ Baustein), bei
         identischem Anforderungs-Niveau "equivalent"
      4. Confidence-Einstufung gemäß Übereinstimmungsgrad und BSI-Crosswalk
      5. Rationale aus C5-Cloud-Sicht (Was verlangt das Kriterium konkret
         vom Cloud-Anbieter? Welcher Baustein deckt das ab?)
      6. Audit-Evidence-Hinweise mit konkreten Bausteinanforderungs-Codes
         (z. B. ORP.4.A1) und C5-Kriteriums-IDs als sekundärer Anker
      7. 4-Augen-Review durch zweiten BSI-Spezialisten
      Hinweis: Mapping unterstützt deutsche Cloud-Anbieter, die parallel
      C5-Testat (Markt-Standard) und IT-Grundschutz-Zertifizierung
      (Behörden-Vergaben) führen, um Doppel-Audit-Aufwand zu reduzieren.

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2026-02-10', actor: 'maintainer' }
      - { state: 'review',    date: '2026-03-08', actor: 'maintainer' }
      - { state: 'approved',  date: '2026-04-02', actor: 'reviewer-2' }
      - { state: 'published', date: '2026-04-22', actor: 'ciso-signoff' }

mappings:
  - source: 'OPS-01'
    target: 'ISMS.1'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      C5-Kriterium OPS-01 "Leitlinie zur Informationssicherheit / IS-Strategie"
      verlangt vom Cloud-Anbieter eine vom Top-Management freigegebene
      InfoSec-Leitlinie mit klarem Geltungsbereich für den Cloud-Dienst.
      IT-Grundschutz-Baustein ISMS.1 "Sicherheitsmanagement" bündelt diesen
      Leitlinien-Anker zusammen mit Sicherheitsorganisation, Ressourcen-
      Bereitstellung, Sicherheitskonzept und Management-Steuerung. OPS-01 ist
      damit Teilmenge der ISMS.1-Anforderungen — der Baustein geht über die
      reine Leitlinien-Komponente hinaus.
    gap_warning: |
      Wer ISMS.1 als Baustein-Anker für C5 OPS-01 nutzt, deckt zwar die
      Leitlinien-Komponente, muss für vollständigen ISMS.1-Nachweis aber
      zusätzlich Sicherheitsorganisation (ISMS.1.A2), Sicherheitskonzept
      (ISMS.1.A6) und Management-Reviews dokumentieren.
    cross_refs: ['MA-01', 'OPS-02']
    audit_evidence_hint: 'OPS-01: Cloud-spezifische InfoSec-Leitlinie mit Management-Freigabe. ISMS.1.A1 Übernahme der Gesamtverantwortung, ISMS.1.A6 Sicherheitskonzept.'

  - source: 'OPS-15'
    target: 'OPS.1.1.4'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5-Kriterium OPS-15 "Schutz vor Schadsoftware — Konzept und Umsetzung"
      verlangt vom Cloud-Anbieter ein Schadsoftware-Schutzkonzept mit AV/EDR-
      Einsatz auf Hypervisor- und Management-Ebene sowie Update-Strategie.
      IT-Grundschutz-Baustein OPS.1.1.4 "Schutz vor Schadprogrammen"
      adressiert exakt diese Anforderungen auf gleichem Detail-Niveau.
      Der BSI-Crosswalk bestätigt die direkte Entsprechung; aus Cloud-Sicht
      ist die Schnittmenge vollständig — beide verlangen Schutzkonzept,
      Werkzeugauswahl, Sensibilisierung und regelmäßige Wirksamkeitsprüfung.
    audit_evidence_hint: 'OPS-15: AV/EDR-Coverage-Report Hypervisor + Management-Plane (Soll: 100 %). OPS.1.1.4.A1 Schutzkonzept, Signatur-Update-Frequenz, Quarantäne-Statistik.'

  - source: 'IDM-01'
    target: 'ORP.4'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      C5-Kriterium IDM-01 "Richtlinie für Identitäts- und Berechtigungs-
      management" verlangt eine dokumentierte Policy für User-Lifecycle,
      Rollenkonzept und Berechtigungsvergabe für Cloud-Konten. IT-Grundschutz-
      Baustein ORP.4 "Identitäts- und Berechtigungsmanagement" bündelt
      Identity-Lifecycle, Rollenkonzept, Berechtigungsvergabe UND Authenti-
      sierungsverfahren — der Baustein ist damit breiter als IDM-01, das
      sich primär auf den Policy- und Lifecycle-Aspekt fokussiert.
    gap_warning: |
      Wer ORP.4 als Anker für IDM-01 nutzt, sollte beachten, dass ORP.4
      auch Authentisierungsverfahren (ORP.4.A8 ff.) umfasst — diese werden
      C5-seitig in IDM-09 separat adressiert. Kein Audit-Risiko, aber
      Trace-Matrix sollte beide C5-Kriterien auf ORP.4 referenzieren.
    cross_refs: ['IDM-09', 'SIM-01']
    audit_evidence_hint: 'IDM-01: Cloud-IAM-Policy mit Joiner-Mover-Leaver-Prozess. ORP.4.A1 Regelung des Einrichtens und Löschens von Benutzern, Rollenkonzept.'

  - source: 'IDM-09'
    target: 'ORP.4.A8'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5-Kriterium IDM-09 "Authentifizierung von Cloud-Kunden und internen
      Benutzern" verlangt starke Authentisierungsverfahren (MFA für
      privilegierte Zugriffe, sichere Passwort-Policies, Session-Management).
      Die ORP.4-Maßnahmenfamilie um A.8 ff. ("Geregelte Verfahren zur
      Authentisierung", "Mehr-Faktor-Authentisierung") deckt diese
      Anforderungen auf gleichem Detail-Niveau ab. Aus C5-Sicht ist die
      Entsprechung 1:1; der BSI-Crosswalk bestätigt das direkte Mapping.
    cross_refs: ['ORP.4', 'IDM-01']
    audit_evidence_hint: 'IDM-09: MFA-Coverage privilegierte Cloud-Konten (Soll: 100 %), Passwort-Policy, Session-Timeout-Konfiguration. ORP.4.A8 Geregelte Verfahren zur Authentisierung.'

  - source: 'KOS-01'
    target: 'NET.1.1'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      C5-Kriterium KOS-01 "Technische Schutzmaßnahmen — Netzwerksicherheit"
      verlangt vom Cloud-Anbieter Netzsegmentierung, Firewall-Konzepte und
      Schutz der Mandantentrennung auf Netzebene. IT-Grundschutz-Baustein
      NET.1.1 "Netzarchitektur und -design" deckt Netzsegmentierung und
      Zonierung ab; ergänzend adressiert NET.4.1 "TK-Anlagen" bzw. NET.3.2
      die Firewall-Komponente. KOS-01 ist somit Teilmenge des umfassenderen
      NET.1.1-Bausteins, der über reine Cloud-Mandantentrennung hinausgeht.
    gap_warning: |
      KOS-01 fokussiert auf Cloud-Mandantentrennung (Tenant-Isolation,
      VLAN/VPC-Segregation). NET.1.1 verlangt zusätzlich vollständige
      Zonierungs-Strategie inkl. DMZ, Management-Netz, Backend-Netz —
      diese müssen im Grundschutz-Modell separat dokumentiert werden.
    cross_refs: ['NET.4.1', 'NET.3.2', 'KOS-02']
    audit_evidence_hint: 'KOS-01: Cloud-Netzarchitektur-Diagramm mit Tenant-Isolation. NET.1.1.A1 Sicherheitsrichtlinie für Netzarchitektur, Zonenkonzept, Firewall-Regelwerk.'

  - source: 'KRY-01'
    target: 'CON.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5-Kriterium KRY-01 "Richtlinie zum Einsatz von Verschlüsselung und
      Schlüsselverwaltung" verlangt ein Kryptokonzept mit Algorithmen-
      Allowlist, Key-Lifecycle und Verfahren zur Verschlüsselung von Daten
      at-rest und in-transit. IT-Grundschutz-Baustein CON.1 "Kryptokonzept"
      adressiert die identischen Anforderungen mit Verweis auf BSI TR-02102
      als Algorithmen-Baseline. Aus Cloud-Sicht ist die Entsprechung
      vollständig; der BSI-Crosswalk bestätigt das 1:1-Mapping.
    audit_evidence_hint: 'KRY-01: Cloud-Krypto-Policy, Algorithmen-Allowlist (BSI TR-02102 konform), HSM/KMS-Konfiguration. CON.1.A1 Auswahl geeigneter kryptografischer Verfahren, Key-Management-Verfahren.'

  - source: 'BFM-01'
    target: 'CON.5'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      C5-Kriterium BFM-01 "Beschaffung — Anforderungen an Lieferanten und
      Dienstleister" verlangt vom Cloud-Anbieter dokumentierte Anforderungs-
      kataloge für Sub-Dienstleister und Sub-Sub-Cloud-Anbieter. IT-Grund-
      schutz-Baustein CON.5 "Entwicklung und Einsatz allgemeiner Anwendungen"
      sowie ergänzend CON.6 "Löschen und Vernichten" bündeln Beschaffungs-
      anforderungen für Software und Daten-Lifecycle. BFM-01 ist Teilmenge —
      der Baustein deckt darüber hinaus Lifecycle-Aspekte ab.
    gap_warning: |
      BFM-01 deckt primär die Lieferanten-Beschaffungs-Phase. Wer CON.5/CON.6
      als Anker nutzt, muss zusätzlich OPS.2.3 "Nutzung von Outsourcing"
      referenzieren, da die Sub-Dienstleister-Steuerung dort detaillierter
      adressiert wird.
    cross_refs: ['CON.6', 'OPS.2.3']
    audit_evidence_hint: 'BFM-01: Lieferanten-Beschaffungs-Kriterienkatalog, Sub-Cloud-Anbieter-Liste. CON.5.A1 Erstellung eines generischen Anforderungskatalogs für Anwendungen.'

  - source: 'RB-01'
    target: 'DER.4'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      C5-Kriterium RB-01 "Notfallmanagement — Business Continuity Strategy"
      verlangt vom Cloud-Anbieter eine BC-Strategie mit Wiederanlaufzielen
      (RTO/RPO) für Cloud-Dienste, Notfallpläne und regelmäßige Übungen.
      IT-Grundschutz-Baustein DER.4 "Notfallmanagement" bündelt Notfall-
      vorsorgekonzept, Krisenstab-Strukturen, Wiederanlaufpläne und
      Notfallübungen über alle Geschäftsprozesse hinweg. RB-01 fokussiert
      auf den Cloud-Dienst-Aspekt; DER.4 deckt das umfassend ab.
    gap_warning: |
      DER.4 verlangt vollständiges Notfallhandbuch und Krisenstab-
      Geschäftsordnung — RB-01 fokussiert primär auf BC-Strategie und
      RTO/RPO der Cloud-Dienste. Für vollständigen DER.4-Nachweis sind
      auch nicht-Cloud-Geschäftsprozesse zu adressieren.
    cross_refs: ['BCM-01']
    audit_evidence_hint: 'RB-01: BC-Strategie mit RTO/RPO pro Cloud-Service-Tier. DER.4.A1 Notfallhandbuch, Notfallübungs-Plan und -Reports der letzten 24 Monate.'

  - source: 'DEV-01'
    target: 'CON.8'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5-Kriterium DEV-01 "Richtlinien für Entwicklung und Beschaffung von
      Informationssystemen" verlangt einen Secure-Development-Lifecycle mit
      Bedrohungsmodellierung, Code-Reviews und Sicherheitstests. IT-Grund-
      schutz-Baustein CON.8 "Software-Entwicklung" adressiert die identischen
      Anforderungen auf gleichem Detail-Niveau. Aus C5-Cloud-Sicht ist die
      Entsprechung vollständig; der BSI-Crosswalk bestätigt das 1:1-Mapping
      für die SDLC-Anforderungen.
    cross_refs: ['DEV-02']
    audit_evidence_hint: 'DEV-01: SDLC-Richtlinie mit Threat-Modeling, SAST/DAST-Reports. CON.8.A1 Festlegung der Sicherheitsanforderungen für Eigenentwicklungen.'

  - source: 'DEV-02'
    target: 'CON.8.A4'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5-Kriterium DEV-02 "Tests von Outsourced-Development und Eigen-
      entwicklungen" verlangt dokumentierte Sicherheitstests vor Produktiv-
      setzung. CON.8.A4 "Sicherheitsüberprüfung von Software" adressiert
      exakt diese Anforderung. Die Schnittmenge ist 1:1; aus C5-Cloud-Sicht
      gibt es keinen Delta-Aufwand zwischen beiden Anforderungen — wer
      CON.8.A4 erfüllt, erfüllt auch DEV-02.
    cross_refs: ['DEV-01']
    audit_evidence_hint: 'DEV-02: Sicherheitstest-Reports vor Release-Freigabe. CON.8.A4 Sicherheitsüberprüfung von Software, SAST/DAST/IAST-Toolchain-Belege.'

  - source: 'SIM-01'
    target: 'ORP.4'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      C5-Kriterium SIM-01 "Identitätsmanagement im Sicherheitsvorfall-
      Kontext / Privileged Access" verlangt strikte Steuerung privilegierter
      Cloud-Konten (PAM, Just-in-Time-Access, Audit-Logging). IT-Grundschutz-
      Baustein ORP.4 "Identitäts- und Berechtigungsmanagement" deckt
      privilegierte Konten als Teil der ORP.4.A9 ff. Maßnahmenfamilie ab.
      SIM-01 ist Teilmenge des breiteren ORP.4-Bausteins.
    gap_warning: |
      ORP.4 als Anker deckt SIM-01 ab, geht aber weit darüber hinaus
      (alle Identitäten, nicht nur privilegierte). Trace-Matrix sollte
      ORP.4.A9 (Identifikation und Authentisierung) und ORP.4.A10
      (Schutz von Benutzerkennungen) als primäre Anker für SIM-01 setzen.
    cross_refs: ['IDM-01', 'IDM-09']
    audit_evidence_hint: 'SIM-01: PAM-Tooling-Konfiguration, JIT-Access-Logs, Audit-Trail privilegierter Aktionen. ORP.4.A9/A10 Identifikation und Authentisierung, Schutz von Benutzerkennungen.'

  - source: 'PI-01'
    target: 'APP.4.6'
    relationship: 'equivalent'
    confidence: 'medium'
    rationale: |
      C5-Kriterium PI-01 "Schnittstellen — Sicherheit der API-Endpunkte und
      Interoperabilität" verlangt sichere API-Schnittstellen mit Authenti-
      sierung, Rate-Limiting und Input-Validation. IT-Grundschutz-Baustein
      APP.4.6 "Allgemeine Anwendungen — Schnittstellen / SOA" adressiert
      API-Sicherheit auf vergleichbarem Detail-Niveau. Aus C5-Cloud-Sicht
      sind die Anforderungen weitgehend deckungsgleich; kleinere Delta
      bestehen bei Cloud-spezifischen Aspekten (z. B. OAuth2-Flows), die
      sich aber unter dem Schutzziel "sichere Schnittstellen" subsumieren.
    cross_refs: ['KOS-01']
    audit_evidence_hint: 'PI-01: API-Sicherheits-Spezifikation (OpenAPI mit Security-Schemes), Rate-Limiting-Konfiguration, OAuth2-Flow-Dokumentation. APP.4.6 Schnittstellen-Konzept.'

  - source: 'COS-01'
    target: 'CON.2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5-Kriterium COS-01 "Compliance — Identifikation anwendbarer rechtlicher
      und vertraglicher Anforderungen inkl. Datenschutz" verlangt einen
      Rechts- und Pflichtenkataster mit Datenschutz-Bezug für den Cloud-
      Dienst. IT-Grundschutz-Baustein CON.2 "Datenschutz" adressiert
      Datenschutz-Anforderungen mit Verweis auf das Standard-Datenschutz-
      modell. Die Entsprechung ist auf Anforderungs-Niveau 1:1; aus
      C5-Cloud-Sicht (DSGVO-Compliance, AVV-Klauseln) bestätigt der
      BSI-Crosswalk das direkte Mapping.
    cross_refs: ['BFM-01']
    audit_evidence_hint: 'COS-01: Rechts- und Pflichtenkataster mit DSGVO-Bezug, AVV-Templates. CON.2.A1 Umsetzung Standard-Datenschutzmodell, Verfahrensverzeichnis.'

  - source: 'MA-01'
    target: 'ISMS.1.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5-Kriterium MA-01 "Management — Organisation des Sicherheitsprozesses
      und Verantwortlichkeiten" verlangt eine dokumentierte InfoSec-
      Organisation mit Rollen, Verantwortlichkeiten und Management-Steuerung.
      IT-Grundschutz-Baustein ISMS.1.1 (Management-Steuerung als integraler
      Teil von ISMS.1) adressiert diese Aspekte auf gleichem Detail-Niveau.
      Aus C5-Cloud-Sicht ist die Entsprechung vollständig — beide verlangen
      Management-Reviews, Ressourcen-Bereitstellung und Berichtspflichten.
    cross_refs: ['ISMS.1', 'OPS-01']
    audit_evidence_hint: 'MA-01: InfoSec-Organigramm Cloud-Anbieter, Management-Review-Protokolle. ISMS.1.A1 Übernahme der Gesamtverantwortung, ISMS.1.A11 Management-Reviews.'

  - source: 'PSC-01'
    target: 'INF.1'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      C5-Kriterium PSC-01 "Physische Sicherheit — Zutrittskontrolle und
      Schutz der Rechenzentren" verlangt Mehrfaktor-Zutrittskontrolle,
      Videoüberwachung und Besucher-Management für Cloud-RZ. IT-Grundschutz-
      Baustein INF.1 "Allgemeines Gebäude" bündelt Zutrittskontrolle,
      Brandschutz, Stromversorgung, Klimatisierung und bauliche Maßnahmen
      umfassend. PSC-01 fokussiert auf den Zutritts- und Überwachungs-
      Aspekt; INF.1 ist breiter und schließt RZ-Versorgungs-Themen ein.
    gap_warning: |
      Wer INF.1 als Baustein-Anker für PSC-01 nutzt, deckt zwar Zutritts-
      kontrolle ab, muss für vollständigen INF.1-Nachweis aber Brandschutz
      (INF.1.A2), USV-Tests und Klima-Monitoring ergänzend dokumentieren —
      typisch über INF.2 (RZ) und INF.5/6 (Verkabelung/USV).
    cross_refs: ['INF.2']
    audit_evidence_hint: 'PSC-01: RZ-Zutrittskontroll-Protokolle, Videoüberwachungs-Logs, Besucher-Listen. INF.1.A2 Brandschutz, INF.1.A6 Geschlossene Fenster und Türen, Zutrittskontroll-Konzept.'
