      NIS2 Art. 21(2)(a) wird (teilweise) durch Baustein ORP.5 'Compliance Management' adressiert über Risiko-/Sicherheits-Konzept-Beiträge. Schnittmenge: relevante Teilabdeckung — vollständige NIS2-Konformität erfordert ergänzende Bausteine.
    audit_evidence_hint: '21.2.a: NIS2-Compliance-Nachweis. ORP.5: Organigramm, Stellenbeschreibungen, Schulungspläne, IAM-/Compliance-Konzepte.'
