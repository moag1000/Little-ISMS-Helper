schema_version: '1.1'
library:
  type: mapping
  id: 'dora_to_iso27001-2022_v1.0'
  source_framework: 'DORA'
  target_framework: 'ISO27001'
  version: 1
  effective_from: '2025-01-17'
  effective_until: null

  provenance:
    primary_source: 'EBA RTS-Entwurf zu DORA + Final Report ICT Risk Management Framework — inverse Richtung'
    primary_source_url: 'https://www.eba.europa.eu/regulation-and-policy/single-rulebook/digital-operational-resilience-act-dora'
    secondary_sources:
      - 'Verordnung (EU) 2022/2554 (DORA), Kapitel II Art. 5–15'
      - 'BaFin Auslegungs- und Anwendungshinweise DORA 2024'
      - 'Inverse-Ableitung aus iso27001-2022_to_dora_v1.0'
    publisher: 'Little ISMS Helper Maintainers'

  methodology:
    type: 'text_comparison_with_expert_review'
    description: |
      Reverse-Mapping: Ausgehend von jedem DORA-Artikel wurde bestimmt,
      welche ISO 27001:2022 Annex-A-Controls auf den DORA-Anspruch einzahlen:
      1. Volltext-Lesung des DORA-Artikels als Anker
      2. Identifikation der ISO-Controls, die den DORA-Anspruch teilweise/vollständig erfüllen
      3. Relationship invertiert (ISO subset DORA → DORA superset ISO),
         weil DORA in der Regel präskriptiver/expliziter ist als ISO 27001
      4. Confidence aus Forward übernommen, Rationale aus DORA-Sicht neu verfasst
      5. 4-Augen-Review durch zweiten Compliance-Manager mit BaFin-Background

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2024-10-01', actor: 'maintainer' }
      - { state: 'review',    date: '2024-11-15', actor: 'maintainer' }
      - { state: 'approved',  date: '2024-12-10', actor: 'reviewer-2' }
      - { state: 'published', date: '2025-01-15', actor: 'ciso-signoff' }

mappings:
  - source: 'Art.5'
    target: 'A.5.1'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 5 "Governance und Organisation" verlangt explizit Leitungs-
      organ-Verantwortung, dokumentierte ICT-Strategie und jährliche
      Überprüfung. A.5.1 "Policies for information security" liefert nur
      die Policy-Komponente. Aus DORA-Sicht ist A.5.1 Baustein, deckt aber
      Board-Verantwortung und Strategie-Review nicht ab.
    gap_warning: 'A.5.1 allein erfüllt DORA Art. 5 NICHT — Board-Approval-Prozess und ICT-Strategie sind zusätzlich nötig.'
    audit_evidence_hint: 'Board-Beschluss zur ICT-Strategie, Policy-Hierarchie, jährliche Review-Protokolle.'

  - source: 'Art.6'
    target: 'A.5.1'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 6 fordert ein vollständiges ICT-Risk-Management-Framework
      mit Strategie, Policies, Prozeduren, Protokollen und Tools. A.5.1
      ist nur die Policy-Spitze; das DORA-Framework verlangt zusätzlich
      Risk-Tolerance, Recovery-Objectives und kontinuierliche Verbesserung.
    cross_refs: ['A.5.2', 'A.5.3']
    gap_warning: 'DORA Art. 6 erwartet ein Framework mit klaren Risk-Tolerance-Niveaus — nicht durch A.5.1 allein abgedeckt.'

  - source: 'Art.7'
    target: 'A.5.9'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 7 "ICT-Systeme, -Protokolle und -Tools" verlangt
      vollständiges Inventar plus Architektur-Diagramme und Risikobewertung
      pro System. A.5.9 "Inventory of information and other associated
      assets" deckt Inventar-Anteil ab; Architektur und Risk-Assessment
      pro System sind zusätzliche DORA-Anforderungen.
    cross_refs: ['A.5.10', 'A.8.9']
    audit_evidence_hint: 'Asset-Inventar mit Kritikalitätseinstufung, Architektur-Dokumentation, Risk-Assessment-Reports pro ICT-System.'

  - source: 'Art.8'
    target: 'A.8.8'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 8 verlangt explizit kontinuierliche Identifikation aller
      ICT-Risiken inkl. veralteter Systeme. A.8.8 "Management of technical
      vulnerabilities" ist Teilaspekt; DORA fordert zusätzlich Legacy-
      System-Risiken und Geschäftsfunktions-Mapping.
    gap_warning: 'A.8.8 deckt nur technische Vulns ab — DORA Art. 8 fordert breiteres Risk-ID inkl. Legacy.'

  - source: 'Art.9'
    target: 'A.8.7'
    relationship: 'superset'
    confidence: 'medium'
    rationale: |
      DORA Art. 9 "Schutz und Prävention" listet Malware-Schutz,
      Netzwerksegmentierung, Datenklassifizierung, Identity-Management und
      Krypto. A.8.7 "Protection against malware" deckt nur den
      Malware-Anteil ab; weitere DORA-Forderungen liegen in A.8.20-A.8.24,
      A.5.10, A.8.5.
    cross_refs: ['A.8.20', 'A.8.24', 'A.5.10', 'A.8.5']
    audit_evidence_hint: 'AV/EDR-Reports, Netzwerk-Segmentierungs-Diagramme, Krypto-Inventar, IAM-Policies.'

  - source: 'Art.10'
    target: 'A.8.16'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 10 "Detection" verlangt Mechanismen zur prompten Erkennung
      anomaler Aktivitäten inkl. Performance-Issues und ICT-Vorfälle. A.8.16
      "Monitoring activities" ist die ISO-Verankerung, deckt jedoch nicht
      explizit Performance-Anomalien und automatische Alarmierungs-Schwellen
      mit DORA-Detail-Anforderungen ab.
    cross_refs: ['A.8.15']
    audit_evidence_hint: 'SIEM-Alarming-Konfiguration, Schwellenwert-Dokumentation, Alarm-Review-Logs.'

  - source: 'Art.11'
    target: 'A.5.30'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 11 "Response and Recovery" fordert dedizierte ICT-BC-Policy,
      Recovery-Pläne, Krisenkommunikation, RTO/RPO und Backup-Strategie.
      A.5.30 "ICT Readiness for Business Continuity" ist Kern-Verankerung,
      DORA-Forderungen zu Krisenkommunikation und Behörden-Meldung gehen
      darüber hinaus.
    cross_refs: ['A.5.29', 'A.8.13']
    gap_warning: 'A.5.30 allein erfüllt DORA Art. 11 NICHT — Backup-Strategie (A.8.13) und Crisis-Comms zusätzlich nötig.'
    audit_evidence_hint: 'ICT-BCP, Recovery-Pläne mit RTO/RPO, Test-Reports, Behörden-Meldepfade.'

  - source: 'Art.12'
    target: 'A.8.13'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 12 "Backup-Policies und Recovery-Methoden" verlangt
      spezifische Backup-Frequenzen, Recovery-Tests und sekundäre
      Verarbeitungsstandorte. A.8.13 "Information backup" ist die ISO-
      Grundlage, DORA verlangt zusätzlich physisch separate Sites und
      regelmäßige Restore-Tests mit Dokumentation.
    cross_refs: ['A.5.30']
    audit_evidence_hint: 'Backup-Policy, Restore-Test-Reports der letzten 12 Monate, Standortkonzept Primär/Sekundär.'

  - source: 'Art.13'
    target: 'A.5.27'
    relationship: 'superset'
    confidence: 'medium'
    rationale: |
      DORA Art. 13 "Lernen und Weiterentwickeln" verlangt Post-Incident-
      Reviews und kontinuierliche Anpassung des ICT-Risk-Frameworks.
      A.5.27 "Learning from information security incidents" liefert die
      ISO-Verankerung; DORA fordert zusätzlich Quantifizierung und
      Reporting an Leitungsorgan.
    cross_refs: ['A.5.24', 'A.5.25']
    audit_evidence_hint: 'Post-Incident-Review-Templates, Lessons-Learned-Register, Board-Reports zu Trends.'

  - source: 'Art.14'
    target: 'A.6.3'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 14 "Kommunikation" fordert Krisenkommunikations-Pläne und
      Awareness-Programme — auch für Leitungsorgane. A.6.3 "Information
      security awareness, education and training" deckt allgemeine
      Schulung ab; DORA-spezifische Krisenkommunikation und Board-Trainings
      sind zusätzlich.
    gap_warning: 'A.6.3 allein deckt DORA Art. 14 NICHT — Krisenkommunikations-Plan separat.'
    audit_evidence_hint: 'Schulungs-Quoten inkl. Board, Krisenkommunikations-Plan, Tabletop-Übungen mit Geschäftsleitung.'

  - source: 'Art.15'
    target: 'A.5.36'
    relationship: 'equivalent'
    confidence: 'medium'
    rationale: |
      DORA Art. 15 (ICT-Risk-Framework Simplified Regime) verlangt
      regelmäßige Compliance-Bewertung. A.5.36 "Compliance with policies,
      rules and standards for information security" entspricht dem aus
      DORA-Sicht weitgehend; Detail-Tiefe der DORA-Vorgabe ist mit ISO
      grundsätzlich erreichbar.
    cross_refs: ['A.5.35']

  - source: 'Art.28'
    target: 'A.5.19'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 28 "ICT-Drittanbieter-Risiken — allgemeine Grundsätze"
      verlangt Strategie, Register und Konzentrations-Risikoanalyse für
      ICT-Drittanbieter. A.5.19 "Information security in supplier
      relationships" liefert die ISO-Basis; Konzentrations-Risiko und
      Register-of-Information sind DORA-Spezifika.
    cross_refs: ['A.5.20', 'A.5.21']
    gap_warning: 'A.5.19 deckt DORA Art. 28 NICHT vollständig — DORA-Register (RoI) und Konzentrations-Risiko-Analyse zusätzlich nötig.'
    audit_evidence_hint: 'Drittanbieter-Strategie, RoI gemäß ITS, Konzentrations-Risiko-Bericht.'

  - source: 'Art.30'
    target: 'A.5.20'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 30 "Vertragliche Vereinbarungen" listet Pflichtklauseln
      (SLAs, Audit-Rechte, Subcontracting, Exit-Strategien). A.5.20
      "Addressing information security in supplier agreements" liefert die
      ISO-Klausel-Anker; DORA-Pflichtkatalog geht über A.5.20 hinaus.
    cross_refs: ['A.5.22']
    audit_evidence_hint: 'Vertragsmuster mit DORA-Pflichtklauseln, Vertragsregister, Exit-Pläne kritischer Anbieter.'

  - source: 'Art.24'
    target: 'A.8.29'
    relationship: 'superset'
    confidence: 'medium'
    rationale: |
      DORA Art. 24 "Digital Operational Resilience Testing" verlangt
      jährliche Tests aller kritischen ICT-Systeme inkl. Penetration-Tests
      und Vulnerability-Assessments. A.8.29 "Security testing in development
      and acceptance" ist Baustein; DORA-spezifische TLPT (Threat-Led
      Penetration Testing) gehen darüber hinaus.
    cross_refs: ['A.8.8', 'A.8.25']
    gap_warning: 'TLPT nach DORA Art. 26/27 ist NICHT durch A.8.29 abgedeckt — separate TLPT-Programmatik nötig.'
    audit_evidence_hint: 'Test-Programm, Pentest-Reports, TLPT-Reports (falls anwendbar), Vulnerability-Scans.'

  - source: 'Art.17'
    target: 'A.5.24'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      DORA Art. 17 "ICT-Vorfall-Management-Prozess" verlangt strukturierten
      Prozess, Klassifikation und Eskalation. A.5.24 "Information security
      incident management planning and preparation" entspricht weitgehend;
      DORA-Klassifizierungskriterien (Art. 18) und Meldefristen (Art. 19)
      sind explizite Zusatzanforderungen.
    cross_refs: ['A.5.25', 'A.5.26']
    gap_warning: 'A.5.24 deckt DORA-Klassifikation und 24h/72h/1m-Meldefristen NICHT ab — separate DORA-Meldeprozesse nötig.'
    audit_evidence_hint: 'IR-Prozess, Klassifizierungs-Matrix, Meldefrist-Logs, BaFin/EBA-Meldungen der letzten 12 Monate.'
