schema_version: '1.1'
library:
  type: mapping
  id: 'bsi-c5-2026_to_iso27001-2022_v1.0'
  source_framework: 'BSI-C5-2026'
  target_framework: 'ISO27001'
  version: 1
  effective_from: '2026-05-06'
  effective_until: null

  provenance:
    primary_source: 'BSI C5:2026 final 2026-03-26 + ISO/IEC 27001:2022 Annex A'
    primary_source_url: 'https://www.bsi.bund.de/EN/Themen/Unternehmen-und-Organisationen/Informationen-und-Empfehlungen/Empfehlungen-nach-Angriffszielen/Cloud-Computing/Kriterienkatalog-C5/'
    secondary_sources:
      - 'fixtures/library/mappings/bsi-c5-2020_to_iso27001-2022_v1.0.yaml (Anlage A C5:2020 ↔ ISO 27001:2022 als Brücke)'
      - 'fixtures/library/mappings/bsi-c5-2026_to_bsi-c5-2020_v1.0.yaml (Carryover-Pfade C5:2026 → C5:2020)'
      - 'fixtures/library/catalogues/bsi-c5-2026-en/ — 18 BSI YAML-Dateien (verbatim BSI-Publikation, CC-BY-ND 4.0)'
    publisher: 'Little ISMS Helper Maintainers'
    license_note: 'Mapping is original derivative work (AGPL-3.0). C5:2026 IDs/titles © BSI 2026 (CC-BY-ND 4.0). ISO 27001:2022 references educational use.'

  methodology:
    type: 'catalogue_text_comparison'
    description: |
      Bidirektionales Mapping zwischen BSI C5:2026-Kriterien (168 Kriterien
      in 18 Bereichen) und ISO/IEC 27001:2022 Annex A (93 Controls). Diese
      Datei adressiert die Forward-Richtung C5:2026 → ISO 27001:2022.

      Methodisches Vorgehen:
      1. Carryover-Brücke: C5:2026 → C5:2020 (eigene Datei) → ISO 27001:2022
         (BSI Anlage A) für alle Kriterien mit C5:2020-Vorgänger.
      2. Direkter Textvergleich C5:2026-Volltext (basic + sharpen) vs.
         ISO Annex A-Controls für alle 2026-NEU-Kriterien (PQC, SBOM,
         Confidential Computing, Container, Investigation Requests, etc.).
      3. Klausel-4-10-Themen (ISMS, Risk Mgmt, Internal Audits) verweisen
         auf ISO-Hauptdokument; Annex-A-Match nur über A.5.1 (Policies),
         A.5.36 (Compliance) bzw. kein Annex-A-Pendant.

      Relationship-Logik:
      - equivalent: Pflichteninhalt deckungsgleich
      - subset: C5:2026 ist Teilmenge der breiteren ISO-Kontrolle
      - superset: C5:2026 erweitert ISO um cloud-spezifische Pflichten
      - partial_overlap: gemeinsamer Kern, aber jeweils nicht abgedeckte
        Anteile auf beiden Seiten
      - kein Mapping (target=null): Cloud-spezifische 2026-Kriterien ohne
        Annex-A-Pendant (PI-*, PSS-*, INQ-*, GC-*)

      Coverage: alle 18 C5:2026-Bereiche sind mindestens einmal abgedeckt.
      Confidence-Verteilung: ~60% high, ~30% medium, ~10% low.

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2026-05-06', actor: 'maintainer' }
      - { state: 'published', date: '2026-05-06', actor: 'ciso-signoff' }

mappings:
  # ===== OIS — Organisation of Information Security =====
  - source: 'OIS-01'
    target: 'A.5.1'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      C5:2026 OIS-01 „Information Security Management System (ISMS)" verlangt
      ein dokumentiertes ISO/IEC-27001-konformes ISMS für den Cloud-Dienst.
      ISO 27001:2022 deckt das ISMS primär in Klauseln 4-10 (Hauptdokument)
      ab; im Annex A entspricht A.5.1 „Policies for information security"
      dem Policy-Anteil. Vollständige Abdeckung von OIS-01 erfordert
      Klauseln 4-10 zusätzlich.
    gap_warning: |
      Wer OIS-01 NUR über Annex A A.5.1 nachweist, fehlen Klauseln 4-10
      (Context, Leadership, Planning, Support, Operation, Performance
      Evaluation, Improvement). Empfehlung: ISO 27001 Klauseln 4-10
      vollständig adressieren; Annex A A.5.1 deckt nur Policies ab.
    cross_refs: ['A.5.36', 'A.5.37']
    audit_evidence_hint: 'ISMS-Scope-Dokument, ISMS-Handbuch, ISO-27001-Zertifikat oder gleichwertig, Statement of Applicability, Management-Review-Protokolle.'

  - source: 'OIS-02'
    target: 'A.5.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 OIS-02 „Information Security Policy" verlangt eine vom
      Top-Management des Cloud-Anbieters verabschiedete und kommunizierte
      Sicherheitsleitlinie mit definierten Schutzzielen. ISO 27001:2022
      A.5.1 „Policies for information security" fordert inhaltsgleich
      dokumentierte InfoSec-Policies mit Management-Approval. Beide
      Frameworks decken Pflichteninhalt und Freigabe-Logik 1:1.
    audit_evidence_hint: 'Verabschiedete InfoSec-Leitlinie mit Management-Freigabe-Datum, Veröffentlichung im Mitarbeiter-Intranet, jährliche Review-Protokolle.'

  - source: 'OIS-03'
    target: 'A.5.23'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      C5:2026 OIS-03 „Interfaces and Dependencies" verlangt ein dokumentiertes
      Shared Security Responsibility Model (SSRM) für die Schnittstelle
      Cloud-Anbieter ↔ Kunde. ISO 27001:2022 A.5.23 „Information security
      for use of cloud services" adressiert Cloud-Nutzung primär aus
      Kundensicht; Anbieter-seitige SSRM-Pflichten sind nur teilweise
      abgedeckt. Cloud-spezifische Anbieter-Verantwortung geht über A.5.23
      hinaus.
    gap_warning: |
      A.5.23 ist primär als Kundenkontrolle formuliert. Anbieter-seitige
      SSRM-Dokumentation und -Kommunikation muss separat aufgebaut werden;
      kein vollständiger Carryover möglich.
    audit_evidence_hint: 'SSRM-Dokument mit Verantwortlichkeits-Matrix, Service-Beschreibungen mit Kunden-Kooperationspflichten, Change-Kommunikation.'

  - source: 'OIS-04'
    target: 'A.5.3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 OIS-04 „Segregation of Duties" verlangt risikobasierte
      Funktionstrennung für administrative Rollen, Change-Management und
      Risk-Mgmt. ISO 27001:2022 A.5.3 „Segregation of duties" fordert
      inhaltsgleiche Trennung konfliktärer Aufgaben. Pflichteninhalt
      deckungsgleich.
    cross_refs: ['A.5.4']
    audit_evidence_hint: 'SoD-Matrix für kritische Prozesse, Konflikt-Reviews letzte 12 Monate, kompensierende Kontrollen wo SoD nicht implementierbar.'

  - source: 'OIS-05'
    target: 'A.5.7'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 OIS-05 „Threat Intelligence" verlangt strukturierte
      Sammlung, Analyse und Integration von Bedrohungsinformationen aus
      internen und externen Quellen. ISO 27001:2022 A.5.7 „Threat
      intelligence" fordert dasselbe Vorgehen. Beide Frameworks
      referenzieren MITRE ATT&CK, STRIDE, etc. als methodische Grundlage.
    cross_refs: ['A.5.8']
    audit_evidence_hint: 'Threat-Intel-Quellen-Inventar, ausgewertete Meldungen letzte 12 Monate, Threat-Modelling-Ergebnisse.'

  - source: 'OIS-06'
    target: 'A.5.5'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 OIS-06 „Contact with Relevant Government Agencies and
      Interest Groups" verlangt Kontakte zu BSI, CERT-Bund und
      einschlägigen Stellen. ISO 27001:2022 A.5.5 „Contact with
      authorities" fordert inhaltsgleich Behörden-Kontakte;
      Pflichteninhalt deckungsgleich.
    cross_refs: ['A.5.6']
    audit_evidence_hint: 'Kontaktliste relevanter Behörden (BSI, CERT-Bund, BfDI), Kommunikationsprotokolle, KRITIS-Meldungen.'

  - source: 'OIS-07'
    target: null
    relationship: 'superset'
    confidence: 'low'
    rationale: |
      C5:2026 OIS-07 „Risk Management Policy" verlangt eine dokumentierte
      Risikomanagement-Methodik (ISO 27005/31000). ISO 27001:2022 deckt
      Risikomanagement primär in Klausel 6.1 (Hauptdokument) ab; im
      Annex A entspricht A.5.36 „Compliance with policies, rules and
      standards for information security" der Policy-Konformitäts-Prüfung,
      nicht aber der Risk-Mgmt-Methodik selbst.
    gap_warning: |
      OIS-07 referenziert ISO 27005 für die Methodik. Annex A allein deckt
      die Risk-Mgmt-Pflichten NICHT ab — ISO 27001 Klausel 6.1 ist Pflicht-
      Adressierung; A.5.36 betrifft nur Compliance-Prüfung der Policy.
    cross_refs: ['A.5.1']
    audit_evidence_hint: 'Risikomanagement-Richtlinie ISO-27005-konform, Risiko-Akzeptanz-Kriterien, Methodik-Dokument.'

  - source: 'OIS-08'
    target: null
    relationship: 'superset'
    confidence: 'low'
    rationale: |
      C5:2026 OIS-08 „Application of the Risk Management Policy - Risk
      Assessment" verlangt mindestens jährliche Durchführung der
      Risikobewertung. Dies ist primär ISO 27001 Klausel 6.1.2 (Hauptdoc)
      — kein direktes Annex-A-Pendant.
    gap_warning: |
      Annex A enthält keine Risk-Assessment-Pflicht; ISO 27001 Klausel
      6.1.2 muss separat adressiert werden.
    cross_refs: ['A.5.1', 'A.5.36']
    audit_evidence_hint: 'Risikoregister, jährliche Risk-Assessment-Reports, Risk-Owner-Liste, Reviews nach signifikanten Änderungen.'

  - source: 'OIS-09'
    target: null
    relationship: 'superset'
    confidence: 'low'
    rationale: |
      C5:2026 OIS-09 „Application of the Risk Management Policy - Risk
      Treatment" verlangt einen Risk-Treatment-Plan mit dokumentierten
      Maßnahmen und Akzeptanz von Restrisiken. Dies entspricht ISO 27001
      Klausel 6.1.3 (Hauptdoc) — kein direktes Annex-A-Pendant.
    gap_warning: |
      Annex A enthält keine Risk-Treatment-Pflicht; ISO 27001 Klausel
      6.1.3 (Risk Treatment + Statement of Applicability) muss separat
      adressiert werden.
    cross_refs: ['A.5.1']
    audit_evidence_hint: 'Risk-Treatment-Plan, Statement of Applicability, Restrisiko-Akzeptanz-Dokumentation, Reviews bei signifikanten Änderungen.'

  - source: 'OIS-10'
    target: 'A.5.8'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 OIS-10 „Information Security in Project Management" verlangt
      die Integration von InfoSec in Projektmanagement-Prozesse. ISO
      27001:2022 A.5.8 „Information security in project management"
      fordert inhaltsgleich. Pflichteninhalt deckungsgleich.
    audit_evidence_hint: 'Projekt-Management-Methodik mit InfoSec-Integration, Projekt-Risikobewertungen, InfoSec-Gates in Projektphasen.'

  # ===== SP — Security Policies =====
  - source: 'SP-01'
    target: 'A.5.1'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      C5:2026 SP-01 „Documentation, Communication and Provision of
      Policies and Procedures" hebt die Policy-Lifecycle-Pflichten als
      eigenes Kriterium hervor (Dokumentation, Kommunikation,
      Bereitstellung). ISO 27001:2022 A.5.1 „Policies for information
      security" deckt Policy-Mgmt umfassend ab; SP-01 ist Teilaspekt der
      Lifecycle-Operationalisierung.
    cross_refs: ['A.5.37']
    audit_evidence_hint: 'Policy-Inventar mit Distribution-Nachweis, Policy-Portal, Mitarbeiter-Akkreditierungen.'

  - source: 'SP-02'
    target: 'A.5.1'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      C5:2026 SP-02 „Review and Approval of Policies and Procedures"
      verlangt jährliche Reviews und formelle Genehmigung. ISO 27001:2022
      A.5.1 deckt Policy-Review als Standard-Pflicht ab.
    audit_evidence_hint: 'Policy-Review-Protokolle (jährlich), Genehmigungs-Workflow, Versions-Historie.'

  - source: 'SP-03'
    target: 'A.5.36'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      C5:2026 SP-03 „Exceptions from Existing Policies and Procedures"
      verlangt einen Ausnahme-Genehmigungsprozess mit Risikobewertung.
      ISO 27001:2022 A.5.36 „Compliance with policies, rules and
      standards" deckt Compliance-Monitoring ab; Exception-Mgmt ist
      Teilaspekt.
    audit_evidence_hint: 'Ausnahme-Register mit Risikobewertung, Genehmiger und Befristung; Reviews der laufenden Ausnahmen.'

  # ===== HR — Human Resources =====
  - source: 'HR-01'
    target: 'A.6.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 HR-01 „Verification of Qualification and Trustworthiness"
      verlangt Hintergrundüberprüfungen, Identitäts-Verifikation und
      regelmäßige Re-Verifikation für sicherheitsrelevante Rollen. ISO
      27001:2022 A.6.1 „Screening" fordert inhaltsgleiche
      Pre-Employment-Checks mit risikobasierter Tiefe.
    audit_evidence_hint: 'Hintergrundüberprüfungen, Führungszeugnis (privilegierte Rollen), Referenzprüfungen, Re-Verifikations-Protokolle.'

  - source: 'HR-02'
    target: 'A.6.2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 HR-02 „Employment Terms and Conditions" verlangt
      InfoSec-Verpflichtung in Arbeitsverträgen, Code of Ethics und
      formale Anerkennung der Policies. ISO 27001:2022 A.6.2 „Terms and
      conditions of employment" fordert dasselbe. Pflichteninhalt
      deckungsgleich.
    cross_refs: ['A.6.6']
    audit_evidence_hint: 'Arbeitsverträge mit InfoSec-Klauseln, NDA-Templates, dokumentierte Mitarbeiter-Akkreditierungen.'

  - source: 'HR-03'
    target: 'A.6.3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 HR-03 „Security Training and Awareness Programme" verlangt
      zielgruppen-orientierte Awareness-Schulungen mit Wirksamkeitsmessung.
      ISO 27001:2022 A.6.3 „Information security awareness, education and
      training" fordert dasselbe. Schulungs-Quoten und Phishing-Drills
      sind in beiden Frameworks Standardnachweis.
    audit_evidence_hint: 'Schulungsplan, Schulungsquoten ≥95%, rollenspezifische Curricula, Phishing-Drills, Wirksamkeits-Messungen.'

  - source: 'HR-04'
    target: 'A.6.4'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 HR-04 „Disciplinary Measures" verlangt einen formalen
      Disziplinarprozess bei Policy-Verstößen. ISO 27001:2022 A.6.4
      „Disciplinary process" fordert inhaltsgleich. Pflichteninhalt
      deckungsgleich.
    audit_evidence_hint: 'Disziplinar-Policy, Mitarbeiter-Information über Konsequenzen, dokumentierte Disziplinar-Maßnahmen (anonymisiert).'

  - source: 'HR-05'
    target: 'A.6.5'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 HR-05 „Responsibilities in the Event of Termination or
      Change of Employment" verlangt Information der Mitarbeiter über
      fortbestehende InfoSec-Pflichten nach Beendigung. ISO 27001:2022
      A.6.5 „Responsibilities after termination or change of employment"
      fordert inhaltsgleich.
    audit_evidence_hint: 'Termination-Checkliste mit InfoSec-Pflichten-Nachweis, Off-boarding-Prozess, fortgeltende NDA-Klauseln.'

  - source: 'HR-06'
    target: 'A.6.6'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 HR-06 „Non-disclosure Agreements" verlangt NDA für internes
      Personal und Service-Organisationen, mit jährlichem Review. ISO
      27001:2022 A.6.6 „Confidentiality or non-disclosure agreements"
      fordert inhaltsgleich. Pflichteninhalt deckungsgleich.
    audit_evidence_hint: 'NDA-Template, NDA-Inventar, Review-Protokolle der NDA-Anforderungen, Stichprobe unterzeichneter NDAs.'

  - source: 'HR-07'
    target: 'A.6.7'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 HR-07 „Remote Working - Policy" verlangt eine dokumentierte
      Remote-Work-Policy mit VPN, MFA, Endpoint-Schutz und sicherer
      Datenhandhabung. ISO 27001:2022 A.6.7 „Remote working" fordert
      inhaltsgleich.
    cross_refs: ['HR-08']
    audit_evidence_hint: 'Remote-Work-Policy, VPN-Konfiguration, Endpoint-Hardening für mobile Geräte, MFA-Erzwingung.'

  - source: 'HR-08'
    target: 'A.6.7'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      C5:2026 HR-08 „Remote Working - Implementation" verlangt die
      technische und organisatorische Umsetzung der HR-07-Policy. ISO
      27001:2022 A.6.7 „Remote working" deckt Policy + Implementation in
      einer Kontrolle ab; HR-08 ist Implementation-Teilaspekt.
    audit_evidence_hint: 'Implementierungs-Nachweise: VPN-Logs, Endpoint-MDM-Compliance, Remote-Access-Stichproben.'

  # ===== AM — Asset Management =====
  - source: 'AM-01'
    target: 'A.5.9'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      C5:2026 AM-01 „Asset Management Framework" verlangt einen
      dokumentierten Asset-Management-Rahmen mit Schutzbedarfs-Schema und
      Lifecycle-Definitionen. ISO 27001:2022 A.5.9 „Inventory of
      information and other associated assets" deckt den Inventar-Aspekt
      ab; das übergreifende Framework ist Teilmenge der Annex-A-Logik.
    cross_refs: ['A.5.10', 'A.5.11']
    audit_evidence_hint: 'Asset-Management-Rahmen-Dokument, Klassifikations-Schema, Lifecycle-Definitionen.'

  - source: 'AM-02'
    target: 'A.5.9'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 AM-02 „Asset Inventory" verlangt ein automatisiertes oder
      manuelles Asset-Inventar mit Vollständigkeit, Genauigkeit und
      Aktualität. ISO 27001:2022 A.5.9 „Inventory of information and
      other associated assets" fordert dasselbe. Pflichteninhalt
      deckungsgleich.
    cross_refs: ['AM-03', 'AM-04']
    audit_evidence_hint: 'Asset-Inventar mit Owner-Feld, Klassifikation, Stichtagsabgleich CMDB ↔ Cloud-Provisioning, Change-Logs.'

  - source: 'AM-05'
    target: 'A.5.10'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 AM-05 „Policy for the Proper and Secure Use of Assets"
      verlangt Policies für sichere Asset-Nutzung über den gesamten
      Lifecycle. ISO 27001:2022 A.5.10 „Acceptable use of information
      and other associated assets" fordert inhaltsgleich.
    audit_evidence_hint: 'Asset-Use-Policy, Klassifikations-Labelling, Patch-Anforderungen, Removable-Media-Regelungen.'

  - source: 'AM-07'
    target: 'A.7.14'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 AM-07 „Decommissioning of Hardware" verlangt sichere
      Datenlöschung oder Mediendestruktion bei Hardware-Außerdienststellung
      (DIN 66399 oder gleichwertig). ISO 27001:2022 A.7.14 „Secure
      disposal or re-use of equipment" fordert inhaltsgleich.
    audit_evidence_hint: 'Decommissioning-Prozess, Lösch-Protokolle (DIN 66399), Destruktions-Zertifikate, Inventar-Updates.'

  - source: 'AM-08'
    target: 'A.5.11'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 AM-08 „Commitment to Proper Use, Safe and Secure Handling
      and Return of Assets" verlangt Asset-Rückgabe bei Termination und
      Verpflichtung zur sicheren Nutzung. ISO 27001:2022 A.5.11 „Return
      of assets" fordert die Rückgabe-Komponente; AM-08 ist 1:1-Match.
    audit_evidence_hint: 'Asset-Rückgabe-Checkliste, Off-boarding-Prozess, Asset-Inventar-Updates bei Termination.'

  - source: 'AM-09'
    target: 'A.5.12'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 AM-09 „Asset Classification and Labelling" verlangt ein
      uniformes Klassifikations-Schema mit den Schutzzielen
      Vertraulichkeit, Integrität, Verfügbarkeit, Authentizität. ISO
      27001:2022 A.5.12 „Classification of information" fordert
      inhaltsgleich.
    cross_refs: ['A.5.13']
    audit_evidence_hint: 'Klassifikations-Schema (z.B. öffentlich/intern/vertraulich/streng vertraulich), Labelling-Konvention, Reviews.'

  - source: 'AM-12'
    target: 'A.7.10'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 AM-12 „Removable Media and Endpoint Devices" verlangt
      Storage-Encryption, Anti-Malware, DLP, Remote-Wipe für mobile
      Endgeräte und Wechselmedien. ISO 27001:2022 A.7.10 „Storage media"
      fordert inhaltsgleiche Pflichten für Speichermedien; A.8.1 deckt
      Endpoint-Devices ab.
    cross_refs: ['A.8.1']
    audit_evidence_hint: 'MDM-Compliance-Report, Disk-Encryption-Stichproben, DLP-Konfiguration, Removable-Media-Policy.'

  # ===== PS — Physical Security =====
  - source: 'PS-01'
    target: 'A.7.5'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      C5:2026 PS-01 „Physical Security and Environmental Control
      Requirements" verlangt einen dokumentierten Rahmen für physische
      Sicherheit (TIER-Klassifikation, Brandschutz, Klima). ISO
      27001:2022 A.7.5 „Protecting against physical and environmental
      threats" deckt Umweltbedrohungen; PS-01 erweitert um Cloud-RZ-
      spezifische Pflichten (TIER, Redundanz).
    cross_refs: ['A.7.1', 'A.7.11']
    audit_evidence_hint: 'TIER-Zertifizierung des RZ, Physical-Security-Policy, Brandschutz-Konzept, Klima-Monitoring.'

  - source: 'PS-03'
    target: 'A.7.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 PS-03 „Perimeter Protection" verlangt physische
      Perimeter-Sicherung des Rechenzentrums (Zaun, Schleuse, Wachschutz).
      ISO 27001:2022 A.7.1 „Physical security perimeters" fordert
      inhaltsgleich.
    audit_evidence_hint: 'Perimeter-Dokumentation (Lageplan), Wachschutz-Logs, Zutrittsbarriere-Prüfprotokolle.'

  - source: 'PS-04'
    target: 'A.7.2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 PS-04 „Physical Site Access Control" verlangt Zutritts-
      kontrolle mit Authentifizierung (Badge, Biometrie), Besucher-
      Management und Logging. ISO 27001:2022 A.7.2 „Physical entry"
      fordert inhaltsgleich. Pflichteninhalt deckungsgleich.
    cross_refs: ['A.7.3', 'A.7.4']
    audit_evidence_hint: 'Zutrittskontrollsystem-Konfiguration, Besucher-Logbuch, Stichprobe Zutrittslog letzte 90 Tage.'

  - source: 'PS-05'
    target: 'A.7.5'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 PS-05 „Protection against Threats from Outside and from
      the Environment" verlangt Schutz vor Feuer, Wasser, Erdbeben,
      Sabotage. ISO 27001:2022 A.7.5 „Protecting against physical and
      environmental threats" fordert inhaltsgleich.
