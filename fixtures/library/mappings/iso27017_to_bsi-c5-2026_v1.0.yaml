    cross_refs: ['CRY-02', 'CRY-03', 'CRY-04']
    audit_evidence_hint: 'Krypto-Policy mit zugelassenen Algorithmen, Schluessel-Lebensdauer, PQC-Migrationspfad.'

  - source: '10.1.2'
