library:
  type: mapping
  id: 'nis2-umsucg_to_kritis-dachgesetz_v1.0'
  source_framework: 'NIS2-UmsuCG'
  target_framework: 'KRITIS-DachG'
  version: 1
  effective_from: '2025-02-01'
  effective_until: null

  provenance:
    primary_source: 'BMI Begründungstext zu KRITIS-Dachgesetz § 5 + Korrespondenz zur NIS2-Umsetzung in Deutschland (inverse Richtung)'
    primary_source_url: 'https://www.bmi.bund.de/SharedDocs/gesetzgebungsverfahren/DE/kritis-dachgesetz.html'
    secondary_sources:
      - 'Referentenentwurf KRITIS-Dachgesetz (KRITIS-DachG) Stand 2024-11'
      - 'Referentenentwurf NIS2-Umsetzungs- und Cybersicherheitsstärkungsgesetz (NIS2UmsuCG) Stand 2024-10'
      - 'BSI-Stellungnahme zur parallelen Umsetzung NIS2 und CER-Richtlinie'
      - 'EU-Richtlinie (EU) 2022/2557 (CER) als Grundlage für KRITIS-DachG'
      - 'Inverse-Ableitung aus kritis-dachgesetz_to_nis2-umsucg_v1.0'
    publisher: 'Little ISMS Helper Maintainers'

  methodology:
    type: 'text_comparison_with_expert_review'
    description: |
      Reverse-Mapping vom NIS2-Umsetzungsgesetz (Cyber-Risiko-Management) zum
      KRITIS-Dachgesetz (physische Resilienz). Reziprok zu kritis-dachgesetz_
      to_nis2-umsucg_v1.0 — gleiche Pair-Liste, invertierte Relationships.
      Rationale aus NIS2-UmsuCG-Sicht neu verfasst (IT-Sicherheits-Schwerpunkt).
      Beide deutschen Gesetze überschneiden sich in Risikomanagement und
      Meldepflichten, fokussieren aber unterschiedliche Resilienz-Dimensionen.

