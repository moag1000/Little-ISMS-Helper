schema_version: '1.1'
library:
  type: mapping
  id: 'nist-csf-2-0_to_iso27001-2022_v1.0'
  source_framework: 'NIST-CSF-2.0'
  target_framework: 'ISO27001'
  version: 1
  effective_from: '2026-05-06'
  effective_until: null

  provenance:
    primary_source: 'NIST Cybersecurity Framework 2.0 (CSF 2.0), NIST CSWP.29, final version 2024-02-26 + ISO/IEC 27001:2022 Annex A'
    primary_source_url: 'https://www.nist.gov/cyberframework'
    secondary_sources:
      - 'NIST OLIR (Online Informative References)'
      - 'NIST SP 800-53 Rev. 5 ↔ CSF 2.0 official mappings'
      - 'fixtures/library/catalogues/nist-csf-2-0/csf2_subcategories.json'
      - 'ISO/IEC 27001:2022 Annex A (93 controls)'
      - 'ISO/IEC 27002:2022 Implementation Guidance'
    publisher: 'Little ISMS Helper Maintainers'
    license_note: 'Mapping is original derivative work (AGPL-3.0). NIST CSF 2.0 IDs and titles are public domain (NIST works in U.S.). ISO 27001:2022 references for cross-reference use.'

  methodology:
    type: 'catalogue_text_comparison_with_olir_alignment'
    description: |
      Reverse-Mapping CSF 2.0 → ISO 27001:2022 Annex A. Jede der 106 CSF-
      Subcategories aus dem NIST-Inventory wurde gegen die 93 Annex-A-
      Controls geprueft. Anders als die ISO→CSF-Richtung (wo ein ISO-Control
      mehrere CSF-Outcomes adressieren kann) bietet die CSF→ISO-Richtung
      die "Best-Match"-Sicht aus NIST-Perspektive — nuetzlich fuer
      Organisationen, die primaer NIST-CSF-aligned sind und ihre Kontrollen
      ISO-zertifizieren wollen.

      NIST publiziert ueber OLIR (Online Informative References) eine
      offizielle Cross-Reference CSF 2.0 ↔ NIST SP 800-53 Rev. 5, und
      SP 800-53 ↔ ISO 27001:2022 ist ebenfalls als OLIR verfuegbar. Unser
      Mapping ist transitive durch unsere semantic-review.

      Schritte:
      1. Volltext-Lesung CSF 2.0 Subcategory-Definition aus
         csf2_subcategories.json
      2. Suche im ISO 27002:2022-Implementation-Guidance nach naechster
         Entsprechung
      3. Confidence-Festlegung:
         - high   = ISO-Control bildet CSF-Outcome 1:1 ab
         - medium = ISO-Control deckt nur Teilaspekt ab; weitere ISO-
                    Controls als cross_refs noetig
         - low    = CSF-Outcome (insb. GV-Funktion: GV.OC, GV.OV) hat in
                    ISO Annex A kein klares Pendant; ISO-Clauses 4-10 oder
                    kompensierende Massnahmen erforderlich
      4. Gap-Warning fuer Subset-/Low-Mappings notieren
      5. 4-Augen-Review durch zweiten Compliance-Manager

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2026-04-22', actor: 'maintainer' }
      - { state: 'review',    date: '2026-04-29', actor: 'maintainer' }
      - { state: 'approved',  date: '2026-05-04', actor: 'reviewer-2' }
      - { state: 'published', date: '2026-05-06', actor: 'compliance-signoff' }

mappings:
  # ============================================================
  # === GV — Govern (31 Subcategories) ↔ ISO A.5.1-5, A.5.31-37, A.6.x
  # ============================================================

  # --- GV.OC Organizational Context ---
  - source: 'GV.OC-01'
    target: 'A.5.1'
    relationship: 'related'
    confidence: 'low'
    rationale: |
      CSF GV.OC-01 "The organizational mission is understood and informs
      cybersecurity risk management" hat in ISO Annex A kein direktes
      Pendant. ISO 27001 Clause 4.1 (Understanding the organization and
      its context) ist die korrekte Entsprechung; A.5.1 deckt nur die
      Policy-Formalisierung ab.
    gap_warning: 'CSF GV.OC-01 ist primaer ISO 27001 Clause 4.1, nicht Annex A. Kontext-Analyse separat dokumentieren.'

  - source: 'GV.OC-02'
    target: 'A.5.1'
    relationship: 'related'
    confidence: 'low'
    rationale: |
      CSF GV.OC-02 "Internal and external stakeholders are understood,
      and their needs and expectations regarding cybersecurity risk
      management are understood and considered" entspricht ISO 27001
      Clause 4.2 (Interested Parties), nicht Annex A.
    gap_warning: 'Stakeholder-/Interested-Parties-Register separat fuehren (ISO 27001 Clause 4.2).'

  - source: 'GV.OC-03'
    target: 'A.5.31'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      CSF GV.OC-03 "Legal, regulatory, and contractual requirements
      regarding cybersecurity - including privacy and civil liberties
      obligations - are understood and managed" entspricht direkt ISO
      A.5.31 "Legal, statutory, regulatory and contractual requirements".
    cross_refs: ['A.5.32', 'A.5.34']
    audit_evidence_hint: 'Legal-Register mit Anforderungen, Verantwortlichen, Review-Datum.'

  - source: 'GV.OC-04'
    target: 'A.5.30'
    relationship: 'related'
    confidence: 'low'
    rationale: |
      CSF GV.OC-04 "Critical objectives, capabilities, and services that
      external stakeholders depend on or expect from the organization"
      hat in Annex A kein direktes Pendant; verwandt mit BIA-Aspekten
      aus A.5.30 "ICT readiness for business continuity".
    gap_warning: 'BIA / Critical-Service-Inventar als Grundlage; primaer ISO 22301 oder ISO 27001 Clause 4.1.'

  - source: 'GV.OC-05'
    target: 'A.5.21'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      CSF GV.OC-05 "Outcomes, capabilities, and services that the
      organization depends on are understood and communicated" entspricht
      Supply-Chain-Dependency-Mapping aus ISO A.5.21 "Managing information
      security in the ICT supply chain".
    cross_refs: ['A.5.19', 'A.5.20']

  # --- GV.RM Risk Management Strategy ---
  - source: 'GV.RM-01'
    target: 'A.5.4'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      CSF GV.RM-01 "Risk management objectives are established and agreed
      to by organizational stakeholders" entspricht ISO 27001 Clause 6.1
      (Risk Planning) plus A.5.4 "Management responsibilities". Annex A
      allein deckt es nicht vollstaendig ab.
    gap_warning: 'ISO 27001 Clause 6.1.1 / 6.1.2 sind essentiell fuer Risk-Objectives.'

  - source: 'GV.RM-02'
    target: 'A.5.1'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      CSF GV.RM-02 "Risk appetite and risk tolerance statements are
      established, communicated, and maintained" wird in ISO ueber
      Top-Level-Policy (A.5.1) und ISO 27001 Clause 6.1.2 abgebildet.
    gap_warning: 'Risk-Appetite-Statement separat dokumentieren (ISO 27001 Clause 6.1.2).'

  - source: 'GV.RM-03'
    target: 'A.5.4'
    relationship: 'related'
    confidence: 'low'
    rationale: |
      CSF GV.RM-03 "Cybersecurity risk management activities and outcomes
      are included in enterprise risk management processes" hat kein
      direktes Pendant in Annex A; verwandt mit Management-Responsibility
      aus A.5.4.
    gap_warning: 'ERM-Integration ist primaer ISO 31000 / Clause 6.1.'

  - source: 'GV.RM-04'
    target: 'A.5.1'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      CSF GV.RM-04 "Strategic direction that describes appropriate risk
      response options is established and communicated" wird teilweise
      durch A.5.1 (Policy) und ISO 27001 Clause 6.1.3 (Risk-Treatment)
      abgedeckt.

  - source: 'GV.RM-05'
    target: 'A.5.5'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      CSF GV.RM-05 "Lines of communication across the organization are
      established for cybersecurity risks, including risks from suppliers
      and other third parties" verwandt mit A.5.5 "Contact with authorities"
      und A.5.21 "ICT supply chain".
    cross_refs: ['A.5.6', 'A.5.21']

  - source: 'GV.RM-06'
    target: 'A.5.1'
    relationship: 'related'
    confidence: 'low'
    rationale: |
      CSF GV.RM-06 "A standardized method for calculating, documenting,
      categorizing, and prioritizing cybersecurity risks is established
      and communicated" entspricht ISO 27001 Clause 6.1.2 (Risk-Assessment-
      Methodology), nicht Annex A.
    gap_warning: 'Risk-Methodology in ISO 27005 / Clause 6.1.2 dokumentieren.'

  - source: 'GV.RM-07'
    target: 'A.5.1'
    relationship: 'related'
    confidence: 'low'
    rationale: |
      CSF GV.RM-07 "Strategic opportunities (i.e., positive risks) are
      characterized and are included in organizational cybersecurity risk
      discussions" hat in Annex A kein direktes Pendant; ISO 27001
      Clause 6.1.1 erwaehnt Risiken UND Chancen.
    gap_warning: 'Positive Risk Management ist nicht in Annex A — Clause 6.1 nutzen.'

  # --- GV.RR Roles, Responsibilities, Authorities ---
  - source: 'GV.RR-01'
    target: 'A.5.4'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      CSF GV.RR-01 "Organizational leadership is responsible and accountable
      for cybersecurity risk and fosters a culture that is risk-aware,
      ethical, and continually improving" entspricht direkt ISO A.5.4
      "Management responsibilities".
    audit_evidence_hint: 'Management-Review-Protokolle, Tone-from-the-top-Kommunikation.'

  - source: 'GV.RR-02'
    target: 'A.5.2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      CSF GV.RR-02 "Roles, responsibilities, and authorities related to
      cybersecurity risk management are established, communicated,
      understood, and enforced" entspricht direkt ISO A.5.2 "Information
      security roles and responsibilities".
    cross_refs: ['A.5.3']
    audit_evidence_hint: 'RACI-Matrix, Stellenbeschreibungen mit Sicherheitsverantwortung.'

  - source: 'GV.RR-03'
    target: 'A.5.4'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      CSF GV.RR-03 "Adequate resources are allocated commensurate with
      the cybersecurity risk strategy, roles, responsibilities, and
      policies" ist Teilaspekt von ISO A.5.4 "Management responsibilities"
      und Clause 7.1 (Resources).

  - source: 'GV.RR-04'
    target: 'A.6.1'
    relationship: 'related'
    confidence: 'high'
    rationale: |
      CSF GV.RR-04 "Cybersecurity is included in human resources
      practices" buendelt mehrere ISO-Controls aus A.6 (People Controls).
    cross_refs: ['A.6.2', 'A.6.3', 'A.6.4', 'A.6.5', 'A.6.6']
    audit_evidence_hint: 'Background-Checks, NDAs, Disciplinary-Process, Onboarding/Offboarding-Logs.'

  # --- GV.PO Policy ---
  - source: 'GV.PO-01'
    target: 'A.5.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      CSF GV.PO-01 "Policy for managing cybersecurity risks is established
      based on organizational context, cybersecurity strategy, and
      priorities and is communicated and enforced" entspricht direkt
      ISO A.5.1 "Policies for information security".
    cross_refs: ['A.5.37']

  - source: 'GV.PO-02'
    target: 'A.5.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      CSF GV.PO-02 "Policy for managing cybersecurity risks is reviewed,
      updated, communicated, and enforced to reflect changes in
      requirements, threats, technology, and organizational mission"
      entspricht Lifecycle-Aspekt aus ISO A.5.1.

  # --- GV.OV Oversight ---
  - source: 'GV.OV-01'
    target: 'A.5.36'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      CSF GV.OV-01 "Cybersecurity risk management strategy outcomes are
      reviewed to inform and adjust strategy and direction" entspricht
      ISO A.5.36 "Compliance with policies, rules and standards".
    cross_refs: ['A.5.35']

  - source: 'GV.OV-02'
    target: 'A.5.35'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      CSF GV.OV-02 "The cybersecurity risk management strategy is
      reviewed and adjusted to ensure coverage of organizational
      requirements and risks" ist Teilaspekt von ISO A.5.35 "Independent
      review of information security" und Clause 9.3 (Management Review).
    gap_warning: 'Vollstaendige Abdeckung erfordert ISO 27001 Clause 9.3.'

  - source: 'GV.OV-03'
    target: 'A.5.35'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      CSF GV.OV-03 "Organizational cybersecurity risk management
      performance is evaluated and reviewed for adjustments needed"
      entspricht ISO A.5.35 "Independent review of information security"
      plus Clause 9.1/9.2 (Monitoring/Internal Audit).
    audit_evidence_hint: 'Interne Audit-Reports, KPI-Dashboards, Management-Review-Protokolle.'

  # --- GV.SC Cybersecurity Supply Chain Risk Management ---
  - source: 'GV.SC-01'
    target: 'A.5.19'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      CSF GV.SC-01 "A cybersecurity supply chain risk management program,
      strategy, objectives, policies, and processes are established and
      agreed to by organizational stakeholders" entspricht direkt ISO
      A.5.19 "Information security in supplier relationships".
    cross_refs: ['A.5.20', 'A.5.21']

  - source: 'GV.SC-02'
    target: 'A.5.2'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      CSF GV.SC-02 "Cybersecurity roles and responsibilities for
      suppliers, customers, and partners are established, communicated,
      and coordinated internally and externally" verwandt mit ISO A.5.2
      (interne Rollen) und A.5.20 (Supplier-Vertraege).
    cross_refs: ['A.5.20']

  - source: 'GV.SC-03'
    target: 'A.5.19'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      CSF GV.SC-03 "Cybersecurity supply chain risk management is
      integrated into cybersecurity and enterprise risk management,
      risk assessment, and improvement processes" Teilaspekt von ISO
      A.5.19 plus Clause 6.1.

  - source: 'GV.SC-04'
    target: 'A.5.21'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      CSF GV.SC-04 "Suppliers are known and prioritized by criticality"
      entspricht Supplier-Kritikalitaets-Bewertung aus ISO A.5.21
      "Managing information security in the ICT supply chain".
    audit_evidence_hint: 'Supplier-Register mit Risk-Tier (Critical/High/Medium/Low).'

  - source: 'GV.SC-05'
    target: 'A.5.20'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      CSF GV.SC-05 "Requirements to address cybersecurity risks in supply
      chains are established, prioritized, and integrated into contracts
      and other types of agreements" entspricht direkt ISO A.5.20
      "Addressing information security in supplier agreements".
    cross_refs: ['A.5.23']
    audit_evidence_hint: 'Supplier-Vertraege mit Security-Klauseln, AVV nach DSGVO Art. 28.'

  - source: 'GV.SC-06'
    target: 'A.5.20'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      CSF GV.SC-06 "Planning and due diligence are performed to reduce
      risks before entering into formal supplier or other third-party
      relationships" ist Teilaspekt der Supplier-Onboarding-Phase aus
      A.5.20 / A.5.21.
    cross_refs: ['A.5.21']

  - source: 'GV.SC-07'
    target: 'A.5.21'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      CSF GV.SC-07 "The risks posed by a supplier, their products and
      services, and other third parties are understood, recorded,
      prioritized, assessed, responded to, and monitored over the
      course of the relationship" entspricht direkt ISO A.5.21.

  - source: 'GV.SC-08'
    target: 'A.5.21'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      CSF GV.SC-08 "Relevant suppliers and other third parties are
      included in incident planning, response, and recovery activities"
      verwandt mit Supplier-Aspekten von ISO A.5.21 plus A.5.24
      (IR-Planning).
    cross_refs: ['A.5.24', 'A.5.26']

  - source: 'GV.SC-09'
    target: 'A.5.22'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      CSF GV.SC-09 "Supply chain security practices are integrated into
      cybersecurity and enterprise risk management programs, and their
      performance is monitored throughout" entspricht ISO A.5.22
      "Monitoring, review and change management of supplier services".
    audit_evidence_hint: 'Supplier-Audit-Reports, SLA-Reviews.'

  - source: 'GV.SC-10'
    target: 'A.5.20'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      CSF GV.SC-10 "Cybersecurity supply chain risk management plans
      include provisions for activities that occur after the conclusion
      of a partnership or service agreement" Teilaspekt der vertraglichen
      Exit-Klauseln aus A.5.20.
    cross_refs: ['A.5.11']

  # ============================================================
  # === ID — Identify (21 Subcategories) ↔ ISO A.5.6-9, A.5.27, A.8.8, A.8.32
  # ============================================================

  # --- ID.AM Asset Management ---
  - source: 'ID.AM-01'
    target: 'A.5.9'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      CSF ID.AM-01 "Inventories of hardware managed by the organization
      are maintained" entspricht Hardware-Inventar-Aspekt aus ISO A.5.9
      "Inventory of information and other associated assets".
    audit_evidence_hint: 'CMDB / Hardware-Asset-Register.'

  - source: 'ID.AM-02'
    target: 'A.5.9'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      CSF ID.AM-02 "Inventories of software, services, and systems
      managed by the organization are maintained" entspricht Software-/
      Service-Inventar-Aspekt aus A.5.9.

  - source: 'ID.AM-03'
    target: 'A.8.20'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      CSF ID.AM-03 "Representations of the organization's authorized
      network communication and internal and external network data flows
      are maintained" entspricht Netzwerk-Architektur-Dokumentation aus
      ISO A.8.20 "Networks security".
    cross_refs: ['A.8.22']

  - source: 'ID.AM-04'
    target: 'A.5.21'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      CSF ID.AM-04 "Inventories of services provided by suppliers are
      maintained" entspricht Supplier-Service-Inventar aus ISO A.5.21
      / A.5.19.
    cross_refs: ['A.5.19']

  - source: 'ID.AM-05'
    target: 'A.5.12'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      CSF ID.AM-05 "Assets are prioritized based on classification,
      criticality, resources, and impact on the mission" entspricht
      direkt ISO A.5.12 "Classification of information".
    cross_refs: ['A.5.13']
    audit_evidence_hint: 'Klassifikations-Schema, Klassifikations-Inventar.'

  - source: 'ID.AM-07'
    target: 'A.5.9'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      CSF ID.AM-07 "Inventories of data and corresponding metadata for
      designated data types are maintained" Teilaspekt von ISO A.5.9.
      Daten-Inventar nicht explizit in Annex A separiert.
    gap_warning: 'Daten-Inventar separat dokumentieren (z.B. Records of Processing nach DSGVO Art. 30).'

  - source: 'ID.AM-08'
    target: 'A.7.14'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      CSF ID.AM-08 "Systems, hardware, software, services, and data are
      managed throughout their life cycles" verwandt mit ISO A.7.14
      "Secure disposal" plus A.5.11 "Return of assets" und A.8.10
      "Information deletion".
    cross_refs: ['A.5.11', 'A.8.10']

  # --- ID.RA Risk Assessment ---
  - source: 'ID.RA-01'
    target: 'A.8.8'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      CSF ID.RA-01 "Vulnerabilities in assets are identified, validated,
      and recorded" entspricht direkt ISO A.8.8 "Management of technical
      vulnerabilities".
    audit_evidence_hint: 'Vuln-Scan-Reports, CVE-Tracker, Patch-Compliance.'

  - source: 'ID.RA-02'
    target: 'A.5.7'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      CSF ID.RA-02 "Cyber threat intelligence is received from information
      sharing forums and sources" entspricht direkt ISO A.5.7 "Threat
      intelligence" plus A.5.6 "Contact with special interest groups".
    cross_refs: ['A.5.6']

  - source: 'ID.RA-03'
    target: 'A.5.7'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      CSF ID.RA-03 "Internal and external threats to the organization
      are identified and recorded" Teilaspekt der Threat-Analyse aus
      A.5.7. ISO 27001 Clause 6.1.2 ergaenzt.
    gap_warning: 'Vollstaendige Threat-Identification erfordert ISO 27005 / Clause 6.1.2.'

  - source: 'ID.RA-04'
    target: 'A.5.7'
    relationship: 'related'
    confidence: 'low'
    rationale: |
      CSF ID.RA-04 "Potential impacts and likelihoods of threats
      exploiting vulnerabilities are identified and recorded" ist Risk-
      Assessment-Outcome — primaer ISO 27001 Clause 6.1.2.
    gap_warning: 'Annex A deckt Risk-Methodology nicht ab — Clause 6.1.2 / ISO 27005.'

  - source: 'ID.RA-05'
    target: 'A.5.7'
    relationship: 'related'
    confidence: 'low'
    rationale: |
      CSF ID.RA-05 "Threats, vulnerabilities, likelihoods, and impacts
      are used to understand inherent risk and inform risk response
      prioritization" entspricht ISO 27001 Clause 6.1.2.
    gap_warning: 'Inherent-Risk-Bestimmung in Risk-Register dokumentieren (Clause 6.1.2).'

  - source: 'ID.RA-06'
    target: 'A.5.4'
    relationship: 'related'
    confidence: 'low'
    rationale: |
      CSF ID.RA-06 "Risk responses are chosen, prioritized, planned,
      tracked, and communicated" entspricht ISO 27001 Clause 6.1.3
      (Risk-Treatment-Plan).
    gap_warning: 'Risk-Treatment-Plan ist Clause 6.1.3, nicht Annex A.'

  - source: 'ID.RA-07'
    target: 'A.8.32'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      CSF ID.RA-07 "Changes and exceptions are managed, assessed for
      risk impact, recorded, and tracked" entspricht direkt ISO A.8.32
      "Change management".
    cross_refs: ['A.5.8']
    audit_evidence_hint: 'Change-Tickets mit Risk-Assessment, CAB-Protokolle.'

  - source: 'ID.RA-08'
    target: 'A.8.8'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      CSF ID.RA-08 "Processes for receiving, analyzing, and responding
      to vulnerability disclosures are established" Teilaspekt von ISO
      A.8.8 "Management of technical vulnerabilities".

  - source: 'ID.RA-09'
    target: 'A.5.21'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      CSF ID.RA-09 "The authenticity and integrity of hardware and
      software are assessed prior to acquisition and use" verwandt mit
      Supplier-Due-Diligence aus A.5.21.
    cross_refs: ['A.8.30']

  - source: 'ID.RA-10'
    target: 'A.5.21'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      CSF ID.RA-10 "Critical suppliers are assessed prior to acquisition"
      entspricht Supplier-Due-Diligence-Aspekt aus ISO A.5.21.
    cross_refs: ['A.5.20']

  # --- ID.IM Improvement ---
  - source: 'ID.IM-01'
    target: 'A.5.27'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      CSF ID.IM-01 "Improvements are identified from evaluations"
      entspricht ISO A.5.27 "Learning from information security
      incidents" plus Clause 10.1 (Improvement).
    cross_refs: ['A.5.35']

  - source: 'ID.IM-02'
    target: 'A.8.29'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      CSF ID.IM-02 "Improvements are identified from security tests and
      exercises, including those done in coordination with suppliers and
      relevant third parties" entspricht ISO A.8.29 "Security testing in
      development and acceptance" plus A.8.8 (Vuln-Mgmt).
    cross_refs: ['A.8.8']

  - source: 'ID.IM-03'
    target: 'A.5.36'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      CSF ID.IM-03 "Improvements are identified from execution of
      operational processes, procedures, and activities" verwandt mit
      ISO A.5.36 "Compliance" plus Clause 10.1.

  - source: 'ID.IM-04'
    target: 'A.5.24'
    relationship: 'equivalent'
