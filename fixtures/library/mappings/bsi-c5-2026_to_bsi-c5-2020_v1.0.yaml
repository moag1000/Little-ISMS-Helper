schema_version: '1.1'
library:
  type: mapping
  id: 'bsi-c5-2026_to_bsi-c5-2020_v1.0'
  source_framework: 'BSI-C5-2026'
  target_framework: 'BSI-C5'
  version: 1
  effective_from: '2026-05-06'
  effective_until: null

  provenance:
    primary_source: 'BSI C5:2026 öffentliche Konsultation (Draft, 2025/2026) und Vergleich mit BSI C5:2020 Kriterienkatalog.'
    primary_source_url: 'https://www.bsi.bund.de/SharedDocs/Downloads/DE/BSI/CloudComputing/Kriterienkatalog/C5_2020.html'
    secondary_sources:
      - 'BSI C5:2020 Kriterienkatalog (offiziell)'
      - 'Öffentliche Konsultations- und Workshop-Materialien zur C5:2026-Revision (BSI/Branchenverbände 2025)'
      - 'EUCS-Draft (ENISA EU Cloud Services Scheme) als Referenz für Container/Supply-Chain-Erweiterungen'
      - 'NIS2-Richtlinie (EU 2022/2555) Art. 21/23 — Reporting-SLAs und Supply-Chain-Pflichten'
      - 'Existing fixture: bsi-c5-2020_to_bsi-c5-2026_v1.0.yaml (reziprokes Mapping)'
    publisher: 'Little ISMS Helper Maintainers'

  methodology:
    type: 'expert_inference_pre_publication'
    description: |
      Reverse-Mapping ausgehend von voraussichtlichen BSI C5:2026-Themenbereichen
      hin zu C5:2020-Bestandskontrollen. Erstellt parallel zum Forward-Mapping
      bsi-c5-2020_to_bsi-c5-2026_v1.0.

      Schwerpunkt dieses Reverse-Mappings sind die NEUEN Themen in C5:2026,
      die in C5:2020 NICHT oder nur als Teil-Aspekt vorhanden sind:
      Container/Kubernetes-Security, Supply-Chain-Security/SBOM, Post-Quantum-
      Cryptography, Confidential Computing, AI/ML-Security, EUCS-Alignment,
      enhanced Client-Separation, NIS2-Reporting-SLAs.

      WICHTIG: BSI C5:2026 ist zum Zeitpunkt der Mapping-Erstellung noch nicht
      final veröffentlicht (verbindlich erst ab 01.01.2027). Source-IDs werden
      mit symbolischen Schlüsseln im Format 'C5-2026-<Bereich>-<Nr>' geführt;
      nach Final-Veröffentlichung gegen offiziellen Catalogue zu validieren.
      Mappings mit höherer Unsicherheit sind explizit mit confidence='low'
      markiert.

  lifecycle:
    state: 'draft'
    state_history:
      - { state: 'draft', date: '2026-05-06', actor: 'maintainer' }

mappings:
  - source: 'C5-2026-OPS-01'
    target: 'OPS-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 OPS-01 (Konfigurations- und Änderungsmanagement) entspricht
      strukturell C5:2020 OPS-01. Konfigurationsmanagement bleibt unverändert
      Kernpflicht.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    audit_evidence_hint: 'CMDB-Auszug, Change-Workflow-Dokumentation, Stichprobe genehmigter Changes.'

  - source: 'C5-2026-OPS-10'
    target: 'OPS-10'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 OPS-10 (Logging/Monitoring) führt C5:2020 OPS-10 fort. Die
      voraussichtlichen NIS2-Verschärfungen (24/7-SOC) sind aus 2020-Perspektive
      bereits Best Practice.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    audit_evidence_hint: 'SIEM-Use-Case-Katalog, 24/7-SOC-Coverage, Alert-MTTR, Log-Retention.'

  - source: 'C5-2026-RB-04'
    target: 'RB-04'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 RB-04 (Bedrohungs- und Schwachstellen-Identifikation) entspricht
      strukturell C5:2020 RB-04. Threat-Intelligence-Quellen und CERT-Bezug
      bleiben unverändert.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    audit_evidence_hint: 'Threat-Intel-Quellen-Liste, ausgewertete Bedrohungsmeldungen 12 Monate, Eskalations-Logs.'

  - source: 'C5-2026-IDM-01'
    target: 'IDM-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 IDM-01 (IDM-Richtlinie) entspricht strukturell C5:2020 IDM-01.
      JIT-Access-Erwartungen sind voraussichtlich Schärfungen, kein neuer Bereich.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    audit_evidence_hint: 'IDM-Richtlinie, Berechtigungskonzept, Stichprobe Joiner/Mover/Leaver.'

  - source: 'C5-2026-IDM-09'
    target: 'IDM-09'
    relationship: 'superset'
    confidence: 'medium'
    rationale: |
      C5:2026 IDM-09 (Authentifizierung) wird voraussichtlich phishing-resistente
      MFA (FIDO2/WebAuthn) zwingend vorschreiben. C5:2020 IDM-09 lässt
      schwächere Verfahren (TOTP/SMS) noch zu — somit Übermenge.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    gap_warning: |
      Wer C5:2026 IDM-09 NUR über C5:2020 IDM-09 nachweist, fehlt die
      phishing-resistente MFA. Migration auf FIDO2/WebAuthn empfohlen,
      mindestens für privilegierte Konten.
    audit_evidence_hint: 'MFA-Coverage-Report Admin-Accounts, FIDO2/WebAuthn-Rollout-Plan, phishing-resistent verifizierte Verfahren.'

  - source: 'C5-2026-KRY-01'
    target: 'KRY-01'
    relationship: 'superset'
    confidence: 'medium'
    rationale: |
      C5:2026 KRY-01 (Kryptographie) wird voraussichtlich Krypto-Agilität,
      PQC-Transitions-Pläne und hybride Verfahren explizit fordern. C5:2020
      KRY-01 deckt nur klassische Algorithmen ab — somit Untermenge.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    gap_warning: |
      Eine reine Bestands-Krypto-Richtlinie nach C5:2020 erfüllt 2026 die
      voraussichtlichen Erwartungen an Krypto-Agilität und PQC-Transition
      NICHT. Ergänzen: PQC-Inventar, Transition-Roadmap, hybride Verfahren.
    cross_refs: ['C5-2026-PQC-01']
    audit_evidence_hint: 'Krypto-Richtlinie inkl. PQC-Transitions-Plan, Algorithmen-Allowlist, Key-Management.'

  - source: 'C5-2026-KOS-01'
    target: 'KOS-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 KOS-01 (Kommunikationssicherheit) entspricht strukturell C5:2020
      KOS-01. Network-Segmentation, Firewalling, TLS-Hardening bleiben
      unverändert.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    audit_evidence_hint: 'Netzplan, Segmentierungsnachweise, TLS-Audit-Reports, Firewall-Regelwerk-Reviews.'

  - source: 'C5-2026-AM-01'
    target: 'AM-01'
    relationship: 'superset'
    confidence: 'medium'
    rationale: |
      C5:2026 AM-01 (Asset-Inventar) wird voraussichtlich Container/Workload-
      Inventar und SBOM-Verknüpfung verlangen. C5:2020 AM-01 deckt nur statische
      Assets vollständig ab — somit Untermenge.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    gap_warning: |
      Klassische statische CMDBs nach C5:2020 decken keine kurzlebigen
      Container/Workloads ab. Für 2026 zusätzlich Kubernetes-/Container-
      Inventar mit SBOM-Bezug erforderlich.
    cross_refs: ['C5-2026-CON-01', 'C5-2026-SCS-01']
    audit_evidence_hint: 'CMDB + Container-Workload-Inventar, SBOM je Service, Provisioning-Stichtagsabgleich.'

  - source: 'C5-2026-SIM-01'
    target: 'SIM-01'
    relationship: 'superset'
    confidence: 'medium'
    rationale: |
      C5:2026 SIM-01 (Incident-Management) wird voraussichtlich NIS2-Art.-23-
      konforme Reporting-SLAs (24h Frühwarnung, 72h Notification, 30 Tage
      Final-Report) zwingend vorschreiben. C5:2020 SIM-01 fordert dies nicht
      explizit — somit Untermenge.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    gap_warning: |
      Wer C5:2026 SIM-01 NUR über C5:2020 SIM-01 nachweist, fehlen die
      NIS2-konformen 24h/72h-SLAs. IR-Plan und Eskalationskette anpassen.
    audit_evidence_hint: 'IR-Plan mit NIS2-Reporting-SLAs, IR-Übungs-Reports, Incident-Tickets-Stichprobe.'

  - source: 'C5-2026-BCM-01'
    target: 'BCM-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 BCM-01 (BC-Strategie und Top-Management-Verantwortung) entspricht
      strukturell C5:2020 BCM-01.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    audit_evidence_hint: 'BC-Strategie-Dokument, BIA-Ergebnisse, Management-Freigabe-Protokoll.'

  - source: 'C5-2026-HR-03'
    target: 'HR-03'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 HR-03 (Schulung und Sensibilisierung) entspricht strukturell
      C5:2020 HR-03.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    audit_evidence_hint: 'Schulungs-Quote, Phishing-Drill-Ergebnisse, rollenspezifische Curricula.'

  - source: 'C5-2026-PSC-01'
    target: 'PSC-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 PSC-01 (Personnel-Screening) entspricht strukturell C5:2020 PSC-01.
      Verbindlich ab 01.01.2027 — ID gegen Final-Catalogue zu validieren.
    audit_evidence_hint: 'Screening-Verfahrensbeschreibung, Stichprobe Pre-Employment-Checks, NDA-Nachweise.'

  - source: 'C5-2026-SCS-01'
    target: 'BEI-04'
    relationship: 'superset'
    confidence: 'low'
    rationale: |
      C5:2026 SCS-01 (Supply-Chain-Security, voraussichtlich neuer dedizierter
      Bereich) erweitert klassische Lieferantenklauseln um SBOM-Lieferpflicht,
      CVE-Notification-SLAs, signierte Container-Artefakte (Sigstore/cosign),
      Provenance-Attestation (SLSA). C5:2020 BEI-04 deckt nur Teilaspekte ab.
      Verbindlich ab 01.01.2027 — ID und Detail-Anforderungen gegen Final-
      Catalogue zu validieren.
    gap_warning: |
      Neu in C5:2026, nicht vollständig in C5:2020 vorhanden. C5:2020 BEI-04
      ist als Ausgangsbasis verwendbar, reicht aber NICHT aus. Zusätzlich
      einzuführen: SBOM-Generierung und -Übergabe, Image-Signatur-Verifikation
      in CI/CD, SLSA-Provenance-Attestations, CVE-Notification-Workflow mit SLA.
    cross_refs: ['BEI-01']
    audit_evidence_hint: 'SBOMs je Service, Image-Signatur-Verifikation, SLSA-Provenance-Attestations, CVE-Notification-Workflow.'

  - source: 'C5-2026-CON-01'
    target: 'OPS-01'
    relationship: 'superset'
    confidence: 'low'
    rationale: |
      C5:2026 CON-01 (Container/Kubernetes-Security, voraussichtlich neuer
      dedizierter Bereich) verlangt Pod Security Standards, Admission-Control,
      Image-Hardening und Runtime-Security. C5:2020 OPS-01 (Configuration
      Management) ist die nächste verwandte Bestandskontrolle, deckt diese
      Container-Spezifika aber NICHT ab.
      Verbindlich ab 01.01.2027 — ID und Detail-Anforderungen gegen Final-
      Catalogue zu validieren.
    gap_warning: |
      Neu in C5:2026, nicht in C5:2020 vorhanden. Vollständig zusätzlich
      einzuführen: CIS Kubernetes Benchmark, Pod Security Standards,
      Admission-Controller (OPA/Gatekeeper, Kyverno), Runtime-Detection
      (Falco/Tetragon), Image-Hardening-Pipeline.
    audit_evidence_hint: 'CIS-Kubernetes-Benchmark-Report, Pod-Security-Standard-Config, Admission-Controller-Policies, Runtime-Detection-Alerts.'

  - source: 'C5-2026-PQC-01'
    target: 'KRY-01'
    relationship: 'superset'
    confidence: 'low'
    rationale: |
      C5:2026 PQC-01 (Post-Quantum-Cryptography, voraussichtlich neuer
      dedizierter Bereich) verlangt PQC-Transitions-Plan, Krypto-Inventar
      und hybride/PQC-resistente Verfahren für Langzeit-vertrauliche Daten.
      C5:2020 KRY-01 deckt nur klassische Algorithmen ab.
      Verbindlich ab 01.01.2027 — ID und Detail-Anforderungen gegen Final-
      Catalogue zu validieren.
    gap_warning: |
      Neu in C5:2026, nicht in C5:2020 vorhanden. Zusätzlich einzuführen:
      Krypto-Inventar (Algorithmen je Service/Datenfluss), PQC-Transitions-
      Roadmap, hybride Verfahren (klassisch + PQC) für Langzeit-Vertraulichkeit
      (z. B. ML-KEM/Kyber, ML-DSA/Dilithium gemäß BSI/NIST).
    audit_evidence_hint: 'Krypto-Inventar je Service, PQC-Transitions-Roadmap mit Meilensteinen, hybride-Krypto-Pilotnachweise.'

  - source: 'C5-2026-CC-01'
    target: 'KRY-01'
    relationship: 'superset'
    confidence: 'low'
    rationale: |
      C5:2026 CC-01 (Confidential Computing, voraussichtlich neuer dedizierter
      Bereich) adressiert Schutz von Daten-in-Use durch Trusted Execution
      Environments (Intel SGX/TDX, AMD SEV-SNP, ARM CCA). C5:2020 KRY-01
      regelt nur Daten-at-Rest und Daten-in-Transit.
      Verbindlich ab 01.01.2027 — ID und Detail-Anforderungen gegen Final-
      Catalogue zu validieren.
    gap_warning: |
      Neu in C5:2026, nicht in C5:2020 vorhanden. Confidential-Computing-
      Anforderungen sind kontroll-strukturell ein eigener Bereich. Pilotierung
      und Bewertung der Anwendbarkeit pro Service notwendig (nicht für jeden
      Service ökonomisch sinnvoll, aber Bewertung dokumentieren).
    audit_evidence_hint: 'Confidential-Computing-Bewertung je Service, TEE-Attestation-Nachweise (SGX/TDX/SEV-SNP), Architektur-Entscheidungs-Dokumente.'

  - source: 'C5-2026-AI-01'
    target: 'OPS-15'
    relationship: 'partial_overlap'
    confidence: 'low'
    rationale: |
      C5:2026 AI-01 (AI/ML-Security, voraussichtlich neuer dedizierter Bereich)
      adressiert Modell-Sicherheit, Prompt-Injection-Schutz, Trainings-Data-
      Integrity, Model-Governance. C5:2020 OPS-15 (Schutz vor Schadprogrammen)
      ist nur sehr lose verwandt — beide adressieren bösartige Eingaben/Inhalte,
      aber auf unterschiedlichen Ebenen.
      Verbindlich ab 01.01.2027 — ID und Detail-Anforderungen gegen Final-
      Catalogue zu validieren.
    gap_warning: |
      Neu in C5:2026, in C5:2020 NICHT als eigene Kontrolle vorhanden.
      Vollständig zusätzlich einzuführen — Bezug zu ISO 42001 (AI Management
      System), EU AI Act und NIST AI RMF empfohlen. OPS-15 ist KEIN
      ausreichender Ersatz.
    cross_refs: ['ISO 42001', 'EU AI Act']
    audit_evidence_hint: 'AI-Governance-Richtlinie, Modell-Inventar, Trainings-Data-Provenance, Prompt-Injection-Tests, Model-Risk-Bewertungen.'

  - source: 'C5-2026-EUCS-01'
    target: 'BFM-01'
    relationship: 'partial_overlap'
    confidence: 'low'
    rationale: |
      C5:2026 EUCS-01 (EUCS-Alignment, voraussichtlich neuer Querschnittsbereich)
      adressiert die Anschlussfähigkeit an das European Cloud Services
      Certification Scheme (ENISA). C5:2020 BFM-01 (Berichtswesen/Governance)
      ist nur insoweit verwandt, als Governance-Strukturen für Multi-Schema-
      Zertifizierung benötigt werden.
      Verbindlich ab 01.01.2027 — ID und Detail-Anforderungen gegen Final-
      Catalogue zu validieren.
    gap_warning: |
      Neu in C5:2026, nicht direkt in C5:2020 abbildbar. EUCS-Alignment-
      Mapping erfordert eigenständige Analyse gegen ENISA-EUCS-Catalogue
      (Level Basic / Substantial / High).
    audit_evidence_hint: 'EUCS-Mapping-Tabelle, ENISA-EUCS-Konformitätsbewertung, Multi-Schema-Zertifizierungs-Strategie.'

  - source: 'C5-2026-CS-01'
    target: 'OPS-01'
    relationship: 'partial_overlap'
    confidence: 'low'
    rationale: |
      C5:2026 CS-01 (Enhanced Client-Separation, voraussichtlich neuer
      dedizierter Bereich) verschärft Mandanten-Isolation auf Compute-,
      Network- und Storage-Ebene über Konfigurationsmanagement hinaus.
      C5:2020 OPS-01 deckt nur die Konfigurations-Disziplin ab.
      Verbindlich ab 01.01.2027 — ID und Detail-Anforderungen gegen Final-
      Catalogue zu validieren.
    gap_warning: |
      Mandanten-Isolations-Schärfung ist neu in 2026. Ergänzungen zu OPS-01
      voraussichtlich erforderlich: Tenant-Isolation-Tests, Side-Channel-
      Schutzmaßnahmen, Storage-Encryption-per-Tenant, Network-Microsegmentation.
    audit_evidence_hint: 'Tenant-Isolation-Test-Reports, Storage-Encryption-per-Tenant-Nachweise, Network-Microsegmentation-Konfiguration.'
