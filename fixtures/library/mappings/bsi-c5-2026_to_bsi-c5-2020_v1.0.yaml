schema_version: '1.1'
library:
  type: mapping
  id: 'bsi-c5-2026_to_bsi-c5-2020_v1.0'
  source_framework: 'BSI-C5-2026'
  target_framework: 'BSI-C5'
  version: 1
  effective_from: '2026-05-06'
  effective_until: null

  provenance:
    primary_source: 'BSI Cloud Computing Compliance Criteria Catalogue (C5:2026), final version 2026-03-26'
    primary_source_url: 'https://www.bsi.bund.de/EN/Themen/Unternehmen-und-Organisationen/Informationen-und-Empfehlungen/Empfehlungen-nach-Angriffszielen/Cloud-Computing/Kriterienkatalog-C5/C5_2025/C5_2025_node.html'
    secondary_sources:
      - 'BSI C5:2020 Kriterienkatalog (Anlage A: Vergleichstabelle ISO 27001 ↔ BSI C5)'
      - 'fixtures/library/catalogues/bsi-c5-2026-en/ — 18 BSI YAML files (verbatim BSI publication, CC-BY-ND 4.0)'
      - 'Inverse-Ableitung aus bsi-c5-2020_to_bsi-c5-2026_v1.0 (gleiche Pair-Logik, Source/Target getauscht; ergänzt um neue 2026-Themen ohne 2020-Equivalent)'
    publisher: 'Little ISMS Helper Maintainers'
    license_note: 'Mapping is original derivative work (AGPL-3.0). C5:2026 source IDs and names © BSI 2026 used under CC-BY-ND 4.0 with attribution.'

  methodology:
    type: 'catalogue_text_comparison'
    description: |
      Reverse-Mapping ausgehend vom C5:2026-Kriterium zurück auf das
      C5:2020-Pendant. Zweck: Bestandsanwender mit bestehender
      C5:2020-Reife können erkennen, welche 2026-Kriterien sie bereits
      erfüllen und welche neue Themen (PQC-Krypto-Agilität, SBOM,
      Confidential Computing, Container Mgmt) zusätzlich aufgebaut
      werden müssen.

      Relationship-Logik (invers zur Forward-Datei):
      - equivalent ↔ equivalent
      - superset (2026 erweitert 2020) ↔ subset (2020 ist Teilmenge)
      - subset (2026 ist Teilmenge) ↔ superset (selten, da 2026 generell
        breiter)
      - partial_overlap ↔ partial_overlap

      Neue 2026-Themen ohne 2020-Pendant werden mit relationship='superset'
      und confidence='low' erfasst, sodass Anwender sehen, dass kein
      Carryover möglich ist und ein eigenständiger Maßnahmen-Aufbau nötig
      ist.

      Coverage: alle 18 C5:2026-Bereiche sind mindestens einmal abgedeckt.

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2026-05-06', actor: 'maintainer' }
      - { state: 'published', date: '2026-05-06', actor: 'ciso-signoff' }

mappings:
  # ===== AM — Asset Management =====
  - source: 'AM-02'
    target: 'AM-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 AM-02 „Asset Inventory" entspricht direkt C5:2020 AM-01
      „Asset-Inventar". Pflichteninhalt deckungsgleich: vollständiges
      Inventar aller Cloud-Service-relevanten Assets mit Owner,
      Klassifikation und Stichtagsabgleich CMDB ↔ Cloud-Provisioning.
    cross_refs: ['AM-03', 'AM-04']
    audit_evidence_hint: 'Asset-Inventar, Owner-Feld, Klassifikation, Cloud-Provisioning-Stichtagsabgleich.'

  - source: 'AM-09'
    target: 'AM-01'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      C5:2026 AM-09 „Asset Classification and Labelling" ist ein
      Teilaspekt der breiteren 2020 AM-01 „Asset-Inventar"-Pflicht
      (Klassifikation war dort bereits Bestandteil). 2026 hebt
      Klassifikation als eigenes Kriterium hervor.
    audit_evidence_hint: 'Klassifikations-Schema (z.B. öffentlich/intern/vertraulich/streng vertraulich), Labelling-Konvention.'

  # ===== BCM — Business Continuity Management =====
  - source: 'BCM-01'
    target: 'BCM-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 BCM-01 „Business Continuity and Emergency Management
      System" entspricht direkt C5:2020 BCM-01 „Top-Management-
      Verantwortung und BC-Strategie". Pflichteninhalt deckungsgleich:
      ISO-22301-konformes BC-Mgmt-System mit Top-Management-Commitment.
    cross_refs: ['BCM-02']
    audit_evidence_hint: 'BC-Strategie, Top-Management-Freigabe, BIA, BC-Plans, Übungs-Reports.'

  - source: 'BCM-02'
    target: 'BCM-01'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      C5:2026 BCM-02 „Business Impact Analysis" ist ein in 2020 BCM-01
      enthaltener Bestandteil (BIA war dort als Pflicht in der
      BC-Strategie aufgeführt). 2026 hebt die BIA als eigenes Kriterium
      hervor.
    audit_evidence_hint: 'BIA-Methodik, BIA-Ergebnisse je Geschäftsprozess, RTO/RPO-Definitionen.'

  # ===== COM — Compliance =====
  - source: 'COM-01'
    target: 'COM-04'
    relationship: 'partial_overlap'
    confidence: 'low'
    rationale: |
      C5:2026 COM-01 „Identification of Applicable Legal, Regulatory,
      Self-imposed or Contractual Requirements" deckt regulatorische
      Anforderungssteuerung ab — ein Teilbereich von 2020 COM-04
      (Beauftragten-/Berichtswesen-Funktion). Andere BFM-Anteile
      (Beauftragten-Rollen) liegen 2026 bei OIS.
    gap_warning: |
      C5:2020 COM-04 ist breiter als COM-01. Wer COM-01 erfüllt, hat
      noch kein vollständiges 2020-BFM-Mapping; ergänze OIS-04
      (Segregation of Duties) und OIS-01 (ISMS-Verantwortung).
    cross_refs: ['OIS-01', 'OIS-04']
    audit_evidence_hint: 'Compliance-Anforderungs-Register (GDPR, NIS2, DORA, regionale Cloud-Gesetze), Reviews letzte 12 Monate.'

  - source: 'COM-03'
    target: 'COM-04'
    relationship: 'partial_overlap'
    confidence: 'low'
    rationale: |
      C5:2026 COM-03 „Internal Audits of the ISMS" hat in 2020 keine
      eigene Kriteriums-ID — Audit-Pflichten waren Teil der breiteren
      COM-04- bzw. SIM-01-Anforderungen. Aufbau interner Audit-Programme
      sollte separat betrachtet werden.
    gap_warning: |
      Wer 2020-Reife auf 2026 überträgt, sollte ein separates Audit-
      Programm gemäß ISO 19011 aufbauen — die 2020-Implementierung
      reichte oft nur für extern-getriebene Audits.
    audit_evidence_hint: 'Audit-Plan, Audit-Reports letzte 24 Monate, Maßnahmen-Tracking aus Audit-Findings.'

  # ===== COS — Communication Security =====
  - source: 'COS-01'
    target: 'COS-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 COS-01 „Technical Safeguards" entspricht direkt C5:2020
      COS-01 „Technische Schutzmaßnahmen". Präfixwechsel KOS → COS ist
      rein redaktionell. Pflichteninhalt deckungsgleich: Netzwerk-
      Segmentierung, Firewall-Regeln, kryptografische Transportsicherung.
    cross_refs: ['COS-02', 'COS-07']
    audit_evidence_hint: 'Netzwerk-Segmentierungs-Konzept, Firewall-Rule-Review, Topologie-Dokument.'

  - source: 'COS-07'
    target: 'COS-01'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      C5:2026 COS-07 „Documentation of the Network Topology" ist ein
      konkreter Teilaspekt der breiteren 2020 COS-01-Pflicht; 2026 hebt
      die Topologie-Dokumentation als eigenes Kriterium hervor.
    audit_evidence_hint: 'Aktuelle Netzwerk-Topologie-Diagramme, VLAN-Karte, Routing-Tabellen.'

  # ===== CRY — Cryptography =====
  - source: 'CRY-01'
    target: 'CRY-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 CRY-01 „Policy for the Use of Cryptographic Mechanisms"
      entspricht direkt C5:2020 CRY-01. Präfixwechsel KRY → CRY ist
      redaktionell. Beide Frameworks referenzieren BSI TR-02102 als
      Algorithmen-Baseline.
    cross_refs: ['CRY-04', 'CRY-05']
    audit_evidence_hint: 'Krypto-Richtlinie BSI TR-02102 konform, Algorithmen-Allowlist, HSM-Inventar.'

  - source: 'CRY-02'
    target: null
    relationship: 'superset'
    confidence: 'low'
    rationale: |
      C5:2026 CRY-02 „Cryptographic Change Management" ist ein NEUES
      Kriterium ohne 2020-Equivalent. Es adressiert Krypto-Agilität und
      Migration auf Post-Quantum-Cryptography (PQC). 2020 enthielt nur
      Algorithmen-Stärken-Anforderungen, keine systematische
      Übergangsplanung.
    gap_warning: |
      Bestandsanwender mit C5:2020-Reife müssen für CRY-02 ein
      eigenständiges Krypto-Migrations-Programm aufbauen: Inventur aller
      Krypto-Verwendungen, Bewertung PQC-Readiness, Roadmap zur
      Algorithmen-Transition. BSI TR-02102 wird 2026/2027 PQC-Verfahren
      verbindlich vorgeben.
    cross_refs: ['CRY-12', 'CRY-13', 'CRY-17']
    audit_evidence_hint: 'Krypto-Inventar (Algorithmen, Schlüssellängen, Verwendungsorte), PQC-Migration-Roadmap, Algorithmen-Sunset-Plan.'

  - source: 'CRY-04'
    target: 'CRY-01'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      C5:2026 CRY-04 „Protection of Data for Transmission (Transport
      Protection)" ist ein konkreter Teilaspekt der 2020 CRY-01-Krypto-
      Richtlinie. 2026 hebt Transportverschlüsselung als eigenes
      Kriterium hervor (TLS 1.3 / IPsec-Pflicht).
    audit_evidence_hint: 'TLS-Konfigurations-Tests (z.B. SSL-Labs A+ Rating), VPN-Konfiguration, Cipher-Suite-Inventar.'

  - source: 'CRY-05'
    target: 'CRY-01'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      C5:2026 CRY-05 „Encryption of Sensitive Data at Rest" ist ein
      konkreter Teilaspekt der 2020 CRY-01-Krypto-Richtlinie; 2026 hebt
      Encryption-at-Rest separat hervor.
    audit_evidence_hint: 'Disk-/Object-Storage-Encryption-Konfiguration, KMS-Integration, Stichprobe verschlüsselter Volumes.'

  # ===== DEV — Development =====
  - source: 'DEV-01'
    target: 'DEV-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 DEV-01 „Policies for the Development/Procurement of System
      Components" entspricht direkt C5:2020 DEV-01. Pflichteninhalt
      deckungsgleich.
    audit_evidence_hint: 'Secure-SDLC-Richtlinie, Procurement-Policy.'

  - source: 'DEV-02'
    target: 'DEV-02'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 DEV-02 „Outsourcing of the Development" entspricht direkt
      C5:2020 DEV-02. Pflichteninhalt deckungsgleich.
    cross_refs: ['SSO-01']
    audit_evidence_hint: 'Verträge mit Outsourcing-Entwicklern, Code-Review-Protokolle.'

  - source: 'DEV-03'
    target: 'OPS-06'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      C5:2026 DEV-03 „Policies for Changes to System Components" deckt
      Change-Management-Pflichten ab, die in 2020 unter dem breiteren
      Bereich RB (Regelbetrieb) bzw. OPS-06 erfasst waren. 2026 verschiebt
      Change-Management von RB nach DEV.
    gap_warning: |
      Wer 2020-OPS-06-Reife auf DEV-03 überträgt, sollte zusätzlich DEV-06
      (Risk Assessment of Changes), DEV-07 (Testing) und DEV-15
      (Exceptions) adressieren — diese sind in 2026 ausdifferenziert.
    cross_refs: ['DEV-06', 'DEV-07', 'DEV-15']
    audit_evidence_hint: 'Change-Management-Richtlinie, CAB-Protokolle, Change-Tickets letzte 90 Tage.'

  - source: 'DEV-13'
    target: null
    relationship: 'superset'
    confidence: 'low'
    rationale: |
      C5:2026 DEV-13 „Transparency about Software Components" ist ein
      NEUES Kriterium ohne 2020-Equivalent. Es verlangt SBOM-Pflege
      (Software Bill of Materials) und Transparenz über alle
      eingebetteten Komponenten — getrieben durch EU-CRA und Log4Shell-
      Lehren.
    gap_warning: |
      Bestandsanwender mit C5:2020-Reife müssen ein SBOM-Programm
      aufbauen: SBOM-Generierung in CI/CD (CycloneDX oder SPDX), SBOM-
      Speicherung pro Release, Mapping zu CVE-Feeds, Kunden-API für
      SBOM-Bezug. Dieser Aufbau ist substanziell und sollte mit der
      EU-CRA-Compliance koordiniert werden.
    cross_refs: ['DEV-14', 'OPS-29']
    audit_evidence_hint: 'SBOM pro Software-Release (CycloneDX/SPDX), CVE-Tracking gegen SBOM, SBOM-API-Endpoint.'


  - source: 'HR-01'
    target: 'HR-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 HR-01 „Verification of Qualification and Trustworthiness"
      entspricht direkt C5:2020 HR-01. Der eigene 2020-Bereich PSC
      (Personalsicherheit) ist 2026 vollständig in HR aufgegangen;
      Pflichteninhalt deckungsgleich.
    cross_refs: ['HR-02', 'HR-04']
    audit_evidence_hint: 'Hintergrundüberprüfungen, Führungszeugnis (privilegierte Rollen), Referenzprüfungen.'

  - source: 'HR-03'
    target: 'HR-03'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 HR-03 „Security Training and Awareness Programme"
      entspricht direkt C5:2020 HR-03. Pflichteninhalt deckungsgleich.
    audit_evidence_hint: 'Schulungsplan, Schulungsquoten ≥95%, rollenspezifische Curricula, Phishing-Drills.'

  - source: 'HR-07'
    target: null
    relationship: 'superset'
    confidence: 'medium'
    rationale: |
      C5:2026 HR-07 „Remote Working - Policy" entspricht C5:2020 MA-01
      (Mobile Arbeit / Telearbeits-Richtlinie). Der eigene 2020-Bereich
      MA ist 2026 entfallen; alle Anforderungen wurden in HR-07/HR-08
      konsolidiert.
    cross_refs: ['HR-08', 'PS-08']
    audit_evidence_hint: 'Remote-Work-Policy, VPN-Konfiguration, Endpoint-Hardening für mobile Geräte.'

  # ===== IAM — Identity & Access Management =====
  - source: 'IAM-01'
    target: 'IDM-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 IAM-01 „Policy for Identities and Access Rights"
      entspricht direkt C5:2020 IDM-01. Präfixwechsel IDM → IAM ist
      redaktionell.
    audit_evidence_hint: 'Identity-Management-Richtlinie, Berechtigungskonzept, Rollen-Modell.'

  - source: 'IAM-02'
    target: 'IDM-02'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 IAM-02 „Granting and Change of Identities and Access
      Rights" entspricht C5:2020 IDM-02 (ggf. zusammengefasst mit
      IDM-03). 2026 konsolidiert die 2020-Aufteilung in einem Kriterium.
    cross_refs: ['IAM-04', 'IAM-05']
    audit_evidence_hint: 'Provisioning-Workflow, Joiner/Mover/Leaver-Tickets letzte 90 Tage.'

  - source: 'IAM-06'
    target: 'IDM-01'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      C5:2026 IAM-06 „Privileged Access Rights" ist ein konkreter
      Teilaspekt der breiteren 2020 IDM-01-Richtlinie; 2026 hebt PAM
      (Privileged Access Management) als eigenes Kriterium hervor mit
      verschärften Pflichten (just-in-time-Vergabe, Session-Recording).
    audit_evidence_hint: 'PAM-Lösung mit Session-Recording, Just-in-Time-Vergabe-Protokolle, Liste aller privilegierten Accounts.'

  - source: 'IAM-08'
    target: 'IDM-09'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 IAM-08 „Authentication Mechanisms" entspricht direkt
      C5:2020 IDM-09. Pflichteninhalt deckungsgleich: MFA für
      administrative Zugriffe, kryptografisch starke Verfahren gemäß
      BSI TR-03116.
    cross_refs: ['IAM-09']
    audit_evidence_hint: 'MFA-Coverage 100% Admin-Accounts, Auth-Methoden-Inventar.'

  # ===== INQ — Inquiries from Government Agencies =====
  - source: 'INQ-01'
    target: null
    relationship: 'superset'
    confidence: 'low'
    rationale: |
      C5:2026 INQ-01 „Legal Assessment of Investigation Requests" ist
      neu als eigener Bereich. 2020 enthielt fragmentarische Hinweise zu
      Behördenanfragen in COM/BEI, aber kein dediziertes Kriterium. 2026
      hebt Behördenanfragen mit dem 4-Kriterien-Bereich INQ als eigenen
      Pflichtenkomplex aus (CLOUD Act, BfDI-Anfragen, MLAT-Verfahren).
    gap_warning: |
      Bestandsanwender müssen für INQ-01..04 einen formalen Prozess
      aufbauen: Legal-Review-Workflow, Kunden-Benachrichtigung (sofern
      rechtlich zulässig), Datenminimierung in der Antwort, technische
      Dokumentation der Datenherausgabe.
    cross_refs: ['INQ-02', 'INQ-03', 'INQ-04', 'GC-05']
    audit_evidence_hint: 'Behördenanfrage-Prozess-Dokumentation, Legal-Review-Protokolle, Transparenzbericht.'

  # ===== OIS — Organisation of Information Security =====
  - source: 'OIS-01'
    target: 'OIS-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 OIS-01 „Information Security Management System (ISMS)"
      entspricht direkt C5:2020 OIS-01 „Informationssicherheits-
      Managementsystem (ISMS)". Beide Versionen haben eine eigene
      OIS-Area; der Pflichteninhalt (dokumentiertes ISMS gemaess
      ISO 27001 oder gleichwertig) bleibt unveraendert.
    cross_refs: ['OIS-02']
    audit_evidence_hint: 'ISMS-Scope-Dokument, ISMS-Handbuch, ISO-27001-Zertifikat oder gleichwertig, Management-Review.'

  - source: 'OIS-04'
    target: 'COM-04'
    relationship: 'partial_overlap'
    confidence: 'low'
    rationale: |
      C5:2026 OIS-04 „Segregation of Duties" deckt Funktionstrennungs-
      Anforderungen ab, die in 2020 unter COM-04 (Beauftragten-Funktion)
      teilweise aufgehoben waren. Eigenständiges 2020-Kriterium für
      Segregation of Duties existiert nicht.
    audit_evidence_hint: 'SoD-Matrix für kritische Prozesse, Konflikt-Reviews letzte 12 Monate.'

  - source: 'OIS-05'
    target: 'OIS-05'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 OIS-05 „Threat Intelligence" entspricht direkt C5:2020
      OIS-05 „Identifikation von Schwachstellen, Bedrohungen und
      funktionalen Mängeln". Pflichteninhalt deckungsgleich; in 2026 von
      RB nach OIS verschoben.
    cross_refs: ['OIS-06']
    audit_evidence_hint: 'Threat-Intel-Quellen-Inventar, ausgewertete Meldungen letzte 12 Monate.'

  - source: 'OIS-07'
    target: 'OIS-07'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 OIS-07 „Risk Management Policy" entspricht direkt
      C5:2020 OIS-07 „Anwendung des Verfahrens fuer den Umgang mit
      Risiken". Beide verlangen eine dokumentierte Risk-Mgmt-Policy
      mit definierten Risiko-Kriterien und ISO-27005-konformem
      Risikomanagement war dort integraler Bestandteil. 2026 hebt
      Risk Management als eigenes Kriterium hervor.
    cross_refs: ['OIS-08', 'OIS-09']
    audit_evidence_hint: 'Risikomanagement-Richtlinie ISO-27005-konform, Risikoregister, Risk-Treatment-Plan.'

  # ===== OPS — Operations =====
  - source: 'OPS-01'
    target: 'OPS-01'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 OPS-01 „Capacity Management - Planning" entspricht direkt
      C5:2020 OPS-01 (Kapazitätsmanagement-Planung). Pflichteninhalt
      deckungsgleich; in 2026 präziser auf cloud-elastische Skalierung
      ausgerichtet.
    audit_evidence_hint: 'Capacity-Plan, Forecast-Modelle, Auslastungsmetriken letzte 12 Monate.'

  - source: 'OPS-04'
    target: 'OPS-15'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 OPS-04 „Protection Against Malware - Policies and
      Procedures" entspricht direkt C5:2020 OPS-15 „Schutz vor
      Schadprogrammen — Konzept". Numerische Verschiebung durch 2026-
      Restrukturierung; Pflichteninhalt unverändert.
    cross_refs: ['OPS-05']
    audit_evidence_hint: 'Malware-Schutz-Konzept, AV/EDR-Coverage-Report, Quarantäne-Statistiken.'

  - source: 'OPS-06'
    target: 'OPS-06'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      C5:2026 OPS-06 „Data Backup and Recovery - Policies and
      Procedures" entspricht dem Backup-Anteil von 2020 OPS-06. Der
      breitere 2020-Regelbetrieb-Bereich (RB) ist 2026 auf OPS, DEV und
      PSS verteilt; Backup-Pflichten konsolidiert in OPS-06..09.
    cross_refs: ['OPS-07', 'OPS-08', 'OPS-09']
    audit_evidence_hint: 'Backup-Konzept, Recovery-Test-Protokolle, Backup-Retention.'

  - source: 'OPS-10'
    target: 'OPS-10'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 OPS-10 „Logging and Monitoring - Policies and Procedures"
      entspricht direkt C5:2020 OPS-10. Pflichteninhalt deckungsgleich;
      2026 vertieft mit OPS-11..17 die operativen Detailpflichten.
    cross_refs: ['OPS-11', 'OPS-13', 'OPS-14']
    audit_evidence_hint: 'Logging-Konzept, SIEM-Use-Case-Katalog, 24/7-SOC-Coverage.'

  - source: 'OPS-18'
    target: 'OPS-18'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 OPS-18 „Managing Vulnerabilities - Policies and
      Procedures" entspricht direkt C5:2020 OPS-18. Pflichteninhalt
      deckungsgleich; 2026 vertieft mit OPS-25..28.
    cross_refs: ['OPS-25', 'OPS-26', 'OPS-27', 'OPS-28']
    audit_evidence_hint: 'Vulnerability-Scan-Reports, Patch-Compliance-Dashboard, CVE-Tracking.'

  - source: 'OPS-32'
    target: null
    relationship: 'superset'
    confidence: 'low'
    rationale: |
      C5:2026 OPS-32 „Confidential Computing - Policies and Procedures"
      ist ein NEUES Kriterium ohne 2020-Equivalent. Es adressiert TEE-
      basierte Verarbeitung (Intel SGX, AMD SEV, ARM CCA) für besonders
      sensitive Workloads.
    gap_warning: |
      Confidential-Computing-Anforderungen sind in 2020 NICHT vorhanden.
      Bestandsanwender müssen für OPS-32/33 ein eigenständiges Konzept
      aufbauen — primär relevant für Cloud-Anbieter mit Zielgruppe
      Health/Defense/Finance.
    cross_refs: ['OPS-33']
    audit_evidence_hint: 'Confidential-Computing-Konzept, TEE-Inventar, Remote-Attestation-Prozess.'

  - source: 'OPS-34'
    target: null
    relationship: 'superset'
    confidence: 'low'
    rationale: |
      C5:2026 OPS-34 „Container Management - Policies and Procedures"
      ist ein NEUES Kriterium ohne dediziertes 2020-Equivalent.
      Container-Sicherheit war 2020 implizit unter allgemeinen
      OPS/Hardening-Anforderungen erfasst — ohne eigene Pflichten zu
      Image-Signing, Runtime-Security und Orchestrator-Hardening.
    gap_warning: |
      Bestandsanwender müssen Container-spezifische Maßnahmen aufbauen:
