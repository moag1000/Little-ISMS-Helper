    audit_evidence_hint: 'MHC-04: Service-Mesh-Konfiguration mit mTLS. A.8.20: Netzwerk-Architektur-Diagramm, Firewall-Regelwerk.'

  - source: 'MHC-04'
    target: 'A.8.22'
