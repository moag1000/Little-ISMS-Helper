    confidence: 'medium'
    rationale: |
      MHC-04 adressiert Workload-Identität und Zero Trust als Mythos-Schutzziel
      für sichere Trennung. A.8.22 verlangt Netzwerksegregation. Schnittmenge
      bei logischer Isolation. partial_overlap weil MHC zusätzliche identitäts-
      basierte Mikrosegmentierungs-Schutzziele setzt, ISO grundlegende
      Segregations-Schutzziele behält.
    gap_warning: |
      MHC-04 fordert Identity-Aware-Microsegmentation (Service-Mesh); A.8.22
      lässt VLAN/Subnet-basierte Trennung zu. Reine A.8.22-Erfüllung deckt
      keine Workload-zu-Workload-Authorization ab.
    audit_evidence_hint: 'MHC-04: Service-Mesh-Authorization-Policies. A.8.22: VLAN-Plan, Segmentierungs-Konzept.'

  - source: 'MHC-05'
    target: 'A.5.7'
