    audit_evidence_hint: 'MHC-04: SPIFFE/SPIRE-Inventar, Workload-Identity-Dashboard. A.5.15: Access-Control-Policy.'

  - source: 'MHC-04'
    target: 'A.5.16'
    relationship: 'partial_overlap'
    confidence: 'high'
    rationale: |
      MHC-04 adressiert Workload-Identität und Zero Trust als Mythos-Schutzziel
      auch für Service-Accounts und Maschinen. A.5.16 verlangt Identitäts-
