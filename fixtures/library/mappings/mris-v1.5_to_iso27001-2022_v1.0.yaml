    audit_evidence_hint: 'MHC-04: Workload-Identity-Provisioning-Logs, Token-TTL-Standards. A.8.16: Identity-Lifecycle-Policy für Service-Accounts.'

  - source: 'MHC-04'
    target: 'A.8.2'
