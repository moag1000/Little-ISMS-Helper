schema_version: '1.1'
library:
  type: mapping
  id: 'mris-v1.5_to_iso27001-2022_v1.0'
  source_framework: 'MRIS-v1.5'
  target_framework: 'ISO27001'
  version: 1
  effective_from: '2026-04-26'
  effective_until: null

  provenance:
    primary_source: 'Peddi, Richard (2026). MRIS — Mythos-resistente Informationssicherheit, Version 1.5 — Kap. 9.4 Kompakt-Übersicht'
    primary_source_url: 'https://creativecommons.org/licenses/by/4.0/'
    secondary_sources:
      - 'ISO/IEC 27002:2022 — Information security controls'
      - 'BSI C5:2026 Prüfkatalog'
    publisher: 'Little ISMS Helper Maintainers (CC BY 4.0 derivative)'

  methodology:
    type: 'published_official_mapping'
    description: |
      MHC↔ISO-27002-Anbindungen aus MRIS v1.5 Kap. 9.4 übernommen.
      Relationship 'partial_overlap' weil MRIS-MHCs die ISO-Controls flankieren
      (zusätzliche Mythos-Schutzziele), nicht ersetzen. Confidence aus
      Übereinstimmungsgrad der ISO-Anchor-Anforderung mit dem MHC-Schutzziel.
      CC-BY-4.0-Ableitung mit Namensnennung Richard Peddi.

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2026-04-26', actor: 'maintainer' }
      - { state: 'review',    date: '2026-04-26', actor: 'maintainer' }
      - { state: 'approved',  date: '2026-04-26', actor: 'reviewer-2' }
      - { state: 'published', date: '2026-04-26', actor: 'ciso-signoff' }

mappings:
  - source: 'MHC-01'
    target: 'A.8.24'
    relationship: 'partial_overlap'
    confidence: 'high'
    rationale: |
      MHC-01 adressiert Post-Quantum-Strategie und kryptografisches Inventar als
      Mythos-Schutzziel gegen "klassische Krypto bleibt ewig sicher". A.8.24
      verlangt Einsatz und Management von Kryptografie inklusive Algorithmen,
      Schlüssellängen und Lifecycle. Schnittmenge bei Krypto-Inventar und
      Algorithmus-Governance. partial_overlap weil MHC zusätzliche PQC-Migrations-
      und Quantum-Readiness-Schutzziele setzt, ISO grundlegende Krypto-Schutzziele behält.
    audit_evidence_hint: 'MHC-01: PQC-Migrationsplan, Quantum-Risk-Assessment, Crypto-Agility-Inventar. A.8.24: Krypto-Policy mit Algorithmus-Whitelist und Schlüsselmanagement.'

  - source: 'MHC-02'
    target: 'A.5.19'
    relationship: 'partial_overlap'
    confidence: 'high'
    rationale: |
      MHC-02 adressiert SBOM und Build-Provenance als Mythos-Schutzziel gegen
      "Lieferanten-Software ist vertrauenswürdig". A.5.19 verlangt Informations-
      sicherheit in Lieferantenbeziehungen. Schnittmenge bei Software-Supply-Chain-
      Transparenz. partial_overlap weil MHC zusätzliche Build-Provenance- und
      SLSA-Schutzziele setzt, ISO grundlegende Lieferanten-Governance behält.
    audit_evidence_hint: 'MHC-02: SBOM-Repository (CycloneDX/SPDX), SLSA-Attestations, Build-Provenance-Logs. A.5.19: Lieferanten-Sicherheits-Policy, Onboarding-Dokumentation.'

  - source: 'MHC-02'
    target: 'A.5.20'
    relationship: 'partial_overlap'
    confidence: 'high'
    rationale: |
      MHC-02 adressiert SBOM und Build-Provenance als Mythos-Schutzziel gegen
      undokumentierte Software-Bestandteile. A.5.20 verlangt Sicherheits-
      anforderungen in Lieferantenverträgen. Schnittmenge bei vertraglicher
      Verankerung von SBOM-Lieferung. partial_overlap weil MHC zusätzliche
      maschinenlesbare Provenance-Schutzziele setzt, ISO grundlegende
      Vertragsklauseln behält.
    audit_evidence_hint: 'MHC-02: Vertragsklauseln zur SBOM-Pflicht, CRA-konforme Liefervereinbarungen. A.5.20: Standard-Vertragsmuster mit Sicherheitsanhang.'

  - source: 'MHC-02'
    target: 'A.5.21'
    relationship: 'partial_overlap'
    confidence: 'high'
    rationale: |
      MHC-02 adressiert SBOM und Build-Provenance als Mythos-Schutzziel gegen
      versteckte Risiken in der ICT-Supply-Chain. A.5.21 verlangt Management
      der Informationssicherheit in der ICT-Supply-Chain. Schnittmenge bei
      End-to-End-Komponenten-Transparenz. partial_overlap weil MHC zusätzliche
      Tamper-Evidence- und Reproducible-Build-Schutzziele setzt, ISO grundlegende
      Supply-Chain-Risiko-Governance behält.
    audit_evidence_hint: 'MHC-02: Reproducible-Build-Reports, Tamper-Evidence-Logs, CRA-Annex-I-Nachweise. A.5.21: ICT-Supply-Chain-Risk-Register, Tier-N-Bewertungen.'

  - source: 'MHC-02'
    target: 'A.8.4'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      MHC-02 adressiert SBOM und Build-Provenance als Mythos-Schutzziel für
      sicheren Quellcode-Zugriff. A.8.4 verlangt Zugriffsschutz auf Quellcode.
      Schnittmenge bei Repository-Integrität und Build-Pipeline-Schutz.
      partial_overlap weil MHC zusätzliche Provenance-Attestation-Schutzziele
      setzt, ISO grundlegende Source-Code-Zugriffskontrolle behält.
    gap_warning: |
      MHC-02 ergänzt über A.8.4 hinaus signierte Build-Artefakte und
      maschinenlesbare Provenance-Nachweise (SLSA Level 2+). Reine A.8.4-Erfüllung
      deckt keine Build-Tamper-Detection ab.
    audit_evidence_hint: 'MHC-02: SLSA-Provenance-Files, signierte Container-Images. A.8.4: Repository-ACLs, Branch-Protection-Settings.'

  - source: 'MHC-02'
    target: 'A.8.30'
    relationship: 'partial_overlap'
    confidence: 'high'
    rationale: |
      MHC-02 adressiert SBOM und Build-Provenance als Mythos-Schutzziel gegen
      ungeprüfte Outsourced-Development-Lieferungen. A.8.30 verlangt Steuerung
      ausgelagerter Entwicklung. Schnittmenge bei Nachweisbarkeit der
      Komponenten-Herkunft. partial_overlap weil MHC zusätzliche kryptografische
      Provenance-Schutzziele setzt, ISO grundlegende Outsourcing-Governance behält.
    audit_evidence_hint: 'MHC-02: SLSA-Attestations für externe Builds, signierte SBOMs vom Auftragnehmer. A.8.30: Outsourcing-Verträge mit Sicherheitsklauseln.'

  - source: 'MHC-03'
    target: 'A.5.17'
    relationship: 'partial_overlap'
    confidence: 'high'
    rationale: |
      MHC-03 adressiert phishing-resistente MFA als Mythos-Schutzziel gegen
      "Passwörter plus SMS-OTP reichen aus". A.5.17 verlangt sichere Authentifi-
      zierungsinformationen. Schnittmenge bei Phishing-resistenz auf AAL2/AAL3.
      partial_overlap weil MHC zusätzliche FIDO2/WebAuthn-Schutzziele setzt,
      ISO grundlegende Authentifizierungs-Schutzziele behält.
    audit_evidence_hint: 'MHC-03: FIDO2-Token-Inventar, AAL3-Zertifizierung kritischer Apps. A.5.17: Authentifizierungs-Policy, Passwort-Standards.'

  - source: 'MHC-03'
    target: 'A.6.7'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      MHC-03 adressiert phishing-resistente MFA als Mythos-Schutzziel auch für
      Remote-Zugriffe. A.6.7 verlangt Sicherheit der Telearbeit. Schnittmenge
      bei sicherem Remote-Login. partial_overlap weil MHC zusätzliche Phishing-
      Resistenz-Schutzziele auch für Remote-Szenarien setzt, ISO grundlegende
      Telearbeits-Schutzziele behält.
    gap_warning: |
      MHC-03 fordert FIDO2/WebAuthn auch für VPN-Login und SSO; A.6.7 lässt
      schwächere MFA (TOTP/SMS) zu. Reine A.6.7-Erfüllung schließt Phishing-
      Lücken bei Remote-Workern nicht.
    audit_evidence_hint: 'MHC-03: FIDO2-Coverage für VPN/SSO. A.6.7: Telearbeits-Richtlinie, VPN-Konfigurations-Standard.'

  - source: 'MHC-03'
    target: 'A.8.1'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      MHC-03 adressiert phishing-resistente MFA als Mythos-Schutzziel auf
      Endgeräten. A.8.1 verlangt Schutz von User-Endpoints. Schnittmenge bei
      gerätegebundener Authentifizierung. partial_overlap weil MHC zusätzliche
      Hardware-Token-Bindung setzt, ISO grundlegende Endpoint-Schutzziele behält.
    gap_warning: |
      MHC-03 verlangt Hardware-Bound-Credentials (Platform Authenticator);
      A.8.1 lässt Software-Token zu. Reine A.8.1-Erfüllung deckt keine
      AiTM-Phishing-Resistenz auf Endpoints ab.
    audit_evidence_hint: 'MHC-03: TPM/Secure-Enclave-gebundene Credentials. A.8.1: Endpoint-Härtungs-Standard, MDM-Konfiguration.'

  - source: 'MHC-03'
    target: 'A.8.5'
    relationship: 'partial_overlap'
    confidence: 'high'
    rationale: |
      MHC-03 adressiert phishing-resistente MFA als Mythos-Schutzziel im Login-
      Prozess. A.8.5 verlangt sichere Authentifizierung. Schnittmenge bei
      starker Authentifizierungs-Implementierung. partial_overlap weil MHC
      zusätzliche AAL2/AAL3-Anforderungen setzt, ISO grundlegende sichere
      Authentifizierungs-Schutzziele behält.
    audit_evidence_hint: 'MHC-03: NIST-SP-800-63B-AAL-Zuordnung pro Anwendung. A.8.5: Authentifizierungs-Architektur-Dokument.'

  - source: 'MHC-04'
    target: 'A.5.15'
    relationship: 'partial_overlap'
    confidence: 'high'
    rationale: |
      MHC-04 adressiert Workload-Identität und Zero Trust als Mythos-Schutzziel
