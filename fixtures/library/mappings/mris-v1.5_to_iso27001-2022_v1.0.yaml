    audit_evidence_hint: 'MHC-05: ATT&CK-Mapping der Detection-Rules, UEBA-Dashboards. A.5.7: Threat-Intel-Quellen-Inventar.'

  - source: 'MHC-05'
    target: 'A.8.7'
