      oder Fileless-Angriffe.
    audit_evidence_hint: 'MHC-05: EDR-Telemetrie-Coverage, Detection-Engineering-Backlog. A.8.7: AV-Inventar, Update-Status.'

  - source: 'MHC-05'
    target: 'A.8.16'
