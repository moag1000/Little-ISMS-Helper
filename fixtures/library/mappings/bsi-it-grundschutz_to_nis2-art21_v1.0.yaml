    confidence: 'medium'
    rationale: |
      Baustein ORP.5 'Compliance Management' adressiert die NIS2-Anforderung Art. 21(2)(a) über Risiko-/Sicherheits-Konzept-Beiträge. Schnittmenge: relevante Teilabdeckung.
    audit_evidence_hint: 'Organigramm, Stellenbeschreibungen, Schulungspläne, IAM-/Compliance-Konzepte; ergänzend NIS2-Art.-21(2)(a)-Compliance-Nachweis.'
  - source: 'ORP.5'
