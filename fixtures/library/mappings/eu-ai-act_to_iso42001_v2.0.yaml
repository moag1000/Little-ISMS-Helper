  # ----- Art. 73 — Reporting of serious incidents -----
  - source: 'Art.73'
    target: 'A.8.4'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      AI Act Art. 73 verlangt Meldung schwerwiegender Vorfaelle ("serious
      incident") an Marktueberwachungsbehoerden innerhalb 15 Tagen
      (Tod/Personenschaden: 10 Tage; weitverbreiteter Verstoss: 2 Tage).
      ISO 42001 A.8.4 (Communication of incidents) deckt strukturierte
      Incident-Kommunikation ab — Art. 73 ist die rechtliche Konkretisierung
      mit Pflichtfristen und Behoerden-Empfaenger.
    gap_warning: |
      Meldefristen (2/10/15 Tage) und Definition "serious incident" gemaess
      Art. 3(49) sind nicht in A.8.4 abgebildet. Separate Incident-
      Klassifizierungs-Matrix und Meldewege zu Marktueberwachungsbehoerden
      + AI Office einrichten. Cross-Reporting mit DSGVO Art. 33/34 und
      NIS2 Art. 23 pruefen.
    cross_refs: ['10.2', 'A.10.4']
    audit_evidence_hint: 'Incident-Klassifizierungs-Matrix mit AI-Act-Schwellwerten, Meldewege-Doku Marktueberwachungsbehoerde + AI Office, Sample-Vorfallsmeldung, Cross-Reporting-Matrix DSGVO/NIS2/AI Act.'
