schema_version: '1.1'
library:
  type: mapping
  id: 'eu-ai-act_to_iso42001_v2.0'
  source_framework: 'EU-AI-ACT'
  target_framework: 'ISO42001'
  version: 2
  effective_from: '2026-05-06'
  effective_until: null

  provenance:
    primary_source: 'EU AI Act (2024/1689) + ISO/IEC 42001:2023'
    primary_source_url: 'https://www.iso.org/standard/81230.html'
    secondary_sources:
      - 'EU Verordnung (EU) 2024/1689 (AI Act, ABl. L vom 12.07.2024) — Volltext Art. 1-113 + Annex I-XIII'
      - 'ISO/IEC 42001:2023 Annex A (38 Controls), Annex B (Implementation Guidance), Annex C (initiales AI-Act-Mapping)'
      - 'CEN-CENELEC JTC 21 Harmonised Standards Roadmap 2025-Q4'
      - 'AI Office Guidelines on General-Purpose AI Models (Final 2026-Q1)'
      - 'AI Office FAQ on FRIA (Fundamental Rights Impact Assessment) Art. 27'
      - 'Eigene Volltext-Analyse durch GRC-Team mit AI-Governance-Fokus (v2-Granularexpansion)'
    publisher: 'Little ISMS Helper Maintainers'
    license_note: |
      Mapping is original derivative work (AGPL-3.0). EU AI Act article references © Europäische Union,
      public-domain-equivalent (Amtliches Werk). ISO/IEC 42001:2023 Annex-A-Control-IDs sind
      Normenzitate; Volltexte unter ISO-Lizenz. Kein Volltext-Reprint, nur Identifier + eigene Rationale.

  methodology:
    type: 'text_comparison_with_expert_review'
    description: |
      Granulare v2-Expansion gegenueber v1.0 (10 Mappings → 38 Mappings).
      Reife-Stand 2026-Q2: ISO/IEC 42001:2023 ist Dezember 2023 erschienen,
      EU AI Act August 2024 in Kraft mit gestaffelter Anwendbarkeit (verbotene
      Praktiken Feb 2025, GPAI Aug 2025, Hochrisiko-Systeme Aug 2026/2027).
      Harmonisierte Normen via CEN-CENELEC JTC 21 sind 2026-Q2 finalisiert
      und veroeffentlicht — daher Lifecycle-State 'published' (vs. v1.0
      'review').

      v2-Granularitaet pro AI-Act-Artikel:
      1. Volltext-Lesung der AI-Act-Anforderung (jetzt auch Art. 16, 25, 26,
         27, 50, 55, 73 abgedeckt — nicht nur Hochrisiko-Pflichten)
      2. Identifikation ALLER korrespondierenden ISO-42001-Klauseln und/oder
         Annex-A-Controls (Annex A: 38 Controls in A.2-A.10 + Klauseln 4-10)
      3. Bewertung der Schnittmenge: AI Act ist gesetzlich verbindlich und
         produktbezogen, ISO 42001 ist managementsystem-orientiert und
         freiwillig — strukturelle Asymmetrie fuehrt selten zu "equivalent",
         meist "subset" oder "related"
      4. Granulare Annex-A-Sub-IDs (A.2.2, A.5.4, A.6.2.7, A.8.4 etc.) statt
         Cluster-IDs ("Annex A.6", "Annex A.7")
      5. Confidence-Verteilung Soll: ~60% high (ISO 42001 als
         AI-Act-Implementierungs-Framework gestaltet), ~30% medium,
         ~10% low (FRIA, GPAI Systemic Risk, EU Database Registration)
      6. Gap-Warnings bei Konformitaetsbewertung (Art. 43 Modul A/B+C),
         CE-Kennzeichnung (Art. 48), EU-Datenbank-Registrierung (Art. 49,
         71), FRIA (Art. 27) und GPAI-Systemic-Pflichten (Art. 55)
      7. 4-Augen-Review durch zweiten Experten mit AI-Governance-Background

      ISO-42001-Annex-A-Control-Struktur (38 Controls):
      - A.2 (AI Policy): A.2.2, A.2.3, A.2.4
      - A.3 (Internal Organization): A.3.2, A.3.3
      - A.4 (Resources): A.4.2, A.4.3, A.4.4, A.4.5, A.4.6
      - A.5 (Impact Assessment): A.5.2, A.5.3, A.5.4, A.5.5
      - A.6 (AI System Lifecycle): A.6.1.2, A.6.1.3, A.6.1.4, A.6.2.2,
        A.6.2.3, A.6.2.4, A.6.2.5, A.6.2.6, A.6.2.7, A.6.2.8
      - A.7 (Data for AI Systems): A.7.2, A.7.3, A.7.4, A.7.5, A.7.6
      - A.8 (Info for Stakeholders): A.8.2, A.8.3, A.8.4, A.8.5
      - A.9 (Use of AI Systems): A.9.2, A.9.3, A.9.4
      - A.10 (Third Party + Customer Relationships): A.10.2, A.10.3, A.10.4

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2026-04-15', actor: 'maintainer' }
      - { state: 'review',    date: '2026-04-28', actor: 'maintainer' }
      - { state: 'approved',  date: '2026-05-05', actor: 'reviewer-2' }
      - { state: 'published', date: '2026-05-06', actor: 'ciso-signoff' }

mappings:
  # ============================================================================
  # CHAPTER I — Allgemeine Bestimmungen + CHAPTER II — Verbotene Praktiken
  # ============================================================================

  - source: 'Art.5'
    target: 'A.2.2'
    relationship: 'related'
    confidence: 'high'
    rationale: |
      AI Act Art. 5 verbietet bestimmte KI-Praktiken absolut (Social Scoring,
      Manipulation vulnerabler Gruppen, Echtzeit-Remote-Biometrie im
      oeffentlichen Raum mit Ausnahmen, Emotion-Recognition am Arbeitsplatz).
      ISO 42001 A.2.2 (AI Policy) verlangt eine dokumentierte AI-Policy, die
      Werte, Prinzipien und Akzeptanzgrenzen festlegt — strukturell der Ort,
      wo verbotene Praktiken gemaess Art. 5 als organisatorische Red-Lines
      verankert werden. Confidence high, weil A.2.2 explizit Policy-Inhalte
      zu "ethical considerations" und "compliance with applicable law"
      verlangt; Art. 5 liefert die rechtliche Mindestschwelle.
    gap_warning: |
      A.2.2 ist policy-orientiert; das tatsaechliche Verbot wirkt unmittelbar
      aus Art. 5, unabhaengig von Policy-Umsetzung. Empfehlung: Pre-Deployment-
      Checkliste mit Art.-5-Verboten als Gate vor jedem AI-Use-Case-Approval.
    cross_refs: ['A.2.3', 'A.2.4', 'A.5.4']
    audit_evidence_hint: 'AI-Use-Policy mit explizitem Art.-5-Verbots-Katalog, Use-Case-Approval-Gate-Records, Schulungsnachweise zu Verbotstatbestaenden, juristische Bewertung von Edge-Cases (Emotion-Recognition, Predictive Policing).'

  - source: 'Art.5'
    target: 'A.5.4'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      AI Act Art. 5 verbietet u.a. Praktiken, die "Schwaechen vulnerabler
      Personen ausnutzen" (Art. 5(1)(b)) und die "auf besonderen Eigenschaften
      basierende Klassifikation natuerlicher Personen" (Art. 5(1)(c)).
      ISO 42001 A.5.4 (AI System Impact Assessment Process — Impact on
      Individuals) verlangt eine systematische Bewertung der Auswirkungen
      eines AI-Systems auf Individuen einschliesslich vulnerabler Gruppen.
      Art. 5 definiert die absolute Untergrenze (Verbot), A.5.4 fordert
      die Bewertungsmechanik — daher subset (Art. 5 ist Pflichtteil der
      Impact-Bewertung).
    cross_refs: ['A.5.3', 'A.5.5']
    audit_evidence_hint: 'Impact Assessment je AI-System mit Vulnerability-Population-Analyse, dokumentierte Ausschluss-Begruendung fuer Art.-5-Verbote, ggf. Stop-Decision-Log bei Use-Cases an der Verbotsgrenze.'

  # ============================================================================
  # CHAPTER III — Hochrisiko-KI-Systeme (Art. 6-49)
  # ============================================================================

  # ----- Art. 9 — Risikomanagement-System -----
  - source: 'Art.9'
    target: 'A.5.2'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      AI Act Art. 9 verlangt fuer Hochrisiko-KI-Systeme ein durchgaengiges
      Risikomanagement ueber den gesamten Lebenszyklus mit Identifikation
      bekannter und vorhersehbarer Risiken, Risikoabschaetzung bei
      bestimmungsgemaesser Verwendung und vorhersehbarem Missbrauch.
      ISO 42001 A.5.2 (AI System Impact Assessment Process) verlangt einen
      etablierten Prozess fuer Impact Assessments und ist methodischer
      Grundbaustein des produktbezogenen Risk-Management-Lifecycle gemaess
      Art. 9. Art. 9 ist konkrete Auspraegung des A.5.2-Prozesses.
    cross_refs: ['A.5.3', 'A.5.4', 'A.5.5']
    audit_evidence_hint: 'Etablierter Impact-Assessment-Prozess gemaess A.5.2, AI-Risk-Register je Hochrisiko-System, Lifecycle-Risk-Reviews mit dokumentierten Akzeptanzkriterien gemaess Art. 9(5).'

  - source: 'Art.9'
    target: 'A.5.3'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      AI Act Art. 9(2)-(4) definiert die Schritte der Risikobewertung
      (Identifikation, Abschaetzung, Bewertung, Mitigation). ISO 42001 A.5.3
      (Documentation of AI System Impact Assessments) verlangt die formale
      Dokumentation jeder Impact-Bewertung mit Methodik, Annahmen und
      Ergebnissen. Art. 9 spezifiziert produktbezogene Pflichtinhalte;
      A.5.3 liefert die Dokumentations-Struktur.
    cross_refs: ['A.5.2', 'A.6.2.4']
    audit_evidence_hint: 'Dokumentierte Risk-Assessment-Reports je Hochrisiko-System mit Art.-9-Pflichtinhalten, Risk-Reduction-Roadmap, Restrisiko-Akzeptanz-Records mit Management-Sign-off.'

  - source: 'Art.9'
    target: '6.1'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 42001 Klausel 6.1 (Actions to address risks and opportunities)
      verlangt im AIMS einen integrierten Risk-Approach (sowohl
      organisatorisch als auch AI-spezifisch). AI Act Art. 9 ist die
      produktbezogene Konkretisierung dieses Klausel-6.1-Risk-Approach
      fuer Hochrisiko-KI-Systeme — mit praeskriptiven Akzeptanzkriterien,
      Restrisiko-Kommunikation (Art. 9(5)) und Beruecksichtigung
      vulnerabler Gruppen (Art. 9(9)).
    gap_warning: |
      Klausel 6.1 ist organisations-zentriert; Art. 9 ist system-zentriert.
      Empfehlung: AIMS-Risk-Process auf Klausel-6.1-Ebene plus
      System-Level-Risk-Files je Hochrisiko-System fuehren.
    cross_refs: ['8.2', '8.3']
    audit_evidence_hint: 'AIMS-Risk-Methodik gemaess 6.1, System-Level-Risk-Files je Hochrisiko-System mit Art.-9-Pflichtinhalten, Risk-Treatment-Plan-Reviews.'

  - source: 'Art.9'
    target: '8.2'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISO 42001 Klausel 8.2 (AI Risk Assessment) ist die operative
      Durchfuehrungsklausel der AI-Risk-Bewertung im AIMS-Betrieb. AI Act
      Art. 9 fordert die kontinuierliche Durchfuehrung dieser Bewertung
      ueber den gesamten Lebenszyklus eines Hochrisiko-Systems.
      Schnittmenge in der operativen Durchfuehrung hoch.
    cross_refs: ['8.3']
    audit_evidence_hint: 'Lifecycle-Risk-Assessment-Logs gemaess 8.2, Trigger-Events fuer Re-Assessment, Versionsstand der Risk-Files je System-Release.'

  - source: 'Art.9'
    target: '8.3'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISO 42001 Klausel 8.3 (AI Risk Treatment) deckt die Risk-Treatment-
      Mechanik ab. AI Act Art. 9(4) fordert priorisierte Risk-Mitigation-
      Massnahmen mit Beruecksichtigung von Stand der Technik und
      Verhaeltnismaessigkeit — direkter Pflicht-Anteil der A.8.3-Mechanik.
    cross_refs: ['8.2', 'A.6.2.4']
    audit_evidence_hint: 'Risk-Treatment-Plan je Hochrisiko-System, dokumentierte Stand-der-Technik-Begruendung, Restrisiko-Akzeptanz mit Top-Mgmt-Sign-off.'

  # ----- Art. 10 — Daten und Daten-Governance -----
  - source: 'Art.10'
    target: 'A.7.2'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      AI Act Art. 10 verlangt fuer Trainings-, Validierungs- und Testdaten
      strenge Data-Governance: Repraesentativitaet, Fehlerfreiheit,
      Vollstaendigkeit, Bias-Vermeidung. ISO 42001 A.7.2 (Data for development
      and enhancement of AI Systems) verlangt Data-Quality-Management als
      Management-Praktik. Art. 10 ist konkreter Pflichtenkatalog mit
      pruefbaren Akzeptanzkriterien gemaess Stand der Technik.
    gap_warning: |
      Art. 10(5) erlaubt Verarbeitung besonderer Datenkategorien
      (DSGVO Art. 9) zur Bias-Erkennung — ISO 42001 nicht abgedeckt.
      Separate DPIA + Rechtsgrundlagen-Analyse durch DPO erforderlich.
    cross_refs: ['A.7.3', 'A.7.4']
    audit_evidence_hint: 'Data-Governance-Policy, Datenherkunfts-Dokumentation, Bias-Test-Reports je Trainingslauf, DPIA fuer Bias-Daten gemaess Art. 10(5).'

  - source: 'Art.10'
    target: 'A.7.3'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 42001 A.7.3 (Acquisition of data) verlangt dokumentierte
      Data-Acquisition-Prozesse mit Quellen-Bewertung. AI Act Art. 10(2)(a)-(b)
      fordert Datenherkunfts-Dokumentation und Bewertung der Verfuegbarkeit,
      Quantitaet und Eignung der Datensaetze — direkte produktbezogene
      Konkretisierung von A.7.3.
    cross_refs: ['A.7.2', 'A.7.6']
    audit_evidence_hint: 'Data-Acquisition-SOP, Datensatz-Lineage-Dokumentation mit Quellangabe, Lizenz-/Nutzungsrechte-Nachweise, Sample-Datensatz-Karten.'

  - source: 'Art.10'
    target: 'A.7.4'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 42001 A.7.4 (Quality of data for AI Systems) deckt
      Daten-Qualitaets-Kontrollen ab. AI Act Art. 10(3) fordert
      Repraesentativitaet, Fehlerfreiheit und Vollstaendigkeit der
      Datensaetze — direkte Schnittmenge.
    cross_refs: ['A.7.2', 'A.7.5']
    audit_evidence_hint: 'Data-Quality-KPIs, Validierungs-Reports je Datenset, Drift-Detection-Mechanismen, Quality-Gate-Records vor Trainings-Start.'

  - source: 'Art.10'
    target: 'A.7.5'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 42001 A.7.5 (Data provenance) verlangt dokumentierte
      Daten-Provenance ueber den gesamten Data-Lifecycle. AI Act Art. 10(2)(b)
      fordert "data origin and selection methods" als pruefbare Annex-IV-
      Pflichtdokumentation.
    cross_refs: ['A.7.3', 'A.6.2.7']
    audit_evidence_hint: 'Provenance-Tracking-System, Data-Lineage-Diagramme, Hash-/Signatur-basierte Integritaets-Nachweise, Aufbewahrung gemaess Annex-IV-Anforderungen.'

  - source: 'Art.10'
    target: 'A.7.6'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 42001 A.7.6 (Data preparation) deckt Pre-Processing-Kontrollen
      ab. AI Act Art. 10(3) fordert Datenpraeparation mit Bias-Mitigation,
      Annotations-Qualitaet und Labeling-Verfahren — direkte Schnittmenge.
    cross_refs: ['A.7.2', 'A.7.4']
    audit_evidence_hint: 'Data-Preparation-SOP, Annotations-Quality-Reviews (Inter-Rater-Agreement), Labeling-Guidelines, Bias-Mitigation-Steps in Pre-Processing-Pipeline.'

  # ----- Art. 11 — Technische Dokumentation -----
  - source: 'Art.11'
    target: 'A.6.2.7'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      AI Act Art. 11 + Annex IV verlangt umfangreiche technische
      Dokumentation fuer Hochrisiko-Systeme inklusive Systembeschreibung,
      Designentscheidungen, Trainingsmethoden, Performance-Metriken,
      Risk-Management-Doku und Post-Market-Monitoring-Plan.
      ISO 42001 A.6.2.7 (AI System technical documentation) verlangt
      vergleichbare Dokumentation. Annex-IV-Pflichtinhalte sind direkter
      Pflichtanteil dieser Control.
    gap_warning: |
      Annex IV enthaelt 9 Pflichtbereiche mit detaillierten Unterpunkten.
      Empfehlung: Annex-IV-Konformitaets-Checkliste pro Hochrisiko-System.
    cross_refs: ['7.5']
    audit_evidence_hint: 'Annex-IV-konforme Tech-Doku je Hochrisiko-System, Versionskontrolle, Konformitaetsbewertungs-Akte, Aufbewahrung 10 Jahre nach Inverkehrbringen.'

  - source: 'Art.11'
    target: '7.5'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 42001 Klausel 7.5 (Documented Information) regelt das
      Dokumenten-Lenkungs-Framework des AIMS (Erstellung, Aktualisierung,
      Kontrolle, Aufbewahrung). AI Act Art. 11 ist die produktbezogene
      Konkretisierung dieser Klausel fuer Hochrisiko-System-Dokumentation
      mit gesetzlichen Aufbewahrungsfristen.
    cross_refs: ['A.6.2.7']
    audit_evidence_hint: 'Dokumenten-Lenkungs-SOP, Versionsstand der Tech-Doku je System, Aufbewahrungs-/Loesch-Konzept gemaess Art. 18 (10 Jahre).'

  # ----- Art. 12 — Aufzeichnungspflichten / Logs -----
  - source: 'Art.12'
    target: 'A.6.2.8'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      AI Act Art. 12 fordert automatische Ereignis-Aufzeichnungen ("Logs")
      ueber die gesamte Lebensdauer von Hochrisiko-Systemen mit Mindest-
      inhalten gemaess Art. 12(2). ISO 42001 A.6.2.8 (Event logs of AI System)
      verlangt analoge Logging-Kontrollen mit Aufbewahrungsdauer und
      Integritaetsschutz. Schnittmenge inhaltlich hoch und methodisch
      vergleichbar.
    cross_refs: ['A.8.4']
    audit_evidence_hint: 'Logging-Konzept mit Pflichtfeld-Mapping zu Art. 12(2), Aufbewahrungsregeln (mind. 6 Monate), WORM-Storage-Nachweis, Sample-Log-Auszug.'

  # ----- Art. 13 — Transparenz und Bereitstellung von Informationen -----
  - source: 'Art.13'
    target: 'A.8.2'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      AI Act Art. 13 verlangt Transparenz gegenueber Betreibern: Hochrisiko-
      Systeme muessen so gestaltet sein, dass Output interpretierbar ist,
      und Betreiber-Anweisungen muessen Funktionsweise, Genauigkeit,
      Robustheit und Wartungspflichten erlaeutern. ISO 42001 A.8.2 (System
      documentation and information for users) deckt User-Information ab,
      Art. 13 ist konkreter Pflichtinhalt.
    cross_refs: ['A.8.3', 'A.8.5']
    audit_evidence_hint: 'Betreiber-Anweisung gemaess Art. 13(3) Pflichtinhalten, Sprachfassungen je Markt, Usability-Test mit Betreibern.'

  - source: 'Art.13'
    target: 'A.8.5'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 42001 A.8.5 (External reporting) deckt strukturierte Externe-
      Kommunikation ab. AI Act Art. 13(3) konkretisiert dies als
      Pflichtinhalte der Betreiber-Anweisung (Identitaet des Anbieters,
      Eigenschaften, Limitations, Human-Oversight-Massnahmen).
    cross_refs: ['A.8.2']
    audit_evidence_hint: 'Externe Kommunikations-Templates fuer Betreiber-Anweisung, Genehmigungs-Workflow, mehrsprachige Versionen.'

  # ----- Art. 14 — Menschliche Aufsicht -----
  - source: 'Art.14'
    target: 'A.9.2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      AI Act Art. 14 verlangt menschliche Aufsicht ueber Hochrisiko-Systeme
      mit Stop-Button-Funktionalitaet, Verstaendnis der Systemfaehigkeiten,
      Awareness fuer Automation-Bias und Override-Moeglichkeiten.
      ISO 42001 A.9.2 (Processes for responsible use of AI Systems) verlangt
      analoge Kontrollen fuer menschliche Steuerung. Schnittmenge methodisch
      und inhaltlich hoch.
    cross_refs: ['A.9.3', 'A.9.4']
    audit_evidence_hint: 'Human-Oversight-Konzept je System, Override-Funktionalitaets-Tests, Bediener-Schulungsnachweise.'

  - source: 'Art.14'
    target: 'A.9.3'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 42001 A.9.3 (Objectives for responsible use of AI System) verlangt
      definierte Ziele fuer verantwortungsvollen AI-Einsatz. AI Act Art. 14(2)
      konkretisiert dies fuer Hochrisiko-Systeme mit verpflichtender Human-
      Oversight-Definition pro System.
    cross_refs: ['A.9.2']
    audit_evidence_hint: 'Use-Case-Ziele mit Human-Oversight-Anforderungen, Akzeptanzkriterien fuer Human-in-the-Loop, Eskalations-Schwellwerte.'

  - source: 'Art.14'
    target: 'A.9.4'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 42001 A.9.4 (Intended use of the AI System) verlangt Dokumentation
      des bestimmungsgemaessen Gebrauchs. AI Act Art. 14(4)(a)-(e) konkretisiert
      Human-Oversight-Pflichten innerhalb des bestimmungsgemaessen Gebrauchs
      (Verstehen der Limits, Automation-Bias-Awareness, Override, Stop).
      Art. 14(5) fordert zusaetzlich Vier-Augen-Prinzip bei biometrischer
      Identifikation.
    cross_refs: ['A.9.2']
    audit_evidence_hint: 'Intended-Use-Statement je System, Vier-Augen-Genehmigung bei biometrischer Identifikation, Bediener-Qualifikations-Nachweise.'

  # ----- Art. 15 — Genauigkeit, Robustheit und Cybersicherheit -----
  - source: 'Art.15'
    target: 'A.6.2.4'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      AI Act Art. 15 verlangt fuer Hochrisiko-Systeme angemessene
      Genauigkeit, Robustheit und Cybersicherheit ueber den gesamten
      Lebenszyklus mit deklarierten Genauigkeitsmetriken und Resilienz
      gegen Daten-Vergiftung, Modell-Manipulation und Adversarial Examples.
      ISO 42001 A.6.2.4 (Verification and validation measures) verlangt
      systematische V&V-Prozesse fuer AI-Systeme — direkte Pflicht-
      Implementierung der Art.-15-Anforderungen.
    cross_refs: ['A.6.2.5', 'A.6.2.6']
    audit_evidence_hint: 'V&V-Plan je System, Performance-Metriken-Doku, Adversarial-Robustness-Test-Reports, Cybersecurity-Threat-Modeling.'

  - source: 'Art.15'
    target: 'A.6.2.6'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 42001 A.6.2.6 (AI System operation and monitoring) verlangt
      kontinuierliche Operations- und Monitoring-Kontrollen. AI Act
      Art. 15(4) fordert Robustheit ueber den gesamten Lebenszyklus
      einschliesslich Drift-Detection und Modell-Refresh-Mechanismen
      bei Performance-Degradierung — operative Konkretisierung von A.6.2.6.
    gap_warning: |
      Adversarial-Robustness-Tests (Art. 15(5)) erfordern spezialisierte
      Testverfahren (ART, CleverHans). Empfehlung: Robustness-Test-
      Framework dokumentieren und Mindest-Robustheits-Score je System.
    cross_refs: ['A.6.2.4']
    audit_evidence_hint: 'Operations-SOP mit Drift-Detection, Model-Refresh-Trigger, Adversarial-Robustness-Test-Reports.'

  # ----- Art. 16 — Anbieterpflichten -----
  - source: 'Art.16'
    target: 'A.6.1.2'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      AI Act Art. 16 listet Anbieter-Kernpflichten (Konformitaetserklaerung,
      QMS, Tech-Doku, Logs, Konformitaetsbewertung, Registrierung,
