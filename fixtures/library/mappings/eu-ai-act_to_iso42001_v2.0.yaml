  # ----- Art. 27 — Fundamental Rights Impact Assessment (FRIA) -----
  - source: 'Art.27'
    target: 'A.5.2'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      AI Act Art. 27 verpflichtet bestimmte Betreiber (oeffentliche Stellen,
      private Akteure mit oeffentlicher Aufgabe, Banken/Versicherungen bei
      Kreditwuerdigkeitspruefung und Lebensversicherung) zur Durchfuehrung
      einer Fundamental Rights Impact Assessment (FRIA) vor Erst-Einsatz
      eines Hochrisiko-Systems. ISO 42001 A.5.2 (AI System Impact Assessment
      Process) liefert das Assessment-Framework — FRIA ist ein konkreter
      Pflicht-Anwendungsfall mit grundrechtlichem Fokus.
    gap_warning: |
      FRIA-spezifische Pflichtinhalte (Affected Persons, Risk Categories,
      Human Oversight Plan, Mitigation Plan) sind in A.5.2 nicht
      praeskriptiv. Empfehlung: FRIA-Template gemaess AI-Office-Guidelines
      separat pflegen und in A.5.2-Prozess einbetten.
    cross_refs: ['A.5.3', 'A.5.4', 'A.5.5']
    audit_evidence_hint: 'FRIA-Template mit Art.-27-Pflichtinhalten, FRIA-Records je Pflicht-Use-Case, Notifikation an Marktueberwachungsbehoerde gemaess Art. 27(3).'

  - source: 'Art.27'
    target: 'A.5.4'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISO 42001 A.5.4 (Assessment of AI System impact on individuals or
      groups of individuals) deckt grundrechtliche Auswirkungs-Bewertung
      auf Individuen ab. AI Act Art. 27(1)(c)-(d) fordert FRIA-Inhalte zu
      betroffenen Personenkategorien und spezifischen Schadensrisiken —
      direkte Schnittmenge mit A.5.4.
    cross_refs: ['A.5.2', 'A.5.5']
    audit_evidence_hint: 'Assessment-Reports mit Personenkategorien-Analyse, Vulnerable-Group-Identifikation, Schadensszenarien.'

  - source: 'Art.27'
    target: 'A.5.5'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      ISO 42001 A.5.5 (Assessment of AI System impact on societies) deckt
      gesellschaftliche Auswirkungs-Bewertung ab. AI Act Art. 27 fordert
