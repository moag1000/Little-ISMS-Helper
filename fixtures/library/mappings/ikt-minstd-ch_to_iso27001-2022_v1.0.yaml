schema_version: '1.1'
library:
  type: mapping
  id: 'ikt-minstd-ch_to_iso27001-2022_v1.0'
  source_framework: 'IKT-MINSTD-CH'
  target_framework: 'ISO27001'
  version: 1
  effective_from: '2026-06-14'
  effective_until: null

  provenance:
    primary_source: 'Minimalstandard zur Verbesserung der IKT-Resilienz, Version Mai 2023 (IKT-Minimalstandard 2023), NCSC / BWL — Bundesamt fuer wirtschaftliche Landesversorgung, Schweiz'
    primary_source_url: 'https://www.ncsc.admin.ch/ncsc/de/home/infos-fuer/infos-unternehmen/aktuelle-themen/ikt-minimalstandards.html'
    secondary_sources:
      - 'ISO/IEC 27001:2022 Annex A (93 controls)'
      - 'ISO/IEC 27002:2022 Implementation Guidance'
      - 'IKT-Minimalstandard 2023 ISO 27001:2022 Referenztabellen (Abschnitt 2.2–2.6)'
    publisher: 'Little ISMS Helper Maintainers'
    license_note: |
      IKT-Minimalstandard 2023 ist eine oeffentliche Schweizer Bundesveroffentlichung (NCSC/BWL),
      frei verwendbar fuer Referenzzwecke. ISO 27001:2022 Referenzen werden fuer Crosswalk-Zwecke
      verwendet. Das Mapping ist ein abgeleitetes Werk (AGPL-3.0).

  methodology:
    type: 'text_comparison_with_expert_review'
    description: |
      Das IKT-Minimalstandard-Dokument selbst enthaelt in jeder Tabelle (Abschnitt 2.2–2.6)
      eine offizielle Spalte "ISO 27001:2022" mit Referenzen auf Annex-A-Controls und
      Clauses. Diese Referenztabellen wurden als primaere Quelle fuer das Mapping verwendet.

      Mapping-Ansatz:
      1. Fuer jede IKT-Massnahme wurden die im Standard selbst angegebenen ISO-27001:2022-
         Referenzen (Annex-A-Controls A.5.x, A.6.x, A.7.x, A.8.x) als Ausgangspunkt genutzt.
      2. Bei mehreren Referenzen pro Massnahme wurde die repraesentativste Control gewaehlt
         (naechste inhaltliche Entsprechung, hohe Confidence) und weitere als cross_refs.
      3. Confidence-Festlegung:
         - high   = der IKT-Outcome bildet den ISO-Control-Outcome 1:1 ab
         - medium = teilweise Abdeckung oder breiter ISO-Control adressiert Massnahme als Teilaspekt
         - low    = ISO-Clause (4–10) adressiert den Governance-Kontext ohne spezifischen Control
      4. Nur Annex-A-Controls (A.x.y-Format) als target-IDs; ISO-Clauses werden als
         audit_evidence_hint erwaehnt, aber nicht als target-ID.

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2026-06-14', actor: 'maintainer' }
      - { state: 'published', date: '2026-06-14', actor: 'maintainer' }

