schema_version: '1.1'
library:
  type: mapping
  id: 'iso27701-2025_to_gdpr_v1.0'
  source_framework: 'ISO27701'
  target_framework: 'GDPR'
  version: 2
  effective_from: '2025-08-01'
  effective_until: null

  provenance:
    primary_source: 'ISO/IEC 27701:2019 Annex D — GDPR-Mapping (offiziell, inverse Richtung)'
    primary_source_url: 'https://www.iso.org/standard/71670.html'
    secondary_sources:
      - 'BfDI-Hinweispapier zu PIMS-Zertifizierung 2024-Q4'
      - 'Inverse-Ableitung aus gdpr_to_iso27701-2025_v1.0'
    publisher: 'Little ISMS Helper Maintainers'

  methodology:
    type: 'published_official_mapping'
    description: |
      Reverse-Mapping von ISO/IEC 27701:2019 (Privacy Information Management
      System) zur DSGVO/GDPR. Reziprok zu gdpr_to_iso27701-2025_v1.0 —
      gleiche Pairs, invertierte Relationships, identische Confidence.
      Rationale aus ISO-27701-PIMS-Sicht neu verfasst (Privacy-Operations-
      Perspektive). Quelle: ISO 27701:2019 Annex D (offizielle Mapping-Tabelle).
      HINWEIS: source_framework = 'ISO27701' (2019). Requirement-IDs wurden
      in v2 auf das DB-Schema 27701-A.7.x.x / 27701-B.8.x.x korrigiert
      (v1 nutzte nicht-normative Klauselnummern ohne Prefix, die in keinem
      DB-Requirement vorkommen).

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2025-08-15', actor: 'maintainer' }
      - { state: 'review',    date: '2025-08-25', actor: 'maintainer' }
      - { state: 'approved',  date: '2025-09-05', actor: 'reviewer-2' }
      - { state: 'published', date: '2025-09-15', actor: 'ciso-signoff' }
      - { state: 'published', date: '2026-06-12', actor: 'maintainer', note: 'v2: fix requirement IDs to match DB schema (27701-A.7.x.x / 27701-B.8.x.x)' }

mappings:
  - source: '27701-A.7.2.1'
    target: 'GDPR-5.1.a'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27701 Klausel A.7.2.1 "Identify and document purpose" verlangt die
      explizite Festlegung und Dokumentation jedes Verarbeitungszwecks im
      PIMS. DSGVO Art. 5 fordert davon konkret die Verarbeitungsgrundsätze
      Zweckbindung, Datenminimierung, Speicherbegrenzung und Rechenschaft —
      operationalisiert durch das in A.7.2.1 erzeugte Zweckverzeichnis.
    audit_evidence_hint: 'PIMS-Zweckverzeichnis (A.7.2.1) plus DSGVO-konformes RoPA mit Zwecken und Rechtsgrundlagen.'

  - source: '27701-A.7.2.2'
    target: 'GDPR-6'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27701 Klausel A.7.2.2 "Identify lawful basis" verlangt pro
      Verarbeitung die formale Bestimmung und Dokumentation der
      Rechtsgrundlage im PIMS. DSGVO Art. 6 fordert davon konkret, dass
      jede Verarbeitung auf einer der sechs Rechtmäßigkeitsbedingungen
      beruht — der ISO-Klausel-Output ist der Art.-6-Nachweis.
    audit_evidence_hint: 'PIMS-Rechtsgrundlagen-Register (A.7.2.2) und DSGVO-RoPA-Eintrag pro Verarbeitung.'

  - source: '27701-A.7.2.3'
    target: 'GDPR-7'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27701 Klausel A.7.2.3 "Determine when and how consent is to be
      obtained" definiert die PIMS-Anforderungen an Consent-Erhebung,
      Granularität und Widerrufsbarkeit. DSGVO Art. 7 fordert davon konkret
      Nachweisbarkeit, freiwillige Einwilligung und einfachen Widerruf —
      direkt durch den A.7.2.3-Consent-Prozess abgedeckt.
    audit_evidence_hint: 'Consent-Management-System (A.7.2.3) mit Nachweis-Protokollen für Art. 7.'

  - source: '27701-A.7.2.4'
    target: 'GDPR-13'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27701 Klausel A.7.2.4 "Provide privacy notices" legt fest, welche
      Informationen den Betroffenen bereitzustellen sind. DSGVO Art. 13/14
      fordert davon konkret die transparente Information bei Direkterhebung
      bzw. Drittquellen — die ISO-Klausel produziert direkt den Inhalt der
      Datenschutzerklärung.
    audit_evidence_hint: 'PIMS-Informationskatalog (A.7.2.4) und versionierte Datenschutzerklärung (Art. 13/14).'

  - source: '27701-A.7.2.5'
    target: 'GDPR-15'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27701 Klausel A.7.2.5 "Provide mechanism to modify or withdraw
      consent" verlangt operative Verfahren für Betroffenen-Anfragen
      einschließlich Auskunft. DSGVO Art. 15 fordert davon konkret das
      Auskunftsrecht inkl. Kopie der personenbezogenen Daten.

  - source: '27701-A.7.3.6'
    target: 'GDPR-17'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27701 Klausel A.7.3.6 "Correction and erasure" verlangt vom PIMS
      dokumentierte Lösch- und Korrekturprozesse inkl. Backup- und
      Sub-Processor-Behandlung. DSGVO Art. 17 fordert davon konkret das
      Recht auf Löschung ("Recht auf Vergessenwerden") mit vollständiger
      Datenentfernung und Drittweitergabe-Information.
    audit_evidence_hint: 'Lösch-Konzept (A.7.3.6), Löschprotokolle, Backup-Lösch-Strategie.'

  - source: '27701-A.7.4.4'
    target: 'GDPR-20'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27701 Klausel A.7.4.4 "Data portability" verlangt strukturierte,
      maschinenlesbare Datenherausgabe. DSGVO Art. 20 fordert davon konkret
      die Datenübertragbarkeit in einem gängigen, strukturierten Format an
      Betroffene oder andere Verantwortliche.

  - source: '27701-A.7.3.1'
    target: 'GDPR-25'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27701 Klausel A.7.3.1 "Limit collection" verlangt die
      technisch-organisatorische Begrenzung von Erhebung auf das
      Erforderliche. DSGVO Art. 25 fordert davon konkret Privacy by Design
      und by Default — datenschutzfreundliche Voreinstellungen.
    cross_refs: ['27701-A.7.4.2']

  - source: '27701-B.8.2.1'
    target: 'GDPR-28'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27701 Klausel B.8.2.1 "Customer agreements and responsibilities"
      verlangt vom PII-Processor vertragliche Bindung an Kunden-Weisungen,
      Zweckbindung und Audit-Recht. DSGVO Art. 28 fordert davon konkret den
      Auftragsverarbeitungsvertrag (AVV) mit allen Pflichtinhalten.
    cross_refs: ['27701-B.8.2.2', '27701-B.8.5.3']
    audit_evidence_hint: 'PIMS-AVV-Vorlagen (B.8.2.1) und DSGVO-konformes AVV-Register pro Auftragsverarbeiter.'

  - source: '27701-A.7.3.4'
    target: 'GDPR-30'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27701 Klausel A.7.3.4 "Records related to processing PII" verlangt
      die vollständige PIMS-interne Dokumentation aller PII-Verarbeitungen
      mit Zwecken, Kategorien, Empfängern und Speicherfristen. DSGVO Art. 30
      fordert davon konkret das Verzeichnis von Verarbeitungstätigkeiten
      (RoPA) mit allen Pflichtfeldern.
    audit_evidence_hint: 'PIMS-Records (A.7.3.4) als Basis für DSGVO-RoPA mit allen Pflichtfeldern.'

  - source: '27701-A.7.5.1'
    target: 'GDPR-33'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27701 Klausel A.7.5.1 "Notification of PII breach" verlangt die
      Identifikation gesetzlicher Meldepflichten und deren operative
      Umsetzung im PIMS. DSGVO Art. 33 fordert davon konkret die
      72-Stunden-Meldung an die Aufsichtsbehörde bei Datenschutzverletzung.
    audit_evidence_hint: 'PIMS-Breach-Notification-Prozess (A.7.5.1) mit 72-h-SLA-Tracking nach Art. 33.'

  - source: '27701-B.8.4.2'
    target: 'GDPR-34'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27701 Klausel B.8.4.2 "Notification of PII breach to customer"
      verlangt das Verfahren zur Information betroffener Personen bei
      Datenschutzverletzungen mit hohem Risiko. DSGVO Art. 34 fordert davon
      konkret die unverzügliche Benachrichtigung der Betroffenen.

  - source: '27701-6.1.2'
    target: 'GDPR-35'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27701 Klausel 6.1.2 "PII protection impact assessment" verlangt
      strukturierte PIA-Durchführung für risikoreiche PII-Verarbeitungen
      inkl. Risiko- und Maßnahmenbewertung. DSGVO Art. 35 fordert davon
      konkret die Datenschutz-Folgenabschätzung (DSFA/DPIA) für
      voraussichtlich hohes Risiko mit definierten Inhalten.
    audit_evidence_hint: 'PIMS-PIA-Register (6.1.2) als DPIA-Nachweis nach Art. 35 für jede Hochrisiko-Verarbeitung.'

  - source: '27701-5.3'
    target: 'GDPR-37'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27701 Klausel 5.3 "Determining the scope of the PIMS" enthält
      die Rollendefinition inkl. PII-Schutzbeauftragter. DSGVO Art. 37-39
      fordert davon konkret die Benennung, Stellung und Aufgaben des
      Datenschutzbeauftragten (DSB).

  - source: '27701-8.4'
    target: 'GDPR-44'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27701 Klausel 8.4 "Third country and international transfers"
      verlangt die dokumentierte Rechtsgrundlage und Schutzmaßnahmen für
      grenzüberschreitende PII-Transfers. DSGVO Art. 44-49 fordert davon
      konkret zulässige Drittlandübermittlungen via SCC, BCR,
      Angemessenheitsbeschluss etc.
    audit_evidence_hint: 'PIMS-Transfer-Register (8.4), SCC-Verträge, TIA-Dokumente, Drittland-Risikoanalyse.'
