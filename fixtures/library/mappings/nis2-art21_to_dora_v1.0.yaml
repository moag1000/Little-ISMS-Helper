schema_version: '1.1'
library:
  type: mapping
  id: 'nis2-art21_to_dora_v1.0'
  source_framework: 'NIS2'
  target_framework: 'DORA'
  version: 1
  effective_from: '2025-01-17'
  effective_until: null

  provenance:
    primary_source: 'EBA Final Report on RTS to DORA Art. 15 + 18 (2024-Q1) + ENISA NIS2 Implementation Guidance 2024-09 — Cross-Reference'
    primary_source_url: 'https://www.eba.europa.eu/regulation-and-policy/single-rulebook/dora-regulation'
    secondary_sources:
      - 'ENISA Implementation Guidance NIS2 Technical and Methodological Requirements 2024-09'
      - 'ESA Joint Committee Final Report on RTS for DORA Art. 28 (Sub-contracting + Register of Information) 2024-07'
      - 'BaFin DORA-Rundschreiben + MaRisk AT 7.2 Cross-Reference 2024-11'
      - 'BSI Mindestanforderungen NIS2-UmsuCG (Konsultationsentwurf 2024-12)'
      - 'Eigene Volltext-Analyse durch Compliance-Team (Finanzsektor-Fokus)'
    publisher: 'Little ISMS Helper Maintainers'

  methodology:
    type: 'text_comparison_with_expert_review'
    description: |
      Wichtiger Rechtsstatus-Hinweis: DORA (Verordnung 2022/2554) ist EU-Verordnung
      und seit 17.01.2025 unmittelbar anwendbar. NIS2 (Richtlinie 2022/2555) ist
      Richtlinie und benötigt nationale Umsetzung; in Deutschland ist das NIS2-UmsuCG
      bei Erstellung dieses Mappings noch im parlamentarischen Verfahren. Für
      Finanzunternehmen im DORA-Anwendungsbereich gilt DORA als lex specialis
      (Art. 1(2) DORA + ErwG. 16 NIS2): Wer DORA vollständig erfüllt, gilt für
      die in DORA geregelten Bereiche auch als NIS2-konform.

      Methodik je NIS2-Unterpunkt 21(2)(a)-(j):
      1. Volltext-Lesung NIS2 Art. 21(2) gegen DORA Kapitel II-V + RTS
      2. Schnittmenge identifizieren (welche DORA-Norm konkretisiert NIS2-Punkt?)
      3. Relationship: meist 'subset' weil DORA quantitative Schwellwerte und
         Meldefristen explizit vorgibt, NIS2 nur qualitativ formuliert
      4. Confidence (high/medium/low) mit Begründung aus Finanzsektor-Sicht
      5. Gap-Warning bei subset/partial_overlap mit konkretem Hinweis,
         was bei reiner DORA-Erfüllung NIS2-seitig offen bleibt
      6. 4-Augen-Review durch zweiten Compliance-Manager mit Finanzsektor-Erfahrung

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2025-02-10', actor: 'maintainer' }
      - { state: 'review',    date: '2025-03-15', actor: 'maintainer' }
      - { state: 'approved',  date: '2025-04-08', actor: 'reviewer-2' }
      - { state: 'published', date: '2025-04-22', actor: 'ciso-signoff' }

mappings:
  - source: '21.2.a'
    target: 'DORA.Art.5-6'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      NIS2 Art. 21(2)(a) verlangt allgemein "Konzepte für Risikoanalyse und
      Sicherheit der Informationssysteme". DORA Art. 5 (Governance + interne
      Kontrolle) und Art. 6 (ICT-Risk-Management-Framework) konkretisieren
      dies für Finanzunternehmen mit Pflicht zu dokumentiertem ICT-Risk-Framework,
      jährlicher Board-Genehmigung und expliziter Verantwortlichkeit des
      Leitungsorgans. DORA geht damit deutlich über die NIS2-Anforderung hinaus.
    gap_warning: |
      DORA fordert Board-Approval und jährliche Review-Zyklen explizit (Art. 5(2));
      NIS2 fordert dies nur implizit über "Verantwortlichkeit der Leitungsorgane"
      (Art. 20). Wer NUR DORA Art. 5-6 nachweist, hat NIS2 21(2)(a) komplett
      abgedeckt — kein Gap aus NIS2-Sicht.
    audit_evidence_hint: 'ICT-Risk-Management-Framework-Dokument mit Board-Approval-Protokoll der letzten 12 Monate, Risikoinventar, jährlicher Review-Bericht.'

  - source: '21.2.b'
    target: 'DORA.Art.17-19'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      NIS2 Art. 21(2)(b) verlangt "Bewältigung von Sicherheitsvorfällen". DORA
      Art. 17 (ICT-Incident-Management-Prozess), Art. 18 (Klassifizierung +
      Schwellwerte) und Art. 19 (Meldepflicht) konkretisieren dies mit
      verbindlichen Klassifizierungskriterien (RTS 2024/1772) und Meldefristen
      (Initial 4h ab Klassifizierung, Intermediate 72h, Final 1 Monat).
      DORA-Schwellwerte sind quantitativ und bindend; NIS2 lässt nationalen
      CSIRTs Spielraum.
    gap_warning: |
      DORA-Meldefristen (4h/72h/1M) sind strenger als NIS2-Frühwarnung 24h.
      Wer DORA Art. 19 erfüllt, erfüllt auch NIS2 Art. 23 — aber nur, wenn
      die Meldung an BEIDE zuständigen Behörden geht (BaFin für DORA,
      BSI/CSIRT für NIS2). Single-Reporting reicht NICHT.
    audit_evidence_hint: 'Incident-Klassifizierungs-Matrix nach RTS, Meldeprotokolle der letzten 12 Monate mit Zeitstempeln, Belege für parallele BaFin- + BSI-Meldung.'

  - source: '21.2.c'
    target: 'DORA.Art.11-12'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      NIS2 Art. 21(2)(c) verlangt "Aufrechterhaltung des Betriebs" (BC + DR).
      DORA Art. 11 (ICT-Business-Continuity-Policy) und Art. 12 (Backup +
      Restoration) gehen darüber hinaus mit Pflicht zu jährlichen Tests,
      RTO/RPO-Definition, Severe-Scenario-Testing und expliziter Trennung
      zwischen Backup- und Produktionssystemen.
    gap_warning: |
      DORA Art. 11(6) fordert Krisenkommunikationsplan inklusive externer
      Stakeholder; NIS2 21(2)(c) ist hier weniger explizit. Wer DORA Art. 11-12
      vollständig erfüllt, deckt NIS2 21(2)(c) komplett ab. Achtung: NIS2 erwartet
      zusätzlich Behörden-Meldewege an BSI — diese sind in DORA-BC-Plänen oft
      nicht explizit dokumentiert.
    audit_evidence_hint: 'BC-Policy mit Board-Approval, jährliche BC-Test-Berichte, Severe-Scenario-Test-Report, RTO/RPO-Tabelle pro kritischer ICT-Funktion, Restore-Test-Logs.'

  - source: '21.2.d'
    target: 'DORA.Art.28-30'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      NIS2 Art. 21(2)(d) "Sicherheit der Lieferkette" wird durch DORA Kapitel V
      (Art. 28-30) deutlich detaillierter geregelt: Art. 28 (TPP-Risk-Management
      Framework + Register of Information), Art. 29 (Pre-Contractual Assessment),
      Art. 30 (verpflichtende Vertragsklauseln inkl. Audit-Rights, Exit-Strategien,
      SLA-Definition). RTS 2024/1773 spezifiziert Subcontracting-Anforderungen.
      DORA ist hier weltweit der detaillierteste Standard.
    gap_warning: |
      DORA-Register of Information (Art. 28(3)) muss alle ICT-TPPs erfassen,
      nicht nur kritische — NIS2 fordert dies nicht. Wer DORA Art. 28-30 erfüllt,
      übererfüllt NIS2 21(2)(d). KEIN Gap.
    audit_evidence_hint: 'Register of Information (RoI) im aktuellen ESA-Format, TPP-Vertragstexte mit Art.-30-Klauseln, Pre-Contractual-Assessment-Reports, Exit-Strategien für kritische TPPs.'

  - source: '21.2.e'
    target: 'DORA.Art.8-9'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      NIS2 Art. 21(2)(e) "Sicherheit beim Erwerb, Entwicklung und Wartung von
      Netz- und Informationssystemen" entspricht DORA Art. 8 (Identification +
      Asset-Inventory inkl. Klassifizierung kritischer Funktionen) und Art. 9
      (Protection + Prevention inkl. Secure-Development-Lifecycle, Change-Mgmt,
      Patch-Management). DORA geht über NIS2 hinaus durch Pflicht zur
      Klassifizierung "kritischer oder wichtiger Funktionen".
    gap_warning: |
      DORA Art. 8(4) fordert mindestens jährliches Asset-Re-Assessment plus
      bei wesentlichen Änderungen — NIS2 lässt Frequenz offen. Wer DORA Art. 8-9
      erfüllt, deckt NIS2 21(2)(e) komplett ab.
    audit_evidence_hint: 'Asset-Inventar mit Klassifizierung "critical or important function", SDLC-Dokumentation, Change-Mgmt-Tickets der letzten 12 Monate, Patch-Compliance-Dashboards.'

  - source: '21.2.f'
    target: 'DORA.Art.13'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      NIS2 Art. 21(2)(f) "Konzepte und Verfahren zur Bewertung der Wirksamkeit
      von Risikomanagementmaßnahmen" entspricht DORA Art. 13 "Learning and Evolving"
      mit Pflicht zu Post-Incident-Reviews, ICT-Risk-Awareness-Programmen und
      Threat-Intelligence-Integration. DORA ist hier prozessorientierter,
      NIS2 fokussiert Wirksamkeitsbewertung breiter.
    gap_warning: |
      DORA Art. 13 deckt Wirksamkeitsbewertung über Lessons-Learned-Loop ab,
      aber NIS2 21(2)(f) erwartet auch quantitative KPIs/Metriken zur
      Maßnahmen-Wirksamkeit. Empfehlung: DORA Art. 13 + ergänzende KPI-Dashboards
      (z.B. Mean-Time-to-Detect, Patch-Compliance-Rate).
    audit_evidence_hint: 'Post-Incident-Review-Berichte, Threat-Intel-Subscriptions (FS-ISAC, BaFin-CERT), Lessons-Learned-Tracking, KPI-Dashboards für ICT-Risk-Wirksamkeit.'

  - source: '21.2.g'
    target: 'DORA.Art.13'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      NIS2 Art. 21(2)(g) "grundlegende Cyberhygiene + Cybersecurity-Schulung
      für alle Beschäftigten" wird in DORA durch Art. 13(6) konkretisiert
      (verpflichtende ICT-Security-Awareness-Programme + Schulung des
      Leitungsorgans nach Art. 5(4)). RTS-Annex spezifiziert Mindestthemen
      (Phishing, Social-Engineering, sichere Passworthandhabung).
    gap_warning: |
      DORA Art. 5(4) fordert spezifische Board-Schulung — NIS2 Art. 20 ebenfalls
      ("Mitglieder der Leitungsorgane müssen Schulungen absolvieren"). Beide
      decken sich hier; KEIN Gap bei DORA-Vollerfüllung.
    cross_refs: ['DORA.Art.5.4']
    audit_evidence_hint: 'Schulungs-Curriculum mit Mindestthemen, Phishing-Simulationen mit Klickraten, Schulungsquote pro Mitarbeiter, separate Board-Schulungsbelege.'

  - source: '21.2.h'
    target: 'DORA.Art.9.3'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      NIS2 Art. 21(2)(h) "Konzepte und Verfahren für den Einsatz von Kryptografie
      und gegebenenfalls Verschlüsselung" entspricht DORA Art. 9(3) "policies,
      procedures, protocols and tools for cryptography and encryption" mit
      Pflicht zu dokumentierter Krypto-Policy, Schlüsselmanagement und
      Algorithmen-Standards. RTS DORA Art. 15 spezifiziert weiter.
    gap_warning: |
      DORA Art. 9(3) fordert explizit Key-Management-Lifecycle — NIS2 lässt
      dies offen. Wer DORA Art. 9(3) + zugehörigen RTS-Anforderungen erfüllt,
      übererfüllt NIS2 21(2)(h).
    audit_evidence_hint: 'Krypto-Policy mit Algorithmus-Whitelist, Key-Management-Verfahren (Generation/Storage/Rotation/Revocation), HSM-Inventar, Krypto-Audit-Reports.'

  - source: '21.2.i'
    target: 'DORA.Art.9'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      NIS2 Art. 21(2)(i) "Sicherheit des Personals, Konzepte für Zugriffskontrolle
      und Management von Anlagen" wird durch DORA Art. 9 (Protection + Prevention)
      mit Schwerpunkt Zugriffsmanagement (Need-to-know, Least-Privilege),
      physische Sicherheit kritischer ICT-Assets und Personalsicherheit
      adressiert. DORA ist hier weniger explizit zu Personalsicherheit als NIS2.
    gap_warning: |
      DORA Art. 9 deckt physische + logische Zugriffskontrolle ab, aber HR-Aspekte
      (Background-Checks, NDA, Onboarding/Offboarding) sind NICHT explizit in
      DORA — diese müssen über MaRisk AT 7.1 oder ergänzende Personalrichtlinien
      nachgewiesen werden. NIS2 21(2)(i) erwartet diese Aspekte explizit.
    audit_evidence_hint: 'IAM-Policy mit Least-Privilege-Nachweis, Zugriffsreviews der letzten 12 Monate, Onboarding/Offboarding-Checklisten, Background-Check-Verfahren, physische Zutrittsprotokolle Rechenzentrum.'

  - source: '21.2.j'
    target: 'DORA.Art.9'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      NIS2 Art. 21(2)(j) "Multi-Faktor-Authentifizierung oder kontinuierliche
      Authentifizierung, gesicherte Sprach-, Video- und Textkommunikation und
      gesicherte Notfallkommunikation" wird durch DORA Art. 9(4)(d) (strong
      authentication) und RTS zu IDS/Identitäts-Management konkretisiert.
      DORA fordert MFA für alle privilegierten Zugriffe explizit.
    gap_warning: |
      DORA fordert MFA primär für privilegierte Konten (RTS Art. 21); NIS2
      21(2)(j) erwartet MFA breiter ("wo angemessen"). Notfall-Kommunikation
      ist in DORA Art. 11(6) (BC-Communication) abgedeckt, aber nur indirekt.
      Wer DORA Art. 9 + Art. 11(6) erfüllt, deckt NIS2 21(2)(j) ab — Achtung
      auf Out-of-Band-Notfallkanäle.
    cross_refs: ['DORA.Art.11.6']
    audit_evidence_hint: 'MFA-Coverage-Report (privilegierte vs. Standard-Accounts), Notfall-Kommunikationsplan mit Out-of-Band-Kanälen, Test-Protokolle der Notfall-Kommunikation.'
