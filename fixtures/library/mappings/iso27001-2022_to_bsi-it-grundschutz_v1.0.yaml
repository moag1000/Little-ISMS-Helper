schema_version: '1.1'
library:
  type: mapping
  id: 'iso27001-2022_to_bsi-it-grundschutz_v1.0'
  source_framework: 'ISO27001'
  target_framework: 'BSI-Grundschutz'
  version: 1
  effective_from: '2024-02-01'
  effective_until: null

  provenance:
    primary_source: 'BSI IT-Grundschutz-Kompendium 2024 — Kreuzreferenztabelle ISO/IEC 27001'
    primary_source_url: 'https://www.bsi.bund.de/DE/Themen/Unternehmen-und-Organisationen/Standards-und-Zertifizierung/IT-Grundschutz/IT-Grundschutz-Kompendium/it-grundschutz-kompendium_node.html'
    secondary_sources:
      - 'BSI-Standard 200-2 (IT-Grundschutz-Methodik) — ISO 27001-Verweise'
      - 'BSI Migrationsleitfaden ISO 27001:2022 → IT-Grundschutz Edition 2024'
      - 'Eigene Volltext-Vergleichsanalyse durch Compliance-Team Q1/2026'
    publisher: 'Little ISMS Helper Maintainers'

  methodology:
    type: 'published_official_mapping'
    description: |
      BSI veröffentlicht im IT-Grundschutz-Kompendium für jeden Baustein
      eine Kreuzreferenztabelle zu ISO/IEC 27001 Annex A. Vorgehen:
      1. Übernahme der offiziellen Baustein-↔-Annex-A-Referenzen aus
         dem Kompendium 2024
      2. Re-Mapping auf ISO 27001:2022 Annex A (93 Controls statt 114)
         via BSI-Migrationsleitfaden
      3. Confidence-Bewertung: high = direkte Baustein-Entsprechung,
         medium = Teilbaustein oder Schnittmenge, low = nur lose verwandt
      4. Relationship-Klassifikation (equivalent/subset/superset/related)
         auf Basis Volltext-Vergleich Baustein-Anforderungen ↔ Annex-A-Wortlaut
      5. 4-Augen-Review durch zweiten Compliance-Manager
      Hinweis: IT-Grundschutz-Bausteine bündeln typischerweise mehrere
      Annex-A-Controls; deshalb sind „subset"- und „superset"-Beziehungen
      häufiger als 1:1-Equivalenz.

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2026-02-15', actor: 'maintainer' }
      - { state: 'review',    date: '2026-03-12', actor: 'maintainer' }
      - { state: 'approved',  date: '2026-04-05', actor: 'reviewer-2' }
      - { state: 'published', date: '2026-04-22', actor: 'ciso-signoff' }

mappings:
  - source: 'A.5.1'
    target: 'ISMS.1'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.5.1 „Policies for information security" verlangt
      die Sicherheitsleitlinie. BSI-Baustein ISMS.1 „Sicherheitsmanagement"
      ist deutlich breiter — er umfasst zusätzlich Organisation des
      Sicherheitsprozesses, Ressourcen, Sicherheitskonzept und ISMS-
      Steuerung. A.5.1 ist Teilmenge der ISMS.1-Anforderungen.
    gap_warning: |
      Wer ISMS.1 NUR über A.5.1 nachweist, fehlen ISO 27001 Clauses 4-10
      (Kontext, Leadership, Planung, Betrieb, Bewertung, Verbesserung).
      Empfehlung: A.5.1 + ISO 27001 Klauseln 4-10 vollständig bündeln.
    cross_refs: ['A.6.1', 'A.5.2']
    audit_evidence_hint: 'Sicherheitsleitlinie + Sicherheitskonzept + ISMS-Verfahrensanweisung mit Management-Freigabe.'

  - source: 'A.5.9'
    target: 'ISMS.2.1'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      A.5.9 „Inventory of information and other associated assets"
      verlangt ein Asset-Inventar mit Eigentümerschaft. BSI-Baustein
      ISMS.2.1 „Strukturanalyse" ist breiter — verlangt Strukturanalyse,
      Schutzbedarfsfeststellung und Modellierung. CON.6 „Löschen und
      Vernichten" ergänzt den Lifecycle-Aspekt.
    gap_warning: |
      Wer ISMS.2.1 NUR über A.5.9 nachweist, fehlen Schutzbedarfs-
      feststellung und Modellierung. Empfehlung: A.5.9 + A.5.12
      (Klassifikation) bündeln und zusätzlich die Strukturanalyse-
      Methodik nach BSI-Standard 200-2 anwenden.
    cross_refs: ['CON.6', 'A.5.12']
    audit_evidence_hint: 'Asset-Inventar mit Owner, Strukturanalyse-Dokument, Schutzbedarfsfeststellung pro Geschäftsprozess.'

  - source: 'A.5.24'
    target: 'DER.2.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      A.5.24 „Information security incident management planning and
      preparation" verlangt einen Incident-Response-Plan inkl.
      Vorbereitung. BSI-Baustein DER.2.1 „Behandlung von
      Sicherheitsvorfällen" verlangt identisches: Richtlinie,
      Verantwortlichkeiten, Prozess, Dokumentation. BSI-Kompendium-
      Kreuzreferenz bestätigt direkte Entsprechung.
    cross_refs: ['DER.2.2', 'DER.2.3']
    audit_evidence_hint: 'Incident-Response-Richtlinie, IR-Prozessbeschreibung, Eskalationsmatrix, Übungs-Reports der letzten 12 Monate.'

  - source: 'A.5.29'
    target: 'DER.4'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      A.5.29 „Information security during disruption" verlangt
      Aufrechterhaltung der Sicherheit während Disruptionen.
      BSI-Baustein DER.4 „Notfallmanagement" deckt das im
      Detail ab — Notfallvorsorge, -übungen und -bewältigung. BSI-
      Kompendium führt DER.4 als direkte Entsprechung zu A.5.29
      und ISO 22301-Bezügen.
    cross_refs: ['A.5.30']
    audit_evidence_hint: 'Notfallhandbuch, Notfallübungs-Plan und -Reports, Wiederanlaufpläne kritischer Prozesse.'

  - source: 'A.5.20'
    target: 'OPS.2.3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      A.5.20 „Addressing information security in supplier agreements"
      und A.5.21 „Managing information security in the ICT supply chain"
      decken Lieferanten-InfoSec-Verträge ab. BSI-Baustein OPS.2.3
      „Nutzung von Outsourcing" verlangt vertragliche InfoSec-Pflichten,
      Prüfungsrechte und Sub-Dienstleister-Steuerung. Kompendium-
      Kreuzreferenz bestätigt Entsprechung.
    cross_refs: ['A.5.21', 'A.5.22']
    audit_evidence_hint: 'Lieferantenverträge mit InfoSec-Anhang, Auditrechte, Sub-Dienstleister-Liste, Risikobewertung pro Provider.'

  - source: 'A.6.3'
    target: 'ORP.3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      A.6.3 „Information security awareness, education and training"
      verlangt regelmäßige Sensibilisierung und Schulung. BSI-Baustein
      ORP.3 „Sensibilisierung und Schulung" verlangt identische Inhalte
      mit konkretem Mindest-Curriculum. Kompendium-Kreuzreferenz
      bestätigt 1:1-Mapping.
    audit_evidence_hint: 'Schulungs-Konzept, Schulungs-Quote (Soll: 100 %), Phishing-Drill-Ergebnisse, rollenbasierte Curricula.'

  - source: 'A.8.1'
    target: 'SYS.2'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      A.8.1 „User Endpoint Devices" adressiert Schutz von Endgeräten
      (Hardening, MDM, Disk-Encryption). BSI-Baustein-Familie SYS.2
      (SYS.2.1 „Allgemeiner Client", SYS.2.2.3 „Clients unter Windows",
      SYS.2.3 „Clients unter Linux", SYS.2.4 „macOS") deckt das
      breiter und plattformspezifisch ab. A.8.1 ist Teilmenge der
      SYS.2-Anforderungen, da die Bausteine deutlich detailliertere
      Härtungs-Vorgaben enthalten.
    gap_warning: |
      Wer SYS.2 NUR über A.8.1 nachweist, fehlen plattformspezifische
      Härtungsmaßnahmen (z. B. SYS.2.2.3.M21 BitLocker für Windows-
      Clients). Empfehlung: A.8.1 + plattformspezifischer SYS.2-Baustein
      gemäß BSI 200-2 Modellierung.
    cross_refs: ['SYS.2.1', 'A.5.16']
    audit_evidence_hint: 'Härtungs-Baseline pro Plattform, MDM-Compliance-Report, Disk-Encryption-Stichproben, SYS.2-Baustein-Umsetzungs-Nachweis.'

  - source: 'A.8.5'
    target: 'ORP.4'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      A.8.5 „Secure authentication" verlangt sichere Authentisierungs-
      verfahren inkl. MFA. BSI-Baustein ORP.4 „Identitäts- und
      Berechtigungsmanagement" ist breiter — verlangt vollständigen
      Identity-Lifecycle, Rollenkonzept, Berechtigungsvergabe und
      Authentisierungs-Verfahren. Kompendium führt ORP.4 als Bündel-
      Entsprechung zu A.5.15-A.5.18 und A.8.2-A.8.5.
    gap_warning: |
      Wer ORP.4 NUR über A.8.5 nachweist, fehlen Rollenkonzept und
      Berechtigungs-Lifecycle. Empfehlung: Bündel A.5.15-A.5.18 +
      A.8.2 + A.8.5 für vollständige ORP.4-Abdeckung.
    cross_refs: ['A.5.15', 'A.5.16', 'A.5.17', 'A.5.18']
    audit_evidence_hint: 'Rollenkonzept, Berechtigungsvergabe-Workflow, MFA-Coverage-Report, Joiner/Mover/Leaver-Stichproben.'

  - source: 'A.8.7'
    target: 'OPS.1.1.4'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      A.8.7 „Protection against malware" verlangt Schutzmaßnahmen
      gegen Schadprogramme. BSI-Baustein OPS.1.1.4 „Schutz vor
      Schadprogrammen" verlangt identisches Konzept inkl. AV/EDR-
      Einsatz, Update-Strategie und Sensibilisierung. Kompendium-
      Kreuzreferenz bestätigt direkte Entsprechung.
    audit_evidence_hint: 'AV/EDR-Coverage-Report (Soll: 100 %), Signatur-Update-Frequenz, Quarantäne-Statistik, Awareness-Modul Schadprogramme.'

  - source: 'A.8.8'
    target: 'OPS.1.1.3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      A.8.8 „Management of technical vulnerabilities" verlangt
      Schwachstellen-Identifikation und Patch-Management. BSI-Baustein
      OPS.1.1.3 „Patch- und Änderungsmanagement" deckt Schwachstellen-
      Tracking, Patch-Bereitstellung und Notfall-Patching vollständig ab.
      Kompendium führt OPS.1.1.3 als direkte Entsprechung.
    cross_refs: ['DER.1']
    audit_evidence_hint: 'Vulnerability-Scan-Reports, Patch-Compliance-Dashboard mit SLA-Erfüllung, Notfall-Patch-Protokolle.'

  - source: 'A.8.16'
    target: 'DER.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      A.8.16 „Monitoring activities" verlangt kontinuierliches Monitoring
      auf Anomalien. BSI-Baustein DER.1 „Detektion von
      sicherheitsrelevanten Ereignissen" verlangt identisches —
      Logging-Konzept, SIEM, Alerting-Prozess. Kompendium bestätigt
      Entsprechung; Schnittmenge bei SIEM-Use-Cases ist vollständig.
    cross_refs: ['OPS.1.1.5']
    audit_evidence_hint: 'SIEM-Use-Case-Katalog, Alert-MTTR-Statistik, Logging-Konzept, 24/7-SOC-Coverage-Nachweis (falls vorhanden).'

  - source: 'A.8.24'
    target: 'CON.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      A.8.24 „Use of cryptography" verlangt eine Krypto-Richtlinie und
      Key-Management. BSI-Baustein CON.1 „Kryptokonzept" verlangt
      identische Inhalte und referenziert BSI TR-02102 als
      Algorithmen-Baseline. Kompendium-Kreuzreferenz bestätigt direkte
      Entsprechung.
    audit_evidence_hint: 'Kryptokonzept, Algorithmen-Allowlist (BSI TR-02102 konform), Key-Management-Verfahren, HSM-Konfiguration falls einschlägig.'

  - source: 'A.7.2'
    target: 'INF.1'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      A.7.2 „Physical entry" verlangt Zutrittskontrolle zu
      sicherheitsrelevanten Bereichen. BSI-Baustein INF.1
      „Allgemeines Gebäude" ist breiter — verlangt zusätzlich
      Brandschutz, Stromversorgung, Klimatisierung und bauliche
      Maßnahmen. A.7.2 ist Teilmenge der INF.1-Anforderungen.
    gap_warning: |
      Wer INF.1 NUR über A.7.2 nachweist, fehlen Brandschutz, USV
      und Klima. Empfehlung: Bündel A.7.2 + A.7.5 (Schutz vor
      Umgebungseinflüssen) + A.7.11 (Versorgungsleitungen) für
      vollständige INF.1-Abdeckung.
    cross_refs: ['INF.2', 'A.7.5', 'A.7.11']
    audit_evidence_hint: 'Zutrittskontroll-Konzept, Brandschutz-Dokumentation, USV-Tests, Klima-Monitoring-Reports.'

  - source: 'A.5.7'
    target: 'DER.1'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      A.5.7 „Threat Intelligence" verlangt Sammeln und Auswerten von
      Bedrohungsinformationen. BSI-Baustein DER.1 „Detektion" deckt
      das partiell ab (Auswertung externer Threat-Feeds zur SIEM-
      Korrelation), fokussiert aber auf Detektion, nicht auf strategisches
      Threat-Intel-Sharing. Schnittmenge ist signifikant, aber nicht
      vollständig.
    gap_warning: |
      Wer A.5.7 NUR über DER.1 nachweist, fehlen strategische Threat-
      Intel-Auswertung und Sharing-Mechanismen (CERT-Bund, Allianz für
      Cybersicherheit). Empfehlung: zusätzlich CERT-Bund-Mitgliedschaft
      und ISAC-Teilnahme dokumentieren.
    audit_evidence_hint: 'Threat-Intel-Quellen-Liste, CERT-Bund-Meldungen, Sharing-Protokolle der letzten 12 Monate, SIEM-Korrelations-Use-Cases.'

  - source: 'A.5.30'
    target: 'DER.4'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      A.5.30 „ICT readiness for business continuity" deckt den ICT-Anteil
      der Geschäftsfortführung ab. BSI-Baustein DER.4 „Notfallmanagement"
      ist breiter — verlangt Notfallvorsorgekonzept, Krisenstab,
      Wiederanlaufpläne und Notfallübungen. ICT-Readiness ist Teilmenge.
    gap_warning: |
      Wer DER.4 NUR über A.5.30 nachweist, fehlen Krisenstab-Strukturen,
      organisatorische Notfallvorsorge und nicht-ICT-Wiederanlaufpläne.
      Empfehlung: A.5.30 + ISO 22301 (Krisenmanagement) bündeln.
    cross_refs: ['A.5.29']
    audit_evidence_hint: 'BIA, Notfallhandbuch, Krisenstab-Geschäftsordnung, Notfallübungs-Reports der letzten 24 Monate.'
