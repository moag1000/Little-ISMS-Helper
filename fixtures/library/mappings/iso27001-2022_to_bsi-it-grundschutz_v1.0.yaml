schema_version: '1.1'
library:
  type: mapping
  id: 'iso27001-2022_to_bsi-it-grundschutz_v1.0'
  source_framework: 'ISO27001'
  target_framework: 'BSI-Grundschutz'
  version: 1
  effective_from: '2024-09-01'
  effective_until: null

  provenance:
    primary_source: 'BSI IT-Grundschutz-Kompendium 2024 — Kreuzreferenztabelle ISO/IEC 27001 (Forward-Richtung)'
    primary_source_url: 'https://www.bsi.bund.de/DE/Themen/Unternehmen-und-Organisationen/Standards-und-Zertifizierung/IT-Grundschutz/IT-Grundschutz-Kompendium/it-grundschutz-kompendium_node.html'
    secondary_sources:
      - 'BSI IT-Grundschutz-Profil ISO 27001:2022 — Kreuzreferenztabelle Annex A'
      - 'BSI-Standard 200-2 §8 Modellierung — Bausteinabdeckung'
    publisher: 'Little ISMS Helper Maintainers'

  methodology:
    type: 'published_official_mapping'
    description: |
      Forward-Mapping ISO 27001:2022 Annex A → BSI IT-Grundschutz-Bausteine
      auf Grundlage der BSI-Kreuzreferenztabelle:
      1. Identifikation der ISO-Annex-A-Kontrolle als Ankerpunkt
      2. Identifikation des primären Grundschutz-Bausteins (Schwerpunkt:
         ISMS.1, ORP, OPS, CON, DER, INF, NET — gemäß Modellierungslogik)
      3. Relationship-Bestimmung: meist "subset" (ISO ⊆ Baustein bündelt mehr),
         bei identischem Anforderungs-Niveau "equivalent"
      4. Confidence-Einstufung gemäß Übereinstimmungsgrad und BSI-Crosswalk
      5. Rationale aus ISO-Sicht (Welcher Baustein deckt die Annex-A-Kontrolle ab?)
      6. Audit-Evidence-Hinweise mit konkreten Bausteinanforderungs-Codes
         (z. B. ORP.4.A1) und ISO-Annex-A-Referenz
      7. 4-Augen-Review durch zweiten BSI-Spezialisten
      Hinweis: Reziprok zum Reverse-Mapping
      bsi-it-grundschutz_to_iso27001-2022_v1.0 — gleiche Pair-Liste,
      invertierte Relationships, identische Provenance/Confidence.

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2024-09-15', actor: 'maintainer' }
      - { state: 'review',    date: '2024-10-30', actor: 'maintainer' }
      - { state: 'approved',  date: '2024-11-22', actor: 'reviewer-2' }
      - { state: 'published', date: '2024-12-01', actor: 'ciso-signoff' }

mappings:
  - source: 'A.5.1'
    target: 'ISMS.1'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.5.1 'Policies for information security' verlangt eine
      InfoSec-Leitlinie mit Top-Management-Freigabe. IT-Grundschutz-Baustein
      ISMS.1 'Sicherheitsmanagement' bündelt diesen Leitlinien-Anker mit
      Sicherheitsorganisation, Ressourcen-Bereitstellung, Sicherheitskonzept
      und ISMS-Steuerung. A.5.1 ist damit Teilmenge der ISMS.1-Anforderungen.
    gap_warning: |
      ISMS.1 verlangt zusätzlich Sicherheitsorganisation (ISMS.1.A2),
      Sicherheitskonzept (ISMS.1.A6) und Management-Reviews. A.5.1 fokussiert
      rein auf den Leitlinien-Aspekt.
    audit_evidence_hint: 'A.5.1: InfoSec-Policy mit Geltungsbereich, Management-Freigabe. ISMS.1.A1 Übernahme der Gesamtverantwortung, ISMS.1.A6 Sicherheitskonzept.'

  - source: 'A.5.2'
    target: 'ORP.1'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.5.2 'Information security roles and responsibilities'
      verlangt definierte InfoSec-Rollen. IT-Grundschutz-Baustein ORP.1
      'Organisation' bündelt die Rollenfestlegung mit Funktionstrennung,
      Vertretungsregelungen und organisatorischer Verankerung — A.5.2 ist
      Teilmenge des breiteren ORP.1-Bausteins.
    cross_refs: ['ISMS.1']
    audit_evidence_hint: 'A.5.2: Stellenbeschreibungen mit InfoSec-Rollen. ORP.1.A2 RACI-Matrix, Funktionstrennungs-Konzept.'

  - source: 'A.5.7'
    target: 'DER.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.5.7 'Threat Intelligence' verlangt das Sammeln,
      Analysieren und Verteilen von Bedrohungsinformationen. IT-Grundschutz-
      Baustein DER.1 'Detektion von sicherheitsrelevanten Ereignissen' deckt
      mit A.5.7 den gleichen Funktionsumfang auf gleichem Detail-Niveau ab.
    cross_refs: ['A.8.16']
    audit_evidence_hint: 'A.5.7: Threat-Intel-Quellen-Liste (CERT-Bund, BSI-CERT). DER.1.A4 SIEM-Korrelationsregeln, Sharing-Protokolle.'

  - source: 'A.5.19'
    target: 'OPS.2.1'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.5.19 'Information security in supplier relationships'
      verlangt Lieferanten-Sicherheits-Anforderungen. IT-Grundschutz-Baustein
      OPS.2.1 'Outsourcing für Kunden' bündelt zusätzlich Steuerung,
      Monitoring und Beendigung der Outsourcing-Beziehung — A.5.19 ist damit
      Teilmenge des breiteren Bausteins.
    cross_refs: ['OPS.2.3', 'A.5.20', 'A.5.22']
    audit_evidence_hint: 'A.5.19: Supplier-Risk-Tier-Liste, Vertragsklauseln. OPS.2.1.A1 Outsourcing-Steuerungs-Konzept, Audit-Reports.'

  - source: 'A.5.23'
    target: 'OPS.2.2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.5.23 'Information security for use of cloud services'
      verlangt Cloud-Strategie, Anbieter-Auswahl, Vertragsgestaltung und
      Exit-Strategie. IT-Grundschutz-Baustein OPS.2.2 'Cloud-Nutzung' deckt
      diese Anforderungen auf gleichem Detail-Niveau ab — die Entsprechung
      ist 1:1.
    audit_evidence_hint: 'A.5.23: Cloud-Strategie, Provider-Bewertung. OPS.2.2.A1 Cloud-Nutzungs-Konzept, Exit-Strategie pro Cloud-Service.'

  - source: 'A.5.24'
    target: 'DER.2.1'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.5.24 'Incident management planning and preparation'
      verlangt Incident-Response-Plan und Vorbereitung. IT-Grundschutz-
      Baustein DER.2.1 'Behandlung von Sicherheitsvorfällen' bündelt
      A.5.24/25/26/27 — Planung, Bewertung, Reaktion und Lessons-Learned.
      A.5.24 ist Teilmenge des umfassenderen Bausteins.
    cross_refs: ['A.5.25', 'A.5.26', 'A.5.27', 'A.6.8']
    audit_evidence_hint: 'A.5.24: Incident-Response-Plan, IR-Übungs-Kalender. DER.2.1.A1 Definition Sicherheitsvorfall, IR-Reports.'

  - source: 'A.5.30'
    target: 'DER.4'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.5.30 'ICT readiness for business continuity' verlangt
      ICT-Notfallvorsorge mit Wiederanlauf-Plänen. IT-Grundschutz-Baustein
      DER.4 'Notfallmanagement' deckt ICT-Notfall-Aspekte auf gleichem
      Abstraktionsniveau ab; vollständige BCM-Abdeckung gem. ISO 22301
      erfordert allerdings BSI 200-4.
    cross_refs: ['A.5.29']
    gap_warning: |
      DER.4 deckt ICT-Notfall-Aspekte. Für vollständigen BCM-Nachweis
      (Krisenmanagement, Behörden-Kommunikation) ist ergänzend BSI 200-4
      heranzuziehen.
    audit_evidence_hint: 'A.5.30: ICT-Notfall-Pläne. DER.4.A1 Notfallhandbuch, Tabletop-Übungen.'

  - source: 'A.5.34'
    target: 'CON.2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.5.34 'Privacy and protection of PII' verlangt
      Datenschutz-Maßnahmen für personenbezogene Daten. IT-Grundschutz-
      Baustein CON.2 'Datenschutz' deckt DSGVO-Konformität, technisch-
      organisatorische Maßnahmen und Datenschutz-Folgenabschätzungen ab —
      die Entsprechung ist 1:1.
    cross_refs: ['ORP.5']
    audit_evidence_hint: 'A.5.34: Verzeichnis von Verarbeitungstätigkeiten, DSFA. CON.2.A1 Umsetzung der Datenschutz-Grundsätze.'

  - source: 'A.5.15'
    target: 'ORP.4'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.5.15 'Access control' verlangt Zugangskontrolle
      mit Rollen und Berechtigungen. IT-Grundschutz-Baustein ORP.4
      'Identitäts- und Berechtigungsmanagement' bündelt zusätzlich Identity-
      Lifecycle, Berechtigungs-Rezertifizierung und privilegierte Zugänge —
      A.5.15 ist Teilmenge.
    cross_refs: ['A.5.16', 'A.5.17', 'A.5.18', 'A.8.2', 'A.8.5']
    audit_evidence_hint: 'A.5.15: Berechtigungs-Konzept. ORP.4.A1 IAM-Konzept, Rezertifizierungs-Reports der letzten 12 Monate.'

  - source: 'A.6.3'
    target: 'ORP.3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.6.3 'Information security awareness, education and
      training' verlangt regelmäßige Awareness-Maßnahmen. IT-Grundschutz-
      Baustein ORP.3 'Sensibilisierung und Schulung' deckt diesen
      Funktionsumfang auf gleichem Abstraktionsniveau ab.
    audit_evidence_hint: 'A.6.3: Schulungs-Curriculum, Phishing-Drill-Reports. ORP.3.A3 Schulungsplan, Onboarding-Curriculum.'

  - source: 'A.7.1'
    target: 'INF.1'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.7.1 'Physical security perimeters' verlangt
      definierte Sicherheitsbereiche. IT-Grundschutz-Baustein INF.1
      'Allgemeines Gebäude' bündelt zusätzlich Zutritt (A.7.2), Schutz
      gegen physische Bedrohungen (A.7.4) und Arbeit in Sicherheitsbereichen
      (A.7.5) — A.7.1 ist Teilmenge.
    cross_refs: ['A.7.2', 'A.7.4', 'A.7.5']
    audit_evidence_hint: 'A.7.1: Sicherheitsbereichs-Konzept. INF.1.A2 Brandschutzgutachten, Zutrittskontroll-Logs.'

  - source: 'A.8.7'
    target: 'OPS.1.1.4'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.8.7 'Protection against malware' verlangt AV/EDR,
      Schadprogramm-Erkennung und Reaktion. IT-Grundschutz-Baustein
      OPS.1.1.4 'Schutz vor Schadprogrammen' deckt den gleichen
      Funktionsumfang ab — die Entsprechung ist 1:1.
    audit_evidence_hint: 'A.8.7: AV/EDR-Coverage-Reports. OPS.1.1.4.A1 Schutzkonzept, Patch-Compliance.'

  - source: 'A.8.8'
    target: 'OPS.1.1.3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.8.8 'Management of technical vulnerabilities' verlangt
      Schwachstellen-Erkennung, Bewertung und Patch-Bereitstellung. IT-
      Grundschutz-Baustein OPS.1.1.3 'Patch- und Änderungsmanagement' deckt
      den gleichen Funktionsumfang ab.
    cross_refs: ['A.8.32']
    audit_evidence_hint: 'A.8.8: Vulnerability-Scan-Reports, CVSS-Bewertungen. OPS.1.1.3.A4 Patchprozess, Patch-SLAs.'

  - source: 'A.8.13'
    target: 'CON.3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.8.13 'Information backup' verlangt Backup-Strategie,
      Restore-Tests und Aufbewahrung. IT-Grundschutz-Baustein CON.3
      'Datensicherungskonzept' deckt diese Anforderungen auf gleichem
      Detail-Niveau ab.
    audit_evidence_hint: 'A.8.13: Backup-Strategie, Restore-Test-Protokolle. CON.3.A1 Datensicherungskonzept, Backup-Logs der letzten 12 Monate.'

  - source: 'A.8.20'
    target: 'NET.1.1'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      ISO 27001:2022 A.8.20 'Networks security' verlangt Netzsicherheit.
      IT-Grundschutz-Baustein NET.1.1 'Netzarchitektur und -design' bündelt
      zusätzlich Netzsegmentierung (A.8.22) und Netzdienste-Sicherheit
      (A.8.21) — A.8.20 ist Teilmenge.
    cross_refs: ['A.8.21', 'A.8.22']
    audit_evidence_hint: 'A.8.20: Netzarchitektur-Diagramm. NET.1.1.A1 Sicherheitsrichtlinie für Netzarchitektur, Segmentierungs-Konzept.'
