schema_version: '1.1'
library:
  type: mapping
  id: 'iso27001-2022_to_bsi-grundschutz_official-crt_v1'
  source_framework: 'ISO27001'
  target_framework: 'BSI_GRUNDSCHUTZ'
  version: 1
  effective_from: '2023-06-01'
  effective_until: null

  provenance:
    primary_source: 'official_bsi_crosswalk'
    primary_source_url: 'https://www.bsi.bund.de/SharedDocs/Downloads/DE/BSI/Grundschutz/IT-GS-Kompendium/Zuordnung_ISO_und_IT_Grundschutz_Edit_6.pdf?__blob=publicationFile&v=2'
    edition: 'IT-Grundschutz-Kompendium 6. Edition 2023'
    source_document_title: 'Zuordnung ISO/IEC 27001 zum IT-Grundschutz — Bundesamt fuer Sicherheit in der Informationstechnik (BSI)'
    source_document_date: '2023-09-19'
    source_standards:
      - 'BSI-Standard 200-1, Version 1.0, Oktober 2017'
      - 'BSI-Standard 200-2, Version 1.0, Oktober 2017'
      - 'BSI-Standard 200-3, Version 1.0, Oktober 2017'
      - 'BSI-Standard 200-4'
      - 'IT-Grundschutz-Kompendium, 6. Edition 2023'
      - 'ISO/IEC 27001:2022 und ISO/IEC 27002:2022'
    publisher: 'Bundesamt fuer Sicherheit in der Informationstechnik (BSI)'
    extraction_method: 'pdftotext verbatim extraction from official BSI publication'
    extraction_note: |
      Pairs extracted verbatim from the BSI official publication
      "Zuordnung ISO/IEC 27001 zum IT-Grundschutz" (Stand 6. Edition 2023),
      downloaded from bsi.bund.de on 2026-06-10.
      For each ISO 27001:2022 clause/control, the document lists the primary
      IT-Grundschutz Baustein or BSI-Standard chapter. Where the BSI document
      lists multiple Bausteine for a single ISO clause, the boldly-marked
      (primary) reference is used as the canonical pair target; additional
      references are listed in the notes field. Fett markiert = primary per BSI.

  methodology:
    type: 'official_published_crosswalk'
    description: |
      Amtliche BSI-Kreuzreferenztabelle (6. Edition 2023).
      The BSI publishes this document as the authoritative cross-reference
      between ISO/IEC 27001:2022 and IT-Grundschutz. Each entry reflects
      the BSI's own mapping. No AI inference or heuristic derivation was
      used; all pairs are taken verbatim from the PDF.

      Methodology note from the source document:
      "Diese Gegenueberstellung dient der Zuordnung der Inhalte der
      ISO/IEC 27001:2022 zu den Inhalten des IT-Grundschutzes."
      When a topic is covered by multiple IT-Grundschutz areas, the
      primary relevant area is marked bold in the original PDF.
      BSI-Standard chapter references (e.g. "BSI-Standard 200-2, Kapitel X")
      are mapped to the Baustein ISMS.1 where no specific Baustein is named.

      Relationship encoding:
        equivalent     = BSI Baustein/Anforderung deckt die ISO-Kontrolle direkt ab (1:1)
        subset         = ISO-Kontrolle umfasst mehr als der einzelne Baustein
        partial_overlap = Teilueberdeckung
        related        = inhaltliche Verwandtschaft

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'published', date: '2023-09-19', actor: 'BSI' }
      - { state: 'library-imported', date: '2026-06-10', actor: 'Little-ISMS-Helper' }

