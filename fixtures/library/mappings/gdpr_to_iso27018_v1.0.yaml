  - source: 'Art.38'
    target: null
    relationship: 'related'
    confidence: 'low'
    rationale: |
      GDPR Art.38 "Stellung des Datenschutzbeauftragten" ohne 27018-Pendant.

  - source: 'Art.39'
    target: '7.2.2'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      GDPR Art.39 "Aufgaben des Datenschutzbeauftragten" thematisch zu
