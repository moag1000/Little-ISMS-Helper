  - source: 'Art.43'
    target: null
    relationship: 'related'
    confidence: 'low'
    rationale: |
      GDPR Art.43 (Zertifizierungsstellen) ohne direkten 27018-Control-Pfad.

  # ===== Chapter V — Transfers to third countries (Art.44-50) =====
  - source: 'Art.44'
    target: 'A.7.1'
    relationship: 'equivalent'
    confidence: 'high'
