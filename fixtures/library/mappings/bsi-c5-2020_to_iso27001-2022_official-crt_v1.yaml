schema_version: '1.1'
library:
  type: mapping
  id: 'bsi-c5-2020_to_iso27001-2022_official-crt_v1'
  source_framework: 'BSI-C5'
  target_framework: 'ISO27001'
  version: 1
  effective_from: '2020-02-01'
  effective_until: null

  provenance:
    primary_source: 'official_bsi_c5_iso_crosswalk'
    primary_source_url: 'https://www.bsi.bund.de/SharedDocs/Downloads/DE/BSI/CloudComputing/Anforderungskatalog/2020/C5_2022_Referenztabelle_ISO27001.xlsx'
    edition: 'C5:2020 Kreuzreferenztabelle zu ISO/IEC 27001:2022 (BSI, Stand 2023-06-21)'
    source_document_title: 'Referenzierung des Kriterienkatalog Cloud Computing C5:2020 auf internationale Standards — Kreuzreferenztabelle zu ISO/IEC 27001:2022'
    source_document_date: '2023-06-21'
    publisher: 'Bundesamt fuer Sicherheit in der Informationstechnik (BSI)'
    extraction_method: 'verbatim extraction from official BSI Excel publication (C5_2022_Referenztabelle_ISO27001.xlsx)'
    extraction_note: |
      Pairs extracted verbatim from the BSI official publication
      "Referenzierung des Kriterienkatalog Cloud Computing C5:2020 auf internationale Standards"
      Sheet "Kreuzreferenztabelle", downloaded from bsi.bund.de.
      The BSI document provides a Sicherheitsniveau (SN) indicator per pair:
        SN=0:   The referenced ISO control covers the same security level as the C5 criterion.
        SN=+:   The ISO control exceeds the security level of the C5 criterion.
        SN=-:   The ISO control is at a lower security level than the C5 criterion.
        SN=n/a: No equivalent ISO control could be assigned.
      SN is preserved in the bsi_sn field and encoded in the relationship field:
        SN=0 -> equivalent, SN=+ -> superset (ISO exceeds C5), SN=- -> partial_overlap.
      C5 criteria with SN=n/a (24 criteria) are omitted from mappings as there is no
      ISO 27001:2022 control mapped by BSI.

  methodology:
    type: 'official_published_crosswalk'
    description: |
      Amtliche BSI-Kreuzreferenztabelle C5:2020 zu ISO/IEC 27001:2022.
      The BSI publishes this document as the authoritative cross-reference
      between BSI C5:2020 and ISO/IEC 27001:2022. Each entry reflects the BSI's
      own mapping. No AI inference or heuristic derivation was used; all pairs
      are taken verbatim from the Excel file.

      The table includes a security-level (Sicherheitsniveau, SN) indicator per pair.
      Where a C5 criterion maps to multiple ISO controls, each is listed as a separate
      mapping entry with the same SN value as the group.

      Relationship encoding based on BSI SN indicator:
        equivalent    = SN=0: same security level
        superset      = SN=+: ISO control exceeds C5 requirement
        partial_overlap = SN=-: ISO control is below C5 requirement level

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'published', date: '2023-06-21', actor: 'BSI' }
      - { state: 'library-imported', date: '2026-06-12', actor: 'Little-ISMS-Helper' }

