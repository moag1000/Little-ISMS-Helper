# ==============================================================================
# TISAX Legacy Requirement-ID Crosswalk Fixture
# ==============================================================================
# Purpose: Maps every legacy TISAX requirement-id scheme to the official
#          VDA-ISA control number (format: 1.1.1).
#
# This fixture is the authoritative reference for Phase P2 of the TISAX
# framework consolidation (spec §4.2 + §9.2).  It ships in version control
#   so every id-normalisation decision is reviewable and auditable.
#
# No-silent-cap rule (spec §4.2): every legacy id MUST appear here —
# either with a 'target' (canonical id) or under 'needs_human_review'
# with a documented reason.  Nothing is silently dropped.
#
# Domain facet (spec §9.2 Consultant G3): each entry carries a 'domain'
# field (the 2–6-letter VDA-ISA domain code).  The domain survives the
# crosswalk so by-domain grouping, filtering, and reporting remain intact.
#
# Crosswalk versioning contract (spec §9.2 G8): bump 'version' when any
# entry is added/changed; bump 'appliesToIsaVersion' on ISA catalogue
# revision (6.0.x → 6.1 etc.).
# ==============================================================================

version: 1
appliesToIsaVersion: "6.x"

# ──────────────────────────────────────────────────────────────────────────────
# §1  Deterministic rules (no catalogue required)
# ──────────────────────────────────────────────────────────────────────────────

deterministic_rules:

  isa_prefix_strip:
    # 'ISA x.y.z' → 'x.y.z'  (pure prefix-strip, no ambiguity)
    # Applied at runtime by app:tisax:consolidate.
    # All 9 YAML mapping files in fixtures/library/mappings/ were already
    # re-keyed by this rule (see var/rekey-legacy-ids.txt).
    pattern: "^ISA (\\d+\\.\\d+\\.\\d+)$"
    transform: "strip_prefix"
    prefix: "ISA "
    result_format: "x.y.z"
    rationale: |
      The 'ISA ' prefix was added ad-hoc by the original seeding code.
      Stripping it yields the official VDA-ISA control number verbatim.
    examples:
      - legacy: "ISA 1.1.1"
        canonical: "1.1.1"
      - legacy: "ISA 3.1.4"
        canonical: "3.1.4"
      - legacy: "ISA 5.2.7"
        canonical: "5.2.7"

  isa_kap_chapter_stubs:
    # 'ISA-KAP-n' → chapter_stub (delete-candidate, not a control)
    pattern: "^ISA-KAP-(\\d+)$"
    transform: "mark_chapter_stub"
    action: "delete_if_no_tenant_assessment"
    rationale: |
      ISA-KAP-1 … ISA-KAP-6 are chapter-level skeleton rows, not real
      TISAX controls.  They were introduced by loader commands to anchor
      chapter structure but carry no assessable requirement.  Delete them
      during consolidation (step 4 of spec §4.3) provided they have no
      tenant_upload assessment attached.
    known_instances:
      - "ISA-KAP-1"
      - "ISA-KAP-2"
      - "ISA-KAP-3"
      - "ISA-KAP-4"
      - "ISA-KAP-5"
      - "ISA-KAP-6"

# ──────────────────────────────────────────────────────────────────────────────
# §2  Domain-prefixed ids (INF / ACC / BCM / CMP / COM / CRY / DEV /
#     HRS / INC / MOB / OPS / PHY / PROT / SUP)
#
# These ids were authored by LoadTisaxRequirementsCommand and
# SeedTisaxIso27001MappingsCommand as a human-readable domain shorthand.
# They are NOT official VDA-ISA ids — the catalogue uses numeric 1.1.1
# notation exclusively.
#
# Confident mappings can only be derived from the licensed VDA-ISA
# workbook (ENX-licensed, not redistributable).  Cross-referencing via
# shared ISO 27001 targets is non-1:1 (one ISO control maps to multiple
# VDA-ISA controls and vice versa), so ISO-pivot inferences are recorded
# as hints only, NOT as authoritative targets.
#
# Entries that cannot be resolved without the catalogue are listed under
# §3 needs_human_review.
# ──────────────────────────────────────────────────────────────────────────────

