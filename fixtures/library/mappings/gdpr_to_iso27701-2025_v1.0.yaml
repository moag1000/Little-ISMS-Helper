schema_version: '1.1'
library:
  type: mapping
  id: 'gdpr_to_iso27701-2025_v1.0'
  source_framework: 'GDPR'
  target_framework: 'ISO27701'
  version: 2
  effective_from: '2025-08-01'
  effective_until: null

  provenance:
    primary_source: 'ISO/IEC 27701:2019 Annex D — Mapping to GDPR articles (offizieller Anhang)'
    primary_source_url: 'https://www.iso.org/standard/71670.html'
    secondary_sources:
      - 'BfDI-Hinweispapier zu PIMS-Zertifizierung 2024-Q4'
    publisher: 'Little ISMS Helper Maintainers'

  methodology:
    type: 'published_official_mapping'
    description: |
      ISO 27701:2019 Annex D enthält das offizielle Mapping zu DSGVO-Artikeln
      vom Standardisierungs-Komitee. Wir haben Annex D 1:1 übernommen und
      durch eigene Volltext-Vergleiche stichprobenartig validiert (alle
      Mappings mit Confidence "high" stammen direkt aus Annex D).
      HINWEIS: target_framework = 'ISO27701' (2019). Requirement-IDs wurden
      in v2 auf das DB-Schema 27701-A.7.x.x / 27701-B.8.x.x korrigiert
      (v1 nutzte nicht-normative Klauselnummern ohne Prefix, die in keinem
      DB-Requirement vorkommen).

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2025-08-15', actor: 'maintainer' }
      - { state: 'review',    date: '2025-08-25', actor: 'maintainer' }
      - { state: 'approved',  date: '2025-09-05', actor: 'reviewer-2' }
      - { state: 'published', date: '2025-09-15', actor: 'ciso-signoff' }
      - { state: 'published', date: '2026-06-12', actor: 'maintainer', note: 'v2: fix requirement IDs to match DB schema (27701-A.7.x.x / 27701-B.8.x.x)' }

mappings:
  - source: 'GDPR-5.1.a'
    target: '27701-A.7.2.1'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      DSGVO Art. 5 (Grundsätze der Verarbeitung) wird in ISO 27701:2019
      Klausel A.7.2.1 "Identify and document purpose" + A.7.2.2 "Identify
      lawful basis" operationalisiert. ISO 27701 Annex D bestätigt das Mapping.
    audit_evidence_hint: 'RoPA mit Zwecken + Rechtsgrundlagen pro Verarbeitung.'

  - source: 'GDPR-6'
    target: '27701-A.7.2.2'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      DSGVO Art. 6 (Rechtmäßigkeit der Verarbeitung) entspricht
      ISO 27701 A.7.2.2 "Identify lawful basis".
    audit_evidence_hint: 'Pro RoPA-Eintrag: dokumentierte Rechtsgrundlage.'

  - source: 'GDPR-7'
    target: '27701-A.7.2.3'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      DSGVO Art. 7 (Bedingungen für die Einwilligung) entspricht ISO 27701
      A.7.2.3 "Determine when and how consent is to be obtained".
    audit_evidence_hint: 'Consent-Management-System mit Nachweis-Protokollen.'

  - source: 'GDPR-13'
    target: '27701-A.7.2.4'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 13/14 (Informationspflichten) entsprechen ISO 27701 A.7.2.4
      "Provide privacy notices" — Datenschutzerklärung-Inhalte direkt durch
      diese Klausel gedeckt.
    audit_evidence_hint: 'Datenschutzerklärung-Versionen + Aktualisierungen.'

  - source: 'GDPR-15'
    target: '27701-A.7.4.1'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      DSGVO Art. 15 (Auskunftsrecht) → ISO 27701 A.7.4.1 "Right of Access"
      — Mechanismen zum Zugriff auf eigene PII durch Betroffene.
    audit_evidence_hint: 'Verfahren für Auskunftsanfragen inkl. Nachweisprotokoll.'

  - source: 'GDPR-17'
    target: '27701-A.7.3.6'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      DSGVO Art. 17 (Recht auf Löschung) → ISO 27701 A.7.3.6 "Correction
      and erasure" — Mechanismen zur Korrektur und Löschung von PII.
    audit_evidence_hint: 'Lösch-Konzept, Löschprotokolle, Backup-Lösch-Strategie.'

  - source: 'GDPR-20'
    target: '27701-A.7.4.5'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 20 (Datenübertragbarkeit) → ISO 27701 A.7.4.5 "Right to
      Data Portability" — strukturierte Herausgabe von PII in maschinenlesbarem
      Format.

  - source: 'GDPR-25'
    target: '27701-A.7.3.1'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      DSGVO Art. 25 (Privacy by Design / by Default) → ISO 27701 A.7.3.1
      "Limit collection" — technisch-organisatorische Begrenzung der Erhebung.
    cross_refs: ['27701-A.7.4.2']

  - source: 'GDPR-28'
    target: '27701-B.8.2.1'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      DSGVO Art. 28 (Auftragsverarbeiter) → ISO 27701 B.8.2.1 "Customer
      agreements and responsibilities" — vertragliche Pflichten des
      PII-Processors gegenüber dem Controller.
    cross_refs: ['27701-B.8.2.2', '27701-B.8.5.3']
    audit_evidence_hint: 'AVV-Register pro Auftragsverarbeiter, Audit-Reports.'

  - source: 'GDPR-30'
    target: '27701-A.8.3.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 30 (RoPA — Verzeichnis von Verarbeitungstätigkeiten)
      → ISO 27701 A.8.3.1 "Records of Processing Activities" — vollständiges
      Verzeichnis mit allen Pflichtfeldern.
    audit_evidence_hint: 'Vollständiges RoPA mit allen Pflichtfeldern.'

  - source: 'GDPR-32'
    target: '27701-B.7.2.1'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      DSGVO Art. 32 (Sicherheit der Verarbeitung) → ISO 27701 B.7.2.1
      "Security of PII Processing" — angemessene technische und
      organisatorische Maßnahmen. Kein 1:1 weil Art. 32 sehr breit ist.
    gap_warning: 'Vollständige Abdeckung erfordert ISO 27001 Annex A 5/6/7/8 zusätzlich.'
    cross_refs: ['27701-B.7.2.2']

  - source: 'GDPR-33'
    target: '27701-A.7.5.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 33 (Meldung von Datenschutzverletzungen an Aufsichtsbehörde)
      → ISO 27701 A.7.5.1 "Notification of PII breach" — 72-h-Meldepflicht
      an Aufsichtsbehörde bei PII-Verletzungen.
    audit_evidence_hint: 'Breach-Notification-Prozess mit 72-h-SLA-Tracking.'

  - source: 'GDPR-34'
    target: '27701-A.7.3.3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 34 (Benachrichtigung der betroffenen Personen bei
      Verletzungen) → ISO 27701 A.7.3.3 "Obligation to Inform" — Verfahren
      zur Benachrichtigung Betroffener bei PII-Verletzungen.

  - source: 'GDPR-35'
    target: '27701-A.7.5.3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 35 (Datenschutz-Folgenabschätzung) → ISO 27701 A.7.5.3
      "Privacy Impact Assessment" — DPIA/PIA für risikoreiche Verarbeitungen.
    audit_evidence_hint: 'DPIA-Register, mindestens 1 vollständige DPIA pro Hochrisiko-Verarbeitung.'

  - source: 'GDPR-37'
    target: '27701-A.8.2.1'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      DSGVO Art. 37-39 (DSB) → ISO 27701 A.8.2.1 "Data Protection Officer
      Appointment" — formale Benennung, Ressourcenausstattung und Unabhängigkeit
      des Datenschutzbeauftragten.

  - source: 'GDPR-44'
    target: '27701-A.8.4.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 44-49 (Internationale Datenübermittlung) → ISO 27701 A.8.4.1
      "International Data Transfers" — Rechtsgrundlagen und Schutzmaßnahmen
      für grenzüberschreitende PII-Transfers.
    cross_refs: ['27701-A.8.4.2']
    audit_evidence_hint: 'SCC-Verträge, TIA-Dokumente, Drittland-Risikoanalyse.'

  - source: 'GDPR-19'
    target: '27701-A.7.4.6'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 19 (Mitteilungspflicht bei Berichtigung, Löschung oder
      Einschränkung) → ISO 27701 A.7.4.6 "Right to Object" — Verfahren zur
      Benachrichtigung Dritter bei Betroffenenrechts-Ausübung.

  - source: 'GDPR-22'
    target: '27701-A.7.4.7'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 22 (Automatisierte Entscheidungsfindung inkl. Profiling)
      → ISO 27701 A.7.4.7 "Automated Decision Making" — Schutzmaßnahmen und
      Transparenz bei automatisierten Entscheidungen.

  - source: 'GDPR-26'
    target: '27701-GDPR-3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 26 (Gemeinsame Verantwortliche) → ISO 27701 GDPR-3 "Joint
      Controllers Agreement" — vertragliche Vereinbarungen gemeinsamer
      Verantwortlicher mit klarer Aufgabenteilung.
