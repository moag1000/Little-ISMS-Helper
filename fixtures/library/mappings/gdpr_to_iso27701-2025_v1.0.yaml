schema_version: '1.1'
library:
  type: mapping
  id: 'gdpr_to_iso27701-2025_v1.0'
  source_framework: 'GDPR'
  target_framework: 'ISO27701-2025'
  version: 1
  effective_from: '2025-08-01'
  effective_until: null

  provenance:
    primary_source: 'ISO/IEC 27701:2025 Annex D — Mapping to GDPR articles (offizieller Anhang)'
    primary_source_url: 'https://www.iso.org/standard/85819.html'
    secondary_sources:
      - 'BfDI-Hinweispapier zu PIMS-Zertifizierung 2024-Q4'
    publisher: 'Little ISMS Helper Maintainers'

  methodology:
    type: 'published_official_mapping'
    description: |
      ISO 27701:2025 Annex D enthält das offizielle Mapping zu DSGVO-Artikeln
      vom Standardisierungs-Komitee. Wir haben Annex D 1:1 übernommen und
      durch eigene Volltext-Vergleiche stichprobenartig validiert (alle
      Mappings mit Confidence "high" stammen direkt aus Annex D).

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2025-08-15', actor: 'maintainer' }
      - { state: 'review',    date: '2025-08-25', actor: 'maintainer' }
      - { state: 'approved',  date: '2025-09-05', actor: 'reviewer-2' }
      - { state: 'published', date: '2025-09-15', actor: 'ciso-signoff' }

mappings:
  - source: 'Art.5'
    target: '7.2.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 5 (Grundsätze der Verarbeitung) wird in ISO 27701:2025
      Klausel 7.2.1 "Identify and document purpose" + 7.2.2 "Identify lawful
      basis" operationalisiert. ISO 27701 Annex D bestätigt das Mapping.
    audit_evidence_hint: 'RoPA mit Zwecken + Rechtsgrundlagen pro Verarbeitung.'

  - source: 'Art.6'
    target: '7.2.2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 6 (Rechtmäßigkeit der Verarbeitung) entspricht
      ISO 27701 7.2.2 "Identify lawful basis".
    audit_evidence_hint: 'Pro RoPA-Eintrag: dokumentierte Rechtsgrundlage.'

  - source: 'Art.7'
    target: '7.2.3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 7 (Bedingungen für die Einwilligung) entspricht ISO 27701
      7.2.3 "Determine when and how consent is to be obtained".
    audit_evidence_hint: 'Consent-Management-System mit Nachweis-Protokollen.'

  - source: 'Art.13'
    target: '7.3.2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 13/14 (Informationspflichten) entsprechen ISO 27701 7.3.2
      "Determining information for PII principals".
    audit_evidence_hint: 'Datenschutzerklärung-Versionen + Aktualisierungen.'

  - source: 'Art.15'
    target: '7.3.3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: 'DSGVO Art. 15 (Auskunftsrecht) → ISO 27701 7.3.3 "Providing mechanisms to modify or withdraw consent".'

  - source: 'Art.17'
    target: '7.3.6'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: 'DSGVO Art. 17 (Recht auf Löschung) → ISO 27701 7.3.6 "Access, correction and/or erasure".'
    audit_evidence_hint: 'Lösch-Konzept, Löschprotokolle, Backup-Lösch-Strategie.'

  - source: 'Art.20'
    target: '7.3.7'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: 'DSGVO Art. 20 (Datenübertragbarkeit) → ISO 27701 7.3.7 "PII principals'' obligation to provide their PII".'

  - source: 'Art.25'
    target: '7.4.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 25 (Privacy by Design / by Default) → ISO 27701 7.4.1
      "Limit collection" + 7.4.2 "Limit processing".
    cross_refs: ['7.4.2', '7.4.3']

  - source: 'Art.28'
    target: '8.5.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 28 (Auftragsverarbeiter) → ISO 27701 8.5.1 "Customer
      agreement" + 8.5.2 "Organization's purposes".
    cross_refs: ['8.5.2', '8.5.3']
    audit_evidence_hint: 'AVV-Register pro Auftragsverarbeiter, Audit-Reports.'

  - source: 'Art.30'
    target: '7.2.8'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 30 (RoPA — Verzeichnis von Verarbeitungstätigkeiten)
      → ISO 27701 7.2.8 "Records related to processing PII".
    audit_evidence_hint: 'Vollständiges RoPA mit allen Pflichtfeldern.'

  - source: 'Art.32'
    target: '6.5'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      DSGVO Art. 32 (Sicherheit der Verarbeitung) wird durch ISO 27001
      Clause 6 + Annex A abgedeckt; ISO 27701 6.5 ergänzt PIMS-spezifische
      Aspekte. Kein 1:1 weil Art. 32 sehr breit ist.
    gap_warning: 'Vollständige Abdeckung erfordert ISO 27001 Annex A 5/6/7/8 — nicht nur ISO 27701 6.5.'
    cross_refs: ['ISO27001:A.8.7', 'ISO27001:A.8.16']

  - source: 'Art.33'
    target: '6.13.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 33 (Meldung von Datenschutzverletzungen an Aufsichtsbehörde)
      → ISO 27701 6.13.1 "Identification of applicable legislation" plus
      ISO 27001 A.5.24 (Incident-Response).
    audit_evidence_hint: 'Breach-Notification-Prozess mit 72-h-SLA-Tracking.'

  - source: 'Art.34'
    target: '6.13.2'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: 'DSGVO Art. 34 (Benachrichtigung der betroffenen Personen) → ISO 27701 6.13.2.'

  - source: 'Art.35'
    target: '7.2.5'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 35 (Datenschutz-Folgenabschätzung) → ISO 27701 7.2.5
      "Privacy impact assessment".
    audit_evidence_hint: 'DPIA-Register, mindestens 1 vollständige DPIA pro Hochrisiko-Verarbeitung.'

  - source: 'Art.37'
    target: '6.3.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 37-39 (DSB) → ISO 27701 6.3.1 "PII protection officer" +
      6.3.2 "Internal organization".
    cross_refs: ['6.3.2']

  - source: 'Art.44'
    target: '7.5.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      DSGVO Art. 44-49 (Internationale Datenübermittlung) → ISO 27701 7.5.1
      "Identify basis for PII transfer between jurisdictions" + 7.5.2-7.5.4.
    cross_refs: ['7.5.2', '7.5.3', '7.5.4']
    audit_evidence_hint: 'SCC-Verträge, TIA-Dokumente, Drittland-Risikoanalyse.'
