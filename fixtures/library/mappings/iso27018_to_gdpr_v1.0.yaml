    cross_refs: ['Art.34']

  - source: '16.1.2'
    target: 'Art.33'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      27002:2013 16.1.2 (Reporting events) Teil von Art.33.

  - source: '16.1.7'
    target: 'Art.33'
    relationship: 'subset'
    confidence: 'medium'
    rationale: |
      27002:2013 16.1.7 (Collection of evidence) Teil von Art.33 (Breach-
      Dokumentation) plus forensische Anforderungen.

  - source: '17.1.1'
    target: 'Art.32'
    relationship: 'subset'
    confidence: 'high'
    rationale: |
      27002:2013 17.1.1 (Planning information security continuity) Teil von
      GDPR Art.32(1)(c) "Wiederherstellbarkeit".

  - source: '18.1.1'
    target: 'Art.45'
    relationship: 'equivalent'
    confidence: 'high'
