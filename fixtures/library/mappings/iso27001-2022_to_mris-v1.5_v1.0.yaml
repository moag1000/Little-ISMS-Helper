schema_version: '1.1'
library:
  type: mapping
  id: 'iso27001-2022_to_mris-v1.5_v1.0'
  source_framework: 'ISO27001'
  target_framework: 'MRIS-v1.5'
  version: 1
  effective_from: '2026-04-26'
  effective_until: null

  provenance:
    primary_source: 'Peddi, Richard (2026). MRIS — Mythos-resistente Informationssicherheit, Version 1.5 — Kap. 9.4 Kompakt-Übersicht'
    primary_source_url: 'https://creativecommons.org/licenses/by/4.0/'
    secondary_sources:
      - 'ISO/IEC 27002:2022 — Information security controls'
      - 'BSI C5:2026 Prüfkatalog'
    publisher: 'Little ISMS Helper Maintainers (CC BY 4.0 derivative)'

  methodology:
    type: 'published_official_mapping'
    description: |
      Reverse-Mapping zu mris-v1.5_to_iso27001-2022_v1.0. ISO-27002-Anchor↔MHC-
      Anbindungen aus MRIS v1.5 Kap. 9.4 invertiert. Relationship 'partial_overlap'
      ist self-inverse: MHC flankiert ISO-Control durch zusätzliche Mythos-
      Schutzziele, ohne ISO-Anforderung zu ersetzen. Confidence aus Übereinstim-
      mungsgrad der ISO-Anchor-Anforderung mit dem MHC-Schutzziel. CC-BY-4.0-
      Ableitung mit Namensnennung Richard Peddi.

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2026-04-26', actor: 'maintainer' }
      - { state: 'review',    date: '2026-04-26', actor: 'maintainer' }
      - { state: 'approved',  date: '2026-04-26', actor: 'reviewer-2' }
      - { state: 'published', date: '2026-04-26', actor: 'ciso-signoff' }

mappings:
  - source: 'A.8.24'
