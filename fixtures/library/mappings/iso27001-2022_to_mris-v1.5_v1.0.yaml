    confidence: 'high'
    rationale: |
      A.8.24 verlangt Einsatz und Management von Kryptografie inklusive
      Algorithmen, Schlüssellängen und Lifecycle. MHC-01 flankiert mit
      Mythos-Schutzziel Post-Quantum-Strategie und kryptografisches Inventar.
      Schnittmenge bei Algorithmus-Governance. partial_overlap weil ISO
      grundlegende Krypto-Schutzziele setzt und MHC zusätzliche PQC-Migrations-
      und Quantum-Readiness-Schutzziele aufsattelt.
    audit_evidence_hint: 'A.8.24: Krypto-Policy mit Algorithmus-Whitelist und Schlüsselmanagement. MHC-01: PQC-Migrationsplan, Quantum-Risk-Assessment, Crypto-Agility-Inventar.'

