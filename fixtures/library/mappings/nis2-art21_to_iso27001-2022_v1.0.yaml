schema_version: '1.1'
library:
  type: mapping
  id: 'nis2-art21_to_iso27001-2022_v1.0'
  source_framework: 'NIS2'
  target_framework: 'ISO27001'
  version: 1
  effective_from: '2024-09-01'
  effective_until: null

  provenance:
    primary_source: 'ENISA Implementation Guidance NIS2 2024-09 — inverse Richtung (NIS2 → ISO 27001)'
    primary_source_url: 'https://www.enisa.europa.eu/publications/implementation-guidance-on-nis-2-security-measures'
    secondary_sources:
      - 'BSI Mindestanforderungen NIS2-UmsuCG (Konsultationsentwurf 2024-12)'
      - 'Eigene Volltext-Analyse durch Compliance-Team'
      - 'Inverse-Ableitung aus iso27001-2022_to_nis2-art21_v1.0'
    publisher: 'Little ISMS Helper Maintainers'

  methodology:
    type: 'text_comparison_with_expert_review'
    description: |
      Reverse-Mapping: Ausgehend von jedem NIS2 Art. 21(2)-Unterpunkt wurde
      bestimmt, welche ISO 27001:2022 Annex-A-Controls den NIS2-Anspruch
      adressieren:
      1. Volltext-Lesung des NIS2-Punktes als Anker
      2. Identifikation aller ISO-Controls, die auf den NIS2-Anspruch einzahlen
      3. Relationship invertiert (ISO subset NIS2 → NIS2 superset ISO)
      4. Confidence aus Forward übernommen, Rationale neu aus NIS2-Sicht verfasst
      5. 4-Augen-Review durch zweiten Compliance-Manager

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2024-09-15', actor: 'maintainer' }
      - { state: 'review',    date: '2024-10-30', actor: 'maintainer' }
      - { state: 'approved',  date: '2024-11-22', actor: 'reviewer-2' }
      - { state: 'published', date: '2024-12-01', actor: 'ciso-signoff' }

mappings:
  - source: '21.2.f'
    target: 'A.5.7'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      NIS2 Art. 21(2)(f) fordert Threat-Intel-Sharing als Element von
      Lieferkettensicherheit und Drittbeziehungen. ISO 27001:2022 A.5.7
      "Threat Intelligence" liefert exakt die operative Grundlage —
      Sammlung, Analyse, Verteilung. Aus NIS2-Sicht ist A.5.7 die
      naheliegende ISO-Verankerung; vollständige Abdeckung.
    audit_evidence_hint: 'Threat-Intel-Quellen-Liste + Sharing-Protokolle (CERT-Bund, BSI-CERT, ISACs) der letzten 12 Monate.'

  - source: '21.2.c'
    target: 'A.5.30'
    relationship: 'superset'
    confidence: 'medium'
    rationale: |
      NIS2 Art. 21(2)(c) "Aufrechterhaltung des Betriebs, Krisenmanagement,
      Behörden-Meldewege" ist breiter als A.5.30 "ICT Readiness for Business
      Continuity". A.5.30 deckt nur den ICT-Anteil ab; der Krisenmanagement-
      und externe Kommunikations-Teil von 21(2)(c) liegt außerhalb.
    gap_warning: |
      A.5.30 allein erfüllt 21(2)(c) NICHT. Für vollen Nachweis aus
      NIS2-Sicht zwingend kombinieren mit A.5.29 (Disruption) und
      A.6.5 / Krisenkommunikations-Prozeduren.
    audit_evidence_hint: 'BC-Pläne mit Krisenmanagement-Teil, Behörden-Meldepfade, dokumentierte Tabletop-Übungen.'

  - source: '21.2.d'
    target: 'A.5.20'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      NIS2 Art. 21(2)(d) "Sicherheit der Lieferkette" wird operativ am
      saubersten über ISO 27001:2022 A.5.20 (Supplier-Agreements) plus
      A.5.21 (ICT supply chain) und A.5.22 (Monitoring/Review) umgesetzt.
      Aus NIS2-Sicht ist A.5.20 die Kern-Verankerung der vertraglichen
      Anforderungen.
    cross_refs: ['A.5.21', 'A.5.22']
    audit_evidence_hint: 'Supplier-Register mit Risk-Tier, AVV-Verträge, Audit-Reports der letzten 24 Monate.'

  - source: '21.2.b'
    target: 'A.5.24'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      NIS2 Art. 21(2)(b) "Vorfallbewältigung" entspricht aus NIS2-Sicht
      vollständig A.5.24 "Information security incident management planning
      and preparation". Die NIS2-spezifischen Meldepflichten (Art. 23) sind
      separat zu adressieren, der Incident-Management-Prozess selbst ist
      durch A.5.24 abgedeckt.
    audit_evidence_hint: 'Incident-Response-Plan, IR-Übungen, IR-Reports.'

  - source: '21.2.c'
    target: 'A.5.29'
    relationship: 'superset'
    confidence: 'medium'
    rationale: |
      Aus NIS2-Sicht deckt A.5.29 "Information security during disruption"
      nur den Teilaspekt "Sicherheit während Disruption" von 21(2)(c) ab.
      NIS2 21(2)(c) verlangt darüber hinaus Krisenmanagement-Strukturen
      und externe Kommunikation. A.5.29 ist daher Untermenge.
    gap_warning: 'A.5.29 ist nur ein Baustein für 21(2)(c); ohne A.5.30 und Krisenkommunikation unvollständig.'
    audit_evidence_hint: 'BC-Pläne, Notfallrichtlinien, Disruption-Tests.'

  - source: '21.2.h'
    target: 'A.8.7'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      NIS2 Art. 21(2)(h) "grundlegende Cyberhygiene" hat als prominentesten
      Baustein Malware-Schutz, Patching und Hardening. A.8.7 "Protection
      against malware" deckt aus NIS2-Sicht den Malware-Aspekt vollständig ab.
    audit_evidence_hint: 'AV/EDR-Reports, Patch-Compliance-Dashboards.'

  - source: '21.2.h'
    target: 'A.8.24'
    relationship: 'related'
    confidence: 'medium'
    rationale: |
      NIS2 21(2)(h) "Cyberhygiene" umfasst auch Krypto-Praxis als Hygiene-
      Element. A.8.24 "Use of cryptography" ist verwandt, aber nicht
      deckungsgleich — Cyberhygiene aus NIS2-Sicht ist deutlich breiter
      (Patching, Hardening, Logs, MFA, Awareness).
    cross_refs: ['A.8.7', 'A.8.8']

  - source: '21.2.e'
    target: 'A.5.9'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      NIS2 Art. 21(2)(e) "Sicherheit beim Erwerb, Entwicklung und Wartung
      von Netz- und Informationssystemen" basiert operativ auf einem
      vollständigen Asset-Inventar. A.5.9 "Inventory of information and
      other associated assets" ist aus NIS2-Sicht die zentrale Verankerung
      für den Inventar-/Asset-Anteil.
    cross_refs: ['A.5.10', 'A.5.11']

  - source: '21.2.g'
    target: 'A.6.3'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      NIS2 Art. 21(2)(g) "Cybersicherheits-Schulungen + Cyberhygiene-Praxis
      für alle Beschäftigten" wird durch A.6.3 "Information security
      awareness, education and training" 1:1 adressiert. Aus NIS2-Sicht
      ist A.6.3 die direkte ISO-Entsprechung.
    audit_evidence_hint: 'Schulungs-Quote, Phishing-Drill-Ergebnisse, Onboarding-Curriculum.'

  - source: '21.2.a'
    target: 'A.5.1'
    relationship: 'superset'
    confidence: 'medium'
    rationale: |
      NIS2 Art. 21(2)(a) "Konzepte für Risikoanalyse und Sicherheit der
      Informationssysteme" ist breiter als A.5.1 "Policies for information
      security". A.5.1 liefert nur die Policy-Komponente; Risikoanalyse-
      Methodik und Verantwortlichkeiten kommen aus ISO 27001 Clause 6.1
      und A.6.1.
    gap_warning: 'A.5.1 allein deckt 21(2)(a) NICHT — bündele zwingend mit A.6.1 und ISO 27001 Clause 6.1.'
    cross_refs: ['A.6.1']

  - source: '21.2.j'
    target: 'A.8.5'
    relationship: 'superset'
    confidence: 'medium'
    rationale: |
      NIS2 Art. 21(2)(j) verlangt MFA/kontinuierliche Authentifizierung
      PLUS gesicherte Sprach-/Video-/Textkommunikation und ggf.
      Notfallkommunikation. A.8.5 "Secure authentication" deckt aus
      NIS2-Sicht nur den Authentifizierungs-Anteil ab.
    gap_warning: 'Sprach/Video-Notfallkommunikations-Anteil von 21(2)(j) ist NICHT durch A.8.5 abgedeckt — separate Maßnahme nötig (z.B. SINA, Matrix-E2EE-Setups).'

  - source: '21.2.i'
    target: 'A.8.16'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      NIS2 Art. 21(2)(i) "Konzepte und Verfahren zur Bewertung der
      Wirksamkeit von Risikomanagement-Maßnahmen" — speziell der
      Monitoring-Anteil — wird durch A.8.16 "Monitoring activities"
      abgedeckt. Wirksamkeits-Bewertung selbst kommt ergänzend aus
      ISO 27001 Clause 9.1.
    cross_refs: ['A.5.36']
