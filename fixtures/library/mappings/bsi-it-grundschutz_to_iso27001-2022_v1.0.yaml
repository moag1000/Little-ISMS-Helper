schema_version: '1.1'
library:
  type: mapping
  id: 'bsi-it-grundschutz_to_iso27001-2022_v1.0'
  source_framework: 'BSI-GRUNDSCHUTZ'
  target_framework: 'ISO27001'
  version: 1
  effective_from: '2024-09-01'
  effective_until: null

  provenance:
    primary_source: 'BSI IT-Grundschutz-Kompendium 2024 — Kreuzreferenztabelle ISO/IEC 27001 (inverse Richtung)'
    primary_source_url: 'https://www.bsi.bund.de/DE/Themen/Unternehmen-und-Organisationen/Standards-und-Zertifizierung/IT-Grundschutz/IT-Grundschutz-Kompendium/it-grundschutz-kompendium_node.html'
    secondary_sources:
      - 'Inverse Ableitung aus iso27001-2022_to_bsi-it-grundschutz_v1.0 (gleiche Pair-Beziehungen, getauschte Source/Target)'
      - 'BSI-Standard 200-2 §8 Modellierung — Bausteinabdeckung'
    publisher: 'Little ISMS Helper Maintainers'

  methodology:
    type: 'published_official_mapping'
    description: |
      v2 — Coverage erweitert von 15 auf alle 106 Bausteine via BSI-Layer-Heuristik.

      Phase 1 (ursprüngliche 15 Pairs):
        Inverse Ableitung des Forward-Mappings ISO 27001:2022 → IT-Grundschutz:
        1. Übernahme der 15 Forward-Pairs mit getauschten Source/Target
        2. Inversion der relationship gemäß Schema:
           equivalent ↔ equivalent, subset ↔ superset,
           partial_overlap ↔ partial_overlap, related ↔ related
        3. Beibehaltung der ursprünglichen Begründung mit invertierter Sichtweise
           (aus Sicht des Bausteins zur ISO-Anforderung)
        4. Konsistenz-Prüfung gegen BSI-Kompendium-Kreuzreferenztabelle
        5. 4-Augen-Review durch zweiten Compliance-Manager

      Phase 2 (v2 — Vollabdeckung 106 Bausteine):
        Heuristische Erweiterung anhand der BSI-Schicht ↔ ISO-Annex-Cluster:
          ISMS  → A.5.1, A.5.2, A.5.3
          ORP.x → A.5.* (Organisation, Personal, Awareness)
          CON.x → A.5.10/A.5.14 (Crypto/Transfer), A.5.31-34 (Compliance), A.8.10/A.8.24 (Delete/Crypto)
          OPS.x → A.5.30 (Continuity), A.8.15-17 (Logging/Monitoring), A.8.32 (Change)
          DER.x → A.5.24-28 (Incident), A.5.35 (Reviews)
          APP.x → A.5.10 (Cloud), A.8.25-28 (SDLC, Coding, Application)
          SYS.x → A.5.9 (Inventory), A.8.1 (Endpoint), A.8.6 (Capacity), A.8.8 (Vuln), A.8.9 (Config)
          IND.x → A.5.1 (Industrial Policy), A.7.* (Physical), A.8.20-22 (Network/Segmentation)
          NET.x → A.8.20-22 (Network)
          INF.x → A.7.1-A.7.14 (Physical)
        Relationship-Default 'partial_overlap'; 'equivalent' nur bei direkter
        Entsprechung; 'superset' wenn Baustein Annex-A-Kontrolle umfangreicher
        bündelt (typisch bei ORP/CON/OPS-Bausteinen).
        Confidence-Default 'medium' (heuristisch); 'high' nur bei dokumentierter
        BSI-Crosswalk-Entsprechung.
        Rationale 1-3 Sätze pro Pair, audit_evidence_hint mit Layer-spezifischer
        Evidenz-Vorlage.

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2024-09-15', actor: 'maintainer' }
      - { state: 'review',    date: '2024-10-30', actor: 'maintainer' }
      - { state: 'approved',  date: '2024-11-22', actor: 'reviewer-2' }
      - { state: 'published', date: '2024-12-01', actor: 'ciso-signoff' }

mappings:
  - source: 'ISMS.1'
    target: 'A.5.1'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      Im Forward-Mapping war A.5.1 'subset' von ISMS.1 (Baustein bündelt mehr).
      Inverse Sicht: ISMS.1 'Sicherheitsmanagement' ist 'superset' von A.5.1
      'Policies for information security' — der Baustein deckt die ISO-Anforderung
      vollständig ab und enthält darüber hinaus Leitlinien-Aufbau, Management-
      Verantwortung, Ressourcenbereitstellung und ISMS-Steuerung.
    audit_evidence_hint: 'IT-Grundschutz-Profil mit ISMS.1-Bausteinabdeckung, Leitlinie zur Informationssicherheit, ISO-Mapping-Tabelle pro Baustein.'

  - source: 'ORP.1'
    target: 'A.5.2'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      Im Forward-Mapping war A.5.2 'subset' von ORP.1 (Baustein bündelt mehr).
      Inverse Sicht: ORP.1 'Organisation' ist 'superset' von A.5.2 'Information
      security roles and responsibilities' — der Baustein definiert über die
      ISO-Rollenfestlegung hinaus auch Funktionstrennung, Vertretungsregelungen
      und organisatorische Verankerung.
    cross_refs: ['ISMS.1']
    audit_evidence_hint: 'Organigramm mit Sicherheitsrollen, Stellenbeschreibungen, RACI-Matrix gem. ORP.1.A2.'

  - source: 'DER.1'
    target: 'A.5.7'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      Im Forward-Mapping war A.5.7 'equivalent' zu DER.1. Inverse Sicht: DER.1
      'Detektion von sicherheitsrelevanten Ereignissen' deckt mit A.5.7 'Threat
      Intelligence' den gleichen Funktionsumfang ab — Sammeln, Analysieren und
      Verteilen von Bedrohungsinformationen sind in beiden Frameworks zentrale
      Teilaufgaben.
    cross_refs: ['A.8.16']
    audit_evidence_hint: 'Threat-Intel-Quellen-Liste (CERT-Bund, BSI-CERT), DER.1.A4 SIEM-Korrelationsregeln, Sharing-Protokolle der letzten 12 Monate.'

  - source: 'OPS.2.1'
    target: 'A.5.19'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      Im Forward-Mapping war A.5.19 'subset' von OPS.2.1 (Baustein bündelt mehr).
      Inverse Sicht: OPS.2.1 'Outsourcing für Kunden' ist 'superset' von A.5.19
      'Information security in supplier relationships' — der Baustein adressiert
      darüber hinaus Steuerung, Monitoring und Beendigung der Outsourcing-Beziehung.
    cross_refs: ['OPS.2.3', 'A.5.20', 'A.5.22']
    audit_evidence_hint: 'Supplier-Register mit Risk-Tier, Outsourcing-Steuerungs-Konzept gem. OPS.2.1.A1, Audit-Reports der letzten 24 Monate.'

  - source: 'OPS.2.2'
    target: 'A.5.23'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      Im Forward-Mapping war A.5.23 'equivalent' zu OPS.2.2. Inverse Sicht:
      OPS.2.2 'Cloud-Nutzung' deckt mit A.5.23 'Information security for use of
      cloud services' den gleichen Funktionsumfang ab — Cloud-Strategie,
      Anbieter-Auswahl, Vertragsgestaltung und Exit-Strategie sind in beiden
      Frameworks adressiert.
    audit_evidence_hint: 'Cloud-Nutzungs-Konzept gem. OPS.2.2.A1, Cloud-Provider-Bewertung, Exit-Strategie pro Cloud-Service.'

  - source: 'DER.2.1'
    target: 'A.5.24'
    relationship: 'superset'
    confidence: 'high'
    rationale: |
      Im Forward-Mapping war A.5.24 'subset' von DER.2.1 (ein Baustein bündelt
      A.5.24/25/26/27). Inverse Sicht: DER.2.1 'Behandlung von Sicherheits-
      vorfällen' ist 'superset' von A.5.24 'Incident management planning and
      preparation' — der Baustein deckt zusätzlich Bewertung, Reaktion und
      Lessons-Learned ab.
    cross_refs: ['A.5.25', 'A.5.26', 'A.5.27', 'A.6.8']
    audit_evidence_hint: 'Incident-Response-Plan, IR-Übungen, IR-Reports, DER.2.1.A1 Definition Sicherheitsvorfall.'

  - source: 'DER.4'
    target: 'A.5.30'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      Im Forward-Mapping war A.5.30 'equivalent' zu DER.4. Inverse Sicht: DER.4
      'Notfallmanagement' deckt mit A.5.30 'ICT readiness for business continuity'
      ICT-Notfallvorsorge auf gleichem Abstraktionsniveau ab. Vollständige BCM-
      Abdeckung gem. ISO 22301 erfordert allerdings BSI 200-4.
    cross_refs: ['A.5.29']
    gap_warning: |
      DER.4 deckt ICT-Notfall-Aspekte ab. Für vollständigen BCM-Nachweis (Krisen-
      management, Behörden-Kommunikation) ergänzend BSI 200-4 heranziehen.
    audit_evidence_hint: 'BC-Pläne mit ICT-Notfall-Teil, DER.4.A1 Notfallhandbuch, dokumentierte Tabletop-Übungen.'

  - source: 'CON.2'
    target: 'A.5.34'
