schema_version: '1.1'
library:
  type: mapping
  id: 'bsi-c5-2026_to_iso27017_v1.0'
  source_framework: 'BSI-C5-2026'
  target_framework: 'ISO27017'
  version: 1
  effective_from: '2026-05-06'
  effective_until: null

  provenance:
    primary_source: 'ISO/IEC 27017:2015 + BSI C5:2026 Cloud Computing Compliance Criteria Catalogue'
    primary_source_url: 'https://www.bsi.bund.de/EN/Themen/Unternehmen-und-Organisationen/Informationen-und-Empfehlungen/Empfehlungen-nach-Angriffszielen/Cloud-Computing/Kriterienkatalog-C5/'
    secondary_sources:
      - 'BSI C5:2026 final 2026-03-26 (168 Kriterien in 18 Bereichen)'
      - 'ISO/IEC 27017:2015 — Code of practice for information security controls based on ISO/IEC 27002 for cloud services'
      - 'ISO/IEC 27002:2013 (legacy reference catalogue used by ISO 27017)'
      - 'fixtures/library/mappings/iso27017_to_bsi-c5-2026_v1.0.yaml (Reverse-Mapping)'
    publisher: 'Little ISMS Helper Maintainers'
    license_note: 'Mapping is original derivative work (AGPL-3.0). C5:2026 IDs/titles © BSI 2026 (CC-BY-ND 4.0). ISO 27017:2015 / 27002:2013 IDs/titles © ISO.'

  methodology:
    type: 'text_comparison_with_expert_review'
    description: |
      Backward-Mapping BSI C5:2026 -> ISO/IEC 27017:2015. Diese Datei adressiert
      die Richtung C5:2026-Kriterium -> passende ISO 27017-Control (Cloud-CoP).

      Methodisches Vorgehen:
      1. Cloud-spezifische C5-Kriterien (PSS-*, INQ-*, PI-*, OPS-30, AM-07, etc.)
         werden auf CLD.*-Anchors aus ISO 27017 gemappt.
      2. General-IT-Kriterien (HR-*, COS-*, IAM-*, OPS-* ohne Cloud-Spezial)
         werden auf 27002:2013-Carryover-Controls in ISO 27017 gemappt.
      3. C5:2026-Kriterien ohne ISO-27017-Pendant (PSS-*, INQ-*, PI-*, GC,
         OIS-08 Threat-Intel, CRY-PQC, etc.) werden mit target=null und
         gap_warning markiert.

      Relationship-Logik analog zur Forward-Datei. Confidence-Verteilung:
      ~50% high, ~30% medium, ~20% low / null (Cloud-2026-Innovationen ohne
      27017-Pendant).

      Wichtige Anker:
      - PSS-11 (VM/Container Images) <-> CLD.9.5.2 + CLD.9.5.1
      - OPS-30 (Separation of Datasets) <-> CLD.9.5.1
      - OPS-26 (System Hardening) <-> CLD.9.5.2
      - OPS-13 (SIEM) <-> CLD.12.4.5
      - COS-01..08 (Network Security) <-> CLD.13.1.4
      - SSO-01 (Sub-Service-Org-Policies) <-> CLD.6.3.1
      - AM-07/08 (Decommissioning, Disposal) <-> CLD.8.1.5
      - IAM-06 (PAM) <-> CLD.12.1.5

  lifecycle:
    state: 'published'
    state_history:
      - { state: 'draft',     date: '2026-05-06', actor: 'maintainer' }
      - { state: 'published', date: '2026-05-06', actor: 'compliance-signoff' }

mappings:
  # ===== OIS — Organisation of Information Security =====
  - source: 'OIS-01'
    target: '5.1.1'
    relationship: 'partial_overlap'
    confidence: 'medium'
    rationale: |
      C5:2026 OIS-01 "ISMS" verlangt vollstaendiges ISO/IEC-27001-konformes
      ISMS. ISO 27017 verweist auf 27002:2013 5.1.1 (Policies); vollstaendige
      ISMS-Anforderungen sind ueber ISO 27001 Klauseln 4-10 abzudecken.
    gap_warning: |
      ISO 27017 ist Code-of-Practice, kein Management-System-Standard.
      Vollstaendige OIS-01-Abdeckung erfordert ISO 27001-Hauptdokument.

  - source: 'OIS-02'
    target: '5.1.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 OIS-02 "Information Security Policy" entspricht direkt
      ISO 27017 / 27002:2013 5.1.1 "Policies for information security".

  - source: 'OIS-03'
    target: 'CLD.6.3.1'
    relationship: 'equivalent'
    confidence: 'high'
    rationale: |
      C5:2026 OIS-03 "Interfaces and Dependencies" (Shared Responsibility
      Model) entspricht direkt ISO 27017 CLD.6.3.1 "Shared roles and
      responsibilities within a cloud computing environment".
    cross_refs: ['SSO-01']
    audit_evidence_hint: 'Shared-Responsibility-Matrix, RACI mit CSP/Tenant-Spalten.'

  - source: 'OIS-04'
