# Persona-driven screenshot catalogue
# Each persona has its own output directory (var/screenshots/<persona>/<theme>/).
# Routes derived from the persona-* skills (.claude/skills/persona-*).
# Paths verified against `php bin/console debug:router`.
#
# Field semantics:
#   path           — URL path (locale-prefixed where applicable)
#   wait           — CSS selector to wait for before screenshot (defaults to body)
#   full_page      — true = capture full scroll height, false = viewport only (default true)

config:
  themes: [light, dark]
  locale: de
  viewport:
    width: 1440
    height: 900
  default_wait: 'body'
  default_full_page: true

personas:

