  # control effectiveness, incident register, document register.
  # Notification ops (channels/rules/templates) belong to isb-practitioner.
  # ─────────────────────────────────────────────────────────────────
  isb-practitioner:
    label: "ISB / Security Officer"
    description: "Operative ISO-27001-Praxis, Audit-Trail, SoA, Risikoregister"
