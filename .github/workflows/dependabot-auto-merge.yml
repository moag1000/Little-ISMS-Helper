name: Dependabot Auto-Merge

# Mergt Dependabot-PRs automatisch wenn CI gruen ist:
#   - patch + minor: auto-merge ohne menschlichen Klick
#   - major: bleibt offen, braucht manuelle Pruefung (haeufig Breaking-Changes
#     in CI-Actions-API, Config-Format, oder Library-Defaults)
#
# Trigger: pull_request_target damit der Workflow auch fuer Forks-PRs den
# repo-eigenen GITHUB_TOKEN bekommt — bei Dependabot-PRs immer same-repo,
# also unkritisch.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-approve minor/patch updates
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review "$PR_URL" --approve

      - name: Enable auto-merge for minor/patch updates
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"

      - name: Note major-bump PR
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-major' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          echo "::notice::PR ${{ github.event.pull_request.number }} is a major bump (${{ steps.meta.outputs.dependency-names }} ${{ steps.meta.outputs.previous-version }} → ${{ steps.meta.outputs.new-version }}). Manual review required."
          gh pr comment "$PR_URL" --body 'Major-Bump erkannt — manuelle Pruefung erforderlich. Auto-Merge bleibt fuer minor/patch.'
