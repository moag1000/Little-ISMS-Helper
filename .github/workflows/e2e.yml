name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    name: Browser E2E (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_DATABASE: isms
          MARIADB_USER: isms_user
          MARIADB_PASSWORD: isms_password
          MARIADB_ROOT_PASSWORD: root_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: mysql://isms_user:isms_password@127.0.0.1:3306/isms?serverVersion=mariadb-11.0.0&charset=utf8mb4
      APP_ENV: dev
      APP_SECRET: e2e_secret_for_ci
      DEFAULT_URI: http://127.0.0.1:8000
      MAILER_DSN: null://null
      MESSENGER_TRANSPORT_DSN: sync://
      E2E_BASE_URL: http://127.0.0.1:8000
      # Tell the playwright webServer hook to skip its own boot — we boot
      # php's built-in server below to keep the workflow VM lean.
      E2E_NO_WEBSERVER: '1'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, pdo, pdo_mysql, gd, zip, opcache, mbstring, xml
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install Node dependencies
        run: npm ci || npm install

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json', 'package.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache-hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build dev database (entity-direct schema)
        run: |
          # Hard-reset for deterministic state. Mirrors the recipe used by the
          # PHPUnit job in ci.yml (which uses APP_ENV=test). E2E runs against
          # APP_ENV=dev so the persona-router / dashboards behave exactly as
          # they do for human testers.
          mysql -h 127.0.0.1 -u root -proot_password -e "DROP DATABASE IF EXISTS isms; CREATE DATABASE isms;"
          mysql -h 127.0.0.1 -u root -proot_password -e "GRANT ALL PRIVILEGES ON isms.* TO 'isms_user'@'%'; FLUSH PRIVILEGES;"
          php bin/console doctrine:schema:create
          php bin/console doctrine:migrations:sync-metadata-storage --no-interaction
          php bin/console doctrine:migrations:version --add --all --no-interaction
          touch config/setup_complete.lock
          cp config/active_modules.yaml.dist config/active_modules.yaml

      - name: Seed screenshot/E2E user
        run: php bin/console app:create-screenshot-user --force

      - name: Start PHP built-in server
        run: |
          php -S 127.0.0.1:8000 -t public public/index.php > var/server.log 2>&1 &
          # Wait for the server to come up before handing off to Playwright.
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/de/login -o /dev/null; then
              echo "Server is up after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: var/playwright-report
          retention-days: 14

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: var/playwright-results
          retention-days: 14

      - name: Upload server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: var/server.log
          retention-days: 7
