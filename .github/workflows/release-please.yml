name: Release Please

# Sammelt Conventional-Commits auf main, oeffnet/aktualisiert einen
# Release-PR mit auto-generiertem CHANGELOG.md + Version-Bumps in
# composer.json + .release-please-manifest.json. Merge des PRs erzeugt
# Tag + GitHub Release. Aufgesetzt 2026-04-30 zur Stabilisierung der
# Release-Cadence (siehe CONTRIBUTING.md).

on:
  push:
    branches:
      - main
  # Manueller Trigger noetig wenn Auto-Merge-Workflow den Squash-Commit
  # mit GITHUB_TOKEN gepusht hat — solche Pushes triggern downstream
  # Workflows aus Sicherheitsgruenden nicht automatisch (GitHub-Schutz
  # vor Infinite-Loops). Workaround bis PAT-basierter Token konfiguriert
  # ist: Actions-UI → "Release Please" → Run workflow.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # Pull config + manifest aus Repo-Root.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Optional: use a fine-grained PAT instead of GITHUB_TOKEN so
          # the tag push fires downstream workflows (Docker build/push,
          # release-asset uploads). With GITHUB_TOKEN, GitHub's loop-
          # prevention silently drops the tag-push trigger on `ci.yml`
          # `on.push.tags`, leaving Docker Hub stale until a human
          # re-pushes the tag (see 3.5.0 release post-mortem).
          # Set up: Settings → Developer settings → Fine-grained tokens
          # → Repo-scoped, permissions: contents:write + pull-requests:
          # write. Store as repo secret `RELEASE_PLEASE_PAT`, then
          # uncomment:
          # token: ${{ secrets.RELEASE_PLEASE_PAT }}
