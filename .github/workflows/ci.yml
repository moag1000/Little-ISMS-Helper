name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'claude/**', 'release-please--**' ]
    tags:
      - 'v*.*.*'  # Trigger on version tags for Docker releases
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  security-events: write  # Required for Trivy SARIF upload
  actions: read

env:
  # Opt into Node.js 24 for all actions that haven't migrated yet.
  # Removes the persistent "actions/checkout@v6 running on Node 20"
  # deprecation warnings from Security Checks / Code Quality / Tests
  # / Docker Build & Push. Becomes default on June 2nd 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    name: Tests (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.4']

    services:
      mariadb:
        image: mariadb:11
        env:
          # Create both isms and isms_test databases
          # Doctrine adds '_test' suffix in test env, so 'isms' becomes 'isms_test'
          MARIADB_DATABASE: isms
          MARIADB_USER: isms_user
          MARIADB_PASSWORD: isms_password
          MARIADB_ROOT_PASSWORD: root_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: intl, pdo, pdo_mysql, gd, zip, opcache, mbstring, xml
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Check PHP syntax
        run: find src tests -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Create test database
        run: |
          # Create isms_test database and grant permissions using root
          mysql -h 127.0.0.1 -u root -proot_password -e "CREATE DATABASE IF NOT EXISTS isms_test;"
          mysql -h 127.0.0.1 -u root -proot_password -e "GRANT ALL PRIVILEGES ON isms_test.* TO 'isms_user'@'%';"
          mysql -h 127.0.0.1 -u root -proot_password -e "FLUSH PRIVILEGES;"

      - name: Build test database (hard-reset, entity-direct schema)
        env:
          DATABASE_URL: mysql://isms_user:isms_password@127.0.0.1:3306/isms?serverVersion=mariadb-11.0.0&charset=utf8mb4
          APP_ENV: test
          APP_SECRET: test_secret_for_ci
        run: |
          # Hard-reset: drop + recreate test-DB so every run starts deterministic.
          # Migration-only setup hits 229+ entity-vs-DB drift statements caused by
          # legacy PREPARE/EXECUTE migrations (CLAUDE.md pitfall #6) and 1832 FK-blocked
          # ALTER COLUMNs. Bypass migrations in test env — build schema directly from
          # entity-metadata for guaranteed parity.
          mysql -h 127.0.0.1 -u root -proot_password -e "DROP DATABASE IF EXISTS isms_test; CREATE DATABASE isms_test;"
          mysql -h 127.0.0.1 -u root -proot_password -e "GRANT ALL PRIVILEGES ON isms_test.* TO 'isms_user'@'%'; FLUSH PRIVILEGES;"

          # Build schema directly from entity-metadata (no migrations, no drift).
          php bin/console doctrine:schema:create --env=test

          # Initialize the doctrine_migration_versions table (schema:create skips it).
          php bin/console doctrine:migrations:sync-metadata-storage --no-interaction --env=test

          # Mark all migrations as already-executed so any code path that triggers
          # `migrations:migrate` during tests sees "no pending" and skips silently.
          php bin/console doctrine:migrations:version --add --all --no-interaction --env=test

          # Mark setup as complete to bypass setup wizard redirect
          touch config/setup_complete.lock

      - name: Run PHPUnit tests
        env:
          DATABASE_URL: mysql://isms_user:isms_password@127.0.0.1:3306/isms?serverVersion=mariadb-11.0.0&charset=utf8mb4
          APP_ENV: test
          APP_SECRET: test_secret_for_ci
          DEFAULT_URI: http://localhost
          MAILER_DSN: null://null
          MESSENGER_TRANSPORT_DSN: sync://
        run: php bin/phpunit --coverage-text --coverage-clover=coverage.xml

      - name: Check Code Coverage Threshold
        if: matrix.php-version == '8.4'
        run: |
          echo "Checking test coverage threshold..."
          COVERAGE=$(php -r '$xml = simplexml_load_file("coverage.xml"); $metrics = $xml->project->metrics; $percentage = round(($metrics["coveredstatements"] / $metrics["statements"]) * 100, 2); echo $percentage;')
          echo "Current coverage: $COVERAGE%"

          THRESHOLD=40
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "❌ Coverage ($COVERAGE%) is below threshold ($THRESHOLD%)"
            echo "::warning::Code coverage is below $THRESHOLD%. Current: $COVERAGE%. Target: 60%"
            # Don't fail the build yet, just warn
            exit 0
          else
            echo "✅ Coverage ($COVERAGE%) meets threshold ($THRESHOLD%)"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: matrix.php-version == '8.4'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, pdo, pdo_pgsql, gd, zip
          tools: composer:v2, phpstan, php-cs-fixer

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHP CS Fixer (dry-run)
        run: |
          if [ -f vendor/bin/php-cs-fixer ]; then
            vendor/bin/php-cs-fixer fix --dry-run --diff
          else
            echo "PHP CS Fixer not available, skipping"
          fi
        continue-on-error: true

      - name: Run PHPStan
        run: |
          if [ -f vendor/bin/phpstan ]; then
            vendor/bin/phpstan analyse --configuration phpstan.dist.neon --no-progress
          else
            echo "PHPStan not available, skipping"
          fi

      # FairyAurora v3.0 — A11y-Kontrast-Gate (WCAG 2.2 AA)
      - name: FairyAurora A11y Contrast Audit
        run: |
          if [ -f .claude/fairy-aurora/a11y_contrast_audit.py ]; then
            python3 .claude/fairy-aurora/a11y_contrast_audit.py
          else
            echo "A11y audit script not found — skipping"
          fi

      # Twig Macro-Scope Gate — catches {% import %} at file-scope used inside {% block %}
      # (lint:twig does NOT catch this; fails at render-time with "Variable does not exist")
      - name: Twig Macro-Scope Check
        run: python3 scripts/quality/check_twig_macro_scope.py

      # DQL Field Mismatch Gate — catches QueryBuilder references to non-existent entity fields
      - name: DQL Field Mismatch Check
        run: php scripts/quality/check-dql-mismatches.php

      # ── Repo Quality Gates ─────────────────────────────────────────────────
      # 8 static-analysis gates that catch common bug-patterns at PR-time.
      # Each gate exits 0 (clean) or 1 (violations). Blocking gates fail
      # the whole job; warn-only gates use continue-on-error: true.
      #
      # Gate 1 — Twig macro import-order (BLOCKING)
      #   Detects macro usage before the first import appears in the file.
      #   Prevents: 'Variable "_fa_xxx" does not exist' runtime errors.
      #   Embed-scope isolation is handled by Twig Macro-Scope Check above.
      - name: "Gate 1: Twig macro import-order"
        run: python3 scripts/quality/check_twig_macro_imports.py

      # Gate 2 — Embed-block trans_default_domain (WARN-ONLY for now)
      #   Detects {% embed %} blocks using |trans without their own
      #   {% trans_default_domain %} directive. 44 pre-existing violations
      #   in templates/ being resolved separately; becomes blocking once
      #   legacy violations are cleared.
      - name: "Gate 2: Embed-block trans_default_domain"
        run: python3 scripts/quality/check_twig_embed_domain.py
        continue-on-error: true

      # Gate 3 — MariaDB-11 reserved-words in migrations (BLOCKING)
      #   Detects unquoted ROW_NUMBER/RANK/WINDOW/OVER/etc. as column names.
      #   Prevents: ERROR 1064 syntax errors during migration on MariaDB 11.
      - name: "Gate 3: MariaDB-11 reserved-words in migrations"
        run: bash scripts/quality/check_migration_reserved_words.sh

      # Gate 4 — DDL-migrations isTransactional()=false (BLOCKING)
      #   Only enforced for migrations created on/after 2026-05-08.
      #   83 pre-existing legacy migrations are exempt (cutoff documented in script).
      #   Prevents: SAVEPOINT errors when running multiple DDL migrations.
      - name: "Gate 4: DDL-migrations isTransactional()=false"
        run: bash scripts/quality/check_migration_transactional.sh

      # Gate 5 — Aurora v4 anti-patterns on cards (WARN-ONLY for now)
      #   Detects Bootstrap bg-*/text-white on .card/.card-header.
      #   8 pre-existing violations in templates/ being resolved separately.
      - name: "Gate 5: Aurora anti-patterns on cards"
        run: python3 scripts/quality/check_aurora_anti_patterns.py
        continue-on-error: true

      # Gate 6 — Missing translation keys (BLOCKING for high-priority domains)
      #   Pure-Python YAML-diff between <domain>.de.yaml and <domain>.en.yaml.
      #   Replaced the previous shell wrapper around `bin/console
      #   debug:translation` which cold-started the Symfony kernel 12 times
      #   sequentially (~12-24s). Python implementation runs in <1s.
      #   Full-domain check: ALL_DOMAINS=1 python3 scripts/quality/check_missing_translations.py
      - name: "Gate 6: Missing translation keys"
        run: python3 scripts/quality/check_missing_translations.py

      # Gate 7 — Competitor-names in source/templates/translations (BLOCKING)
      #   Detects Vanta/Drata/Probo/Verinice/HiScout/etc. in codebase.
      #   Per memory feedback_no_competitor_names.
      - name: "Gate 7: No competitor names"
        run: bash scripts/quality/check_no_competitor_names.sh

      # Gate 8 — Double /{_locale}/ prefix in Controller routes (BLOCKING)
      #   config/routes.yaml wraps src/Controller/ in prefix /{_locale} globally.
      #   Adding /{_locale}/ in #[Route(...)] produces /{_locale}/{_locale}/...
      #   which Symfony refuses to compile — cache:clear fails, app does not boot.
      #   Per memory feedback_locale_in_links.
      - name: "Gate 8: No double /{_locale}/ prefix in controllers"
        run: python3 scripts/quality/check_double_locale_prefix.py

      # Gate 9 — Alva-Hint translation placeholder consistency (BLOCKING)
      #   Verifies every %placeholder% in alva.de/en.yaml title/body strings
      #   is declared in the rule's bodyTranslationParams. Missing params would
      #   leak raw "%foo%" tokens into the rendered hint card UI.
      - name: "Gate 9: Alva-Hint placeholder consistency"
        run: python3 scripts/quality/check_alva_hint_placeholders.py

      # Gate 10 — Wildcard route collision detection (BLOCKING)
      #   Detects routes where a /{placeholder} wildcard without a restrictive
      #   requirement appears BEFORE literal-segment sibling routes in the same
      #   controller. Symfony matches attribute routes in source-code order, so
      #   an unrestricted /{id} greedily matches /new or /approvals, passing the
      #   literal string to EntityValueResolver → NotFoundHttpException (404).
      #   Fix: add requirements: ['id' => '\d+'] (or enum for slug placeholders)
      #   to every flagged wildcard route. Root cause of the user-reported
      #   IdentityProvider-not-found 404 on /admin/sso/new.
      - name: "Gate 10: No wildcard-vs-literal route collisions"
        run: python3 scripts/quality/check_route_wildcard_collisions.py

      # ── Pattern-Discipline Gates (Audit-S5) ────────────────────────────────
      # Three static analyzers enforcing Foundation patterns from
      # var/junior-isb-audit/SOLUTIONS_FOUNDATION.md. Pre-existing violations
      # are captured in scripts/quality/baselines/*.txt; remove an entry once
      # the underlying issue is migrated. Annotation overrides documented in
      # each script's header.
      #
      # Gate 11 — Module-gating discipline (P-6, BLOCKING via baseline)
      #   Verifies regulatory fields (DORA/LkSG/MaRisk/NIS2/TISAX/GDPR) live
      #   inside an isModuleActive() block, addModuleGatedField() call, or a
      #   safe-helper method. Annotation: // @no-module-gate-required: <why>.
      - name: "Gate 11: Module-gating discipline (P-6)"
        run: python3 scripts/quality/check_module_gating.py --baseline scripts/quality/baselines/module_gating.txt --quiet

      # Gate 12 — Flash translation-domain (P-5, BLOCKING via baseline)
      #   Stops $this->translator->trans('key') without an explicit domain
      #   parameter in controllers. Annotation: // @flash-domain-fallback-ok.
      - name: "Gate 12: Flash translation-domain (P-5)"
        run: python3 scripts/quality/check_flash_domain.py --baseline scripts/quality/baselines/flash_domain.txt --quiet

      # Gate 13 — Freetext-legacy heuristic (P-15, STRICT-via-baseline)
      #   Flags TextType/TextareaType fields whose name signals an existing
      #   entity should be used (auditor/owner/department/etc.). Baseline
      #   captures 14 pre-existing migration targets. Annotation:
      #   // @legacy-freetext: <reason>.
      - name: "Gate 13: Freetext-legacy heuristic (P-15)"
        run: python3 scripts/quality/check_freetext_legacy.py --baseline scripts/quality/baselines/freetext_legacy.txt --strict --quiet

      # Gate 14 — Workflow configs valid (lifecycle-foundation, BLOCKING)
      #   Runs cache:clear --env=test (catches unsupported supports-class errors)
      #   then workflow:dump for every config/workflows/*.yaml state-machine.
      - name: "Gate 14: Workflow configs valid"
        run: ./scripts/quality/check_workflow_configs.sh

      # ── Sprint Quality Gates (round 2 — bug-classes from last sweep) ──────
      # 14 new gates, each baselined for `main` HEAD. Remove a baseline entry
      # once the underlying issue is fixed.
      - name: "Gate 15: Aurora icon-name validity"
        run: python3 scripts/quality/check_aurora_icon_names.py --baseline scripts/quality/baselines/aurora_icon_names.txt --quiet
      - name: "Gate 16: No Bootstrap-Icons bi-* classes"
        run: python3 scripts/quality/check_no_bi_classes.py --baseline scripts/quality/baselines/no_bi_classes.txt --quiet
      - name: "Gate 17: No nested <form> tags"
        run: python3 scripts/quality/check_nested_forms.py --baseline scripts/quality/baselines/nested_forms.txt --quiet
      - name: "Gate 18: #[Route] requires methods: arg"
        run: python3 scripts/quality/check_route_methods.py --baseline scripts/quality/baselines/route_methods.txt --quiet
      - name: "Gate 19: Forbid legacy Routing\\Annotation\\Route import"
        run: python3 scripts/quality/check_legacy_route_import.py --baseline scripts/quality/baselines/legacy_route_import.txt --quiet
      - name: "Gate 20: DDL migrations need isTransactional()=false"
        run: python3 scripts/quality/check_ddl_transactional.py --baseline scripts/quality/baselines/ddl_transactional.txt --quiet
      - name: "Gate 21: Bool-property accessor mismatch"
        run: python3 scripts/quality/check_bool_accessor_usage.py --baseline scripts/quality/baselines/bool_accessor_usage.txt --quiet
      - name: "Gate 22: Forbid generic exception throws"
        run: python3 scripts/quality/check_no_generic_throws.py --baseline scripts/quality/baselines/no_generic_throws.txt --quiet
      - name: "Gate 23: Translation dynamic-key prefix registry"
        run: python3 scripts/quality/check_translation_dynamic_keys.py --quiet
      - name: "Gate 24: AuditLog must set tenant"
        run: python3 scripts/quality/check_audit_log_tenant.py --baseline scripts/quality/baselines/audit_log_tenant.txt --quiet
      - name: "Gate 25: God-class size (soft-fail via baseline)"
        run: python3 scripts/quality/check_god_class_size.py --baseline scripts/quality/baselines/god_class_size.txt --quiet
      - name: "Gate 26: Translation top-level keys match domain"
        run: python3 scripts/quality/check_translation_nesting.py --baseline scripts/quality/baselines/translation_nesting.txt --quiet
      - name: "Gate 27: No EntityManager writes in controllers"
        run: python3 scripts/quality/check_em_writes_in_controller.py --baseline scripts/quality/baselines/em_writes_in_controller.txt --quiet
      - name: "Gate 28: #[CurrentUser] action test-arg count"
        run: python3 scripts/quality/check_currentuser_test_args.py --baseline scripts/quality/baselines/currentuser_test_args.txt --quiet

      # ── Sprint Quality Gates (round 3 — sweep-aftermath gates) ────────────
      # Caught real bugs at introduction time.
      - name: "Gate 29: Form-render-completeness (fields flowing past submit)"
        run: python3 scripts/quality/check_form_render_completeness.py --baseline scripts/quality/baselines/form_render_completeness.txt --quiet
      - name: "Gate 30: Twig macro positional-arg arity"
        run: python3 scripts/quality/check_macro_arg_arity.py --baseline scripts/quality/baselines/macro_arg_arity.txt --quiet
      - name: "Gate 31: Nested Twig print-expr inside string-literal macro args"
        run: python3 scripts/quality/check_nested_twig_in_string.py --baseline scripts/quality/baselines/nested_twig_in_string.txt --quiet
      - name: "Gate 32: #[ORM\\Version] columns require explicit type + name"
        run: python3 scripts/quality/check_version_column_explicit.py --baseline scripts/quality/baselines/version_column_explicit.txt --quiet
      - name: "Gate 33: No PREPARE/EXECUTE dynamic SQL in migrations"
        run: python3 scripts/quality/check_no_prepare_execute_migrations.py --baseline scripts/quality/baselines/no_prepare_execute_migrations.txt --quiet
      - name: "Gate 34: No raw TextareaType for JSON+array entity columns"
        run: python3 scripts/quality/check_raw_json_textarea.py --baseline scripts/quality/baselines/raw_json_textarea.txt --quiet

      # ── Sprint Quality Gates (round 4 — 21-day fix-pattern audit) ─────────
      - name: "Gate 35: No Bootstrap size utilities on Aurora components"
        run: python3 scripts/quality/check_aurora_utility_misuse.py --baseline scripts/quality/baselines/aurora_utility_misuse.txt --quiet
      - name: "Gate 36: #[Route] paths must not have trailing slash"
        run: python3 scripts/quality/check_route_trailing_slash.py --baseline scripts/quality/baselines/route_trailing_slash.txt --quiet
      - name: "Gate 37: No non-portable DQL date functions"
        run: python3 scripts/quality/check_dql_non_portable.py --baseline scripts/quality/baselines/dql_non_portable.txt --quiet
      - name: "Gate 40: _auto_form include requires explicit field whitelist"
        run: python3 scripts/quality/check_auto_form_field_whitelist.py --baseline scripts/quality/baselines/auto_form_field_whitelist.txt --quiet
      # ── End Repo Quality Gates ─────────────────────────────────────────────

      # Hadolint — Dockerfile best-practice linting
      # Catches typical smells (apt-get install without --no-install-recommends,
      # missing pinned versions, root-as-default user, etc.)
      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          # severity: only fail on errors, warnings reported but non-blocking
          failure-threshold: error
          # ignore rules our setup intentionally violates
          ignore: DL3008,DL3015,DL3018
        continue-on-error: true

  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Security Check
        uses: symfonycorp/security-checker-action@v5

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    # Only build Docker images on release tags (v1.6.0, v2.0.0, etc.)
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU for multi-architecture builds
        uses: docker/setup-qemu-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/little-isms-helper
          # Tagging strategy:
          #   Stable tag (e.g. v3.4.0)        → :3.4.0, :3.4, :latest
          #   Dev tag    (e.g. v3.4.0-dev.1)  → :3.4.0-dev.1, :dev   (NO :latest, NO :3.4)
          #   RC tag     (e.g. v3.4.0-rc.1)   → :3.4.0-rc.1, :rc     (NO :latest, NO :3.4)
          # The dash check (`!contains(ref_name, '-')`) is the canonical SemVer
          # pre-release marker — no dash = stable release.
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=sha
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
            type=raw,value=dev,enable=${{ contains(github.ref_name, '-dev.') }}
            type=raw,value=rc,enable=${{ contains(github.ref_name, '-rc.') }}
          labels: |
            org.opencontainers.image.title=Little ISMS Helper
            org.opencontainers.image.description=Webbasierte ISMS-Lösung für ISO 27001:2022 Compliance, Risiko- und BCM-Management
            org.opencontainers.image.vendor=Little ISMS Helper Project
            org.opencontainers.image.licenses=AGPL-3.0-or-later
            org.opencontainers.image.documentation=https://github.com/moag1000/Little-ISMS-Helper/blob/main/README.md
            maintainer=Little ISMS Helper Project

      - name: Build and Push Docker image (production)
        id: docker-build
        uses: docker/build-push-action@v7
        timeout-minutes: 60
        with:
          context: .
          target: production
          # Multi-arch build: AMD64 for servers, ARM64 for Raspberry Pi and Apple Silicon
          # Switched from Alpine to Debian Bookworm to avoid QEMU/busybox compatibility issues
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          # Software Bill of Materials (SBOM) — required for ISO 27001 A.5.21
          # supply-chain transparency + BSI C5 DEV-08. Embedded into the OCI
          # manifest as an SPDX attestation.
          sbom: true
          # SLSA Provenance (build attestation) — proves *which* CI workflow built
          # this image from *which* source commit. Cuts supply-chain attack risk.
          provenance: mode=max
          build-args: |
            BUILDKIT_PROGRESS=plain

      - name: Get first Docker tag for Trivy scan
        id: trivy-tag
        run: |
          FIRST_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          echo "tag=$FIRST_TAG" >> $GITHUB_OUTPUT
          echo "Scanning Docker image: $FIRST_TAG"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ steps.trivy-tag.outputs.tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Check if Trivy results exist
        id: trivy-results
        run: |
          if [ -f trivy-results.sarif ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: steps.trivy-results.outputs.exists == 'true'
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Test Docker Compose
        timeout-minutes: 15
        run: |
          # Validate compose configuration
          docker compose config

          # Build and start services (this will reuse cached layers from previous builds)
          echo "Starting Docker Compose services..."
          COMPOSE_HTTP_TIMEOUT=600 docker compose up -d --wait --wait-timeout 540 || {
            echo "::error::Docker Compose --wait failed; dumping deep diagnostics"
            docker compose ps
            echo "=== APP CONTAINER LOGS (last 200) ==="
            docker compose logs app --tail=200
            echo "=== DB LOGS ==="
            docker compose logs db --tail=50
            echo "=== APP CONTAINER STATE ==="
            docker inspect isms-app --format '{{json .State}}' || true
            echo "=== HEALTHCHECK LAST OUTPUT ==="
            docker inspect isms-app --format '{{range .State.Health.Log}}--- exit={{.ExitCode}} @ {{.Start}} ---{{"\n"}}{{.Output}}{{"\n"}}{{end}}' || true
            echo "=== PROCESSES IN APP ==="
            docker compose exec -T app ps aux || true
            echo "=== NGINX ERROR LOG ==="
            docker compose exec -T app cat /var/log/nginx/error.log 2>&1 || true
            echo "=== NGINX ACCESS LOG (last 50) ==="
            docker compose exec -T app tail -50 /var/log/nginx/access.log 2>&1 || true
            echo "=== PHP-FPM LOGS ==="
            docker compose exec -T app sh -c 'cat /var/log/php*.log 2>&1 || true; cat /var/log/supervisor/*.log 2>&1 || true' || true
            echo "=== APP .ENV.LOCAL ==="
            docker compose exec -T app cat /var/www/html/.env.local 2>&1 || true
            echo "=== APP DATABASE_URL FROM ENV ==="
            docker compose exec -T app sh -c 'echo "DATABASE_URL=$DATABASE_URL"; echo "EMBEDDED_DB=$EMBEDDED_DB"' || true
            echo "=== TRY HEALTH MANUALLY ==="
            docker compose exec -T app curl -i http://localhost/de/health 2>&1 || true
            docker compose exec -T app curl -i http://localhost/health 2>&1 || true
            exit 1
          }

          # Show container status
          echo "Container status:"
          docker compose ps

          # Check if app container is healthy
          APP_HEALTH=$(docker inspect --format='{{.State.Health.Status}}' isms-app 2>/dev/null || echo "unknown")
          echo "App container health status: $APP_HEALTH"

          if [ "$APP_HEALTH" != "healthy" ]; then
            echo "App container is NOT healthy. Showing detailed logs:"
            echo "=== APP CONTAINER LOGS ==="
            docker compose logs app --tail=100
            echo "=== DATABASE LOGS ==="
            docker compose logs db --tail=50
            echo "=== MAILER LOGS ==="
            docker compose logs mailhog --tail=50
            echo "=== CHECKING PROCESSES IN APP CONTAINER ==="
            docker compose exec -T app ps aux || true
            echo "=== CHECKING NGINX ERROR LOG ==="
            docker compose exec -T app cat /var/log/nginx/error.log || true
            echo "=== CHECKING PHP-FPM LOG ==="
            docker compose exec -T app cat /var/log/php*.log || true
            exit 1
          fi

          # Test if app container can run PHP
          echo "Testing app container..."
          if ! docker compose exec -T app php --version 2>/dev/null; then
            echo "App container check failed. Showing logs:"
            docker compose logs app --tail=100
            exit 1
          fi

          echo "Docker Compose test successful!"
          docker compose down -v

      - name: Upload Logo & README to Docker Hub
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          chmod +x .github/scripts/upload-dockerhub-logo.sh
          .github/scripts/upload-dockerhub-logo.sh \
            "${{ secrets.DOCKERHUB_USERNAME }}" \
            "little-isms-helper" \
            "${{ secrets.DOCKERHUB_TOKEN }}" \
            "public/logo-512.png" \
            "README.md" || echo "⚠️ Docker Hub update failed, but continuing..."
        continue-on-error: true
