<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Alvara · Anmelden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body { margin: 0; background: #0a0e1a; color: #e9eaf5; font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  button { font-family: inherit; }
  input::placeholder { color: #6d6f99; }
  a:hover { opacity: 0.8; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="./tokens.jsx"></script>
<script type="text/babel" src="./Icons.jsx"></script>
<script type="text/babel" src="./Fairies.jsx"></script>
<script type="text/babel" src="./Shell.jsx"></script>
<script type="text/babel">
/* global React, ReactDOM, T, FONT_SANS, FONT_MONO, Icon, FairyAurora, TechBackdrop, Brand, CyberButton, CyberInput */

function LoginFairy() {
  return (
    <div style={{position:'relative', width: 200, height: 200, display:'flex', alignItems:'center', justifyContent:'center'}}>
      <div style={{position:'absolute', inset: 30, background: `radial-gradient(circle, ${T.accentGlow} 0%, transparent 70%)`, filter:'blur(8px)', animation:'fairy-pulse 3.5s ease-in-out infinite'}}/>
      <svg style={{position:'absolute', inset: 0, animation:'fairy-orbit 18s linear infinite'}} width="200" height="200" viewBox="0 0 200 200">
        <circle cx="100" cy="16" r="2" fill={T.accent} opacity="0.8"/>
        <circle cx="184" cy="100" r="1.5" fill={T.primary} opacity="0.7"/>
        <circle cx="100" cy="184" r="1.2" fill={T.accent} opacity="0.5"/>
        <circle cx="16"  cy="100" r="1.8" fill={T.primary} opacity="0.6"/>
      </svg>
      <FairyAurora size={140} tokens={T.fairyTokens} tone="dark" />
      <style>{`
        @keyframes fairy-pulse { 0%, 100% { opacity: 0.55; transform: scale(1); } 50% { opacity: 0.9; transform: scale(1.1); } }
        @keyframes fairy-orbit { to { transform: rotate(360deg); } }
        @keyframes caret { 50% { opacity: 0; } }
      `}</style>
    </div>
  );
}

function App() {
  const [email, setEmail] = React.useState('');
  const [pass, setPass] = React.useState('');
  const [remember, setRemember] = React.useState(true);
  const [loading, setLoading] = React.useState(false);

  const submit = (e) => {
    e.preventDefault();
    setLoading(true);
    setTimeout(() => { window.location.href = '../dashboard/dashboard.html'; }, 800);
  };

  return (
    <div style={{display:'flex', minHeight:'100vh', minWidth: 1440, color: T.fg, fontFamily: FONT_SANS}}>
      {/* Left — Alva */}
      <aside style={{
        width: 560, flexShrink: 0, position:'relative',
        background: `linear-gradient(180deg, ${T.surface} 0%, ${T.bg} 100%)`,
        borderRight: `1px solid ${T.border}`,
        display:'flex', flexDirection:'column', padding: 40, overflow:'hidden',
      }}>
        <TechBackdrop intensity={0.9}/>
        <span style={{position:'absolute', top: 16, left: 16, width: 12, height: 12, borderTop:`1px solid ${T.primary}`, borderLeft:`1px solid ${T.primary}`}}/>
        <span style={{position:'absolute', top: 16, right: 16, width: 12, height: 12, borderTop:`1px solid ${T.primary}`, borderRight:`1px solid ${T.primary}`}}/>
        <span style={{position:'absolute', bottom: 16, left: 16, width: 12, height: 12, borderBottom:`1px solid ${T.primary}`, borderLeft:`1px solid ${T.primary}`}}/>
        <span style={{position:'absolute', bottom: 16, right: 16, width: 12, height: 12, borderBottom:`1px solid ${T.primary}`, borderRight:`1px solid ${T.primary}`}}/>

        <div style={{position:'relative', zIndex: 1}}>
          <Brand size="lg" />
        </div>

        <div style={{flex: 1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', position:'relative', zIndex: 1, gap: 16}}>
          <LoginFairy />
          <div style={{textAlign:'center', maxWidth: 360}}>
            <div style={{fontFamily: FONT_MONO, fontSize: 10, letterSpacing:'0.15em', textTransform:'uppercase', color: T.accent, marginBottom: 12, display:'flex', alignItems:'center', justifyContent:'center', gap: 8}}>
              <span style={{width: 14, height: 1, background: T.accent}}/>
              Alva · Begleiterin
              <span style={{width: 14, height: 1, background: T.accent}}/>
            </div>
            <div style={{color: T.fg, fontSize: 22, fontWeight: 500, lineHeight: 1.3, letterSpacing: -0.3}}>
              Willkommen zurück.
            </div>
            <div style={{color: T.fg3, fontSize: 13, marginTop: 10, fontStyle:'italic', lineHeight: 1.5}}>
              Drei Dinge warten heute auf dich — aber erst mal hereinspazieren.
            </div>
          </div>
        </div>

        <div style={{position:'relative', zIndex: 1, fontFamily: FONT_MONO, fontSize: 10, letterSpacing:'0.1em', color: T.fg3, display:'flex', justifyContent:'space-between'}}>
          <span>© Alvara GmbH</span>
          <span>ISO 27001 · SOC 2 Typ II</span>
        </div>
      </aside>

      {/* Right — Login form */}
      <main style={{flex: 1, display:'flex', flexDirection:'column', background: T.bg, padding:'40px 64px'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <div style={{fontFamily: FONT_MONO, fontSize: 10, letterSpacing:'0.1em', textTransform:'uppercase', color: T.fg3, display:'flex', alignItems:'center', gap: 8}}>
            <span style={{width: 5, height: 5, borderRadius:'50%', background: T.success, boxShadow:`0 0 6px ${T.success}`}}/>
            Verbindung · eu-central-1 · TLS 1.3
          </div>
          <div style={{display:'flex', gap: 20, fontFamily: FONT_MONO, fontSize: 10, color: T.fg3}}>
            <a href="onboarding.html" style={{color: T.fg3, textDecoration:'none'}}>Installer</a>
            <a href="#" style={{color: T.fg3, textDecoration:'none'}}>Hilfe</a>
            <span>DE · EN</span>
          </div>
        </div>

        <div style={{flex: 1, display:'flex', alignItems:'center', justifyContent:'center'}}>
          <form onSubmit={submit} style={{width: 400, display:'flex', flexDirection:'column', gap: 22}}>
            <div>
              <div style={{fontFamily: FONT_MONO, fontSize: 10, letterSpacing:'0.12em', textTransform:'uppercase', color: T.accent}}>
                Anmeldung
              </div>
              <div style={{color: T.fg, fontSize: 26, fontWeight: 600, letterSpacing: -0.5, marginTop: 8, lineHeight: 1.2}}>
                Bei Alvara anmelden
              </div>
              <div style={{color: T.fg2, fontSize: 13, marginTop: 8, lineHeight: 1.5}}>
                Nutze deine Organisations-E-Mail. Kein Zugang? Wende dich an deinen ISMS-Verantwortlichen.
              </div>
            </div>

            <CyberInput label="E-Mail" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="vorname.nachname@firma.de" required />
            <CyberInput label="Passwort" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="············" required />

            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', fontFamily: FONT_MONO, fontSize: 11, color: T.fg3}}>
              <label style={{display:'flex', alignItems:'center', gap: 8, cursor:'pointer'}}>
                <input type="checkbox" checked={remember} onChange={e=>setRemember(e.target.checked)} style={{accentColor: T.primary}}/>
                Angemeldet bleiben
              </label>
              <a href="#" style={{color: T.accent, textDecoration:'none'}}>Passwort vergessen?</a>
            </div>

            <CyberButton type="submit" disabled={loading}>{loading ? 'Melde an…' : 'Anmelden →'}</CyberButton>

            <div style={{display:'flex', alignItems:'center', gap: 10, margin:'6px 0', color: T.fg3, fontFamily: FONT_MONO, fontSize: 10, letterSpacing:'0.1em'}}>
              <span style={{flex: 1, height: 1, background: T.border}}/>
              ODER
              <span style={{flex: 1, height: 1, background: T.border}}/>
            </div>

            <button type="button" style={{
              padding:'11px 16px', background:'transparent', color: T.fg,
              border:`1px solid ${T.border}`, borderRadius: 3, cursor:'pointer',
              fontFamily: FONT_MONO, fontSize: 11, letterSpacing:'0.1em', textTransform:'uppercase',
              display:'flex', alignItems:'center', justifyContent:'center', gap: 10,
            }}>
              <span style={{fontFamily: FONT_MONO, color: T.accent}}>◈</span>
              Single Sign-On (SAML / OIDC)
            </button>

            <div style={{
              marginTop: 10, padding: 12,
              background: T.surface, border: `1px solid ${T.border}`, borderLeft:`2px solid ${T.accent}`,
              borderRadius: 3, fontSize: 12, color: T.fg2, lineHeight: 1.5,
              display:'flex', gap: 10,
            }}>
              <span style={{fontSize: 14, color: T.accent}}>✦</span>
              <div>
                Neu hier? Das System wurde noch nicht eingerichtet —{' '}
                <a href="onboarding.html" style={{color: T.accent, textDecoration:'underline'}}>zum Installer</a>.
              </div>
            </div>
          </form>
        </div>

        <div style={{fontFamily: FONT_MONO, fontSize: 10, color: T.fg3, letterSpacing:'0.08em', display:'flex', justifyContent:'space-between'}}>
          <span>Build 2024.11.3 · prod</span>
          <span>6 fehlgeschlagene Versuche führen zu 15 min Sperre</span>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
