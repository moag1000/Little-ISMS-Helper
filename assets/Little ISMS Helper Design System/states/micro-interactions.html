<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Alva · Micro-Interactions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; background: #0a0e1a; color: #e9eaf5; font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; }

  /* Tooltip animations */
  @keyframes tip-fade-up { from { opacity: 0; transform: translate(-50%, 4px); } to { opacity: 1; transform: translate(-50%, 0); } }
  @keyframes tip-pop     { 0% { opacity: 0; transform: translate(-50%, 0) scale(.85); } 60% { transform: translate(-50%, 0) scale(1.04); } 100% { opacity: 1; transform: translate(-50%, 0) scale(1); } }
  @keyframes tip-slide   { from { opacity: 0; transform: translate(-50%, 0) translateX(-8px); } to { opacity: 1; transform: translate(-50%, 0); } }
  @keyframes wing-flick  { 0%,100% { transform: scaleX(1); } 50% { transform: scaleX(1.15); } }
  @keyframes dust        { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) scale(.2); opacity: 0; } }
  @keyframes ping        { 0% { transform: scale(1); opacity: .7; } 100% { transform: scale(2.5); opacity: 0; } }
  @keyframes ripple      { 0% { transform: scale(0); opacity: .5; } 100% { transform: scale(4); opacity: 0; } }
  @keyframes shimmer     { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes typing      { 0%,60%,100% { opacity: .25; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }
  @keyframes numTick     { 0% { transform: translateY(16px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
  @keyframes sparkle     { 0%,100% { opacity: .2; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.1); } }

  .toast-enter { animation: tip-fade-up .24s cubic-bezier(.2,.9,.3,1.2) both; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../states/FairyCharacter.jsx"></script>

<script type="text/babel">
/* global React, ReactDOM, FairyCharacter */

const T = {
  bg:'#0a0e1a', surface:'#141827', surface2:'#1a1f35', border:'#232845',
  fg:'#e9eaf5', fg2:'#a1a5c4', fg3:'#6d6f99',
  primary:'#22d3ee', primaryGlow:'rgba(34,211,238,0.3)',
  accent:'#a78bfa', accentGlow:'rgba(167,139,250,0.3)',
  success:'#34d399', warning:'#fbbf24', danger:'#f87171',
};
const tokens = { primary: T.primary, accent: T.accent, aura: '#6366f1' };
const FM = '"JetBrains Mono", monospace';

/* =========================================================
   Section wrapper
   ========================================================= */
function Section({ tag, title, desc, children }) {
  return (
    <section style={{marginBottom: 56}}>
      <div style={{fontFamily: FM, fontSize: 10, letterSpacing:'0.14em', textTransform:'uppercase', color: T.accent, marginBottom: 8}}>
        ✦ {tag}
      </div>
      <h2 style={{color: T.fg, fontSize: 24, fontWeight: 600, letterSpacing: -0.4, margin: '0 0 8px'}}>{title}</h2>
      {desc && <p style={{color: T.fg2, fontSize: 13.5, lineHeight: 1.6, maxWidth: 720, margin: '0 0 20px'}}>{desc}</p>}
      {children}
    </section>
  );
}

function Card({ label, hint, children, cols }) {
  return (
    <div style={{
      background: T.surface, border: `1px solid ${T.border}`, borderRadius: 6,
      padding: 20, position:'relative', overflow:'hidden',
      gridColumn: cols ? `span ${cols}` : undefined,
    }}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom: 14}}>
        <div style={{fontFamily: FM, fontSize: 10, letterSpacing:'0.1em', textTransform:'uppercase', color: T.fg3}}>{label}</div>
        {hint && <div style={{fontFamily: FM, fontSize: 10, color: T.primary}}>{hint}</div>}
      </div>
      {children}
    </div>
  );
}

/* =========================================================
   1 · Tooltip variants
   ========================================================= */
const TOOLTIPS = [
  { kind:'hint',    label:'Hinweis',    copy:'Tipp: Controls mit Fälligkeit ≤ 30 Tagen werden gelb markiert.', mood:'thinking', anim:'tip-fade-up .24s cubic-bezier(.2,.9,.3,1.2)' },
  { kind:'success', label:'Erfolg',     copy:'Gespeichert. Audit-Trail aktualisiert.',                         mood:'happy',    anim:'tip-pop .36s cubic-bezier(.2,.9,.3,1.4)' },
  { kind:'warn',    label:'Warnung',    copy:'Control A.5.12 läuft in 14 Tagen ab.',                           mood:'warning',  anim:'tip-slide .26s ease-out' },
  { kind:'guide',   label:'Führung',    copy:'Klick hier, um dein erstes Asset zu importieren.',                mood:'focused',  anim:'tip-fade-up .3s cubic-bezier(.2,.9,.3,1.2)' },
];
const TIP_COLOR = { hint: T.primary, success: T.success, warn: T.warning, guide: T.accent };

function TooltipBubble({ variant }) {
  const color = TIP_COLOR[variant.kind];
  const [playing, setPlaying] = React.useState(0);
  return (
    <div style={{position:'relative', minHeight: 200, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-end', paddingBottom: 8}}>
      {/* Trigger hotspot */}
      <button onClick={()=>setPlaying(p=>p+1)} style={{
        width: 36, height: 36, borderRadius: '50%', border: `1px dashed ${T.border}`,
        background:'transparent', color: T.fg2, cursor:'pointer', fontSize: 18, position:'absolute', bottom: 10, right: 14,
      }} title="Replay">↻</button>

      {/* Fairy + tooltip */}
      <div style={{position:'relative', display:'flex', flexDirection:'column', alignItems:'center'}}>
        <div key={`tip-${playing}`} style={{
          position:'absolute', bottom: 'calc(100% + 6px)', left:'50%',
          animation: variant.anim + ' both',
          background: T.surface2, border: `1px solid ${color}`, borderRadius: 4,
          padding: '8px 12px', color: T.fg, fontSize: 12, fontWeight: 500, lineHeight: 1.4,
          maxWidth: 240, whiteSpace:'normal', textAlign:'center',
          boxShadow: `0 0 16px ${color}33`,
        }}>
          <span style={{color, fontFamily: FM, fontSize: 9.5, letterSpacing:'.1em', textTransform:'uppercase', display:'block', marginBottom: 2}}>Alva</span>
          {variant.copy}
          {/* Tail */}
          <span style={{
            position:'absolute', top:'100%', left:'50%', transform:'translateX(-50%)',
            width: 0, height: 0, borderLeft:'6px solid transparent', borderRight:'6px solid transparent', borderTop:`6px solid ${color}`,
          }}/>
        </div>
        <FairyCharacter size={90} tone="dark" tokens={tokens} mood={variant.mood}/>
      </div>
    </div>
  );
}

/* =========================================================
   2 · Interactive States (button + input + checkbox)
   ========================================================= */
function StateShowcase() {
  const [pressed, setPressed] = React.useState(false);
  const [focused, setFocused] = React.useState(false);
  const [checked, setChecked] = React.useState(true);
  const [loading, setLoading] = React.useState(false);
  return (
    <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap: 16}}>
      <Card label="Button · Primary" hint="hover/active/loading">
        <div style={{display:'flex', flexDirection:'column', gap:10, marginTop: 8}}>
          {/* Default */}
          <button className="btn" style={btnStyle({hover:false})} onClick={()=>{}}>Speichern</button>
          {/* Hover */}
          <button style={btnStyle({hover:true})}>Speichern</button>
          {/* Loading */}
          <button style={btnStyle({loading:true, disabled: loading})} onClick={()=>{setLoading(true); setTimeout(()=>setLoading(false), 1800);}}>
            {loading ? <><Dots/> Speichere …</> : 'Jetzt laden'}
          </button>
        </div>
        <Legend items={['Default', 'Hover', 'Klick für Loading']}/>
      </Card>

      <Card label="Input · Cyan focus" hint="focus-within glow">
        <label style={{display:'flex', alignItems:'center', gap:8, background: T.bg, border:`1px solid ${focused ? T.primary : T.border}`,
          borderRadius: 4, padding:'10px 12px', transition:'all .18s', boxShadow: focused ? `0 0 0 3px ${T.primaryGlow}` : 'none', marginTop: 8,
        }}>
          <span style={{fontFamily: FM, fontSize: 11, color: focused ? T.primary : T.fg3, letterSpacing:'.05em'}}>›</span>
          <input type="text" placeholder="Control-Name eingeben" onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)}
            style={{flex:1, background:'transparent', border:0, outline:'none', color: T.fg, fontSize: 13, fontFamily:'inherit'}}/>
          {focused && <span style={{width:2, height:14, background: T.primary, animation:'ping 1s ease-out infinite', borderRadius: 1}}/>}
        </label>
        <Legend items={['Klick ins Feld', 'Cyan-Glow + Caret']}/>
      </Card>

      <Card label="Toggle · Checkmark" hint="check-ripple">
        <button onClick={()=>setChecked(c=>!c)} style={{
          marginTop: 8, display:'flex', alignItems:'center', gap: 12, width:'100%',
          background:'transparent', border:`1px solid ${T.border}`, borderRadius: 4,
          padding:'12px 14px', color: T.fg, cursor:'pointer', fontFamily:'inherit', fontSize: 13, textAlign:'left',
        }}>
          <span style={{
            position:'relative', width: 22, height: 22, borderRadius: 4,
            background: checked ? T.primary : 'transparent', border:`1.5px solid ${checked ? T.primary : T.fg3}`,
            display:'flex', alignItems:'center', justifyContent:'center', transition:'all .18s',
            boxShadow: checked ? `0 0 10px ${T.primaryGlow}` : 'none',
          }}>
            {checked && (
              <>
                <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6 L5 9 L10 3" stroke="#04121a" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
                <span style={{position:'absolute', inset:0, borderRadius:4, background: T.primary, animation:'ripple .6s ease-out', pointerEvents:'none'}}/>
              </>
            )}
          </span>
          <span>Control als umgesetzt markieren</span>
        </button>
        <Legend items={['Klick: Cyan-Ripple', 'Check slides in']}/>
      </Card>
    </div>
  );
}

function btnStyle({ hover, loading, disabled }) {
  return {
    background: T.primary,
    color:'#04121a',
    border: 0, borderRadius: 4, padding:'10px 14px', fontWeight: 600, fontSize: 13, letterSpacing: .2,
    fontFamily:'inherit', cursor: disabled ? 'wait' : 'pointer',
    transform: hover ? 'translateY(-1px)' : 'none',
    boxShadow: hover ? `0 4px 14px ${T.primaryGlow}` : `0 0 0 ${T.primaryGlow}`,
    transition: 'transform .12s, box-shadow .2s',
    display:'inline-flex', alignItems:'center', gap:6,
  };
}

function Dots() {
  return (
    <span style={{display:'inline-flex', gap: 3}}>
      {[0,1,2].map(i => <span key={i} style={{width:4, height:4, borderRadius:2, background:'#04121a', animation:`typing 1.2s ${i*.15}s infinite`}}/>)}
    </span>
  );
}

function Legend({ items }) {
  return (
    <div style={{fontFamily: FM, fontSize: 10, color: T.fg3, letterSpacing:'.05em', marginTop: 12, lineHeight: 1.6}}>
      {items.map((x,i)=><div key={i}>› {x}</div>)}
    </div>
  );
}

/* =========================================================
   3 · Entry/Exit · Fee-Animationen
   ========================================================= */
function EntryExitLab() {
  const [visible, setVisible] = React.useState(true);
  const [mode, setMode] = React.useState('fade-up'); // fade-up | pop | slide | dust

  React.useEffect(() => {
    if (!visible) {
      const t = setTimeout(() => setVisible(true), 700);
      return () => clearTimeout(t);
    }
  }, [visible]);

  return (
    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap: 16}}>
      <Card label="Enter · 4 Varianten" hint={mode}>
        <div style={{display:'flex', gap: 6, flexWrap:'wrap', marginBottom: 14}}>
          {['fade-up', 'pop', 'slide', 'dust'].map(m => (
            <button key={m} onClick={()=>{ setMode(m); setVisible(false); }} style={{
              padding:'6px 10px', fontFamily: FM, fontSize: 10, letterSpacing:'.08em', textTransform:'uppercase',
              background: mode === m ? T.primary : 'transparent', color: mode === m ? '#04121a' : T.fg2,
              border: `1px solid ${mode === m ? T.primary : T.border}`, borderRadius: 3, cursor:'pointer', fontWeight: 600,
            }}>{m}</button>
          ))}
        </div>
        <div style={{
          height: 160, background: T.bg, border:`1px solid ${T.border}`, borderRadius: 4,
          display:'flex', alignItems:'center', justifyContent:'center', position:'relative', overflow:'hidden',
        }}>
          {visible && <EntryWrapper mode={mode}><FairyCharacter size={110} tone="dark" tokens={tokens} mood="happy"/></EntryWrapper>}
          {mode === 'dust' && visible && <Dust/>}
        </div>
        <Legend items={[
          'fade-up · 240ms · für alle Standard-Pops',
          'pop · 360ms · feiern / Success',
          'slide · 260ms · für Leisten & Drawer',
          'dust · 600ms · Magie-Erscheinung',
        ]}/>
      </Card>

      <Card label="Timing-Tokens" hint="Design-System">
        <div style={{display:'grid', gridTemplateColumns:'auto 1fr auto', gap:'10px 16px', fontFamily: FM, fontSize: 12, alignItems:'center', marginTop: 4}}>
          {[
            ['--t-instant', 'Feedback sofort',    '80ms',  'linear'],
            ['--t-fast',    'Hover/Press',        '120ms', 'ease-out'],
            ['--t-base',    'Standard · Tooltips','240ms', 'cubic-bezier(.2,.9,.3,1.2)'],
            ['--t-slow',    'Panels/Drawer',      '360ms', 'cubic-bezier(.2,.9,.3,1.4)'],
            ['--t-magic',   'Fee-Effekte',        '600ms', 'cubic-bezier(.2,.9,.3,1.4)'],
          ].map(([tok, desc, ms, ease]) => (
            <React.Fragment key={tok}>
              <span style={{color: T.primary}}>{tok}</span>
              <span style={{color: T.fg2}}>{desc}</span>
              <span style={{color: T.fg, textAlign:'right'}}>{ms}<span style={{color:T.fg3, marginLeft:8, fontSize: 10}}>{ease.split('(')[0]}</span></span>
            </React.Fragment>
          ))}
        </div>
        <div style={{marginTop: 14, padding: 12, background: T.bg, borderLeft:`2px solid ${T.accent}`, borderRadius: 2, fontFamily: FM, fontSize: 11, color: T.fg2, lineHeight: 1.6}}>
          Regel: Nutzer-aktive Interaktionen nie &gt; 240ms · Passive Effekte max 600ms · Loop-Anims ≥ 1.2s
        </div>
      </Card>
    </div>
  );
}

function EntryWrapper({ mode, children }) {
  const animations = {
    'fade-up': 'tip-fade-up .24s cubic-bezier(.2,.9,.3,1.2) both',
    'pop':     'tip-pop .36s cubic-bezier(.2,.9,.3,1.4) both',
    'slide':   'tip-slide .26s ease-out both',
    'dust':    'tip-pop .6s cubic-bezier(.2,.9,.3,1.4) both',
  };
  return <div style={{animation: animations[mode], position:'relative'}}>{children}</div>;
}

function Dust() {
  const particles = Array.from({length: 14}, (_, i) => {
    const angle = (i / 14) * Math.PI * 2;
    const dist = 30 + Math.random() * 40;
    return { dx: Math.cos(angle) * dist, dy: Math.sin(angle) * dist, delay: Math.random() * 0.3 };
  });
  return (
    <>
      {particles.map((p, i) => (
        <span key={i} style={{
          position:'absolute', left:'50%', top:'50%', width: 4, height: 4, borderRadius:'50%',
          background: i % 2 ? T.primary : T.accent, boxShadow: `0 0 6px ${i%2?T.primary:T.accent}`,
          '--dx': `${p.dx}px`, '--dy': `${p.dy}px`,
          animation: `dust .6s ${p.delay}s cubic-bezier(.2,.9,.3,1) both`,
        }}/>
      ))}
    </>
  );
}

/* =========================================================
   4 · Fee-Feedback Moments
   ========================================================= */
function MomentsLab() {
  const [toast, setToast] = React.useState(null);
  const [count, setCount] = React.useState(47);

  const fire = (kind) => {
    const msg = {
      saved:   { mood:'happy',   text:'Gespeichert · Audit-Trail aktualisiert', color: T.success },
      imported:{ mood:'celebrating', text:'12 Assets importiert', color: T.accent },
      warn:    { mood:'warning', text:'A.5.12 läuft in 14 Tagen ab', color: T.warning },
      scan:    { mood:'scanning', text:'Scan läuft · 34 Controls geprüft', color: T.primary },
    }[kind];
    setToast({ ...msg, id: Date.now() });
    setTimeout(() => setToast(null), 2400);
  };

  return (
    <div style={{display:'grid', gridTemplateColumns:'1.4fr 1fr', gap: 16}}>
      <Card label="Toast-Stage" hint="triggered">
        <div style={{
          background: T.bg, border:`1px solid ${T.border}`, borderRadius: 4,
          minHeight: 220, position:'relative', display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden', padding: 24,
        }}>
          {/* Grid */}
          <svg style={{position:'absolute', inset:0, width:'100%', height:'100%', opacity:.07}}>
            <defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0 H0 V20" stroke={T.primary} strokeWidth=".5" fill="none"/></pattern></defs>
            <rect width="100%" height="100%" fill="url(#g)"/>
          </svg>

          {!toast && <div style={{color: T.fg3, fontSize: 12, fontFamily: FM}}>Klick einen Trigger →</div>}

          {toast && (
            <div key={toast.id} className="toast-enter" style={{
              display:'flex', alignItems:'center', gap: 14,
              background: T.surface2, border:`1px solid ${toast.color}`, borderRadius: 6,
              padding: '12px 18px 12px 12px',
              boxShadow: `0 8px 32px rgba(0,0,0,.4), 0 0 20px ${toast.color}44`,
            }}>
              <FairyCharacter size={60} tone="dark" tokens={tokens} mood={toast.mood}/>
              <div>
                <div style={{fontFamily: FM, fontSize: 9.5, color: toast.color, letterSpacing:'.1em', textTransform:'uppercase', marginBottom: 2}}>Alva</div>
                <div style={{color: T.fg, fontSize: 14, fontWeight: 500}}>{toast.text}</div>
              </div>
            </div>
          )}
        </div>
        <div style={{display:'flex', gap: 6, flexWrap:'wrap', marginTop: 12}}>
          {['saved','imported','warn','scan'].map(k => (
            <button key={k} onClick={()=>fire(k)} style={{
              padding:'7px 12px', fontFamily: FM, fontSize: 10, letterSpacing:'.08em', textTransform:'uppercase',
              background:'transparent', color: T.fg2, border:`1px solid ${T.border}`, borderRadius: 3, cursor:'pointer', fontWeight: 600,
            }}>{k}</button>
          ))}
        </div>
      </Card>

      <Card label="Number-Tick + Progress" hint="live values">
        <div style={{padding: '20px 0 12px', textAlign:'center'}}>
          <div style={{fontFamily: FM, fontSize: 10, color: T.fg3, letterSpacing:'.1em', textTransform:'uppercase', marginBottom: 8}}>Controls umgesetzt</div>
          <div style={{position:'relative', height: 72, overflow:'hidden'}}>
            <div key={count} style={{
              position:'absolute', inset: 0, display:'flex', alignItems:'center', justifyContent:'center',
              fontSize: 64, fontWeight: 700, color: T.primary, letterSpacing: -2, fontFamily: FM,
              animation:'numTick .35s cubic-bezier(.2,.9,.3,1.2) both', textShadow: `0 0 20px ${T.primaryGlow}`,
            }}>{count}</div>
          </div>
          <div style={{fontSize: 12, color: T.fg2, marginTop: 4}}>von 93 Controls</div>
        </div>

        {/* Progress with shimmer */}
        <div style={{height: 6, background: T.bg, borderRadius: 3, overflow:'hidden', border:`1px solid ${T.border}`, marginTop: 10}}>
          <div style={{
            width: `${(count/93)*100}%`, height:'100%',
            background: `linear-gradient(90deg, ${T.primary}, ${T.accent}, ${T.primary})`,
            backgroundSize:'200% 100%', animation: 'shimmer 2.4s linear infinite',
            transition:'width .6s cubic-bezier(.2,.9,.3,1.2)',
          }}/>
        </div>

        <div style={{display:'flex', gap: 6, marginTop: 14, justifyContent:'center'}}>
          <button onClick={()=>setCount(c=>Math.max(0,c-1))} style={smallBtn()}>−</button>
          <button onClick={()=>setCount(c=>Math.min(93,c+1))} style={smallBtn()}>+</button>
          <button onClick={()=>setCount(93)} style={smallBtn('accent')}>100%</button>
        </div>
      </Card>
    </div>
  );
}

function smallBtn(variant) {
  const cyan = variant === 'accent' ? T.accent : T.primary;
  return {
    padding:'6px 14px', fontFamily: FM, fontSize: 11, fontWeight: 600,
    background:'transparent', color: cyan, border:`1px solid ${cyan}`, borderRadius: 3, cursor:'pointer', minWidth: 44,
  };
}

/* =========================================================
   5 · Transition principles
   ========================================================= */
function Principles() {
  const rules = [
    { num: '01', title: 'Bewegung hat Bedeutung', copy: 'Jede Animation signalisiert Ursache → Wirkung. Ein Pop sagt „Fertig", ein Fade sagt „hier ist etwas Neues", ein Shake sagt „warte".' },
    { num: '02', title: 'Alva führt, ohne zu unterbrechen', copy: 'Tooltips folgen dem Blick · Toasts unten rechts · nie zentral-modal, wenn kein Muss. Sie hilft, sie blockiert nicht.' },
    { num: '03', title: 'Geschwindigkeit folgt Wichtigkeit', copy: 'Tippen → 80ms · Speichern → 240ms · Feier → 600ms. Je wichtiger der Moment, desto länger darf er dauern.' },
    { num: '04', title: 'Reduktion bei langer Nutzung', copy: 'prefers-reduced-motion: Flügel-Loops & Dust stoppen. Nur State-Änderungen bleiben animiert.' },
  ];
  return (
    <div style={{display:'grid', gridTemplateColumns:'repeat(2, 1fr)', gap: 14}}>
      {rules.map(r => (
        <div key={r.num} style={{
          background: T.surface, border:`1px solid ${T.border}`, borderLeft: `2px solid ${T.primary}`,
          borderRadius: 4, padding: 20,
        }}>
          <div style={{fontFamily: FM, fontSize: 28, fontWeight: 700, color: T.primary, letterSpacing: -1, opacity: .4}}>{r.num}</div>
          <div style={{color: T.fg, fontSize: 16, fontWeight: 600, letterSpacing: -0.3, marginTop: 2}}>{r.title}</div>
          <div style={{color: T.fg2, fontSize: 13, lineHeight: 1.6, marginTop: 6}}>{r.copy}</div>
        </div>
      ))}
    </div>
  );
}

/* =========================================================
   App
   ========================================================= */
function App() {
  return (
    <div style={{minHeight:'100vh', padding:'48px 56px', maxWidth: 1440, margin:'0 auto'}}>
      <header style={{marginBottom: 48}}>
        <div style={{fontFamily: FM, fontSize: 10, letterSpacing:'0.14em', textTransform:'uppercase', color: T.accent, marginBottom: 10}}>
          ✦ Design-System · Micro-Interactions
        </div>
        <h1 style={{color: T.fg, fontSize: 38, fontWeight: 600, letterSpacing: -0.8, margin: 0, lineHeight: 1.1}}>
          Wie Alva sich bewegt
        </h1>
        <p style={{color: T.fg2, fontSize: 14.5, lineHeight: 1.6, maxWidth: 720, marginTop: 14}}>
          Alvas Interaktionen sind nie laut. Sie sind Timing-Tokens, Easing-Kurven und
          Micro-Choreographien — damit die Fee führt, ohne den Nutzer zu verdrängen.
          Jede Sektion hier ist live klickbar.
        </p>
      </header>

      <Section tag="1 · Tooltips" title="Vier Tonalitäten, ein Fee-Avatar" desc="Jeder Tooltip trägt einen Mood-matching Avatar. Klick ↻ zum Replay.">
        <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap: 12}}>
          {TOOLTIPS.map(v => (
            <div key={v.kind} style={{background: T.surface, border:`1px solid ${T.border}`, borderRadius: 6, padding: 16, position:'relative'}}>
              <div style={{display:'flex', alignItems:'center', gap: 8, marginBottom: 8}}>
                <span style={{width: 6, height: 6, borderRadius:'50%', background: TIP_COLOR[v.kind], boxShadow: `0 0 8px ${TIP_COLOR[v.kind]}`}}/>
                <div style={{fontFamily: FM, fontSize: 10, letterSpacing:'.1em', textTransform:'uppercase', color: T.fg2}}>{v.label}</div>
              </div>
              <TooltipBubble variant={v}/>
            </div>
          ))}
        </div>
      </Section>

      <Section tag="2 · States" title="Controls, die man spürt" desc="Hover, Focus, Active, Loading — jeder State hat eine eigene Micro-Animation, max. 240ms.">
        <StateShowcase/>
      </Section>

      <Section tag="3 · Enter & Exit" title="Vier Bewegungssprachen" desc="Von schnell-funktional (fade-up) bis magisch (dust). Welche passt, entscheidet die Semantik.">
        <EntryExitLab/>
      </Section>

      <Section tag="4 · Fee-Momente" title="Feedback, das Alva trägt" desc="Statusmeldungen kommen nicht als Text — sie kommen als Alva.">
        <MomentsLab/>
      </Section>

      <Section tag="5 · Prinzipien" title="Vier Regeln, an die wir uns halten">
        <Principles/>
      </Section>

      <footer style={{marginTop: 40, paddingTop: 24, borderTop:`1px solid ${T.border}`, display:'flex', justifyContent:'space-between', fontFamily: FM, fontSize: 10, color: T.fg3, letterSpacing:'0.08em'}}>
        <span>© Alvara GmbH · Design-System</span>
        <span>Micro-Interactions v1</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
