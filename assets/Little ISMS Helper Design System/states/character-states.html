<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Alva · Charakter-States</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; background: #0a0e1a; color: #e9eaf5; font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="./FairyCharacter.jsx"></script>
<script type="text/babel">
/* global React, ReactDOM, FairyCharacter */

const T = {
  bg:'#0a0e1a', surface:'#141827', surface2:'#1a1f35', border:'#232845',
  fg:'#e9eaf5', fg2:'#a1a5c4', fg3:'#6d6f99',
  primary:'#22d3ee', primaryGlow:'rgba(34,211,238,0.3)',
  accent:'#a78bfa', accentGlow:'rgba(167,139,250,0.3)',
  success:'#34d399', warning:'#fbbf24', danger:'#f87171',
};
const tokens = { primary: T.primary, accent: T.accent, aura: '#6366f1' };
const FONT_MONO = '"JetBrains Mono", monospace';

const STATES = [
  { mood:'idle',        label:'Im Leerlauf', de:'wartet · atmet',           use:"Standardzustand. Wenn nichts los ist." },
  { mood:'happy',       label:'Freut sich',  de:'zufrieden · strahlend',    use:'Erfolg, Abschluss, „Fertig!".' },
  { mood:'thinking',    label:'Denkt nach',  de:'grübelt · Fragezeichen',   use:"Wenn sie eine Frage stellt oder auf Eingabe wartet." },
  { mood:'focused',     label:'Konzentriert',de:'fokussiert · zielt',       use:"Beim Bearbeiten einer konkreten Aufgabe." },
  { mood:'working',     label:'Arbeitet',    de:'werkelt · Zahnräder',      use:"Während Import, Scan, längere Operation läuft." },
  { mood:'scanning',    label:'Scannt',      de:'prüft · Radar',            use:"Beim Durchsuchen von Controls, Findings, Assets." },
  { mood:'warning',     label:'Warnt',       de:'alarmiert · Ausrufezeichen',use:"Wenn was schiefläuft: abgelaufen, kritisch, fehlgeschlagen." },
  { mood:'celebrating', label:'Feiert',      de:'Konfetti · überglücklich', use:"Meilenstein erreicht. Audit bestanden. Sparsam einsetzen." },
  { mood:'sleeping',    label:'Schläft',     de:'inaktiv · Zzz',            use:"Lange inaktiv, Pausemodus, Nachts." },
];

function StateCard({ state, size }) {
  const [hover, setHover] = React.useState(false);
  return (
    <div
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{
        background: T.surface, border: `1px solid ${hover ? T.primary : T.border}`,
        borderRadius: 6, padding: 20, position:'relative', overflow:'hidden',
        transition:'border-color .2s, transform .2s', transform: hover ? 'translateY(-2px)' : 'none',
        boxShadow: hover ? `0 0 20px ${T.primaryGlow}` : 'none',
      }}>
      {/* corner marks */}
      <span style={{position:'absolute', top: 8, left: 8, width: 8, height: 8, borderTop:`1px solid ${T.primary}`, borderLeft:`1px solid ${T.primary}`, opacity: hover ? 1 : 0.4, transition:'opacity .2s'}}/>
      <span style={{position:'absolute', bottom: 8, right: 8, width: 8, height: 8, borderBottom:`1px solid ${T.primary}`, borderRight:`1px solid ${T.primary}`, opacity: hover ? 1 : 0.4, transition:'opacity .2s'}}/>

      <div style={{fontFamily: FONT_MONO, fontSize: 9.5, letterSpacing:'0.14em', textTransform:'uppercase', color: T.fg3, marginBottom: 4}}>
        mood · {state.mood}
      </div>
      <div style={{color: T.fg, fontSize: 16, fontWeight: 600, letterSpacing: -0.3}}>{state.label}</div>
      <div style={{color: T.primary, fontSize: 11, fontFamily: FONT_MONO, marginTop: 4, letterSpacing:'0.05em'}}>{state.de}</div>

      <div style={{display:'flex', justifyContent:'center', alignItems:'center', padding: '20px 0 12px', minHeight: size + 40}}>
        <FairyCharacter size={size} tone="dark" tokens={tokens} mood={state.mood}/>
      </div>

      <div style={{color: T.fg2, fontSize: 12, lineHeight: 1.5, borderTop: `1px solid ${T.border}`, paddingTop: 12}}>
        {state.use}
      </div>
    </div>
  );
}

function App() {
  const [size, setSize] = React.useState(150);
  const [selected, setSelected] = React.useState(null);

  return (
    <div style={{minHeight:'100vh', padding:'48px 56px', maxWidth: 1440, margin:'0 auto'}}>
      <header style={{marginBottom: 40, display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap: 40}}>
        <div>
          <div style={{fontFamily: FONT_MONO, fontSize: 10, letterSpacing:'0.14em', textTransform:'uppercase', color: T.accent, marginBottom: 10}}>
            ✦ Design-System · Charakter-States
          </div>
          <h1 style={{color: T.fg, fontSize: 36, fontWeight: 600, letterSpacing: -0.8, margin: 0, lineHeight: 1.1}}>
            Alvas Stimmungen
          </h1>
          <p style={{color: T.fg2, fontSize: 14, lineHeight: 1.6, maxWidth: 640, marginTop: 12}}>
            Alva ist kein Logo — sie reagiert auf Kontext. Neun Zustände decken 95% der Situationen ab: von still-wartend bis jubelnd-feiernd.
            Jede Stimmung hat eine eigene Animation, Auratönung und Mimik. Die Körper-, Flügel- und Kopfanatomie bleiben konstant.
          </p>
        </div>

        {/* Size slider */}
        <div style={{
          background: T.surface, border:`1px solid ${T.border}`, borderRadius: 5,
          padding: 14, minWidth: 220, fontFamily: FONT_MONO,
        }}>
          <div style={{fontSize: 10, letterSpacing:'0.1em', textTransform:'uppercase', color: T.fg3}}>Größe</div>
          <div style={{display:'flex', alignItems:'center', gap: 10, marginTop: 8}}>
            <input type="range" min="60" max="240" value={size} onChange={e=>setSize(Number(e.target.value))}
              style={{flex:1, accentColor: T.primary}}/>
            <span style={{color: T.primary, fontSize: 12, minWidth: 40, textAlign:'right'}}>{size}px</span>
          </div>
          <div style={{fontSize: 10, color: T.fg3, marginTop: 6, lineHeight: 1.4}}>
            Face-Details ab 90px sichtbar
          </div>
        </div>
      </header>

      {/* Grid */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap: 16}}>
        {STATES.map(s => <StateCard key={s.mood} state={s} size={size}/>)}
      </div>

      {/* Transitions row */}
      <div style={{marginTop: 56}}>
        <div style={{fontFamily: FONT_MONO, fontSize: 10, letterSpacing:'0.14em', textTransform:'uppercase', color: T.accent, marginBottom: 10}}>
          ✦ Übergänge · Live-Probe
        </div>
        <h2 style={{color: T.fg, fontSize: 22, fontWeight: 600, letterSpacing: -0.4, margin:'0 0 16px'}}>
          Klick durch die States
        </h2>
        <div style={{
          background: T.surface, border:`1px solid ${T.border}`, borderRadius: 6,
          padding: 40, display:'flex', flexDirection:'column', alignItems:'center', gap: 24,
        }}>
          <FairyCharacter size={220} tone="dark" tokens={tokens} mood={selected || 'idle'}/>
          <div style={{display:'flex', flexWrap:'wrap', gap: 8, justifyContent:'center', maxWidth: 780}}>
            {STATES.map(s => (
              <button key={s.mood} onClick={()=>setSelected(s.mood)} style={{
                padding:'8px 14px', fontFamily: FONT_MONO, fontSize: 11, letterSpacing:'0.08em', textTransform:'uppercase', fontWeight: 600,
                background: selected === s.mood ? T.primary : 'transparent',
                color: selected === s.mood ? '#04121a' : T.fg2,
                border: `1px solid ${selected === s.mood ? T.primary : T.border}`,
                borderRadius: 3, cursor:'pointer',
                boxShadow: selected === s.mood ? `0 0 12px ${T.primaryGlow}` : 'none',
                transition:'all .2s',
              }}>{s.label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* API */}
      <div style={{marginTop: 56}}>
        <div style={{fontFamily: FONT_MONO, fontSize: 10, letterSpacing:'0.14em', textTransform:'uppercase', color: T.accent, marginBottom: 10}}>
          ✦ Verwendung
        </div>
        <h2 style={{color: T.fg, fontSize: 22, fontWeight: 600, letterSpacing: -0.4, margin:'0 0 16px'}}>
          So bindest du Alva ein
        </h2>
        <pre style={{
          background: T.bg, border:`1px solid ${T.border}`, borderLeft:`2px solid ${T.accent}`,
          padding: '16px 20px', color: T.fg, fontFamily: FONT_MONO, fontSize: 12.5, lineHeight: 1.7,
          borderRadius: 4, overflowX:'auto', margin: 0,
        }}>{`// Import
<${'script'} type="text/babel" src="./FairyCharacter.jsx"></${'script'}>

// Basis
<FairyCharacter size={150} tone="dark" tokens={tokens} mood="idle" />

// Verfügbare Moods
${STATES.map(s => `"${s.mood}"`).join(' · ')}

// tokens = { primary, accent, aura }
// tone = "dark" | "light"
// size = 60–240  (Face ab >= 90)`}
        </pre>
      </div>

      <footer style={{marginTop: 64, paddingTop: 24, borderTop:`1px solid ${T.border}`, display:'flex', justifyContent:'space-between', fontFamily: FONT_MONO, fontSize: 10, color: T.fg3, letterSpacing:'0.08em'}}>
        <span>© Alvara GmbH · Design-System</span>
        <span>FairyCharacter v1 · 9 moods</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
