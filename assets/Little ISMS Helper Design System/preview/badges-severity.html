<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<style>
.sev{display:inline-flex;padding:6px 14px;border-radius:6px;font-family:'Inter';font-size:12px;font-weight:700;color:#fff;letter-spacing:.03em;}
.sev-critical{background:linear-gradient(135deg,#f97316,#ea580c);box-shadow:0 0 12px rgba(249,115,22,.35);}
.sev-high{background:linear-gradient(135deg,#ef4444,#dc2626);box-shadow:0 0 12px rgba(239,68,68,.35);}
.sev-medium{background:linear-gradient(135deg,#f59e0b,#d97706);box-shadow:0 0 12px rgba(245,158,11,.3);color:#0f172a;}
.sev-low{background:linear-gradient(135deg,#10b981,#059669);box-shadow:0 0 12px rgba(16,185,129,.3);}
.act{display:inline-flex;gap:4px;padding:4px 10px;border-radius:6px;font-family:'Inter';font-size:12px;font-weight:500;}
.act-create{background:rgba(16,185,129,.15);color:#059669;}
.act-update{background:rgba(6,182,212,.15);color:#0891b2;}
.act-delete{background:rgba(239,68,68,.15);color:#dc2626;}
.act-view{background:rgba(100,116,139,.15);color:#475569;}
</style>
<div class="row"><span class="sev sev-critical">KRITISCH</span><span class="sev sev-high">HOCH</span><span class="sev sev-medium">MITTEL</span><span class="sev sev-low">NIEDRIG</span></div>
<div class="hr-div"></div>
<div class="row">
  <span class="act act-create"><i class="bi bi-plus-circle"></i> Created</span>
  <span class="act act-update"><i class="bi bi-pencil"></i> Updated</span>
  <span class="act act-delete"><i class="bi bi-trash"></i> Deleted</span>
  <span class="act act-view"><i class="bi bi-eye"></i> Viewed</span>
</div>
</body></html>
