<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<style>
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:8px;border:1px solid transparent;font-family:'Inter';font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,#06b6d4,#0891b2);color:#fff;box-shadow:0 0 10px rgba(6,182,212,.3);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 0 15px rgba(6,182,212,.4);}
.btn-secondary{background:#fff;color:#1e293b;border-color:#e2e8f0;}
.btn-secondary:hover{border-color:#06b6d4;color:#06b6d4;}
.btn-ghost{background:transparent;color:#64748b;}
.btn-ghost:hover{background:#f1f5f9;color:#1e293b;}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;}
.btn-fairy{background:linear-gradient(135deg,#ec4899,#db2777);color:#fff;border-radius:100px;padding:8px 16px;font-size:13px;}
.btn-fairy::before{content:"✦";margin-right:4px;}
.btn-sm{padding:6px 12px;font-size:12px;}
</style>
<div class="row">
  <button class="btn btn-primary">Risiko anlegen</button>
  <button class="btn btn-secondary">Abbrechen</button>
  <button class="btn btn-ghost">Mehr …</button>
  <button class="btn btn-danger"><i class="bi bi-trash"></i> Löschen</button>
</div>
<div class="row" style="margin-top:12px;">
  <button class="btn btn-fairy">Auto-Vorschlag übernehmen</button>
  <button class="btn btn-primary btn-sm">⌘K · Suche</button>
  <button class="btn btn-secondary btn-sm"><i class="bi bi-download"></i> Export PDF</button>
</div>
</body></html>
