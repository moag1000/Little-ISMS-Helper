<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<style>
label{font-size:13px;font-weight:500;color:#1e293b;display:block;margin-bottom:4px;}
input,select{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-family:'Inter';font-size:14px;background:#fff;color:#1e293b;}
input:focus{outline:none;border-color:#06b6d4;box-shadow:0 0 0 3px rgba(6,182,212,.2),0 0 10px rgba(6,182,212,.3);}
.fairy{border-left:3px solid #ec4899 !important;background:linear-gradient(90deg,rgba(236,72,153,.04) 0%,transparent 30%) !important;}
.fairy-helper{display:flex;align-items:center;gap:4px;font-size:11px;color:#ec4899;margin-top:4px;opacity:.85;}
</style>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
  <div><label>Asset-Name</label><input type="text" value="Kunden-CRM Produktivsystem" /></div>
  <div><label>Schutzbedarf</label><select><option>Hoch</option></select></div>
  <div style="grid-column:span 2;">
    <label>Verantwortlicher</label>
    <input type="text" value="ISB Abteilung IT" class="fairy" />
    <div class="fairy-helper">✦ Automatisch aus Asset-Kategorie übernommen</div>
  </div>
</div>
</body></html>
