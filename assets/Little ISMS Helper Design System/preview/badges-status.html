<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<style>
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-family:'Inter';font-size:12px;font-weight:600;}
.bg-success{background:#10b981;color:#fff;}
.bg-warning{background:#f59e0b;color:#0f172a;}
.bg-danger{background:#ef4444;color:#fff;}
.bg-info{background:#06b6d4;color:#fff;}
.bg-secondary{background:#64748b;color:#fff;}
.bg-primary{background:#0f172a;color:#fff;border:1px solid #06b6d4;}
</style>
<div class="row">
  <span class="badge bg-success"><i class="bi bi-check-circle"></i> Aktiv</span>
  <span class="badge bg-success">Compliant</span>
  <span class="badge bg-warning">In Bearbeitung</span>
  <span class="badge bg-warning">Ausstehend</span>
  <span class="badge bg-danger">Überfällig</span>
  <span class="badge bg-danger">Failed</span>
  <span class="badge bg-info">Info</span>
  <span class="badge bg-secondary">N/A</span>
  <span class="badge bg-primary">Neu</span>
</div>
<div class="hr-div"></div>
<div style="font-family:'JetBrains Mono';font-size:11px;color:var(--fg-3);">bg-success · bg-warning · bg-danger · bg-info · bg-secondary · bg-primary</div>
</body></html>
