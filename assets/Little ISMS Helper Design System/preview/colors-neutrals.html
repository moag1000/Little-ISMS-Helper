<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
  <div>
    <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--fg-3);margin-bottom:8px;">Light</div>
    <div style="display:flex;gap:6px;">
      <div style="flex:1;height:56px;background:#ffffff;border:1px solid #e2e8f0;border-radius:8px;"></div>
      <div style="flex:1;height:56px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;"></div>
      <div style="flex:1;height:56px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;"></div>
    </div>
    <div style="display:flex;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-3);margin-top:6px;">
      <div style="flex:1;">#ffffff</div><div style="flex:1;">#f8fafc</div><div style="flex:1;">#f1f5f9</div>
    </div>
  </div>
  <div>
    <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--fg-3);margin-bottom:8px;">Dark</div>
    <div style="display:flex;gap:6px;">
      <div style="flex:1;height:56px;background:#0f172a;border-radius:8px;box-shadow:inset 0 0 0 1px #334155;"></div>
      <div style="flex:1;height:56px;background:#1e293b;border-radius:8px;box-shadow:inset 0 0 0 1px #334155;"></div>
      <div style="flex:1;height:56px;background:#334155;border-radius:8px;"></div>
    </div>
    <div style="display:flex;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-3);margin-top:6px;">
      <div style="flex:1;">#0f172a</div><div style="flex:1;">#1e293b</div><div style="flex:1;">#334155</div>
    </div>
  </div>
</div>
</body></html>
