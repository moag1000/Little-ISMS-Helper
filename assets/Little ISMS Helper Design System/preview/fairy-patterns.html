<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<style>
.fairy-suggestion{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;background:linear-gradient(135deg,rgba(236,72,153,.08),rgba(6,182,212,.05));border:1px dashed rgba(236,72,153,.3);border-radius:8px;font-size:13px;color:#1e293b;}
.fairy-suggestion::before{content:"✦";color:#ec4899;}
.fairy-badge{display:inline-flex;gap:6px;background:linear-gradient(135deg,rgba(236,72,153,.9),rgba(139,92,246,.85));color:#fff;border-radius:100px;padding:4px 12px;font-size:11px;font-weight:500;letter-spacing:.02em;text-transform:uppercase;box-shadow:0 2px 8px rgba(236,72,153,.25);}
.fairy-badge::before{content:"✦";}
.fairy-alert{display:flex;gap:10px;padding:14px 18px;background:linear-gradient(135deg,rgba(236,72,153,.08),rgba(139,92,246,.05));border:1px solid rgba(236,72,153,.2);border-radius:8px;align-items:flex-start;}
.fairy-alert i{color:#ec4899;font-size:18px;}
</style>
<div class="row">
  <span class="fairy-suggestion">Dieser Asset ähnelt 3 bestehenden — Schutzbedarf übernehmen? <b style="color:#ec4899;margin-left:4px;">Ja</b></span>
  <span class="fairy-badge">Auto</span>
  <span class="fairy-badge">Priorisiert</span>
</div>
<div style="margin-top:14px;" class="fairy-alert">
  <i class="bi bi-stars"></i>
  <div>
    <div style="font-weight:600;color:#ec4899;margin-bottom:2px;">Mapping-Vorschlag</div>
    <div style="font-size:13px;color:#1e293b;">ISO 27001 A.8.1.1 ↔ BSI ORP.1.A1 · Konfidenz 92% · zur Review-Freigabe</div>
  </div>
</div>
</body></html>
