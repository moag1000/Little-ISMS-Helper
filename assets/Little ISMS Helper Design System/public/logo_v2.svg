<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
      <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
    </filter>
    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"></feGaussianBlur>
      <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
    </filter>

    
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1"></stop> 
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1"></stop> 
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1"></stop> 
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"></stop> 
    </linearGradient>

    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1"></stop>
    </linearGradient>

    <radialGradient id="auraGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.2"></stop>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0"></stop>
    </radialGradient>
  </defs>

  
  <rect width="400" height="400" fill="#0f172a" rx="40"></rect>

  
  <circle cx="200" cy="180" r="150" fill="url(#auraGradient)"></circle>

  
  <g opacity="0.8" filter="url(#subtleGlow)">
    
    <path d="M 190 170 C 130 140 80 100 60 110 C 40 120 70 160 190 180" fill="none" stroke="url(#primaryGradient)" stroke-width="4" stroke-linecap="round"></path>
    <path d="M 210 170 C 270 140 320 100 340 110 C 360 120 330 160 210 180" fill="none" stroke="url(#primaryGradient)" stroke-width="4" stroke-linecap="round"></path>
    
    <path d="M 190 190 C 140 210 90 240 80 230 C 70 220 100 190 190 190" fill="none" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round"></path>
    <path d="M 210 190 C 260 210 310 240 320 230 C 330 220 300 190 210 190" fill="none" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round"></path>
  </g>

  
  <g filter="url(#neonGlow)">
    
    <path d="M 200 135 L 225 145 L 225 170 Q 225 185 200 195 Q 175 185 175 170 L 175 145 Z" fill="url(#bodyGradient)" stroke="#06b6d4" stroke-width="2"></path>

    
    <rect x="188" y="155" width="6" height="2" rx="1" fill="#06b6d4"></rect>
    <rect x="206" y="155" width="6" height="2" rx="1" fill="#06b6d4"></rect>

    
    <line x1="200" y1="135" x2="200" y2="120" stroke="#06b6d4" stroke-width="2" stroke-dasharray="2 1"></line>
    <circle cx="200" cy="118" r="4" fill="#06b6d4">
        
    </circle>
  </g>

  
  <g font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-weight="800" text-anchor="middle" letter-spacing="1">
    
    <text x="200" y="325" font-size="32" fill="#ffffff" filter="url(#subtleGlow)">
      LITTLE <tspan fill="#06b6d4">ISMS</tspan>
    </text>
    
    <text x="200" y="360" font-size="20" fill="#ec4899" font-weight="600" letter-spacing="4">
      HELPER
    </text>
  </g>

  
  <g opacity="0.4" stroke="#10b981" stroke-width="1.5">
    <circle cx="50" cy="50" r="10" fill="none"></circle>
    <path d="M 45 50 L 55 50 M 50 45 L 50 55" stroke-width="1"></path>

    <circle cx="350" cy="50" r="10" fill="none"></circle>
    <path d="M 345 50 L 355 50 M 350 45 L 350 55" stroke-width="1"></path>
  </g>
</svg>