# L2 Scenario schema reference. Not loaded by Playwright — purely
# documentation for authors of new scenarios. Real scenarios live in
# sibling `*.yaml` files (one form per file, multiple scenarios allowed).
#
# Each scenario describes ONE form-submit flow:
#   1. navigate to `route` (locale-prefixed)
#   2. fill `fill` map (selector → value)
#   3. submit via `submit` (button selector OR action="submit")
#   4. assert `expect` (any of: status, redirect_pattern, text_contains,
#                       url_pattern, flash_contains)

# ─────────────────────────────────────────────────────────────────
# Field reference
# ─────────────────────────────────────────────────────────────────

scenarios:
  - name: example_minimal
    # Display name in the report.
    label: "Minimal form-fill example"

    # Locale-prefixed route to the form.
    route: /de/example/new

    # Optional: which persona keys may run this scenario. When omitted
    # the scenario runs for every persona that has `scenarios:` enabled.
    # personas: [isb-practitioner, ciso-executive]

    # Optional: route categorisation for the HTML report grouping. If
    # omitted the scenario is grouped under "form".
    category: example

    # Optional: module-key that must be active for this scenario to
    # apply. When set and the module is off, the scenario is reported
    # as `skipped` (not failed).
    # requires_module: privacy

    # Field-fill map. Each key is a CSS selector, value is the literal
    # to fill. Use `${random.suffix}` to inject a per-run random
    # 8-char hex string so re-runs do not collide on unique fields.
    fill:
      'input[name="form[title]"]': "Scenario ${random.suffix}"
      'select[name="form[category]"]': "operational"
      'textarea[name="form[description]"]': "Generated by L2 smoke."

    # Optional: arbitrary clicks BEFORE submit (open accordions, etc.).
    # before_submit:
    #   - selector: 'button[data-bs-toggle="collapse"][href="#advanced"]'
    #     action: click

    # How to submit: either selector OR keyword "auto" (clicks the
    # first `button[type=submit]` inside the form).
    submit: auto
    # submit: 'button.fa-bulk-btn--primary'

    # Assertion bundle. ALL keys must pass for the scenario to be `ok`.
    expect:
      # HTTP status range — defaults to "< 500".
      status_lt: 500

      # After submit the URL must match this regex (anchored at start).
      url_pattern: '^/de/example/\d+$'

      # OR: the response body must contain this string.
      # text_contains: "Created successfully"

      # OR: a flash-message banner must contain this string.
      # flash_contains: "wurde erstellt"

      # Optional: assert no JS console errors after submit (default true).
      no_console_errors: true
