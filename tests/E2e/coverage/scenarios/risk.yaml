# Risk-Management scenarios (ISO 27001 Cl. 6.1.2 + 6.1.3).
#
# Form block-prefix: `risk` for RiskType, `risk_quick` for RiskQuickType
# (FQCN→snake-case strips the Type suffix). RiskType uses IntegerType for
# probability/impact (not select).

scenarios:
  - name: risk_create_minimal
    label: "Risk anlegen (Minimal — Titel + Kategorie)"
    route: /de/risk/new
    category: risk
    fill:
      'input[name="risk[title]"]': "Smoke-Risk ${random.suffix}"
      'textarea[name="risk[description]"]': "Auto-generated smoke risk"
      'select[name="risk[category]"]': "operational"
      'input[name="risk[probability]"]': "3"
      'input[name="risk[impact]"]': "3"
      # ISO 27001 Cl. 6.1.2 c — at least one subject (asset/person/location/supplier)
      'select[name="risk[asset]"]': "__first__"
    submit: auto
    expect:
      status_lt: 500
      url_pattern: '^/de/risk/\d+'

  - name: risk_quick_create
    label: "Risk via Quick-Create (S14 Cluster A)"
    route: /de/risk/new/quick
    category: risk
    fill:
      'input[name="risk_quick[title]"]': "Quick-Risk ${random.suffix}"
      'textarea[name="risk_quick[description]"]': "Smoke description"
      'input[name="risk_quick[probability]"]': "2"
      'input[name="risk_quick[impact]"]': "2"
    submit: auto
    expect:
      status_lt: 500
