# CAPA scenarios (ISO 27001 Cl. 10.1).

scenarios:
  - name: capa_create_minimal
    label: "Korrekturmaßnahme anlegen (Minimal)"
    route: /de/corrective-action/new
    category: capa
    fill:
      'input[name="corrective_action[title]"]': "Smoke-CAPA ${random.suffix}"
      'select[name="corrective_action[priority]"]': "medium"
      'textarea[name="corrective_action[description]"]': "Generated by L2 smoke."
    submit: auto
    expect:
      status_lt: 500
      url_pattern: '^/de/corrective-action/\d+'
