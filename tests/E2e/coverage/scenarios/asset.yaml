# Asset-Management scenarios (ISO 27001 A.5.9-5.11).

scenarios:
  - name: asset_create_minimal
    label: "Asset anlegen (Minimal — Name + Owner)"
    route: /de/asset/new
    category: asset
    fill:
      'input[name="asset[name]"]': "Smoke-Asset ${random.suffix}"
      'select[name="asset[type]"]': "information"
      'select[name="asset[classification]"]': "internal"
    submit: auto
    expect:
      status_lt: 500
      url_pattern: '^/de/asset/\d+'
