# Training & Awareness scenarios (ISO 27001 A.6.3).
#
# TrainingType uses `trainingType` (camelCase, not legacy `category`)
# and requires `scheduledDate` (NOT NULL on the table).

scenarios:
  - name: training_create_minimal
    label: "Training anlegen (Minimal)"
    route: /de/training/new
    category: training
    fill:
      'input[name="training[title]"]': "Smoke-Training ${random.suffix}"
      'select[name="training[trainingType]"]': "security_awareness"
      'input[name="training[scheduledDate]"]': "2026-12-01"
      # owner constraint: at least one of trainerUser / trainerPerson required
      'select[name="training[trainerUser]"]': "__first__"
    submit: auto
    expect:
      status_lt: 500
      url_pattern: '^/de/training/\d+'
