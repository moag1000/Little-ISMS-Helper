# Incident-Management scenarios (ISO 27001 A.5.24-5.27 + NIS2 Art. 23).

scenarios:
  - name: incident_report_high_severity
    label: "Incident-Report (High-Severity)"
    route: /de/incident/new
    category: incident
    fill:
      'input[name="incident[title]"]': "Smoke-Incident ${random.suffix}"
      'select[name="incident[severity]"]': "high"
      'textarea[name="incident[description]"]': "Auto-generated by L2 smoke test."
    submit: auto
    expect:
      status_lt: 500
      url_pattern: '^/de/incident/\d+'
