# Audit-Finding scenarios (ISO 27001 Cl. 9.2).

scenarios:
  - name: audit_finding_create_minor
    label: "Audit-Finding anlegen (Minor-NC)"
    route: /de/audit-finding/new
    category: audit
    fill:
      'input[name="audit_finding[title]"]': "Smoke-Finding ${random.suffix}"
      'select[name="audit_finding[severity]"]': "minor"
      'textarea[name="audit_finding[description]"]': "Generated by L2 smoke."
    submit: auto
    expect:
      status_lt: 500
      url_pattern: '^/de/audit-finding/\d+'
