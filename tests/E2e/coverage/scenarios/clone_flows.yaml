# C4-C1 Klon-Funktionen — POST /<entity>/{id}/clone smoke tests.
#
# Each scenario resolves a `{id}` placeholder from the entity's index page
# (first show-page link) so it clones an entity that exists in the *current*
# test-user's tenant — no hard-coded fixture IDs that only live in one tenant.
# The cloner persists a fresh editable copy and redirects to its edit form.
# If the index has no entity, the scenario is skipped (nothing to clone).
#
# Module-gated scenarios skip when their module is inactive.

scenarios:
  - name: clone_risk
    label: "Risk klonen (C4-C1, ROLE_USER)"
    route: /de/risk/{id}
    category: clone
    resolve_id:
      from: /de/risk
      pattern: '/de/risk/(\d+)'
    submit: 'form[action$="/risk/{id}/clone"] button[type="submit"]'
    expect:
      status_lt: 500
      url_pattern: '/risk/\d+/edit'

