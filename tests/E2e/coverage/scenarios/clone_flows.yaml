  - name: clone_supplier
    label: "Supplier klonen (C4-C1, ROLE_USER)"
    route: /de/supplier/81
    category: clone
    requires_module: suppliers
    submit: 'form[action$="/supplier/81/clone"] button[type="submit"]'
    expect:
      status_lt: 500
      url_pattern: '/supplier/\d+/edit'

  - name: clone_bc_plan
    label: "BC-Plan klonen (C4-C1, ROLE_USER)"
    route: /de/business-continuity-plan/61
    category: clone
    requires_module: bcm
    submit: 'form[action$="/business-continuity-plan/61/clone"] button[type="submit"]'
    expect:
      status_lt: 500
      url_pattern: '/business-continuity-plan/\d+/edit'

  - name: clone_bc_exercise
    label: "BC-Exercise klonen (C4-C1, ROLE_USER)"
    route: /de/bc-exercise/49
    category: clone
    requires_module: bcm
    submit: 'form[action$="/bc-exercise/49/clone"] button[type="submit"]'
    expect:
      status_lt: 500
      url_pattern: '/bc-exercise/\d+/edit'
