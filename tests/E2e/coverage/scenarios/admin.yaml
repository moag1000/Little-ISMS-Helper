# Admin-Panel form-fill scenarios (ROLE_ADMIN / ROLE_SUPER_ADMIN actions).
#
# Form block-prefixes use the FQCN→snake-case convention WITHOUT the
# `_type` suffix (Symfony Form\Util\StringUtil::fqcnToBlockPrefix).
# E.g. KpiThresholdConfigType → `kpi_threshold_config[<field>]`.
#
# Excludes destructive actions (bulk-delete, async-job triggers, setup-wizard).

scenarios:
  - name: admin_kpi_threshold_new
    label: "KPI Threshold anlegen"
    route: /de/admin/kpi-thresholds/new
    category: admin
    fill:
      'select[name="kpi_threshold_config[kpiKey]"]': "control_compliance"
      'input[name="kpi_threshold_config[goodThreshold]"]': "80"
      'input[name="kpi_threshold_config[warningThreshold]"]': "60"
    submit: auto
    expect:
      status_lt: 500
      url_pattern: '/de/admin/kpi-thresholds'

  - name: admin_supplier_criticality_new
    label: "Supplier-Kritikalitätsstufe anlegen"
    route: /de/admin/supplier-criticality/new
    category: admin
    fill:
      'input[name="supplier_criticality_level[code]"]': "CRIT_${random.suffix}"
      'input[name="supplier_criticality_level[labelDe]"]': "Kritisch Test"
      'input[name="supplier_criticality_level[labelEn]"]': "Critical Test"
      'input[name="supplier_criticality_level[sortOrder]"]': "10"
    submit: auto
    expect:
      status_lt: 500
      url_pattern: '/de/admin/supplier-criticality'

  - name: admin_tag_new
    label: "Tag anlegen"
    route: /de/admin/tags/new
    category: admin
    fill:
      'input[name="tag[name]"]': "review-${random.suffix}"
      'select[name="tag[type]"]': "custom"
      'select[name="tag[color]"]': "primary"
    submit: auto
    expect:
      status_lt: 500
      url_pattern: '/de/admin/tags'

  - name: admin_notification_rule_new
    label: "Notification Rule anlegen"
    route: /de/admin/notification/rule/new
    category: admin
    fill:
      'input[name="notification_rule[name]"]': "alert-${random.suffix}"
      'select[name="notification_rule[eventType]"]': "risk.created"
    submit: auto
    expect:
      status_lt: 500
      url_pattern: '/de/admin/notification/rule'

  - name: admin_audit_retention_edit
    label: "Audit-Log Retention speichern"
    route: /de/admin/audit-log/retention
    category: admin
    fill:
      'input[name="retention_days"]': "1095"
    submit: auto
    expect:
      status_lt: 500
      url_pattern: '/de/admin/audit-log/retention'

  - name: admin_quick_fix_settings
    label: "Quick-Fix Settings speichern"
    route: /de/admin/quick-fix-settings
    category: admin
    fill:
      'input[name="ip_allowlist"]': "192.168.1.0/24"
    submit: auto
    expect:
      status_lt: 500
      url_pattern: '/de/admin/quick-fix-settings'

  - name: admin_data_retention_settings
    label: "Data-Retention Policy speichern"
    route: /de/admin/settings/data-retention
    category: admin
    fill:
      'input[name="retention_days_risk"]': "730"
    submit: auto
    expect:
      status_lt: 500
      url_pattern: '/de/admin/settings/data-retention'

  - name: admin_lifecycle_override_edit
    label: "Lifecycle-Override bearbeiten"
    route: /de/admin/lifecycle-overrides/document_lifecycle/submit_for_review/edit
    category: admin
    fill:
      'input[name="lifecycle_override[roles_raw]"]': "ROLE_ADMIN, ROLE_MANAGER"
    submit: auto
    expect:
      status_lt: 500
      url_pattern: '/de/admin/lifecycle-overrides'
