<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Alva – Little ISMS Helper">
  <title>Alva – Little ISMS Helper</title>
  <defs>
    <radialGradient id="alva-aura" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="var(--alva-aura, #818cf8)" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="var(--alva-aura, #818cf8)" stop-opacity="0.17"/>
      <stop offset="100%" stop-color="var(--alva-aura, #818cf8)" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="alva-wing-l" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(--alva-primary, #0284c7)" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="var(--alva-accent, #7c3aed)" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="alva-wing-r" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="var(--alva-primary, #0284c7)" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="var(--alva-accent, #7c3aed)" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <style>
    :root { --alva-primary: #0284c7; --alva-accent: #7c3aed; --alva-aura: #818cf8; --alva-fg: #1e1b4b; --alva-ink: #1e1b4b; }
    @media (prefers-color-scheme: dark) {
      :root { --alva-primary: #38bdf8; --alva-accent: #a78bfa; --alva-aura: #6366f1; --alva-fg: #e9eaf5; --alva-ink: #0a0e1a; }
    }
    .alva-aura { animation: alva-aura-pulse 3s ease-in-out infinite; transform-origin: 60px 62px; }
    .alva-bob { animation: alva-breathe 3s ease-in-out infinite; transform-origin: 60px 60px; }
    .alva-wings { animation: alva-flap 1.1s ease-in-out infinite; transform-origin: 60px 58px; }
    @keyframes alva-breathe { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-2px) scale(1.02); } }
    @keyframes alva-aura-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    @keyframes alva-flap { 0%, 100% { transform: scaleX(1); } 50% { transform: scaleX(0.82); } }
    @media (prefers-reduced-motion: reduce) {
      .alva-aura, .alva-bob, .alva-wings { animation: none; }
    }
  </style>

  <circle class="alva-aura" cx="60" cy="62" r="56" fill="url(#alva-aura)"/>

  <g class="alva-bob">
    <g class="alva-wings">
      <path d="M55 50 Q20 30 14 54 Q16 72 44 66 Q52 62 55 52 Z" fill="url(#alva-wing-l)" stroke="var(--alva-primary, #0284c7)" stroke-width="0.6" stroke-opacity="0.5"/>
      <path d="M65 50 Q100 30 106 54 Q104 72 76 66 Q68 62 65 52 Z" fill="url(#alva-wing-r)" stroke="var(--alva-primary, #0284c7)" stroke-width="0.6" stroke-opacity="0.5"/>
      <path d="M56 64 Q34 72 32 86 Q40 92 54 82 Q58 76 56 66 Z" fill="url(#alva-wing-l)" opacity="0.6"/>
      <path d="M64 64 Q86 72 88 86 Q80 92 66 82 Q62 76 64 66 Z" fill="url(#alva-wing-r)" opacity="0.6"/>
      <circle cx="28" cy="52" r="1.1" fill="var(--alva-accent, #7c3aed)" opacity="0.75"/>
      <circle cx="92" cy="52" r="1.1" fill="var(--alva-accent, #7c3aed)" opacity="0.75"/>
    </g>

    <path d="M60 44 Q64.5 46 64.5 54 Q63 58 63 62 Q64.5 66 64 74 Q62 80 60 82 Q58 80 56 74 Q55.5 66 57 62 Q57 58 55.5 54 Q55.5 46 60 44 Z"
          fill="var(--alva-fg, #1e1b4b)" opacity="0.92" stroke="rgba(30,27,75,0.45)" stroke-width="0.4"/>

    <g>
      <ellipse cx="60" cy="39" rx="7.5" ry="8.5" fill="var(--alva-fg, #1e1b4b)" opacity="0.97" stroke="rgba(30,27,75,0.45)" stroke-width="0.4"/>
      <path d="M54 36 Q50 32 48 28" stroke="var(--alva-primary, #0284c7)" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.65"/>
      <path d="M66 36 Q70 32 72 28" stroke="var(--alva-primary, #0284c7)" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.65"/>
      <path d="M54 32.5 Q60 29.5 66 32.5" stroke="var(--alva-accent, #7c3aed)" stroke-width="0.7" stroke-linecap="round" fill="none" opacity="0.75"/>
      <circle cx="60" cy="30" r="0.9" fill="var(--alva-accent, #7c3aed)" opacity="0.9"/>
      <circle cx="57" cy="38" r="1.15" fill="var(--alva-ink, #1e1b4b)" opacity="0.92"/>
      <circle cx="63" cy="38" r="1.15" fill="var(--alva-ink, #1e1b4b)" opacity="0.92"/>
      <path d="M57.3 42.2 Q60 43.7 62.7 42.2" stroke="var(--alva-ink, #1e1b4b)" stroke-width="0.7" stroke-linecap="round" fill="none" opacity="0.85"/>
    </g>

    <line x1="55" y1="70" x2="36" y2="90" stroke="var(--alva-accent, #7c3aed)" stroke-width="1.3" stroke-linecap="round"/>
    <circle cx="36" cy="90" r="2.8" fill="var(--alva-accent, #7c3aed)"/>
    <circle cx="36" cy="90" r="5" fill="var(--alva-accent, #7c3aed)" opacity="0.25"/>
  </g>
</svg>
