<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f2ff" />
      <stop offset="100%" style="stop-color:#ff00ff" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="#0f172a" rx="20"/>
  <g filter="url(#glow)">
    <!-- Vereinfachte Fee-Silhouette -->
    <circle cx="50" cy="35" r="12" fill="white" stroke="#00f2ff" stroke-width="1"/>
    <path d="M 50 48 Q 65 48 65 65 Q 65 75 50 82 Q 35 75 35 65 Q 35 48 50 48" fill="white" stroke="#00f2ff" stroke-width="1"/>
    <!-- Zauberstab-Andeutung -->
    <path d="M 65 65 L 85 85" stroke="#ff00ff" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="85" cy="85" r="4" fill="#00f2ff"/>
    <!-- Flügel-Akzente -->
    <path d="M 45 40 Q 20 20 10 40 Q 20 50 45 45" fill="#00f2ff" opacity="0.6"/>
    <path d="M 55 40 Q 80 20 90 40 Q 80 50 55 45" fill="#00f2ff" opacity="0.6"/>
  </g>
</svg>
