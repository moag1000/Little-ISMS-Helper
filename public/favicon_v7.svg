<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="bodyG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff" />
      <stop offset="100%" style="stop-color:#e0f7fa" />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="#0f172a" rx="80"/>
  <g filter="url(#neon)">
    <!-- Fee Silhouette (v7) -->
    <circle cx="200" cy="160" r="50" fill="url(#bodyG)" stroke="#00f2ff" stroke-width="4"/>
    <path d="M 160 180 Q 80 100 200 220 Q 320 100 240 180" fill="#00f2ff" opacity="0.9" stroke="#ffffff" stroke-width="1"/>
    <!-- Zauberstab -->
    <g>
      <path d="M 160 210 L 100 150" stroke="#ff00ff" stroke-width="8" stroke-linecap="round"/>
      <path d="M 160 210 L 100 150" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
      <circle cx="100" cy="150" r="15" fill="#ffffff">
         <animate attributeName="r" values="15;20;15" dur="1s" repeatCount="indefinite" />
      </circle>
      <circle cx="100" cy="150" r="10" fill="#00f2ff"/>
    </g>
  </g>
</svg>
