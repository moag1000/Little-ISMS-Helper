<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="softGlowFav" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="wingGradFav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81e6d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#63b3ed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="magicGradFav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbb6ce;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b794f4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hintergrund mit runden Ecken -->
  <rect width="128" height="128" rx="32" fill="#0f172a"/>

  <!-- Vereinfachte Flügel -->
  <g opacity="0.9" filter="url(#softGlowFav)">
    <path d="M 64 60 Q 40 40 25 45 Q 15 50 64 65" fill="url(#wingGradFav)" stroke="#81e6d9" stroke-width="1.5"/>
    <path d="M 64 60 Q 88 40 103 45 Q 113 50 64 65" fill="url(#wingGradFav)" stroke="#81e6d9" stroke-width="1.5"/>

    <path d="M 64 68 Q 45 80 30 75 Q 25 70 64 68" fill="url(#magicGradFav)" stroke="#fbb6ce" stroke-width="1"/>
    <path d="M 64 68 Q 83 80 98 75 Q 103 70 64 68" fill="url(#magicGradFav)" stroke="#fbb6ce" stroke-width="1"/>
  </g>

  <!-- Vereinfachter Kawaii Kopf -->
  <g filter="url(#softGlowFav)">
    <circle cx="64" cy="48" r="14" fill="#ffffff" stroke="#81e6d9" stroke-width="1.5"/>
    <!-- Augen -->
    <circle cx="59" cy="48" r="2.5" fill="#1a202c"/>
    <circle cx="69" cy="48" r="2.5" fill="#1a202c"/>
    <!-- Fühler -->
    <path d="M 58 35 Q 55 25 60 20" fill="none" stroke="#fbb6ce" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 70 35 Q 73 25 68 20" fill="none" stroke="#fbb6ce" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="60" cy="18" r="2.5" fill="#f6e05e"/>
    <circle cx="68" cy="18" r="2.5" fill="#f6e05e"/>
  </g>
</svg>
