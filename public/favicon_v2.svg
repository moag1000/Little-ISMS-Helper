<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Modern Round Rect Background -->
  <rect width="128" height="128" rx="28" fill="#0f172a"/>

  <!-- Minimalist Wings -->
  <g opacity="0.8" filter="url(#glow)">
    <path d="M 60 55 C 40 45 25 35 20 38 C 15 41 25 55 60 60" fill="none" stroke="url(#primaryGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 68 55 C 88 45 103 35 108 38 C 113 41 103 55 68 60" fill="none" stroke="url(#primaryGrad)" stroke-width="3" stroke-linecap="round"/>

    <path d="M 60 62 C 45 68 30 78 28 75 C 26 72 35 62 60 62" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 68 62 C 83 68 98 78 100 75 C 102 72 93 62 68 62" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Central Element (Shield Head) -->
  <g filter="url(#glow)">
    <path d="M 64 45 L 75 50 L 75 62 Q 75 70 64 75 Q 53 70 53 62 L 53 50 Z" fill="#f8fafc" stroke="#06b6d4" stroke-width="1.5"/>
    <!-- Cyber Eyes -->
    <rect x="58" y="55" width="4" height="1.5" rx="0.5" fill="#06b6d4"/>
    <rect x="66" y="55" width="4" height="1.5" rx="0.5" fill="#06b6d4"/>
    <!-- Antenna -->
    <line x1="64" y1="45" x2="64" y2="38" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="1 1"/>
    <circle cx="64" cy="37" r="2.5" fill="#06b6d4"/>
  </g>
</svg>
