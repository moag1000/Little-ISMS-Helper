<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Weiches Glühen -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Magischer Sternenglanz -->
    <filter id="starDust" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Pastell-Gradients -->
    <linearGradient id="wingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81e6d9;stop-opacity:0.9" /> <!-- Soft Cyan -->
      <stop offset="100%" style="stop-color:#63b3ed;stop-opacity:0.7" /> <!-- Sky Blue -->
    </linearGradient>

    <linearGradient id="magicGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbb6ce;stop-opacity:1" /> <!-- Soft Pink -->
      <stop offset="100%" style="stop-color:#b794f4;stop-opacity:1" /> <!-- Soft Purple -->
    </linearGradient>

    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7fafc;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="auraGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbb6ce;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Hintergrund mit runden Ecken -->
  <rect width="400" height="400" fill="#0f172a" rx="60"/>

  <!-- Weiche Aura -->
  <circle cx="200" cy="180" r="160" fill="url(#auraGradient)"/>

  <!-- Verspielte Flügel (Rundere Formen) -->
  <g opacity="0.9" filter="url(#softGlow)">
    <!-- Obere Flügel -->
    <path d="M 195 175 Q 120 120 70 140 Q 40 160 195 185" fill="url(#wingGradient)" stroke="#81e6d9" stroke-width="2"/>
    <path d="M 205 175 Q 280 120 330 140 Q 360 160 205 185" fill="url(#wingGradient)" stroke="#81e6d9" stroke-width="2"/>

    <!-- Untere Flügel -->
    <path d="M 195 190 Q 140 230 100 215 Q 80 200 195 190" fill="url(#magicGradient)" stroke="#fbb6ce" stroke-width="1.5"/>
    <path d="M 205 190 Q 260 230 300 215 Q 320 200 205 190" fill="url(#magicGradient)" stroke="#fbb6ce" stroke-width="1.5"/>
  </g>

  <!-- Niedliche Fee (Kawaii-Style) -->
  <g filter="url(#softGlow)">
    <!-- Körper / Kleidchen (Leichte Schildform-Andeutung) -->
    <path d="M 200 150 Q 220 150 220 180 Q 220 200 200 210 Q 180 200 180 180 Q 180 150 200 150" fill="url(#bodyGradient)" stroke="#81e6d9" stroke-width="2"/>

    <!-- Kopf (Rund und freundlich) -->
    <circle cx="200" cy="135" r="22" fill="url(#bodyGradient)" stroke="#81e6d9" stroke-width="2"/>

    <!-- Kawaii Augen (Groß und glänzend) -->
    <circle cx="192" cy="135" r="4" fill="#1a202c"/>
    <circle cx="208" cy="135" r="4" fill="#1a202c"/>
    <!-- Glanzpunkte in den Augen -->
    <circle cx="193" cy="133" r="1.5" fill="white"/>
    <circle cx="209" cy="133" r="1.5" fill="white"/>

    <!-- Kleiner Mund -->
    <path d="M 197 142 Q 200 145 203 142" fill="none" stroke="#1a202c" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Fühler mit Sternchen (Magie & Technik Mix) -->
    <path d="M 190 115 Q 185 100 195 90" fill="none" stroke="#fbb6ce" stroke-width="2" stroke-linecap="round"/>
    <path d="M 210 115 Q 215 100 205 90" fill="none" stroke="#fbb6ce" stroke-width="2" stroke-linecap="round"/>

    <path d="M 195 85 L 197 90 L 202 91 L 198 94 L 199 99 L 195 96 L 191 99 L 192 94 L 188 91 L 193 90 Z" fill="#f6e05e">
        <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite" />
    </path>
    <path d="M 205 85 L 207 90 L 212 91 L 208 94 L 209 99 L 205 96 L 201 99 L 202 94 L 198 91 L 203 90 Z" fill="#f6e05e">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Typografie: Rund, freundlich, dennoch professionell -->
  <g font-family="Ubuntu, 'Quicksand', 'Segoe UI', sans-serif" font-weight="700" text-anchor="middle">
    <!-- "Little ISMS" -->
    <text x="200" y="325" font-size="34" fill="#ffffff">
      <tspan fill="#81e6d9">Little</tspan> ISMS
    </text>
    <!-- "Helper" mit weicherem Look -->
    <text x="200" y="365" font-size="24" fill="#fbb6ce" font-weight="500" letter-spacing="3">
      HELPER
    </text>
  </g>

  <!-- Dekorative Glitzer-Elemente (Nodes) -->
  <g opacity="0.6" filter="url(#starDust)">
    <circle cx="60" cy="60" r="4" fill="#f6e05e"/>
    <circle cx="340" cy="60" r="4" fill="#81e6d9"/>
    <circle cx="340" cy="340" r="4" fill="#fbb6ce"/>
    <circle cx="60" cy="340" r="4" fill="#b794f4"/>
  </g>
</svg>
