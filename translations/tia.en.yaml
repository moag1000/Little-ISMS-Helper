    edit_title: 'Edit TIA'

  help:
    concept_title: 'What is a TIA?'
    concept_body: >
      A Transfer Impact Assessment (TIA) checks whether a third-country recipient –
      e.g. a US cloud provider such as AWS or Google – can guarantee essentially
      equivalent data protection despite national surveillance law (e.g. FISA 702,
      CLOUD Act). Without this assessment, SCCs or BCRs alone cannot serve as a
      lawful transfer safeguard (CJEU C-311/18, Schrems-II, 16 July 2020).
    norm_ref: 'Legal basis: GDPR Art. 46 (Appropriate safeguards), Art. 49 (Derogations), CJEU Schrems-II, EDPB Recommendations 01/2020 (Supplementary measures)'
    destination_country: 'ISO-3166-1 alpha-2 country code, e.g. US, CN, IN'
    recipient_name: 'Name of the specific recipient (e.g. AWS Inc., Google LLC)'
    transfer_mechanism: 'Legal basis for the third-country transfer under Art. 46 / 49 GDPR'
    law_surveillance_risk: >
      EDPB Step 3: Assessment of the destination country''s legal framework.
      Evaluate whether national law (e.g. US FISA 702 / EO 12333 / CLOUD Act,
      CN National Intelligence Law Art. 7) undermines the transfer safeguard.
      Describe the extent to which the protection guarantee is impaired.
    supplementary_measures: >
      EDPB Step 4: Supplementary measures to close the protection gap.
      Examples: end-to-end encryption with controller-held keys, pseudonymisation
      before transfer, contractual prohibition of broader government access,
      transparency obligations on the importer.
    residual_risk_rating: >
      EDPB Step 5: Residual risk after applying supplementary measures.
      High = transfer MUST be suspended (Art. 58(2)(f) GDPR).
    conclusion: 'Overall conclusion and any conditions for the transfer'

