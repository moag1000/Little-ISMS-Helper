policy:
    bsi:
        teleworking_directive:
            v1:
                title: 'Teleworking / Home-Office Directive'
                body: |-
                    # Teleworking Directive of {{ tenant.legal_name }}

                    *Normative anchor: BSI 200-2 | Building blocks: OPS.1.2.4.A1 (teleworking rules), A2 (security requirements), A3 (awareness) | Edition: {{ bsi.kompendium_edition }} | Review: 24 months*

                    ## 1. Purpose
                    This directive governs the security-relevant aspects of teleworking (home office, mobile work outside business premises) at {{ tenant.legal_name }}. It implements the requirements from OPS.1.2.4 and observes co-determination of employee representation.

                    ## 2. Scope
                    Covers all employees who work in part or predominantly outside the premises of the organisation, and external personnel where permitted.

                    ## 3. Eligible Persons and Activities
                    Teleworking is permitted in principle subject to manager approval. Excluded are activities involving particularly protection-needy data (e.g. VS-NfD) unless the home environment is correspondingly certified.

                    ## 4. Home-Workplace Requirements (OPS.1.2.4.A2)
                    - lockable room or at minimum lockable container;
                    - visual screening from unauthorised view (family, visitors);
                    - suitable storage of business documents;
                    - no recording of business conversations by private devices (e.g. smart speakers).

                    ## 5. Permissible Devices
                    Standard is the use of company notebooks and smartphones. BYOD is permissible at normal protection-needs level, but only with a container solution (separation of business/private). At high protection needs BYOD is not permitted.

                    ## 6. Connection Security
                    - VPN mandatory for all business connections;
                    - MFA mandatory (cross-reference ORP.4);
                    - no use of public Wi-Fi without VPN;
                    - home Wi-Fi with WPA3 (minimum WPA2) and a strong password.

                    ## 7. Print and Storage Rules
                    - business data are printed centrally; home printing only exceptionally;
                    - paper documents are disposed of on business premises (cross-reference CON.6);
                    - no external data carriers without encryption.

                    ## 8. Loss / Theft
                    On loss or theft, immediately notify service desk / ISB {{ roles.isb.fullName }}; remote wipe is triggered (cross-reference DER.2.1).

                    ## 9. Data Protection and Co-Determination
                    GDPR requirements apply unchanged in home office. Co-determination of employee representation is observed (e.g. works agreement on teleworking).

                    ## 10. Inspection Rights
                    Employer inspection rights are governed in the works agreement; encroachments on privacy are avoided.

                    ## 11. Awareness (OPS.1.2.4.A3)
                    Teleworkers receive an awareness briefing prior to first teleworking; annual refresher within the awareness directive (cross-reference ORP.3).

                    ---
                    *Cross-reference ISO/IEC 27002:2022 § 6.7, 7.1. Approval per: {{ approval.chain }}.*
                section:
                    eligibility:
                        title: 'Eligibility'
                        body: |-
                            Manager approval; excluded are particularly protection-needy activities (e.g. VS-NfD).
                    workplace_requirements:
                        title: 'Home Workplace'
                        body: |-
                            Lockable, visual screening, storage, no smart speakers (OPS.1.2.4.A2).
                    devices:
                        title: 'Permissible Devices'
                        body: |-
                            Company devices standard; BYOD only with container and not at high protection needs.
                    connection:
                        title: 'Connection Security'
                        body: |-
                            VPN + MFA mandatory; no public Wi-Fi without VPN; home Wi-Fi WPA3.
                    print_storage:
                        title: 'Print / Storage'
                        body: |-
                            Central printing preferred; disposal on premises; no external carriers without encryption.
                    loss:
                        title: 'Loss / Theft'
                        body: |-
                            Immediate notification to ISB; remote wipe (cross-reference DER.2.1).
                    works_council:
                        title: 'Data Protection / Co-Determination'
                        body: |-
                            GDPR; works agreement on teleworking; privacy protected.
                    awareness:
                        title: 'Awareness'
                        body: |-
                            Prior to first teleworking + annual refresher (OPS.1.2.4.A3 + cross-reference ORP.3).
                tailoring_field:
                    home_office_quota:
                        label: 'Home-Office Quota'
                        placeholder: 'Example: "Up to 60 percent of weekly work in home office; on-site days Mon and Wed mandatory; exceptions approved by line managers."'
                    byod_policy:
                        label: 'BYOD Policy'
                        placeholder: 'Example: "BYOD only with MDM container and MFA; not permitted for users at high protection needs; annual self-declaration of home environment."'
                    works_agreement:
                        label: 'Works Agreement on Teleworking'
                        placeholder: 'Example: "Teleworking works agreement of 1 July 2025 with works council; inspection rights limited to audit logs in business systems; no privacy intrusion."'

        remote_maintenance_directive:
            v1:
                title: 'Remote Maintenance Directive'
                body: |-
                    # Remote Maintenance Directive of {{ tenant.legal_name }}

                    *Normative anchor: BSI 200-2 | Building blocks: OPS.1.2.5.A1 (planning), A2 (safeguards), A3 (authentication), A4 (logging) | Edition: {{ bsi.kompendium_edition }} | Review: annual*

                    ## 1. Purpose
                    This directive governs secure remote maintenance of internal and outsourced IT systems at {{ tenant.legal_name }}, including in-house and external maintenance and ICS/OT specifics.

                    ## 2. Scope
                    Covers all remote access from external sources (Internet, vendor networks) and between organisationally or network-separated areas.

                    ## 3. Permitted Maintenance Tools
                    A central list of approved remote-maintenance tools is maintained. Unapproved tools are not permitted. Ad-hoc tools (e.g. private TeamViewer) are prohibited.

                    ## 4. Authentication (OPS.1.2.5.A3)
                    - personal accounts (no shared);
                    - MFA mandatory (cross-reference ORP.4);
                    - no default/vendor passwords;
                    - vendor maintenance accounts only enabled during active maintenance need.

                    ## 5. Session Recording
                    For external service providers, sessions are recorded (audio + video / keyboard). Recording in compliance with co-determination and GDPR (cross-reference OPS.1.1.5).

                    ## 6. Just-in-Time Approval
                    Remote maintenance is performed only for a specific maintenance slot; approval per session by responsible owner or via PAM workflow.

                    ## 7. Network Segmentation
                    Remote-maintenance access terminates in a separate maintenance zone (bastion); direct access from the Internet to production systems is not permitted.

                    ## 8. Contractual Requirements External (OPS.2.3)
                    NDA, SLA, audit rights, sub-contractor approval; termination clauses for security incidents.

                    ## 9. Emergency Cut-Off (Kill-Switch)
                    Remote-maintenance connections can be centrally terminated at any time (kill-switch). On suspicion of misuse the connection is immediately cut and the incident reported to the ISB {{ roles.isb.fullName }} (cross-reference DER.2.1).

                    ## 10. ICS/OT Specifics
                    For ICS/OT remote maintenance the following additionally applies: only via industrial security gateway; only during maintenance windows; vendor authentication mapped to internal IAM.

                    ---
                    *Cross-reference ISO/IEC 27002:2022 § 8.21 (network services security), § 5.7 (threat intel). Approval per: {{ approval.chain }}.*
                section:
                    tools:
                        title: 'Permitted Tools'
                        body: |-
                            Central list of approved tools; ad-hoc tools prohibited.
                    authentication:
                        title: 'Authentication'
                        body: |-
                            Personal accounts; MFA mandatory; no default passwords; just-in-time vendor activation (OPS.1.2.5.A3).
                    recording:
                        title: 'Session Recording'
                        body: |-
                            External providers: recording; co-determination + GDPR (cross-reference OPS.1.1.5).
                    jit:
                        title: 'Just-in-Time'
                        body: |-
                            Approval per session; PAM workflow.
                    segmentation:
                        title: 'Network Segmentation'
                        body: |-
                            Maintenance zone (bastion); no direct Internet access to production.
                    contracts:
                        title: 'Contractual Requirements'
                        body: |-
                            NDA, SLA, audit, sub-contractor approval (cross-reference OPS.2.3).
                    kill_switch:
                        title: 'Emergency Cut-Off'
                        body: |-
                            Central termination at any time; incident notification to ISB (cross-reference DER.2.1).
                    ics_ot:
                        title: 'ICS/OT Specifics'
                        body: |-
                            Industrial security gateway; maintenance window; vendor auth mapped to internal IAM.
                tailoring_field:
                    approved_tools:
                        label: 'Approved Tools'
                        placeholder: 'Example: "BeyondTrust Privileged Remote Access for internal admins; supplier bastion via PAM with just-in-time; notebook support via Microsoft Intune Remote Help."'
                    bastion_setup:
                        label: 'Bastion / Maintenance Zone'
                        placeholder: 'Example: "Bastion cluster in DMZ-Maintenance; inbound only via central reverse proxy with MFA; outbound only to approved targets."'
                    ot_gateway:
                        label: 'ICS/OT Maintenance Gateway'
                        placeholder: 'Example: "Industrial DMZ with hardware gateway Tofino; vendor sessions via dedicated IAM; maintenance window Wed 02:00-04:00."'

        cloud_usage_directive:
            v1:
                title: 'Cloud Usage Directive'
                body: |-
                    # Cloud Usage Directive of {{ tenant.legal_name }}

                    *Normative anchor: BSI 200-2 + BSI C5 | Building blocks: OPS.2.2.A1 (cloud-usage strategy), A2 (cloud security policy), A3 (service definition), A4 (responsibility), A5 (transition planning) | C5: 2020 / 2026 (in preparation) | Edition: {{ bsi.kompendium_edition }} | Review: annual*

                    ## 1. Purpose
                    This directive governs the selection, procurement and secure usage of cloud services at {{ tenant.legal_name }}. It integrates the BSI Cloud Computing Compliance Criteria Catalogue (C5) and Schrems-II requirements for third-country transfers (cross-reference CON.2).

                    ## 2. Scope
                    Covers all cloud services (public, private, hybrid) and multi-cloud constellations regardless of service model (IaaS, PaaS, SaaS, FaaS).

                    ## 3. Cloud Strategy (OPS.2.2.A1)
                    {{ tenant.legal_name }} pursues a cloud-smart strategy (cloud choice per use case, with priority for EU-sovereign solutions for sensitive data); concretised in the tailoring field.

                    ## 4. Data Classification → Cloud Suitability
                    | Protection needs | Cloud permitted? |
                    |---|---|
                    | normal (internal, public) | EU public cloud, SaaS in EU; sectoral check |
                    | high | EU public cloud with C5 attestation or ISO 27001 + ISO 27017/27018; Schrems-II-conforming |
                    | very high | private cloud, own infrastructure or C5-Plus with sovereign options; review by BfDI / BSI |

                    Strictly confidential / VS-NfD data are not processed in public clouds unless a BSI approval exists.

                    ## 5. Provider Requirements
                    - C5 attestation (status 2026 with C5:2026 in preparation) mandatory for critical-infrastructure / very high protection needs;
                    - ISO/IEC 27001 + 27017 (cloud) + 27018 (PII) minimum requirement;
                    - SOC 2 Type II as additional evidence;
                    - EU data location preferred; third-country transfer only Schrems-II-conforming.

                    ## 6. Responsibility Matrix (OPS.2.2.A4)
                    Per cloud service model the shared-responsibility matrix is documented (provider vs. tenant). Examples:

                    - **IaaS:** provider = hardware, hypervisor; tenant = OS, application, data;
                    - **PaaS:** provider = hardware, OS, platform; tenant = application, data;
                    - **SaaS:** provider = platform + application; tenant = configuration, identities, data.

                    Important: SaaS providers do not back up application data by default in many cases — own backups required (cross-reference CON.3).

                    ## 7. Data Location and Third-Country Transfer (Schrems-II)
                    Data location is contractually defined; sub-processors are disclosed; for US providers a TIA (Transfer Impact Assessment) is performed; CLOUD Act risk is assessed.

                    ## 8. Encryption
                    - customer-managed keys preferred (cross-reference CON.1);
                    - encryption in transit (TLS 1.2+) and at rest mandatory;
                    - bring-your-own-key (BYOK) and hold-your-own-key (HYOK) for very high protection needs.

                    ## 9. Identity Federation
                    Cloud identities are federated with the central identity provider (SAML/OIDC); MFA mandatory (cross-reference ORP.4); conditional access (geo, device, risk) where supported.

                    ## 10. Logging / Monitoring
                    Provider logs are integrated centrally into the SIEM (cross-reference OPS.1.1.5); additional own audit mechanisms per service model.

                    ## 11. Backup Responsibility
                    Cloud providers do not back up application data by default in many cases. Tenant-side backup per CON.3 is mandatory.

                    ## 12. Exit Strategy
                    Contractually defined: data return format, deadline, deletion confirmation, crypto-erase. Reversibility test at least every two years.

                    ---
                    *Cross-reference ISO/IEC 27002:2022 § 5.23. C5 is a BSI standard; ISO 27017/27018 are cloud security and PII extensions. Approval per: {{ approval.chain }}.*
                section:
                    strategy:
                        title: 'Cloud Strategy'
                        body: |-
                            Cloud-smart with EU-sovereign priority for sensitive data (OPS.2.2.A1).
                    classification:
                        title: 'Cloud Suitability by Class'
                        body: |-
                            Normal: EU public cloud; high: C5 attestation / ISO 27001+27017+27018; very high: private/sovereign.
                    provider_requirements:
                        title: 'Provider Requirements'
                        body: |-
                            C5 + ISO 27001/27017/27018 + where applicable SOC 2 Type II; EU data location preferred.
                    responsibility:
                        title: 'Responsibility Matrix'
                        body: |-
                            Shared responsibility per IaaS / PaaS / SaaS documented (OPS.2.2.A4).
                    data_location:
                        title: 'Data Location / Third Country'
                        body: |-
                            Contractual definition; TIA for US providers; CLOUD Act risk assessed.
                    encryption:
                        title: 'Encryption'
                        body: |-
                            Customer-managed keys preferred; BYOK/HYOK for very high protection needs (cross-reference CON.1).
                    federation:
                        title: 'Identity Federation'
                        body: |-
                            SAML/OIDC with MFA and conditional access.
                    logging:
                        title: 'Logging / Monitoring'
                        body: |-
                            Provider logs in SIEM; additional audit mechanisms.
                    backup:
                        title: 'Backup Responsibility'
                        body: |-
                            SaaS does NOT back up application data by default — tenant backup mandatory (cross-reference CON.3).
                    exit:
                        title: 'Exit Strategy'
                        body: |-
                            Data return, deadline, deletion confirmation, crypto-erase; reversibility test every two years.
                tailoring_field:
                    cloud_geo:
                        label: 'Cloud Geo Strategy'
                        placeholder: 'Example: "Data with high protection needs only in EU regions; sovereign cloud (e.g. German Cloud) at very high; US SaaS only for public documents."'
                    c5_requirement:
                        label: 'C5 Attestation Requirement'
                        placeholder: 'Example: "All SaaS providers with high or sensitive data access must hold a current C5 attestation (Type 2); annual review by compliance."'
                    exit_test:
                        label: 'Exit Test'
                        placeholder: 'Example: "Reversibility test every 18 months for the largest SaaS provider; data return format CSV + JSON; data integrity verification."'

        outsourcing_supplier_directive:
            v1:
                title: 'Outsourcing / Supplier Directive'
                body: |-
                    # Outsourcing Directive of {{ tenant.legal_name }}

                    *Normative anchor: BSI 200-2 | Building blocks: OPS.2.3.A1-A5 (security requirements, selection, contract, multi-tenancy, joint security concept) | EU-DORA Art. 28-30 (ICT third-party risk for financial services) | Edition: {{ bsi.kompendium_edition }} | Review: annual + on contract change*

                    ## 1. Purpose
                    This directive governs security requirements for suppliers and outsourced service providers of {{ tenant.legal_name }}. It integrates DORA third-party risk management for financial-services entities (cross-reference EU-DORA Art. 28-30).

                    ## 2. Scope
                    Covers all outsourcing relationships, including IT service providers, cloud providers, processors, cleaning service, security service and all suppliers with access to information assets.

                    ## 3. Supplier Classification
                    Suppliers are classified by risk level:

                    - **Critical:** access to confidential data, availability-critical or under DORA obligation;
                    - **Standard:** medium data access or availability needs;
                    - **Low:** no significant data access, easily replaceable.

                    ## 4. Onboarding Process
                    Prior to contract signing due diligence is performed:

                    - financial-stability check;
                    - security certificates (ISO 27001, C5, SOC 2 Type II) per classification;
                    - security questionnaire (e.g. CAIQ);
                    - sub-processor concept review;
                    - DPO review for personal-data processing.

                    ## 5. Minimum Contract Clauses (OPS.2.3.A3)
                    - **NDA / non-disclosure agreement;**
                    - **DPA** per GDPR Art. 28 (for personal data);
                    - **SLA** with availability, response time, recovery time;
                    - **audit rights** (including by supervisory authorities under DORA);
                    - **sub-contractor approval** with approval requirement;
                    - **incident-notification duties** with deadlines;
                    - **exit / reversibility clauses** (data-return format, deletion confirmation);
                    - **sanctions** for security violations;
                    - **DORA clauses** (Art. 30) for financial services.

                    ## 6. Multi-Tenancy (OPS.2.3.A4)
                    For multi-tenant services the clean separation between tenants is documented and audited; for very high protection needs single tenancy is preferred.

                    ## 7. Ongoing Monitoring
                    - KPI-based monitoring (availability, incidents);
                    - incident-notification channel integrated with the DER.2.1 workflow;
                    - annual security reviews;
                    - acceptance audits for critical suppliers every 1-3 years.

                    ## 8. Audit Cadence
                    - critical suppliers: annual (on-site or remote);
                    - standard: every 2-3 years;
                    - low: on event.

                    ## 9. Exit and Reversibility Strategy
                    Contractually defined: data return, deletion confirmation, migration support, exit-process testing (in particular DORA requirement).

                    ## 10. Supply-Chain Mapping
                    Sub-processors and their sub-processors are mapped where possible; in particular for DORA-eligible providers.

                    ## 11. Concentration Risk
                    Concentration risk (dependency on few providers) is assessed; back-up providers or multi-sourcing for critical services.

                    ---
                    *Cross-reference ISO/IEC 27002:2022 § 5.19-5.23 (supplier relationships); EU-DORA Art. 28-30 for financial services. Approval per: {{ approval.chain }}.*
                section:
                    classification:
                        title: 'Supplier Classification'
                        body: |-
                            Critical / standard / low based on data access, availability and DORA obligation.
                    onboarding:
                        title: 'Onboarding'
                        body: |-
                            Due diligence, certificates, questionnaire, sub-processor concept, DPO review.
                    contract_clauses:
                        title: 'Contract Clauses'
                        body: |-
                            NDA, DPA, SLA, audit, sub-contractor approval, notification, exit, DORA clauses (OPS.2.3.A3).
                    multi_tenancy:
                        title: 'Multi-Tenancy'
                        body: |-
                            Separation documented; single tenancy at very high protection needs (OPS.2.3.A4).
                    monitoring:
                        title: 'Ongoing Monitoring'
                        body: |-
                            KPIs, incident channel, annual reviews, audits.
                    audit_cadence:
                        title: 'Audit Cadence'
                        body: |-
                            Critical annual; standard every 2-3 years; low on event.
                    exit:
                        title: 'Exit Strategy'
                        body: |-
                            Data return, deletion confirmation, migration, exit test (DORA-relevant).
                    supply_chain:
                        title: 'Supply-Chain Mapping'
                        body: |-
                            Sub-processors documented.
                    concentration:
                        title: 'Concentration Risk'
                        body: |-
                            Assessment, multi-sourcing for critical services.
                tailoring_field:
                    critical_suppliers:
                        label: 'Critical Suppliers'
                        placeholder: 'Example: "Microsoft (M365), AWS (hosting), Datacom (DC maintenance), DSL-Telekom (connectivity); annual on-site audit; DORA-conforming contracts from Q2 2026."'
                    contract_template:
                        label: 'Contract Template'
                        placeholder: 'Example: "Standard outsourcing contract version 4.0 with DORA annex; audit rights with 30-day notice; sub-contractor approval within 14 days."'
                    incident_notification:
                        label: 'Incident Notification Duty'
                        placeholder: 'Example: "Suppliers report security incidents within 4 h initial + 24 h detail report; activation of crisis team for severity high or critical."'

        detection_directive:
            v1:
                title: 'Detection Directive'
                body: |-
                    # Detection Directive of {{ tenant.legal_name }}

                    *Normative anchor: BSI 200-2 | Building blocks: DER.1.A1 (detection security policy), A2 (legal conditions), A3 (responsibilities), A4 (log messages) | Standard: A5-A11 (correlation, alerting) | Edition: {{ bsi.kompendium_edition }} | Review: annual*

                    ## 1. Purpose
                    This directive establishes detection of security incidents, anomalies and threat indicators in the IT systems of {{ tenant.legal_name }}. It integrates SIEM, EDR, NDR and where applicable UEBA into a coherent detection strategy.

                    ## 2. Scope
                    Covers all IT systems in the information network including cloud services, ICS/OT (with special provisions) and external service-provider systems where audit rights exist.

                    ## 3. Detection Strategy
                    - **SIEM:** central collection and correlation (cross-reference OPS.1.1.5);
                    - **EDR:** endpoint detection and response (cross-reference OPS.1.1.4);
                    - **NDR:** network detection and response;
                    - **UEBA:** user and entity behaviour analytics (with DPIA);
                    - **Cloud-native detection:** cloud-provider security centres (e.g. AWS GuardDuty, Azure Defender).

                    ## 4. Use Cases / Detection Rules
                    Use cases are based on:

                    - MITRE ATT&CK framework;
                    - BSI threat advisory and warnings;
                    - own threat analyses (cross-reference risk analysis BSI 200-3);
                    - sectoral threat-intelligence feeds.

                    Use cases are reviewed at least annually and extended for new threats.

                    ## 5. False-Positive Management
                    The SOC team maintains a tuning list; false-positive rate is tracked as KPI; high FP rates trigger use-case logic adjustments.

                    ## 6. Alerting and Escalation
                    Classification P1-P4 with response times:

                    | Tier | Response |
                    |---|---|
                    | P1 (critical) | immediate, 24/7 |
                    | P2 (high) | 1 hour |
                    | P3 (medium) | 4 hours |
                    | P4 (low) | 1 working day |

                    ## 7. SOC Model
                    The SOC model is concretised in the tailoring (in-house, external, hybrid). For external SOC outsourcing requirements apply (cross-reference OPS.2.3).

                    ## 8. Data Protection (DER.1.A2)
                    - works/personnel-council co-determination;
                    - DPIA for UEBA with personal-data evaluation;
                    - personal data minimised; pseudonymisation where possible;
                    - access rights to evaluations restrictive.

                    ## 9. Threat-Intelligence Feeds
                    - commercial feeds (to be specified in tailoring);
                    - BSI threat advisory and warnings;
                    - MISP communities;
                    - sectoral CERTs (e.g. CERT-Bund, sectoral CSIRTs).

                    ---
                    *Cross-reference ISO/IEC 27002:2022 § 8.16 (monitoring activities). Approval per: {{ approval.chain }}.*
                section:
                    strategy:
                        title: 'Detection Strategy'
                        body: |-
                            SIEM, EDR, NDR, UEBA, cloud-native; integrated correlation.
                    use_cases:
                        title: 'Use Cases / Rules'
                        body: |-
                            MITRE ATT&CK + BSI advisory + own analyses + sectoral feeds.
                    fp_management:
                        title: 'False-Positive Management'
                        body: |-
                            SOC tuning; FP rate KPI; use-case adjustment.
                    alerting:
                        title: 'Alerting'
                        body: |-
                            P1-P4 with response times 24/7 / 1 h / 4 h / 1 WD.
                    soc_model:
                        title: 'SOC Model'
                        body: |-
                            In-house / external / hybrid; for external cross-reference OPS.2.3.
                    privacy:
                        title: 'Data Protection'
                        body: |-
                            Co-determination, DPIA for UEBA, pseudonymisation, restrictive access (DER.1.A2).
                    threat_intel:
                        title: 'Threat Intelligence'
                        body: |-
                            Commercial + BSI advisory + MISP + sectoral CERTs.
                tailoring_field:
                    soc_setup:
                        label: 'SOC Setup'
                        placeholder: 'Example: "Hybrid: in-house SOC 8x5 + external 24/7 provider (contract with Z-CERT GmbH); escalation to internal ISB on-call pool at P1."'
                    threat_feeds:
                        label: 'Threat-Intel Feeds'
                        placeholder: 'Example: "BSI-CERT-Bund (mandatory), MISP community sector X, commercial feed (Mandiant); evaluation in SIEM with IOC matching."'
                    ueba_status:
                        label: 'UEBA Status'
                        placeholder: 'Example: "UEBA not yet active; pilot Q3 2026 with works-council co-determination and DPIA; use cases: anomalous login behaviour, data exfiltration."'

        incident_response_directive:
            v1:
                title: 'Incident Response Directive'
                body: |-
                    # Incident Response Directive of {{ tenant.legal_name }}

                    *Normative anchor: BSI 200-2 | Building blocks: DER.2.1.A1 (definition), A2 (handling policy), A3 (notification paths), A4 (containment), A5 (recovery), A6 (post-incident) | Standard: A7-A14 (specialised teams, external support) | Regulatory: NIS2 Art. 23 (24h/72h/1m), GDPR Art. 33 (72h), DORA Art. 17-23, BSIG §8b (critical-infrastructure) | Edition: {{ bsi.kompendium_edition }} | Review: annual + after each major incident*

                    ## 1. Purpose
                    This directive governs the handling of security incidents at {{ tenant.legal_name }}. It defines notification paths, response phases, escalations and external notification duties.

                    ## 2. Scope
                    Covers all security incidents, including cyber attacks, data-protection breaches, physical security incidents and insider threats.

                    ## 3. Definition: Security Incident vs. Disturbance (DER.2.1.A1)
                    - **Security incident:** event that impairs or could impair confidentiality, integrity, availability or authenticity;
                    - **Disturbance:** technical impairment without security relevance (e.g. performance issue without manipulation suspicion).

                    ## 4. Classification Matrix (Severity)
                    | Tier | Example | Response |
                    |---|---|---|
                    | low | individual failed logins | standard handling |
                    | medium | confirmed phishing victim | SOC + ISB escalation |
                    | high | malware infection of single systems | ISB + IT lead + crisis-team preparation |
                    | critical | ransomware attack, mass data leak | crisis team + external CERTs + authorities |

                    ## 5. Notification Paths (DER.2.1.A3)
                    - **Internal:** employees → service desk → SOC/ISB → top management;
                    - **External (statutory):**
                      - **GDPR Art. 33:** within 72 hours to supervisory authority (BfDI);
                      - **NIS2 Art. 23:** early warning 24 h, detail report 72 h, final report 1 month;
                      - **DORA Art. 19:** initial notification to supervisory authority (BaFin/ECB);
                      - **BSIG §8b (critical-infrastructure):** without delay to BSI;
                      - **Law enforcement:** ZAC or LKA where criminal offences exist.

                    ## 6. Response Phases
                    1. **Detect** — via SOC, EDR, employee report;
                    2. **Assess** — severity classification;
                    3. **Contain** — isolation, account block;
                    4. **Eradicate** — malware removal, vulnerability patching;
                    5. **Recover** — restore from verified backup, verification;
                    6. **Lessons Learned** — post-incident review, derive measures.

                    ## 7. CSIRT/CERT
                    For medium and higher classification the internal CSIRT is activated; for critical classification additionally an external incident-response partner and CERT-Bund.

                    ## 8. Escalation Tiers
                    - **Level 1:** SOC + ISB;
                    - **Level 2:** ISB + IT lead + emergency officer where applicable;
                    - **Level 3:** crisis team + top management + external authorities where applicable;
                    - **Level 4:** external crisis communication (press office, customers).

                    ## 9. Forensics Interface
                    For incidents requiring forensics the IT-Forensics Directive applies (cross-reference DER.2.2). Evidence collection begins immediately, without powering off the system.

                    ## 10. External Communication
                    Press office, customer communication and supervisory communication are coordinated centrally by the press office; content is pre-cleared by the ISB and legal.

                    ## 11. Exercise Obligation
                    At least annually a tabletop exercise with the crisis team; for critical-infrastructure additionally a simulation exercise. Cross-reference BCM exercises DER.4.

                    ## 12. Specific Notification Duties
                    Wizard / ISB maintains a **notification-duties matrix** with concrete recipients, deadlines, templates, escalation. The matrix is updated at least annually.

                    ---
                    *Cross-reference ISO/IEC 27002:2022 § 5.24-5.28 (incident management); EU-NIS2 Art. 23; GDPR Art. 33/34; EU-DORA Art. 17-23; BSIG §8b. Approval per: {{ approval.chain }}.*
                section:
                    definition:
                        title: 'Definition'
                        body: |-
                            Security incident vs. disturbance; CIA impairment as criterion (DER.2.1.A1).
                    classification:
