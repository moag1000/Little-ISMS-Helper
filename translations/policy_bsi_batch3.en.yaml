        it_forensics_directive:
            v1:
                title: 'IT Forensics Directive'
                body: |-
                    # IT Forensics Directive of {{ tenant.legal_name }}

                    *Normative anchor: BSI 200-2 | Building blocks: DER.2.2.A1 (legal conditions), A2 (evidence-collection guideline), A3 (training) | Edition: {{ bsi.kompendium_edition }} | Review: 24 months*

                    ## 1. Purpose
                    This directive governs forensic evidence collection and analysis in the case of security incidents, internal investigations and where applicable criminal complaints.

                    ## 2. Scope
                    Covers all IT systems in the information network, including cloud services and external systems where audit rights exist.

                    ## 3. Preparation
                    - forensics toolkit (hardware: write blocker, image drive; software: forensic suites);
                    - trained personnel (cross-reference ORP.3 awareness; specialised forensic training);
                    - sufficient storage for images (buffer storage);
                    - agreement with external forensics provider for escalation cases.

                    ## 4. Evidence Collection (DER.2.2.A2)
                    - **Chain of custody:** continuous documentation from acquisition to analysis;
                    - **Hashing:** SHA-256 before and after acquisition;
                    - **Write blocker:** hardware or software-based;
                    - **Order:** from most volatile (RAM, network sessions) to most stable (data carriers);
                    - **Documentation:** date, time, person, source, tool, hash.

                    ## 5. In-House vs. External Forensics
                    In-house forensics for standard cases; external for:

                    - legal proceedings (court admissibility);
                    - very complex or long-term investigations;
                    - cross-border cases;
                    - cases with conflict of interest (e.g. insider suspicion).

                    ## 6. Legal Aspects (DER.2.2.A1)
                    - works/personnel-council co-determination for employee forensics;
                    - criminal-complaint decision by legal/ISB;
                    - GDPR compliance (Art. 6(1)(f), Art. 10 for criminal data);
                    - confidentiality obligations during investigations.

                    ## 7. Data Protection in Forensics
                    - minimise personal data;
                    - analyse only to the necessary extent;
                    - limit retention of forensic artefacts;
                    - consult DPO for GDPR relevance.

                    ## 8. Cooperation with Authorities
                    For criminal complaints or engagement of authorities (BSI, LKA, BKA, public prosecutor): contact via defined single point of contact (SPOC); evidence handed over with receipt where applicable.

                    ## 9. Training (DER.2.2.A3)
                    Forensic officers receive regular training (e.g. SANS Forensics, BSI forensics courses).

                    ---
                    *Cross-reference ISO/IEC 27002:2022 § 5.28 (collection of evidence). Approval per: {{ approval.chain }}.*
                section:
                    preparation:
                        title: 'Preparation'
                        body: |-
                            Forensics toolkit, trained personnel, storage, external partner.
                    evidence_collection:
                        title: 'Evidence Collection'
                        body: |-
                            Chain of custody, SHA-256, write blocker, order volatile→stable (DER.2.2.A2).
                    in_or_out:
                        title: 'In-House vs. External'
                        body: |-
                            In-house standard; external for legal proceedings, complexity, cross-border, conflict of interest.
                    legal:
                        title: 'Legal Aspects'
                        body: |-
                            Co-determination, criminal complaint, GDPR Art. 6/10, confidentiality (DER.2.2.A1).
                    privacy:
                        title: 'Data Protection'
                        body: |-
                            Minimise personal data, limit retention, consult DPO.
                    authorities:
                        title: 'Cooperation with Authorities'
                        body: |-
                            SPOC for BSI / LKA / BKA / prosecutor; evidence with receipt.
                    training:
                        title: 'Training'
                        body: |-
                            SANS Forensics / BSI courses regularly (DER.2.2.A3).
                tailoring_field:
                    forensics_team:
                        label: 'Forensics Team'
                        placeholder: 'Example: "Internal forensics team of two with GIAC GCFE certification; external retainer Forensics GmbH activatable within 4 hours."'
                    toolkit:
                        label: 'Forensics Toolkit'
                        placeholder: 'Example: "Write blocker Tableau T8u, Magnet AXIOM, X-Ways Forensics; buffer storage 30 TB in DC-A."'
                    external_partner:
                        label: 'External Partner'
                        placeholder: 'Example: "Framework agreement with Forensics GmbH; response time 4 h; on-site 24 h; court-admissible forensics with expert opinion optional."'

        emergency_management_directive:
            v1:
                title: 'Emergency Management Directive'
                body: |-
                    # Emergency Management Directive of {{ tenant.legal_name }}

                    *Normative anchor: BSI 200-4 (BCM Final 2023) | Building blocks: DER.4.A1 (emergency-management policy), A2 (objectives/responsibilities), A3 (emergency concept), A4 (emergency organisation) | ISO mapping: ISO 22301:2019 (BCMS) + ISO 27001 Annex A 5.29-5.30 (ICT readiness for business continuity) | Edition: {{ bsi.kompendium_edition }} | Review: annual + after each activated emergency*

                    ## 1. Purpose
                    This directive governs emergency management at {{ tenant.legal_name }} in accordance with BSI Standard 200-4 and integrates ISO 22301:2019 for business continuity management. It establishes the organisational, procedural and technical foundations for resilience and recovery after disruptions.

                    ## 2. Scope
                    Covers all business processes, IT processes, sites and supplier relationships of {{ tenant.legal_name }} identified as critical in the BIA.

                    ## 3. Emergency Policy (DER.4.A1)
                    Top management commits to establishing and maintaining a BCMS in accordance with BSI 200-4 and ISO 22301:2019. Emergency management is a strategic obligation; resources are provided; the emergency officer {{ roles.notfallbeauftragter.fullName }} is appointed.

                    ## 4. Emergency Organisation (DER.4.A4)
                    - **Crisis team:** strategic steering in emergencies; chaired by top management or designated representative;
                    - **Emergency officer:** {{ roles.notfallbeauftragter.fullName }} – operational steering of the BCMS;
                    - **Recovery teams:** per critical business process; technically and functionally composed;
                    - **Crisis-communication team:** internal + external (press office, customers, authorities).

                    ## 5. BCM Methodology
                    The methodology follows BSI 200-4 and uses one of the tiers:

                    - **Reactive BCMS** (entry);
                    - **Build-up BCMS** (full scope);
                    - **Standard BCMS** (certifiable per ISO 22301).

                    ## 6. BIA (Business Impact Analysis)
                    The BIA is maintained in the BCM module; cross-reference BCM module. It identifies critical business processes, dependencies, RTO/RPO requirements and maximum tolerable period of disruption (MTPD).

                    ## 7. Emergency Preparedness (DER.4.A3)
                    - redundancies (data centres, sites, personnel);
                    - cross-site concepts;
                    - supplier agreements with availability SLA (cross-reference OPS.2.3);
                    - recovery procedures and sequences.

                    ## 8. Emergency Plans
                    Emergency plans cover:

                    - business-continuity plans (provisional emergency-operation solutions);
                    - recovery plans (technical);
                    - IT emergency plan / DR plan;
                    - crisis-communication plan;
                    - site-loss plan / personnel-loss plan.

                    ## 9. Crisis Communication
                    - internal: employees via alternative channels;
                    - external: customers / suppliers / supervisory authorities / press;
                    - contact lists maintained; alternative communication channels established.

                    ## 10. Exercise and Test Concept
                    At least annually:

                    - tabletop exercise with crisis team;
                    - technical DR tests (recovery of a critical system);
                    - training of recovery teams;
                    - for standard BCMS additionally live operational tests.

                    ## 11. Activation Triggers
                    Clearly defined triggers for BCMS activation (e.g. site loss, critical cyber attack, pandemic, critical supplier failure).

                    ## 12. Incident-Response Interface
                    For cyber attacks the incident response is performed first (cross-reference DER.2.1); upon massive impact the BCMS is activated.

                    ---
                    *Cross-reference ISO 22301:2019 (BCMS); ISO 27001 Annex A 5.29 (ICT readiness for business continuity), 5.30 (ICT readiness in business continuity tests). Approval per: {{ approval.chain }}.*
                section:
                    leadership:
                        title: 'Emergency Policy'
                        body: |-
                            Top-management commitment; emergency officer {{ roles.notfallbeauftragter.fullName }} (DER.4.A1).
                    organisation:
                        title: 'Emergency Organisation'
                        body: |-
                            Crisis team, emergency officer, recovery teams, crisis communication (DER.4.A4).
                    methodology:
                        title: 'BCM Methodology'
                        body: |-
                            BSI 200-4 reactive / build-up / standard; ISO 22301 compatibility.
                    bia:
                        title: 'BIA'
                        body: |-
                            BIA in BCM module; critical processes, dependencies, RTO/RPO/MTPD.
                    preparedness:
                        title: 'Emergency Preparedness'
                        body: |-
                            Redundancies, cross-site, supplier SLA, recovery procedures (DER.4.A3).
                    plans:
                        title: 'Emergency Plans'
                        body: |-
                            Business continuity, recovery, IT-DR, crisis communication, site/personnel-loss.
                    communication:
                        title: 'Crisis Communication'
                        body: |-
                            Internal + external; alternative channels; current contact lists.
                    exercise:
                        title: 'Exercise / Test'
                        body: |-
                            Annual tabletop + technical DR tests; standard BCMS additional live tests.
                    triggers:
                        title: 'Activation Triggers'
                        body: |-
                            Site loss, cyber attack, pandemic, critical supplier failure.
                    incident_interface:
                        title: 'IR Interface'
                        body: |-
                            Cyber attacks: IR first (DER.2.1); upon massive impact BCMS activation.
                tailoring_field:
                    bcm_tier:
                        label: 'BCM Tier'
                        placeholder: 'Example: "Currently build-up BCMS per BSI 200-4; roadmap to standard BCMS / ISO 22301 certification Q4 2027; annual maturity assessment."'
                    crisis_team_members:
                        label: 'Crisis-Team Members'
                        placeholder: 'Example: "Chair CFO; deputy chair CISO {{ roles.ciso.fullName }}; members: COO, ISB {{ roles.isb.fullName }}, head of IT, press office, legal; deputies named."'
                    exercise_calendar:
                        label: 'Exercise Calendar'
                        placeholder: 'Example: "Tabletop Q1, technical DR test Q2 (core system A), pandemic exercise Q3, site-loss Q4; lessons learned in measures plan."'

        schutzbedarfsfeststellung_method:
            v1:
                title: 'Protection-Needs Assessment – Method'
                body: |-
                    # Method: Protection-Needs Assessment of {{ tenant.legal_name }}

                    *Document type: **Method** (not a behaviour/rule document) | Normative anchor: BSI Standard 200-2 chapter 6 | Cross-reference: ISO/IEC 27005 (risk management), ISO/IEC 27001 clause 6.1.2 | Edition: {{ bsi.kompendium_edition }} | Review: 24 months*

                    ## 1. Purpose
                    This method document describes the procedure for **protection-needs assessment** at {{ tenant.legal_name }} in accordance with BSI Standard 200-2 chapter 6. It is the methodological foundation for classifying the target objects (applications, IT systems, rooms, communication links) of the information network. It is NOT a directive in the sense of a behaviour/rule provision, but a **methodological description**.

                    ## 2. Scope
                    This method applies to all target objects of the information network per the structure analysis (cross-reference ISMS Concept ISMS.1.A6).

                    ## 3. Protection Goals
                    Protection-needs assessment is performed for the protection goals:

                    - **Confidentiality (C)** — protection against unauthorised disclosure;
                    - **Integrity (I)** — protection against unauthorised or unintended modification;
                    - **Availability (A)** — protection against unplanned outage.

                    Optionally extended by:

                    - **Authenticity** — verification of the identity of actors and data;
                    - **Non-repudiation** — verifiable attribution of actions.

                    ## 4. Protection-Needs Categories (BSI standard 3-tier)
                    Three protection-needs categories are used by default:

                    | Category | Meaning |
                    |---|---|
                    | **normal** | damage impact is limited and manageable |
                    | **high** | damage impact may be considerable |
                    | **very high** | damage impact may reach existence-threatening, catastrophic dimension |

                    Tenant-specific extension to a 4-tier scheme is possible but only with justification recommended (mapping issues with other frameworks).

                    ## 5. Definition per Tier and Goal (Tailoring)
                    {{ tenant.legal_name }} defines damage levels and damage scenarios per tier and protection goal. By way of example (to be concretised in the tailoring):

                    | Tier | Confidentiality | Integrity | Availability |
                    |---|---|---|---|
                    | normal | limited internal effect; minor revenue impact | correctable data error | outage <24 h tolerable |
                    | high | substantial reputational or contractual breach | non-correctable data error with downstream effect | outage 4-24 h harmful |
                    | very high | existence-threatening; breach of statutory duty | data loss with downstream effect | outage <1 h existence-threatening |

                    ## 6. Damage-Scenarios Catalogue (BSI 200-2 ch. 6)
                    The following damage scenarios are evaluated:

                    1. **Violations of laws, regulations, contracts** (e.g. GDPR fines, BSIG sanctions, contractual penalties);
                    2. **Impairment of the right to informational self-determination** (data-subject rights);
                    3. **Impairment of physical integrity** (relevant in medical / industrial IT);
                    4. **Impairment of task fulfilment** (business / public-administration tasks);
                    5. **Negative internal or external impact** (reputation, trust, politics);
                    6. **Financial impact** (direct and indirect damage).

                    ## 7. Inheritance Rules (BSI 200-2 ch. 6.2)
                    Protection needs propagate along dependencies between target objects according to the following rules:

                    - **Maximum principle:** the protection needs of a dependent target object are at least as high as the highest protection needs of the applications/data it processes. Standard rule.
                    - **Distribution effect** (optional): protection needs may decrease if data are processed in a distributed way such that individual records are less protection-needy than the aggregate. Apply with justification.
                    - **Cumulation effect** (optional): protection needs may increase if many normal-protection-needs records are aggregated in one target object such that cumulatively a higher protection need arises. Apply with justification.

                    > **Memory cross-reference note:** The existing `AssetDependencyService` from the protection-needs inheritance project implements the maximum principle technically. This method documents the procedure; the service is the operational implementation.

                    ## 8. Documentation Templates
                    For each target object the protection needs per goal are determined and justified:

                    - **Applications:** owner, category + justification per CIA;
                    - **IT systems:** derived from the applications under the maximum principle;
                    - **Rooms:** derived from IT systems / data carriers;
                    - **Communication links:** derived from the data transmitted.

                    ## 9. Acceptance Procedure
                    The protection-needs assessment is performed by the application/system owner and validated by the ISB {{ roles.isb.fullName }}. For protection-needs categories *high* or *very high* the top management or its delegate additionally approves.

                    ## 10. Updates
                    The protection-needs assessment is:

                    - updated upon structural changes (new / changed target objects);
                    - reviewed at least annually;
                    - revised event-driven for material incidents.

                    ## 11. Interface to Risk Analysis (BSI 200-3)
                    For protection-needs category *high* or *very high* and for core protection a supplementary risk analysis per BSI 200-3 is performed (cross-reference ISMS Concept ISMS.1.A6).

                    ---
                    *Cross-reference ISO/IEC 27005 (IT risk management), ISO/IEC 27001 clause 6.1.2; BSI Standard 200-3 for supplementary risk analysis. Approval per: {{ approval.chain }}.*
                section:
                    purpose:
                        title: 'Purpose'
                        body: |-
                            Methodological foundation for classifying target objects per BSI 200-2 ch. 6. NOT a directive.
                    protection_goals:
                        title: 'Protection Goals'
                        body: |-
                            Confidentiality, integrity, availability + optional authenticity and non-repudiation.
                    categories:
                        title: 'Protection-Needs Categories'
                        body: |-
                            BSI standard 3-tier (normal / high / very high); 4-tier only with justification.
                    levels_definition:
                        title: 'Definition per Tier'
                        body: |-
                            Damage levels and scenarios per tier and goal; concretised in tailoring.
                    damage_scenarios:
                        title: 'Damage Scenarios'
                        body: |-
                            Laws/contracts, self-determination, physical integrity, task fulfilment, internal/external impact, financial.
                    inheritance:
                        title: 'Inheritance Rules'
                        body: |-
                            Maximum principle (default); distribution + cumulation effect with justification (BSI 200-2 ch. 6.2).
                    documentation:
                        title: 'Documentation Templates'
                        body: |-
                            Applications, IT systems, rooms, communication; per CIA category + justification.
                    acceptance:
                        title: 'Acceptance'
                        body: |-
                            Application owner; ISB validation; top-management acceptance for high / very high.
                    update:
                        title: 'Updates'
                        body: |-
                            Structural change, annual review, event-driven.
                    risk_interface:
                        title: 'Risk-Analysis Interface'
                        body: |-
                            For high / very high or core protection supplementary BSI 200-3.
                tailoring_field:
                    levels_definitions:
                        label: 'Tier Definitions per Goal'
                        placeholder: 'Example: "high confidentiality: disclosure leads to fine 100 k - 1 M EUR and reputational damage with press release; very high availability: 1 h outage threatens existence."'
                    inheritance_choice:
                        label: 'Inheritance Rule Choice'
                        placeholder: 'Example: "Default: maximum principle; distribution effect only exceptionally with justification; cumulation effect active for mass-data processing."'
                    sample_object:
                        label: 'Sample Target Object with Rating'
                        placeholder: 'Example: "Application Salesforce CRM: C=high (customer personal data), I=high (order data), A=high (8 h outage causes contractual breach); justification documented in CMDB."'
