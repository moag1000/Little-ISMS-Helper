        migration_path: 'Sketch the alternative provider or in-house solution. ≤1000 chars.'
        tested_at: 'When was the exit strategy last tested (tabletop or live)? ESA guidelines expect annual rehearsals.'
        estimated_duration_days: 'Expected duration of full migration in business days.'
        estimated_cost: 'One-off estimated migration cost (tenant reporting currency).'

    trigger:
