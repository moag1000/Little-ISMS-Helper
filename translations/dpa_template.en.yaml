clauses:
    heading: 'Mandatory clauses pursuant to Art. 28(3) GDPR'
    a:
        heading: 'Instructions binding'
        body: >
            The processor processes personal data only on documented instructions from the controller.
            If the processor receives a governmental order to disclose data, it shall inform the controller
            without undue delay, unless legally prohibited from doing so.
    b:
        heading: 'Confidentiality'
        body: >
            The processor ensures that persons authorised to process personal data have committed themselves
            to confidentiality or are under an appropriate statutory obligation of confidentiality.
    c:
        heading: 'Technical and organisational measures'
        body: >
            The processor takes all measures required pursuant to Art. 32 GDPR to ensure the security of
            processing. The specific implemented measures are documented in the "TOMs" section of this agreement.
    d:
        heading: 'Engagement of sub-processors'
        body: >
            The processor shall not engage another processor without prior specific or general written
            authorisation of the controller. In the case of general written authorisation, the processor
            shall inform the controller of any intended changes concerning the addition or replacement of
            sub-processors, thereby giving the controller the opportunity to object to such changes.
    e:
        heading: 'Assistance with data subject rights'
        body: >
            The processor shall assist the controller by appropriate technical and organisational measures,
            insofar as this is possible, for the fulfilment of the controller's obligation to respond to
            requests for exercising data subjects' rights laid down in Chapter III of the GDPR (Art. 15–22).
    f:
        heading: 'Assistance with security obligations'
        body: >
            The processor assists the controller in ensuring compliance with the obligations pursuant to
            Art. 32–36 GDPR, taking into account the nature of processing and the information available
            to the processor (security, breach notification, DPIA, prior consultation).
    g:
        heading: 'Deletion or return of data'
        body: >
            At the choice of the controller, the processor deletes or returns all personal data to the
            controller after the end of the provision of services, and deletes existing copies unless
            Union or Member State law requires storage of the personal data.
    h:
        heading: 'Audit rights and information'
        body: >
            The processor makes available to the controller all information necessary to demonstrate
            compliance with the obligations laid down in this Article, and allows for and contributes
            to audits, including inspections, conducted by the controller or another auditor mandated
            by the controller.

