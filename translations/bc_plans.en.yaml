      is unavailable)
    alternative_site_address: Full address of the alternative site
    alternative_site_capacity: Capacity and resources at the alternative site (workstations,
      technology)
    backup_procedures: Data backup procedures (backup strategy, frequency, storage
      locations)
    restore_procedures: Data restoration procedures (restore process, prioritization)
    version: Current version number of the BC plan
    last_tested: Date of last BC plan test (exercises per ISO 22301:2019 Clause 8.5)
    next_test_date: Date of next scheduled BC plan test
    last_review_date: Date of last plan review
    next_review_date: Date of next scheduled review (at least annually per ISO 22301)
    review_notes: Notes from the last plan review (changes needed, improvements)
    plan_owner_user: Plan owner from user management.
    plan_owner_person: 'Select a person without a system login as plan owner. Priority&#58; User &gt; Person &gt; legacy.'
    plan_owner_deputies: Additional persons sharing plan ownership or deputising. Multiple selection possible.
    response_team_members_json: 'JSON array with response team roles per ISO 22301 §8.5.3. Roles: incident_commander, comms_lead, recovery_lead, technical_lead.'
    required_resources_json: 'JSON object with resource requirements: {"personnel": [], "equipment": [], "supplies": []}. ISO 22301 §8.1.'
    escalation_levels_json: 'JSON array with escalation levels per BSI 200-4 §6.2: [{"level":1,"trigger":"...","responder":"...","escalateAfter":"15min"}].'
    crisis_teams: 'Crisis teams responsible for this plan (ISO 22301 §8.4.2). Multiple selection possible.'
    rto: 'ISO 22301 Cl. 8.4.2 — maximum acceptable recovery time after an outage, in hours. Examples: critical=1, high=4, medium=24, low=72.'
    rpo: 'ISO 22301 Cl. 8.4.2 — maximum tolerable data loss, measured in hours between last consistent backup and the start of the disruption.'
    critical_assets: 'Assets essential for the recovery of this business process. Multiple selection possible.'
