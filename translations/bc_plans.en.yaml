    alternative_site: 'Fallback location for emergency operations if the primary site is unavailable. Describe capacity, available infrastructure and activation lead time.'
    required_resources: 'Minimum resources needed for emergency operations: staff, IT systems, communication tools, premises and critical third-party service providers (ISO 22301 Cl. 8.1).'
