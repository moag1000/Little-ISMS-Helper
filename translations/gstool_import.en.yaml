gstool_import:
    title: GSTOOL XML Import
    intro: >-
        Imports GSTOOL XML exports into the tool's BSI IT-Grundschutz module.
        Phase 1 turns Zielobjekte into Assets (including Schutzbedarf),
        Phase 2 resolves Modellierung relationships into Asset dependencies.
        Phase 3 (Bausteine), 4 (Maßnahmen) and 5 (Risikoanalyse) follow.
    upload:
        card_title: Upload GSTOOL XML
    schema:
        title: Expected XML schema (v1)
        description: >-
            Real GSTOOL exports must be transformed into this pragmatic
            intermediate format. Full schema documentation in
            docs/features/GSTOOL_IMPORT.md.
    result:
        preview_title: Preview result
        commit_title: Import completed
        summary: '%new% new / %update% updated / %error% error(s)'
        line: Line
        action: Action
        gstool_id: GSTOOL ID
        name: Name
        asset_type: Asset type
        error: Error
    action:
        new: new
        update: update
        error: error
    tab:
        assets: Zielobjekte → Assets
        bausteine: Bausteine
        massnahmen: Maßnahmen
        risiken: Risk analysis
    bausteine:
        note: >-
            Bausteine are shown as a migration preview only — no automatic
            ComplianceRequirement linking. The Compliance Manager reviews
            each entry and creates the links manually.
        legacy_id: GSTOOL ID
        title_old: Old title
        kompendium_2023: Kompendium 2023
        title_new: New title
        zielobjekt: Target object
        status: Status
        unmapped: no mapping
    massnahmen:
        legacy_id: GSTOOL measure
        titel: Title
        baustein: Baustein (old → new)
        umsetzungsstatus: GSTOOL status
        implementation_status: Tool status
    risiken:
        legacy_id: Risk ID
        titel: Title
        haeufigkeit: Likelihood
        schaden: Impact
        score: Risk score
        behandlung: Treatment
