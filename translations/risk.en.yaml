    acceptance_approved_by_user: Person who approved risk acceptance.
  tooltip:
    probability: '<strong>🎲 How likely is this to happen?</strong><br><em>Question:
      How often could this risk occur?</em><br><br><strong>1</strong> = Very rare
      (1× in 10+ years)<br><em>e.g. earthquake, plane crash</em><br><strong>2</strong>
      = Rare (1× in 5 years)<br><em>e.g. major fire, severe cyberattack</em><br><strong>3</strong>
      = Occasional (1× per year)<br><em>e.g. power outage, data breach</em><br><strong>4</strong>
      = Frequent (multiple times/year)<br><em>e.g. phishing attempts, staff turnover</em><br><strong>5</strong>
      = Very frequent (monthly+)<br><em>e.g. spam, failed login attempts</em>'
    impact: '<strong>💥 How severe would the damage be?</strong><br><em>Question: What
      happens if this risk occurs?</em><br><br><strong>1</strong> = Minimal (&lt;€1,000,
      no downtime)<br><em>e.g. single PC failure</em><br><strong>2</strong> = Minor
      (€1,000-10,000, hours of downtime)<br><em>e.g. server restart needed</em><br><strong>3</strong>
      = Moderate (€10,000-100,000, days of downtime)<br><em>e.g. department offline</em><br><strong>4</strong>
      = Major (€100,000-1M, weeks of downtime)<br><em>e.g. ransomware, data leak</em><br><strong>5</strong>
      = Catastrophic (&gt;€1M, existential threat)<br><em>e.g. complete data loss,
      bankruptcy</em>'
    residual_probability: '<strong>📉 Residual Probability After Controls</strong><br><em>Question:
      How likely is the risk AFTER you implement controls?</em><br><br>Example: Phishing
      risk<br>• Before: 4 (frequent)<br>• After training + spam filter: 2 (rare)<br><br><em>Tip:
      Be realistic - zero is not possible!</em>'
    residual_impact: '<strong>📉 Residual Impact After Controls</strong><br><em>Question:
      How severe would damage be AFTER you implement controls?</em><br><br>Example:
      Data loss<br>• Before: 5 (catastrophic)<br>• After backup strategy: 2 (minor,
      only 1 day lost)<br><br><em>Tip: Controls often reduce impact more than probability!</em>'
    treatment_strategy: <strong>🛡️ How will you handle this risk?</strong><br><br><strong>Avoid</strong><br>Stop
      the activity, eliminate risk source<br><em>e.g. stop using insecure software</em><br><br><strong>Mitigate</strong>
      (most common)<br>Implement controls<br><em>e.g. firewall, training, backups</em><br><br><strong>Transfer</strong><br>Pass
      risk to third party<br><em>e.g. insurance, outsourcing</em><br><br><strong>Accept</strong><br>Consciously
      tolerate (with justification!)<br><em>e.g. control cost > potential damage</em>
    category: <strong>📁 Risk Category</strong><br><em>Helps with classification and
      reporting</em><br><br><strong>Technical</strong><br>IT systems, software, hardware<br><em>e.g.
      server failure, software bug</em><br><br><strong>Organizational</strong><br>Processes,
      personnel, know-how<br><em>e.g. knowledge loss, human error</em><br><br><strong>Physical</strong><br>Buildings,
      infrastructure<br><em>e.g. break-in, water damage</em><br><br><strong>Compliance</strong><br>Laws,
      contracts, regulations<br><em>e.g. GDPR violation, audit findings</em>
    involves_personal_data: '<strong>🔒 Personal Data Involved?</strong><br><em>Enable
      this option if the risk affects personal data (e.g. customer data, employee data).</em><br><br>Relevant
      for: GDPR Art. 5, 24, 32<br><em>Examples: data breach, unauthorized access to
      CRM, loss of USB stick with customer data</em>'
    requires_dpia: '<strong>📋 Data Protection Impact Assessment (DPIA) Required?</strong><br><em>A
      DPIA is required under GDPR Art. 35 for high-risk processing activities.</em><br><br>Typical
      cases:<br>• Systematic monitoring of individuals<br>• Processing of special categories
      (health, biometrics)<br>• Large-scale processing<br><em>Tip: Consult your Data
      Protection Officer (DPO)</em>'
    legal_basis: '<strong>⚖️ Legal Basis for Processing</strong><br><em>Every processing
      of personal data requires a legal basis (GDPR Art. 6).</em><br><br><strong>Consent</strong>
      – freely given, specific, informed<br><strong>Contract</strong> – necessary for
      contract performance<br><strong>Legal obligation</strong> – required by law<br><strong>Vital
      interests</strong> – protection of life<br><strong>Public task</strong> – official
      authority<br><strong>Legitimate interests</strong> – balanced interest (Art. 6(1)(f))'
    processing_scale: '<strong>📊 Processing Scale</strong><br><em>Describes the magnitude
      of data subjects and volume of data processed.</em><br><br><strong>Small</strong>
      – a few dozen individuals, internal use<br><strong>Medium</strong> – hundreds
      of individuals, cross-departmental<br><strong>Large</strong> – thousands of individuals
      or continuous processing<br><strong>Very large</strong> – mass processing, national/European
      reach<br><em>Relevant for GDPR Art. 35 (DPIA required for large-scale processing)</em>'
    data_subject_impact: '<strong>👤 Impact on Data Subjects</strong><br><em>Describes
      the potential harm to the individuals affected if the risk materialises.</em><br><br><strong>Low</strong>
      – minor inconvenience, easily remedied<br><strong>Medium</strong> – financial
      loss, discrimination, reputational damage<br><strong>High</strong> – significant
      restrictions, identity theft, physical harm<br><strong>Very high</strong> – irreversible
      damage, threat to life and safety<br><em>Basis: GDPR Art. 83, EDPB Guidelines
      on DPIA</em>'
