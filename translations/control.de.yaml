    control_id: ISO 27001:2022 Annex A Maßnahmen-ID
    applicable_explained: "Anwendbarkeit (ISO 27001 6.1.3 d): 'Anwendbar' = diese Massnahme ist für Ihre Organisation relevant und MUSS umgesetzt werden. 'Nicht anwendbar' = diese Massnahme ist für Ihren ISMS-Scope nicht relevant — Begruendung im Feld 'Justification' PFLICHT. Beispiel: A.7.4 (Physische Ueberwachung) kann für ein reines Cloud-Unternehmen 'nicht anwendbar' sein."
    implementation_status_explained: "Umsetzungsstatus: not_started = noch nicht begonnen, planned = geplant (Termin gesetzt), in_progress = in Umsetzung (teilweise wirksam), implemented = vollstaendig umgesetzt und wirksam, verified = durch Audit/Test als wirksam bestaetigt. Hinweis: Nur 'anwendbare' Controls zaehlen für die Compliance-Berechnung."
