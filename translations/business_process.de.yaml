iso_9001_bridge:
  business_process: 'Identisch mit der "Prozesslandkarte" aus ISO 9001 Klausel 4.4 — Geschäftsprozesse mit Ein-/Ausgängen, Ressourcen (7.1) und Wechselwirkungen. ISO 22301 8.3 ergänzt die quantitativen Recovery-Ziele RTO/RPO/MTPD.'
