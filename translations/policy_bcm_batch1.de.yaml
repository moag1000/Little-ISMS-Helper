policy:
    bcm:
        bcms_top_level:
            v1:
                title: 'Notfallleitlinie / Business Continuity Policy'
                body: |-
                    # Notfallleitlinie der {{ tenant.legal_name }}

                    *Dokumentenklasse: Leitlinie (Top-Level Policy) | Norm-Anker: ISO 22301:2019 Klauseln 5.1 + 5.2 a-f, BSI 200-4:2023 Kapitel 4.1 + 4.4 | ISO/IEC 27001:2022 A.5.29 + A.5.30 | EU-DORA Art. 11 | Sprache: Deutsch (Sie-Form, juristisch) | Pruefintervall: {{ bcm.review_interval_months }} Monate*

                    ## 1. Zweck und Praeambel
                    Diese Notfallleitlinie wird durch die oberste Leitung der {{ tenant.legal_name }} erlassen und ist die hoechste normative Aussage des Business-Continuity-Management-Systems (BCMS). Sie erfuellt die Anforderungen der ISO 22301:2019 Klausel 5.2 a-f sowie BSI 200-4 (2023) Kapitel 4.1 ("Notfallleitlinie"). Die Geschaeftsfuehrung der {{ tenant.legal_name }} verpflichtet sich hiermit, die Geschaeftskontinuitaet der Organisation auch bei stoerenden Ereignissen, Notfaellen und Krisen aufrechtzuerhalten und die hierfuer erforderlichen Ressourcen bereitzustellen. Diese Verpflichtung ist nicht delegierbar (ISO 22301 Klausel 5.1 "Leadership and commitment"). Die Leitlinie steht gleichberechtigt neben der Informationssicherheits-Leitlinie und ist mit dieser sowie mit der Datenschutzleitlinie kohaerent abzustimmen.

                    ## 2. Geltungsbereich
                    Der Anwendungsbereich des BCMS ist im separaten Dokument *Geltungsbereich des BCMS / BCMS Scope Statement* gemaess ISO 22301 Klausel 4.3 verbindlich festgelegt. Diese Notfallleitlinie gilt fuer alle Beschaeftigten (unabhaengig vom Beschaeftigungsverhaeltnis), Auftragnehmer, Werkstudierende, Praktikantinnen und Praktikanten sowie fuer alle Dienstleister und Drittparteien, die kritische Geschaeftsprozesse der {{ tenant.legal_name }} unterstuetzen. Sie umfasst alle juristischen Einheiten, Standorte und Geschaeftsprozesse, die im Geltungsbereichsdokument als "in scope" gekennzeichnet sind. Ausschluesse sind im Geltungsbereichsdokument zu begruenden und duerfen die Faehigkeit der Organisation, ihre Kontinuitaetsziele zu erreichen, nicht beeintraechtigen (ISO 22301 Klausel 4.3 c).

                    ## 3. BCMS-Ziele (Cl. 5.2 b + Cl. 6.2)
                    Die {{ tenant.legal_name }} verfolgt die folgenden uebergeordneten BCMS-Ziele, abgeleitet aus dem Organisationskontext (Klausel 4.1), den Anforderungen interessierter Parteien (Klausel 4.2) und einschlaegigen regulatorischen Vorgaben:

                    1. **Schutz von Menschenleben und Gesundheit** — oberste Prioritaet bei allen Notfall- und Krisenszenarien.
                    2. **Aufrechterhaltung kritischer Geschaeftsprozesse** — innerhalb der definierten Recovery Time Objectives (RTO) gemaess BIA-Methodik.
                    3. **Minimierung finanzieller, regulatorischer und reputativer Schaeden** durch geordnete Wiederanlauf- und Wiederherstellungsverfahren.
                    4. **Erfuellung anwendbarer regulatorischer Pflichten** (insbesondere {{ standards_adopted_list }}, EU-DORA, NIS2, KRITIS, sektorspezifische Vorgaben).
                    5. **Vertrauensschutz** gegenueber Kunden, Beschaeftigten, Aufsichtsbehoerden und Geschaeftspartnern.
                    6. **Kontinuierliche Verbesserung** des BCMS durch Uebungen, Audits und Managementbewertung gemaess Klauseln 9.2, 9.3 und 10.1.

                    Konkrete, messbare Jahresziele werden separat im Dokument *BCMS-Jahresziele* dokumentiert (ISO 22301 Klausel 6.2).

                    ## 4. Verpflichtung der obersten Leitung (Cl. 5.1)
                    Die Geschaeftsfuehrung der {{ tenant.legal_name }} ({{ approval.chain }}) verpflichtet sich gemaess ISO 22301 Klausel 5.1:

                    - Bereitstellung der erforderlichen personellen, finanziellen und infrastrukturellen Ressourcen fuer das BCMS;
                    - Sicherstellung, dass die BCMS-Anforderungen in die Geschaeftsprozesse integriert werden;
                    - Foerderung der Bedeutung wirksamen Business Continuity Managements und der Konformitaet mit dieser Leitlinie;
                    - Sicherstellung, dass das BCMS die beabsichtigten Ergebnisse erreicht;
                    - Aktive Anleitung und Unterstuetzung des Notfallbeauftragten {{ roles.bcm_officer.fullName }} und des Krisenstabsleiters {{ roles.crisis_team_lead.fullName }};
                    - Foerderung der fortlaufenden Verbesserung des BCMS;
                    - Persoenliche Mitwirkung an Krisenstabseinsaetzen und Managementbewertungen.

                    Die nicht delegierbare Gesamtverantwortung verbleibt bei der obersten Leitung. Die operative Verantwortung wird an den Notfallbeauftragten {{ roles.bcm_officer.fullName }} delegiert, der direkt an die Geschaeftsfuehrung berichtet.

                    ## 5. Rollen und Verantwortlichkeiten (Cl. 5.3, BSI 200-4 Kap. 4.4)
                    Gemaess ISO 22301 Klausel 5.3 und BSI 200-4 Kapitel 4.4 werden folgende Rollen verbindlich besetzt:

                    - **Oberste Leitung** ({{ approval.chain }}) — Genehmigung der Notfallleitlinie, Ressourcenbereitstellung, Durchfuehrung der Managementbewertung gemaess Klausel 9.3, oberste Eskalationsinstanz im Krisenfall.
                    - **Notfallbeauftragte/r (BCM Officer)** — {{ roles.bcm_officer.fullName }}: Steuerung des BCMS, Berichterstattung an die oberste Leitung, Koordination der BIA, Pflege der Notfallleitlinie, Eskalations- und Meldekette. BSI 200-4 Kap. 4.4 fordert ausdruecklich die Bestellung eines Stellvertreters.
                    - **Krisenstabsleitung (Crisis Team Chair)** — {{ roles.crisis_team_lead.fullName }}: Einberufung des Krisenstabs, verbindliche Krisenentscheidungen, Aktivierung von BCM-Plaenen.
                    - **Informationssicherheitsbeauftragte/r (ISB)** — {{ roles.isb.fullName }}: Schnittstelle zum ISMS, Bewertung sicherheitsrelevanter Vorfaelle mit Kontinuitaetswirkung (A.5.29 + A.5.30).
                    - **Prozessverantwortliche (Process Owner)** — Verantwortung fuer Pflege und Aktualisierung der jeweiligen Geschaeftsfortfuehrungs-, Wiederanlauf- und Wiederherstellungsplaene.
                    - **BC-Plan-Eigner (Plan Owner)** — Pflege individueller BC-Plaene, Teilnahme an Uebungen, Mitwirkung an Lessons-Learned.
                    - **Beschaeftigte und Auftragnehmer** — Kenntnis dieser Leitlinie, Befolgung von Notfallanweisungen, Meldung von Stoerungen ueber die definierten Meldekanaele.

                    Die vollstaendige Genehmigungskette dieser Leitlinie umfasst: {{ approval.chain }}.

                    ## 6. Compliance-Verpflichtung (Cl. 5.2 c)
                    Die {{ tenant.legal_name }} bekennt sich zur Einhaltung anwendbarer rechtlicher, regulatorischer und vertraglicher Anforderungen, insbesondere:

                    - **ISO 22301:2019** "Sicherheit und Resilienz — Business-Continuity-Managementsysteme — Anforderungen" — primaeres BCMS-Framework.
                    - **ISO 22313:2020** — Anwendungsleitfaden zu ISO 22301 (informativ).
                    - **BSI 200-4 (2023)** "Business Continuity Management" — soweit BSI-Grundschutz adoptiert ist (siehe Geltungsbereichsdokument).
                    - **ISO/IEC 27001:2022 A.5.29** ("Information security during disruption") und **A.5.30** ("ICT readiness for business continuity").
                    - **EU-DORA Verordnung (EU) 2022/2554 Art. 11 + Art. 12** — Response and recovery, ICT business continuity policy (sofern als Finanzunternehmen anwendbar).
                    - **NIS2-Richtlinie (EU) 2022/2555** — Risikomanagement-Massnahmen einschliesslich Backup- und Krisenmanagement.
                    - **KRITIS-Verordnung** und sektorspezifische Vorgaben (BSI-KritisV, IT-SiG 2.0, branchenspezifische Mindeststandards).
                    - **DSGVO Art. 32 Abs. 1 lit. b und c** — Faehigkeit, die Verfuegbarkeit der personenbezogenen Daten und den Zugang zu ihnen bei einem physischen oder technischen Zwischenfall rasch wiederherzustellen.

                    Die Bewertung anwendbarer Anforderungen wird mindestens jaehrlich durch den Notfallbeauftragten in Abstimmung mit Compliance und Legal aktualisiert.

                    ## 7. Kontinuierliche Verbesserung (Cl. 10.1, BSI 200-4 Kap. 9)
                    Das BCMS wird kontinuierlich verbessert. Die Organisation verpflichtet sich zu:

                    - Durchfuehrung interner BCMS-Audits gemaess Klausel 9.2;
                    - Durchfuehrung von Uebungen und Tests gemaess separatem Uebungs- und Testprogramm (Frequenz: {{ bcm.exercise_frequency }});
                    - Auswertung von realen Notfallereignissen im Rahmen von Lessons-Learned-Verfahren;
                    - Behandlung von Abweichungen und Korrekturmassnahmen gemaess Klausel 10.1;
                    - jaehrliche Managementbewertung des BCMS gemaess Klausel 9.3;
                    - regelmaessige Wirksamkeitspruefung der gewaehlten BCM-Strategien (gemaess separatem BC-Strategie-Dokument);
                    - Auswertung externer Quellen (BSI-Lageberichte, ENISA Threat Landscape, sektorale CSIRT-Warnungen) zur Anpassung des Bedrohungsverstaendnisses;
                    - regelmaessige Pflege der Krisenstab-Zusammensetzung sowie Schulung und Weiterbildung der Krisenstab-Mitglieder.

                    Die Wirksamkeitsmessung des BCMS erfolgt anhand quantitativer Kennzahlen (z. B. RTO-Erfuellungsgrad, Anzahl durchgefuehrter und ausgefallener Uebungen, durchschnittliche Aktivierungsdauer, Anzahl offener Korrekturmassnahmen) und qualitativer Bewertungen (z. B. Reife-Self-Assessment gemaess BSI 200-4 Kap. 9.2). Die Kennzahlen werden quartalsweise an die Geschaeftsfuehrung berichtet und bilden die Grundlage fuer Verbesserungsentscheidungen.

                    ## 7a. Reife-Stufenmodell des BCMS
                    Die {{ tenant.legal_name }} bewertet die Reife ihres BCMS jaehrlich anhand eines Stufenmodells (in Anlehnung an BSI 200-4 Kap. 9.2):

                    - **Stufe 1 (Initial)** — BCMS-Aktivitaeten existieren, aber unstrukturiert und reaktiv;
                    - **Stufe 2 (Wiederholbar)** — definierte Verfahren, jedoch ohne durchgaengige Dokumentation;
                    - **Stufe 3 (Definiert)** — vollstaendig dokumentiertes BCMS, regelmaessige Uebungen, gepruefte BC-Plaene;
                    - **Stufe 4 (Gemessen)** — datengestuetzte Bewertung, KPI-Steuerung, kontinuierliche Verbesserung;
                    - **Stufe 5 (Optimierend)** — proaktive Anpassung an Bedrohungs-Lage, Branchen-Benchmarking, Innovation.

                    Ziel-Reife ist mindestens Stufe 3 fuer alle in-scope Bereiche, Stufe 4 fuer regulatorisch besonders sensitive Bereiche (DORA-CIF, KRITIS-Funktionen). Die jaehrliche Reife-Bewertung ist Bestandteil der Managementbewertung und steuert Investitions-Priorisierungen.

                    ## 8. Pruefung, Genehmigung und Kommunikation (Cl. 5.2 d-g)
                    Diese Notfallleitlinie wird mindestens alle {{ bcm.review_interval_months }} Monate (BSI 200-4 Kap. 4.1: mindestens jaehrlich) sowie bei wesentlichen Aenderungen ueberprueft. Wesentliche Aenderungen sind insbesondere: organisatorische Veraenderungen (M&A, neuer Standort, Veraeusserung), schwerwiegende Vorfaelle mit BCM-Aktivierung, regulatorische Aenderungen (z. B. neue DORA-RTS, NIS2-Umsetzungsgesetz) sowie fehlgeschlagene Uebungen mit strategischer Wirkung.

                    Die Genehmigung erfolgt durch die oberste Leitung gemaess Genehmigungskette {{ approval.chain }}. Bei Konzern-Strukturen (Holding) ist die Konzern-Notfallleitlinie durch die Geschaeftsfuehrung der jeweiligen Tochtergesellschaft formal zu adoptieren (Adoptionsprotokoll, kein Neuerlass).

                    Die Leitlinie wird **aktiv kommuniziert** (BSI 200-4 Kap. 4.1 fordert ausdruecklich `aktive Kommunikation`): Veroeffentlichung im Intranet, Bestandteil des On-Boarding, jaehrliche Pflichtschulung gemaess A.6.3 ISO 27001, Aushaendigung an Drittparteien im Rahmen von Vertraegen (A.5.20). Die Lesebestaetigung wird zentral dokumentiert; bei Beschaeftigten in regulierten Funktionen (z. B. Krisenstab, Process Owner kritischer Prozesse) wird die jaehrliche Auffrischung verbindlich nachgewiesen.

                    ## 9. Verstoesse, Sanktionen und Anreizwirkung
                    Verstoesse gegen diese Notfallleitlinie oder gegen untergeordnete BC-Plaene koennen zu disziplinarischen Massnahmen gemaess der Personalsicherheits-Richtlinie (A.6.4 ISO 27001), zivilrechtlichen Konsequenzen sowie strafrechtlicher Verfolgung fuehren, sofern strafbares Verhalten vorliegt. Bei Drittparteien werden vertragliche Konsequenzen gemaess A.5.20 wirksam (Mahnung, Vertragsstrafe, Sonderkuendigung). Positiv wirken Anreize fuer aktive Mitwirkung an Uebungen und Krisenstabsarbeit (z. B. dokumentierte Beruecksichtigung in Personalentwicklungsgespraechen, Foerderung von BCM-Zertifizierungen wie ISO 22301 Lead Implementer/Auditor).

                    ## 10. Beziehung zu untergeordneten BCMS-Dokumenten
                    Diese Notfallleitlinie bildet das Dach des BCMS-Dokumentensatzes. Untergeordnete Dokumente, die im Rahmen dieser Leitlinie verpflichtend sind: BCMS Scope Statement (Cl. 4.3), BIA-Methodik (Cl. 8.2.2), BCM-Risikoanalyse-Methodik (Cl. 8.2.3), BC-Strategie (Cl. 8.3), BC-Plan-Vorlage (Cl. 8.4.4), Verfahren zur Notfallreaktion und Kommunikation (Cl. 8.4.3), Krisenmanagement-Plan (Cl. 8.4.4), Wiederanlauf- und Wiederherstellungs-Plaene (Cl. 8.4.5), Uebungs- und Testprogramm (Cl. 8.6), BCMS-Internes-Audit-Programm (Cl. 9.2), BCMS-Managementbewertungs-Verfahren (Cl. 9.3), Verfahren zu Abweichungen und Korrekturmassnahmen (Cl. 10.1) sowie - falls BSI 200-4 adoptiert - das Notfallhandbuch (BSI 200-4 Kap. 7). Jedes untergeordnete Dokument verweist im Header auf diese Notfallleitlinie und verwendet die hier definierten Begriffe und Rollen konsistent.

                    ---
                    *Diese Notfallleitlinie verpflichtet die Organisation zur Aufrechterhaltung der Geschaeftskontinuitaet und zur kontinuierlichen Verbesserung des BCMS. Genehmigt durch die oberste Leitung.*
