        bc_strategy:
            v1:
                title: 'BCM-Strategie und Loesungsalternativen / BC Strategy'
                body: |-
                    # BCM-Strategie und Loesungsalternativen der {{ tenant.legal_name }}

                    *Dokumentenklasse: Programm-Dokument (uebergreifend) | Norm-Anker: ISO 22301:2019 Klausel 8.3 inkl. 8.3.2 + 8.3.3, BSI 200-4 Kap. 5.4 | Pruefintervall: {{ bcm.review_interval_months }} Monate; ausserordentlich nach BIA-Update*

                    ## 1. Zweck der Strategie
                    Dieses Dokument beschreibt die strategischen Optionen und ausgewaehlten Loesungen, mit denen die {{ tenant.legal_name }} die Geschaeftskontinuitaet fuer in-scope Prozesse sicherstellt. Es erfuellt ISO 22301:2019 Klausel 8.3 ("The organization shall determine and select business continuity strategies and solutions") und ist fundiert auf den Ergebnissen von BIA (§2.2) und BCM-Risikoanalyse (§2.3). Die Strategie wird durch die oberste Leitung genehmigt; die operative Umsetzung verantworten Process Owner und IT-Leitung in Abstimmung mit dem Notfallbeauftragten {{ roles.bcm_officer.fullName }}.

                    ## 2. Strategische Optionen je Kritikalitaets-Tier
                    Die {{ tenant.legal_name }} nutzt eine Tier-basierte Strategie:

                    - **Tier 1 — Kritische Prozesse (RTO ≤ 4 Stunden)** — Hot-Standby / Dual-Site / aktive Cloud-Failover-Architektur. Synchrone oder nahezu-synchrone Datenreplikation. RPO ≤ 15 Minuten. Kontinuierliche Verfuegbarkeitsueberwachung mit automatischem Failover.
                    - **Tier 2 — Wichtige Prozesse (RTO ≤ 24 Stunden)** — Warm-Standby (vorinstallierte Systeme, regelmaessige Datenaktualisierung) ODER vertraglich gesicherte Recovery-Dienstleistung. RPO ≤ 4 Stunden. Manuelle Failover-Aktivierung zulaessig.
                    - **Tier 3 — Standard-Prozesse (RTO ≤ 72 Stunden)** — Cold-Standby (Hardware vorhanden, manuelle Wiederherstellung) und/oder definierte manuelle Workarounds (Papier-Prozesse, alternative Werkzeuge). RPO ≤ 24 Stunden.
                    - **Tier 4 — Aufschiebbare Prozesse (RTO > 72 Stunden)** — Dokumentation und Akzeptanz; Wiederherstellung im Rahmen normaler Wiederanlauf-Verfahren.

                    ## 3. RTO vs. RTC (kritische Unterscheidung)
                    **RTO** (Recovery Time Objective) ist die geforderte Wiederanlauf-Zeit. **RTC** (Recovery Time Capability) ist die tatsaechlich erreichbare Wiederanlauf-Faehigkeit, gemessen ueber Uebungen und reale Aktivierungen. **Die Strategie wird gemessen an RTC, nicht RTO.** Wenn RTC > RTO, liegt eine Strategie-Luecke vor, die durch Investitionen, Re-Architektur oder Tier-Umstufung geschlossen werden muss. Die Differenz wird im jaehrlichen Strategie-Review dokumentiert und in die Managementbewertung gemaess Klausel 9.3 eingebracht.

                    ## 4. Ressourcen-Kategorien (ISO 22301 Cl. 8.3.3 a-g)
                    Die Strategie adressiert verbindlich alle Ressourcen-Kategorien:

                    ### 4.1 Personal
                    Schluesselrollen sind durch Vertretungsplaene, Cross-Training und dokumentierte Wissensweitergabe abgesichert. Mindest-Personalbedarf je Prozess wird in der BIA festgehalten. Evakuierungs-, Notarbeitsplatz- und Telearbeit-Konzepte sind etabliert.

                    ### 4.2 Information
                    Daten werden gemaess Backup-Richtlinie (A.5.30, A.8.13) gesichert; RPO-Vorgaben pro Tier sind verbindlich. Klassifikation gemaess A.5.12; Aufbewahrungsfristen gemaess Aufbewahrungs-Richtlinie und DSGVO Art. 5 Abs. 1 lit. e.

                    ### 4.3 Gebaeude, Arbeitsumgebung und Versorgung
                    Primaere Standorte sind nach Kritikalitaet bewertet; sekundaere Arbeitsplaetze sind durch Telearbeits-Vereinbarungen, Coworking-Vertraege oder durch das Ausweich-Standort-Konzept abgesichert. USV und Notstrom decken kritische Infrastruktur. Klimatisierung und Brandschutz gemaess Standort-Sicherheits-Plan.

                    ### 4.4 Anlagen, Ausstattung und Verbrauchsmaterialien
                    Notebooks, Telefonie und kritische Ausstattung in ausreichender Reserve. Verbrauchsmaterialien (Spezialformulare, Sicherheitsdrucker) auf Mindest-Bestand.

                    ### 4.5 ICT-Systeme
                    Detaillierte Behandlung in den Wiederanlauf-/Wiederherstellungs-Plaenen (§2.8). Einbindung der Backup-Service- und Restore-Service-Komponenten gemaess Asset-Register. Schnittstelle zu A.5.30 ISO 27001 ist verbindlich.

                    ### 4.6 Transport und Logistik
                    Soweit relevant: alternative Lieferwege, Notfall-Lager, Eskalationsverfahren bei Logistik-Stoerung.

                    ### 4.7 Finanzen
                    Liquiditaetsreserve gemaess Treasury-Richtlinie; Notfall-Zahlungsverkehrs-Verfahren; Versicherungsleistungen (Betriebsunterbrechungs-Versicherung) als ergaenzender Schutz.

                    ### 4.8 Partner und Lieferanten
                    Lieferanten-Diversifikation fuer Tier-1-Abhaengigkeiten; vertragliche Continuity-Klauseln gemaess A.5.20 ISO 27001; Exit-Strategien fuer kritische Drittparteien (insbesondere DORA Art. 28 fuer Finanzunternehmen).

                    ## 5. Kosten-Nutzen-Bewertung pro Option
                    Jede Strategie-Option wird mit ihren Kosten (Investitionen, laufenden Kosten, Versicherungspraemien) und Nutzen (vermiedene Schaeden, regulatorische Compliance, Reputationsschutz) bewertet. Die Bewertung wird zur Managementbewertung gemaess Klausel 9.3 vorgelegt; Investitionsentscheidungen erfolgen durch die oberste Leitung ({{ approval.chain }}). Akzeptanz-Schwelle: Investitionen zur Schliessung von RTC-Luecken bei Tier-1-Risiken sind regelmaessig zu genehmigen.

                    ## 6. Strategie-Wahl pro Prozess
                    Pro in-scope Geschaeftsprozess wird die ausgewaehlte Strategie in einem Strategie-Register dokumentiert. Pflichtangaben: Prozess-Bezeichnung, Tier, ausgewaehlte Strategie-Option, geplante MBCO, geschaetzter RTO/RTC-Wert, beteiligte Standorte und IT-Systeme, verantwortlicher Process Owner. Die Strategie wird im jeweiligen BC-Plan (§2.5) referenziert.

                    ## 7. Verbindung zur Risikobehandlung
                    Die ausgewaehlten Strategien sind die wichtigsten Massnahmen zur Mitigation der in der BCM-RA identifizierten Risiken. Die Verknuepfung erfolgt im Risiko-Register: jeder Risiko-Eintrag verweist auf die zugehoerige Strategie-Massnahme und die zugehoerigen BC-Plaene. Bei nicht akzeptablen Restrisiken werden zusaetzliche Massnahmen (Versicherungen, strategische Alternativen) bewertet.

                    ## 8. Strategie-Pruefung und Aenderung
                    Die Strategie wird mindestens jaehrlich geprueft, ausserordentlich bei jedem BIA-Update, bei wesentlichen architektonischen Aenderungen (z. B. Cloud-Migrationsphasen) sowie bei wesentlichen RTC-Soll-Ist-Abweichungen aus Uebungen. Die Pruefung verantwortet der Notfallbeauftragte {{ roles.bcm_officer.fullName }}; die Genehmigung erfolgt durch {{ approval.chain }}.

                    ## 8a. Strategie-Annahmen und Voraussetzungen
                    Die hier dokumentierte Strategie beruht auf einer Reihe expliziter Annahmen, deren Gueltigkeit jaehrlich zu pruefen ist:

                    - **Annahme 1**: Die BIA-Ergebnisse (insbesondere RTO/MTPD pro Prozess) sind aktuell und valide; bei abgelaufener BIA wird die Strategie nur provisorisch betrieben.
                    - **Annahme 2**: Die identifizierten kritischen Drittparteien (insbesondere Cloud-Provider) bleiben verfuegbar; die DORA-Art.-28-Exit-Strategien sind dokumentiert und mind. einmal pro Vertragslaufzeit geuebt.
                    - **Annahme 3**: Die Schluesselpersonen-Verfuegbarkeit (insbesondere Krisenstabsleitung {{ roles.crisis_team_lead.fullName }} und Stellvertretung) ist durch Cross-Training abgesichert.
                    - **Annahme 4**: Der sekundaere Standort {{ secondary_site_label }} ist ueber eine geografisch unabhaengige Strom- und Kommunikationsversorgung erreichbar.
                    - **Annahme 5**: Die Versicherungsleistungen (Betriebsunterbrechung, Cyber) sind aktuell und decken die identifizierten Schadens-Szenarien.

                    Werden Annahmen waehrend des jaehrlichen Reviews als nicht mehr gueltig identifiziert, wird die zugehoerige Strategie-Komponente angepasst und die Investitions-Roadmap ueberprueft.

                    ## 9. Konzern- und Drittparteien-Aspekte
                    In Konzern-Strukturen ist die Strategie mit Konzern-BCM-Vorgaben abzustimmen; lokale Strategien duerfen Konzern-Mindeststandards nicht unterschreiten, koennen jedoch ueber sie hinausgehen (z. B. strengere RTO-Ziele fuer regulatorisch besonders sensitive Tochtergesellschaften). Drittparteien-Aspekte: kritische Lieferanten und Dienstleister werden in einem dedizierten Drittparteien-Continuity-Register gefuehrt; die Strategien beruecksichtigen Lieferanten-Konzentrations-Risiken (insbesondere fuer Cloud-Provider und outgesourcte ICT-Funktionen). DORA Art. 28 (fuer Finanzunternehmen) verlangt explizite Exit-Strategien fuer kritische ICT-Drittparteien-Vereinbarungen mit dokumentiertem Ausstiegspfad und periodisch geuebten Migrationsfaehigkeiten.

                    ## 10. Investitions- und Budget-Verzahnung
                    Strategie-Investitionen sind mit der Geschaeftsplanung verzahnt: BCM-Investitionsbedarf wird im Jahres-Budget-Prozess identifiziert, durch den Notfallbeauftragten konsolidiert, durch Compliance auf regulatorische Pflichten geprueft und in das Investitionsbudget des Folgejahres eingebracht. Mehrjaehrige Roadmaps (z. B. Datacenter-Konsolidierung, Cloud-Failover-Aufbau) werden im 3-Jahres-BCMS-Plan dokumentiert. Die Geschaeftsfuehrung erhaelt jaehrlich einen "BCMS-Investment-Outlook"-Bericht zur priorisierten Investitionsentscheidung.

                    ## 10a. Schnittstelle zur ISMS-Risiko-Behandlung (ISO 27001 Cl. 6.1.3)
                    Die BC-Strategie ist die wichtigste Sammlung von Massnahmen zur Behandlung der ISMS-Risiken im Verfuegbarkeits-Schutzziel. Die Schnittstelle ist:

                    - jede in der ISMS-RA mit Verfuegbarkeitsbezug identifizierte Massnahme wird mit einer Strategie-Komponente verknuepft (z. B. ISMS-Massnahme "redundante WAN-Verbindung" → Strategie-Komponente "Tier-1 Hot-Standby Network");
                    - Kosten und Wirksamkeit der Strategie-Komponenten fliessen in die ISMS-SoA-Begruendung ein;
                    - bei Aenderung der Strategie wird die zugehoerige ISMS-RA-Massnahme geprueft und ggf. aktualisiert;
                    - die ISMS-Risikobehandlungs-Plaene und der BC-Strategie-Register werden quartalsweise abgeglichen.

                    ## 10b. Strategie-Wirksamkeitsmessung (KPIs)
                    Die Wirksamkeit der Strategie wird anhand quantitativer Kennzahlen gemessen, die quartalsweise an die Geschaeftsfuehrung berichtet werden:

                    - **RTO-Erfuellungsgrad** — Anteil der Tier-1-/Tier-2-Prozesse, die in Uebungen oder realen Aktivierungen ihr RTO eingehalten haben (Ziel: ≥ 95 % je Tier);
                    - **RPO-Erfuellungsgrad** — Anteil der Prozesse, deren RPO in Uebungen oder Realaktivierungen eingehalten wurde (Ziel: ≥ 98 % je Tier);
                    - **Strategie-Test-Abdeckung** — Anteil der Strategie-Komponenten, die in den letzten 12 Monaten durch Test/Uebung verifiziert wurden (Ziel: 100 % fuer Tier 1, ≥ 75 % fuer Tier 2);
                    - **DORA-CIF-Recovery-Bereitschaft** (sofern anwendbar) — Anzahl kritischer oder wichtiger Funktionen mit dokumentierter und geuebter Recovery-Faehigkeit;
                    - **Drittparteien-Exit-Bereitschaft** (DORA Art. 28) — Anteil kritischer ICT-Drittparteien mit aktueller, im letzten Jahr geuebter Exit-Strategie.

                    Negative Trends loesen unmittelbare Massnahmen-Plaene aus.

                    ## 11. Test-Verzahnung mit der Strategie
                    Jede strategische Entscheidung wird durch das Uebungs- und Testprogramm validiert: Hot-Standby-Architekturen werden mindestens jaehrlich durch echten Failover-Test geprueft (kein "Simulation only"); Warm-Standby durch jaehrliche Switch-Over-Uebung; Cold-Standby durch dokumentierten Walkthrough mind. alle 24 Monate. Die Test-Ergebnisse fliessen direkt in den jaehrlichen Strategie-Review.

                    ---
                    *Diese Strategie ist durch die oberste Leitung genehmigt und Bestandteil des BCMS-Dokumentensatzes.*
                section:
                    purpose:
                        title: 'Zweck der Strategie'
                        body: |-
                            Erfuellt ISO 22301 Cl. 8.3 und BSI 200-4 Kap. 5.4. Fundiert auf BIA und BCM-RA. Genehmigt durch oberste Leitung ({{ approval.chain }}); operativ verantwortet durch Notfallbeauftragten {{ roles.bcm_officer.fullName }}.
                    tier_options:
                        title: 'Strategische Optionen je Tier'
                        body: |-
                            Tier 1 (RTO ≤ 4h): Hot-Standby / Dual-Site / Cloud-Failover; Tier 2 (≤ 24h): Warm-Standby; Tier 3 (≤ 72h): Cold-Standby + Workaround; Tier 4 (> 72h): dokumentiert akzeptiert.
                    rto_vs_rtc:
                        title: 'RTO vs. RTC'
                        body: |-
                            RTO = gefordert; RTC = tatsaechlich erreichbar. Die Strategie wird an RTC gemessen. RTC > RTO ist Strategie-Luecke; jaehrliches Strategie-Review bringt Luecken in Managementbewertung (Cl. 9.3).
                    resources:
                        title: 'Ressourcen-Kategorien (Cl. 8.3.3 a-g)'
                        body: |-
                            Personal, Information, Gebaeude/Versorgung, Anlagen, ICT, Transport, Finanzen, Partner/Lieferanten. Lieferanten-Diversifikation fuer Tier 1; DORA-Art.-28-Exit-Strategien fuer kritische Finanz-ICT-Drittparteien.
                    cost_benefit:
                        title: 'Kosten-Nutzen-Bewertung'
                        body: |-
                            Bewertung jeder Option (Investition, laufende Kosten, Versicherung) gegen Nutzen (vermiedene Schaeden, Compliance, Reputation). Investitionsentscheidung durch {{ approval.chain }}.
                    process_mapping:
                        title: 'Strategie-Wahl pro Prozess'
                        body: |-
                            Strategie-Register je Prozess: Tier, Option, MBCO, RTO/RTC, Standorte, IT, Process Owner. Referenz im BC-Plan.
                    risk_link:
                        title: 'Risiko-Behandlungs-Link'
                        body: |-
                            Strategien als Hauptmassnahme der Risikobehandlung. Risiko-Register verweist je Risiko auf Strategie + BC-Plaene. Restrisiken werden mit zusaetzlichen Massnahmen (Versicherung, strategische Alternative) abgedeckt.
                    review:
                        title: 'Strategie-Pruefung'
                        body: |-
                            Jaehrlich; ausserordentlich bei BIA-Update, Architektur-Aenderung, RTC-Abweichung. Verantwortet durch {{ roles.bcm_officer.fullName }}; genehmigt durch {{ approval.chain }}.
                tailoring_field:
                    tier_strategy_assignment:
                        label: 'Tier-Strategie-Zuordnung (Tenant-spezifisch)'
                        placeholder: 'Beispiel: "Tier 1: Online-Banking → Active-Active-Cloud (Region eu-central-1 + eu-west-1) mit RPO 0; Tier 1: Kartenautorisierung → Hot-Standby On-Premise + DR-Standort (synchrone Replikation, RPO ≤ 5 min); Tier 2: Filialbetrieb → Warm-Standby (Coworking-Standort vertraglich gesichert); Tier 3: Reporting → Cold-Standby + Excel-Workaround mit dokumentierten Vorlagen."'
                    rtc_gap_status:
                        label: 'Aktuelle RTC-Soll-Ist-Bewertung und Investitions-Roadmap'
                        placeholder: 'Beispiel: "Tier-1-Online-Banking: RTO 4h vs. RTC aus letzter Uebung 6h → Luecke 2h, Investition Active-Active-Architektur 2026 (1,5 Mio. EUR genehmigt). Tier-2-Filialbetrieb: RTO 24h vs. RTC 30h → Coworking-Vertrag wird auf 6 zusaetzliche Standorte erweitert (Q3/2026). Tier-3-Prozesse alle innerhalb RTC-Toleranz."'
                    secondary_site_concept:
                        label: 'Ausweich-Standort-Konzept'
                        placeholder: 'Beispiel: "Primaerer Hauptstandort: Frankfurt; Ausweich-Standort: Eschborn (15 km Entfernung, eigenes Stromnetz, getrennte Telekom-Anbindung). Mutual-Aid-Vereinbarung mit Schwester-Tochter in Hamburg fuer extreme Szenarien (z. B. regionaler Strom-Ausfall Rhein-Main). Cloud-Failover via {{ secondary_site_label }} fuer kundenseitig-kritische digitale Services."'
        bc_plans:
            v1:
                title: 'BCM-Plan-Vorlage und -Standard / BC Plan Template Standard'
                body: |-
                    # BCM-Plan-Vorlage und -Standard der {{ tenant.legal_name }}

                    *Dokumentenklasse: Verfahren (definiert die Struktur einzelner BC-Plaene; einzelne BC-Plaene sind separate Records pro Prozess) | Norm-Anker: ISO 22301:2019 Klausel 8.4.4, BSI 200-4 Kap. 6 | Pruefintervall: {{ bcm.review_interval_months }} Monate*

                    ## 1. Zweck dieses Dokuments
                    Dieses Dokument definiert verbindlich die Struktur, Inhalte und Qualitaetsanforderungen aller Business-Continuity-Plaene (BC-Plaene) der {{ tenant.legal_name }} gemaess ISO 22301:2019 Klausel 8.4.4 und BSI 200-4 Kap. 6. Einzelne BC-Plaene werden pro in-scope Geschaeftsprozess durch Process Owner erstellt und nutzen diese Vorlage verbindlich. Pro BC-Plan wird ein eigener Record erzeugt; Pflege und Genehmigung erfolgen ueber den BC-Plan-Workflow.

                    ## 2. Verhaeltnis zu BSI 200-4-Plan-Typen
                    BSI 200-4 unterscheidet drei Plan-Typen, ISO 22301 fasst sie zu "BC Plans" zusammen. Fuer Tenants mit BSI-Adoption gelten **alle drei Plan-Typen** als verbindlich:

                    - **Geschaeftsfortfuehrungsplan (Business Continuation Plan)** — fokussiert auf Aufrechterhaltung des Geschaeftsbetriebs durch Workarounds und reduzierte Verfahren waehrend einer Stoerung;
                    - **Wiederanlaufplan (Recovery / Resumption Plan)** — bringt Ressourcen in einen (ggf. reduzierten) Betriebszustand zurueck;
                    - **Wiederherstellungsplan (Restoration Plan)** — stellt langfristig den vollen Vor-Stoerungs-Zustand wieder her.

                    Fuer Tenants ohne BSI-Adoption wird ein **integrierter BC-Plan** mit allen drei Aspekten in einer Vorlage gepflegt.

                    ## 3. Verbindliche Inhaltsabschnitte (jeder BC-Plan)
                    ### 3.1 Plan-Identifikation
                    Eindeutige Plan-ID, betroffener Geschaeftsprozess, Process Owner, Verantwortlicher BC-Plan-Eigner, Version, Genehmigungsstatus, Erstellungsdatum, naechstes Pruefdatum, Klassifikation (default: Internal-Confidential gemaess BSI 200-4).

                    ### 3.2 Aktivierungsbedingungen
                    Klare Bedingungen, unter denen der Plan aktiviert wird (Trigger-Liste). Verweis auf das Verfahren zur Notfallreaktion (§2.6) — die Aktivierungsentscheidung erfolgt durch die im Reaktionsverfahren benannte Rolle (typischerweise Krisenstabsleitung {{ roles.crisis_team_lead.fullName }} oder Geschaeftsfuehrung {{ approval.chain }}).

                    ### 3.3 Rollen und Kontaktliste
                    Verbindliche Liste aller fuer die Plan-Ausfuehrung benoetigten Rollen mit Namen, Position, Telefon (Buero, Mobil, Notfall), E-Mail, Stellvertretung. Verweis auf den Krisenstab (§2.7). Aktualisierungsverpflichtung: Pruefung mindestens halbjaehrlich, ausserordentlich bei Personalwechsel.

                    ### 3.4 Reihenfolge der Wiederanlauf-Aktionen
                    Detaillierte, schrittweise Anleitung zur Wiederherstellung der Prozessfaehigkeit innerhalb des RTO. Format: Schritt-Nummer, Beschreibung, Verantwortliche Person, geschaetzte Dauer, Vorbedingungen, Erfolgskriterium. Reihenfolge folgt der in der BIA dokumentierten Abhaengigkeitsanalyse (kritische Abhaengigkeiten zuerst).

                    ### 3.5 Ressourcenanforderungen
                    Personal (Anzahl, Qualifikation), IT-Systeme (Verweis auf Asset-Register), Infrastruktur (Standort, Stromversorgung, Klimatisierung), Verbrauchsmaterialien, externe Dienstleister, Notfall-Budget.

                    ### 3.6 Interne und externe Abhaengigkeiten
                    Liste aller benoetigten internen Liefer- und Empfaengerprozesse, externer Lieferanten und Dienstleister mit deren BC-Vereinbarungen. Verweis auf Lieferanten-Register und SLAs.

                    ### 3.7 Kommunikationsvorlagen
                    Vorbereitete Texte fuer interne Kommunikation (Beschaeftigte, Geschaeftsfuehrung), Kunden, Aufsichtsbehoerden und Medien. Verweis auf das Verfahren zur Notfallkommunikation (§2.6). Sprachversionen: mindestens Deutsch und Englisch fuer kunden- und behoerdenrelevante Texte.

                    ### 3.8 Stand-Down-Kriterien
                    Klare Bedingungen, unter denen der Plan deaktiviert und in den Normalbetrieb zurueckgekehrt wird. Verantwortliche Entscheidungsrolle, Dokumentationspflicht (BC-Plan-Aktivierungs-Log), Lessons-Learned-Trigger.

                    ### 3.9 Verweis auf Wiederanlauf-/Wiederherstellungs-Plaene
                    Verweis auf zugehoerige Wiederanlauf- und Wiederherstellungs-Plaene gemaess §2.8 (insbesondere fuer ICT-Komponenten).

                    ## 4. Klassifikation und Aufbewahrung
                    BC-Plaene gelten als vertraulich (default-Klassifikation: Internal-Confidential gemaess BSI 200-4 Kap. 6). Verteilung gemaess Need-to-know; Aufbewahrung gemaess Aufbewahrungs-Richtlinie. Versionsverwaltung verbindlich; alte Versionen werden revisionssicher fuer mindestens 3 Jahre aufbewahrt.

                    ## 5. Erstellung, Pruefung, Genehmigung
                    - **Erstellung**: durch BC-Plan-Eigner in Abstimmung mit Process Owner und Notfallbeauftragten {{ roles.bcm_officer.fullName }}.
                    - **Pruefung**: durch unabhaengigen Reviewer (typischerweise zweiter Process Owner oder Compliance) auf Vollstaendigkeit, Realismus, Konsistenz mit BIA und Strategie.
                    - **Genehmigung**: durch Process Owner und Notfallbeauftragten; bei Tier-1-Prozessen zusaetzlich durch Krisenstabsleitung {{ roles.crisis_team_lead.fullName }}.
                    - **Pruefintervall**: jaehrlich; ausserordentlich bei Prozessaenderung, Reorganisation, Aenderung der Abhaengigkeiten.

                    ## 6. Verknuepfung mit Uebungen
                    Jeder Tier-1-BC-Plan wird mindestens jaehrlich in einer Uebung geprueft (Tabletop oder funktional). Tier-2 alle 18-24 Monate; Tier-3 mindestens alle 36 Monate. Uebungs-Frequenz: {{ bcm.exercise_frequency }}. Lessons-Learned aus Uebungen werden in den BC-Plan zurueckgepflegt; signifikante Abweichungen ueber Korrekturmassnahmen-Verfahren (§2.12) behandelt.

                    ## 7. Auto-Erzeugung der BC-Plan-Records
                    Mit Abschluss des Policy-Wizards wird pro in-scope Geschaeftsprozess automatisch ein BC-Plan-Record im Status `draft` erzeugt und dem Process Owner zugewiesen. Das BCMS-Tool erinnert an die Fertigstellung; eine 90-Tage-Eskalation an den Notfallbeauftragten ist eingerichtet.

                    ## 8. Qualitaets-Mindestanforderungen je BC-Plan
                    Jeder BC-Plan muss vor Statusuebergang `draft` → `approved` folgende Qualitaetskriterien erfuellen:

                    - **Vollstaendigkeit**: alle Pflichtabschnitte aus §3 ausgefuellt;
                    - **Aktualitaet**: alle Kontaktdaten innerhalb der letzten 12 Monate verifiziert;
                    - **Realismus**: Wiederanlauf-Reihenfolge wurde mindestens einmal in Tabletop-Uebung geprueft;
                    - **Konsistenz**: RTO/RPO/MBCO entsprechen den BIA-Ergebnissen, etwaige Abweichungen sind begruendet;
                    - **Eindeutigkeit**: jede Aktion hat eine eindeutige verantwortliche Rolle (kein "Team XY" ohne Lead);
                    - **Umsetzbarkeit**: alle benoetigten Ressourcen (Personal, IT, Infrastruktur) sind als verfuegbar nachgewiesen oder als zu beschaffen gekennzeichnet.

                    ## 8a. Pflege-Verantwortung und Jahres-Kalender
                    Jeder BC-Plan hat einen verbindlichen Jahres-Pflege-Kalender, der durch den BC-Plan-Eigner verantwortet und durch den Notfallbeauftragten {{ roles.bcm_officer.fullName }} ueberwacht wird:

                    - **Q1**: Pruefung Kontaktdaten (Beschaeftigte, Lieferanten, Behoerden), Aktualisierung Kontaktlisten;
                    - **Q2**: Tabletop-Uebung des Plans gemaess Uebungs-Programm;
                    - **Q3**: Pruefung der Wiederanlauf-Reihenfolge gegen aktuelles Asset-Register und BIA-Ergebnisse;
                    - **Q4**: Plan-Review, Lessons-Learned-Einarbeitung, Versionserhebung, Genehmigung fuer Folgejahr.

                    Die Quartals-Termine werden im BCMS-Werkzeug als Tasks angelegt; verspaetete Tasks werden nach 14 Tagen an den Notfallbeauftragten eskaliert; nach 60 Tagen Verzug an die Geschaeftsfuehrung ({{ approval.chain }}).

                    ## 9. Plan-Aktivierungs-Schnittstellen
                    Die Aktivierung eines BC-Plans loest folgende Workflows aus:

                    - automatische Benachrichtigung der Krisenstabsleitung {{ roles.crisis_team_lead.fullName }} (auch wenn nicht-Krise);
                    - Eintrag in das Aktivierungs-Log mit Zeitstempel und Anlass;
                    - Aktivierung der Kommunikationsvorlagen aus §3.7;
                    - Stellvertreter-Information ueber Out-of-Band-Kanaele (vgl. §2.6 Verfahren zur Notfallreaktion);
                    - bei Tier-1-Aktivierung zusaetzliche unmittelbare Information der Geschaeftsfuehrung ({{ approval.chain }}).

                    ## 9a. Schulung und Kompetenz der BC-Plan-Eigner
                    Jeder BC-Plan-Eigner durchlaeuft vor erstmaliger Plan-Verantwortung eine Schulung von mindestens 2 Stunden, die folgende Inhalte abdeckt: BCMS-Grundlagen, Plan-Struktur gemaess dieser Vorlage, Aktivierungs-Verfahren, Schnittstelle zur Krisenstabsleitung, Dokumentationspflichten. Aktualisierungs-Schulungen erfolgen jaehrlich (mind. 1 Stunde) sowie bei wesentlichen Aenderungen der Vorlage. Die Schulung wird durch den Notfallbeauftragten {{ roles.bcm_officer.fullName }} oder einen benannten Stellvertreter durchgefuehrt; Teilnahme wird im Personalentwicklungs-System dokumentiert.

                    ## 9b. Schnittstellen zu Workflows und Auto-Eskalationen
                    Das BCMS-Werkzeug verknuepft den BC-Plan-Lebenszyklus mit dem Workflow-System der {{ tenant.legal_name }}:

                    - bei Erstellung eines Plans wird eine Genehmigungs-Workflow-Instanz erzeugt (Reviewer, dann Process Owner, dann Notfallbeauftragter, bei Tier 1 zusaetzlich Krisenstabsleitung);
                    - bei jaehrlicher Pruefung wird automatisch ein Pruefungs-Task generiert; nach Abschluss erfolgt die erneute Genehmigung;
                    - bei Aktivierung eines Plans erzeugt das System automatisch ein Aktivierungs-Workflow-Element mit Zeitachsen-Protokoll;
                    - bei Stand-Down wird eine Lessons-Learned-Workflow-Instanz erzeugt mit Soll-Termin innerhalb von 30 Tagen.

                    Workflow-Verzoegerungen werden gemaess Eskalations-Schema angezeigt: 7 Tage Verzug → Erinnerung an Eigner; 14 Tage → Information Notfallbeauftragter; 30 Tage → Eskalation Geschaeftsfuehrung.

                    ## 10. Vertraulichkeit und Verteiler
                    BC-Plaene enthalten regelmaessig sensitive Informationen ueber kritische Abhaengigkeiten und Schwachstellen. Sie werden ausschliesslich gemaess Need-to-know-Prinzip verteilt; eine vollstaendige Plan-Sammlung wird redundant am primaeren und am sekundaeren Standort {{ secondary_site_label }} hinterlegt (papier + verschluesselter elektronischer Speicher mit getrennter Schluesselverwaltung), damit der Plan auch bei kompletten IT-Ausfall verfuegbar ist.

                    ---
                    *Diese Vorlage ist verbindlich; jede Abweichung erfordert Genehmigung durch den Notfallbeauftragten {{ roles.bcm_officer.fullName }}.*
                section:
                    purpose:
                        title: 'Zweck und Geltungsbereich'
                        body: |-
                            Verbindliche Struktur fuer alle BC-Plaene gemaess ISO 22301 Cl. 8.4.4 und BSI 200-4 Kap. 6. Pro Prozess ein Plan; Vorlage ist Mindeststandard.
                    plan_types:
                        title: 'BSI-Drei-Plan-Modell vs. ISO-Einzel-Plan'
                        body: |-
                            BSI 200-4: Geschaeftsfortfuehrungs-, Wiederanlauf-, Wiederherstellungsplan getrennt. Fuer Nicht-BSI-Tenants integrierter BC-Plan mit allen drei Aspekten.
                    identification:
                        title: 'Plan-Identifikation'
                        body: |-
                            Plan-ID, Prozess, Owner, BC-Plan-Eigner, Version, Status, Klassifikation Internal-Confidential (BSI 200-4 Kap. 6).
                    activation:
                        title: 'Aktivierungsbedingungen'
                        body: |-
                            Trigger-Liste; Aktivierungsentscheidung durch Krisenstabsleitung {{ roles.crisis_team_lead.fullName }} oder Geschaeftsfuehrung {{ approval.chain }} gemaess §2.6.
                    actions:
                        title: 'Aktions-Reihenfolge und Ressourcen'
                        body: |-
                            Schrittweise Anleitung mit Verantwortlichen, Dauer, Vorbedingungen, Erfolgskriterium. Reihenfolge folgt BIA-Abhaengigkeitsanalyse.
                    communication:
                        title: 'Kommunikationsvorlagen'
                        body: |-
                            Vorbereitete Texte fuer Beschaeftigte, Kunden, Aufsicht, Medien. Mindestens DE/EN. Verweis auf Verfahren §2.6.
                    standdown:
                        title: 'Stand-Down und Verweise'
                        body: |-
                            Stand-Down-Kriterien, Aktivierungs-Log, Lessons-Learned-Trigger. Verweis auf Wiederanlauf-/Wiederherstellungs-Plaene (§2.8).
                    review:
                        title: 'Pruefung und Uebung'
                        body: |-
                            Jaehrliche Pruefung; Tier-1-Plaene jaehrlich geuebt, Tier 2 alle 18-24 Monate, Tier 3 alle 36 Monate. Frequenz: {{ bcm.exercise_frequency }}.
                tailoring_field:
                    plan_classification:
                        label: 'Klassifikation und Verteiler-Regel'
                        placeholder: 'Beispiel: "BC-Plaene fuer Tier 1: Klassifikation `Vertraulich` gemaess Klassifikations-Richtlinie; Verteilung nur an Process Owner, Stellvertretung, BCM-Officer, IT-Lead. Tier 2/3: `Internal-Confidential`. Verbreitung papier+verschluesselter PDF-Speicher; jaehrliche Empfangs-Bestaetigung."'
                    bcplan_creation_trigger:
                        label: 'Trigger zur BC-Plan-Erzeugung pro Prozess'
                        placeholder: 'Beispiel: "Auto-Erzeugung beim Policy-Wizard-Abschluss fuer alle Prozesse mit Kritikalitaet ≥ mittel; manuelle Erzeugung zusaetzlich bei (a) neuen kritischen Geschaeftsprozessen aus M&A, (b) regulatorisch geforderten Prozessen (z. B. neue DORA-CIF), (c) Process-Owner-Anforderung mit Genehmigung Notfallbeauftragter."'
                    review_cadence_per_tier:
                        label: 'Pruef- und Uebungs-Kadenz pro Tier'
                        placeholder: 'Beispiel: "Tier 1: Pruefung halbjaehrlich (Mai/November), Uebung jaehrlich (Vollscale alle 24 Monate), zusaetzliche Tabletop-Tests Q1; Tier 2: Pruefung jaehrlich, Tabletop alle 18 Monate; Tier 3: Pruefung alle 24 Monate, dokumentierter Walkthrough alle 36 Monate; Tier 4: Pruefung 36 Monate, kein Uebungspflicht."'
        incident_response_communication:
            v1:
                title: 'Verfahren zur Notfallreaktion und Kommunikation / BCM Incident Response & Communication Procedure'
                body: |-
                    # Verfahren zur Notfallreaktion und Kommunikation der {{ tenant.legal_name }}

                    *Dokumentenklasse: Verfahren | Norm-Anker: ISO 22301:2019 Klausel 8.4.3 (insb. 8.4.3.2), BSI 200-4 Kap. 5.5 | Cross-Reference ISO/IEC 27001:2022 A.5.24-A.5.28 | Pruefintervall: {{ bcm.review_interval_months }} Monate; Trigger bei jeder Aktivierung*

                    ## 1. Zweck und Geltungsbereich
                    Dieses Verfahren regelt verbindlich, wie die {{ tenant.legal_name }} auf Stoerungen, Notfaelle und Krisen reagiert und wie betroffene interne und externe Stakeholder informiert werden. Es erfuellt die Anforderungen von ISO 22301:2019 Klausel 8.4.3.2 ("The organization shall establish, implement and maintain procedures for ... communications") und BSI 200-4 (2023) Kapitel 5.5. Es gilt fuer alle Beschaeftigten, Auftragnehmer und kritischen Drittparteien.

                    ## 2. Erkennung und Alarmierung
                    Stoerungen werden ueber folgende Kanaele erkannt:

                    - **24/7-NOC** und SIEM-Plattform fuer technische Stoerungen;
                    - **Mitarbeitende** ueber zentrale Hotline (mit dokumentierter Rufnummer) und Notfall-E-Mail-Adresse;
                    - **Externes Monitoring** (z. B. Synthetic-Checks, Web-Performance-Monitoring);
                    - **Kunden- und Drittpartei-Meldungen** ueber Service-Desk und Account-Management;
                    - **Aufsichtsbehoerden- und Behoerden-Hinweise** (z. B. CSIRT-Bund-Warnungen, BSI-Warnmeldungen).

                    Alle Meldekanaele sind 24/7 erreichbar; Eingangs-Bestaetigung erfolgt unmittelbar (≤ 15 Minuten), Erst-Triage durch den diensthabenden NOC- oder Bereitschafts-Verantwortlichen.

                    ## 3. Erst-Bewertung und Klassifikation
                    Jede Meldung durchlaeuft eine Erst-Triage in drei Stufen:

                    - **Vorfall (Incident)** — Stoerung im Normalbetrieb, behebbar im Standard-Verfahren ohne BCM-Aktivierung. Bearbeitung gemaess Incident-Management-Verfahren (A.5.24-A.5.27 ISO 27001).
                    - **Notfall (Emergency)** — Stoerung mit drohendem oder eingetretenem RTO-Verstoss eines Tier-2- oder hoeher Prozesses. Aktivierung mindestens eines BC-Plans erforderlich.
                    - **Krise (Crisis)** — schwerwiegendes Ereignis mit existenz- oder reputationsgefaehrdender Wirkung, regulatorischer Meldepflicht oder Lebensschutz-Bezug. Aktivierung des Krisenstabs.

                    Die Klassifikation erfolgt durch den diensthabenden BCM-Coordinator in Abstimmung mit dem Notfallbeauftragten {{ roles.bcm_officer.fullName }}. Im Zweifelsfall gilt die hoehere Stufe.

                    ## 4. Eskalations-Schwellen und Entscheidungsbefugnisse
                    Die Eskalation erfolgt anhand definierter Schwellen:

                    - Vorfall → Notfall: bei drohendem RTO-Verstoss Tier-1/Tier-2 (Entscheidung: NOC-Lead in Abstimmung mit Process Owner);
                    - Notfall → Krise: bei meldepflichtigem Vorfall, Lebensschutz-Bezug, schwerem Reputationsrisiko (Entscheidung: Notfallbeauftragter {{ roles.bcm_officer.fullName }} oder Krisenstabsleitung {{ roles.crisis_team_lead.fullName }});
                    - Krisen-Aktivierung: ausschliesslich durch Krisenstabsleitung {{ roles.crisis_team_lead.fullName }} oder Geschaeftsfuehrung {{ approval.chain }} (im Vertretungsfall).

                    Jede Eskalation wird in der zentralen Aktivierungs-Log-Plattform dokumentiert (Zeitstempel, Entscheider, Klassifikation, betroffene Prozesse).

                    ## 5. Invokationsverfahren (BC-Aktivierung)
                    Die formelle Aktivierung eines BC-Plans erfolgt durch:

                    - **Krisenstabsleitung** ({{ roles.crisis_team_lead.fullName }}) — bei Krise oder Notfall;
                    - **Geschaeftsfuehrung** ({{ approval.chain }}) — im Vertretungsfall oder bei Sondersituationen;
                    - **Notfallbeauftragter** ({{ roles.bcm_officer.fullName }}) — fuer Notfaelle ohne Krisenstabs-Aktivierung.

                    Aktivierungsentscheidung wird auditierbar protokolliert (Zeitpunkt, Anlass, betroffene BC-Plaene, Entscheider).

                    ## 6. Benachrichtigungs-Kaskade
                    Die folgenden Stakeholder werden in definierter Reihenfolge informiert:

                    - **Beschaeftigte** im betroffenen Bereich — unmittelbar durch Bereichsleitung; ueber alternative Kanaele (SMS-Verteiler, Telefon-Kaskade), wenn primaere Kanaele ausgefallen.
                    - **Geschaeftsfuehrung** ({{ approval.chain }}) — durch Notfallbeauftragten oder Krisenstabsleitung, spaetestens 30 Minuten nach Erst-Klassifikation als Notfall/Krise.
                    - **Kunden** — durch Account-Management nach Vorlage; bei kritischen Diensten ueber Status-Page und Hotline.
                    - **Aufsichtsbehoerden** — gemaess regulatorischer Meldepflichten (siehe Abschnitt 7).
                    - **Beteiligte Behoerden** — Polizei, Feuerwehr, Rettungsdienste bei physischen Notfaellen oder Lebensgefahr.
                    - **Medien** — ausschliesslich ueber benannte Pressestelle; ohne deren Freigabe keinerlei externe Aeusserungen.
                    - **Lieferanten und Dienstleister** — soweit Mitwirkung zur Wiederherstellung erforderlich.

                    Pro Stakeholder werden Kommunikationsvorlagen vorgehalten (Mindest-Sprachversionen DE/EN; weitere Sprachen je nach Tenant-Standorten).

                    ## 7. Regulatorische Meldepflichten
                    Folgende Meldepflichten sind je nach Anwendbarkeit zu beachten:

                    - **EU-DORA Art. 19 + RTS** (fuer Finanzunternehmen): Major-ICT-Incident-Meldung mit Stufen Initial (innerhalb 4 Stunden nach Klassifikation), Intermediate (innerhalb 24-72 Stunden), Final (innerhalb 1 Monat). Empfaenger: zustaendige Aufsichtsbehoerde (BaFin / Bundesbank fuer Deutschland).
                    - **NIS2** (Art. 23 NIS2-Richtlinie / nationale Umsetzung): Frueh-Warnung binnen 24 Stunden, Vorfallmeldung binnen 72 Stunden, Endbericht binnen 1 Monat. Empfaenger: nationales CSIRT.
                    - **BSI-KritisV** (fuer KRITIS-Betreiber): unverzuegliche Meldung erheblicher Stoerungen an BSI.
                    - **DSGVO Art. 33** (bei Datenschutzbezug): Meldung binnen 72 Stunden an die zustaendige Aufsichtsbehoerde.
                    - **DSGVO Art. 34** (bei hohem Risiko fuer Betroffene): unverzuegliche Benachrichtigung Betroffener.
                    - **Sektorspezifisch** — z. B. TKG-Meldungen, BaFin-MaRisk-Anzeigen, EU-DORA-Pflichten (Art. 17-23 Incident-Reporting, Art. 28-30 ICT-Drittparteien-Register).

                    Die konkrete Meldepflicht-Liste ist tenant-spezifisch und im Anhang Aufsichtsbehoerden gepflegt.

                    ## 8. Out-of-Band-Kommunikationskanaele
                    Bei Ausfall der primaeren IT-Kommunikation stehen folgende alternative Kanaele zur Verfuegung:

                    - **Telefon-Kaskade** mit ausgedrucktem Verteiler (jaehrlich aktualisiert, an Sicherheitsstandort hinterlegt);
                    - **SMS-Massen-Versand-Dienstleister** (separater Vertrag, wird in regulaeren Tests geprueft);
                    - **Satelliten-Telefon** fuer Krisenstabsleitung (mind. zwei Geraete, monatlicher Funktionstest);
                    - **Funkgeraete** fuer standortinterne Kommunikation;
                    - **Physischer Sammelpunkt** mit Aushaengen am primaeren Standort (Treffpunkt nach Evakuierung).

                    Out-of-Band-Kanaele werden mindestens halbjaehrlich getestet (Frequenz: {{ bcm.exercise_frequency }}).

                    ## 9. Sprecher-Regelung
                    Externe Aeusserungen erfolgen ausschliesslich ueber benannte Sprecher (Pressestelle / Krisenkommunikations-Lead). Tenant-Vorgabe: einzige autorisierte Sprecher sind Geschaeftsfuehrung ({{ approval.chain }}) und benannte/r Pressesprecher/in. Kein Krisenstabs-Mitglied gibt unautorisierte Statements; jeder Kontakt mit Medien wird unmittelbar an die Pressestelle weitergeleitet.

                    ## 10. Dokumentations- und Beweissicherungspflicht
                    Waehrend einer Aktivierung wird ein verbindliches Zeitachsen-Protokoll gefuehrt: Zeitstempel, Entscheidung, Entscheider, Aktion, Ergebnis. Verantwortlich: Krisenstabs-Records-Keeper. Die Dokumentation dient regulatorischer Nachvollziehbarkeit, Lessons-Learned und ggf. zivil-/strafrechtlicher Beweissicherung. Aufbewahrung gemaess Aufbewahrungs-Richtlinie, mindestens jedoch 7 Jahre.

                    ## 10a. Schnittstelle zum ISMS-Incident-Management (A.5.24-A.5.28)
                    Sicherheitsvorfaelle gemaess A.5.24-A.5.28 ISO 27001 mit Verfuegbarkeitswirkung loesen automatisch eine BCM-Triage aus. Die Schnittstelle ist:

                    - jeder Sicherheitsvorfall mit Severity `high` oder `critical` (gemaess Severity-Matrix) wird zugleich an den BCM-Coordinator gemeldet;
                    - der BCM-Coordinator pruefte unmittelbar, ob die Stoerung das RTO eines Tier-1- oder Tier-2-Prozesses bedroht;
                    - bei positivem Befund wird eskaliert (Notfall- oder Krisen-Klassifikation);
                    - bei negativem Befund verbleibt der Vorfall im Standard-Incident-Verfahren mit BCM-Beobachter-Rolle;
                    - Cyber-Vorfaelle mit Verschluesselungs- oder Wiper-Komponente werden grundsaetzlich als Notfall klassifiziert (BSI 200-4 Kap. 5.5 empfiehlt Vorsicht).

                    ## 10b. Eskalations-Matrix mit zeitlichen Soll-Werten
                    Die Eskalation erfolgt entlang einer Matrix mit verbindlichen Soll-Zeiten ab Erst-Klassifikation:

                    - innerhalb 15 min — Bestaetigung Erst-Klassifikation, Information NOC-Lead;
                    - innerhalb 30 min — Information Notfallbeauftragter {{ roles.bcm_officer.fullName }} bei Notfall, Krisenstabsleitung {{ roles.crisis_team_lead.fullName }} bei Krise;
                    - innerhalb 60 min — Aktivierung BC-Plan und/oder Krisenstab durch berechtigte Rolle;
                    - innerhalb 4 h — DORA-Initial-Meldung (sofern anwendbar);
                    - innerhalb 24 h — NIS2-Frueh-Warnung (sofern anwendbar), DSGVO-Prepare-Notification (sofern Datenschutz-Bezug);
                    - innerhalb 72 h — DORA Intermediate Report, NIS2 Vorfallmeldung, DSGVO Art. 33 Meldung;
                    - 1 Monat — DORA Final Report, NIS2 Endbericht, ggf. Korrekturmassnahmen-Berichterstattung.

                    Verspaetungen werden im Aktivierungs-Log mit Begruendung dokumentiert; sie sind Bestandteil der Lessons-Learned und ggf. der regulatorischen Nachpruefung.

                    ## 11. Stand-Down und Rueckkehr in den Normalbetrieb
                    Die Stand-Down-Entscheidung wird durch die Rolle getroffen, die die Aktivierung verfuegt hat (Krisenstabsleitung {{ roles.crisis_team_lead.fullName }}, Geschaeftsfuehrung {{ approval.chain }} oder Notfallbeauftragter {{ roles.bcm_officer.fullName }}). Voraussetzungen fuer Stand-Down:

                    - die ausloesende Stoerung ist behoben oder unter Kontrolle;
                    - kritische Prozesse laufen mindestens auf MBCO-Niveau;
                    - betroffene Stakeholder sind informiert;
                    - ein Erst-Lessons-Learned-Termin (Hot Wash) ist innerhalb von 7 Tagen terminiert;
                    - alle aufgelaufenen Sofortmassnahmen sind dokumentiert und in das Korrekturmassnahmen-Verfahren (§2.12) ueberfuehrt.

                    Der Stand-Down wird in der Aktivierungs-Log-Plattform festgehalten; eine formale Stand-Down-Mitteilung ergeht an alle in der Notification-Cascade informierten Stakeholder.

                    ## 12. Lessons-Learned und Verbesserung
                    Innerhalb von 7 Tagen nach Stand-Down erfolgt ein Hot-Wash-Workshop mit allen Krisenstabs-Mitgliedern und Schluesselrollen. Innerhalb von 30 Tagen wird ein konsolidierter Lessons-Learned-Bericht erstellt; binnen 90 Tagen werden alle abgeleiteten Korrekturmassnahmen mit Termin und Verantwortlichkeit im Korrekturmassnahmen-System dokumentiert. Die Massnahmen werden bis zum Wirksamkeitsnachweis nachverfolgt; offene Massnahmen werden quartalsweise an die Geschaeftsfuehrung berichtet.

                    ## 13. Datenschutz waehrend der Aktivierung
                    Die Verarbeitung personenbezogener Daten waehrend einer BCMS-Aktivierung (z. B. Mitarbeiter-Standort-Daten, Notfall-Kontakte, Medien-Inhalte) erfolgt unter Einbeziehung des Datenschutzbeauftragten und im Rahmen der bestehenden DSGVO-Erlaubnistatbestaende (insbesondere Art. 6 Abs. 1 lit. b und f, Art. 9 sofern Gesundheitsdaten beruehrt). Out-of-Band-Kanaele werden datenschutz-konform betrieben (z. B. SMS-Provider mit AVV gemaess Art. 28 DSGVO, Aufbewahrungsfristen fuer Telefon-Listen).

                    ---
