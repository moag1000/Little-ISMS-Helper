        bia_methodology:
            v1:
                title: 'BIA-Methodik / Methodik der Business-Impact-Analyse'
                body: |-
                    # BIA-Methodik der {{ tenant.legal_name }}

                    *Dokumentenklasse: Methodik (definiert WIE, nicht die Analyse selbst) | Norm-Anker: ISO 22301:2019 Klausel 8.2.2, BSI 200-4 Kap. 5.2.1 | Pruefintervall: 24 Monate*

                    ## 1. Zweck und Geltungsbereich
                    Diese Methodik regelt verbindlich die Durchfuehrung der Business-Impact-Analyse (BIA) gemaess ISO 22301:2019 Klausel 8.2.2 ("The organization shall implement and maintain a systematic process for analysing the business impact"). Sie wird durch den Notfallbeauftragten {{ roles.bcm_officer.fullName }} verantwortet und ist die methodische Grundlage zur Bestimmung von Kritikalitaeten, Recovery-Zielen und Abhaengigkeiten der in-scope Geschaeftsprozesse. BSI 200-4 Kap. 5.2.1 entspricht inhaltlich.

                    ## 2. Glossar verbindlicher Kernbegriffe
                    Folgende Begriffe sind innerhalb dieser Methodik verbindlich definiert:

                    - **MTPD (Maximum Tolerable Period of Disruption / Maximal tolerierbare Ausfallzeit)** — der maximale Zeitraum, ueber den ein Prozess unterbrochen sein darf, bevor existenzgefaehrdende Folgen eintreten. Bezugsgroesse: Geschaeftsbestand. Nicht verhandelbar.
                    - **RTO (Recovery Time Objective / Wiederanlaufzeit)** — die Ziel-Zeit fuer den Wiederanlauf eines Prozesses nach Stoerung. Es gilt zwingend RTO < MTPD.
                    - **RPO (Recovery Point Objective / Wiederherstellungspunkt)** — der maximal akzeptable Datenverlust, gemessen als Zeitspanne vor dem Stoerungseintritt.
                    - **MBCO (Minimum Business Continuity Objective / Minimum-Geschaeftskontinuitaetsziel)** — das minimal akzeptable Aktivitaetsniveau eines Prozesses waehrend einer Stoerung (z. B. "50 % der normalen Transaktionsrate").
                    - **RTC (Recovery Time Capability)** — die tatsaechlich erreichte Wiederanlauf-Faehigkeit, im Vergleich zum RTO bewertet.

                    Diese Definitionen sind in der gesamten BCMS-Dokumentation zu verwenden.

                    ## 3. Auswirkungs-Kategorien (vor BIA-Durchfuehrung festzulegen)
                    Die Auswirkungs-Bewertung erfolgt anhand der folgenden vorab definierten Kategorien:

                    1. **Finanzielle Auswirkungen** — Umsatzausfall, Vertragsstrafen, Sonderkosten, Liquiditaetsrisiko;
                    2. **Regulatorische Auswirkungen** — Verstoss gegen Aufsichtsrecht (BaFin, BSI-KritisV, DORA, NIS2), Verfahrensrisiken, Bussgelder;
                    3. **Reputative Auswirkungen** — Medienberichterstattung, Kundenabwanderung, Image-Schaden;
                    4. **Lebensschutz / Sicherheit** — Gefaehrdung von Beschaeftigten, Kunden, Anwohnern (oberste Prioritaet);
                    5. **Operative Auswirkungen** — interne Prozessstoerungen, Mitarbeiterproduktivitaet, Lieferketten-Effekte.

                    ## 4. Auswirkungs-Skala
                    Die Auswirkungen werden auf einer 5-stufigen Skala bewertet (1 = vernachlaessigbar, 5 = existenzgefaehrdend), wobei mindestens die Kategorien Finanziell und Regulatorisch monetaere bzw. quantitative Anker erhalten (z. B. Stufe 4 = > 1 Mio. EUR Schaden / Bussgeldrisiko > 500 TEUR / Aufsichtsmassnahme). Die konkreten Anker sind tenant-spezifisch und im BIA-Anhang dokumentiert. Das hoechste bewertete Kategorie-Niveau bestimmt die Gesamtbewertung des Prozesses (Maximum-Prinzip, BSI 200-4 Kap. 5.2.1 analog).

                    ## 5. Zeitfenster der Auswirkungsbewertung
                    Die Bewertung erfolgt entlang folgender Zeitachsen ab Stoerungseintritt: 1 Stunde, 4 Stunden, 24 Stunden, 72 Stunden, 1 Woche, 1 Monat. Pro Zeitfenster wird die zu erwartende Auswirkungsstufe ermittelt. Aus dem Anstieg ueber die Zeit wird MTPD und RTO abgeleitet (RTO als jenes Zeitfenster, in dem die Auswirkung erstmals als "nicht mehr akzeptabel" bewertet wird).

                    ## 6. Abhaengigkeitsanalyse
                    Fuer jeden in-scope Prozess sind folgende Abhaengigkeitskategorien zu erfassen:

                    - **Vorgelagerte Abhaengigkeiten (upstream)** — Inputs, Lieferanten, IT-Services, Systeme;
                    - **Nachgelagerte Abhaengigkeiten (downstream)** — Empfaengerprozesse, Kunden, Outputs;
                    - **Laterale Abhaengigkeiten** — gleichrangige Prozesse mit gegenseitiger Beeinflussung;
                    - **Ressourcen-Abhaengigkeiten** — Personal (Schluesselrollen, Mindest-Personal), Infrastruktur (Standort, Strom, Klimatisierung), IT-Systeme (siehe Asset-Register), Drittparteien (Lieferanten-Register).

                    Die Abhaengigkeiten werden als gerichteter Graph in der BIA-Datenbank gepflegt und feeden die Wiederanlauf-Reihenfolge in den Recovery-Plaenen.

                    ## 7. Datenerhebungsmethode
                    Die BIA wird primaer ueber **moderierte Workshops** mit Process Ownern und Key Stakeholdern durchgefuehrt (Standardansatz). Alternative Methoden: strukturierte Interviews oder validierte Fragebogen. Die Wahl der Methode wird durch den BIA-Lead in Abstimmung mit dem Notfallbeauftragten festgelegt; Workshops werden bevorzugt fuer Tier-1- und Tier-2-Prozesse, Fragebogen fuer Tier-3 und Tier-4. Die Erhebung muss mindestens beinhalten: Prozess-Beschreibung, Inputs/Outputs, Schluesselrollen, IT-Abhaengigkeiten, Saisonalitaet, Auswirkungsbewertung pro Zeitfenster, vorgeschlagene MBCO.

                    ## 8. Rollen
                    - **BIA-Lead** — verantwortet Durchfuehrung, Moderation, Konsolidierung; typischerweise Notfallbeauftragter oder benannter Stellvertreter.
                    - **Process Owner** — liefert Daten zum eigenen Prozess, validiert Ergebnisse, genehmigt finale BIA-Bewertung des eigenen Prozesses.
                    - **Reviewer** — unabhaengiger Gegenleser (z. B. ISB {{ roles.isb.fullName }}, Compliance, Internal Audit), prueft Plausibilitaet und Konsistenz mit anderen BIA-Ergebnissen.
                    - **Top-Management-Sponsor** — finale Freigabe der konsolidierten BIA-Ergebnisse.

                    ## 9. Pruef-, Freigabe- und Wiederholungs-Trigger
                    Die BIA-Ergebnisse werden konsolidiert, durch BIA-Lead geprueft, durch unabhaengigen Reviewer gegengelesen und durch Top-Management freigegeben. Wiederholungstrigger:

                    - Regulaere Re-Execution: alle 24 Monate (default);
                    - Nach wesentlicher Organisations-Aenderung (Reorganisation, M&A, neuer Standort);
                    - Nach Einfuehrung neuer Produkte / Dienstleistungen;
                    - Nach realer Notfallaktivierung (BC-Invocation) im Rahmen Lessons-Learned;
                    - Nach Vollscale-Uebung mit signifikanter Lessons-Learned-Auswirkung;
                    - Bei Aenderung der Auswirkungs-Skala.

                    ## 10. Beziehung zu anderen BCMS-Dokumenten
                    Die BIA-Ergebnisse sind verbindlicher Input fuer:

                    - **BCM-Risikoanalyse** (§2.3) — Auswirkungs-Skala wird wiederverwendet;
                    - **BC-Strategie** (§2.4) — Tier-Zuordnung steuert Strategie-Wahl;
                    - **BC-Plaene** (§2.5) — RTO/RPO/MBCO werden uebernommen;
                    - **Wiederanlauf-/Wiederherstellungs-Plaene** (§2.8) — Reihenfolge und Zielzeiten;
                    - **Uebungs- und Testprogramm** (§2.9) — kritischste Prozesse werden zuerst geuebt.

                    ## 10a. Werkzeuge und Datenhaltung
                    Die BIA wird in einem zentralen BCMS-Werkzeug erfasst, das die folgenden Funktionen verbindlich bereitstellt:

                    - strukturierte Erfassung pro Geschaeftsprozess mit Pflichtfeldern fuer Auswirkungs-Bewertung pro Zeitfenster, MTPD, RTO, RPO, MBCO, Abhaengigkeiten;
                    - Versionsverwaltung mit Vorgaenger-Tracking und Begruendung jeder Aenderung;
                    - Schnittstellen zum Asset-Register (Abgleich IT-Abhaengigkeiten), zum Lieferanten-Register (Drittparteien-Abhaengigkeiten), zum Personal-Stamm (Schluesselrollen) und zum Risiko-Register (Verknuepfung BIA-Bewertung mit Risiko-Eintraegen);
                    - Reporting-Funktionen fuer den BIA-Konsolidierungs-Bericht (Tier-Verteilung, Top-N-Prozesse nach Auswirkung, Abhaengigkeits-Hotspots);
                    - Audit-Trail mit revisionssicherer Protokollierung aller Aenderungen.

                    Eine BIA-Erfassung ausserhalb des zentralen Werkzeugs (z. B. in lokalen Tabellen-Kalkulationen) ist nur als temporaerer Workshop-Zwischenschritt zulaessig; die Konsolidierung muss im zentralen Werkzeug erfolgen.

                    ## 10b. Schulung und Kompetenz der BIA-Beteiligten
                    Alle BIA-Lead-Personen sowie Reviewer durchlaufen eine dokumentierte BIA-Schulung von mindestens 4 Stunden, die folgende Inhalte abdeckt: Methodik dieses Dokuments, Begriffsabgrenzung MTPD/RTO/RPO/MBCO/RTC, Workshop-Moderationstechniken, Plausibilitaets-Pruefung, Konfliktloesung bei divergierenden Bewertungen. Process Owner erhalten eine Kurz-Schulung von mind. 1 Stunde vor Teilnahme an einem BIA-Workshop. Die Schulungsteilnahme wird im Personalentwicklungs-System dokumentiert; ohne dokumentierte Schulung darf eine Person nicht als BIA-Lead oder Reviewer eingesetzt werden.

                    ## 11. Datenqualitaet und Plausibilitaetspruefung
                    Die BIA-Ergebnisse muessen plausibel und konsistent sein. Pruefkriterien:

                    - **MTPD-RTO-Konsistenz** — fuer jeden Prozess muss RTO < MTPD gelten; Verstoesse werden vom Reviewer zwingend korrigiert.
                    - **Ressourcen-Konsistenz** — die in der BIA gemeldete IT-Abhaengigkeit muss mit dem Asset-Register uebereinstimmen.
                    - **Auswirkungs-Konsistenz** — Prozesse mit aehnlicher Funktion und Bedeutung sollten aehnliche Bewertungen erhalten; Ausreisser werden begruendet.
                    - **Saisonalitaet** — Prozesse mit saisonal schwankender Bedeutung (z. B. Jahresabschluss, Hochsaison) erhalten saisonale Bewertungs-Annexe.

                    Vor Freigabe wird ein konsolidierter BIA-Bericht erstellt, der die wichtigsten Erkenntnisse, ungewoehnliche Bewertungen, Lueckenbefunde (z. B. fehlende Stellvertretungen, monolithische ICT-Abhaengigkeiten ohne Failover) und Empfehlungen fuer die BC-Strategie zusammenfasst.

                    ## 11a. Beispiel-Konsolidierungs-Bericht (Mindestinhalte)
                    Der konsolidierte BIA-Konsolidierungs-Bericht hat mindestens folgende Inhalte:

                    - Tier-Verteilung (Anzahl Prozesse je Tier 1-4) mit Trend-Vergleich gegen Vorjahres-BIA;
                    - Top-10-Prozesse nach finanzieller Auswirkung bei 24-Stunden-Stoerung;
                    - Top-5-IT-Abhaengigkeits-Hotspots (Systeme, von denen mehrere Tier-1-Prozesse abhaengig sind);
                    - Top-5-Lieferanten-Konzentrations-Risiken (Drittparteien, von denen mehrere Tier-1-Prozesse abhaengig sind);
                    - Schluesselrollen-Hotspots (Personen, von denen mehrere Tier-1-Prozesse abhaengig sind);
                    - Soll-Ist-Vergleich der RTC gegen RTO aus letzter Uebung;
                    - empfohlene Investitions-Schwerpunkte fuer das Folgejahr;
                    - offene Methoden-Fragen und Vorschlaege zur naechsten Methodik-Aktualisierung.

                    Der Bericht wird der Geschaeftsfuehrung im Rahmen der Managementbewertung gemaess Klausel 9.3 vorgelegt.

                    ## 12. Vertraulichkeit und Aufbewahrung der BIA-Ergebnisse
                    BIA-Ergebnisse enthalten regelmaessig sensitive Informationen ueber Geschaeftsstrategie, Kundenkonzentrationen, Schluesselpersonen und Schwachstellen. Default-Klassifikation: `Internal-Confidential` gemaess BSI 200-4 Kap. 6. Verteilung gemaess Need-to-know. Aufbewahrung: aktuelle Version + drei Vorgaengerversionen revisionssicher; aeltere Versionen werden archiviert. Zugriffsrechte werden quartalsweise mit der Personalmanagement-Datenbank abgeglichen (Personalwechsel-Trigger).

                    ---
                    *Diese Methodik ist alle 24 Monate sowie bei wesentlichen Aenderungen zu pruefen.*
                section:
                    purpose:
                        title: 'Zweck der Methodik'
                        body: |-
                            Verbindliche Methodik der BIA-Durchfuehrung gemaess ISO 22301 Cl. 8.2.2 und BSI 200-4 Kap. 5.2.1. Verantwortet durch Notfallbeauftragten {{ roles.bcm_officer.fullName }}.
                    glossary:
                        title: 'Glossar (MTPD/RTO/RPO/MBCO/RTC)'
                        body: |-
                            MTPD = maximal tolerierbare Ausfallzeit (Bestandsfrage); RTO = Wiederanlaufzeit (zwingend < MTPD); RPO = max. Datenverlust; MBCO = Minimum-Aktivitaetsniveau bei Stoerung; RTC = tatsaechliche Faehigkeit (Soll-Ist).
                    impact_categories:
                        title: 'Auswirkungs-Kategorien'
                        body: |-
                            Fuenf Kategorien (Finanziell, Regulatorisch, Reputativ, Lebensschutz, Operativ) auf 5-stufiger Skala mit monetaeren/quantitativen Ankern. Maximum-Prinzip bestimmt Gesamtbewertung.
                    time_windows:
                        title: 'Zeitfenster der Bewertung'
                        body: |-
                            Standard-Achse: 1h / 4h / 24h / 72h / 1 Woche / 1 Monat. Pro Fenster Auswirkungsstufe. Daraus Ableitung MTPD und RTO.
                    dependencies:
                        title: 'Abhaengigkeitsanalyse'
                        body: |-
                            Upstream / Downstream / Lateral / Ressourcen-Abhaengigkeiten als gerichteter Graph. Speist Recovery-Reihenfolge.
                    method:
                        title: 'Datenerhebung und Rollen'
                        body: |-
                            Workshops (Standard fuer Tier 1/2), Interviews, Fragebogen (Tier 3/4). Rollen: BIA-Lead, Process Owner, Reviewer (ISB {{ roles.isb.fullName }} / Compliance), Top-Management-Sponsor.
                    review:
                        title: 'Wiederholungs-Trigger'
                        body: |-
                            Default 24 Monate; zusaetzlich bei Reorganisation, M&A, neuen Produkten, realer Aktivierung, Vollscale-Uebung, Skala-Aenderung.
                tailoring_field:
                    impact_scale_anchors:
                        label: 'Monetaere/quantitative Anker der Auswirkungs-Skala'
                        placeholder: 'Beispiel: "Stufe 5 (existenzgefaehrdend) = > 10 Mio. EUR Schaden ODER Lizenzentzug ODER mehr als 5 % Marktanteil-Verlust. Stufe 4 (kritisch) = 1-10 Mio. EUR ODER Aufsichtsmassnahme. Stufe 3 (signifikant) = 100 TEUR-1 Mio. EUR ODER Berichts-/Meldepflicht. Stufe 2 (gering) = 10-100 TEUR. Stufe 1 (vernachlaessigbar) = < 10 TEUR."'
                    bia_collection_method:
                        label: 'Praeferierte Datenerhebungs-Methode'
                        placeholder: 'Beispiel: "Tier 1 + 2: ganztaegige moderierte Workshops mit Process Owner + 2 Stellvertretern + IT-Owner + Risk-Liaison. Tier 3: 2-stuendige Interviews. Tier 4: validierter Online-Fragebogen mit verbindlicher Plausibilitaetspruefung durch BIA-Lead. Alle Workshops mit Protokollpflicht und Audio-Mitschnitt (DSGVO-konform, 90 Tage Aufbewahrung)."'
                    bia_review_cycle:
                        label: 'Tenant-spezifischer BIA-Wiederholungszyklus und Trigger'
                        placeholder: 'Beispiel: "Standard-Re-BIA alle 24 Monate, jedoch fuer Tier-1-Prozesse alle 12 Monate. Trigger: jede neu integrierte Tochtergesellschaft, jede neue regulatorisch-kritische Funktion (z. B. neue DORA-CIF), jede schwerwiegende BC-Aktivierung (Krisengrad gelb oder roeter), jede Vollscale-Uebung mit Soll-Ist-Abweichung > 30 %."'
        risk_assessment_methodology_bcm:
            v1:
                title: 'Methodik der Risikoanalyse im BCM-Kontext'
                body: |-
                    # Methodik der Risikoanalyse im BCM-Kontext der {{ tenant.legal_name }}

                    *Dokumentenklasse: Methodik | Norm-Anker: ISO 22301:2019 Klausel 8.2.3, BSI 200-4 Kap. 5.3 | Verbunden mit ISO/IEC 27005:2022 (ISMS-RA) | Pruefintervall: 24 Monate*

                    ## 1. Zweck und Abgrenzung
                    Diese Methodik beschreibt das Verfahren zur Risikoanalyse im BCM-Kontext gemaess ISO 22301:2019 Klausel 8.2.3 ("The organization shall implement and maintain a systematic risk assessment process") und BSI 200-4 (2023) Kap. 5.3. Die BCM-Risikoanalyse fokussiert auf **Risiken fuer die Verfuegbarkeit und Geschaeftskontinuitaet** und ergaenzt die ISMS-Risikoanalyse gemaess ISO/IEC 27005:2022. Sie ist nicht mit dieser identisch, kann jedoch deren Methodik referenzieren (siehe Abschnitt 9).

                    ## 2. Verhaeltnis zur ISMS-Risikoanalyse
                    Die BCM-RA und die ISMS-RA verwenden teilweise dieselben Risiko-Eintraege, fokussieren jedoch unterschiedlich:

                    - **ISMS-RA** bewertet alle Schutzziele (Vertraulichkeit, Integritaet, Verfuegbarkeit) — gemaess ISO 27001 Klausel 6.1.2.
                    - **BCM-RA** bewertet vorrangig **Verfuegbarkeit** und schwerwiegende Stoerungs-Szenarien.

                    Wo die Methodik der ISMS-RA fuer den BCM-Kontext geeignet ist, wird auf sie referenziert. Abweichungen werden in Abschnitt 9 dokumentiert ("Delta-Erklaerung").

                    ## 3. BCM-spezifische Risikoquellen (Kategorien)
                    Die folgenden Risikoquellen sind im BCM-Kontext zwingend zu betrachten (BSI 200-4 Anhang C / ISO 22301 Anhang A informativ):

                    - **Naturkatastrophen** — Hochwasser, Sturm, Erdbeben, Brand, extreme Wetterereignisse (inkl. klimawandel-bezogene Risiken);
                    - **Pandemien und gesundheitliche Krisen** — grossflaechiger Personalausfall;
                    - **Cyber-Angriffe mit Verfuegbarkeitswirkung** — Ransomware, DDoS, Wiper-Attacks, Supply-Chain-Kompromittierung;
                    - **Lieferanten-/Drittparteien-Ausfall** — Insolvenz, Outage kritischer Cloud-Provider;
                    - **Schluesselpersonen-Verlust** — Ausfall, Kuendigung, Verlust kritischer Spezialisten;
                    - **Laenger anhaltender Strom-/Energieausfall**;
                    - **Treibstoff- und Versorgungsknappheit**;
                    - **Zivile Unruhen, Terror, geopolitische Krisen**;
                    - **Regulatorische Eingriffe** (z. B. Anordnung Aufsichtsmassnahme, Standortschliessung);
                    - **Infrastrukturausfaelle** — Netzwerk, Telekommunikation, Klima/Kuehlung im Rechenzentrum.

                    Die Liste wird jaehrlich gegen aktuelle Bedrohungs-Kataloge (BSI 200-4 Anhang C, ENISA Threat Landscape, CISA Threat Briefings) gespiegelt.

                    ## 4. Wahrscheinlichkeitsskala (BCM-Linse)
                    Die BCM-RA verwendet eine Skala, die seltene aber hochkonsequente Ereignisse angemessen abbildet (im Gegensatz zur ISMS-RA, die Frequenz-orientiert ist):

                    - **5 Sehr wahrscheinlich** — eingetreten in den letzten 2 Jahren oder erwartet binnen 12 Monaten;
                    - **4 Wahrscheinlich** — innerhalb von 5 Jahren erwartet;
                    - **3 Moeglich** — innerhalb von 10 Jahren erwartet;
                    - **2 Unwahrscheinlich** — innerhalb von 25 Jahren erwartet;
                    - **1 Sehr unwahrscheinlich** — seltene Jahrhundert-Ereignisse, dennoch nicht ausgeschlossen.

                    Bei extremen Risiken (z. B. Pandemie, klimaverstaerktes Hochwasser) ist die Skala explizit nach oben offen — Stufe 1 darf nicht zur Verharmlosung fuehren.

                    ## 5. Auswirkungs-Mapping zu BIA-Zeitfenstern
                    Die Auswirkungs-Bewertung erfolgt zwingend ueber die in der BIA-Methodik definierten Zeitfenster (1h/4h/24h/72h/1w/1mo). Risiken werden bewertet in Bezug auf: "Welche Prozesse werden fuer welchen Zeitraum gestoert, und wie entwickelt sich die Auswirkung ueber die Zeit?" Diese Verknuepfung ist verbindlich; eine BCM-RA ohne BIA-Bezug ist methodisch unzulaessig.

                    ## 6. Risiko-Bewertungskriterien
                    Ein BCM-Risiko gilt als **nicht akzeptabel**, wenn

                    - die erwartete Stoerungsdauer ohne Behandlung das MTPD eines Tier-1- oder Tier-2-Prozesses ueberschreitet, ODER
                    - die kombinierte finanzielle Auswirkung Stufe 4 oder hoeher erreicht (existenzgefaehrdender Schadensbereich), ODER
                    - regulatorische Konsequenzen Aufsichtsmassnahmen-relevant sind, ODER
                    - Lebensschutz betroffen ist (immer Stufe 5).

                    ## 7. Behandlungsoptionen (BCM-spezifisch)
                    Gemaess ISO 22301 Klausel 8.2.3 und BSI 200-4 Kap. 5.3:

                    - **Vermeiden** — Prozess/Risikoursache eliminieren (z. B. Standortverlagerung aus Hochwassergebiet);
                    - **Akzeptieren** — bei niedriger Bewertung mit dokumentierter Geschaeftsfuehrungs-Genehmigung;
                    - **Behandeln** — durch Strategie-Wahl gemaess BC-Strategie (Hot-/Warm-/Cold-Standby, Cloud-Failover, Mutual-Aid);
                    - **Transferieren** — durch Versicherung (Betriebsunterbrechungs-Versicherung, Cyber-Versicherung, Sach-Versicherung);
                    - **Strategische Alternative** — alternative Geschaeftsmodelle, Notbetrieb mit reduziertem Leistungsspektrum (MBCO).

                    ## 8. Dokumentation und Risiko-Register
                    BCM-Risiken werden im zentralen Risiko-Register mit Filter `bcm = true` gefuehrt. Pflichtfelder: Bezeichnung, Quelle, betroffene Prozesse, Wahrscheinlichkeit, Auswirkung pro Zeitfenster, abgeleitete Stoerungsdauer, Behandlungsoption, verantwortliche Person (Risk Owner), Termin der naechsten Bewertung. Schnittstelle zum Workflow-System ist eingerichtet (auto-Eskalation bei Risiken Stufe 4/5).

                    ## 9. Reuse der ISMS-Methodik (Delta-Erklaerung)
                    Sofern die ISMS-RA-Methodik gemaess ISO 27005:2022 fuer den BCM-Kontext genutzt wird, gelten folgende Deltas verbindlich:

                    - Wahrscheinlichkeitsskala wird auf BCM-Linse angepasst (siehe Abschnitt 4);
                    - Auswirkungs-Bewertung folgt BIA-Zeitfenstern statt ISMS-Schadenshoehe;
                    - Risiko-Quellen-Katalog wird um BCM-spezifische Quellen erweitert (Abschnitt 3);
                    - Behandlungsoptionen umfassen explizit "Strategische Alternative" und "Transfer via Versicherung".

                    Das gemeinsame Methodik-Dokument zaehlt sowohl als ISMS- als auch BCM-Methodik, sofern alle vorgenannten Deltas dokumentiert sind.

                    ## 9a. Beruehrungspunkte zu DORA Art. 8 + 9 (Finanzunternehmen)
                    Sofern die {{ tenant.legal_name }} als Finanzunternehmen unter EU-DORA faellt, ergibt sich folgende Verzahnung der BCM-RA mit dem DORA-ICT-Risikorahmen:

                    - **Art. 6 (ICT Risk Management Framework)** — der ICT-Risikorahmen umfasst BCM-Aspekte; die BCM-RA-Ergebnisse fliessen in das ICT-Risikorahmen-Reporting an die Geschaeftsleitung ein;
                    - **Art. 8 (Identification)** — Identifikation kritischer oder wichtiger Funktionen (CIF) muss konsistent mit BIA-Tier-Zuordnung erfolgen;
                    - **Art. 9 (Protection and Prevention)** — die BCM-RA-Ergebnisse verlangen praeventive Massnahmen (Hot-/Warm-Standby, Replikation), die in der BC-Strategie verankert werden;
                    - **Art. 11 (Response and Recovery)** — die BC-Strategie und BC-Plaene operationalisieren die BCM-RA-Befunde;
                    - **Art. 24-27 (Digital Operational Resilience Testing)** — Tests pruefen die Wirksamkeit der BCM-RA-Annahmen;
                    - **Art. 28 (Third-Party Risk Management)** — kritische Drittparteien-Konzentrations-Risiken werden in der BCM-RA explizit aufgegriffen.

                    Die Verzahnung wird im jaehrlichen DORA-RAG-Selbst-Assessment (Risk Assessment Governance) dokumentiert.

                    ## 10. Risiko-Bewertungs-Workshops
                    Die BCM-Risikoanalyse wird mindestens einmal jaehrlich in einem dedizierten Workshop durchgefuehrt, der den Notfallbeauftragten {{ roles.bcm_officer.fullName }}, den ISB {{ roles.isb.fullName }}, die Krisenstabsleitung {{ roles.crisis_team_lead.fullName }}, ausgewaehlte Process Owner kritischer Prozesse und Compliance umfasst. Der Workshop nutzt strukturierte Methoden (Bow-Tie-Analyse, Szenario-Analyse, What-If) und arbeitet sowohl Top-Down (vom Bedrohungs-Katalog zu betroffenen Prozessen) als auch Bottom-Up (vom Prozess zu plausiblen Stoerungs-Szenarien). Ergebnisse werden im Risiko-Register dokumentiert; signifikante neue Risiken loesen Strategie-Reviews aus.

                    ## 11. Beruecksichtigung klimabezogener Risiken
                    Im Sinne von ISO/IEC 27001:2022/Amd. 1:2024 sowie ISO 22301-Praxisleitfaeden werden klimabezogene Risiken explizit als BCM-Risiko-Kategorie beruecksichtigt. Klimabezogene Risiken umfassen: zunehmende Haeufigkeit und Intensitaet extremer Wetterereignisse (Hitzewellen, Hochwasser, Sturm), laengerfristige Einfluesse auf Standort-Tauglichkeit (Anstieg Meeresspiegel, Veraenderung Niederschlagsmuster), regulatorische Folgen (z. B. Klima-Stresstests durch Aufsichtsbehoerden), reputative Risiken bei mangelnder Vorsorge. Die Bewertung folgt dem Time-Horizon-Ansatz: physische Risiken (kurzfristig 0-5 Jahre, mittelfristig 5-15 Jahre, langfristig > 15 Jahre) und transitorische Risiken (regulatorisch, technologisch).

                    ## 12. Berichts- und Eskalationswege
                    BCM-Risiken werden quartalsweise im BCMS-Steuerkreis berichtet. Risiken auf Stufe 4 oder 5 werden unmittelbar an die Geschaeftsfuehrung ({{ approval.chain }}) eskaliert. Akzeptanzentscheidungen fuer Stufe-4-Risiken erfordern dokumentierte Geschaeftsfuehrungs-Genehmigung mit Befristung und Wieder-Bewertungs-Termin (max. 12 Monate). Risiken auf Stufe 5 sind grundsaetzlich nicht akzeptabel und erfordern unmittelbare Behandlung.

                    ---
                    *Diese Methodik wird durch den Notfallbeauftragten {{ roles.bcm_officer.fullName }} verantwortet und alle 24 Monate sowie bei wesentlichen Aenderungen geprueft.*
