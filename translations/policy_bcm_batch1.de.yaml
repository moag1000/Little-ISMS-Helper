        bcms_scope_statement:
            v1:
                title: 'Geltungsbereich des BCMS / BCMS Scope Statement'
                body: |-
                    # Geltungsbereich des BCMS der {{ tenant.legal_name }}

                    *Dokumentenklasse: Leitlinie (Governance — Anwendungsbereich) | Norm-Anker: ISO 22301:2019 Klausel 4.3, BSI 200-4 Kap. 3.2 | Pruefintervall: {{ bcm.review_interval_months }} Monate*

                    ## 1. Zweck dieses Dokuments
                    Dieses Dokument legt den Anwendungsbereich des Business-Continuity-Management-Systems der {{ tenant.legal_name }} gemaess ISO 22301:2019 Klausel 4.3 ("The organization shall determine the boundaries and applicability of the business continuity management system to establish its scope") fest. Es bildet die Grundlage fuer die Notfallleitlinie, die BIA, die BCM-Risikoanalyse, die BC-Strategie und alle BC-Plaene. Das Geltungsbereichsdokument ist verbindlich; jede nachgeordnete BCMS-Aktivitaet referenziert diesen Anwendungsbereich.

                    ## 2. Organisatorischer Geltungsbereich
                    Der Geltungsbereich umfasst die folgenden juristischen Einheiten der {{ tenant.legal_name }}:

                    - **Hauptgesellschaft**: {{ tenant.legal_name }}, vertreten durch die Geschaeftsfuehrung {{ approval.chain }}.
                    - **Tochtergesellschaften** (sofern Holding aktiviert): siehe Anlage 1 (Liste konsolidierter Einheiten mit BCMS-Inklusion).
                    - **Zweigniederlassungen / Betriebsstaetten**: gemaess separater Standort-Liste (siehe Abschnitt 3).

                    Ausgeschlossen sind ausschliesslich rechtlich selbststaendige Einheiten, die ueber eigene BCM-Programme verfuegen und entsprechende Nachweise zur gegenseitigen Anerkennung bereitgestellt haben.

                    ## 3. Geografischer Geltungsbereich (Standorte)
                    Der geografische Anwendungsbereich umfasst alle in der Asset- und Standort-Verwaltung als "BCMS-relevant" markierten Standorte. Die Liste wird durch den Notfallbeauftragten {{ roles.bcm_officer.fullName }} gepflegt und mindestens jaehrlich gegen die Asset-Liste abgeglichen. Jeder neu hinzukommende Standort durchlaeuft eine Erstbewertung (Kritikalitaet, RTO-Zuordnung, BC-Plan-Bedarf) innerhalb von 90 Tagen nach Inbetriebnahme. Auslandsstandorte werden mit ihren jeweiligen lokalen regulatorischen Anforderungen (z. B. landesspezifische BCM-Vorgaben, lokale Aufsichtsbehoerden) im Anhang geografische Aspekte beruecksichtigt.

                    ## 4. Prozess-Geltungsbereich (in-scope Geschaeftsprozesse)
                    Im Anwendungsbereich sind alle Geschaeftsprozesse der {{ tenant.legal_name }} mit einer Kritikalitaet von **mittel oder hoeher** gemaess Business-Process-Register. Das BCMS deckt explizit folgende Prozesskategorien ab:

                    - Kritische Kerngeschaeftsprozesse (Tier 1, RTO ≤ 4 Stunden);
                    - Wichtige unterstuetzende Prozesse (Tier 2, RTO ≤ 24 Stunden);
                    - Standard-Prozesse mit BCM-Relevanz (Tier 3, RTO ≤ 72 Stunden);
                    - Aufschiebbare Prozesse mit dokumentierter Akzeptanz (Tier 4, RTO > 72 Stunden).

                    Die zugewiesenen Prozesseigner sind verbindlich Process Owner im Sinne dieses Dokuments und verantworten Pflege und Uebung der zugehoerigen BC-Plaene.

                    ## 5. Produkt- und Dienstleistungs-Geltungsbereich
                    Der Anwendungsbereich umfasst alle Produkte und Dienstleistungen, fuer die externen Stakeholdern (Kunden, Vertragspartner, Aufsichtsbehoerden) Kontinuitaetszusagen gegeben werden. Diese sind insbesondere:

                    - In Service-Level-Agreements (SLAs) zugesagte Verfuegbarkeit und Wiederanlaufzeiten;
                    - Regulatorisch geforderte Mindestverfuegbarkeiten (z. B. EU-DORA Art. 11 fuer kritische oder wichtige Funktionen);
                    - Vertraglich zugesicherte Lieferterminierungen mit Vertragsstrafen-Risiko;
                    - Oeffentlich kommunizierte Service-Levels (Webseiten-Verfuegbarkeit, Hotline-Zeiten).

                    ## 6. IT-Service-Abhaengigkeiten im Geltungsbereich
                    Das BCMS adressiert die fuer in-scope-Prozesse benoetigten IT-Services und ICT-Systeme gemaess Asset-Register (Klassifizierung Vertraulichkeit / Integritaet / Verfuegbarkeit). Erfasst sind insbesondere: Kernanwendungen, Datenbanken, Identity-Provider, Netzwerk-Infrastruktur, Datensicherungen, Cloud-Dienste und kritische Drittparteien (gemaess Lieferanten-Register). Die Schnittstelle zum ISMS ist ueber A.5.30 (ICT readiness for business continuity) hergestellt.

                    ## 7. Ausschluesse mit Begruendung (Cl. 4.3 c)
                    ISO 22301 Klausel 4.3 c verlangt, dass Ausschluesse die Faehigkeit der Organisation, ihre Kontinuitaetsziele zu erreichen, nicht beeintraechtigen. Folgende Kategorien koennen begruendet ausgeschlossen werden:

                    - Prozesse mit Kritikalitaet "niedrig" UND ohne externe Vertragspflichten;
                    - Standorte ohne kritische Geschaeftstaetigkeit (z. B. reine Repraesentanzen);
                    - Tochtergesellschaften mit eigenstaendigem, anerkannten BCM-Programm.

                    Jeder Ausschluss wird in Anlage 2 (Ausschluss-Register) mit Begruendung, Risikobewertung und Genehmigung der obersten Leitung dokumentiert. Ausschluesse werden im Rahmen der jaehrlichen Geltungsbereichs-Pruefung bewertet.

                    ## 8. Schnittstellen zu anderen Managementsystemen
                    Das BCMS arbeitet integriert mit folgenden Managementsystemen der {{ tenant.legal_name }}:

                    - **ISMS gemaess ISO/IEC 27001:2022** — gemeinsames Asset-Register, gemeinsame Vorfallklassifikation (A.5.24-A.5.28), Schnittstelle ueber A.5.29 + A.5.30, optional gemeinsames internes Auditprogramm und Managementbewertung.
                    - **Datenschutz-Managementsystem (DSMS)** gemaess DSGVO und ISO/IEC 27701 — Schnittstelle ueber Art. 32 DSGVO (Verfuegbarkeit personenbezogener Daten, Wiederherstellbarkeit) und Art. 33 (Meldepflichten bei BC-Aktivierung mit Datenschutzbezug).
                    - **Qualitaetsmanagement (QMS)** gemaess ISO 9001 — Schnittstelle ueber Prozesseigner und Lieferantenmanagement.
                    - **IT-Service-Management (ITSM)** gemaess ISO/IEC 20000 — Schnittstelle ueber Incident-Management, Change-Management und Capacity-Management.

                    Die integrierte Auditierung mehrerer Managementsysteme ist explizit vorgesehen (BSI 200-4 Kap. 9.1.4 empfiehlt Audit-Konsolidierung).

                    ## 8a. Anwendbare regulatorische Geltungsbereiche
                    Der Anwendungsbereich des BCMS deckt die folgenden regulatorischen Erwartungen verbindlich ab, soweit fuer die {{ tenant.legal_name }} einschlaegig:

                    - **EU-DORA Art. 11 + Art. 12** (Finanzunternehmen) — Response and Recovery, ICT Business Continuity Policy mit Recovery-Anforderungen fuer kritische oder wichtige Funktionen (CIF);
                    - **EU-DORA Art. 28** — Drittparteien-Risiko-Management mit Exit-Strategie-Pflicht fuer kritische ICT-Drittparteien;
                    - **NIS2-Richtlinie (EU) 2022/2555** — Risikomanagement-Massnahmen einschliesslich Backup-Konzept und Krisenmanagement;
                    - **BSI-KritisV** und **IT-Sicherheitsgesetz 2.0** — fuer KRITIS-Betreiber Mindeststandards an Geschaeftskontinuitaet;
                    - **ISO/IEC 27001:2022 A.5.29** und **A.5.30** — Schnittstelle ISMS / BCMS;
                    - **DSGVO Art. 32 Abs. 1 lit. b und c** — Wiederherstellbarkeit personenbezogener Daten;
                    - **MaRisk AT 7.3** und Aufsichtsanzeigen-Pflichten gemaess EU-DORA;
                    - **TKG / TR 03182** und sektorale Mindeststandards (z. B. Energiewirtschaft, Gesundheitswesen, Verkehr).

                    Der Notfallbeauftragte {{ roles.bcm_officer.fullName }} pflegt eine konsolidierte Regulator-Matrix, die je Anforderung den abdeckenden BCMS-Dokumenten-Knoten ausweist.

                    ## 9. Pflege, Pruefintervalle und Aenderungs-Trigger
                    Dieses Geltungsbereichsdokument wird mindestens jaehrlich (Pruefintervall {{ bcm.review_interval_months }} Monate) sowie bei jedem wesentlichen organisatorischen Ereignis aktualisiert. Aenderungs-Trigger sind insbesondere:

                    - Inbetriebnahme oder Schliessung eines BCMS-relevanten Standorts;
                    - Wesentliche Reorganisationen von Geschaeftsbereichen oder Tochtergesellschaften (M&A, Carve-Out, Umfirmierung);
                    - Einfuehrung oder Einstellung kritischer Produkte / Dienstleistungen mit externer Kontinuitaetszusage;
                    - Wesentliche Aenderung der ICT-Architektur (Cloud-Migration, Konsolidierung von Rechenzentren, neue Outsourcing-Beziehung);
                    - Aenderungen an anwendbaren regulatorischen Vorgaben (z. B. neue DORA-RTS-Versionen, NIS2-Umsetzungsakte, sektorale Aufsichtsweisungen);
                    - Erkenntnisse aus internen Audits oder Managementbewertung mit Geltungsbereichs-Bezug.

                    Die Pflege verantwortet der Notfallbeauftragte {{ roles.bcm_officer.fullName }}; die Genehmigung von Aktualisierungen erfolgt durch {{ approval.chain }}. Aenderungen werden im Audit-Trail revisionssicher dokumentiert.

                    ## 9a. Geltungsbereichs-Validierung
                    Die Validitaet des Geltungsbereichs wird jaehrlich anhand folgender Kriterien geprueft:

                    - **Vollstaendigkeit** — sind alle Geschaeftsprozesse mit Kritikalitaet ≥ mittel im Geltungsbereich beruecksichtigt? Abgleich mit dem Business-Process-Register.
                    - **Konsistenz** — stimmen die im Geltungsbereich gefuehrten Standorte mit dem Asset-Standort-Register ueberein? Stimmen die Process Owner mit den im HR-System hinterlegten Verantwortlichen ueberein?
                    - **Aktualitaet** — sind alle Aenderungs-Trigger der letzten 12 Monate dokumentiert und der Geltungsbereich entsprechend aktualisiert?
                    - **Begruendetheit der Ausschluesse** — sind alle Ausschluesse aktuell begruendet und durch die oberste Leitung genehmigt?
                    - **Audit-Tauglichkeit** — kann der Geltungsbereich gegenueber externen Auditoren in einem maximal 30-minuetigen Briefing nachvollziehbar erklaert werden? (Praxis-Test gemaess BSI 200-4 Audit-Vorbereitung).

                    Validierungs-Ergebnisse fliessen in den jaehrlichen BCMS-Statusbericht an die Geschaeftsfuehrung ein.

                    ## 10. Konzern- und Holding-Aspekte
                    Sofern die Holding-Funktion fuer die {{ tenant.legal_name }} aktiviert ist, gilt zusaetzlich:

                    - Der Konzern-Geltungsbereich ist im Konzern-BCMS-Scope-Dokument verbindlich festgelegt; das vorliegende Dokument konkretisiert den Geltungsbereich der Tochter und darf den Konzern-Geltungsbereich nicht unterschreiten;
                    - Lokale Standorte und Prozesse, die ueber die Konzern-Mindestanforderung hinausgehen (z. B. lokale regulatorische Pflichten), sind explizit ergaenzt;
                    - Schnittstellen zur Konzern-Krisenstabskoordination sind im Krisenmanagement-Plan dokumentiert;
                    - Berichtspflichten gegenueber der Konzern-BCM-Koordination sind in Anlage 3 dokumentiert.

                    ---
                    *Dieses Geltungsbereichsdokument ist Bestandteil des BCMS-Dokumentensatzes und wird jaehrlich sowie bei wesentlichen organisatorischen Aenderungen aktualisiert.*
