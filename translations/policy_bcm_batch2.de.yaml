        recovery_plans:
            v1:
                title: 'Wiederanlauf- und Wiederherstellungsplan-Standard (ISO 22301 Kl. 8.4.5; BSI 200-4 Kap. 6.2)'
                body: |-
                    # Wiederanlauf- und Wiederherstellungsplan-Standard der {{ tenant.legal_name }}

                    *Dokumentenklasse: Verfahrensanweisung (definiert die Plan-Erstellungsregeln; einzelne Wiederanlaufplaene sind Aufzeichnungen je Asset) | Regulatorische Grundlage: ISO 22301:2019 Klausel 8.4.5 ("Recovery"), BSI 200-4:2023 Kapitel 6.2 ("Wiederanlauf- und Wiederherstellungsplaene"), Querverweise: ISO/IEC 27001:2022 A.5.30 (IKT-Bereitschaft fuer Geschaeftskontinuitaet) und A.8.13 (Backup), EU-DORA Art. 12 (Backup-, Wiederherstellungs- und Wiederanlaufrichtlinien) | Geltungsbeginn: {{ generation_date }} | Sprache: Deutsch (Sie-Form, juristisch) | Pruefintervall: jaehrlich gemaess ISO 22301 Klausel 9.3*

                    ## 1. Zweck und Verbindlichkeit
                    Dieser Standard definiert die verbindliche Struktur, die Mindestinhalte sowie die Validierungsregeln fuer alle Wiederanlauf- und Wiederherstellungsplaene der {{ tenant.legal_name }} gemaess ISO 22301:2019 Klausel 8.4.5. Er ist anwendbar auf alle als kritisch oder hoch eingestuften Assets im Sinne der separaten Asset-Klassifikationsleitlinie, insbesondere auf alle als "Kronjuwelen" identifizierten Assets der ISMS-Schutzbedarfsanalyse.

                    Fuer Tenants mit BSI-200-4-Adoption ist die in Kapitel 6 vorgenommene Differenzierung zwischen Geschaeftsfortfuehrungsplan, Wiederanlaufplan und Wiederherstellungsplan verbindlich. Fuer Tenants ausschliesslich nach ISO 22301 wird der zusammenfassende Recovery-Plan-Begriff verwendet.

                    ## 2. Begrifflichkeiten gemaess BSI 200-4 Kap. 6
                    Die Differenzierung gemaess BSI 200-4 ist verbindlich fuer den Wiederanlaufprozess deutscher Tenants:

                    - **Geschaeftsfortfuehrungsplan** – beschreibt, wie der Geschaeftsbetrieb durch Workarounds und Notbetrieb aufrechterhalten wird, waehrend die zugrunde liegenden Ressourcen ausgefallen sind.
                    - **Wiederanlaufplan** – beschreibt, wie ausgefallene Ressourcen in einen funktionsfaehigen, ggf. degradierten Zustand zurueckversetzt werden.
                    - **Wiederherstellungsplan** – beschreibt die langfristige Rueckkehr zum vollstaendigen Vor-Vorfall-Zustand inklusive Datenkonsistenz, kapazitiver Skalierung und vollstaendiger Funktionsabdeckung.

                    Die englischsprachige ISO 22301 fasst die ersten beiden Begriffe als "Business Continuity Plan" zusammen und differenziert davon den "Recovery Plan". Fuer dual-zertifizierte Tenants gilt: bei BSI-Adoption werden alle drei Plantypen verbindlich, bei reiner ISO-22301-Zertifizierung kann der Geschaeftsfortfuehrungsplan im BC-Plan-Standard aufgehen.

                    ## 3. Geltungsbereich und Pflicht-Erfassung
                    Pflicht zur Erstellung eines Wiederanlauf- und Wiederherstellungsplans besteht fuer:

                    - alle Assets mit Schutzbedarf "hoch" oder "sehr hoch" in mindestens einer der Schutzziele (Vertraulichkeit, Integritaet, Verfuegbarkeit) gemaess BSI 200-2 Kap. 8.2.4;
                    - alle Assets, die einen kritischen oder wichtigen Geschaeftsprozess unmittelbar unterstuetzen (RTO ≤ 24 Stunden);
                    - alle IKT-Assets, die im Informationsregister gemaess EU-DORA Art. 28 als unterstuetzend fuer eine kritische oder wichtige Funktion ("CIF") eingetragen sind;
                    - alle Assets, die im KRITIS-Anlagenregister einer KRITIS-Anlage zugeordnet sind.

                    Validierungsregel: Jeder Asset-Datensatz im ISMS, der die obigen Kriterien erfuellt, MUSS einen verknuepften Wiederanlaufplan-Datensatz mit Status "freigegeben" haben, andernfalls wird ein Audit-Finding erzeugt.

                    ## 4. Plan-Inhalt fuer IT-Wiederanlaufplaene
                    Jeder IT-Wiederanlaufplan enthaelt mindestens:

                    - **Plan-Identifikation:** Plan-ID, Asset-Bezug, Owner, Version, Klassifikation (Standard: Intern-Vertraulich), Freigabedatum.
                    - **Asset-Beschreibung:** technische Komponenten, Abhaengigkeiten (upstream und downstream), kritische Schnittstellen, geographischer Standort.
                    - **RTO-Ziel** (Recovery Time Objective): vertraglich oder regulatorisch geforderter Zielwert; Quelle BIA-Methodik {{ bcm.review_interval_months }}.
                    - **RPO-Ziel** (Recovery Point Objective): maximal zulaessiger Datenverlust; Quelle BIA-Methodik.
                    - **MTPD-Bezug** (Maximum Tolerable Period of Disruption): aus BIA uebernommen.
                    - **Wiederanlauf-Sequenz:** schrittweise Wiederanlauf-Reihenfolge mit definierten Vorbedingungen je Schritt; Validierungs-Checkpoints; Eskalationspfade.
                    - **Backup-Konfiguration:** Verweis auf BackupService-Konfiguration, Aufbewahrungsfristen, Speicherort, Encryption-Standard, Test-Restore-Frequenz.
                    - **Fallback-Strategie:** Hot-Standby, Warm-Standby, Cold-Standby oder manueller Workaround; Aktivierungsbefugnis.
                    - **Test-Nachweis:** letzter erfolgreicher Test, Naechster geplanter Test, Resultate, identifizierte Maengel und CAPA-Bezug.
                    - **Verantwortlichkeiten:** Plan-Owner, Aktivierungs-Befugte, technische Ausfuehrende, Quality-Gate.
                    - **Querverweise:** verknuepfte BC-Plaene, verknuepfter Geschaeftsprozess, verknuepfter Krisenstabs-Eintrag.

                    ## 5. Plan-Inhalt fuer Nicht-IT-Wiederanlaufplaene
                    Nicht-IT-Wiederanlaufplaene gelten fuer Standorte, Personal, physische Akten oder spezialisierte Anlagen. Mindestinhalte:

                    - **Standort-Wiederanlauf:** Ausweich-Arbeitsflaechen, Verlagerung der Belegschaft, Telearbeits-Aktivierung, Schluesselgewalt, Erste-Hilfe-Versorgung.
                    - **Personal-Wiederanlauf:** Stellvertreter-Aktivierung, Cross-Training-Plaene, Schluessel-Personen-Risikoreduktion gemaess BSI 200-4 Kap. 5.3.
                    - **Akten-Wiederanlauf:** physische Schluessel-Akten, Tresor-Zugang, Wiederbeschaffung historischer Dokumente, Aufbewahrungs-Konformitaet.
                    - **Anlagen-Wiederanlauf:** Spezial-Equipment, Reserveteile, externe Service-Provider, regulatorische Wiederinbetriebnahme-Anforderungen.

                    ## 6. Schnittstelle zu Backup-Verfahren
                    Wiederherstellungsplaene referenzieren verbindlich die Backup-Konfiguration des Backup-Service der {{ tenant.legal_name }}. Mindestanforderungen gemaess EU-DORA Art. 12 in Verbindung mit ISO/IEC 27001:2022 A.8.13:

                    - 3-2-1-Regel: drei Kopien, zwei verschiedene Medien, eine Off-Site;
                    - regelmaessiger Test-Restore (mindestens jaehrlich, fuer kritische Assets quartalsweise);
                    - getrennte Aufbewahrungs- und Wiederherstellungs-Kompetenzen (Vier-Augen-Prinzip);
                    - Verschluesselung im Ruhezustand und im Transport;
                    - Schutz gegen Ransomware durch unveraenderliche Speicherformen ("immutable backup") fuer kritische Assets.

                    ## 7. Test-Nachweispflicht
                    Jeder Wiederanlauf- und Wiederherstellungsplan ist mindestens jaehrlich nachweislich zu testen gemaess ISO 22301 Klausel 8.6. Fuer kritische IKT-Assets (CIF gemaess DORA, KRITIS-Anlagen) ist die Testfrequenz {{ bcm.exercise_frequency }} mit dokumentierten Erfolgskriterien. Fehlgeschlagene Tests erzeugen automatisch ein Audit-Finding und einen CAPA-Eintrag.

                    ## 8. Pruef- und Aenderungszyklus
                    Dieser Standard wird mindestens jaehrlich (Kadenz {{ bcm.review_interval_months }} Monate) sowie ad hoc nach wesentlichen Architekturaenderungen, neuen kritischen Assets oder fehlgeschlagenen Tests ueberprueft. Genehmigung gemaess Genehmigungskette {{ approval.chain }}.

                    ## 9. Konsequenzen bei Nicht-Konformitaet
                    Fehlende oder veraltete Wiederanlauf- und Wiederherstellungsplaene fuer kritische Assets stellen ein Audit-Major-Finding gemaess ISO 22301 Klausel 8.4.5 dar. Bei DORA-Bezug ist eine Aufsichtsmeldung gemaess Art. 17 Absatz 1 zu pruefen.

                    ## 10. Kronjuwelen-Liste
                    Eine als "Kronjuwelen" identifizierte Asset-Liste wird im Anhang dieses Standards gefuehrt. Sie umfasst die fuenf bis zehn wichtigsten Assets der {{ tenant.legal_name }}, deren Ausfall einen existenzbedrohenden Schaden verursachen wuerde. Die Liste wird quartalsweise durch {{ roles.bcm_officer.fullName }} mit dem Top-Management abgestimmt.

                    ---
                    *Dieser Wiederanlauf- und Wiederherstellungsplan-Standard wurde durch das Top-Management der {{ tenant.legal_name }} gemaess Genehmigungskette {{ approval.chain }} verabschiedet und ist ab {{ generation_date }} verbindlich.*
                section:
