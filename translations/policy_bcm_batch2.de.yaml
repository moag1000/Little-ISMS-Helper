policy:
    bcm:
        crisis_management_plan:
            v1:
                title: 'Krisenmanagement-Plan / Krisenstabsordnung (ISO 22301 Kl. 8.4.4; BSI 200-4 Kap. 5.4)'
                body: |-
                    # Krisenmanagement-Plan der {{ tenant.legal_name }}

                    *Dokumentenklasse: Plan (operativ, jedoch an der Spitze der Vorfall-Pyramide) | Regulatorische Grundlage: ISO 22301:2019 Klausel 8.4.4 in Verbindung mit Klausel 8.4.2 (Warnung und Kommunikation), BSI 200-4:2023 Kapitel 5.4 ("Krisenstabsordnung"), Querverweise: ISO/IEC 27001:2022 A.5.29, EU-DORA Art. 11 Absatz 6 (Krisenkommunikation), KRITIS-Dachgesetz §§ 11–13 fuer Betreiber kritischer Anlagen | Geltungsbeginn: {{ generation_date }} | Sprache: Deutsch (Sie-Form, juristisch) | Pruefintervall: jaehrlich gemaess ISO 22301 Kl. 9.3 sowie nach jeder Aktivierung*

                    ## 1. Zweck und Verbindlichkeit
                    Diese Krisenstabsordnung etabliert die verbindliche Aufbau- und Ablauforganisation fuer den Krisenstab der {{ tenant.legal_name }} gemaess ISO 22301:2019 Klausel 8.4.4 ("Business continuity plans and procedures") in Verbindung mit Klausel 8.4.2. Sie konkretisiert das Top-Level-Bekenntnis aus der Notfallleitlinie (Klausel 5.2) auf die operative Ebene des Krisenmanagements und erfuellt zugleich die Anforderungen aus BSI 200-4 Kapitel 5.4. Fuer KRITIS-Betreiber im Sinne des KRITIS-Dachgesetzes (KRITIS-DachG) bildet diese Ordnung die Grundlage fuer die in §§ 11–13 KRITIS-DachG geforderte resilienzorientierte Stabsarbeit.

                    Die Krisenstabsordnung ist verbindlich fuer alle Mitglieder des Krisenstabs, alle Fuehrungskraefte mit Eskalationspflicht sowie alle Mitarbeitenden, die im Rahmen einer Krise aktiviert werden. Sie tritt in Kraft mit Genehmigung durch das Top-Management gemaess ISO 22301 Klausel 5.1 ("Leadership and commitment") und bleibt verbindlich bis zur dokumentierten Ausserkraftsetzung durch eine Folgeversion.

                    ## 2. Geltungsbereich
                    Diese Ordnung gilt fuer saemtliche Krisenlagen, die ueber den Rahmen einer Stoerung oder eines Notfalls hinausgehen und eine strategische Steuerung durch das Top-Management oder eine vom Top-Management explizit beauftragte Stabsstruktur erfordern. Sie gilt fuer alle Standorte, Geschaeftsprozesse und juristischen Einheiten im Geltungsbereich des BCMS (siehe BCMS-Geltungsbereich-Dokument).

                    Abgrenzung der Eskalationsstufen gemaess BSI 200-4 Kapitel 5.5:

                    - **Stoerung** – ueblicher Betriebsablauf wird kurzfristig beeintraechtigt; Behandlung im Linienbetrieb; keine Aktivierung des Krisenstabs.
                    - **Notfall** – Geschaeftsprozess ist ueber die Maximal Tolerierbare Ausfallzeit (MTPD) bedroht; Aktivierung des Notfallbeauftragten und ggf. einzelner BC-Plaene; Krisenstab wird in Standby versetzt.
                    - **Krise** – existenzbedrohende, reputations- oder ueberlebenskritische Lage; Krisenstab wird voll aktiviert; strategische Entscheidungen mit weitreichender Wirkung sind erforderlich.
                    - **Katastrophe** – fuer KRITIS-Betreiber gemaess KRITIS-DachG § 2 Absatz 6: Lage, in der das Bundesamt fuer Bevoelkerungsschutz und Katastrophenhilfe (BBK) bzw. zustaendige Landesbehoerden involviert werden.

                    ## 3. Aktivierungskriterien und Schwellenwerte
                    Der Krisenstab wird gemaess ISO 22301 Klausel 8.4.3.2 aktiviert, sobald mindestens eines der folgenden Kriterien erfuellt ist. Die Verantwortung fuer die Aktivierungsentscheidung liegt bei {{ roles.crisis_team_lead.fullName }} (Vorsitz Krisenstab) oder dessen oder deren Stellvertretung.

                    - **Kriterium A1 (Geschaeftsfortfuehrung):** Ein oder mehrere kritische Geschaeftsprozesse sind ueber den Schwellenwert MTPD hinaus oder voraussichtlich ueber MTPD hinaus ausgefallen oder werden ausfallen.
                    - **Kriterium A2 (Reputation):** Es liegt ein Ereignis vor, das in den naechsten 24 Stunden voraussichtlich zu signifikanter Medienberichterstattung mit nachteiligen Auswirkungen fuer die {{ tenant.legal_name }} fuehrt.
                    - **Kriterium A3 (Regulatorisch):** Die Lage erfordert eine Meldung an Aufsichtsbehoerden gemaess EU-DORA Art. 17–19 (IKT-Vorfall mit major-Klassifikation), gemaess NIS2-Umsetzung (BSIG § 32), gemaess KRITIS-DachG § 14 (Stoerungsmeldung) oder gemaess DSGVO Art. 33 (Verletzung des Schutzes personenbezogener Daten).
                    - **Kriterium A4 (Personenschutz):** Es liegt eine Gefaehrdung von Leib oder Leben von Beschaeftigten, Kundinnen oder Kunden oder Dritten vor.
                    - **Kriterium A5 (Cyber-Krise):** Es liegt ein Cyber-Vorfall vor, der eine wesentliche Beeintraechtigung der Verfuegbarkeit, Vertraulichkeit oder Integritaet im Sinne von ISO/IEC 27001:2022 A.5.24–A.5.28 darstellt und mit einer Krisenlage gemaess A1 oder A3 einhergeht.
                    - **Kriterium A6 (Lieferketten-Krise):** Ausfall eines kritischen Drittdienstleisters oder Lieferanten gemaess EU-DORA Art. 28 oder gemaess Lieferkettensorgfaltspflichtengesetz (LkSG) §§ 4–5.

                    ## 4. Krisenstab-Zusammensetzung
                    Der Krisenstab der {{ tenant.legal_name }} besteht aus den folgenden namentlich benannten Funktionen mit verbindlich benannten Stellvertretungen gemaess BSI 200-4 Kapitel 5.4 (Stellvertreterprinzip):

                    - **Vorsitz Krisenstab (Krisenstabsleitung)** – {{ roles.crisis_team_lead.fullName }}; entscheidungsbefugt im Sinne von ISO 22301 Klausel 5.1; bindende Letztverantwortung fuer alle waehrend der Krise getroffenen Entscheidungen.
                    - **Stellvertretung Vorsitz Krisenstab** – verbindlich gemaess BSI 200-4 Kap. 5.4; gleichwertige Befugnisse waehrend der Vertretung.
                    - **Notfallbeauftragte/r (BCM Officer)** – {{ roles.bcm_officer.fullName }}; operative Steuerung der BC-Plaene und Schnittstelle zu BIA-Resultaten.
                    - **Informationssicherheitsbeauftragte/r (ISB)** – {{ roles.isb.fullName }}; Schnittstelle zu IKT-Vorfaellen, Cyber-Krisen und ISMS-Prozessen.
                    - **Kommunikationsleitung (Comms-Lead)** – verantwortlich fuer interne und externe Krisenkommunikation, Pressekontakte und behoerdliche Kommunikation.
                    - **IT-Leitung (IT-Lead)** – operative Steuerung der IKT-Wiederherstellung; Schnittstelle zu Wiederanlauf- und Wiederherstellungsplaenen.
                    - **Personal-Leitung (HR-Lead)** – Mitarbeitendenfuersorge, Krisenkommunikation an Belegschaft, Schnittstelle Sozialpartner.
                    - **Rechtsberatung (Legal-Lead)** – juristische Bewertung, Aufsichtsmeldungen, Vertragsfragen, Datenschutz-Eskalation.
                    - **Protokollfuehrung (Records-Keeper)** – revisionssichere Dokumentation aller Entscheidungen, Eskalationen und Aktivitaeten.
                    - **Optionale Mitglieder bedarfsweise:** Datenschutzbeauftragte/r (bei DSGVO-relevanten Lagen), Facility-Management (bei Lagen mit Standortbezug), Konzern-Liaison (bei Konzernverbund), Behoerden-Liaison (bei KRITIS-Lagen).

                    Quorum gemaess ISO 22301 Klausel 8.4.4: Der Krisenstab ist beschlussfaehig mit Vorsitz oder Stellvertretung sowie mindestens drei weiteren Mitgliedern. Im Falle laufender Cyber-Krisen ist der oder die ISB verbindlich Quorumsteilnehmer.

                    ## 5. Eskalations-Matrix
                    Die folgende Eskalations-Matrix definiert die maximalen Reaktionszeiten von Erstkenntnis bis Krisenstabs-Aktivierung:

                    - **Stufe 0 (Erstkenntnis bis Bewertung):** 30 Minuten – Erstmelder informiert {{ roles.bcm_officer.fullName }} oder Vorsitz Krisenstab.
                    - **Stufe 1 (Bewertung bis Aktivierungsentscheidung):** 60 Minuten – Bewertung der Aktivierungskriterien, Entscheidung Aktivierung Ja oder Nein.
                    - **Stufe 2 (Aktivierungsentscheidung bis erste Sitzung):** 90 Minuten – Einberufung des Krisenstabs in den Krisenstabsraum (primaer oder Ausweich).
                    - **Stufe 3 (erste Sitzung bis externe Erstkommunikation):** 120 Minuten – ggf. Erstmeldung an Aufsicht (DORA: 4-Stunden-Frist fuer Initial-Notification gemaess Art. 19 in Verbindung mit RTS).

                    Verkuerzte Fristen bei behoerdlichen Sofortmeldungen: DSGVO Art. 33 (72 Stunden ab Kenntnis), DORA Art. 19 (4 Stunden initial fuer major incident), KRITIS-DachG § 14 (unverzueglich), BSIG § 32 (unverzueglich, spaetestens 24 Stunden).

                    ## 6. Kommunikationskette
                    Die Krisenkommunikation folgt der Devise "ein Mund nach aussen" gemaess BSI 200-4 Kap. 5.4. Externe Kommunikation erfolgt ausschliesslich ueber die Kommunikationsleitung oder eine durch den Vorsitz Krisenstab namentlich beauftragte Sprecherrolle. Interne Kommunikation laeuft ueber definierte Eskalations- und Informationsstraenge:

                    1. **Strang Top-Management** – Vorsitz Krisenstab informiert Geschaeftsfuehrung sowie ggf. Aufsichtsrat, Beirat, Gesellschafterinnen oder Gesellschafter.
                    2. **Strang Belegschaft** – HR-Lead in Abstimmung mit Comms-Lead; Out-of-Band-Kanaele bei IT-Ausfall ({{ bcm.exercise_frequency }}-Test der Telefonkette pflicht).
                    3. **Strang Kunden und Vertragspartner** – Comms-Lead, Vertriebsleitung; SLA-relevante Information.
                    4. **Strang Aufsichtsbehoerden** – Legal-Lead in Abstimmung mit Vorsitz; Erstmeldung gemaess DORA, NIS2, KRITIS-DachG, DSGVO.
                    5. **Strang Medien und Oeffentlichkeit** – ausschliesslich Comms-Lead oder Top-Management; nie individuell durch Mitarbeitende.
                    6. **Strang Behoerden im Katastrophenfall** – bei Katastrophenlage gemaess KRITIS-DachG § 2 Absatz 6: BBK, zustaendige Landesbehoerde, Polizei, Feuerwehr.

                    ## 7. Krisenstabs-Raum (Lagezentrum)
                    Der primaere Krisenstabsraum sowie ein Ausweich-Krisenstabsraum sind in den BCMS-Stammdaten benannt. Ausstattungs-Mindestanforderungen gemaess BSI 200-4 Kap. 5.4: gesicherte Telekommunikation, Out-of-Band-Verbindung (Mobilfunk und Festnetz), redundante Stromversorgung, Lagedarstellungs-Tools, Whiteboard, Drucker, ausgedruckte Notfall-Kontaktlisten, ausgedruckte BC-Plaene, Notverpflegung fuer 24 Stunden Stabsarbeit.

                    Bei Cyber-Krisen mit Verdacht auf Kompromittierung der eigenen IKT: Stabsarbeit erfolgt auf isolierter Infrastruktur (z. B. dedizierte Mobiltelefone, externer Cloud-Dienst mit Out-of-Band-Authentifizierung).

                    ## 8. Entscheidungsprotokollierung
                    Jede Entscheidung des Krisenstabs wird durch die Protokollfuehrung revisionssicher dokumentiert (Zeitstempel, Beschlussinhalt, Abstimmungsverhalten, Begruendung, betroffene Geschaeftsprozesse, Massnahmen-Verantwortliche). Die Dokumentation ist Beweismittel im Sinne von ISO 22301 Klausel 7.5 ("Documented information") und im Sinne von DORA Art. 17 Absatz 1 (Vorfall-Dokumentationspflicht).

                    Aufbewahrungsfrist gemaess Klausel 7.5 sowie KRITIS-DachG: mindestens fuenf Jahre, bei Cyber-Krisen mit DORA-Bezug mindestens sieben Jahre.

                    ## 9. Stand-Down-Kriterien
                    Der Krisenstab wird durch den Vorsitz formal aufgeloest, sobald folgende Voraussetzungen erfuellt sind: (a) Aktivierungskriterien nicht mehr erfuellt; (b) Geschaeftsprozesse stabil im Wiederanlauf oder Normalbetrieb; (c) keine ungeloesten regulatorischen Eskalationen; (d) Lessons-Learned-Termin innerhalb von 14 Tagen geplant.

                    Die formale Aufloesung wird protokolliert. Die Verantwortung fuer Restmassnahmen geht an den oder die Notfallbeauftragte/n {{ roles.bcm_officer.fullName }} ueber.

                    ## 10. Schnittstelle BC-Plaene und Wiederanlaufplaene
                    Der Krisenstab aktiviert BC-Plaene gemaess der separaten BC-Plan-Vorlage (Dokument BCMS Standard BCP). Die Aktivierungsbefugnis liegt beim Vorsitz Krisenstab, in Vertretung beim Notfallbeauftragten gemaess BSI 200-4 Kap. 6.

                    ## 11. Pruef- und Aenderungszyklus
                    Diese Krisenstabsordnung wird mindestens jaehrlich (Kadenz {{ bcm.review_interval_months }} Monate) sowie nach jeder Aktivierung im Rahmen eines Lessons-Learned-Reviews ueberprueft. Aenderungen erfordern die Genehmigung gemaess Genehmigungskette {{ approval.chain }}.

                    ## 12. Pruefung im Uebungsprogramm
                    Die Stabsfunktion wird mit der durch das Uebungsprogramm festgelegten Frequenz {{ bcm.exercise_frequency }} geprueft. Mindestens ein Tabletop-Tabletop-Drill und ein realnaher Funktionstest pro Jahr sind verbindlich gemaess ISO 22301 Klausel 8.6 sowie BSI 200-4 Kap. 8.

                    ---
                    *Diese Krisenstabsordnung wurde durch das Top-Management der {{ tenant.legal_name }} im Rahmen der Genehmigungskette {{ approval.chain }} verabschiedet und ist ab {{ generation_date }} verbindlich.*
