group_report:
    title: 'Group reports'
    root_marker: 'Group root'
    tree:
        title: 'Corporate structure'
        subtitle: 'Read-only overview of every tenant in the group — ROLE_GROUP_CISO only.'
        holding_marker: 'Holding tenant'
        you_are_here: 'Your tenant'
    nis2:
        title: 'NIS2 registration matrix'
        subtitle: 'Per legal entity in %root% — classification and BSI registration status.'
        intro: 'NIS2 (German BSIG §28) regulates <strong>individual legal entities</strong>, not corporate groups. This matrix shows per subsidiary: classification (essential / important / not regulated / unknown), industry sector, NACE code, registered reporting contact, and registration date. Maintain the fields via tenant edit.'
        stat:
            total: 'Tenants'
            registered: 'Registered with BSI'
        class:
            essential: 'Essential'
            important: 'Important'
            not_regulated: 'Not regulated'
            unknown: 'Unknown'
        matrix:
            title: 'Matrix per legal entity'
        col:
            tenant: 'Tenant'
            legal: 'Legal entity'
            classification: 'NIS2 classification'
            sector: 'Sector'
            nace: 'NACE'
            contact: 'BSI reporting contact'
            registered: 'Registered'
        registration:
            missing: 'Registration missing'
    risks:
        title: 'Group top risks'
        subtitle: 'Top 10 risks across all subsidiaries of %root% — %count% risks total.'
        top10: 'Top 10 risks (by residual; falls back to inherent)'
        distribution: 'Distribution per tenant'
        total: 'Group total'
        none: 'No risks in scope.'
        col:
            title: 'Risk'
            tenant: 'Tenant'
            inherent: 'Inherent'
            residual: 'Residual'
            count: 'Count'
    kpi:
        title: 'Framework maturity matrix'
        subtitle: 'NIS2 / DORA / ISO 27001 / ... per tenant in %root% — cell = fulfilled / applicable percent.'
        intro: 'Rows = tenants in the subtree. Columns = available compliance frameworks. Cell value matches the per-tenant dashboard (fulfilled / applicable). Empty cell means no applicable requirements for that tenant.'
        holding: 'Holding'
        requirements: 'requirements'
        n_a_help: 'No applicable requirements in this tenant.'
        col:
            tenant: 'Tenant'
    soa:
        title: 'Group SoA matrix'
        subtitle: 'Annex A controls × tenants — %controls% controls over %tenants% tenants.'
        stat:
            cells: 'Total cells'
            applicable: 'Applicable'
            implemented: 'Implemented'
        col:
            control: 'Control ID'
        cell:
            not_applicable: 'Not applicable'
        legend:
            title: 'Legend'
            implemented: 'implemented'
            in_progress: 'in progress'
            planned: 'planned'
            not_started: 'not started'
            not_applicable: 'not applicable'
    incidents:
        title: 'Group incidents'
        subtitle: 'Cross-posted from subsidiaries of %root% — tenants with opt-out stay hidden.'
        intro: 'Default: subsidiary incidents are <strong>visible</strong> to the group crisis team. A subsidiary may set <code>visible_to_holding = false</code> (e.g. an HR case that must not surface to the parent). Those rows do not appear here — the opt-out count is deliberately <strong>not</strong> disclosed so that the confidentiality of the subsidiary is preserved.'
        own: 'own'
        none: 'No incidents in the visible scope.'
        stat:
            total: 'Visible incidents'
        severity:
            critical: 'critical'
            high: 'high'
            medium: 'medium'
            low: 'low'
        col:
            detected_at: 'Detected'
            incident: 'Incident'
            tenant: 'Tenant'
            severity: 'Severity'
            status: 'Status'
    audit_program:
        title: 'Group audit program'
        subtitle: 'One audit plan → N subsidiary audits. Status per subsidiary of %root%.'
        intro: 'Create an audit on the holding tenant (e.g. "ISO 27001 Surveillance Q2 2026"). <strong>Derive</strong> spawns a tenant-scoped audit per subsidiary — identical scope, audit number with subsidiary suffix, status <code>planned</code>. Already-derived subsidiaries are skipped (idempotent). The parent link is preserved so findings can be rolled up group-wide later.'
        empty: 'No audit programs on this holding yet. Create an audit on this tenant and come back.'
        no_subsidiaries: 'The current tenant has no subsidiaries — nothing to derive.'
        col:
            program: 'Program'
            actions: 'Actions'
        cell:
            missing_help: 'Not yet derived'
        action:
            derive: 'Derive'
        confirm_derive: 'This audit program will be derived onto %count% subsidiary tenants. Already-derived subsidiaries are skipped. Continue?'
        legend:
            completed: 'completed'
            in_progress: 'in progress'
            planned: 'planned'
            missing: 'not yet derived'
        flash:
            invalid_csrf: 'Invalid CSRF token.'
            no_subsidiaries: 'The current tenant has no subsidiaries — derivation is not possible.'
            derived: 'Program %program%: %derived% subsidiary audits derived, %skipped% skipped (already present).'
    suppliers:
        title: 'Group supplier register'
        subtitle: 'Deduplicated by LEI or name across all subsidiaries of %root%.'
        intro: 'Identity key: <strong>LEI code</strong> (ISO 17442, globally unique) if present, otherwise normalized name. Suppliers referenced more than once (badge <strong>N×</strong>) are consolidation and renegotiation candidates (DORA Art. 28.3 sub-outsourcing chain, ISO 27001 A.5.19).'
        none: 'No suppliers in group scope.'
        matched_by_name: 'name only'
        no_lei_help: 'No LEI code stored — duplicate detection is weak (normalized name). Maintain LEI on the supplier detail page.'
        stat:
            unique: 'Unique suppliers'
            shared: 'Used by ≥ 2 tenants'
            with_lei: 'With LEI'
            critical: 'Critical'
        col:
            supplier: 'Supplier'
            identity: 'Identity'
            criticality: 'Criticality'
            used_by: 'Used by'
            service: 'Service'
