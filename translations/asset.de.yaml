    acquisition_value: '<strong>Anschaffungswert</strong><br>Was hat das Asset bei
      Kauf/Erstellung gekostet?<br><br><em>Beispiele:</em><br>• Server: 10.000€<br>•
      Laptop: 1.500€<br>• Software-Lizenz: 5.000€/Jahr'
    current_value: '<strong>Aktueller Buchwert</strong><br>Was ist das Asset heute
      noch wert? (nach Abschreibung)<br><br><em>Beispiele:</em><br>• 3 Jahre alter
      Server: ~3.000€<br>• Abgeschriebene Hardware: 1€'
    monetary_value: <strong>💰 Schadenswert (WICHTIG!)</strong><br>Was kostet es, wenn
      dieses Asset ausfällt oder kompromittiert wird?<br><br><em>Denken Sie an:</em><br>•
      Produktionsausfall pro Stunde<br>• Datenverlust-Kosten<br>• Reputationsschaden<br>•
      Vertragsstrafen<br><br><em>Dieser Wert wird für die Risikobewertung verwendet!</em>
    confidentiality: '<strong>🔒 Vertraulichkeit</strong><br><em>Frage: Wer darf diese
      Daten sehen?</em><br><br><strong>1</strong> = Öffentlich (Website, Pressemitteilungen)<br><strong>2</strong>
      = Intern (alle Mitarbeiter)<br><strong>3</strong> = Vertraulich (nur bestimmte
      Abteilungen)<br><strong>4</strong> = Streng vertraulich (nur wenige Personen)<br><strong>5</strong>
      = Geheim (personenbezogene Daten, Geschäftsgeheimnisse)<br><br><em>Tipp: Bei
      personenbezogenen Daten mindestens 4</em>'
    integrity: '<strong>✓ Integrität</strong><br><em>Frage: Wie schlimm wäre es, wenn
      Daten falsch/manipuliert sind?</em><br><br><strong>1</strong> = Egal (z.B. Entwürfe,
      Notizen)<br><strong>2</strong> = Störend (interne Dokumente)<br><strong>3</strong>
      = Problematisch (Berichte, Statistiken)<br><strong>4</strong> = Schwerwiegend
      (Verträge, Rechnungen)<br><strong>5</strong> = Katastrophal (Finanzdaten, medizinische
      Daten)<br><br><em>Tipp: Bei Buchhaltung/Finanzen mindestens 4</em>'
    availability: '<strong>⏱ Verfügbarkeit</strong><br><em>Frage: Wie lange darf das
      Asset maximal ausfallen?</em><br><br><strong>1</strong> = Mehrere Tage OK (Archiv,
      Dokumentation)<br><strong>2</strong> = 1-2 Tage OK (interne Tools)<br><strong>3</strong>
      = Wenige Stunden (E-Mail, Intranet)<br><strong>4</strong> = Max. 4 Stunden (Kerngeschäft)<br><strong>5</strong>
      = Gar nicht (Produktion, Kundenservice)<br><br><em>Tipp: Was passiert, wenn
      es Montagmorgen ausfällt?</em>'
