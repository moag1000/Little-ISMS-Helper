                    q1_help: 'Group-level value as of the latest annual report. Threshold aligned with the EBA/ESRB lex-RTS draft for DORA Art. 16.'
                    q1_yes_implication: 'If "yes": one of three yes-points. Size threshold met — closer to "significant" status.'
