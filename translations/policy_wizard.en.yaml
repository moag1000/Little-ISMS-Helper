            help:
                title: 'What are operational baselines?'
                body: 'Concrete measurable thresholds for your operations: which crypto algorithms are allowed, how fast a patch must land, how much data loss is tolerable. These values flow directly into the generated policies.'
                example: 'Example: Backup RPO = 24 h means at most 24 hours of data loss on restore. Patch SLA critical = 4 h means critical CVEs must be patched within 4 h.'
                preset_hint: 'Tip: If you picked an industry preset in Step 1, sensible defaults are pre-filled — you can adjust any value.'
            tooltip:
                rpo: 'Recovery Point Objective — how much data loss since the last backup is tolerable (in hours).'
                rpo_usual: 'Recovery Point Objective: maximum tolerable data loss since the last backup. Typical: 24h standard / 4h critical systems / 1h Tier-1 DBs.'
                rto: 'Recovery Time Objective — how quickly a business process must be available again after an outage.'
                rto_high_usual: 'Recovery Time Objective high-criticality: ≤ 4h typical (banking) — up to 24h tolerable (mid-market).'
                rto_medium_usual: 'RTO medium: 24–72h typical.'
                rto_low_usual: 'RTO low: 1–2 weeks typical.'
                patch_sla_critical_usual: 'Critical-patch SLA: typical 24h (mid-market) down to 4h (regulated sector).'
