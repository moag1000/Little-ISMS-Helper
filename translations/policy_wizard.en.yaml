    # §0 Decision Matrix v2 — 10 sections total).
    gdpr_section:
        gdpr_lawful_basis_workplace:
            title: 'Lawful basis for workplace data (GDPR Art. 6, 9)'
            description: 'Embedded in the Acceptable Use Policy. Documents the lawful basis for processing employee data in the workplace incl. § 26 BDSG.'
        gdpr_dpo_mandate:
            title: 'DPO mandate and tasks (GDPR Art. 37-39)'
            description: 'Embedded in the Awareness Training Programme. Describes appointment, tasks and independence of the Data Protection Officer.'
        gdpr_special_categories:
            title: 'Special categories of personal data (GDPR Art. 9)'
            description: 'Embedded in the Information Classification Policy. Classification + protection rules for special categories (health, religion, trade-union membership etc.).'
        gdpr_privacy_by_design:
            title: 'Privacy by Design / by Default (GDPR Art. 25)'
            description: 'Embedded in the Secure Development Policy. Privacy-by-Design gates in the SDLC and default settings for new processing activities.'
        gdpr_ai_systems:
            title: 'AI systems and automated decisions (GDPR Art. 22 + EU AI Act)'
            description: 'Embedded in the Secure Development Policy. Special rules for AI-driven profiling and solely automated individual decisions.'
        gdpr_joint_controllers:
            title: 'Joint controllership (GDPR Art. 26)'
            description: 'Embedded in the Supplier Security Policy. Disambiguation against processor relationships (Art. 28) and joint-controller obligations.'
        gdpr_international_transfers:
            title: 'International data transfers (GDPR Art. 44-49 / Schrems II)'
            description: 'Embedded in the Information Transfer Policy. Adequacy decisions, Standard Contractual Clauses, Transfer Impact Assessments.'
        gdpr_retention_minimisation:
            title: 'Storage limitation and data minimisation (GDPR Art. 5(1)(c)+(e))'
            description: 'Embedded in the Asset Management Policy. References the binding Retention Schedule as the single source of truth.'
        gdpr_breach_72h:
            title: 'Personal data breach notification (GDPR Art. 33)'
            description: 'Embedded in the Incident Management Policy. 72-hour notification clock to the supervisory authority, data-subject communication.'
        gdpr_premises_processing:
            title: 'Personal data in physical security zones (GDPR Art. 32)'
            description: 'Embedded in the Physical Security Policy. Protection of personal data in premises and access-control regimes.'

# ────────────────────────────────────────────────────────────────────────
# W7-C — Top-level widget block reserved for the Re-Generation Diff,
# Settings-Drift Badge and History-Toggle UI. W7-E adds its own widget
# keys nested under `policy_wizard.widget.*` (see line ~348) so the two
# code paths do not collide in the trans-lookup.
# ────────────────────────────────────────────────────────────────────────
widget:
    # W7-C — Re-generation diff UX (doc-level + variable-level only).
    # Deliberately NO character-level diff — section hash + variable-key
    # are sufficient for ISB / CISO approval discussion (persona-review 05
    # lines 198-204).
    diff:
        title: 'Re-generation diff'
        subtitle: '%total% changes detected — severity: %severity%'
        severity_minor: 'minor'
        severity_moderate: 'moderate'
        severity_major: 'major'
        previous_version: 'Previous version'
        current_version: 'Current version'
        previous_value: 'Old value'
        current_value: 'New value'
        field_label: 'Field'
        variable_key: 'Variable'
        added: 'added'
        removed: 'removed'
        modified: 'modified'
        no_changes: 'No changes in this section.'
        hash_changed: 'Content hash changed'
        restore_previous_button: 'Restore previous version'
        restore_confirm: 'Archive the current version and reactivate the previous one?'
        restore_success: 'Previous version restored; current version archived.'
        tab:
            metadata: 'Metadata'
            variables: 'Variables'
            sections: 'Sections'

    # W7-C — Settings drift badge for the Document listing. Surfaces when
    # tenant settings driving this policy have changed since the policy
    # was generated. Click leads into a targeted re-run (persona review 05
    # line 184).
    badge:
        settings_drift:
            label: 'Settings drift'
            tooltip: 'The settings driving this policy have changed since it was generated. A re-run is recommended.'

    # W7-C — History toggle on the Document index. Default: show only the
    # latest version per policy; the toggle reveals the historical chain
    # (persona review 05 lines 243-244 — otherwise the list becomes
    # unusable after a couple of years).
    history_toggle:
        label: 'Show versions'
        current_only: 'Current versions only'
        with_history: 'Include history'

