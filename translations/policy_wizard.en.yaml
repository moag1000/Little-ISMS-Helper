        pass_message: 'KRITIS section is documented in the IT Security Policy.'
        fail_message: 'KRITIS section is missing in the IT Security Policy — re-run the Policy-Wizard and set legal_basis to "KRITIS-DachG / BSIG §8a".'
    # W5 Gap-C — Works-Council BR-evidence attachment (Auditor gap, BetrVG § 87 (1) Nr. 6).
    works_council_evidence_attached:
        title: 'Works-Council participation evidence attached (BetrVG § 87 (1) Nr. 6)'
        description: 'Confirms every published policy covering logging, monitoring, telework, acceptable-use, awareness training, malware protection or IT administration carries a signed Works-Council participation record as an attachment (Document.category=works_council_evidence).'
        pass_message: 'All relevant policies carry a Works-Council participation record.'
        fail_message: 'At least one workplace-monitoring or personal-data policy is missing a Works-Council participation record — please upload the BR attachment as a Document with category "works_council_evidence" linked to the policy.'
    # W5-C — BCM Compliance-Checks (ISO 22301:2019)
    bcm_top_level_policy_present:
        title: 'BCM top-level policy approved (ISO 22301 Cl. 5.2)'
        description: 'Confirms a top-management approved (status=approved) BCM top-level policy generated by the Policy-Wizard.'
        pass_message: 'BCM top-level policy is approved by top management.'
        fail_message: 'BCM top-level policy is not approved — start the Policy-Wizard with BCM topic "bcms_top_level" and obtain top-management sign-off.'
    bcms_scope_statement_present:
        title: 'BCMS scope statement published (ISO 22301 Cl. 4.3)'
        description: 'Confirms a published BCMS scope statement per ISO 22301 Cl. 4.3.'
        pass_message: 'BCMS scope statement is published.'
        fail_message: 'BCMS scope statement is missing — start the Policy-Wizard with BCM topic "bcms_scope_statement".'
    bcm_bia_methodology_present:
        title: 'BIA methodology published (ISO 22301 Cl. 8.2.2)'
        description: 'Confirms a published business impact analysis methodology per ISO 22301 Cl. 8.2.2.'
        pass_message: 'BIA methodology is published.'
        fail_message: 'BIA methodology is missing — start the Policy-Wizard with BCM topic "bia_methodology".'
    bcm_exercise_programme_active:
        title: 'BCM exercise programme active (ISO 22301 Cl. 8.6)'
        description: 'Confirms a completed or planned BCExercise within the last or next 12 months per ISO 22301 Cl. 8.6.'
        pass_message: 'BCM exercise programme is active (at least one exercise in the 12-month window).'
        fail_message: 'No BCExercise in the 12-month window — open the BC-Exercise module and plan or document an exercise (major-nonconformity risk).'
    bcm_crisis_management_plan_present:
        title: 'Crisis management plan published (ISO 22301 Cl. 8.4.4)'
        description: 'Confirms a published crisis management plan (Krisenstabsordnung) per ISO 22301 Cl. 8.4.4 + BSI 200-4 §5.4.'
        pass_message: 'Crisis management plan is published.'
        fail_message: 'Crisis management plan is missing — start the Policy-Wizard with BCM topic "crisis_management_plan".'
    bcm_recovery_plans_present:
        title: 'Recovery plans present for crown jewels (ISO 22301 Cl. 8.4.5)'
        description: 'Confirms at least one published recovery plan exists when crown-jewel assets (max(C,I,A) ≥ 4) are present in the tenant scope.'
        pass_message: 'Recovery plans are present for crown-jewel assets.'
        fail_message: 'Crown jewels without a recovery plan — start the Policy-Wizard with BCM topic "recovery_plans".'
    bcm_management_review_bcm:
        title: 'BCMS management review procedure published (ISO 22301 Cl. 9.3)'
        description: 'Confirms a published management review procedure for the BCMS per ISO 22301 Cl. 9.3.'
        pass_message: 'BCMS management review procedure is published.'
        fail_message: 'BCMS management review procedure is missing — start the Policy-Wizard with BCM topic "management_review_bcm".'
    # W6-D — GDPR / Privacy compliance checks (GDPR Art. 5/24/30/33-39 + ISO 27001 A.5.34)
    privacy_policy_present:
        title: 'Privacy / Data-Protection Policy approved (GDPR Art. 5/24)'
        description: 'Confirms a leadership-approved (status=approved) Privacy / Data-Protection Policy generated by the Policy-Wizard, per GDPR Art. 5/24 + ISO 27701 Cl. 5.1/5.2.'
        pass_message: 'Privacy / Data-Protection Policy is leadership-approved.'
        fail_message: 'Privacy / Data-Protection Policy is missing — start the Policy-Wizard with GDPR topic "privacy_policy" and complete the DPO / CISO / Top-Mgmt approval chain.'
    ropa_methodology_present:
        title: 'RoPA methodology published (GDPR Art. 30)'
        description: 'Confirms a published Records-of-Processing methodology per GDPR Art. 30 + ISO 27701 Cl. 7.2.8.'
        pass_message: 'RoPA methodology is published.'
        fail_message: 'RoPA methodology is missing — start the Policy-Wizard with GDPR topic "ropa_methodology".'
    dpia_methodology_present:
        title: 'DPIA methodology published (GDPR Art. 35/36)'
