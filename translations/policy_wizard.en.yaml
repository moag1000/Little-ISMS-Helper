policy_wizard:
    title: Policy Wizard
    subtitle: Generate your policy framework with minimal typing
    badge: ISMS

    landing:
        intro: 'Pick a mode to start the policy wizard. Active wizard runs can be resumed at any time.'
        in_progress_title: 'Active wizard runs'
        in_progress_empty: 'No wizard runs are currently in progress.'
        choose_mode: 'Choose a mode'

    mode:
        full:
            label: 'Full run'
            description: 'Seven steps from welcome to generate. Produces the complete policy set including ISO 27001, BSI and DORA sections.'
        targeted:
            label: 'Targeted re-run'
            description: 'Update individual sections after an audit finding or regulatory change without regenerating the entire policy framework.'
        sandbox:
            label: 'Sandbox preview'
            description: 'Trial run without persistence. No documents are written, no SoA mutation — ideal for exploration.'

    step:
        bestandsaufnahme:
            title: 'Inventory of existing documents'
            subtitle: 'Before we start: what should happen to your existing policies?'
            intro: 'We found existing policies, programmes and plans in your tenant. Please decide per document how the wizard should treat it before we start generating.'
            suggested_topic: 'Suggested topic'
            rationale_label: 'Rationale (optional)'
            rationale_placeholder: 'Short note for the audit log (optional, max 1000 characters).'
            continue_hint: 'Continuing takes you to Step 1 (Welcome). Your decisions are recorded in the wizard run.'
            action:
                replace: 'Replace with new wizard document'
                keep: 'Keep existing document (skip this topic)'
                merge_into_topic: 'Merge into a wizard topic (as a section)'
                split_to_topics: 'Split across multiple wizard topics (manual follow-up)'
            column:
                title: 'Title'
                type: 'Type'
                last_approved: 'Last approved'
                owner: 'Owner'
                action: 'Action'
            suggestion:
                replace: 'Outdated — suggest replace'
                keep: 'Already wizard-managed — keep'
                review: 'Review manually'
            empty:
                title: 'Greenfield tenant'
                message: 'No existing documents found. Let us start fresh.'
                action_continue: 'Continue to Step 1 (Welcome).'
        welcome:
            title: 'Welcome + standards'
            subtitle: 'Pick the standards mix and the run mode.'
            standard:
                iso27001: 'ISO/IEC 27001:2022 (mandatory)'
                bsi: 'BSI IT-Grundschutz (200-2 standard protection)'
                dora: 'EU DORA (Digital Operational Resilience Act)'
                gdpr: 'EU GDPR / national data-protection law'
                bcm: 'BCM (ISO 22301 business continuity)'
                iso27701: 'ISO/IEC 27701 (PIMS extension)'
            preview: 'This selection will produce approximately %count% documents.'
            finding_reference_label: 'Audit-finding reference (optional)'
            finding_reference_help: 'Links this wizard run to a specific audit finding for traceability.'
        organisation_scope:
            title: 'Organisation & scope'
            subtitle: 'Legal name, scope statement and in-scope sites.'
            legal_name_label: 'Legal name'
            legal_name_help: 'Full legal name of the organisation.'
            scope_statement_label: 'Scope statement'
            scope_statement_help: 'Concrete description of the in-scope perimeter (min. 30 chars). Auditor-grade, no boilerplate.'
            primary_address_label: 'Primary address (optional)'
            sites_label: 'In-scope sites'
            sites_help: 'IDs of in-scope sites. Leave empty if only the primary address applies.'
            climate_note: 'ISO 27001:2024 Clause 4.1 climate-change wording is enabled by default (audit defang).'
        roles:
            title: 'Roles & responsibilities'
            subtitle: 'CISO, ISO, DPO, BCM officer and the function owners per business function.'
            ciso_label: 'CISO (Chief Information Security Officer)'
            isb_label: 'ISO (Information Security Officer)'
            dpo_label: 'Data Protection Officer'
            bcm_officer_label: 'BCM Officer (Business Continuity)'
            function_owners_label: 'Function owners per business function'
            function_owners_help: 'Risk-owner P1 — one accountable owner per function.'
        risk_classification:
            title: 'Risk classification'
            subtitle: 'Risk-appetite tier (1-5) for the tenant organisation.'
            tier_label: 'Risk appetite tier'
            tier_1: '1 – very conservative (every deviation needs board approval)'
            tier_2: '2 – conservative (CISO approval for medium risks)'
            tier_3: '3 – balanced (industry default thresholds)'
            tier_4: '4 – growth-oriented (higher residual risk acceptable)'
            tier_5: '5 – aggressive (residual risk per risk-owner mandate)'
            direction_hint: '1 = very conservative → 5 = aggressive. The tier drives default risk-acceptance thresholds.'
        operational_baselines:
            title: 'Operational baselines'
            subtitle: 'Patch cadence, log retention, backup frequency, awareness cadence.'
            patch_cadence_label: 'Patch cadence (days)'
            log_retention_label: 'Log retention (days)'
            backup_frequency_label: 'Backup frequency'
            awareness_frequency_label: 'Awareness training frequency'
        lifecycle:
            title: 'Lifecycle'
            subtitle: 'Review interval and designated approver.'
            review_interval_label: 'Review interval (months)'
            review_interval_help: 'Maximum 24 months (ISO 27001:2022 Clause 7.5.3 + audit defang).'
            approver_label: 'Approver role'
            approver_help: 'Which role countersigns the policy renewal?'
        review_generate:
            title: 'Review & generate'
            subtitle: 'Inspect the summary, review hierarchy conflicts and generate the policy framework.'
            summary_heading: 'Summary of your inputs'
            conflicts_heading: 'Hierarchy conflicts'
            conflicts_empty: 'No conflicts detected.'
            generate_hint: 'Pressing Generate will persist the documents. Sandbox mode produces no documents.'
        targeted_pick_topics:
            title: 'Pick topics'
            subtitle: 'Mark up to ten existing topic policies for re-generation.'
        targeted_finding_reference:
            title: 'Audit-finding reference'
            subtitle: 'Optional — link this re-run to an audit finding for evidence.'
        targeted_diff_preview:
            title: 'Diff preview'
            subtitle: 'Comparison between current effective values and the last approved baseline.'
        targeted_generate:
            title: 'Confirm re-generation'
            subtitle: 'Final confirmation: the picked topics will be regenerated.'
        targeted:
            pick:
                title: 'Pick topics'
                subtitle: 'Mark up to ten existing topic policies for re-generation.'
                hint_max_ten: 'A targeted re-run accepts at most %count% topics. Keep the selection small to keep the diff reviewable.'
                more_documents: '… and %count% more documents'
                column:
                    topic: 'Topic'
                    last_approved: 'Last approved'
                    next_review: 'Next review'
                action:
                    continue: 'Continue to audit finding'
            finding:
                title: 'Audit-finding ID (optional)'
                subtitle: 'If you got here via an audit-finding alert, paste the finding ID for evidence.'
                placeholder: 'e.g. NCR-2026-04'
                help: 'Stored in the audit log of this wizard run and copied into the approval-inbox entry.'
                action:
                    skip: 'Continue without reference'
                    continue: 'Continue to diff preview'
            diff:
                title: 'Diff preview'
                subtitle: 'Read-only comparison. Changed rows are highlighted in yellow; confirm below to continue.'
                no_changes_title: 'No drift detected'
                no_changes_body: 'The selected topics currently carry the same value as the last approved baseline. Re-generation still runs (e.g. after a template change).'
                column:
                    topic: 'Topic'
                    setting: 'Setting key'
                    current: 'Current value'
                    approved: 'Approved baseline'
                    changed: 'Changed?'
                confirm_label: 'I have reviewed the differences and confirm regeneration of the selected topics.'
                action:
                    regenerate: 'Start regeneration'
            generate:
                title: 'Confirm re-generation'
                subtitle: 'Final step: the selected topics will be regenerated. Sandbox mode persists nothing.'
                topics_heading: 'Selected topics'
                preview_heading: 'Sandbox preview'
                action:
                    confirm: 'I confirm regeneration of the topics listed above.'

    action:
        start_full: 'Start full run'
        start_targeted: 'Start targeted re-run'
        start_sandbox: 'Start sandbox run'
        continue: 'Continue'
        back: 'Back'
        cancel: 'Cancel'
        cancel_confirm: 'Cancel this wizard run?'
        generate: 'Generate policy framework'
        resume: 'Resume'

    status:
        in_progress: 'In progress'
        completed: 'Completed'
        cancelled: 'Cancelled'
        failed: 'Failed'
        sandbox: 'Sandbox'

    message:
        generate_preview: 'This selection will produce approximately %count% documents.'
        run_started: 'Wizard run started.'
        run_cancelled: 'Wizard run was cancelled.'
        run_completed: 'Wizard run completed successfully.'
        sandbox_no_persistence: 'Sandbox mode active — no documents will be persisted.'
        changed_yes: 'Changed'
        changed_no: 'Unchanged'

    konzern_rollup:
        title: 'Group Roll-Up'
        subtitle: 'Compliance overview across all subsidiaries of the holding.'
        alva_tipp: 'Tip: switch between Coverage, Actions, Compliance, Drift and Acknowledgement via the tabs. The Drift column highlights subsidiaries that deviate from the group-wide baseline (stricter or laxer).'
        tab:
            coverage: 'Coverage'
            actions: 'Open actions'
            compliance: 'Compliance score'
            drift: 'Settings drift'
            acknowledgement: 'Acknowledgement'
        empty:
            not_konzern: 'This tenant is not a holding entity.'
            no_subsidiaries: 'There are no subsidiaries underneath this tenant.'

    witness:
        label: 'Witness / co-signature'
        signed_at: 'Co-signed at'
        optional: 'Optional — DPO/CISO co-signature'

    konzern_defaults:
        title: 'Group defaults'
        subtitle: 'Set group-wide policy defaults and propagate them to subsidiaries.'
        badge: 'Group'
        intro: 'These defaults are inherited by all subsidiary tenants. For floor-only / ceiling-only settings, subsidiaries can only become stricter.'
        current_settings_heading: 'Current group-wide settings'
        start_heading: 'Start a new defaults run'
        start_hint: 'Starts the policy wizard in group-defaults mode. Inputs are stored as TenantPolicySetting rows on the holding tenant and automatically pushed down to subsidiaries.'
        no_settings: 'No group-wide settings stored yet.'
        no_settings_hint: 'Start a group-defaults run below to define risk appetite, backup RPO, crypto minimum-key-length and other defaults for the whole holding.'
        column:
            key: 'Key'
            value: 'Value'
            updated_at: 'Last updated'
        action:
            start: 'Start group-defaults wizard'
            edit: 'Edit'

    result:
        title: 'Policy framework generated'
        subtitle: 'The following documents were produced as part of this wizard run.'
        documents_heading: 'Generated documents'
        documents_empty: 'No documents generated (sandbox or targeted re-run without diff).'
        next_steps_heading: 'Next steps'
        next_steps_review: 'Obtain top-management sign-off (bulk-approval inbox).'
        next_steps_translate: 'Request English translation if needed.'

    error:
        review_interval_max: 'The review interval must not exceed 24 months (ISO 27001 + audit defang).'
        run_not_found: 'The requested wizard run was not found.'
        run_already_completed: 'This wizard run is already completed.'
        invalid_step: 'The requested step is invalid.'
        access_denied: 'You are not allowed to access this wizard run.'
        no_tenant: 'No tenant context available.'
        bestandsaufnahme:
            unknown_document: 'This document does not belong to your tenant or no longer exists.'
            action_invalid: 'Please pick a valid action (replace, keep, merge or split).'
            target_topic_required: 'When merging into a wizard topic you must pick a target topic.'
            target_topics_required: 'When splitting you must pick at least two target topics.'
            rationale_too_long: 'The rationale may be at most 1000 characters long.'
            decision_required: 'Please record a decision for every existing document.'
        preset_bundle_unknown: 'The selected industry preset is unknown or inactive.'
        # W1 audit-defang gap #3 — Variable-substitution Leakage Detector.
        substitution_leakage:
            title: 'Template variable left unresolved'
            detail: 'The generated policy still contains raw Twig markers (`{{ … }}`, `{% … %}` or `{# … #}`). Please complete the missing inputs or notify your administrator. Persistence was aborted on purpose — auditors do not accept raw variable names in approved evidence.'
        # W1 audit-defang gap #2 — Generation-to-approval min-elapsed-time gate.
        minimum_elapsed:
            title: 'Minimum review window not reached'
            detail: 'A minimum of %required% seconds must elapse between document generation and your approval so a realistic read/review pass is on record. Please wait another %remaining% seconds and submit the approval again.'
        # W1 audit-defang gap #1 — Tailoring field minimum quality.
        tailoring_quality:
            too_short: 'Please enter at least 30 characters of real content — auditors immediately spot one-word rubber-stamp answers.'
            repetition: 'The same word repeats too often. Please rephrase the entry more precisely and without redundancy.'
            placeholder: 'Placeholder text such as "lorem ipsum", "TBD", "TODO" or "n/a" is not accepted. Please enter the tenant-specific information.'
            custom: 'The entry does not match the format configured for this field. Please check the template guidance.'
        # W6 Gap-E — DPO Charter excluded from bulk-approval (GDPR Art. 38(3)).
        dpo_charter_in_bulk:
            title: 'DPO Charter cannot be bulk-approved'
            detail: 'GDPR Art. 38(3) requires the DPO Charter to be approved standalone. Please submit it separately for top-management sign-off.'

    # W4-B — IndustryPresetBundle picker (Step 1).
    preset:
        label: 'Industry preset (optional)'
        placeholder: 'Optional: pick an industry preset'
        help: 'Pre-fills sector-specific defaults. You can still tweak every value afterwards.'
        preview:
            documents_count: '%count% documents will be generated for the "%bundle%" preset.'
        healthcare:
            label: 'Healthcare / Patient Records'
            description: 'Hospitals, medical centres, practices and digital-health providers handling patient data. Very conservative risk profile, 4 h RPO, DPO sections auto-enabled.'
        public_sector:
            label: 'Public Sector / KRITIS'
            description: 'Authorities and KRITIS operators following BSI IT-Grundschutz. Very conservative risk profile with ISO 27001 + BSI baseline.'
        b2c_saas:
            label: 'B2C-SaaS'
            description: 'Consumer-facing SaaS providers handling personal data. Balanced risk profile, 24 h RPO, DPO sections enabled.'
        ot_iec62443:
            label: 'OT / IEC 62443 (Industrial Control Systems)'
            description: 'Operational-technology environments — production lines, SCADA, PLCs, IIoT — aligned with IEC 62443 and NIS2. Very conservative with physical-heavy controls.'

    csrf:
        invalid: 'Invalid CSRF token. Please reload the page.'

    # W7-A — PDF + ZIP export (TenantBranding letterhead, audit pack).
    export:
        pdf:
            title: 'Download as PDF'
            download_button: 'Download PDF'
        zip:
            title: 'Audit pack (ZIP)'
            download_button: 'Download audit pack'
            confirm: 'Generate the audit-pack ZIP including all selected standards?'
        cover:
            title: 'Title'
            standard: 'Standard'
            version: 'Version'
            valid_from: 'Valid from'
            approved_by: 'Approved by'
            generated_on: 'Generated on'
        footer:
            page_of: 'Page'
            system_attribution: 'Generated by Little ISMS Helper'
            batch_id_label: 'Batch ID'

    # W2 Gap-A — Crisis-team RACI hint card on Step 3 (RolesStep).
    roles:
        raci_hint:
            title: 'Crisis Team RACI'
            intro: 'Default crisis-team responsibilities per BCM best practice. The fields below override these defaults per tenant.'
            r: 'Responsible: Emergency / BCM Officer'
            a: 'Accountable: Crisis Team Lead'
            c: 'Consulted: ISO/CISO, DPO, IT Lead, Legal'
            i: 'Informed: Executive Management, Business Units, Communications'

    # W3 Gap-B — Rejection notification (notify Document.owner / WizardRun starter).
    notification:
        rejection:
            subject: 'Policy section rejected — rework required'
            body: 'A privacy or policy section in your document was rejected by the DPO/approver. Please rework the highlighted section and resubmit it for sign-off.'

    # W6 Gap-D — GDPR-toggle off-cleanup behaviour.
    gdpr_cleanup:
        title: 'GDPR cleanup after toggle-off'
        success: 'GDPR documents archived and sections locked. Inventory recorded in audit log.'
        confirm: 'The tenant is no longer a GDPR subject. Archive all GDPR documents and lock GDPR sections? This action is recorded in the audit log.'

    # ────────────────────────────────────────────────────────────────────
    # W7-E — Dashboard widgets, drift badge on Document index, mobile
    # bulk acknowledgement inbox. CISO board-reporting consolidates KPIs
    # from the wizard (policies generated, pending approvals, finding
    # cross-refs, acknowledgement coverage, DPO veto count).
    # ────────────────────────────────────────────────────────────────────
    widget:
        policies_you_own:
            title: 'Policies you own'
            empty_state: 'No policies are currently assigned to you as owner or function owner.'
            see_all: 'See all documents'
        board_reporting:
            title: 'Board reporting — policy programme'
            kpi_total_policies: 'Policies generated'
            kpi_pending_approvals: 'Open approvals'
            kpi_open_findings: 'Open audit findings'
            kpi_ack_coverage: 'Acknowledgement coverage'
            kpi_dpo_veto_count: 'DPO vetoes (quarter)'
            period_label: 'Current quarter'

    bulk_inbox_mobile:
        swipe_right_to_approve: 'Swipe right to approve'
        swipe_left_to_reject: 'Swipe left to reject'
        tap_to_confirm: 'Tap to confirm'

    # Drift badge on the Document index. W7-C ships the SettingsDriftDetector
    # — its display strings live here so W7-E can wire the badge.
    drift_badge:
        label: 'Group drift'
        title: 'This policy was not regenerated after a group-level settings change.'
        aria_label: 'Group settings drift detected'

# W3-L — Per-user policy acknowledgement collection.
# Closes auditor's predicted ISO 27001 A.6.3 NC ("policy must be communicated and acknowledged").
policy_ack:
    inbox:
        title: 'Pending policy acknowledgements'
        subtitle: 'Please acknowledge the following published policies.'
        pending_count: '%count% policy/policies waiting for your acknowledgement.'
        no_pending: 'All policies acknowledged — thank you!'
    view:
        title: 'View and acknowledge policy'
        subtitle: 'Read the policy and confirm acknowledgement at the bottom of the page.'
        action:
            acknowledge: 'Acknowledge policy'
        button_disabled_already_acked: 'You have already acknowledged this version.'
    message:
        acknowledged_success: 'Acknowledgement recorded — thank you!'
    widget:
        title: 'Policy acknowledgements pending'
        action:
            go_to_inbox: 'Go to acknowledgement inbox'

# W3-D — Compliance-Wizard check-types covering Policy-Wizard outputs.
