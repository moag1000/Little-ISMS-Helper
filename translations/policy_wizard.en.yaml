                    # A.7 — Physical controls (14)
                    'A.7.1': 'Physical security perimeters'
                    'A.7.2': 'Physical entry'
                    'A.7.3': 'Securing offices, rooms and facilities'
                    'A.7.4': 'Physical security monitoring'
                    'A.7.5': 'Protecting against physical and environmental threats'
                    'A.7.6': 'Working in secure areas'
                    'A.7.7': 'Clear desk and clear screen'
                    'A.7.8': 'Equipment siting and protection'
                    'A.7.9': 'Security of assets off-premises'
                    'A.7.10': 'Storage media'
                    'A.7.11': 'Supporting utilities'
                    'A.7.12': 'Cabling security'
                    'A.7.13': 'Equipment maintenance'
                    'A.7.14': 'Secure disposal or re-use of equipment'
                    # A.8 — Technological controls (34)
                    'A.8.1': 'User end point devices'
                    'A.8.2': 'Privileged access rights'
                    'A.8.3': 'Information access restriction'
                    'A.8.4': 'Access to source code'
                    'A.8.5': 'Secure authentication'
                    'A.8.6': 'Capacity management'
                    'A.8.7': 'Protection against malware'
                    'A.8.8': 'Management of technical vulnerabilities'
                    'A.8.9': 'Configuration management'
                    'A.8.10': 'Information deletion'
                    'A.8.11': 'Data masking'
                    'A.8.12': 'Data leakage prevention'
                    'A.8.13': 'Information backup'
                    'A.8.14': 'Redundancy of information processing facilities'
                    'A.8.15': 'Logging'
                    'A.8.16': 'Monitoring activities'
                    'A.8.17': 'Clock synchronisation'
                    'A.8.18': 'Use of privileged utility programs'
                    'A.8.19': 'Installation of software on operational systems'
                    'A.8.20': 'Networks security'
                    'A.8.21': 'Security of network services'
                    'A.8.22': 'Segregation of networks'
                    'A.8.23': 'Web filtering'
                    'A.8.24': 'Use of cryptography'
                    'A.8.25': 'Secure development life cycle'
                    'A.8.26': 'Application security requirements'
                    'A.8.27': 'Secure system architecture and engineering principles'
                    'A.8.28': 'Secure coding'
                    'A.8.29': 'Security testing in development and acceptance'
                    'A.8.30': 'Outsourced development'
                    'A.8.31': 'Separation of development, test and production environments'
                    'A.8.32': 'Change management'
                    'A.8.33': 'Test information'
                    'A.8.34': 'Protection of information systems during audit testing'
                control_desc:
                    stub: 'Description will follow in the wizard output (Statement of Applicability) — control %control% is part of ISO/IEC 27001:2022 Annex A.'
                    # Junior-ISB plain-language descriptions (1 sentence per control). NOT the verbatim ISO wording.
                    # A.5 — Organizational controls (37)
                    'A.5.1': 'Top-level policy plus topic-specific policies for information security. Mandatory for every tenant; not-applicable only in extreme greenfield pilot cases.'
                    'A.5.2': 'Clear assignment of security roles (CISO, ISO, risk owner). Mandatory for every tenant — no roles, no ISMS.'
                    'A.5.3': 'Separation of critical activities (e.g. who changes vs. who reviews). Not-applicable only for very small single-person tenants.'
                    'A.5.4': 'Top management must actively support information security and enforce the rules. Mandatory for every tenant.'
                    'A.5.5': 'Defined contact channels with authorities (regulators, data-protection authority, law enforcement). Mandatory — indispensable when notifiable events occur.'
                    'A.5.6': 'Membership and exchange in professional communities (e.g. CERT networks). Not-applicable for very small tenants without security maturity.'
                    'A.5.7': 'Structured collection and analysis of threat information (CTI). Often not-applicable for small tenants without a SOC or external CTI feed.'
                    'A.5.8': 'Embed security requirements early in projects (security-by-design). Not-applicable for tenants without a project pipeline at all.'
                    'A.5.9': 'Maintain an asset inventory (data, systems, licences). Mandatory — the foundation of any risk management.'
                    'A.5.10': 'Acceptable-use policy: what staff may do with information and devices. Mandatory once any staff exist.'
                    'A.5.11': 'Return of devices, keys and data on leaving. Not-applicable only if there are neither employees nor external service providers.'
                    'A.5.12': 'Information classification scheme (public / internal / confidential). Mandatory — basis for protective measures.'
                    'A.5.13': 'Visibly label information with its classification (watermarks, headers). Not-applicable for purely technical tenants without classified documents.'
                    'A.5.14': 'Secure transfer (mail encryption, SFTP, signed contracts). Mandatory once any data leaves the tenant.'
                    'A.5.15': 'Access control: who may see and change what. Mandatory for every tenant with more than one user.'
                    'A.5.16': 'Identity management across the full lifecycle (joiner-mover-leaver). Mandatory for every tenant managing user accounts.'
                    'A.5.17': 'Secure handling of passwords, keys and MFA factors. Mandatory for every tenant.'
                    'A.5.18': 'Periodically review and revoke need-to-know access rights. Mandatory for every tenant managing user accounts.'
                    'A.5.19': 'Assess and govern supplier risks. Not-applicable only if the tenant guarantees no use of external service providers.'
                    'A.5.20': 'Include security clauses in supplier contracts (DPA, NDA, SLA). Mandatory once suppliers process data.'
                    'A.5.21': 'Secure the ICT supply chain (software sourcing, sub-providers, EU CRA). Not-applicable for single-vendor tenants without sub-suppliers.'
                    'A.5.22': 'Audit suppliers and monitor their KPIs regularly. Not-applicable for tenants with no material suppliers.'
                    'A.5.23': 'Govern use of cloud services (SaaS, IaaS, PaaS). Not-applicable for fully on-premise tenants without external cloud usage.'
                    'A.5.24': 'Prepare an incident-response process (roles, escalation, playbooks). Mandatory for every tenant.'
                    'A.5.25': 'Triage security events: incident or false positive? Mandatory once logs are collected.'
                    'A.5.26': 'Structured response to incidents (containment, evidence preservation, recovery). Mandatory for every tenant.'
                    'A.5.27': 'Feed lessons-learned from incidents back into processes. Mandatory — even with few incidents.'
                    'A.5.28': 'Forensically collect evidence (chain-of-custody). Often not-applicable for small tenants with no in-house forensics — outsourced instead.'
                    'A.5.29': 'Maintain information security during a disruption (crisis continuity). Mandatory for every tenant subject to BCM obligations.'
                    'A.5.30': 'ICT recovery plans (RTO/RPO) for critical systems. Not-applicable for tenants without critical IT dependencies.'
                    'A.5.31': 'Identify and meet legal and contractual requirements (compliance register). Mandatory for every tenant.'
                    'A.5.32': 'Respect licences and IP rights (open-source compliance, trademarks). Mandatory for every tenant.'
                    'A.5.33': 'Protect records against loss, falsification and unauthorised access (retention periods). Mandatory for every tenant.'
                    'A.5.34': 'Privacy and protection of personal data (GDPR). Not-applicable only for tenants that process no personal data at all.'
                    'A.5.35': 'Independent reviews and internal audits of information security. Mandatory for every ISO 27001-certified tenant.'
                    'A.5.36': 'Actively check compliance with internal policies (compliance monitoring). Mandatory for every tenant.'
                    'A.5.37': 'Documented operating procedures and runbooks for IT operations. Not-applicable for tenants without their own IT operations.'
                    # A.6 — People controls (8)
                    'A.6.1': 'Pre-employment background screening (criminal record, references). Not-applicable for tenants with no employed staff.'
                    'A.6.2': 'Security clauses in employment contracts (confidentiality, IT use). Mandatory once any staff exist.'
                    'A.6.3': 'Staff awareness and recurring training. Mandatory for every tenant with staff.'
                    'A.6.4': 'Disciplinary process for security violations. Not-applicable for single-person tenants without staff.'
                    'A.6.5': 'Obligations after termination or role change (confidentiality survives). Not-applicable for tenants without staff turnover.'
                    'A.6.6': 'NDAs / confidentiality agreements with staff and externals. Mandatory for every tenant.'
                    'A.6.7': 'Secure remote working / home office (VPN, device protection, work/private split). Not-applicable for purely on-site tenants.'
                    'A.6.8': 'Low-friction reporting channel for staff to flag security events. Mandatory for every tenant with staff.'
                    # A.7 — Physical controls (14)
                    'A.7.1': 'Define physical security zones (reception, office, data centre). Not-applicable for fully virtual tenants without their own premises.'
                    'A.7.2': 'Physical entry controls (keys, badges, visitor handling). Not-applicable for fully cloud-/remote-only tenants without premises.'
                    'A.7.3': 'Extra protection for sensitive rooms (DC, board rooms with C-level data). Not-applicable for tenants with no sensitive rooms.'
                    'A.7.4': 'Monitoring of critical rooms (CCTV, alarm, entry logs). Not-applicable for tenants with no sensitive physical assets.'
                    'A.7.5': 'Protection against fire, water, power loss and earthquakes. Not-applicable for fully virtual tenants.'
                    'A.7.6': 'Rules for behaviour in secure areas (no photos, no smartphones in DC). Not-applicable without dedicated secure areas.'
                    'A.7.7': 'Clear desk / clear screen at the workplace. Mandatory once staff handle classified data.'
                    'A.7.8': 'Place and protect equipment ergonomically and safely (privacy screens, no exposed servers). Not-applicable for fully cloud-only tenants.'
                    'A.7.9': 'Protect mobile assets / staff laptops off-premises (encryption, tracking). Not-applicable for tenants with no mobile devices.'
                    'A.7.10': 'Manage and securely erase removable media (USB, external HDD, tape). Often not-applicable for fully cloud-based tenants.'
                    'A.7.11': 'UPS / cooling / backup power for critical IT. Not-applicable for fully cloud-only tenants without an own data centre.'
                    'A.7.12': 'Protect cabling (power and data) against tampering and failure. Not-applicable for fully cloud-only tenants.'
                    'A.7.13': 'Plan and log hardware maintenance. Not-applicable for fully cloud-only tenants without own hardware.'
                    'A.7.14': 'Secure disposal / re-use of storage media (wipe, shred, certificate). Mandatory once any storage media are used.'
                    # A.8 — Technological controls (34)
                    'A.8.1': 'Harden end-user devices (endpoint protection, full-disk encryption, MDM). Mandatory for every tenant with user devices.'
                    'A.8.2': 'Tightly control and log privileged accounts (admin, root). Mandatory for every tenant with IT administration.'
                    'A.8.3': 'Restrict application and feature access (least privilege at the app layer). Mandatory for every tenant running applications.'
                    'A.8.4': 'Secure source-code repositories (branch protection, no secrets in repos). Not-applicable for tenants with no in-house software development.'
                    'A.8.5': 'Secure authentication (MFA, FIDO2, password complexity). Mandatory for every tenant.'
                    'A.8.6': 'Capacity planning for compute / storage / bandwidth. Mandatory — even for small IT estates.'
                    'A.8.7': 'Protection against malware (antivirus, EDR, mail scanning). Mandatory for every tenant.'
                    'A.8.8': 'Scan, assess and patch vulnerabilities (CVE management). Mandatory for every tenant with IT systems.'
                    'A.8.9': 'Harden and monitor configurations (CIS benchmarks, drift detection). Mandatory for every tenant with IT systems.'
                    'A.8.10': 'Securely delete data and systems (GDPR Art. 17, BSI VSITR). Mandatory for every tenant processing personal data.'
                    'A.8.11': 'Mask / pseudonymise production data in test environments. Not-applicable for tenants without separate test environments.'
                    'A.8.12': 'Data leakage prevention (DLP, mail filter, USB lockdown). Often not-applicable for small tenants without DLP tooling.'
                    'A.8.13': 'Create, verify and store backups off-site. Mandatory for every tenant.'
                    'A.8.14': 'Redundancy for critical systems (HA cluster, multi-region). Not-applicable for tenants without critical IT dependencies.'
                    'A.8.15': 'Capture security-relevant logs (login, admin action, errors). Mandatory for every tenant with IT systems.'
                    'A.8.16': 'Actively monitor logs / SIEM use cases. Often not-applicable for small tenants without SIEM/SOC — outsourced instead.'
                    'A.8.17': 'Synchronise time (NTP) on all systems for forensic correlation. Mandatory for every tenant with IT systems.'
                    'A.8.18': 'Govern privileged-utility tools (sysadmin tooling). Mandatory for every tenant with admin tools.'
                    'A.8.19': 'Control software installations on production systems (allow-listing). Mandatory for every tenant with IT systems.'
                    'A.8.20': 'Segment and secure the network (firewall, VLAN, zero-trust). Mandatory for every tenant with an own network.'
                    'A.8.21': 'Secure and monitor network services (DNS, DHCP, proxy, VPN). Mandatory for every tenant with an own network.'
                    'A.8.22': 'Network segregation (production / test / guest / OT separation). Not-applicable for trivial network sizes.'
                    'A.8.23': 'Web filter / DNS filter against known malicious domains. Often not-applicable for small tenants without their own web gateway.'
                    'A.8.24': 'Govern use of cryptography (algorithms, key lifecycle, key management). Mandatory for every tenant with encrypted data.'
                    'A.8.25': 'Secure software lifecycle (SDLC) — security requirements at every phase. Not-applicable for tenants without in-house development.'
                    'A.8.26': 'Security requirements for procured / developed applications (OWASP ASVS). Not-applicable for tenants without application sourcing.'
                    'A.8.27': 'Secure architecture and engineering principles (defence-in-depth, secure-by-default). Not-applicable for tenants without in-house development.'
                    'A.8.28': 'Secure coding (e.g. OWASP Top 10, static analysis, dependency scanning). Not-applicable for tenants without in-house development.'
                    'A.8.29': 'Security testing in development and before acceptance (SAST / DAST / pentest). Not-applicable for tenants without in-house development.'
                    'A.8.30': 'Govern and audit outsourced development. Not-applicable for tenants without software outsourcing.'
                    'A.8.31': 'Separate development / test / production environments. Not-applicable for tenants without in-house software development.'
                    'A.8.32': 'Change-management process (request, test, approval, rollback). Mandatory for every tenant with IT systems.'
                    'A.8.33': 'Manage test data (no live data in tests, secure disposal). Not-applicable for tenants without their own testing.'
                    'A.8.34': 'Plan audit testing so that production systems are not impacted. Not-applicable for tenants without in-house audit testing.'
