    privacy_overlay:
        healthcare_bdsg22:
            label: 'Healthcare (§ 22 BDSG)'
            description: 'Activates the § 22 BDSG (special categories) and § 203 StGB (medical confidentiality) overlays for RoPA, DPIA and §2.16 special-category templates.'
        public_sector_bbg:
            label: 'Public Sector (BDSG § 70 ff.)'
            description: 'Activates the public-body overlays — BDSG § 70 ff., state DSGs, BArchG § 5 — on RoPA and the top-level Privacy Policy.'

    # W6-C — GDPR section injector titles + descriptions. Skeleton only;
    # full prose ships with W6-F. Sections are injected into ISO host
