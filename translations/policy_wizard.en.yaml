                bsi_tr02102: 'BSI Technical Guideline 02102 — recommendations for cryptographic methods and key lengths.'
                ict_concentration: 'DORA Art. 29 — threshold for risk concentration on individual ICT providers.'
            dora:
                significance_self_check:
                    title: 'DORA significance self-check (DORA Art. 16 + RTS)'
                    intro: 'Three guiding questions to self-classify as a "significant entity" under DORA Art. 16. Server-side derives "significant" once at least 2 of 3 answers are yes.'
                    q1: 'Q1: Total balance-sheet of the organisation > EUR 5 bn?'
                    q1_help: 'Group-level value as of the latest annual report. Threshold aligned with the EBA/ESRB lex-RTS draft for DORA Art. 16.'
                    q1_yes_implication: 'If "yes": one of three yes-points. Size threshold met — closer to "significant" status.'
                    q1_no_implication: 'If "no": no yes-point added. Balance-sheet alone does not trigger heightened DORA requirements.'
                    q2: 'Q2: Number of ICT third parties > 100 or ICT concentration risk > 10%?'
                    q2_help: 'Third parties from the ICT third-party register (DORA Art. 28). Concentration: share of a single provider in critical ICT functions.'
                    q2_yes_implication: 'If "yes": one of three yes-points. High ICT concentration triggers tighter third-party monitoring.'
                    q2_no_implication: 'If "no": no yes-point added. A standard third-party register suffices.'
                    q3: 'Q3: Active in cross-border service provisioning across the EU?'
                    q3_help: 'Providing systemically relevant ICT services in more than one EU member state (relevant for ESA supervision).'
                    q3_yes_implication: 'If "yes": one of three yes-points. ESA bodies (EBA/ESMA/EIOPA) become co-supervisors.'
                    q3_no_implication: 'If "no": no yes-point added. Purely national supervision — typically only the lead competent authority.'
                    answer_yes: 'Yes'
                    answer_no: 'No'
                    derived_label: 'Derived:'
                    derived_yes: 'Significant entity (DORA Art. 16)'
                    derived_no: 'Standard entity (no Art. 16 threshold met)'
                    derived_yes_consequence: 'Consequence: full DORA Art. 5–16 applies (heightened resilience requirements). Board sign-off for the ICT risk-management framework is mandatory.'
                    derived_no_consequence: 'Consequence: standard DORA requirements (Art. 5–14). A simplified resilience programme is allowed, but minimum requirements still apply.'
                not_applicable_hint:
                    title: 'DORA likely does not apply to you'
                    body: 'DORA primarily applies to financial-services providers (banks, investment firms, payment-service providers, FMIs, crypto providers etc.). If your organisation does not provide financial services, deactivate DORA in Step 1 (standards selection).'
                    link_label: 'Back to Step 1 — adjust standards'
