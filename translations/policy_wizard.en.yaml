policy_wizard:
    title: Policy Wizard
    subtitle: Generate your policy framework with minimal typing
    badge: ISMS

    landing:
        intro: 'Pick a mode to start the policy wizard. Active wizard runs can be resumed at any time.'
        in_progress_title: 'Active wizard runs'
        in_progress_empty: 'No wizard runs are currently in progress.'
        choose_mode: 'Choose a mode'

    mode:
        full:
            label: 'Full run'
            description: 'Seven steps from welcome to generate. Produces the complete policy set including ISO 27001, BSI and DORA sections.'
        targeted:
            label: 'Targeted re-run'
            description: 'Update individual sections after an audit finding or regulatory change without regenerating the entire policy framework.'
        sandbox:
            label: 'Sandbox preview'
            description: 'Trial run without persistence. No documents are written, no SoA mutation — ideal for exploration.'

    step:
        welcome:
            title: 'Welcome + standards'
            subtitle: 'Pick the standards mix and the run mode.'
            standard:
                iso27001: 'ISO/IEC 27001:2022 (mandatory)'
                bsi: 'BSI IT-Grundschutz (200-2 standard protection)'
                dora: 'EU DORA (Digital Operational Resilience Act)'
                gdpr: 'EU GDPR / national data-protection law'
                bcm: 'BCM (ISO 22301 business continuity)'
                iso27701: 'ISO/IEC 27701 (PIMS extension)'
            preview: 'This selection will produce approximately %count% documents.'
            finding_reference_label: 'Audit-finding reference (optional)'
            finding_reference_help: 'Links this wizard run to a specific audit finding for traceability.'
        organisation_scope:
            title: 'Organisation & scope'
            subtitle: 'Legal name, scope statement and in-scope sites.'
            legal_name_label: 'Legal name'
            legal_name_help: 'Full legal name of the organisation.'
            scope_statement_label: 'Scope statement'
            scope_statement_help: 'Concrete description of the in-scope perimeter (min. 30 chars). Auditor-grade, no boilerplate.'
            primary_address_label: 'Primary address (optional)'
            sites_label: 'In-scope sites'
            sites_help: 'IDs of in-scope sites. Leave empty if only the primary address applies.'
            climate_note: 'ISO 27001:2024 Clause 4.1 climate-change wording is enabled by default (audit defang).'
        roles:
            title: 'Roles & responsibilities'
            subtitle: 'CISO, ISO, DPO, BCM officer and the function owners per business function.'
            ciso_label: 'CISO (Chief Information Security Officer)'
            isb_label: 'ISO (Information Security Officer)'
            dpo_label: 'Data Protection Officer'
            bcm_officer_label: 'BCM Officer (Business Continuity)'
            function_owners_label: 'Function owners per business function'
            function_owners_help: 'Risk-owner P1 — one accountable owner per function.'
        risk_classification:
            title: 'Risk classification'
            subtitle: 'Risk-appetite tier (1-5) for the tenant organisation.'
            tier_label: 'Risk appetite tier'
            tier_1: '1 – very conservative (every deviation needs board approval)'
            tier_2: '2 – conservative (CISO approval for medium risks)'
            tier_3: '3 – balanced (industry default thresholds)'
            tier_4: '4 – growth-oriented (higher residual risk acceptable)'
            tier_5: '5 – aggressive (residual risk per risk-owner mandate)'
            direction_hint: '1 = very conservative → 5 = aggressive. The tier drives default risk-acceptance thresholds.'
        operational_baselines:
            title: 'Operational baselines'
            subtitle: 'Patch cadence, log retention, backup frequency, awareness cadence.'
            patch_cadence_label: 'Patch cadence (days)'
            log_retention_label: 'Log retention (days)'
            backup_frequency_label: 'Backup frequency'
            awareness_frequency_label: 'Awareness training frequency'
        lifecycle:
            title: 'Lifecycle'
            subtitle: 'Review interval and designated approver.'
            review_interval_label: 'Review interval (months)'
            review_interval_help: 'Maximum 24 months (ISO 27001:2022 Clause 7.5.3 + audit defang).'
            approver_label: 'Approver role'
            approver_help: 'Which role countersigns the policy renewal?'
        review_generate:
            title: 'Review & generate'
            subtitle: 'Inspect the summary, review hierarchy conflicts and generate the policy framework.'
            summary_heading: 'Summary of your inputs'
            conflicts_heading: 'Hierarchy conflicts'
            conflicts_empty: 'No conflicts detected.'
            generate_hint: 'Pressing Generate will persist the documents. Sandbox mode produces no documents.'

    action:
        start_full: 'Start full run'
        start_targeted: 'Start targeted re-run'
        start_sandbox: 'Start sandbox run'
        continue: 'Continue'
        back: 'Back'
        cancel: 'Cancel'
        cancel_confirm: 'Cancel this wizard run?'
        generate: 'Generate policy framework'
        resume: 'Resume'

    status:
        in_progress: 'In progress'
        completed: 'Completed'
        cancelled: 'Cancelled'
        failed: 'Failed'
        sandbox: 'Sandbox'

    message:
        generate_preview: 'This selection will produce approximately %count% documents.'
        run_started: 'Wizard run started.'
        run_cancelled: 'Wizard run was cancelled.'
        run_completed: 'Wizard run completed successfully.'
        sandbox_no_persistence: 'Sandbox mode active — no documents will be persisted.'

    result:
        title: 'Policy framework generated'
        subtitle: 'The following documents were produced as part of this wizard run.'
        documents_heading: 'Generated documents'
        documents_empty: 'No documents generated (sandbox or targeted re-run without diff).'
        next_steps_heading: 'Next steps'
        next_steps_review: 'Obtain top-management sign-off (bulk-approval inbox).'
        next_steps_translate: 'Request English translation if needed.'

    error:
        review_interval_max: 'The review interval must not exceed 24 months (ISO 27001 + audit defang).'
        run_not_found: 'The requested wizard run was not found.'
        run_already_completed: 'This wizard run is already completed.'
        invalid_step: 'The requested step is invalid.'
        access_denied: 'You are not allowed to access this wizard run.'
        no_tenant: 'No tenant context available.'

    csrf:
        invalid: 'Invalid CSRF token. Please reload the page.'
