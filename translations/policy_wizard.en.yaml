        description: 'Confirms at least 95 % of active tenant users acknowledged each published policy (via the PolicyAcknowledgement entity).'
        pass_message: 'Acknowledgement coverage meets the 95 % threshold for every policy.'
        fail_message: 'At least one policy is below the 95 % acknowledgement threshold — trigger an awareness reminder.'
    policy_review_cadence:
        title: 'Review cadence honoured (no overdue policies)'
        description: 'Confirms each published policy has a computed nextReviewDate (uploadedAt + reviewIntervalMonths) and is not overdue.'
        pass_message: 'All policies are within their review interval.'
        fail_message: 'At least one policy is overdue for review — start a targeted re-run in the Policy-Wizard.'
    policy_tailoring_fields:
        title: 'Mandatory tailoring fields populated'
        description: 'Confirms each published policy has a non-empty value for every PolicyTemplate substitution-variable flagged as required.'
        pass_message: 'All mandatory tailoring fields are populated for every published policy.'
        fail_message: 'At least one policy has an empty mandatory tailoring field — run the wizard again.'
    # W4-D — DORA-specific compliance checks (Regulation (EU) 2022/2554)
    dora_ict_risk_framework_present:
        title: 'ICT Risk Management Framework published (DORA Art. 6)'
        description: 'Confirms a published ICT-RMF policy generated by the Policy-Wizard, per DORA Art. 6 + Commission Delegated Regulation (EU) 2024/1773.'
        pass_message: 'ICT Risk Management Framework is published.'
        fail_message: 'ICT Risk Management Framework missing — run the Policy-Wizard with DORA topic "ict_risk_management_framework".'
    dora_incident_reporting_deadlines:
        title: 'Incident reporting deadlines aligned with DORA (Art. 19)'
        description: 'Confirms the per-severity Incident SLA configuration meets DORA timelines: initial ≤ 4h (critical), intermediate ≤ 72h (high), final ≤ 1 month (breach).'
        pass_message: 'All DORA-relevant incident deadlines are configured within the regulatory ceiling.'
        fail_message: 'At least one severity SLA exceeds the DORA ceiling — open the Incident-SLA admin and tighten the reporting window.'
    dora_third_party_register_maintained:
        title: 'Register of Information for ICT third parties maintained (Art. 28.3)'
        description: 'Confirms at least one supplier row classified as ICT-critical or ICT-important per DORA Art. 28.3 + Commission Implementing Regulation (EU) 2024/2956.'
        pass_message: 'The Register of Information lists ICT third parties with criticality classification.'
        fail_message: 'No ICT third party with criticality classification on file — open the Suppliers module and assign ICT criticality.'
    dora_tlpt_cadence:
        title: 'TLPT cadence respected (DORA Art. 24-27)'
        description: 'For DORA-significant tenants: confirms a planned or executed TLPT exercise within the last 36 months (Art. 26.1, RTS JC 2024 29 / TIBER-EU aligned).'
        pass_message: 'TLPT cadence satisfied — exercise planned or completed within the 36-month window.'
        fail_message: 'No TLPT exercise within the last 36 months — schedule a BC-Exercise with TLPT / TIBER scope.'
    dora_exit_strategy_documented:
        title: 'Exit strategy documented for ICT-critical suppliers (Art. 28.8)'
        description: 'Confirms every supplier flagged ICT-critical carries an active exit-strategy flag plus a linked document (DORA Art. 28.8).'
        pass_message: 'All ICT-critical suppliers have a documented exit strategy.'
        fail_message: 'At least one ICT-critical supplier is missing a documented exit strategy — open the supplier detail view and link the exit strategy + document.'
    dora_validity_from:
        title: 'DORA validity-from marker on every DORA document (Art. 1)'
        description: 'Confirms each published DORA document carries the tag "dora-validity:2025-01-17" — the date Regulation (EU) 2022/2554 becomes applicable.'
        pass_message: 'All DORA documents carry the validity-from marker.'
        fail_message: 'At least one DORA document does not carry the validity-from marker — re-run the Policy-Wizard or apply the tag manually.'
    dora_extension_coverage:
        title: 'DORA extension applied to every ISO topic policy (§10)'
        description: 'Confirms each ISO topic policy listed in the DoraExtensionCatalogue carries the tag "dora-extension:applied".'
        pass_message: 'All applicable ISO topic policies carry the DORA extension.'
        fail_message: 'At least one ISO topic document is missing the DORA extension — re-run the Policy-Wizard with DORA scope.'
    # W5-C — BSI Grundschutz Compliance-Checks (BSI 200-1 / 200-2 / 200-3 / 200-4)
