policy_wizard:
    title: Policy Wizard
    subtitle: Generate your policy framework with minimal typing
    badge: ISMS

    # Topic-key translations (24 ISO 27002:2022 topics + cross-cutting).
    topic:
        top_level: 'Top-level policy (ISO 27001 Cl. 5.2)'
        acceptable_use: 'Acceptable use (A.5.10)'
        access_control: 'Access control (A.5.15-5.18)'
        information_classification: 'Information classification (A.5.12-5.13)'
        information_transfer: 'Information transfer (A.5.14)'
        identity_management: 'Identity management (A.5.16)'
        authentication_information: 'Authentication information (A.5.17)'
        cryptography: 'Cryptography (A.8.24)'
        backup: 'Backup (A.8.13)'
        logging: 'Logging (A.8.15-8.17)'
        patch_management: 'Patch management (A.8.8 + A.8.32)'
        malware: 'Malware protection (A.8.7)'
        secure_configuration: 'Secure configuration (A.8.9)'
        network_security: 'Network security (A.8.20-8.23)'
        secure_development: 'Secure development (A.8.25-8.30)'
        supplier_relationships: 'Supplier relationships (A.5.19-5.23)'
        project_management: 'Project management (A.5.8)'
        privacy_pii: 'Privacy / PII (A.5.34)'
        incident_management: 'Incident management (A.5.24-5.28)'
        continuity: 'Continuity (A.5.29-5.30)'
        threat_intelligence: 'Threat intelligence (A.5.7)'
        mobile_device: 'Mobile device (A.6.7 + A.7.9)'
        asset_management: 'Asset management (A.5.9-5.11)'
        hr_security: 'HR security (A.6.1-6.6)'
        physical_security: 'Physical security (A.7.1-7.14)'

    # MUST #2 — Junior-ISB tooltips: 1-sentence description per topic for the
    # Bestandsaufnahme topic pickers. Rendered in the topic-help popover.
    topic_description:
        top_level: 'Overarching ISMS policy — mission, scope, top-management responsibility (Cl. 5.2).'
        acceptable_use: 'What employees may do with IT assets — internet, e-mail, private use, sanctions.'
        access_control: 'Who can do what — users/roles/permissions, joiner-mover-leaver process.'
        information_classification: 'Confidentiality tiers + labelling (public / internal / confidential / strictly confidential).'
        information_transfer: 'Secure exchange of information with third parties — e-mail, file transfer, NDAs.'
        identity_management: 'Lifecycle of digital identities — provisioning, deprovisioning, service accounts.'
        authentication_information: 'Password and MFA requirements — complexity, rotation, credential storage.'
        cryptography: 'Encryption at-rest + in-transit, key management, allow-list of algorithms.'
        backup: 'Backup strategy — frequency, retention, restore tests, RPO.'
        logging: 'What to log — system events, login audits, SIEM ingest, retention.'
        patch_management: 'Vulnerability remediation — patch SLA by CVSS, inventory, emergency patches.'
        malware: 'Protection against malware — EDR/AV solution, updates, handling infected systems.'
        secure_configuration: 'Hardening standards for systems — baseline configs, CIS benchmarks, drift detection.'
        network_security: 'Network segmentation, firewalls, VPN, Wi-Fi security, zone concept.'
        secure_development: 'Secure software development — SDLC, code review, SAST/DAST, DevSecOps.'
        supplier_relationships: 'Supplier security — vendor assessments, contractual InfoSec requirements.'
        project_management: 'InfoSec in projects — security reviews at initiation, go-live gates.'
        privacy_pii: 'Protection of personal data — GDPR requirements, data-subject rights, DPIA duty.'
        incident_management: 'Detect, report and handle security incidents — CSIRT process, escalation.'
        continuity: 'Business continuity in crises — BCM, contingency plans, RTO/RPO, recovery.'
        threat_intelligence: 'Collect and assess external threat landscape — CERT feeds, IoC sharing.'
        mobile_device: 'Mobile devices and remote work — MDM, BYOD, home-office rules.'
        asset_management: 'Inventory all assets — hardware, software, data, owners.'
        hr_security: 'Personnel security — background checks, training, off-boarding.'
        physical_security: 'Site protection — access control, visitor rules, fire and water hazards.'

    landing:
        intro: 'Pick a mode to start the policy wizard. Active wizard runs can be resumed at any time.'
        in_progress_title: 'Active wizard runs'
        in_progress_empty: 'No wizard runs are currently in progress.'
        choose_mode: 'Choose a mode'

    mode:
        full:
            label: 'Full run'
            description: 'Seven steps from welcome to generate. Produces the complete policy set including ISO 27001, BSI and DORA sections.'
        targeted:
            label: 'Targeted re-run'
            description: 'Update individual sections after an audit finding or regulatory change without regenerating the entire policy framework.'
        sandbox:
            label: 'Sandbox preview'
            description: 'Trial run without persistence. No documents are written, no SoA mutation — ideal for exploration.'

    step:
        bestandsaufnahme:
            title: 'Inventory of existing documents'
            subtitle: 'Before we start: what should happen to your existing policies?'
            intro: 'We found existing policies, programmes and plans in your tenant. Please decide per document how the wizard should treat it before we start generating.'
            suggested_topic: 'Suggested topic'
            rationale_label: 'Rationale (optional)'
            rationale_placeholder: 'Short note for the audit log (optional, max 1000 characters).'
            continue_hint: 'Continuing takes you to Step 1 (Welcome). Your decisions are recorded in the wizard run.'
            action:
                replace: 'Replace with new wizard document'
                keep: 'Keep existing document (skip this topic)'
                merge_into_topic: 'Merge into a wizard topic (as a section)'
                split_to_topics: 'Split across multiple wizard topics (manual follow-up)'
            column:
                title: 'Title'
                type: 'Type'
                last_approved: 'Last approved'
                owner: 'Owner'
                action: 'Action'
            suggestion:
                replace: 'Outdated — suggest replace'
                keep: 'Already wizard-managed — keep'
                review: 'Review manually'
                # MUST #3 — Sammelpolitik suggestion label.
                split_to_topics: 'Umbrella policy — suggest split'
            empty:
                title: 'Greenfield tenant'
                message: 'No existing documents found. Let us start fresh.'
                action_continue: 'Continue to Step 1 (Welcome).'
            action_placeholder: '— pick action —'
            target_topic_placeholder: '— pick topic —'
            suggestion_label: 'Suggestion'
            suggested_topic_help: 'Topic suggestion (based on title + description)'
            help:
                title: 'What do the 4 actions mean?'
                replace: 'The wizard generates the matching new mandatory document; your old one is <strong>archived, NOT deleted</strong> — restorable via Admin → Documents → Archive. Recommended for outdated top-level policies, ISMS concepts and governance documents.'
                keep: 'Your document remains unchanged; the wizard skips the matching topic. Recommended when your document is already current and audit-grade.'
                merge_into_topic: 'Your document is appended as a section to a wizard-generated topic policy (e.g. your Backup concept goes into the wizard Backup Policy). Recommended for very specific detail concepts.'
                split_to_topics: 'Your document touches several wizard topics (e.g. a mix of Access Control + Crypto). Split it across multiple wizard topics — the wizard creates stub sections; you fill the content manually.'
            top_level_hint:
                title: 'Top-level document detected'
                body: 'This document appears to be your ISMS policy / top-level governance document. Such documents are typically replaced 1:1 by the wizard (action "Replace"). "Merge" or "Split" rarely make sense here.'
            field:
                action:
                    label: 'What should the wizard do with this document?'
                merge_topic:
                    label: 'Which wizard topic should it be merged into?'
                    help: 'Pick the wizard topic that best matches your document. Your content is appended as a section to the wizard-generated topic policy.'
                split_topics:
                    label: 'Which wizard topics should it be split into?'
                    help: 'Pick 2 or more wizard topics across which your document should be split. The wizard creates stub sections in each selected topic.'
            # MUST #3 — Sammelpolitik (multi-topic umbrella) hint.
            sammelpolitik_hint:
                title: 'Catch-all policy detected (= an old 80-page omnibus document covering Access + Backup + Crypto + Incident all in one)'
                body: 'This document seems to cover multiple topics (e.g. access + crypto + backup). Recommended: <strong>split</strong> instead of <strong>replace</strong> — otherwise content not represented elsewhere will be lost. The matched topics have already been pre-selected; please review.'
            # MUST #5 — Inline reminder that "replace" archives, not deletes.
            replace_archived_hint: 'Note: replacing <strong>archives</strong> the existing document, it is not deleted — restorable via Admin → Documents → Archive.'
            # MUST #4 — Bulk action bar.
            bulk:
                heading: 'Bulk actions'
                subheading: 'Apply the same decision to multiple rows — individual rows can still be adjusted afterwards.'
                replace_all_outdated: 'Replace all outdated'
                replace_all_outdated_help: 'Sets every row tagged "Outdated" to "Replace".'
                keep_all_wizard_tagged: 'Skip all wizard-tagged'
                keep_all_wizard_tagged_help: 'Sets every row already managed by the wizard to "Keep".'
                applied: '%count% rows updated.'
                no_targets: 'No matching rows found.'
                confirm_title: 'Confirm bulk action'
                confirm_replace_body: 'This sets %count% rows to "Replace". You can still adjust individual rows afterwards.'
                confirm_keep_body: 'This sets %count% rows to "Keep" (skip topic). You can still adjust individual rows afterwards.'
                confirm_apply: 'Apply'
                confirm_cancel: 'Cancel'
            # MUST #2 — Topic explainer popover.
            topic_help:
                button_label: 'What do the topics mean?'
                modal_title: 'Wizard topics — short reference'
                modal_intro: 'Each wizard topic covers one ISO 27002:2022 area. The table shows a 1-sentence hint for every topic.'
                column_topic: 'Topic'
                column_description: 'Description'
                close: 'Close'
            # MUST #1 — PDF preview drawer.
            preview:
                open: 'Open preview'
                drawer_title: 'Document preview'
                drawer_close: 'Close'
                no_pdf_title: 'Preview only available for PDFs'
                no_pdf_body: 'This document is not a PDF (type: %mime%). Please download it to inspect the content.'
                download: 'Download document'
                show_full: 'Open in document module'
                loading: 'Loading preview …'
        welcome:
            title: 'Welcome + standards'
            subtitle: 'Pick the standards mix and the run mode.'
            standard:
                iso27001: 'ISO/IEC 27001:2022 (mandatory)'
                bsi: 'BSI IT-Grundschutz (200-2 standard protection)'
                dora: 'EU DORA (Digital Operational Resilience Act)'
                gdpr: 'EU GDPR / national data-protection law'
                bcm: 'BCM (ISO 22301 business continuity)'
                iso27701: 'ISO/IEC 27701 (PIMS extension)'
            preview: 'This selection will produce approximately %count% documents.'
            finding_reference_label: 'Audit-finding reference (optional)'
            finding_reference_help: 'Links this wizard run to a specific audit finding for traceability.'
            help:
                title: 'Which standards apply to me?'
                body: 'ISO 27001 is the mandatory baseline. Only enable additional standards that you actually need by regulation or contract — every extra standard generates its own mandatory documents.'
                example: 'Example: A German bank enables ISO 27001 + DORA + GDPR + BCM. A B2C-SaaS enables ISO 27001 + GDPR.'
                dora_replaces_vait: 'DORA replaced the legacy German BaFin frameworks (VAIT/BAIT/KAIT/ZAIT) in January 2025 — no separate VAIT/BAIT document needed.'
            tooltip:
                iso27001: 'ISO/IEC 27001:2022 — international ISMS standard. Mandatory baseline of this wizard.'
                bsi: 'BSI IT-Grundschutz — German counterpart to ISO 27001 with detailed building-block catalogue. Common in public sector + KRITIS.'
                dora: 'Digital Operational Resilience Act (EU 2022/2554) — applies since Jan 2025 to banks/insurers/payment service providers. Replaces VAIT/BAIT/KAIT/ZAIT.'
                gdpr: 'EU GDPR + national law (BDSG in Germany). Mandatory when processing personal data.'
                bcm: 'ISO 22301 — Business Continuity Management. Recommended for KRITIS, banks, healthcare.'
                iso27701: 'ISO/IEC 27701 — PIMS (Privacy Information Management). Extends 27001 with privacy-specific controls.'
            # Junior-ISB Wish #1 — one-sentence explainer per standard.
            # ISO 27701 (PIMS) especially needs the term spelled out so
            # juniors recognise it as the privacy layer for ISO 27001.
            standard_explainer:
                summary: 'What do these standards mean? (click to expand)'
                iso27001: 'International standard for Information Security Management Systems (ISMS). Mandatory baseline of this wizard — every other standard layers on top.'
                bsi: 'German counterpart to ISO 27001 with a detailed building-block catalogue (200-1/2/3). Useful for public-sector contracts or KRITIS facilities.'
                dora: 'EU regulation 2022/2554 — Digital Operational Resilience for banks, insurers and payment service providers. Replaced the legacy BaFin circulars (VAIT/BAIT/KAIT/ZAIT) in January 2025.'
                gdpr: 'EU GDPR + national law (BDSG in Germany). Mandatory when processing personal data — generates the data-protection sections of your policies.'
                bcm: 'Business Continuity Management per ISO 22301. Generates incident and recovery directives (RTO/RPO, BIA methodology). Recommended for KRITIS, banks and healthcare.'
                iso27701: 'ISO 27701 (PIMS = Privacy Information Management System) — privacy extension for ISO 27001. Adds a clause-mapped privacy layer with audit-grade traceability to your ISMS. Recommended when you want to audit GDPR + ISO 27001 in a single review.'
            # Junior-ISB Wish #2 — NIS-2 / DORA lex specialis.
            # Banner inside the wizard + footer clause inside the
            # generated DORA-body.
            dora_nis2_lex_specialis:
                title: 'DORA-compliant — NIS-2 covered'
                body: 'NIS-2 Art. 21 (risk management) + Art. 23 (incident reporting) are covered by DORA as lex specialis (DORA Art. 1(2) + NIS-2 recital 16). If your organisation has NIS-2-relevant functions outside the financial scope (e.g. KRITIS energy), report NIS-2 separately.'
                footer_in_doc: 'This policy satisfies NIS-2 Art. 21 + Art. 23 via DORA Art. 6 + Art. 17-23 (lex specialis per DORA Art. 1(2) and NIS-2 recital 16).'
        organisation_scope:
            title: 'Organisation & scope'
            subtitle: 'Legal name, scope statement and in-scope sites.'
            legal_name_label: 'Legal name'
            legal_name_help: 'Full legal name of the organisation.'
            scope_statement_label: 'Scope statement'
            scope_statement_help: 'Concrete description of the in-scope perimeter (min. 30 chars). Auditor-grade, no boilerplate.'
            scope_statement:
                examples:
                    title: 'Show examples'
                    e1: '"All business processes, IT systems and sites of ABC GmbH at the Bonn headquarters (data centre included) that process personal customer data."'
                    e2: '"ICT Operations + Platform Engineering of DEF AG; Frankfurt + Milan sites; excluding external cloud providers that are separately SOC 2 certified."'
                    e3: '"Mechanical-engineering production sites in Stuttgart + Karlsruhe; OT networks + ERP + engineering workstations; excluding the Berlin admin office."'
            primary_address_label: 'Primary address (optional)'
            sites_label: 'In-scope sites'
            sites_help: 'Pick the sites that fall inside the scope. Only locations visible within your tenant are listed.'
            climate_note: 'ISO 27001:2024 Clause 4.1 climate-change wording is enabled by default (audit defang).'
            field:
                legal_name:
                    prefilled_hint: 'Loaded from tenant — editable'
                headquarters_address:
                    prefilled_hint: 'Loaded from tenant — editable'
                in_scope_locations:
                    placeholder: 'Select locations…'
                    empty_state:
                        title: 'No locations defined yet'
                        body: 'Create at least one tenant Location to make it pickable here.'
                        cta_label: 'Create location'
            help:
                title: 'What belongs in scope?'
                body: 'The scope defines which parts of your organisation are covered by the ISMS. Auditors read every word literally — no boilerplate.'
                example: 'Example: "The ISMS covers the development, operation and support of the cloud platform XYZ at the Berlin site (50 staff, excluding subsidiary ABC GmbH)."'
            tooltip:
                climate: 'ISO 27001:2024 Clause 4.1 — climate change must be considered as a context factor of the ISMS.'
        roles:
            title: 'Roles & responsibilities'
            subtitle: 'CISO, ISO, DPO, BCM officer and the function owners per business function.'
            ciso_label: 'CISO (Chief Information Security Officer)'
            isb_label: 'ISO (Information Security Officer)'
            dpo_label: 'Data Protection Officer'
            bcm_officer_label: 'BCM Officer (Business Continuity)'
            function_owners_label: 'Function owners per business function'
            function_owners_help: 'Risk-owner P1 — one accountable owner per function.'
            function_owners:
                junior_help:
                    title: 'What is a function owner?'
                    body: 'A function owner is the person accountable for a business function (analogous to an ISO 9001 process owner). One owner per function — a person may own several functions. Guiding question: Who accepts risk on behalf of their function?'
                    examples: 'Typical functions: IT leadership, HR, Production/OT, Sales, Research & Development, Procurement/Suppliers, Legal & Compliance.'
            help:
                title: 'Which roles do I really need?'
                body: 'CISO + ISO are mandatory in every ISMS. DPO is mandatory when GDPR applies. BCM Officer only when the BCM standard is enabled. Function owners are the line managers who own risks in their area.'
                example: 'Small-org example: CISO + ISO can be the same person (document the dual role). DPO may be outsourced (§ 38(1) BDSG).'
                missing_user_link: 'Person not listed?'
                missing_user_link_cta: 'Open tenant settings'
            tooltip:
                ciso: 'CISO — strategic responsibility for information security. Reports to executive management.'
                isb: 'ISO (Information Security Officer) — operational implementation of CISO directives. In small orgs often combined with CISO.'
                dpo: 'Data Protection Officer per GDPR Art. 37 + § 38 BDSG. Mandatory above 20 staff with regular personal-data processing.'
                bcm_officer: 'BCM Officer per ISO 22301 — responsible for emergency and recovery plans.'
                raci_r: 'Responsible — who executes the task operationally.'
                raci_a: 'Accountable — who carries final accountability (exactly one person).'
                raci_c: 'Consulted — who is consulted before the decision.'
                raci_i: 'Informed — who is notified of the result.'
            person_picker:
                intro:
                    title: 'Role-holders are Persons, not user accounts'
                    body: 'CISO/ISO/DPO/BCM-Officer can be external advisors without a system login — pick a Person from the tenant roster. The approval chain at the bottom still requires Users with login (sign-off action).'
            field:
                ciso_picker:
                    placeholder: 'Select CISO…'
                isb_picker:
                    placeholder: 'Select ISO…'
                dpo_picker:
                    placeholder: 'Select DPO… (external preferred)'
                bcm_officer_picker:
                    placeholder: 'Select BCM Officer…'
                function_owner_picker:
                    placeholder: 'Select function owner…'
                approval_chain:
                    label: 'Approval chain (Users with login)'
                    placeholder: 'Pick approvers…'
                    tooltip: 'Approval requires an authenticated sign-off — therefore Users (with login), not bare Person roles.'
                    help: 'Multi-select: each user is asked to approve in the order shown. The wizard starter must NOT be in the list (self-approval forbidden).'
                    empty_state: 'No approver users found in this tenant. Please grant ROLE_GROUP_CISO, ROLE_DPO or ROLE_ADMIN to at least one user with login.'
            empty_state:
                no_persons:
                    title: 'No persons in tenant'
                    body: 'At least one Person must exist in the tenant roster before roles can be assigned.'
                    cta_label: 'Create a Person'
        risk_classification:
            title: 'Risk classification'
            subtitle: 'Risk-appetite tier (1-5) for the tenant organisation.'
            tier_label: 'Risk appetite tier'
            tier_1: '1 – very conservative (every deviation needs board approval)'
            tier_2: '2 – conservative (CISO approval for medium risks)'
            tier_3: '3 – balanced (industry default thresholds)'
            tier_4: '4 – growth-oriented (higher residual risk acceptable)'
            tier_5: '5 – aggressive (residual risk per risk-owner mandate)'
            direction_hint: '1 = very conservative → 5 = aggressive. The tier drives default risk-acceptance thresholds.'
            data_classification_label: 'Data classification levels'
            data_classification_3: '3 levels (public / internal / confidential)'
            data_classification_4: '4 levels (public / internal / confidential / strictly confidential)'
            schutzbedarf_label: 'Schutzbedarf levels (BSI)'
            schutzbedarf_3: '3 (BSI default: normal / high / very high)'
            schutzbedarf_4: '4 levels'
            review_interval_label: 'Review interval (months)'
            annex_help: 'All Annex A controls default to applicable. Toggle off any control that does not apply — keep the justification for the SoA later.'
            annex_a:
                when_not_applicable:
                    title: 'When is an Annex A control NOT applicable?'
                    reason1: 'The function does not exist (e.g. A.5.34 "Privacy" for a tenant that does not process personal data).'
                    reason2: 'The asset type does not exist (e.g. A.5.23 "Cloud Services" for a fully on-premise tenant).'
                    reason3: 'The business model rules it out (e.g. A.6.4 "Disciplinary Process" for a single-shareholder GmbH without employees).'
                    reason4: 'Inherited from an external or higher-level control (e.g. group parent satisfies the control on behalf of the subsidiary).'
                    default_note: 'Default = applicable. Only un-tick when the exclusion reason can be audit-defended — the rationale is captured later in the SoA.'
                control_desc:
                    stub: 'Description will follow in the wizard output (Statement of Applicability) — control %control% is part of ISO/IEC 27001:2022 Annex A.'
            annex_applicable: 'Applicable'
            annex_not_applicable: 'Not applicable'
            annex_group:
                a5: 'A.5 — Organizational controls (37)'
                a6: 'A.6 — People controls (8)'
                a7: 'A.7 — Physical controls (14)'
                a8: 'A.8 — Technological controls (34)'
            annex_column:
                control: 'Control ref'
                applicable: 'Applicability'
            help:
                title: 'What is decided here?'
                body: 'Risk appetite is the overall tolerance for residual risk in your organisation. Data classification defines how many information levels you use. Annex A controls can be marked "not applicable" later in the SoA with a justification.'
                example: 'Example: SME without cloud exposure → Tier 3 (balanced), 3 classification levels, all 93 Annex A controls initially "applicable".'
                annex_reversibility: 'Applicability changes are reversible: you can adjust them later in the SoA module.'
            tooltip:
                annex_a: 'ISO/IEC 27001:2022 Annex A — catalogue of 93 controls in 4 themes (A.5/A.6/A.7/A.8). Each needs an applicability statement in the SoA.'
                schutzbedarf: 'BSI IT-Grundschutz protection-need classes (BSI Standard 200-2). Default: 3 levels (normal/high/very high).'
                soa: 'Statement of Applicability (SoA) — mandatory ISMS document per ISO 27001 Clause 6.1.3 d).'
                review_interval: 'Maximum interval between two risk reviews (ISO 27001 Clauses 7.5.3 and 9.3).'
        operational_baselines:
            title: 'Operational baselines'
            subtitle: 'Crypto allow-list, backup RPO, patch SLAs by severity, continuity RTO and (when applicable) the DORA block.'
            patch_cadence_label: 'Patch cadence (days)'
            log_retention_label: 'Log retention (days)'
            backup_frequency_label: 'Backup frequency'
            awareness_frequency_label: 'Awareness training frequency'
            crypto_allowlist_label: 'Allowed cryptographic algorithms'
            crypto_allowlist_help: 'Multi-select of permitted algorithms (BSI TR-02102 / NIST SP 800-131A compliant).'
            backup_rpo_label: 'Backup RPO (hours)'
            backup_rpo_help: 'Recovery-Point-Objective: maximum tolerable data loss since the last backup.'
            patch_sla_critical_label: 'Patch SLA critical (h)'
            patch_sla_critical_help: 'Recommended: 4 h for CVSS ≥ 9.0.'
            patch_sla_high_label: 'Patch SLA high (h)'
            patch_sla_high_help: 'Recommended: 24 h for CVSS 7.0–8.9.'
            patch_sla_medium_label: 'Patch SLA medium (h)'
            patch_sla_medium_help: 'Recommended: 168 h (1 week).'
            rto_section_title: 'Continuity RTO (BCM)'
            rto_section_subtitle: 'Recovery-Time-Objective per criticality level per ISO 22301.'
            rto_high_label: 'RTO high (h)'
            rto_high_help: 'Business-critical processes — typically ≤ 24 h.'
            rto_medium_label: 'RTO medium (h)'
            rto_medium_help: 'Important processes — typically 24–72 h.'
            rto_low_label: 'RTO low (h)'
            rto_low_help: 'Supporting processes — typically > 72 h.'
            dora_section_title: 'DORA-specific block'
            dora_section_subtitle: 'EU Regulation 2022/2554 — entity-specific classification.'
            dora_entity_type_label: 'Entity type per DORA Art. 2'
            dora_entity_type:
                kreditinstitut: 'Credit institution (CRR Art. 4)'
                wertpapierfirma: 'Investment firm (MiFID II)'
                zahlungsdienstleister: 'Payment service provider (PSD2)'
                e_geld_institut: 'E-money institution (EMD2)'
                fmi: 'Financial market infrastructure (FMI)'
                sonstige: 'Other (DORA Art. 2 § 2)'
            dora_authority_label: 'Competent authority'
            dora_significant_label: 'Significant entity (Art. 16)'
            dora_threshold_label: 'ICT third-party concentration threshold (%)'
            dora_threshold_help: 'Threshold for risk concentration on individual ICT providers.'
            dora_ctpp_label: 'CTPP self-assessment (critical ICT third-party provider)'
            responsible_section_title: 'Operational responsible persons'
            responsible_section_subtitle: 'Confirm the people responsible for these baselines (source: Step 3 Roles).'
            dpo_user_label: 'Data Protection Officer (DPO)'
            dpo_user_help: 'Mandatory when GDPR/DORA is in scope. Responsible for privacy sections and GDPR Art. 38.'
            bcm_officer_label: 'BCM Officer'
            bcm_officer_help: 'Responsible for the operational continuity baselines (RTO/RPO/exercise programme).'
            preset_section_title: 'Industry preset (optional)'
            preset_bundle_label: 'Apply industry preset'
            preset_bundle_help: 'One-click pre-fill of sector-specific defaults. Existing inputs are preserved.'
            help:
                title: 'What are operational baselines?'
                body: 'Concrete measurable thresholds for your operations: which crypto algorithms are allowed, how fast a patch must land, how much data loss is tolerable. These values flow directly into the generated policies.'
                example: 'Example: Backup RPO = 24 h means at most 24 hours of data loss on restore. Patch SLA critical = 4 h means critical CVEs must be patched within 4 h.'
                preset_hint: 'Tip: If you picked an industry preset in Step 1, sensible defaults are pre-filled — you can adjust any value.'
            tooltip:
                rpo: 'Recovery Point Objective — how much data loss since the last backup is tolerable (in hours).'
                rpo_usual: 'Recovery Point Objective: maximum tolerable data loss since the last backup. Typical: 24h standard / 4h critical systems / 1h Tier-1 DBs.'
                rto: 'Recovery Time Objective — how quickly a business process must be available again after an outage.'
                rto_high_usual: 'Recovery Time Objective high-criticality: ≤ 4h typical (banking) — up to 24h tolerable (mid-market).'
                rto_medium_usual: 'RTO medium: 24–72h typical.'
                rto_low_usual: 'RTO low: 1–2 weeks typical.'
                patch_sla_critical_usual: 'Critical-patch SLA: typical 24h (mid-market) down to 4h (regulated sector).'
                cvss: 'Common Vulnerability Scoring System v3.1 — standardised vulnerability rating 0.0–10.0.'
