    iso27701_clause_tags_applied:
        title: 'ISO 27701 clause tags on every PIMS document (Cl. 5.1/7.2.8/...)'
        description: 'When the PIMS addon is enabled: confirms every published document whose template carries an ISO 27701 clause mapping (e.g. 5.1, 7.2.8) carries an "iso27701:<clause>" tag.'
