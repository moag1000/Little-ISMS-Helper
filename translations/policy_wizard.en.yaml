    # W6-B — Privacy / DPO PolicyTemplate seeds (06-dpo-input.md §0 Decision Matrix v2).
    template:
        privacy_policy:
            title: 'Data Protection Policy'
            description: 'Top-level data-protection policy (GDPR Art. 5/24, ISO 27701 Cl. 5.1/5.2). Anchors the seven principles, data-subject rights and accountability framework.'
        ropa_methodology:
            title: 'Records of Processing Activities — Methodology'
            description: 'Methodology governing the RoPA per GDPR Art. 30 / ISO 27701 Cl. 7.2.8. Drives the existing ProcessingActivity module.'
        dpia_methodology:
            title: 'DPIA Methodology'
            description: 'Data Protection Impact Assessment per GDPR Art. 35/36 / ISO 27701 Cl. 6.2 + 7.2.5. Trigger criteria, threshold assessment, consultation rules.'
        dsr_procedure:
            title: 'Data Subject Rights Procedure'
            description: 'Procedure for access, rectification, erasure and portability requests per GDPR Art. 12-22 / ISO 27701 Cl. 7.3.1-7.3.10. Drives the DataSubjectRequest module.'
        data_breach_notification_procedure:
            title: 'Personal Data Breach Notification Procedure'
            description: '72h notification procedure per GDPR Art. 33/34, ISO 27701 Cl. 6.13 (2025) / Cl. 6.13.1.5 (2019). Multi-track matrix for GDPR / DORA Art. 19 / NIS2.'
        iso_a534_thin_host:
            title: 'A.5.34 Privacy Cross-Reference'
            description: 'Thin cross-reference stub for ISO 27001 A.5.34. Links to the five standalone privacy documents — no own content, satisfies only the "shall maintain a topic-specific policy" requirement.'

    # W6-B — ISO 27701 PIMS settings labels (06-dpo-input.md §3.3).
    iso27701:
        enabled:
            label: 'Enable ISO 27701 (PIMS)'
            help: 'Appends clause-mapping tags (iso27701:5.1, iso27701:7.2.8 …) to privacy documents. Optional — parallel addon analogous to DORA.'
        version_2019:
            label: 'ISO 27701:2019 (legacy)'
            help: 'For audit cycles still using the legacy clause numbering (e.g. 6.13.1.5 instead of 6.13).'
        version_2025:
            label: 'ISO 27701:2025 (standard)'
            help: 'Current edition (published 2025-09). Aligned with ISO 27002:2022 and explicit Schrems-II supplementary measures.'

