        pass_message: 'Breach notification procedure is published and the 72-h SLA is configured.'
        fail_message: 'Breach notification procedure or 72-h SLA is missing — start the Policy-Wizard for "data_breach_notification_procedure" and open the Incident-SLA admin to set severity "breach" to ≤ 72 h.'
    dpo_charter_appointed:
        title: 'DPO appointed and charter documented (GDPR Art. 37-39)'
        description: 'Confirms at least one tenant user holds ROLE_DPO AND a published DPO charter (standalone document or section "gdpr_dpo_mandate") exists.'
        pass_message: 'DPO is appointed and the charter is documented.'
        fail_message: 'DPO appointment or charter is missing — assign ROLE_DPO to a user and start the Policy-Wizard for "dpo_charter" or for the ISO host "awareness_training".'
    gdpr_section_coverage:
