        fail_message: 'A.5.34 thin host is missing — start the Policy-Wizard for "iso_a534_thin_host" so the ISO SoA mapping has an evidence-link target for the privacy artefacts.'
    # W6-D — ISO 27701 PIMS compliance checks (ISO 27701:2025 / 2019)
    iso27701_version_configured:
