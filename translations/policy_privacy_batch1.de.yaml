        ropa_methodology:
            v1:
                title: 'Verfahrensverzeichnis-Methodik (RoPA)'
                body: |-
                    # Verfahrensverzeichnis-Methodik der {{ tenant.legal_name }}

                    *Dokumentenklasse: Methodik | Norm-Anker: DSGVO Art. 30 / ISO 27701:2025 Cl. 7.2.8 und 8.2.6 / BDSG-neu § 70 | Sprache: Deutsch (Sie-Form, juristisch) | Pruefintervall: 24 Monate*

                    ## 1. Zweck

                    Diese Methodik regelt verbindlich, wie die {{ tenant.legal_name }} das Verzeichnis von Verarbeitungstaetigkeiten (Records of Processing Activities, RoPA) gemaess Art. 30 DSGVO erstellt, fuehrt, aktualisiert, ueberprueft und der Aufsichtsbehoerde auf Anfrage gemaess Art. 30 Abs. 4 DSGVO zur Verfuegung stellt. Das eigentliche RoPA-Register wird im bestehenden Modul `ProcessingActivity` gefuehrt; diese Methodik definiert die Pflege-Disziplin und ist die Anwendung von ISO 27701:2025 Cl. 7.2.8 (Verantwortlicher) und Cl. 8.2.6 (Auftragsverarbeiter) in der Organisation.

                    ## 2. Geltungsbereich

                    Erfasst sind alle Verarbeitungstaetigkeiten in beiden DSGVO-Rollen:

                    - **Verantwortlicher (Art. 30 Abs. 1 DSGVO)** — Pflichtinhalte (a) bis (g): Name und Kontaktdaten des Verantwortlichen, gemeinsam Verantwortlicher und Datenschutzbeauftragten; Verarbeitungszwecke; Beschreibung der Kategorien betroffener Personen und der Kategorien personenbezogener Daten; Kategorien von Empfaengern; Drittland-Uebermittlungen mit Garantien; vorgesehene Loeschfristen; allgemeine Beschreibung der technischen und organisatorischen Massnahmen i.S.v. Art. 32 Abs. 1 DSGVO.
                    - **Auftragsverarbeiter (Art. 30 Abs. 2 DSGVO)** — Pflichtinhalte (a) bis (d): Name und Kontaktdaten der Auftragsverarbeiter, jedes Verantwortlichen und gegebenenfalls der Vertreter; Kategorien der im Auftrag durchgefuehrten Verarbeitungen; Drittland-Uebermittlungen; allgemeine Beschreibung der technischen und organisatorischen Massnahmen.

                    Die Befreiung des Art. 30 Abs. 5 DSGVO (< 250 Beschaeftigte) wird durch die Organisation **nicht in Anspruch genommen**, da regelmaessig Verarbeitungen mit Risiko fuer die Rechte und Freiheiten betroffener Personen, regelmaessige Verarbeitung oder besondere Kategorien stattfinden — die Ausnahme greift praktisch nie.

                    ## 3. Trigger fuer einen RoPA-Eintrag

                    Eine neue RoPA-Eintragung ist verpflichtend bei jedem der folgenden Ereignisse:

                    1. Einfuehrung eines neuen IT-Verfahrens, einer neuen Anwendung oder eines neuen Cloud-Dienstes mit personenbezogenen Daten;
                    2. Aufnahme eines neuen Auftragsverarbeiters oder Sub-Auftragsverarbeiters (Art. 28 DSGVO);
                    3. Aenderung des Verarbeitungszwecks oder der Rechtsgrundlage einer bestehenden Verarbeitung;
                    4. Erweiterung der Datenkategorien oder Betroffenenkategorien;
                    5. Einfuehrung einer neuen Marketing-Kampagne, eines neuen HR-Prozesses oder eines neuen Kundenbindungsprogramms;
                    6. Einfuehrung einer Datenuebermittlung in ein Drittland (Kapitel V DSGVO);
                    7. Wechsel des Auftragsverarbeiters oder Sub-Auftragsverarbeiters;
                    8. Einsatz neuer KI-/automatisierter Entscheidungsfindungs-Verfahren (Art. 22 DSGVO; Schnittstelle zu AI Act).

                    ## 4. Rechtsgrundlagen-Sub-Section (Art. 6, 9, 10 DSGVO)

                    Jeder RoPA-Eintrag fuehrt zwingend mindestens eine dokumentierte Rechtsgrundlage. Die Festlegung folgt der Methodik zur Festlegung der Rechtsgrundlage. Folgende Auspraegungen sind zulaessig:

                    - **Art. 6 Abs. 1 lit. a — Einwilligung**: nur wenn keine andere Rechtsgrundlage einschlaegig ist; siehe Sub-Section Consent. Standard-Rechtsgrundlage in der Organisation: {{ gdpr.legal_basis_default }} (Default fuer neue Verarbeitungen, sofern nicht spezifisch begruendet).
                    - **Art. 6 Abs. 1 lit. b — Vertragserfuellung / vorvertragliche Massnahmen**.
                    - **Art. 6 Abs. 1 lit. c — Rechtliche Verpflichtung** (HGB, AO, GWG, SGB, BetrVG etc.); konkrete Norm im Eintrag zu zitieren.
                    - **Art. 6 Abs. 1 lit. d — Lebenswichtige Interessen**: enge Auslegung.
                    - **Art. 6 Abs. 1 lit. e — Wahrnehmung oeffentlicher Aufgaben**.
                    - **Art. 6 Abs. 1 lit. f — Berechtigtes Interesse**: nur mit dokumentierter LIA gemaess Erwaegungsgrund 47.

                    Fuer besondere Kategorien (Art. 9) und strafrechtliche Daten (Art. 10) ist zusaetzlich eine Rechtsgrundlage nach Art. 9 Abs. 2 lit. a-j bzw. § 22 BDSG-neu zu dokumentieren. Im Beschaeftigungskontext gilt § 26 BDSG-neu mit Sondervorgaben fuer den Betriebsrat (§ 26 Abs. 3).

                    ## 5. Einwilligungs-Sub-Section (Art. 7 DSGVO)

                    Wird eine Verarbeitung auf Einwilligung gestuetzt, gelten verschaerfte Anforderungen, deren Einhaltung im RoPA-Eintrag durch Verweis auf das Consent-Management-Tool {{ gdpr.consent_management_tool }} dokumentiert wird:

                    1. **Freiwilligkeit** (Art. 7 Abs. 4) — keine Kopplung von Vertragserfuellung an nicht-erforderliche Einwilligung.
                    2. **Spezifizitaet** — Einwilligung pro Verarbeitungszweck; Granular-Bundling-Verbot.
                    3. **Informiertheit** — vollstaendige Pflichtinformationen nach Art. 13 / 14 DSGVO vor Einwilligung.
                    4. **Eindeutige zustimmende Handlung** (Erwaegungsgrund 32) — Opt-in, keine Voreinstellung.
                    5. **Demonstrability** (Art. 7 Abs. 1 + Erwaegungsgrund 42) — Nachweis durch Logging im Tool {{ gdpr.consent_management_tool }}.
                    6. **Widerrufbarkeit** (Art. 7 Abs. 3) — "so einfach wie die Erteilung", Widerrufskanal explizit dokumentiert.

                    ## 6. Pflichtfelder pro RoPA-Eintrag (Mapping zu Art. 30)

                    | Feld | Art.-30-Verweis | Beispiel |
                    |---|---|---|
                    | Name der Verarbeitung | (1)(b) Zweck | "Bewerbermanagement" |
                    | Verantwortlicher / DSB | (1)(a) | {{ tenant.legal_name }} / {{ roles.dpo.fullName }} |
                    | Zweck | (1)(b) | "Pruefung Bewerbungseingaenge" |
                    | Rechtsgrundlage | NEU (Best Practice) | Art. 6 Abs. 1 lit. b + § 26 Abs. 1 BDSG |
                    | Kategorien Betroffener | (1)(c) | "Bewerber" |
                    | Kategorien Daten | (1)(c) | "Stammdaten, CV, Zeugnisse" |
                    | Kategorien Empfaenger | (1)(d) | "HR-Team, IT-Admin (Cloud-ATS)" |
                    | Drittland-Transfer | (1)(e) | "ja, USA, SCC + ergaenzende Massnahmen" |
                    | Loeschfrist | (1)(f) | "6 Monate nach Absage; Talent-Pool 24 Monate mit Einwilligung" |
                    | TOM | (1)(g) | "Verweis auf ISMS-TOM-Erklaerung" |
                    | Kategorisches Risiko (DSFA-Indikator) | NEU | hoch / mittel / niedrig |

                    ## 7. Rollen und Zustaendigkeiten

                    | Rolle | Zustaendigkeit |
                    |---|---|
                    | Fachbereichsleiter (Risk Owner) | Initialer RoPA-Entwurf bei Trigger; jaehrliche Aktualisierung |
                    | DSB {{ roles.dpo.fullName }} | Pruefung der Rechtsgrundlage; Freigabe; Pflege der Methodik |
                    | CISO {{ roles.ciso.fullName }} | Quervalidierung der TOM-Beschreibung gegen das ISMS |
                    | Vertretung des Verantwortlichen {{ roles.controller_repr.fullName }} | Aufsichtsbehoerde-Disclosure auf Anfrage Art. 30 Abs. 4 |
                    | Auftragsverarbeiter | Pflege des eigenen Art.-30-Abs.-2-Verzeichnisses, Bereitstellung an Verantwortlichen |

                    ## 8. Pruefintervall und Re-Assessment-Trigger

                    Jeder Eintrag wird mindestens alle 12 Monate durch den Risk Owner und den DSB ueberprueft. Eine ausserplanmaessige Pruefung erfolgt zwingend bei: Wechsel des Auftragsverarbeiters; Aenderung der Rechtsgrundlage; Aenderung der Datenkategorien; aufsichtsbehoerdlicher Anfrage; Datenschutzverletzung mit Bezug zur Verarbeitung; neuen EDSA-Leitlinien zur Verarbeitungskategorie.

                    ## 9. Aufbewahrung historischer Eintraege

                    Geloeschte oder ueberholte RoPA-Eintraege werden revisionssicher fuer 7 Jahre aufbewahrt (Audit-Log gemaess ISO 27001 Cl. 7.5; Beweissicherung gegenueber der Aufsichtsbehoerde gemaess Art. 30 Abs. 4 DSGVO). Loeschung erfolgt erst nach Ablauf der Verjaehrungsfristen und Audit-Bestaetigung.

                    ## 10. Format und Aufsichtsbehoerde-Disclosure (Art. 30 Abs. 4)

                    Das Verzeichnis wird elektronisch gefuehrt (Modul `ProcessingActivity`); ein Export als PDF oder CSV in deutscher Sprache und auf Anfrage in englischer Sprache wird innerhalb von 72 Stunden nach Aufsichtsbehoerden-Anfrage bereitgestellt. Uebermittlung erfolgt verschluesselt ueber den im jeweiligen Aufsichtsbehoerden-Portal vorgegebenen Kanal.

                    ## 11. Cross-References

                    - **ISO 27001:2022** A.5.34 (host control, ersetzt durch diese Methodik) und A.5.31 (gesetzliche Anforderungen).
                    - **ISO 27701:2025** Cl. 7.2.8 (Verantwortlicher), Cl. 8.2.6 (Auftragsverarbeiter).
                    - **DSGVO** Art. 30 (Pflichtinhalt), Art. 28 (Auftragsverarbeitung), Art. 26 (gemeinsam Verantwortliche), Art. 32 (TOM), Art. 35 (DSFA-Trigger aus RoPA), Kapitel V (Drittland-Transfer-Doku).
                    - **BDSG-neu** § 70 (oeffentliche Stellen), § 22 (besondere Kategorien), § 26 (Beschaeftigte).

                    ---

                    *Genehmigt durch DPO {{ roles.dpo.fullName }} am [Datum] — DSB-Sign-off ist gemaess Art. 38 Abs. 3 DSGVO unabhaengig vom CISO-Sign-off.*

                    *Genehmigungskette: {{ approval.chain }}*
