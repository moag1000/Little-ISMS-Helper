        iso_a534_thin_host:
            v1:
                title: 'Privatsphaere und Schutz von PII (A.5.34)'
                body: |-
                    # Privatsphaere und Schutz von PII (A.5.34) der {{ tenant.legal_name }}

                    *Dokumentenklasse: Verweis-Dokument | Norm-Anker: ISO/IEC 27001:2022 Annex A.5.34 / ISO/IEC 27002:2022 § 5.34 | Sprache: Deutsch (Sie-Form, juristisch) | Pruefintervall: 24 Monate*

                    ## 1. Zweck

                    Dieses Verweis-Dokument adressiert die ISO/IEC 27001:2022 Massnahme A.5.34 ("Privacy and protection of PII"). Da der Datenschutz in der {{ tenant.legal_name }} ein eigenstaendiges Programm darstellt (Datenschutz-Managementsystem, PIMS, gemaess ISO 27701:2025), enthaelt dieses Dokument bewusst **keinen** eigenstaendigen Datenschutz-Inhalt — es verweist auf die fachlich zustaendigen Datenschutz-Dokumente.

                    ## 2. Geltungsbereich

                    Dieses Dokument dient ausschliesslich als ISO-27001-A.5.34-Erfuellungsverweis und als Cross-Reference fuer Auditoren. Inhaltliche Vorgaben zum Datenschutz finden sich in den nachgelagerten Dokumenten unter Abschnitt 4.

                    ## 3. Begruendung der Verweis-Architektur

                    Der ISO/IEC 27002:2022 Standard formuliert in § 5.34: "The organization shall identify and meet the requirements regarding the preservation of privacy and protection of PII according to applicable laws and regulations and contractual requirements". Dies wird durch das eigenstaendige Datenschutz-Programm der Organisation erfuellt, das auf folgenden Saeulen beruht:

                    - DSGVO (Verordnung (EU) 2016/679) als zentrale gesetzliche Anforderung;
                    - BDSG-neu als deutsche Konkretisierung;
                    - ISO 27701:2025 als PIMS-Standard, der die ISMS-Klauseln um datenschutzspezifische Anforderungen erweitert;
                    - sektorspezifische Vorgaben (z. B. § 22 BDSG-neu fuer besondere Kategorien, AI Act, EHDS).

                    Der DSB {{ roles.dpo.fullName }} ist gemaess Art. 37-39 DSGVO bestellt und in seiner Funktion vom CISO {{ roles.ciso.fullName }} **zwingend zu trennen** (BSI-Empfehlung "DSB ungleich ISB"). Die Genehmigung dieses Verweis-Dokuments erfolgt durch den DSB; CISO-Bulk-Approval kann den DSB-Sign-off nicht ueberstimmen (DSB-Veto-Mechanik gemaess ISO 27701:2025 Cl. 5.1).

                    ## 4. Verbindliche Verweise

                    Die A.5.34-Anforderungen werden durch folgende Dokumente erfuellt — bitte konsultieren Sie diese fuer Inhalte und Pflichten:

                    1. **Datenschutz-Leitlinie** (oberste Datenschutz-Norm, ISO 27701:2025 Cl. 5.2; DSGVO Art. 24).
                    2. **Verfahrensverzeichnis-Methodik** (RoPA, DSGVO Art. 30; ISO 27701:2025 Cl. 7.2.8 / 8.2.6).
                    3. **DSFA-Methodik** (Datenschutz-Folgenabschaetzung, DSGVO Art. 35-36; ISO 27701:2025 Cl. 7.2.5).
                    4. **Verfahren Betroffenenrechte** (DSGVO Art. 12-22; ISO 27701:2025 Cl. 7.3.x).
                    5. **Verfahren zur Meldung von Datenschutzverletzungen** (DSGVO Art. 33-34; ISO 27701:2025 Cl. 6.13; DORA Art. 19 fuer Finanzsektor).
                    6. **Methodik zur Festlegung der Rechtsgrundlage** (DSGVO Art. 6, 9, 10; § 22 BDSG-neu).
                    7. **Einwilligungs-Management-Richtlinie** (DSGVO Art. 7, 8).
                    8. **Methodik zur gemeinsamen Verantwortlichkeit** (DSGVO Art. 26).
                    9. **Richtlinie zur Uebermittlung in Drittlaender** (DSGVO Kapitel V).
                    10. **Aufbewahrungs- und Loeschrichtlinie** (DSGVO Art. 5 Abs. 1 lit. e, Art. 17).
                    11. **Methodik Privacy by Design und Default** (DSGVO Art. 25).
                    12. **Bestellung und Aufgabenbeschreibung des Datenschutzbeauftragten** (DSGVO Art. 37-39).
                    13. **Datenschutz-Schulungs- und Awareness-Programm** (Art. 39 Abs. 1 lit. b DSGVO; ISO 27701:2025 Cl. 6.4.2; ergaenzt A.6.3).
                    14. ggf. **Richtlinie zum Umgang mit Daten Minderjaehriger** (DSGVO Art. 8) — bedingt.
                    15. ggf. **Richtlinie fuer besondere Kategorien personenbezogener Daten** (DSGVO Art. 9, 10; § 22 BDSG-neu) — bedingt.

                    ## 5. Cross-References zu weiteren ISO-27001-Massnahmen

                    Datenschutz beruehrt zahlreiche andere Annex-A-Massnahmen:

                    - **A.5.31** Gesetzliche Anforderungen — DSGVO ist zentrale Anforderung.
                    - **A.5.20** Lieferantenvereinbarungen — AVV-Pflicht (DSGVO Art. 28).
                    - **A.5.24-A.5.30** Vorfallsmanagement — verzahnt mit Breach-Verfahren.
                    - **A.5.33** Schutz von Aufzeichnungen — Aufbewahrungsdisziplin.
                    - **A.6.3** Schulung — ergaenzt durch Datenschutz-Awareness-Programm.
                    - **A.8.10** Loeschen von Informationen — Umsetzung der Speicherbegrenzung.
                    - **A.8.11** Datenmaskierung — Pseudonymisierung als TOM gemaess Art. 32.
                    - **A.8.12** Data Loss Prevention — TOM gemaess Art. 32.
                    - **A.8.13** Backup — auch fuer Datenschutzdaten geltend.
                    - **A.8.27** Sichere Systemarchitektur — Privacy by Design (Art. 25).
                    - **A.8.28** Sicheres Coding — Privacy by Design.

                    ## 6. Pruef- und Aenderungszyklus

                    Dieses Verweis-Dokument wird alle 24 Monate ueberprueft; Aenderungen erfolgen ausschliesslich, wenn neue Datenschutz-Dokumente in das Programm aufgenommen oder bestehende Dokumente entfernt werden. Inhaltliche Datenschutz-Aenderungen werden in den jeweiligen Zieldokumenten vorgenommen, nicht hier.

