policy:
    gdpr:
        privacy_policy:
            v1:
                title: 'Datenschutz-Leitlinie'
                body: |-
                    # Datenschutz-Leitlinie der {{ tenant.legal_name }}

                    *Dokumentenklasse: Leitlinie (oberste Ebene Datenschutz) | Norm-Anker: DSGVO Art. 5, Art. 24 / ISO 27701:2025 Klauseln 5.1 und 5.2 / BDSG-neu § 1 | Sprache: Deutsch (Sie-Form, juristisch) | Pruefintervall: 12 Monate | Genehmigung: {{ approval.chain }}*

                    ## 1. Zweck und Bekenntnis (ISO 27701 Cl. 5.2)

                    Diese Datenschutz-Leitlinie ist die hoechste normative Aussage der {{ tenant.legal_name }} (nachfolgend "die Organisation") zum Schutz personenbezogener Daten und stellt das Pendant zur Informationssicherheits-Leitlinie auf der Datenschutzebene dar. Sie wird durch die oberste Leitung erlassen und verpflichtet die Organisation gemaess Art. 24 Abs. 1 DSGVO zur Implementierung geeigneter technischer und organisatorischer Massnahmen, um die Konformitaet aller Verarbeitungstaetigkeiten mit der Verordnung (EU) 2016/679 (DSGVO), dem Bundesdatenschutzgesetz (BDSG-neu) sowie ISO 27701:2025 nachweisen zu koennen ("Rechenschaftspflicht" / Accountability).

                    Die oberste Leitung erkennt an, dass der Schutz personenbezogener Daten ein Grundrecht der betroffenen Personen ist (Art. 8 Charta der Grundrechte der Europaeischen Union; Art. 16 AEUV) und dass Verstoesse erhebliche Bussgelder (Art. 83 DSGVO bis zu 20 Mio. EUR oder 4 % des weltweiten Konzernumsatzes), Reputationsschaeden, zivilrechtliche Anspruechen (Art. 82 DSGVO) sowie aufsichtsbehoerdliche Anordnungen (Art. 58 DSGVO) nach sich ziehen koennen. Diese Leitlinie ist angemessen fuer den Zweck der Organisation und stellt den Rahmen fuer die Festlegung von Datenschutzzielen bereit (ISO 27701:2025 Cl. 5.2 a + b).

                    ## 2. Geltungsbereich

                    Diese Leitlinie gilt fuer alle Verarbeitungstaetigkeiten der Organisation in ihrer Rolle als Verantwortlicher i.S.v. Art. 4 Nr. 7 DSGVO sowie als Auftragsverarbeiter i.S.v. Art. 4 Nr. 8 DSGVO. Erfasst sind saemtliche Beschaeftigte (unbefristet, befristet, in Probezeit), Werkstudierende, Praktikantinnen und Praktikanten, Auftragnehmer, gemeinsam Verantwortliche (Art. 26 DSGVO) sowie Auftragsverarbeiter und Sub-Auftragsverarbeiter (Art. 28 DSGVO).

                    Inhaltlich erfasst die Leitlinie alle Lebenszyklusphasen personenbezogener Daten: Erhebung, Erfassung, Organisation, Ordnung, Speicherung, Anpassung, Auslesen, Abfragen, Verwendung, Offenlegung durch Uebermittlung, Verbreitung, Bereitstellung, Abgleich, Verknuepfung, Einschraenkung, Loeschung und Vernichtung (Art. 4 Nr. 2 DSGVO).

                    ## 3. Die sieben Grundsaetze nach Art. 5 DSGVO (verbatim)

                    Die Organisation verarbeitet personenbezogene Daten ausschliesslich nach den folgenden Grundsaetzen, die fuer alle Verarbeitungstaetigkeiten verbindlich sind:

                    1. **Rechtmaessigkeit, Verarbeitung nach Treu und Glauben, Transparenz** (Art. 5 Abs. 1 lit. a) — jede Verarbeitung beruht auf einer der sechs Rechtsgrundlagen des Art. 6 Abs. 1 DSGVO; Standard-Rechtsgrundlage in der Organisation: {{ gdpr.legal_basis_default }}. Besondere Kategorien (Art. 9) erfordern zusaetzlich eine Rechtsgrundlage nach Art. 9 Abs. 2 DSGVO oder § 22 BDSG-neu. Strafrechtliche Verurteilungen werden nur auf Basis von Art. 10 DSGVO i.V.m. § 24 BDSG-neu verarbeitet.
                    2. **Zweckbindung** (Art. 5 Abs. 1 lit. b) — eindeutige, festgelegte und legitime Zwecke vor Beginn jeder Verarbeitung.
                    3. **Datenminimierung** (Art. 5 Abs. 1 lit. c) — beschraenkt auf das fuer den Zweck notwendige Mass.
                    4. **Richtigkeit** (Art. 5 Abs. 1 lit. d) — proaktive Korrektur unrichtiger Daten.
                    5. **Speicherbegrenzung** (Art. 5 Abs. 1 lit. e) — Loeschung bzw. Anonymisierung nach Zweckerfuellung gemaess Aufbewahrungs- und Loeschrichtlinie.
                    6. **Integritaet und Vertraulichkeit** (Art. 5 Abs. 1 lit. f) — gewaehrleistet durch das ISMS und die Massnahmen nach Art. 32 DSGVO.
                    7. **Rechenschaftspflicht** (Art. 5 Abs. 2) — Nachweis der Einhaltung durch das gesamte Datenschutz-Managementsystem (PIMS) gemaess ISO 27701:2025.

                    ## 4. Bekenntnis zu Betroffenenrechten (Art. 12-22 DSGVO)

                    Die Organisation gewaehrleistet die Ausuebung saemtlicher Betroffenenrechte: Auskunft (Art. 15), Berichtigung (Art. 16), Loeschung / "Recht auf Vergessenwerden" (Art. 17), Einschraenkung (Art. 18), Mitteilungspflicht bei Berichtigung/Loeschung (Art. 19), Datenuebertragbarkeit (Art. 20), Widerspruch (Art. 21) sowie das Recht, keiner ausschliesslich automatisierten Entscheidungsfindung einschliesslich Profiling unterworfen zu werden (Art. 22). Antraege werden innerhalb von {{ gdpr.dsr_response_deadline_days }} Kalendertagen gemaess Art. 12 Abs. 3 DSGVO beantwortet; die Verlaengerung um zwei Monate bei komplexen Antraegen ist zulaessig und wird der betroffenen Person begruendet mitgeteilt. Das Verfahren ist im separaten Dokument *Verfahren Betroffenenrechte* (siehe Cross-Reference unten) geregelt.

                    ## 5. Rechtsgrundlagen-Disziplin

                    Vor Beginn jeder Verarbeitungstaetigkeit wird die Rechtsgrundlage dokumentiert (Methodik: Methodik zur Festlegung der Rechtsgrundlage). Eine Verarbeitung ohne dokumentierte Rechtsgrundlage ist untersagt. Wird Einwilligung als Rechtsgrundlage gewaehlt, gelten die Bedingungen des Art. 7 DSGVO und die Einwilligungs-Management-Richtlinie; eingesetzt wird das Werkzeug {{ gdpr.consent_management_tool }}. Berechtigte Interessen i.S.v. Art. 6 Abs. 1 lit. f erfordern eine dokumentierte Interessensabwaegung (Legitimate Interest Assessment, LIA) gemaess Erwaegungsgrund 47.

                    ## 6. Rahmenwerk der Rechenschaftspflicht

                    Diese Leitlinie verweist auf die nachgelagerten verbindlichen Methodiken und Verfahren des Datenschutz-Managementsystems der Organisation:

                    - **Verfahrensverzeichnis** (RoPA, Art. 30 DSGVO) — gefuehrt im Modul `ProcessingActivity` gemaess der RoPA-Methodik.
                    - **Datenschutz-Folgenabschaetzung (DSFA)** — Methodik gemaess Art. 35 DSGVO; Schwellwert-Score: {{ gdpr.dpia_threshold_score }}; Vorabkonsultation der Aufsichtsbehoerde gemaess Art. 36 bei Resterisiko hoch.
                    - **Verfahren Betroffenenrechte** (Art. 12-22 DSGVO).
                    - **Verfahren zur Meldung von Datenschutzverletzungen** (Art. 33 / Art. 34 DSGVO).
                    - **Methodik zur Festlegung der Rechtsgrundlage** (Art. 6, 9, 10 DSGVO; § 22 BDSG-neu).
                    - **Einwilligungs-Management-Richtlinie** (Art. 7, 8 DSGVO).
                    - **Methodik zur gemeinsamen Verantwortlichkeit** (Art. 26 DSGVO).
                    - **Richtlinie zur Uebermittlung in Drittlaender** (Kapitel V DSGVO; Schrems-II-konform mit ergaenzenden Massnahmen).
                    - **Aufbewahrungs- und Loeschrichtlinie** (Art. 5 Abs. 1 lit. e DSGVO; § 35 BDSG-neu; HGB § 257; AO § 147).
                    - **Methodik Privacy by Design und Default** (Art. 25 DSGVO; ISO 27701 Cl. 7.4.x).

                    ## 7. Designation des Datenschutzbeauftragten (Art. 37-39 DSGVO; ISO 27701 Cl. 5.3)

                    Die Organisation hat den Datenschutzbeauftragten (DSB) {{ roles.dpo.fullName }} benannt, dessen Bestellungs- und Aufgabenbeschreibung im separaten Dokument *Bestellung und Aufgabenbeschreibung des Datenschutzbeauftragten* dokumentiert ist. Der DSB berichtet unmittelbar an die oberste Leitung (Art. 38 Abs. 3 DSGVO), ist nicht weisungsgebunden in Datenschutzfragen und steht in keinem Interessenkonflikt (Art. 38 Abs. 6 DSGVO). Der DSB ist von der Funktion des Informationssicherheitsbeauftragten (ISB) {{ roles.ciso.fullName }} **zwingend zu trennen** (BSI-Empfehlung "DSB ungleich ISB"); eine Personalunion stellt einen Interessenkonflikt dar.

                    Die Kontaktdaten des DSB werden gemaess Art. 37 Abs. 7 DSGVO der Aufsichtsbehoerde mitgeteilt und auf der Website der Organisation veroeffentlicht (postalische Adresse, E-Mail, Telefon).

                    ## 8. Federfuehrende Aufsichtsbehoerde (Art. 56 DSGVO)

                    Die federfuehrende Aufsichtsbehoerde der Organisation wird ueber das Konzept der Hauptniederlassung (Art. 4 Nr. 16 DSGVO) bestimmt. Bei grenzueberschreitender Verarbeitung gilt der One-Stop-Shop-Mechanismus. Sekundaere Aufsichtsbehoerden in betroffenen Mitgliedstaaten werden gemaess Art. 60 DSGVO einbezogen. Die zustaendige federfuehrende Aufsichtsbehoerde ist im Setup-Wizard hinterlegt und wird durch die Vertretung des Verantwortlichen {{ roles.controller_repr.fullName }} kontaktiert.

                    ## 9. Bekenntnis zur Reaktion auf Datenschutzverletzungen

                    Die Organisation verpflichtet sich, Datenschutzverletzungen i.S.v. Art. 4 Nr. 12 DSGVO unverzueglich, spaetestens jedoch binnen 72 Stunden ab Kenntnisnahme, der federfuehrenden Aufsichtsbehoerde zu melden (Art. 33 Abs. 1 DSGVO). Bei voraussichtlich hohem Risiko fuer die Rechte und Freiheiten betroffener Personen wird zusaetzlich die Benachrichtigung der Betroffenen gemaess Art. 34 DSGVO veranlasst. Saemtliche Datenschutzverletzungen werden gemaess Art. 33 Abs. 5 DSGVO unabhaengig von der Meldepflicht intern dokumentiert (Modul `DataBreach`). Bei Finanzdienstleistern wird parallel die DORA Art. 19 ICT-Major-Incident-Meldung mit 4-Stunden-Initial / 72-Stunden-Zwischen-Bericht ausgeloest.

                    ## 10. Pruef- und Aenderungszyklus

                    Diese Leitlinie wird mindestens alle 12 Monate sowie ausserplanmaessig auf folgende Trigger geprueft: neue Verarbeitungstaetigkeit mit hohem Risiko, neuer Auftragsverarbeiter in einem Drittland ohne Angemessenheitsbeschluss, Aenderung sektoraler Vorgaben (z. B. AI Act, EHDS), neue Leitlinien der federfuehrenden Aufsichtsbehoerde oder des Europaeischen Datenschutzausschusses (EDSA), wesentliche organisatorische Aenderung der Organisation. Aenderungen unterliegen der Genehmigungskette {{ approval.chain }} mit der zwingenden Sondergenehmigung des DSB (DSB-Veto i.S.d. ISO 27701:2025 Cl. 5.1).

                    ## 11. Anhang A — Kinder als Betroffene (Art. 8 DSGVO)

                    Sofern die Organisation Dienste der Informationsgesellschaft direkt gegenueber Kindern anbietet, gelten die zusaetzlichen Anforderungen des Art. 8 DSGVO i.V.m. § 8 BDSG-neu (DE-Standard: 16 Jahre als Schwelle elterlicher Einwilligung). Werbliche Ansprache Minderjaehriger ist untersagt. Eine DSFA gemaess EDSA-Kriterium "vulnerable subjects" ist verpflichtend. Details: Richtlinie zum Umgang mit Daten Minderjaehriger.

                    ## 12. Anhang B — Besondere Kategorien personenbezogener Daten (Art. 9 + 10 DSGVO; § 22 BDSG-neu)

                    Verarbeitungen besonderer Kategorien (Rasse, ethnische Herkunft, politische Meinungen, religioese / weltanschauliche Ueberzeugungen, Gewerkschaftszugehoerigkeit, genetische Daten, biometrische Daten zur eindeutigen Identifizierung, Gesundheitsdaten, Daten zum Sexualleben, sexuelle Orientierung) sowie strafrechtliche Daten erfordern eine dokumentierte Rechtsgrundlage nach Art. 9 Abs. 2 lit. a-j bzw. Art. 10 i.V.m. § 22 / § 24 BDSG-neu. Im Beschaeftigungskontext gilt zusaetzlich § 26 Abs. 3 BDSG-neu (Mitwirkung des Betriebsrats). Eine DSFA ist verpflichtend. Details: Richtlinie fuer besondere Kategorien personenbezogener Daten.

                    ## 13. Cross-References zu ISO 27001:2022 und weiteren Frameworks

                    - **A.5.34** (Privacy and protection of PII) — diese Leitlinie ist der Inhalt des A.5.34-Controls; Verweis-Dokument *Privatsphaere und Schutz von PII (A.5.34)* leitet auf diese Leitlinie weiter.
                    - **A.5.31** (Legal, statutory, regulatory requirements) — DSGVO als zentrale gesetzliche Anforderung.
                    - **A.5.24-A.5.30** (Incident management) — Reaktion auf Datenschutzverletzungen verzahnt mit ISO-27001-Vorfallsmanagement.
                    - **A.6.3** (Information security awareness, education, training) — erweitert durch das Datenschutz-Schulungs- und Awareness-Programm.
                    - **ISO 27701:2025 Cl. 5.1, 5.2** — Leadership-Bekenntnis, PIMS-Erklaerung.
                    - **ISO 27701:2025 Cl. 6.13** — Reaktion auf Datenschutzverletzungen (frueher 6.13.1.5 in :2019).
                    - **EU-DORA Art. 19** — ICT-Incident-Meldepflicht (sofern Finanzdienstleister).
                    - **NIS2 Art. 23** — Cybersecurity-Incident-Meldungen (sofern wesentliche/wichtige Einrichtung).

                    ---

