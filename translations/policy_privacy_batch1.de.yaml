        dpia_methodology:
            v1:
                title: 'DSFA-Methodik (Datenschutz-Folgenabschaetzung)'
                body: |-
                    # DSFA-Methodik der {{ tenant.legal_name }}

                    *Dokumentenklasse: Methodik | Norm-Anker: DSGVO Art. 35 + Art. 36 / ISO 27701:2025 Cl. 7.2.5 und 8.2.1 / EDSA WP248 rev.01 / BfDI Schwarze Liste | Sprache: Deutsch (Sie-Form, juristisch) | Pruefintervall: 24 Monate*

                    ## 1. Zweck

                    Diese Methodik regelt die Durchfuehrung der Datenschutz-Folgenabschaetzung (DSFA) i.S.v. Art. 35 DSGVO sowie die vorherige Konsultation der federfuehrenden Aufsichtsbehoerde i.S.v. Art. 36 DSGVO. Sie ist der Anwendungsrahmen von ISO 27701:2025 Cl. 7.2.5 (Verantwortlicher) und Cl. 8.2.1 (Auftragsverarbeiter) und nutzt das bestehende Modul `DataProtectionImpactAssessment` als Datenhaltung.

                    ## 2. Geltungsbereich

                    Eine DSFA ist verpflichtend, wenn eine Verarbeitung "voraussichtlich ein hohes Risiko fuer die Rechte und Freiheiten natuerlicher Personen" hat (Art. 35 Abs. 1 DSGVO). Die Pflicht trifft die Organisation in der Verantwortlichenrolle; Auftragsverarbeiter unterstuetzen den Verantwortlichen gemaess Art. 28 Abs. 3 lit. f DSGVO.

                    ## 3. Schwellwert-Pruefung (Threshold Assessment)

                    Vor jeder neuen Verarbeitung wird ein zweistufiges Verfahren durchlaufen:

                    ### 3.1 Pflicht-Trigger nach Art. 35 Abs. 3 DSGVO

                    DSFA ist immer verpflichtend bei:

                    1. systematischer und umfassender Bewertung persoenlicher Aspekte natuerlicher Personen, einschliesslich Profiling, mit rechtlicher oder aehnlich erheblicher Wirkung;
                    2. umfangreicher Verarbeitung besonderer Kategorien personenbezogener Daten (Art. 9) oder strafrechtlicher Daten (Art. 10);
                    3. systematischer umfangreicher Ueberwachung oeffentlich zugaenglicher Bereiche.

                    ### 3.2 EDSA-WP248-rev.01-Kriterien (neun Kriterien)

                    Erfuellt eine Verarbeitung **zwei oder mehr** der folgenden Kriterien, ist eine DSFA verpflichtend:

                    1. Bewertung oder Einstufung (Profiling, Scoring);
                    2. automatisierte Entscheidung mit rechtlicher / aehnlich erheblicher Wirkung;
                    3. systematische Ueberwachung;
                    4. besondere Datenkategorien oder hoechstpersoenliche Daten;
                    5. Datenverarbeitung in grossem Umfang;
                    6. Abgleich oder Zusammenfuehrung von Datensaetzen;
                    7. Daten von schutzbeduerftigen Betroffenen (Kinder, Beschaeftigte, Patienten);
                    8. innovative Nutzung oder Anwendung neuer technologischer / organisatorischer Loesungen (z. B. KI, IoT, Biometrie);
                    9. Verarbeitung verhindert die Wahrnehmung eines Rechts oder den Abschluss eines Vertrags.

                    ### 3.3 BfDI Schwarze Liste

                    Zusaetzlich verpflichtend ist eine DSFA fuer alle in der "Liste von Verarbeitungsvorgaengen, fuer die eine DSFA durchzufuehren ist" der BfDI gefuehrten Verarbeitungstaetigkeiten (z. B. umfangreiche Verarbeitung biometrischer Daten zur eindeutigen Identifizierung, Forschung mit besonderen Kategorien ohne ausdrueckliche Einwilligung).

                    ### 3.4 Schwellwert-Score

                    Der organisationsinterne Schwellwert-Score betraegt {{ gdpr.dpia_threshold_score }}. Erreicht eine Verarbeitung in der Vor-Pruefung diesen Score, ist die DSFA auch dann durchzufuehren, wenn keine Pflicht-Trigger zwingend einschlaegig sind ("Vorsorge-DSFA" als Best Practice).

                    ## 4. DSFA-Methodik (Inhalt nach Art. 35 Abs. 7)

                    Eine DSFA dokumentiert mindestens:

                    1. **Systematische Beschreibung** der geplanten Verarbeitungsvorgaenge und der Verarbeitungszwecke; ggf. die berechtigten Interessen, die vom Verantwortlichen verfolgt werden (Art. 35 Abs. 7 lit. a).
                    2. **Bewertung der Notwendigkeit und Verhaeltnismaessigkeit** der Verarbeitungsvorgaenge in Bezug auf den Zweck (Art. 35 Abs. 7 lit. b).
                    3. **Bewertung der Risiken** fuer die Rechte und Freiheiten der betroffenen Personen (Art. 35 Abs. 7 lit. c) — qualitative Skala (niedrig / mittel / hoch / sehr hoch) ueber die Achsen Eintrittswahrscheinlichkeit und Schwere; Verzahnung mit der ISO-27005-Risikomethodik des ISMS, jedoch separater Risikoraum (Rechte-und-Freiheiten-Sicht statt CIA-Sicht).
                    4. **Massnahmen** zur Bewaeltigung der Risiken einschliesslich Garantien, Sicherheitsvorkehrungen und Verfahren, durch die der Schutz personenbezogener Daten sichergestellt und der Nachweis der Einhaltung der DSGVO gefuehrt wird (Art. 35 Abs. 7 lit. d).

                    ## 5. Stakeholder-Konsultation (Art. 35 Abs. 9 DSGVO)

                    Der Verantwortliche holt "gegebenenfalls" den Standpunkt der Betroffenen oder ihrer Vertreter ein. Konkrete Auspraegungen in der Organisation:

                    - Im Beschaeftigungskontext (Art. 88 DSGVO + § 26 Abs. 3 BDSG-neu): zwingende Beteiligung des Betriebsrats / Personalrats.
                    - Bei Verbraucherprodukten: anonymisierte Nutzerbefragung oder Stakeholder-Workshop.
                    - Bei Forschung mit Patienten: Beteiligung der Ethikkommission gemaess GCP / EU-Verordnung 536/2014.
                    - Dokumentation aller Konsultationsergebnisse in der DSFA-Akte (Modul `DataProtectionImpactAssessment`).

                    ## 6. Vorabkonsultation (Art. 36 DSGVO)

                    Wenn die DSFA ein "hohes Restrisiko" trotz Bewaeltigungsmassnahmen identifiziert (Stufe hoch oder sehr hoch in der Risikomatrix nach Massnahme), ist die federfuehrende Aufsichtsbehoerde **vor** Beginn der Verarbeitung gemaess Art. 36 Abs. 1 DSGVO zu konsultieren. Die Konsultation erfolgt schriftlich mit den Inhalten nach Art. 36 Abs. 3 lit. a-f. Die Aufsichtsbehoerde hat 8 Wochen Zeit fuer eine schriftliche Stellungnahme; verlaengerbar um 6 Wochen. Die Verarbeitung wird in dieser Zeit nicht aufgenommen.

                    ## 7. Risiko-Behandlungs-Eskalation

                    Risiken werden gemaess folgender Eskalationsmatrix behandelt:

                    | Restrisiko | Eskalation | Sign-off |
                    |---|---|---|
                    | niedrig | Standard-Massnahmen, Dokumentation in DSFA | DSB |
                    | mittel | zusaetzliche Massnahmen (Pseudonymisierung, Zugriffs-Restriktion); 12-Monats-Re-Assessment | DSB + CISO |
                    | hoch | umfassende Massnahmen + zwingender Vorabkonsultations-Check (Art. 36) | DSB + CISO + oberste Leitung |
                    | sehr hoch | Vorabkonsultation Art. 36 verpflichtend; Verarbeitung erst nach Behoerden-Stellungnahme | oberste Leitung + Aufsichtsbehoerde |

                    ## 8. Stakeholder-Workshops und ISO-27005-Verzahnung

                    Die DSFA-Risikobewertung nutzt die ISO-27005-konformen Bewertungsachsen des ISMS (Wahrscheinlichkeit / Schwere) **methodisch wieder**, aber im separaten Bewertungsraum "Rechte und Freiheiten". Doppelpflege wird durch das Modul vermieden: technische Risiken aus dem ISMS-Risikoregister werden referenziert, nicht dupliziert.

                    ## 9. Pruefintervall und Re-Assessment-Trigger

                    Jede DSFA wird alle 24 Monate vollstaendig ueberprueft. Eine ausserplanmaessige Pruefung erfolgt zwingend bei: Aenderung des Verarbeitungszwecks; Erweiterung der Datenkategorien oder Betroffenenkreise; aufgetretene Datenschutzverletzung mit Bezug zur Verarbeitung; neue technologische Komponenten (z. B. KI-Modul-Update); aufsichtsbehoerdliche Hinweise oder Sektor-Leitlinien.

                    ## 10. Aufbewahrung als Beweismittel

                    DSFAs werden waehrend der gesamten Lebensdauer der Verarbeitung sowie 3 Jahre nach Beendigung revisionssicher aufbewahrt; bei Vorabkonsultation Art. 36: 7 Jahre nach letzter behoerdlicher Stellungnahme.

                    ## 11. Cross-References

                    - **ISO 27001:2022** A.5.34, A.8.27 (sichere Systemarchitektur).
                    - **ISO 27701:2025** Cl. 7.2.5, 8.2.1.
                    - **DSGVO** Art. 24 (Verantwortliche), Art. 25 (PbD), Art. 32 (TOM).
                    - **BDSG-neu** § 67 (oeffentliche Stellen).
                    - **EDSA WP248 rev.01**, **BfDI Schwarze Liste**.
                    - **AI Act** (Verordnung (EU) 2024/1689) — Hochrisiko-KI-Systeme erfordern parallel zur DSFA eine FRIA (Fundamental Rights Impact Assessment).

                    ---

                    *Genehmigt durch DPO {{ roles.dpo.fullName }} am [Datum] — DSB-Sign-off unabhaengig vom CISO-Sign-off (ISO 27701:2025 Cl. 5.1).*

                    *Genehmigungskette: {{ approval.chain }}*
