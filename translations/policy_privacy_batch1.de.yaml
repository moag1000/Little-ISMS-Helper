        dsr_procedure:
            v1:
                title: 'Verfahren Betroffenenrechte'
                body: |-
                    # Verfahren Betroffenenrechte der {{ tenant.legal_name }}

                    *Dokumentenklasse: Verfahren | Norm-Anker: DSGVO Art. 12-22 / ISO 27701:2025 Cl. 7.3.1-7.3.10 und 8.3 / BDSG-neu §§ 32-37 | Sprache: Deutsch (Sie-Form, juristisch) | Pruefintervall: 24 Monate*

                    ## 1. Zweck

                    Dieses Verfahren regelt die Annahme, Pruefung, Bearbeitung und Beantwortung von Antraegen betroffener Personen (Data Subject Requests, DSR) gemaess Art. 12 bis 22 DSGVO. Antraege werden im bestehenden Modul `DataSubjectRequest` dokumentiert.

                    ## 2. Geltungsbereich

                    Erfasst sind alle Rechte natuerlicher Personen aus den Art. 15 bis 22 DSGVO sowie die zugehoerigen Pflichten der Organisation aus Art. 12 DSGVO. Das Verfahren gilt auch fuer Antraege ueber Auftragsverarbeiter, die gemaess Art. 28 Abs. 3 lit. e DSGVO an die Organisation als Verantwortlichen weiterzuleiten sind.

                    ## 3. Erfasste Rechte

                    | Recht | Inhalt | Frist |
                    |---|---|---|
                    | Art. 15 — Auskunft | Bestaetigung Verarbeitung Y/N + Kopie der Daten + Pflichtinformationen | {{ gdpr.dsr_response_deadline_days }} Tage |
                    | Art. 16 — Berichtigung | Korrektur unrichtiger / Vervollstaendigung unvollstaendiger Daten | {{ gdpr.dsr_response_deadline_days }} Tage |
                    | Art. 17 — Loeschung | "Recht auf Vergessenwerden" mit den Ausnahmen Abs. 3 (Meinungsfreiheit, Rechtspflichten, oeffentliches Interesse, archivierungs-/forschungs-/statistische Zwecke, Rechtsanspruechen) | {{ gdpr.dsr_response_deadline_days }} Tage |
                    | Art. 18 — Einschraenkung | "Marker"-Status mit eingeschraenkter Verarbeitbarkeit, ausser Speicherung | {{ gdpr.dsr_response_deadline_days }} Tage |
                    | Art. 19 — Mitteilungspflicht | Information aller Empfaenger ueber Berichtigung / Loeschung / Einschraenkung | unverzueglich |
                    | Art. 20 — Datenuebertragbarkeit | strukturiertes, gaengiges, maschinenlesbares Format (CSV, JSON); Direkt-Uebertragung wenn technisch moeglich | {{ gdpr.dsr_response_deadline_days }} Tage |
                    | Art. 21 — Widerspruch | gegen Verarbeitung auf Grundlage Art. 6 Abs. 1 lit. e oder f sowie immer gegen Direktwerbung | unverzueglich, max. {{ gdpr.dsr_response_deadline_days }} Tage |
                    | Art. 22 — Automatisierte Entscheidung | Recht auf Nicht-Unterwerfung, Eingreifen einer Person, Anhoerung, Anfechtung | {{ gdpr.dsr_response_deadline_days }} Tage |

                    ## 4. Annahmekanaele

                    Antraege werden ueber folgende Kanaele angenommen:

                    1. dediziertes Web-Formular auf der Tenant-Website (barrierefrei nach BITV 2.0);
                    2. dedizierte E-Mail-Adresse `datenschutz@<tenant-domain>` (DSB-Postfach von {{ roles.dpo.fullName }});
                    3. postalische Anschrift gemaess Datenschutzhinweis (Art. 37 Abs. 7 DSGVO);
                    4. telefonischer Erstkontakt mit Schriftform-Folgeschritt;
                    5. Antragsweiterleitung von Auftragsverarbeitern (Art. 28 Abs. 3 lit. e).

                    Eingangsbestaetigung erfolgt automatisch binnen 48 Stunden mit Vorgangsnummer.

                    ## 5. Identitaetspruefung (Art. 12 Abs. 6 DSGVO)

                    Bei begruendeten Zweifeln an der Identitaet des Antragstellers werden zusaetzliche Informationen angefordert. Verfahren:

                    1. **Niedrige Schwelle (Default)** — Abgleich der hinterlegten E-Mail-Adresse / Kundennummer / Versicherungsnummer.
                    2. **Mittlere Schwelle** — Anforderung einer beidseitigen Kopie eines amtlichen Ausweises mit geschwaerzten nicht-erforderlichen Feldern (Foto, Seriennummer); alternativ Video-Ident-Verfahren.
                    3. **Hohe Schwelle (besondere Kategorien / Loeschantrag)** — qualifizierte elektronische Signatur i.S.v. eIDAS oder Vor-Ort-Identifikation mit Ausweis.

                    Ueberhoehte Anforderungen sind unzulaessig (EDSA-Leitlinie 01/2022); die Identitaetspruefung darf den Antrag nicht faktisch vereiteln.

                    ## 6. SLA und Fristen (Art. 12 Abs. 3 + 4 DSGVO)

                    Die gesetzliche Standard-Frist betraegt einen Monat ab Eingang ({{ gdpr.dsr_response_deadline_days }} Kalendertage als organisationsinterne Auspraegung). Bei komplexen oder zahlreichen Antraegen kann die Frist um zwei weitere Monate verlaengert werden; die Verlaengerung wird dem Antragsteller binnen des ersten Monats unter Angabe der Gruende mitgeteilt. Wird einem Antrag nicht entsprochen, ist dies binnen eines Monats mit Begruendung sowie Hinweis auf Beschwerderecht bei der Aufsichtsbehoerde und Rechtsbehelf mitzuteilen.

                    ## 7. Ablehnungsgruende

                    Eine Ablehnung kommt nur in den folgenden Faellen in Betracht:

                    - **Offenkundig unbegruendet oder uebermaessig** (Art. 12 Abs. 5) — z. B. wiederholte Antraege ohne neue Sachlage; Beweislast bei der Organisation.
                    - **Beschraenkungen nach BDSG-neu §§ 32-37** — z. B. § 34 Abs. 1 Nr. 2 (Auskunft entfaellt bei unverhaeltnismaessigem Aufwand und Datensicherung-Zwecken); § 35 Abs. 1 (Loeschung entfaellt bei Aufbewahrungspflichten und ist durch Einschraenkung zu ersetzen).
                    - **Geheimhaltungspflichten** — z. B. § 203 StGB aerztliche Schweigepflicht; Bankgeheimnis.
                    - **Rechte Dritter** — Daten Dritter sind in Art.-15-Kopien zu schwaerzen.

                    Jede Ablehnung wird im Modul `DataSubjectRequest` mit Begruendung dokumentiert; der DSB pruegt die Ablehnungsentscheidung formal mit.

                    ## 8. Koordination mit operativen Teams

                    Antraege werden zentral durch den DSB {{ roles.dpo.fullName }} angenommen und an die jeweiligen Owner verteilt:

                    | Datenkategorie | Owner |
                    |---|---|
                    | HR-Daten | HR-Lead |
                    | Kundendaten / CRM | Kundenservice-Lead |
                    | Marketing-Daten | Marketing-Lead |
                    | IT-Logs / Authentication | IT-Operations / CISO {{ roles.ciso.fullName }} |
                    | Forschungsdaten | Forschungs-Lead / Ethik-Komitee |

                    Die Owner liefern die Daten innerhalb von 14 Kalendertagen an den DSB; der DSB konsolidiert und beantwortet.

                    ## 9. Auftragsverarbeiter-Beistand (Art. 28 Abs. 3 lit. e)

                    Auftragsverarbeiter sind im AVV verpflichtet, "den Verantwortlichen mit geeigneten technischen und organisatorischen Massnahmen dabei zu unterstuetzen, seinen Pflichten zur Beantwortung von Antraegen nachzukommen". SLA gegenueber Auftragsverarbeitern: 14 Kalendertage interner Antwortpflicht; Verstoesse fuehren zu vertraglichen Konsequenzen gemaess Lieferanten-Sicherheits-Richtlinie.

                    ## 10. Logging und Beweis

                    Jeder Antrag wird vollstaendig im Modul `DataSubjectRequest` dokumentiert: Eingang, Identitaetspruefung, Owner-Zuteilung, Bearbeitungsstand, Antwort, Ablehnungsgruende ggf. mit Beschwerde-Hinweis. Aufbewahrung: 3 Jahre nach Beantwortung als Beweis gegenueber Aufsichtsbehoerde und betroffenen Personen.

                    ## 11. Cross-References

                    - **ISO 27001:2022** A.5.34.
                    - **ISO 27701:2025** Cl. 7.3.1-7.3.10 (Verantwortlicher), Cl. 8.3 (Auftragsverarbeiter).
                    - **DSGVO** Art. 12-22, Art. 23 (Beschraenkungen), Art. 28 Abs. 3 lit. e.
                    - **BDSG-neu** §§ 32-37 (deutsche Modifikationen, insb. § 34 Auskunft, § 35 Loeschung).
                    - **EDSA-Leitlinie 01/2022** zu Betroffenenrechten / Auskunftsrecht.

                    ---

