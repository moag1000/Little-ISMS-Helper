        data_breach_notification_procedure:
            v1:
                title: 'Verfahren zur Meldung von Datenschutzverletzungen'
                body: |-
                    # Verfahren zur Meldung von Datenschutzverletzungen der {{ tenant.legal_name }}

                    *Dokumentenklasse: Verfahren | Norm-Anker: DSGVO Art. 33 (72h Aufsichtsbehoerde) + Art. 34 (Benachrichtigung Betroffener) + Art. 4 Nr. 12 / ISO 27701:2025 Cl. 6.13 und 7.2.7 / BDSG-neu § 65 / DORA Art. 19 | Sprache: Deutsch (Sie-Form, juristisch) | Pruefintervall: 12 Monate*

                    ## 1. Zweck

                    Dieses Verfahren regelt die Identifikation, Bewertung, Meldung und Dokumentation von Datenschutzverletzungen ("Personal Data Breaches") gemaess Art. 33 und 34 DSGVO. Es ist eng mit dem Sicherheitsvorfallsmanagement-Verfahren (ISO 27001 A.5.24-A.5.30) und ggf. dem DORA-Major-Incident-Verfahren (Art. 19 Verordnung (EU) 2022/2554) verzahnt; die Datenhaltung erfolgt im bestehenden Modul `DataBreach`.

                    ## 2. Definition (Art. 4 Nr. 12 DSGVO)

                    Eine Datenschutzverletzung ist "eine Verletzung der Sicherheit, die zur unbeabsichtigten oder unrechtmaessigen Vernichtung, zum Verlust, zur Veraenderung, zur unbefugten Offenlegung von oder zum unbefugten Zugang zu personenbezogenen Daten fuehrt, die uebermittelt, gespeichert oder auf sonstige Weise verarbeitet wurden". Erfasst sind alle drei klassischen Schutzziel-Verletzungen:

                    1. **Vertraulichkeitsverletzung** — unbefugte Offenlegung oder unbefugter Zugang;
                    2. **Integritaetsverletzung** — unbefugte Aenderung;
                    3. **Verfuegbarkeitsverletzung** — Verlust oder Vernichtung (auch unbeabsichtigt).

                    ## 3. Detektionskanaele und interne Meldung

                    Datenschutzverletzungen werden detektiert ueber:

                    - SIEM-Alerts und Monitoring-Tools (CISO-Bereich);
                    - Hinweise von Beschaeftigten ueber den dokumentierten Meldekanal gemaess A.6.8;
                    - Hinweise von Auftragsverarbeitern (Art. 33 Abs. 2 DSGVO);
                    - Hinweise betroffener Personen ueber den DSR-Kanal;
                    - externe Hinweise (Sicherheitsforscher, Strafverfolgungsbehoerden, Medien).

                    Interner Meldekanal: `breach@<tenant-domain>` (gemeinsames Postfach von DSB {{ roles.dpo.fullName }} und CISO {{ roles.ciso.fullName }}). Internes SLA: jede vermutete Verletzung wird binnen 24 Stunden nach Bemerken an den DSB gemeldet, um den 72h-Countdown des Art. 33 DSGVO anzulaufen lassen zu koennen.

                    ## 4. Bewertung der Risiken fuer Rechte und Freiheiten

                    Die Bewertung folgt EDSA-Leitlinie 9/2022 ("Notification of personal data breach under Regulation 2016/679"). Bewertungsachsen:

                    1. **Art der Verletzung** (Vertraulichkeit / Integritaet / Verfuegbarkeit);
                    2. **Art und Sensibilitaet der Daten** (besondere Kategorien Art. 9 / 10 — automatisch hoch);
                    3. **Volumen** (Anzahl Betroffener);
                    4. **Identifizierbarkeit** der Betroffenen aus den abgeflossenen Daten;
                    5. **Schwere der Konsequenzen** (Identitaetsdiebstahl, finanzieller Schaden, Diskriminierung, Reputationsschaden, Aufhebung der Pseudonymisierung);
                    6. **Eigenschaften der Betroffenen** (schutzbeduerftig: Kinder, Patienten, Beschaeftigte);
                    7. **Anzahl der Betroffenen** und **dauer der Exposition**.

                    Die Bewertung erfolgt durch den `GdprBreachAssessmentService` als Werkzeug-Unterstuetzung; finale Bewertung durch den DSB. Ergebnis: keine Meldepflicht / Meldung Art. 33 / Meldung Art. 33 + Art. 34.

                    ## 5. 72h-Frist (Art. 33 Abs. 1 DSGVO)

                    Die Frist beginnt mit "Becoming aware" — dem Zeitpunkt, an dem die Organisation eine angemessene Gewissheit ueber die Verletzung erhaelt, nicht der erste Verdachtsmoment (EDSA-Leitlinie 9/2022 Rn. 20-23). Konkrete Meilensteine:

                    | Stunde | Aktion |
                    |---|---|
                    | T + 0h | "Becoming aware" — DSB-Trigger; Workflow-Start im Modul `DataBreach` |
                    | T + 4h | erste Faktensicherung; Eindaemmungsmassnahmen aktiv |
                    | T + 24h | Risikobewertung erstes Ergebnis; CISO-Tech-Assessment |
                    | T + 48h | Entscheidung Meldepflicht Y/N; Vorbereitung Meldetext |
                    | T + 72h | Versand der Meldung an die federfuehrende Aufsichtsbehoerde (Art. 33 Abs. 1) |

                    Die Frist kann mit Begruendung ueberschritten werden, wenn "Verzoegerung gerechtfertigt" (Art. 33 Abs. 1 Satz 2); jede Verzoegerung wird im Modul `DataBreach` mit Begruendung dokumentiert. "Stop-the-Clock"-Bedingungen nach Art. 33 sind eng auszulegen.

                    ## 6. Inhalt der Meldung an die Aufsichtsbehoerde (Art. 33 Abs. 3)

                    Die Meldung enthaelt mindestens:

                    1. Beschreibung der Art der Verletzung, soweit moeglich Kategorien und ungefaehre Anzahl der betroffenen Personen, Kategorien und ungefaehre Anzahl der Datensaetze (lit. a);
                    2. Name und Kontaktdaten des Datenschutzbeauftragten oder einer anderen Anlaufstelle (lit. b) — {{ roles.dpo.fullName }};
                    3. Beschreibung der wahrscheinlichen Folgen (lit. c);
                    4. Beschreibung der ergriffenen oder vorgeschlagenen Massnahmen zur Behebung und Schadensbegrenzung (lit. d).

                    Sind nicht alle Informationen verfuegbar, erfolgt eine **erste Meldung** mit den verfuegbaren Daten und einer **Nachreichung** ohne unangemessene Verzoegerung (Art. 33 Abs. 4).

                    Uebermittlungskanal: das jeweilige Online-Portal der federfuehrenden Aufsichtsbehoerde (z. B. Online-Formular der BfDI, oder zustaendige Landes-DPA), als Backup verschluesselte E-Mail an die offizielle Meldeadresse.

                    ## 7. Benachrichtigung der Betroffenen (Art. 34 DSGVO)

                    Bei "voraussichtlich hohem Risiko fuer die Rechte und Freiheiten" der Betroffenen ist die zusaetzliche Benachrichtigung unverzueglich erforderlich. Inhalt nach Art. 34 Abs. 2:

                    - klare und einfache Sprache (kein Juristen-Deutsch);
                    - mindestens die Informationen aus Art. 33 Abs. 3 lit. b, c, d;
                    - praktische Empfehlungen fuer Selbstschutz (z. B. Passwort-Wechsel, Bonitaets-Monitoring).

                    Verzicht auf Einzelbenachrichtigung ist nur in den engen Faellen Art. 34 Abs. 3 zulaessig (technische Schutzmassnahmen wie Verschluesselung wirksam vor Vorfall; nachtraegliche Massnahmen senken Risiko; unverhaeltnismaessiger Aufwand → oeffentliche Bekanntmachung als Alternative).

                    ## 8. Dokumentationspflicht aller Verletzungen (Art. 33 Abs. 5)

                    **Auch nicht-meldepflichtige Datenschutzverletzungen werden dokumentiert** — Art. 33 Abs. 5 verlangt eine vollstaendige interne Dokumentation, die der Aufsichtsbehoerde die Pruefung der Einhaltung des Art. 33 ermoeglicht. Aufbewahrung im Modul `DataBreach` mindestens 7 Jahre.

                    ## 9. Cross-Regulatorische Meldepflicht-Matrix

                    | Regulatorik | Frist | Empfaenger |
                    |---|---|---|
                    | DSGVO Art. 33 | 72h ab Becoming-aware | federfuehrende DPA |
                    | DSGVO Art. 34 | unverzueglich (sofern Pflicht) | Betroffene |
                    | DORA Art. 19 (Finanzsektor) | 4h Initial / 72h Zwischen / 1 Monat Final | nationale FI-Behoerde + ESA |
                    | NIS2 Art. 23 (wesentliche/wichtige Einrichtungen) | 24h Frueh-Warnung / 72h Notifikation / 1 Monat Final | nationale CSIRT |
                    | TKG § 169 (Telekom-Diensteanbieter) | unverzueglich | BNetzA + Betroffene |
                    | sektoral (KRITIS, BaFin, AMG, etc.) | sektorspezifisch | Sektoraufsicht |

                    Die Erstellung paralleler Meldungen erfolgt aus der einen `DataBreach`-Akte heraus mit Re-Use der zentralen Felder; Doppelpflege ist verboten. **Cross-Reference zu DORA Art. 19**: Bei Finanzdienstleistern wird der DORA-ICT-Major-Incident-Workflow gleichzeitig getriggert; siehe ICT-Vorfalls-Verfahren.

                    ## 10. Gemeinsam-Verantwortliche-Koordination (Art. 26)

                    In Joint-Controllership-Konstellationen (Art. 26 DSGVO) regelt die Joint-Controllership-Vereinbarung, wer die Meldung an die Aufsichtsbehoerde abgibt und wer die Betroffenenbenachrichtigung uebernimmt. Default: federfuehrend ist der gemeinsam Verantwortliche, in dessen Sphaere die Verletzung primaer eintrat. Cross-Reference: Methodik zur gemeinsamen Verantwortlichkeit.

                    ## 11. Auftragsverarbeiter-Meldekette (Art. 33 Abs. 2)

                    Auftragsverarbeiter melden jede Verletzung "unverzueglich nach Bekanntwerden" an den Verantwortlichen. SLA gegenueber dem Auftragsverarbeiter im AVV: 24 Stunden ab Detektion. Sub-Auftragsverarbeiter melden ueber den Auftragsverarbeiter mit gleicher SLA. Verstoesse gegen die SLA fuehren zu vertraglichen Konsequenzen (siehe Lieferanten-Sicherheits-Richtlinie).

                    ## 12. Schnittstelle zu A.5.24-A.5.30 ISMS-Vorfallsmanagement

                    Jede Datenschutzverletzung ist gleichzeitig ein Sicherheitsvorfall i.S.v. ISO 27001:2022 A.5.24-A.5.30. Die `DataBreach`-Akte ist mit der `Incident`-Akte verknuepft (Modul-Ebene); Lessons Learned werden im post-incident Review (A.5.27) gemeinsam abgeleitet.

                    ## 13. Cross-References

                    - **ISO 27001:2022** A.5.34, A.5.24 (Planung Vorfaelle), A.5.25 (Bewertung), A.5.26 (Reaktion), A.5.27 (Lessons Learned), A.5.28 (Beweissammlung), A.5.29 (Geschaeftskontinuitaet), A.5.30 (IKT-Bereitschaft), A.6.8 (Meldekanal).
                    - **ISO 27701:2025** Cl. 6.13 (Personal Data Breach Response), Cl. 7.2.7.
                    - **DSGVO** Art. 33, Art. 34, Art. 4 Nr. 12, Art. 26 (joint), Art. 28 Abs. 3 lit. f (Auftragsverarbeiter-Beistand).
                    - **BDSG-neu** § 65 (oeffentliche Stellen).
                    - **DORA Art. 19** (Verordnung (EU) 2022/2554) — ICT-Major-Incident-Meldepflicht (4h / 72h / 1 Monat).
                    - **NIS2 Art. 23** (Richtlinie (EU) 2022/2555).
                    - **EDSA-Leitlinie 9/2022** zur Meldung personenbezogener Datenschutzverletzungen.

                    ---

                    *Genehmigt durch DPO {{ roles.dpo.fullName }} am [Datum] — DSB-Sign-off unabhaengig vom CISO-Sign-off; Top-Mgmt-Sign-off zwingend.*

                    *Genehmigungskette: {{ approval.chain }}*
