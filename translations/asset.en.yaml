  tooltip:
    acquisition_value: '<strong>Acquisition Value</strong><br>What did this asset
      cost when purchased/created?<br><br><em>Examples:</em><br>• Server: €10,000<br>•
      Laptop: €1,500<br>• Software license: €5,000/year'
    current_value: '<strong>Current Book Value</strong><br>What is the asset worth
      today? (after depreciation)<br><br><em>Examples:</em><br>• 3-year-old server:
      ~€3,000<br>• Fully depreciated hardware: €1'
    monetary_value: <strong>💰 Damage Value (IMPORTANT!)</strong><br>What would it
      cost if this asset fails or is compromised?<br><br><em>Consider:</em><br>• Production
      loss per hour<br>• Data loss costs<br>• Reputation damage<br>• Contract penalties<br><br><em>This
      value is used for risk assessment!</em>
    confidentiality: '<strong>🔒 Confidentiality</strong><br><em>Question: Who may
      see this data?</em><br><br><strong>1</strong> = Public (website, press releases)<br><strong>2</strong>
      = Internal (all employees)<br><strong>3</strong> = Confidential (specific departments
      only)<br><strong>4</strong> = Strictly confidential (few people only)<br><strong>5</strong>
      = Secret (personal data, trade secrets)<br><br><em>Tip: For personal data, at
      least 4</em>'
    integrity: '<strong>✓ Integrity</strong><br><em>Question: How bad would it be
      if data is wrong/manipulated?</em><br><br><strong>1</strong> = Doesn''t matter
      (drafts, notes)<br><strong>2</strong> = Annoying (internal docs)<br><strong>3</strong>
      = Problematic (reports, statistics)<br><strong>4</strong> = Serious (contracts,
      invoices)<br><strong>5</strong> = Catastrophic (financial data, medical records)<br><br><em>Tip:
      For accounting/finance, at least 4</em>'
    availability: '<strong>⏱ Availability</strong><br><em>Question: How long can this
      asset be down?</em><br><br><strong>1</strong> = Several days OK (archive, documentation)<br><strong>2</strong>
      = 1-2 days OK (internal tools)<br><strong>3</strong> = Few hours (email, intranet)<br><strong>4</strong>
      = Max 4 hours (core business)<br><strong>5</strong> = Not at all (production,
      customer service)<br><br><em>Tip: What happens if it fails Monday morning?</em>'
