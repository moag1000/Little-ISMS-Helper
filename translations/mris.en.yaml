mris:
    license:
        cc_by_40: "CC BY 4.0"
    baselines:
        explainer:
            summary: 'What does an MRIS baseline do?'
            intro: |
                An MRIS baseline is an <strong>industry-specific preset of maturity targets</strong>
                for the 13 Myth-Hardening Controls (MHC-01..13). Applied to a tenant it sets:
            point_target: 'a <strong>target maturity level</strong> per MHC (<code>initial</code> / <code>defined</code> / <code>managed</code>) — what the industry needs at minimum,'
            point_reason: 'a <strong>rationale</strong> why this level is relevant (regulation, risk landscape, typical threats),'
            point_preserve: '<strong>existing maturity assessments are preserved</strong> (<code>maturity_current</code> values are never overwritten).'
            example: '<strong>Example:</strong> <code>healthcare-provider</code> sets phishing-resistant MFA (MHC-03) to <code>managed</code> due to the 2024/25 ransomware wave, but multi-tenancy (MHC-07) only to <code>defined</code> because it is internal. After application, the SoA + maturity report shows the gap between actual (your assessment) and target (baseline) as a prioritised action list.'
    page:
        kpi_title: 'Mythos-relevant KPIs'
        kpi_intro: |
            Eight KPIs from MRIS v1.5 Ch. 10.6. Three are computed automatically
            from existing data, five require manual entry per tenant.
        source: 'Source: Peddi, R. (2026). MRIS — Mythos-resistente Informationssicherheit, v1.5. License: CC BY 4.0.'
    badge:
        auto: auto
        manual: manual
    state:
        no_data: '— no data —'
    kpi_help:
        manual_note: |
            The five manually-maintained KPIs (SBOM coverage, KEV patch latency,
            CCM coverage, crypto inventory coverage, TLPT findings closure) require
            external data sources. Manual entry fields are below.
    manual_form:
        title: 'Manual KPI values'
        save: 'Save values'
        intro: |
            Enter values as percent (0-100) or days. Leave empty = not maintained.
            Audit trail is recorded on save.
    ai_agent:
        dpia:
            section_title: 'DPIA Status (GDPR Art. 35 + AI Act Art. 9)'
            col_title: 'Title'
            col_status: 'Status'
            col_link: 'Action'
            open: 'Open'
            warning_missing: 'High-risk AI without DPIA — required under GDPR Art. 35 + AI Act Art. 9.'
            create_button: 'Create DPIA'
    audit_report:
        title: 'MRIS Audit Report'
        subtitle: 'Myth-Resistant Information Security · v1.5 — Auditor View'
        meta:
            tenant: 'Tenant'
            created_at: 'Created at'
            created_by: 'Created by'
            report_type: 'Report type'
            report_type_value: 'Audit Report (internal)'
            source_cc: 'Source (CC BY 4.0)'
            local: '(local)'
        section_1: '1. Mythos-Resilience-Indicator (MRI)'
        section_2: '2. Control Classification (4 Categories)'
        section_3: '3. "Pure Friction" Controls with Flanking MHCs'
        section_4: '4. MHC Maturity Status (Target / Actual / Delta)'
        section_5: '5. AI Agent Inventory (MHC-13 / EU AI Act / ISO 42001)'
        section_6: '6. Mythos-Relevant KPIs (MRIS Ch. 10.6)'
        section_2_intro: 'Distribution of Annex A controls per MRIS v1.5 Appendix A (Standfest / Partially Degraded / Pure Friction / Not Affected). Audit-relevant: Pure-Friction controls require flanking MHCs.'
        section_3_intro: 'The following controls are classified as friction per MRIS v1.5, i.e. they provide no direct protection contribution in the myth model. They must be substituted by flanking Myth-Hardening Controls (MHCs). Standard accompaniment per MRIS v1.5: A.5.25, A.5.36, A.8.8, A.8.23.'
        section_3_empty: 'No controls classified as "Pure Friction" (or MRIS classification not yet seeded).'
        section_4_intro: 'Maturity tracking per MRIS v1.5 Ch. 9.5. Levels: initial (1), defined (2), managed (3). Delta > 0 = gap to target. Delta = 0 = on target. Delta < 0 = target exceeded.'
        section_4_empty: 'No MRIS requirements found. Framework MRIS-v1.5 may not yet be loaded.'
        section_5_intro: 'Aggregate view of the AI agent inventory. Documentation completeness references the 9 EU-AI-Act / ISO-42001 / MHC-13 mandatory fields per agent.'
        section_6_intro: 'Eight KPIs per MRIS v1.5 Ch. 10.6. Three are automatically computable from existing data (MTTC, phishing-resistant MFA, restore test success rate) and include — where available — a sparkline of the last 90 days. Five are maintained manually (CRA, KEV, CCM, crypto inventory, TLPT reference).'
        disclaimer_label: 'Audit Disclaimer'
        score_label: 'MRI · 0–100 (internal)'
