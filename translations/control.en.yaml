    control_id: ISO 27001:2022 Annex A Control ID
    applicable_explained: "Applicability (ISO 27001 6.1.3 d): 'Applicable' = this control is relevant and MUST be implemented. 'Not applicable' = not relevant for your ISMS scope — justification in 'Justification' field is MANDATORY. Example: A.7.4 (Physical monitoring) may be 'not applicable' for a cloud-only company."
    implementation_status_explained: "Implementation status: not_started = not yet begun, planned = planned (deadline set), in_progress = being implemented (partially effective), implemented = fully implemented and effective, verified = confirmed effective through audit/testing. Note: Only 'applicable' controls count toward compliance percentage."
