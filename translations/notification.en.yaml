        low: 'Low'
        medium: 'Medium'
        high: 'High'
        critical: 'Critical'

    # Sprint 6b: Event type labels
    event_type:
        data_breach_created: 'Data breach: created'
        data_breach_severity_changed: 'Data breach: severity changed'
        incident_created: 'Incident: created'
        incident_severity_high: 'Incident: high/critical severity'
        risk_created: 'Risk: created'
        risk_score_critical: 'Risk: critical score'
        control_overdue: 'Control: overdue'
        control_evidence_expired: 'Control: evidence expired'
        audit_finding_created: 'Audit finding: created'
        document_approval_required: 'Document: approval required'

    # Sprint 6b: Condition builder
    condition:
        action:
            add: 'Add condition'
