# Notification domain — EN
# Sprint 6a: Backend error + audit-event labels.
# Sprint 6b: UI keys (rule CRUD, channel forms, bell center).

notification:
    rule:
        index:
            title: 'Notification Rules'
            subtitle: 'Rules define which events trigger a notification and over which channels.'
        show:
            title: 'View Rule'
            details: 'Rule Details'
            evaluation_log: 'Evaluation Log (last 10)'
            no_channels: 'No channels assigned'
            no_deliveries: 'No deliveries recorded for this rule yet.'
        new:
            title: 'New Notification Rule'
            subtitle: 'Define which event triggers a notification and choose the delivery channels.'
        edit:
            title: 'Edit Rule: %name%'
        empty:
            title: 'No rules yet'
            body: 'Create your first notification rule to get alerted about important events.'
        field:
            name: 'Name'
            event_type: 'Event type'
            severity_filter: 'Severity filter'
            channels: 'Notification channels'
            conditions: 'Additional conditions'
            is_active: 'Rule active'
            evaluation_count: 'Evaluations'
            created_at: 'Created'
            last_evaluated: 'Last evaluated'
        help:
            conditions: 'Optional extra conditions (field / operator / value). Empty = always fire.'
        action:
            new: 'New Rule'
            create: 'Create Rule'
        flash:
            created: 'Rule "%name%" has been created.'
            updated: 'Rule "%name%" has been updated.'
            deleted: 'Rule "%name%" has been deleted.'
        confirm:
            delete: 'Permanently delete this rule?'

    # Sprint 6b: Channel CRUD
    channel:
        index:
            title: 'Notification Channels'
            subtitle: 'Configure email, webhook, and in-app channels for outbound notifications.'
        new:
            title: 'New Notification Channel'
            subtitle: 'Set up a channel and verify its connectivity afterwards.'
        edit:
            title: 'Edit Channel: %name%'
        show:
            not_verified: 'Not verified'
            not_verified_hint: 'This channel has not been verified yet. Click "Verify" to test connectivity.'
            verified_at: 'Last verified: %date%'
        empty:
            title: 'No channels yet'
            body: 'Create a channel before configuring rules.'
        field:
            name: 'Channel name'
            type: 'Channel type'
            is_active: 'Channel active'
            verified_at: 'Verified'
        type:
            email: 'Email'
            webhook: 'Webhook'
            in_app: 'In-App'
        help:
            config_examples: 'Examples'
            config_email_example: '{"recipients": ["admin@example.com"], "from": "noreply@example.com"}'
            secret_edit_hint: 'Leave blank to keep the existing secret.'
        action:
            new: 'New Channel'
            create: 'Create Channel'
            verify: 'Verify'
        flash:
            created: 'Channel "%name%" has been created.'
            updated: 'Channel "%name%" has been updated.'
            deleted: 'Channel "%name%" has been deleted.'
            verified: 'Channel "%name%" has been marked as verified.'
        confirm:
            delete: 'Delete this channel? Associated rules will lose this channel.'

    # Sprint 6b: Delivery log fields
    delivery:
        field:
            channel: 'Channel'
            status: 'Status'
            attempted_at: 'Timestamp'
            retries: 'Retries'

