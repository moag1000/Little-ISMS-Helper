    template:
        index:
            title: 'Tier-1 Templates'
            subtitle: 'Pre-configured notification rules for common compliance scenarios. Apply and customise.'
        category:
            incident: 'Incidents'
            compliance: 'Compliance'
            sla: 'SLA Monitoring'
            privacy: 'Privacy'
        empty:
            title: 'No templates available'
            body: 'No global templates are available at the moment. Please contact an administrator.'
        action:
            apply: 'Apply'
            gallery: 'Template Gallery'
        flash:
            applied: 'Template "%template%" has been applied as a new rule. Please review and enable it.'
            no_tenant: 'No tenant assigned — template cannot be applied.'
        desc:
            incident_high_severity: 'Fires immediately for incidents with High or Critical severity.'
            data_breach_72h: 'Notifies within 72 hours of a data breach discovery per GDPR Art. 33.'
            risk_critical: 'Alerts when a risk crosses the critical score threshold.'
            control_overdue: 'Reminds about overdue control evidence submissions.'
            document_approval: 'Informs approvers about pending document approvals.'
            audit_finding: 'Reports new audit findings to responsible parties.'

    # Sprint 6b: Bell
    bell:
        label: 'Notifications'
        mark_all_read: 'Mark all as read'
        view_all: 'View all'
        no_new: 'No new notifications'
        marked_all_read: 'All notifications marked as read.'

