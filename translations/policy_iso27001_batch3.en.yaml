policy:
    iso27001:
        # =====================================================================
        # 1. Secure Development Policy (A.8.25-A.8.30)
        # =====================================================================
        secure_development:
            v1:
                title: 'Secure Development Policy'
                body: |
                    # Secure Development Policy — {{ tenant.legal_name }}

                    ## 1. Purpose and Scope
                    This policy establishes binding rules for the secure development of software and systems at {{ tenant.legal_name }}. It implements ISO/IEC 27002:2022 §8.25, which requires: *"Rules for the secure development of software and systems shall be established and applied."* It also covers Annex A controls A.8.26 (Application security requirements), A.8.27 (Secure system architecture and engineering principles), A.8.28 (Secure coding), A.8.29 (Security testing in development and acceptance), A.8.30 (Outsourced development) as well as A.8.31 (Separation of development, test and production environments).

                    The policy applies to all in-house, joint and outsourced development activities — from initial idea to decommissioning. It addresses developers, architects, product owners, business sponsors, external development service providers and the CISO office under the responsibility of {{ roles.ciso.fullName }}.

                    ## 2. Secure Development Lifecycle (SDLC)
                    The full lifecycle follows defined stage-gates with mandatory security checks. Every initiative passes through at least the phases of requirements, design, implementation, test, release, operation and decommissioning. A phase may only be closed when the assigned security quality gates have been satisfied. Initiatives above the threshold {{ project.security_review_threshold }} undergo a formal architecture and security review.

                    ## 3. Threat Modelling and Security Requirements
                    For every new system as well as for material changes, threat modelling based on a recognised method (STRIDE, LINDDUN, PASTA) is mandatory. Security requirements are gathered, documented and traced together with functional requirements. Applicable regulatory requirements (EU GDPR, EU DORA, NIS2, sector-specific obligations) must be considered and fed into the risk assessment.

                    ## 4. Secure Architecture and Engineering Principles
                    Architectures follow the principles of Defense in Depth, Least Privilege, Zero Trust, Fail Secure, Separation of Concerns and Privacy and Security by Design and by Default. Third-party and open-source components are assessed prior to use against licence, maturity and security track record.

                    ## 5. Secure Coding
                    OWASP ASVS Level 2 is the minimum baseline together with language- and framework-specific coding guidelines (CERT, OWASP Cheat Sheets, linter configurations). Hardcoded secrets are prohibited; secrets are obtained via the central secrets management. Cryptographic mechanisms align with the Cryptography Policy. Code review by a second person is mandatory for every change targeting production-relevant branches (four-eyes principle).

                    ## 6. Security Testing
                    Static Application Security Testing (SAST), Software Composition Analysis (SCA) for dependencies and Dynamic Application Security Testing (DAST) for externally exposed applications are mandatory. Penetration tests by independent parties are performed at least annually for critical applications and after material changes. All findings of high severity or above must be remediated before go-live or covered by a documented risk acceptance with compensating measures.

                    ## 7. Environment Separation (A.8.31)
                    Development, test, staging and production environments are logically and (where appropriate) physically separated. Production data must not leave production; non-production environments use anonymised or synthetic data. Access rights are minimised per environment and reviewed regularly under the Access Control Policy.

                    ## 8. Outsourced Development (A.8.30)
                    External development partners are qualified under the Supplier Security Policy. Contracts include binding security requirements, audit and inspection rights, source-code escrow provisions where appropriate, and defined hand-over and acceptance processes. Delivered work passes the same security tests as internal development.

                    ## 9. Change Management and Release
                    Production deployments are made exclusively through the documented change process with approval by the change advisory board or a delegated body. An emergency change path is defined; downstream reviews within five business days are mandatory. Rollback strategies are documented per system; a fall-back option is a precondition for every production deployment of critical systems.

                    ## 10. Vulnerability and Patch Management in the Development Context
                    Disclosed vulnerabilities in own components and in dependencies are handled under the Vulnerability and Patch Management Policy. For components handling sensitive data, patch SLAs by CVSS severity are binding (critical within 7 days, high within 30 days). A Software Bill of Materials (SBOM) is produced and archived per release; it supports response to third-party vulnerabilities.

                    ## 11. Security Training
                    Developers receive role-based security training at least annually with focus on OWASP Top 10, secure authentication, cryptography, secrets management and secure API design. New joiners receive an onboarding training within their first 30 days. Training is logged and forms part of compliance evidence.

                    ## 12. Roles and Responsibilities
                    {{ roles.ciso.fullName }} (CISO) owns this policy. Engineering managers are responsible for implementation in their teams. Product owners are responsible for security requirements per product. The security team provides tooling, training and consulting. Application Security Champions in the engineering teams support operational implementation.

                    ## 13. Measurement and Metrics
                    The effectiveness of this policy is measured through metrics including: share of releases with successful SAST run, Mean Time to Remediate (MTTR) by severity, pen-test coverage of critical applications, number of security findings per 1000 lines of code. Metrics are reported quarterly to executive management.

                    ## 14. Enforcement, Review and Sanctions
                    Violations are handled under the disciplinary process (A.6.4). This policy is reviewed at least annually and on material changes to the development model. Deviations must be applied for formally via the risk-acceptance process and approved by the CISO office.
                section:
                    1:
                        title: 'Purpose and Scope'
                        body: 'Binding rules implementing ISO 27002:2022 §8.25 and A.8.26-A.8.31 at {{ tenant.legal_name }}.'
                    2:
                        title: 'Secure SDLC and Stage-Gates'
                        body: 'Defined phases, security quality gates, threat modelling and formal reviews above threshold {{ project.security_review_threshold }}.'
                    3:
                        title: 'Secure Coding and Testing'
                        body: 'OWASP ASVS Level 2, four-eyes code reviews, SAST, SCA, DAST, annual pen-tests for critical applications.'
                    4:
                        title: 'Environment Separation and Outsourced Development'
                        body: 'Dev/test/stage/prod separation per A.8.31, anonymised test data, contractual security requirements for external developers per A.8.30.'
                    5:
                        title: 'Roles, Review and Enforcement'
                        body: 'CISO {{ roles.ciso.fullName }} owns the policy. Annual review. Deviations via risk-acceptance process.'
                tailoring_field:
                    1:
                        label: 'SAST/DAST/SCA tooling in use'
                        placeholder: 'e.g. SonarQube, OWASP ZAP, Dependency-Track'
                    2:
                        label: 'Pen-test cadence for critical applications'
                        placeholder: 'e.g. annual + after each major release'
                    3:
                        label: 'Threshold for formal architecture review'
                        placeholder: 'e.g. >50 person-days effort or high protection need'

        # =====================================================================
        # 2. Supplier Security Policy (A.5.19-A.5.22)
        # =====================================================================
        supplier_security:
            v1:
                title: 'Supplier Security Policy'
                body: |
                    # Supplier Security Policy — {{ tenant.legal_name }}

                    ## 1. Purpose and Scope
                    This policy governs the management of information security risks arising from the use of supplier products and services at {{ tenant.legal_name }}. It implements ISO/IEC 27002:2022 §5.19, which requires: *"Processes and procedures shall be defined and implemented to manage the information security risks associated with the use of suppliers' products or services."* It covers A.5.19 to A.5.22 as well as A.5.23 (Cloud Services) and integrates the requirements of GDPR Art. 28 (processor obligations) and EU DORA Art. 28-30 (ICT third-party risk management).

                    The policy applies to all suppliers and service providers that supply, process or support information assets or ICT services for {{ tenant.legal_name }} — including cloud, SaaS, outsourcing and consulting providers as well as their subcontractors (Nth-party).

                    ## 2. Supplier Classification
                    All suppliers are classified into criticality tiers: {{ supplier.criticality_levels }}. Classification considers protection need of the data/services provided, substitutability, dependence of critical business processes and regulatory classification (e.g. "critical ICT third-party service provider" per DORA Art. 31). Classification is reviewed at least annually and on material changes.

                    ## 3. Onboarding and Due Diligence
                    Prior to contract signature suppliers go through a tiered due diligence procedure. Depending on criticality, the following are required: standardised security questionnaire, review of certificates (ISO 27001, SOC 2 Type II, C5, sector-specific evidence), and for critical suppliers additionally an on-site audit or independent attestation. Adverse findings require documented risk treatment before engagement.

                    ## 4. Contractual Requirements (A.5.20)
                    Supplier contracts contain as a minimum: confidentiality and non-disclosure obligations, information-security requirements aligned to protection need, audit and inspection rights, sub-processor approval requirements, security-incident notification obligations including timelines, data-return and deletion obligations on termination, and liability and escalation provisions.

                    Where personal data are processed, a data-processing agreement under GDPR Art. 28 is mandatory and must specify processing purpose, data categories, technical and organisational measures, and sub-processor arrangements among others. {{ roles.dpo.fullName }} (Data Protection Officer) reviews data-processing agreements before signature.

                    ## 5. DORA-Specific Requirements
                    Where {{ tenant.legal_name }} is in scope of EU DORA Regulation (EU) 2022/2554, the following also apply: full registration of all ICT third-party service providers in the Register of Information per DORA Art. 28(3) including concentration-risk analysis, mandatory contractual clauses per DORA Art. 30, documented exit strategies for critical services, and sub-supplier transparency down to Nth-party. Engagements with critical ICT third-party providers are notified to the competent supervisory authority in good time.

                    ## 6. Supply Chain and Sub-Suppliers (A.5.21)
                    Sub-suppliers may only be engaged with prior written approval. Suppliers undertake to manage their own supply chain to equivalent standards. For critical services the supply chain must be mapped at least two tiers deep.

                    ## 7. Ongoing Monitoring (A.5.22)
                    During the relationship, monitoring is conducted commensurate with criticality: review of service reports and SLAs, annual re-assessments, ad-hoc reviews on incidents, contract changes or regulatory changes. Material deficiencies are escalated formally and entered in the risk register.

                    ## 8. Supplier Security Incidents
                    Suppliers report security incidents that may affect {{ tenant.legal_name }} without undue delay — for critical incidents within the contractually agreed deadline. Incoming reports are handled under the Incident Management Policy; data-protection incidents are additionally escalated to {{ roles.dpo.fullName }}.

                    ## 9. Exit and Termination
                    For critical suppliers documented exit strategies exist with migration plan, data-return and deletion arrangements, knowledge transfer and emergency exit options. Exit strategies are tested or plausibility-checked at least annually. For DORA-scope services the exit strategy must enable orderly migration without disruption to critical business functions (DORA Art. 28(8)).

                    ## 10. Cloud Services (A.5.23)
                    Cloud services are additionally evaluated by deployment model (IaaS, PaaS, SaaS) and the shared-responsibility model. Configuration security, tenant isolation, encryption at rest and in transit, key management and data-residency are documented. Where personal data are processed in third countries, appropriate safeguards under GDPR Chapter V (in particular Standard Contractual Clauses, Transfer Impact Assessment) are ensured.

                    ## 11. Roles and Responsibilities
                    {{ roles.ciso.fullName }} (CISO) owns the security aspects of this policy. Procurement owns the contractual process. Contract owners per supplier own ongoing monitoring. {{ roles.dpo.fullName }} owns data-protection aspects. In case of breaches, the compliance committee decides on measures up to and including contract termination. A central supplier database serves as single source of truth.

                    ## 12. Training and Awareness
                    Contract owners and procurement staff receive at least annual training on security requirements, data-processing agreements and DORA obligations. Training is documented and is a precondition for operational responsibility.

                    ## 13. Review
                    This policy is reviewed at least annually and on changes to the supplier portfolio or regulatory environment. Triggers for ad-hoc review include: a critical security incident at a supplier, a new regulatory requirement, material contract amendments with a critical supplier, escalations from concentration-risk monitoring.
                section:
                    1:
                        title: 'Purpose, Scope and Classification'
                        body: 'Implementation of ISO 27002:2022 §5.19, GDPR Art. 28 and DORA Art. 28-30. Classification into {{ supplier.criticality_levels }}.'
                    2:
                        title: 'Onboarding, Due Diligence and Contracts'
                        body: 'Tiered review, security questionnaires, certificate evidence. Minimum contractual clauses including data-processing agreement for personal data.'
                    3:
                        title: 'DORA Register and Sub-Suppliers'
                        body: 'Register of Information for ICT third parties, concentration-risk analysis, DORA Art. 30 minimum clauses, sub-processor approval requirement.'
                    4:
                        title: 'Monitoring, Incidents and Exit'
                        body: 'Ongoing monitoring by criticality, defined notification obligations, documented exit strategies for critical services.'
                    5:
                        title: 'Roles and Review'
                        body: 'CISO {{ roles.ciso.fullName }} and DPO {{ roles.dpo.fullName }} steer the policy. Annual review.'
                tailoring_field:
                    1:
                        label: 'Supplier criticality tiers in use'
                        placeholder: 'e.g. critical / important / standard'
                    2:
                        label: 'Maximum notification deadline for supplier security incidents'
                        placeholder: 'e.g. 24 hours for critical suppliers'
                    3:
                        label: 'Exit-test cadence for critical ICT third parties'
                        placeholder: 'e.g. annual tabletop, full test every 3 years'

        # =====================================================================
        # 3. Information Security in Project Management (A.5.8)
        # =====================================================================
        project_management:
            v1:
                title: 'Information Security in Project Management Policy'
                body: |
                    # Information Security in Project Management — {{ tenant.legal_name }}

                    ## 1. Purpose and Scope
                    This policy integrates information security as a binding element into all project types at {{ tenant.legal_name }}. It implements ISO/IEC 27002:2022 §5.8, which requires: *"Information security shall be integrated into project management."* It applies to all projects regardless of delivery model (waterfall, agile, hybrid), regardless of business unit, and regardless of whether the project is internal, external or mixed.

                    The policy covers IT and software projects as well as business and organisational projects, where they may affect information assets, processing activities or ISMS protection objectives.

                    ## 2. Security Stage-Gate Model
                    Every project passes defined security stage-gates whose depth scales with project size and risk. Initiatives above the threshold {{ project.security_review_threshold }} undergo a formal security review; smaller initiatives follow a lean self-assessment path.

                    Stage-gates are:
                    - Initiation: preliminary protection-need classification, identification of regulatory drivers (GDPR, DORA, NIS2, sector-specific).
                    - Concept: detailed protection-need analysis, risk assessment, definition of security requirements, clarification of processing relationships and third-country transfers.
                    - Realisation: implementation of security requirements, involvement of the security team in architectural decisions.
                    - Test/Acceptance: security testing per the Secure Development Policy, pen-tests for critical initiatives.
                    - Go-live: formal security release by the CISO office prior to commissioning.
                    - Hypercare/Hand-over: transition to line operations with security run-books.

                    ## 3. Project-Level Security Requirements
                    At project initiation the project lead, jointly with the security representative, produces a structured security-requirements list based on protection need of the information involved (confidentiality/integrity/availability), regulatory requirements, threat landscape and applicable Annex A controls. The list is part of project documentation and is tracked through delivery.

                    ## 4. Data Protection in the Project
                    Where personal data are processed, {{ roles.dpo.fullName }} (DPO) is involved early. The DPO decides on the need for a Data Protection Impact Assessment under GDPR Art. 35. A DPIA must be completed before commissioning.

                    ## 5. Risk Assessment and Escalation
                    Identified risks above the risk acceptance threshold are entered in the central risk register and assigned to the responsible risk owner. Risks rated High or Very High require explicit acceptance by executive management before go-live.

                    ## 6. External Project Staff and Suppliers
                    External project staff and suppliers are qualified under the Supplier Security Policy and bound by contract. Confidentiality undertakings are mandatory before project access is granted.

                    ## 7. Project Documentation and Hand-over
                    Security-relevant decisions, risk acceptances, controls implemented and open items are documented traceably in project records. On hand-over to operations the asset inventory, authorisation model, run-books and open risks are transferred in full.

                    ## 8. Roles and Responsibilities
                    The project lead is responsible for adherence to this policy in the project. The CISO office under {{ roles.ciso.fullName }} provides advice, templates and release decisions. The project sponsor owns material risk acceptances. The DPO {{ roles.dpo.fullName }} owns data-protection aspects.

                    ## 9. Protection Need Analysis
                    Protection-need analysis covers confidentiality, integrity and availability in the levels normal, high and very high. Where protection need is very high in any objective, a risk analysis under ISO 27005 is mandatory. Results inform the selection of applicable Annex A controls and the definition of technical and organisational measures.

                    ## 10. Agile Projects
                    In agile delivery, security quality gates are decomposed onto sprint, increment and release level. Security requirements appear as backlog items with explicit acceptance criteria. Status is made visible at every sprint review. The Definition of Done explicitly includes security acceptance criteria for affected user stories.

                    ## 11. Deviations and Escalation
                    Deviations from this policy must be applied for formally via the risk-acceptance process and approved by the CISO office. Unapproved deviations constitute violations as defined by the top-level Information Security Policy. Escalation paths are defined; every initiative has a clearly named security responsible.

                    ## 12. Reporting and Metrics
                    The status of security quality gates is carried in standard project reporting. Trend metrics — including number of initiatives with critical findings prior to go-live, share of DPIAs completed on time, share of security releases granted on time — are reported quarterly to executive management.

                    ## 13. Enforcement and Review
                    This policy is reviewed at least annually and on a change of project-management framework. Where regulatory changes affect project work materially (e.g. EU AI Act, EU Cyber Resilience Act), an ad-hoc adjustment is performed.
                section:
                    1:
                        title: 'Purpose and Scope'
                        body: 'Binding integration of information security into all project types per ISO 27002:2022 §5.8.'
                    2:
                        title: 'Stage-Gate Model and Threshold'
                        body: 'Defined security quality gates from initiation to go-live. Formal reviews above threshold {{ project.security_review_threshold }}.'
                    3:
                        title: 'Security and Data-Protection Requirements'
                        body: 'Structured requirements gathering. Early DPO involvement {{ roles.dpo.fullName }}, mandatory DPIA check per GDPR Art. 35.'
                    4:
                        title: 'Risk, External Staff and Hand-over'
                        body: 'Risk escalation to risk register, supplier obligations, complete hand-over to operations.'
                    5:
                        title: 'Roles, Deviations and Review'
                        body: 'Project lead owns implementation, CISO {{ roles.ciso.fullName }} owns release. Annual review.'
                tailoring_field:
                    1:
                        label: 'Project management framework'
                        placeholder: 'e.g. Scrum, PRINCE2, hybrid model'
                    2:
                        label: 'Threshold for formal security review'
                        placeholder: 'e.g. above 100 person-days or high protection need'
                    3:
                        label: 'Release authority for go-live'
                        placeholder: 'e.g. CISO office four-eyes with business unit lead'

        # =====================================================================
        # 4. Privacy / PII Handling Policy (A.5.34) — short host policy
        # =====================================================================
        privacy:
            v1:
                title: 'Privacy and PII Protection Policy'
                body: |
                    # Privacy and PII Protection Policy — {{ tenant.legal_name }}

                    ## 1. Purpose and Anchor
                    This policy implements ISO/IEC 27002:2022 §5.34, which requires: *"The organization shall identify and meet the requirements regarding the preservation of privacy and protection of PII according to applicable laws and regulations and contractual requirements."* It commits {{ tenant.legal_name }} to compliance with the GDPR (Regulation (EU) 2016/679), the German Federal Data Protection Act (BDSG) and any other applicable data-protection laws.

                    ## 2. Document Structure Note
                    This policy is intentionally a concise overview and reference document (host policy). Operational data-protection rules live in dedicated documents that this policy references. Where the ISO 27701 (PIMS) or GDPR extension modules are active, those documents are binding and this policy steps back as subsidiary.

                    ## 3. Scope and Roles
                    The policy applies to all processing of personal data under the responsibility of {{ tenant.legal_name }} — as controller or processor. {{ roles.dpo.fullName }} (Data Protection Officer) is the central point of contact and oversees compliance. {{ roles.ciso.fullName }} (CISO) owns the technical and organisational measures.

                    ## 4. References to Operational Documents
                    The following documents detail this policy:
                    - **Privacy Policy** — detailed rules on purposes, legal bases, data-subject rights and international transfers. *(linked once the privacy module is active.)*
                    - **RoPA Methodology** — methodology for maintaining the Records of Processing Activities under GDPR Art. 30. *(linked once the privacy module is active.)*
                    - **DPIA Methodology** — methodology for Data Protection Impact Assessments under GDPR Art. 35/36. *(linked once the privacy module is active.)*
                    - **Data Processing Agreement Templates** — standard clauses and review process for processor contracts under GDPR Art. 28.

                    ## 5. Minimum Requirements Independent of Module Status
                    Even without active ISO 27701 or GDPR modules the following are binding:
                    - Processing of personal data only on a valid legal basis (GDPR Art. 6, where applicable Art. 9).
                    - Honouring data-subject rights (GDPR Art. 12-22), processing time per GDPR Art. 12 generally one month.
                    - Security of processing per GDPR Art. 32 commensurate with the protection need.
                    - Notification of personal-data breaches to the supervisory authority within 72 hours per GDPR Art. 33; communication to data subjects per Art. 34 where high risk exists.
                    - Processors are qualified under the Supplier Security Policy; data-processing agreements per GDPR Art. 28 are mandatory.
                    - Data protection by design and by default per GDPR Art. 25.

                    ## 6. Interfaces with Information Security
                    Personal-data breaches are security incidents and are handled under the Incident Management Policy. Data classification follows the Classification Policy. Access rights follow the Access Control Policy. This policy is a logical bracket, not a substitute.

                    ## 7. Review
                    This policy is reviewed at least annually and on material regulatory change (e.g. EU AI Act, ePrivacy reform) by {{ roles.dpo.fullName }}.
                section:
                    1:
                        title: 'Purpose and Reference Character'
                        body: 'Host policy for ISO 27002:2022 §5.34. Operational rules in dedicated Privacy, RoPA and DPIA documents.'
                    2:
                        title: 'Roles'
                        body: 'DPO {{ roles.dpo.fullName }} and CISO {{ roles.ciso.fullName }} steer privacy and technical-organisational measures.'
                    3:
                        title: 'Minimum Requirements'
                        body: 'Legal basis, data-subject rights, 72-hour notification per GDPR Art. 33, GDPR Art. 28 processor agreements, privacy by design per GDPR Art. 25.'
                    4:
                        title: 'Interfaces and Review'
                        body: 'Interlocked with Incident, Classification and Access Control Policies. Annual review by DPO.'
                tailoring_field:
                    1:
                        label: 'Status of GDPR / ISO 27701 module'
                        placeholder: 'e.g. ISO 27701 active; detailed rules in PIMS'
                    2:
                        label: 'Reference to central data-protection documentation'
                        placeholder: 'e.g. Privacy Handbook v2.1, DMS path'
                    3:
                        label: 'Competent data-protection supervisory authority'
                        placeholder: 'e.g. LfDI Baden-Wuerttemberg'

        # =====================================================================
        # 5. Information Security Incident Management Policy (A.5.24-A.5.28)
        # =====================================================================
        incident_management:
            v1:
                title: 'Information Security Incident Management Policy'
                body: |
                    # Information Security Incident Management Policy — {{ tenant.legal_name }}

                    ## 1. Purpose and Scope
                    This policy implements ISO/IEC 27002:2022 §5.24, which requires: *"The organization shall plan and prepare for managing information security incidents by defining, establishing and communicating information security incident management processes, roles and responsibilities."* It covers A.5.24 to A.5.28, A.6.8 (Reporting), A.5.5 (Contact with authorities) and A.5.6 (Special interest groups), and integrates the requirements of GDPR Art. 33 and 34, EU DORA Art. 17-23 and NIS2 (Directive (EU) 2022/2555).

                    The policy applies to all security events and incidents that affect information assets or ICT services of {{ tenant.legal_name }}, including incidents at suppliers and cloud providers where they affect {{ tenant.legal_name }}.

                    ## 2. Definitions and Classification
                    A **security event** is an identified occurrence that may affect the protection objectives of confidentiality, integrity, availability or authenticity. A **security incident** is a confirmed event with actual or potential adverse impact. Incidents are classified as low, medium, high or critical — criteria are impact on business processes, affected data/systems, number of affected individuals and regulatory relevance.

                    ## 3. Preparation (A.5.24)
                    {{ tenant.legal_name }} maintains a trained Incident Response Team led by {{ roles.ciso.fullName }} (CISO). The team comprises representatives from security, IT operations, legal/compliance, data protection, communications and executive management. Run-books for relevant incident patterns (ransomware, data exfiltration, DDoS, phishing wave, cloud-account take-over, zero-day) are documented and exercised regularly. 24/7 reachability is ensured through an on-call rota.

                    ## 4. Detection and Reporting (A.6.8)
                    Personnel are obliged to report suspected security events without undue delay through the established channels (helpdesk, security hotline, reporting form). Anonymous reporting is possible. External reports (suppliers, customers, authorities, security researchers) are also accepted and processed. SIEM and monitoring systems generate automated alerts.

                    ## 5. Assessment and Decision (A.5.25)
                    Inbound events are triaged, classified and either escalated as incidents or documented as false alarms by the security team. Assessment criteria are documented; triage follows defined response service levels. Critical incidents are initially assessed within {{ incident.sla_critical_hours }} hours of detection.

                    ## 6. Response (A.5.26)
                    Response follows the phases containment, evidence preservation, eradication, recovery and follow-up. Actions are recorded continuously in an incident log. For critical incidents a war room is activated; executive management is informed without undue delay. External specialists (forensics, legal, crisis communication) are engaged as required.

                    ## 7. Regulatory Notification Obligations
                    The following notification obligations must be assessed and complied with:
                    - **GDPR Art. 33**: notification of personal-data breaches to the supervisory authority within 72 hours of becoming aware. Where high risk exists, additional communication to data subjects per Art. 34. Lead: {{ roles.dpo.fullName }}.
                    - **EU DORA Art. 17-23**: for entities in DORA scope — initial notification of major ICT-related incidents within 4 hours of classification, intermediate report within 72 hours, final report within one month. Lead: CISO office.
                    - **NIS2 (Directive (EU) 2022/2555)**: for entities in NIS2 scope — early warning within 24 hours, incident notification within 72 hours, final report within one month.
                    - **Sector-specific notification obligations** (e.g. BaFin, BNetzA, BSI) are assessed per business model.

                    Responsibility for correct and timely notification rests with the CISO office in coordination with legal/compliance and {{ roles.dpo.fullName }}.

                    ## 8. Evidence Collection (A.5.28)
                    Evidence is preserved according to forensic principles: integrity preservation (hash values), continuous chain of custody, write-protected storage, time-stamps from a synchronised clock source. Evidence handling preserves admissibility in civil, criminal and labour-law proceedings.

                    ## 9. Lessons Learned (A.5.27)
                    After every incident of medium severity or above a formal post-incident review is performed. Findings feed into run-books, training, the risk register and, where appropriate, control adjustments. Trends are addressed in the quarterly report to executive management.

                    ## 10. External Communication
                    Public communication on incidents is handled exclusively through corporate communications in coordination with executive management, legal and the CISO office. Personnel are bound to confidentiality towards external parties.

                    ## 11. Exercises and Testing
                    The Incident Response Team performs tabletop exercises at least annually covering typical scenarios (ransomware, data exfiltration, cloud-account take-over). At least every two years a full crisis-management exercise involving executive management is performed. Outcomes feed into run-books, training and the risk register.

                    ## 12. Interfaces with BCM and Crisis Management
                    Where incidents affect critical business processes, the BCM crisis-management structure is activated. Hand-over from incident management to BCM/crisis management follows documented escalation criteria. Responsibilities and interfaces are clearly defined in the relevant run-books.

                    ## 13. Whistleblower Protection and Anonymous Reporting
                    Reporters are protected from retaliation. Anonymous reporting channels are provided and made known to all personnel. Anonymous reports are processed under the same triage and response standards as identified ones.

                    ## 14. Roles and Responsibilities
                    {{ roles.ciso.fullName }} (CISO) owns this policy and leads the Incident Response Team. {{ roles.dpo.fullName }} (DPO) owns data-protection notification obligations. Executive management owns strategic decisions and external communication on critical incidents. Legal/compliance owns the assessment of regulatory notification obligations. IT operations owns operational containment and recovery.

                    ## 15. Metrics
                    Effectiveness and maturity of incident management are measured through metrics including: Mean Time to Detect (MTTD), Mean Time to Respond (MTTR), share of timely regulatory notifications, share of incidents with completed lessons-learned, recurrence rate of comparable incidents. Metrics are reported quarterly to executive management.

                    ## 16. Enforcement and Review
                    This policy is reviewed at least annually and after every critical incident. Where regulatory changes are material (e.g. new DORA technical standards, NIS2 implementing acts), an ad-hoc review is performed.
                section:
                    1:
                        title: 'Purpose and Classification'
                        body: 'Implementation of ISO 27002:2022 §5.24-§5.28 and GDPR Art. 33/34, DORA Art. 17-23 and NIS2.'
                    2:
                        title: 'Preparation and Detection'
                        body: 'Trained IRT under CISO {{ roles.ciso.fullName }}, 24/7 rota, run-books, mandatory event reporting per A.6.8.'
                    3:
                        title: 'Assessment and Response'
                        body: 'Triage per SLA, response in containment-eradication-recovery phases. Initial assessment of critical incidents within {{ incident.sla_critical_hours }} hours.'
                    4:
                        title: 'Regulatory Notifications and Evidence'
                        body: 'GDPR 72h, DORA 4/72h/1mth, NIS2 24/72h/1mth. Forensic evidence preservation with chain of custody.'
                    5:
                        title: 'Lessons Learned and Review'
                        body: 'Post-incident review mandatory from severity Medium, annual review of the policy and after critical incidents.'
                tailoring_field:
                    1:
                        label: 'SLA for initial assessment of critical incidents'
                        placeholder: 'e.g. 1 hour'
                    2:
                        label: 'Applicable regulatory notification obligations'
                        placeholder: 'e.g. GDPR + DORA + BaFin MaRisk AT 7.2'
                    3:
                        label: 'War-room activation threshold'
                        placeholder: 'e.g. severity High or >100 affected'
