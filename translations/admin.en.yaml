        subtitle: 'Control the maximum number of API requests allowed per minute for this tenant.'
        help_text: 'Rate limits protect the platform against abuse and ensure fair resource sharing. Set to 0 to disable rate limiting (not recommended in production).'
        rate_limit_per_minute:
            label: 'Requests per minute'
            help: '0 = unlimited. 600 = 10 requests/second. Default for fair multi-tenant operation.'
        burst_limit:
            label: 'Burst limit'
            help: 'Allow this many requests immediately before throttling begins. Useful for clients that batch requests at startup.'
        exclude_routes_regex:
            label: 'Exclude routes (regex)'
            help: 'Regular expression matching route paths that are exempt from rate limiting (e.g. health-check, metrics). Leave empty to apply limits globally.'

    # ── Backup Settings ───────────────────────────────────────────────────────────
    backups:
        title: 'Backup Settings'
        subtitle: 'Configure automated backup schedule and data retention.'
        help_text: 'These settings control how long backup files are kept and whether automated backups run on a schedule. The "Run now" trigger and Messenger dispatch are coming in Wave 2.'
        settings_title: 'Backup Configuration'
        wave2_note:
            title: 'Wave 2 note'
            body: 'The "Run backup now" button and automated Messenger-based execution will be available in Wave 2. These settings are saved and will be picked up once the scheduler is active.'
        retention_days:
            label: 'Retention period (days)'
            help: 'Backup files older than this number of days will be automatically removed. Minimum 1, maximum 10 years (3650 days).'
        schedule:
            label: 'Backup schedule'
            off: 'Off (manual only)'
            daily: 'Daily'
            weekly: 'Weekly'
            help: 'When the Messenger scheduler is active (Wave 2), backups will run according to this schedule.'
        storage_path:
