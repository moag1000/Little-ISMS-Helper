            label: 'Fiscal year start month'
            help: 'Select the first month of your financial/fiscal year. January (1) is the calendar default.'
        quarterly_grouping:
            label: 'Enable quarterly grouping'
            help: 'When enabled, dashboards and reports group data into fiscal quarters aligned to your start month.'
        reporting_cadence:
