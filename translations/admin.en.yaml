    fiscal_year:
        title: 'Fiscal Year Configuration'
        subtitle: 'Set the financial year start month and reporting cadence for this tenant.'
        help_text: 'The fiscal year start month controls how KPI dashboards, management reports, and compliance reviews are grouped. Changes take effect on the next report generation.'
