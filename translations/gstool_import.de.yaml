gstool_import:
    title: GSTOOL XML-Import
    intro: >-
        Importiert GSTOOL-XML-Exports in das BSI-IT-Grundschutz-Modul des Tools.
        Phase 1 übernimmt Zielobjekte als Assets inklusive Schutzbedarf,
        Phase 2 löst Modellierungs-Beziehungen auf Asset-Abhängigkeiten auf.
        Phase 3 (Bausteine), 4 (Maßnahmen) und 5 (Risikoanalyse) folgen.
    upload:
        card_title: GSTOOL-XML hochladen
    schema:
        title: Erwartetes XML-Schema (v1)
        description: >-
            Echte GSTOOL-Exports werden zuerst in dieses pragmatische Zwischenformat
            transformiert. Volle Schema-Doku unter docs/features/GSTOOL_IMPORT.md.
    result:
        preview_title: Vorschau-Ergebnis
        commit_title: Import abgeschlossen
        summary: '%new% neu / %update% aktualisiert / %error% Fehler'
        line: Zeile
        action: Aktion
        gstool_id: GSTOOL-ID
        name: Name
        asset_type: Asset-Typ
        error: Fehler
    action:
        new: neu
        update: Update
        error: Fehler
    tab:
        assets: Zielobjekte → Assets
        bausteine: Bausteine
        massnahmen: Maßnahmen
        risiken: Risikoanalyse
    bausteine:
        note: >-
            Bausteine werden nur als Migration-Vorschau angezeigt — keine
            automatische ComplianceRequirement-Verknüpfung. Compliance-Manager
            prüft jeden Eintrag und erzeugt Verknüpfungen manuell.
        legacy_id: GSTOOL-ID
        title_old: Alter Titel
        kompendium_2023: Kompendium 2023
        title_new: Neuer Titel
        zielobjekt: Zielobjekt
        status: Status
        unmapped: kein Mapping
    massnahmen:
        legacy_id: GSTOOL-Maßnahme
        titel: Titel
        baustein: Baustein (alt → neu)
        umsetzungsstatus: GSTOOL-Status
        implementation_status: Tool-Status
    risiken:
        legacy_id: Risiko-ID
        titel: Titel
        haeufigkeit: Eintrittshäufigkeit
        schaden: Schadenshöhe
        score: Risk-Score
        behandlung: Behandlung
