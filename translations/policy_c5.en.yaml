policy:
    c5:
        c5_organisation_information_security:
            v1:
                title: 'Information Security Organisation Policy (Cloud)'
                body: |-
                    # Information Security Organisation Policy (Cloud) — {{ tenant.legal_name }}

                    *Document class: Topic policy | Norm anchors: BSI C5:2020 OIS-01 to OIS-07 + C5:2026 extension (OIS) + ISO/IEC 27001:2022 Annex A.5.1-A.5.4 + ISO/IEC 27017:2015 CLD.6.3 + ISO/IEC 27018:2019 + BSI 200-2 OPS.2.2 (cloud usage) | Edition: C5:2026 | Language: English | Review interval: 24 months*

                    ## 1. Purpose and Scope
                    This policy governs the organisational and procedural framework for cloud information security at {{ tenant.legal_name }} in line with BSI C5:2020 basic criteria (OIS-01 to OIS-07) and the C5:2026 extension. It defines roles, responsibilities and reporting lines for all cloud service models (IaaS, PaaS, SaaS, FaaS) and deployment models (public, private, hybrid, community). Particular attention is paid to the responsibility boundary between cloud service provider (CSP) and customer under the shared responsibility model.

                    ## 2. Shared Responsibility Boundary CSP / Customer
                    The shared responsibility split is documented and contractually fixed for every cloud service. The matrix below is the minimum split; deviating contractual arrangements are recorded in the cloud register:

                    | Responsibility | IaaS | PaaS | SaaS |
                    |---|---|---|---|
                    | Physical DC security | CSP | CSP | CSP |
                    | Hypervisor / virtualisation | CSP | CSP | CSP |
                    | Operating system | Customer | CSP | CSP |
                    | Container runtime / platform | Customer | CSP | CSP |
                    | Application | Customer | Customer | CSP |
                    | Identities and entitlements | Customer | Customer | Customer (configuration) |
                    | Data and classification | Customer | Customer | Customer |
                    | Encryption in transit | Shared | Shared | Shared |
                    | Encryption at rest | Customer config | Customer config | Customer config |
                    | Key management (BYOK/HYOK) | Customer optional | Customer optional | Customer optional |

                    ## 3. Roles and Responsibilities (OIS-01)
                    - **Top management ({{ roles.top_management.fullName }}):** ultimate accountability per C5:2020 OIS-01, approves this policy, allocates resources, sets cloud adoption strategy;
                    - **Cloud Security Officer (CSO) / ISO ({{ roles.isb.fullName }}):** operational stewardship of cloud security, approves cloud onboarding, maintains cloud register, single point of contact for the C5 auditor;
                    - **Cloud Architect:** technical reference architectures, zero-trust design baselines, platform standardisation;
                    - **Cloud Operations Lead:** operations, monitoring, incident first response;
                    - **Data Protection Officer (DPO):** GDPR conformity check, data processing agreements (DPA) per Art. 28, third-country transfers;
                    - **Compliance Manager / GRC:** stewardship of the C5 audit programme, evidence collection for Type 1 / Type 2 subject-matter examinations;
                    - **Procurement and Legal:** SLA negotiation, exit and audit clauses;
                    - **Business units:** demand intake, data classification, use-case description.

                    ## 4. Segregation of Duties (OIS-02, OIS-03)
                    Functional separation between development, operations and audit is enforced per C5 OIS-02 and ISO A.5.3:

                    1. Whoever operates cloud resources in production must not develop them unilaterally (four-eyes principle for changes, cross-ref OPS-08);
                    2. Whoever conducts a cloud audit must not have operational responsibility for the audited area;
                    3. Whoever administers key material (KOS) must not have application or data access;
                    4. Conflicts are escalated through the privileged access management process (cross-ref IDM).

                    ## 5. Authority and Stakeholder Contacts (OIS-04, OIS-05)
                    {{ tenant.legal_name }} maintains documented contacts with:

                    - **BSI** (CERT-Bund, BSI situation centre, KRITIS office) — reporting duties under BSIG, NIS2 transposition;
                    - **competent data protection authority** — notifications per GDPR Art. 33;
                    - **EU authorities under DORA** (BaFin, ESMA, EIOPA) — financial supervision;
                    - **law enforcement** — for forensic escalations;
                    - **industry associations, ISACs, threat-sharing platforms** — threat intelligence;
                    - **EUCS / ENISA** where EUCS Substantial conformity is sought.

                    The contact register is reviewed at least annually.

                    ## 6. Information Security in Project Management (OIS-06)
                    Every project with cloud touchpoints undergoes a security-relevant pre-check (cloud security review). It covers protection needs, data classification, regulatory obligations, choice of service and deployment model, responsibility boundary, and a first-pass risk assessment. The result is a precondition for inclusion in the cloud register.

                    ## 7. Functions with Special Responsibility (OIS-07)
                    Functions with elevated responsibility (cloud architect, KMS administrator, privileged IAM admin, auditor) undergo a documented suitability check before first appointment (cross-ref PSS, HR-02); their entitlement profile is recertified semi-annually.

                    ## 8. C5 Audit Readiness (Type 1 / Type 2)
                    The organisation is structured such that both adequacy (Type 1, point-in-time) and effectiveness (Type 2, minimum 6-month evidence period) of controls can be demonstrated. The CSO maintains a continuous evidence track in the GRC tool. Control owners deliver effectiveness evidence at least semi-annually.

                    ## 9. Steering of C5:2026 Additional Criteria
                    Additional criteria are customer-specific and agreed in the risk and requirements dialogue with cloud customers. Top management prioritises adoption of additional criteria annually based on market demand, regulatory developments and risk assessment.

                    ## 10. Review Interval, Approval and Changes
                    Reviewed at least every 24 months and on material change (CSP switch, new compliance requirements, organisational restructuring). Approval: top management + CSO. Approval chain: {{ approval.chain }}.

                    ---
                    *Cross-ref: BSI C5:2020 OIS-01 to OIS-07, C5:2026 extension, ISO/IEC 27001:2022 A.5.1-A.5.4, ISO/IEC 27017:2015 CLD.6.3, ISO/IEC 27018:2019, BSI 200-2 OPS.2.2, GDPR Art. 28, NIS2 transposition § 30, DORA Art. 6.*

        c5_security_policies_procedures:
            v1:
                title: 'Cloud Security Policies and Procedural Documentation'
                body: |-
                    # Cloud Security Policies and Procedural Documentation — {{ tenant.legal_name }}

                    *Document class: Topic policy | Norm anchors: BSI C5:2020 SP-01 to SP-04 + C5:2026 extension (SPP) + ISO/IEC 27001:2022 Annex A.5.1 + ISO/IEC 27017:2015 + ISO/IEC 27018:2019 + BSI 200-1 ch. 5 | Edition: C5:2026 | Review interval: 24 months*

                    ## 1. Purpose
                    This policy structures the creation, approval, publication, read-and-understand confirmation and update of all cloud-related security documents at {{ tenant.legal_name }}. It operationalises C5:2020 SP-01 (security policy) through SP-04 (update) and ISO 27001 A.5.1.

                    ## 2. Scope
                    Covered are all documents that establish requirements, procedures or configuration rules for cloud services — irrespective of format (text, wiki, policy-as-code, infrastructure-as-code templates, runbooks, configuration baselines). Documents serving as audit evidence in the C5 examination are included.

                    ## 3. Responsibilities
                    - **CSO / ISO ({{ roles.isb.fullName }}):** owner of the cloud security policy, publication approval;
                    - **Policy owner per topic:** factual currency;
                    - **Document controller:** versioning, distribution, read-receipt;
                    - **Compliance manager:** mapping to C5 and ISO requirements, evidence for the auditor;
                    - **Workforce:** read-receipt for documents relevant to their role.

                    ## 4. Document Hierarchy (SP-01)
                    Cloud documentation follows a three-tier hierarchy:

                    1. **Cloud security policy** (Tier 1, top-level) — top management approval, 24-month review;
                    2. **Topic policies** (Tier 2, this policy and 11 further C5-domain policies) — CSO approval, 12-24 months;
                    3. **Procedures, runbooks, baselines, IaC templates** (Tier 3) — business unit approval, 12 months, continuously upon code change (CI/CD).

                    ## 5. Minimum Content per Document (SP-02)
                    Every document includes at minimum:

                    - scope (which services, regions, customer classes);
                    - responsible roles with RACI;
                    - norm anchors (C5 criterion, ISO Annex, BSI building block);
                    - concrete requirements (target state) and effectiveness criteria;
                    - cross-references;
                    - version, approval date, review interval, next review date.

                    ## 6. Publication and Communication (SP-03)
                    Approved documents are published in the central document management system (DMS). Workforce is actively informed of material changes (mailing lists, intranet, mandatory onboarding). Read-receipts are enforced for role-relevant documents and archived for at least 3 years (C5 evidence requirement).

                    ## 7. Update and Deviation Management (SP-04)
                    Documents are reviewed at least at the defined review interval. Event-driven review applies on:

                    - changes to cloud strategy or CSP portfolio;
                    - new regulatory requirements (e.g. DORA, NIS2 transposition, EUCS, EU AI Act);
                    - serious security incidents with lessons learned;
                    - C5 catalogue changes (e.g. transition C5:2020 to C5:2026 or future versions);
                    - relevant findings from internal audit or the C5 auditor.

                    Deviations from the target state must be requested in writing, assessed, approved by the CSO and entered into the risk register with a time limit.

                    ## 8. C5 Evidence Capture
                    Evidence is maintained per document: current version, approval minutes, read-receipt statistics. These are essential for Type 1 (point-in-time adequacy) and Type 2 (operating effectiveness) examinations.

                    ## 9. Customer Transparency (Shared-Responsibility Annex)
                    Where {{ tenant.legal_name }} acts as CSP, a curated set of security documents is made transparently available to cloud customers. Contents: service description, responsibility matrix, technical security measures, C5 attestation (Type 1 or Type 2). Disclosure obligations within contractual information rights apply.

                    ## 10. Review Interval and Approval
                    Reviewed at least every 24 months. Approval: top management + CSO. Approval chain: {{ approval.chain }}.

                    ---
                    *Cross-ref: BSI C5:2020 SP-01 to SP-04, C5:2026, ISO/IEC 27001:2022 A.5.1, ISO/IEC 27017:2015, BSI 200-1 ch. 5.*

        c5_personnel_security:
            v1:
                title: 'Cloud Personnel Security'
                body: |-
                    # Cloud Personnel Security — {{ tenant.legal_name }}

                    *Document class: Topic policy | Norm anchors: BSI C5:2020 HR-01 to HR-06 + C5:2026 extension (PSS) + ISO/IEC 27001:2022 Annex A.6.1 to A.6.6 + ISO/IEC 27017:2015 + ISO/IEC 27018:2019 (employee PII) + BSI 200-2 ORP.2 + GDPR Art. 32, BDSG § 26 | Review interval: 24 months*

                    ## 1. Purpose
                    This policy defines personnel-related security measures for all persons who develop, operate, administer or audit cloud resources at {{ tenant.legal_name }}. It includes employees, external workers, contractors, interns and (where required) staff of subprocessors. It operationalises C5:2020 HR-01 (suitability check), HR-02 (confidentiality), HR-03 (training), HR-04 (disciplinary process), HR-05 (termination obligations), HR-06 (segregation of duties).

                    ## 2. Scope
                    Covered are all cloud-relevant roles, with sharper rules for privileged roles (cloud architect, KMS administrator, privileged IAM admin, cloud operator, SOC analyst, internal auditor).

                    ## 3. Responsibilities
                    - **HR head ({{ roles.hr.fullName }}):** suitability check, onboarding, offboarding, disciplinary measures;
                    - **CSO / ISO ({{ roles.isb.fullName }}):** role-specific duty cards, awareness programme, effectiveness review;
                    - **DPO ({{ roles.dpo.fullName }}):** data protection conformity (employee data per BDSG § 26);
                    - **Line managers:** supervision duty, periodic assessments;
                    - **Workforce:** compliance with confidentiality undertaking, awareness duty, reporting of suspicious activity.

                    ## 4. Suitability Check Before Engagement (HR-01)
                    Prior to taking up cloud-relevant duties, a documented suitability check is performed. Minimum scope:

                    - identity verification (official photo ID);
                    - CV verification, attestation of relevant certifications (CISSP, CCSP, BSI IT-Grundschutz Practitioner);
                    - reference check with at least two prior employers;
                    - for very high protection needs or VS-NfD exposure: security clearance per German SUEG (Ue1 to Ue3);
                    - police clearance certificate (not older than 3 months) for privileged roles;
                    - credit check only for financial functions, with documented necessity (GDPR Art. 6, BDSG § 26).

                    Scope depends on protection needs of the data to be processed and is anchored in the role profile.

                    ## 5. Confidentiality Undertaking and Contracting (HR-02)
                    Before first data access, workforce signs a confidentiality undertaking (NDA) that goes beyond statutory secrecy duties. Minimum content:

                    - validity during and after the engagement (standard 3 years, VS-NfD up to 30 years);
                    - prohibition of external storage (shadow IT, private cloud, unapproved generative AI);
                    - GDPR / BDSG data protection commitment;
                    - consent to logging and monitoring (employee data protection);
                    - duty to immediately report lost or compromised credentials.

                    ## 6. Awareness, Training and Certification (HR-03)
                    Cloud-specific awareness and training programme:

                    - **Onboarding mandatory:** within 30 days of start; covers cloud security policy, shared responsibility, phishing, secure configuration, secret handling;
                    - **Annual refreshers** with mandatory knowledge check (pass rate ≥ 80 %);
                    - **Role-based deep-dive trainings:** privileged access, secure DevOps, cloud IR, IAM hardening, container security;
                    - **Phishing simulations:** quarterly with click-rate monitoring (target ≤ 5 %);
                    - **Certification requirement** for key roles (CCSP, AWS/Azure/GCP Security Specialty, BSI IT-Grundschutz Practitioner).

                    Training records are kept 5 years (C5 evidence requirement).

                    ## 7. Disciplinary Process for Violations (HR-04)
                    Violations of cloud security rules are handled in a documented graduated process:

                    1. Immediate technical action (e.g. account lock, cross-ref IDM);
                    2. Incident documentation, HR and CSO involvement;
                    3. Hearing of the employee, works council where applicable;
                    4. Measures from warning to termination; in cases of intent and damage: civil and criminal proceedings;
                    5. Notification to DPO if personal data is affected.

                    ## 8. Termination and Role Change (HR-05)
                    On termination or role change, the following actions occur within agreed deadlines:

                    - immediately on the exit day: lock all cloud accounts, revoke MFA factors, invalidate tokens and API keys, lock hardware tokens;
                    - within 24 hours: wipe local device data, hardware return, revoke mobile certificates;
                    - within 7 days: re-assign data ownership, archive mailbox, review delegated entitlements;
                    - NDA effects continue for the contractually agreed period.

                    On internal role change, an entitlement reset precedes any new grant (zero-trust principle).

                    ## 9. Segregation of Duties (HR-06)
                    Conflicting role combinations are prohibited and systemically blocked (cross-ref OIS, IDM):

                    - development must not operate production;
                    - KMS admin must not have application or data access;
                    - internal auditors must not operate in the audited area;
                    - two-person principle for changes to the cloud foundation account.

                    ## 10. Data Protection, ISO 27018 and Employee Data
                    Employee personal data is processed per GDPR and BDSG § 26. When processing in public clouds, ISO/IEC 27018:2019 (PII processor in the public cloud) additionally applies. Logging and monitoring are designed in a data-protection-conformant manner; works council co-determination (BetrVG § 87 (1) no. 6) is observed.

                    ## 11. Review Interval and Approval
                    Reviewed at least every 24 months and on material change (new regulatory requirements, CSP switch). Approval: HR head + CSO. Approval chain: {{ approval.chain }}.

                    ---
                    *Cross-ref: BSI C5:2020 HR-01 to HR-06, C5:2026, ISO/IEC 27001:2022 A.6.1-A.6.6, ISO/IEC 27018:2019, BSI 200-2 ORP.2/ORP.3, GDPR Art. 32, BDSG § 26, BetrVG § 87.*

        c5_asset_management:
            v1:
                title: 'Cloud Asset Management'
                body: |-
                    # Cloud Asset Management — {{ tenant.legal_name }}

                    *Document class: Topic policy | Norm anchors: BSI C5:2020 AM-01 to AM-05 + C5:2026 extension (AM, incl. SBOM) + ISO/IEC 27001:2022 Annex A.5.9 to A.5.13 + ISO/IEC 27017:2015 CLD.6.3 + BSI 200-2 OPS.2.2 | Review interval: 12 months*

                    ## 1. Purpose
                    This policy governs inventory, classification, ownership and secure handling of all cloud assets at {{ tenant.legal_name }}. It operationalises C5:2020 AM-01 (inventory), AM-02 (ownership), AM-03 (acceptable use), AM-04 (classification), AM-05 (labelling) and the C5:2026 extension (software bill of materials).

                    ## 2. Scope
                    Covered are all digital and logical cloud assets:

                    - compute (VMs, bare metal, containers, functions, lambdas);
                    - storage (object, block, file, databases, caches);
                    - network (VPCs, subnets, gateways, load balancers, DNS zones);
                    - identities (users, service accounts, roles, workload identities);
                    - keys and secrets (KMS keys, certificates, API keys, tokens);
                    - data and datasets including ML training data;
                    - software bill of materials (SBOM) for all consumed and provided components;
                    - cloud configuration templates (Terraform, ARM, CloudFormation, Helm charts).

                    ## 3. Responsibilities
                    - **CSO / ISO:** owner of the cloud asset register, review interval, reporting;
                    - **Cloud architect:** tagging standards, asset discovery tooling;
                    - **Service owner:** functional ownership, protection-needs assessment, labelling;
                    - **DPO:** data classification check, PII-specific requirements;
                    - **DevOps / SRE:** SBOM stewardship, IaC templates, tagging compliance;
                    - **Workforce:** observance of acceptable use.

                    ## 4. Cloud Asset Register (AM-01)
                    A central cloud asset register holds at minimum:

                    | Field | Content |
                    |---|---|
                    | Asset ID | unique identifier |
                    | Asset type | compute, storage, identity, key, data, SBOM component, IaC template |
                    | Owner | person + role |
                    | Service-owner role | tied to org structure |
                    | Tenant / business unit | multi-tenancy mapping |
                    | Cloud provider and region | incl. EU/EEA verification |
                    | Protection needs | C/I/A with rationale |
                    | Data classification | public / internal / confidential / strictly confidential / VS-NfD |
                    | Regulatory tag | KRITIS, NIS2, DORA, GDPR-specific |
                    | Procurement / creation date | and lifecycle status |
                    | Expiry / rotation | for keys, certificates, secrets |

                    Discovery is automated via cloud security posture management (CSPM) plus IaC drift detection. Manual capture is exception only; cadence: continuous, at least daily.

                    ## 5. Ownership and Acceptable Use (AM-02, AM-03)
                    Each asset has a technical and a functional owner. Both bear responsibility for security control adherence. Acceptable use is governed by an acceptable-use policy:

                    - no storage of personal data outside approved cloud services;
                    - no use of generative AI tools with confidential data without CSO approval;
                    - no shadow IT, no private cloud accounts;
                    - no export of keys, secrets or training data without approval.

                    ## 6. Classification and Labelling (AM-04, AM-05)
                    All assets carry a standardised tagging schema, at minimum:

                    `owner`, `service`, `environment` (prod/test/dev), `data-classification`, `regulatory` (kritis/nis2/dora/gdpr/none), `cost-center`, `retention`, `c5-scope` (in/out).

                    Tagging compliance is checked daily; violations raise alerts and are remediated within 5 business days.

                    ## 7. Software Bill of Materials (SBOM Mandate, C5:2026 Extension)
                    Each deployed component carries an SBOM (CycloneDX or SPDX). Minimum content:

                    - all direct and transitive dependencies;
                    - versions and licences;
                    - known CVEs (tracked in vulnerability management);
                    - vendor and provenance attestation (code signing, SLSA-level provenance).

                    SBOM is part of the build pipeline and is available on demand to auditors.

                    ## 8. Lifecycle and Decommissioning
                    Asset lifecycle: plan → acquire/create → commission → operate → decommission. Decommissioning includes:

                    - secure data deletion (cross-ref deletion concept, crypto-erase for cloud storage);
                    - revocation of associated keys and entitlements;
                    - cloud asset register update (status `decommissioned`);
                    - deletion certificate from CSP where third parties are involved.

                    ## 9. Reporting and Verification
                    A quarterly cloud asset inventory report is produced with sample verification. Metrics include tagging coverage, SBOM currency, orphaned assets, unplanned region or provider migration.

                    ## 10. Review Interval and Approval
                    Reviewed at least every 12 months. Approval: CSO. Approval chain: {{ approval.chain }}.

                    ---
                    *Cross-ref: BSI C5:2020 AM-01 to AM-05, C5:2026 SBOM mandate, ISO/IEC 27001:2022 A.5.9-A.5.13, ISO/IEC 27017:2015 CLD.6.3, BSI 200-2 OPS.2.2.*

        c5_physical_security:
            v1:
                title: 'Physical Security of Cloud Infrastructure'
                body: |-
                    # Physical Security of Cloud Infrastructure — {{ tenant.legal_name }}

                    *Document class: Topic policy | Norm anchors: BSI C5:2020 PS-01 to PS-11 + C5:2026 extension (PS) + ISO/IEC 27001:2022 Annex A.7.1 to A.7.8 + ISO/IEC 27017:2015 + BSI 200-2 INF.1, INF.2 | Review interval: 12 months*

                    ## 1. Purpose and Scope
                    Governs physical security of cloud infrastructure used by {{ tenant.legal_name }}, both for self-operated data centres (when delivering private cloud) and for verifying public cloud providers and co-location partners. Operationalises C5:2020 PS-01 to PS-11 and ISO 27001 A.7.1 to A.7.8.

                    ## 2. Scope
                    Covered are all sites where cloud infrastructure for data, workloads or key material of {{ tenant.legal_name }} is operated. For public cloud providers, verification is indirect via CSP attestations (C5, ISO 27001, SOC 2 Type II) and contractual audit rights. Own office sites with cloud endpoint function (token vault, HSM, KMS recovery material) are included.

                    ## 3. Responsibilities
                    - **CSO / ISO:** review of CSP attestations, approval of new sites, risk assessment;
                    - **Facility management:** operations of own sites, access management, environmental monitoring;
                    - **Cloud operations:** verification of provider site list against the cloud asset register;
                    - **Compliance / GRC:** tracking of region-lock scope (DE, EU);
                    - **Workforce:** observance of access rules, reporting suspicious observations.

                    ## 4. Site Selection and Region Lock (PS-01)
                    Sites for processing {{ tenant.legal_name }} data are selected against defined criteria:

                    1. natural-hazard risk analysis (flood, earthquake, severe weather, EMP);
                    2. political stability and legal regime risk (CLOUD Act, FISA 702, Schrems II exposure);
                    3. availability of power, cooling, network connectivity;
                    4. proximity to emergency infrastructure (fire, police).

                    Data location: primarily Germany and EU/EEA. Third-country transfer only under adequacy decision (GDPR Art. 45) or with appropriate safeguards (Art. 46, SCCs 2021/914 + transfer impact assessment per Schrems II). Sovereign cloud options are preferred for strictly confidential data.

                    ## 5. Zoning and Access Control (PS-02 to PS-04)
                    The principle of concentric security zones applies:

                    | Zone | Description | Access control |
                    |---|---|---|
                    | 0 — Outer | perimeter, fence | CCTV, motion sensors |
                    | 1 — Building | entrance, lobby | reception, mantrap |
                    | 2 — Office | workspaces | badge + PIN |
                    | 3 — DC pre-zone | operator rooms | MFA + escort for externals |
                    | 4 — DC hot zone | server caging | MFA + biometric + four eyes |
                    | 5 — Special | HSM room, KMS recovery | four eyes + logging + video |

                    Access events are logged and retained at least 12 months. Sample reviews quarterly.

                    ## 6. Environmental Conditions and Continuity (PS-05 to PS-07)
                    Minimum requirements:

                    - **Power:** UPS plus standby generator, generator load test quarterly;
                    - **Cooling:** redundant chillers, cold/hot aisle separation;
                    - **Fire detection:** very early smoke detection, inert-gas suppression;
                    - **Water ingress:** floor sensors, flood-risk assessment;
                    - **Climate / energy efficiency:** PUE monitoring, target PUE ≤ 1.3 for new builds;
                    - **EMP and RF interference protection** assessed during site selection.

                    ## 7. Equipment Protection and Cabling (PS-08, PS-09)
                    Hardware is uniquely tagged. Cabling is structured, with cross-free separation of power and data, documented in patch plans. Maintenance is performed only by authorised personnel with documented four-eyes escort for very high protection needs.

                    ## 8. Decommissioning and Equipment Maintenance (PS-10)
                    Before decommissioning or external repair, all storage media are securely erased or physically destroyed (cross-ref deletion concept). Defective SSDs are physically destroyed only (wear-levelling makes overwrite unreliable). For public cloud providers, deletion / destruction certificates are required contractually.

                    ## 9. External Areas, Unattended Equipment (PS-11)
                    Mobile devices with cloud access (notebooks, tablets, smartphones) are equipped with full-disk encryption, remote wipe, screen lock and theft protection. Loss is reported within 24 hours; emergency lock occurs within 1 hour.

                    ## 10. CSP Verification (Public Cloud)
                    For public cloud usage, the following evidence is collected and maintained:

                    - current C5 Type 2 attestation (or equivalent ISO 27001 + SOC 2 Type II);
                    - site and region confirmation with contractual binding;
                    - subprocessor list with change-notification right;
                    - audit report or equivalent evidence.

                    Re-verification at least annually, documented in the cloud register.

                    ## 11. Review Interval and Approval
                    Reviewed at least every 12 months. Approval: CSO. Approval chain: {{ approval.chain }}.

                    ---
                    *Cross-ref: BSI C5:2020 PS-01 to PS-11, C5:2026, ISO/IEC 27001:2022 A.7.1-A.7.8, BSI 200-2 INF.1/INF.2, GDPR Art. 44-49.*

        c5_operations_security:
            v1:
                title: 'Cloud Operations Security'
                body: |-
                    # Cloud Operations Security — {{ tenant.legal_name }}

                    *Document class: Topic policy | Norm anchors: BSI C5:2020 OPS-01 to OPS-13 + C5:2026 extension (OPS, incl. container and orchestration) + ISO/IEC 27001:2022 Annex A.8.6-A.8.16, A.8.32 + ISO/IEC 27017:2015 CLD.12.1, CLD.12.4 + BSI 200-2 OPS.1.1.3, OPS.1.1.4, OPS.1.1.5 | Review interval: 12 months*

                    ## 1. Purpose
                    Governs secure operation of all cloud workloads at {{ tenant.legal_name }} — from compute, containers and orchestration to backup, logging and monitoring. Operationalises C5:2020 OPS-01 to OPS-13 and the C5:2026 extensions on container and orchestration security (CNT domain).

                    ## 2. Scope
                    Covered are all production, test and development environments in IaaS, PaaS, SaaS, FaaS and container platforms (Kubernetes, OpenShift, Cloud Run, ECS, AKS, GKE).

                    ## 3. Responsibilities
                    - **Cloud Operations Lead:** owner of this policy, day-to-day stewardship;
                    - **Service owner:** baseline, patch state, backup integrity;
                    - **CSO:** approval of procedural exceptions, effectiveness review;
                    - **SOC:** continuous detection (cross-ref detection policy);
                    - **DevOps / Platform engineering:** secure CI/CD, IaC reviews, container hardening.

                    ## 4. Configuration Baselines (OPS-01 to OPS-03)
                    Per cloud platform a configuration baseline is maintained based on CIS Cloud Benchmarks (AWS, Azure, GCP), CIS Kubernetes Benchmark, BSI recommendations and cloud provider best practices. Drift is detected continuously (at least daily); security-critical drift is auto-remediated or fixed manually within 24 hours.

                    ## 5. Capacity, Availability, Performance (OPS-04, OPS-05)
                    Auto-scaling, multi-AZ deployments, health probes and service mesh are standard for production workloads. Effectiveness is demonstrated via chaos engineering and SLA reports. Reserve capacity is reviewed quarterly.

                    ## 6. Malware Protection (OPS-06)
                    For cloud workloads:

                    - **Compute (VMs):** EDR agent with cloud workload protection platform (CWPP);
                    - **Containers:** image scanning before deployment (cross-ref CNT-1 SBOM mandate), runtime protection with eBPF-based threat detection;
                    - **Serverless / functions:** static code analysis, function layer scanning;
                    - **Storage:** anti-malware on incoming uploads;
                    - **Email workloads:** anti-phishing, anti-malware, DMARC, SPF, DKIM.

                    Quarantine events escalate within 1 hour.

                    ## 7. Backup and Restoration (OPS-07)
                    3-2-1 backup strategy plus air-gap or immutable backups against ransomware:

                    - at least 3 copies;
                    - 2 different storage types;
                    - 1 outside the primary cloud provider or primary region;
                    - object lock / WORM for at least 30 days standard, longer where regulated;
                    - restore tests semi-annually, documented in the backup register.

                    RTO and RPO are defined per service (see BCM policies).

                    ## 8. Logging, Monitoring and Correlation (OPS-08 to OPS-10)
                    Minimum logging:

                    - cloud audit logs (all provider API calls);
                    - IAM authentication and authorisation events;
                    - network flow logs;
                    - application logs per OWASP Logging Cheat Sheet;
                    - container runtime events;
                    - KMS key-use logs.

                    Retention at least 12 months, KRITIS / NIS2 at least 24 months. Correlation in central SIEM with use cases per detection policy. Tamper protection: append-only storage, hash chains, separate log account.

                    ## 9. Patch and Vulnerability Management (OPS-11)
                    Cloud workloads are monitored against vulnerability catalogues (CVE, CISA KEV, cloud provider advisories). SLAs:

                    | Severity | Patch SLA Compute | Patch SLA Container Image | Patch SLA Function |
                    |---|---|---|---|
                    | Critical (CVSS ≥ 9.0 or KEV) | 7 days | 3 days | 3 days |
                    | High (CVSS 7.0-8.9) | 30 days | 14 days | 14 days |
                    | Medium | 90 days | 30 days | 30 days |
                    | Low | 180 days | 90 days | 90 days |

                    Exceptions require risk acceptance by CSO with time limit.

                    ## 10. Change Management (OPS-12)
                    Changes to production cloud workloads go through GitOps pipelines with four-eyes pull requests, automated tests, security gates (SCA, SAST, IaC scan) and an auditable trail. Manual hot-fixes are documented in arrears (pull request backfill within 5 business days).

                    ## 11. Container and Orchestration Security (C5:2026 CNT-1 to CNT-6)
                    Special requirements for containers and orchestration:

                    - image scanning before deployment;
                    - image signing (e.g. Cosign / Notary v2);
                    - container runtime hardening (read-only filesystem, non-root, capabilities drop, seccomp/AppArmor);
                    - Kubernetes hardening per CIS benchmark, Pod Security Standards Restricted;
                    - network policies per namespace, service mesh with mTLS;
                    - container registry with RBAC and image signature verification;
                    - container isolation: separate worker pools per tenant, dedicated nodes for very high protection needs.

                    ## 12. Service Separation and Multi-Tenancy (OPS-13)
                    Production tenant data is segregated by IAM policies, network segmentation, dedicated KMS keys per tenant and where required dedicated compute pools. Multi-tenancy tests are anchored in the penetration testing programme.

                    ## 13. Review Interval and Approval
                    Reviewed at least every 12 months. Approval: CSO. Approval chain: {{ approval.chain }}.

                    ---
                    *Cross-ref: BSI C5:2020 OPS-01 to OPS-13, C5:2026 CNT-1 to CNT-6, ISO/IEC 27001:2022 A.8.6-A.8.16, A.8.32, ISO/IEC 27017:2015 CLD.12, BSI 200-2 OPS.1.1.3-5.*

        c5_identity_access_management:
            v1:
                title: 'Cloud Identity and Access Management'
                body: |-
                    # Cloud Identity and Access Management — {{ tenant.legal_name }}

                    *Document class: Topic policy | Norm anchors: BSI C5:2020 IDM-01 to IDM-09 + C5:2026 extension (IDM) + ISO/IEC 27001:2022 Annex A.5.15-A.5.18, A.8.2, A.8.5 + ISO/IEC 27017:2015 + BSI 200-2 ORP.4 | Review interval: 12 months*

                    ## 1. Purpose
                    Governs management of all identities and access rights to cloud resources of {{ tenant.legal_name }}. Operationalises C5:2020 IDM-01 to IDM-09 and ISO 27001 A.5.15-A.5.18.

                    ## 2. Scope
                    Covered are all identities:

                    - human (employees, externals, contractors, customers, partners);
                    - non-human (service accounts, workload identities, machine identities, API clients);
                    - bot and AI agent identities;
                    - emergency identities (break-glass accounts).

                    ## 3. Responsibilities
                    - **CSO:** owner of this policy;
                    - **IAM team:** operations of IdP, IGA, PAM;
                    - **HR:** joiner-mover-leaver process (cross-ref PSS);
                    - **Service owner:** definition of role-based entitlement profiles;
                    - **DPO:** data protection conformity for logging.

                    ## 4. Identity Provider and SSO (IDM-01, IDM-02)
                    Single source of identity: a central IdP (e.g. Entra ID, Okta, Keycloak) supplies identities via OpenID Connect, SAML 2.0 or SCIM to all cloud services. Local cloud accounts are prohibited except for emergency accounts (Section 9).

                    ## 5. Multi-Factor Authentication (IDM-03)
                    MFA mandatory for all interactive access. Phishing-resistant factors mandatory for privileged roles:

                    - **standard workforce:** authenticator app with TOTP or push, backup codes;
                    - **privileged roles:** FIDO2 / WebAuthn (hardware token) or passkeys; SMS OTP is prohibited;
                    - **VS-NfD relevant roles:** smart card with hardware PIN per BSI TR-03145.

                    ## 6. Entitlement Model and Least Privilege (IDM-04, IDM-05)
                    Role-based access control (RBAC) with attribute-based extensions (ABAC) where needed. Principles:

                    - **Least privilege:** minimum entitlements for the task;
                    - **Just in time:** privileged entitlements granted time-limited (standard 8 hours, max 24 hours) via privileged access management (PAM);
                    - **Just enough access:** entitlements scoped to task;
                    - **Segregation of duties (SoD):** conflicts detected and blocked in the IGA tool.

                    ## 7. Joiner-Mover-Leaver (IDM-06)
                    - **Joiner:** account ready within 24 hours of HR notification, MFA mandatory at first sign-in;
                    - **Mover:** entitlement reset on role change; old rights revoked within 7 days, new rights only after approval;
                    - **Leaver:** lock on exit day, deletion per retention period (cross-ref deletion concept).

                    ## 8. Recertification (IDM-07)
                    Entitlements recertified at least semi-annually, privileged roles quarterly. Recertification by service owner; non-confirmed entitlements are auto-revoked within 14 days.

                    ## 9. Privileged Access Management (IDM-08)
                    PAM is mandatory for:

                    - cloud foundation accounts (e.g. AWS Organizations Root, Azure Tenant Root);
                    - KMS administrators;
                    - Kubernetes cluster admins;
                    - database admins with cleartext data access;
                    - SOC analysts with hunting entitlements.

                    PAM provides just-in-time sessions, session recording, workflow approval, hash-protected audit trails. Break-glass accounts are vault-stored, every use raises an alert and is post-mortem documented.

                    ## 10. Service and Workload Identities (IDM-09)
                    Static API keys and long-lived tokens are to be avoided. Use of:

                    - workload identity (e.g. AWS IAM Roles for Service Accounts, Azure Managed Identity, GCP Workload Identity);
                    - short-lived tokens (max 1 hour) with automatic rotation;
                    - SPIFFE/SPIRE for service mesh identities.

                    Where static secrets are unavoidable, they are stored in the central secret manager with automatic rotation (max 90 days).

                    ## 11. Identity Threat Detection (ITDR)
                    Anomalous sign-ins, token misuse, privilege escalations and lateral movement are detected via ITDR tooling and escalated to SOC (cross-ref detection policy).

                    ## 12. Review Interval and Approval
                    Reviewed at least every 12 months. Approval: CSO. Approval chain: {{ approval.chain }}.

                    ---
                    *Cross-ref: BSI C5:2020 IDM-01 to IDM-09, C5:2026, ISO/IEC 27001:2022 A.5.15-A.5.18, A.8.2, A.8.5, BSI 200-2 ORP.4, BSI TR-03145, FIDO2/WebAuthn.*

        c5_cryptography_key_management:
            v1:
                title: 'Cloud Cryptography and Key Management'
                body: |-
                    # Cloud Cryptography and Key Management — {{ tenant.legal_name }}

                    *Document class: Programme document | Norm anchors: BSI C5:2020 CRY-01 to CRY-04 + C5:2026 extension (KOS, incl. PQC roadmap PQC-1 to PQC-4) + ISO/IEC 27001:2022 Annex A.8.24 + ISO/IEC 27017:2015 CLD.10.1 + BSI 200-2 CON.1 + BSI TR-02102 + BSI TR-03145 | Review interval: 12 months*

                    ## 1. Purpose
                    Governs selection, implementation and operation of cryptographic mechanisms and key management solutions for cloud workloads of {{ tenant.legal_name }}. Operationalises C5:2020 CRY-01 to CRY-04 and the C5:2026 extension on post-quantum cryptography.

                    ## 2. Scope
                    Covered:

                    - encryption in transit (TLS, IPSec, SSH);
                    - encryption at rest (storage, database, backup);
                    - key management (KMS, HSM, BYOK, HYOK);
                    - cryptographic signatures (code signing, JWT, SAML);
                    - secret management;
                    - hash functions and pseudonymisation.

                    ## 3. Responsibilities
                    - **CSO:** approves the crypto programme and algorithm list;
                    - **KMS administrator:** key lifecycle operations (separate four-eyes team);
                    - **Cloud architect:** integration design;
                    - **DPO:** review of pseudonymisation and PII-specific requirements;
                    - **Workforce:** mandatory use of approved mechanisms.

                    ## 4. Algorithm Whitelist (BSI TR-02102, CRY-01)
                    Aligned with BSI TR-02102-1, updated annually. Snapshot at policy approval:

                    | Mechanism | Algorithms | Min key length | Prohibited |
                    |---|---|---|---|
                    | Symmetric | AES (GCM, CTR with MAC), ChaCha20-Poly1305 | 256 bit | DES, 3DES, RC4 |
                    | Asymmetric | RSA (PSS), ECDSA, Ed25519 | RSA ≥ 3072 bit, ECDSA P-256/P-384 | RSA ≤ 2048 for new implementations |
                    | Key exchange | ECDH (P-256/P-384), X25519 | — | DH without forward secrecy |
                    | Hash | SHA-256, SHA-384, SHA-512, SHA-3 | — | MD5, SHA-1 |
                    | Password hash | Argon2id, scrypt, bcrypt (cost ≥ 12) | — | unsalted hashes, MD5/SHA-1 for passwords |
                    | TLS | TLS 1.3 (preferred), TLS 1.2 with modern cipher suites | — | TLS ≤ 1.1, all SSL versions |

                    ## 5. Encryption in Transit (CRY-02)
                    All data in transit (internal, external, between cloud services) is encrypted with TLS 1.3 (preferred) or TLS 1.2 with modern cipher suites. mTLS mandatory for service-to-service communication in microservices and Kubernetes workloads. Certificates are managed via automated lifecycle (e.g. ACME, cloud PKI), max public lifetime 90 days.

                    ## 6. Encryption at Rest (CRY-02)
                    Minimum requirements:

                    | Protection needs | Mechanism | Key ownership |
                    |---|---|---|
                    | Normal | Provider-managed encryption (CMK) with AES-256 | CSP-managed |
                    | High | BYOK with customer-managed key (CMK) in KMS | Customer holds key in KMS |
                    | Very high | HYOK or external key store with on-prem HSM | Key never leaves customer custody |
                    | VS-NfD | BSI-approved HSM with dedicated administration | Customer |

                    ## 7. Key Lifecycle (CRY-03)
                    Per key, the following are documented: generation (hardware RNG source), distribution, storage (HSM at least FIPS 140-3 Level 3), use, rotation, revocation, destruction.

                    Minimum rotation:

                    - data encryption keys (DEK): annually or on suspicion;
                    - key encryption keys (KEK) in KMS: as needed, at least every 3 years;
                    - JWT signing keys: quarterly;
                    - TLS server certificates: max 90 days;
                    - SSH host keys: on migration / incident.

                    ## 8. Secret Management (CRY-04)
                    Secrets (API keys, database passwords, OAuth secrets) are stored in the central secret manager (e.g. HashiCorp Vault, cloud-KMS-integrated secret stores). Storage in code, configuration files or CI/CD variables without a manager is prohibited and detected automatically (cross-ref OPS, secret scanning in pipelines).

                    ## 9. Post-Quantum Cryptography Roadmap (C5:2026 PQC-1 to PQC-4)
                    {{ tenant.legal_name }} prepares migration to post-quantum algorithms:

                    1. **PQC roadmap** documented with milestones to 2030;
                    2. **Crypto agility:** architecture designed for algorithm swap (wrapper pattern, central algorithm config);
                    3. **Hybrid mechanisms** assessed (e.g. X25519+Kyber768 for key exchange);
                    4. **Long-term confidentiality data** (≥ 10 years) protected with hybrid or PQC-capable mechanisms (defence against harvest-now-decrypt-later).

                    ## 10. CSP-managed Keys vs. CMK vs. BYOK vs. HYOK
                    The choice follows protection needs (Section 6). For BYOK and HYOK:

                    - contractually secured right to immediate key revocation (crypto-erase);
                    - documented key delivery procedure (key ceremony);
                    - documented contingency procedure on key loss or compromise;
                    - no key delegation to CSP staff without four-eyes approval.

                    ## 11. Review Interval and Approval
                    Reviewed at least every 12 months and on changes to BSI TR-02102, new cryptanalysis or NIST PQC standards. Approval: CSO. Approval chain: {{ approval.chain }}.

                    ---
                    *Cross-ref: BSI C5:2020 CRY-01 to CRY-04, C5:2026 PQC-1 to PQC-4, ISO/IEC 27001:2022 A.8.24, BSI 200-2 CON.1, BSI TR-02102, BSI TR-03145, FIPS 140-3, NIST PQC.*

        c5_communication_security:
            v1:
                title: 'Cloud Communication Security'
                body: |-
                    # Cloud Communication Security — {{ tenant.legal_name }}

                    *Document class: Topic policy | Norm anchors: BSI C5:2020 KOS-01 to KOS-07 + C5:2026 extension (COS) + ISO/IEC 27001:2022 Annex A.8.20-A.8.23 + ISO/IEC 27017:2015 CLD.13 + BSI 200-2 NET.1.1, NET.3.1 | Review interval: 12 months*

                    ## 1. Purpose
                    Governs network security of all cloud workloads of {{ tenant.legal_name }} and the protection of connectivity between cloud, on-premises and end-user devices. Operationalises C5:2020 KOS-01 to KOS-07 and ISO 27001 A.8.20-A.8.23.

                    ## 2. Scope
                    Covered:

                    - cloud-internal network (VPC, vNet, subnets, service endpoints);
                    - inter-cloud and cross-region connectivity;
                    - cloud-to-on-prem connectivity (VPN, Direct Connect, ExpressRoute, Interconnect);
                    - end-user-to-cloud connectivity (user VPN, zero-trust network access);
                    - service-to-service communication (mTLS, service mesh);
                    - public endpoints (API gateway, load balancer).

                    ## 3. Responsibilities
                    - **Cloud architect:** network reference design, segmentation, zoning concept;
                    - **CSO:** approval of inbound exposures and cross-border transfers;
                    - **NetOps:** connectivity and firewall operations;
                    - **SOC:** detection of unusual network activity (cross-ref detection policy).

                    ## 4. Zero-Trust Network Architecture (KOS-01)
                    Zero-trust per NIST SP 800-207. Principles:

                    1. no implicit trust from network membership;
                    2. authentication and authorisation per connection, context-based;
                    3. mTLS between all production workloads;
                    4. micro-segmentation at service level;
                    5. least privilege for network policies and security groups.

                    ## 5. Segmentation and Separation (KOS-02)
                    Three-dimensional separation:

                    | Dimension | Separation |
                    |---|---|
                    | Environment | prod / staging / dev / sandbox |
                    | Function | web / app / data / management tier |
                    | Tenant | dedicated VPC or subnet per tenant for very high protection needs |

                    Inter-segment traffic is allowed only through explicit network policies.

                    ## 6. Perimeter and Inbound Protection (KOS-03)
                    Requirements:

                    - DDoS protection at L3/L4 (provider service) plus L7 (WAF with OWASP CRS);
                    - no direct public endpoints without API gateway or load balancer;
                    - WAF with bot protection, rate-limiting, geo-blocking where justified;
                    - inbound only via documented endpoints captured in cloud public inventory.

                    ## 7. Outbound Control and Egress (KOS-04)
                    Outbound traffic is filtered via egress proxies or NAT gateways. Data exfiltration controls:

                    - egress whitelisting for production workloads;
                    - cloud access security broker (CASB) for SaaS egress;
                    - DNS filter service with threat intelligence;
                    - volume anomaly detection (egress spikes above baseline → SOC alert).

                    ## 8. Hybrid and Cross-Cloud Connectivity (KOS-05)
                    Cloud-to-on-prem connectivity is realised via dedicated lines (Direct Connect, ExpressRoute, Interconnect) plus backup VPN. IPSec with IKEv2, AES-256-GCM and PFS as minimum. BGP with MD5 authentication and route filtering, RPKI validation where applicable.

                    ## 9. End-User Access (KOS-06)
                    End-user access primarily via:

                    - **Zero-Trust Network Access (ZTNA):** identity-based per-app authorisation;
                    - **Cloud IAM:** SSO with MFA (cross-ref IDM);
                    - **VDI / VPN:** fallback for legacy applications with device-posture check.

                    Classic site-to-site VPN as standard user access is to be retired.

                    ## 10. Service Mesh and mTLS (KOS-07)
                    Microservice architectures use a service mesh (Istio, Linkerd, cloud provider mesh). mTLS mandatory between workloads, automatic certificate rotation, identity-based authorisation with SPIFFE/SPIRE. Sidecar / mesh proxy configuration is part of IaC templates.

                    ## 11. Review Interval and Approval
                    Reviewed at least every 12 months. Approval: CSO. Approval chain: {{ approval.chain }}.

                    ---
                    *Cross-ref: BSI C5:2020 KOS-01 to KOS-07, C5:2026, ISO/IEC 27001:2022 A.8.20-A.8.23, BSI 200-2 NET.1.1/NET.3.1, NIST SP 800-207.*

        c5_portability_interoperability:
            v1:
                title: 'Cloud Portability, Interoperability and Exit Strategy'
                body: |-
                    # Cloud Portability, Interoperability and Exit Strategy — {{ tenant.legal_name }}

                    *Document class: Topic policy | Norm anchors: BSI C5:2020 PI-01 to PI-04 + C5:2026 extension (PI) + ISO/IEC 27001:2022 Annex A.5.23, A.5.30 + ISO/IEC 27017:2015 CLD.6.3.1 + BSI 200-2 OPS.2.2.A12 + DORA Art. 28 (ICT TPP risk management) | Review interval: 24 months*

                    ## 1. Purpose
                    Governs avoidance of cloud lock-in, interoperability between cloud services and documented exit strategies for all cloud procedures of {{ tenant.legal_name }}. Operationalises C5:2020 PI-01 to PI-04 and BSI 200-2 OPS.2.2.A12 (exit concept).

                    ## 2. Scope
                    Covered are all cloud services — IaaS, PaaS, SaaS, FaaS — that process data or workloads of {{ tenant.legal_name }}. Embedded cloud components in on-prem software (telemetry, auto-update servers, licence activation, external AI APIs) are included.

                    ## 3. Responsibilities
                    - **CSO / Cloud architect:** design-time lock-in avoidance;
                    - **Service owner:** maintenance of exit strategy per service;
                    - **Procurement / Legal:** contractual securing of data export and deletion rights;
                    - **BCM ({{ roles.bcm.fullName }}):** integration of exit strategies into the contingency manual for critical services;
                    - **DORA function:** where regulated, securing the exit plan per Art. 28.

                    ## 4. Lock-In Avoidance by Design (PI-01, PI-02)
                    For architecture and procurement decisions, lock-in risks are assessed and documented:

                    - **Data portability:** open, documented, easily exportable formats (Parquet, CSV, JSON, OpenDocument);
                    - **Code portability:** prefer portable technologies where possible (Kubernetes vs proprietary orchestration, OCI containers, standard SQL);
                    - **Network portability:** standard protocols (HTTPS, OAuth 2.0, OIDC, gRPC);
                    - **Provider diversification:** critical workloads multi-cloud-capable or with documented secondary provider option;
                    - **Open-source alternatives** to proprietary cloud services are at minimum evaluated and documented.

                    ## 5. Interoperability (PI-03)
                    Cloud services are integrated using standardised interfaces:

                    - REST/gRPC APIs with OpenAPI/Protobuf specs;
                    - identity federation via OIDC, SAML, SCIM;
                    - event streaming with CloudEvents, Kafka-compatible brokers;
                    - storage with S3-compatible interfaces where possible;
                    - observability with OpenTelemetry.

                    ## 6. Exit Strategy per Service (PI-04)
                    A documented exit strategy is maintained per cloud service with:

                    1. **Migration path:** target platform options (alternative CSP, on-prem, hybrid);
                    2. **Data format:** export format and tools with sample export;
                    3. **Test run:** at least annual technical export test with documented results;
                    4. **Data volume / rate:** migration time estimate at realistic bandwidth;
                    5. **Secrets and key migration:** key re-wrap procedure, JWT/OAuth/certificate re-issuance;
                    6. **Deletion certificate:** contractually secured deletion at the leaving CSP within 30 days incl. deletion log;
                    7. **Cost estimate:** migration and parallel-operation costs;
                    8. **Timeline:** realistic migration duration, emergency acceleration option.

                    ## 7. DORA-Specific Exit Obligations
                    Where {{ tenant.legal_name }} falls under DORA (EU Regulation 2022/2554), additional obligations apply for ICT TPP risk management:

                    - exit plan is part of the ICT strategy (Art. 6);
                    - concentration risk assessment for critical cloud providers (Art. 29);
                    - contractual minimum clauses per Art. 30 incl. exit and audit rights;
                    - inclusion in the ICT third-party register and notification to the supervisor.

                    ## 8. Exit Test and Effectiveness Evidence
                    Exit tests are performed at least annually, semi-annually for critical services. Documentation covers test scope, result, deviations, action plan. Test reports are evidence for C5 Type 2 examinations and DORA supervision.

                    ## 9. Contractual Requirements
                    Cloud contracts include:

                    - documented right to data export in open formats;
                    - documented right to deletion with certificate post-termination;
                    - guaranteed minimum notice periods, emergency termination on breach;
                    - no "vendor hostage" clauses (data hostage, exclusive formats, tariff lock);
                    - migration support during a wind-down phase.

                    ## 10. Review Interval and Approval
                    Reviewed at least every 24 months. Approval: CSO + Procurement. Approval chain: {{ approval.chain }}.

                    ---
                    *Cross-ref: BSI C5:2020 PI-01 to PI-04, C5:2026, ISO/IEC 27001:2022 A.5.23, A.5.30, BSI 200-2 OPS.2.2.A12, DORA Art. 28-30, ENISA Cloud Exit Guidelines.*

        c5_procurement_supplier_management:
            v1:
                title: 'Cloud Procurement and Supplier Management'
                body: |-
                    # Cloud Procurement and Supplier Management — {{ tenant.legal_name }}

                    *Document class: Topic policy | Norm anchors: BSI C5:2020 DLL-01 to DLL-06 + C5:2026 extension (BPM, incl. supply-chain security SCS-1 to SCS-6) + ISO/IEC 27001:2022 Annex A.5.19-A.5.23 + ISO/IEC 27017:2015 + ISO/IEC 27018:2019 + BSI 200-2 OPS.2.3 + GDPR Art. 28, Art. 44-49 + DORA Art. 28-30 | Review interval: 12 months*

                    ## 1. Purpose
                    Governs selection, engagement, stewardship and termination of cloud suppliers and their subprocessors. Operationalises C5:2020 DLL-01 to DLL-06 and the C5:2026 extension on supply-chain security.

                    ## 2. Scope
                    Covered:

                    - primary cloud service providers (CSP);
                    - subprocessors (second-tier processors);
                    - software vendors with embedded cloud components (SaaS components, telemetry);
                    - open-source components (release stewardship, provenance, licence compliance);
                    - consulting and implementation partners with cloud access.

                    ## 3. Responsibilities
                    - **Procurement:** negotiation, contracting;
                    - **Legal:** review of DPA, SCC, subprocessor clauses, third-country transfer rules;
                    - **CSO / ISO:** review of security requirements and attestations;
                    - **DPO:** data protection review, third-country transfer, processor relationship;
                    - **Compliance / GRC:** supplier register and risk assessment, DORA register;
                    - **Service owner:** functional requirements, ongoing effectiveness review.

                    ## 4. Supplier Classification (DLL-01)
                    Suppliers are tiered by risk:

                    | Tier | Criteria | Review intensity |
                    |---|---|---|
                    | Low | no data access, no cloud workload | lightweight self-attestation |
                    | Medium | non-confidential data access or non-critical cloud component | self-attestation + sample review |
                    | High | processing of confidential / personal data | self-attestation + attestation requirement (C5, ISO 27001) + audit right |
                    | Critical | KRITIS / NIS2 / DORA-relevant or very high protection needs | on-site audit, on-site inspection, sharpened contractual clauses, concentration analysis |

                    ## 5. Selection Criteria (DLL-02, DLL-03)
                    Before contracting, a documented vendor assessment is performed. Minimum criteria:

                    1. **Compliance evidence:** BSI C5:2020 / C5:2026 Type 2 attestation (preferred for cloud), ISO/IEC 27001, ISO/IEC 27017, ISO/IEC 27018, SOC 2 Type II;
                    2. **Data location:** primarily EU/EEA, third country only with adequacy decision or appropriate safeguards (SCC + TIA);
                    3. **Security organisation:** established ISMS process, documented incident handling;
                    4. **Subprocessors:** complete list, change-notification right;
                    5. **Encryption:** TLS 1.3, AES-256 at rest, BYOK/HYOK options;
                    6. **Audit right:** at minimum acceptance of external attestation;
                    7. **Financial stability:** credit and insolvency-risk check;
                    8. **Continuity capability:** RTO/RPO commitments, tested disaster recovery plan;
                    9. **Transparency:** security documentation, trust centre, status page.

                    ## 6. Contractual Minimum Requirements (DLL-04)
                    Cloud contracts include:

                    - **data processing agreement** with instruction binding, confidentiality, TOMs, subprocessor list and change right;
                    - **incident notification:** vendor reports security incidents within 24 hours, data breaches within 36 hours;
                    - **audit and inspection rights;**
                    - **deletion and return rights** post-termination with certificate (cross-ref deletion concept);
                    - **liability and obligations** for breach;
                    - **third-country clauses** (SCC 2021/914 + TIA for USA, UK, India etc.);
                    - **SLA** with availability, response times, remedies;
                    - **exit and migration rights** (cross-ref PI policy).

                    ## 7. Subprocessors and Supply-Chain Security (DLL-05, C5:2026 SCS-1 to SCS-6)
                    Subprocessor stewardship:

                    - **subprocessor register** with purpose, location, data categories;
                    - **prior-consent requirement** for adding or changing subprocessors;
                    - **back-to-back contractual flow-down** of all security requirements;
                    - **regular review** of subprocessor attestations.

                    Software supply-chain security per C5:2026:

                    - **SBOM** for all consumed components (cross-ref AM);
                    - **Vulnerability tracking** in third-party components (CVE, CISA KEV);
                    - **Supplier security assessment** before engagement and regularly;
                    - **Secure software development practices** of the supplier (e.g. NIST SSDF);
                    - **Code signing and provenance** (Cosign, Sigstore, SLSA level ≥ 3 for critical components);
                    - **Dependency management** with version pinning and integrity checks.

                    ## 8. Ongoing Stewardship and Reporting (DLL-06)
                    Per supplier, at least annually, the following are measured and documented:

                    - current attestations and certificates;
                    - SLA achievement (availability, incidents);
                    - incident history with assessment;
                    - subprocessor changes;
                    - risk score with trend.

                    Critical suppliers are additionally reviewed quarterly.

                    ## 9. Termination and Off-Boarding
                    On termination:

                    - data export per exit strategy (cross-ref PI);
                    - lock all supplier identities in cloud services;
                    - deletion certificate from supplier within 30 days;
                    - update supplier register, DORA register where applicable.

                    ## 10. DORA-Specific Obligations
                    Where {{ tenant.legal_name }} falls under DORA:

                    - **ICT TPP register** of all critical third parties (Art. 28);
                    - **concentration risk analysis** for multi-dependency on a CSP (Art. 29);
                    - **contractual mandatory contents** per Art. 30 incl. sub-outsourcing, audit right, exit plan;
                    - **notification of critical third parties** to the supervisor.

                    ## 11. Review Interval and Approval
                    Reviewed at least every 12 months. Approval: CSO + Procurement. Approval chain: {{ approval.chain }}.

                    ---
                    *Cross-ref: BSI C5:2020 DLL-01 to DLL-06, C5:2026 SCS-1 to SCS-6, ISO/IEC 27001:2022 A.5.19-A.5.23, ISO/IEC 27017:2015, ISO/IEC 27018:2019, BSI 200-2 OPS.2.3, GDPR Art. 28 / Art. 44-49, DORA Art. 28-30, NIST SSDF, SLSA.*

        c5_compliance_audit:
            v1:
                title: 'Cloud Compliance, Audit and C5 Examination'
                body: |-
                    # Cloud Compliance, Audit and C5 Examination — {{ tenant.legal_name }}

                    *Document class: Topic policy | Norm anchors: BSI C5:2020 COM-01 to COM-05 + C5:2026 extension (COM, incl. EUCS Substantial alignment) + ISO/IEC 27001:2022 Annex A.5.31-A.5.36 + ISO/IEC 27017:2015 + ISO/IEC 27018:2019 + GDPR Art. 28 + DORA Art. 6, Art. 28 | Review interval: 24 months*

                    ## 1. Purpose
                    Governs compliance stewardship, audit readiness and execution of the C5 examination (Type 1 / Type 2 subject-matter examination) for all cloud procedures of {{ tenant.legal_name }}. Operationalises C5:2020 COM-01 to COM-05 and the C5:2026 extension on harmonisation with the European Cloud Services Scheme (EUCS) at Assurance Level Substantial.

                    ## 2. Scope
                    Covered are all cloud procedures of {{ tenant.legal_name }} in the defined examination scope and all functions contributing to compliance (architecture, operations, IAM, KMS, SOC, GRC).

                    ## 3. Responsibilities
                    - **CSO / ISO:** owner of this policy, audit programme stewardship;
                    - **Compliance manager / GRC:** evidence management, auditor liaison;
                    - **DPO:** data protection compliance, register of processing activities (RoPA);
                    - **Internal audit:** independent reviews (cross-ref OIS segregation of duties);
                    - **Service owner:** evidence delivery within the area of responsibility;
                    - **Top management:** approval and acceptance of audit reports.

                    ## 4. Identification of Regulatory Requirements (COM-01)
                    {{ tenant.legal_name }} maintains a register of all cloud-relevant regulatory and contractual requirements:

                    - **GDPR** (Art. 28, Art. 32, Art. 33-34, Art. 44-49) and national data protection law (BDSG);
                    - **NIS2 transposition law** and KRITIS regulation where applicable;
                    - **DORA** (EU 2022/2554) where financial services are provided;
                    - **EU AI Act** where AI systems are operated;
                    - **EUCS** (European Cloud Services Scheme) at Basic, Substantial or High;
                    - sector-specific obligations (e.g. § 203 StGB for professional secrecy holders, MaRisk for financial sector, KHZG for hospitals);
                    - contractual obligations from customer contracts (e.g. C5 attestation requirement).

                    Register is updated at least annually.

                    ## 5. C5 Examination — Approach and Examination Types (COM-02)

                    ### 5.1 Examination types per C5
                    The C5 examination follows IDW PS 860 and ISAE 3000 / ISAE 3402 as a subject-matter examination in two flavours:

                    | Type | Content | Period | Statement |
                    |---|---|---|---|
                    | Type 1 | adequacy of description and controls | point in time | "as of date X the controls were suitable" |
                    | Type 2 | adequacy + effectiveness over time | at least 6 months | "during X to Y the controls operated effectively" |

                    Type 2 is industry standard and customer-preferred. Type 1 is the entry-level view for first-time examinations.

                    ### 5.2 Examination process (subject-matter examination)
                    1. **Scope definition** (cloud service, region, components, subprocessors);
                    2. **System description** by CSP (comprehensive depiction of controls per C5 criterion);
                    3. **Auditor selection** (qualified auditor per IDW PS 860, personal independence);
                    4. **Audit execution** with walkthrough, design test, operating effectiveness test (Type 2);
                    5. **Audit report** with opinion (unqualified / qualified / adverse / disclaimer);
                    6. **Publication** of the report to cloud customers under confidentiality;
                    7. **Continuous audit readiness** in the following period.

                    ### 5.3 Evidence management
                    Per C5 criterion, evidence is maintained in the GRC tool:

                    - current configuration snapshots;
                    - log extracts for relevant periods;
                    - approval tickets, change records, four-eyes evidence;
                    - training and awareness records;
                    - contracts and SLA reports.

                    Retention at least 5 years after audit report publication.

                    ## 6. EUCS Substantial Alignment (C5:2026)
                    The C5:2026 extension references EUCS Substantial. Where customers require EUCS-conformant evidence:

                    - mapping C5:2026 criteria to EUCS Substantial requirements;
                    - additional EUCS-specific requirements tracked in the compliance register;
                    - auditor qualified for EUCS preparation.

                    ## 7. Internal Audit Programme (COM-03)
                    Internal audit programme:

                    - **risk-based audit planning** over a 3-year cycle with annual update;
                    - **audit universe** with all C5 domains, weighted by risk;
                    - **at least annual audit** per C5 domain with report to CSO and top management;
                    - **finding tracking** in the GRC tool with SLA-based remediation (Critical 30 days, High 90 days, Medium 180 days, Low 365 days);
                    - **follow-up audit** to confirm effectiveness;
                    - **escalation** of unresolved findings to top management.

                    ## 8. External Audits and Certifications (COM-04)
                    External examinations:

                    - **C5 Type 2 examination** annually (scope per Section 5);
                    - **ISO/IEC 27001 certification** with annual surveillance audit, recertification every 3 years;
                    - **ISO/IEC 27017** and **ISO/IEC 27018** as Annex certifications where customers require;
                    - **GDPR Art. 28 audit rights** by cloud customers, contractually regulated;
                    - **DORA supervisory examinations** and ESA requirements for financial services;
                    - **penetration tests** at least annually, semi-annually for critical services;
                    - **red teaming** at least every 2 years.

                    ## 9. Data Protection Compliance (COM-05)
                    GDPR-specific requirements:

                    - register of processing activities (RoPA) up to date;
                    - data processing agreements (DPA) with all cloud providers (cross-ref supplier policy);
                    - data protection impact assessments (DPIA) for high-risk processing;
                    - third-country transfer assessment (TIA per Schrems II);
                    - data breach notification (Art. 33 within 72 hours, Art. 34 if high risk);
                    - data subject rights (Art. 15-21).

                    For PII processing in public clouds, ISO/IEC 27018:2019 (PII processor in the public cloud) additionally applies.

                    ## 10. Reporting to Top Management
                    At least semi-annually, a compliance report is delivered to top management:

                    - status of ongoing audits and certifications;
                    - open C5 and ISO findings with risk score;
                    - changes in regulatory requirements;
                    - DORA-specific reporting where applicable.

                    ## 11. Review Interval and Approval
                    Reviewed at least every 24 months. Approval: top management + CSO + DPO. Approval chain: {{ approval.chain }}.

