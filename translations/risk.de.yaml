  tooltip:
    probability: '<strong>🎲 Wie wahrscheinlich ist der Eintritt?</strong><br><em>Frage:
      Wie oft könnte dieses Risiko eintreten?</em><br><br><strong>1</strong> = Sehr
      selten (1× in 10+ Jahren)<br><em>z.B. Erdbeben, Flugzeugabsturz</em><br><strong>2</strong>
      = Selten (1× in 5 Jahren)<br><em>z.B. Großbrand, schwerer Cyberangriff</em><br><strong>3</strong>
      = Gelegentlich (1× pro Jahr)<br><em>z.B. Stromausfall, Datenpanne</em><br><strong>4</strong>
      = Häufig (mehrmals/Jahr)<br><em>z.B. Phishing-Versuche, Mitarbeiterfluktuation</em><br><strong>5</strong>
      = Sehr häufig (monatlich+)<br><em>z.B. Spam, Login-Fehlversuche</em>'
    impact: '<strong>💥 Wie schwer wäre der Schaden?</strong><br><em>Frage: Was passiert,
      wenn das Risiko eintritt?</em><br><br><strong>1</strong> = Minimal (&lt;1.000€,
      kein Betriebsausfall)<br><em>z.B. einzelner PC defekt</em><br><strong>2</strong>
      = Gering (1.000-10.000€, Stunden Ausfall)<br><em>z.B. Server-Neustart nötig</em><br><strong>3</strong>
      = Mittel (10.000-100.000€, Tage Ausfall)<br><em>z.B. Abteilung lahmgelegt</em><br><strong>4</strong>
      = Hoch (100.000-1Mio€, Wochen Ausfall)<br><em>z.B. Ransomware, Datenleck</em><br><strong>5</strong>
      = Katastrophal (&gt;1Mio€, existenzbedrohend)<br><em>z.B. kompletter Datenverlust,
      Insolvenz</em>'
    residual_probability: '<strong>📉 Restwahrscheinlichkeit nach Maßnahmen</strong><br><em>Frage:
      Wie wahrscheinlich ist das Risiko NACHDEM Sie Maßnahmen umgesetzt haben?</em><br><br>Beispiel:
      Phishing-Risiko<br>• Vorher: 4 (häufig)<br>• Nach Schulung + Spam-Filter: 2
      (selten)<br><br><em>Tipp: Realistisch bleiben - 0 gibt es nicht!</em>'
    residual_impact: '<strong>📉 Restschaden nach Maßnahmen</strong><br><em>Frage:
      Wie schwer wäre der Schaden NACHDEM Sie Maßnahmen umgesetzt haben?</em><br><br>Beispiel:
      Datenverlust<br>• Vorher: 5 (katastrophal)<br>• Nach Backup-Strategie: 2 (gering,
      nur 1 Tag verloren)<br><br><em>Tipp: Maßnahmen reduzieren oft die Auswirkung
      mehr als die Wahrscheinlichkeit!</em>'
    treatment_strategy: <strong>🛡️ Wie gehen Sie mit dem Risiko um?</strong><br><br><strong>Vermeiden</strong><br>Aktivität
      einstellen, Risikoquelle eliminieren<br><em>z.B. unsichere Software nicht mehr
      nutzen</em><br><br><strong>Reduzieren</strong> (häufigste Wahl)<br>Maßnahmen
      implementieren<br><em>z.B. Firewall, Schulungen, Backups</em><br><br><strong>Übertragen</strong><br>Risiko
      an Dritte abgeben<br><em>z.B. Versicherung, Outsourcing</em><br><br><strong>Akzeptieren</strong><br>Bewusst
      tolerieren (mit Begründung!)<br><em>z.B. Kosten der Maßnahme > möglicher Schaden</em>
    category: <strong>📁 Risikokategorie</strong><br><em>Hilft bei der Zuordnung und
      Auswertung</em><br><br><strong>Technisch</strong><br>IT-Systeme, Software, Hardware<br><em>z.B.
      Serverausfall, Softwarefehler</em><br><br><strong>Organisatorisch</strong><br>Prozesse,
      Personal, Know-how<br><em>z.B. Wissensverlust, Fehlbedienung</em><br><br><strong>Physisch</strong><br>Gebäude,
      Infrastruktur<br><em>z.B. Einbruch, Wasserschaden</em><br><br><strong>Compliance</strong><br>Gesetze,
      Verträge, Regulatorik<br><em>z.B. DSGVO-Verstoß, Audit-Mängel</em>
