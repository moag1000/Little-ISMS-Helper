clauses:
    heading: 'Pflichtklauseln nach Art. 28 Abs. 3 DSGVO'
    a:
        heading: 'Weisungsgebundenheit'
        body: >
            Der Auftragnehmer verarbeitet personenbezogene Daten ausschließlich auf dokumentierte Weisung des
            Auftraggebers. Erhält der Auftragnehmer eine behördliche Anordnung zur Offenlegung, unterrichtet er
            den Auftraggeber unverzüglich, sofern dies rechtlich zulässig ist.
    b:
        heading: 'Vertraulichkeit'
        body: >
            Der Auftragnehmer stellt sicher, dass sich die zur Verarbeitung befugten Personen zur Vertraulichkeit
            verpflichtet haben oder einer angemessenen gesetzlichen Verschwiegenheitspflicht unterliegen.
    c:
        heading: 'Technische und organisatorische Maßnahmen'
        body: >
            Der Auftragnehmer ergreift alle erforderlichen Maßnahmen gemäß Art. 32 DSGVO zur Sicherheit der
            Verarbeitung. Die konkret implementierten Maßnahmen sind im Abschnitt »TOMs« dieses Vertrags
            dokumentiert.
    d:
        heading: 'Hinzuziehung weiterer Auftragsverarbeiter'
        body: >
            Der Auftragnehmer darf weitere Auftragsverarbeiter (Unterauftragnehmer) nur mit vorheriger
            ausdrücklicher oder allgemeiner schriftlicher Genehmigung des Auftraggebers hinzuziehen. Im Fall
            einer allgemeinen Genehmigung informiert der Auftragnehmer den Auftraggeber über beabsichtigte
            Änderungen und räumt ihm die Möglichkeit ein, diese zu untersagen.
    e:
        heading: 'Unterstützung bei Betroffenenrechten'
        body: >
            Der Auftragnehmer unterstützt den Auftraggeber durch geeignete technische und organisatorische
            Maßnahmen dabei, seiner Verpflichtung zur Beantwortung von Anträgen auf Ausübung der Rechte
            betroffener Personen (Art. 15–22 DSGVO) nachzukommen.
    f:
        heading: 'Unterstützung bei Sicherheitspflichten'
        body: >
            Der Auftragnehmer unterstützt den Auftraggeber unter Berücksichtigung der Art der Verarbeitung
            und der ihm zur Verfügung stehenden Informationen bei der Einhaltung der Pflichten gemäß
            Art. 32–36 DSGVO (Sicherheit, Meldung von Verletzungen, DSFA, Vorabkonsultation).
    g:
        heading: 'Löschung oder Rückgabe der Daten'
        body: >
            Nach Abschluss der Verarbeitungsleistungen löscht oder gibt der Auftragnehmer — nach Wahl des
            Auftraggebers — alle personenbezogenen Daten zurück und löscht vorhandene Kopien, sofern keine
            Pflicht zur Speicherung nach dem Unionsrecht oder dem Recht der Mitgliedstaaten besteht.
    h:
        heading: 'Nachweispflichten und Auditrechte'
        body: >
            Der Auftragnehmer stellt dem Auftraggeber alle erforderlichen Informationen zum Nachweis der
            Einhaltung der in diesem Artikel niedergelegten Pflichten zur Verfügung und ermöglicht Prüfungen
            einschließlich Inspektionen, die vom Auftraggeber oder einem anderen vom Auftraggeber beauftragten
            Prüfer durchgeführt werden, und trägt dazu bei.

