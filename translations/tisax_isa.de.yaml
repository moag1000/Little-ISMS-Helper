# Übersetzungsdatei: tisax_isa (Deutsch)
# Domäne: TISAX VDA-ISA Import-Wizard + Assessment
#
# Root-Schlüssel ist "tisax:" damit Templates mit tisax.import.* funktionieren.
# Domänenname (tisax_isa) bleibt unverändert — er bestimmt nur die Datei.

tisax:
  nav:
    title: 'TISAX VDA-ISA Import'

  page:
    title: 'TISAX BYO VDA-ISA Import-Assistent'
    subtitle: 'Laden Sie Ihr lizenziertes VDA-ISA-Workbook hoch und bewerten Sie Reifegrad 0–5 pro Anforderung'

  step:
    disclaimer: 'Rechtliche Bestätigung'
    upload: 'Hochladen'
    validate: 'Prüfen'
    preview: 'Vorschau'
    commit: 'Festschreiben'
    assess: 'Bewerten'

  import:
    nav:
      title: 'TISAX VDA-ISA Import'

    page:
      title: 'TISAX BYO VDA-ISA Import-Assistent'
      subtitle: 'Laden Sie Ihr lizenziertes VDA-ISA-Workbook hoch und bewerten Sie Reifegrad 0–5 pro Anforderung'

    step:
      disclaimer: 'Rechtliche Bestätigung'
      upload: 'Hochladen'
      validate: 'Prüfen'
      preview: 'Vorschau'
      commit: 'Festschreiben'
      assess: 'Bewerten'

    disclaimer:
      title: 'Rechtliche Bestätigung — ENX-Lizenz'
      legal_notice: 'Wichtiger Hinweis: Lizenzpflicht'
      body_1: 'Der VDA-ISA-Katalog (Information Security Assessment) wird vom VDA/ENX Association veröffentlicht und ist urheberrechtlich geschützt. Die Kataloginhalte können nicht mit dieser Anwendung ausgeliefert werden.'
      body_2: 'Vor dem Hochladen Ihres Workbooks müssen Sie bestätigen, dass:'
      bullet_1: 'Sie über eine gültige, aktuelle ENX-Mitgliedschaft oder -Lizenz verfügen, die zur Nutzung des VDA-ISA-Workbooks berechtigt.'
      bullet_2: 'Das Workbook über offizielle ENX-Kanäle bezogen wurde und nicht in einer lizenzverletzenden Weise verändert wurde.'
      bullet_3: 'Sie die alleinige Verantwortung dafür übernehmen, die Lizenzcompliance Ihrer Organisation sicherzustellen.'
      body_3: 'Wir halten Ihre Bestätigung mit Datum fest — das ist völlig normal und dient nur dem Audit-Nachweis. (Technisch: Zeitstempel + IP, ISO 27001 7.5.3; IP nach 365 Tagen anonymisiert, DSGVO Art. 5.)'
      checkbox_label: 'Ich bestätige, dass ich für das VDA-ISA-Workbook, das ich hochladen möchte, eine gültige ENX-Lizenz besitze.'
      must_confirm: 'Sie müssen die Lizenz-Compliance bestätigen, bevor Sie fortfahren.'
      confirm_button: 'Bestätigen und weiter'
      confirmed: 'Lizenzbestätigung wurde erfasst. Sie können Ihr Workbook jetzt hochladen.'
      enx_notice:
        title: 'Rechtlicher Hinweis: Unvollständiger Katalog (ENX-Lizenz)'
        body: 'Das mitgelieferte TISAX-Framework ist absichtlich unvollständig. Die VDA-ISA-Originalfragen sind durch die ENX Association lizenziert und dürfen nicht mitgeliefert werden — deshalb bringen Sie Ihr eigenes Workbook mit (BYO). Was ist ENX? Die Organisation, die TISAX/VDA-ISA herausgibt; die Lizenz bekommen Sie über Ihren TISAX-Zugang.'
        steps_heading: 'So gehen Sie vor:'
        steps:
          1: 'Ihr ausgefülltes Self-Assessment bereithalten (vom Berater/Audit) — oder ein leeres Workbook beziehen über die '
          2: 'Ihr (ausgefülltes) Workbook hier hochladen — Sie müssen kein leeres herunterladen, wenn Sie schon eines haben'
          3: 'Reifegrad-Bewertung prüfen/ergänzen — alle ~80 Anforderungen werden dann verfügbar'
        after_import_label: 'Nach dem Import'
        after_import: 'Ihre Anforderungen werden automatisch erstellt und die TISAX-Abdeckung berechnet. Die Zuordnung zu ISO 27001:2022 (und darüber zu NIS2/DORA) läuft ohne weitere Aktion.'

    upload:
      title: 'VDA-ISA-Workbook hochladen'
      subtitle: 'Laden Sie Ihr ENX-lizenziertes VDA-ISA-Excel-Workbook hoch (.xlsx)'
      instruction: 'Laden Sie die VDA-ISA-Workbook-Datei hoch. Die Datei muss im XLSX-Format vorliegen und ein Tabellenblatt "Informationssicherheit", "Information Security", "Prototypenschutz" oder äquivalent enthalten.'
      field_label: 'VDA-ISA-Workbook (.xlsx)'
      help: 'Akzeptiert: .xlsx, max. 10 MB. Die Datei wird vor dem Import analysiert und geprüft.'
      submit_button: 'Hochladen und prüfen'
      required: 'Bitte wählen Sie eine Workbook-Datei aus.'
      xlsx_only: 'Nur XLSX-Dateien werden akzeptiert.'
      too_large: 'Die Datei darf 10 MB nicht überschreiten.'
      disclaimer_required: 'Bitte bestätigen Sie den Lizenz-Disclaimer, bevor Sie hochladen.'
      security_rejected: 'Die Datei wurde vom Sicherheits-Scanner abgelehnt. Bitte laden Sie eine gültige XLSX-Datei hoch.'
      workbook_help:
        title: 'Wo erhalte ich das offizielle ENX-ISA-6-Workbook?'
        download_intro: 'Laden Sie das offizielle ENX-ISA-6-Workbook direkt über das ENX-Portal herunter (ENX-Mitgliedschaft erforderlich):'
        en_label: 'Englisch'
        de_label: 'Deutsch'
        expected_sheets_title: 'Erwartete Tabellenblatt-Namen (der Parser wählt den ersten Treffer):'
        troubleshoot_hint: 'Wenn der Parser Ihr Workbook ablehnt, prüfen Sie, ob es ein Tabellenblatt "Informationssicherheit" (DE) oder "Information Security" (EN) enthält. Workbooks, bei denen diese Tabellenblätter umbenannt wurden, werden nicht erkannt.'
        sheets_en_label: 'EN'
        sheets_de_label: 'DE'

    validate:
      title: 'Workbook-Validierung'
      subtitle: 'Struktur und Kontroll-ID-Format werden geprüft'
      summary: 'Validierungszusammenfassung'
      sheet: 'Tabellenblatt'
      control_count: 'Gefundene Kontrollzeilen'
      detected_columns: 'Erkannte Spalten'
      errors_heading: 'Validierungsfehler (Import gesperrt):'
      warnings_heading: 'Warnungen (nicht blockierend):'
      ok: 'Das Workbook hat alle Validierungsprüfungen bestanden. Sie können fortfahren.'
      proceed: 'Weiter zur Vorschau'
      no_workbook: 'Kein Workbook in der Sitzung gefunden. Bitte laden Sie es erneut hoch.'
      legacy_five_partial: 'ISA %version%-Workbook erkannt: Teilimport mit %count% Controls. ISA 5.x ist eine Teilmenge von ISA 6 — passende Controls werden übernommen, die nur in ISA 6 enthaltenen Controls (u. a. erweitertes Datenschutz-Modul) bleiben unbewertet.'
      workbook_size_hint: 'ein vollständiges ISA-6-Workbook hat ca. 80 Anforderungen'
      legend_desc: 'Grün = alles ok, weiter. Gelb = Hinweis (z. B. ältere Version), Sie dürfen trotzdem weiter. Rot = Stopp, bitte eine ISA-6-Datei laden.'
      col_label:
        controlId: 'Kontroll-Nummer'
        titleDe: 'Kontrollfrage'
        titleEn: 'Kontrollfrage (EN)'
        description: 'Ziel'
        maturityCurrent: 'Reifegrad'
        implementationDescription: 'Umsetzung (Maßnahme)'
        referenceDocumentation: 'Referenz-Dokumentation'
        iso27001Ref: 'ISO-27001-Bezug'
        evidenceHint: 'Nachweis-Hinweis'
        mustLevel: 'Muss'
        shouldLevel: 'Sollte'
        highLevel: 'Hoher Schutzbedarf'
        veryHighLevel: 'Sehr hoher Schutzbedarf'
        sgaLevel: 'SGA'

    preview:
      title: 'Import-Vorschau'
      subtitle: 'Delta überprüfen, bevor die Datenbank beschrieben wird'
      delta:
        total: 'Anforderungen gesamt'
        new: 'Neu (werden erstellt)'
        existing: 'Bereits vorhanden (Reifegrad bleibt — wird nur überschrieben, wenn Sie es im nächsten Schritt anhaken)'
      sample_heading: 'Kontrollen-Stichprobe (erste 20 Zeilen)'
      col:
        id: 'Kontroll-ID'
        title: 'Frage / Anforderung'
        iso_ref: 'ISO 27001 Referenz'
        tier: 'Bereich'
        req_levels: 'Anforderungsebenen'
        req_levels_tooltip: 'M=Muss, S=Sollte, H=zusätzlich bei hohem Schutzbedarf, VH=zusätzlich bei sehr hohem Schutzbedarf, SGA=vereinfachtes Gruppen-Assessment. Welche Ebene für Sie gilt, hängt vom geforderten Schutzbedarf ab. Die Badges zeigen nur, dass es zu dieser Ebene einen Anforderungstext gibt.'
      proceed: 'Weiter zur Bestätigung'

    commit:
      title: 'Import festschreiben'
      subtitle: 'Anforderungen in die Datenbank schreiben'
      confirm_heading: 'Bereit zum Festschreiben?'
      confirm_body: 'Hiermit werden %new% neue Anforderungen erstellt und %existing% bestehende Anforderungen unter Framework „%framework%" aktualisiert.'
      irreversible_note: 'Bestehende Anforderungen werden direkt überschrieben. Diese Aktion kann mit einer neuen Workbook-Version erneut ausgeführt werden.'
      submit_button: 'Import festschreiben'
      success: 'VDA-ISA-Anforderungen wurden erfolgreich importiert.'
      company_mismatch_title: 'Organisation weicht ab'
      company_mismatch_body: 'Das Self-Assessment ist auf „%workbook%" ausgestellt, Ihre Organisation heißt hier „%org%". Oft ist das nur eine andere Schreibweise — kein Grund zur Sorge. Prüfen Sie nur kurz, dass es Ihre Datei ist, und bestätigen Sie.'
      company_confirm_label: 'Ich bestätige, dass das Self-Assessment von „%workbook%" zu unserer Organisation gehört und importiert werden soll.'
      company_confirm_required: 'Bitte bestätigen Sie die abweichende Organisation, bevor der Import festgeschrieben wird.'
      maturity_diff_title: 'Reifegrad-Abweichungen (%count%)'
      maturity_diff_body: 'Für diese Anforderungen weicht der Reifegrad im Workbook vom bereits gespeicherten Stand ab. Wählen Sie aus, welche Workbook-Werte den aktuellen Stand überschreiben sollen. Nicht angehakte Anforderungen behalten ihren bisherigen Reifegrad.'
      maturity_diff_select_all: 'Alle übernehmen'
      maturity_diff_col_control: 'Anforderung'
      maturity_diff_col_current: 'Aktuell'
      maturity_diff_col_workbook: 'Workbook'

    assess:
      title: 'Reifegrad-Bewertung'
      subtitle: 'Reifegrad 0–5 für jede Anforderung festlegen'
      avg_reifegrad: 'Durchschnittlicher Reifegrad'
      assessed: 'Bewertet'
      requirements_heading: 'Anforderungen'
      reifegrad_hint: '<strong>So bewerten Sie:</strong> Der <em>Reifegrad</em> ist ein Reifegradmodell wie bei einer ISO-9001-Prozessbewertung — <strong>0</strong> = nicht umgesetzt … <strong>3 (Etabliert)</strong> = Zielwert für TISAX … <strong>5</strong> = optimiert. Diese Liste ist im Grunde Ihre <em>Selbstbewertungs-Checkliste</em>. Pro Anforderung den passenden Reifegrad wählen; Datenschutz-Anforderungen werden stattdessen mit <em>OK / Nicht OK</em> beantwortet.'
      dp_note: 'Bewertung mit OK / Nicht OK (kein Reifegrad)'
      success_heading: 'Import abgeschlossen.'
      success_desc: 'Ihre TISAX-Bewertung ist gespeichert — sehen Sie Abdeckung, Bereiche und Lücken in der Übersicht.'
