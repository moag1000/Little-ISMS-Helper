        req_levels_tooltip: 'M=Muss, S=Sollte, H=Hoher Schutzbedarf, VH=Sehr hoher Schutzbedarf. Farbige Badges = Inhalt vorhanden (nur ob ein Anforderungstext existiert).'
      save_button: 'Bewertung speichern'
