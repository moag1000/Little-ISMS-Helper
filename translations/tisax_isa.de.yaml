        performed: 'Durchgeführt — ad-hoc'
        managed: 'Gemanagt — geplant und nachverfolgt'
        established: 'Etabliert — standardisiert'
        predictable: 'Vorhersagbar — gemessen'
        optimising: 'Optimierend — kontinuierlich verbessert'
