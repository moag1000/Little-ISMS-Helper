help:
    iso9001_bridge:
        title: "From ISO 9001 to ISO 27001 — Your Guide"
        subtitle: "Leverage your QMS knowledge for your information security journey"
        intro_title: "You know ISO 9001? Then you already know a lot!"
        intro_text: "ISO 27001 builds on similar principles. Both standards share the High-Level Structure (HLS) and follow the PDCA cycle. Here you can see where your existing knowledge is directly applicable."

        mapping_title: "Concept Mapping: 9001 → 27001"
        col_9001: "What you know from 9001"
        col_27001: "Called in 27001"
        col_tool: "Where in the tool"
        col_reference: "Standard Reference"

        map:
            context:
                from: "Context of the Organization (4.1)"
                to: "ISMS Context & Scope"
                module: "Context Module"
            process_map:
                from: "Process Landscape"
                to: "Statement of Applicability (SoA)"
                module: "SoA Module"
            risks:
                from: "Risks & Opportunities (6.1)"
                to: "Risk Assessment"
                module: "Risk Module"
            capa:
                from: "CAPA (Corrective Actions)"
                to: "Risk Treatment Plan"
                module: "Treatment Plans"
            audit:
                from: "Internal Audit (9.2)"
                to: "Internal ISMS Audit"
                module: "Audit Module"
            review:
                from: "Management Review (9.3)"
                to: "Management Review"
                module: "Reviews Module"
            infrastructure:
                from: "Infrastructure (7.1.3)"
                to: "Assets / Information Assets"
                module: "Asset Module"
            competence:
                from: "Competence (7.2)"
                to: "Awareness & Training"
                module: "Training Module"
            documents:
                from: "Documented Information (7.5)"
                to: "ISMS Documentation"
                module: "Documents Module"
            suppliers:
                from: "Supplier Evaluation (8.4)"
                to: "Supplier Security"
                module: "Supplier Module"
            nonconformity:
                from: "Nonconformity (10.2)"
                to: "Security Incident"
                module: "Incident Module"

        new_title: "What is NEW in ISO 27001?"
        new_intro: "These concepts do not exist in ISO 9001 — they are specific to information security."

        new:
            cia:
                title: "Confidentiality, Integrity, Availability (CIA)"
                description: "In 9001 it is about quality, in 27001 it is about information security. Every piece of information is evaluated against these three protection goals."
            controls:
                title: "93 Controls (Annex A)"
                description: "Like a catalog of best practices — from access controls to cryptography. There is no equivalent in 9001."
            protection:
                title: "Protection Requirements"
                description: "How important is which information? Every asset is rated by confidentiality, integrity, and availability."
            bcm:
                title: "Business Continuity"
                description: "What to do when everything fails? Emergency plans, recovery times, and exercises — prepared for the worst case."
            gdpr:
                title: "Data Protection (GDPR)"
                description: "Complements ISO 27001 with the protection of personal data. Especially relevant for companies in the EU."

        tip_title: "Getting Started Tip"
        tip_text: "Start with the Context module and Assets — these areas are most familiar from 9001. From there, the new 27001 concepts will unfold step by step."

    glossary:
        title: "ISMS Glossary — Terms Explained Simply"
        subtitle: "Information security terminology explained in plain language"
        intro_title: "Quick term reference"
        intro_text: "This glossary explains key information security terms. Where possible, you will find analogies to ISO 9001 to ease the transition."
        search_placeholder: "Search term..."
        all_categories: "All categories"
        reset: "Reset"
        no_results: "No matching term found. Please try a different search."
        analogy_label: "9001 Analogy:"
        tip_title: "Tip"
        tip_text: "Use the search field above to quickly find a term. The category filter lets you browse by topic area."

        category:
            basics: "Basic Concepts"
            risk: "Risk Management"
            compliance: "Compliance & Audit"
            bcm: "Business Continuity (BCM)"
            privacy: "Privacy & GDPR"
            operations: "Operations & Incidents"
            governance: "Governance & Management"
            technical: "Technical & Infrastructure"

        term:
            isms:
                name: "ISMS"
                definition: "Information Security Management System. The overall system of policies, processes, and measures to protect information."
                analogy: "Like your QMS, but for information security instead of quality."
            asset:
                name: "Asset"
                definition: "Information asset. Anything worth protecting for the organization: IT systems, data, software, but also people and locations."
                analogy: "\"Infrastructure\" from Clause 7.1.3 — but broader in scope."
            control:
                name: "Control"
                definition: "Security control/measure. A concrete protective action (e.g., \"access control\"). ISO 27001 Annex A defines 93 of them."
            soa:
                name: "SoA (Statement of Applicability)"
                definition: "Statement of Applicability. A list of all 93 controls with justification for why each is applicable or not."
                analogy: "Similar to the process landscape — shows what is in scope."
            cia:
                name: "CIA (Confidentiality, Integrity, Availability)"
                definition: "Confidentiality, Integrity, Availability. The three protection goals of information security."
            risk:
                name: "Risk"
                definition: "Combination of likelihood of occurrence and impact of damage."
                analogy: "Risks and opportunities from Clause 6.1 — but with a formal assessment matrix."
            inherent_risk:
                name: "Inherent Risk"
                definition: "The original risk BEFORE any measures are taken."
            residual_risk:
                name: "Residual Risk"
                definition: "The remaining risk AFTER implementation of measures."
            treatment_strategy:
                name: "Treatment Strategy"
                definition: "Risk treatment options: accept, mitigate (implement measures), transfer (e.g., insurance), avoid."
            risk_appetite:
                name: "Risk Appetite"
                definition: "How much risk is the organization willing to tolerate?"
            schutzbedarf:
                name: "Protection Requirement (Schutzbedarf)"
                definition: "BSI term: How worthy of protection is a piece of information? Categories: normal, high, very high."
            compliance_framework:
                name: "Compliance Framework"
                definition: "A set of rules/standards that must be met (e.g., ISO 27001, TISAX, DORA, NIS2)."
            audit:
                name: "Audit"
                definition: "Systematic review of whether requirements are fulfilled."
                analogy: "Internal audit from Clause 9.2 — same methodology, different audit criteria."
            management_review:
                name: "Management Review"
                definition: "Regular evaluation of the ISMS by top management."
                analogy: "Management review from Clause 9.3 — practically identical."
            dpia:
                name: "DPIA (Data Protection Impact Assessment)"
                definition: "Data Protection Impact Assessment. Required when there is high risk to personal data (GDPR Art. 35)."
            vvt:
                name: "RoPA (Records of Processing Activities)"
                definition: "Mandatory documentation under GDPR Art. 30. Documents which personal data is processed, how, and why."
            rto:
                name: "RTO (Recovery Time Objective)"
                definition: "Maximum time until a system must be restored."
            rpo:
                name: "RPO (Recovery Point Objective)"
                definition: "Maximum tolerable data loss (in hours)."
            mtpd:
                name: "MTPD (Maximum Tolerable Period of Disruption)"
                definition: "The absolute limit for how long a disruption can last."
            bia:
                name: "BIA (Business Impact Analysis)"
                definition: "Analysis of which business processes are how critical."
            scope:
                name: "Scope"
                definition: "The boundary of the ISMS. Defines which locations, departments, processes, and IT systems are covered (Clause 4.3)."
                analogy: "Equivalent to the QMS scope from Clause 4.3 — same logic, same clause number."
            context:
                name: "Context of the Organization"
                definition: "The internal and external issues that influence the ISMS (Clause 4.1). Regulatory requirements, market environment, organizational culture, and expectations of interested parties (Clause 4.2)."
                analogy: "Identical to Clause 4.1 in ISO 9001 — you already know this."
            annex_a:
                name: "Annex A"
                definition: "The normative annex of ISO 27001 containing 93 reference controls in 4 themes: Organizational (A.5), People (A.6), Physical (A.7), Technological (A.8). Forms the basis for the SoA."
            tenant:
                name: "Tenant"
                definition: "An independent organizational unit in the tool with its own assets, risks, controls, and users, strictly separated from other tenants. Allows operating multiple ISMS in a single installation."
            module:
                name: "Module"
                definition: "Functionally self-contained building block of the tool that can be independently activated/deactivated. Examples: Asset Management, Risk Management, BCM, Multi-Framework Compliance. Core modules (Core ISMS, User Management) always active. Optional modules as needed."
            guided_tour:
                name: "Guided Tour"
                definition: "Interactive introduction that explains key areas step by step. Highlight frame points to UI elements with explanatory text. Different tours per role (Junior, ISB, CISO, Auditor). Restartable anytime via user menu."
                analogy: "Like initial training for new QMS software — digital and repeatable anytime."
            threat:
                name: "Threat"
                definition: "A potential cause of a security incident. Examples: hacker attack, fire, human error. Threats exploit vulnerabilities."
            vulnerability:
                name: "Vulnerability"
                definition: "A weakness in a system or process that can be exploited by a threat. Examples: missing patches, weak passwords. Risk = Threat x Vulnerability x Impact."
            risk_tolerance:
                name: "Risk Tolerance"
                definition: "Specific thresholds beyond which a risk is no longer acceptable. While Risk Appetite describes the general willingness, Risk Tolerance defines the measurable boundary (e.g., 'no single risk above 15 points')."
            nis2:
                name: "NIS2"
                definition: "EU Directive for cybersecurity. Applies to operators of essential and important entities. Requires security measures, incident reporting, and risk management."
            dora:
                name: "DORA"
                definition: "EU Regulation for digital operational resilience of the financial sector. Requires IT risk management, incident reporting, resilience testing, and third-party risk management. Mandatory since January 2025."
            tisax:
                name: "TISAX"
                definition: "Automotive industry standard for information security based on the VDA ISA questionnaire. Builds on ISO 27001, adds automotive-specific requirements such as prototype protection."
            bsi_grundschutz:
                name: "BSI IT-Grundschutz"
                definition: "German standard from the BSI with a catalog of concrete building blocks for typical IT scenarios. Complementary to ISO 27001 — many measures map 1:1."
            audit_finding:
                name: "Audit Finding"
                definition: "Result from an audit examination: major nonconformity (Major NC), minor nonconformity (Minor NC), observation, or opportunity for improvement."
                analogy: "Audit findings from 9001 Clause 9.2 — same types, same methodology."
            nonconformity:
                name: "Nonconformity"
                definition: "Non-fulfillment of a requirement. Major NC = systematic failure. Minor NC = isolated deviation. In certification audits, major NCs can prevent certification."
                analogy: "Identical to nonconformity in 9001 (Clause 10.2) — same terminology."
            corrective_action:
                name: "Corrective Action"
                definition: "Action to eliminate the cause of a nonconformity. Must be planned, implemented, and verified for effectiveness (Clause 10.1)."
                analogy: "CAPA from ISO 9001 (Clause 10.2) — nearly identical concept."
            gdpr_dsgvo:
                name: "GDPR"
                definition: "EU regulation governing personal data protection. Key obligations: lawfulness, purpose limitation, data minimization, data subject rights, breach notification. Fines up to EUR 20M or 4% annual turnover."
            data_breach:
                name: "Data Breach"
                definition: "Breach of protection of personal data (GDPR Art. 4(12)). Must be reported to the supervisory authority within 72 hours. Not every security incident is a data breach — only when personal data is affected."
            processing_activity:
                name: "Processing Activity"
                definition: "Any operation on personal data: collection, storage, transmission, deletion. All must be documented in the Records of Processing Activities (GDPR Art. 30)."
            data_subject_request:
                name: "Data Subject Request (DSR)"
                definition: "Request by a data subject under GDPR Art. 15-22: access, rectification, erasure, restriction, portability, or objection. Deadline: one month."
            incident:
                name: "Security Incident"
                definition: "Event compromising confidentiality, integrity, or availability of information. Unlike a Data Breach, an Incident concerns information security in general, not specifically personal data."
                analogy: "Comparable to nonconformity from 9001 — but reactive to security events."
            patch_management:
                name: "Patch Management"
                definition: "Systematic process for identifying, evaluating, and deploying software updates and security patches. Reduces technical vulnerabilities (Annex A.8.8)."
            change_request:
                name: "Change Request"
                definition: "Formal request to change an IT system, process, or configuration. Must be reviewed for security impact before implementation (Annex A.8.32)."
                analogy: "Like a change request in 9001 (Clause 6.3) — formalized with impact assessment."
            awareness_training:
                name: "Awareness & Training"
                definition: "Measures to educate employees about information security: awareness training, phishing tests, policy briefings. Required by Clause 7.2/7.3, operationalized through Annex A.6.3."
                analogy: "Competence and awareness from 9001 (Clause 7.2/7.3) — identical HLS requirement."
            document_control:
                name: "Document Control"
                definition: "Management of ISMS documents: creation, review, approval, versioning, and archiving. Ensures the current version is always in use (Clause 7.5)."
                analogy: "Documented information from 9001 (Clause 7.5) — practically identical."
            supplier_security:
                name: "Supplier Security"
                definition: "Assessment and management of information security at suppliers. Includes security requirements in contracts and regular assessment (Annex A.5.19-5.22)."
                analogy: "Supplier evaluation from 9001 (Clause 8.4) — same logic, extended with security aspects."
            pdca:
                name: "PDCA Cycle"
                definition: "Plan-Do-Check-Act: fundamental improvement model. Forms the ISMS structure — from risk analysis (Plan) through control implementation (Do) and audits (Check) to improvement (Act)."
                analogy: "Identical to the PDCA cycle in 9001 — the same fundamental principle."
            hls:
                name: "HLS (High Level Structure)"
                definition: "Common framework structure shared by all ISO management system standards (Clauses 1-10). This is why ISO 9001, 14001, and 27001 share the same chapter structure — facilitates integration."
                analogy: "This is exactly why 27001 feels familiar — you already know Clauses 4-10."
            kpi:
                name: "KPI (Key Performance Indicator)"
                definition: "Measurable metric for evaluating ISMS performance (Clause 9.1). Examples: percentage of implemented controls, mean resolution time, training completion rate. Stored as daily snapshots in the tool."
                analogy: "QMS metrics from 9001 (Clause 9.1) — same concept, different metrics."
            maturity:
                name: "Maturity Level"
                definition: "Assessment of how mature a process implementation is, typically 0 (non-existent) to 5 (optimized). Helps the CISO assess overall ISMS health and set priorities."
            four_eyes_principle:
                name: "Four-Eyes Principle"
                definition: "Security principle requiring approval from a second person for critical actions. Implemented as an approval workflow in the tool, e.g., for risk acceptance or control changes."
            segregation_of_duties:
                name: "Segregation of Duties (SoD)"
                definition: "No single person should perform all steps of a critical process alone. Example: whoever requests a change must not approve it (Annex A.5.3)."
            least_privilege:
                name: "Least Privilege"
                definition: "Every user receives only the minimum permissions necessary. Access to information only when there is a business need (Annex A.5.15, A.8.2)."
            defense_in_depth:
                name: "Defense in Depth"
                definition: "Security strategy using multiple overlapping layers of protection. If one measure fails, the next ones catch the threat. No single control is sufficient alone."
            cross_framework_mapping:
                name: "Cross-Framework Mapping"
                definition: "Linking requirements across different frameworks (e.g., ISO 27001 A.5.1 ↔ NIS2 Art. 21). Enables reuse of existing evidence — one measure covers multiple frameworks."
            transitive_compliance:
                name: "Transitive Compliance"
                definition: "If Framework A maps to B and B maps to C, transitive coverage from A to C emerges. The tool calculates these chains automatically."
            data_reuse:
                name: "Data Reuse"
                definition: "Core principle of the tool: information captured once (assets, risks, controls) is automatically reused across all relevant contexts — without duplicate entry."
            industry_baseline:
                name: "Industry Baseline"
                definition: "Pre-configured starter pack for a tenant based on its industry. Contains typical assets, risks, controls, and framework recommendations. Build your ISMS not from zero."
            mttr:
                name: "MTTR (Mean Time to Resolve)"
                definition: "Average time from incident detection to resolution. Key management metric — shows how quickly the organization responds."
            compliance_gap:
                name: "Compliance Gap"
                definition: "Difference between target (framework requirements) and current state (implemented measures). Basis for prioritization and budget planning."
            encryption:
                name: "Encryption"
                definition: "Transformation of plaintext into unreadable ciphertext. Protects confidentiality at rest and in transit. Annex A.8.24."
            mfa:
                name: "MFA (Multi-Factor Authentication)"
                definition: "Authentication using at least two different factors: knowledge (password), possession (token/smartphone), or biometrics. Implemented as TOTP in the tool."
            network_segmentation:
                name: "Network Segmentation"
                definition: "Division of a network into isolated zones to limit attack propagation. Part of the defense-in-depth strategy."
            siem:
                name: "SIEM"
                definition: "System for centralized collection, correlation, and analysis of security events. Enables real-time detection of attacks and anomalies (Annex A.8.16)."
            access_control:
                name: "Access Control"
                definition: "Rules and mechanisms determining who may access which information. Distinguish: physical entry (to building), logical access (to system), data access (to information/functions)."
            information_classification:
                name: "Information Classification"
                definition: "Categorization of information by protection needs: public, internal, confidential, strictly confidential. Determines which protection measures apply (Annex A.5.12)."
            backup_recovery:
                name: "Backup & Recovery"
                definition: "Regular backup copies and tested recovery procedures. Best practice: 3-2-1 rule (3 copies, 2 media, 1 offsite)."
            logging_monitoring:
                name: "Logging & Monitoring"
                definition: "Recording security-relevant events and continuous monitoring for anomalies. Implemented as audit log in the tool. Essential for incident detection."
                analogy: "Comparable to control of records in 9001 (Clause 7.5) — but significantly more extensive."
            baustein:
                name: "Building Block (BSI IT-Grundschutz)"
                definition: "Modular security building block in the BSI IT-Grundschutz Compendium. Covers a specific topic (e.g., SYS.1.1 General Server). Each block contains requirements (MUSS/SOLLTE/KANN)."
            elementare_gefaehrdung:
                name: "Elementary Threat (BSI)"
                definition: "One of 47 fundamental threats in the BSI model (G 0.1 to G 0.47). Examples: G 0.14 Espionage, G 0.28 Software vulnerabilities. Used for risk analysis per BSI 200-3."
            absicherungsstufe:
                name: "Protection Level (BSI)"
                definition: "Three levels in BSI IT-Grundschutz: Basic (MUSS only), Standard (MUSS + SOLLTE), Core (highest protection for critical assets). The tool shows compliance per level."
            schutzbedarfsfeststellung:
                name: "Protection Needs Assessment"
                definition: "Systematic determination of protection needs for all assets based on basic values (C/I/A). Result: normal, high, or very high. Basis for selecting building blocks."
                analogy: "Like risk analysis in 9001 (Clause 6.1) — but more formalized with three-level assessment per basic value."
            modellierung:
                name: "Modeling (BSI IT-Grundschutz)"
                definition: "Assignment of BSI building blocks to actual target objects (servers, networks, applications). Produces the individual target configuration. The tool partially automates this via asset types."
            interested_parties:
                name: "Interested Parties"
                definition: "Persons or organizations that influence or are affected by the ISMS: customers, regulators, employees, suppliers, shareholders. Their requirements must be considered (Clause 4.2)."
                analogy: "Identical to 'interested parties' from 9001 Clause 4.2."
            continual_improvement:
                name: "Continual Improvement"
                definition: "Ongoing enhancement of ISMS effectiveness through analysis of audit results, KPIs, incidents, and management reviews. The PDCA cycle is the tool for this (Clause 10.2)."
                analogy: "Continual improvement from 9001 (Clause 10.3) — identical principle."
            risk_owner:
                name: "Risk Owner"
                definition: "Person with authority and responsibility to manage a risk. Typically the business unit head, not the ISB. Decides on treatment strategy and accepts residual risk."
            asset_owner:
                name: "Asset Owner"
                definition: "Person responsible for protecting an information asset. Determines classification and access rules. Does not need to be the technical operator (Annex A.5.9)."
            c5:
                name: "C5 (Cloud Computing Compliance Criteria Catalogue)"
                definition: "BSI standard for cloud security. 17 domains with minimum requirements for secure cloud services. Often mandatory for public sector clients in Germany."
            fulfillment_percentage:
                name: "Fulfillment Percentage"
                definition: "Percentage progress (0-100%) of implementing a compliance requirement. Captured per requirement in the tool and aggregated to framework-level progress on the dashboard."
            compliance_requirement:
                name: "Compliance Requirement"
                definition: "A single normative requirement within a framework, e.g., ISO 27001 A.8.1 or DORA Art. 6. Defined globally in the tool, tenant-specific implementation status tracked separately. Linkable to controls and evidence documents."
            confidence_score:
                name: "Confidence Score (Mapping Quality)"
                definition: "Quality indicator (low/medium/high) for cross-framework mappings. Algorithmically calculated from textual similarity and keyword overlap. Low confidence → mapping goes to review queue for manual verification."
            seed_catalog:
                name: "Seed Catalog (Pre-built Mappings)"
                definition: "Pre-built cross-framework mappings loadable at the click of a button. 8 available: GDPR, NIS2, DORA, TISAX, BSI, C5:2026, SOC 2, GDPR-ISO27701 — each to ISO 27001. Idempotent: existing pairs are skipped. After loading, mappings must be approved in the review queue."
            gap_analysis:
                name: "Gap Analysis (Automated)"
                definition: "Systematic identification of gaps: missing controls, partial coverage, scope differences, additional requirements, missing evidence. Each gap receives priority, estimated effort in hours and recommended action."
            surveillance_audit:
                name: "Surveillance Audit"
                definition: "Annual audit by certification body between three-yearly re-certifications. In the tool secured as audit freeze snapshot: SoA status, fulfillment levels, risks and KPIs are tamper-evident fixed with SHA-256 hash."
            audit_program:
                name: "Audit Program"
                definition: "Planned schedule of internal audits over one year (ISO 27001 Clause 9.2). In the tool with status lifecycle (planned, in progress, completed, reported) and scope types (ISMS-wide, framework, asset, location, department)."
            evidence:
                name: "Evidence"
                definition: "Documented proof that a requirement is fulfilled. In the tool at two levels: (1) structured via document linking, (2) as free-text description. Missing evidence is automatically flagged as evidence_gap in the gap analysis — a frequent audit finding."
            compliance_inheritance:
                name: "Compliance Inheritance"
                definition: "Mechanism by which fulfillment evidence from a base framework is automatically suggested for a target framework. Based on cross-framework mappings. Suggestions go to review queue — never automatic, always four-eyes principle."
            vulnerability_scan:
                name: "Vulnerability Scan"
                definition: "Automated testing of systems for known security vulnerabilities (CVEs). Perform regularly and after changes. Results feed into patch management."
            penetration_test:
                name: "Penetration Test"
                definition: "Targeted, authorized attack attempt on IT systems. Manual and deeper than vulnerability scans. Formalized under DORA as TLPT (Art. 26)."
            escalation:
                name: "Escalation"
                definition: "Structured forwarding to a higher decision level when deadlines are exceeded or severity requires it. Automated in the tool: severity + data breach → workflow escalation."
            sla_ops:
                name: "SLA (Service Level Agreement)"
                definition: "Agreement on performance metrics: availability, response times, recovery times. In ISMS especially relevant for cloud services and outsourced IT (Annex A.5.20)."
            bulk_actions:
                name: "Bulk Actions"
                definition: "Select multiple entries via checkbox and perform one action on all at once: delete, export, assign tag. The action bar appears only when items are selected."
                analogy: "Like batch update in QMS: select all and change in one step."
            command_palette:
                name: "Command Palette (Cmd+P / Ctrl+P)"
                definition: "Quick search via keyboard shortcut. Type a term and jump directly to any page, action or admin function — faster than navigating through menus."
                analogy: "Like Spotlight on Mac — but for all tool functions."
            audit_trail:
                name: "Audit Trail"
                definition: "Automatic gapless log of all changes: who created, changed or deleted what, and when? NOT to be confused with an audit (= planned examination per Clause 9.2). Cryptographically secured (HMAC chain) against tampering."
                analogy: "Like change log of controlled documents in QMS — but automatic for EVERYTHING."
            idempotent:
                name: "Idempotent"
                definition: "Property of an admin function (e.g., loader-fixer): can be run any number of times, always producing the same result. First run adds missing data, subsequent runs do nothing. No fear of accidental double-click."
                analogy: "Like a light switch already on — pressing again changes nothing."
            workflow_auto_progression:
                name: "Workflow Auto-Progression"
                definition: "Workflows automatically advance to the next step as soon as required fields are completed. Example: DPO enters severity → step 'DPO Assessment' is marked done → moves to CISO. No manual approval needed."
                analogy: "Like an inspection plan in QMS that auto-advances when the previous step is complete."
            workflow_template_instance:
                name: "Workflow Template vs. Instance"
                definition: "Template defines steps, roles, conditions (e.g., 'GDPR Data Breach 6 steps'). Instance is a concrete run on a specific object (e.g., Data Breach #42) with its own status, deadlines and history."
            completeness_score:
                name: "Completeness Score"
                definition: "Percentage value (0-100%) showing how many mandatory fields of an object are filled. Calculated for ISMS context, BC plans, DPIAs and RoPA. Complementary to readiness score: completeness alone does not mean operational readiness."
            data_reuse_hub:
                name: "Data Reuse Hub"
                definition: "Overview page showing which documents and suppliers bear the most 'load' — as evidence for requirements from multiple frameworks. Shows FTE savings, top-10 documents/suppliers and heatmap for concentration risks."
                analogy: "Like a QM manual covering ISO 9001, 14001, and 45001 — the hub shows which documents achieve this multi-use."
            information_security_policy:
                name: "Information Security Policy"
                definition: "Top-level ISMS document — approved by top management. Defines objectives, scope, and principles of information security. Must be accessible to all employees."
                analogy: "Like the quality policy in 9001 (Clause 5.2) — same requirement, different content."
            certification_audit:
                name: "Certification Audit"
                definition: "External audit by accredited body (e.g., TUeV, DEKRA). Stage 1: document review, Stage 2: on-site audit. Certificate valid for 3 years with annual surveillance audits."
            risk_assessment:
                name: "Risk Assessment"
                definition: "Systematic process: identify risks → assess likelihood and impact → prioritize. Must be repeated regularly and after significant changes (Clause 6.1.2)."
                analogy: "Risks and opportunities from 9001 (Clause 6.1) — same approach, but with formal assessment matrix."
            corporate_structure:
                name: "Corporate Structure (Holding / Subsidiary)"
                definition: "Hierarchical tenant relationship: parent tenant (Holding) with child tenants (Subsidiaries). Three governance models: Hierarchical, Shared Responsibility, Independent. Group ISB can read across tenants. Policies and incidents can be marked as 'visible to holding'."
            delta_assessment:
                name: "Delta Assessment"
                definition: "Analysis of how far a base framework (e.g., ISO 27001) already covers a new target framework (e.g., NIS2). Automatically calculates: existing mappings, open gaps, FTE savings. Excel export for management review."
            bcms:
                name: "BCMS"
                definition: "Management system for business continuity — analogous to the ISMS, but focused on maintaining critical processes during disruptions. Can be standalone (ISO 22301) or part of the ISMS."
                analogy: "Just as QMS is for quality, BCMS is for business continuity — same HLS structure."
            mbco:
                name: "MBCO"
                definition: "Minimum acceptable performance level during emergency operations. Example: 'Customer service must handle at least 30% of inquiries.' Defines the lower boundary between bearable and no longer acceptable."
            bc_strategy:
                name: "Business Continuity Strategy"
                definition: "Overarching approach to protecting critical processes: measures BEFORE disruption (prevention), DURING (emergency operations), and AFTER (recovery). Derived from the BIA."
            notbetrieb:
                name: "Emergency Operations Mode"
                definition: "Degraded operations after BC plan activation. Only most critical functions run — with reduced resources or workarounds. Goal: ensure MBCO until normal operations restored."
            wiederanlauf:
                name: "Recovery / Resumption"
                definition: "Phase after emergency operations: gradual return to normal. Distinguish: recovery (bring systems up), resumption (restart processes), normal operations (everything as before). RTO measures time to recovery."
            crisis_management:
                name: "Crisis Management"
                definition: "Leadership and coordination in a crisis. The crisis team assumes decision authority, coordinates communication, and manages resources. Activation follows defined escalation criteria."
            crisis_team:
                name: "Crisis Team"
                definition: "Pre-defined team that takes control during crises. BSI 200-4 distinguishes: strategic (management), operational (ISB, IT head), and technical emergency team (hands-on recovery)."
            crisis_communication:
                name: "Crisis Communication"
                definition: "Structured internal and external communication during a crisis. Pre-approved templates and clear approval processes significantly speed up response."
            tabletop_exercise:
                name: "Tabletop Exercise"
                definition: "Discussion-based BC exercise: scenario walked through at the table without system activation. Cost-effective, identifies gaps in plans. Recommended as entry point."
            full_scale_exercise:
                name: "Full-Scale Exercise"
                definition: "Realistic exercise with activation of BC plans, crisis team, and possibly alternate sites. Highest effort and insight. DORA requires similar tests (TLPT)."
            supply_chain_continuity:
                name: "Supply Chain Continuity"
                definition: "Ensuring business continuity when critical suppliers fail: identify critical suppliers, assess their RTO/RPO, document alternative suppliers."
            single_point_of_failure:
                name: "Single Point of Failure (SPOF)"
                definition: "Component whose failure brings the entire process to a halt — without redundancy. Identifying and eliminating SPOFs is a core BIA objective."
            notfallvorsorge:
                name: "Emergency Preparedness"
                definition: "All preventive measures BEFORE an emergency: BC plans, crisis teams, exercises, alternate sites, backup tests. BSI 200-4 calls this the 'emergency preparedness concept'."
            tlpt:
                name: "TLPT (Threat-Led Penetration Testing)"
                definition: "Threat-led penetration test, mandatory under DORA for systemically important financial institutions. Simulates realistic attack scenarios. Every 3 years by external testers."
            activation_criteria:
                name: "Activation Criteria"
                definition: "Predefined conditions that trigger BC plan activation (e.g., 'server outage > 4h'). Mandatory field for every BC plan in the tool — without criteria, nobody knows whether the plan applies in an emergency."
            alternative_site:
                name: "Alternative Site"
                definition: "Alternate location for emergency operations. In the tool, location, address and capacity are documented per BC plan. Variants: Cold Site (empty, cheap), Warm Site (partially equipped), Hot Site (immediately operational)."
            process_criticality:
                name: "Process Criticality"
                definition: "Classification: Critical, High, Medium, Low. Result of the BIA — determines RTO/RPO targets and recovery sequence. In the tool as color-coded filter (Red = Critical, Yellow = High)."
            dependency_analysis:
                name: "Dependency Analysis"
                definition: "Systematic capture of upstream and downstream dependencies between processes. In the tool as process-to-process linking. Shows domino effects during outages and identifies single points of failure."
            exercise_report:
                name: "Exercise Report"
                definition: "Structured documentation of a BC exercise: what went well, areas for improvement, findings, actions, lessons learned. Only considered complete when all sections are filled and 'Report completed' is set."
            readiness_score:
                name: "Readiness Score"
                definition: "Automatically calculated value (0-100) for BC plan readiness: mandatory sections (40%), current tests (30%), current reviews (20%), active status (10%). Below 60% signals urgent action needed."

            personal_data:
                name: "Personal Data"
                definition: "Any information relating to an identified or identifiable natural person (GDPR Art. 4(1)). Includes name, email, IP address, even pseudonymized data if re-identification is possible."
            legal_basis:
                name: "Legal Basis"
                definition: "Every processing of personal data requires a legal basis from Art. 6(1) GDPR: (a) consent, (b) contract, (c) legal obligation, (d) vital interests, (e) public interest, (f) legitimate interest."
            consent_privacy:
                name: "Consent"
                definition: "Freely given, informed, and unambiguous indication of wishes for a specific processing purpose (GDPR Art. 7). Must be revocable at any time. For special categories (Art. 9), explicit consent is required."
            data_minimization:
                name: "Data Minimization"
                definition: "GDPR principle: Only collect personal data actually necessary for the purpose (Art. 5(1)(c)). No stockpiling. Closely linked to purpose limitation."
            tom:
                name: "TOM (Technical and Organizational Measures)"
                definition: "Protection measures per GDPR Art. 32: encryption, pseudonymization, access control, backup, training. Linked to ISO 27001 controls in the tool (Data Reuse — no double maintenance)."
                analogy: "Comparable to infrastructure measures from 9001 (Clause 7.1.3/7.1.4) — but more formalized and privacy-specific."
            pseudonymization:
                name: "Pseudonymization"
                definition: "Processing so that data can no longer be attributed to a person without additional information (GDPR Art. 4(5)). Example: replace name with user ID. Unlike anonymization, pseudonymized data remains personal data."
            anonymization:
                name: "Anonymization"
                definition: "Irreversible alteration of personal data so attribution is no longer possible even with additional knowledge. Anonymized data is NOT subject to GDPR. True anonymization is technically difficult — often only pseudonymization is achievable."
            privacy_by_design:
                name: "Privacy by Design / Privacy by Default"
                definition: "Privacy must be built into systems from the start (by Design) and privacy-friendly defaults must be standard (by Default). Example: opt-in instead of opt-out, data minimization as default."
            data_processor:
                name: "Data Processor"
                definition: "Organization processing personal data on behalf of the controller (GDPR Art. 28). Examples: cloud provider, payroll service. Requires a data processing agreement (DPA) with defined instructions and TOMs."
            data_controller:
                name: "Data Controller"
                definition: "Organization that determines purposes and means of personal data processing (GDPR Art. 4(7)). Bears primary responsibility for GDPR compliance."
            joint_controller:
                name: "Joint Controllers"
                definition: "Two or more controllers jointly determining purposes and means (GDPR Art. 26). Must agree on who fulfills which obligations. Data subjects can exercise rights against any controller."
            third_country_transfer:
                name: "Third Country Transfer"
                definition: "Transfer of personal data outside the EEA (GDPR Art. 44-49). Only permitted with safeguards: adequacy decision (Art. 45), SCCs (Art. 46), Binding Corporate Rules (Art. 47)."
            scc:
                name: "SCC (Standard Contractual Clauses)"
                definition: "EU Commission-prescribed contract clauses for third-country transfers (Art. 46(2)(c)). New version since June 2021 with 4 modules. Most common instrument for US transfers since Schrems II."
            retention_period:
                name: "Retention Period"
                definition: "Period for how long personal data may be stored (Art. 5(1)(e)). Must be deleted after expiry. Often prescribed by law: 10 years commercial, 6 years tax."
            deletion_concept:
                name: "Deletion Concept"
                definition: "Documented procedure for when and how personal data is deleted. Defines retention periods per data type, deletion methods (logical vs. physical), responsibilities, and exceptions."
            dpo_role:
                name: "DPO (Data Protection Officer)"
                definition: "Independent data protection oversight role. Mandatory when 20+ persons are engaged in automated processing (§38 BDSG) or large-scale processing of special categories. Advises, monitors, and serves as contact point."
            supervisory_authority:
                name: "Supervisory Authority (DPA)"
                definition: "State authority monitoring GDPR compliance: BfDI (federal) and 16 state data protection authorities. Responsible for complaints, investigations, fines up to EUR 20M or 4% turnover."
            pims:
                name: "PIMS (Privacy Information Management System)"
                definition: "Extension of the ISMS with privacy-specific requirements per ISO 27701. Adds privacy controls to ISO 27001. Independently certifiable since ISO 27701:2025."
            special_categories:
                name: "Special Categories of Personal Data (Art. 9)"
                definition: "Particularly sensitive data: health, biometrics, genetics, religion, political opinion, trade union membership, sex life. Processing only with exception under Art. 9(2). In the tool as checkbox in RoPA, Data Breach and DPIA — automatically activates high-risk flag."
            data_subject_rights:
                name: "Data Subject Rights (Art. 15-22 GDPR)"
                definition: "Rights of natural persons: access (15), rectification (16), erasure (17), restriction (18), portability (20), objection (21), protection against automated decisions (22). Deadline: 1 month. In the tool as dedicated module with deadline monitoring."
            avv_dpa:
                name: "Data Processing Agreement (DPA / AVV)"
                definition: "Contract between controller and processor per Art. 28(3). Governs subject matter, duration, data categories, TOMs, sub-processors. In the tool a mandatory field for suppliers with GDPR role Processor."
            breach_notification_deadline:
                name: "72-Hour Notification Deadline (Art. 33 GDPR)"
                definition: "After becoming aware of a personal data breach, the supervisory authority must be notified within 72 hours. The tool calculates the deadline automatically, shows remaining hours and escalates on expiry."
            purpose_limitation:
                name: "Purpose Limitation (Art. 5(1)(b))"
                definition: "Personal data may only be collected for specified, explicit and legitimate purposes and not further processed in a manner incompatible with those purposes. Every RoPA entry must specify at least one purpose."
            accountability:
                name: "Accountability (Art. 5(2))"
                definition: "The controller must not only comply with GDPR but be able to demonstrate compliance. The tool supports this through audit logs, versioned documents, exportable PDFs and approval workflows."
            legitimate_interest_assessment:
                name: "Legitimate Interest Assessment (LIA)"
                definition: "Three-step test for Art. 6(1)(f): (1) Is there a legitimate interest? (2) Is processing necessary? (3) Do data subject interests override? In the tool, selecting 'Legitimate Interest' makes the justification field mandatory."
            automated_decision_making:
                name: "Automated Decision-Making / Profiling (Art. 22)"
                definition: "Decisions based solely on automated processing that produce legal effects (e.g., credit scoring). In the tool as mandatory field in RoPA and DPIA."

            risk_matrix:
                name: "Risk Matrix (Heatmap)"
                definition: "5x5 assessment grid: likelihood (Y) against impact (X). Risk score 1-25 with color coding: green (1-3), yellow (4-9), orange (10-15), red (16-25). Interactive heatmap with clickable cells in the tool."
            likelihood:
                name: "Likelihood"
                definition: "How likely is the risk to occur? Scale 1-5: Rare (1), Unlikely (2), Possible (3), Likely (4), Almost Certain (5). The tool automatically adjusts likelihood when linked incidents occur."
            impact_risk:
                name: "Impact"
                definition: "How severe is the damage if the risk materializes? Scale 1-5: Negligible (1), Minor (2), Moderate (3), Major (4), Critical (5). The tool derives impact automatically from linked asset values."
            risk_score:
                name: "Risk Score"
                definition: "Product of likelihood x impact (1-25). Determines position in risk matrix and treatment urgency. Calculated for gross (before measures) and net risk (after measures)."
            risk_register:
                name: "Risk Register"
                definition: "Central documentation of all identified risks with assessment, treatment status, owners, and review dates. Main view at /risk/ in the tool — filterable by status, category, and severity."
            treatment_plan:
                name: "Risk Treatment Plan"
                definition: "Concrete action plan: what, who, by when, with what budget. Contains linked ISO 27001 controls. Status: Planned → In Progress → Completed → Verified."
            risk_acceptance_formal:
                name: "Formal Risk Acceptance"
                definition: "Documented decision to consciously bear a residual risk — with justification, conditions, and approval at appropriate management level. Four-eyes workflow in the tool. Must be reviewed at least annually."
            risk_category:
                name: "Risk Category"
                definition: "Grouping: Strategic (business model), Operational (disruptions), Financial (losses, fines), Compliance (regulatory), Technical (IT failures, cyberattacks), Reputational (image). Helps with aggregation and reporting."
            risk_aggregation:
                name: "Risk Aggregation (Portfolio View)"
                definition: "Summary view of all risks: distribution across categories, concentration risks, trends. In the tool as dashboard heatmap and portfolio report with 12-month trend."
            schutzbedarfsvererbung:
                name: "Protection Needs Inheritance (Maximum Principle)"
                definition: "BSI principle: If Asset A depends on Asset B, A inherits at least the protection needs of B. The tool calculates this automatically via asset dependencies."
            asset_risk_link:
                name: "Asset-Risk Linking"
                definition: "Assets are directly linked to risks. Enables automatic impact calculation from asset value, automatic protection needs inheritance, and shows in asset detail which risks affect it. Data Reuse: captured once, visible everywhere."
            kri:
                name: "KRI (Key Risk Indicator)"
                definition: "Early warning indicators signaling rising risks BEFORE they materialize. Examples: failed logins, patch backlog, overdue treatments. Displayed as dashboard metrics with traffic light colors and trend arrows."
            risk_review:
                name: "Risk Review"
                definition: "Regular check whether assessment and treatment are still current. Triggers: scheduled (at least annually), after incidents, after significant changes. The tool shows overdue reviews on the dashboard."
            control_effectiveness:
                name: "Control Effectiveness"
                definition: "How well does a measure reduce risk (0-100%)? The tool automatically calculates residual risk from this. Must be verified after every incident and audit."
            risk_appetite_statement:
                name: "Risk Appetite Statement"
                definition: "Formal management document: How much risk is bearable per category? Defines thresholds on the risk matrix. Configurable per tenant in the tool with automatic check during every assessment."
            risk_lifecycle_status:
                name: "Risk Lifecycle Status"
                definition: "Every risk goes through six statuses: Identified → Assessed → Treated → Monitored → Closed or Accepted. Determines which actions are available. Filterable in the risk register."
            gross_net_risk:
                name: "Gross vs. Net Risk Assessment"
                definition: "Gross (Inherent Risk) = likelihood x impact WITHOUT controls. Net (Residual Risk) = AFTER control effectiveness. The tool calculates risk reduction automatically in percent."
            risk_landscape:
                name: "Risk Landscape (Portfolio View)"
                definition: "Overview of all risks — aggregated by category, treatment strategy, status and severity. In the tool as 5x5 heatmap and portfolio report with 12-month trend. Essential for management reviews."
            correlated_risks:
                name: "Correlated Risks (Risk Concentration)"
                definition: "Risks affecting the same asset that can amplify each other. If one asset fails, all linked risks materialize simultaneously. The tool detects correlations automatically and calculates a combined score."
            appetite_exceedance:
                name: "Appetite Exceedance"
                definition: "When residual risk exceeds the risk appetite threshold. The tool calculates exceedance in points/percent and automatically blocks formal risk acceptance — further measures required."
            risk_prioritization:
                name: "Risk Prioritization"
                definition: "Automatic ranking by urgency from three factors: residual risk level, degree of appetite exceedance, and priority level. Dashboard shows top 10."

