    workflow_desc:
        asset_lifecycle: 'Asset lifecycle from commissioning to disposal. 4-eyes principle on disposal.'
        audit_finding_lifecycle: 'Audit finding processing (open → in_progress → resolved → verified → closed).'
        consent_lifecycle: 'GDPR consent lifecycle (pending_verification → active → withdrawn → expired).'
        corrective_action_lifecycle: 'CAPA action status (planned → in_progress → implemented → verified → closed).'
        data_breach_lifecycle: 'Data breach per GDPR Art. 33/34 (reported → under_assessment → notified → resolved).'
        data_subject_request_lifecycle: 'GDPR data subject request (pending → identity_verified → in_progress → completed/rejected).'
        document_lifecycle: 'Document lifecycle (draft → in_review → approved → published → archived). Canonical 5-stage.'
        dpia_lifecycle: 'Data Protection Impact Assessment (draft → in_review → approved/requires_revision → published).'
        incident_lifecycle: 'Security incident per ISO 27001 (reported → triaged → investigating → contained → resolved → closed).'
        internal_audit_lifecycle: 'Internal audit (planned → in_progress/conducted → reported → approved → closed).'
        isms_objective_lifecycle: 'ISMS objective per ISO 27001 Cl. 6.2 (planned → in_progress → achieved/delayed/cancelled).'
        policy_template_lifecycle: 'Policy template lifecycle with isActive-sync on publish/archive.'
        processing_activity_lifecycle: 'Processing activity per GDPR Art. 30 — gated by privacy module.'
        risk_lifecycle: 'Risk per ISO 27005 (identified → assessed → treated → accepted → reviewed → closed).'
        vulnerability_lifecycle: 'Vulnerability (discovered → triaged → in_remediation → resolved → verified).'
        workflow_instance_lifecycle: 'Workflow instance approval chain (pending → in_progress → approved/rejected/cancelled).'

    status_desc:
        draft: 'Draft — being prepared, not yet submitted for review.'
        in_review: 'In Review — awaiting reviewer decision.'
        approved: 'Approved — ready for publication, not yet active.'
        published: 'Published — active and visible tenant-wide.'
        archived: 'Archived — inactive, readable for audit purposes.'
        active: 'Active — in use.'
        inactive: 'Inactive — paused, can be reactivated.'
        pending: 'Pending — awaiting action or verification.'
        cancelled: 'Cancelled — terminal, no follow-up.'
        rejected: 'Rejected — back to draft or revision needed.'
        accepted: 'Accepted — confirmed, no treatment needed.'
        requires_revision: 'Revision Required — reviewer flagged issues.'
        planned: 'Planned — scheduled, not started.'
        completed: 'Completed — task/measure finished.'
        verified: 'Verified — confirmed by second reviewer.'
        in_use: 'In Use — asset actively with end user.'
        returned: 'Returned — asset in inventory, not in use.'
        retired: 'Retired — asset decommissioned.'
        disposed: 'Disposed — asset removed from inventory.'
        identified: 'Identified — risk recognised, not assessed.'
        assessed: 'Assessed — likelihood + impact captured.'
        treated: 'Treated — risk treatment plan implemented.'
        reported: 'Reported — initial notification received.'
        triaged: 'Triaged — severity classified.'
        investigating: 'Investigating — root cause analysis underway.'
        contained: 'Contained — damage limited.'
        resolved: 'Resolved — back to normal.'
        closed: 'Closed — terminal, lessons-learned documented.'
        identity_verified: 'Identity Verified per GDPR Art. 12 (6).'
        pending_verification: 'Pending Verification — DPO must check.'
        withdrawn: 'Withdrawn — consent revoked.'
        expired: 'Expired — retention period exceeded.'
        discovered: 'Discovered — new, not prioritised.'
        in_remediation: 'In Remediation — patch/mitigation in progress.'
        achieved: 'Achieved — objective met.'
        delayed: 'Delayed — deadline missed.'

    transition_desc:
