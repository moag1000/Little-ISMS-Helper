            submit_for_review: 'Submit draft for review — requires mandatory fields complete.'
            approve: 'Reviewer approves — ready for publication. 4-eyes recommended.'
            reject: 'Reviewer rejects — back to draft. Reason required.'
            publish: 'Publish — becomes tenant-wide active and visible.'
            archive: 'Archive — inactive but readable.'
            republish: 'Republish — bring archived version back active.'
        asset_lifecycle:
            commission: 'Commission — asset becomes actively used.'
            return: 'Return — temporarily out of use.'
            retire: 'Retire — asset decommissioned.'
            dispose: 'Dispose — final step, 4-eyes required.'
        _generic:
            submit: 'Submit — advance status forward.'
            approve: 'Approve — grant release.'
            reject: 'Reject — back to previous status.'
            cancel: 'Cancel — stop workflow.'
            archive: 'Archive — mark inactive.'

