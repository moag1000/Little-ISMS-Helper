help:
    iso9001_bridge:
        title: "Von ISO 9001 zu ISO 27001 — Ihr Wegweiser"
        subtitle: "Nutzen Sie Ihr QM-Wissen fuer den Einstieg in die Informationssicherheit"
        intro_title: "Sie kennen ISO 9001? Dann kennen Sie schon vieles!"
        intro_text: "ISO 27001 baut auf aehnlichen Prinzipien auf. Beide Normen teilen die High-Level Structure (HLS) und folgen dem PDCA-Zyklus. Hier sehen Sie, wo Ihr vorhandenes Wissen direkt anwendbar ist."

        mapping_title: "Konzept-Mapping: 9001 → 27001"
        col_9001: "Was Sie aus 9001 kennen"
        col_27001: "Heisst in 27001"
        col_tool: "Wo im Tool"
        col_reference: "Norm-Referenz"

        map:
            context:
                from: "Kontext der Organisation (4.1)"
                to: "ISMS-Kontext & Scope"
                module: "Context-Modul"
            process_map:
                from: "Prozesslandkarte"
                to: "Anwendbarkeitserklaerung (SoA)"
                module: "SoA-Modul"
