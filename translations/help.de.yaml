                to: "Risikobehandlungsplan"
                module: "Treatment Plans"
            audit:
                from: "Internes Audit (9.2)"
                to: "Internes ISMS-Audit"
                module: "Audit-Modul"
            review:
                from: "Management Review (9.3)"
                to: "Management-Bewertung"
                module: "Reviews-Modul"
            infrastructure:
                from: "Infrastruktur (7.1.3)"
