                    'A.7.4': 'Überwachung der physischen Sicherheit'
                    'A.7.5': 'Schutz vor physischen und umweltbedingten Bedrohungen'
                    'A.7.6': 'Arbeiten in Sicherheitsbereichen'
                    'A.7.7': 'Aufgeräumter Arbeitsplatz und gesperrter Bildschirm (Clear Desk / Clear Screen)'
                    'A.7.8': 'Platzierung und Schutz von Geräten'
                    'A.7.9': 'Sicherheit von Werten außerhalb der Räumlichkeiten'
