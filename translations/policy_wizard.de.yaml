        data_breach_notification_procedure:
            title: 'Verfahren zur Meldung von Datenschutzverletzungen'
            description: '72h-Meldeverfahren gemäß GDPR Art. 33/34, ISO 27701 Cl. 6.13 (2025) bzw. Cl. 6.13.1.5 (2019). Multi-Track-Matrix für GDPR / DORA Art. 19 / NIS2.'
        iso_a534_thin_host:
            title: 'A.5.34 Datenschutz-Querverweis'
            description: 'Schlanker Querverweis-Stub für ISO 27001 A.5.34. Verlinkt auf die fünf eigenständigen Datenschutzdokumente — kein eigener Inhalt, erfüllt nur die Norm-Forderung "shall maintain a topic-specific policy".'

    # W6-B — ISO 27701 PIMS settings labels (06-dpo-input.md §3.3).
    iso27701:
        enabled:
            label: 'ISO 27701 (PIMS) aktivieren'
            help: 'Fügt Klausel-Mapping-Tags (iso27701:5.1, iso27701:7.2.8 …) zu den Datenschutz-Dokumenten hinzu. Optional — paralleler Addon analog zu DORA.'
        version_2019:
            label: 'ISO 27701:2019 (Legacy)'
            help: 'Für laufende Audit-Zyklen mit der älteren Klausel-Nummerierung (z.B. 6.13.1.5 statt 6.13).'
        version_2025:
            label: 'ISO 27701:2025 (Standard)'
            help: 'Aktuelle Edition (veröffentlicht 2025-09). An ISO 27002:2022 ausgerichtet, mit expliziten Schrems-II-Begleitmaßnahmen.'

    # W6-B — Sectoral privacy overlays (06-dpo-input.md §7).
    privacy_overlay:
        healthcare_bdsg22:
            label: 'Gesundheitswesen (§ 22 BDSG)'
            description: 'Aktiviert die § 22 BDSG (besondere Kategorien) und § 203 StGB (ärztliche Schweigepflicht) Overlays für RoPA, DPIA und §2.16 Special-Category-Templates.'
        public_sector_bbg:
            label: 'Öffentlicher Sektor (BDSG § 70 ff.)'
            description: 'Aktiviert die Overlays für öffentliche Stellen — BDSG § 70 ff., Landes-DSGs, BArchG § 5 — auf RoPA und Datenschutz-Leitlinie.'

    # W6-C — GDPR section injector titles + descriptions. Skeleton only;
    # full prose ships with W6-F. Sections are injected into ISO host
    # policies when the tenant adopts GDPR scope (per `06-dpo-input.md`
    # §0 Decision Matrix v2 — 10 sections total).
    gdpr_section:
        gdpr_lawful_basis_workplace:
            title: 'Rechtsgrundlage für Arbeitsplatzdaten (DSGVO Art. 6, 9)'
            description: 'Eingebettet in die Acceptable-Use-Policy. Dokumentiert die Rechtsgrundlage für die Verarbeitung von Beschäftigtendaten am Arbeitsplatz inkl. § 26 BDSG.'
        gdpr_dpo_mandate:
            title: 'DSB-Mandat und Aufgaben (DSGVO Art. 37-39)'
            description: 'Eingebettet in das Awareness-Trainings-Programm. Beschreibt Bestellung, Aufgaben und Unabhängigkeit des Datenschutzbeauftragten.'
        gdpr_special_categories:
            title: 'Besondere Kategorien personenbezogener Daten (DSGVO Art. 9)'
            description: 'Eingebettet in die Informationsklassifizierungs-Policy. Klassifizierungs- und Schutzregeln für besondere Kategorien (Gesundheit, Religion, Gewerkschaftszugehörigkeit etc.).'
        gdpr_privacy_by_design:
            title: 'Privacy by Design / by Default (DSGVO Art. 25)'
            description: 'Eingebettet in die Secure-Development-Policy. Privacy-by-Design-Gates im SDLC und Default-Einstellungen für neue Verarbeitungen.'
        gdpr_ai_systems:
            title: 'KI-Systeme und automatisierte Entscheidungen (DSGVO Art. 22 + EU AI Act)'
            description: 'Eingebettet in die Secure-Development-Policy. Sonderregeln für KI-gestützte Profilbildung und automatisierte Einzelentscheidungen.'
        gdpr_joint_controllers:
            title: 'Gemeinsame Verantwortlichkeit (DSGVO Art. 26)'
            description: 'Eingebettet in die Lieferanten-Sicherheits-Policy. Abgrenzung zu Auftragsverarbeitung (Art. 28) und Pflichten gemeinsamer Verantwortlicher.'
        gdpr_international_transfers:
            title: 'Internationale Datentransfers (DSGVO Art. 44-49 / Schrems II)'
            description: 'Eingebettet in die Information-Transfer-Policy. Angemessenheitsbeschlüsse, Standardvertragsklauseln, Transfer-Impact-Assessments.'
        gdpr_retention_minimisation:
            title: 'Speicherbegrenzung und Datenminimierung (DSGVO Art. 5(1)(c)+(e))'
            description: 'Eingebettet in die Asset-Management-Policy. Verweise auf den verbindlichen Retention Schedule als Single-Source-of-Truth.'
        gdpr_breach_72h:
            title: 'Meldepflichten bei Datenschutzverletzungen (DSGVO Art. 33)'
            description: 'Eingebettet in die Incident-Management-Policy. 72-Stunden-Meldepflicht an die Aufsichtsbehörde, Betroffenenbenachrichtigung.'
        gdpr_premises_processing:
            title: 'Datenschutz in physischen Sicherheitsbereichen (DSGVO Art. 32)'
            description: 'Eingebettet in die Physical-Security-Policy. Schutz personenbezogener Daten in Räumlichkeiten und Zutrittskontrollen.'

