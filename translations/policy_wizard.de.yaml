        operational_baselines:
            title: 'Operative Baselines'
            subtitle: 'Krypto-Allow-List, Backup-RPO, Patch-Cadence (Schweregrad), Continuity-RTO und ggf. DORA-Block.'
            patch_cadence_label: 'Patch-Cadence (Tage)'
