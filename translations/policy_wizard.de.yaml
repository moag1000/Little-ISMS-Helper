                    'A.7.13': 'Wartung von Geräten'
                    'A.7.14': 'Sichere Entsorgung oder Wiederverwendung von Geräten'
                    # A.8 — Technologische Controls (34)
                    'A.8.1': 'Endgeräte des Benutzers'
                    'A.8.2': 'Privilegierte Zugriffsrechte'
                    'A.8.3': 'Einschränkung des Informationszugriffs'
