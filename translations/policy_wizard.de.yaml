            crypto_allowlist_label: 'Erlaubte kryptografische Algorithmen'
            crypto_allowlist_help: 'Mehrfachauswahl der zulässigen Algorithmen (BSI TR-02102 / NIST SP 800-131A konform).'
            crypto_decision_aid_title: 'Entscheidungshilfe — was bedeutet jeder Algorithmus?'
            crypto_decision_aid_intro: 'Junior-ISBs sehen oft 23 Kürzel und wissen nicht, welche sie abwählen dürfen. Diese Tabelle erklärt jeden Algorithmus in einem Satz: Wofür wird er gebraucht, ist er BSI-TR-02102 konform, und wann ist er optional. Gelb markierte Zeilen sind Pflicht — bitte nicht abwählen.'
            crypto_col:
                algorithm: 'Algorithmus'
                purpose: 'Wofür?'
                bsi_status: 'BSI-Status'
                optional_when: 'Darf abgewählt werden, wenn …'
            crypto_algorithms:
                # Junior-ISB-Klartext: pro Algorithmus „Wofür / BSI-Status / Darf abgewählt werden?".
                # Quelle: BSI TR-02102-1:2024, NIST SP 800-131A Rev. 2, NIST SP 800-186.
                'AES-128-GCM':
                    purpose: 'Symmetrische Verschlüsselung (AEAD) — für ruhende Daten und TLS 1.2/1.3.'
                    bsi_status: 'BSI TR-02102-1 konform (Klassifizierung „GEEIGNET" bis 2030+).'
                    optional_when: 'Abwählbar nur wenn AES-256-GCM oder ChaCha20-Poly1305 als Mindeststandard durchgesetzt wird.'
                'AES-192-GCM':
                    purpose: 'Symmetrische Verschlüsselung (AEAD) — Zwischenstufe zwischen AES-128 und AES-256.'
                    bsi_status: 'BSI TR-02102-1 konform. Wird in der Praxis selten priorisiert.'
                    optional_when: 'Bedenkenlos abwählbar — AES-128 oder AES-256 reichen aus.'
                'AES-256-GCM':
                    purpose: 'Symmetrische Verschlüsselung (AEAD) — Goldstandard für ruhende Daten und TLS 1.3.'
                    bsi_status: 'BSI TR-02102-1 konform und post-quantum-resistent (Grover-Limit ≈ 128 Bit).'
                    optional_when: 'NIE abwählen — Pflicht-Mindeststandard für Schutzbedarf hoch / sehr hoch.'
                'CHACHA20-POLY1305':
                    purpose: 'Symmetrische Verschlüsselung (AEAD) — für Geräte ohne AES-NI-Hardware (mobil, IoT).'
                    bsi_status: 'BSI TR-02102-1 konform seit 2023. RFC 8439.'
                    optional_when: 'Abwählbar wenn alle Endgeräte AES-Hardware-Beschleunigung haben (Standard-Server / -Notebooks ab ~2012).'
                'SHA-256':
                    purpose: 'Hash-Funktion — für Signaturen, Integrität, Zertifikate (TLS, S/MIME, JWT).'
                    bsi_status: 'BSI TR-02102-1 konform. Empfohlene Mindest-Hash-Länge.'
                    optional_when: 'NIE abwählen — wird von TLS, X.509, OCSP zwingend benötigt.'
                'SHA-384':
                    purpose: 'Hash-Funktion — für Signaturen mit erhöhter Sicherheitsmarge (TLS 1.3 cipher-suites).'
                    bsi_status: 'BSI TR-02102-1 konform. Pflicht für Schutzbedarf sehr hoch.'
                    optional_when: 'Abwählbar nur wenn SHA-512 stattdessen erlaubt ist.'
                'SHA-512':
                    purpose: 'Hash-Funktion mit höchster Sicherheitsmarge — für Langzeit-Signaturen.'
                    bsi_status: 'BSI TR-02102-1 konform.'
                    optional_when: 'Abwählbar wenn SHA-384 ausreicht (typisch für Standard-Schutzbedarf).'
                'SHA3-256':
                    purpose: 'Hash-Funktion (Keccak-Familie) — strukturell unabhängige Alternative zu SHA-2.'
                    bsi_status: 'BSI TR-02102-1 konform. Noch wenig verbreitet in Standard-TLS-Stacks.'
                    optional_when: 'Bedenkenlos abwählbar wenn nur SHA-2 verwendet wird (Standard-Fall).'
                'SHA3-384':
                    purpose: 'Hash-Funktion (Keccak) — höhere Sicherheitsmarge.'
                    bsi_status: 'BSI TR-02102-1 konform.'
                    optional_when: 'Bedenkenlos abwählbar wenn SHA-2-Familie ausreicht.'
                'SHA3-512':
                    purpose: 'Hash-Funktion (Keccak) — höchste Sicherheitsmarge.'
                    bsi_status: 'BSI TR-02102-1 konform.'
                    optional_when: 'Bedenkenlos abwählbar wenn SHA-2-Familie ausreicht.'
                'ECDH-P256':
                    purpose: 'Elliptische-Kurven-Schlüsselaustausch (NIST P-256) — Standard für TLS 1.2/1.3.'
                    bsi_status: 'BSI TR-02102-1 konform bis 2030+. Weltweit verbreitet.'
                    optional_when: 'Abwählbar nur wenn ECDH-P384 oder Brainpool-Kurven als Mindest-Curve durchgesetzt werden.'
                'ECDH-P384':
                    purpose: 'Elliptische-Kurven-Schlüsselaustausch (NIST P-384) — höhere Sicherheitsmarge.'
                    bsi_status: 'BSI TR-02102-1 konform.'
                    optional_when: 'Abwählbar wenn ECDH-P256 ausreicht (Standard-Schutzbedarf).'
                'ECDH-P521':
                    purpose: 'Elliptische-Kurven-Schlüsselaustausch (NIST P-521) — höchste Sicherheitsmarge in der NIST-Familie.'
                    bsi_status: 'BSI TR-02102-1 konform.'
                    optional_when: 'Bedenkenlos abwählbar — wird in der Praxis selten gebraucht.'
                'ECDH-BRAINPOOLP256R1':
                    purpose: 'Elliptische Kurven (Brainpool, BSI/RFC 5639) — vom BSI bevorzugte EU-Alternative zu NIST-Kurven.'
                    bsi_status: 'BSI TR-02102-1 konform und für Behörden ausdrücklich empfohlen.'
                    optional_when: 'Abwählbar wenn keine BSI-/EU-Behörden-Anbindung gefordert ist (Privatwirtschaft).'
                'ECDH-BRAINPOOLP384R1':
                    purpose: 'Brainpool-Kurve mit höherer Sicherheitsmarge — BSI/EU-Empfehlung.'
                    bsi_status: 'BSI TR-02102-1 konform.'
                    optional_when: 'Abwählbar wenn ECDH-BRAINPOOLP256R1 ausreicht.'
                'ECDH-BRAINPOOLP512R1':
                    purpose: 'Brainpool-Kurve mit höchster Sicherheitsmarge — BSI/EU-Empfehlung.'
                    bsi_status: 'BSI TR-02102-1 konform.'
                    optional_when: 'Bedenkenlos abwählbar wenn Brainpool 256/384 ausreicht.'
                'ECDSA-P256':
                    purpose: 'Digitale Signaturen mit elliptischen Kurven (NIST P-256) — Standard für TLS-Zertifikate, JWT.'
                    bsi_status: 'BSI TR-02102-1 konform bis 2030+.'
                    optional_when: 'Abwählbar wenn ED25519 als bevorzugte Signatur-Alternative durchgesetzt wird.'
                'ECDSA-P384':
                    purpose: 'Digitale Signaturen (NIST P-384) — höhere Sicherheitsmarge.'
                    bsi_status: 'BSI TR-02102-1 konform.'
                    optional_when: 'Abwählbar wenn ECDSA-P256 ausreicht.'
                'ECDSA-P521':
                    purpose: 'Digitale Signaturen (NIST P-521) — höchste NIST-Sicherheitsmarge.'
                    bsi_status: 'BSI TR-02102-1 konform.'
                    optional_when: 'Bedenkenlos abwählbar — wird in der Praxis selten gebraucht.'
                'RSA-3072':
                    purpose: 'Klassische asymmetrische Kryptographie — Signaturen, Schlüsselaustausch (Legacy / S/MIME / Code-Signing).'
                    bsi_status: 'BSI TR-02102-1 konform bis 2030. Danach Übergang auf 4096 Bit empfohlen.'
                    optional_when: 'Abwählbar wenn ausschließlich elliptische Kurven (ECDH/ECDSA/ED25519) verwendet werden.'
                'RSA-4096':
                    purpose: 'Klassische asymmetrische Kryptographie — Signaturen, Schlüsselaustausch (Langzeit-Sicherheit).'
                    bsi_status: 'BSI TR-02102-1 konform — Mindestlänge für Schutzbedarf hoch und langlebige Zertifikate.'
                    optional_when: 'Abwählbar wenn ausschließlich elliptische Kurven verwendet werden.'
                'ED25519':
                    purpose: 'Moderne digitale Signaturen (Edwards-Curve, RFC 8032) — schnell, klein, side-channel-resistent (SSH, JWT, modernes TLS).'
                    bsi_status: 'BSI TR-02102-1 konform seit 2024. Empfohlen für Neusysteme.'
                    optional_when: 'Abwählbar nur wenn ECDSA-P256 / RSA als Mindeststandard genügt (Legacy-Kompatibilität).'
                'ED448':
                    purpose: 'Moderne digitale Signaturen (Edwards-Curve) mit höherer Sicherheitsmarge als ED25519.'
                    bsi_status: 'BSI TR-02102-1 konform. Wird in der Praxis selten gebraucht.'
                    optional_when: 'Bedenkenlos abwählbar wenn ED25519 als Standard genügt.'
