            preset_bundle_help: 'Ein-Klick-Vorbefüllung sektor-spezifischer Defaults. Bestehende Eingaben bleiben erhalten.'
            preset_bundle_help_multi: 'Mehrere Presets wählbar. Konflikte bei Skalar-Feldern: zuletzt gewähltes Preset gewinnt, manuell anpassbar.'
            help:
                title: 'Was sind Operative Baselines?'
                body: 'Konkrete Mess- und Mindestwerte für Ihren operativen Betrieb: Welche Krypto-Algorithmen sind erlaubt, wie schnell muss bei einem Patch reagiert werden, wie viel Datenverlust ist tolerierbar. Diese Werte landen direkt in den generierten Richtlinien.'
                example: 'Beispiel: Backup-RPO = 24 h bedeutet: maximal 24 Stunden Datenverlust beim Restore. Patch-SLA kritisch = 4 h bedeutet: kritische CVEs müssen binnen 4 h gepatcht sein.'
                preset_hint: 'Tipp: Wenn Sie in Schritt 1 ein Industrie-Preset gewählt haben, sind sinnvolle Defaults bereits vorbefüllt — Sie können jeden Wert anpassen.'
            tooltip:
                rpo: 'Recovery-Point-Objective — wie viel Datenverlust seit dem letzten Backup tolerierbar ist (in Stunden).'
                rpo_usual: 'Recovery Point Objective: maximaler tolerierbarer Datenverlust seit letztem Backup. Üblich: 24h Standard / 4h kritische Systeme / 1h Tier-1-DB.'
                rto: 'Recovery-Time-Objective — wie schnell ein Geschäftsprozess nach einem Ausfall wieder verfügbar sein muss.'
                rto_high_usual: 'Recovery Time Objective hoch-kritisch: ≤ 4h üblich (Banking) — bis 24h tolerabel (Mittelstand).'
                rto_medium_usual: 'RTO mittel: 24–72h üblich.'
                rto_low_usual: 'RTO gering: 1–2 Wochen üblich.'
                patch_sla_critical_usual: 'Critical-Patch-SLA: typisch 24h (Mittelstand) bis 4h (regulierter Sektor).'
                cvss: 'Common Vulnerability Scoring System v3.1 — standardisierte Schwachstellen-Bewertung 0.0–10.0.'
                crypto_allowlist_bsi: 'BSI-TR-02102:2024-1 konforme Algorithmen vorausgewählt — anpassbar.'
                crypto_allowlist_modern: 'Moderner und sicherer Standard-Satz vorausgewählt — verfeinern Sie ihn entsprechend Ihrer Risikoneigung.'
                dora_significant: 'DORA Art. 16 — bedeutendes Unternehmen unterliegt verschärften Resilienz-Anforderungen.'
                dora_ctpp: 'Critical Third-Party Provider — IKT-Drittanbieter mit systemischer Bedeutung. Self-Assessment als Vorprüfung.'
                bsi_tr02102: 'BSI Technische Richtlinie 02102 — Empfehlungen für kryptografische Verfahren und Schlüssellängen.'
                ict_concentration: 'DORA Art. 29 — Schwellwert für Risikokonzentration auf einzelnen IKT-Anbietern.'
            dora:
                significance_self_check:
                    title: 'DORA-Significance-Self-Check (DORA Art. 16 + RTS)'
                    intro: 'Drei Leitfragen zur Selbsteinstufung als „bedeutendes Unternehmen" gemäß DORA Art. 16. Server-seitig wird ab 2 von 3 Ja-Antworten „bedeutend" abgeleitet.'
                    q1: 'Q1: Bilanzsumme der Organisation > 5 Mrd EUR?'
                    q1_help: 'Wert auf Konzernebene zum letzten Jahresabschluss. Schwellwert orientiert sich am EBA/ESRB-Lex-RTS-Entwurf zu DORA Art. 16.'
                    q1_yes_implication: 'Bei „Ja": ein Yes-Punkt von drei. Größenkriterium ist erfüllt — Schwelle zur „Bedeutung" rückt näher.'
                    q1_no_implication: 'Bei „Nein": kein Yes-Punkt. Bilanzsumme allein triggert keine erhöhten DORA-Anforderungen.'
                    q2: 'Q2: Anzahl IKT-Drittparteien > 100 oder IKT-Konzentrationsrisiko > 10%?'
                    q2_help: 'Drittparteien aus dem IKT-Drittparteien-Register (DORA Art. 28). Konzentration: Anteil eines einzelnen Anbieters an kritischen IKT-Funktionen.'
                    q2_yes_implication: 'Bei „Ja": ein Yes-Punkt von drei. Hohes IKT-Konzentrationsrisiko triggert verschärftes Drittparteien-Monitoring.'
                    q2_no_implication: 'Bei „Nein": kein Yes-Punkt. Standard-Drittparteien-Register reicht aus.'
                    q3: 'Q3: Aktiv im Cross-Border-Service-Provisioning der EU?'
                    q3_help: 'Erbringung systemrelevanter IKT-Dienste in mehr als einem EU-Mitgliedstaat (relevant für ESA-Aufsicht).'
                    q3_yes_implication: 'Bei „Ja": ein Yes-Punkt von drei. ESA (EBA/ESMA/EIOPA) wird ggf. mitzuständige Aufsichtsbehörde.'
                    q3_no_implication: 'Bei „Nein": kein Yes-Punkt. Rein nationale Aufsicht — i. d. R. nur BaFin / Bundesbank zuständig.'
                    answer_yes: 'Ja'
                    answer_no: 'Nein'
                    derived_label: 'Abgeleitet:'
                    derived_yes: 'Bedeutendes Unternehmen (DORA Art. 16)'
                    derived_no: 'Standard-Unternehmen (kein Art.-16-Schwellwert)'
                    derived_yes_consequence: 'Konsequenz: Sie unterliegen voll DORA Art. 5–16 (verschärfte Resilienz-Anforderungen). Sign-Off vom Vorstand für ICT-Risk-Management-Framework erforderlich.'
                    derived_no_consequence: 'Konsequenz: Standard-DORA-Anforderungen (Art. 5–14). Vereinfachtes Resilienz-Programm möglich, aber Mindest-Anforderungen bleiben.'
                not_applicable_hint:
                    title: 'DORA gilt für Sie vermutlich nicht'
                    body: 'DORA gilt primär für Finanzdienstleister (Banken, Wertpapierfirmen, Zahlungsdienstleister, FMI, Krypto-Anbieter etc.). Wenn Ihr Unternehmen keine Finanzdienstleistung erbringt, deaktivieren Sie DORA in Schritt 1 (Standards-Auswahl).'
                    link_label: 'Zurück zu Schritt 1 — Standards anpassen'
