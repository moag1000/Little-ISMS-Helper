                    'A.5.7': 'Bedrohungsinformationen (Threat Intelligence)'
                    'A.5.8': 'Informationssicherheit im Projektmanagement'
                    'A.5.9': 'Inventar von Informationen und sonstigen zugehörigen Werten'
                    'A.5.10': 'Zulässige Nutzung von Informationen und zugehörigen Werten'
                    'A.5.11': 'Rückgabe von Werten'
                    'A.5.12': 'Klassifizierung von Informationen'
                    'A.5.13': 'Kennzeichnung von Informationen'
                    'A.5.14': 'Informationsübertragung'
                    'A.5.15': 'Zugriffskontrolle'
                    'A.5.16': 'Identitätsverwaltung'
                    'A.5.17': 'Authentifizierungsinformationen'
                    'A.5.18': 'Zugriffsrechte'
                    'A.5.19': 'Informationssicherheit in Lieferantenbeziehungen'
                    'A.5.20': 'Behandlung der Informationssicherheit in Lieferantenvereinbarungen'
                    'A.5.21': 'Steuerung der Informationssicherheit in der IKT-Lieferkette'
                    'A.5.22': 'Überwachung, Überprüfung und Änderungsmanagement von Lieferantenleistungen'
                    'A.5.23': 'Informationssicherheit bei der Nutzung von Cloud-Diensten'
                    'A.5.24': 'Planung und Vorbereitung des Managements von Informationssicherheitsvorfällen'
                    'A.5.25': 'Beurteilung und Entscheidung über Informationssicherheitsereignisse'
                    'A.5.26': 'Reaktion auf Informationssicherheitsvorfälle'
                    'A.5.27': 'Lernen aus Informationssicherheitsvorfällen'
                    'A.5.28': 'Sammeln von Beweisen'
                    'A.5.29': 'Informationssicherheit während einer Störung'
                    'A.5.30': 'IKT-Bereitschaft für Geschäftskontinuität'
