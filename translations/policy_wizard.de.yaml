policy_wizard:
    title: Policy-Wizard
    subtitle: Regelwerk-Generierung mit minimalem Tipp-Aufwand
    badge: ISMS

    landing:
        intro: 'Wählen Sie einen Modus, um den Policy-Wizard zu starten. Aktive Wizard-Läufe können jederzeit fortgesetzt werden.'
        in_progress_title: 'Aktive Wizard-Läufe'
        in_progress_empty: 'Aktuell laufen keine Wizard-Sitzungen.'
        choose_mode: 'Modus auswählen'

    mode:
        full:
            label: 'Vollständiger Lauf'
            description: 'Sieben Schritte vom Welcome bis zur Generate-Phase. Erzeugt das komplette Regelwerks-Set inklusive ISO 27001, BSI- und DORA-Sektionen.'
        targeted:
            label: 'Gezielter Re-Run'
            description: 'Aktualisiert einzelne Sektionen nach einem Audit-Finding oder einer regulatorischen Änderung, ohne das gesamte Regelwerk neu zu erzeugen.'
        sandbox:
            label: 'Sandbox-Vorschau'
            description: 'Probelauf ohne Persistenz. Es werden keine Documents geschrieben, kein SoA-Update — ideal zum Erkunden.'

    step:
        welcome:
            title: 'Willkommen + Standards'
            subtitle: 'Wählen Sie den Standards-Mix und den Run-Modus.'
            standard:
                iso27001: 'ISO/IEC 27001:2022 (Pflicht)'
                bsi: 'BSI IT-Grundschutz (200-2 Standardabsicherung)'
                dora: 'EU-DORA (Digital Operational Resilience Act)'
                gdpr: 'EU-DSGVO / BDSG (Datenschutz-Sektion)'
                bcm: 'BCM (ISO 22301 Business Continuity)'
                iso27701: 'ISO/IEC 27701 (PIMS-Erweiterung)'
            preview: 'Diese Auswahl erzeugt voraussichtlich %count% Dokumente.'
            finding_reference_label: 'Audit-Finding-Referenz (optional)'
            finding_reference_help: 'Verlinkt diesen Wizard-Lauf mit einem Audit-Finding zur Nachverfolgung.'
        organisation_scope:
            title: 'Organisation & Geltungsbereich'
            subtitle: 'Rechtsname, Scope-Statement und in Geltungsbereich befindliche Standorte.'
            legal_name_label: 'Rechtlicher Name'
            legal_name_help: 'Vollständiger juristischer Name der Organisation.'
            scope_statement_label: 'Scope-Statement'
            scope_statement_help: 'Konkrete Beschreibung des Geltungsbereichs (mind. 30 Zeichen). Auditor-tauglich, keine Floskeln.'
            primary_address_label: 'Hauptadresse (optional)'
            sites_label: 'In-Scope-Standorte'
            sites_help: 'IDs der eingebundenen Standorte. Leer lassen, wenn nur die Hauptadresse gilt.'
            climate_note: 'ISO 27001:2024 Klausel 4.1 wording zum Klimawandel ist standardmäßig aktiviert (Audit-Defang).'
        roles:
            title: 'Rollen & Verantwortlichkeiten'
            subtitle: 'CISO, ISB, DPO, BCM-Officer und die Function-Owner pro Geschäftsfunktion.'
            ciso_label: 'CISO (Chief Information Security Officer)'
            isb_label: 'ISB (Informationssicherheitsbeauftragter)'
            dpo_label: 'Datenschutzbeauftragte/r'
            bcm_officer_label: 'BCM-Officer (Business Continuity)'
            function_owners_label: 'Function-Owner pro Geschäftsfunktion'
            function_owners_help: 'Risk-Owner P1 — pro Funktion ein verantwortlicher Owner.'
        risk_classification:
            title: 'Risikoklassifizierung'
            subtitle: 'Risiko-Appetit (1-5) für die Tenant-Organisation.'
            tier_label: 'Risiko-Appetit-Stufe'
            tier_1: '1 – sehr konservativ (jede Abweichung erfordert Vorstandsfreigabe)'
            tier_2: '2 – konservativ (CISO-Freigabe für Mid-Risks)'
            tier_3: '3 – ausgewogen (Standard-Industriewerte)'
            tier_4: '4 – wachstumsorientiert (höhere Restrisiken akzeptabel)'
            tier_5: '5 – aggressiv (Restrisiken nach Risk-Owner-Mandat)'
            direction_hint: '1 = sehr konservativ → 5 = aggressiv. Die Stufe steuert die Default-Schwellwerte für Risk-Acceptance.'
        operational_baselines:
            title: 'Operative Baselines'
            subtitle: 'Patch-Cadence, Logging-Retention, Backup-Frequenz, Awareness-Frequenz.'
            patch_cadence_label: 'Patch-Cadence (Tage)'
            log_retention_label: 'Log-Retention (Tage)'
            backup_frequency_label: 'Backup-Frequenz'
            awareness_frequency_label: 'Awareness-Trainings-Frequenz'
        lifecycle:
            title: 'Lebenszyklus'
            subtitle: 'Review-Intervall und designierter Approver.'
            review_interval_label: 'Review-Intervall (Monate)'
            review_interval_help: 'Maximal 24 Monate (ISO 27001:2022 Klausel 7.5.3 + Audit-Defang).'
            approver_label: 'Approver-Rolle'
            approver_help: 'Welche Rolle zeichnet die Policy-Erneuerung gegen?'
        review_generate:
            title: 'Review & Generate'
            subtitle: 'Zusammenfassung prüfen, Hierarchie-Konflikte begutachten und das Regelwerk erzeugen.'
            summary_heading: 'Zusammenfassung Ihrer Eingaben'
            conflicts_heading: 'Hierarchie-Konflikte'
            conflicts_empty: 'Keine Konflikte erkannt.'
            generate_hint: 'Mit „Erzeugen" werden die Dokumente persistiert. Sandbox-Modus erzeugt keine Dokumente.'
        targeted_pick_topics:
            title: 'Themen auswählen'
            subtitle: 'Bis zu zehn bestehende Topic-Policies für die Re-Generierung markieren.'
        targeted_finding_reference:
            title: 'Audit-Finding-Referenz'
            subtitle: 'Optional: Verlinken Sie diesen Re-Run mit einem Audit-Finding für die Beweiskette.'
        targeted_diff_preview:
            title: 'Diff-Vorschau'
            subtitle: 'Vergleich zwischen aktuell wirksamen Werten und der zuletzt freigegebenen Baseline.'
        targeted_generate:
            title: 'Re-Generierung bestätigen'
            subtitle: 'Letzte Bestätigung: ausgewählte Themen werden neu erzeugt.'
        targeted:
            pick:
                title: 'Themen auswählen'
                subtitle: 'Bis zu zehn bestehende Topic-Policies für die Re-Generierung markieren.'
                hint_max_ten: 'Maximal %count% Themen pro Re-Run. Halten Sie die Auswahl möglichst klein, damit der Diff überschaubar bleibt.'
                more_documents: '… und %count% weitere Dokumente'
                column:
                    topic: 'Thema'
                    last_approved: 'Zuletzt freigegeben'
                    next_review: 'Nächstes Review'
                action:
                    continue: 'Weiter zu Audit-Finding'
            finding:
                title: 'Audit-Finding-ID (optional)'
                subtitle: 'Falls Sie über einen Audit-Finding-Alarm hier gelandet sind, fügen Sie die Finding-ID als Beweisanker ein.'
                placeholder: 'z. B. NCR-2026-04'
                help: 'Wird im Audit-Log dieses Wizard-Laufs gespeichert und in den Approval-Inbox-Eintrag übernommen.'
                action:
                    skip: 'Weiter ohne Referenz'
                    continue: 'Weiter zur Diff-Vorschau'
            diff:
                title: 'Diff-Vorschau'
                subtitle: 'Read-only-Vergleich. Geänderte Zeilen sind gelb markiert; bestätigen Sie unten, um fortzufahren.'
                no_changes_title: 'Keine Drift erkannt'
                no_changes_body: 'Die ausgewählten Themen tragen aktuell denselben Wert wie die zuletzt freigegebene Baseline. Die Re-Generierung läuft trotzdem (z. B. nach Template-Änderung).'
                column:
                    topic: 'Thema'
                    setting: 'Setting-Schlüssel'
                    current: 'Aktueller Wert'
                    approved: 'Freigegebene Baseline'
                    changed: 'Geändert?'
                confirm_label: 'Ich habe die Abweichungen geprüft und bestätige die Re-Generierung der ausgewählten Themen.'
                action:
                    regenerate: 'Re-Generierung starten'
            generate:
                title: 'Re-Generierung bestätigen'
                subtitle: 'Letzter Schritt: die ausgewählten Themen werden neu erzeugt. Sandbox-Modus persistiert nichts.'
                topics_heading: 'Ausgewählte Themen'
                preview_heading: 'Sandbox-Vorschau'
                action:
                    confirm: 'Ich bestätige die Re-Generierung der oben aufgeführten Themen.'

    action:
        start_full: 'Vollständigen Lauf starten'
        start_targeted: 'Gezielten Re-Run starten'
        start_sandbox: 'Sandbox-Lauf starten'
        continue: 'Weiter'
        back: 'Zurück'
        cancel: 'Abbrechen'
        cancel_confirm: 'Soll dieser Wizard-Lauf wirklich abgebrochen werden?'
        generate: 'Regelwerk erzeugen'
        resume: 'Fortsetzen'

    status:
        in_progress: 'In Bearbeitung'
        completed: 'Abgeschlossen'
        cancelled: 'Abgebrochen'
        failed: 'Fehlgeschlagen'
        sandbox: 'Sandbox'

    message:
        generate_preview: 'Diese Auswahl wird voraussichtlich %count% Dokumente erzeugen.'
        run_started: 'Wizard-Lauf gestartet.'
        run_cancelled: 'Wizard-Lauf wurde abgebrochen.'
        run_completed: 'Wizard-Lauf wurde erfolgreich abgeschlossen.'
        sandbox_no_persistence: 'Sandbox-Modus aktiv — es werden keine Dokumente persistiert.'
        changed_yes: 'Geändert'
        changed_no: 'Unverändert'

    konzern_defaults:
        title: 'Konzern-Defaults'
        subtitle: 'Konzernweite Vorgaben für Tochtergesellschaften setzen und propagieren.'
        badge: 'Konzern'
        intro: 'Diese Vorgaben werden an alle Tochter-Tenants weitergegeben. Tochtergesellschaften können bei FloorOnly/CeilingOnly-Settings nur strenger werden.'
        current_settings_heading: 'Aktuelle konzernweite Settings'
        start_heading: 'Neuen Defaults-Lauf starten'
        start_hint: 'Startet den Policy-Wizard im Konzern-Defaults-Modus. Eingaben werden als TenantPolicySetting auf der Holding gespeichert und automatisch in die Tochter-Tenants gepusht.'
        no_settings: 'Noch keine konzernweiten Settings hinterlegt.'
        no_settings_hint: 'Starten Sie unten einen Konzern-Defaults-Lauf, um Risk-Appetit, Backup-RPO, Crypto-Mindestschlüssel und weitere Vorgaben für die gesamte Holding zu definieren.'
        column:
            key: 'Schlüssel'
            value: 'Wert'
            updated_at: 'Zuletzt geändert'
        action:
            start: 'Konzern-Defaults-Wizard starten'
            edit: 'Bearbeiten'

    result:
        title: 'Regelwerk erzeugt'
        subtitle: 'Folgende Dokumente wurden im Rahmen dieses Wizard-Laufs erstellt.'
        documents_heading: 'Erzeugte Dokumente'
        documents_empty: 'Keine Dokumente erzeugt (Sandbox oder Targeted-Re-Run ohne Diff).'
        next_steps_heading: 'Nächste Schritte'
        next_steps_review: 'Top-Management-Sign-Off einholen (Bulk-Approval-Inbox).'
        next_steps_translate: 'Bei Bedarf englische Übersetzung anfordern.'

    error:
        review_interval_max: 'Das Review-Intervall darf 24 Monate nicht überschreiten (ISO 27001 + Audit-Defang).'
        run_not_found: 'Der angeforderte Wizard-Lauf wurde nicht gefunden.'
        run_already_completed: 'Dieser Wizard-Lauf ist bereits abgeschlossen.'
        invalid_step: 'Der angeforderte Schritt ist ungültig.'
        access_denied: 'Sie haben keine Berechtigung für diesen Wizard-Lauf.'
        no_tenant: 'Kein Tenant-Kontext verfügbar.'

    csrf:
        invalid: 'Ungültiges CSRF-Token. Bitte laden Sie die Seite neu.'

# W3-L — Per-user policy acknowledgement collection.
# Closes auditor's predicted ISO 27001 A.6.3 NC ("policy must be communicated and acknowledged").
policy_ack:
    inbox:
        title: 'Offene Richtlinien-Quittierungen'
        subtitle: 'Bitte bestätigen Sie die folgenden veröffentlichten Richtlinien.'
        pending_count: '%count% Richtlinie(n) warten auf Ihre Quittierung.'
        no_pending: 'Alle Richtlinien sind quittiert — vielen Dank!'
    view:
        title: 'Richtlinie ansehen und quittieren'
        subtitle: 'Lesen Sie die Richtlinie und bestätigen Sie die Kenntnisnahme am Seitenende.'
        action:
            acknowledge: 'Kenntnisnahme bestätigen'
        button_disabled_already_acked: 'Sie haben diese Version bereits quittiert.'
    message:
        acknowledged_success: 'Quittierung erfasst — danke!'
    widget:
        title: 'Richtlinien-Quittierungen ausstehend'
        action:
            go_to_inbox: 'Zur Quittierungs-Inbox'

# W3-D — Compliance-Wizard check-types covering Policy-Wizard outputs.
