                    'A.8.24': 'Verwendung von Kryptografie'
                    'A.8.25': 'Sicherer Entwicklungslebenszyklus'
                    'A.8.26': 'Anforderungen an die Anwendungssicherheit'
                    'A.8.27': 'Sichere Systemarchitektur und Entwicklungsgrundsätze'
                    'A.8.28': 'Sichere Programmierung (Secure Coding)'
                    'A.8.29': 'Sicherheitsprüfung in Entwicklung und Abnahme'
                    'A.8.30': 'Ausgelagerte Entwicklung'
                    'A.8.31': 'Trennung von Entwicklungs-, Test- und Produktivumgebungen'
                    'A.8.32': 'Änderungsmanagement (Change Management)'
                    'A.8.33': 'Testinformationen'
                    'A.8.34': 'Schutz von Informationssystemen während Audit-Tests'
                control_desc:
                    stub: 'Beschreibung folgt im Wizard-Output (Statement of Applicability) — Control %control% ist Teil des ISO/IEC 27001:2022 Annex A.'
                    # Junior-ISB-Klartext-Beschreibungen (1 Satz pro Control). NICHT der ISO-Wortlaut, sondern Plain-Language.
                    # A.5 — Organisatorische Controls (37)
                    'A.5.1': 'Top-Level-Leitlinie + thematische Richtlinien für Informationssicherheit. Pflicht für jeden Tenant; nicht-anwendbar nur in extremen Greenfield-Pilot-Cases.'
                    'A.5.2': 'Klare Zuweisung von Sicherheitsrollen (CISO, ISB, Risk-Owner). Pflicht für jeden Tenant — ohne Rollen kein ISMS.'
                    'A.5.3': 'Trennung kritischer Tätigkeiten (z. B. wer ändert vs. wer prüft). Nicht-anwendbar nur bei sehr kleinem Tenant ohne Mehr-Personen-Setup.'
                    'A.5.4': 'Geschäftsleitung muss Informationssicherheit aktiv unterstützen und Vorgaben durchsetzen. Pflicht für jeden Tenant.'
                    'A.5.5': 'Definierte Kontaktwege zu Behörden (BSI, BfDI, LKA). Pflicht — spätestens bei meldepflichtigen Vorfällen unverzichtbar.'
                    'A.5.6': 'Mitgliedschaft / Austausch in Fach-Communities (z. B. CERT-Verbünde). Nicht-anwendbar bei sehr kleinem Tenant ohne Sicherheits-Reife.'
                    'A.5.7': 'Bedrohungslage strukturiert sammeln und auswerten (CTI). Häufig nicht-anwendbar bei kleinem Tenant ohne SOC oder externes CTI-Abo.'
                    'A.5.8': 'Sicherheitsanforderungen früh in Projekten verankern (Security-by-Design). Nicht-anwendbar bei Tenants ganz ohne Projekt-Pipeline.'
                    'A.5.9': 'Asset-Inventar (Daten, Systeme, Lizenzen) führen. Pflicht für jeden Tenant — Basis jedes Risikomanagements.'
                    'A.5.10': 'Acceptable-Use-Policy: was Mitarbeitende mit Informationen / Geräten dürfen. Pflicht, sobald Mitarbeitende vorhanden sind.'
                    'A.5.11': 'Rückgabe von Geräten, Schlüsseln, Daten beim Austritt. Nicht-anwendbar nur ohne Beschäftigte und ohne externe Dienstleister.'
                    'A.5.12': 'Klassifizierungsschema für Informationen (öffentlich / intern / vertraulich). Pflicht — Basis für Schutzmaßnahmen.'
                    'A.5.13': 'Informationen sichtbar mit Klassifizierung kennzeichnen (Wasserzeichen, Header). Nicht-anwendbar bei rein technischen Tenants ohne klassifizierte Dokumente.'
                    'A.5.14': 'Sichere Übertragung (E-Mail-Verschlüsselung, SFTP, signierte Verträge). Pflicht, sobald Daten überhaupt nach außen gehen.'
                    'A.5.15': 'Zugriffsregelung: wer darf was sehen / ändern. Pflicht für jeden Tenant mit mehr als einem Benutzer.'
                    'A.5.16': 'Identitätsverwaltung über den gesamten Lifecycle (Joiner-Mover-Leaver). Pflicht für jeden Tenant mit Benutzerverwaltung.'
                    'A.5.17': 'Sichere Verwaltung von Passwörtern, Schlüsseln, MFA-Faktoren. Pflicht für jeden Tenant.'
                    'A.5.18': 'Need-to-know-Zugriffsrechte regelmäßig prüfen und entziehen. Pflicht für jeden Tenant mit Benutzerverwaltung.'
                    'A.5.19': 'Lieferantenrisiken bewerten und steuern. Nicht-anwendbar nur, wenn der Tenant garantiert keine externen Dienstleister einsetzt.'
                    'A.5.20': 'Sicherheits-Klauseln in Lieferantenverträge aufnehmen (AVV, NDA, SLA). Pflicht, sobald Dienstleister Daten verarbeiten.'
                    'A.5.21': 'IKT-Lieferkette absichern (Software-Bezug, Sub-Dienstleister, EU-CRA-Vorgaben). Nicht-anwendbar bei reinem Single-Vendor-Tenant ohne Sub-Lieferanten.'
                    'A.5.22': 'Lieferanten regelmäßig auditieren / KPI-monitoren. Nicht-anwendbar bei Tenant ohne nennenswerte Dienstleister.'
                    'A.5.23': 'Cloud-Service-Nutzung steuern (SaaS, IaaS, PaaS). Nicht-anwendbar bei rein on-premise Tenant ohne externe Cloud-Anbindung.'
                    'A.5.24': 'Incident-Response-Prozess vorbereiten (Rollen, Eskalation, Playbooks). Pflicht für jeden Tenant.'
                    'A.5.25': 'Sicherheitsereignisse triagieren: ist es ein Incident oder False-Positive? Pflicht, sobald Logs erfasst werden.'
                    'A.5.26': 'Strukturierte Reaktion auf Vorfälle (Eindämmung, Beweissicherung, Recovery). Pflicht für jeden Tenant.'
                    'A.5.27': 'Lessons-Learned aus Vorfällen in Prozesse zurückspielen. Pflicht — auch bei wenigen Vorfällen.'
                    'A.5.28': 'Beweismittel forensisch sicher sammeln (Chain-of-Custody). Häufig nicht-anwendbar bei kleinem Tenant ohne IT-Forensik-Bedarf — dann ausgelagert.'
                    'A.5.29': 'Informationssicherheit auch im Notfall aufrechterhalten (Krisen-Kontinuität). Pflicht für jeden Tenant mit BCM-Pflicht.'
                    'A.5.30': 'IKT-Recovery-Pläne (RTO/RPO) für kritische Systeme. Nicht-anwendbar bei Tenants ohne kritische IT-Abhängigkeiten.'
                    'A.5.31': 'Gesetzliche / vertragliche Anforderungen identifizieren und einhalten (Compliance-Register). Pflicht für jeden Tenant.'
                    'A.5.32': 'Lizenzen und IP-Rechte respektieren (Open-Source-Compliance, Marken). Pflicht für jeden Tenant.'
                    'A.5.33': 'Aufzeichnungen vor Verlust, Verfälschung, unbefugtem Zugriff schützen (Aufbewahrungsfristen). Pflicht für jeden Tenant.'
                    'A.5.34': 'Datenschutz und Schutz personenbezogener Daten (DSGVO). Nicht-anwendbar nur bei Tenant ganz ohne Verarbeitung personenbezogener Daten.'
                    'A.5.35': 'Unabhängige Reviews / interne Audits der Informationssicherheit. Pflicht für jeden ISO-27001-zertifizierten Tenant.'
                    'A.5.36': 'Einhaltung interner Richtlinien aktiv prüfen (Compliance-Monitoring). Pflicht für jeden Tenant.'
                    'A.5.37': 'Dokumentierte Betriebsanweisungen / Runbooks für IT-Operations. Nicht-anwendbar bei Tenants ohne eigene IT-Operations.'
                    # A.6 — Personelle Controls (8)
                    'A.6.1': 'Background-Checks vor Einstellung (Führungszeugnis, Referenzen). Nicht-anwendbar bei Tenant ohne Festanstellungen.'
                    'A.6.2': 'Sicherheitsklauseln in Arbeitsverträgen (Geheimhaltung, IT-Nutzung). Pflicht, sobald Mitarbeitende vorhanden.'
                    'A.6.3': 'Mitarbeiter-Awareness und regelmäßige Schulungen. Pflicht für jeden Tenant mit Mitarbeitenden.'
                    'A.6.4': 'Disziplinarverfahren bei Sicherheitsverstößen. Nicht-anwendbar bei Single-Person-Tenant ohne Mitarbeitende.'
                    'A.6.5': 'Pflichten nach Austritt / Rollenwechsel (Geheimhaltung wirkt nach). Nicht-anwendbar bei Tenant ohne Personalfluktuation.'
                    'A.6.6': 'NDA / Geheimhaltungsvereinbarungen mit Mitarbeitenden und Externen. Pflicht für jeden Tenant.'
                    'A.6.7': 'Sichere Telearbeit / Home-Office (VPN, Geräteschutz, Trennung privat/dienstlich). Nicht-anwendbar bei reinem Vor-Ort-Tenant.'
                    'A.6.8': 'Niedrigschwelliger Meldekanal für Sicherheitsereignisse durch Mitarbeitende. Pflicht für jeden Tenant mit Mitarbeitenden.'
                    # A.7 — Physische Controls (14)
                    'A.7.1': 'Physische Sicherheitszonen definieren (Empfang, Büro, RZ). Nicht-anwendbar bei rein virtuellem Tenant ohne eigene Räumlichkeiten.'
                    'A.7.2': 'Physische Zutrittskontrolle (Schlüssel, Badge, Besucherregelung). Nicht-anwendbar bei reinem Cloud-/Remote-Tenant ohne Räume.'
                    'A.7.3': 'Sensible Räume zusätzlich absichern (RZ, Besprechungsräume mit C-Level-Daten). Nicht-anwendbar bei Tenants ohne sensible Räume.'
                    'A.7.4': 'Überwachung kritischer Räume (CCTV, Alarmanlage, Zutrittsprotokolle). Nicht-anwendbar bei Tenants ohne sensible physische Werte.'
                    'A.7.5': 'Schutz vor Feuer, Wasser, Strom-Ausfall, Erdbeben. Nicht-anwendbar bei rein virtuellem Tenant.'
                    'A.7.6': 'Verhaltensregeln in Sicherheitsbereichen (kein Foto, keine Smartphones im RZ). Nicht-anwendbar ohne eigene Sicherheitsbereiche.'
                    'A.7.7': 'Clear-Desk / Clear-Screen am Arbeitsplatz. Pflicht, sobald Mitarbeitende mit klassifizierten Daten arbeiten.'
                    'A.7.8': 'Geräte ergonomisch und sicher aufstellen (Sichtschutz, kein offener Server). Nicht-anwendbar bei reinem Cloud-Tenant.'
                    'A.7.9': 'Mobile Geräte / Mitarbeiter-Laptop außer Haus schützen (Verschlüsselung, Tracking). Nicht-anwendbar bei Tenants ohne mobile Geräte.'
                    'A.7.10': 'Wechselmedien (USB, externe HDD, Tape) verwalten und löschen. Häufig nicht-anwendbar bei Tenants mit reiner Cloud-Nutzung.'
                    'A.7.11': 'USV / Klimatisierung / Notstrom für kritische IT. Nicht-anwendbar bei reinem Cloud-Tenant ohne eigenes RZ.'
                    'A.7.12': 'Verkabelung (Strom + Daten) gegen Manipulation und Ausfall schützen. Nicht-anwendbar bei reinem Cloud-Tenant.'
                    'A.7.13': 'Wartung von Hardware planen und protokollieren. Nicht-anwendbar bei reinem Cloud-Tenant ohne eigene Hardware.'
                    'A.7.14': 'Sichere Entsorgung / Wiederverwendung von Datenträgern (Wipe, Schreddern, Zertifikat). Pflicht, sobald Datenträger eingesetzt werden.'
                    # A.8 — Technologische Controls (34)
                    'A.8.1': 'Endgeräte härten (Endpoint-Protection, Festplattenverschlüsselung, MDM). Pflicht für jeden Tenant mit Benutzergeräten.'
                    'A.8.2': 'Privilegierte Konten (Admin, Root) eng kontrollieren und protokollieren. Pflicht für jeden Tenant mit IT-Administration.'
                    'A.8.3': 'Anwendungs- und Funktionszugriff einschränken (Least-Privilege auf App-Ebene). Pflicht für jeden Tenant mit Anwendungen.'
                    'A.8.4': 'Quellcode-Repos absichern (Branch-Protection, Geheimnisse aus Repos halten). Nicht-anwendbar bei Tenants ganz ohne eigene Software-Entwicklung.'
                    'A.8.5': 'Sichere Authentifizierung (MFA, FIDO2, Passwort-Komplexität). Pflicht für jeden Tenant.'
                    'A.8.6': 'Kapazitätsplanung für Compute / Storage / Bandbreite. Pflicht — auch bei kleiner IT-Landschaft.'
                    'A.8.7': 'Schutz vor Schadsoftware (Antivirus, EDR, Mail-Scanning). Pflicht für jeden Tenant.'
                    'A.8.8': 'Schwachstellen scannen, bewerten, patchen (CVE-Management). Pflicht für jeden Tenant mit IT-Systemen.'
                    'A.8.9': 'Konfigurationen härten und überwachen (CIS Benchmarks, Drift-Detection). Pflicht für jeden Tenant mit IT-Systemen.'
                    'A.8.10': 'Daten und Systeme sicher löschen (DSGVO Art. 17, BSI VSITR). Pflicht für jeden Tenant mit personenbezogenen Daten.'
                    'A.8.11': 'Maskieren / Pseudonymisieren produktiver Daten in Test-Umgebungen. Nicht-anwendbar bei Tenants ohne separate Test-Umgebungen.'
                    'A.8.12': 'Datenabflussschutz (DLP / E-Mail-Filter / USB-Sperre). Häufig nicht-anwendbar bei kleinem Tenant ohne DLP-Tooling.'
                    'A.8.13': 'Backups erstellen, prüfen und ortsgetrennt aufbewahren. Pflicht für jeden Tenant.'
                    'A.8.14': 'Redundanz für kritische Systeme (HA-Cluster, Multi-Region). Nicht-anwendbar bei Tenants ohne kritische IT-Abhängigkeiten.'
                    'A.8.15': 'Sicherheitsrelevante Logs erfassen (Login, Admin-Aktion, Fehler). Pflicht für jeden Tenant mit IT-Systemen.'
                    'A.8.16': 'Logs aktiv überwachen / SIEM-Use-Cases. Häufig nicht-anwendbar bei kleinem Tenant ohne SIEM/SOC — dann ausgelagert.'
                    'A.8.17': 'Zeitsynchronisation (NTP) auf allen Systemen für forensische Korrelation. Pflicht für jeden Tenant mit IT-Systemen.'
                    'A.8.18': 'Privileged-Utility-Tools (Sysadmin-Werkzeuge) reglementieren. Pflicht für jeden Tenant mit Admin-Tooling.'
                    'A.8.19': 'Software-Installationen auf produktiven Systemen kontrollieren (Allow-List). Pflicht für jeden Tenant mit IT-Systemen.'
                    'A.8.20': 'Netzwerk segmentieren und absichern (Firewall, VLAN, Zero-Trust). Pflicht für jeden Tenant mit eigenem Netz.'
                    'A.8.21': 'Netzdienste (DNS, DHCP, Proxy, VPN) absichern und überwachen. Pflicht für jeden Tenant mit eigenem Netz.'
                    'A.8.22': 'Netzsegmentierung (Trennung von Produktion / Test / Gast / OT). Nicht-anwendbar bei trivialer Netzgröße.'
                    'A.8.23': 'Webfilter / DNS-Filter gegen bekannte bösartige Domains. Häufig nicht-anwendbar bei kleinem Tenant ohne eigene Web-Gateways.'
                    'A.8.24': 'Verwendung von Kryptografie regeln (Algorithmen, Schlüssel-Lifecycle, Key-Management). Pflicht für jeden Tenant mit verschlüsselten Daten.'
                    'A.8.25': 'Sicherer Software-Lifecycle (SDLC) — Sicherheitsanforderungen in jeder Phase. Nicht-anwendbar bei Tenants ohne eigene Entwicklung.'
                    'A.8.26': 'Sicherheitsanforderungen für eingekaufte / entwickelte Anwendungen (OWASP ASVS). Nicht-anwendbar bei Tenants ohne Anwendungs-Beschaffung.'
                    'A.8.27': 'Sichere Architektur- und Engineering-Prinzipien (Defense-in-Depth, Secure-Defaults). Nicht-anwendbar bei Tenants ohne eigene Entwicklung.'
                    'A.8.28': 'Secure Coding (z. B. OWASP Top 10, Static Analysis, Dependency-Scanning). Nicht-anwendbar bei Tenants ohne eigene Entwicklung.'
                    'A.8.29': 'Sicherheitstests in Entwicklung und vor Abnahme (SAST / DAST / Pentest). Nicht-anwendbar bei Tenants ohne eigene Entwicklung.'
                    'A.8.30': 'Outsourcing von Entwicklung steuern und auditieren. Nicht-anwendbar bei Tenants ohne Software-Outsourcing.'
                    'A.8.31': 'Trennung Entwicklung / Test / Produktion. Nicht-anwendbar bei Tenants ohne eigene Software-Entwicklung.'
                    'A.8.32': 'Change-Management-Prozess (Antrag, Test, Freigabe, Rollback). Pflicht für jeden Tenant mit IT-Systemen.'
                    'A.8.33': 'Testdaten managen (kein Echtdaten-Einsatz in Tests, sichere Disposition). Nicht-anwendbar bei Tenants ohne eigene Tests.'
                    'A.8.34': 'Audit-Tests so planen, dass keine Beeinträchtigung produktiver Systeme entsteht. Nicht-anwendbar bei Tenants ohne eigene Audit-Tests.'
