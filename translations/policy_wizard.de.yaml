policy_wizard:
    title: Policy-Wizard
    subtitle: Regelwerk-Generierung mit minimalem Tipp-Aufwand
    badge: ISMS

    # User-Mandate (2026-05-08): Aurora-Flash beim Routen einer
    # Policy-Freigabe an die Geschäftsführung (ROLE_TOP_MGMT).
    approver_match:
        strict_label: 'Passt'
        weak_label: 'Empfohlene Rolle: %roles%'
        mismatch_label: 'Empfohlene Rolle: %roles%'
        recommended_roles_tooltip: 'Empfohlene Approver-Rolle(n) für dieses Topic: %roles%. Sie können auch eine andere Person freigeben — die Audit-Spur dokumentiert die Entscheidung.'
        recommended_roles_hint: 'Empfohlen: %roles%'
        chain_hint: 'Pro Topic prüft das System bei Freigabe automatisch, ob der Approver die fachlich passende Rolle trägt. Audit-Trail dokumentiert jede Match/Mismatch-Entscheidung — eine Mismatch-Freigabe ist erlaubt, wird aber im externen Audit nachvollziehbar.'
    # SoA-Auto-Update bei Dokumentengenerierung — Aurora-Flash + Audit-Trail-Strings.
    topic:
        top_level: 'Top-Level Leitlinie (ISO 27001 Cl. 5.2)'
        acceptable_use: 'Akzeptable Nutzung (A.5.10)'
        access_control: 'Zugangskontrolle (A.5.15-5.18)'
        information_classification: 'Informationsklassifizierung (A.5.12-5.13)'
        information_transfer: 'Informationsuebertragung (A.5.14)'
        identity_management: 'Identitaetsmanagement (A.5.16)'
        authentication_information: 'Authentifizierungsinformation (A.5.17)'
        cryptography: 'Kryptografie (A.8.24)'
        backup: 'Datensicherung (A.8.13)'
        logging: 'Protokollierung (A.8.15-8.17)'
        patch_management: 'Patch-Management (A.8.8 + A.8.32)'
        malware: 'Schadsoftware-Schutz (A.8.7)'
        secure_configuration: 'Sichere Konfiguration (A.8.9)'
        network_security: 'Netzwerksicherheit (A.8.20-8.23)'
        secure_development: 'Sichere Entwicklung (A.8.25-8.30)'
        supplier_relationships: 'Lieferantenbeziehungen (A.5.19-5.23)'
        project_management: 'Projektmanagement (A.5.8)'
        privacy_pii: 'Datenschutz / PII (A.5.34)'
        incident_management: 'Incident-Management (A.5.24-5.28)'
        continuity: 'Kontinuitaet (A.5.29-5.30)'
        threat_intelligence: 'Threat Intelligence (A.5.7)'
        mobile_device: 'Mobile Geraete (A.6.7 + A.7.9)'
        asset_management: 'Asset-Management (A.5.9-5.11)'
        hr_security: 'Personalsicherheit (A.6.1-6.6)'
        physical_security: 'Physische Sicherheit (A.7.1-7.14)'

    # MUST #2 — Junior-ISB-tooltips: 1-Satz-Beschreibung pro Topic für die
    # Topic-Picker im Bestandsaufnahme-Schritt. Wird im Topic-Erklär-Popover
    # gerendert (Tabelle: Topic | Beschreibung).
    topic_description:
        top_level: 'Übergeordnete ISMS-Leitlinie — Mission, Geltung, Verantwortung des Top-Managements (Cl. 5.2).'
        acceptable_use: 'Was Mitarbeitende mit IT-Mitteln tun dürfen — Internet, E-Mail, Privatnutzung, Sanktionen.'
        access_control: 'Wer darf was — User/Rollen/Berechtigungen, Joiner-Mover-Leaver-Prozess.'
        information_classification: 'Vertraulichkeitsstufen + Kennzeichnung (öffentlich / intern / vertraulich / streng vertraulich).'
        information_transfer: 'Sicherer Austausch von Informationen mit Dritten — E-Mail, Filetransfer, NDAs.'
        identity_management: 'Lebenszyklus digitaler Identitäten — User-Provisionierung, Deprovisionierung, Service-Accounts.'
        authentication_information: 'Passwort- und MFA-Vorgaben — Komplexität, Wechsel, Speicherung von Credentials.'
        cryptography: 'Verschlüsselung at-rest + in-transit, Schlüsselmanagement, Algorithmen-Allowlist.'
        backup: 'Datensicherungs-Strategie — Frequenz, Aufbewahrung, Restore-Tests, RPO.'
        logging: 'Was wird protokolliert — Systemereignisse, Login-Audits, SIEM-Ingest, Aufbewahrung.'
        patch_management: 'Schwachstellen-Behebung — Patch-SLA nach CVSS, Inventarisierung, Notfall-Patches.'
        malware: 'Schutz gegen Schadsoftware — EDR/AV-Lösung, Updates, Behandlung infizierter Systeme.'
        secure_configuration: 'Härtungsstandards für Systeme — Baseline-Konfigurationen, CIS Benchmarks, Drift-Erkennung.'
        network_security: 'Netzwerktrennung, Firewalls, VPN, WLAN-Sicherheit, Zonenkonzept.'
        secure_development: 'Sicheres Software-Development — SDLC, Code-Review, SAST/DAST, DevSecOps.'
        supplier_relationships: 'Lieferanten-Sicherheit — Vendor-Assessments, vertragliche InfoSec-Anforderungen.'
        project_management: 'InfoSec in Projekten — Sicherheits-Reviews bei Initiierung, Go-Live-Gates.'
        privacy_pii: 'Schutz personenbezogener Daten — DSGVO-Vorgaben, Betroffenenrechte, DSFA-Pflicht.'
        incident_management: 'Erkennen, Melden und Behandeln von Sicherheitsvorfällen — CSIRT-Prozess, Eskalation.'
        continuity: 'Geschäftsfortführung im Krisenfall — BCM, Notfallpläne, RTO/RPO, Wiederanlauf.'
        threat_intelligence: 'Sammeln und Bewerten externer Bedrohungslage — CERT-Feeds, IoC-Sharing.'
        mobile_device: 'Mobile Endgeräte und Remote-Arbeit — MDM, BYOD, Home-Office-Regeln.'
        asset_management: 'Inventarisierung aller Werte — Hardware, Software, Daten, Eigentümer.'
        hr_security: 'Personelle Sicherheit — Background-Checks, Schulung, Austrittsprozess.'
        physical_security: 'Schutz von Standorten — Zutritt, Besucherregelung, Brand- und Wassergefahren.'

    landing:
        intro: 'Wählen Sie einen Modus, um den Policy-Wizard zu starten. Aktive Wizard-Läufe können jederzeit fortgesetzt werden.'
        in_progress_title: 'Aktive Wizard-Läufe'
        in_progress_empty: 'Aktuell laufen keine Wizard-Sitzungen.'
        choose_mode: 'Modus auswählen'

    mode:
        full:
            label: 'Vollständiger Lauf'
            description: 'Sieben Schritte vom Welcome bis zur Generate-Phase. Erzeugt das komplette Regelwerks-Set inklusive ISO 27001, BSI- und DORA-Sektionen.'
        targeted:
            label: 'Gezielter Re-Run'
            description: 'Aktualisiert einzelne Sektionen nach einem Audit-Finding oder einer regulatorischen Änderung, ohne das gesamte Regelwerk neu zu erzeugen.'
        sandbox:
            label: 'Sandbox-Vorschau'
            description: 'Probelauf ohne Persistenz. Es werden keine Documents geschrieben, kein SoA-Update — ideal zum Erkunden.'

    step:
        bestandsaufnahme:
            title: 'Bestandsaufnahme bestehender Dokumente'
            subtitle: 'Vor dem Start: Was passiert mit Ihren bereits vorhandenen Richtlinien?'
            intro: 'Wir haben in Ihrem Tenant bereits vorhandene Richtlinien, Programme und Pläne gefunden. Bitte entscheiden Sie pro Dokument, wie der Wizard damit umgehen soll, bevor wir mit der Generierung beginnen.'
            suggested_topic: 'Vorschlag'
            rationale_label: 'Begründung (optional)'
            rationale_placeholder: 'Kurze Notiz für das Audit-Log (optional, max. 1000 Zeichen).'
            continue_hint: 'Fortfahren bringt Sie in Schritt 1 (Welcome). Ihre Entscheidungen werden im Wizard-Lauf festgehalten.'
            action:
                replace: 'Durch neues Wizard-Dokument ersetzen'
                keep: 'Bestehendes Dokument behalten (Thema überspringen)'
                merge_into_topic: 'In ein Wizard-Thema einbinden (Section)'
                split_to_topics: 'Auf mehrere Wizard-Themen aufteilen (manuelle Nacharbeit)'
            column:
                title: 'Titel'
                type: 'Typ'
                last_approved: 'Zuletzt freigegeben'
                owner: 'Owner'
                action: 'Aktion'
            suggestion:
                replace: 'Veraltet — empfohlen: ersetzen'
                keep: 'Bereits vom Wizard verwaltet — behalten'
                review: 'Manuell prüfen'
                # MUST #3 — Sammelpolitik-Suggestion-Label.
                split_to_topics: 'Sammelpolitik — empfohlen: Aufteilen'
            empty:
                title: 'Greenfield-Tenant'
                message: 'Es wurden keine bestehenden Dokumente gefunden. Lassen Sie uns frisch starten.'
                action_continue: 'Weiter zu Schritt 1 (Welcome).'
            action_placeholder: '— Aktion wählen —'
            target_topic_placeholder: '— Thema wählen —'
            suggestion_label: 'Empfehlung'
            suggested_topic_help: 'Thema-Vorschlag (basiert auf Titel + Beschreibung)'
            help:
                title: 'Was bedeuten die 4 Aktionen?'
                replace: 'Wizard generiert das passende neue Pflicht-Dokument; Ihr altes Dokument wird <strong>archiviert, NICHT gelöscht</strong> — wiederherstellbar via Admin → Dokumente → Archiv. Empfohlen für veraltete Leitlinien, ISMS-Konzepte und Top-Level-Politiken.'
                keep: 'Ihr Dokument bleibt unverändert, der Wizard überspringt das passende Thema. Empfohlen, wenn Ihr Dokument bereits aktuell und audit-tauglich ist.'
                merge_into_topic: 'Ihr Dokument wird als Anhang/Section in eine vom Wizard generierte Themen-Richtlinie eingebunden (z. B. Ihr Backup-Konzept geht in die Wizard-Backup-Policy). Empfohlen für sehr spezifische Detail-Konzepte.'
                split_to_topics: 'Ihr Dokument betrifft mehrere Wizard-Themen (z. B. eine Mischung aus Zugangskontrolle + Krypto). Verteilen Sie es auf mehrere Wizard-Themen — der Wizard erstellt Stub-Sections; Sie tragen die Inhalte manuell nach.'
            top_level_hint:
                title: 'Top-Level-Dokument erkannt'
                body: 'Dieses Dokument scheint Ihre ISMS-Leitlinie / Top-Level-Politik zu sein. Solche Dokumente werden typischerweise vom Wizard 1:1 ersetzt (Aktion „Ersetzen"). „Einbinden" oder „Aufteilen" macht hier selten Sinn.'
            field:
                action:
                    label: 'Was soll der Wizard mit diesem Dokument tun?'
                merge_topic:
                    label: 'In welches Wizard-Thema einbinden?'
                    help: 'Wählen Sie das Wizard-Thema, dem Ihr Dokument inhaltlich am nächsten kommt. Ihr Inhalt wird als Anhang in die Wizard-Themen-Richtlinie eingebunden.'
                split_topics:
                    label: 'In welche Wizard-Themen aufteilen?'
                    help: 'Wählen Sie 2 oder mehr Wizard-Themen, auf die Ihr Dokument inhaltlich verteilt werden soll. Der Wizard erstellt Stub-Sections in jedem gewählten Thema.'
            # MUST #3 — Sammelpolitik-Hinweis (multi-Topic-Umbrella).
            sammelpolitik_hint:
                title: 'Sammelpolitik erkannt (= alte 80-Seiten-Allzweck-Richtlinie, die alles abdeckt — Zugangskontrolle + Backup + Krypto + Incident in einem Dokument)'
                body: 'Dieses Dokument scheint mehrere Themen abzudecken (z. B. Zugang + Krypto + Backup). Empfohlen: <strong>Aufteilen</strong> statt <strong>Ersetzen</strong> — sonst gehen die nicht abgebildeten Inhalte verloren. Die Themen wurden bereits vorbelegt, prüfen Sie die Auswahl.'
            # MUST #5 — Archivierungs-Hinweis prominent (Inline-Reminder).
            replace_archived_hint: 'Hinweis: Beim Ersetzen wird das alte Dokument <strong>archiviert</strong>, nicht gelöscht — wiederherstellbar via Admin → Dokumente → Archiv.'
            # MUST #4 — Bulk-Action-Bar.
            bulk:
                heading: 'Bulk-Aktionen'
                subheading: 'Setzt mehrere Zeilen gleichzeitig — einzelne Zeilen können danach manuell angepasst werden.'
                replace_all_outdated: 'Alle veralteten ersetzen'
                replace_all_outdated_help: 'Setzt alle Zeilen mit Empfehlung „Veraltet" auf „Ersetzen".'
                keep_all_wizard_tagged: 'Alle Wizard-getaggten überspringen'
                keep_all_wizard_tagged_help: 'Setzt alle Zeilen, die bereits vom Wizard verwaltet werden, auf „Behalten".'
                applied: '%count% Zeilen aktualisiert.'
                no_targets: 'Keine passenden Zeilen gefunden.'
                confirm_title: 'Bulk-Aktion bestätigen'
                confirm_replace_body: 'Diese Aktion setzt %count% Zeilen auf „Ersetzen". Sie können einzelne Zeilen anschließend manuell ändern.'
                confirm_keep_body: 'Diese Aktion setzt %count% Zeilen auf „Behalten" (Thema überspringen). Sie können einzelne Zeilen anschließend manuell ändern.'
                confirm_apply: 'Anwenden'
                confirm_cancel: 'Abbrechen'
            # MUST #2 — Topic-Erklär-Popover.
            topic_help:
                button_label: 'Was bedeuten die Topics?'
                modal_title: 'Wizard-Topics — Kurz-Erklärung'
                modal_intro: 'Jedes Wizard-Topic deckt einen ISO-27002:2022-Themenbereich ab. Die Tabelle zeigt für jedes Topic einen 1-Satz-Hinweis.'
                column_topic: 'Topic'
                column_description: 'Beschreibung'
                close: 'Schließen'
            # MUST #1 — PDF-Preview-Drawer.
            preview:
                open: 'Vorschau öffnen'
                drawer_title: 'Dokumenten-Vorschau'
                drawer_close: 'Schließen'
                no_pdf_title: 'Vorschau nur für PDFs verfügbar'
                no_pdf_body: 'Dieses Dokument ist kein PDF (Typ: %mime%). Bitte herunterladen, um den Inhalt zu prüfen.'
                download: 'Dokument herunterladen'
                show_full: 'Im Dokumenten-Modul öffnen'
                loading: 'Lade Vorschau …'
        welcome:
            title: 'Willkommen + Standards'
            subtitle: 'Wählen Sie den Standards-Mix und den Run-Modus.'
            standard:
                iso27001: 'ISO/IEC 27001:2022 (Pflicht)'
                bsi: 'BSI IT-Grundschutz (200-2 Standardabsicherung)'
                dora: 'EU-DORA (Digital Operational Resilience Act)'
                gdpr: 'EU-DSGVO / BDSG (Datenschutz-Sektion)'
                bcm: 'BCM (ISO 22301 Business Continuity)'
                iso27701: 'ISO/IEC 27701 (PIMS-Erweiterung)'
                nis2: 'NIS-2 (EU-Richtlinie 2022/2555 — wesentliche/wichtige Einrichtungen)'
                tisax: 'TISAX (VDA ISA — Automobil-Zulieferer)'
                soc2: 'SOC 2 (AICPA Trust Services Criteria — US-/B2B-SaaS)'
                c5: 'BSI C5 (Cloud Computing Compliance Criteria Catalogue)'
            preview: 'Diese Auswahl erzeugt voraussichtlich %count% Dokumente.'
            finding_reference_label: 'Audit-Finding-Referenz (optional)'
            finding_reference_help: 'Verlinkt diesen Wizard-Lauf mit einem Audit-Finding zur Nachverfolgung.'
            help:
                title: 'Welche Standards sind relevant?'
                body: 'ISO 27001 ist die Pflicht-Basis. Weitere Standards aktivieren nur, was Sie regulatorisch oder vertraglich brauchen — jeder zusätzliche Standard erzeugt eigene Pflicht-Dokumente.'
                example: 'Beispiel: Eine Bank in Deutschland aktiviert ISO 27001 + DORA + DSGVO + BCM. Ein B2C-SaaS aktiviert ISO 27001 + DSGVO.'
                dora_replaces_vait: 'DORA ersetzt seit Januar 2025 die alten BaFin-Regelungen (VAIT/BAIT/KAIT/ZAIT) — kein separates VAIT/BAIT-Dokument mehr nötig.'
            tooltip:
                iso27001: 'ISO/IEC 27001:2022 — internationaler ISMS-Standard. Pflicht-Basis dieses Wizards.'
                bsi: 'BSI IT-Grundschutz — deutscher Pendant zu ISO 27001 mit detailliertem Bausteinkatalog. Häufig im öffentlichen Sektor + KRITIS.'
                dora: 'Digital Operational Resilience Act (EU 2022/2554) — gilt seit Jan 2025 für Banken/Versicherungen/Zahlungsdienstleister. Ersetzt VAIT/BAIT/KAIT/ZAIT.'
                gdpr: 'EU-DSGVO + nationales Recht (BDSG). Pflicht bei Verarbeitung personenbezogener Daten.'
                bcm: 'ISO 22301 — Business Continuity Management. Empfohlen für KRITIS, Banken, Health.'
                iso27701: 'ISO/IEC 27701 — PIMS (Privacy Information Management). Ergänzt 27001 um Datenschutz-spezifische Controls.'
                nis2: 'EU-Richtlinie 2022/2555 (in DE umgesetzt durch NIS2UmsuCG). Pflicht für wesentliche/wichtige Einrichtungen ab ~50 MA bzw. 10 Mio EUR Umsatz. Mapping zu ISO 27001 ist hinterlegt — wir generieren Art.-21-Maßnahmen + Art.-23-Meldewege als Sektionen.'
                tisax: 'TISAX (Trusted Information Security Assessment Exchange) auf Basis VDA ISA. Pflicht-Audit für Lieferanten der deutschen Automobilindustrie. Mapping zu ISO 27001 ist hinterlegt — Prototypenschutz + Datenschutz werden als Zusatz-Sektionen erzeugt.'
                soc2: 'SOC 2 nach AICPA Trust Services Criteria (Security/Availability/Confidentiality/Processing Integrity/Privacy). De-facto-Standard für US-/B2B-SaaS-Verträge. Mapping zu ISO 27001 ist hinterlegt — TSC-Sektionen werden in die Richtlinien eingebettet.'
                c5: 'BSI Cloud Computing Compliance Criteria Catalogue (C5:2020 + C5:2026). Pflicht-Vertrauensanker für Cloud-Anbieter im DACH-Bundes-/Behördenmarkt. Mapping zu ISO 27001 ist hinterlegt — C5-Basis- und Zusatzkriterien werden mit ausgewiesen.'
            # Junior-ISB Wish #1 — 1-Satz-Erklärung pro Standard.
            # Gerade ISO 27701 (PIMS) ist für Junior-Implementer nicht
            # selbsterklärend — Begriff ausschreiben + Use-Case nennen.
            standard_explainer:
                summary: 'Was bedeuten diese Standards? (klicken zum Aufklappen)'
                iso27001: 'Internationaler Standard für Informationssicherheits-Management-Systeme (ISMS). Pflicht-Basis dieses Wizards — alle anderen Standards bauen darauf auf.'
                bsi: 'Deutscher Pendant zu ISO 27001 mit detailliertem Bausteinkatalog (200-1/2/3). Sinnvoll wenn Sie öffentliche Aufträge oder KRITIS-Einrichtungen betreuen.'
                dora: 'EU-Verordnung 2022/2554 — Digital Operational Resilience für Banken, Versicherungen, Zahlungsdienstleister. Ersetzt seit Jan 2025 die alten BaFin-Rundschreiben (VAIT/BAIT/KAIT/ZAIT).'
                gdpr: 'EU-DSGVO + nationales Recht (BDSG). Pflicht bei Verarbeitung personenbezogener Daten — generiert die Datenschutz-Sektionen Ihrer Richtlinien.'
                bcm: 'Business Continuity Management nach ISO 22301. Erzeugt Notfall- und Wiederherstellungsvorgaben (RTO/RPO, BIA-Methodik). Empfohlen für KRITIS, Banken und Health.'
                iso27701: 'ISO 27701 (PIMS = Privacy Information Management System) — Datenschutz-Erweiterung von ISO 27001. Gibt Ihrem ISMS einen Datenschutz-Layer mit klausel-genauer Audit-Spur. Empfohlen wenn Sie DSGVO + ISO 27001 in einem Audit prüfen wollen.'
                nis2: 'NIS-2 (EU-Richtlinie 2022/2555, in DE per NIS2UmsuCG umgesetzt). Pflicht ab Schwellwerten der wesentlichen/wichtigen Einrichtungen. Wir liefern das ISO-27001-Mapping vor — Sie bekommen Art.-21-Risikomaßnahmen und Art.-23-Meldewege automatisch ins Dokument.'
                tisax: 'TISAX (VDA ISA) — Pflicht-Assessment für Zulieferer der Automobilindustrie. Wir liefern das ISO-27001-Mapping vor — Prototypenschutz und VDA-spezifische Datenschutz-Anforderungen werden in die Richtlinie eingebettet.'
                soc2: 'SOC 2 (AICPA Trust Services Criteria). De-facto-Anforderung für US-/B2B-SaaS-Kundenverträge. Wir liefern das ISO-27001-Mapping vor — Sektionen für Security/Availability/Confidentiality/Processing Integrity/Privacy werden mit erzeugt.'
                c5: 'BSI C5 (Cloud Computing Compliance Criteria Catalogue, Stand 2020 und 2026). Pflicht-Vertrauensanker für Cloud-Anbieter im Bundes- und Behördenmarkt. Wir liefern das ISO-27001-Mapping vor — C5-Basis- und Zusatzkriterien werden in den jeweiligen Richtlinien-Abschnitten ausgewiesen.'
            # Junior-ISB Wish #2 — NIS-2 / DORA lex specialis.
            # Banner im Wizard + Footer-Klausel im generierten DORA-Body.
            dora_nis2_lex_specialis:
                title: 'DORA-konform — NIS-2 mit abgedeckt'
                body: 'NIS-2 Art. 21 (Risikomanagement) + Art. 23 (Meldepflichten) sind durch DORA als lex specialis abgedeckt (DORA Art. 1 Abs. 2 + NIS-2 Erwägungsgrund 16). Hat Ihr Unternehmen NIS-2-relevante Funktionen außerhalb des Finanzteils (z. B. KRITIS-Energieversorgung), weisen Sie NIS-2 separat aus.'
                footer_in_doc: 'Diese Richtlinie erfüllt NIS-2 Art. 21 + Art. 23 über DORA Art. 6 + Art. 17-23 (lex specialis nach DORA Art. 1 Abs. 2 sowie NIS-2 Erwägungsgrund 16).'
        organisation_scope:
            title: 'Organisation & Geltungsbereich'
            subtitle: 'Rechtsname, Scope-Statement und in Geltungsbereich befindliche Standorte.'
            legal_name_label: 'Rechtlicher Name'
            legal_name_help: 'Vollständiger juristischer Name der Organisation.'
            scope_statement_label: 'Scope-Statement'
            scope_statement_help: 'Konkrete Beschreibung des Geltungsbereichs (mind. 30 Zeichen). Auditor-tauglich, keine Floskeln.'
            scope_statement:
                examples:
                    title: 'Beispiele anzeigen'
                    e1: '„Alle Geschäftsprozesse, IT-Systeme und Standorte der ABC GmbH am Hauptsitz Bonn (Datacenter inkl.), die personenbezogene Kundendaten verarbeiten."'
                    e2: '„ICT-Operations + Plattform-Engineering der DEF AG; Standorte Frankfurt + Mailand; ausgenommen externe Cloud-Provider, die separat nach SOC-2 zertifiziert sind."'
                    e3: '„Produktionsstätten Maschinenbau in Stuttgart + Karlsruhe; OT-Netze + ERP + Engineering-PCs; ausgenommen Verwaltungssitz Berlin."'
            primary_address_label: 'Hauptadresse (optional)'
            sites_label: 'In-Scope-Standorte'
            sites_help: 'Wählen Sie die für den Geltungsbereich relevanten Standorte aus. Nur sichtbare Mandanten-Standorte werden angezeigt.'
            climate_note: 'ISO 27001:2024 Klausel 4.1 wording zum Klimawandel ist standardmäßig aktiviert (Audit-Defang).'
            field:
                legal_name:
                    prefilled_hint: 'Aus Mandant übernommen — überschreibbar'
                headquarters_address:
                    prefilled_hint: 'Aus Mandant übernommen — überschreibbar'
                in_scope_locations:
                    placeholder: 'Standorte auswählen…'
                    empty_state:
                        title: 'Noch keine Standorte hinterlegt'
                        body: 'Damit Standorte hier zur Auswahl erscheinen, legen Sie zunächst mindestens einen Standort im Mandanten an.'
                        cta_label: 'Standort anlegen'
            help:
                title: 'Was gehört in den Geltungsbereich?'
                body: 'Der Geltungsbereich (Scope) definiert, welche Teile Ihrer Organisation vom ISMS abgedeckt sind. Auditoren prüfen jeden Satz wörtlich — keine Floskeln.'
                example: 'Beispiel: „Das ISMS umfasst die Entwicklung, den Betrieb und Support der Cloud-Plattform XYZ am Standort Berlin (50 Mitarbeitende, ohne Tochtergesellschaft ABC GmbH)."'
            tooltip:
                climate: 'ISO 27001:2024 Klausel 4.1 — Klimawandel als Kontext-Faktor des ISMS pflichtgemäß zu berücksichtigen.'
        roles:
            title: 'Rollen & Verantwortlichkeiten'
            subtitle: 'CISO, ISB, DPO, BCM-Officer und die Function-Owner pro Geschäftsfunktion.'
            ciso_label: 'CISO (Chief Information Security Officer)'
            isb_label: 'ISB (Informationssicherheitsbeauftragter)'
            dpo_label: 'Datenschutzbeauftragte/r'
            bcm_officer_label: 'BCM-Officer (Business Continuity)'
            function_owners_label: 'Function-Owner pro Geschäftsfunktion'
            function_owners_help: 'Risk-Owner P1 — pro Funktion ein verantwortlicher Owner.'
            function_owners:
                junior_help:
                    title: 'Was ist ein Function-Owner?'
                    body: 'Function-Owner = verantwortliche Person pro Geschäftsfunktion (analog zu ISO-9001-Prozesseigner). Pro Funktion einen Owner — Mehrfachzuweisung pro Person ist erlaubt. Leitfrage: Wer akzeptiert Risiken im Namen seiner Funktion?'
                    examples: 'Beispielhafte Funktionen: IT-Leitung, Personal, Produktion/OT, Vertrieb, Forschung & Entwicklung, Einkauf/Lieferanten, Recht & Compliance.'
            help:
                title: 'Welche Rollen brauche ich wirklich?'
                body: 'CISO + ISB sind Pflicht in jedem ISMS. DPO ist Pflicht bei DSGVO-Geltungsbereich. BCM-Officer nur bei aktiviertem BCM-Standard. Function-Owner sind die Fachbereichsleiter, die Risiken in ihrem Bereich verantworten.'
                example: 'Beispiel kleines Unternehmen: CISO + ISB = dieselbe Person ist erlaubt, sollte aber dokumentiert sein. DPO = externe Beratung zulässig (§ 38 Abs. 1 BDSG).'
                missing_user_link: 'Person nicht aufgelistet?'
                missing_user_link_cta: 'Personen-Verwaltung öffnen'
            tooltip:
                ciso: 'CISO — strategische Verantwortung für Informationssicherheit. Berichtsweg an die Geschäftsführung.'
                isb: 'ISB — operative Umsetzung der CISO-Vorgaben. In kleinen Organisationen oft Personalunion mit CISO.'
                dpo: 'Datenschutzbeauftragte/r nach DSGVO Art. 37 + § 38 BDSG. Pflicht ab >20 MA mit reg. PD-Verarbeitung.'
                bcm_officer: 'BCM-Officer nach ISO 22301 — Verantwortlich für Notfall- und Wiederherstellungspläne.'
                raci_r: 'Responsible — wer führt die Aufgabe operativ aus.'
                raci_a: 'Accountable — wer trägt die Endverantwortung (genau eine Person).'
                raci_c: 'Consulted — wer wird vor der Entscheidung konsultiert.'
                raci_i: 'Informed — wer wird über das Ergebnis informiert.'
            person_picker:
                intro:
                    title: 'Rollen-Inhaber sind Personen, keine User-Accounts'
                    body: 'CISO/ISB/DPO/BCM-Officer können auch externe Berater ohne System-Login sein — wählen Sie eine Person aus dem Mandanten-Personenstamm. Die Approval-Chain unten benötigt weiterhin Benutzer mit Login (Sign-Off-Aktion).'
            field:
                ciso_picker:
                    placeholder: 'CISO auswählen…'
                isb_picker:
                    placeholder: 'ISB auswählen…'
                dpo_picker:
                    placeholder: 'DPO auswählen… (extern bevorzugt)'
                bcm_officer_picker:
                    placeholder: 'BCM-Officer auswählen…'
                function_owner_picker:
                    placeholder: 'Function-Owner auswählen…'
                approval_chain:
                    label: 'Approval-Chain (Benutzer mit Login)'
                    placeholder: 'Genehmiger auswählen…'
                    tooltip: 'Approval erfordert ein authentifiziertes Sign-Off — daher Benutzer (mit Login), keine reine Person-Rolle.'
                    help: 'Mehrfachauswahl: jeder Benutzer wird in der angegebenen Reihenfolge zur Freigabe aufgefordert. Der Wizard-Starter darf nicht in der Liste stehen (Selbstgenehmigungs-Verbot).'
                    empty_state: 'Keine Approver-Benutzer im Mandanten gefunden. Bitte vergeben Sie zunächst die Rollen ROLE_GROUP_CISO, ROLE_DPO oder ROLE_ADMIN an mindestens eine Person mit Login.'
            empty_state:
                no_persons:
                    title: 'Keine Personen im Mandanten'
                    body: 'Bevor Rollen vergeben werden können, muss mindestens eine Person im Mandanten-Personenstamm existieren.'
                    cta_label: 'Person anlegen'
        risk_classification:
            title: 'Risikoklassifizierung'
            subtitle: 'Risiko-Appetit (1-5) für die Tenant-Organisation.'
            tier_label: 'Risiko-Appetit-Stufe'
            tier_1: '1 – sehr konservativ (jede Abweichung erfordert Vorstandsfreigabe)'
            tier_2: '2 – konservativ (CISO-Freigabe für Mid-Risks)'
            tier_3: '3 – ausgewogen (Standard-Industriewerte)'
            tier_4: '4 – wachstumsorientiert (höhere Restrisiken akzeptabel)'
            tier_5: '5 – aggressiv (Restrisiken nach Risk-Owner-Mandat)'
            direction_hint: '1 = sehr konservativ → 5 = aggressiv. Die Stufe steuert die Default-Schwellwerte für Risk-Acceptance.'
            data_classification_label: 'Datenklassifizierungs-Stufen'
            data_classification_3: '3 Stufen (öffentlich / intern / vertraulich)'
            data_classification_4: '4 Stufen (öffentlich / intern / vertraulich / streng vertraulich)'
            schutzbedarf_label: 'Schutzbedarf-Stufen (BSI)'
            schutzbedarf_3: '3 Stufen (BSI-Default: normal / hoch / sehr hoch)'
            schutzbedarf_4: '4 Stufen'
            review_interval_label: 'Review-Intervall (Monate)'
            annex_help: 'Standardmäßig sind alle Annex-A-Controls anwendbar. Schalten Sie nicht zutreffende Controls aus — die Begründung pflegen Sie später im SoA.'
            annex_a:
                when_not_applicable:
                    title: 'Wann ist ein Annex-A-Control NICHT anwendbar?'
                    reason1: 'Funktion existiert nicht (z. B. A.5.34 „Privacy" bei einem Mandanten ohne Verarbeitung personenbezogener Daten).'
                    reason2: 'Asset-Typ existiert nicht (z. B. A.5.23 „Cloud Services" bei einem rein on-premise Mandanten).'
                    reason3: 'Geschäftsmodell schließt es aus (z. B. A.6.4 „Disciplinary Process" bei einer reinen GmbH ohne Mitarbeitende).'
                    reason4: 'Übernommen durch ein externes oder höher gelagertes Control (z. B. Konzernmutter erfüllt das Control für die Tochtergesellschaft).'
                    default_note: 'Default = anwendbar. Bitte nur abwählen, wenn der Ausschluss-Grund auditfest begründbar ist — der Grund wird später im SoA dokumentiert.'
                control_title:
                    # ISO/IEC 27001:2022 Annex A — offizielle Control-Bezeichnungen (DE).
                    # Quelle: ISO/IEC 27001:2022 (Anhang A) i. V. m. ISO/IEC 27002:2022.
                    # A.5 — Organisatorische Controls (37)
