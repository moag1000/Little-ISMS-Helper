                    'A.5.35': 'Unabhängige Überprüfung der Informationssicherheit'
                    'A.5.36': 'Einhaltung von Richtlinien, Regeln und Standards für Informationssicherheit'
                    'A.5.37': 'Dokumentierte Betriebsabläufe'
                    # A.6 — Personelle Controls (8)
                    'A.6.1': 'Sicherheitsüberprüfung'
                    'A.6.2': 'Beschäftigungs- und Vertragsbedingungen'
                    'A.6.3': 'Informationssicherheitsbewusstsein, Schulung und Ausbildung'
                    'A.6.4': 'Disziplinarverfahren'
