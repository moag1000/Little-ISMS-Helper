    nis2:
        title: 'NIS2-Registrierungsmatrix'
        subtitle: 'Pro Rechtsperson in %root% — Klassifizierung und BSI-Meldestatus.'
        intro: 'NIS2 (BSIG §28) reguliert <strong>einzelne Rechtspersonen</strong>, nicht Konzerne. Diese Matrix zeigt je Tochter: Klassifizierung (besonders wichtig / wichtig / nicht reguliert / unbekannt), Branchen-Sektor, NACE-Code, registrierter Meldekontakt und Registrierungsdatum. Pflegen im Tenant-Edit.'
