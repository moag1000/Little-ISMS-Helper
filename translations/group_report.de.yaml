    kpi:
        title: 'Framework-Reifegrad-Matrix'
        subtitle: 'NIS2 / DORA / ISO 27001 / ... pro Tenant in %root% — Zelle = erfüllt / anwendbar Prozent.'
        intro: 'Zeilen = Tenants im Subtree. Spalten = verfügbare Compliance-Frameworks. Zellenwert ist identisch mit dem Per-Tenant-Dashboard (fulfilled / applicable). Leere Zelle bedeutet: Framework im Tenant nicht anwendbar markiert.'
        holding: 'Holding'
        requirements: 'Anforderungen'
        n_a_help: 'Keine anwendbaren Anforderungen in diesem Tenant.'
        col:
            tenant: 'Tenant'
