    incidents:
        title: 'Konzern-Incidents'
        subtitle: 'Cross-Posting aus dem Subtree von %root% — Töchter mit Opt-out bleiben verborgen.'
        intro: 'Default: Incidents aus Töchtern sind für den Konzern-Krisenstab <strong>sichtbar</strong>. Eine Tochter kann <code>visible_to_holding = false</code> setzen (z. B. HR-Fall, der nicht zur Mutter soll). Diese Zeilen erscheinen hier nicht — die Anzahl der Opt-outs wird bewusst <strong>nicht</strong> ausgewiesen, damit die Vertraulichkeit der Tochter gewahrt bleibt.'
        own: 'eigen'
        none: 'Keine Incidents im sichtbaren Scope.'
        stat:
            total: 'Sichtbare Incidents'
        severity:
            critical: 'critical'
            high: 'high'
            medium: 'medium'
            low: 'low'
        col:
            detected_at: 'Erkannt'
            incident: 'Vorfall'
            tenant: 'Tenant'
            severity: 'Severity'
            status: 'Status'
    audit_program:
        title: 'Konzern-Audit-Programm'
        subtitle: 'Ein Audit-Plan → N Tochter-Audits. Stand pro Tochter in %root%.'
        intro: 'Erstelle einen Audit in der Holding (z. B. "ISO 27001 Surveillance Q2 2026"). Mit <strong>Derive</strong> legt das System ein eigenes Audit pro Tochter an, identischer Scope, Audit-Nummer mit Tochter-Suffix, Status <code>planned</code>. Bereits vorhandene Ableitungen werden übersprungen (idempotent). Parent-Link bleibt erhalten, Findings laufen später im Parent-Roll-up zusammen.'
        empty: 'Noch keine Audit-Programme in der Holding angelegt. Lege einen Audit auf diesem Tenant an und kehre hierher zurück.'
        no_subsidiaries: 'Der aktuelle Tenant hat keine Töchter — nichts abzuleiten.'
        col:
            program: 'Programm'
            actions: 'Aktionen'
        cell:
            missing_help: 'Noch nicht abgeleitet'
        action:
            derive: 'Ableiten'
        confirm_derive: 'Dieses Audit-Programm wird auf %count% Tochter-Tenants abgeleitet. Bereits existierende Ableitungen werden übersprungen. Fortfahren?'
        legend:
            completed: 'abgeschlossen'
            in_progress: 'in Durchführung'
            planned: 'geplant'
            missing: 'noch nicht abgeleitet'
        flash:
            invalid_csrf: 'Ungültiges CSRF-Token.'
            no_subsidiaries: 'Der aktuelle Tenant hat keine Töchter — keine Ableitung möglich.'
            derived: 'Programm %program%: %derived% Tochter-Audits abgeleitet, %skipped% übersprungen (bereits vorhanden).'
    suppliers:
        title: 'Konzern-Lieferantenverzeichnis'
        subtitle: 'Dedupliziert pro LEI oder Name über alle Töchter von %root%.'
        intro: 'Identitätsschlüssel: <strong>LEI-Code</strong> (ISO 17442, global eindeutig) wenn vorhanden, sonst Name normalisiert. Mehrfach referenzierte Lieferanten (Badge <strong>N×</strong>) sind Konsolidierungs- und Nachverhandlungskandidaten (DORA Art. 28.3 Sub-Outsourcing-Kette, ISO 27001 A.5.19).'
        none: 'Keine Lieferanten im Konzern-Scope.'
        matched_by_name: 'nur Name'
        no_lei_help: 'Kein LEI-Code hinterlegt — Duplikat-Erkennung ist schwach (normalisierter Name). LEI in Lieferanten-Detail pflegen.'
        stat:
            unique: 'Eindeutige Lieferanten'
            shared: 'Von ≥ 2 Tenants genutzt'
            with_lei: 'Mit LEI'
            critical: 'Critical'
        col:
            supplier: 'Lieferant'
            identity: 'Identität'
            criticality: 'Kritikalität'
            used_by: 'Genutzt von'
            service: 'Leistung'
