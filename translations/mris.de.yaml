mris:
    license:
        cc_by_40: "CC BY 4.0"
    baselines:
        explainer:
            summary: 'Was tut eine MRIS-Baseline?'
            intro: |
                Eine MRIS-Baseline ist eine <strong>branchenspezifische Voreinstellung der Reifegrad-Ziele</strong>
                für die 13 Mythos-Härtungs-Controls (MHC-01..13). Beim Anwenden auf einen Mandanten setzt sie:
            point_target: 'pro MHC einen <strong>Ziel-Reifegrad</strong> (<code>initial</code> / <code>defined</code> / <code>managed</code>) — was die Branche mindestens braucht,'
            point_reason: 'eine <strong>Begründung</strong> warum dieser Reifegrad relevant ist (Regulatorik, Risikolage, typische Bedrohungen),'
            point_preserve: '<strong>bestehende Reifegrad-Bewertungen bleiben unangetastet</strong> (<code>maturity_current</code>-Werte werden nicht überschrieben).'
            example: '<strong>Beispiel:</strong> <code>healthcare-provider</code> setzt Phishing-resistente MFA (MHC-03) auf <code>managed</code> wegen der Ransomware-Welle 2024/25, aber Multi-Tenancy (MHC-07) nur auf <code>defined</code> weil intern. Nach Anwendung siehst du im SoA + Reifegrad-Report die Lücke zwischen Ist (deine Bewertung) und Soll (Baseline-Ziel) als priorisierte Maßnahmen-Liste.'
    page:
        kpi_title: 'Mythos-relevante Kennzahlen'
        kpi_intro: |
            Acht KPIs aus MRIS v1.5 Kap. 10.6. Drei werden automatisch aus
            Bestandsdaten berechnet, fünf erfordern manuelle Pflege je Mandant.
        source: 'Quelle: Peddi, R. (2026). MRIS — Mythos-resistente Informationssicherheit, v1.5. Lizenz: CC BY 4.0.'
    badge:
        auto: auto
        manual: manuell
    state:
        no_data: '— keine Daten —'
    kpi_help:
        manual_note: |
            Die fünf manuell zu pflegenden KPIs (SBOM-Coverage, KEV-Patch-Latency,
            CCM-Coverage, Krypto-Inventar-Abdeckung, TLPT-Findings-Closure) erfordern
            externe Datenquellen. Manuelle Eingabefelder folgen weiter unten.
    manual_form:
        title: 'Manuelle KPI-Werte'
        save: 'Werte speichern'
        intro: |
            Werte als Prozent (0-100) bzw. Tage eingeben. Leer lassen = nicht gepflegt.
            Audit-Trail wird beim Speichern angelegt.
    ai_agent:
        dpia:
            section_title: 'DPIA-Status (DSGVO Art. 35 + AI Act Art. 9)'
            col_title: 'Titel'
            col_status: 'Status'
            col_link: 'Aktion'
            open: 'Öffnen'
            warning_missing: 'Hochrisiko-AI ohne DPIA — gem. DSGVO Art. 35 + AI Act Art. 9 erforderlich.'
            create_button: 'DPIA anlegen'
    audit_report:
        title: 'MRIS-Audit-Report'
        subtitle: 'Mythos-resistente Informationssicherheit · v1.5 — Auditor-Ansicht'
        meta:
            tenant: 'Mandant'
            created_at: 'Erstellt am'
            created_by: 'Erstellt von'
            report_type: 'Berichtstyp'
            report_type_value: 'Audit-Bericht (intern)'
            source_cc: 'Quelle (CC BY 4.0)'
            local: '(lokal)'
        section_1: '1. Mythos-Resilience-Indikator (MRI)'
        section_2: '2. Klassifikation der Controls (4 Kategorien)'
        section_3: '3. „Reine Reibung"-Controls mit flankierenden MHCs'
        section_4: '4. Reifegrad-Statusübersicht der MHCs (Soll / Ist / Delta)'
        section_5: '5. AI-Agent-Inventar (MHC-13 / EU AI Act / ISO 42001)'
        section_6: '6. Mythos-relevante Kennzahlen (MRIS Kap. 10.6)'
        section_2_intro: 'Verteilung der Annex-A-Controls nach MRIS v1.5 Anhang A (Standfest / Teilweise degradiert / Reine Reibung / Nicht betroffen). Audit-relevant: Reine-Reibung-Controls erfordern flankierende MHCs.'
        section_3_intro: 'Die folgenden Controls sind nach MRIS v1.5 als Reibung klassifiziert, leisten also keinen direkten Schutzbeitrag im Mythos-Modell. Sie müssen durch flankierende Mythos-Härtungs-Controls (MHCs) substituiert werden. Standard-Begleitung gem. MRIS v1.5: A.5.25, A.5.36, A.8.8, A.8.23.'
        section_3_empty: 'Keine Controls als „Reine Reibung" klassifiziert (oder MRIS-Klassifikation noch nicht geseedet).'
        section_4_intro: 'Reifegrad-Tracking gem. MRIS v1.5 Kap. 9.5. Stufen: initial (1), defined (2), managed (3). Delta > 0 = Lücke zum Soll. Delta = 0 = on target. Delta < 0 = Soll übererfüllt.'
        section_4_empty: 'Keine MRIS-Requirements gefunden. Framework MRIS-v1.5 ggf. noch nicht geladen.'
        section_5_intro: 'Aggregat-Sicht über das AI-Agent-Inventar. Doku-Vollständigkeit referenziert die 9 EU-AI-Act / ISO-42001 / MHC-13-Pflichtfelder pro Agent.'
        section_6_intro: 'Acht Kennzahlen gem. MRIS v1.5 Kap. 10.6. Drei sind aus Bestandsdaten automatisch berechenbar (MTTC, Phishing-resistente MFA, Restore-Test-Erfolgsquote) und enthalten — sofern vorhanden — eine Sparkline der letzten 90 Tage. Fünf werden manuell gepflegt (CRA-, KEV-, CCM-, Krypto-Inventar-, TLPT-Bezug).'
