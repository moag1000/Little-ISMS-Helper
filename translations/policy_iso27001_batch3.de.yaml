        # =====================================================================
        # 4. Privacy / PII Handling Policy (A.5.34) — short host policy
        # =====================================================================
        privacy:
            v1:
                title: 'Datenschutz- und PII-Schutz-Richtlinie'
                body: |
                    # Datenschutz- und PII-Schutz-Richtlinie — {{ tenant.legal_name }}

                    ## 1. Zweck und Anker
                    Diese Richtlinie setzt ISO/IEC 27002:2022 §5.34 um, das fordert: *"The organization shall identify and meet the requirements regarding the preservation of privacy and protection of PII according to applicable laws and regulations and contractual requirements."* Sie verpflichtet {{ tenant.legal_name }} zur Einhaltung der DSGVO (Verordnung (EU) 2016/679), des Bundesdatenschutzgesetzes (BDSG) sowie aller weiteren anwendbaren Datenschutzvorschriften.

                    ## 2. Hinweis zur Dokumentenstruktur
                    Diese Richtlinie ist als knappe Übersichts- und Verweis-Richtlinie konzipiert (Host Policy). Die operativen Datenschutz-Regelwerke werden in dedizierten Dokumenten geführt, auf die hier verwiesen wird. Sofern die Module ISO 27701 (PIMS) oder die DSGVO-Erweiterung aktiv sind, gelten deren Inhalte als verbindlich; diese Richtlinie tritt subsidiär zurück.

                    ## 3. Geltungsbereich und Rollen
                    Die Richtlinie gilt für alle Verarbeitungen personenbezogener Daten in der Verantwortung von {{ tenant.legal_name }} — als Verantwortlicher oder Auftragsverarbeiter. {{ roles.dpo.fullName }} (Datenschutzbeauftragter) ist die zentrale Anlaufstelle und überwacht die Einhaltung. {{ roles.ciso.fullName }} (CISO) verantwortet die technisch-organisatorischen Maßnahmen.

                    ## 4. Verweis auf operative Regelwerke
                    Die folgenden Regelwerke konkretisieren diese Richtlinie:
                    - **Datenschutzrichtlinie (Privacy Policy)** — Detailregeln zu Zwecken, Rechtsgrundlagen, Betroffenenrechten und internationalen Datentransfers. *(Verlinkung sobald Datenschutz-Modul aktiv.)*
                    - **RoPA-Methodik** — Verfahren zur Führung des Verzeichnisses von Verarbeitungstätigkeiten gemäß DSGVO Art. 30. *(Verlinkung sobald Datenschutz-Modul aktiv.)*
                    - **DSFA-Methodik** — Verfahren zur Datenschutz-Folgenabschätzung gemäß DSGVO Art. 35/36. *(Verlinkung sobald Datenschutz-Modul aktiv.)*
                    - **Auftragsverarbeitungs-Vorlagen** — Standardklauseln und Prüfprozess für AV-Verträge gemäß DSGVO Art. 28.

                    ## 5. Mindestanforderungen unabhängig von Modul-Status
                    Auch ohne aktivierte ISO-27701- oder DSGVO-Module gelten verbindlich:
                    - Verarbeitung personenbezogener Daten nur auf gültiger Rechtsgrundlage (DSGVO Art. 6, ggf. Art. 9).
                    - Wahrung der Betroffenenrechte (DSGVO Art. 12-22), Bearbeitungsfrist gemäß DSGVO Art. 12 grundsätzlich einen Monat.
                    - Sicherheit der Verarbeitung gemäß DSGVO Art. 32 entsprechend dem Schutzbedarf.
                    - Meldung von Datenschutzverletzungen an die Aufsichtsbehörde innerhalb von 72 Stunden gemäß DSGVO Art. 33; Benachrichtigung Betroffener gemäß Art. 34 bei hohem Risiko.
                    - Auftragsverarbeiter werden gemäß Lieferanten-Sicherheits-Richtlinie qualifiziert; AV-Verträge gemäß DSGVO Art. 28 sind verpflichtend.
                    - Datenschutz durch Technikgestaltung und durch datenschutzfreundliche Voreinstellungen gemäß DSGVO Art. 25.

                    ## 6. Schnittstellen zur Informationssicherheit
                    Datenschutzvorfälle sind Sicherheitsvorfälle und werden gemäß Incident-Management-Richtlinie behandelt. Datenkategorisierung folgt der Klassifizierungs-Richtlinie. Zugriffsrechte folgen der Access-Control-Richtlinie. Diese Richtlinie ist eine logische Klammer, kein Ersatz.

                    ## 7. Review
                    Diese Richtlinie wird mindestens jährlich sowie bei wesentlichen regulatorischen Änderungen (z. B. EU AI Act, ePrivacy-Reform) durch {{ roles.dpo.fullName }} überprüft.
