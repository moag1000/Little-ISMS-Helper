        # =====================================================================
        # 5. Information Security Incident Management Policy (A.5.24-A.5.28)
        # =====================================================================
        incident_management:
            v1:
                title: 'Richtlinie zum Sicherheitsvorfallsmanagement'
                body: |
                    # Richtlinie zum Sicherheitsvorfallsmanagement — {{ tenant.legal_name }}

                    ## 1. Zweck und Geltungsbereich
                    Diese Richtlinie setzt ISO/IEC 27002:2022 §5.24 um, das fordert: *"The organization shall plan and prepare for managing information security incidents by defining, establishing and communicating information security incident management processes, roles and responsibilities."* Sie deckt A.5.24 bis A.5.28 sowie A.6.8 (Reporting), A.5.5 (Behördenkontakt) und A.5.6 (Special Interest Groups) ab und integriert die Anforderungen aus DSGVO Art. 33 und 34, EU-DORA Art. 17-23 sowie NIS2 (Richtlinie (EU) 2022/2555).

                    Sie gilt für alle Sicherheitsereignisse und Sicherheitsvorfälle, die Informationswerte oder IKT-Dienste von {{ tenant.legal_name }} betreffen, einschließlich Vorfällen bei Lieferanten und Cloud-Diensten, sofern sie Auswirkungen auf {{ tenant.legal_name }} haben.

                    ## 2. Begriffe und Klassifizierung
                    Ein **Sicherheitsereignis** ist ein erkennbarer Vorgang, der die Schutzziele Vertraulichkeit, Integrität, Verfügbarkeit oder Authentizität betreffen könnte. Ein **Sicherheitsvorfall** ist ein bestätigtes Ereignis mit tatsächlicher oder potenzieller negativer Auswirkung. Vorfälle werden klassifiziert in die Stufen niedrig, mittel, hoch und kritisch — Kriterien sind Auswirkung auf Geschäftsprozesse, betroffene Daten/Systeme, Anzahl betroffener Personen und regulatorische Relevanz.

                    ## 3. Vorbereitung (A.5.24)
                    {{ tenant.legal_name }} unterhält ein eingespieltes Incident-Response-Team unter Leitung von {{ roles.ciso.fullName }} (CISO). Das Team besteht aus Vertretern Sicherheit, IT-Betrieb, Recht/Compliance, Datenschutz, Kommunikation und Geschäftsführung. Run-Books für relevante Vorfallsmuster (Ransomware, Datenabfluss, DDoS, Phishing-Welle, Cloud-Konto-Übernahme, Zero-Day) sind dokumentiert und werden regelmäßig geübt. 24/7-Erreichbarkeit ist über eine On-Call-Rota sichergestellt.

                    ## 4. Erkennung und Meldung (A.6.8)
                    Mitarbeitende sind verpflichtet, vermutete Sicherheitsereignisse unverzüglich über die etablierten Kanäle (Helpdesk, Sicherheits-Hotline, Meldeformular) zu melden. Anonymes Melden ist möglich. Auch externe Meldungen (Lieferanten, Kunden, Behörden, Sicherheitsforscher) werden angenommen und bearbeitet. SIEM- und Monitoring-Systeme erzeugen automatisierte Alarme.

                    ## 5. Bewertung und Entscheidung (A.5.25)
                    Eingehende Ereignisse werden vom Sicherheitsteam triagiert, klassifiziert und entweder als Vorfall eskaliert oder als Falschalarm dokumentiert. Bewertungskriterien sind dokumentiert; die Triage erfolgt nach festgelegten Reaktions-Service-Levels. Kritische Vorfälle werden innerhalb von {{ incident.sla_critical_hours }} Stunden nach Erkennung initial bewertet.

                    ## 6. Reaktion (A.5.26)
                    Die Reaktion folgt den Phasen Eindämmung, Beweissicherung, Beseitigung, Wiederherstellung und Nachsorge. Maßnahmen werden in einem Vorfalls-Tagebuch lückenlos dokumentiert. Bei kritischen Vorfällen wird ein War Room aktiviert; die Geschäftsleitung wird unverzüglich informiert. Externe Spezialisten (Forensik, Recht, Krisenkommunikation) werden bei Bedarf hinzugezogen.

                    ## 7. Regulatorische Meldepflichten
                    Folgende Meldepflichten sind verbindlich zu prüfen und einzuhalten:
                    - **DSGVO Art. 33**: Meldung von Datenschutzverletzungen an die Aufsichtsbehörde innerhalb von 72 Stunden ab Kenntnis. Bei hohem Risiko zusätzliche Benachrichtigung der Betroffenen gemäß Art. 34. Federführung: {{ roles.dpo.fullName }}.
                    - **EU-DORA Art. 17-23**: Bei DORA-pflichtigen Finanzunternehmen — initiale Meldung schwerwiegender IKT-Vorfälle binnen 4 Stunden ab Klassifizierung, Zwischenmeldung binnen 72 Stunden, Abschlussmeldung binnen eines Monats. Federführung: CISO-Office.
                    - **NIS2 (Richtlinie (EU) 2022/2555)**: Bei NIS2-pflichtigen Einrichtungen — Frühwarnung binnen 24 Stunden, Vorfallmeldung binnen 72 Stunden, Abschlussbericht binnen eines Monats.
                    - **Branchenspezifische Meldepflichten** (z. B. BaFin, BNetzA, BSI) sind je nach Geschäftsmodell zu prüfen.

                    Die Verantwortung für die korrekte und fristgerechte Meldung liegt beim CISO-Office in Abstimmung mit Recht/Compliance und {{ roles.dpo.fullName }}.

                    ## 8. Beweissicherung (A.5.28)
                    Beweise werden nach forensischen Grundsätzen gesichert: Wahrung der Integrität (Hash-Werte), lückenlose Chain of Custody, schreibgeschützte Speicherung, Zeitstempel auf synchronisierter Zeitquelle. Die Beweissicherung erfolgt so, dass die Verwertbarkeit in zivil-, straf- und arbeitsrechtlichen Verfahren erhalten bleibt.

                    ## 9. Lessons Learned (A.5.27)
                    Nach jedem Vorfall mittlerer Stufe oder höher erfolgt ein formales Post-Incident-Review. Ergebnisse fließen in Run-Books, Schulungen, Risikoregister und ggf. in Maßnahmen zur Anpassung von Controls ein. Trends werden im Quartalsbericht an die Geschäftsleitung adressiert.

                    ## 10. Externe Kommunikation
                    Öffentliche Kommunikation zu Vorfällen erfolgt ausschließlich über die Unternehmenskommunikation in Abstimmung mit Geschäftsleitung, Recht und CISO-Office. Mitarbeitende sind zur Verschwiegenheit gegenüber Externen verpflichtet.

                    ## 11. Übungen und Tests
                    Das Incident-Response-Team führt mindestens jährlich Tabletop-Übungen durch, die typische Szenarien (Ransomware, Datenabfluss, Cloud-Account-Übernahme) abdecken. Mindestens alle zwei Jahre erfolgt eine vollumfängliche Krisenstabsübung mit Geschäftsleitung. Ergebnisse fließen in Run-Books, Schulungen und Risikoregister.

                    ## 12. Schnittstellen zu BCM und Krisenmanagement
                    Bei Vorfällen mit Auswirkungen auf kritische Geschäftsprozesse wird die BCM-Krisenstabsstruktur aktiviert. Die Übergabe von Incident-Management an BCM/Krisenstab erfolgt nach dokumentierten Eskalationskriterien. Verantwortlichkeiten und Schnittstellen sind in den jeweiligen Run-Books klar geregelt.

                    ## 13. Schutz von Whistleblowern und anonymes Melden
                    Hinweisgeber sind vor Repressalien geschützt. Anonyme Meldewege werden bereitgestellt und sind allen Mitarbeitenden bekannt. Die Bearbeitung anonymer Hinweise folgt denselben Triage- und Reaktionsstandards wie nicht-anonyme.

                    ## 14. Rollen und Verantwortlichkeiten
                    {{ roles.ciso.fullName }} (CISO) verantwortet diese Richtlinie und leitet das Incident-Response-Team. {{ roles.dpo.fullName }} (DPO) verantwortet datenschutzrechtliche Meldepflichten. Die Geschäftsleitung verantwortet strategische Entscheidungen und externe Kommunikation bei kritischen Vorfällen. Recht/Compliance verantwortet die Bewertung regulatorischer Meldepflichten. IT-Betrieb verantwortet die operative Eindämmung und Wiederherstellung.

                    ## 15. Kennzahlen
                    Wirksamkeit und Reife des Incident-Managements werden über Kennzahlen gemessen, unter anderem: Mean Time to Detect (MTTD), Mean Time to Respond (MTTR), Anteil fristgerecht erfolgter regulatorischer Meldungen, Quote der Vorfälle mit abgeschlossenem Lessons-Learned, Wiederholungsrate vergleichbarer Vorfälle. Die Kennzahlen werden quartalsweise an die Geschäftsleitung berichtet.

                    ## 16. Geltung und Review
                    Diese Richtlinie wird mindestens jährlich sowie nach jedem kritischen Vorfall überprüft. Bei wesentlichen regulatorischen Änderungen (z. B. neue Auslegungshinweise zur DORA, NIS2-Implementierungsrechtsakte) erfolgt eine anlassbezogene Anpassung.
