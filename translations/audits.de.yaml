        # S17 B4 — CAPA / Nonconformity (ISO 27001 Cl. 10.2)
        nc_root_cause_summary: 'Ursachenanalyse-Methoden: 5-Why (Ursachenkette), Ishikawa-Diagramm (6M-Fischgräten), FMEA (Fehler-Möglichkeits-Einfluss-Analyse) oder andere. ISO 27001 Cl. 10.2 b) fordert die Bewertung der Ursachen einer Nichtkonformität.'
        nc_correction_due_date: 'ISO 27001 Cl. 10.2 c) — die Korrekturmaßnahme muss eine nachvollziehbare Frist haben. Major-NCs sollten innerhalb von 30–90 Tagen behoben sein.'
