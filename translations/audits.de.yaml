        severity: 'Severity = Schadensauswirkung (Kritisch/Hoch/Mittel/Niedrig). Type = Befund-Klasse nach ISO 19011 (Major-NC vs. Minor-NC). Typische Kombinationen: Major-NC + Kritisch/Hoch, Minor-NC + Mittel/Niedrig, Observation/Opportunity = Mittel/Niedrig.'
