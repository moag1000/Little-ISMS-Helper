        dsr_procedure:
            v1:
                title: 'Data Subject Rights Procedure'
                body: |-
                    # Data Subject Rights Procedure of {{ tenant.legal_name }}

                    *Document class: Procedure | Standards anchor: GDPR Art. 12-22 / ISO 27701:2025 Cl. 7.3.1-7.3.10 and 8.3 / BDSG-neu §§ 32-37 | Language: English (formal British/EU register) | Review cycle: 24 months*

                    ## 1. Purpose

                    This procedure binds the intake, verification, processing, and response to requests from data subjects (Data Subject Requests, DSR) under Art. 12 to 22 GDPR. Requests are documented in the existing `DataSubjectRequest` module.

                    ## 2. Scope

                    All rights of natural persons under Art. 15 to 22 GDPR and the related obligations of the Organisation under Art. 12 GDPR are covered. The procedure also applies to requests received via processors that, under Art. 28(3)(e) GDPR, must be forwarded to the Organisation as controller.

                    ## 3. Rights Covered

                    | Right | Substance | Deadline |
                    |---|---|---|
                    | Art. 15 — Access | Confirmation of processing Y/N + copy of data + mandatory information | {{ gdpr.dsr_response_deadline_days }} days |
                    | Art. 16 — Rectification | Correction of inaccurate / completion of incomplete data | {{ gdpr.dsr_response_deadline_days }} days |
                    | Art. 17 — Erasure | "Right to be forgotten" with the exceptions of paragraph 3 (freedom of expression, legal obligation, public interest, archiving / research / statistics, legal claims) | {{ gdpr.dsr_response_deadline_days }} days |
                    | Art. 18 — Restriction | "Marker" status with limited processability, except for storage | {{ gdpr.dsr_response_deadline_days }} days |
                    | Art. 19 — Notification obligation | Information to all recipients of rectification / erasure / restriction | without undue delay |
                    | Art. 20 — Portability | Structured, commonly used, machine-readable format (CSV, JSON); direct transmission where technically feasible | {{ gdpr.dsr_response_deadline_days }} days |
                    | Art. 21 — Objection | Against processing on the basis of Art. 6(1)(e) or (f), and always against direct marketing | without undue delay, max. {{ gdpr.dsr_response_deadline_days }} days |
                    | Art. 22 — Automated decision | Right not to be subject; human intervention; the right to express a view and to contest | {{ gdpr.dsr_response_deadline_days }} days |

                    ## 4. Intake Channels

                    Requests are accepted via the following channels:

                    1. dedicated web form on the tenant website (accessible per WCAG 2.2 AA);
                    2. dedicated email address `privacy@<tenant-domain>` (DPO mailbox of {{ roles.dpo.fullName }});
                    3. postal address per the privacy notice (Art. 37(7) GDPR);
                    4. telephone first contact with written follow-up;
                    5. forwarding from processors (Art. 28(3)(e)).

                    Receipt acknowledgement is sent automatically within 48 hours with a case number.

                    ## 5. Identity Verification (Art. 12(6) GDPR)

                    Where there are reasonable doubts as to the identity of the requester, additional information is requested. Procedure:

                    1. **Low threshold (default)** — match against the registered email address / customer number / insurance number.
                    2. **Medium threshold** — request for a two-sided copy of an official ID with non-essential fields redacted (photo, serial number); alternatively video-ident.
                    3. **High threshold (special categories / erasure request)** — qualified electronic signature within the meaning of eIDAS or in-person identification with ID document.

                    Excessive requirements are not permitted (EDPB Guideline 01/2022); identity verification must not effectively defeat the request.

                    ## 6. SLA and Deadlines (Art. 12(3) + (4) GDPR)

                    The statutory standard deadline is one month from receipt ({{ gdpr.dsr_response_deadline_days }} calendar days as the Organisation's expression). For complex or numerous requests, the deadline may be extended by two further months; the extension is communicated to the requester within the first month with reasons. Where a request is not complied with, this is communicated within one month with reasons and an indication of the right to lodge a complaint with the supervisory authority and a judicial remedy.

                    ## 7. Refusal Grounds

                    Refusal is only permissible in the following cases:

                    - **Manifestly unfounded or excessive** (Art. 12(5)) — e.g. repeated requests without new facts; the burden of proof rests with the Organisation.
                    - **Restrictions under BDSG-neu §§ 32-37** — e.g. § 34(1)(2) (right of access disapplied where disproportionate effort and for data-security purposes); § 35(1) (erasure replaced by restriction where retention obligations apply).
                    - **Confidentiality obligations** — e.g. § 203 StGB medical confidentiality; banking secrecy.
                    - **Rights of third parties** — third-party data is redacted in Art. 15 copies.

                    Each refusal is documented with reasons in the `DataSubjectRequest` module; the DPO formally reviews the refusal decision.

                    ## 8. Coordination with Operative Teams

                    Requests are received centrally by the DPO {{ roles.dpo.fullName }} and routed to the relevant owners:

                    | Data category | Owner |
                    |---|---|
                    | HR data | HR Lead |
                    | Customer / CRM data | Customer Service Lead |
                    | Marketing data | Marketing Lead |
                    | IT logs / authentication | IT Operations / CISO {{ roles.ciso.fullName }} |
                    | Research data | Research Lead / Ethics Committee |

                    The owners deliver the data to the DPO within 14 calendar days; the DPO consolidates and responds.

                    ## 9. Processor Assistance (Art. 28(3)(e))

                    Processors are obliged in the DPA "to assist the controller by appropriate technical and organisational measures, insofar as this is possible, for the fulfilment of the controller's obligation to respond to requests for exercising the data subject's rights". SLA towards processors: 14 calendar days internal response duty; breaches lead to contractual consequences under the Supplier Security Policy.

                    ## 10. Logging and Evidence

                    Each request is fully documented in the `DataSubjectRequest` module: receipt, identity verification, owner assignment, processing status, response, refusal grounds with right-of-complaint notice. Retention: 3 years after response, as evidence vis-a-vis supervisory authority and data subjects.

                    ## 11. Cross-References

                    - **ISO 27001:2022** A.5.34.
                    - **ISO 27701:2025** Cl. 7.3.1-7.3.10 (controller), Cl. 8.3 (processor).
                    - **GDPR** Art. 12-22, Art. 23 (restrictions), Art. 28(3)(e).
                    - **BDSG-neu** §§ 32-37 (German modifications, in particular § 34 access, § 35 erasure).
                    - **EDPB Guideline 01/2022** on data-subject rights / right of access.

                    ---

                    *Approved by DPO {{ roles.dpo.fullName }} on [date] — DPO sign-off is independent of the CISO sign-off.*

                    *Approval chain: {{ approval.chain }}*
                section:
                    purpose:
                        title: 'Purpose of the procedure'
                        body: |-
                            Binding procedure for the handling of all data-subject rights under Art. 12-22 GDPR and ISO 27701:2025 Cl. 7.3.1-7.3.10.
                    scope:
                        title: 'Scope'
                        body: |-
                            All rights of natural persons + obligations of Art. 12; also requests via processors.
                    rights_covered:
                        title: 'Rights covered'
                        body: |-
                            Art. 15 (access), 16 (rectification), 17 (erasure), 18 (restriction), 19 (notification), 20 (portability), 21 (objection), 22 (automated decision).
                    intake_channels:
                        title: 'Intake channels'
                        body: |-
                            Web form, DPO email, postal address, telephone with written follow-up, processor forwarding.
                    identity_verification:
                        title: 'Identity verification'
                        body: |-
                            Three-tier scheme (low / medium / high) under Art. 12(6) GDPR; excessive requirements impermissible.
                    sla:
                        title: 'SLA and deadlines'
                        body: |-
                            {{ gdpr.dsr_response_deadline_days }} calendar days as default, +2 months extension for complex requests (Art. 12(3)).
                    refusal_grounds:
                        title: 'Refusal grounds'
                        body: |-
                            Art. 12(5) (manifestly unfounded / excessive), BDSG-neu §§ 34, 35; redaction of third-party data.
                    operative_coordination:
                        title: 'Coordination with operative teams'
                        body: |-
                            DPO centrally; HR / Customer Service / Marketing / IT / Research as owners with 14-day delivery duty.
                    processor_assistance:
                        title: 'Processor assistance'
                        body: |-
                            Art. 28(3)(e); contractual duty in the DPA with 14-day SLA.
                    logging:
                        title: 'Logging and evidence'
                        body: |-
                            Complete documentation in `DataSubjectRequest`; 3-year retention.
                tailoring_field:
                    response_language_set:
                        label: 'Response languages'
                        placeholder: 'Example: "Default English (formal British/EU register); German for German requesters; additional Turkish and Russian for selected sites under Art. 12(1) (clear and plain language)."'
                    identity_verification_default:
                        label: 'Default identity-verification method'
                        placeholder: 'Example: "Low threshold: email verification against registered customer ID. Medium threshold for sensitive requests: video-ident. High threshold for erasure requests with special categories: qualified electronic signature (eIDAS)."'
                    automated_decision_used:
                        label: 'Automated decision-making used Y/N'
                        placeholder: 'Example: "Yes: credit-scoring in the online ordering process (Art. 22(2)(a) GDPR + contract); anti-fraud scoring (Art. 22(2)(b) + Member-State law); employee performance scoring NOT deployed."'
        data_breach_notification_procedure:
            v1:
                title: 'Personal Data Breach Notification Procedure'
                body: |-
                    # Personal Data Breach Notification Procedure of {{ tenant.legal_name }}

                    *Document class: Procedure | Standards anchor: GDPR Art. 33 (72h supervisory authority) + Art. 34 (notification of data subjects) + Art. 4(12) / ISO 27701:2025 Cl. 6.13 and 7.2.7 / BDSG-neu § 65 / DORA Art. 19 | Language: English (formal British/EU register) | Review cycle: 12 months*

                    ## 1. Purpose

                    This procedure binds the identification, assessment, notification, and documentation of personal data breaches under Art. 33 and 34 GDPR. It is closely interlocked with the security incident management procedure (ISO 27001 A.5.24-A.5.30) and, where applicable, the DORA major-incident procedure (Art. 19 Regulation (EU) 2022/2554); data is held in the existing `DataBreach` module.

                    ## 2. Definition (Art. 4(12) GDPR)

                    A personal data breach is "a breach of security leading to the accidental or unlawful destruction, loss, alteration, unauthorised disclosure of, or access to, personal data transmitted, stored or otherwise processed". All three classical CIA breaches are covered:

                    1. **Confidentiality breach** — unauthorised disclosure or access;
                    2. **Integrity breach** — unauthorised alteration;
                    3. **Availability breach** — loss or destruction (including accidental).

                    ## 3. Detection Channels and Internal Notification

                    Personal data breaches are detected via:

                    - SIEM alerts and monitoring tools (CISO area);
                    - reports from employees through the documented reporting channel under A.6.8;
                    - reports from processors (Art. 33(2) GDPR);
                    - reports from data subjects via the DSR channel;
                    - external reports (security researchers, law enforcement, media).

                    Internal reporting channel: `breach@<tenant-domain>` (joint mailbox of DPO {{ roles.dpo.fullName }} and CISO {{ roles.ciso.fullName }}). Internal SLA: every suspected breach is reported to the DPO within 24 hours of awareness so that the 72-hour clock under Art. 33 GDPR can start running.

                    ## 4. Assessment of Risk to Rights and Freedoms

                    The assessment follows EDPB Guideline 9/2022 ("Notification of personal data breach under Regulation 2016/679"). Assessment axes:

                    1. **Type of breach** (confidentiality / integrity / availability);
                    2. **Nature and sensitivity of the data** (special categories under Art. 9 / 10 — automatically high);
                    3. **Volume** (number of data subjects);
                    4. **Identifiability** of the data subjects from the disclosed data;
                    5. **Severity of consequences** (identity theft, financial harm, discrimination, reputational harm, reversal of pseudonymisation);
                    6. **Characteristics of the data subjects** (vulnerable: children, patients, employees);
                    7. **Number of data subjects** and **duration of exposure**.

                    The assessment is supported by `GdprBreachAssessmentService` as a tooling aid; the final assessment is made by the DPO. Outcome: no notification obligation / Art. 33 notification only / Art. 33 + Art. 34 notification.

                    ## 5. The 72-Hour Clock (Art. 33(1) GDPR)

                    The clock starts upon "becoming aware" — the point at which the Organisation has reasonable certainty about the breach, not the first moment of suspicion (EDPB Guideline 9/2022 paras 20-23). Concrete milestones:

                    | Hour | Action |
                    |---|---|
                    | T + 0h | "Becoming aware" — DPO trigger; workflow start in the `DataBreach` module |
                    | T + 4h | Initial fact-securing; containment measures active |
                    | T + 24h | First risk-assessment outcome; CISO technical assessment |
                    | T + 48h | Decision on notification obligation Y/N; preparation of notification text |
                    | T + 72h | Submission of notification to the lead supervisory authority (Art. 33(1)) |

                    The deadline may be exceeded with reasoning where "delay is justified" (Art. 33(1) sentence 2); any delay is documented with reasons in the `DataBreach` module. "Stop-the-clock" conditions under Art. 33 are construed narrowly.

                    ## 6. Content of the Notification to the Supervisory Authority (Art. 33(3))

                    The notification contains at minimum:

                    1. description of the nature of the breach, where possible the categories and approximate number of data subjects, and the categories and approximate number of records concerned (lit. (a));
                    2. name and contact details of the data protection officer or another contact point (lit. (b)) — {{ roles.dpo.fullName }};
                    3. description of the likely consequences (lit. (c));
                    4. description of measures taken or proposed to address the breach and to mitigate any adverse effects (lit. (d)).

                    Where not all information is available, an **initial notification** is made with the available data and a **subsequent submission** is provided without undue further delay (Art. 33(4)).

                    Transmission channel: the relevant online portal of the lead supervisory authority (e.g. BfDI online form, or competent state DPA), with encrypted email to the official notification address as backup.

                    ## 7. Notification of Data Subjects (Art. 34 GDPR)

                    Where a breach is "likely to result in a high risk to the rights and freedoms" of data subjects, additional notification is required without undue delay. Content per Art. 34(2):

                    - clear and plain language (no legalese);
                    - at minimum the information from Art. 33(3) lit. (b), (c), (d);
                    - practical recommendations for self-protection (e.g. password change, credit-monitoring).

                    Waiver of individual notification is only permitted in the narrow cases of Art. 34(3) (effective technical protection such as encryption pre-incident; subsequent measures reduce risk; disproportionate effort -> public communication as alternative).

                    ## 8. Documentation Duty for All Breaches (Art. 33(5))

                    **Non-notifiable personal data breaches are also documented** — Art. 33(5) requires complete internal documentation enabling the supervisory authority to verify compliance with Art. 33. Retention in the `DataBreach` module: at least 7 years.

                    ## 9. Cross-Regulatory Notification Matrix

                    | Regulation | Deadline | Recipient |
                    |---|---|---|
                    | GDPR Art. 33 | 72h from becoming-aware | Lead DPA |
                    | GDPR Art. 34 | Without undue delay (where required) | Data subjects |
                    | DORA Art. 19 (financial sector) | 4h initial / 72h intermediate / 1 month final | National FI authority + ESA |
                    | NIS2 Art. 23 (essential / important entities) | 24h early warning / 72h notification / 1 month final | National CSIRT |
                    | TKG § 169 (telco service providers) | Without undue delay | BNetzA + data subjects |
                    | sectoral (KRITIS, BaFin, AMG, etc.) | Sector-specific | Sectoral authority |

                    Parallel notifications are drafted from the single `DataBreach` file with reuse of central fields; duplicate maintenance is prohibited. **DORA Art. 19 cross-reference**: For financial-services entities the DORA ICT major-incident workflow is triggered concurrently; see ICT Incident Procedure.

                    ## 10. Joint-Controller Coordination (Art. 26)

                    In joint-controllership constellations (Art. 26 GDPR) the joint-controllership arrangement determines who submits the notification to the supervisory authority and who undertakes the data-subject notification. Default: lead role rests with the joint controller in whose sphere the breach primarily occurred. Cross-reference: Joint Controllership Methodology.

                    ## 11. Processor Notification Chain (Art. 33(2))

                    Processors notify any breach "without undue delay after becoming aware" to the controller. SLA towards processors in the DPA: 24 hours from detection. Sub-processors notify via the processor on the same SLA. Breaches of the SLA result in contractual consequences (see Supplier Security Policy).

                    ## 12. Interface to A.5.24-A.5.30 ISMS Incident Management

                    Each personal data breach is concurrently a security incident within the meaning of ISO 27001:2022 A.5.24-A.5.30. The `DataBreach` file is linked to the `Incident` file (module level); lessons learned are derived in the post-incident review (A.5.27) jointly.

                    ## 13. Cross-References

                    - **ISO 27001:2022** A.5.34, A.5.24 (incident planning), A.5.25 (assessment), A.5.26 (response), A.5.27 (lessons learned), A.5.28 (evidence collection), A.5.29 (business continuity), A.5.30 (ICT readiness), A.6.8 (reporting channel).
                    - **ISO 27701:2025** Cl. 6.13 (Personal Data Breach Response), Cl. 7.2.7.
                    - **GDPR** Art. 33, Art. 34, Art. 4(12), Art. 26 (joint), Art. 28(3)(f) (processor assistance).
                    - **BDSG-neu** § 65 (public bodies).
                    - **DORA Art. 19** (Regulation (EU) 2022/2554) — ICT major-incident reporting (4h / 72h / 1 month).
                    - **NIS2 Art. 23** (Directive (EU) 2022/2555).
                    - **EDPB Guideline 9/2022** on personal data breach notification.

                    ---

                    *Approved by DPO {{ roles.dpo.fullName }} on [date] — DPO sign-off is independent of the CISO sign-off; top-management sign-off is mandatory.*

                    *Approval chain: {{ approval.chain }}*
                section:
                    purpose:
                        title: 'Purpose of the procedure'
                        body: |-
                            Binding handling of personal data breaches under Art. 33-34 GDPR and ISO 27701:2025 Cl. 6.13.
                    definition:
                        title: 'Definition'
                        body: |-
                            Art. 4(12) GDPR; confidentiality, integrity and availability breaches.
                    detection:
                        title: 'Detection and internal notification'
                        body: |-
                            SIEM, reports from employees / processors / data subjects / external; SLA: 24h internal DPO notification after awareness.
                    risk_assessment:
                        title: 'Risk assessment'
                        body: |-
                            EDPB Guideline 9/2022 with seven axes; final assessment by DPO via `GdprBreachAssessmentService`.
                    seventy_two_hour_clock:
                        title: '72h clock'
                        body: |-
                            Starts upon "becoming aware" — milestone sequence T+0/4/24/48/72h; delay only with reasoning (Art. 33(1) sentence 2).
                    authority_notification_content:
                        title: 'Content of the supervisory-authority notification'
                        body: |-
                            Art. 33(3)(a)-(d); initial notification + subsequent submission permitted (Art. 33(4)).
                    subject_notification:
                        title: 'Notification of data subjects'
                        body: |-
                            Art. 34 GDPR for high risk; clear language; waiver exceptions in Art. 34(3) narrow.
                    documentation_duty:
                        title: 'Documentation duty for all breaches'
                        body: |-
                            Art. 33(5) — also for non-notifiable incidents; 7-year retention.
                    cross_regulatory_matrix:
                        title: 'Cross-regulatory matrix'
                        body: |-
                            GDPR 72h / DORA Art. 19 4h-72h-1m / NIS2 24h-72h-1m / sectoral; reuse from single file; see ICT Incident Procedure (DORA Art. 19).
                    joint_controller:
                        title: 'Joint-controller coordination'
                        body: |-
                            Art. 26 GDPR; lead rests with the sphere of occurrence.
                    processor_chain:
                        title: 'Processor notification chain'
                        body: |-
                            Art. 33(2); DPA SLA 24h; sub-processors via processor.
                    isms_incident_link:
                        title: 'Interface to ISMS incident management'
                        body: |-
                            A.5.24-A.5.30; linkage between `DataBreach` and `Incident`; joint lessons learned.
                tailoring_field:
                    lead_supervisory_authority:
                        label: 'Lead supervisory authority'
                        placeholder: 'Example: "Bavarian State Office for Data Protection Supervision (BayLDA), Promenade 18, 91522 Ansbach. Online portal: www.lda.bayern.de/de/datenpannen.html. Contact: poststelle@lda.bayern.de."'
                    secondary_authority_portals:
                        label: 'Secondary supervisory authorities for cross-border processing'
                        placeholder: 'Example: "Berlin Commissioner for Data Protection (Berlin site), Hessian Commissioner (Frankfurt site), CNIL France (Paris establishment) — One-Stop-Shop lead BayLDA under Art. 56."'
                    public_communications_approver:
                        label: 'Public-communications approver for Art. 34'
                        placeholder: 'Example: "Joint approval by DPO {{ roles.dpo.fullName }}, CISO {{ roles.ciso.fullName }} and Chief Communications Officer; for group-level breaches additionally the Group DPO. Press release only after the supervisory-authority initial notification."'
        iso_a534_thin_host:
            v1:
                title: 'Privacy and Protection of PII (A.5.34)'
                body: |-
                    # Privacy and Protection of PII (A.5.34) of {{ tenant.legal_name }}

                    *Document class: Cross-reference document | Standards anchor: ISO/IEC 27001:2022 Annex A.5.34 / ISO/IEC 27002:2022 § 5.34 | Language: English (formal British/EU register) | Review cycle: 24 months*

                    ## 1. Purpose

                    This cross-reference document addresses the ISO/IEC 27001:2022 control A.5.34 ("Privacy and protection of PII"). As privacy is run as an autonomous programme at {{ tenant.legal_name }} (Privacy Information Management System, PIMS, under ISO 27701:2025), this document deliberately contains **no** standalone privacy substance — it points to the substantively responsible privacy documents.

                    ## 2. Scope

                    This document serves only as the ISO 27001 A.5.34 fulfilment pointer and as a cross-reference for auditors. Substantive privacy provisions are found in the downstream documents in section 4.

                    ## 3. Rationale of the Cross-Reference Architecture

                    ISO/IEC 27002:2022 § 5.34 reads: "The organization shall identify and meet the requirements regarding the preservation of privacy and protection of PII according to applicable laws and regulations and contractual requirements". This is fulfilled by the Organisation's autonomous privacy programme, which is grounded on the following pillars:

                    - GDPR (Regulation (EU) 2016/679) as the central legal requirement;
                    - BDSG-neu as the German specification;
                    - ISO 27701:2025 as the PIMS standard extending the ISMS clauses with privacy-specific requirements;
                    - sectoral specifications (e.g. § 22 BDSG-neu for special categories, AI Act, EHDS).

                    The DPO {{ roles.dpo.fullName }} is designated under Art. 37-39 GDPR and **must be strictly separated** from the CISO {{ roles.ciso.fullName }} (BSI guidance "DPO is not the CISO"). Approval of this cross-reference document rests with the DPO; CISO bulk-approval cannot override the DPO sign-off (DPO veto mechanism per ISO 27701:2025 Cl. 5.1).

                    ## 4. Binding References

                    The A.5.34 requirements are met by the following documents — please consult these for substance and obligations:

                    1. **Data Protection Policy** (top-level privacy norm, ISO 27701:2025 Cl. 5.2; GDPR Art. 24).
                    2. **RoPA Methodology** (Records of Processing Activities, GDPR Art. 30; ISO 27701:2025 Cl. 7.2.8 / 8.2.6).
                    3. **DPIA Methodology** (Data Protection Impact Assessment, GDPR Art. 35-36; ISO 27701:2025 Cl. 7.2.5).
                    4. **Data Subject Rights Procedure** (GDPR Art. 12-22; ISO 27701:2025 Cl. 7.3.x).
                    5. **Personal Data Breach Notification Procedure** (GDPR Art. 33-34; ISO 27701:2025 Cl. 6.13; DORA Art. 19 for the financial sector).
                    6. **Lawful Basis Determination Methodology** (GDPR Art. 6, 9, 10; § 22 BDSG-neu).
                    7. **Consent Management Policy** (GDPR Art. 7, 8).
                    8. **Joint Controllership Methodology** (GDPR Art. 26).
                    9. **International Data Transfers Policy** (GDPR Chapter V).
                    10. **Data Retention and Deletion Policy** (GDPR Art. 5(1)(e), Art. 17).
                    11. **Privacy by Design and by Default Methodology** (GDPR Art. 25).
                    12. **Data Protection Officer Charter** (GDPR Art. 37-39).
                    13. **Privacy Training and Awareness Programme** (Art. 39(1)(b) GDPR; ISO 27701:2025 Cl. 6.4.2; extends A.6.3).
                    14. (conditional) **Children's Personal Data Policy** (GDPR Art. 8).
                    15. (conditional) **Special Categories and Criminal Data Policy** (GDPR Art. 9, 10; § 22 BDSG-neu).

                    ## 5. Cross-References to Other ISO 27001 Controls

                    Privacy interlocks with numerous other Annex A controls:

                    - **A.5.31** Legal, statutory, regulatory requirements — GDPR is a central requirement.
                    - **A.5.20** Supplier agreements — DPA obligation (GDPR Art. 28).
                    - **A.5.24-A.5.30** Incident management — interlocked with the breach procedure.
                    - **A.5.33** Protection of records — retention discipline.
                    - **A.6.3** Awareness, education and training — extended by the Privacy Awareness Programme.
                    - **A.8.10** Information deletion — implementation of storage limitation.
                    - **A.8.11** Data masking — pseudonymisation as TOM under Art. 32.
                    - **A.8.12** Data leakage prevention — TOM under Art. 32.
                    - **A.8.13** Information backup — also applicable to privacy data.
                    - **A.8.27** Secure system architecture — Privacy by Design (Art. 25).
                    - **A.8.28** Secure coding — Privacy by Design.

                    ## 6. Review and Change Cycle

                    This cross-reference document is reviewed every 24 months; changes occur exclusively where new privacy documents are added to or existing documents removed from the programme. Substantive privacy changes are made in the respective target documents, not here.

