        dpia_methodology:
            v1:
                title: 'Data Protection Impact Assessment Methodology'
                body: |-
                    # DPIA Methodology of {{ tenant.legal_name }}

                    *Document class: Methodology | Standards anchor: GDPR Art. 35 + Art. 36 / ISO 27701:2025 Cl. 7.2.5 and 8.2.1 / EDPB WP248 rev.01 / BfDI Black-List | Language: English (formal British/EU register) | Review cycle: 24 months*

                    ## 1. Purpose

                    This methodology governs the conduct of Data Protection Impact Assessments (DPIA) within the meaning of Art. 35 GDPR and the prior consultation of the lead supervisory authority within the meaning of Art. 36 GDPR. It is the application framework of ISO 27701:2025 Cl. 7.2.5 (controller) and Cl. 8.2.1 (processor) and uses the existing `DataProtectionImpactAssessment` module as data-holding structure.

                    ## 2. Scope

                    A DPIA is mandatory where a processing activity is "likely to result in a high risk to the rights and freedoms of natural persons" (Art. 35(1) GDPR). The obligation rests on the Organisation in its controller role; processors assist the controller under Art. 28(3)(f) GDPR.

                    ## 3. Threshold Assessment

                    A two-stage procedure is run prior to each new processing activity:

                    ### 3.1 Mandatory triggers under Art. 35(3) GDPR

                    A DPIA is always mandatory for:

                    1. systematic and extensive evaluation of personal aspects of natural persons, including profiling, with legal or similarly significant effect;
                    2. processing on a large scale of special categories of personal data (Art. 9) or criminal-conviction data (Art. 10);
                    3. systematic large-scale monitoring of publicly accessible areas.

                    ### 3.2 EDPB WP248 rev.01 nine criteria

                    Where a processing activity meets **two or more** of the following criteria, a DPIA is mandatory:

                    1. evaluation or scoring (profiling, scoring);
                    2. automated decision-making with legal or similarly significant effect;
                    3. systematic monitoring;
                    4. special-category data or data of a highly personal nature;
                    5. data processing on a large scale;
                    6. matching or combining datasets;
                    7. data of vulnerable data subjects (children, employees, patients);
                    8. innovative use or application of new technological or organisational solutions (e.g. AI, IoT, biometrics);
                    9. processing prevents data subjects from exercising a right or using a service / contract.

                    ### 3.3 BfDI Black-List

                    A DPIA is additionally mandatory for all processing activities listed in the BfDI's "List of processing operations subject to a DPIA" (e.g. large-scale processing of biometric data for unique identification, research with special categories without explicit consent).

                    ### 3.4 Threshold score

                    The Organisation's internal threshold score is {{ gdpr.dpia_threshold_score }}. Where a processing activity reaches this score in pre-screening, the DPIA shall be performed even where no mandatory trigger is necessarily applicable ("precautionary DPIA" as best practice).

                    ## 4. DPIA Methodology (Content under Art. 35(7))

                    A DPIA documents at minimum:

                    1. **Systematic description** of the envisaged processing operations and the purposes of the processing, including, where applicable, the legitimate interests pursued by the controller (Art. 35(7)(a)).
                    2. **Assessment of the necessity and proportionality** of the processing operations in relation to the purposes (Art. 35(7)(b)).
                    3. **Assessment of the risks** to the rights and freedoms of data subjects (Art. 35(7)(c)) — qualitative scale (low / medium / high / very high) over the axes of likelihood and severity; alignment with the ISO 27005 risk methodology of the ISMS but in a separate evaluation space (rights-and-freedoms perspective rather than CIA perspective).
                    4. **Measures** envisaged to address the risks, including safeguards, security measures, and mechanisms to ensure the protection of personal data and to demonstrate compliance with the GDPR (Art. 35(7)(d)).

                    ## 5. Stakeholder Consultation (Art. 35(9) GDPR)

                    The controller seeks "where appropriate" the views of data subjects or their representatives. Specific applications in the Organisation:

                    - In the employment context (Art. 88 GDPR + § 26(3) BDSG-neu): mandatory involvement of the works council / staff council.
                    - For consumer products: anonymised user survey or stakeholder workshop.
                    - For research with patients: ethics-committee involvement under GCP / EU Regulation 536/2014.
                    - Documentation of all consultation outcomes in the DPIA file (`DataProtectionImpactAssessment` module).

                    ## 6. Prior Consultation (Art. 36 GDPR)

                    Where the DPIA identifies a "high residual risk" notwithstanding mitigation measures (high or very-high after-treatment), the lead supervisory authority **must be consulted** prior to commencement of processing under Art. 36(1) GDPR. Consultation is in writing with the contents required by Art. 36(3)(a)-(f). The supervisory authority has 8 weeks to provide a written opinion, extendable by 6 weeks. Processing shall not be commenced during this period.

                    ## 7. Risk-Treatment Escalation

                    Risks are escalated according to the following matrix:

                    | Residual risk | Escalation | Sign-off |
                    |---|---|---|
                    | low | Standard measures, documentation in DPIA | DPO |
                    | medium | Additional measures (pseudonymisation, access restriction); 12-month re-assessment | DPO + CISO |
                    | high | Comprehensive measures + mandatory prior-consultation check (Art. 36) | DPO + CISO + top management |
                    | very high | Mandatory Art. 36 prior consultation; processing only after authority opinion | top management + supervisory authority |

                    ## 8. Stakeholder Workshops and ISO-27005 Alignment

                    The DPIA risk assessment **methodologically reuses** the ISO 27005-compliant evaluation axes of the ISMS (likelihood / severity), but in the separate evaluation space "rights and freedoms". Duplication is avoided through the module: technical risks from the ISMS risk register are referenced, not duplicated.

                    ## 9. Review Interval and Re-Assessment Triggers

                    Each DPIA is fully reviewed every 24 months. An out-of-cycle review is mandatory upon: change of the processing purpose; extension of data categories or data-subject groups; occurrence of a personal data breach related to the activity; new technological components (e.g. AI module update); supervisory-authority guidance or sectoral guidelines.

                    ## 10. Retention as Evidence

                    DPIAs are retained in an audit-proof manner for the entire life of the processing activity plus 3 years after termination; in case of Art. 36 prior consultation: 7 years after the most recent supervisory-authority opinion.

                    ## 11. Cross-References

                    - **ISO 27001:2022** A.5.34, A.8.27 (secure system architecture).
                    - **ISO 27701:2025** Cl. 7.2.5, 8.2.1.
                    - **GDPR** Art. 24 (controller), Art. 25 (PbD), Art. 32 (TOM).
                    - **BDSG-neu** § 67 (public bodies).
                    - **EDPB WP248 rev.01**, **BfDI Black-List**.
                    - **AI Act** (Regulation (EU) 2024/1689) — high-risk AI systems require, in parallel to the DPIA, a Fundamental Rights Impact Assessment (FRIA).

                    ---

                    *Approved by DPO {{ roles.dpo.fullName }} on [date] — DPO sign-off is independent of the CISO sign-off (ISO 27701:2025 Cl. 5.1).*

                    *Approval chain: {{ approval.chain }}*
