policy:
    gdpr:
        privacy_policy:
            v1:
                title: 'Data Protection Policy'
                body: |-
                    # Data Protection Policy of {{ tenant.legal_name }}

                    *Document class: Top-level Privacy Policy | Standards anchor: GDPR Art. 5 / Art. 24 / ISO 27701:2025 Cl. 5.1 and 5.2 / BDSG-neu § 1 | Language: English (formal British/EU register) | Review cycle: 12 months | Approval: {{ approval.chain }}*

                    ## 1. Purpose and Commitment (ISO 27701 Cl. 5.2)

                    This Data Protection Policy is the highest-level normative statement of {{ tenant.legal_name }} (hereinafter "the Organisation") regarding the protection of personal data and is the privacy-layer counterpart to the Information Security Policy. It is issued by top management and commits the Organisation, in accordance with Article 24(1) GDPR, to implementing appropriate technical and organisational measures so that the conformity of all processing activities with Regulation (EU) 2016/679 (GDPR), the German Federal Data Protection Act (BDSG-neu), and ISO 27701:2025 can be demonstrated ("accountability").

                    Top management acknowledges that the protection of personal data is a fundamental right of data subjects (Art. 8 Charter of Fundamental Rights of the European Union; Art. 16 TFEU) and that infringements may result in significant administrative fines (Art. 83 GDPR up to EUR 20 million or 4 % of total worldwide annual turnover), reputational damage, civil claims (Art. 82 GDPR), and supervisory orders (Art. 58 GDPR). This policy is appropriate to the purpose of the Organisation and provides the framework for setting privacy objectives (ISO 27701:2025 Cl. 5.2 a + b).

                    ## 2. Scope

                    This policy applies to all processing activities of the Organisation in its role as controller within the meaning of Art. 4(7) GDPR, as well as in its role as processor under Art. 4(8) GDPR. It covers all employees (permanent, fixed-term, on probation), working students, interns, contractors, joint controllers (Art. 26 GDPR), processors and sub-processors (Art. 28 GDPR).

                    Substantively, the policy covers all lifecycle phases of personal data: collection, recording, organisation, structuring, storage, adaptation, retrieval, querying, use, disclosure by transmission, dissemination, making available, alignment, combination, restriction, erasure, and destruction (Art. 4(2) GDPR).

                    ## 3. The Seven Principles of Art. 5 GDPR (verbatim)

                    The Organisation processes personal data exclusively in accordance with the following principles, which are binding for all processing activities:

                    1. **Lawfulness, fairness and transparency** (Art. 5(1)(a)) — every processing activity is based on one of the six lawful bases set out in Art. 6(1) GDPR; default lawful basis in the Organisation: {{ gdpr.legal_basis_default }}. Special categories (Art. 9) additionally require a basis under Art. 9(2) GDPR or § 22 BDSG-neu. Criminal-conviction data is processed only under Art. 10 GDPR in conjunction with § 24 BDSG-neu.
                    2. **Purpose limitation** (Art. 5(1)(b)) — explicit, specified and legitimate purposes determined prior to each processing activity.
                    3. **Data minimisation** (Art. 5(1)(c)) — limited to what is necessary in relation to the purposes.
                    4. **Accuracy** (Art. 5(1)(d)) — proactive correction of inaccurate data.
                    5. **Storage limitation** (Art. 5(1)(e)) — erasure or anonymisation upon fulfilment of the purpose, in accordance with the Data Retention and Deletion Policy.
                    6. **Integrity and confidentiality** (Art. 5(1)(f)) — secured by the ISMS and the technical and organisational measures pursuant to Art. 32 GDPR.
                    7. **Accountability** (Art. 5(2)) — demonstrated through the entire Privacy Information Management System (PIMS) under ISO 27701:2025.

                    ## 4. Commitment to Data-Subject Rights (Art. 12-22 GDPR)

                    The Organisation guarantees the exercise of all rights of data subjects: access (Art. 15), rectification (Art. 16), erasure / "right to be forgotten" (Art. 17), restriction (Art. 18), notification obligation regarding rectification or erasure (Art. 19), data portability (Art. 20), objection (Art. 21), and the right not to be subject to a decision based solely on automated processing, including profiling (Art. 22). Requests are responded to within {{ gdpr.dsr_response_deadline_days }} calendar days under Art. 12(3) GDPR; an extension of two further months for complex requests is permissible and shall be communicated to the data subject with reasons. The procedure is set out in the separate document *Data Subject Rights Procedure* (see cross-reference below).

                    ## 5. Lawful-Basis Discipline

                    Prior to commencing any processing activity, the lawful basis is documented (methodology: Lawful Basis Determination Methodology). Processing without a documented lawful basis is prohibited. Where consent is selected as the lawful basis, the conditions of Art. 7 GDPR and the Consent Management Policy apply; the Organisation deploys the consent-management tool {{ gdpr.consent_management_tool }}. Legitimate interests under Art. 6(1)(f) require a documented Legitimate Interest Assessment (LIA) pursuant to Recital 47.

                    ## 6. Accountability Framework

                    This policy refers to the binding downstream methodologies and procedures of the Organisation's Privacy Information Management System:

                    - **Records of Processing Activities** (RoPA, Art. 30 GDPR) — maintained in the `ProcessingActivity` module under the RoPA Methodology.
                    - **Data Protection Impact Assessment (DPIA)** — methodology pursuant to Art. 35 GDPR; threshold score: {{ gdpr.dpia_threshold_score }}; prior consultation with the lead supervisory authority under Art. 36 in case of residual high risk.
                    - **Data Subject Rights Procedure** (Art. 12-22 GDPR).
                    - **Personal Data Breach Notification Procedure** (Art. 33 / 34 GDPR).
                    - **Lawful Basis Determination Methodology** (Art. 6, 9, 10 GDPR; § 22 BDSG-neu).
                    - **Consent Management Policy** (Art. 7, 8 GDPR).
                    - **Joint Controllership Methodology** (Art. 26 GDPR).
                    - **International Data Transfers Policy** (Chapter V GDPR; Schrems II-compliant with supplementary measures).
                    - **Data Retention and Deletion Policy** (Art. 5(1)(e) GDPR; § 35 BDSG-neu; HGB § 257; AO § 147).
                    - **Privacy by Design and by Default Methodology** (Art. 25 GDPR; ISO 27701 Cl. 7.4.x).

                    ## 7. Designation of the Data Protection Officer (Art. 37-39 GDPR; ISO 27701 Cl. 5.3)

                    The Organisation has designated the Data Protection Officer (DPO) {{ roles.dpo.fullName }}, whose appointment letter and duties are set out in the separate document *Data Protection Officer Charter*. The DPO reports directly to the highest level of management (Art. 38(3) GDPR), is not subject to instructions in privacy matters, and is free of any conflict of interest (Art. 38(6) GDPR). The DPO must be **strictly separated** from the role of Information Security Officer (CISO) {{ roles.ciso.fullName }} (BSI guidance "DPO is not the CISO"); a personal union constitutes a conflict of interest.

                    The DPO's contact details are communicated to the supervisory authority under Art. 37(7) GDPR and published on the Organisation's website (postal address, email, telephone).

                    ## 8. Lead Supervisory Authority (Art. 56 GDPR)

                    The Organisation's lead supervisory authority is determined via the concept of main establishment (Art. 4(16) GDPR). For cross-border processing, the One-Stop-Shop mechanism applies. Secondary supervisory authorities in affected Member States are involved under Art. 60 GDPR. The competent lead authority is recorded in the setup wizard and is contacted via the controller representative {{ roles.controller_repr.fullName }}.

                    ## 9. Commitment to Personal Data Breach Response

                    The Organisation undertakes to notify personal data breaches within the meaning of Art. 4(12) GDPR to the lead supervisory authority without undue delay and, where feasible, no later than 72 hours after becoming aware of them (Art. 33(1) GDPR). Where the breach is likely to result in a high risk to the rights and freedoms of natural persons, data subjects are additionally informed pursuant to Art. 34 GDPR. All personal data breaches are documented internally regardless of notification obligations under Art. 33(5) GDPR (`DataBreach` module). For financial-services entities, the DORA Art. 19 ICT major-incident notification with 4-hour initial / 72-hour intermediate report timeline is triggered in parallel.

                    ## 10. Review and Change Cycle

                    This policy is reviewed at least every 12 months and on the following triggers: a new processing activity flagged as "high risk", a new processor in a third country without an adequacy decision, changes to sectoral regulation (e.g. AI Act, EHDS), new guidance from the lead supervisory authority or the European Data Protection Board (EDPB), or a material organisational change. Changes are subject to the approval chain {{ approval.chain }} with the mandatory separate sign-off by the DPO (DPO veto under ISO 27701:2025 Cl. 5.1).

                    ## 11. Appendix A — Children as Data Subjects (Art. 8 GDPR)

                    Where the Organisation offers information-society services directly to children, the additional requirements of Art. 8 GDPR in conjunction with § 8 BDSG-neu apply (DE default: 16 years as the threshold for parental consent). Marketing addressed to minors is prohibited. A DPIA pursuant to the EDPB criterion of "vulnerable subjects" is mandatory. Details: Children's Personal Data Policy.

                    ## 12. Appendix B — Special Categories of Personal Data (Art. 9 + 10 GDPR; § 22 BDSG-neu)

                    Processing of special categories (racial or ethnic origin, political opinions, religious or philosophical beliefs, trade-union membership, genetic data, biometric data for unique identification, health data, data concerning sex life, sexual orientation) and criminal-conviction data require a documented lawful basis under Art. 9(2)(a)-(j) or Art. 10 in conjunction with § 22 / § 24 BDSG-neu. In the employment context, § 26(3) BDSG-neu additionally applies (works-council involvement). A DPIA is mandatory. Details: Special Categories and Criminal Data Policy.

                    ## 13. Cross-References to ISO 27001:2022 and Other Frameworks

                    - **A.5.34** (Privacy and protection of PII) — this policy constitutes the substantive content of the A.5.34 control; the cross-reference document *Privacy and Protection of PII (A.5.34)* points back to this policy.
                    - **A.5.31** (Legal, statutory, regulatory requirements) — GDPR as the central legal requirement.
                    - **A.5.24-A.5.30** (Incident management) — personal data breach response interlocked with ISO 27001 incident management.
                    - **A.6.3** (Information security awareness, education and training) — extended by the Privacy Training and Awareness Programme.
                    - **ISO 27701:2025 Cl. 5.1, 5.2** — leadership commitment, PIMS declaration.
                    - **ISO 27701:2025 Cl. 6.13** — personal data breach response (formerly 6.13.1.5 in :2019).
                    - **EU-DORA Art. 19** — ICT incident reporting (where the Organisation is a financial entity).
                    - **NIS2 Art. 23** — cybersecurity incident reporting (where the Organisation is an essential or important entity).

                    ---

                    *Approved by DPO {{ roles.dpo.fullName }} on [date] — the DPO sign-off is independent of the CISO sign-off pursuant to Art. 38(3) GDPR and ISO 27701:2025 Cl. 5.1 and cannot be overridden by CISO bulk-approval.*

                    *Approval chain: {{ approval.chain }}*
