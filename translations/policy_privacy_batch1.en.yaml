        ropa_methodology:
            v1:
                title: 'Records of Processing Activities Methodology'
                body: |-
                    # RoPA Methodology of {{ tenant.legal_name }}

                    *Document class: Methodology | Standards anchor: GDPR Art. 30 / ISO 27701:2025 Cl. 7.2.8 and 8.2.6 / BDSG-neu § 70 | Language: English (formal British/EU register) | Review cycle: 24 months*

                    ## 1. Purpose

                    This methodology binds how {{ tenant.legal_name }} establishes, maintains, updates, reviews, and discloses to the supervisory authority on request the Records of Processing Activities (RoPA) under Art. 30(4) GDPR. The actual RoPA register is held in the existing `ProcessingActivity` module; this methodology defines the maintenance discipline and is the implementation of ISO 27701:2025 Cl. 7.2.8 (controller) and Cl. 8.2.6 (processor) within the Organisation.

                    ## 2. Scope

                    Both GDPR roles are covered:

                    - **Controller (Art. 30(1) GDPR)** — mandatory contents (a) to (g): name and contact details of the controller, joint controllers, and the data protection officer; processing purposes; description of categories of data subjects and categories of personal data; categories of recipients; transfers to third countries with safeguards; envisaged time limits for erasure; general description of the technical and organisational measures pursuant to Art. 32(1) GDPR.
                    - **Processor (Art. 30(2) GDPR)** — mandatory contents (a) to (d): name and contact details of the processors, of each controller and, where applicable, the representatives; categories of processing carried out on behalf of each controller; transfers to third countries; general description of the technical and organisational measures.

                    The exemption in Art. 30(5) GDPR (< 250 employees) is **not invoked** by the Organisation, as processing involving risks to the rights and freedoms of data subjects, regular processing or special categories takes place — the exemption is in practice never available.

                    ## 3. Triggers for a New RoPA Entry

                    A new RoPA entry is mandatory upon the occurrence of any of the following events:

                    1. introduction of a new IT system, application, or cloud service involving personal data;
                    2. onboarding of a new processor or sub-processor (Art. 28 GDPR);
                    3. change of purpose or lawful basis of an existing processing activity;
                    4. extension of the data categories or categories of data subjects;
                    5. introduction of a new marketing campaign, HR process, or customer-loyalty programme;
                    6. introduction of a data transfer to a third country (Chapter V GDPR);
                    7. change of the processor or sub-processor;
                    8. deployment of new AI / automated decision-making procedures (Art. 22 GDPR; AI Act interface).

                    ## 4. Lawful-Basis Sub-Section (Art. 6, 9, 10 GDPR)

                    Each RoPA entry shall record at least one documented lawful basis. The determination follows the Lawful Basis Determination Methodology. The following expressions are permitted:

                    - **Art. 6(1)(a) — Consent**: only where no other lawful basis applies; see Consent sub-section. Default lawful basis in the Organisation: {{ gdpr.legal_basis_default }} (default for new processing activities unless specifically justified).
                    - **Art. 6(1)(b) — Contract performance / pre-contractual measures**.
                    - **Art. 6(1)(c) — Legal obligation** (HGB, AO, GWG, SGB, BetrVG, etc.); the specific provision shall be cited in the entry.
                    - **Art. 6(1)(d) — Vital interests**: narrow construction.
                    - **Art. 6(1)(e) — Public interest / official authority**.
                    - **Art. 6(1)(f) — Legitimate interest**: only with a documented LIA in line with Recital 47.

                    For special categories (Art. 9) and criminal-conviction data (Art. 10), an additional basis under Art. 9(2)(a)-(j) or § 22 BDSG-neu shall be documented. In the employment context, § 26 BDSG-neu applies, with specific provisions for the works council (§ 26(3)).

                    ## 5. Consent Sub-Section (Art. 7 GDPR)

                    Where processing is based on consent, stricter requirements apply, the compliance with which is documented in the RoPA entry by reference to the consent-management tool {{ gdpr.consent_management_tool }}:

                    1. **Freely given** (Art. 7(4)) — no tying of contract performance to non-essential consent.
                    2. **Specific** — consent per processing purpose; granular bundling prohibited.
                    3. **Informed** — full mandatory information under Art. 13 / 14 GDPR prior to consent.
                    4. **Unambiguous affirmative action** (Recital 32) — opt-in, no pre-ticked boxes.
                    5. **Demonstrable** (Art. 7(1) + Recital 42) — proof through logging in the {{ gdpr.consent_management_tool }} tool.
                    6. **Withdrawable** (Art. 7(3)) — "as easy to withdraw as to give"; the withdrawal channel is documented explicitly.

                    ## 6. Mandatory Fields per RoPA Entry (Mapping to Art. 30)

                    | Field | Art. 30 reference | Example |
                    |---|---|---|
                    | Processing name | (1)(b) purpose | "Recruitment management" |
                    | Controller / DPO | (1)(a) | {{ tenant.legal_name }} / {{ roles.dpo.fullName }} |
                    | Purpose | (1)(b) | "Review of incoming applications" |
                    | Lawful basis | NEW (best practice) | Art. 6(1)(b) + § 26(1) BDSG |
                    | Categories of data subjects | (1)(c) | "Job applicants" |
                    | Categories of data | (1)(c) | "Master data, CV, references" |
                    | Categories of recipients | (1)(d) | "HR team, IT admin (cloud ATS)" |
                    | Third-country transfer | (1)(e) | "yes, US, SCCs + supplementary measures" |
                    | Erasure period | (1)(f) | "6 months after rejection; talent pool 24 months on consent" |
                    | TOM | (1)(g) | "Reference to the ISMS TOM declaration" |
                    | Categorical risk (DPIA indicator) | NEW | high / medium / low |

                    ## 7. Roles and Responsibilities

                    | Role | Responsibility |
                    |---|---|
                    | Business Unit Lead (Risk Owner) | Initial RoPA draft on trigger; annual update |
                    | DPO {{ roles.dpo.fullName }} | Lawful-basis review; sign-off; methodology stewardship |
                    | CISO {{ roles.ciso.fullName }} | Cross-validation of the TOM description against the ISMS |
                    | Controller representative {{ roles.controller_repr.fullName }} | Supervisory-authority disclosure on request under Art. 30(4) |
                    | Processor | Maintenance of own Art. 30(2) record; provision to controller on demand |

                    ## 8. Review Interval and Re-Assessment Triggers

                    Each entry is reviewed at least every 12 months by the Risk Owner and the DPO. An out-of-cycle review is mandatory upon: change of processor; change of lawful basis; change of data categories; supervisory-authority request; personal data breach related to the activity; new EDPB guidelines on the processing category.

                    ## 9. Retention of Historical Entries

                    Deleted or superseded RoPA entries are retained in an audit-proof manner for 7 years (audit log under ISO 27001 Cl. 7.5; evidence preservation vis-a-vis the supervisory authority under Art. 30(4) GDPR). Erasure occurs only after expiry of limitation periods and audit confirmation.

                    ## 10. Format and Supervisory-Authority Disclosure (Art. 30(4))

                    The register is maintained electronically (`ProcessingActivity` module); a PDF or CSV export in German and, on request, in English is provided within 72 hours of receipt of a formal supervisory-authority request. Transmission is encrypted via the channel prescribed by the relevant supervisory-authority portal.

                    ## 11. Cross-References

                    - **ISO 27001:2022** A.5.34 (host control superseded by this methodology) and A.5.31 (legal requirements).
                    - **ISO 27701:2025** Cl. 7.2.8 (controller), Cl. 8.2.6 (processor).
                    - **GDPR** Art. 30 (mandatory contents), Art. 28 (processor), Art. 26 (joint controllers), Art. 32 (TOM), Art. 35 (DPIA trigger from RoPA), Chapter V (third-country transfer documentation).
                    - **BDSG-neu** § 70 (public bodies), § 22 (special categories), § 26 (employees).

                    ---

                    *Approved by DPO {{ roles.dpo.fullName }} on [date] — DPO sign-off is independent of the CISO sign-off under Art. 38(3) GDPR.*

                    *Approval chain: {{ approval.chain }}*
