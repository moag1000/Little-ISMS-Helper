alva:
    title_prefix: 'Alva tip:'
    dismiss: 'Not now'
    stats:
        title: 'Alva hint statistics'
        description: 'Aggregated hint dismissals per key — helps see which hints feel like noise and which ones actually drove action.'
        empty: 'No hint dismissals recorded yet.'
        col:
            hint_key: 'Hint key'
            rendered: 'Renders'
            total: 'Dismissals'
            snoozed: 'Snooze'
            distinct_users: 'Users'
            dismiss_rate: 'Dismiss rate'

data_breach:
    gdpr_72h:
        title: 'GDPR Art. 33 72h deadline running'
        body: 'High-severity breach not yet notified to the supervisory authority. Remaining: %hours% h %minutes% min. Missing the deadline = up to €10M / 2% group turnover (Art. 83(4)).'
        action: 'Record notification'

processing_activity:
    third_country:
        title: 'Third-country transfer without safeguards'
        body: 'Personal data is transferred to %countries% but no Art. 46 safeguard is recorded (SCC, BCR, adequacy decision). Schrems-II exposure.'
        action: 'Add safeguards'
    dpia_required:
        title: 'DPIA required (GDPR Art. 35)'
        body: 'Activity indicates a mandatory DPIA: automated decision-making, large-scale special categories, or self-flagged high risk. No DPIA on file yet.'
        action: 'Create DPIA'

vulnerability:
    critical_unpatched:
        title: 'Critical CVE without patch record'
        body: 'CVSS %score% (%cve%) — no linked patch activity. NIS2 Art. 21(2)(e) and ISO 27001 A.8.8 require documented remediation.'
        action: 'Create patch'

data_subject_request:
    identity:
        title: 'Identity not yet verified'
        body: 'Verification method on file (%method%), but identity not confirmed. Releasing data before verification = breach under Art. 5(1)(f).'
        action: 'Run verification'

asset:
    protection_inheritance:
        title: 'Higher protection level inherited from dependencies'
        body: 'Dependent assets imply a higher protection need (BSI 3.6 maximum principle): C=%c%, I=%i%, A=%a%. Adopt the suggestion.'
        action: 'Adopt protection'

bc_plan:
    test_overdue:
        title: 'BC plan test overdue'
        body_with_last: 'Last test was %months% months ago — ISO 22301 Cl. 8.6 requires at least annual exercises.'
        body_never: 'No test documented yet. ISO 22301 Cl. 8.6 requires at least annual exercises.'
        action: 'Schedule test'

business_process:
    no_bcp:
        title: 'Critical process without BC plan'
        body: 'Process is classified as %criticality% but has no Business Continuity Plan. ISO 22301 Cl. 8.4.'
        action: 'Create BC plan'

supplier:
    exit_strategy:
        title: 'DORA exit strategy missing'
        body: 'ICT-critical supplier without a documented exit strategy. DORA Art. 28(8) requires a binding exit plan for critical services.'
        action: 'Add exit strategy'

audit_finding:
    no_capa:
        title: 'Critical finding without corrective action'
        body: '%severity% finding without a CAPA. ISO 27001 Cl. 10.1 requires documented correction and effectiveness verification.'
        action: 'Create CAPA'

consent:
    expiring_soon:
        title: 'Consent expiring soon'
        body: 'Expires in %days% days. Without renewal the legal basis collapses (GDPR Art. 6(1)(a)).'
        action: 'Trigger re-consent'

patch:
    downtime_cr:
        title: 'Patch needs change request'
        body: 'Critical patch with downtime but no linked change request. ISO 27001 A.8.32 requires formal change control.'
        action: 'Create change request'

crisis_team:
    training:
        title: 'Crisis-team training overdue'
        body_with_last: 'Last training was %months% months ago. BSI 200-4 §4.2 / ISO 22301 Cl. 7.2 require recurring exercises.'
        body_never: 'No training documented yet. BSI 200-4 §4.2 / ISO 22301 Cl. 7.2 require recurring exercises.'
        action: 'Schedule tabletop'

risk:
    no_treatment:
        title: 'High risk without treatment plan'
        body: 'Inherent risk level %level% — ISO 27001 Cl. 6.1.3 requires a documented treatment decision.'
        action: 'Create treatment plan'

control:
    orphan:
        title: 'Applicable control without links'
        body: 'Control marked applicable but linked to neither risks nor compliance requirements. SoA gap per ISO 27001 Cl. 6.1.3 b/c.'
        action: 'Review links'

dpia:
    sdm_incomplete:
        title: 'SDM coverage incomplete'
        body: 'Standard-Datenschutzmodell coverage at %coverage% %. Authorities expect all seven protection goals assessed.'
        action: 'Complete goals'

incident:
    needs_treatment:
        title: 'Incident without risk-treatment plan'
        body: 'High-severity incident on a high-CIA asset without a documented treatment plan. ISO 27001 A.5.27 — lessons learned.'
        action: 'Create treatment plan'

policy_wizard:
    settings_drift:
        title: 'Konzern baseline raised — re-run wizard'
        body: 'Konzern CISO of %konzern_name% raised setting "%setting_key%" from %old_value% to %new_value%. Affected settings in your tenant: %affected_count%. Re-run the wizard in targeted mode to realign the policies.'
        action: 'Re-run wizard'

alva_hint:
    kritis_operator_readiness:
        title: 'KRITIS readiness gap: IT security policy missing'
        body: '%tenant_name% is flagged as a KRITIS operator but has no approved IT security policy generated from a BSI template. BSIG § 8a and the KRITIS-Dachgesetz require a documented, leadership-approved top-level policy as the minimum evidence baseline. Without it, the next BSI assessment will record this as a finding.'
        cta_label: 'Open BSI wizard'
        dismiss_label: 'Not now'
    konzern_ciso_drift_alert:
        title: 'Subsidiary differs from konzern baseline'
        body: 'Inside konzern %konzern_name%, %affected_count% subsidiary settings violate strict konzern defaults (non-changeable / non-relaxable). First sample: tenant "%first_tenant_name%", setting "%first_setting_key%". Review the "Differences" tab in the konzern rollup and ask the subsidiary to realign before the audit catches it.'
        cta_label: 'Open differences'
        dismiss_label: 'Remind me later'
    open_finding_reference:
        title: 'Audit finding without re-run closure'
        body: 'Wizard run carrying finding reference "%finding_ref%" has been open for %age_days% days (threshold: %threshold_days% days). The auditor expects either a completed re-run with refreshed policy or a documented justification. Inaction creates a non-conformity.'
        cta_label: 'Start targeted re-run'
        dismiss_label: 'Not now'
    training_coverage_gap:
        title: 'Policy acknowledgement coverage below threshold'
        body: 'Policy "%document_title%" is acknowledged by only %coverage_percent% % of the workforce audience (threshold: %threshold_percent% %). ISO 27001 Cl. 7.3 awareness requires demonstrable communication and acknowledgement — open the acknowledgement inbox and chase outstanding records.'
        cta_label: 'Open acknowledgement inbox'
        dismiss_label: 'Remind me later'
    bcm_exercise_due:
        title: 'BCM exercise due in %days% days'
        body: 'Planned BCM exercise "%exercise_name%" (%exercise_type%) is scheduled in %days% days (reminder window: %window_days% days). ISO 22301 Cl. 8.6 expects documented preparation — invite participants, finalise the scenario, assign observers.'
        cta_label: 'Open exercise'
        dismiss_label: 'Remind me later'
    bcm_exercise_overdue:
        title: 'BCM exercise overdue'
        body: 'Planned BCM exercise "%exercise_name%" (%exercise_type%) has been overdue for %days% days yet remains in status "planned". ISO 22301 Cl. 8.6 mandates a documented exercise cadence — reschedule with justification or move to "cancelled", otherwise the audit will flag it.'
        cta_label: 'Open exercise'
        dismiss_label: 'Not now'
