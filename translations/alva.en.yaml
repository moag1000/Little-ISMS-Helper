alva:
    title_prefix: 'Alva tip:'
    dismiss: 'Not now'
    stats:
        title: 'Alva hint statistics'
        description: 'Aggregated hint dismissals per key — helps see which hints feel like noise and which ones actually drove action.'
        empty: 'No hint dismissals recorded yet.'
        col:
            hint_key: 'Hint key'
            rendered: 'Renders'
            total: 'Dismissals'
            snoozed: 'Snooze'
            distinct_users: 'Users'
            dismiss_rate: 'Dismiss rate'

data_breach:
    gdpr_72h:
        title: 'GDPR Art. 33 72h deadline running'
        body: 'High-severity breach not yet notified to the supervisory authority. Remaining: %hours% h %minutes% min. Missing the deadline = up to €10M / 2% group turnover (Art. 83(4)).'
        action: 'Record notification'
    notification_overdue:
        title: 'GDPR Art. 33 — notification deadline missed by %hours% h'
        body: 'The 72h supervisory-authority notification deadline has passed (%hours% hours overdue) without a confirmed notification. GDPR Art. 33 / Art. 83(4) — fines up to €10M / 2% group turnover. Document the notification or justify the delay immediately.'
        action: 'Record notification'

processing_activity:
    third_country:
        title: 'Third-country transfer without safeguards'
        body: 'Personal data is transferred to %countries% but no Art. 46 safeguard is recorded (SCC, BCR, adequacy decision). Schrems-II exposure.'
        action: 'Add safeguards'
    purpose_legal_basis_mismatch:
        title: 'Legal basis does not fit the marketing purpose'
        body: 'This activity pursues a marketing purpose but relies on "%basis%". Direct marketing is practically only lawful under consent (Art. 6(1)(a)) or legitimate interests (Art. 6(1)(f), Recital 47). Please review the legal basis.'
        action: 'Review legal basis'
    dpia_required:
        title: 'DPIA required (GDPR Art. 35)'
        body: 'Activity indicates a mandatory DPIA: automated decision-making, large-scale special categories, or self-flagged high risk. No DPIA on file yet.'
        action: 'Create DPIA'
    avv_required:
        title: 'AVV supplier missing — GDPR Art. 28'
        body: 'This processing activity involves processors, but no structured supplier FK is set. GDPR Art. 28 requires a written DPA naming the processor. Please select the supplier from the supplier register.'
        action: 'Select processor (GDPR Art. 28)'
        picker_title: 'Select processors (GDPR Art. 28)'
        picker_subtitle: 'Pick the suppliers from the supplier register who act as processors for this processing activity.'
        picker_breadcrumb: 'AVV picker'
        picker_section_title: 'Available suppliers'
        no_candidates: 'No suppliers in this tenant yet. Please create a supplier first.'
        create_supplier: 'Create supplier'
        save: 'Save selection'
        flash_saved: 'AVV suppliers saved.'
    retention_missing:
        title: 'Retention period not set — GDPR Art. 5(1)(e) gap'
        body: 'This processing activity has no documented retention period or erasure policy. GDPR Art. 5(1)(e) storage-limitation principle requires personal data to be kept no longer than necessary. Supervisory authorities routinely cite missing retention schedules as findings.'
        action: 'Set retention period'
    unstructured_department:
        title: 'Department only stored as freetext'
        body: 'The responsible department "%department%" is only stored as freetext. Create a structured Department record so ISO 27001 Cl. 5.3 (roles/responsibilities) and cross-framework reuse (Assets, Risks, Incidents) work properly.'
        action: 'Create department'

vulnerability:
    critical_unpatched:
        title: 'Critical CVE without patch record'
        body: 'CVSS %score% (%cve%) — no linked patch activity. NIS2 Art. 21(2)(e) and ISO 27001 A.8.8 require documented remediation.'
        action: 'Create patch'

data_subject_request:
    identity:
        title: 'Identity not yet verified'
        body: 'Verification method on file (%method%), but identity not confirmed. Releasing data before verification = breach under Art. 5(1)(f).'
        action: 'Run verification'

asset:
    protection_inheritance:
        title: 'Higher protection level inherited from dependencies'
        body: 'Dependent assets imply a higher protection need (BSI 3.6 maximum principle): C=%c%, I=%i%, A=%a%. Adopt the suggestion.'
        action: 'Adopt protection'
    criticality_missing_high_risk:
        title: 'CIA classification missing on high-risk asset'
        body: 'This asset is linked to a high-inherent-risk but has no Confidentiality/Integrity/Availability classification. Without it the protection level is invisible and cannot feed BSI 3.6 inheritance or ISO 27001 A.5.9 asset-classification evidence.'
        action: 'Set CIA classification'

bc_plan:
    test_overdue:
        title: 'BC plan test overdue'
        body_with_last: 'Last test was %months% months ago — ISO 22301 Cl. 8.6 requires at least annual exercises.'
        body_never: 'No test documented yet. ISO 22301 Cl. 8.6 requires at least annual exercises.'
        action: 'Schedule test'

business_process:
    no_bcp:
        title: 'Critical process without BC plan'
        body: 'Process is classified as %criticality% but has no Business Continuity Plan. ISO 22301 Cl. 8.4.'
        action: 'Create BC plan'

supplier:
    exit_strategy:
        title: 'DORA exit strategy missing'
        body: 'ICT-critical supplier without a documented exit strategy. DORA Art. 28(8) requires a binding exit plan for critical services.'
        action: 'Add exit strategy'
    no_recent_assessment:
        title: 'High-criticality supplier without recent security assessment'
        body_with_last: 'Last security assessment was %months% months ago for this %criticality% supplier. ISO 27001 A.5.19 / DORA Art. 28 require periodic security reviews for critical third parties — annual cadence is the expected baseline.'
        body_never: 'No security assessment documented for this %criticality% supplier. ISO 27001 A.5.19 / DORA Art. 28 require evidence of third-party security reviews.'
        action: 'Schedule assessment'

audit_finding:
    no_capa:
        title: 'Critical finding without corrective action'
        body: '%severity% finding without a CAPA. ISO 27001 Cl. 10.1 requires documented correction and effectiveness verification.'
        action: 'Create CAPA'
    nc_without_root_cause:
        title: 'NC open without root-cause analysis for %days% days'
        body: 'ISO 27001 Cl. 10.2 b) requires evaluating the cause of every nonconformity. Please record the root-cause summary (e.g. 5-Why / Ishikawa / FMEA).'
        action: 'Add root-cause analysis'

consent:
    expiring_soon:
        title: 'Consent expiring soon'
        body: 'Expires in %days% days. Without renewal the legal basis collapses (GDPR Art. 6(1)(a)).'
        action: 'Trigger re-consent'

patch:
    downtime_cr:
        title: 'Patch needs change request'
        body: 'Critical patch with downtime but no linked change request. ISO 27001 A.8.32 requires formal change control.'
        action: 'Create change request'

crisis_team:
    training:
        title: 'Crisis-team training overdue'
        body_with_last: 'Last training was %months% months ago. BSI 200-4 §4.2 / ISO 22301 Cl. 7.2 require recurring exercises.'
        body_never: 'No training documented yet. BSI 200-4 §4.2 / ISO 22301 Cl. 7.2 require recurring exercises.'
        action: 'Schedule tabletop'

document:
    acknowledgement_audience:
        title: 'Who needs to acknowledge this document?'
        body: 'This document requires user acknowledgement (ISO 27001 A.6.3) but no explicit audience is set. By default the campaign broadcasts to all active tenant users — a targeted audience makes the awareness evidence audit-ready.'
        action: 'Set audience'
        picker_title: 'Set acknowledgement audience'
        picker_subtitle: 'Pick the employees who must acknowledge this document. Leaving the selection empty keeps the legacy broadcast-to-all behaviour.'
        picker_breadcrumb: 'Set audience'
        picker_section_title: 'Available users in tenant'
        no_candidates: 'No active users in this tenant.'
        filter_placeholder: 'Search by e-mail or name…'
        save: 'Save audience'
        empty_means_all: 'Note: empty selection keeps the default "all active tenant users".'
        flash_saved: 'Acknowledgement audience saved.'
        flash_not_required: 'Document does not require acknowledgement — audience picker skipped.'
    review_overdue:
        title: 'Document review overdue — %months% months without review'
        body: 'This approved/published document was last updated more than %months% months ago and has no scheduled next-review date. ISO 27001 Cl. 7.5.3 requires periodic document review; missing evidence is a finding at certification audit.'
        action: 'Schedule review'

training:
    mandatory_audience:
        title: 'Mandatory training without audience'
        body: 'This training is flagged mandatory (ISO 27001 A.6.3 Awareness), but no required participants are selected yet. Assigning the audience explicitly makes the awareness evidence audit-ready.'
        action: 'Select required participants'
        picker_title: 'Select required participants'
        picker_subtitle: 'Pick the employees who must take this mandatory training. Already-assigned users are greyed out.'
        picker_breadcrumb: 'Audience picker'
        picker_section_title: 'Available users in tenant'
        no_candidates: 'No active users in this tenant.'
        filter_placeholder: 'Search by e-mail or name…'
        already_assigned: 'Already assigned'
        save: 'Save audience'
        flash_saved: '%count% new required participants assigned.'
        flash_not_mandatory: 'Training is not flagged mandatory — audience picker skipped.'
    low_completion_rate:
        title: 'Mandatory training completion rate at %rate%%'
        body: 'Only %completed% of %total% assigned participants have completed this mandatory training (%rate%%). ISO 27001 A.6.3 / Cl. 7.3 awareness requires demonstrable completion evidence — chase outstanding records before the next audit.'
        action: 'Chase participants'

risk:
    no_treatment:
        title: 'High risk without treatment plan'
        body: 'Inherent risk level %level% — ISO 27001 Cl. 6.1.3 requires a documented treatment decision.'
        action: 'Create treatment plan'
    requires_dpia:
        title: 'DPIA required — Data Protection Impact Assessment missing'
        body: 'Risk is flagged as DPIA-required (GDPR Art. 35) but no DPIA is linked yet. Pre-fill from risk data is available — description, linked asset and data-subject impact are carried over.'
        action: 'Create DPIA with pre-fill'
    treatment_overdue:
        title: 'High risk untreated for %days% days'
        body: 'Inherent risk level %level% identified %days% days ago without a treatment plan. ISO 27001 Cl. 6.1.3 requires a documented treatment decision — the longer the gap, the stronger the audit finding.'
        action: 'Create treatment plan'

control:
    orphan:
        title: 'Applicable control without links'
        body: 'Control marked applicable but linked to neither risks nor compliance requirements. SoA gap per ISO 27001 Cl. 6.1.3 b/c.'
        action: 'Review links'
    soa_justification_missing:
        title: 'Non-applicable control without justification — major-NC risk'
        body: 'This control is marked "not applicable" but the SoA carries no written justification. ISO 27001 Cl. 6.1.3 d / 8.3 b require a documented justification for every exclusion — otherwise this is a Major Nonconformity at external certification audit.'
        action: 'Add justification'
    soa_no_mappings:
        title: 'SoA control without compliance-requirement mappings'
        body: 'This applicable control has risks linked but no cross-framework requirement mappings. ISO 27001 Cl. 6.1.3 c requires the SoA to trace each control back to framework clauses or risk decisions. Add at least one mapping to close the evidence gap.'
        action: 'Add requirement mappings'

bc_exercise:
    no_findings:
        title: 'Completed BC exercise without documented findings'
        body: 'ISO 22301 Cl. 8.6 expects every exercise to produce at least one documented finding or area for improvement. An exercise report without observations is of limited audit value — regulators and certification bodies will notice.'
        action: 'Add findings'
    actual_exceeds_plan:
        action: 'Review exercise and adjust plan'
        rto:
            title: 'Measured RTO exceeds the plan target'
            body: 'The actual recovery time achieved in this exercise is greater than the target of at least one tested BC plan. ISO 22301 Cl. 8.5.3 requires a lessons-learned loop: either revise the plan to match reality or record a documented deviation justification.'
        rpo:
            title: 'Measured RPO exceeds the plan target'
            body: 'The data-loss window measured in this exercise is greater than the target of at least one tested BC plan. ISO 22301 Cl. 8.5.3 requires a lessons-learned loop: either improve the backup interval or document the deviation.'
    target_missed:
        title: 'Exercise target missed — planned RTO not achieved'
        body: 'The exercise did not achieve the planned RTO (%planRto% h) of plan "%planTitle%" — actualRTO %actualRto% h. ISO 22301 Cl. 8.5.3 + 9.1.1 (Lessons-Learned) and BSI 200-4 ÜP-9 require this result to feed back into plan adjustment. Plan adjustment recommended.'
        action: 'Edit plan'

audit:
    findings_without_capa:
        title: '%count% open finding(s) without assigned owner'
        body: '%count% open or in-progress finding(s) have no assigned responsible person. ISO 27001 Cl. 10.1 requires every nonconformity to have a documented corrective action owner — unassigned findings are a Major NC indicator at external audit.'
        action: 'Assign findings'

compliance_framework:
    low_coverage:
        title: 'Framework "%name%" — only %coverage%% requirements mapped'
        body: 'Only %coverage%% of requirements in "%name%" are mapped to controls or evidence (threshold: %threshold%%). ISO 27001 Cl. 9.1 expects a current, evidence-backed compliance posture for active frameworks. Start with the highest-priority gaps.'
        action: 'Open framework gaps'

management_review:
    interval_overdue:
        title: 'Management review overdue — last was %months% months ago'
        body: 'The most recently documented management review is %months% months old. ISO 27001 Cl. 9.3 requires reviews at planned intervals — typically annual. Missing the cadence is a direct finding at certification audit.'
        action: 'Create management review'

dpia:
    sdm_incomplete:
        title: 'SDM coverage incomplete'
        body: 'Standard-Datenschutzmodell coverage at %coverage% %. Authorities expect all seven protection goals assessed.'
        action: 'Complete goals'

incident:
    needs_treatment:
        title: 'Incident without risk-treatment plan'
        body: 'High-severity incident on a high-CIA asset without a documented treatment plan. ISO 27001 A.5.27 — lessons learned.'
        action: 'Create treatment plan'
    high_severity_open_too_long:
        title: 'High-severity incident open for %hours% hours — SLA breached'
        body: 'This high/critical incident has been open for %hours% hours (SLA: %sla% h). ISO 27001 A.5.26 and NIS2 Art. 23 require prompt response and escalation. Immediate action required.'
        action: 'Update incident'
    requires_data_breach:
        title: 'GDPR Art. 33 — document data breach (72h deadline)'
        body: 'This incident is flagged as a data breach, but no linked data-breach record exists. GDPR Art. 33 requires notification to the supervisory authority within 72h of becoming aware. Missing the deadline = fines up to 10 M€ / 2% group turnover (Art. 83(4)(a)).'
        action: 'Create data breach (prefilled)'

policy_wizard:
    settings_drift:
        title: 'Konzern baseline raised — re-run wizard'
        body: 'Konzern CISO of %konzern_name% raised setting "%setting_key%" from %old_value% to %new_value%. Affected settings in your tenant: %affected_count%. Re-run the wizard in targeted mode to realign the policies.'
        action: 'Re-run wizard'

dora_exit_plan:
    rehearsal_overdue:
        title: 'Exit-plan rehearsal overdue'
        body_overdue: 'Last exit-strategy test for %supplier% was more than 12 months ago. ESA guidelines on DORA Art. 28(8) expect annual rehearsals.'
        body_never: 'Exit strategy for %supplier% has never been tested. DORA Art. 28(8) requires rehearsed exit plans.'
        action: 'Update rehearsal date'

global:
    risk_bulk_import_tip:
        title: 'Risk register growing — bulk import available'
        body: 'Your risk register is growing nicely (%count% entries) — the next time you do an owner review or inherent-score update, the bulk-import wizard saves approximately 2 FTE-hours of manual editing.'
        action: 'Open bulk-import wizard'
    business_process_bulk_import_tip:
        title: 'BIA list growing — CSV bulk import available'
        body: 'Your BIA list is growing (%count% processes) — during the annual owner review, CSV bulk import with delta mode saves approximately 1.5 FTE-hours compared to record-by-record editing.'
        action: 'Open bulk-import wizard'
    vvt_export_tip:
        title: 'Record of processing activities ready to export'
        body: 'You have %count% processing activities on file — ready for the next supervisory authority request? Export in BfDI format (XLSX/CSV/PDF) is available in one click.'
        action: 'Export BfDI XLSX'
    vvt_export_overdue:
        title: 'Record of processing activities export overdue'
        body: 'Last BfDI record-of-processing-activities export was %months% months ago — supervisory authority request risk. Authorities (BfDI / 16 state DPAs) may request this at any time; compliance best practice recommends an annual refresh.'
        action: 'Export now'
    asset_ohne_risk:
        title: '%count% high-CIA assets without a risk entry'
        body: '%count% assets with high/very-high protection need have no linked risk record. GDPR Art. 32 + ISO 27001 Cl. 6.1.2 require high-CIA assets to feed into the risk assessment.'
        action: 'Create risk'
    approved_doc_ohne_ack:
        title: '%count% approved policies without acknowledgements'
        body: '%count% approved documents have zero policy acknowledgement entries. ISO 27001 A.6.3 / Cl. 7.3 awareness requires demonstrable confirmation by all affected personnel.'
        action: 'Review policies'
    open_incident_ohne_sla:
        title: 'GDPR privacy incident: 72h deadline running!'
        body: '%count% high-severity privacy incident(s) open for more than 24 hours without a supervisory authority notification. GDPR Art. 33 requires notification within 72h!'
        action: 'Review incidents'
    risk_ohne_owner:
        title: '%count% risks without an owner'
        body: '%count% risks have no risk owner assigned. ISO 27001 A.5.4 / Cl. 6.1.2 require a documented risk owner.'
        action: 'Assign risks'
    overdue_audit_finding:
        title: '%count% overdue audit findings'
        body: '%count% audit findings have passed their due date without a completed corrective action. ISO 27001 Cl. 10.1 requires timely remediation.'
        action: 'Review findings'
    missing_dpo_for_gdpr:
        title: 'No DPO assigned — GDPR Art. 37'
        body: '%count% processing activities on record but no user holds ROLE_DPO. GDPR Art. 37 requires a designated Data Protection Officer for certain processing types.'
        action: 'Review users'
    missing_bc_exercise:
        title: 'No BC exercise completed in the last 12 months'
        body: 'No completed business continuity exercise has been documented in the last 12 months. ISO 22301 Cl. 8.5 requires regular BCP effectiveness testing.'
        action: 'Create exercise'
    vulnerability_without_patch:
        title: '%count% critical CVEs without a patch record (> %days% days)'
        body: '%count% open vulnerabilities with CVSS >= 7.0 have been unpatched for more than %days% days without a linked patch entry. OPS.1.1.3 / NIS2 Art. 21(2)(e) require documented patch SLA compliance.'
        action: 'Review vulnerabilities'
    filter_export_tip:
        title: 'Large list? Export saves time'
        body: 'Your register has %count% entries — export the filtered list as Excel/CSV/JSON instead of copying manually. Sprint-3 F19.'
        action: 'Export filtered list'
    nonconformity_auto_task_tip:
        title: 'Findings without norm reference (%count% open)'
        body: '%count% audit findings without a linked ISO/BSI requirement. Linking triggers automatic corrective-action tasks — ISO 27001 Cl. 10.1.'
        action: 'Link findings to requirements'
    missing_data_breach_procedure:
        title: '%count% data breach(es) without authority notification'
        body: '%count% data breach record(s) have no authority notification date (authorityNotificationAt). GDPR Art. 33 requires notification within 72h of awareness.'
        action: 'Show overdue data breaches'
    konzern_settings_drift:
        title: 'Divergence from Konzern baseline (%konzern_name%)'
        body: '%count% compliance framework difference(s) detected between this tenant and the parent Konzern (%konzern_name%). ISB coordination recommended before the next audit.'
        action: 'Review compliance'
    missing_sso_for_enterprise:
        title: 'No SSO configured for %count% users — authentication gap'
        body: 'Your tenant has %count% active users but no SSO Identity Provider is configured. ISO 27001:2022 A.5.17 and A.8.5 recommend centralised authentication for larger teams to enforce strong passwords, MFA, and account lifecycle control.'
        action: 'Set up SSO'
    missed_sla_deadline:
        title: '%count% SLA deadline(s) missed — regulatory exposure'
        body: '%count% regulatory reporting deadline(s) have passed without fulfilment (GDPR Art. 33 72h / DORA Art. 19 / NIS2 Art. 23). Missed notification obligations can trigger fines of up to €10M / 2% group turnover. Immediate action required.'
        action: 'Review notification rules'
    nis2_registration_overdue:
        title: 'NIS-2 BSI Portal Registration Overdue'
        body: 'The yearly NIS-2 registration with the BSI portal is overdue (deadline was %date%). BSIG § 33 mandates yearly re-registration for essential and important entities.'
        action: 'Open NIS-2 registration'
    nis2_registration_due_soon:
        title: 'NIS-2 BSI Portal Registration Due Soon'
        body: 'The yearly NIS-2 registration with the BSI portal is due on %date%. Please export now and submit via the BSI reporting portal.'
        action: 'Open NIS-2 registration'
    outdated_evidence:
        title: 'Evidence outdated — review required'
        body: '%count% controls are flagged with outdated evidence because linked documents were updated. Please process the reviewer queue to maintain ISO 27001 Cl. 7.5.3 compliance.'
        action: 'Open reviewer queue'
    no_notification_channel:
        title: 'No active notification channels configured'
        body: 'The notifications module is active but no active channels (email / webhook / in-app) are configured for this tenant. Without a channel, all notification rules run silently — no alert reaches recipients. ISO 27001 Cl. 9.1 requires monitorable processes.'
        action: 'Create channel'
    overdue_authority_report:
        title: 'EU Authority Report Overdue'
        body: '%count% EU authority reporting obligation(s) are overdue. Immediate action required — regulatory deadlines (GDPR Art. 33 / NIS-2 BSIG § 33 / DORA Art. 28).'
        action: 'Open Authority Hub'
    dora_roi_export_due:
        title: 'DORA RoI Not Yet Submitted'
        body: 'The DORA Register of Information for %year% has not yet been submitted to the supervisory authority (DORA Art. 28). Deadline: 31 Dec %year%.'
        action: 'Open DORA RoI'
    dora_category_unset:
        title: 'DORA Obligation Status Not Set — Contradiction Detected'
        body: '%count% supplier(s)/asset(s) are marked as DORA-relevant, but this organization is not classified as DORA-obligated. Please review the DORA obligation status in Organization Settings.'
        action: 'Open Organization Settings'
    risks_linked_to_open_incidents:
        title: 'Open Incidents Hold Risk Pressure — Review Recommended'
        body: '%count% risk(s) have been linked to open incidents for more than 30 days. Resolving these incidents reduces the actual risk exposure and keeps your risk register accurate.'
        action: 'Open Risk Register'
    fte_savings_milestone:
        title: 'Milestone reached — %hours% FTE hours saved!'
        body: 'The system has already saved %minutes% minutes (%hours% hours) of manual effort for this tenant — through SSO JIT provisioning, Bulk-Import, and Evidence reuse. Keep up the great work!'
        action: 'Open FTE Dashboard'
    library_updated:
        title: 'Compliance framework update available'
        body: 'A newer version of framework %code% is available (local: %yaml_version%, imported: %db_version%). Re-import the library to pick up new building blocks/controls.'
        action: 'Update library'
    role_mapping_without_claim:
        title: 'IdP without role mapping — privilege gap'
        body: '%count% identity provider(s) have active logins but no role mapping configured. JIT-provisioned users only receive the fallback role. Configuring role mapping in ~5 minutes prevents silent privilege drift.'
        action: 'Configure role mapping'
    planning_due_action_items:
        title: 'Action items due soon'
        body: '%count% action item(s) due within the next 14 days.'
        action: 'View due items'

inbox:
    title: 'Alva Inbox'
    subtitle: 'All active Alva tips for your tenant — prioritised by tier'
    empty_title: 'No active hints'
    empty_body: 'Alva has no open recommendations for your tenant right now. Well done!'
    badge: 'Alva Inbox'
    filter:
        all: 'All'
        regulatory: 'Regulatory (Tier 1)'
        audit_gap: 'Audit gap (Tier 2)'
        efficiency: 'Efficiency (Tier 3)'
    col:
        tier: 'Priority'
        title: 'Hint'
        action: 'Action'
    tier:
        1: 'Regulatory'
        2: 'Audit gap'
        3: 'Efficiency'

alva_hint:
    kritis_operator_readiness:
        title: 'KRITIS readiness gap: IT security policy missing'
        body: '%tenant_name% is flagged as a KRITIS operator but has no approved IT security policy generated from a BSI template. BSIG § 8a and the KRITIS-Dachgesetz require a documented, leadership-approved top-level policy as the minimum evidence baseline. Without it, the next BSI assessment will record this as a finding.'
        cta_label: 'Open BSI wizard'
        dismiss_label: 'Not now'
    konzern_ciso_drift_alert:
        title: 'Subsidiary differs from konzern baseline'
        body: 'Inside konzern %konzern_name%, %affected_count% subsidiary settings violate strict konzern defaults (non-changeable / non-relaxable). First sample: tenant "%first_tenant_name%", setting "%first_setting_key%". Review the "Differences" tab in the konzern rollup and ask the subsidiary to realign before the audit catches it.'
        cta_label: 'Open differences'
        dismiss_label: 'Remind me later'
    open_finding_reference:
        title: 'Audit finding without re-run closure'
        body: 'Wizard run carrying finding reference "%finding_ref%" has been open for %age_days% days (threshold: %threshold_days% days). The auditor expects either a completed re-run with refreshed policy or a documented justification. Inaction creates a non-conformity.'
        cta_label: 'Start targeted re-run'
        dismiss_label: 'Not now'
    document_split_needed:
        title: 'Legacy document still awaiting manual split'
        body: 'Topic "%topic%" carries a stocktake decision "split_to_topics" that needs manual handling (targets: %target_topics%). %count% such splits are currently open in this tenant. The Policy Wizard cannot auto-split a legacy document into multiple topic documents — switch the decision to merge_into_topic / replace, or launch one targeted re-run per target topic.'
        cta_label: 'Open stocktake step'
        dismiss_label: 'Remind me later'
    training_coverage_gap:
        title: 'Policy acknowledgement coverage below threshold'
        body: 'Policy "%document_title%" is acknowledged by only %coverage_percent% % of the workforce audience (threshold: %threshold_percent% %). ISO 27001 Cl. 7.3 awareness requires demonstrable communication and acknowledgement — open the acknowledgement inbox and chase outstanding records.'
        cta_label: 'Open acknowledgement inbox'
        dismiss_label: 'Remind me later'
    bcm_exercise_due:
        title: 'BCM exercise due in %days% days'
        body: 'Planned BCM exercise "%exercise_name%" (%exercise_type%) is scheduled in %days% days (reminder window: %window_days% days). ISO 22301 Cl. 8.6 expects documented preparation — invite participants, finalise the scenario, assign observers.'
        cta_label: 'Open exercise'
        dismiss_label: 'Remind me later'
    bcm_exercise_overdue:
        title: 'BCM exercise overdue'
        body: 'Planned BCM exercise "%exercise_name%" (%exercise_type%) has been overdue for %days% days yet remains in status "planned". ISO 22301 Cl. 8.6 mandates a documented exercise cadence — reschedule with justification or move to "cancelled", otherwise the audit will flag it.'
        cta_label: 'Open exercise'
        dismiss_label: 'Not now'
    lifecycle:
        stuck_in_status:
            title: 'Lifecycle transitions stalled'
            body: '%count% document(s) have been stuck in a non-terminal status (draft, in review, etc.) for over %days% days. Please review and advance to the next step.'
            action: 'View documents'
    # P-19 — Form-Step-Inline-Hint pattern. Inline hints that appear WHILE
    # the user is filling out a form (before save) — anchored next to the
    # triggering field. No 72-h SLA, no tier 1, no dismissal persistence:
    # these are pure "this is what saving will do" heads-ups.
    form:
        incident_data_breach:
            title: 'Data-breach record will be auto-created on save'
            body: 'Saving this incident will auto-create a DataBreach record prefilled from these fields. The GDPR Art. 33 72-hour countdown starts at the detection timestamp — plan supervisory-authority notification and data-subject communication early.'
            action: 'How the 72-hour clock works'
        risk_critical_severity:
            title: 'Critical risk (score %score%) — verify board approval'
            body: 'This risk reaches a critical score of %score%. ISO 27001 Cl. 5.3 + 6.1.3 f requires a Risk Owner with sufficient decision authority — for critical risks typically C-level / board (ROLE_CISO). Plan owner assignment and treatment decision accordingly.'
            action: 'Open Risk-Owner convention'
        risk_score_explainer:
            title: 'Risk score = %probability% × %impact% = %score%'
            body: 'In short: the tool derives the risk score %score% automatically from likelihood (%probability%) and impact (%impact%). The register is then sorted by it — the higher the score, the more urgent the treatment. That lets you compare risks consistently (ISO 27005). The live heatmap on the right shows the rating in colour instantly.'
        # ── Form-Coverage-Expansion (P-19 follow-up) ─────────────────────────
        # Inline hints for 9 additional FormTypes, all pre-save warnings.
        asset_critical_confidentiality:
            title: 'Critical confidentiality — stricter owner obligations'
            body: 'Confidentiality value 5 classifies this asset as "critical". ISO 27001 A.5.17 + BSI ORP.4.A11 require MFA enforcement for the owner and an annual re-verification (A.5.15 access review). Plan the access-control approach and re-cert interval up front.'
            action: 'Open access-control convention'
        asset_retired_status:
            title: 'End-of-life — disposal evidence required'
            body: 'Status "retired" / "disposed" triggers a documented secure-disposal obligation per ISO 27001 A.7.14 + BSI CON.6. If the asset supported a critical business process, also document a replacement plan or a reference inside the linked BC plan.'
            action: 'Open disposal checklist'
        business_process_recovery_chain_imbalance:
            title: 'RPO (%rpo% h) > RTO/2 (%rto% h) — check backup frequency'
            body: 'The Recovery-Point-Objective of %rpo% h exceeds half of the Recovery-Time-Objective of %rto% h. In practice, the backup cadence will not produce a consistent state before the recovery deadline — the BC strategy will silently miss its own targets. ISO 22301 Cl. 8.2.2 explicitly requires consistent recovery targets.'
            action: 'Open BIA guidance'
        bcp_stale_exercise:
            title: 'BC plan not exercised within the last 12 months'
            body: 'ISO 22301 Cl. 8.5 requires a documented exercise cadence — the audit default is annual. A BC plan with no exercise within the last 12 months is a textbook Major-NC candidate. Schedule the exercise and capture the date here once executed.'
            action: 'Open BCM exercise documentation'
        bcp_no_crisis_team:
            title: 'No crisis team defined — who activates the plan?'
            body: 'Neither responseTeamMembers (per-plan) nor crisisTeams (cross-plan reusable) is set. A BC plan without a team authorised to invoke the activation criteria is effectively unusable — ISO 22301 §8.5.3 mandates explicit roles with activation authority.'
            action: 'Open crisis-team convention'
        incident_high_severity_no_root_cause:
            title: 'High-severity incident closing without a root cause'
            body: 'Severity %severity% in status %status% without a documented root-cause analysis. ISO 27001 Cl. 10.1 + 10.2 ("Continual improvement" / "Nonconformity & corrective action") require a documented analysis before closure — otherwise the corrective action is deemed ineffective and the incident gets flagged in the audit.'
            action: 'Open root-cause template'
        incident_nis2_early_warning_pending:
            title: 'NIS2 24-hour early warning is running — set earlyWarningReportedAt'
            body: 'NIS2 Art. 23 (4)(a) obliges essential and important entities to deliver an early warning to the competent authority within 24 hours of becoming aware. The earlyWarningReportedAt field is still empty — prepare the authority contact and early-warning content and capture the timestamp once submitted.'
            action: 'Open NIS2 notification guide'
        document_review_interval_too_long:
            title: 'Review interval (%months% months) longer than 24 months'
            body: 'The industry baseline for ISO 27001 A.5.32 ("Independent review of information security") is an annual review. Intervals beyond 24 months require an explicit risk-based justification from external auditors. Either shorten the interval or document the justification in the approval workflow.'
            action: 'Open review-cadence convention'
        document_acknowledgement_without_audience:
            title: 'Acknowledgement required without a defined audience'
            body: 'When requiresAcknowledgement is on and acknowledgementAudience is empty, the acknowledgement task fans out to every tenant user — rarely the intended outcome. ISO 27001 A.6.3 expects a targeted, role-based communication. Pick a recipient group.'
            action: 'Open audience picker'
        training_mandatory_without_audience:
            title: 'Mandatory training without a defined audience'
            body: 'mandatory=true with no targetAudience or participants/participantUsers blocks auto-assignment and prevents any coverage reporting. ISO 27001 A.6.3 requires appropriate awareness and training for those whose work could affect information security — a defined audience is a precondition.'
            action: 'Open audience convention'
        training_mandatory_without_materials:
            title: 'Mandatory training without materials'
            body: 'A mandatory training with no materialFiles and no materials description cannot be delivered consistently or self-paced. ISO 27001 A.6.3 expects documented awareness content as audit evidence.'
            action: 'Open training-material template'
        corrective_action_effectiveness_review_overdue:
            title: 'Effectiveness review overdue'
            body: 'The effectivenessReviewDate is in the past but the status has not yet moved to verified*. ISO 27001 Cl. 10.1 d ("review the effectiveness of any corrective action taken") makes the effectiveness verification an audit-critical milestone — overdue reviews are a textbook Major-NC.'
            action: 'Open effectiveness-review guidance'
        audit_finding_major_nc_requires_capa:
            title: 'Major-NC requires a CAPA'
            body: 'A Major Nonconformity (major_nc) requires per ISO 27001 Cl. 10.1.1 ("Nonconformity and corrective action") a documented response: evaluate the need for action and implement CAPA if needed. In audit practice this means a linked CorrectiveAction record before the finding is closed.'
            action: 'Open CAPA workflow'
        risk_acceptance_without_justification:
            title: 'Risk acceptance without a justification'
            body: 'treatmentStrategy=accept with no acceptanceJustification is one of the most-cited ISO 27001 NCs. Cl. 8.3 + 6.1.3 f require the risk owner''s acceptance decision to be documented with a rationale — auditors explicitly check whether the residual-risk value sits inside the documented risk appetite.'
            action: 'Open acceptance template'
        risk_residual_exceeds_initial:
            title: 'Residual score (%residual%) > initial score (%initial%)'
            body: 'ISO 27005 Cl. 8.4 defines residual risk as "the risk remaining after risk treatment" — i.e. by definition ≤ initial. A higher residual usually points to swapped axes or a typo. Please review residualProbability and residualImpact.'
            action: 'Open risk-matrix guidance'
        mapping_concept_primer:
            title: 'New to mappings? In a nutshell'
            body: 'A mapping is a bridge between two frameworks: it says "this ISO 27001 requirement means the same as that NIS2 one". The trick: fulfil it once and, through inheritance, it automatically counts in the other framework too (data reuse). Like an ISO 9001 CAPA covering several processes. For the full walkthrough, click "Start mapping tour" at the top right.'
        mapping_coverage_primer:
            title: 'Reading the coverage %'
            body: 'Coverage shows what percentage of a framework is already covered by your fulfilled controls. The missing percent is not an error message but your to-do list: unmapped or not-yet-fulfilled requirements. Those gaps are exactly what you tackle next. (ISO 27001 Cl. 6.1.3)'
        mapping_quality_primer:
            title: 'Two quality numbers — what do they mean?'
            body: 'Confidence answers "how sure is the content of the link?". MQS (Mapping Quality Score) answers "how well is it evidenced and maintained?" — provenance, methodology, lifecycle. Important: a mapping in "draft" status does NOT yet count towards coverage — only after review ("published") does it take effect.'
