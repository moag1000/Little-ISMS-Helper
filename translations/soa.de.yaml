    no_tenant:
        title: 'Deinem Konto ist noch keine Organisation zugewiesen'
        subtitle: 'Ohne Organisationsbezug können keine Controls geladen werden — was zu tun ist:'
        body_admin: |
            Als Administrator kannst du das selbst lösen:
            1. Öffne die Benutzerverwaltung und weise diesem Konto eine Organisation zu.
            2. Alternativ kann die Daten-Reparatur Organisations-Zuweisungen über mehrere Benutzer hinweg fixen (Bulk-Mode).
    
            Falls noch kein passender Organisation existiert, lege ihn vorher unter Administration → Organisationsverwaltung an.
        body_user: |
            Bitte einen Administrator bitten, dein Benutzerkonto unter
            „Administration → Benutzerverwaltung" einer Organisation zuzuweisen.
            Erst dann sind ISMS-Daten (Controls, Risiken, Vorfälle, VVT-Einträge) sichtbar.
    
            Wenn du nicht weißt, wer Administrator ist: deine IT- oder QM-Abteilung
            ist üblicherweise zuständig.
        cta_user_management: 'Benutzerverwaltung öffnen'
        cta_data_repair: 'Daten-Reparatur öffnen'
        cta_logout: 'Abmelden und neu anmelden'

