alva:
    title_prefix: 'Alva-Tipp:'
    dismiss: 'Nicht jetzt'
    stats:
        title: 'Alva-Hint-Statistik'
        description: 'Aggregation der Hint-Dismissals pro Schlüssel — hilft zu sehen welche Hinweise als Lärm empfunden werden und welche tatsächlich Aktion ausgelöst haben.'
        empty: 'Bisher keine Hint-Dismissals erfasst.'
        col:
            hint_key: 'Hint-Key'
            rendered: 'Renders'
            total: 'Dismissals'
            snoozed: 'Snooze'
            distinct_users: 'Nutzer'
            dismiss_rate: 'Dismiss-Rate'

data_breach:
    gdpr_72h:
        title: '72-h-Frist DSGVO Art. 33 läuft'
        body: 'Schwere Datenpanne ohne Aufsichtsbehörden-Meldung. Verbleibend: %hours% h %minutes% min. Versäumte Frist = bis 10 Mio. € / 2 % Konzernumsatz (Art. 83 Abs. 4).'
        action: 'Meldung dokumentieren'

processing_activity:
    third_country:
        title: 'Drittlandtransfer ohne Garantien'
        body: 'Personenbezogene Daten werden in %countries% übermittelt, aber kein Mechanismus nach DSGVO Art. 46 ist hinterlegt (SCC, BCR, Angemessenheitsbeschluss). Schrems-II-Risiko.'
        action: 'Garantien ergänzen'
    dpia_required:
        title: 'DPIA erforderlich (Art. 35 DSGVO)'
        body: 'Verarbeitung deutet auf Pflicht-DPIA: automatisierte Entscheidungsfindung, besondere Kategorien im großen Umfang oder selbstklassifiziert als hohes Risiko. Bisher keine DPIA dokumentiert.'
        action: 'DPIA anlegen'

vulnerability:
    critical_unpatched:
        title: 'Kritische CVE ohne Patch-Eintrag'
        body: 'CVSS %score% (%cve%) — keine verknüpfte Patch-Aktivität. NIS2 Art. 21 Abs. 2 lit. e und ISO 27001 A.8.8 fordern dokumentierte Behebung.'
        action: 'Patch anlegen'

data_subject_request:
    identity:
        title: 'Identität noch nicht verifiziert'
        body: 'Verifikationsmethode hinterlegt (%method%), Identität jedoch nicht bestätigt. Vor Datenherausgabe prüfen — falsche Auskunft = Datenpanne nach Art. 5 Abs. 1 lit. f.'
        action: 'Verifikation durchführen'

asset:
    protection_inheritance:
        title: 'Schutzbedarf aus Abhängigkeiten verfügbar'
        body: 'Abhängige Assets ergeben höheren Schutzbedarf nach BSI 3.6 Maximumprinzip: C=%c%, I=%i%, A=%a%. Vorschlag übernehmen.'
        action: 'Schutzbedarf übernehmen'

bc_plan:
    test_overdue:
        title: 'BC-Plan-Test überfällig'
        body_with_last: 'Letzter Test vor %months% Monaten — ISO 22301 Cl. 8.6 fordert mindestens jährlichen Test.'
        body_never: 'Bisher kein Test dokumentiert. ISO 22301 Cl. 8.6 fordert mindestens jährlichen Test.'
        action: 'Test einplanen'

business_process:
    no_bcp:
        title: 'Kritischer Prozess ohne BC-Plan'
        body: 'Prozess ist als %criticality% klassifiziert, aber ohne Business-Continuity-Plan. ISO 22301 Cl. 8.4.'
        action: 'BC-Plan anlegen'

supplier:
    exit_strategy:
        title: 'DORA Exit-Strategie fehlt'
        body: 'ICT-kritischer Lieferant ohne dokumentierte Exit-Strategie. DORA Art. 28 Abs. 8 fordert verbindlichen Ausstiegsplan für kritische Dienste.'
        action: 'Exit-Strategie ergänzen'

audit_finding:
    no_capa:
        title: 'Critical Finding ohne Korrekturmaßnahme'
        body: '%severity%-Finding ohne CAPA. ISO 27001 Cl. 10.1 fordert dokumentierte Korrektur und Wirksamkeitskontrolle.'
        action: 'CAPA anlegen'

consent:
    expiring_soon:
        title: 'Einwilligung läuft bald ab'
        body: 'Ablauf in %days% Tagen. Ohne erneute Einwilligung entfällt die Rechtsgrundlage (Art. 6 Abs. 1 lit. a DSGVO).'
        action: 'Re-Consent anstoßen'

patch:
    downtime_cr:
        title: 'Patch braucht Change-Request'
        body: 'Kritischer Patch mit Downtime ohne verlinkten Change-Request. ISO 27001 A.8.32 fordert formale Change-Steuerung.'
        action: 'Change-Request anlegen'

crisis_team:
    training:
        title: 'Krisenstab-Training überfällig'
        body_with_last: 'Letztes Training vor %months% Monaten. BSI 200-4 Kap. 4.2 / ISO 22301 Cl. 7.2 fordern regelmäßige Übungen.'
        body_never: 'Bisher kein Training dokumentiert. BSI 200-4 Kap. 4.2 / ISO 22301 Cl. 7.2 fordern regelmäßige Übungen.'
        action: 'Tabletop-Übung planen'

risk:
    no_treatment:
        title: 'Hohes Risiko ohne Treatment-Plan'
        body: 'Inherentes Risiko-Niveau %level% — ISO 27001 Cl. 6.1.3 fordert dokumentierte Behandlungsentscheidung.'
        action: 'Treatment-Plan anlegen'

control:
    orphan:
        title: 'Anwendbares Control ohne Verknüpfung'
        body: 'Control ist als anwendbar markiert, aber weder Risiken noch Compliance-Anforderungen sind verknüpft. SoA-Lücke nach ISO 27001 Cl. 6.1.3 b/c.'
        action: 'Verknüpfungen prüfen'

dpia:
    sdm_incomplete:
        title: 'SDM-Coverage unvollständig'
        body: 'Standard-Datenschutzmodell-Coverage liegt bei %coverage% %. Aufsichtsbehörden erwarten alle 7 Gewährleistungsziele bewertet.'
        action: 'Ziele ergänzen'

incident:
    needs_treatment:
        title: 'Vorfall ohne Risk-Treatment-Plan'
        body: 'Hochkritischer Vorfall mit betroffenem hochsensiblen Asset, aber kein Treatment-Plan dokumentiert. ISO 27001 A.5.27 — Lessons Learned.'
        action: 'Treatment-Plan anlegen'

policy_wizard:
    settings_drift:
        title: 'Konzern-Vorgabe verschärft — Re-Run nötig'
        body: 'Konzern-CISO von %konzern_name% hat Setting "%setting_key%" von %old_value% auf %new_value% angehoben. Betroffene Einstellungen in deinem Tenant: %affected_count%. Wizard im Targeted-Modus erneut ausführen, um die Policies anzugleichen.'
        action: 'Wizard neu starten'

global:
    risk_bulk_import_tip:
        title: 'Risikoregister wächst — Bulk-Import verfügbar'
        body: 'Risikoregister wächst schön (%count% Einträge) — beim nächsten Update spart der Bulk-Import-Assistent ca. 2 FTE-Stunden für Owner-Pflege oder Inherent-Score-Bulk-Update.'
        action: 'Bulk-Import-Wizard öffnen'
    business_process_bulk_import_tip:
        title: 'BIA-Liste wächst — CSV-Bulk-Import verfügbar'
        body: 'BIA-Liste wächst (%count% Prozesse) — beim jährlichen Owner-Review spart CSV-Bulk-Import mit Delta-Mode ca. 1,5 FTE-Stunden.'
        action: 'Bulk-Import-Wizard öffnen'
    vvt_export_tip:
        title: 'Verfahrensverzeichnis exportbereit'
        body: 'Du hast %count% Verarbeitungstätigkeiten erfasst — bereit für die nächste Aufsichtsbehörde-Anfrage? Export im BfDI-Muster (XLSX/CSV/PDF) ist mit einem Klick verfügbar.'
        action: 'BfDI-XLSX exportieren'
    vvt_export_overdue:
        title: 'Verfahrensverzeichnis-Export überfällig'
        body: 'Letzter BfDI-Verfahrensverzeichnis-Export vor %months% Monaten — Aufsichtsbehörde-Anfrage-Risiko. Aufsichtsbehörden (BfDI / 16 LfDI) können jederzeit anfordern; Compliance-Best-Practice empfiehlt jährliche Auffrischung.'
        action: 'Jetzt exportieren'
    asset_ohne_risk:
        title: '%count% kritische Assets ohne Risiko-Eintrag'
        body: '%count% Assets mit Schutzbedarf hoch/sehr hoch haben keinen verlinkten Risk-Eintrag. DSGVO Art. 32 + ISO 27001 Cl. 6.1.2 fordern, dass hochsensible Assets das Risikoassessment speisen.'
        action: 'Risiko anlegen'
    approved_doc_ohne_ack:
        title: '%count% genehmigte Richtlinien ohne Mitarbeiter-Bestätigung'
        body: '%count% freigegebene Dokumente haben noch keine Policy-Acknowledgement-Einträge. ISO 27001 A.6.3 / Cl. 7.3 Awareness fordert nachweisbare Bestätigung durch alle Betroffenen.'
        action: 'Richtlinien prüfen'
    open_incident_ohne_sla:
        title: 'DSGVO-Datenschutz-Vorfall: 72h-Frist läuft!'
        body: '%count% schwerwiegender Datenschutz-Vorfall(Vorfälle) seit über 24 Stunden offen ohne Aufsichtsbehörden-Meldung. DSGVO Art. 33 Meldepflicht innerhalb 72h!'
        action: 'Vorfälle prüfen'
    risk_ohne_owner:
        title: '%count% Risiken ohne Verantwortlichen'
        body: '%count% Risiko-Einträge haben weder riskOwner noch riskOwnerName gesetzt. ISO 27001 A.5.4 / Cl. 6.1.2 fordern dokumentierten Risikoinhaber.'
        action: 'Risiken zuweisen'
    overdue_audit_finding:
        title: '%count% Audit-Findings überfällig'
        body: '%count% Audit-Findings haben das Fälligkeitsdatum überschritten ohne abgeschlossene Korrekturmaßnahme. ISO 27001 Cl. 10.1 fordert zeitnahe Behebung.'
        action: 'Findings prüfen'
    missing_dpo_for_gdpr:
        title: 'Kein DSB zugeordnet — Art. 37 DSGVO'
        body: '%count% Verarbeitungstätigkeiten erfasst, aber kein Nutzer mit ROLE_DPO zugewiesen. Art. 37 DSGVO fordert benannten Datenschutzbeauftragten für bestimmte Verarbeitungstypen.'
        action: 'Nutzer prüfen'
    missing_bc_exercise:
        title: 'Keine BCM-Übung in den letzten 12 Monaten'
        body: 'Im letzten Jahr wurde keine abgeschlossene BC-Übung dokumentiert. ISO 22301 Cl. 8.5 fordert regelmäßige Tests zur Wirksamkeitsprüfung der BCP.'
        action: 'Übung anlegen'
    vulnerability_without_patch:
        title: '%count% kritische CVEs ohne Patch-Eintrag (> %days% Tage)'
        body: '%count% offene Schwachstellen mit CVSS ≥ 7,0 sind seit mehr als %days% Tagen ohne verlinkten Patch. OPS.1.1.3 / NIS2 Art. 21 Abs. 2 lit. e verlangen dokumentierte Patch-SLA-Einhaltung.'
        action: 'Schwachstellen prüfen'
    filter_export_tip:
        title: 'Gefilterte Liste? Export spart Zeit'
        body: 'Dein Register hat %count% Einträge — gefilterte Liste als Excel/CSV/JSON exportieren spart manuelles Kopieren. Sprint-3 F19.'
        action: 'Gefilterte Liste exportieren'
    nonconformity_auto_task_tip:
        title: 'Findings ohne Norm-Bezug (%count% offen)'
        body: '%count% Audit-Findings ohne verknüpfte ISO/BSI-Anforderung. Verknüpfung löst automatische Korrektur-Tasks aus — ISO 27001 Cl. 10.1.'
        action: 'Findings mit Norm verknüpfen'
    missing_data_breach_procedure:
        title: '%count% Datenpanne(n) ohne Behörden-Meldung'
        body: '%count% Datenpanne(n) ohne Datum der Aufsichtsbehörden-Meldung (authorityNotificationAt). DSGVO Art. 33 verlangt Meldung innerhalb 72h nach Kenntnis.'
        action: 'Überfällige Datenpannen anzeigen'
    konzern_settings_drift:
        title: 'Abweichung von Konzern-Baseline (%konzern_name%)'
        body: '%count% Compliance-Framework-Differenz(en) zwischen diesem Tenant und dem übergeordneten Konzern (%konzern_name%). ISB-Abstimmung empfohlen vor dem nächsten Audit.'
        action: 'Compliance prüfen'
    missing_sso_for_enterprise:
        title: 'Kein SSO für %count% Benutzer — Authentifizierungslücke'
        body: 'Dieser Tenant hat %count% aktive Benutzer, aber keinen SSO-Identity-Provider konfiguriert. ISO 27001:2022 A.5.17 und A.8.5 empfehlen zentralisierte Authentifizierung für größere Teams zur Durchsetzung starker Passwörter, MFA und Account-Lifecycle-Management.'
        action: 'SSO einrichten'
    missed_sla_deadline:
        title: '%count% SLA-Frist(en) versäumt — regulatorische Haftung'
        body: '%count% Meldefrist(en) sind ohne Erfüllung abgelaufen (DSGVO Art. 33 72h / DORA Art. 19 / NIS2 Art. 23). Versäumte Meldepflichten können zu Bußgeldern bis zu 10 Mio. € / 2 % Konzernumsatz führen. Sofortiger Handlungsbedarf.'
        action: 'Benachrichtigungsregeln prüfen'
    nis2_registration_overdue:
        title: 'NIS-2 BSI-Portal-Registrierung überfällig'
        body: 'Die jährliche NIS-2-Registrierung beim BSI-Portal ist überfällig (Frist war %date%). BSIG § 33 verpflichtet wesentliche und wichtige Einrichtungen zur jährlichen Wiederregistrierung.'
        action: 'NIS-2-Registrierung öffnen'
    nis2_registration_due_soon:
        title: 'NIS-2 BSI-Portal-Registrierung bald fällig'
        body: 'Die jährliche NIS-2-Registrierung beim BSI-Portal ist fällig am %date%. Bitte jetzt exportieren und beim BSI-Meldung-Portal einreichen.'
        action: 'NIS-2-Registrierung öffnen'

inbox:
    title: 'Alva-Inbox'
    subtitle: 'Alle aktiven Alva-Tipps für deinen Tenant — priorisiert nach Tier'
    empty_title: 'Keine aktiven Hinweise'
    empty_body: 'Alva hat aktuell keine offenen Empfehlungen für deinen Tenant. Gut gemacht!'
    badge: 'Alva-Inbox'
    filter:
        all: 'Alle'
        regulatory: 'Regulatorisch (Tier 1)'
        audit_gap: 'Audit-Lücke (Tier 2)'
        efficiency: 'Effizienz (Tier 3)'
    col:
        tier: 'Priorität'
        title: 'Hinweis'
        action: 'Aktion'
    tier:
        1: 'Regulatorisch'
        2: 'Audit-Lücke'
        3: 'Effizienz'

alva_hint:
    kritis_operator_readiness:
        title: 'KRITIS-Pflicht: IT-Sicherheitsleitlinie fehlt'
        body: '%tenant_name% ist als KRITIS-Betreiber markiert, hat aber keine genehmigte IT-Sicherheitsleitlinie nach BSI-Vorlage. BSIG § 8a und KRITIS-Dachgesetz fordern eine dokumentierte, vom Top-Management freigegebene Leitlinie als Mindestnachweis. Ohne sie droht eine Audit-Feststellung beim nächsten BSI-Nachweis.'
        cta_label: 'BSI-Wizard starten'
        dismiss_label: 'Nicht jetzt'
    konzern_ciso_drift_alert:
        title: 'Tochter weicht von Konzern-Vorgabe ab'
        body: 'Im Konzern %konzern_name% verletzen %affected_count% Tochter-Einstellungen verbindliche Konzern-Vorgaben (nicht-änderbar / nicht-lockerbar). Erstes Beispiel: Tenant "%first_tenant_name%", Einstellung "%first_setting_key%". Bitte im Konzern-Rollup unter "Abweichungen" prüfen und die Tochter zur Korrektur auffordern, bevor das Audit es findet.'
        cta_label: 'Abweichungen öffnen'
        dismiss_label: 'Später erinnern'
    open_finding_reference:
        title: 'Audit-Finding ohne Re-Run-Abschluss'
        body: 'Wizard-Run mit Finding-Referenz "%finding_ref%" ist seit %age_days% Tagen offen (Schwelle: %threshold_days% Tage). Auditor erwartet entweder einen abgeschlossenen Re-Run mit aktualisierter Policy oder eine dokumentierte Begründung. Ohne Reaktion entsteht eine Nichtkonformität.'
        cta_label: 'Targeted Re-Run starten'
        dismiss_label: 'Nicht jetzt'
    training_coverage_gap:
        title: 'Policy-Bestätigungsquote unter Schwelle'
        body: 'Die Policy "%document_title%" ist nur zu %coverage_percent% % von der Mitarbeiter-Audience bestätigt (Schwelle: %threshold_percent% %). ISO 27001 Cl. 7.3 Awareness fordert nachweisbare Kommunikation und Bestätigung — bitte Bestätigungs-Inbox prüfen und ausstehende Acknowledgements anstoßen.'
        cta_label: 'Bestätigungs-Inbox öffnen'
        dismiss_label: 'Später erinnern'
    bcm_exercise_due:
        title: 'BCM-Übung steht in %days% Tagen an'
        body: 'Geplante BCM-Übung "%exercise_name%" (%exercise_type%) findet in %days% Tagen statt (Erinnerungsfenster: %window_days% Tage). ISO 22301 Cl. 8.6 fordert dokumentierte Vorbereitung — Teilnehmer einladen, Szenario finalisieren, Beobachter benennen.'
        cta_label: 'Übung öffnen'
        dismiss_label: 'Später erinnern'
    bcm_exercise_overdue:
        title: 'BCM-Übung überfällig'
        body: 'Geplante BCM-Übung "%exercise_name%" (%exercise_type%) ist seit %days% Tagen überfällig und steht weiterhin auf "planned". ISO 22301 Cl. 8.6 verlangt dokumentierte Übungs-Kadenz — verschieben mit Begründung oder Status auf "cancelled" setzen, andernfalls Audit-Risiko.'
        cta_label: 'Übung öffnen'
        dismiss_label: 'Nicht jetzt'
    outdated_evidence:
        title: 'Nachweise sind veraltet — Überprüfung erforderlich'
        body: '%count% Controls sind als Nachweis-veraltet markiert, weil verknüpfte Dokumente aktualisiert wurden. Bitte die Prüf-Queue bearbeiten, um ISO 27001 Kl. 7.5.3 Compliance zu erhalten.'
        action: 'Prüf-Queue öffnen'
    no_notification_channel:
        title: 'Keine aktiven Benachrichtigungskanäle konfiguriert'
        body: 'Das Benachrichtigungsmodul ist aktiv, aber für diesen Mandanten sind keine aktiven Kanäle (E-Mail / Webhook / In-App) eingerichtet. Ohne Kanal werden alle Benachrichtigungsregeln lautlos ausgeführt — kein Alert erreicht die Empfänger. ISO 27001 Kl. 9.1 erfordert überwachungsfähige Prozesse.'
        action: 'Kanal anlegen'
    overdue_authority_report:
        title: 'EU-Behörden-Meldung überfällig'
        body: '%count% EU-Behörden-Meldepflicht(en) ist/sind überfällig. Sofortiger Handlungsbedarf — regulatorische Fristen (DSGVO Art. 33 / NIS-2 BSIG § 33 / DORA Art. 28).'
        action: 'Behörden-Hub öffnen'
    dora_roi_export_due:
        title: 'DORA RoI noch nicht eingereicht'
        body: 'Der DORA Register of Information für %year% wurde noch nicht beim zuständigen Aufseher eingereicht (DORA Art. 28). Frist: 31.12.%year%.'
        action: 'DORA RoI öffnen'
    fte_savings_milestone:
        title: 'Meilenstein erreicht — %hours% FTE-Stunden eingespart!'
        body: 'Das System hat für diesen Mandanten bereits %minutes% Minuten (%hours% Stunden) manuellen Aufwand eingespart — durch SSO-JIT-Provisioning, Bulk-Import und Evidence-Wiederverwendung. Weiter so!'
        action: 'FTE-Dashboard öffnen'
    risks_linked_to_open_incidents:
        title: 'Offene Vorfälle halten Risikodruck aufrecht — Überprüfung empfohlen'
        body: '%count% Risiko(en) sind seit mehr als 30 Tagen mit offenen Vorfällen verknüpft. Die Behebung dieser Vorfälle reduziert die tatsächliche Risikoexposition und hält das Risikoregister aktuell.'
        action: 'Risikoregister öffnen'
