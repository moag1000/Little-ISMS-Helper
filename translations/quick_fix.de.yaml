quick_fix:
    title: 'Quick-Fix — Schema-Wartung'
    # Async-Job-Fortschrittsseiten (Phase-2-Rollout).
    job:
        id_label: 'Job-ID'
        worker_hint: 'Läuft im Hintergrund. Die Seite aktualisiert sich alle 3 Sekunden.'
        back: 'Zurück zu Quick-Fix'
        generic_label: 'Async-Job'
        apply_label: 'Ausstehende Migrationen anwenden'
        apply_subtitle: 'Führt den Doctrine-Migration-Plan im Hintergrund aus…'
        reconcile_label: 'Schema reconcilen'
        reconcile_subtitle: 'Gleicht das Live-Datenbank-Schema im Hintergrund mit den Entity-Metadaten ab…'
        repair_orphans_label: 'Verwaiste Einträge reparieren'
        repair_orphans_subtitle: 'Weist verwaiste Entities im Hintergrund dem Standard-Mandanten zu…'
        repair_mismatches_label: 'Mandanten-Fehlzuordnungen beheben'
        repair_mismatches_subtitle: 'Richtet Kind-Mandanten im Hintergrund am Parent (Asset) aus…'
        repair_duplicates_label: 'Duplikate zusammenführen'
        repair_duplicates_subtitle: 'Behält den ältesten Eintrag, entfernt neuere Duplikate im Hintergrund…'
        repair_all_label: 'Alles reparieren'
        repair_all_subtitle: 'Orphans + Mismatches + Duplikate im Hintergrund — kann mehrere Minuten dauern.'
        force_schema_label: 'Schema-Update erzwingen'
        force_schema_subtitle: 'Führt doctrine:schema:update im sicheren Modus (nur additiv) im Hintergrund aus…'
    pending:
        title: 'Datenbank-Update erforderlich'
        body: 'Diese Instanz wurde aktualisiert, das Datenbank-Schema ist aber noch auf dem alten Stand. Mit einem Klick anwenden:'
        count_label: 'ausstehende Migration(en)'
        button: 'Migrationen jetzt anwenden'
    drift:
        title: 'Schema-Drift erkannt'
        body: 'Alle Migrationen sind angewendet, aber das Datenbank-Schema weicht von der Entity-Definition ab. Mit einem Klick reconcilen:'
        count_label: 'ausstehende Schema-Statement(s)'
        show_sql: 'SQL anzeigen'
        button: 'Schema jetzt reconcilen'
        destructive_count_label: 'destruktive Statement(s) (DROP/TRUNCATE)'
        pending_fs_label: 'Migration(en) im Code aber nicht ausgefuehrt (file-system gegen DB)'
        pending_fs_show: 'Versionen anzeigen'
        destructive_warning: 'Destruktive Statements erkannt. Reviewen vor Anwenden — kann Daten loeschen. Wenn bewusst gewollt, Checkbox aktivieren.'
        destructive_confirm_label: 'Ich verstehe das Risiko und will destruktive Statements anwenden'
        destructive_button: 'Reconcile inkl. destruktiver Statements'
    entity_drift:
        title: 'Entity-Schema-Drift erkannt'
        body: 'Das Entity-Modell erwartet Spalten oder Tabellen, die in der Datenbank noch nicht vorhanden sind. Migrations-Tabelle und SchemaTool melden beide 0 — die Abweichung wurde direkt per Metadaten-Vergleich erkannt. Erzwinge ein Schema-Update (nur ADD/CREATE, keine DROPs):'
        count_label: 'fehlende Schema-Statement(s)'
    ok:
        title: 'Alles aktuell'
        body: 'Keine ausstehenden Schema-Migrationen.'
        return: 'Zur Startseite'
    error:
        title: 'Diagnose nicht möglich'
        body: 'Der Quick-Fix konnte den Schema-Status nicht ermitteln. Bitte Logs prüfen oder per CLI applyen:'
    locked:
        title: 'Quick-Fix gesperrt'
        body: 'Der Zugriff auf diese Seite ist durch die Admin-Settings beschränkt. Wende dich an einen Administrator.'
        token_hint: 'Wenn dir ein Installer-Token vorliegt, kannst du es hier eingeben:'
        token_placeholder: 'Token aus var/setup-token'
        token_submit: 'Mit Token freischalten'
    repair:
        section:
            title: 'Daten-Integrität'
        partial_error:
            label: 'Daten-Integritätsprüfung partial — %count% Fehler (Schema unvollständig, einige Prüfungen konnten nicht ausgeführt werden)'
            show: 'Details anzeigen'
        orphans:
            title: 'Verwaiste Entitäten (ohne Mandant)'
            button: 'Orphans zuweisen'
            empty: 'Keine Orphans'
        tenant_mismatches:
            title: 'Mandant-Fehlzuordnungen'
            button: 'Mismatches beheben'
            empty: 'Keine Mismatches'
        duplicates:
            title: 'Duplikate'
            button: 'Bereinigen'
        all:
            title: 'Alles-Sicher-Reparieren'
            button: 'Alles sicher reparieren'
            empty: 'Alle Daten-Integritätsprüfungen OK'
        success:
            orphans: '%count% Orphan(s) dem Standard-Mandanten zugewiesen.'
            tenant_mismatches: '%count% Mandant-Fehlzuordnung(en) behoben.'
            duplicates: '%count% Duplikat(e) aus "%type%" bereinigt.'
            all: 'Alle Repairs abgeschlossen: %orphans% Orphan(s), %mismatches% Mismatch(es), %duplicates% Duplikat(e).'
    apply_failure:
        title: 'Migration fehlgeschlagen — Recovery'
        warning: 'ACHTUNG: Diese Optionen nur verwenden wenn du verstehst, was die Migration tut. Ein falsches Skip kann zu Dateninkonsistenz fuehren.'
        skip_single_confirm: 'Ich bestaetige, dass ich die fehlgeschlagene Migration verstehe und sie sicher ueberspringen kann (z.B. weil die Aenderung bereits im Schema vorhanden ist oder die Migration rueckgaengig gemacht werden soll).'
        skip_single_button: 'Diese Migration ueberspringen (als ausgefuehrt markieren, ohne DDL)'
        skip_all_show: 'Alle ausstehenden Migrationen ueberspringen (Experten-Option)...'
        skip_all_body: 'Markiert ALLE ausstehenden Migrationen als ausgefuehrt ohne deren DDL auszufuehren. Nur verwenden wenn du sicher bist, dass das Schema bereits den gewuenschten Zustand hat. Diese Aktion kann nicht rueckgaengig gemacht werden.'
        skip_all_confirm: 'Ich bestaetige, dass ALLE ausstehenden Migrationen sicher uebersprungen werden koennen und ich die Konsequenzen verstehe.'
        skip_all_button: 'Alle ausstehenden Migrationen ueberspringen (ohne DDL)'
    phantom_diff:
        title: 'Schema bereits aktuell — Migration als erledigt markieren'
        warning: 'Nur klicken wenn das Schema die Tabelle/Spalte WIRKLICH bereits enthält. Diese Aktion überspringt die DDL-Ausführung und markiert die Migration nur in der Versionstabelle.'
        confirm_label: 'Ich bestätige, dass das Schema diese Änderung bereits enthält und die Migration sicher als ausgeführt markiert werden kann.'
        button: 'Migration als ausgeführt markieren (ohne DDL)'
        mark_all_show: 'Alle phantom-diff Migrationen auf einmal markieren...'
        mark_all_body: 'Markiert ALLE ausstehenden Migrationen als ausgeführt, die ein phantom-diff-Muster zeigen (Tabelle/Spalte existiert bereits). Stoppt bei der ersten Migration die keinen phantom-diff-Fehler produziert. Nur verwenden wenn sicher ist, dass ALLE ausstehenden Migrationen bereits im Schema vorhanden sind.'
        mark_all_confirm_label: 'Ich bestätige, dass ALLE ausstehenden Migrationen schema-seitig bereits angewendet sind und sicher ohne DDL markiert werden können.'
        mark_all_button: 'Alle phantom-diff Migrationen als ausgeführt markieren (ohne DDL)'
    force_update:
        show: 'Schema-Update erzwingen anzeigen (letzter Ausweg bei persistentem Reconcile-Fehler)...'
        body: 'Führt doctrine:schema:update --force (saveMode=true) aus — erzeugt nur ADD/CREATE-Statements, löscht keine Tabellen. Einzusetzen wenn Reconcile trotz FK-Checks scheitert. Bypasses Doctrine-Migrations-Tracking.'
        confirm_label: 'Ich verstehe, dass dieser Vorgang Doctrine-Migrations-Tracking umgeht und nur als letzter Ausweg verwendet werden sollte.'
        button: 'Schema-Update erzwingen (nuclear)'
    settings:
        title: 'Quick-Fix'
        description: 'Steuert die öffentliche Fallback-Seite, die bei Schema-Mismatch statt eines 500er erscheint.'
        fallback_ui_enabled:
            label: 'Fallback-UI aktiv'
            help: 'Wenn deaktiviert, zeigt das System bei Schema-Errors den Standard-500. Empfohlen für audit-kritische Produktion.'
        require_installer_token:
            label: 'Installer-Token verlangen'
            help: 'Quick-Fix nur mit Token erreichbar. Token wird beim composer install in var/setup-token geschrieben. Empfohlen für öffentlich erreichbare Composer-Deployments.'
        allow_in_dev_only:
            label: 'Nur im Dev-Mode erlauben'
            help: 'Quick-Fix nur erreichbar wenn APP_ENV=dev.'
        ip_allowlist:
            label: 'IP-Allowlist'
            help: 'Komma-getrennte Liste erlaubter Client-IPs. Leer = deaktiviert.'
        save: 'Speichern'
