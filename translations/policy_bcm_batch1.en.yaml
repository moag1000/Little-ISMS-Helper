        risk_assessment_methodology_bcm:
            v1:
                title: 'BCM Risk Assessment Methodology'
                body: |-
                    # BCM Risk Assessment Methodology of {{ tenant.legal_name }}

                    *Document class: Methodology | Standards: ISO 22301:2019 Clause 8.2.3, BSI 200-4 Section 5.3 | Linked to ISO/IEC 27005:2022 (ISMS-RA) | Review interval: every 24 months*

                    ## 1. Purpose and demarcation
                    This methodology describes the process for risk assessment in the BCM context pursuant to ISO 22301:2019 Clause 8.2.3 ("The organization shall implement and maintain a systematic risk assessment process") and BSI 200-4 (2023) Section 5.3. The BCM-RA focuses on **risks to availability and business continuity** and complements the ISMS Risk Assessment under ISO/IEC 27005:2022. It is not identical with the ISMS-RA but may reference its methodology (see Section 9).

                    ## 2. Relationship with the ISMS Risk Assessment
                    The BCM-RA and the ISMS-RA may share risk entries but with different focus:

                    - **ISMS-RA** assesses all security objectives (confidentiality, integrity, availability) — pursuant to ISO 27001 Clause 6.1.2.
                    - **BCM-RA** focuses on **availability** and severe disruption scenarios.

                    Where the ISMS-RA methodology is suitable for the BCM context it is referenced. Deviations are documented in Section 9 ("Delta declaration").

                    ## 3. BCM-specific risk sources (categories)
                    The following risk sources shall be considered in the BCM context (BSI 200-4 Annex C / ISO 22301 Annex A informative):

                    - **Natural disasters** — flood, storm, earthquake, fire, extreme weather (including climate-change-related risks);
                    - **Pandemics and public-health crises** — wide-scale staff unavailability;
                    - **Cyber attacks with availability impact** — ransomware, DDoS, wiper attacks, supply-chain compromise;
                    - **Supplier / third-party failure** — insolvency, outage of critical cloud providers;
                    - **Key-person loss** — unavailability, resignation, loss of critical specialists;
                    - **Prolonged power or energy outage**;
                    - **Fuel and supply shortages**;
                    - **Civil unrest, terrorism, geopolitical crises**;
                    - **Regulatory intervention** (e.g. supervisory order, site closure);
                    - **Infrastructure outages** — network, telecommunications, climate control / cooling in the data centre.

                    The list is reconciled annually against current threat catalogues (BSI 200-4 Annex C, ENISA Threat Landscape, CISA threat briefings).

                    ## 4. Likelihood scale (BCM lens)
                    The BCM-RA uses a scale that adequately addresses rare-but-severe events (in contrast to the frequency-oriented ISMS-RA scale):

                    - **5 Very likely** — occurred within the past 2 years or expected within 12 months;
                    - **4 Likely** — expected within 5 years;
                    - **3 Possible** — expected within 10 years;
                    - **2 Unlikely** — expected within 25 years;
                    - **1 Very unlikely** — rare century-scale events but not excluded.

                    For extreme risks (e.g. pandemic, climate-amplified flooding) the scale is explicitly open-ended at the upper end — level 1 must not be used to trivialise.

                    ## 5. Impact mapping to BIA time windows
                    Impact rating is performed via the BIA time windows defined in §2.2 (1h / 4h / 24h / 72h / 1w / 1mo). Risks are rated as: "Which processes are disrupted, for what duration, and how does the impact evolve over time?" This linkage is binding; a BCM-RA without a BIA reference is methodologically inadmissible.

                    ## 6. Risk evaluation criteria
                    A BCM risk is **unacceptable** where

                    - the expected disruption duration without treatment exceeds the MTPD of a Tier-1 or Tier-2 process, OR
                    - the combined financial impact reaches level 4 or above (existence-threatening band), OR
                    - regulatory consequences are enforcement-relevant, OR
                    - life safety is implicated (always level 5).

                    ## 7. Treatment options (BCM-specific)
                    Pursuant to ISO 22301 Clause 8.2.3 and BSI 200-4 Section 5.3:

                    - **Avoid** — eliminate the process or risk source (e.g. relocate from a flood zone);
                    - **Accept** — only at low ratings with documented executive-board approval;
                    - **Treat** — through strategy choice per the BC Strategy (hot/warm/cold standby, cloud failover, mutual aid);
                    - **Transfer** — through insurance (business-interruption, cyber-insurance, property);
                    - **Strategic alternative** — alternate business models, reduced-scope operations (MBCO).

                    ## 8. Documentation and risk register
                    BCM risks are kept in the central risk register with filter `bcm = true`. Mandatory fields: title, source, affected processes, likelihood, impact per time window, derived disruption duration, treatment option, accountable Risk Owner, next-review date. Workflow integration auto-escalates risks at level 4/5.

                    ## 9. Reuse of the ISMS methodology (delta declaration)
                    Where the ISMS-RA methodology under ISO 27005:2022 is reused for the BCM context the following deltas are binding:

                    - the likelihood scale is adjusted to the BCM lens (Section 4);
                    - impact assessment follows the BIA time windows rather than ISMS damage thresholds;
                    - the catalogue of risk sources is extended by the BCM-specific sources (Section 3);
                    - treatment options explicitly include "strategic alternative" and "transfer via insurance".

                    The combined methodology document counts as both ISMS and BCM methodology, provided all of the above deltas are documented.

                    ## 9a. Linkage with DORA Articles 8 + 9 (financial entities)
                    Where {{ tenant.legal_name }} is a financial entity within the scope of EU-DORA the BCM-RA aligns with the DORA ICT risk framework as follows:

                    - **Article 6 (ICT Risk Management Framework)** — the framework includes BCM aspects; BCM-RA results feed into ICT-risk-framework reporting to the management body;
                    - **Article 8 (Identification)** — identification of critical or important functions (CIF) must be consistent with BIA tier assignment;
                    - **Article 9 (Protection and Prevention)** — BCM-RA findings drive preventive measures (hot/warm-standby, replication) anchored in the BC Strategy;
                    - **Article 11 (Response and Recovery)** — the BC Strategy and BC Plans operationalise BCM-RA findings;
                    - **Articles 24-27 (Digital Operational Resilience Testing)** — tests verify the validity of BCM-RA assumptions;
                    - **Article 28 (Third-Party Risk Management)** — critical-third-party concentration risks are addressed in the BCM-RA explicitly.

                    The linkage is documented in the annual DORA RAG (risk assessment governance) self-assessment.

                    ## 10. Risk-assessment workshops
                    The BCM-RA is conducted at least once a year in a dedicated workshop including the BCM Officer {{ roles.bcm_officer.fullName }}, the ISB {{ roles.isb.fullName }}, the Crisis Team Lead {{ roles.crisis_team_lead.fullName }}, selected Process Owners of critical processes and Compliance. The workshop uses structured techniques (bow-tie analysis, scenario analysis, what-if) and works both top-down (from the threat catalogue to affected processes) and bottom-up (from the process to plausible disruption scenarios). Results are recorded in the risk register; significant new risks trigger strategy reviews.

                    ## 11. Consideration of climate-related risks
                    In line with ISO/IEC 27001:2022/Amd. 1:2024 and ISO 22301 practitioner guidance, climate-related risks are explicitly considered as a BCM-risk category. They include increasing frequency and intensity of extreme weather (heatwaves, flooding, storm), longer-term influences on site suitability (sea-level rise, change of precipitation patterns), regulatory consequences (e.g. climate stress tests imposed by supervisors) and reputational risks where preparedness is lacking. Assessment uses a time-horizon approach: physical risks (short-term 0-5 years, medium-term 5-15 years, long-term > 15 years) and transition risks (regulatory, technological).

                    ## 12. Reporting and escalation
                    BCM risks are reported quarterly in the BCMS steering committee. Risks at level 4 or 5 are escalated immediately to the executive board ({{ approval.chain }}). Acceptance decisions for level-4 risks require documented executive-board approval with expiry and re-assessment date (max. 12 months). Level-5 risks are by default not acceptable and require immediate treatment.

                    ---
                    *This methodology is owned by the BCM Officer {{ roles.bcm_officer.fullName }} and reviewed every 24 months and upon material change.*
