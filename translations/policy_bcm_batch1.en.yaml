        bc_strategy:
            v1:
                title: 'Business Continuity Strategy and Solutions'
                body: |-
                    # Business Continuity Strategy and Solutions of {{ tenant.legal_name }}

                    *Document class: Programme document (BCMS-wide) | Standards: ISO 22301:2019 Clause 8.3 incl. 8.3.2 + 8.3.3, BSI 200-4 Section 5.4 | Review interval: every {{ bcm.review_interval_months }} months; ad hoc upon BIA update*

                    ## 1. Purpose of the strategy
                    This document describes the strategic options and the chosen solutions through which {{ tenant.legal_name }} ensures business continuity for in-scope processes. It satisfies ISO 22301:2019 Clause 8.3 ("The organization shall determine and select business continuity strategies and solutions") and is grounded in the results of the BIA (§2.2) and the BCM-RA (§2.3). The strategy is approved by top management; operational implementation is owned by Process Owners and the IT leadership in coordination with the BCM Officer {{ roles.bcm_officer.fullName }}.

                    ## 2. Strategic options per criticality tier
                    {{ tenant.legal_name }} uses a tier-based strategy:

                    - **Tier 1 — critical processes (RTO ≤ 4 hours)** — hot-standby / dual-site / active cloud-failover architecture. Synchronous or near-synchronous data replication. RPO ≤ 15 minutes. Continuous availability monitoring with automatic failover.
                    - **Tier 2 — important processes (RTO ≤ 24 hours)** — warm-standby (pre-installed systems, regular data refresh) OR contracted recovery service. RPO ≤ 4 hours. Manual failover activation acceptable.
                    - **Tier 3 — standard processes (RTO ≤ 72 hours)** — cold-standby (hardware available, manual restoration) and/or defined manual workarounds (paper procedures, alternative tools). RPO ≤ 24 hours.
                    - **Tier 4 — deferrable processes (RTO > 72 hours)** — documented and accepted; restoration via routine recovery procedures.

                    ## 3. RTO vs. RTC (critical distinction)
                    **RTO** (Recovery Time Objective) is the required recovery time. **RTC** (Recovery Time Capability) is the recovery capability actually achievable, measured through exercises and real activations. **Strategy is measured against RTC, not RTO.** Where RTC > RTO a strategy gap exists, to be closed through investment, re-architecture or tier reclassification. The gap is documented in the annual strategy review and brought into management review under Clause 9.3.

                    ## 4. Resource categories (ISO 22301 Cl. 8.3.3 a-g)
                    The strategy bindingly addresses all resource categories:

                    ### 4.1 People
                    Key roles are protected by deputisation plans, cross-training and documented knowledge transfer. Minimum staffing requirements per process are captured in the BIA. Evacuation, alternate-workspace and remote-work concepts are established.

                    ### 4.2 Information
                    Data is backed up under the Backup Policy (A.5.30, A.8.13); RPO targets per tier are binding. Classification per A.5.12; retention per the Retention Policy and GDPR Article 5(1)(e).

                    ### 4.3 Buildings, work environment and utilities
                    Primary sites are rated by criticality; secondary workplaces are secured via remote-work arrangements, coworking contracts or the alternate-site concept. UPS and emergency power cover critical infrastructure. Climate control and fire safety per the site-security plan.

                    ### 4.4 Facilities, equipment and consumables
                    Notebooks, telephony and critical equipment held in adequate reserve. Consumables (special forms, secure printers) at minimum stock levels.

                    ### 4.5 ICT systems
                    Detailed handling in the recovery / restoration plans (§2.8). Integration of the Backup-Service and Restore-Service components per the asset register. Interface with A.5.30 of ISO 27001 is binding.

                    ### 4.6 Transportation and logistics
                    Where relevant: alternative transport routes, emergency stockpile, escalation procedures upon logistics disruption.

                    ### 4.7 Finance
                    Liquidity reserve per the Treasury Policy; emergency-payments procedures; insurance benefits (business-interruption insurance) as supplementary protection.

                    ### 4.8 Partners and suppliers
                    Supplier diversification for Tier-1 dependencies; contractual continuity clauses per A.5.20 of ISO 27001; exit strategies for critical third parties (in particular DORA Article 28 for financial entities).

                    ## 5. Cost-benefit assessment per option
                    Each strategy option is assessed in terms of cost (investment, running cost, insurance premiums) and benefit (avoided damages, regulatory compliance, reputation protection). Assessment is presented to management review under Clause 9.3; investment decisions are taken by top management ({{ approval.chain }}). Acceptance threshold: investments to close RTC gaps for Tier-1 risks are approved on a regular basis.

                    ## 6. Strategy selection per process
                    For every in-scope business process the chosen strategy is documented in a strategy register. Mandatory entries: process name, tier, chosen strategy option, planned MBCO, estimated RTO/RTC, sites and ICT systems involved, accountable Process Owner. The strategy is referenced in the corresponding BC Plan (§2.5).

                    ## 7. Linkage with risk treatment
                    The chosen strategies are the principal measures mitigating the risks identified in the BCM-RA. The link is captured in the risk register: every risk entry references the related strategy measure and the related BC Plans. Where unacceptable residual risks remain, additional measures (insurance, strategic alternative) are evaluated.

                    ## 8. Strategy review and change
                    The strategy is reviewed at least annually, additionally upon any BIA update, upon material architectural changes (e.g. cloud-migration phases), and upon material RTC target-actual deviations from exercises. Review is owned by the BCM Officer {{ roles.bcm_officer.fullName }}; approval by {{ approval.chain }}.

                    ## 8a. Strategic assumptions and prerequisites
                    The strategy documented here rests on a set of explicit assumptions whose validity is reviewed annually:

                    - **Assumption 1**: BIA results (in particular RTO/MTPD per process) are current and valid; if the BIA has expired, the strategy operates on a provisional basis only.
                    - **Assumption 2**: Identified critical third parties (in particular cloud providers) remain available; DORA Article 28 exit strategies are documented and rehearsed at least once per contract term.
                    - **Assumption 3**: Key-person availability (in particular the Crisis Team Lead {{ roles.crisis_team_lead.fullName }} and deputy) is secured by cross-training.
                    - **Assumption 4**: The alternate site {{ secondary_site_label }} is reachable via a geographically independent power and communications feed.
                    - **Assumption 5**: Insurance coverage (business interruption, cyber) is current and addresses the identified loss scenarios.

                    Where assumptions are found invalid in the annual review, the related strategy component is adjusted and the investment roadmap is reviewed.

                    ## 9. Group and third-party considerations
                    In group structures the strategy aligns with group-level BCM directives; local strategies shall not undercut group minimum standards but may exceed them (e.g. tighter RTO targets for regulatorily sensitive subsidiaries). Third-party considerations: critical suppliers and service providers are kept in a dedicated third-party continuity register; strategies address supplier-concentration risks (in particular for cloud providers and outsourced ICT functions). DORA Article 28 (for financial entities) requires explicit exit strategies for critical ICT third-party arrangements with a documented exit path and periodically rehearsed migration capability.

                    ## 10. Investment and budget integration
                    Strategy investments are integrated with business planning: BCM investment needs are identified during the annual budget cycle, consolidated by the BCM Officer, screened by Compliance for regulatory obligations and brought into the next-year investment budget. Multi-year roadmaps (e.g. data-centre consolidation, cloud-failover build-out) are documented in the 3-year BCMS plan. The executive board receives an annual "BCMS investment outlook" report supporting prioritised investment decisions.

                    ## 10a. Interface with ISMS risk treatment (ISO 27001 Cl. 6.1.3)
                    The BC Strategy is the principal collection of treatments addressing ISMS risks affecting the availability objective. The interface is:

                    - every ISMS-RA measure with availability nexus is linked to a strategy component (e.g. ISMS measure "redundant WAN link" → strategy component "Tier-1 hot-standby network");
                    - cost and effectiveness of strategy components feed into the ISMS Statement of Applicability (SoA) justification;
                    - upon strategy change the related ISMS-RA measure is reviewed and updated as needed;
                    - the ISMS risk-treatment plans and the BC Strategy register are reconciled quarterly.

                    ## 10b. Strategy effectiveness measurement (KPIs)
                    Strategy effectiveness is measured by quantitative indicators reported quarterly to the executive board:

                    - **RTO attainment rate** — share of Tier-1/Tier-2 processes that met their RTO in exercises or real activations (target: ≥ 95 % per tier);
                    - **RPO attainment rate** — share of processes whose RPO was met in exercises or real activations (target: ≥ 98 % per tier);
                    - **Strategy test coverage** — share of strategy components verified by test/exercise within the past 12 months (target: 100 % for Tier 1, ≥ 75 % for Tier 2);
                    - **DORA CIF recovery readiness** (where applicable) — number of critical or important functions with documented and rehearsed recovery capability;
                    - **Third-party exit readiness** (DORA Article 28) — share of critical ICT third parties with current and recently rehearsed exit strategies.

                    Adverse trends trigger immediate action plans.

                    ## 11. Test integration with the strategy
                    Every strategic decision is validated through the Exercise & Testing Programme: hot-standby architectures are validated by real failover tests at least annually (no "simulation only"); warm-standby by an annual switch-over exercise; cold-standby by a documented walkthrough at least every 24 months. Test outcomes feed directly into the annual strategy review.

                    ---
                    *This strategy is approved by top management and forms part of the BCMS document set.*
                section:
                    purpose:
                        title: 'Purpose of the strategy'
                        body: |-
                            Satisfies ISO 22301 Cl. 8.3 and BSI 200-4 Section 5.4. Grounded in BIA and BCM-RA. Approved by top management ({{ approval.chain }}); operational ownership with BCM Officer {{ roles.bcm_officer.fullName }}.
                    tier_options:
                        title: 'Strategic options per tier'
                        body: |-
                            Tier 1 (RTO ≤ 4h): hot-standby / dual-site / cloud-failover; Tier 2 (≤ 24h): warm-standby; Tier 3 (≤ 72h): cold-standby + workaround; Tier 4 (> 72h): documented and accepted.
                    rto_vs_rtc:
                        title: 'RTO vs. RTC'
                        body: |-
                            RTO = required; RTC = actually achievable. Strategy is measured against RTC. RTC > RTO is a strategy gap; the annual review feeds gaps into management review (Cl. 9.3).
                    resources:
                        title: 'Resource categories (Cl. 8.3.3 a-g)'
                        body: |-
                            People, information, buildings/utilities, facilities, ICT, transport, finance, partners/suppliers. Supplier diversification for Tier 1; DORA Article 28 exit strategies for critical financial-ICT third parties.
                    cost_benefit:
                        title: 'Cost-benefit assessment'
                        body: |-
                            Each option assessed by cost (investment, running cost, insurance) versus benefit (avoided damages, compliance, reputation). Investment decisions by {{ approval.chain }}.
                    process_mapping:
                        title: 'Strategy selection per process'
                        body: |-
                            Strategy register per process: tier, option, MBCO, RTO/RTC, sites, ICT, Process Owner. Reference in the BC Plan.
                    risk_link:
                        title: 'Risk-treatment link'
                        body: |-
                            Strategies as principal mitigation measure. Risk register links each risk to strategy and BC Plans. Residual risks covered by additional measures (insurance, strategic alternative).
                    review:
                        title: 'Strategy review'
                        body: |-
                            Annual; ad hoc on BIA update, architectural change, RTC deviation. Owned by {{ roles.bcm_officer.fullName }}; approved by {{ approval.chain }}.
                tailoring_field:
                    tier_strategy_assignment:
                        label: 'Tier-strategy assignment (tenant-specific)'
                        placeholder: 'Example: "Tier 1: online banking → active-active cloud (regions eu-central-1 + eu-west-1) with RPO 0; Tier 1: card authorisation → on-premise hot-standby + DR site (synchronous replication, RPO ≤ 5 min); Tier 2: branch operations → warm-standby (coworking site secured by contract); Tier 3: reporting → cold-standby + Excel workaround with documented templates."'
                    rtc_gap_status:
                        label: 'Current RTC target-actual assessment and investment roadmap'
                        placeholder: 'Example: "Tier-1 online banking: RTO 4h vs. last-exercise RTC 6h → gap 2h, active-active investment in 2026 (1.5 m EUR approved). Tier-2 branch operations: RTO 24h vs. RTC 30h → coworking contract being extended to 6 additional sites (Q3/2026). All Tier-3 processes within RTC tolerance."'
                    secondary_site_concept:
                        label: 'Alternate-site concept'
                        placeholder: 'Example: "Primary main site: Frankfurt; alternate site: Eschborn (15 km distance, separate power grid, separate telecom feed). Mutual-aid arrangement with sister subsidiary in Hamburg for extreme scenarios (e.g. regional Rhine-Main power outage). Cloud failover via {{ secondary_site_label }} for customer-critical digital services."'
        bc_plans:
            v1:
                title: 'BC Plan Template Standard'
                body: |-
                    # BC Plan Template Standard of {{ tenant.legal_name }}

                    *Document class: Procedure (defines the structure of individual BC plans; individual BC plans are separate records per process) | Standards: ISO 22301:2019 Clause 8.4.4, BSI 200-4 Section 6 | Review interval: every {{ bcm.review_interval_months }} months*

                    ## 1. Purpose of this document
                    This document bindingly defines the structure, content and quality requirements of all Business Continuity Plans (BC Plans) of {{ tenant.legal_name }} pursuant to ISO 22301:2019 Clause 8.4.4 and BSI 200-4 Section 6. Individual BC Plans are authored per in-scope business process by Process Owners and use this template bindingly. One record is created per BC Plan; maintenance and approval flow through the BC-Plan workflow.

                    ## 2. Relationship with the BSI 200-4 plan types
                    BSI 200-4 distinguishes three plan types whereas ISO 22301 collapses them into "BC Plans". For tenants who have adopted BSI 200-4 **all three plan types** are binding:

                    - **Geschaeftsfortfuehrungsplan (Business Continuation Plan)** — focused on maintaining operations through workarounds and reduced procedures during disruption;
                    - **Wiederanlaufplan (Recovery / Resumption Plan)** — brings resources back to a (possibly degraded) operating state;
                    - **Wiederherstellungsplan (Restoration Plan)** — restores the full pre-incident state on a longer-term basis.

                    For tenants without BSI adoption an **integrated BC plan** is maintained covering all three aspects in a single template.

                    ## 3. Mandatory content sections (every BC Plan)
                    ### 3.1 Plan identification
                    Unique plan ID, affected business process, Process Owner, BC-Plan Owner, version, approval status, creation date, next review date, classification (default: Internal-Confidential per BSI 200-4).

                    ### 3.2 Activation conditions
                    Clear conditions under which the plan is activated (trigger list). Reference to the Incident Response Procedure (§2.6) — the activation decision is taken by the role identified there (typically the Crisis Team Lead {{ roles.crisis_team_lead.fullName }} or the executive board {{ approval.chain }}).

                    ### 3.3 Roles and contact list
                    Binding list of all roles required for plan execution with name, position, telephone (office, mobile, emergency), email, deputisation. Reference to the Crisis Team (§2.7). Update obligation: review at least semi-annually, ad hoc on personnel changes.

                    ### 3.4 Sequence of recovery actions
                    Detailed step-by-step instructions for restoring process capability within the RTO. Format: step number, description, accountable person, estimated duration, preconditions, success criterion. Sequence follows the dependency analysis from the BIA (critical dependencies first).

                    ### 3.5 Resource requirements
                    People (numbers, qualifications), ICT systems (asset-register reference), infrastructure (site, power, climate), consumables, external service providers, emergency budget.

                    ### 3.6 Internal and external dependencies
                    List of all internal upstream and downstream processes, external suppliers and service providers along with their continuity arrangements. Reference to the supplier register and SLAs.

                    ### 3.7 Communication templates
                    Pre-prepared text for internal communication (employees, executive board), customers, supervisory authorities and media. Reference to the Incident Response Procedure (§2.6). Languages: at minimum German and English for customer- and regulator-facing texts.

                    ### 3.8 Stand-down criteria
                    Clear conditions for plan deactivation and return to BAU. Accountable decision role, documentation duty (BC-Plan activation log), lessons-learned trigger.

                    ### 3.9 Reference to recovery / restoration plans
                    Reference to the related recovery and restoration plans pursuant to §2.8 (in particular for ICT components).

                    ## 4. Classification and retention
                    BC Plans are confidential by default (default classification: Internal-Confidential per BSI 200-4 Section 6). Distribution on a need-to-know basis; retention per the Retention Policy. Versioning is mandatory; previous versions are retained in audit-proof form for at least 3 years.

                    ## 5. Authoring, review and approval
                    - **Authoring**: by the BC-Plan Owner in coordination with the Process Owner and the BCM Officer {{ roles.bcm_officer.fullName }}.
                    - **Review**: by an independent reviewer (typically a peer Process Owner or Compliance) for completeness, realism and consistency with the BIA and the strategy.
                    - **Approval**: by the Process Owner and the BCM Officer; for Tier-1 processes additionally by the Crisis Team Lead {{ roles.crisis_team_lead.fullName }}.
                    - **Review interval**: annually; ad hoc upon process change, reorganisation, change of dependencies.

                    ## 6. Linkage with exercises
                    Every Tier-1 BC Plan is exercised at least annually (tabletop or functional). Tier 2 every 18-24 months; Tier 3 at least every 36 months. Exercise frequency: {{ bcm.exercise_frequency }}. Lessons-learned from exercises feed back into the BC Plan; significant deviations are processed via the Corrective Action Procedure (§2.12).

                    ## 7. Auto-creation of BC-Plan records
                    On completion of the Policy Wizard, one BC-Plan record in status `draft` is automatically created per in-scope business process and assigned to the Process Owner. The BCMS tool reminds owners to finalise; an escalation to the BCM Officer is configured at 90 days.

                    ## 8. Quality minimum requirements per BC plan
                    Before a BC plan transitions from `draft` to `approved` the following quality criteria must be met:

                    - **Completeness**: all mandatory sections of §3 are filled in;
                    - **Currency**: all contact details have been verified within the past 12 months;
                    - **Realism**: the recovery sequence has been exercised at least once in a tabletop;
                    - **Consistency**: RTO/RPO/MBCO match the BIA results, deviations are justified;
                    - **Unambiguity**: every action has a unique accountable role (no "Team XY" without a lead);
                    - **Feasibility**: all required resources (people, ICT, infrastructure) are evidenced as available or flagged as to be procured.

                    ## 8a. Maintenance ownership and annual calendar
                    Every BC plan has a binding annual maintenance calendar owned by the BC-Plan Owner and overseen by the BCM Officer {{ roles.bcm_officer.fullName }}:

                    - **Q1**: review of contact details (employees, suppliers, authorities), refresh contact lists;
                    - **Q2**: tabletop exercise of the plan per the Exercise Programme;
                    - **Q3**: review of recovery sequence against the current asset register and BIA;
                    - **Q4**: plan review, lessons-learned incorporation, version uplift, approval for the following year.

                    Quarterly tasks are created in the BCMS tool; overdue tasks are escalated to the BCM Officer after 14 days; after 60 days of overdue, escalation goes to the executive board ({{ approval.chain }}).

                    ## 9. Plan-activation interfaces
                    Activation of a BC plan triggers the following workflows:

                    - automatic notification of the Crisis Team Lead {{ roles.crisis_team_lead.fullName }} (even where not a crisis);
                    - entry in the activation log with timestamp and occasion;
                    - activation of communication templates per §3.7;
                    - deputy notification via out-of-band channels (cf. §2.6 Incident Response Procedure);
                    - upon Tier-1 activation additionally immediate notification of the executive board ({{ approval.chain }}).

                    ## 9a. BC-Plan Owner training and competence
                    Every BC-Plan Owner completes a training of at least 2 hours before first taking over plan responsibility, covering: BCMS fundamentals, plan structure per this template, activation procedure, interface with the Crisis Team Lead, documentation duties. Refresher training takes place annually (at least 1 hour) and upon material changes to the template. Training is delivered by the BCM Officer {{ roles.bcm_officer.fullName }} or a designated deputy; attendance is recorded in the HR development system.

                    ## 9b. Workflow interfaces and auto-escalations
                    The BCMS tool links the BC-plan lifecycle with the workflow system of {{ tenant.legal_name }}:

                    - on creation of a plan an approval-workflow instance is created (reviewer, then Process Owner, then BCM Officer, plus the Crisis Team Lead for Tier 1);
                    - upon annual review a review task is auto-generated; on completion re-approval follows;
                    - on plan activation the system automatically creates an activation-workflow item with timeline log;
                    - on stand-down a lessons-learned workflow instance is created with a target date within 30 days.

                    Workflow delays are surfaced via the escalation scheme: 7 days delay → reminder to the owner; 14 days → BCM Officer informed; 30 days → escalated to the executive board.

                    ## 10. Confidentiality and distribution
                    BC plans regularly contain sensitive information about critical dependencies and weaknesses. They are distributed strictly on a need-to-know basis; a complete plan set is held redundantly at the primary site and at the alternate site {{ secondary_site_label }} (paper plus encrypted electronic store with separate key custody) so the plan remains available even during a complete IT outage.

                    ---
                    *This template is binding; any deviation requires approval by the BCM Officer {{ roles.bcm_officer.fullName }}.*
