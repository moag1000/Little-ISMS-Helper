                            Pre-prepared text for employees, customers, regulators and media. At least DE/EN. Reference to procedure §2.6.
                    standdown:
                        title: 'Stand-down and references'
                        body: |-
                            Stand-down criteria, activation log, lessons-learned trigger. Reference to recovery / restoration plans (§2.8).
                    review:
                        title: 'Review and exercises'
                        body: |-
                            Annual review; Tier-1 plans exercised annually, Tier 2 every 18-24 months, Tier 3 every 36 months. Frequency: {{ bcm.exercise_frequency }}.
                tailoring_field:
                    plan_classification:
                        label: 'Classification and distribution rule'
                        placeholder: 'Example: "BC Plans for Tier 1: classification `Confidential` per the Classification Policy; distribution only to Process Owner, deputy, BCM Officer, IT lead. Tier 2/3: `Internal-Confidential`. Distributed via paper plus encrypted PDF store; annual receipt acknowledgement."'
                    bcplan_creation_trigger:
                        label: 'Trigger for BC-plan creation per process'
                        placeholder: 'Example: "Auto-creation upon Policy-Wizard completion for all processes with criticality ≥ medium; manual creation additionally for (a) new critical business processes from M&A, (b) regulatorily required processes (e.g. new DORA CIF), (c) Process-Owner request approved by the BCM Officer."'
                    review_cadence_per_tier:
                        label: 'Review and exercise cadence per tier'
                        placeholder: 'Example: "Tier 1: review semi-annually (May/November), exercise annually (full-scale every 24 months), additional tabletop tests in Q1; Tier 2: annual review, tabletop every 18 months; Tier 3: review every 24 months, documented walkthrough every 36 months; Tier 4: review every 36 months, no exercise duty."'
        incident_response_communication:
            v1:
                title: 'BCM Incident Response & Communication Procedure'
                body: |-
                    # BCM Incident Response & Communication Procedure of {{ tenant.legal_name }}

                    *Document class: Procedure | Standards: ISO 22301:2019 Clause 8.4.3 (in particular 8.4.3.2), BSI 200-4 Section 5.5 | Cross-reference ISO/IEC 27001:2022 A.5.24-A.5.28 | Review interval: every {{ bcm.review_interval_months }} months; trigger upon every activation*

                    ## 1. Purpose and scope
                    This procedure bindingly governs how {{ tenant.legal_name }} responds to disruptions, emergencies and crises and how affected internal and external stakeholders are informed. It satisfies the requirements of ISO 22301:2019 Clause 8.4.3.2 ("The organization shall establish, implement and maintain procedures for ... communications") and BSI 200-4 (2023) Section 5.5. It applies to all employees, contractors and critical third parties.

                    ## 2. Detection and alerting
                    Disruptions are detected through the following channels:

                    - **24/7 NOC** and SIEM platform for technical disruptions;
                    - **Employees** via the central hotline (with documented number) and an emergency mailbox;
                    - **External monitoring** (e.g. synthetic checks, web-performance monitoring);
                    - **Customer and third-party reports** via service desk and account management;
                    - **Authority/regulator advisories** (e.g. CSIRT-Bund warnings, BSI advisories).

                    All channels are reachable 24/7; receipt confirmation is issued immediately (≤ 15 minutes), with first triage performed by the on-duty NOC or on-call responder.

                    ## 3. Initial assessment and classification
                    Each report undergoes initial triage in three tiers:

                    - **Incident** — disruption within normal operations, resolvable through the standard procedure without BCM activation. Handled per the Incident Management Procedure (A.5.24-A.5.27 of ISO 27001).
                    - **Emergency** — disruption with imminent or actualised RTO breach of a Tier-2 or higher process. Activation of at least one BC Plan is required.
                    - **Crisis** — severe event with existence- or reputation-threatening impact, regulatory notification duty or life-safety nexus. Crisis Team activation.

                    Classification is performed by the on-duty BCM Coordinator in coordination with the BCM Officer {{ roles.bcm_officer.fullName }}. In case of doubt the higher classification applies.

                    ## 4. Escalation thresholds and decision authority
                    Escalation follows defined thresholds:

                    - Incident → Emergency: imminent RTO breach Tier 1 / Tier 2 (decision: NOC Lead in coordination with the Process Owner);
                    - Emergency → Crisis: notifiable incident, life-safety nexus, severe reputational risk (decision: BCM Officer {{ roles.bcm_officer.fullName }} or Crisis Team Lead {{ roles.crisis_team_lead.fullName }});
                    - Crisis activation: exclusively by the Crisis Team Lead {{ roles.crisis_team_lead.fullName }} or the executive board {{ approval.chain }} (deputisation case).

                    Each escalation is recorded in the central activation log (timestamp, decision-maker, classification, processes affected).

                    ## 5. Invocation procedure (BC activation)
                    Formal activation of a BC Plan is taken by:

                    - **Crisis Team Lead** ({{ roles.crisis_team_lead.fullName }}) — for crisis or emergency;
                    - **Executive board** ({{ approval.chain }}) — in the deputisation case or in special situations;
                    - **BCM Officer** ({{ roles.bcm_officer.fullName }}) — for emergencies without crisis-team activation.

                    The activation decision is recorded in an audit-proof manner (time, occasion, BC plans affected, decision-maker).

                    ## 6. Notification cascade
                    The following stakeholders are informed in defined order:

                    - **Employees** of the affected unit — immediately by the line manager; via alternative channels (SMS broadcast, telephone cascade) where the primary channels are unavailable.
                    - **Executive board** ({{ approval.chain }}) — by the BCM Officer or Crisis Team Lead, no later than 30 minutes after initial classification as emergency or crisis.
                    - **Customers** — by Account Management against template; for critical services additionally via status page and hotline.
                    - **Supervisory authorities** — pursuant to regulatory notification duties (see Section 7).
                    - **Public authorities** — police, fire brigade, emergency services in physical emergencies or where life is at risk.
                    - **Media** — exclusively via the designated press office; no external statements without their clearance.
                    - **Suppliers and service providers** — to the extent their cooperation is required for restoration.

                    Communication templates are pre-positioned per stakeholder group (minimum languages DE/EN; further languages depending on tenant footprint).

                    ## 7. Regulatory notification duties
                    The following duties apply where applicable:

                    - **EU-DORA Article 19 + RTS** (for financial entities): major-ICT-incident notification with stages Initial (within 4 hours of classification), Intermediate (within 24-72 hours), Final (within 1 month). Recipient: competent supervisor (BaFin / Bundesbank for Germany).
                    - **NIS2** (Article 23 of Directive (EU) 2022/2555 / national transposition): early warning within 24 hours, incident notification within 72 hours, final report within 1 month. Recipient: national CSIRT.
                    - **BSI-KritisV** (for KRITIS operators): immediate notification of significant disruptions to BSI.
                    - **GDPR Article 33** (where personal-data nexus): notification within 72 hours to the competent supervisory authority.
                    - **GDPR Article 34** (where high risk to data subjects): without undue delay to data subjects.
                    - **Sector-specific** — e.g. TKG telecoms reports, BaFin MaRisk filings, EU-DORA obligations (Art. 17-23 incident reporting, Art. 28-30 ICT third-party register).

                    The concrete notification matrix is tenant-specific and maintained in the supervisor annex.

                    ## 8. Out-of-band communication channels
                    Where primary IT communication has failed the following alternative channels are available:

                    - **Telephone cascade** with printed distribution list (refreshed annually, kept at the safety site);
                    - **SMS broadcast service** (separate provider, tested in regular drills);
                    - **Satellite phone** for the Crisis Team Lead (at least two devices, monthly functional test);
                    - **Two-way radios** for site-internal communication;
                    - **Physical assembly point** with notice board at the primary site (post-evacuation rendezvous).

                    Out-of-band channels are tested at least semi-annually (frequency: {{ bcm.exercise_frequency }}).

                    ## 9. Spokesperson rule
                    External statements are made exclusively by designated spokespeople (press office / crisis-communications lead). Tenant rule: the only authorised spokespeople are the executive board ({{ approval.chain }}) and the designated press officer. No Crisis Team member issues unauthorised statements; any media contact is escalated immediately to the press office.

                    ## 10. Documentation and evidence preservation
                    During an activation a binding timeline log is maintained: timestamp, decision, decision-maker, action, outcome. Accountability: Crisis-Team Records Keeper. The documentation serves regulatory traceability, lessons-learned and, where applicable, civil/criminal evidence preservation. Retention per the Retention Policy, in any event at least 7 years.

                    ## 10a. Interface with ISMS incident management (A.5.24-A.5.28)
                    Security incidents per A.5.24-A.5.28 of ISO 27001 with availability impact automatically trigger a BCM triage. The interface is:

                    - every security incident with severity `high` or `critical` (per the severity matrix) is reported simultaneously to the BCM Coordinator;
                    - the BCM Coordinator immediately checks whether the disruption threatens the RTO of a Tier-1 or Tier-2 process;
                    - on a positive finding escalation occurs (emergency or crisis classification);
                    - on a negative finding the incident remains in the standard incident procedure with a BCM observer role;
                    - cyber incidents involving encryption or wiper components are by default classified as emergency (BSI 200-4 Section 5.5 recommends caution).

                    ## 10b. Escalation matrix with target times
                    Escalation follows a matrix with binding target times from initial classification:

                    - within 15 min — confirmation of initial classification, NOC Lead informed;
                    - within 30 min — BCM Officer {{ roles.bcm_officer.fullName }} notified for an emergency, Crisis Team Lead {{ roles.crisis_team_lead.fullName }} for a crisis;
                    - within 60 min — BC Plan and/or Crisis Team activated by the authorised role;
                    - within 4 h — DORA initial notification (where applicable);
                    - within 24 h — NIS2 early warning (where applicable), GDPR prepare-notification (where personal-data nexus);
                    - within 72 h — DORA intermediate report, NIS2 incident notification, GDPR Article 33 notification;
                    - 1 month — DORA final report, NIS2 final report, where applicable corrective-action reporting.

                    Delays are recorded in the activation log with justification; they form part of lessons-learned and may be subject to regulatory follow-up.

                    ## 11. Stand-down and return to BAU
                    The stand-down decision is taken by the role that issued the activation (Crisis Team Lead {{ roles.crisis_team_lead.fullName }}, executive board {{ approval.chain }}, or BCM Officer {{ roles.bcm_officer.fullName }}). Pre-conditions for stand-down:

                    - the triggering disruption is resolved or under control;
                    - critical processes operate at least at MBCO level;
                    - affected stakeholders have been informed;
                    - a hot-wash lessons-learned meeting has been scheduled within 7 days;
                    - all interim measures have been documented and transferred to the corrective-action procedure (§2.12).

                    Stand-down is logged in the activation log; a formal stand-down notice is issued to all stakeholders previously informed via the notification cascade.

                    ## 12. Lessons-learned and improvement
                    Within 7 days of stand-down a hot-wash workshop is held with all Crisis Team members and key roles. Within 30 days a consolidated lessons-learned report is produced; within 90 days all derived corrective actions are recorded with target date and accountability in the corrective-action system. Actions are tracked through to effectiveness verification; open items are reported quarterly to the executive board.

                    ## 13. Data protection during activation
                    Processing of personal data during a BCMS activation (e.g. employee location data, emergency contacts, media content) takes place with involvement of the Data Protection Officer and within established GDPR lawful bases (in particular Article 6(1)(b) and (f), Article 9 where health data is concerned). Out-of-band channels are operated in a privacy-compliant manner (e.g. SMS provider with Article 28 GDPR processor agreement, defined retention for telephone lists).

                    ---
                    *This procedure forms part of the BCMS document set and is reviewed annually as well as following each activation.*
