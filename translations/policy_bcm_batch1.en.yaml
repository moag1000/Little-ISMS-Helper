policy:
    bcm:
        bcms_top_level:
            v1:
                title: 'Business Continuity Policy (Notfallleitlinie)'
                body: |-
                    # Business Continuity Policy of {{ tenant.legal_name }}

                    *Document class: Top-level Policy | Standards: ISO 22301:2019 Clauses 5.1 + 5.2 a-f, BSI 200-4:2023 Section 4.1 + 4.4 | ISO/IEC 27001:2022 A.5.29 + A.5.30 | EU-DORA Article 11 | Language: English (formal British/EU) | Review interval: every {{ bcm.review_interval_months }} months*

                    ## 1. Purpose and preamble
                    This Business Continuity Policy is issued by the top management of {{ tenant.legal_name }} and constitutes the highest normative statement of the Business Continuity Management System (BCMS). It satisfies the requirements of ISO 22301:2019 Clause 5.2 a-f and BSI 200-4 (2023) Section 4.1 ("Notfallleitlinie"). The executive board of {{ tenant.legal_name }} hereby commits to maintaining the continuity of business operations during disruptive events, emergencies and crises, and to providing the resources necessary for that purpose. This commitment is non-delegable (ISO 22301 Clause 5.1 "Leadership and commitment"). This policy stands alongside the Information Security Policy and shall be coherent with the Data Protection Policy and the wider management system framework.

                    ## 2. Scope
                    The scope of the BCMS is bindingly defined in the separate document *BCMS Scope Statement* in accordance with ISO 22301 Clause 4.3. This Business Continuity Policy applies to all employees (irrespective of contractual status), contractors, working students, interns, and any service providers and third parties supporting critical business processes of {{ tenant.legal_name }}. It covers all legal entities, sites and business processes flagged "in scope" in the scope statement. Exclusions are justified in the scope document and shall not impair the organisation's ability to meet its continuity objectives (ISO 22301 Clause 4.3 c).

                    ## 3. BCMS objectives (Cl. 5.2 b + Cl. 6.2)
                    {{ tenant.legal_name }} pursues the following overarching BCMS objectives, derived from the organisational context (Clause 4.1), the requirements of interested parties (Clause 4.2) and applicable regulatory obligations:

                    1. **Protection of life and health** — paramount priority across all emergency and crisis scenarios.
                    2. **Maintenance of critical business processes** — within the recovery time objectives (RTO) defined by the BIA methodology.
                    3. **Minimisation of financial, regulatory and reputational damage** through orderly resumption and restoration procedures.
                    4. **Fulfilment of applicable regulatory obligations** (in particular {{ standards_adopted_list }}, EU-DORA, NIS2, sector-specific requirements such as KRITIS where applicable).
                    5. **Preservation of trust** vis-a-vis customers, employees, supervisory authorities and business partners.
                    6. **Continual improvement** of the BCMS through exercises, audits and management review in accordance with Clauses 9.2, 9.3 and 10.1.

                    Specific, measurable annual objectives are documented separately in the document *BCMS Annual Objectives* in accordance with ISO 22301 Clause 6.2.

                    ## 4. Top-management commitment (Cl. 5.1)
                    The executive board of {{ tenant.legal_name }} ({{ approval.chain }}) hereby commits, in accordance with ISO 22301 Clause 5.1, to:

                    - providing the human, financial and infrastructural resources required for the BCMS;
                    - ensuring that BCMS requirements are integrated into the business processes of the organisation;
                    - promoting the importance of effective business continuity management and conformity with this policy;
                    - ensuring that the BCMS achieves its intended outcomes;
                    - actively guiding and supporting the BCM Officer (Notfallbeauftragte/r) {{ roles.bcm_officer.fullName }} and the Crisis Team Lead {{ roles.crisis_team_lead.fullName }};
                    - promoting continual improvement of the BCMS;
                    - participating personally in crisis-team activations and management reviews.

                    Overall accountability is non-delegable and remains with top management. Operational responsibility is delegated to the BCM Officer {{ roles.bcm_officer.fullName }}, who reports directly to the executive board.

                    ## 5. Roles and responsibilities (Cl. 5.3, BSI 200-4 Section 4.4)
                    Pursuant to ISO 22301 Clause 5.3 and BSI 200-4 Section 4.4 the following roles are bindingly assigned:

                    - **Top management** ({{ approval.chain }}) — approval of the policy, provision of resources, conduct of management review under Clause 9.3, ultimate escalation authority during a crisis.
                    - **BCM Officer (Notfallbeauftragte/r)** — {{ roles.bcm_officer.fullName }}: stewardship of the BCMS, reporting to top management, coordination of the BIA, maintenance of the policy, oversight of escalation and notification chains. BSI 200-4 Section 4.4 explicitly requires the appointment of a deputy.
                    - **Crisis Team Chair / Crisis Team Lead** — {{ roles.crisis_team_lead.fullName }}: convocation of the Crisis Team, binding crisis decisions, activation of BCM plans.
                    - **Information Security Officer (ISB)** — {{ roles.isb.fullName }}: interface with the ISMS, assessment of security incidents with continuity impact (A.5.29 + A.5.30).
                    - **Process Owners** — accountable for maintenance and currency of business continuation, recovery and restoration plans for their respective processes.
                    - **BC Plan Owners** — maintenance of individual BC plans, participation in exercises, contribution to lessons-learned.
                    - **Employees and contractors** — awareness of this policy, compliance with emergency instructions, reporting of disruptions through the defined channels.

                    The full approval chain for this policy is: {{ approval.chain }}.

                    ## 6. Compliance commitment (Cl. 5.2 c)
                    {{ tenant.legal_name }} commits to compliance with applicable legal, regulatory and contractual requirements, in particular:

                    - **ISO 22301:2019** "Security and resilience — Business continuity management systems — Requirements" — primary BCMS framework.
                    - **ISO 22313:2020** — Application guidance to ISO 22301 (informative).
                    - **BSI 200-4 (2023)** "Business Continuity Management" — where BSI IT-Grundschutz has been adopted (see scope document).
                    - **ISO/IEC 27001:2022 A.5.29** ("Information security during disruption") and **A.5.30** ("ICT readiness for business continuity").
                    - **EU-DORA Regulation (EU) 2022/2554 Articles 11 + 12** — Response and recovery, ICT business continuity policy (where applicable as a financial entity).
                    - **NIS2 Directive (EU) 2022/2555** — risk-management measures including backup and crisis management.
                    - **KRITIS regulation** and sector-specific requirements (BSI-KritisV, IT-SiG 2.0, sectoral minimum standards).
                    - **GDPR Article 32(1)(b) and (c)** — ability to restore the availability and access to personal data in a timely manner in the event of a physical or technical incident.

                    The list of applicable requirements is reviewed at least annually by the BCM Officer in coordination with Compliance and Legal.

                    ## 7. Continual improvement (Cl. 10.1, BSI 200-4 Section 9)
                    The BCMS is continually improved. The organisation commits to:

                    - conducting internal BCMS audits in accordance with Clause 9.2;
                    - conducting exercises and tests in accordance with the separate Exercise & Testing Programme (frequency: {{ bcm.exercise_frequency }});
                    - evaluating real-world activations through lessons-learned procedures;
                    - handling nonconformities and corrective actions in accordance with Clause 10.1;
                    - conducting an annual management review of the BCMS in accordance with Clause 9.3;
                    - regular effectiveness review of the chosen BCM strategies (per the BC Strategy document);
                    - evaluation of external sources (BSI advisories, ENISA Threat Landscape, sector CSIRT warnings) to refine threat understanding;
                    - regular maintenance of the Crisis Team composition and ongoing training of Crisis Team members.

                    BCMS effectiveness is measured by quantitative indicators (e.g. RTO attainment rate, number of completed and failed exercises, average activation duration, number of open corrective actions) and qualitative assessments (e.g. maturity self-assessment per BSI 200-4 Section 9.2). Indicators are reported quarterly to the executive board and form the basis for improvement decisions.

                    ## 7a. BCMS maturity model
                    {{ tenant.legal_name }} assesses BCMS maturity annually using a stage model (aligned with BSI 200-4 Section 9.2):

                    - **Stage 1 (Initial)** — BCMS activities exist but are unstructured and reactive;
                    - **Stage 2 (Repeatable)** — defined procedures but without consistent documentation;
                    - **Stage 3 (Defined)** — fully documented BCMS, regular exercises, validated BC plans;
                    - **Stage 4 (Measured)** — data-driven evaluation, KPI-led steering, continual improvement;
                    - **Stage 5 (Optimising)** — proactive adaptation to threat landscape, sector benchmarking, innovation.

                    Target maturity is at least Stage 3 across all in-scope areas, Stage 4 for regulatorily sensitive areas (DORA CIF, KRITIS functions). The annual maturity assessment is part of management review and drives investment prioritisation.

                    ## 8. Review, approval and communication (Cl. 5.2 d-g)
                    This policy is reviewed at least every {{ bcm.review_interval_months }} months (BSI 200-4 Section 4.1: at least annually) and additionally upon material changes. Material changes include in particular: organisational changes (M&A, new sites, divestitures), serious incidents involving BCM activation, regulatory changes (e.g. new DORA RTS, NIS2 transposition acts), and failed exercises with strategic impact.

                    Approval is granted by top management in accordance with the approval chain {{ approval.chain }}. In group structures (holding) the parent-level Notfallleitlinie is formally adopted by the executive board of each subsidiary (adoption record, not re-issuance).

                    The policy is **actively communicated** (BSI 200-4 Section 4.1 explicitly demands `aktive Kommunikation`): publication on the intranet, integration into onboarding, mandatory annual training in line with A.6.3 of ISO 27001, and communication to third parties via contracts (A.5.20). Read-receipts are recorded centrally; for employees in regulated functions (e.g. Crisis Team members, Process Owners of critical processes) annual refresher training is mandatorily evidenced.

                    ## 9. Violations, sanctions and incentives
                    Violations of this policy or of subordinate BC plans may result in disciplinary measures pursuant to the Personnel Security Policy (A.6.4 of ISO 27001), civil consequences and criminal prosecution where criminal conduct exists. For third parties, contractual consequences pursuant to A.5.20 take effect (warning, contractual penalty, special termination right). Incentives for active participation in exercises and crisis-team work are reinforced positively (e.g. documented consideration in personnel-development reviews, support for BCM certifications such as ISO 22301 Lead Implementer/Auditor).

                    ## 10. Relationship with subordinate BCMS documents
                    This policy is the apex of the BCMS document set. Subordinate documents that are mandatory under this policy: BCMS Scope Statement (Cl. 4.3), BIA Methodology (Cl. 8.2.2), BCM Risk Assessment Methodology (Cl. 8.2.3), BC Strategy (Cl. 8.3), BC Plan Template (Cl. 8.4.4), Incident Response & Communication Procedure (Cl. 8.4.3), Crisis Management Plan (Cl. 8.4.4), Recovery / Restoration Plans (Cl. 8.4.5), Exercise & Testing Programme (Cl. 8.6), BCMS Internal Audit Programme (Cl. 9.2), BCMS Management Review Procedure (Cl. 9.3), Nonconformity & Corrective Action Procedure (Cl. 10.1), and - where BSI 200-4 has been adopted - the Notfallhandbuch (BSI 200-4 Section 7). Each subordinate document references this policy in its header and consistently uses the terms and roles defined here.

                    ---
                    *This Business Continuity Policy commits the organisation to maintaining business continuity and to continually improving the BCMS. Approved by top management.*
                section:
                    purpose:
                        title: 'Purpose and preamble'
                        body: |-
                            This policy establishes the BCMS of {{ tenant.legal_name }} pursuant to ISO 22301:2019 Clauses 5.1 and 5.2. It is the highest normative statement on continuity and stands alongside the Information Security Policy. BSI 200-4 (2023) Section 4.1 requires the Notfallleitlinie as a binding top-management commitment.
                    scope:
                        title: 'Scope'
                        body: |-
                            The scope is bindingly defined in the separate *BCMS Scope Statement* (Clause 4.3). This policy applies to all employees, contractors and third parties within the documented scope. Exclusions are justified and shall not impair the achievement of continuity objectives (Cl. 4.3 c).
                    objectives:
                        title: 'BCMS objectives'
                        body: |-
                            The overarching objectives of life-safety, process preservation, damage minimisation, compliance, trust preservation and continual improvement form the framework for measurable annual objectives under Clause 6.2. Current objectives are documented in *BCMS Annual Objectives*.
                    commitment:
                        title: 'Top-management commitment'
                        body: |-
                            The executive board of {{ tenant.legal_name }} ({{ approval.chain }}) commits, pursuant to Clause 5.1, to providing resources, integrating the BCMS into business processes, and continually improving it. Overall accountability is non-delegable.
                    roles:
                        title: 'Roles and responsibilities'
                        body: |-
                            BCM Officer {{ roles.bcm_officer.fullName }} stewards the BCMS operationally; Crisis Team Chair {{ roles.crisis_team_lead.fullName }} owns crisis decisions; the ISB {{ roles.isb.fullName }} provides the interface with the ISMS pursuant to A.5.29/A.5.30. BSI 200-4 Section 4.4 explicitly requires deputies.
                    compliance:
                        title: 'Compliance commitment'
                        body: |-
                            Applicable frameworks: ISO 22301:2019, ISO/IEC 27001:2022 A.5.29/A.5.30, EU-DORA Articles 11/12 (where applicable as a financial entity), NIS2, BSI 200-4, KRITIS regulation, GDPR Article 32. The list of applicable requirements is reviewed at least annually.
                    improvement:
                        title: 'Continual improvement'
                        body: |-
                            The BCMS is continually improved through internal audits (Cl. 9.2), exercises (Cl. 8.6, frequency: {{ bcm.exercise_frequency }}), lessons-learned, corrective actions (Cl. 10.1) and management review (Cl. 9.3).
                    review:
                        title: 'Review and communication'
                        body: |-
                            Reviewed at least every {{ bcm.review_interval_months }} months (BSI 200-4: at least annually) and additionally upon material changes. Active communication via intranet, onboarding, training and third-party contracts (BSI 200-4 Section 4.1).
                tailoring_field:
                    bcms_objectives:
                        label: 'Organisation-specific BCMS annual objectives'
                        placeholder: 'Example: "1) Recover all critical customer-facing processes within 4 hours during 2026; 2) annual full-scale exercise with regulator participation; 3) reduce unplanned downtime by 25 % year-on-year; 4) achieve 100 % BC-Plan coverage for Tier-1 processes by Q3."'
                    bcm_governance_structure:
                        label: 'BCM governance and escalation structure'
                        placeholder: 'Example: "BCM Officer reports quarterly to the executive board; monthly BCMS steering committee with ISB, Compliance and IT leadership; once activated the Crisis Team meets at least twice daily until stand-down. Escalation to the supervisory board upon red-level crisis."'
                    sector_specific_continuity_drivers:
                        label: 'Sector-specific continuity drivers and supervisory requirements'
                        placeholder: 'Example: "As a regulated financial entity we are subject to EU-DORA Article 11 with binding recovery requirements for critical or important functions. Supervised by BaFin/Bundesbank with reporting deadlines under DORA RTS at 4h/24h/1mo. Critical-third-party register submitted quarterly to the supervisor."'
        bcms_scope_statement:
            v1:
                title: 'BCMS Scope Statement'
                body: |-
                    # BCMS Scope Statement of {{ tenant.legal_name }}

                    *Document class: Policy (governance — defines applicability) | Standards: ISO 22301:2019 Clause 4.3, BSI 200-4 Section 3.2 | Review interval: every {{ bcm.review_interval_months }} months*

                    ## 1. Purpose of this document
                    This document establishes the scope of the Business Continuity Management System of {{ tenant.legal_name }} pursuant to ISO 22301:2019 Clause 4.3 ("The organization shall determine the boundaries and applicability of the business continuity management system to establish its scope"). It is the foundation document for the Business Continuity Policy, the BIA, the BCM Risk Assessment, the BC Strategy and all BC Plans. The scope statement is binding; every downstream BCMS activity references this scope.

                    ## 2. Organisational scope
                    The scope covers the following legal entities of {{ tenant.legal_name }}:

                    - **Parent entity**: {{ tenant.legal_name }}, represented by the executive board {{ approval.chain }}.
                    - **Subsidiaries** (where the holding feature is enabled): see Annex 1 (list of consolidated entities with BCMS inclusion).
                    - **Branches and operating sites**: per the separate site list (see Section 3).

                    Excluded are exclusively those legally separate entities that operate their own BCM programmes and have provided evidence supporting mutual recognition.

                    ## 3. Geographic scope (sites)
                    The geographic scope comprises all sites flagged "BCMS-relevant" in the asset and location register. The list is maintained by the BCM Officer {{ roles.bcm_officer.fullName }} and reconciled with the asset register at least annually. Each newly added site undergoes an initial assessment (criticality, RTO assignment, BC-plan need) within 90 days of commissioning. Sites in foreign jurisdictions are addressed in the *Geographic Annex* together with their local regulatory expectations (e.g. country-specific BCM requirements, local supervisory authorities).

                    ## 4. Process scope (in-scope business processes)
                    The scope covers all business processes of {{ tenant.legal_name }} with a criticality rating of **medium or higher** in the business-process register. The BCMS explicitly addresses the following process categories:

                    - critical core processes (Tier 1, RTO ≤ 4 hours);
                    - important supporting processes (Tier 2, RTO ≤ 24 hours);
                    - standard processes with BCM relevance (Tier 3, RTO ≤ 72 hours);
                    - deferrable processes with documented acceptance (Tier 4, RTO > 72 hours).

                    The assigned process owners are the binding Process Owners under this document and are accountable for maintenance and exercising of the related BC plans.

                    ## 5. Product and service scope
                    The scope covers all products and services for which continuity commitments are given to external stakeholders (customers, contract partners, supervisory authorities). These include in particular:

                    - availability and recovery commitments in service-level agreements (SLAs);
                    - regulatorily required minimum availability levels (e.g. EU-DORA Article 11 for critical or important functions);
                    - contractual delivery commitments with penalty exposure;
                    - publicly communicated service levels (website availability, hotline hours).

                    ## 6. ICT-service dependencies in scope
                    The BCMS addresses the ICT services and systems required by in-scope processes per the asset register (with confidentiality / integrity / availability classification). Covered are in particular: core applications, databases, identity providers, network infrastructure, data backups, cloud services and critical third parties (per the supplier register). The interface with the ISMS is established via A.5.30 of ISO 27001 (ICT readiness for business continuity).

                    ## 7. Exclusions with justification (Cl. 4.3 c)
                    ISO 22301 Clause 4.3 c requires that exclusions shall not impair the organisation's ability to meet its continuity objectives. The following categories may be excluded with justification:

                    - processes with criticality "low" AND no external contractual commitments;
                    - sites without critical business activity (e.g. pure representative offices);
                    - subsidiaries with their own recognised BCM programme.

                    Each exclusion is documented in Annex 2 (Exclusion Register) with justification, risk assessment and top-management approval. Exclusions are reassessed during the annual scope review.

                    ## 8. Interfaces with other management systems
                    The BCMS operates in an integrated manner with the following management systems of {{ tenant.legal_name }}:

                    - **ISMS pursuant to ISO/IEC 27001:2022** — shared asset register, common incident classification (A.5.24-A.5.28), interface via A.5.29 + A.5.30, optional shared internal-audit programme and management review.
                    - **Privacy management system (PIMS)** under GDPR and ISO/IEC 27701 — interface via GDPR Article 32 (availability and restorability of personal data) and Article 33 (notification duties when BC activation has a privacy nexus).
                    - **Quality management (QMS)** under ISO 9001 — interface via process ownership and supplier management.
                    - **IT service management (ITSM)** under ISO/IEC 20000 — interface via incident, change and capacity management.

                    Combined audits across multiple management systems are explicitly anticipated (BSI 200-4 Section 9.1.4 recommends audit consolidation).

                    ## 8a. Applicable regulatory scopes
                    The BCMS scope bindingly addresses the following regulatory expectations to the extent they are relevant to {{ tenant.legal_name }}:

                    - **EU-DORA Articles 11 + 12** (financial entities) — response and recovery, ICT business continuity policy with recovery requirements for critical or important functions (CIF);
                    - **EU-DORA Article 28** — third-party risk management with mandatory exit strategies for critical ICT third parties;
                    - **NIS2 Directive (EU) 2022/2555** — risk-management measures including backup concept and crisis management;
                    - **BSI-KritisV** and **IT Security Act 2.0** — minimum continuity standards for KRITIS operators;
                    - **ISO/IEC 27001:2022 A.5.29** and **A.5.30** — interface ISMS / BCMS;
                    - **GDPR Article 32(1)(b) and (c)** — restorability of personal data;
                    - **MaRisk AT 7.3** and supervisor-notification duties under EU-DORA;
                    - **TKG / TR 03182** and sectoral minimum standards (e.g. energy, healthcare, transportation).

                    The BCM Officer {{ roles.bcm_officer.fullName }} maintains a consolidated regulator matrix that maps each requirement to the covering BCMS document node.

                    ## 9. Maintenance, review intervals and change triggers
                    This scope statement is updated at least annually (review interval {{ bcm.review_interval_months }} months) and upon every material organisational event. Change triggers include in particular:

                    - commissioning or closure of a BCMS-relevant site;
                    - material reorganisations of business units or subsidiaries (M&A, carve-out, rebranding);
                    - launch or discontinuation of critical products / services with external continuity commitment;
                    - material change to the ICT architecture (cloud migration, data-centre consolidation, new outsourcing relationship);
                    - changes to applicable regulatory requirements (e.g. new DORA RTS versions, NIS2 transposition acts, sector supervisory directions);
                    - findings from internal audits or management review with a scope nexus.

                    Maintenance is owned by the BCM Officer {{ roles.bcm_officer.fullName }}; updates are approved by {{ approval.chain }}. Changes are recorded in audit-proof form in the audit trail.

                    ## 9a. Scope validation
                    Scope validity is reviewed annually against the following criteria:

                    - **Completeness** — are all business processes with criticality ≥ medium represented in scope? Reconciled against the business-process register.
                    - **Consistency** — do the sites listed in scope match the asset/site register? Do the Process Owners match the persons recorded in the HR system?
                    - **Currency** — are all change triggers of the past 12 months recorded and is the scope adjusted accordingly?
                    - **Justification of exclusions** — are all exclusions currently justified and approved by top management?
                    - **Audit suitability** — can the scope be explained understandably to external auditors in a 30-minute briefing? (Practical test per BSI 200-4 audit preparation).

                    Validation results feed into the annual BCMS status report to the executive board.

                    ## 10. Group and holding aspects
                    Where the holding feature is enabled for {{ tenant.legal_name }} the following additionally applies:

                    - the group-level scope is bindingly defined in the group-level BCMS scope document; the present document concretises the subsidiary scope and shall not fall short of the group-level scope;
                    - local sites and processes that go beyond the group minimum (e.g. local regulatory duties) are added explicitly;
                    - interfaces to group-level crisis-team coordination are documented in the Crisis Management Plan;
                    - reporting duties towards group-level BCM coordination are documented in Annex 3.

                    ---
                    *This scope statement forms part of the BCMS document set and is updated annually as well as upon material organisational change.*
                section:
                    purpose:
                        title: 'Purpose and applicability'
                        body: |-
                            Establishes BCMS scope per ISO 22301 Clause 4.3. Binding foundation for the Business Continuity Policy, BIA, BCM-RA, BC Strategy and all BC Plans. BSI 200-4 Section 3.2 corresponds materially.
                    organisational:
                        title: 'Organisational scope'
                        body: |-
                            Covers {{ tenant.legal_name }} and all BCMS-relevant subsidiaries per Annex 1. Holding structures are also reflected via the parent-level Notfallleitlinie.
                    geographic:
                        title: 'Geographic scope'
                        body: |-
                            All sites flagged BCMS-relevant. Maintained by BCM Officer {{ roles.bcm_officer.fullName }}. New sites: 90-day initial assessment. Foreign sites with local regulatory annex.
                    process:
                        title: 'Process scope'
                        body: |-
                            All business processes with criticality ≥ medium. Four tiers (Tier 1: RTO ≤ 4h, Tier 2: ≤ 24h, Tier 3: ≤ 72h, Tier 4: > 72h). Process Owners accountable for BC plan upkeep.
                    services:
                        title: 'Product/service scope'
                        body: |-
                            All products and services with external continuity commitments (SLAs, regulatorily required minimum availability such as EU-DORA Article 11, contract-penalty exposures).
                    exclusions:
                        title: 'Exclusions with justification'
                        body: |-
                            Exclusions under Clause 4.3 c only where the achievement of continuity objectives is not impaired. Documented in the Exclusion Register (Annex 2) with justification, risk assessment and top-management approval.
                    interfaces:
                        title: 'Interfaces with other management systems'
                        body: |-
                            ISMS (ISO 27001:2022 A.5.29/A.5.30), PIMS (GDPR Articles 32/33), QMS (ISO 9001), ITSM (ISO/IEC 20000). Integrated audits anticipated per BSI 200-4 Section 9.1.4.
                tailoring_field:
                    in_scope_processes:
                        label: 'In-scope business processes with criticality'
                        placeholder: 'Example: "Tier 1 (RTO ≤ 4h): online banking, card-payment authorisation, SEPA payment processing. Tier 2 (RTO ≤ 24h): account opening, branch operations, customer hotline. Tier 3 (RTO ≤ 72h): reporting, marketing, internal HR. Tier 4: non-time-critical back-office activities."'
                    excluded_units_with_justification:
                        label: 'Excluded units/processes with justification'
                        placeholder: 'Example: "Subsidiary XY GmbH (research-only site, no customer interaction, no payment processing) — operates its own BCM programme to the same standard with annual recognition. Brussels representative office (purely liaison, no operational activity). Justification: no contribution to critical customer-facing processes, no DORA Article 11 nexus."'
                    external_continuity_commitments:
                        label: 'External continuity commitments (SLAs, regulatory, contractual)'
                        placeholder: 'Example: "Online banking 99.9 % availability per annum (contractual); ATM network 99.5 % (regulatory expectation); DORA Article 11 for critical or important functions; SLAs with top-10 corporate customers committing to 4-hour recovery; public hotline 24/7 with maximum 30 minutes outage tolerance."'
        bia_methodology:
            v1:
                title: 'Business Impact Analysis Methodology'
                body: |-
                    # BIA Methodology of {{ tenant.legal_name }}

                    *Document class: Methodology (defines HOW, not the analysis itself) | Standards: ISO 22301:2019 Clause 8.2.2, BSI 200-4 Section 5.2.1 | Review interval: every 24 months*

                    ## 1. Purpose and scope
                    This methodology bindingly governs the conduct of the Business Impact Analysis (BIA) pursuant to ISO 22301:2019 Clause 8.2.2 ("The organization shall implement and maintain a systematic process for analysing the business impact"). It is owned by the BCM Officer {{ roles.bcm_officer.fullName }} and is the methodological foundation for determining criticality ratings, recovery objectives and dependencies of in-scope business processes. BSI 200-4 Section 5.2.1 corresponds materially.

                    ## 2. Glossary of binding key terms
                    The following terms are bindingly defined within this methodology:

                    - **MTPD (Maximum Tolerable Period of Disruption)** — the maximum period during which a process may remain disrupted before existence-threatening consequences materialise. Reference: business survival. Non-negotiable.
                    - **RTO (Recovery Time Objective)** — the target time for resuming a process after disruption. RTO < MTPD always applies.
                    - **RPO (Recovery Point Objective)** — the maximum acceptable data loss measured as a time interval prior to the disruption.
                    - **MBCO (Minimum Business Continuity Objective)** — the minimum acceptable activity level of a process during disruption (e.g. "50 % of normal transaction volume").
                    - **RTC (Recovery Time Capability)** — the recovery capability actually achieved, measured against RTO.

                    These definitions are mandatory across all BCMS documentation.

                    ## 3. Impact categories (defined before BIA execution)
                    Impact assessment uses the following pre-defined categories:

                    1. **Financial impact** — revenue loss, contractual penalties, additional cost, liquidity exposure;
                    2. **Regulatory impact** — breach of supervisory law (BaFin, BSI-KritisV, DORA, NIS2), enforcement risk, fines;
                    3. **Reputational impact** — media coverage, customer attrition, brand damage;
                    4. **Life-safety / health and safety** — endangerment of employees, customers, neighbouring residents (top priority);
                    5. **Operational impact** — internal process disruptions, employee productivity, supply-chain effects.

                    ## 4. Impact rating scale
                    Impacts are rated on a 5-step scale (1 = negligible, 5 = existence-threatening) with at least the Financial and Regulatory categories anchored to monetary or quantitative thresholds (e.g. level 4 = > 1 m EUR damage / fine exposure > 500 k EUR / supervisory enforcement). Concrete anchors are tenant-specific and documented in the BIA annex. The highest rated category determines the overall process rating (maximum principle, in line with BSI 200-4 Section 5.2.1).

                    ## 5. Time windows for impact assessment
                    Impact is rated along the following time horizons after disruption start: 1 hour, 4 hours, 24 hours, 72 hours, 1 week, 1 month. Each window receives an expected impact rating. From the impact-over-time curve, MTPD and RTO are derived (RTO = the first window in which the impact is rated "no longer acceptable").

                    ## 6. Dependency analysis
                    For every in-scope process the following dependency categories shall be captured:

                    - **Upstream dependencies** — inputs, suppliers, ICT services, systems;
                    - **Downstream dependencies** — receiving processes, customers, outputs;
                    - **Lateral dependencies** — peer processes with mutual influence;
                    - **Resource dependencies** — people (key roles, minimum staffing), infrastructure (site, power, climate control), ICT systems (asset register reference), third parties (supplier register).

                    Dependencies are maintained as a directed graph in the BIA database and feed the recovery sequence in recovery plans.

                    ## 7. Data-collection method
                    The BIA is primarily conducted through **facilitated workshops** with process owners and key stakeholders (default approach). Alternative methods: structured interviews or validated questionnaires. Method selection is decided by the BIA Lead in coordination with the BCM Officer; workshops are preferred for Tier 1 and Tier 2 processes, questionnaires for Tier 3 and Tier 4. Collection must include at minimum: process description, inputs/outputs, key roles, ICT dependencies, seasonality, impact rating per time window, proposed MBCO.

                    ## 8. Roles
                    - **BIA Lead** — owns conduct, facilitation and consolidation; typically the BCM Officer or a designated deputy.
                    - **Process Owner** — provides data on their process, validates results, approves the final BIA rating for their process.
                    - **Reviewer** — independent reviewer (e.g. ISB {{ roles.isb.fullName }}, Compliance, Internal Audit), verifies plausibility and consistency with other BIA results.
                    - **Top-management sponsor** — final approval of consolidated BIA results.

                    ## 9. Review, approval and re-execution triggers
                    BIA results are consolidated, reviewed by the BIA Lead, cross-checked by an independent reviewer, and approved by top management. Re-execution triggers:

                    - regular re-execution every 24 months (default);
                    - after material organisational change (reorganisation, M&A, new site);
                    - upon launch of new products or services;
                    - after a real BC activation as part of lessons-learned;
                    - after a full-scale exercise with significant lessons-learned impact;
                    - upon change of the impact-rating scale.

                    ## 10. Relationship with other BCMS documents
                    BIA results are a binding input for:

                    - **BCM Risk Assessment Methodology** (§2.3) — impact scale is reused;
                    - **BC Strategy** (§2.4) — tier assignment drives strategy choice;
                    - **BC Plans** (§2.5) — RTO/RPO/MBCO are inherited;
                    - **Recovery and Restoration Plans** (§2.8) — sequence and target times;
                    - **Exercise & Testing Programme** (§2.9) — most critical processes are exercised first.

                    ## 10a. Tooling and data management
                    The BIA is captured in a central BCMS tool that bindingly provides:

                    - structured capture per business process with mandatory fields for impact rating per time window, MTPD, RTO, RPO, MBCO, dependencies;
                    - version control with predecessor tracking and justification for every change;
                    - interfaces to the asset register (reconciliation of ICT dependencies), the supplier register (third-party dependencies), the HR system (key roles) and the risk register (linkage of BIA rating to risk entries);
                    - reporting functions for the BIA consolidation report (tier distribution, top-N processes by impact, dependency hotspots);
                    - audit trail with audit-proof logging of all changes.

                    BIA capture outside the central tool (e.g. in local spreadsheets) is acceptable only as a temporary workshop intermediate; consolidation must occur in the central tool.

                    ## 10b. BIA participant training and competence
                    All BIA Leads and Reviewers complete a documented BIA training of at least 4 hours covering: methodology of this document, terminology MTPD/RTO/RPO/MBCO/RTC, workshop facilitation techniques, plausibility verification, conflict resolution where ratings diverge. Process Owners receive a short briefing of at least 1 hour before participating in a BIA workshop. Training attendance is recorded in the HR development system; without recorded training a person may not act as BIA Lead or Reviewer.

                    ## 11. Data quality and plausibility checks
                    BIA results must be plausible and consistent. Verification criteria:

                    - **MTPD-RTO consistency** — for every process RTO < MTPD must hold; reviewer corrects violations.
                    - **Resource consistency** — ICT dependencies reported in the BIA must reconcile with the asset register.
                    - **Impact consistency** — processes of similar function and significance should receive similar ratings; outliers must be justified.
                    - **Seasonality** — processes with seasonally varying significance (e.g. year-end close, peak season) receive seasonal rating annexes.

                    Prior to release a consolidated BIA report is produced summarising key findings, unusual ratings, gap findings (e.g. missing deputies, monolithic ICT dependencies without failover) and recommendations for the BC Strategy.

                    ## 11a. Sample consolidation report (minimum content)
                    The consolidated BIA report contains at minimum:

                    - tier distribution (number of processes per Tier 1-4) with trend comparison against last year's BIA;
                    - top-10 processes by financial impact at 24-hour disruption;
                    - top-5 ICT dependency hotspots (systems on which several Tier-1 processes depend);
                    - top-5 supplier-concentration risks (third parties on which several Tier-1 processes depend);
                    - key-role hotspots (persons on whom several Tier-1 processes depend);
                    - target-actual comparison of RTC against RTO from the most recent exercise;
                    - recommended investment priorities for the following year;
                    - open methodological questions and proposals for the next methodology update.

                    The report is presented to the executive board as part of management review under Clause 9.3.

                    ## 12. Confidentiality and retention of BIA results
                    BIA results regularly contain sensitive information about business strategy, customer concentrations, key persons and weaknesses. Default classification: `Internal-Confidential` per BSI 200-4 Section 6. Distribution on a need-to-know basis. Retention: current version plus three predecessor versions in audit-proof form; older versions archived. Access rights are reconciled quarterly with the HR system (personnel-change trigger).

                    ---
                    *This methodology is reviewed every 24 months and additionally upon material change.*
                section:
                    purpose:
                        title: 'Purpose of the methodology'
                        body: |-
                            Binding methodology for BIA execution under ISO 22301 Cl. 8.2.2 and BSI 200-4 Section 5.2.1. Owned by BCM Officer {{ roles.bcm_officer.fullName }}.
                    glossary:
                        title: 'Glossary (MTPD/RTO/RPO/MBCO/RTC)'
                        body: |-
                            MTPD = maximum tolerable period of disruption (existence question); RTO = recovery time objective (must be < MTPD); RPO = max. data loss; MBCO = minimum activity level during disruption; RTC = actually achieved capability (target vs. actual).
