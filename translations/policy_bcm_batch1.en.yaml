                    purpose:
                        title: 'Purpose and demarcation'
                        body: |-
                            BCM-RA pursuant to ISO 22301 Cl. 8.2.3 and BSI 200-4 Section 5.3 — focused on availability risks; complements but does not replace the ISMS-RA under ISO 27005:2022.
