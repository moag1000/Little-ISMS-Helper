                    bcm_likelihood_calibration:
                        label: 'Tenant-specific likelihood calibration'
                        placeholder: 'Example: "Level 4 (Likely, 5y) is calibrated to 3 years for cyber risks based on industry incident rates. Level 3 (Possible, 10y) is shortened to 7 years for flooding following the 2026 climate-risk reassessment. Key-person risk uses a separate scale aligned with bench-strength analysis."'
