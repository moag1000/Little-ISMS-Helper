                    purpose:
                        title: 'Purpose and scope'
                        body: |-
                            Binding structure for all BC Plans pursuant to ISO 22301 Cl. 8.4.4 and BSI 200-4 Section 6. One plan per process; the template is the minimum standard.
                    plan_types:
                        title: 'BSI three-plan model vs. ISO single plan'
                        body: |-
                            BSI 200-4: separate Geschaeftsfortfuehrungs-, Wiederanlauf- and Wiederherstellungsplan. Non-BSI tenants: integrated BC plan covering all three aspects.
                    identification:
                        title: 'Plan identification'
                        body: |-
                            Plan ID, process, owner, BC-Plan Owner, version, status, classification Internal-Confidential (BSI 200-4 Section 6).
                    activation:
                        title: 'Activation conditions'
                        body: |-
                            Trigger list; activation decision by Crisis Team Lead {{ roles.crisis_team_lead.fullName }} or executive board {{ approval.chain }} per §2.6.
                    actions:
