                tailoring_field:
                    impact_scale_anchors:
                        label: 'Monetary/quantitative anchors of the impact scale'
                        placeholder: 'Example: "Level 5 (existence-threatening) = > 10 m EUR damage OR licence revocation OR > 5 % market-share loss. Level 4 (critical) = 1-10 m EUR OR supervisory enforcement. Level 3 (significant) = 100 k - 1 m EUR OR mandatory regulator notification. Level 2 (minor) = 10-100 k EUR. Level 1 (negligible) = < 10 k EUR."'
