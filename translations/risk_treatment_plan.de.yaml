iso_9001_bridge:
    treatment_strategy: 'ISO 9001 nennt das "Risikobehandlung im Kontext der Prozesssteuerung" (Klausel 6.1.2). Strategien (Avoid/Mitigate/Transfer/Accept) sind in der 9001 nicht explizit benannt, werden aber im PDCA-Zyklus implizit umgesetzt.'
    residual_risk: 'In ISO 9001 ist das das "verbleibende Risiko" nach Implementierung der Prozesssteuerung (6.1.1) — wird in der 9001 nicht zwingend quantifiziert, in 27001 schon.'
