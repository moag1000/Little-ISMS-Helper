  help:
    concept_title: 'Was ist ein TIA?'
    concept_body: >
      Ein Transfer Impact Assessment (TIA) prüft, ob ein Drittland-Empfänger –
      z. B. ein US-Cloud-Anbieter wie AWS oder Google – trotz nationalem Überwachungsrecht
      (z. B. FISA 702, CLOUD Act) ein im Wesentlichen gleichwertiges Schutzniveau
      bieten kann. Ohne diesen Nachweis dürfen SCCs oder BCRs nicht allein als
      Übermittlungsgarantie eingesetzt werden (EuGH C-311/18, Schrems-II, 16.07.2020).
    norm_ref: 'Rechtsgrundlagen: DSGVO Art. 46 (Geeignete Garantien), Art. 49 (Ausnahmen), EuGH Schrems-II, EDPB Empfehlung 01/2020 (Zusatzmaßnahmen)'
    destination_country: 'ISO-3166-1 Alpha-2-Ländercode, z. B. US, CN, IN'
    recipient_name: 'Name des konkreten Empfängers (z. B. AWS Inc., Google LLC)'
    transfer_mechanism: 'Rechtsgrundlage für die Drittlandübermittlung gem. Art. 46 / 49 DSGVO'
    law_surveillance_risk: >
      Schritt 3 der EDPB-Methodik: Beurteilung der Rechtsordnung des Ziellandes.
      Prüfen Sie, ob nationales Recht (z. B. US FISA 702 / EO 12333 / CLOUD Act,
      CN Nationaler Geheimdienstgesetz Art. 7) den Übermittlungsmechanismus
      unterläuft. Beschreiben Sie, in welchem Umfang die Schutzgarantie beeinträchtigt wird.
    supplementary_measures: >
      Schritt 4 der EDPB-Methodik: Ergänzende Maßnahmen zum Ausgleich der Schutzlücke.
      Beispiele: Ende-zu-Ende-Verschlüsselung mit Schlüsseln nur beim Verantwortlichen,
      Pseudonymisierung vor Übermittlung, vertragliches Verbot weitergehender
      Behördenzugriffe, Transparenzpflichten des Importeurs.
    residual_risk_rating: >
      Schritt 5 der EDPB-Methodik: Restrisiko nach Anwendung der Zusatzmaßnahmen.
      Hoch = Übermittlung muss ausgesetzt werden (Art. 58(2)(f) DSGVO).
    conclusion: 'Zusammenfassendes Ergebnis und ggf. Bedingungen für die Übermittlung'

