# System-Anforderungen
requirements:
  php:
    version: '8.2.0'
    extensions:
      - pdo
      - pdo_mysql
      - mbstring
      - intl
      - xml
      - json
      - zip
      - opcache
      - curl
      - openssl

  symfony:
    version: '7.3.0'

  database:
    supported:
      - mysql: '8.0'
      - mariadb: '10.6'
      - postgresql: '14.0'
      - sqlite: '3.35'

  permissions:
    writable_directories:
      - var/cache
      - var/log
      - var/sessions
      - public/uploads

  memory_limit: '256M'
  max_execution_time: 300
