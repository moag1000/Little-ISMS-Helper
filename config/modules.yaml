modules:
  core:
    name: 'Core ISMS'
    description: 'Basis-Funktionalität für ISO 27001 ISMS'
    required: true
    icon: 'shield-check'
    entities:
      - ISMSContext
      - ISMSObjective
    routes:
      - /context
    dependencies: []

  assets:
    name: 'Asset Management'
    description: 'Verwaltung von Informationswerten und Assets'
    required: false
    icon: 'database'
    entities:
      - Asset
    routes:
      - /asset
    dependencies: []

  risks:
    name: 'Risk Management'
    description: 'Risikobewertung und -behandlung'
    required: false
    icon: 'exclamation-triangle'
    entities:
      - Risk
    routes:
      - /risk
    dependencies:
      - assets

  controls:
    name: 'Control Management (SoA)'
    description: 'ISO 27001 Annex A Controls und Statement of Applicability'
    required: false
    icon: 'list-check'
    entities:
      - Control
    routes:
      - /soa
    dependencies: []

  incidents:
    name: 'Incident Management'
    description: 'Verwaltung von Sicherheitsvorfällen'
    required: false
    icon: 'bell'
    entities:
      - Incident
    routes:
      - /incident
    dependencies:
      - controls

  audits:
    name: 'Audit Management'
    description: 'Interne Audits und Prüfungen'
    required: false
    icon: 'clipboard-check'
    entities:
      - InternalAudit
      - AuditChecklist
    routes:
      - /audit
    dependencies:
      - controls

  training:
    name: 'Training & Awareness'
    description: 'Schulungen und Sensibilisierung'
    required: false
    icon: 'graduation-cap'
    entities:
      - Training
    routes:
      - /training
    dependencies: []

  reviews:
    name: 'Management Review'
    description: 'Management-Bewertungen des ISMS'
    required: false
    icon: 'users'
    entities:
      - ManagementReview
    routes:
      - /review
    dependencies:
      - audits

  bcm:
    name: 'Business Continuity Management'
    description: 'Geschäftsprozesse und BCM/BIA'
    required: false
    icon: 'rotate'
    entities:
      - BusinessProcess
    routes:
      - /bcm
    dependencies:
      - assets

  compliance:
    name: 'Multi-Framework Compliance'
    description: 'Compliance-Management für ISO 27001, TISAX, DORA'
    required: false
    icon: 'scale-balanced'
    entities:
      - ComplianceFramework
      - ComplianceRequirement
      - ComplianceMapping
    routes:
      - /compliance
    dependencies:
      - controls

  authentication:
    name: 'User & Role Management'
    description: 'Benutzerverwaltung, Rollen und Berechtigungen mit Azure AD Integration'
    required: true
    icon: 'user-shield'
    entities:
      - User
      - Role
      - Permission
    routes:
      - /security/login
      - /admin/users
      - /admin/roles
    dependencies: []

  audit_logging:
    name: 'Audit Logging'
    description: 'Umfassendes Audit-Logging für alle System-Aktivitäten'
    required: false
    icon: 'file-lines'
    entities:
      - AuditLog
    routes:
      - /audit-log
    dependencies:
      - authentication

  # ─── FormType-Norm-Gating Module-Keys (T31, 2026-05-07) ───────────────────
  # Konsolidiert nach Compliance-Manager-Review (8 statt 17 vorgeschlagene).
  # Aktiviert FormType-Subsections + Whole-Form-Gating für Norm-Compliance.

  privacy:
    name: 'Privacy & Datenschutz (GDPR + ISO 27701)'
    description: 'EU DSGVO + BDSG + ISO 27701 PIMS — DPO-Workflows, DSR (Art. 12-23), Data Breach 72h (Art. 33/34), DPIA (Art. 35), Consent (Art. 7)'
    required: false
    icon: 'shield-lock'
    entities:
      - Consent
      - ProcessingActivity
      - DataBreach
      - DataSubjectRequest
      - DataProtectionImpactAssessment
    routes:
      - /consent
      - /processing-activity
      - /data-breach
      - /data-subject-request
      - /dpia
    dependencies:
      - assets

  nis2_dora:
    name: 'NIS2 & DORA Compliance'
    description: 'EU Cyber-Resilience: NIS2 24h/72h/1mo Reporting (Art. 23) + DORA ICT-Risk-Management (Art. 6-44) + 4h-Initial-Report'
    required: false
    icon: 'building-shield'
    entities:
      - Incident
      - Risk
      - Supplier
    routes: []
    dependencies:
      - incidents
      - risks
      - controls

  ai_governance:
    name: 'AI Governance (EU AI Act + ISO 42001)'
    description: 'KI-System-Klassifikation per EU AI Act Art. 6+Annex III, Risk-Management Art. 9-29 für High-Risk-AI, ISO 42001 AIMS-Controls'
    required: false
    icon: 'cpu'
    entities:
      - Asset
    routes: []
    dependencies:
      - assets

  cloud_security:
    name: 'Cloud Security (ISO 27017/18, BSI C5/AIC4)'
    description: 'Cloud-Provider + Cloud-User Controls + Shared-Responsibility-Mapping. ISO 27017 Cloud-Sicherheit, ISO 27018 PII-in-Cloud, BSI C5:2026, BSI AIC4 für AI-Cloud'
    required: false
    icon: 'cloud'
    entities:
      - Control
      - Asset
    routes: []
    dependencies:
      - controls
      - assets

  vulnerability_intel:
    name: 'Vulnerability & Threat Intelligence'
    description: 'CVE/CVSS-Tracking + EPSS + KEV-Liste + Threat-Intel + MITRE ATT&CK Tactics/Techniques + STIX 2.1 IoCs'
    required: false
    icon: 'bug'
    entities:
      - Vulnerability
      - ThreatIntelligence
    routes:
      - /vulnerability
      - /threat-intelligence
    dependencies:
      - risks

  marisk:
    name: 'MaRisk (DACH-Banken/Versicherer)'
    description: 'Mindestanforderungen Risikomanagement BaFin (parallel zu DORA bestehend) — Outsourcing AT 9, Risk-Bearing-Capacity AT 4, Compliance-Funktion AT 4.4'
    required: false
    icon: 'building-columns'
    entities:
      - Supplier
      - Risk
    routes: []
    dependencies:
      - risks
      - compliance

  tisax:
    name: 'TISAX (Auto-Industrie)'
    description: 'TISAX VDA-ISA Information Security Assessment + Prototype Protection für Tier-1/Tier-2 Auto-Industrie-Lieferanten'
    required: false
    icon: 'car-front'
    entities:
      - PrototypeProtectionAssessment
    routes:
      - /prototype-protection
    dependencies:
      - controls

  quantitative_risk:
    name: 'Quantitative Risk (FAIR/CRQ)'
    description: 'FAIR-Methodologie mit Monte-Carlo-Simulation, Loss Event Frequency, ALE/SLE — für Board-Reporting + DORA Art. 6(2) Risk-Tolerance-Statement'
    required: false
    icon: 'chart-line'
    entities:
      - Risk
    routes: []
    dependencies:
      - risks

  notifications:
    name: 'Notification-Rules + Webhooks'
    description: 'Tenant-konfigurierbare Notification-Rules pro Event-Typ, Channels (Email-Digest, Webhook+HMAC, In-App-Center), SLA-Timer-Events für DORA Art. 19 + NIS-2 Art. 23 + GDPR Art. 33 Deadlines'
    required: false
    icon: 'bell'
    entities:
      - NotificationRule
      - NotificationChannel
      - NotificationDelivery
      - SlaDeadlineMonitor
    routes:
      - admin_notification_rule_index
      - admin_notification_channel_index
      - notification_center_index
    dependencies:
      - core

  eu_authority_reporting:
    name: 'EU-Behörden-Reporting-Hub'
    description: 'Pre-Filling und Export für DACH/EU-Behörden-Meldepflichten — BSI-Meldestelle (NIS-2), BfDI + 16 LfDI (DSGVO Art. 33), DSB-AT, EDÖB-CH, BaFin MVP (DORA-Incidents), ESAs (DORA RoI XBRL), ANSSI/CERT-FR, NCSC.ch'
    required: false
    icon: 'building-shield'
    entities:
      - AuthorityTemplate
      - Nis2RegistrationProfile
    routes:
      - authority_hub_index
    dependencies:
      - compliance

  tisax_isa:
    name: 'TISAX-ISA-Self-Assessment'
    description: 'VDA-ISA-Self-Assessment-Workflow — Q&A pro Reifegrad-Level, Gap-Plan-Generator, TISAX-Label-Vorbereitung für Tier-1/Tier-2-Automotive-Lieferanten'
    required: false
    icon: 'clipboard-check'
    entities:
      - TisaxAssessment
      - TisaxAssessmentResponse
    routes:
      - tisax_assessment_index
    dependencies:
      - tisax

  ai_act:
    name: 'EU-AI-Act-Klassifizierung'
    description: 'EU-Verordnung 2024/1689 Hochrisiko-KI-System-Inventar — Art. 6/9 Klassifizierung, Conformity-Assessment-Tracker, Annex III Use-Case-Mapping'
    required: false
    icon: 'robot'
    entities:
      - AiSystemClassification
    routes:
      - ai_system_classification_index
    dependencies:
      - assets
      - ai_governance

  cra_sbom:
    name: 'EU-Cyber-Resilience-Act SBOM'
    description: 'CRA-Compliance ab 2027 — SBOM-Inventar (CycloneDX/SPDX), Vulnerability-Mapping, Konformitätsbewertung-Workflow für Produkte mit digitalen Elementen'
    required: false
    icon: 'package'
    entities:
      - SbomComponent
      - CraConformityAssessment
    routes:
      - cra_sbom_index
    dependencies:
      - vulnerability_intel

  procedures:
    name: 'Verfahrens-Authoring'
    description: 'Procedures-Editor neben Policies — strukturierte Verfahrensanweisungen mit Step-by-Step-Handbüchern, Owner-Approval-Workflow, ISO 27001 Clause 7.5.3 Documented-Information-Control'
    required: false
    icon: 'list-ordered'
    entities:
      - Procedure
      - ProcedureStep
    routes:
      - procedure_index
    dependencies:
      - core

  # ─── Operational Modules (2026-05-10 inventory) ─────────────────────────────
  # Added after full controller/entity audit: 14 controllers with live routes
  # had no corresponding config/modules.yaml entry → invisible on /admin/modules.

  documents:
    name: 'Dokumente & Policies'
    description: 'Policy- und Dokumenten-Bibliothek mit Versions-Kontrolle, Genehmigungsworkflow und Effektivitätsprüfung (ISO 27001 Clause 7.5)'
    required: false
    icon: 'file-earmark-text'
    entities:
      - Document
      - DocumentSection
      - DocumentControlLink
      - PolicyTemplate
      - PolicyAcknowledgement
    routes:
      - /document
      - /policy
    dependencies:
      - core
    wizard_consumers:
      # PolicyWizard WRITES Documents (generator), READS DocumentRepository
      # ComplianceWizard Privacy/Bcm/Bsi/Dora checks READ DocumentRepository
      - policy_wizard
      - compliance_wizard_privacy
      - compliance_wizard_bcm
      - compliance_wizard_bsi
      - compliance_wizard_dora
      - compliance_wizard_iso27701

  suppliers:
    name: 'Lieferanten & Drittparteien'
    description: 'Lieferantenbewertung, AVV-Tracking, DORA-Drittparteien-Register (Art. 28) — ISO 27001 A.5.19-5.22'
    required: false
    icon: 'truck'
    entities:
      - Supplier
      - SupplierCriticalityLevel
    routes:
      - /supplier
    dependencies:
      - risks
      - assets
    wizard_consumers:
      # ComplianceWizard Dora checks READ SupplierRepository (exit strategy, third-party register)
      - compliance_wizard_dora

  locations:
    name: 'Standorte & Infrastruktur'
    description: 'Physische Standorte, Rechenzentren und Infrastruktur-Inventar für Asset-Zuordnung und BIA'
    required: false
    icon: 'geo-alt'
    entities:
      - Location
    routes:
      - /location
    dependencies:
      - assets

  persons:
    name: 'Personen & Kontakte'
    description: 'Interne und externe Kontakte — ISB, DSB, Risk-Owner, Lieferanten-Kontakte'
    required: false
    icon: 'person-badge'
    entities:
      - Person
    routes:
      - /person
    dependencies:
      - core
    wizard_consumers:
      # PolicyWizard reads PersonRepository for DPO/BCM-Officer selection
      - policy_wizard

  interested_parties:
    name: 'Interessierte Parteien'
    description: 'ISO 27001 Clause 4.2 — Stakeholder-Analyse: Kunden, Behörden, Aufsichtsrat, Zertifizierungsstellen'
    required: false
    icon: 'people'
    entities:
      - InterestedParty
    routes:
      - /interested-party
    dependencies:
      - core

  objectives:
    name: 'ISMS-Ziele'
    description: 'ISO 27001 Clause 6.2 — messbare Informationssicherheitsziele mit KPI-Tracking und Fortschrittsüberwachung'
    required: false
    icon: 'bullseye'
    entities:
      - ISMSObjective
    routes:
      - /objective
    dependencies:
      - core

  change_requests:
    name: 'Change Management'
    description: 'Änderungsmanagement nach ISO 27001 A.8.32 — RFC-Workflow, Risikobewertung, Genehmigungspfad'
    required: false
    icon: 'arrow-left-right'
    entities:
      - ChangeRequest
    routes:
      - /change-request
    dependencies:
      - controls

  patches:
    name: 'Patch Management'
    description: 'Patch-Tracking und CVE-Behebung — NIS2 Art. 21.2(e) + ISO 27001 A.8.8 Vulnerability-Mgmt'
    required: false
    icon: 'bandaid'
    entities:
      - Patch
    routes:
      - /patch
    dependencies:
      - vulnerability_intel

  corrective_actions:
    name: 'Korrekturmaßnahmen'
    description: 'ISO 27001 Clause 10.2 — Nonconformity-Tracking, Root-Cause-Analyse, Wirksamkeitsprüfung aus Audit-Findings'
    required: false
    icon: 'wrench'
    entities:
      - CorrectiveAction
    routes:
      - /corrective-action
    dependencies:
      - audits

  evidence:
    name: 'Evidence Management'
    description: 'Nachweisdokumente für Controls und Audit-Findings — Datei-Upload mit Audit-Trail (ISO 27001 A.5.36)'
    required: false
    icon: 'paperclip'
    entities: []
    routes:
      - /evidence
    dependencies:
      - audits
      - controls

  workflows:
    name: 'Workflow-Automatisierung'
    description: 'Event-getriebene Genehmigungs-Workflows — GDPR Art. 33, DORA Art. 19, ISO 27001 A.6.8 (Data Breach 72h, Incident-Response, Risk-Treatment, DPIA)'
    required: false
    icon: 'diagram-3'
    entities:
      - Workflow
      - WorkflowInstance
      - WorkflowStep
    routes:
      - /workflow
    dependencies:
      - core

  risk_appetite:
    name: 'Risikoappetit & Toleranz'
    description: 'ISO 27001 Clause 6.1.3 + DORA Art. 6(2) — Risikoappetit-Schwellwerte für Financial, Operational, Reputational und Compliance-Risiken'
    required: false
    icon: 'speedometer'
    entities:
      - RiskAppetite
      - RiskApprovalConfig
    routes:
      - /risk-appetite
    dependencies:
      - risks

  risk_treatment_plans:
    name: 'Risikobehandlungspläne'
    description: 'ISO 27001 Clause 6.1.3 — strukturierte RTP-Dokumente mit Maßnahmen-Tracking und 4-Augen-Genehmigung'
    required: false
    icon: 'journal-check'
    entities:
      - RiskTreatmentPlan
    routes:
      - /risk-treatment-plan
    dependencies:
      - risks
      - controls

  analytics:
    name: 'Analytics & KPI-Dashboard'
    description: 'ISMS-Kennzahlen, KPI-Snapshots, Trend-Charts — Management-Ready Reporting für ISO 27001 Clause 9.1'
    required: false
    icon: 'bar-chart-line'
    entities:
      - KpiSnapshot
      - KpiThresholdConfig
    routes:
      - /analytics
    dependencies:
      - core

  report_builder:
    name: 'Report Builder'
    description: 'Konfigurierbarer Berichts-Generator für Management-Reports, Gap-Reports, Portfolio-Reports'
    required: false
    icon: 'layout-text-sidebar'
    entities:
      - CustomReport
    routes:
      - /report-builder
      - /reports
    dependencies:
      - core

  scheduled_reports:
    name: 'Geplante Berichte'
    description: 'Automatisierte Report-Auslieferung per E-Mail-Digest zu konfigurierbaren Zeitplänen'
    required: false
    icon: 'calendar-check'
    entities:
      - ScheduledReport
      - ScheduledTask
    routes:
      - /reports/scheduled
    dependencies:
      - report_builder

  portfolio_reports:
    name: 'Portfolio- & Konzern-Reports'
    description: 'Mandanten-übergreifende Rollup-Reports für Holding-CISO und Konzern-Auditor (ROLE_GROUP_CISO)'
    required: false
    icon: 'collection'
    entities:
      - PortfolioSnapshot
    routes:
      - /reports/management/portfolio
      - /group-report
    dependencies:
      - core

