framework:
    workflows:
        prototype_protection_assessment_lifecycle:
            type: state_machine
            marking_store:
                type: method
                property: status
            supports:
                - App\Entity\PrototypeProtectionAssessment
            initial_marking: draft
            places:
                - draft
                - in_review
                - approved
                - rejected
                - expired
            transitions:
                # TISAX VDA-ISA 6.0 Prototype-Protection-Assessment. Approve ist
                # Vertraulichkeits-Zertifikat → 4-Augen Pflicht.
                submit_for_review:
                    from: draft
                    to: in_review
                    metadata:
                        roles: [ROLE_MANAGER]
                        module: prototype_protection
                approve:
                    from: in_review
                    to: approved
                    metadata:
                        roles: [ROLE_CISO, ROLE_MANAGER]
                        four_eyes: true
                        module: prototype_protection
                reject:
                    from: in_review
                    to: rejected
                    metadata:
                        roles: [ROLE_CISO, ROLE_MANAGER]
                        reason_required: true
                        module: prototype_protection
                expire:
                    from: approved
                    to: expired
                    metadata:
                        roles: [ROLE_MANAGER]
                        reason_required: true
                        module: prototype_protection
                rework:
                    from: rejected
                    to: draft
                    metadata:
                        roles: [ROLE_MANAGER]
                        module: prototype_protection
                renew:
                    from: expired
                    to: draft
                    metadata:
                        roles: [ROLE_MANAGER]
                        module: prototype_protection
