framework:
    workflows:
        processing_activity_lifecycle:
            type: state_machine
            marking_store:
                type: method
                property: status
            supports:
                - App\Entity\ProcessingActivity
            initial_marking: draft
            places:
                - draft
                - in_review
                - approved
                - published
                - archived
            transitions:
                submit_for_review:
                    from: draft
                    to: in_review
                    metadata:
                        roles: [ROLE_USER, ROLE_MANAGER, ROLE_DPO]
                        tone_target: info
                approve:
                    from: in_review
                    to: approved
                    metadata:
                        roles: [ROLE_MANAGER, ROLE_DPO]
                        reason_required: false
                request_changes:
                    from: in_review
                    to: draft
                    metadata:
                        roles: [ROLE_MANAGER, ROLE_DPO]
                        reason_required: true
                publish:
                    from: approved
                    to: published
                    metadata:
                        roles: [ROLE_MANAGER, ROLE_DPO]
                        module: privacy
                archive:
                    from: published
                    to: archived
                    metadata:
                        roles: [ROLE_MANAGER, ROLE_DPO]
                        reason_required: true
                restore:
                    from: archived
                    to: published
                    metadata:
                        roles: [ROLE_MANAGER, ROLE_DPO]
                        reason_required: true
                activate:
                    # Direct draft→published for programmatic service-layer use
                    # (e.g. ProcessingActivityService::activate() after validation).
                    # Role: ROLE_MANAGER only.
                    from: draft
                    to: published
                    metadata:
                        roles: [ROLE_MANAGER, ROLE_DPO]
                        reason_required: false
