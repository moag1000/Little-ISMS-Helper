framework:
    workflows:
        management_review:
            type: state_machine
            marking_store:
                type: method
                property: status
            supports:
                - App\Entity\WorkflowInstance
            initial_marking: pending
            places:
                - pending
                - in_progress
                - approved
                - rejected
                - cancelled
            transitions:
                start:
                    from: pending
                    to: in_progress
                    metadata:
                        roles: [ROLE_USER, ROLE_MANAGER]
                        tone_target: info
                approve:
                    from: in_progress
                    to: approved
                    metadata:
                        roles: [ROLE_CISO, ROLE_ADMIN]
                        four_eyes: true
                        tone_target: success
                reject:
                    from: in_progress
                    to: rejected
                    metadata:
                        roles: [ROLE_CISO, ROLE_ADMIN]
                        reason_required: true
                        tone_target: danger
                cancel:
                    from: pending
                    to: cancelled
                    metadata:
                        roles: [ROLE_MANAGER]
                        reason_required: true
                        tone_target: warning
                cancel_in_progress:
                    from: in_progress
                    to: cancelled
                    metadata:
                        roles: [ROLE_MANAGER]
                        reason_required: true
                        tone_target: warning
            metadata:
                regulatory_metadata:
                    standard: "ISO 27001:2022 Cl. 9.3"
                    sla_hours: null
                    escalation_threshold_hours: null
                    escalation_role: ROLE_ADMIN
                steps:
                    -   name: "Input Preparation"
                        description: "ISB/CISO collects review inputs: audit results, KPIs, incident trends, risk status, stakeholder feedback (Cl. 9.3.2)"
                        order: 1
                        approver_role: ROLE_CISO
                        step_type: approval
                        days_to_complete: 14
                        is_required: true
                        auto_progress_conditions:
                            type: field_completion
                            entity: ManagementReview
                            fields: [auditResults, changesRelevantToISMS]
                    -   name: "Review Execution"
                        description: "Management conducts the review meeting and documents decisions (Cl. 9.3.3)"
                        order: 2
                        approver_role: ROLE_ADMIN
                        step_type: approval
                        days_to_complete: 7
                        is_required: true
                        auto_progress_conditions:
                            type: field_completion
                            entity: ManagementReview
                            fields: [decisions, reviewDate]
                    -   name: "Action Planning"
                        description: "Document improvement actions, assign owners and deadlines"
                        order: 3
                        approver_role: ROLE_CISO
                        step_type: approval
                        days_to_complete: 7
                        is_required: true
                        auto_progress_conditions:
                            type: field_completion
                            entity: ManagementReview
                            fields: [actionItems]
                    -   name: "Follow-up Verification"
                        description: "Verify action items are implemented as planned"
                        order: 4
                        approver_role: ROLE_CISO
                        step_type: approval
                        days_to_complete: 30
                        is_required: true
