framework:
    workflows:
        incident_high_severity:
            type: state_machine
            marking_store:
                type: method
                property: status
            supports:
                - App\Entity\WorkflowInstance
            initial_marking: pending
            places:
                - pending
                - in_progress
                - approved
                - rejected
                - cancelled
            transitions:
                start:
                    from: pending
                    to: in_progress
                    metadata:
                        roles: [ROLE_USER, ROLE_MANAGER]
                        tone_target: info
                approve:
                    from: in_progress
                    to: approved
                    metadata:
                        roles: [ROLE_CISO, ROLE_MANAGER]
                        four_eyes: true
                        tone_target: success
                reject:
                    from: in_progress
                    to: rejected
                    metadata:
                        roles: [ROLE_CISO, ROLE_MANAGER]
                        reason_required: true
                        tone_target: danger
                cancel:
                    from: pending
                    to: cancelled
                    metadata:
                        roles: [ROLE_MANAGER]
                        reason_required: true
                        tone_target: warning
                cancel_in_progress:
                    from: in_progress
                    to: cancelled
                    metadata:
                        roles: [ROLE_MANAGER]
                        reason_required: true
                        tone_target: warning
            metadata:
                regulatory_metadata:
                    standard: "ISO 27001:2022 Cl. 5.24-5.28"
                    sla_hours: 24
                    escalation_threshold_hours: 12
                    escalation_role: ROLE_ADMIN
                steps:
                    -   name: "Immediate Response (CISO)"
                        description: "Activate crisis team, initiate containment, inform stakeholders"
                        order: 1
                        approver_role: ROLE_CISO
                        step_type: approval
                        days_to_complete: 0
                        is_required: true
                    -   name: "Crisis Management (Crisis Team)"
                        description: "Coordinate all response measures, management briefing, external communication"
                        order: 2
                        approver_role: ROLE_CRISIS_MANAGER
                        step_type: approval
                        days_to_complete: 0
                        is_required: true
                    -   name: "Technical Response (Security + IT)"
                        description: "Forensic preservation, incident containment, system recovery"
                        order: 3
                        approver_role: ROLE_SECURITY_MANAGER
                        step_type: approval
                        days_to_complete: 0
                        is_required: true
                    -   name: "Legal/Compliance Check (Legal + DPO)"
                        description: "Verify notification requirements (NIS2, GDPR), inform contractual partners"
                        order: 4
                        approver_role: ROLE_DPO
                        step_type: approval
                        days_to_complete: 0
                        is_required: true
                    -   name: "Recovery Validation (CISO + IT Manager)"
                        description: "Validate system integrity, ensure business continuity, approve return to normal operations"
                        order: 5
                        approver_role: ROLE_CISO
                        step_type: approval
                        days_to_complete: 1
                        is_required: true
                    -   name: "Post-Incident Review (Management)"
                        description: "Executive summary, budget for improvements, policy updates"
                        order: 6
                        approver_role: ROLE_MANAGER
                        step_type: approval
                        days_to_complete: 14
                        is_required: true
