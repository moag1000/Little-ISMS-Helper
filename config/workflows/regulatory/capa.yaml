framework:
    workflows:
        capa:
            type: state_machine
            marking_store:
                type: method
                property: status
            supports:
                - App\Entity\WorkflowInstance
            initial_marking: pending
            places:
                - pending
                - in_progress
                - approved
                - rejected
                - cancelled
            transitions:
                start:
                    from: pending
                    to: in_progress
                    metadata:
                        roles: [ROLE_USER, ROLE_MANAGER]
                        tone_target: info
                approve:
                    from: in_progress
                    to: approved
                    metadata:
                        roles: [ROLE_CISO, ROLE_AUDITOR]
                        tone_target: success
                reject:
                    from: in_progress
                    to: rejected
                    metadata:
                        roles: [ROLE_CISO, ROLE_AUDITOR]
                        reason_required: true
                        tone_target: danger
                cancel:
                    from: pending
                    to: cancelled
                    metadata:
                        roles: [ROLE_MANAGER]
                        reason_required: true
                        tone_target: warning
                cancel_in_progress:
                    from: in_progress
                    to: cancelled
                    metadata:
                        roles: [ROLE_MANAGER]
                        reason_required: true
                        tone_target: warning
            metadata:
                regulatory_metadata:
                    standard: "ISO 27001:2022 Cl. 10.1"
                    sla_hours: null
                    escalation_threshold_hours: null
                    escalation_role: ROLE_CISO
                steps:
                    -   name: "Root Cause Analysis"
                        description: "Analyze the root cause of the nonconformity"
                        order: 1
                        approver_role: ROLE_USER
                        step_type: approval
                        days_to_complete: 14
                        is_required: true
                        auto_progress_conditions:
                            type: field_completion
                            entity: CorrectiveAction
                            fields: [rootCauseAnalysis]
                    -   name: "Action Plan Approval"
                        description: "CISO approves the corrective action plan and timeline"
                        order: 2
                        approver_role: ROLE_CISO
                        step_type: approval
                        days_to_complete: 7
                        is_required: true
                    -   name: "Implementation"
                        description: "Execute the corrective actions as planned"
                        order: 3
                        approver_role: ROLE_USER
                        step_type: approval
                        days_to_complete: 30
                        is_required: true
                        auto_progress_conditions:
                            type: field_completion
                            entity: CorrectiveAction
                            fields: [actualCompletionDate]
                    -   name: "Effectiveness Verification"
                        description: "Internal auditor verifies the corrective action is effective (ISO 27001 Cl. 10.1(f)). If ineffective, loops back to Implementation."
                        order: 4
                        approver_role: ROLE_AUDITOR
                        step_type: approval
                        days_to_complete: 14
                        is_required: true
                        reject_action: loop_back
                        reject_target_step: 3
                    -   name: "Closure"
                        description: "CISO closes the corrective action after verified effectiveness"
                        order: 5
                        approver_role: ROLE_CISO
                        step_type: approval
                        days_to_complete: 3
                        is_required: true
