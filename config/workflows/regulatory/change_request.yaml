framework:
    workflows:
        change_request:
            type: state_machine
            marking_store:
                type: method
                property: status
            supports:
                - App\Entity\WorkflowInstance
            initial_marking: pending
            places:
                - pending
                - in_progress
                - approved
                - rejected
                - cancelled
            transitions:
                start:
                    from: pending
                    to: in_progress
                    metadata:
                        roles: [ROLE_USER, ROLE_MANAGER]
                        tone_target: info
                approve:
                    from: in_progress
                    to: approved
                    metadata:
                        roles: [ROLE_CISO, ROLE_MANAGER]
                        tone_target: success
                reject:
                    from: in_progress
                    to: rejected
                    metadata:
                        roles: [ROLE_CISO, ROLE_MANAGER]
                        reason_required: true
                        tone_target: danger
                cancel:
                    from: pending
                    to: cancelled
                    metadata:
                        roles: [ROLE_MANAGER]
                        reason_required: true
                        tone_target: warning
                cancel_in_progress:
                    from: in_progress
                    to: cancelled
                    metadata:
                        roles: [ROLE_MANAGER]
                        reason_required: true
                        tone_target: warning
            metadata:
                regulatory_metadata:
                    standard: "ISO 27001:2022 A.8.32 / Cl. 6.3"
                    sla_hours: null
                    escalation_threshold_hours: null
                    escalation_role: ROLE_CISO
                steps:
                    -   name: "Security Risk Assessment"
                        description: "CISO assesses the security impact of the proposed change"
                        order: 1
                        approver_role: ROLE_CISO
                        step_type: approval
                        days_to_complete: 5
                        is_required: true
                        auto_progress_conditions:
                            type: field_completion
                            entity: ChangeRequest
                            fields: [riskAssessment]
                    -   name: "CAB Review & Approval"
                        description: "Change Advisory Board reviews and decides on the change request. Reject loops back to Security Risk Assessment."
                        order: 2
                        approver_role: ROLE_MANAGER
                        step_type: approval
                        days_to_complete: 7
                        is_required: true
                        reject_action: loop_back
                        reject_target_step: 1
                    -   name: "Implementation"
                        description: "Approved change is implemented according to plan"
                        order: 3
                        approver_role: ROLE_USER
                        step_type: approval
                        days_to_complete: 14
                        is_required: true
                        auto_progress_conditions:
                            type: field_completion
                            entity: ChangeRequest
                            fields: [actualImplementationDate]
                    -   name: "Post-Implementation Verification"
                        description: "Verify change was implemented correctly and no side effects occurred"
                        order: 4
                        approver_role: ROLE_CISO
                        step_type: approval
                        days_to_complete: 5
                        is_required: true
