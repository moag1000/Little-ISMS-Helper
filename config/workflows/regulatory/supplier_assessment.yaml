framework:
    workflows:
        supplier_assessment:
            type: state_machine
            marking_store:
                type: method
                property: status
            supports:
                - App\Entity\WorkflowInstance
            initial_marking: pending
            places:
                - pending
                - in_progress
                - approved
                - rejected
                - cancelled
            transitions:
                start:
                    from: pending
                    to: in_progress
                    metadata:
                        roles: [ROLE_USER, ROLE_MANAGER]
                        tone_target: info
                approve:
                    from: in_progress
                    to: approved
                    metadata:
                        roles: [ROLE_CISO, ROLE_MANAGER]
                        four_eyes: true
                        tone_target: success
                reject:
                    from: in_progress
                    to: rejected
                    metadata:
                        roles: [ROLE_CISO, ROLE_MANAGER]
                        reason_required: true
                        tone_target: danger
                cancel:
                    from: pending
                    to: cancelled
                    metadata:
                        roles: [ROLE_MANAGER]
                        reason_required: true
                        tone_target: warning
                cancel_in_progress:
                    from: in_progress
                    to: cancelled
                    metadata:
                        roles: [ROLE_MANAGER]
                        reason_required: true
                        tone_target: warning
            metadata:
                regulatory_metadata:
                    standard: "ISO 27001:2022 A.5.19-22 / GDPR Art. 28 / DORA Art. 28-30"
                    sla_hours: null
                    escalation_threshold_hours: null
                    escalation_role: ROLE_CISO
                steps:
                    -   name: "Initial Security Assessment"
                        description: "Complete security questionnaire, classify criticality, and perform initial risk assessment"
                        order: 1
                        approver_role: ROLE_USER
                        step_type: approval
                        days_to_complete: 14
                        is_required: true
                        auto_progress_conditions:
                            type: field_completion
                            entity: Supplier
                            fields: [criticality, lastSecurityAssessment]
                    -   name: "DPO Privacy Review (GDPR Art. 28)"
                        description: "DPO reviews if supplier processes personal data: verify DPA/AVV, check data transfer safeguards"
                        order: 2
                        approver_role: ROLE_DPO
                        step_type: approval
                        days_to_complete: 7
                        is_required: false
                        auto_progress_conditions:
                            type: field_completion
                            entity: Supplier
                            fields: [gdprAvContractSigned]
                            condition: "gdprProcessorStatus != none"
                    -   name: "Contract & SLA Verification"
                        description: "Verify security requirements in contract: SLAs, audit rights, incident notification, exit strategy"
                        order: 3
                        approver_role: ROLE_CISO
                        step_type: approval
                        days_to_complete: 7
                        is_required: true
                        auto_progress_conditions:
                            type: field_completion
                            entity: Supplier
                            fields: [contractStartDate]
                    -   name: "DORA ICT Assessment (Financial Sector)"
                        description: "For ICT third-party providers: assess substitutability, concentration risk, exit strategy (DORA Art. 28-30)"
                        order: 4
                        approver_role: ROLE_CISO
                        step_type: approval
                        days_to_complete: 7
                        is_required: false
                        auto_progress_conditions:
                            type: field_completion
                            entity: Supplier
                            fields: [ictCriticality, substitutability, hasExitStrategy]
                            condition: "ictCriticality != null"
                    -   name: "Management Onboarding Approval"
                        description: "Final management decision based on all assessments. Reject loops back to Initial Assessment for rework."
                        order: 5
                        approver_role: ROLE_MANAGER
                        step_type: approval
                        days_to_complete: 5
                        is_required: true
                        reject_action: loop_back
                        reject_target_step: 1
