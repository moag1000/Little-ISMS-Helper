framework:
    workflows:
        management_review_lifecycle:
            type: state_machine
            marking_store:
                type: method
                property: status
            supports:
                - App\Entity\ManagementReview
            initial_marking: planned
            places:
                - planned
                - completed
                - follow_up_required
            transitions:
                # ISO 27001 Cl. 9.3 — Management Review ist eine der kritischsten
                # Aufzeichnungspflichten des ISMS. Die `complete`-Transition
                # versiegelt die Aufzeichnung → 4-Augen-Pflicht.
                complete:
                    from: planned
                    to: completed
                    metadata:
                        roles: [ROLE_CISO, ROLE_TOP_MGMT]
                        four_eyes: true
                        reason_required: true
                mark_follow_up_required:
                    from: completed
                    to: follow_up_required
                    metadata:
                        roles: [ROLE_CISO, ROLE_MANAGER]
                        reason_required: true
                close_follow_up:
                    from: follow_up_required
                    to: completed
                    metadata:
                        roles: [ROLE_CISO, ROLE_MANAGER]
                        reason_required: true
