# Junior-ISB-Audit-2026-05-22 K-04 — Wave Y.6 Supplier-Lifecycle (DORA Art. 28)
#
# Supplier state-machine. Foundation shipped in Sprint Y.5; K-04 closes the
# remaining gap: `terminate_from_evaluation` now requires four-eyes approval
# in line with DORA Art. 28 (early termination of an ICT third-party service
# provider relationship — even pre-contract — is an audit-relevant decision
# that the regulator expects to be dual-controlled).
framework:
    workflows:
        supplier_lifecycle:
            type: state_machine
            marking_store:
                type: method
                property: status
            supports:
                - App\Entity\Supplier
            initial_marking: evaluation
            places:
                - evaluation
                - active
                - inactive
                - terminated
            transitions:
                # ISO 27001 A.5.19-A.5.22 — Supplier-Lifecycle. Onboarding endet
                # mit `activate` (Vertrag unterschrieben). Termination ist
                # irreversibel → 4-Augen + reason.
                activate:
                    from: evaluation
                    to: active
                    metadata:
                        roles: [ROLE_MANAGER, ROLE_CISO]
                        reason_required: true
                suspend:
                    from: active
                    to: inactive
                    metadata:
                        roles: [ROLE_MANAGER]
                        reason_required: true
                reactivate:
                    from: inactive
                    to: active
                    metadata:
                        roles: [ROLE_MANAGER]
                # Terminate ist Vertragsende — Audit-relevant. 4-Augen Pflicht.
                terminate_from_active:
                    from: active
                    to: terminated
                    metadata:
                        roles: [ROLE_CISO, ROLE_MANAGER]
                        four_eyes: true
                        reason_required: true
                terminate_from_inactive:
                    from: inactive
                    to: terminated
                    metadata:
                        roles: [ROLE_CISO, ROLE_MANAGER]
                        four_eyes: true
                        reason_required: true
                # K-04 (DORA Art. 28): even early termination during the
                # evaluation phase must be dual-controlled — the decision to
                # walk away from a vetted ICT-third-party-candidate is
                # regulator-visible and must be auditable.
                terminate_from_evaluation:
                    from: evaluation
                    to: terminated
                    metadata:
                        roles: [ROLE_CISO, ROLE_MANAGER]
                        four_eyes: true
                        reason_required: true
