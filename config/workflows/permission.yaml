# Junior-ISB-Audit Phase-2 Lifecycle — RBAC core entities (Permission).
#
# ISO 27001 A.5.15-A.5.16 (Access Control + Identity Management) — the
# permission catalog itself is an audit-relevant artifact. An auditor must
# be able to tell which permissions are operationally active, which are
# discouraged-but-tolerated (deprecated), and which are retired (archived).
#
# 4-stage state-machine:
#   draft  → active   (introduce a new permission key into the catalog)
#   active → deprecated  (discourage further role-assignments but keep
#                         existing bindings until role-owners migrate)
#   deprecated → archived (final retirement from the catalog)
#   active → archived  (direct retirement when a permission is replaced)
#   deprecated → active  (reinstatement when the deprecation was premature)
framework:
    workflows:
        permission_lifecycle:
            type: state_machine
            marking_store:
                type: method
                property: status
            supports:
                - App\Entity\Permission
            initial_marking: draft
            places:
                - draft
                - active
                - deprecated
                - archived
            transitions:
                # Initial publish — a freshly-defined permission becomes
                # operational and can be granted to roles.
                activate:
                    from: draft
                    to: active
                    metadata:
                        roles: [ROLE_ADMIN, ROLE_SUPER_ADMIN]
                        reason_required: false
                # Discourage further use without breaking existing role
                # bindings. The auditor expects a reason on the trail.
                deprecate:
                    from: active
                    to: deprecated
                    metadata:
                        roles: [ROLE_ADMIN, ROLE_SUPER_ADMIN]
                        reason_required: true
                # Reinstatement — deprecation was premature or a successor
                # permission was rolled back.
                reactivate:
                    from: deprecated
                    to: active
                    metadata:
                        roles: [ROLE_ADMIN, ROLE_SUPER_ADMIN]
                        reason_required: true
                # Final retirement from a deprecated state — the catalog
                # entry is no longer available for new assignments.
                archive_from_deprecated:
                    from: deprecated
                    to: archived
                    metadata:
                        roles: [ROLE_SUPER_ADMIN]
                        reason_required: true
                # Direct retirement (skipping deprecation) for emergency
                # removal when a permission is replaced or proven unsafe.
                archive_from_active:
                    from: active
                    to: archived
                    metadata:
                        roles: [ROLE_SUPER_ADMIN]
                        reason_required: true
