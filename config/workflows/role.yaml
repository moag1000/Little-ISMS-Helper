# Junior-ISB-Audit Phase-2 Lifecycle — RBAC core entities (Role).
#
# ISO 27001 A.5.15-A.5.18 (Access Control + Privileged-Access-Rights) — the
# role catalog is the spine of RBAC. An archived role becomes unavailable
# for new user-bindings; archival therefore counts as a privileged RBAC
# change and requires 4-eyes per A.5.18 / segregation-of-duties.
#
# 3-stage state-machine:
#   draft  → active     (introduce a new role into the catalog)
#   active → archived   (retire the role — 4-eyes required)
#   archived → active   (re-activate an archived role — 4-eyes required)
framework:
    workflows:
        role_lifecycle:
            type: state_machine
            marking_store:
                type: method
                property: status
            supports:
                - App\Entity\Role
            initial_marking: draft
            places:
                - draft
                - active
                - archived
            transitions:
                # Initial publish — a freshly-defined role becomes
                # available for user assignments.
                activate:
                    from: draft
                    to: active
                    metadata:
                        roles: [ROLE_ADMIN, ROLE_SUPER_ADMIN]
                        reason_required: false
                # Retire a role — this is an RBAC change (A.5.18). Per
                # segregation-of-duties this is dual-controlled. Once
                # archived, the role disappears from the user-assignment
                # UI but historic bindings remain visible on the audit-log.
                archive:
                    from: active
                    to: archived
                    metadata:
                        roles: [ROLE_SUPER_ADMIN, ROLE_ADMIN]
                        four_eyes: true
                        reason_required: true
                # Reactivate an archived role (e.g. organisational pivot
                # reverts a previous re-org). Also 4-eyes — symmetric to
                # archive for audit symmetry.
                reactivate:
                    from: archived
                    to: active
                    metadata:
                        roles: [ROLE_SUPER_ADMIN, ROLE_ADMIN]
                        four_eyes: true
                        reason_required: true
