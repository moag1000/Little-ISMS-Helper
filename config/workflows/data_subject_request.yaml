framework:
    workflows:
        data_subject_request_lifecycle:
            type: state_machine
            marking_store:
                type: method
                property: status
            supports:
                - App\Entity\DataSubjectRequest
            initial_marking: received
            places:
                - received
                - identity_verification
                - in_progress
                - extended
                - completed
                - rejected
            transitions:
                process:
                    from: received
                    to: in_progress
                    metadata:
                        roles: [ROLE_DPO]
                        module: privacy
                complete:
                    from: [in_progress, extended]
                    to: completed
                    metadata:
                        roles: [ROLE_DPO]
                        module: privacy
                reject:
                    from: [in_progress, identity_verification, extended]
                    to: rejected
                    metadata:
                        roles: [ROLE_DPO]
                        four_eyes: true
                        reason_required: true
                        module: privacy
                # X.6: identity verification step — GDPR Art. 12(6), DPO may request
                # proof of identity before processing. Inserted between received → in_progress.
                verify_identity:
                    from: received
                    to: identity_verification
                    metadata:
                        roles: [ROLE_DPO]
                        module: privacy
                # X.6: confirm identity verified, proceed to processing
                confirm_identity:
                    from: identity_verification
                    to: in_progress
                    metadata:
                        roles: [ROLE_DPO]
                        module: privacy
                # X.6: extend deadline per GDPR Art. 12(3) — 30 → 90 days, reason required.
                extend_deadline:
                    from: [received, identity_verification, in_progress]
                    to: extended
                    metadata:
                        roles: [ROLE_DPO]
                        reason_required: true
                        module: privacy
                # X.6: resume processing after extension
                resume_processing:
                    from: extended
                    to: in_progress
                    metadata:
                        roles: [ROLE_DPO]
                        module: privacy
