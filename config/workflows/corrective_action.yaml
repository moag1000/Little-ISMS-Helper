# Junior-ISB-Audit-2026-05-22 CAPA-Lifecycle — Sprint S13.
#
# ISO 27001 Cl. 10.1 d demands that the effectiveness of every corrective
# action is reviewed. C4-04 (RAW_FINDINGS Task 14 #9): the Sprint X.2 state
# machine allowed a direct `completed → verified_effective` jump in YAML
# but no place forced the reviewer to enter a "claimed verified" stage
# first — i.e. the verifier could rubber-stamp the success without ever
# showing the system that they had actually opened the verification step.
#
# Fix: insert an intermediate `verified` place between `completed` and the
# two terminal verdicts. The reviewer must transition `completed → verified`
# (forced, 4-eyes) BEFORE choosing one of the two terminal verdicts. This
# splits the audit-trail into two events:
#   1. `verify`            — verifier asserts they have reviewed evidence
#   2. `confirm_effective` — verdict, success
#   2. `confirm_ineffective` — verdict, failure (triggers C4-01 follow-up CAPA)
#
# Terminal verdicts stay backward-compatible: the existing string values
# `verified_effective` / `verified_ineffective` are preserved so historical
# rows + reports keep working.
framework:
    workflows:
        corrective_action_lifecycle:
            type: state_machine
            marking_store:
                type: method
                property: status
            supports:
                - App\Entity\CorrectiveAction
            initial_marking: planned
            places:
                - planned
                - in_progress
                - completed
                # Junior-ISB-Audit-2026-05-22 CAPA-Lifecycle: NEW intermediate
                # state — verifier has opened verification but not yet decided.
                - verified
                - verified_effective
                - verified_ineffective
                - cancelled
            transitions:
                start:
                    from: planned
                    to: in_progress
                    metadata:
                        roles: [ROLE_USER, ROLE_MANAGER]
                complete:
                    from: in_progress
                    to: completed
                    metadata:
                        roles: [ROLE_MANAGER]
                # Junior-ISB-Audit-2026-05-22 CAPA-Lifecycle: forced
                # `completed → verified` step (ISO 27001 Cl. 10.1 d). The
                # auditor MUST open the verification cycle before they can
                # record a verdict — prevents the Minor-NC of jumping
                # directly from `completed` to `verified_effective`.
                verify:
                    from: completed
                    to: verified
                    metadata:
                        roles: [ROLE_AUDITOR]
                        reason_required: false
                # Verdicts — now sourced from `verified` (intermediate),
                # NOT from `completed`. Audit-trail therefore always has
                # two events: open + verdict.
                confirm_effective:
                    from: verified
                    to: verified_effective
                    metadata:
                        roles: [ROLE_AUDITOR]
                        four_eyes: true
                confirm_ineffective:
                    from: verified
                    to: verified_ineffective
                    metadata:
                        roles: [ROLE_AUDITOR]
                        reason_required: true
                cancel:
                    from: planned
                    to: cancelled
                    metadata:
                        roles: [ROLE_MANAGER]
                        reason_required: true
                retry:
                    from: verified_ineffective
                    to: in_progress
                    metadata:
                        roles: [ROLE_MANAGER]
