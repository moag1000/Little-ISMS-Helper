# Security routes WITHOUT locale prefix (for cleaner URLs and better access control)
security_routes:
    resource:
        path: ../src/Controller/SecurityController.php
        namespace: App\Controller
    type: attribute

# Quick-Fix fallback routes WITHOUT locale prefix — must remain reachable when
# the schema-error that brought the user here also broke the locale resolver.
app_quick_fix_index:
    path: /quick-fix
    controller: App\Controller\QuickFixController::index
    methods: [GET]

app_quick_fix_apply:
    path: /quick-fix/apply
    controller: App\Controller\QuickFixController::apply
    methods: [POST]

app_quick_fix_reconcile:
    path: /quick-fix/reconcile
    controller: App\Controller\QuickFixController::reconcile
    methods: [POST]

app_quick_fix_repair_orphans:
    path: /quick-fix/repair/orphans
    controller: App\Controller\QuickFixController::repairOrphans
    methods: [POST]

app_quick_fix_repair_mismatches:
    path: /quick-fix/repair/tenant-mismatches
    controller: App\Controller\QuickFixController::repairTenantMismatches
    methods: [POST]

app_quick_fix_repair_duplicates:
    path: /quick-fix/repair/duplicates/{entityType}
    controller: App\Controller\QuickFixController::repairDuplicates
    methods: [POST]

app_quick_fix_repair_all:
    path: /quick-fix/repair/all
    controller: App\Controller\QuickFixController::repairAll
    methods: [POST]

app_quick_fix_force_mark_executed:
    path: /quick-fix/force-mark-executed
    controller: App\Controller\QuickFixController::forceMarkExecuted
    methods: [POST]

app_quick_fix_mark_all_phantom_diff:
    path: /quick-fix/mark-all-phantom-diff
    controller: App\Controller\QuickFixController::markAllPhantomDiff
    methods: [POST]

app_quick_fix_force_schema_update:
    path: /quick-fix/force-schema-update
    controller: App\Controller\QuickFixController::forceSchemaUpdate
    methods: [POST]

# Public job-status polling endpoint for QuickFix async jobs.
# Mirrors /admin/jobs/{id}/status but is gated by QuickFixGuard (no auth)
# so the emergency-recovery UI can poll progress while the app boot is
# still degraded (which is the entire reason QuickFix exists).
app_quick_fix_job_status:
    path: /quick-fix/jobs/{id}/status
    controller: App\Controller\QuickFixJobStatusController::status
    methods: [GET]

# Root redirect - smart locale detection (without locale)
app_home:
    path: /
    controller: App\Controller\HomeController::index

# Dashboard route WITH locale prefix
app_dashboard:
    path: /{_locale}/dashboard
    controller: App\Controller\HomeController::dashboard
    requirements:
        _locale: de|en
    defaults:
        _locale: de

# ISMS Journey progress widget dismiss/restore (HomeController)
app_dashboard_dismiss_journey:
    path: /{_locale}/dashboard/dismiss-journey
    controller: App\Controller\HomeController::dismissJourney
    methods: [POST]
    requirements:
        _locale: de|en
    defaults:
        _locale: de

app_dashboard_restore_journey:
    path: /{_locale}/dashboard/restore-journey
    controller: App\Controller\HomeController::restoreJourney
    methods: [GET]
    requirements:
        _locale: de|en
    defaults:
        _locale: de

# App routes WITH locale prefix
app_routes:
    resource:
        path: ../src/Controller/
        namespace: App\Controller
    type: attribute
    prefix: /{_locale}
    requirements:
        _locale: de|en
    defaults:
        _locale: de
    exclude:
        - '../src/Controller/SecurityController.php'
        - '../src/Controller/HomeController.php'
        - '../src/Controller/QuickFixController.php'
        - '../src/Controller/QuickFixJobStatusController.php'
        - '../src/Controller/SsoController.php'
        - '../src/Controller/LifecycleController.php'

# Lifecycle API routes WITHOUT locale prefix — machine-to-machine JSON endpoints;
# locale prefix would break client URLs and is unnecessary for API-style routes.
lifecycle_routes:
    resource: ../src/Controller/LifecycleController.php
    type: attribute

# SSO public routes WITHOUT locale prefix — must be declared AFTER app_routes so
# this registration wins over the locale-prefixed duplicate from the directory scan.
# IdP redirect URIs must be fixed strings; OAuth exact-match at Entra ID / Okta /
# Google / Auth0 rejects locale-prefixed callback URIs.
# Note: use string resource (AttributeFileLoader), NOT {path+namespace} array
# (Psr4DirectoryLoader only handles directories and silently returns an empty
# RouteCollection for single-file resources).
sso_routes:
    resource: ../src/Controller/SsoController.php
    type: attribute
