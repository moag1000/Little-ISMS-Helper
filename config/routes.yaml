# Security routes WITHOUT locale prefix (for cleaner URLs and better access control)
security_routes:
    resource:
        path: ../src/Controller/SecurityController.php
        namespace: App\Controller
    type: attribute

# Quick-Fix fallback routes WITHOUT locale prefix — must remain reachable when
# the schema-error that brought the user here also broke the locale resolver.
app_quick_fix_index:
    path: /quick-fix
    controller: App\Controller\QuickFixController::index
    methods: [GET]

app_quick_fix_apply:
    path: /quick-fix/apply
    controller: App\Controller\QuickFixController::apply
    methods: [POST]

# Root redirect - smart locale detection (without locale)
app_home:
    path: /
    controller: App\Controller\HomeController::index

# Dashboard route WITH locale prefix
app_dashboard:
    path: /{_locale}/dashboard
    controller: App\Controller\HomeController::dashboard
    requirements:
        _locale: de|en
    defaults:
        _locale: de

# Dashboard First Steps routes (HomeController is excluded from attribute scanning)
app_dashboard_dismiss_first_steps:
    path: /{_locale}/dashboard/dismiss-first-steps
    controller: App\Controller\HomeController::dismissFirstSteps
    methods: [POST]
    requirements:
        _locale: de|en
    defaults:
        _locale: de

app_dashboard_restore_first_steps:
    path: /{_locale}/dashboard/restore-first-steps
    controller: App\Controller\HomeController::restoreFirstSteps
    methods: [GET]
    requirements:
        _locale: de|en
    defaults:
        _locale: de

# App routes WITH locale prefix
app_routes:
    resource:
        path: ../src/Controller/
        namespace: App\Controller
    type: attribute
    prefix: /{_locale}
    requirements:
        _locale: de|en
    defaults:
        _locale: de
    exclude:
        - '../src/Controller/SecurityController.php'
        - '../src/Controller/HomeController.php'
        - '../src/Controller/QuickFixController.php'
