# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Application Configuration Parameters
    # Following Symfony Best Practice: Use 'app.' prefix for application parameters

    # Internationalization
    app.supported_locales: ['de', 'en']
    app.default_locale: 'de'

    # Pagination
    app.pagination_items_per_page: 30

    # Session Configuration
    app.session_lifetime: 86400  # 24 hours in seconds

    # Password Reset
    app.password_reset_token_lifetime: 3600  # 1 hour in seconds

    # Risk Management thresholds are owned by App\Risk\RiskMatrixThresholds
    # (single source of truth, ISO 27001 Cl. 6.1.2 b). Do not re-introduce
    # parameters here — change the constants in that class instead.

    # Audit Log Retention ist seit Phase 8L in SystemSettings (category=audit,
    # key=retention_days). Default 730 Tage (ISO 27001 Clause 9.1), Min 365
    # (NIS2 Art. 21.2). Editierbar unter /admin/audit-log/retention.

    # AUD-02: HMAC-SHA256 key for audit-log integrity (tamper detection).
    # Production: set APP_AUDIT_HMAC_KEY to a ≥32-byte random secret.
    # Empty value disables signing (rows persisted without hmac, verify reports disabled).
    app.audit_log_hmac_key: '%env(default::APP_AUDIT_HMAC_KEY)%'

    # WS-1 Feature Flag: dark-launch for mapping-based inheritance suggestions.
    app.compliance.mapping_inheritance.enabled: '%env(bool:COMPLIANCE_MAPPING_INHERITANCE_ENABLED)%'

    # Four-Eyes workflow expiry (WS-1 / Plan Anhang A). Tenant-policy can be tightened.
    app.compliance.four_eyes.expiry_days: 7

    # Inheritance review minimum text lengths (ISB MINOR-1 / MINOR-3).
    app.compliance.review.min_comment_length: 20
    app.compliance.review.min_override_reason_length: 20

    # Significant-change threshold (%) for source-update propagation (ENT-2).
    app.compliance.source_update.significant_change_threshold: 5

    # Portfolio-report ampel thresholds (WS-4).
    app.compliance.portfolio.threshold_green: 80
    app.compliance.portfolio.threshold_yellow: 50

    # Reuse estimation heuristic: average FTE days saved per reusable requirement (WS-8).
    app.compliance.reuse_estimation.days_per_requirement: 0.3

    # Import wizard guardrails (WS-2).
    app.compliance.import.max_upload_mb: 5
    app.compliance.import.four_eyes_row_threshold: 50

    # Navigation badge polling (UI performance).
    app.compliance.ui.inheritance_badge_poll_seconds: 60

    # Gap-report quick-win thresholds (WS-6).
    app.compliance.gap_report.quick_win_effort_percentile: 20
    app.compliance.gap_report.quick_win_min_gap_percent: 10

    # Backup notifier defaults (override via env if needed).
    app.backup_notifier.from_email: 'noreply@little-isms-helper.local'
    app.backup_notifier.subject_prefix: '[ISMS Backup]'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            # W3-D — PolicyTopicPresentCheck is parameterised; the 24
            # tenant-scoped instances are wired explicitly below.
            - '../src/Service/ComplianceWizard/Check/PolicyWizard/PolicyTopicPresentCheck.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # Doctrine-Migrations DependencyFactory — Bundle exposes it under a string ID
    # only. Aliased so SchemaMaintenanceService (and any future consumer) can
    # type-hint the class directly via autowiring.
    Doctrine\Migrations\DependencyFactory:
        alias: 'doctrine.migrations.dependency_factory'

    # FairyAurora v3.0 — App-Version aus composer.json für Brand-Component
    App\Twig\AppVersionExtension:
        arguments:
            $projectDir: '%kernel.project_dir%'
        tags: ['twig.extension']

    # MRIS-Hilfetexte aus fixtures/mris/help-texts.yaml fuer Tooltip-Integration
    App\Twig\MrisHelpTextExtension:
        arguments:
            $projectDir: '%kernel.project_dir%'
        tags: ['twig.extension']

    # FairyAurora v3.0 — Alva-Mood-Resolver (Server-seitig, Plan § 6)
    App\Twig\AlvaMoodExtension:
        tags: ['twig.extension']

    # FairyAurora v3.0 — Setup-Flow-Array (12 Steps, DE+EN)
    App\Twig\SetupFlowExtension:
        tags: ['twig.extension']

    # Alva-Fee proactive hint rules — every implementation of
    # AlvaHintRuleInterface auto-registers and lands in AlvaHintService.
    # Policy-Wizard step evaluators — same auto-tagging pattern, every
    # StepInterface implementation lands in StepEvaluator.
    # W3-D — Compliance-Wizard check-types covering Policy-Wizard outputs
    # auto-register via PolicyWizardCheckInterface (collected by
    # PolicyWizardCheckRegistry).
    _instanceof:
        App\AlvaHint\AlvaHintRuleInterface:
            tags: ['alva.hint_rule']
        App\AlvaHint\GlobalAlvaHintRuleInterface:
            tags: ['alva.global_hint_rule']
        App\Service\PolicyWizard\Step\StepInterface:
            tags: ['policy_wizard.step']
        App\Service\PolicyWizard\Mode\ModeHandlerInterface:
            tags: ['policy_wizard.mode_handler']
        App\Service\ComplianceWizard\Check\PolicyWizard\PolicyWizardCheckInterface:
            tags: ['policy_wizard.compliance_check']
        # F40 — Audit-Workbook generators auto-register via interface tag.
        App\Service\Audit\Generator\AuditWorkbookGeneratorInterface:
            tags: ['app.audit.workbook_generator']

    # F40 — Audit-Workbook orchestrator: receives all tagged generators.
    App\Service\Audit\AuditWorkbookGenerator:
        arguments:
            $generators: !tagged_iterator app.audit.workbook_generator

    App\AlvaHint\AlvaHintService:
        arguments:
            $rules: !tagged_iterator alva.hint_rule
            $globalRules: !tagged_iterator alva.global_hint_rule

    # Policy-Wizard W2 — collect every StepInterface implementation
    # into the StepEvaluator's $steps argument.
    App\Service\PolicyWizard\StepEvaluator:
        arguments:
            $steps: !tagged_iterator policy_wizard.step

    # Policy-Wizard W2-C — collect every ModeHandlerInterface impl
    # (sandbox / targeted) into the ModeRegistry's $handlers argument.
    # Full mode has no handler — registry returns null for it.
    App\Service\PolicyWizard\Mode\ModeRegistry:
        arguments:
            $handlers: !tagged_iterator policy_wizard.mode_handler

    # Policy-Wizard — bind DocumentGeneratorInterface to the real
    # generator (W3). The W2 stub stays available for unit-test
    # injection via direct instantiation (`new DocumentGeneratorStub()`).
    App\Service\PolicyWizard\DocumentGeneratorInterface:
        alias: App\Service\PolicyWizard\DocumentGenerator

    # Policy-Wizard W3-D — Compliance-Wizard check-type registry.
    # Auto-collects every PolicyWizardCheckInterface implementation via
    # the `policy_wizard.compliance_check` tag (see _instanceof block).
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyWizardCheckRegistry:
        arguments:
            $checks: !tagged_iterator policy_wizard.compliance_check

    # Policy-Wizard W3-D — one PolicyTopicPresentCheck instance per ISO 27002
    # topic from PolicyWizardTopicCatalogue::ISO27001_TOPICS. Listing 24
    # explicit aliases (rather than a generic factory) keeps the service
    # graph statically inspectable for `lint:container` and lets autoconfig
    # tag every instance via the parent _instanceof rule.
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $acceptableUseTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'acceptable_use'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $accessControlTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'access_control'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $informationClassificationTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'information_classification'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $informationTransferTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'information_transfer'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $identityManagementTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'identity_management'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $authenticationInformationTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'authentication_information'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $cryptographyTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'cryptography'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $backupTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'backup'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $loggingTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'logging'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $patchManagementTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'patch_management'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $malwareTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'malware'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $secureConfigurationTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'secure_configuration'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $networkSecurityTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'network_security'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $secureDevelopmentTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'secure_development'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $supplierRelationshipsTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'supplier_relationships'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $projectManagementTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'project_management'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $privacyPiiTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'privacy_pii'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $incidentManagementTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'incident_management'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $continuityTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'continuity'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $threatIntelligenceTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'threat_intelligence'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $mobileDeviceTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'mobile_device'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $assetManagementTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'asset_management'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $hrSecurityTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'hr_security'
    App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck $physicalSecurityTopicCheck:
        class: App\Service\ComplianceWizard\Check\PolicyWizard\PolicyTopicPresentCheck
        arguments:
            $topic: 'physical_security'

    # Configure Data Import Service
    App\Service\DataImportService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Mapping-Library-Loader — liest fixtures/library/mappings/*.yaml
    App\Service\MappingLibraryLoader:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\EnsureMappingRequirementsCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\LoadC52026FullCatalogueCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\LoadBsiItGrundschutzCatalogueCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\LoadNistCsf2FullCatalogueCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\LoadC52020FullCatalogueCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\MappingLibraryImportCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\MappingLibrarySmokeTestCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\MrisSeedClassificationCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\MrisVersionMigrationCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\MrisBaselineService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\IndustryBaselineService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\EvidenceCollectionService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Runtime-configurable compliance policy (admin UI /admin/compliance/settings).
    # YAML params remain as fallback defaults if no DB override is set.
    App\Service\CompliancePolicyService:
        arguments:
            $defaults:
                mapping_inheritance.enabled: '%app.compliance.mapping_inheritance.enabled%'
                review.min_comment_length: '%app.compliance.review.min_comment_length%'
                review.min_override_reason_length: '%app.compliance.review.min_override_reason_length%'
                source_update.significant_change_threshold: '%app.compliance.source_update.significant_change_threshold%'
                four_eyes.expiry_days: '%app.compliance.four_eyes.expiry_days%'
                portfolio.threshold_green: '%app.compliance.portfolio.threshold_green%'
                portfolio.threshold_yellow: '%app.compliance.portfolio.threshold_yellow%'
                reuse_estimation.days_per_requirement: '%app.compliance.reuse_estimation.days_per_requirement%'
                import.max_upload_mb: '%app.compliance.import.max_upload_mb%'
                import.four_eyes_row_threshold: '%app.compliance.import.four_eyes_row_threshold%'
                ui.inheritance_badge_poll_seconds: '%app.compliance.ui.inheritance_badge_poll_seconds%'
                gap_report.quick_win_effort_percentile: '%app.compliance.gap_report.quick_win_effort_percentile%'
                gap_report.quick_win_min_gap_percent: '%app.compliance.gap_report.quick_win_min_gap_percent%'

    # WS-1 activation service: inject feature flag bound parameter
    App\Service\ComplianceFrameworkActivationService:
        arguments:
            $inheritanceEnabled: '%app.compliance.mapping_inheritance.enabled%'

    # Policy-Wizard W1-C — generic tenant-setting resolver. SettingProviderInterface
    # is satisfied by SystemSettingsBackedProvider until W1-A's TenantPolicySetting
    # repository lands; ChangeAttemptLoggerInterface defaults to a null logger
    # for the same reason.
    App\Service\TenantSettingResolver\SettingProviderInterface:
        alias: App\Service\TenantSettingResolver\SystemSettingsBackedProvider
    App\Service\TenantSettingResolver\ChangeAttemptLoggerInterface:
        alias: App\Service\TenantSettingResolver\NullChangeAttemptLogger

    # WS-1 inheritance service + four-eyes: now read thresholds at runtime via
    # CompliancePolicyService (admin-configurable). Autowiring covers the rest.

    # WS-1 source-update listener: threshold now read at runtime via
    # CompliancePolicyService (admin-configurable). Autowiring covers the rest.

    # Configure Module Configuration Service
    App\Service\ModuleConfigurationService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Configure System Requirements Checker
    App\Service\SystemRequirementsChecker:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Configure Security Audit Service
    App\Service\SecurityAuditService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Configure License Report Service
    App\Service\LicenseReportService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # RiskMatrixService thresholds moved to App\Risk\RiskMatrixThresholds (SSoT).
    # Service is now autowired without explicit arguments.

    # AuditLogCleanupCommand liest Retention seit 8L aus SystemSettings
    # (keine YAML-Injection mehr nötig).

    # AUD-02: Audit-Log integrity (HMAC chain)
    App\Service\AuditLogIntegrityService:
        arguments:
            $hmacSecret: '%app.audit_log_hmac_key%'

    # Configure Document Controller
    App\Controller\DocumentController:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # CM-8: Audit Freeze PDFs land under var/audit_freezes
    App\Controller\AuditFreezeController:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # BackupEncryptionService: AES-256-GCM envelope encryption for sensitive backup fields.
    App\Service\BackupEncryptionService:
        arguments:
            $appSecret: '%env(APP_SECRET)%'

    # Configure Backup Service
    App\Service\BackupService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Backup notifier — sends plain-text e-mail on success/failure
    App\Service\BackupNotifier:
        arguments:
            $fromEmail: '%app.backup_notifier.from_email%'
            $subjectPrefix: '%app.backup_notifier.subject_prefix%'

    # Backup CLI commands need $projectDir injected explicitly
    App\Command\PruneBackupsCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\RestoreBackupCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Configure Web Push Service
    App\Service\WebPushService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Configure Restore Service — inject ManagerRegistry for best-effort EM reset
    App\Service\RestoreService:
        arguments:
            $registry: '@doctrine'

    # ISB MINOR-4: Mailer TLS pre-flight check. DSN must be injected
    # explicitly because %env()% cannot be autowired into a scalar arg.
    App\Service\Mail\MailerTlsChecker:
        arguments:
            $mailerDsn: '%env(MAILER_DSN)%'

    # Configure Health Auto Fix Service
    App\Service\HealthAutoFixService:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $cacheDir: '%kernel.cache_dir%'
            $logsDir: '%kernel.logs_dir%'

    # Bind rate limiter factories for autowiring
    # Symfony automatically creates services named limiter.<name> from rate_limiter.yaml
    Symfony\Component\RateLimiter\RateLimiterFactory $loginLimiter: '@limiter.login'
    Symfony\Component\RateLimiter\RateLimiterFactory $apiLimiter: '@limiter.api'
    Symfony\Component\RateLimiter\RateLimiterFactory $passwordResetLimiter: '@limiter.password_reset'
    Symfony\Component\RateLimiter\RateLimiterFactory $documentUploadLimiter: '@limiter.document_upload'
    # Aliases for Rector-renamed parameters (SecurityController login limiter)
    Symfony\Component\RateLimiter\RateLimiterFactory $rateLimiterFactory: '@limiter.login'

    # Configure Security Headers Subscriber
    App\EventSubscriber\SecurityHeadersSubscriber:
        arguments:
            $environment: '%kernel.environment%'

    # Make compliance framework commands public for service injection
    App\Command\LoadTisaxRequirementsCommand:
        public: true

    App\Command\LoadDoraRequirementsCommand:
        public: true

    App\Command\LoadNis2RequirementsCommand:
        public: true

    App\Command\LoadBsiItGrundschutzRequirementsCommand:
        public: true

    App\Command\LoadGdprRequirementsCommand:
        public: true

    App\Command\LoadIso27701RequirementsCommand:
        public: true

    App\Command\LoadIso27701v2025RequirementsCommand:
        public: true

    # ── F2.3: Bulk-Import Mapper Registry ────────────────────────────────────
    # Mappers are collected via tagged-service iterator; each mapper must be
    # tagged with `app.import.mapper` to be picked up by EntityMapperRegistry.

    App\Service\Import\Mapper\AssetMapper:
        tags: ['app.import.mapper']

    App\Service\Import\Mapper\SupplierMapper:
        tags: ['app.import.mapper']

    App\Service\Import\Mapper\ControlMapper:
        tags: ['app.import.mapper']

    App\Service\Import\Mapper\RiskMapper:
        tags: ['app.import.mapper']

    App\Service\Import\Mapper\BusinessProcessMapper:
        tags: ['app.import.mapper']

    App\Service\Import\EntityMapperRegistry:
        arguments:
            $mappers: !tagged_iterator app.import.mapper

    # ── F2.5: Bulk-Import Orchestrator ───────────────────────────────────────
    App\Service\Import\BulkImportOrchestrator:
        arguments:
            $uploadDir: '%kernel.project_dir%/var/import-uploads'

    # ── Sprint 10A — F5b Library importers + roundtrip ───────────────────────
    App\Service\Library\BsiKompendiumImporter:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\Library\VdaIsaImporter:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Controller\Admin\Library\LibraryImporterController:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\AlvaHint\Rule\Global\LibraryUpdatedRule:
        arguments:
            $projectDir: '%kernel.project_dir%'

