# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Application Configuration Parameters
    # Following Symfony Best Practice: Use 'app.' prefix for application parameters

    # Internationalization
    app.supported_locales: ['de', 'en']
    app.default_locale: 'de'

    # Pagination
    app.pagination_items_per_page: 30

    # Session Configuration
    app.session_lifetime: 86400  # 24 hours in seconds

    # Password Reset
    app.password_reset_token_lifetime: 3600  # 1 hour in seconds

    # Risk Management - ISO 27001 compliant thresholds (5x5 matrix)
    # Reference: ISO 31000:2018 Risk Management, ISO 27001:2022 A.8.2
    app.risk_threshold_critical: 20  # Score >= 20 (e.g., 4×5, 5×4, 5×5)
    app.risk_threshold_high: 12      # Score >= 12 (e.g., 3×4, 4×3, 3×5)
    app.risk_threshold_medium: 6     # Score >= 6 (e.g., 2×3, 3×2, 2×4)
    # Low: Score < 6 (e.g., 1×1, 1×2, 2×1)

    # Audit Log Retention - DSGVO Art. 5.1(e) + NIS2 Art. 21.2 compliant
    # DSGVO Art. 5.1(e): Storage Limitation - data must not be kept longer than necessary
    # NIS2 Art. 21.2: Audit logs must be retained for at least 12 months (365 days)
    app.audit_log_retention_days: 365  # 12 months minimum per NIS2

    # AUD-02: HMAC-SHA256 key for audit-log integrity (tamper detection).
    # Production: set APP_AUDIT_HMAC_KEY to a ≥32-byte random secret.
    # Empty value disables signing (rows persisted without hmac, verify reports disabled).
    app.audit_log_hmac_key: '%env(default::APP_AUDIT_HMAC_KEY)%'

    # WS-1 Feature Flag: dark-launch for mapping-based inheritance suggestions.
    app.compliance.mapping_inheritance.enabled: '%env(bool:COMPLIANCE_MAPPING_INHERITANCE_ENABLED)%'

    # Four-Eyes workflow expiry (WS-1 / Plan Anhang A). Tenant-policy can be tightened.
    app.compliance.four_eyes.expiry_days: 7

    # Inheritance review minimum text lengths (ISB MINOR-1 / MINOR-3).
    app.compliance.review.min_comment_length: 20
    app.compliance.review.min_override_reason_length: 20

    # Significant-change threshold (%) for source-update propagation (ENT-2).
    app.compliance.source_update.significant_change_threshold: 5

    # Portfolio-report ampel thresholds (WS-4).
    app.compliance.portfolio.threshold_green: 80
    app.compliance.portfolio.threshold_yellow: 50

    # Reuse estimation heuristic: average FTE days saved per reusable requirement (WS-8).
    app.compliance.reuse_estimation.days_per_requirement: 0.3

    # Import wizard guardrails (WS-2).
    app.compliance.import.max_upload_mb: 5
    app.compliance.import.four_eyes_row_threshold: 50

    # Navigation badge polling (UI performance).
    app.compliance.ui.inheritance_badge_poll_seconds: 60

    # Gap-report quick-win thresholds (WS-6).
    app.compliance.gap_report.quick_win_effort_percentile: 20
    app.compliance.gap_report.quick_win_min_gap_percent: 10

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # Configure Data Import Service
    App\Service\DataImportService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Runtime-configurable compliance policy (admin UI /admin/compliance/settings).
    # YAML params remain as fallback defaults if no DB override is set.
    App\Service\CompliancePolicyService:
        arguments:
            $defaults:
                mapping_inheritance.enabled: '%app.compliance.mapping_inheritance.enabled%'
                review.min_comment_length: '%app.compliance.review.min_comment_length%'
                review.min_override_reason_length: '%app.compliance.review.min_override_reason_length%'
                source_update.significant_change_threshold: '%app.compliance.source_update.significant_change_threshold%'
                four_eyes.expiry_days: '%app.compliance.four_eyes.expiry_days%'
                portfolio.threshold_green: '%app.compliance.portfolio.threshold_green%'
                portfolio.threshold_yellow: '%app.compliance.portfolio.threshold_yellow%'
                reuse_estimation.days_per_requirement: '%app.compliance.reuse_estimation.days_per_requirement%'
                import.max_upload_mb: '%app.compliance.import.max_upload_mb%'
                import.four_eyes_row_threshold: '%app.compliance.import.four_eyes_row_threshold%'
                ui.inheritance_badge_poll_seconds: '%app.compliance.ui.inheritance_badge_poll_seconds%'
                gap_report.quick_win_effort_percentile: '%app.compliance.gap_report.quick_win_effort_percentile%'
                gap_report.quick_win_min_gap_percent: '%app.compliance.gap_report.quick_win_min_gap_percent%'

    # WS-1 activation service: inject feature flag bound parameter
    App\Service\ComplianceFrameworkActivationService:
        arguments:
            $inheritanceEnabled: '%app.compliance.mapping_inheritance.enabled%'

    # WS-1 inheritance service + four-eyes: now read thresholds at runtime via
    # CompliancePolicyService (admin-configurable). Autowiring covers the rest.

    # WS-1 source-update listener: threshold now read at runtime via
    # CompliancePolicyService (admin-configurable). Autowiring covers the rest.

    # Configure Module Configuration Service
    App\Service\ModuleConfigurationService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Configure System Requirements Checker
    App\Service\SystemRequirementsChecker:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Configure Security Audit Service
    App\Service\SecurityAuditService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Configure License Report Service
    App\Service\LicenseReportService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Configure Risk Matrix Service with ISO 27001 compliant thresholds
    App\Service\RiskMatrixService:
        arguments:
            $criticalThreshold: '%app.risk_threshold_critical%'
            $highThreshold: '%app.risk_threshold_high%'
            $mediumThreshold: '%app.risk_threshold_medium%'

    # Configure Audit Log Cleanup Command with DSGVO/NIS2 retention policy
    App\Command\AuditLogCleanupCommand:
        arguments:
            $retentionDays: '%app.audit_log_retention_days%'

    # AUD-02: Audit-Log integrity (HMAC chain)
    App\Service\AuditLogIntegrityService:
        arguments:
            $hmacSecret: '%app.audit_log_hmac_key%'

    # Configure Document Controller
    App\Controller\DocumentController:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Configure Backup Service
    App\Service\BackupService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Configure Web Push Service
    App\Service\WebPushService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Configure Restore Service
    App\Service\RestoreService: ~

    # ISB MINOR-4: Mailer TLS pre-flight check. DSN must be injected
    # explicitly because %env()% cannot be autowired into a scalar arg.
    App\Service\Mail\MailerTlsChecker:
        arguments:
            $mailerDsn: '%env(MAILER_DSN)%'

    # Configure Health Auto Fix Service
    App\Service\HealthAutoFixService:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $cacheDir: '%kernel.cache_dir%'
            $logsDir: '%kernel.logs_dir%'

    # Bind rate limiter factories for autowiring
    # Symfony automatically creates services named limiter.<name> from rate_limiter.yaml
    Symfony\Component\RateLimiter\RateLimiterFactory $loginLimiter: '@limiter.login'
    Symfony\Component\RateLimiter\RateLimiterFactory $apiLimiter: '@limiter.api'
    Symfony\Component\RateLimiter\RateLimiterFactory $passwordResetLimiter: '@limiter.password_reset'
    Symfony\Component\RateLimiter\RateLimiterFactory $documentUploadLimiter: '@limiter.document_upload'
    # Aliases for Rector-renamed parameters
    Symfony\Component\RateLimiter\RateLimiterFactory $rateLimiterFactory: '@limiter.document_upload'

    # Configure Security Headers Subscriber
    App\EventSubscriber\SecurityHeadersSubscriber:
        arguments:
            $environment: '%kernel.environment%'

    # Make compliance framework commands public for service injection
    App\Command\LoadTisaxRequirementsCommand:
        public: true

    App\Command\LoadDoraRequirementsCommand:
        public: true

    App\Command\LoadNis2RequirementsCommand:
        public: true

    App\Command\LoadBsiItGrundschutzRequirementsCommand:
        public: true

    App\Command\LoadGdprRequirementsCommand:
        public: true

    App\Command\LoadIso27701RequirementsCommand:
        public: true

    App\Command\LoadIso27701v2025RequirementsCommand:
        public: true
