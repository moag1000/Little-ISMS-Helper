twig:
    file_name_pattern: '*.twig'

    # Aurora v4 Cyber-Input Form Theme — global default for all Symfony forms.
    # Renders every form_row inside a .fa-cyber-input frame with tick-marks and
    # focus-glow. CSS lives in assets/styles/fairy-aurora-components.css.
    # OVERRIDE only with architect approval. See CONTRIBUTING.md § Form Standards.
    form_themes: ['form/fa_cyber_input.html.twig']

    # Security: Auto-escaping is enabled by default in Symfony to prevent XSS attacks

    # Security: Use strict variables in development to catch errors early
    # strict_variables: true  # Enable in dev if needed

when@test:
    twig:
        strict_variables: true
