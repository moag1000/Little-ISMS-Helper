# Enable stateless CSRF protection for forms and logins/logouts
framework:
    form:
        csrf_protection:
            token_id: submit

    csrf_protection:
        stateless_token_ids:
            - submit
            - authenticate
            - logout
            - corporate_structure
            # NOTE: Admin Backup/Export/Import and bulk-action endpoints are
            # intentionally NOT stateless. Their JavaScript submits via fetch()
            # and sends the CSRF token in the request body (the "_token" field),
            # but never sets the SameOrigin double-submit cookie/header that
            # stateless validation requires (csrf_protection.js only does that on
            # a native form submit). Listing them as stateless therefore made
            # every create/upload/restore/delete/export/import POST return 403.
            # Session-stateful CSRF matches how they actually submit — and how
            # the app's other custom JSON endpoints (alva_hint, audit_checklist,
            # …) already work.
