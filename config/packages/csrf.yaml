# Enable stateless CSRF protection for forms and logins/logouts
framework:
    form:
        csrf_protection:
            token_id: submit

    csrf_protection:
        stateless_token_ids:
            - submit
            - authenticate
            - logout
            - corporate_structure
            # Admin Backup/Export/Import — JSON API endpoints use SameOrigin header
            - data_backup_create
            - data_backup_upload
            - data_backup_validate
            - data_backup_restore
            - data_backup_delete
            - data_export
            - data_import
            - data_import_execute
