# Pre-commit hooks — install via:
#   pip install pre-commit
#   pre-commit install
#
# Catches lint errors locally before push, so CI iterates less.
# Hooks run only on staged files (fast).

repos:
  # Catches trailing whitespace, end-of-file newline, large files, merge-conflict markers
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$|\.bak\d*$
      - id: end-of-file-fixer
        exclude: \.bak\d*$
      - id: check-merge-conflict
      - id: check-yaml
        exclude: ^translations/.*\.yaml$  # Symfony translations may use special syntax
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key

  # PHP linting (syntax only, no PSR-12)
  - repo: local
    hooks:
      - id: php-lint
        name: PHP Syntax Lint
        entry: bash -c 'for f in "$@"; do php -l "$f" || exit 1; done' --
        language: system
        files: \.php$
        require_serial: false

  # Hadolint for Dockerfiles
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker
        args:
          - --ignore=DL3008
          - --ignore=DL3015
          - --ignore=DL3018

  # Twig linting via Symfony console
  - repo: local
    hooks:
      - id: twig-lint
        name: Twig Lint (Symfony)
        entry: php bin/console lint:twig --env=dev
        language: system
        files: \.twig$
        pass_filenames: true

  # YAML linting via Symfony console (catches malformed translation/config YAML)
  - repo: local
    hooks:
      - id: symfony-yaml-lint
        name: Symfony YAML Lint
        entry: php bin/console lint:yaml --env=dev
        language: system
        files: ^(config|translations)/.*\.yaml$
        pass_filenames: true

  # Translation hygiene — hardcoded text / missing |trans domains in Twig
  # Only runs when templates/ or translations/ files change. The script itself
  # scans the whole templates/ tree (no per-file args), so we use
  # pass_filenames: false and gate on file regex to avoid running on every
  # commit. CI gate (Gate 44 in ci.yml) is the strict baseline-diff version;
  # this local hook is informational — exit 0 even with pre-existing issues.
  - repo: local
    hooks:
      - id: check-translation-issues
        name: Translation Issues (hardcoded text / missing |trans domains)
        entry: python3 scripts/quality/check_translation_issues.py
        language: system
        files: ^(templates|translations)/.*\.(twig|yaml)$
        pass_filenames: false

  # Secret scanning — fails on accidentally staged credentials
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
